<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg-dark: #030508;
      --bg-panel: rgba(10, 15, 25, 0.4);
      --border-glow: rgba(0, 242, 254, 0.2);
      --border-panel: rgba(255, 255, 255, 0.05);

      --cyan: #00f2fe;
      --magenta: #fe00a1;
      --purple: #8a2be2;

      --text-main: #f0f4f8;
      --text-muted: #94a3b8;

      --font-body: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-dark);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background */
    .quantum-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at center, #050a14 0%, var(--bg-dark) 100%);
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: drift 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: var(--cyan);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px; height: 500px;
      background: var(--purple);
      bottom: -150px; right: -100px;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: var(--magenta);
      top: 40%; left: 60%;
      animation-delay: -10s;
      opacity: 0.2;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin-top: 2rem;
      margin-bottom: 3rem;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-panel);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 1px var(--border-glow);
    }

    .site-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
    }
    .site-header nav a:hover { color: var(--text-main); }
    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      transition: width 0.3s ease;
    }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { min-height: calc(100vh - 250px); }

    /* Glassmorphism Panel */
    .glass-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-panel);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: var(--font-display);
      line-height: 1.2;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 600;
      color: var(--text-main);
    }
    h1 { font-size: 2.5rem; margin-top: 0; font-weight: 800; letter-spacing: -1px; }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.35rem; }
    p { margin: 1.2em 0; color: var(--text-muted); }

    a { color: var(--cyan); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--magenta); text-shadow: 0 0 8px rgba(254, 0, 161, 0.4); }

    code {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--cyan);
      border: 1px solid rgba(255,255,255,0.1);
    }
    pre {
      background: rgba(5, 10, 15, 0.6);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border-panel);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; color: #e2e8f0; border: none; }

    /* Post Lists */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; display: grid; gap: 1.5rem; }
    ul.section-list li {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      border: 1px solid var(--border-panel);
      padding: 1.5rem;
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(0, 242, 254, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 20px rgba(0, 242, 254, 0.05);
    }
    ul.section-list li h2 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
    ul.section-list li a { color: var(--text-main); font-weight: 600; }
    ul.section-list li a:hover { color: var(--cyan); text-shadow: none; }

    .post-meta { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.75rem; }

    /* Tags */
    .taxonomy-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: rgba(138, 43, 226, 0.1);
      border: 1px solid rgba(138, 43, 226, 0.3);
      color: #bfa1ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Pagination */
    nav.pagination { margin: 3rem 0; display: flex; justify-content: center; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; }
    nav.pagination a, .pagination-disabled span, .pagination-current span {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 36px; height: 36px; padding: 0 0.5rem;
      border-radius: 8px; font-weight: 500; font-size: 0.9rem;
    }
    nav.pagination a {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-panel);
      color: var(--text-main);
    }
    nav.pagination a:hover {
      background: rgba(0, 242, 254, 0.1);
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .pagination-current span {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: white; border: none;
    }
    .pagination-disabled span {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1rem; border-radius: 12px; }
      .glass-panel { padding: 1.5rem; border-radius: 16px; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined and page.section %}{{ page.section }}{% endif %}">

  <div class="quantum-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">Quantum Veil</a>
      <nav>
        <a href="/">Home</a>
        <a href="/posts/">Posts</a>
        <a href="/about/">About</a>
      </nav>
    </header>
