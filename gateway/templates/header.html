<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">

<header class="docs-header">
  <a href="{{ base_url }}/" class="logo">GATEWAY <span>Security Console</span></a>
  <nav>
    <a href="{{ base_url }}/authentication/">Authentication</a>
    <a href="{{ base_url }}/management/">Management</a>
    <a href="{{ base_url }}/api-reference/">API Reference</a>
  </nav>
  <div class="header-right">
    <button class="search-trigger" onclick="openSearch()" title="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>SEARCH_SYSTEM</span>
    </button>
  </div>
</header>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search system logs and documentation..." autocomplete="off">
      <kbd onclick="closeSearch()">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="docs-container">
  <aside class="docs-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Authentication</div>
      <ul class="sidebar-links">
        <li><a href="{{ base_url }}/authentication/" class="{% if page.url == '/authentication/' %}active{% endif %}">Overview</a></li>
        <li><a href="{{ base_url }}/authentication/flow/" class="{% if page.url == '/authentication/flow/' %}active{% endif %}">Auth Flow</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Management</div>
      <ul class="sidebar-links">
        <li><a href="{{ base_url }}/management/" class="{% if page.url == '/management/' %}active{% endif %}">System Console</a></li>
        <li><a href="{{ base_url }}/management/keys/" class="{% if page.url == '/management/keys/' %}active{% endif %}">Key Management</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">API Reference</div>
      <ul class="sidebar-links">
        <li><a href="{{ base_url }}/api-reference/" class="{% if page.url == '/api-reference/' %}active{% endif %}">Overview</a></li>
        <li><a href="{{ base_url }}/api-reference/endpoints/" class="{% if page.url == '/api-reference/endpoints/' %}active{% endif %}">Endpoints</a></li>
      </ul>
    </div>
  </aside>
  <main class="docs-main">
