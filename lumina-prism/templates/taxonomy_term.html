{% extends "base.html" %}

{% block content %}
<div class="glass-panel content-card">
  <h1 class="section-title">{{ page.title | default("Term", true) }}</h1>

  <div class="taxonomy-content">
    {{ content | safe }}
  </div>

  <ul class="section-list">
    {% for p in paginator.pages | default(term.pages, true) %}
      <li>
        <a href="{{ p.permalink }}">{{ p.title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
