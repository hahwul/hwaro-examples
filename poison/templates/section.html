{% include "header.html" %}

      <h1>{{ page.title }}</h1>

      {{ content }}

      <ul class="entries">
        {% for item in section.pages %}
        <li>
          <span class="entry-title"><a href="{{ base_url }}{{ item.url }}">{{ item.title }}</a></span>
          {% if item.date %}
          <span class="entry-date">{{ item.date }}</span>
          {% endif %}
        </li>
        {% endfor %}
      </ul>

      {{ pagination }}

{% include "footer.html" %}
