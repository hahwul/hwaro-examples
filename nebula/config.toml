# =============================================================================
# Nebula - Ethereal Art Gallery
# =============================================================================
# Cosmic deep space inspired art gallery theme

title = "Nebula"
description = "An ethereal art gallery inspired by the cosmic beauty of nebulae and deep space phenomena"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 9

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "atom"
limit = 20
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
