{% include "header.html" %}
    <article class="totem-page">
      <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <time class="page-date">{{ page.date }}</time>
        {% endif %}
        {% if page.tags %}
        <div class="page-tags">
          {% for tag in page.tags %}
          <a href="{{ base_url }}/tags/{{ tag }}/" class="tag-chip">{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </header>
      <div class="tribal-divider">
        <span>&Delta;</span><span>&diams;</span><span>&#9675;</span><span>&diams;</span><span>&Delta;</span>
      </div>
      <div class="page-content">
        {{ content | safe }}
      </div>
    </article>
{% include "footer.html" %}
