{% include "header.html" %}

<div class="stellar-page-container">
  <main class="stellar-main-content glass-panel">
    <header class="page-header">
      <h1 class="page-title">{{ page.title | e }}</h1>
      {% if page.description is defined and page.description %}
      <p class="page-description">{{ page.description | e }}</p>
      {% endif %}
    </header>

    <article class="page-content">
      {{ content }}
    </article>
  </main>
</div>
