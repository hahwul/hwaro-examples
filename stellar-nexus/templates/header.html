<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is defined and page.description %}{{ page.description | e }}{% elif site.description is defined %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page.section is defined %}{{ page.section }}{% endif %}">

<header class="stellar-header">
  <div class="header-inner">
    <a href="/" class="site-logo">
      {% if site.title is defined %}{{ site.title | e }}{% else %}Stellar Nexus{% endif %}
    </a>
    <nav class="main-nav">
      <a href="/posts/" class="nav-link">Transmissions</a>
      <a href="/archives/" class="nav-link">Data Core</a>
      <a href="/about/" class="nav-link">Entity Info</a>
    </nav>
  </div>
</header>
