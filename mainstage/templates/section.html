{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <div class="section-marquee">
        <span class="cue-tag">CUE / LINEUP</span>
        <h1 class="billboard-title">{{ page.title | e }}</h1>
        <div class="marquee-rule" aria-hidden="true">
          <svg viewBox="0 0 800 6" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="3" x2="800" y2="3" stroke="#f5a623" stroke-width="2"/>
            <circle cx="4" cy="3" r="3" fill="#f5a623"/>
            <circle cx="796" cy="3" r="3" fill="#f5a623"/>
          </svg>
        </div>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
