<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #d4af37; /* Gold accent */
      --secondary: #c83232; /* Rich red accent */
      --text: #f5f5dc; /* Ivory text */
      --text-muted: #a89f91;
      --border: rgba(212, 175, 55, 0.3); /* Subtle gold border */
      --bg: #0a0908; /* Deep dark background */
      --bg-subtle: #141311;
      --glow: rgba(212, 175, 55, 0.4); /* Gold glow effect */
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Lora', serif; line-height: 1.7; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.8rem; color: var(--primary); text-decoration: none; letter-spacing: 1px; text-shadow: 0 0 10px var(--glow); transition: text-shadow 0.3s ease; }
    .site-logo:hover { text-shadow: 0 0 20px var(--glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { font-family: 'Playfair Display', serif; color: var(--text); text-decoration: none; font-size: 1.1rem; transition: color 0.3s ease, text-shadow 0.3s ease; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--glow); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { font-family: 'Playfair Display', serif; line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: var(--primary); }
    h1 { font-size: 2.2rem; margin-top: 0; letter-spacing: 0.5px; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; color: var(--text); }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
    a:hover { border-bottom-color: var(--primary); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: var(--primary); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; color: inherit; }
    blockquote { border-left: 4px solid var(--primary); margin: 1.5em 0; padding-left: 1.5em; font-style: italic; color: var(--text-muted); background: var(--bg-subtle); padding-top: 1em; padding-bottom: 1em; padding-right: 1em; border-radius: 0 8px 8px 0; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1.2rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.3s ease, box-shadow 0.3s ease; }
    ul.section-list li:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--glow); }
    ul.section-list li a { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.2rem; border-bottom: none; }
    ul.section-list li a:hover { border-bottom: none; color: var(--text); }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.3s ease; }
    nav.pagination a:hover { color: var(--bg); background-color: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--primary); background: rgba(212, 175, 55, 0.2); color: var(--primary); box-shadow: 0 0 5px var(--glow); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; }

    /* Form inputs / Buttons if any */
    input, button { font-family: 'Lora', serif; background: var(--bg-subtle); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 4px; }
    button { background: var(--primary); color: var(--bg); cursor: pointer; transition: box-shadow 0.3s ease; font-weight: bold; font-family: 'Playfair Display', serif; }
    button:hover { box-shadow: 0 0 15px var(--glow); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.5rem 0; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
