name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Lint example sites
        run: |
          # Run lint on changed sites (or all on workflow_dispatch)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ./scripts/lint-examples.sh --all
          else
            ./scripts/lint-examples.sh
          fi

      - name: Detect changed themes
        id: changes
        run: |
          # Find themes that changed since last commit
          CHANGED=""
          ALL=""
          for dir in examples/*/; do
            src_path="${dir%/}"
            name="${src_path#examples/}"
            if [ -f "${src_path}/config.toml" ]; then
              ALL="${ALL} ${name}"
              if git diff --name-only HEAD~1 HEAD -- "${src_path}/" | grep -q .; then
                CHANGED="${CHANGED} ${name}"
              fi
            fi
          done

          # On workflow_dispatch or if deploy.yml/tags.json changed, rebuild all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD -- .github/workflows/deploy.yml tags.json | grep -q .; then
            CHANGED="${ALL}"
          fi

          # Trim whitespace
          CHANGED=$(echo $CHANGED | xargs)
          ALL=$(echo $ALL | xargs)
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "all=${ALL}" >> $GITHUB_OUTPUT
          echo "Changed themes: ${CHANGED:-none}"

      - name: Restore screenshot cache
        uses: actions/cache@v4
        with:
          path: |
            _screenshot_cache
            _cached_hashes.json
          key: screenshots-v2-${{ github.sha }}
          restore-keys: |
            screenshots-v2-

      - name: Determine screenshots to capture
        id: screenshots
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/_screenshot_cache"

          # Compute per-theme content hash (config + templates + static + content)
          echo "{}" > _theme_hashes.json
          for dir in examples/*/; do
            src_path="${dir%/}"
            name="${src_path#examples/}"
            if [ -f "${src_path}/config.toml" ]; then
              HASH=$(find "${src_path}" -type f \( -name "*.toml" -o -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.md" -o -name "*.png" -o -name "*.jpg" -o -name "*.svg" \) -exec sha256sum {} \; 2>/dev/null | sort | sha256sum | cut -d' ' -f1)
              _theme_hashes_tmp=$(jq --arg k "$name" --arg v "$HASH" '. + {($k): $v}' _theme_hashes.json)
              echo "$_theme_hashes_tmp" > _theme_hashes.json
            fi
          done

          # Compare against cached hashes to find stale screenshots
          NEED_CAPTURE=""
          TOTAL=0
          SKIPPED=0
          for name in $(jq -r 'keys[]' _theme_hashes.json); do
            TOTAL=$((TOTAL + 1))
            NEW_HASH=$(jq -r --arg k "$name" '.[$k]' _theme_hashes.json)
            OLD_HASH=""
            if [ -f _cached_hashes.json ]; then
              OLD_HASH=$(jq -r --arg k "$name" '.[$k] // ""' _cached_hashes.json)
            fi
            CACHED="_screenshot_cache/${name}.png"

            if [ "$NEW_HASH" = "$OLD_HASH" ] && [ -f "$CACHED" ] && [ "$(stat -c%s "$CACHED" 2>/dev/null || echo 0)" -gt 1024 ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              NEED_CAPTURE="${NEED_CAPTURE} ${name}"
            fi
          done

          NEED_CAPTURE=$(echo $NEED_CAPTURE | xargs)
          COUNT=$(echo $NEED_CAPTURE | wc -w | xargs)
          echo "need_capture=${NEED_CAPTURE}" >> $GITHUB_OUTPUT
          echo "Screenshots: ${COUNT} to capture, ${SKIPPED} cached (${TOTAL} total)"

      - name: Build sites for screenshot capture
        if: steps.screenshots.outputs.need_capture != ''
        run: |
          SCREENSHOT_DIR="${GITHUB_WORKSPACE}/_screenshot_site"
          mkdir -p "${SCREENSHOT_DIR}"
          FAILED=""

          for name in ${{ steps.screenshots.outputs.need_capture }}; do
            echo "Building ${name} (screenshot)..."
            if ! docker run --rm \
              -v "${GITHUB_WORKSPACE}/examples/${name}:/src" \
              -v "${SCREENSHOT_DIR}/${name}:/output" \
              ghcr.io/hahwul/hwaro build \
                -i /src \
                -o /output \
                --base-url "http://localhost:8000/${name}"; then
              echo "::warning::Screenshot build failed for ${name}"
              FAILED="${FAILED} ${name}"
              sudo rm -rf "${SCREENSHOT_DIR}/${name}" || true
            fi
          done

          if [ -n "${FAILED}" ]; then
            echo "::warning::Screenshot builds failed for:${FAILED}"
          fi

      - name: Capture screenshots
        if: steps.screenshots.outputs.need_capture != ''
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

          SCREENSHOT_DIR="${GITHUB_WORKSPACE}/_screenshot_site"
          cd "${SCREENSHOT_DIR}"
          python3 -m http.server 8000 &
          SERVER_PID=$!
          sleep 2
          cd "${GITHUB_WORKSPACE}"

          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 720 });
            const targets = '${{ steps.screenshots.outputs.need_capture }}'.split(' ').filter(Boolean);
            for (const dir of targets) {
              try {
                await page.goto('http://localhost:8000/' + dir + '/', { waitUntil: 'networkidle', timeout: 30000 });
                const outPath = '${GITHUB_WORKSPACE}/_screenshot_cache/' + dir + '.png';
                await page.screenshot({ path: outPath });
                const stat = fs.statSync(outPath);
                if (stat.size <= 1024) {
                  fs.unlinkSync(outPath);
                  console.error('Invalid screenshot (too small): ' + dir);
                } else {
                  console.log('Screenshot: ' + dir);
                }
              } catch (e) {
                console.error('Failed: ' + dir, e.message);
              }
            }
            await browser.close();
          })();
          "

          kill $SERVER_PID || true
          sudo rm -rf "${SCREENSHOT_DIR}"

      - name: Update screenshot hash manifest
        run: |
          cp _theme_hashes.json _cached_hashes.json
          mkdir -p "${GITHUB_WORKSPACE}/_site/screenshots"
          if [ -d "${GITHUB_WORKSPACE}/_screenshot_cache" ]; then
            cp -f ${GITHUB_WORKSPACE}/_screenshot_cache/*.png "${GITHUB_WORKSPACE}/_site/screenshots/" 2>/dev/null || true
          fi

      - name: Build all sites
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/_site"
          mkdir -p "${OUTPUT_DIR}"
          FAILED=""
          TOTAL=0

          for dir in examples/*/; do
            src_path="${dir%/}"
            name="${src_path#examples/}"
            if [ -f "${src_path}/config.toml" ]; then
              TOTAL=$((TOTAL + 1))
              echo "Building ${name}..."
              if docker run --rm \
                -v "${GITHUB_WORKSPACE}/${src_path}:/src" \
                -v "${OUTPUT_DIR}/${name}:/output" \
                ghcr.io/hahwul/hwaro build \
                  -i /src \
                  -o /output \
                  --base-url "${BASE_URL}/${name}"; then
                echo "Done: ${name}"
              else
                echo "::warning::Build failed for ${name}"
                FAILED="${FAILED} ${name}"
                sudo rm -rf "${OUTPUT_DIR}/${name}" || true
              fi
            fi
          done

          if [ -n "${FAILED}" ]; then
            FAIL_COUNT=$(echo ${FAILED} | wc -w | xargs)
            echo "::warning::Build failures (${FAIL_COUNT}/${TOTAL}):${FAILED}"
          fi
      - name: Generate index page
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/_site"

          SITE_LINKS=""
          ALL_TAGS=""
          EXAMPLE_COUNT=0
          for dir in examples/*/; do
            src_path="${dir%/}"
            name="${src_path#examples/}"
            if [ -f "${src_path}/config.toml" ] && [ -d "${OUTPUT_DIR}/${name}" ]; then
              TITLE=$(grep '^title' "${src_path}/config.toml" | head -1 | sed 's/title *= *"//;s/"//')
              DESCRIPTION=$(grep '^description' "${src_path}/config.toml" | head -1 | sed 's/description *= *"//;s/"//')
              THEME_REPO_URL="https://github.com/${GITHUB_REPOSITORY}/tree/main/${src_path}"
              SCAFFOLD_URL="https://github.com/${GITHUB_REPOSITORY}/tree/main/${src_path}"
              SCAFFOLD_CMD="hwaro init my-site --scaffold ${SCAFFOLD_URL}"
              TAGS=$(jq -r --arg d "${name}" '.[$d] // [] | join(" ")' tags.json)
              TAGS_DISPLAY=""
              for tag in ${TAGS}; do
                TAGS_DISPLAY="${TAGS_DISPLAY}<span class=\"tag\">${tag}</span>"
                if ! echo "${ALL_TAGS}" | grep -qw "${tag}"; then
                  ALL_TAGS="${ALL_TAGS} ${tag}"
                fi
              done
              EXAMPLE_COUNT=$((EXAMPLE_COUNT + 1))
              SITE_LINKS="${SITE_LINKS}<div class=\"card\" data-name=\"${name}\" data-title=\"${TITLE}\" data-desc=\"${DESCRIPTION}\" data-tags=\"${TAGS}\"><a href=\"${BASE_URL}/${name}/\" class=\"main-link\"><img src=\"screenshots/${name}.png\" alt=\"${name}\" class=\"preview\" loading=\"lazy\" onerror=\"var d=document.createElement('div');d.className='preview-fallback';d.textContent='no_preview';this.replaceWith(d);\"><div class=\"card-info\"><strong>${name}</strong><span class=\"title\">${TITLE}</span><span class=\"desc\">${DESCRIPTION}</span><div class=\"card-tags\">${TAGS_DISPLAY}</div></div></a><div class=\"card-footer\"><a href=\"${THEME_REPO_URL}\" class=\"card-footer-row\"><svg viewBox=\"0 0 16 16\"><path d=\"M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z\"></path></svg>Source Code</a><div class=\"card-footer-row scaffold-row\" onclick=\"copyScaffold(this)\" data-cmd=\"${SCAFFOLD_CMD}\"><svg viewBox=\"0 0 16 16\"><path d=\"M4.72 3.22a.75.75 0 011.06 1.06L2.06 8l3.72 3.72a.75.75 0 11-1.06 1.06L.47 8.53a.75.75 0 010-1.06l4.25-4.25zm6.56 0a.75.75 0 10-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 101.06 1.06l4.25-4.25a.75.75 0 000-1.06l-4.25-4.25z\"></path></svg><span class=\"scaffold-cmd\">${SCAFFOLD_CMD}</span><svg class=\"copy-icon\" viewBox=\"0 0 16 16\"><path d=\"M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z\"></path><path d=\"M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 9.25a.75.75 0 01-1.5 0 .25.25 0 00-.25-.25h-7.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h1.5a.75.75 0 010 1.5h-1.5A1.75 1.75 0 015 14.25v-7.5z\"></path></svg></div></div></div>"
            fi
          done
          # Identify top 8 tags and generate dynamic CSS
          TOP_TAGS_DATA=$(jq -r 'values[] | .[]' tags.json | sort | uniq -c | sort -rn | head -8 | awk '{print $2}')

          # Build tag buttons with highlighted (top 8) tags first
          TAG_BUTTONS=""
          for tag in $(echo ${TOP_TAGS_DATA} | tr ' ' '\n' | sort); do
            TAG_BUTTONS="${TAG_BUTTONS}<button class=\"tag-btn\" data-tag=\"${tag}\" data-highlight=\"1\">${tag}</button>"
          done
          for tag in $(echo ${ALL_TAGS} | tr ' ' '\n' | sort); do
            if ! echo "${TOP_TAGS_DATA}" | grep -qw "${tag}"; then
              TAG_BUTTONS="${TAG_BUTTONS}<button class=\"tag-btn\" data-tag=\"${tag}\">${tag}</button>"
            fi
          done

          echo "examples.hwaro.hahwul.com" > "${OUTPUT_DIR}/CNAME"
          cat > "${OUTPUT_DIR}/index.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="${EXAMPLE_COUNT} example sites built with Hwaro, a fast static site generator written in Crystal. Browse live demos, read the source, scaffold your own.">
            <meta name="theme-color" content="#08080a">
            <title>Hwaro Examples</title>
            <link rel="icon" href="https://hwaro.hahwul.com/favicon.ico">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
            <style>
            :root {
              --primary: #b35454; --primary-hover: #c46262; --primary-dark: #944545; --primary-light: #c87a7a;
              --ember-soft: rgba(179,84,84,0.16); --ember-faint: rgba(179,84,84,0.07);
              --text: #ececf0; --text-secondary: #b4b4be; --text-muted: #a0a0ab; --text-dim: #64646e;
              --bg: #08080a; --bg-elevated: #101014; --bg-card: #0d0d10;
              --border: #1e1e24; --border-light: #2e2e36;
              --hair: rgba(255,255,255,0.06); --hair-strong: rgba(255,255,255,0.1);
              --surface-1: rgba(255,255,255,0.022); --surface-2: rgba(255,255,255,0.04);
              --glow-ember: 0 10px 30px -12px rgba(179,84,84,0.45);
              --focus-ring: 0 0 0 2px rgba(179,84,84,0.25);
              --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
              --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            }
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: var(--font-sans); background: var(--bg); color: var(--text-secondary); min-height: 100vh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
            ::selection { background: rgba(179,84,84,0.35); color: #fff; }
            a:focus-visible, button:focus-visible, input:focus-visible, [onclick]:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
            button, .card-footer-row, .tag-btn, .sort-option { touch-action: manipulation; }
            .site-header { border-bottom: 1px solid var(--hair); }
            .header-inner { max-width: 1600px; margin: 0 auto; height: 56px; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; }
            .brand { display: flex; align-items: center; }
            .brand img { height: 22px; width: auto; display: block; }
            .header-nav { display: flex; align-items: center; gap: 1.5rem; }
            .header-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.45rem; transition: color 0.2s; }
            .header-nav a:hover { color: var(--text); }
            .header-nav svg { width: 16px; height: 16px; fill: currentColor; }
            .statline { max-width: 1600px; margin: 0 auto; padding: 2.75rem 1.5rem 2.25rem; }
            .statline h1 { font-family: var(--font-mono); font-size: 1.9rem; font-weight: 700; letter-spacing: -0.022em; color: var(--text); line-height: 1; }
            .statline h1 .caret { color: var(--primary); }
            .statline .sub { margin-top: 0.65rem; font-size: 0.92rem; color: var(--text-muted); max-width: 60ch; line-height: 1.6; }
            .statline .sub .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--primary-light); font-weight: 500; }
            .statline .sub a { color: var(--text-secondary); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: rgba(179,84,84,0.5); transition: color 0.2s, text-decoration-color 0.2s; }
            .statline .sub a:hover { color: var(--text); text-decoration-color: var(--primary-hover); }
            .app-layout { display: flex; gap: 1.5rem; max-width: 1600px; margin: 0 auto; padding: 0 1.5rem 4rem; align-items: flex-start; }
            .main-content { flex: 1; min-width: 0; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size, 280px), 1fr)); gap: 1.1rem; }
            .card { display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--hair); border-radius: 10px; overflow: hidden; transition: border-color 0.2s, transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out); }
            .card.hidden { display: none; }
            @media (hover: hover) {
              .card:hover { border-color: rgba(179,84,84,0.45); transform: translateY(-2px); box-shadow: var(--glow-ember); }
              .card:hover .preview, .card:hover .preview-fallback { opacity: 1; }
            }
            .main-link { display: flex; flex-direction: column; text-decoration: none; color: var(--text-secondary); flex-grow: 1; }
            .preview { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: cover; display: block; background: #0b0b0e; border-bottom: 1px solid var(--hair); opacity: 0.92; transition: opacity 0.2s; }
            .preview-fallback { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: #0b0b0e; border-bottom: 1px solid var(--hair); color: #3f3f48; font-family: var(--font-mono); font-size: 0.75rem; opacity: 0.92; transition: opacity 0.2s; }
            .main-link .card-info { padding: 0.9rem 1rem 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
            .main-link strong { font-family: var(--font-mono); font-size: 0.92rem; font-weight: 500; color: var(--text); line-height: 1.3; }
            .main-link .title { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
            .main-link .desc { font-size: 0.75rem; color: var(--text-dim); line-height: 1.45; margin-top: 0.1rem; }
            .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
            .tag { background: var(--surface-2); color: var(--text-dim); padding: 0.16rem 0.45rem; border-radius: 4px; font-family: var(--font-mono); font-size: 0.62rem; }
            .card-footer { border-top: 1px solid var(--hair); background: var(--surface-1); }
            .card-footer-row { padding: 0.55rem 1rem; font-size: 0.72rem; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 0.45rem; transition: color 0.15s, background 0.15s; }
            .card-footer-row + .card-footer-row { border-top: 1px solid var(--hair); }
            a.card-footer-row:hover { color: var(--text); background: var(--surface-2); }
            .card-footer-row svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
            .scaffold-row { cursor: pointer; position: relative; font-family: var(--font-mono); font-size: 0.65rem; }
            .scaffold-row:hover { color: var(--text); background: var(--surface-2); }
            .scaffold-cmd { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
            .scaffold-row .copy-icon { margin-left: auto; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s; }
            .scaffold-row:hover .copy-icon { opacity: 1; }
            .scaffold-row.copied { color: var(--primary-light); }
            .scaffold-row.copied .copy-icon { opacity: 1; }
            .sidebar { width: 280px; flex-shrink: 0; position: sticky; top: 1rem; background: var(--surface-1); border: 1px solid var(--hair); border-radius: 12px; padding: 1.1rem; max-height: calc(100vh - 2rem); overflow-y: auto; transition: width 0.25s var(--ease-out), padding 0.25s var(--ease-out); scrollbar-width: thin; scrollbar-color: rgba(179,84,84,0.3) transparent; }
            .sidebar::-webkit-scrollbar { width: 4px; }
            .sidebar::-webkit-scrollbar-thumb { background: rgba(179,84,84,0.3); border-radius: 2px; }
            .sidebar.collapsed { width: 44px; padding: 0.5rem; overflow: hidden; }
            .sidebar.collapsed .sidebar-content { opacity: 0; pointer-events: none; }
            .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.85rem; border-bottom: 1px solid var(--hair); }
            .sidebar.collapsed .sidebar-header { justify-content: center; margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
            .sidebar-title { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 500; }
            .sidebar-title::before { content: "// "; color: var(--primary); font-weight: 400; }
            .sidebar.collapsed .sidebar-title { display: none; }
            .sidebar-toggle { width: 28px; height: 28px; border-radius: 6px; background: transparent; border: 1px solid var(--hair-strong); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s, border-color 0.2s, transform 0.1s; flex-shrink: 0; }
            .sidebar-toggle:hover { color: var(--primary-light); border-color: rgba(179,84,84,0.45); }
            .sidebar-toggle:active { transform: scale(0.94); }
            .sidebar-toggle svg { width: 14px; height: 14px; fill: currentColor; transition: transform 0.25s; }
            .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }
            .sidebar-content { display: flex; flex-direction: column; gap: 1rem; transition: opacity 0.2s; }
            .sidebar-section { display: flex; flex-direction: column; gap: 0.5rem; }
            .sidebar-section + .sidebar-section { border-top: 1px solid var(--hair); padding-top: 1rem; }
            .sidebar-label { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.05em; color: var(--text-dim); font-weight: 500; }
            .search-wrap { position: relative; width: 100%; }
            .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--text-dim); pointer-events: none; }
            .search-input { width: 100%; padding: 0.55rem 0.75rem 0.55rem 2.3rem; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; font-family: var(--font-sans); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
            .search-input::placeholder { color: var(--text-dim); }
            .search-input:focus { border-color: var(--primary); box-shadow: var(--focus-ring); }
            .search-count { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 0.68rem; color: var(--text-dim); pointer-events: none; transition: opacity 0.2s; opacity: 0; }
            .search-count.visible { opacity: 1; }
            .sort-wrap { position: relative; width: 100%; }
            .sort-btn { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 0.82rem; font-family: var(--font-sans); padding: 0.55rem 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; transition: border-color 0.2s, color 0.2s; width: 100%; justify-content: space-between; }
            .sort-btn:hover { border-color: var(--border-light); color: var(--text); }
            .sort-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
            .sort-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg-elevated); border: 1px solid var(--border-light); border-radius: 8px; min-width: 180px; z-index: 100; overflow: hidden; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
            .sort-menu.open { display: block; }
            .sort-option { padding: 0.55rem 0.85rem; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.15s, color 0.15s; }
            .sort-option:hover { background: var(--surface-2); color: var(--text); }
            .sort-option.active { color: var(--primary-light); background: var(--ember-faint); }
            .sort-option svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
            .slider-wrap { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
            .slider-wrap svg { width: 16px; height: 16px; fill: var(--text-dim); flex-shrink: 0; }
            .slider-wrap input[type=range] { -webkit-appearance: none; flex: 1; min-width: 0; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
            .slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; transition: background 0.2s; }
            .slider-wrap input[type=range]::-webkit-slider-thumb:hover { background: var(--primary-hover); }
            .slider-wrap input[type=range]::-moz-range-thumb { width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; border: none; }
            .tag-search-wrap { position: relative; width: 100%; margin-bottom: 0.1rem; }
            .tag-search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; fill: var(--text-dim); pointer-events: none; }
            .tag-search-input { width: 100%; padding: 0.4rem 0.5rem 0.4rem 1.9rem; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.75rem; font-family: var(--font-sans); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
            .tag-search-input::placeholder { color: var(--text-dim); }
            .tag-search-input:focus { border-color: var(--primary); box-shadow: var(--focus-ring); }
            .tag-btn.hidden { display: none; }
            .tag-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: flex-start; max-height: 18rem; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(179,84,84,0.3) transparent; }
            .tag-empty { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim); padding: 0.3rem 0.1rem; display: none; }
            .tag-empty.visible { display: block; }
            .tag-bar::-webkit-scrollbar { width: 4px; }
            .tag-bar::-webkit-scrollbar-track { background: transparent; }
            .tag-bar::-webkit-scrollbar-thumb { background: rgba(179,84,84,0.3); border-radius: 2px; }
            .tag-bar::-webkit-scrollbar-thumb:hover { background: rgba(179,84,84,0.55); }
            .tag-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); padding: 0.3rem 0.65rem; border-radius: 6px; font-family: var(--font-mono); font-size: 0.68rem; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.1s; }
            .tag-btn:hover { border-color: rgba(179,84,84,0.5); color: var(--primary-light); }
            .tag-btn:active { transform: scale(0.96); }
            .tag-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
            .tag-btn[data-highlight] { color: var(--primary-light); }
            .tag-btn[data-highlight]:hover { border-color: rgba(179,84,84,0.5); }
            .tag-btn[data-highlight].active { background: var(--primary); border-color: var(--primary); color: #fff; }
            .no-results { text-align: center; color: var(--text-dim); padding: 4rem 1rem; font-family: var(--font-mono); font-size: 0.85rem; display: none; }
            .surprise-btn { background: var(--ember-faint); border: 1px solid rgba(179,84,84,0.4); border-radius: 8px; color: var(--primary-light); font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500; padding: 0.6rem 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s; }
            .surprise-btn:hover { background: var(--ember-soft); border-color: var(--primary); color: #f0dcdc; }
            .surprise-btn:active { transform: scale(0.97); }
            .surprise-btn svg { width: 15px; height: 15px; fill: currentColor; }
            .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4,4,6,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 2rem; }
            .modal-overlay.open { display: flex; }
            .modal-content { background: var(--bg-elevated); border: 1px solid var(--border-light); border-radius: 14px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; overscroll-behavior: contain; position: relative; box-shadow: 0 32px 80px -20px rgba(0,0,0,0.8); }
            .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.06); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s; }
            .modal-close:hover { background: rgba(255,255,255,0.12); }
            .modal-body { display: flex; flex-direction: column; }
            .modal-img-wrap { width: 100%; background: #000; line-height: 0; border-bottom: 1px solid var(--hair); }
            .modal-img { width: 100%; height: auto; }
            .modal-info { padding: 2rem; }
            .modal-info h2 { font-family: var(--font-mono); font-size: 1.35rem; letter-spacing: -0.012em; margin-bottom: 0.5rem; color: var(--text); }
            .modal-info p { color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; }
            .modal-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
            .btn { text-decoration: none; padding: 0.7rem 1.4rem; border-radius: 8px; font-size: 0.88rem; font-weight: 600; transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s; display: flex; align-items: center; gap: 0.5rem; }
            .btn:active { transform: scale(0.97); }
            .btn-primary { background: #fff; color: #000; }
            .btn-primary:hover { background: #e6e6e6; }
            .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); }
            .btn-secondary:hover { color: var(--text); border-color: var(--hair-strong); background: var(--surface-1); }
            @media (max-width: 900px) {
              .app-layout { flex-direction: column; }
              .sidebar { width: 100%; position: static; max-height: none; order: -1; }
              .sidebar.collapsed { width: 100%; padding: 0.6rem 1.1rem; }
              .sidebar.collapsed .sidebar-header { justify-content: space-between; margin-bottom: 0; }
              .sidebar.collapsed .sidebar-title { display: block; }
              .sidebar.collapsed .sidebar-toggle svg { transform: rotate(90deg); }
              .sidebar .sidebar-toggle svg { transform: rotate(-90deg); }
            }
            @media (max-width: 600px) {
              .header-inner { padding: 0 1.25rem; }
              .statline { padding: 2rem 1.25rem 1.75rem; }
              .statline h1 { font-size: 1.55rem; }
              .app-layout { padding: 0 1.25rem 3rem; }
              .modal-overlay { padding: 1rem; }
              .modal-info { padding: 1.5rem; }
            }
            @media (prefers-reduced-motion: reduce) {
              * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
              .card { transform: none !important; }
            }
            </style>
          </head>
          <body>
          <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content">
              <button class="modal-close" onclick="closeModal()">✕</button>
              <div class="modal-body">
                <div class="modal-img-wrap">
                  <img src="" alt="" class="modal-img" id="modalImg" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="preview-fallback" style="display:none;aspect-ratio:16/9;">no_preview</div>
                </div>
                <div class="modal-info">
                  <h2 id="modalTitle"></h2>
                  <p id="modalDesc"></p>
                  <div class="modal-actions">
                    <a href="" class="btn btn-primary" id="modalDemoLink">Live Demo</a>
                    <a href="" class="btn btn-secondary" id="modalSourceLink">Source Code</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <header class="site-header">
            <div class="header-inner">
              <a href="https://hwaro.hahwul.com/" class="brand"><img src="https://hwaro.hahwul.com/hwaro-wide.webp" alt="Hwaro" height="22"></a>
              <nav class="header-nav">
                <a href="https://hwaro.hahwul.com/start/">Docs</a>
                <a href="${REPO_URL}"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>GitHub</a>
              </nav>
            </div>
          </header>
          <section class="statline">
            <h1>examples<span class="caret">_</span></h1>
            <p class="sub"><span class="num">${EXAMPLE_COUNT}</span> sites built with <a href="https://hwaro.hahwul.com/">Hwaro</a> — browse the demos, read the source, or scaffold your own. Contribute on <a href="${REPO_URL}">GitHub</a>.</p>
          </section>
          <div class="app-layout">
          <div class="main-content">
            <div class="grid" id="grid">${SITE_LINKS}</div>
            <div class="no-results" id="noResults">no_matching_examples</div>
          </div>
          <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
              <span class="sidebar-title">filters</span>
              <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle filters">
                <svg viewBox="0 0 16 16"><path d="M9.78 12.78a.75.75 0 01-1.06 0L4.47 8.53a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L6.06 8l3.72 3.72a.75.75 0 010 1.06z"/></svg>
              </button>
            </div>
            <div class="sidebar-content">
              <button class="surprise-btn" onclick="surpriseMe()">
                <svg viewBox="0 0 16 16"><path d="M12.93 2.65l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06L12.52.46a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a3.75 3.75 0 00-3 1.5 3.75 3.75 0 00-3-1.5H1.75a.75.75 0 000 1.5H4.5a2.25 2.25 0 012.25 2.25v5.5A2.25 2.25 0 014.5 14.5H1.75a.75.75 0 000 1.5H4.5a3.75 3.75 0 003-1.5 3.75 3.75 0 003 1.5h2.43l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06l-2.83-2.83a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a2.25 2.25 0 01-2.25-2.25v-5.5A2.25 2.25 0 0110.5 4.49h2.43z"/></svg>
                surprise_me
              </button>
              <div class="sidebar-section">
                <span class="sidebar-label">search</span>
                <div class="search-wrap">
                  <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"></path></svg>
                  <input type="text" class="search-input" id="search" placeholder="Search examples..." autocomplete="off">
                  <span class="search-count" id="searchCount"></span>
                </div>
              </div>
              <div class="sidebar-section">
                <span class="sidebar-label">sort</span>
                <div class="sort-wrap">
                  <button class="sort-btn" id="sortBtn" onclick="toggleSortMenu()">
                    <span style="display:flex;align-items:center;gap:0.4rem;"><svg viewBox="0 0 16 16"><path d="M0 1h16v2H0zm0 5h10v2H0zm0 5h6v2H0z"/></svg><span id="sortLabel">Name (A-Z)</span></span>
                    <svg viewBox="0 0 16 16" style="opacity:0.5;"><path d="M4.427 7.427l3.396 3.396a.25.25 0 00.354 0l3.396-3.396A.25.25 0 0011.396 7H4.604a.25.25 0 00-.177.427z"/></svg>
                  </button>
                  <div class="sort-menu" id="sortMenu">
                    <div class="sort-option active" data-sort="name-asc" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M0 1h16v2H0zm0 5h10v2H0zm0 5h6v2H0z"/></svg>Name (A-Z)</div>
                    <div class="sort-option" data-sort="name-desc" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M0 1h6v2H0zm0 5h10v2H0zm0 5h16v2H0z"/></svg>Name (Z-A)</div>
                    <div class="sort-option" data-sort="random" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M12.93 2.65l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06L12.52.46a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a3.75 3.75 0 00-3 1.5 3.75 3.75 0 00-3-1.5H1.75a.75.75 0 000 1.5H4.5a2.25 2.25 0 012.25 2.25v5.5A2.25 2.25 0 014.5 14.5H1.75a.75.75 0 000 1.5H4.5a3.75 3.75 0 003-1.5 3.75 3.75 0 003 1.5h2.43l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06l-2.83-2.83a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a2.25 2.25 0 01-2.25-2.25v-5.5A2.25 2.25 0 0110.5 4.49h2.43z"/></svg>Random</div>
                    <div class="sort-option" data-sort="tags" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M2.5 7.775V2.75a.25.25 0 01.25-.25h5.025a.25.25 0 01.177.073l6.25 6.25a.25.25 0 010 .354l-5.025 5.025a.25.25 0 01-.354 0l-6.25-6.25a.25.25 0 01-.073-.177zm-1.5 0V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.75 1.75 0 011 7.775zM6 5a1 1 0 100 2 1 1 0 000-2z"/></svg>Similar Tags</div>
                  </div>
                </div>
              </div>
              <div class="sidebar-section">
                <span class="sidebar-label">card_size</span>
                <div class="slider-wrap">
                  <svg viewBox="0 0 16 16"><path d="M1 2.75A.75.75 0 011.75 2h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 2.75zm0 5A.75.75 0 011.75 7h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 7.75zm0 5a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H1.75a.75.75 0 01-.75-.75z"></path></svg>
                  <input type="range" id="gridSize" min="200" max="500" value="280" step="10">
                  <svg viewBox="0 0 16 16"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V1.75a.25.25 0 00-.25-.25H1.75z"></path></svg>
                </div>
              </div>
              <div class="sidebar-section">
                <span class="sidebar-label">tags</span>
                <div class="tag-search-wrap">
                  <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"></path></svg>
                  <input type="text" class="tag-search-input" id="tagSearch" placeholder="Filter tags..." autocomplete="off">
                </div>
                <div class="tag-bar" id="tagBar">${TAG_BUTTONS}</div>
                <div class="tag-empty" id="tagEmpty">no_tags_match</div>
              </div>
            </div>
          </aside>
          </div>
          <script>
          function toggleSidebar() {
            var sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            try { localStorage.setItem('sidebarCollapsed', sb.classList.contains('collapsed') ? '1' : '0'); } catch (e) {}
          }
          (function() {
            try {
              if (localStorage.getItem('sidebarCollapsed') === '1') {
                document.getElementById('sidebar').classList.add('collapsed');
              }
            } catch (e) {}
          })();
          function surpriseMe() {
            var cards = Array.from(document.querySelectorAll('.card'));
            if (cards.length === 0) return;
            var randomCard = cards[Math.floor(Math.random() * cards.length)];

            var name = randomCard.dataset.name;
            var title = randomCard.dataset.title;
            var desc = randomCard.dataset.desc;
            var demoUrl = randomCard.querySelector('.main-link').href;
            var sourceUrl = randomCard.querySelector('.card-footer-row').href;

            var mImg = document.getElementById('modalImg');
            mImg.style.display = '';
            mImg.nextElementSibling.style.display = 'none';
            mImg.src = 'screenshots/' + name + '.png';
            mImg.alt = name;
            document.getElementById('modalTitle').textContent = title || name;
            document.getElementById('modalDesc').textContent = desc || '';
            document.getElementById('modalDemoLink').href = demoUrl;
            document.getElementById('modalSourceLink').href = sourceUrl;

            document.getElementById('modalOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
          }
          function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow = '';
          }
          document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
          });
          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
          });
          function copyScaffold(el) {
            var cmd = el.getAttribute('data-cmd');
            navigator.clipboard.writeText(cmd).then(function() {
              el.classList.add('copied');
              var orig = el.querySelector('.scaffold-cmd').textContent;
              el.querySelector('.scaffold-cmd').textContent = 'Copied!';
              setTimeout(function() {
                el.classList.remove('copied');
                el.querySelector('.scaffold-cmd').textContent = orig;
              }, 1500);
            });
          }
          var activeTags = new Set();
          function filterCards() {
            var q = document.getElementById('search').value.toLowerCase();
            var cards = document.querySelectorAll('.card');
            var visible = 0;
            cards.forEach(function(card) {
              var name = (card.dataset.name || '').toLowerCase();
              var title = (card.dataset.title || '').toLowerCase();
              var desc = (card.dataset.desc || '').toLowerCase();
              var tags = (card.dataset.tags || '').split(' ');
              var textMatch = !q || name.indexOf(q) !== -1 || title.indexOf(q) !== -1 || desc.indexOf(q) !== -1;
              var tagMatch = activeTags.size === 0 || tags.some(function(t) { return activeTags.has(t); });
              var show = textMatch && tagMatch;
              card.classList.toggle('hidden', !show);
              if (show) visible++;
            });
            document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
            var total = cards.length;
            var countEl = document.getElementById('searchCount');
            if (q || activeTags.size > 0) {
              countEl.textContent = visible + ' / ' + total;
              countEl.classList.add('visible');
            } else {
              countEl.classList.remove('visible');
            }
          }
          document.getElementById('search').addEventListener('input', filterCards);
          document.querySelectorAll('.tag-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var tag = this.dataset.tag;
              if (activeTags.has(tag)) { activeTags.delete(tag); this.classList.remove('active'); }
              else { activeTags.add(tag); this.classList.add('active'); }
              reorderTags();
              filterCards();
            });
          });
          document.getElementById('tagSearch').addEventListener('input', function() {
            var q = this.value.trim().toLowerCase();
            var btns = document.querySelectorAll('.tag-btn');
            var visible = 0;
            btns.forEach(function(btn) {
              var match = !q || (btn.dataset.tag || '').toLowerCase().indexOf(q) !== -1;
              btn.classList.toggle('hidden', !match);
              if (match) visible++;
            });
            document.getElementById('tagEmpty').classList.toggle('visible', visible === 0);
          });
          document.getElementById('gridSize').addEventListener('input', function() {
            document.getElementById('grid').style.setProperty('--card-size', this.value + 'px');
          });
          var currentSort = 'name-asc';
          function toggleSortMenu() {
            document.getElementById('sortMenu').classList.toggle('open');
          }
          document.addEventListener('click', function(e) {
            if (!e.target.closest('.sort-wrap')) document.getElementById('sortMenu').classList.remove('open');
          });
          function setSort(el) {
            currentSort = el.dataset.sort;
            document.getElementById('sortLabel').textContent = el.textContent;
            document.querySelectorAll('.sort-option').forEach(function(o) { o.classList.remove('active'); });
            el.classList.add('active');
            document.getElementById('sortMenu').classList.remove('open');
            sortCards();
          }
          function sortCards() {
            var grid = document.getElementById('grid');
            var cards = Array.from(grid.querySelectorAll('.card'));
            if (currentSort === 'name-asc') {
              cards.sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); });
            } else if (currentSort === 'name-desc') {
              cards.sort(function(a, b) { return (b.dataset.name || '').localeCompare(a.dataset.name || ''); });
            } else if (currentSort === 'random') {
              for (var i = cards.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = cards[i]; cards[i] = cards[j]; cards[j] = tmp;
              }
            } else if (currentSort === 'tags') {
              var tagGroups = {};
              cards.forEach(function(card) {
                var tags = (card.dataset.tags || '').split(' ').filter(Boolean);
                tags.forEach(function(t) { if (!tagGroups[t]) tagGroups[t] = []; tagGroups[t].push(card); });
              });
              if (activeTags.size > 0) {
                var seen = new Set();
                var sorted = [];
                activeTags.forEach(function(tag) {
                  (tagGroups[tag] || []).sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); }).forEach(function(c) {
                    if (!seen.has(c)) { seen.add(c); sorted.push(c); }
                  });
                });
                cards.forEach(function(c) { if (!seen.has(c)) sorted.push(c); });
                cards = sorted;
              } else {
                var tagCounts = {};
                cards.forEach(function(card) {
                  (card.dataset.tags || '').split(' ').filter(Boolean).forEach(function(t) {
                    tagCounts[t] = (tagCounts[t] || 0) + 1;
                  });
                });
                var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });
                var seen = new Set();
                var sorted = [];
                sortedTags.forEach(function(tag) {
                  (tagGroups[tag] || []).sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); }).forEach(function(c) {
                    if (!seen.has(c)) { seen.add(c); sorted.push(c); }
                  });
                });
                cards.forEach(function(c) { if (!seen.has(c)) sorted.push(c); });
                cards = sorted;
              }
            }
            cards.forEach(function(card) { grid.appendChild(card); });
          }
          function reorderTags() {
            var bar = document.getElementById('tagBar');
            var btns = Array.from(bar.querySelectorAll('.tag-btn'));
            btns.sort(function(a, b) {
              var aActive = a.classList.contains('active') ? 0 : 1;
              var bActive = b.classList.contains('active') ? 0 : 1;
              if (aActive !== bActive) return aActive - bActive;
              var aHL = a.dataset.highlight ? 0 : 1;
              var bHL = b.dataset.highlight ? 0 : 1;
              return aHL - bHL;
            });
            btns.forEach(function(btn) { bar.appendChild(btn); });
          }
          </script>
          </body>
          </html>
