          <h1>Hwaro Examples</h1>
          <p class="sub">${EXAMPLE_COUNT} example sites built with <a style="color:white;" href="https://github.com/hahwul/hwaro">Hwaro</a>. Contribute on <a style="color:white;" href="${REPO_URL}">GitHub</a></p>
          <p><svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 200 200"
              width="400px"
              height="100%"
              style="display: block; margin: 0 auto"
          >
              <defs>
                  <filter
                      id="fire-wobble"
                      x="-20%"
                      y="-20%"
                      width="140%"
                      height="140%"
                  >
                      <feTurbulence
                          type="fractalNoise"
                          baseFrequency="0.04 0.08"
                          numOctaves="2"
                          result="noise"
                      >
                          <animate
                              attributeName="baseFrequency"
                              values="0.04 0.08; 0.05 0.12; 0.04 0.08"
                              dur="2.5s"
                              repeatCount="indefinite"
                          />
                      </feTurbulence>
                      <feDisplacementMap
                          in="SourceGraphic"
                          in2="noise"
                          scale="2.5"
                          xChannelSelector="R"
                          yChannelSelector="G"
                      />
                  </filter>
                  <style>
                      /* 붉은 영역이 숨을 쉬듯 커졌다 작아지는 펄스 애니메이션 */
                      .fire-pulse {
                          transform-origin: center 144px; /* 화살창 바닥을 기준으로 스케일링 */
                          animation: pulse 1.5s infinite alternate ease-in-out;
                      }
                      @keyframes pulse {
                          0% {
                              transform: scaleY(1);
                              opacity: 0.92;
                          }
                          100% {
                              transform: scaleY(1.03);
                              opacity: 1;
                          }
                      }

                      /* 불티(Sparks) 애니메이션 */
                      .spark {
                          animation-timing-function: ease-in;
                          animation-iteration-count: infinite;
                      }
                      .spark-1 {
                          animation-name: flyUp1;
                          animation-duration: 2s;
                      }
                      .spark-2 {
                          animation-name: flyUp2;
                          animation-duration: 2.5s;
                          animation-delay: 0.5s;
                      }
                      .spark-3 {
                          animation-name: flyUp3;
                          animation-duration: 1.8s;
                          animation-delay: 1.2s;
                      }

                      @keyframes flyUp1 {
                          0% {
                              transform: translateY(0);
                              opacity: 0;
                          }
                          50% {
                              opacity: 0.8;
                          }
                          100% {
                              transform: translateY(-40px);
                              opacity: 0;
                          }
                      }
                      @keyframes flyUp2 {
                          0% {
                              transform: translateY(0);
                              opacity: 0;
                          }
                          50% {
                              opacity: 1;
                          }
                          100% {
                              transform: translateY(-50px);
                              opacity: 0;
                          }
                      }
                      @keyframes flyUp3 {
                          0% {
                              transform: translateY(0);
                              opacity: 0;
                          }
                          50% {
                              opacity: 0.9;
                          }
                          100% {
                              transform: translateY(-45px);
                              opacity: 0;
                          }
                      }
                  </style>
              </defs>

              <rect x="48" y="34" width="104" height="10" fill="#7A7B7E" />
              <path
                  d="M 28 150 L 28 54 L 172 54 L 172 150 L 154 150 L 154 72 L 46 72 L 46 150 Z"
                  fill="#7A7B7E"
              />
              <rect x="28" y="160" width="144" height="10" fill="#7A7B7E" />

              <g class="fire-pulse" filter="url(#fire-wobble)">
                  <rect
                      x="50"
                      y="76"
                      width="100"
                      height="68"
                      fill="#ED1C24"
                  />
                  <path
                      d="M 50 76 L 150 76 L 150 84 L 58 84 L 58 144 L 50 144 Z"
                      fill="#BE1622"
                  />
              </g>

              <g>
                  <circle
                      cx="70"
                      cy="130"
                      r="1.5"
                      fill="#FFD54F"
                      class="spark spark-1"
                      opacity="0"
                  />
                  <circle
                      cx="100"
                      cy="135"
                      r="2"
                      fill="#FFA000"
                      class="spark spark-2"
                      opacity="0"
                  />
                  <circle
                      cx="130"
                      cy="125"
                      r="1.5"
                      fill="#FFD54F"
                      class="spark spark-3"
                      opacity="0"
                  />
              </g>
              <rect x="50" y="124" width="100" height="8" fill="#FFFFFF" />
              <path
                  d="M50 124 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12"
                  fill="#FFFFFF"
              />
              <path
                  d="M56 132 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12 h6 v12 h5.75 v-12"
                  fill="#FFFFFF"
              />
          </svg></p>
          <div class="sticky-header">
          <div class="controls">
            <button class="surprise-btn" onclick="surpriseMe()">
              <svg viewBox="0 0 16 16"><path d="M12.93 2.65l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06L12.52.46a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a3.75 3.75 0 00-3 1.5 3.75 3.75 0 00-3-1.5H1.75a.75.75 0 000 1.5H4.5a2.25 2.25 0 012.25 2.25v5.5A2.25 2.25 0 014.5 14.5H1.75a.75.75 0 000 1.5H4.5a3.75 3.75 0 003-1.5 3.75 3.75 0 003 1.5h2.43l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06l-2.83-2.83a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a2.25 2.25 0 01-2.25-2.25v-5.5A2.25 2.25 0 0110.5 4.49h2.43z"/></svg>
              Surprise Me!
            </button>
            <div class="search-wrap">
              <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"></path></svg>
              <input type="text" class="search-input" id="search" placeholder="Search examples..." autocomplete="off">
              <span class="search-count" id="searchCount"></span>
            </div>
            <div class="sort-wrap">
              <button class="sort-btn" id="sortBtn" onclick="toggleSortMenu()">
                <svg viewBox="0 0 16 16"><path d="M0 1h16v2H0zm0 5h10v2H0zm0 5h6v2H0z"/></svg>
                <span id="sortLabel">Name (A-Z)</span>
              </button>
              <div class="sort-menu" id="sortMenu">
                <div class="sort-option active" data-sort="name-asc" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M0 1h16v2H0zm0 5h10v2H0zm0 5h6v2H0z"/></svg>Name (A-Z)</div>
                <div class="sort-option" data-sort="name-desc" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M0 1h6v2H0zm0 5h10v2H0zm0 5h16v2H0z"/></svg>Name (Z-A)</div>
                <div class="sort-option" data-sort="random" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M12.93 2.65l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06L12.52.46a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a3.75 3.75 0 00-3 1.5 3.75 3.75 0 00-3-1.5H1.75a.75.75 0 000 1.5H4.5a2.25 2.25 0 012.25 2.25v5.5A2.25 2.25 0 014.5 14.5H1.75a.75.75 0 000 1.5H4.5a3.75 3.75 0 003-1.5 3.75 3.75 0 003 1.5h2.43l-1.47 1.47a.75.75 0 001.06 1.06l2.83-2.83a.75.75 0 000-1.06l-2.83-2.83a.75.75 0 00-1.06 1.06l1.47 1.47H10.5a2.25 2.25 0 01-2.25-2.25v-5.5A2.25 2.25 0 0110.5 4.49h2.43z"/></svg>Random</div>
                <div class="sort-option" data-sort="tags" onclick="setSort(this)"><svg viewBox="0 0 16 16"><path d="M2.5 7.775V2.75a.25.25 0 01.25-.25h5.025a.25.25 0 01.177.073l6.25 6.25a.25.25 0 010 .354l-5.025 5.025a.25.25 0 01-.354 0l-6.25-6.25a.25.25 0 01-.073-.177zm-1.5 0V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.75 1.75 0 011 7.775zM6 5a1 1 0 100 2 1 1 0 000-2z"/></svg>Similar Tags</div>
              </div>
            </div>
            <div class="slider-wrap">
              <svg viewBox="0 0 16 16"><path d="M1 2.75A.75.75 0 011.75 2h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 2.75zm0 5A.75.75 0 011.75 7h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 7.75zm0 5a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H1.75a.75.75 0 01-.75-.75z"></path></svg>
              <input type="range" id="gridSize" min="200" max="500" value="280" step="10">
              <svg viewBox="0 0 16 16"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V1.75a.25.25 0 00-.25-.25H1.75z"></path></svg>
            </div>
          </div>
          <div class="tag-bar-wrap"><div class="tag-bar" id="tagBar">${TAG_BUTTONS}</div></div>
          </div>
          <div class="grid" id="grid">${SITE_LINKS}</div>
          <div class="no-results" id="noResults">No examples found.</div>
          <script>
          function surpriseMe() {
            var cards = Array.from(document.querySelectorAll('.card'));
            if (cards.length === 0) return;
            var randomCard = cards[Math.floor(Math.random() * cards.length)];
            
            var name = randomCard.dataset.name;
            var title = randomCard.dataset.title;
            var desc = randomCard.dataset.desc;
            var demoUrl = randomCard.querySelector('.main-link').href;
            var sourceUrl = randomCard.querySelector('.card-footer-row').href;
            
            var mImg = document.getElementById('modalImg');
            mImg.style.display = '';
            mImg.nextElementSibling.style.display = 'none';
            mImg.src = 'screenshots/' + name + '.png';
            mImg.alt = name;
            document.getElementById('modalTitle').textContent = title || name;
            document.getElementById('modalDesc').textContent = desc || '';
            document.getElementById('modalDemoLink').href = demoUrl;
            document.getElementById('modalSourceLink').href = sourceUrl;
            
            document.getElementById('modalOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
          }
          function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow = '';
          }
          document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
          });
          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
          });
          function copyScaffold(el) {
            var cmd = el.getAttribute('data-cmd');
            navigator.clipboard.writeText(cmd).then(function() {
              el.classList.add('copied');
              var orig = el.querySelector('.scaffold-cmd').textContent;
              el.querySelector('.scaffold-cmd').textContent = 'Copied!';
              setTimeout(function() {
                el.classList.remove('copied');
                el.querySelector('.scaffold-cmd').textContent = orig;
              }, 1500);
            });
          }
          var activeTags = new Set();
          function filterCards() {
            var q = document.getElementById('search').value.toLowerCase();
            var cards = document.querySelectorAll('.card');
            var visible = 0;
            cards.forEach(function(card) {
              var name = (card.dataset.name || '').toLowerCase();
              var title = (card.dataset.title || '').toLowerCase();
              var desc = (card.dataset.desc || '').toLowerCase();
              var tags = (card.dataset.tags || '').split(' ');
              var textMatch = !q || name.indexOf(q) !== -1 || title.indexOf(q) !== -1 || desc.indexOf(q) !== -1;
              var tagMatch = activeTags.size === 0 || tags.some(function(t) { return activeTags.has(t); });
              var show = textMatch && tagMatch;
              card.classList.toggle('hidden', !show);
              if (show) visible++;
            });
            document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
            var total = cards.length;
            var countEl = document.getElementById('searchCount');
            if (q || activeTags.size > 0) {
              countEl.textContent = visible + ' / ' + total;
              countEl.classList.add('visible');
            } else {
              countEl.classList.remove('visible');
            }
          }
          document.getElementById('search').addEventListener('input', filterCards);
          document.querySelectorAll('.tag-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var tag = this.dataset.tag;
              if (activeTags.has(tag)) { activeTags.delete(tag); this.classList.remove('active'); }
              else { activeTags.add(tag); this.classList.add('active'); }
              reorderTags();
              filterCards();
            });
          });
          document.getElementById('gridSize').addEventListener('input', function() {
            document.getElementById('grid').style.setProperty('--card-size', this.value + 'px');
          });
          var currentSort = 'name-asc';
          function toggleSortMenu() {
            document.getElementById('sortMenu').classList.toggle('open');
          }
          document.addEventListener('click', function(e) {
            if (!e.target.closest('.sort-wrap')) document.getElementById('sortMenu').classList.remove('open');
          });
          function setSort(el) {
            currentSort = el.dataset.sort;
            document.getElementById('sortLabel').textContent = el.textContent;
            document.querySelectorAll('.sort-option').forEach(function(o) { o.classList.remove('active'); });
            el.classList.add('active');
            document.getElementById('sortMenu').classList.remove('open');
            sortCards();
          }
          function sortCards() {
            var grid = document.getElementById('grid');
            var cards = Array.from(grid.querySelectorAll('.card'));
            if (currentSort === 'name-asc') {
              cards.sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); });
            } else if (currentSort === 'name-desc') {
              cards.sort(function(a, b) { return (b.dataset.name || '').localeCompare(a.dataset.name || ''); });
            } else if (currentSort === 'random') {
              for (var i = cards.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = cards[i]; cards[i] = cards[j]; cards[j] = tmp;
              }
            } else if (currentSort === 'tags') {
              var tagGroups = {};
              cards.forEach(function(card) {
                var tags = (card.dataset.tags || '').split(' ').filter(Boolean);
                tags.forEach(function(t) { if (!tagGroups[t]) tagGroups[t] = []; tagGroups[t].push(card); });
              });
              if (activeTags.size > 0) {
                var seen = new Set();
                var sorted = [];
                activeTags.forEach(function(tag) {
                  (tagGroups[tag] || []).sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); }).forEach(function(c) {
                    if (!seen.has(c)) { seen.add(c); sorted.push(c); }
                  });
                });
                cards.forEach(function(c) { if (!seen.has(c)) sorted.push(c); });
                cards = sorted;
              } else {
                var tagCounts = {};
                cards.forEach(function(card) {
                  (card.dataset.tags || '').split(' ').filter(Boolean).forEach(function(t) {
                    tagCounts[t] = (tagCounts[t] || 0) + 1;
                  });
                });
                var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });
                var seen = new Set();
                var sorted = [];
                sortedTags.forEach(function(tag) {
                  (tagGroups[tag] || []).sort(function(a, b) { return (a.dataset.name || '').localeCompare(b.dataset.name || ''); }).forEach(function(c) {
                    if (!seen.has(c)) { seen.add(c); sorted.push(c); }
                  });
                });
                cards.forEach(function(c) { if (!seen.has(c)) sorted.push(c); });
                cards = sorted;
              }
            }
            cards.forEach(function(card) { grid.appendChild(card); });
          }
          function reorderTags() {
            var bar = document.getElementById('tagBar');
            var btns = Array.from(bar.querySelectorAll('.tag-btn'));
            btns.sort(function(a, b) {
              var aActive = a.classList.contains('active') ? 0 : 1;
              var bActive = b.classList.contains('active') ? 0 : 1;
              if (aActive !== bActive) return aActive - bActive;
              var aHL = a.dataset.highlight ? 0 : 1;
              var bHL = b.dataset.highlight ? 0 : 1;
              return aHL - bHL;
            });
            btns.forEach(function(btn) { bar.appendChild(btn); });
          }
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
