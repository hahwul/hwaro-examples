name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed themes
        id: changes
        run: |
          # Find themes that changed since last commit
          CHANGED=""
          ALL=""
          for dir in */; do
            dir_name="${dir%/}"
            if [ -f "${dir_name}/config.toml" ]; then
              ALL="${ALL} ${dir_name}"
              if git diff --name-only HEAD~1 HEAD -- "${dir_name}/" | grep -q .; then
                CHANGED="${CHANGED} ${dir_name}"
              fi
            fi
          done

          # On workflow_dispatch or if deploy.yml/tags.json changed, rebuild all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD -- .github/workflows/deploy.yml tags.json | grep -q .; then
            CHANGED="${ALL}"
          fi

          # Trim whitespace
          CHANGED=$(echo $CHANGED | xargs)
          ALL=$(echo $ALL | xargs)
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "all=${ALL}" >> $GITHUB_OUTPUT
          echo "Changed themes: ${CHANGED:-none}"

      - name: Restore screenshot cache
        uses: actions/cache@v4
        with:
          path: _screenshot_cache
          key: screenshots-${{ hashFiles('**/config.toml', '**/templates/**', '**/static/**', '**/content/**') }}
          restore-keys: |
            screenshots-

      - name: Build screenshots for changed themes
        if: steps.changes.outputs.changed != ''
        run: |
          SCREENSHOT_DIR="${GITHUB_WORKSPACE}/_screenshot_site"
          mkdir -p "${SCREENSHOT_DIR}"

          for dir_name in ${{ steps.changes.outputs.changed }}; do
            echo "Building ${dir_name} (screenshot)..."
            docker run --rm \
              -v "${GITHUB_WORKSPACE}/${dir_name}:/src" \
              -v "${SCREENSHOT_DIR}/${dir_name}:/output" \
              ghcr.io/hahwul/hwaro build \
                -i /src \
                -o /output \
                --base-url "http://localhost:8000/${dir_name}"
            echo "Done: ${dir_name}"
          done

      - name: Capture screenshots for changed themes
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
          mkdir -p "${GITHUB_WORKSPACE}/_site/screenshots"
          mkdir -p "${GITHUB_WORKSPACE}/_screenshot_cache"

          SCREENSHOT_DIR="${GITHUB_WORKSPACE}/_screenshot_site"
          CHANGED="${{ steps.changes.outputs.changed }}"

          if [ -n "${CHANGED}" ] && [ -d "${SCREENSHOT_DIR}" ]; then
            # Serve changed themes and capture new screenshots
            cd "${SCREENSHOT_DIR}"
            python3 -m http.server 8000 &
            SERVER_PID=$!
            sleep 2
            cd "${GITHUB_WORKSPACE}"

            node -e "
            const { chromium } = require('playwright');
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              await page.setViewportSize({ width: 1280, height: 720 });
              const changed = '${CHANGED}'.split(' ').filter(Boolean);
              for (const dir of changed) {
                try {
                  await page.goto('http://localhost:8000/' + dir + '/', { waitUntil: 'networkidle', timeout: 30000 });
                  await page.screenshot({ path: '${GITHUB_WORKSPACE}/_screenshot_cache/' + dir + '.png' });
                  console.log('Screenshot: ' + dir);
                } catch (e) {
                  console.error('Failed: ' + dir, e.message);
                }
              }
              await browser.close();
            })();
            "

            kill $SERVER_PID || true
            sudo rm -rf "${SCREENSHOT_DIR}"
          fi

          # Copy all cached screenshots to _site
          if [ -d "${GITHUB_WORKSPACE}/_screenshot_cache" ]; then
            cp -f ${GITHUB_WORKSPACE}/_screenshot_cache/*.png "${GITHUB_WORKSPACE}/_site/screenshots/" 2>/dev/null || true
          fi

      - name: Build all sites
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/_site"
          mkdir -p "${OUTPUT_DIR}"

          for dir in */; do
            dir_name="${dir%/}"
            if [ -f "${dir_name}/config.toml" ]; then
              echo "Building ${dir_name}..."
              docker run --rm \
                -v "${GITHUB_WORKSPACE}/${dir_name}:/src" \
                -v "${OUTPUT_DIR}/${dir_name}:/output" \
                ghcr.io/hahwul/hwaro build \
                  -i /src \
                  -o /output \
                  --base-url "${BASE_URL}/${dir_name}"
              echo "Done: ${dir_name}"
            fi
          done

      - name: Generate index page
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/_site"

          SITE_LINKS=""
          ALL_TAGS=""
          for dir in */; do
            dir_name="${dir%/}"
            if [ -f "${dir_name}/config.toml" ]; then
              TITLE=$(grep '^title' "${dir_name}/config.toml" | head -1 | sed 's/title *= *"//;s/"//')
              DESCRIPTION=$(grep '^description' "${dir_name}/config.toml" | head -1 | sed 's/description *= *"//;s/"//')
              THEME_REPO_URL="https://github.com/${GITHUB_REPOSITORY}/tree/main/${dir_name}"
              SCAFFOLD_URL="https://github.com/${GITHUB_REPOSITORY}/tree/main/${dir_name}"
              SCAFFOLD_CMD="hwaro init my-site --scaffold ${SCAFFOLD_URL}"
              TAGS=$(jq -r --arg d "${dir_name}" '.[$d] // [] | join(" ")' tags.json)
              TAGS_DISPLAY=""
              for tag in ${TAGS}; do
                TAGS_DISPLAY="${TAGS_DISPLAY}<span class=\"tag\">${tag}</span>"
                if ! echo "${ALL_TAGS}" | grep -qw "${tag}"; then
                  ALL_TAGS="${ALL_TAGS} ${tag}"
                fi
              done
              SITE_LINKS="${SITE_LINKS}<div class=\"card\" data-name=\"${dir_name}\" data-title=\"${TITLE}\" data-desc=\"${DESCRIPTION}\" data-tags=\"${TAGS}\"><a href=\"${BASE_URL}/${dir_name}/\" class=\"main-link\"><img src=\"screenshots/${dir_name}.png\" alt=\"${dir_name}\" class=\"preview\" loading=\"lazy\"><div class=\"card-info\"><strong>${dir_name}</strong><span class=\"title\">${TITLE}</span><span class=\"desc\">${DESCRIPTION}</span><div class=\"card-tags\">${TAGS_DISPLAY}</div></div></a><div class=\"card-footer\"><a href=\"${THEME_REPO_URL}\" class=\"card-footer-row\"><svg viewBox=\"0 0 16 16\"><path d=\"M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z\"></path></svg>Source Code</a><div class=\"card-footer-row scaffold-row\" onclick=\"copyScaffold(this)\" data-cmd=\"${SCAFFOLD_CMD}\"><svg viewBox=\"0 0 16 16\"><path d=\"M4.72 3.22a.75.75 0 011.06 1.06L2.06 8l3.72 3.72a.75.75 0 11-1.06 1.06L.47 8.53a.75.75 0 010-1.06l4.25-4.25zm6.56 0a.75.75 0 10-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 101.06 1.06l4.25-4.25a.75.75 0 000-1.06l-4.25-4.25z\"></path></svg><span class=\"scaffold-cmd\">${SCAFFOLD_CMD}</span><svg class=\"copy-icon\" viewBox=\"0 0 16 16\"><path d=\"M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z\"></path><path d=\"M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 9.25a.75.75 0 01-1.5 0 .25.25 0 00-.25-.25h-7.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h1.5a.75.75 0 010 1.5h-1.5A1.75 1.75 0 015 14.25v-7.5z\"></path></svg></div></div></div>"
            fi
          done
          TAG_BUTTONS=""
          for tag in $(echo ${ALL_TAGS} | tr ' ' '\n' | sort); do
            TAG_BUTTONS="${TAG_BUTTONS}<button class=\"tag-btn\" data-tag=\"${tag}\">${tag}</button>"
          done

          # Identify top 5 tags and generate dynamic CSS
          TOP_TAGS_DATA=$(jq -r 'values[] | .[]' tags.json | sort | uniq -c | sort -rn | head -5 | awk '{print $2}')
          DYNAMIC_TAG_CSS=""
          COLORS=("#3b82f6" "#10b981" "#8b5cf6" "#f59e0b" "#ec4899")
          IDX=0
          for t in ${TOP_TAGS_DATA}; do
            COLOR=${COLORS[$IDX]}
            DYNAMIC_TAG_CSS="${DYNAMIC_TAG_CSS} .tag-btn[data-tag=\"${t}\"] { border-color: ${COLOR}; color: ${COLOR}; } .tag-btn[data-tag=\"${t}\"]:hover { background: ${COLOR}1a; } .tag-btn[data-tag=\"${t}\"].active { background: ${COLOR}; color: #fff; border-color: ${COLOR}; }"
            IDX=$((IDX+1))
          done

          echo "examples.hwaro.hahwul.com" > "${OUTPUT_DIR}/CNAME"
          cat > "${OUTPUT_DIR}/index.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hwaro Examples</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 3rem 1.5rem; position: relative; }
              h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
              p.sub { text-align: center; color: #888; margin-bottom: 2.5rem; }
            .github-link { position: absolute; top: 1.5rem; right: 1.5rem; color: #888; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; transition: color 0.2s; }
            .github-link:hover { color: #fff; }
            .github-link svg { width: 18px; height: 18px; fill: currentColor; }
            .controls { display: flex; align-items: center; gap: 1rem; max-width: 1400px; margin: 0 auto 1.5rem; }
            .search-wrap { flex: 1; position: relative; }
            .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; fill: #555; pointer-events: none; }
            .search-input { width: 100%; padding: 0.6rem 0.75rem 0.6rem 2.4rem; background: #111; border: 1px solid #222; border-radius: 8px; color: #e0e0e0; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
            .search-input::placeholder { color: #555; }
            .search-input:focus { border-color: #444; }
            .slider-wrap { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
            .slider-wrap svg { width: 16px; height: 16px; fill: #555; flex-shrink: 0; }
            .slider-wrap input[type=range] { -webkit-appearance: none; width: 100px; height: 4px; background: #333; border-radius: 2px; outline: none; }
            .slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #888; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
            .slider-wrap input[type=range]::-webkit-slider-thumb:hover { background: #bbb; }
            .slider-wrap input[type=range]::-moz-range-thumb { width: 14px; height: 14px; background: #888; border-radius: 50%; cursor: pointer; border: none; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size, 280px), 1fr)); gap: 1rem; max-width: 1400px; margin: 0 auto; }
            .card { display: flex; flex-direction: column; border: 1px solid #222; border-radius: 8px; transition: border-color 0.2s, background 0.2s; overflow: hidden; background: #0d0d0d; }
            .card:hover { border-color: #555; background: #111; }
            .card.hidden { display: none; }
            .main-link { display: flex; flex-direction: column; text-decoration: none; color: #e0e0e0; flex-grow: 1; }
            .main-link .card-info { padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
            .main-link strong { font-size: 1rem; color: #fff; display: block; line-height: 1.3; }
            .main-link .title { font-size: 0.8rem; color: #aaa; display: block; line-height: 1.4; }
            .main-link .desc { font-size: 0.75rem; color: #666; display: block; line-height: 1.4; margin-top: 0.1rem; }
            .preview { width: 100%; height: auto; display: block; }
            .card-footer { border-top: 1px solid #222; background: #080808; }
            .card-footer-row { padding: 0.5rem 1rem; font-size: 0.7rem; color: #888; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
            .card-footer-row + .card-footer-row { border-top: 1px solid #1a1a1a; }
            a.card-footer-row:hover { color: #fff; background: #1a1a1a; }
            .card-footer-row svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
            .scaffold-row { cursor: pointer; position: relative; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.65rem; }
            .scaffold-row:hover { color: #fff; background: #1a1a1a; }
            .scaffold-cmd { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
            .scaffold-row .copy-icon { margin-left: auto; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s; }
            .scaffold-row:hover .copy-icon { opacity: 1; }
            .scaffold-row.copied { color: #4ade80; }
            .scaffold-row.copied .copy-icon { opacity: 1; }
            .tag-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; max-width: 1400px; margin: 0 auto 1rem; align-items: center; }
            .tag-btn { background: #151515; border: 1px solid #282828; color: #888; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
            .tag-btn:hover { border-color: #444; color: #ccc; }
            .tag-btn.active { background: #fff; color: #0a0a0a; border-color: #fff; }
            /* Dynamic Top Tags */
            ${DYNAMIC_TAG_CSS}
            .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.15rem; }
            .tag { background: #1a1a1a; color: #666; padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.6rem; }
            .no-results { text-align: center; color: #555; padding: 3rem 1rem; font-size: 0.9rem; display: none; }
            @media (max-width: 600px) {
              .github-link { position: static; justify-content: center; margin-bottom: 1.5rem; }
            }
          </style>
          </head>
          <body>
          <a href="${REPO_URL}" class="github-link">
            <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            GitHub
          </a>
          <h1>Hwaro Examples</h1>
          <p class="sub">A collection of example sites built with <a style="color:white;" href="https://github.com/hahwul/hwaro">Hwaro</a>. Contribute on <a style="color:white;" href="${REPO_URL}">GitHub</a></p>
          <p><svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 200 200"
              width="400px"
              height="100%"
              style="display: block; margin: 0 auto"
          >
              <defs>
                  <filter
                      id="fire-wobble"
                      x="-20%"
                      y="-20%"
                      width="140%"
                      height="140%"
                  >
                      <feTurbulence
                          type="fractalNoise"
                          baseFrequency="0.04 0.08"
                          numOctaves="2"
                          result="noise"
                      >
                          <animate
                              attributeName="baseFrequency"
                              values="0.04 0.08; 0.05 0.12; 0.04 0.08"
                              dur="2.5s"
