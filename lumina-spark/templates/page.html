{% include "header.html" %}

<article class="glass-panel page-content">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.date %}
    <div class="page-meta">
      <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
    </div>
    {% endif %}
  </header>

  <div class="prose">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
