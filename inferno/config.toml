title = "Inferno"
description = "Where flames forge legends — a gaming community"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = true
per_page = 5

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["news"]

[markdown]
safe = false
