{% include "header.html" %}

  <main class="min-h-screen flex items-center justify-center px-6"
        style="background-color: #0a0a0a;">
    <div class="text-center max-w-lg">

      <!-- 404 glyph -->
      <div class="font-display text-[10rem] md:text-[14rem] leading-none text-inferno-red mb-0 animate-flicker"
           style="text-shadow: 0 0 30px rgba(185,28,28,0.6), 0 0 60px rgba(185,28,28,0.3), 0 0 100px rgba(194,65,12,0.2);">
        404
      </div>

      <!-- Divider -->
      <div class="h-px w-32 mx-auto mb-8"
           style="background-color: #b91c1c; box-shadow: 0 0 12px #b91c1c;"></div>

      <!-- Message -->
      <h1 class="font-display text-3xl tracking-widest text-white mb-4">
        SECTOR INCINERATED
      </h1>
      <p class="text-gray-500 leading-relaxed mb-4 text-sm">
        The page you sought has been consumed. Nothing remains but ash and the smell of scorched coordinates.
      </p>
      <p class="text-xs font-mono text-gray-700 mb-10 tracking-wider">
        ERROR_CODE: FLAME_TERMINUS &mdash; PATH DOES NOT EXIST
      </p>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="{{ base_url }}/"
           class="px-8 py-3 bg-inferno-red text-white text-sm font-semibold tracking-wider uppercase hover:bg-blaze-orange transition-colors duration-200 animate-ember-pulse">
          Return to Forge
        </a>
        <a href="{{ base_url }}/news/"
           class="px-8 py-3 text-sm font-semibold tracking-wider uppercase text-gray-400 hover:text-ember-yellow transition-colors duration-200 fire-border">
          Browse News
        </a>
      </div>
    </div>
  </main>
