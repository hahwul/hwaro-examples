<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'inferno-red':   '#b91c1c',
            'blaze-orange':  '#c2410c',
            'ash-black':     '#0a0a0a',
            'ember-yellow':  '#d97706',
            'coal':          '#111111',
            'soot':          '#1a1a1a',
            'cinder':        '#2a1a0a',
            'slag':          '#1c1008',
          },
          fontFamily: {
            display: ['"Bebas Neue"', '"Impact"', 'sans-serif'],
            body:    ['"Inter"', 'system-ui', 'sans-serif'],
            mono:    ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          },
          animation: {
            'flicker':        'flicker 3s ease-in-out infinite',
            'ember-pulse':    'emberPulse 2s ease-in-out infinite',
            'heat-wave':      'heatWave 4s ease-in-out infinite',
            'hue-flame':      'hueFlame 6s linear infinite',
            'char-distort':   'charDistort 5s ease-in-out infinite',
            'glow-breathe':   'glowBreathe 2.5s ease-in-out infinite',
            'rise':           'rise 0.6s ease-out both',
            'scan-line':      'scanLine 8s linear infinite',
          },
          keyframes: {
            flicker: {
              '0%, 100%': { opacity: '1' },
              '8%':        { opacity: '0.92' },
              '20%':       { opacity: '1' },
              '35%':       { opacity: '0.86' },
              '50%':       { opacity: '1' },
              '65%':       { opacity: '0.94' },
              '80%':       { opacity: '1' },
              '92%':       { opacity: '0.88' },
            },
            emberPulse: {
              '0%, 100%': { boxShadow: '0 0 6px #b91c1c, 0 0 16px #c2410c' },
              '50%':       { boxShadow: '0 0 18px #b91c1c, 0 0 40px #c2410c, 0 0 60px #d97706' },
            },
            heatWave: {
              '0%, 100%': { textShadow: '0 0 4px #b91c1c, 0 0 10px #c2410c' },
              '25%':       { textShadow: '0 0 8px #d97706, 0 0 20px #c2410c, 0 0 30px #b91c1c' },
              '50%':       { textShadow: '0 0 12px #d97706, 0 0 24px #d97706, 0 0 40px #c2410c' },
              '75%':       { textShadow: '0 0 6px #b91c1c, 0 0 16px #c2410c, 0 0 24px #d97706' },
            },
            hueFlame: {
              '0%':   { filter: 'hue-rotate(0deg) brightness(1.1)' },
              '25%':  { filter: 'hue-rotate(15deg) brightness(1.2)' },
              '50%':  { filter: 'hue-rotate(-10deg) brightness(1.0)' },
              '75%':  { filter: 'hue-rotate(20deg) brightness(1.3)' },
              '100%': { filter: 'hue-rotate(0deg) brightness(1.1)' },
            },
            charDistort: {
              '0%, 100%': { transform: 'skewX(0deg) scaleY(1)' },
              '10%':       { transform: 'skewX(0.4deg) scaleY(1.003)' },
              '30%':       { transform: 'skewX(-0.3deg) scaleY(0.998)' },
              '50%':       { transform: 'skewX(0.2deg) scaleY(1.002)' },
              '70%':       { transform: 'skewX(-0.4deg) scaleY(0.997)' },
              '90%':       { transform: 'skewX(0.3deg) scaleY(1.001)' },
            },
            glowBreathe: {
              '0%, 100%': { boxShadow: '0 0 8px #b91c1c, inset 0 0 8px rgba(185,28,28,0.1)' },
              '50%':       { boxShadow: '0 0 24px #c2410c, 0 0 48px rgba(194,65,12,0.4), inset 0 0 16px rgba(217,119,6,0.15)' },
            },
            rise: {
              '0%':   { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scanLine: {
              '0%':   { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100vh)' },
            },
          },
          boxShadow: {
            'ember':      '0 0 8px #b91c1c, 0 0 20px rgba(194,65,12,0.5)',
            'ember-lg':   '0 0 20px #b91c1c, 0 0 40px rgba(194,65,12,0.6), 0 0 80px rgba(217,119,6,0.3)',
            'ember-inset':'inset 0 0 20px rgba(185,28,28,0.2)',
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* Base reset */
    *, *::before, *::after { box-sizing: border-box; }
    html { background-color: #0a0a0a; }

    /* Fire border utility */
    .fire-border {
      border: 1px solid rgba(185, 28, 28, 0.4);
      box-shadow: 0 0 8px rgba(185, 28, 28, 0.3), inset 0 0 8px rgba(185, 28, 28, 0.05);
    }
    .fire-border:hover {
      border-color: rgba(194, 65, 12, 0.7);
      box-shadow: 0 0 20px rgba(185, 28, 28, 0.5), 0 0 40px rgba(194, 65, 12, 0.3), inset 0 0 12px rgba(217, 119, 6, 0.1);
    }

    /* Ember glow text */
    .ember-text {
      color: #d97706;
      text-shadow: 0 0 6px #d97706, 0 0 12px rgba(217, 119, 6, 0.6);
    }

    /* Nav active indicator */
    .nav-link-fire {
      position: relative;
    }
    .nav-link-fire::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #b91c1c;
      box-shadow: 0 0 6px #b91c1c;
      transition: width 0.3s ease;
    }
    .nav-link-fire:hover::after {
      width: 100%;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #b91c1c; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c2410c; box-shadow: 0 0 8px #c2410c; }

    /* Selection */
    ::selection { background: rgba(185, 28, 28, 0.4); color: #d97706; }

    /* Content typography */
    .prose-inferno h1, .prose-inferno h2, .prose-inferno h3 {
      font-family: 'Bebas Neue', Impact, sans-serif;
      color: #d97706;
      letter-spacing: 0.05em;
      text-shadow: 0 0 8px rgba(217, 119, 6, 0.4);
    }
    .prose-inferno h2 { font-size: 1.8rem; margin: 2rem 0 0.75rem; border-bottom: 1px solid rgba(185, 28, 28, 0.3); padding-bottom: 0.5rem; }
    .prose-inferno h3 { font-size: 1.3rem; margin: 1.5rem 0 0.5rem; color: #c2410c; }
    .prose-inferno p  { color: #c7b8a8; line-height: 1.8; margin: 0.75rem 0; }
    .prose-inferno a  { color: #b91c1c; text-decoration: underline; text-underline-offset: 2px; }
    .prose-inferno a:hover { color: #d97706; text-shadow: 0 0 6px rgba(217, 119, 6, 0.5); }
    .prose-inferno ul, .prose-inferno ol { color: #c7b8a8; padding-left: 1.5rem; margin: 0.75rem 0; }
    .prose-inferno li { margin: 0.3rem 0; }
    .prose-inferno strong { color: #d97706; }
    .prose-inferno blockquote {
      border-left: 3px solid #b91c1c;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #a08060;
      font-style: italic;
    }
    .prose-inferno table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    .prose-inferno th {
      background-color: #1c1008;
      color: #d97706;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.05em;
      padding: 0.6rem 1rem;
      border: 1px solid rgba(185, 28, 28, 0.3);
      text-align: left;
    }
    .prose-inferno td {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(185, 28, 28, 0.15);
      color: #c7b8a8;
    }
    .prose-inferno tr:nth-child(even) td { background-color: rgba(185, 28, 28, 0.04); }
    .prose-inferno code {
      font-family: 'JetBrains Mono', monospace;
      background-color: #1a1008;
      color: #d97706;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.875em;
    }
    .prose-inferno pre {
      background-color: #0f0a04;
      border: 1px solid rgba(185, 28, 28, 0.3);
      border-radius: 4px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    .prose-inferno pre code {
      background: none;
      padding: 0;
      color: #e5c99a;
    }
    .prose-inferno hr {
      border: none;
      border-top: 1px solid rgba(185, 28, 28, 0.25);
      margin: 2rem 0;
    }

    /* Scan line overlay effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background-color: rgba(185, 28, 28, 0.08);
      z-index: 9999;
      pointer-events: none;
      animation: scanLine 12s linear infinite;
    }

    /* Ember particle hint on hero */
    .ember-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background-color: #d97706;
      box-shadow: 0 0 4px #d97706, 0 0 8px #c2410c;
      animation: riseParticle var(--dur, 4s) ease-in infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes riseParticle {
      0%   { transform: translateY(0) scale(1); opacity: 0.8; }
      70%  { opacity: 0.4; }
      100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
    }

    /* Scroll intensity — deeper scroll = more intense glow on body */
    @media (prefers-reduced-motion: no-preference) {
      .intensity-zone {
        transition: box-shadow 0.5s ease;
      }
    }
  </style>
</head>
