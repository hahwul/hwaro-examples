<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} | {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto+Slab:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sepia: #8b7355;
      --mustard: #c8a951;
      --old-rose: #c08081;
      --cream: #f5efe0;
      --dark-cream: #ebe3d1;
      --parchment: #faf6ed;
      --text: #4a3f35;
      --text-muted: #7a6e62;
      --border: #c4b69c;
      --border-dark: #8b7355;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Libre Baskerville', 'Georgia', serif;
      line-height: 1.8;
      color: var(--text);
      background-color: var(--cream);
      background-image:
        repeating-linear-box(
          transparent 0px,
          transparent 100%
        );
    }

    /* Aged paper texture overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      z-index: 9999;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    .site-header {
      text-align: center;
      padding: 2.5rem 0 1.5rem;
      border-bottom: 4px double var(--border-dark);
      margin-bottom: 2.5rem;
    }

    .site-logo {
      font-family: 'Roboto Slab', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--sepia);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.25rem;
    }

    .site-logo:hover {
      color: var(--old-rose);
    }

    .site-tagline {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .header-rule {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1rem auto;
      max-width: 200px;
    }

    .site-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1rem;
    }

    .site-nav a {
      font-family: 'Roboto Slab', serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--sepia);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .site-nav a:hover {
      border-bottom-color: var(--mustard);
      color: var(--text);
    }

    /* Main Content */
    .site-main {
      min-height: calc(100vh - 320px);
      padding-bottom: 2rem;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Roboto Slab', serif;
      line-height: 1.3;
      color: var(--sepia);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    h1 { font-size: 2rem; font-weight: 700; margin-top: 0; }
    h2 { font-size: 1.5rem; font-weight: 700; }
    h3 { font-size: 1.15rem; font-weight: 500; }

    p { margin: 1em 0; }

    a { color: var(--old-rose); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--sepia); }

    blockquote {
      border-left: 4px solid var(--mustard);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--parchment);
      font-style: italic;
      color: var(--text-muted);
    }

    code {
      background: var(--dark-cream);
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      font-size: 0.85em;
      font-family: 'Courier New', Courier, monospace;
      color: var(--sepia);
    }

    pre {
      background: var(--parchment);
      padding: 1.25rem;
      border: 1px dashed var(--border);
      overflow-x: auto;
    }

    pre code { background: none; padding: 0; }

    hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 2rem 0;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    ul, ol { padding-left: 1.5em; }
    li { margin-bottom: 0.35em; }

    /* Page Header with vintage decorations */
    .page-heading {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px dashed var(--border);
    }

    .page-heading h1 {
      margin-bottom: 0.25rem;
    }

    .page-heading .page-date {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .vintage-ornament {
      text-align: center;
      color: var(--mustard);
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      margin: 0.5rem 0;
    }

    /* Post Cards - Polaroid style */
    .post-grid {
      display: grid;
      gap: 2.5rem;
      margin-top: 1.5rem;
    }

    .post-card {
      background: var(--parchment);
      border: 3px solid var(--border-dark);
      padding: 1.75rem;
      position: relative;
      box-shadow: 4px 4px 0 var(--dark-cream);
    }

    .post-card::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border: 1px solid var(--border);
      pointer-events: none;
    }

    .post-card-title {
      font-family: 'Roboto Slab', serif;
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
    }

    .post-card-title a {
      color: var(--sepia);
      text-decoration: none;
    }

    .post-card-title a:hover {
      color: var(--old-rose);
      text-decoration: none;
    }

    .post-card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px dashed var(--border);
    }

    .post-card-desc {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .read-more {
      display: inline-block;
      margin-top: 1rem;
      font-family: 'Roboto Slab', serif;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--old-rose);
      border-bottom: 1px solid var(--old-rose);
      padding-bottom: 1px;
    }

    .read-more:hover {
      color: var(--sepia);
      border-bottom-color: var(--sepia);
      text-decoration: none;
    }

    /* Featured post - slightly rotated polaroid */
    .post-card.featured {
      transform: rotate(-0.5deg);
    }

    .post-card.featured:hover {
      transform: rotate(0deg);
    }

    /* Section intro */
    .section-intro {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 4px double var(--border-dark);
    }

    .section-intro h1 {
      margin-bottom: 0.25rem;
    }

    .section-intro p {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Taxonomy */
    .taxonomy-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    .taxonomy-list li {
      margin-bottom: 0.65rem;
      padding: 0.75rem 1rem;
      background: var(--parchment);
      border: 1px solid var(--border);
      border-left: 4px solid var(--mustard);
    }

    .taxonomy-list li a {
      font-family: 'Roboto Slab', serif;
      font-weight: 500;
      color: var(--sepia);
    }

    .taxonomy-list li a:hover {
      color: var(--old-rose);
    }

    /* Pagination */
    nav.pagination {
      margin: 2rem 0;
      text-align: center;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      color: var(--sepia);
      text-decoration: none;
      font-family: 'Roboto Slab', serif;
      font-size: 0.85rem;
    }

    nav.pagination a:hover {
      background: var(--mustard);
      color: var(--parchment);
      border-color: var(--mustard);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.3rem 0.65rem;
      border: 2px solid var(--sepia);
      background: var(--sepia);
      color: var(--parchment);
      font-family: 'Roboto Slab', serif;
      font-size: 0.85rem;
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
      font-family: 'Roboto Slab', serif;
      font-size: 0.85rem;
    }

    /* 404 page */
    .error-page {
      text-align: center;
      padding: 4rem 0;
    }

    .error-page h1 {
      font-size: 5rem;
      color: var(--mustard);
      margin-bottom: 0.25rem;
    }

    .error-page p {
      color: var(--text-muted);
      font-style: italic;
      font-size: 1.1rem;
    }

    .error-page .back-link {
      display: inline-block;
      margin-top: 2rem;
      font-family: 'Roboto Slab', serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--parchment);
      background: var(--sepia);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      border: 2px solid var(--sepia);
    }

    .error-page .back-link:hover {
      background: var(--old-rose);
      border-color: var(--old-rose);
      text-decoration: none;
    }

    /* Homepage hero */
    .hero {
      text-align: center;
      padding: 2rem 0 2.5rem;
      border-bottom: 4px double var(--border-dark);
      margin-bottom: 2.5rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      color: var(--sepia);
      margin-bottom: 0.25rem;
      letter-spacing: 0.03em;
    }

    .hero .subtitle {
      font-style: italic;
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }

    .hero-divider {
      display: block;
      text-align: center;
      color: var(--mustard);
      font-size: 1rem;
      letter-spacing: 0.6em;
      margin: 1rem 0;
    }

    /* Content area styling */
    .content-area {
      font-size: 1rem;
      line-height: 1.85;
    }

    .content-area h2 {
      margin-top: 2.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px dashed var(--border);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-wrapper { padding: 0 1.25rem; }
      .site-logo { font-size: 1.8rem; }
      .site-nav { gap: 1.25rem; }
      .site-nav a { font-size: 0.78rem; }
      .hero h1 { font-size: 1.8rem; }
      .post-card { padding: 1.25rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <p class="site-tagline">{{ site.description }}</p>
      <hr class="header-rule">
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
