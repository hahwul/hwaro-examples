<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) }}">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rokkitt:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <p class="site-tagline">{{ site.description }}</p>
      <hr class="header-rule">
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </header>
