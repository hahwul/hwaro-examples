<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg: #050505;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-glow: rgba(255, 255, 255, 0.02);
      --accent-1: #818cf8;
      --accent-2: #c084fc;
      --accent-3: #38bdf8;
    }

    @keyframes float1 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      33% { transform: translate(50px, -50px) scale(1.1); opacity: 0.5; }
      66% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.3; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    }

    @keyframes float2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
      50% { transform: translate(-40px, -30px) scale(1.2); opacity: 0.4; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient glowing orbs */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }
    .orb-1 {
      top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, var(--accent-1), transparent 70%);
      animation: float1 20s infinite ease-in-out;
    }
    .orb-2 {
      bottom: -10%; right: -10%;
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, var(--accent-2), transparent 70%);
      animation: float2 15s infinite ease-in-out reverse;
    }
    .orb-3 {
      top: 40%; left: 60%;
      width: 30vw; height: 30vw;
      background: radial-gradient(circle, var(--accent-3), transparent 70%);
      animation: float1 25s infinite ease-in-out;
      opacity: 0.2;
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px 0 var(--glass-glow);
      margin-bottom: 2rem;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
      display: block;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px -10px rgba(129, 140, 248, 0.3);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      margin-bottom: 3rem;
    }
    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .site-header nav {
      display: flex;
      gap: 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
    }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .site-header nav a:hover { color: var(--accent-3); }

    .site-main { min-height: calc(100vh - 250px); }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.2;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    h1 { font-size: 2.5rem; margin-top: 0; }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; color: var(--text); }
    a { color: var(--accent-3); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      background: rgba(255,255,255,0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--accent-1);
    }
    pre {
      background: rgba(0,0,0,0.4);
      padding: 1.25rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
    }
    pre code { background: none; padding: 0; color: inherit; }

    /* Cards Layout */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 0.5rem 0;
    }
    .card-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
      .glass-panel { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/gallery/">Gallery</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
