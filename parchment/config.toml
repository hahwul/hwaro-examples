# =============================================================================
# Site Configuration
# =============================================================================

title = "Parchment Lore"
description = "A fantasy RPG world-building guide and lore book"
base_url = "http://localhost:3000"
templates_dir = "templates"
static_dir = "static"
content_dir = "content"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "gruvbox-light"
use_cdn = true

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"

# =============================================================================
# Search
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false
