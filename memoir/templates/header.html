<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} - {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  {% if site.feeds and site.feeds.enabled %}
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{{ base_url }}/rss.xml">
  {% endif %}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body>
  <header class="book-header">
    <div class="book-header-inner">
      <a href="{{ base_url }}/" class="book-title-link">
        <h1 class="book-title">{{ site.title }}</h1>
      </a>
      <nav class="book-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/chapters/">Chapters</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
  <main class="book-main">
