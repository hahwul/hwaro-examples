{% include "header.html" %}

<section class="taxonomy-page">
  <h1 class="section-title">{{ taxonomy_name | title }}</h1>
  <ul class="taxonomy-list">
    {% for term in taxonomy_terms %}
    <li>
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name }}</a>
      <span class="taxonomy-count">({{ term.pages | length }})</span>
    </li>
    {% endfor %}
  </ul>
</section>

{% include "footer.html" %}
