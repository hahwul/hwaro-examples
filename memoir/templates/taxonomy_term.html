{% include "header.html" %}

<section class="taxonomy-page">
  <h1 class="section-title">{{ taxonomy_term | title }}</h1>

  <div class="chapter-list">
    {% for post in taxonomy_pages %}
    <article class="chapter-entry">
      <a href="{{ post.url }}" class="chapter-entry-link">
        <h2 class="entry-title">{{ post.title }}</h2>
        {% if post.description %}
        <p class="entry-description">{{ post.description }}</p>
        {% endif %}
        {% if post.date %}
        <time class="entry-date" datetime="{{ post.date | date('%Y-%m-%d') }}">{{ post.date | date("%B %d, %Y") }}</time>
        {% endif %}
      </a>
    </article>
    {% endfor %}
  </div>
</section>

{% include "footer.html" %}
