<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ highlight_css }}
</head>
<body>
  <header>
    <div class="container">
      <div class="site-nav" style="width: 100%;">
        <a href="{{ base_url }}/" class="logo">Megawatt</a>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.2em;">HIGH VOLTAGE</div>
      </div>
    </div>
  </header>
  <div class="container">
    <aside>
      <ul class="sidebar-nav">
        <li><a href="{{ base_url }}/">Overview</a></li>
        {% for s in site.sections | sort_by("weight") %}
        <li style="margin-top: 2rem; font-weight: 900; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.2em;">{{ s.title }}</li>
        {% for p in s.pages | sort_by("weight") %}
        <li><a href="{{ p.url }}">{{ p.title }}</a></li>
        {% endfor %}
        {% endfor %}
      </ul>
    </aside>
    <main>
