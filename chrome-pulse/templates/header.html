<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0a0a0c;
      --bg-subtle: #141418;
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: #2a2a2e;
      --metallic: #d4d4d4;
      --glow: rgba(212, 212, 212, 0.15);
      --glow-strong: rgba(212, 212, 212, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      letter-spacing: 0.02em;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      box-shadow: 0 4px 20px var(--glow);
      background-color: var(--bg-subtle);
      border-radius: 0 0 12px 12px;
      padding-left: 2rem;
      padding-right: 2rem;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--metallic);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px var(--glow-strong);
    }
    .site-logo:hover {
      text-shadow: 0 0 15px var(--glow-strong), 0 0 5px var(--metallic);
      transition: text-shadow 0.3s ease;
    }

    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--metallic);
      text-shadow: 0 0 8px var(--glow-strong);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 0 -4px 20px var(--glow);
      background-color: var(--bg-subtle);
      border-radius: 12px 12px 0 0;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 0.8em;
      font-weight: 600;
      color: var(--metallic);
    }
    h1 { font-size: 2.2rem; margin-top: 0; text-shadow: 0 0 12px var(--glow); }
    h2 { font-size: 1.6rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1.2em 0; color: var(--text); }

    a { color: var(--metallic); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.3s ease; }
    a:hover { border-color: var(--metallic); text-shadow: 0 0 5px var(--glow-strong); }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--metallic);
      border: 1px solid var(--border);
    }
    pre {
      background: var(--bg-subtle);
      padding: 1.2rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.2rem;
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--glow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--glow-strong), inset 0 0 8px var(--glow);
      border-color: rgba(212, 212, 212, 0.4);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; border: none; text-shadow: 0 0 5px var(--glow-strong);}
    ul.section-list li a:hover { border: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; justify-content: center;}
    nav.pagination a {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      background: var(--bg-subtle);
      transition: all 0.3s ease;
    }
    nav.pagination a:hover {
      color: var(--metallic);
      border-color: var(--metallic);
      box-shadow: 0 0 10px var(--glow-strong);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--metallic);
      background: var(--glow);
      color: var(--metallic);
      text-shadow: 0 0 5px var(--glow);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.5rem; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
