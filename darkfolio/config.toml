# Site Configuration
title = "Darkfolio"
description = "A software developer portfolio"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["projects"]

[markdown]
safe = false
lazy_loading = true

[seo]
title_separator = " | "
