{% include "header.html" %}

<h1 style="margin-top: 0;">{{ taxonomy_name }}</h1>

<ul style="list-style-type: none; padding: 0;">
    {% for term in taxonomy_terms %}
    <li style="margin-bottom: 0.5rem;">
        <a href="{{ term.permalink }}">{{ term.name }}</a>
        <span style="color: #8b949e;">({{ term.pages | length }})</span>
    </li>
    {% endfor %}
</ul>

{% include "footer.html" %}
