{% include "header.html" %}

<h1 style="margin-top: 0;">#{{ taxonomy_term }}</h1>

<div class="projects-list" style="margin-top: 2rem;">
    {% for post in taxonomy_pages %}
    <div class="project-card">
        <h3 class="project-title" style="margin-top: 0; border: none;">
            <a href="{{ post.url }}">{{ post.title }}</a>
        </h3>
        <p class="project-description">{{ post.description | default(post.summary | striptags | truncate(150)) }}</p>
    </div>
    {% endfor %}
</div>

{% include "footer.html" %}
