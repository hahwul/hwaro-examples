<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    {% if site.highlight.enabled %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.highlight.theme }}.min.css">
    {% endif %}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ auto_includes | safe }}
</head>
<body>
    <header>
        <h1><a href="{{ base_url }}/">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ base_url }}/">~/home</a>
            <a href="{{ base_url }}/projects/">~/projects</a>
            <a href="{{ base_url }}/tags/">~/tags</a>
        </nav>
