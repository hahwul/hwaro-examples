<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

    :root {
      --carrara: #f5f0eb;
      --vein: #c4b9ac;
      --gold: #c9a84c;
      --gold-light: #d4b86a;
      --onyx: #1a1a1a;
      --text: #2d2d2d;
      --text-muted: #8a8078;
      --border: #ddd5cb;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      line-height: 1.8;
      margin: 0;
      color: var(--text);
      background-color: var(--carrara);
      position: relative;
    }

    /* Marble vein texture via SVG */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 60 Q100 55 200 70 Q300 85 400 65' fill='none' stroke='%23c4b9ac' stroke-width='0.5' opacity='0.12'/%3E%3Cpath d='M0 140 Q150 130 250 150 Q350 170 400 145' fill='none' stroke='%23c4b9ac' stroke-width='0.4' opacity='0.08'/%3E%3Cpath d='M0 220 Q80 215 180 230 Q280 245 400 225' fill='none' stroke='%23c4b9ac' stroke-width='0.6' opacity='0.1'/%3E%3Cpath d='M0 310 Q120 300 220 315 Q320 330 400 305' fill='none' stroke='%23c4b9ac' stroke-width='0.3' opacity='0.09'/%3E%3C/svg%3E");
      background-size: 400px 400px;
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    .site-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0 1.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    /* Gold accent line under header */
    .site-header::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 20%;
      right: 20%;
      height: 1px;
      background-color: var(--gold);
      opacity: 0.5;
    }

    .site-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.6rem;
      color: var(--onyx);
      text-decoration: none;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .site-logo:hover { color: var(--gold); }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      transition: color 0.3s;
    }

    .site-header nav a:hover { color: var(--gold); }

    .site-main { min-height: calc(100vh - 200px); }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      position: relative;
    }

    .site-footer::before {
      content: '';
      position: absolute;
      top: -3px;
      left: 30%;
      right: 30%;
      height: 1px;
      background-color: var(--gold);
      opacity: 0.3;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 300;
      color: var(--onyx);
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 0;
      letter-spacing: 0.04em;
    }

    h2 {
      font-size: 1.6rem;
      position: relative;
      display: inline-block;
    }

    h2::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background-color: var(--gold);
      margin-top: 0.4em;
    }

    h3 { font-size: 1.25rem; font-weight: 400; }

    p {
      margin: 1em 0;
      font-size: 0.92rem;
      line-height: 1.9;
      font-weight: 300;
    }

    a {
      color: var(--gold);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover { color: var(--onyx); }

    code {
      background: rgba(196, 185, 172, 0.2);
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--text);
    }

    pre {
      background: #faf7f4;
      padding: 1.25rem;
      border-radius: 2px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    pre code { background: none; padding: 0; }

    /* Post list */
    ul#posts, ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }

    ul#posts li, ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem 1.5rem;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    ul#posts li:hover, ul.section-list li:hover {
      box-shadow: 0 2px 12px rgba(26, 26, 26, 0.06);
      border-left-color: var(--onyx);
    }

    ul#posts li a, ul.section-list li a {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 1.15rem;
      color: var(--onyx);
      letter-spacing: 0.02em;
    }

    ul#posts li a:hover, ul.section-list li a:hover { color: var(--gold); }

    /* Article */
    article {
      padding: 1rem 0;
    }

    article img {
      max-width: 100%;
      border: 8px solid #fff;
      box-shadow: 0 2px 20px rgba(26, 26, 26, 0.1);
      margin: 1.5rem 0;
    }

    /* Blockquote - gallery card style */
    blockquote {
      margin: 2rem 0;
      padding: 1.5rem 2rem;
      border-left: 3px solid var(--gold);
      background: rgba(255, 255, 255, 0.5);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    /* Taxonomy */
    .taxonomy-desc {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    /* Pagination */
    nav.pagination { margin: 2.5rem 0; }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: all 0.3s;
    }

    nav.pagination a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      opacity: 0.4;
    }

    /* Divider ornament */
    hr {
      border: none;
      text-align: center;
      margin: 2.5rem 0;
      height: 1px;
      background-color: var(--border);
      position: relative;
    }

    hr::after {
      content: '';
      position: absolute;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background-color: var(--gold);
      border-radius: 50%;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1.25rem; }
      h1 { font-size: 1.75rem; }
      .site-header::after { left: 0; right: 0; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Index</a>
      </nav>
    </header>
