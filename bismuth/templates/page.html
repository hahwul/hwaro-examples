{% include "header.html" %}

<article class="hopper-frame">
  <h1>{{ page.title }}</h1>
  {% if page.date and page.date != "" %}
    <p class="date" style="font-family: var(--font-mono); color: var(--text-muted); margin-bottom: 2rem;">Date: {{ page.date | date("%Y-%m-%d") }}</p>
  {% endif %}

  <div class="page-content">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
