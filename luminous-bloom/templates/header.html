<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap">
  <style>
    :root {
      --primary: #948a7b;
      --text: #333333;
      --text-muted: #777777;
      --border: #eaeaea;
      --bg: #faf9f6;
      --bg-alt: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      margin-bottom: 2rem;
    }
    .site-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 1px;
    }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.5em;
      font-weight: 400;
      color: var(--text);
    }
    h1 { font-size: 3rem; margin-top: 0; letter-spacing: -0.5px; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    p { margin: 1.5em 0; font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
    a:hover { border-bottom-color: var(--primary); }

    /* Portfolio Grid */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 3rem 2rem;
      margin-top: 4rem;
    }
    .portfolio-item {
      display: flex;
      flex-direction: column;
    }
    .portfolio-item .image-container {
      width: 100%;
      aspect-ratio: 4/5;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 1.5rem;
      transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .portfolio-item:hover .image-container {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }
    .portfolio-item .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .portfolio-item:hover .image-container img {
      transform: scale(1.05);
    }
    .portfolio-item h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.2rem;
    }
    .portfolio-item p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
    }

    /* Components */
    .hero {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 5rem;
      padding: 3rem 0;
    }
    .hero h1 { margin-bottom: 1rem; }
    .hero p { color: var(--text-muted); font-size: 1.2rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; padding: 2rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2.2rem; }
      .hero { padding: 1rem 0 3rem; }
      .portfolio-grid { grid-template-columns: 1fr; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Work</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
