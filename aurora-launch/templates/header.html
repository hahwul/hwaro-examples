<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --bg: #0b0d12;
      --bg-surface: #141721;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #2e3549;
      --accent: rgba(80, 150, 255, 0.9);
      --accent-glow: rgba(80, 150, 255, 0.15);
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      position: sticky;
      top: 0;
      background: rgba(11, 13, 18, 0.85);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-logo:hover {
      color: #fff;
      text-shadow: 0 0 15px var(--accent-glow);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .site-header nav a:hover {
      color: #fff;
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    .site-footer {
      margin-top: 5rem;
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.75em;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: 3.5rem;
      margin-top: 0;
      letter-spacing: -0.04em;
    }

    h2 { font-size: 2rem; }
    h3 { font-size: 1.35rem; }
    p { margin: 1.25em 0; color: var(--text-muted); font-size: 1.1rem; }

    a { color: #fff; text-decoration: none; border-bottom: 1px solid var(--accent); }
    a:hover { border-bottom-color: #fff; }

    .site-header a { border-bottom: none; }
    .site-header a:hover { border-bottom: none; }

    code {
      background: var(--bg-surface);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }
    pre {
      background: var(--bg-surface);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Animations & Hero */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .hero {
      text-align: center;
      padding: 6rem 0;
    }

    .hero h1 {
      color: #ffffff;
      text-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
    }

    .hero p {
      max-width: 600px;
      margin: 1.5rem auto 3rem;
      font-size: 1.25rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(80, 150, 255, 0.5);
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 20px var(--accent-glow);
    }

    .btn:hover {
      border-color: rgba(80, 150, 255, 0.8);
      box-shadow: 0 0 40px var(--accent-glow), inset 0 0 30px var(--accent-glow);
      transform: translateY(-2px);
    }

    /* Cards */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin: 4rem 0;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      border-radius: 16px;
      transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
      animation: float 6s ease-in-out infinite;
    }

    .card:nth-child(2) { animation-delay: 1s; }
    .card:nth-child(3) { animation-delay: 2s; }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 40px var(--accent-glow);
      border-color: rgba(80, 150, 255, 0.4);
      animation-play-state: paused;
    }

    .card h3 {
      margin-top: 0;
      color: #fff;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1.5rem; background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border); transition: border-color 0.2s ease; }
    ul.section-list li:hover { border-color: rgba(80, 150, 255, 0.4); }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; border: none; }
    ul.section-list li a:hover { color: #fff; }
    ul.section-list li p { margin-bottom: 0; font-size: 1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; }
    nav.pagination a:hover { color: #fff; border-color: rgba(80, 150, 255, 0.5); box-shadow: 0 0 15px var(--accent-glow); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(80, 150, 255, 0.5); color: #fff; box-shadow: inset 0 0 15px var(--accent-glow); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); color: var(--border); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; }
      .hero { padding: 4rem 0; }
    }
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.5rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      .features { grid-template-columns: 1fr; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
