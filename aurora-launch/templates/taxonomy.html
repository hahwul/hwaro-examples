{% include "header.html" %}

<div class="taxonomy-content">
  <h1>{{ taxonomy_name | capitalize }}</h1>

  <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li>
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/">{{ term | e }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
