{% include "header.html" %}

<div class="taxonomy-term-content">
  <h1>{{ term_name | e }}</h1>
  <p class="taxonomy-desc">Pages tagged with "{{ term_name | e }}"</p>

  <ul class="section-list">
    {% for page in taxonomy_pages %}
      <li>
        <a href="{{ page.permalink }}">{{ page.title | e }}</a>
        {% if page.description %}
          <p>{{ page.description | e }}</p>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
