<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --redwood: #8b4513;
      --redwood-dark: #6b3410;
      --pine: #6b8e4e;
      --pine-dark: #4a6b34;
      --craft: #d4b896;
      --craft-light: #f5ede0;
      --craft-dark: #b89b72;
      --text: #3b2f2f;
      --text-muted: #6b5b4b;
      --border: #c4a882;
      --border-light: #ddd0be;
      --bg: #f5ede0;
      --white: #faf6f0;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Merriweather', Georgia, serif;
      line-height: 1.75;
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }

    /* Tree ring decoration */
    .tree-rings {
      position: fixed;
      top: -120px;
      right: -120px;
      width: 300px;
      height: 300px;
      pointer-events: none;
      opacity: 0.06;
      z-index: 0;
    }
    .tree-rings .ring {
      position: absolute;
      border: 3px solid var(--redwood);
      border-radius: 50%;
    }
    .tree-rings .ring:nth-child(1) { width: 300px; height: 300px; top: 0; left: 0; }
    .tree-rings .ring:nth-child(2) { width: 240px; height: 240px; top: 30px; left: 30px; }
    .tree-rings .ring:nth-child(3) { width: 180px; height: 180px; top: 60px; left: 60px; }
    .tree-rings .ring:nth-child(4) { width: 120px; height: 120px; top: 90px; left: 90px; }
    .tree-rings .ring:nth-child(5) { width: 60px; height: 60px; top: 120px; left: 120px; }

    .tree-rings-left {
      position: fixed;
      bottom: -80px;
      left: -80px;
      width: 200px;
      height: 200px;
      pointer-events: none;
      opacity: 0.04;
      z-index: 0;
    }
    .tree-rings-left .ring {
      position: absolute;
      border: 2px solid var(--pine);
      border-radius: 50%;
    }
    .tree-rings-left .ring:nth-child(1) { width: 200px; height: 200px; top: 0; left: 0; }
    .tree-rings-left .ring:nth-child(2) { width: 160px; height: 160px; top: 20px; left: 20px; }
    .tree-rings-left .ring:nth-child(3) { width: 120px; height: 120px; top: 40px; left: 40px; }
    .tree-rings-left .ring:nth-child(4) { width: 80px; height: 80px; top: 60px; left: 60px; }

    /* Layout */
    .site-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      border-bottom: 3px solid var(--redwood);
      margin-bottom: 2.5rem;
    }

    .site-logo {
      font-family: 'Bitter', Georgia, serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--redwood);
      text-decoration: none;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .site-logo:hover { color: var(--redwood-dark); }

    .site-logo::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--redwood);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Bitter', Georgia, serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .site-header nav a:hover { color: var(--redwood); }

    .site-main {
      min-height: calc(100vh - 220px);
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Bitter', Georgia, serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 700;
      color: var(--redwood-dark);
    }
    h1 { font-size: 2rem; margin-top: 0; border-bottom: 2px solid var(--border-light); padding-bottom: 0.4em; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.15rem; }
    p { margin: 1em 0; }
    a { color: var(--pine-dark); text-decoration: none; }
    a:hover { color: var(--pine); text-decoration: underline; }

    code {
      background: var(--white);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border-light);
    }
    pre {
      background: var(--white);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border-light);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Post list */
    .post-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
    }
    .post-item {
      margin-bottom: 1.75rem;
      padding: 1.25rem 1.5rem;
      background: var(--white);
      border: 1px solid var(--border-light);
      border-left: 4px solid var(--redwood);
      border-radius: 2px;
    }
    .post-item:hover { border-left-color: var(--pine); }
    .post-item h2 {
      margin: 0 0 0.25rem 0;
      font-size: 1.2rem;
      border: none;
      padding: 0;
    }
    .post-item h2 a { color: var(--redwood-dark); }
    .post-item h2 a:hover { color: var(--pine-dark); text-decoration: none; }
    .post-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-family: 'Bitter', Georgia, serif;
    }
    .post-meta span { margin-right: 1rem; }
    .post-description {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin: 0.5rem 0 0 0;
    }

    /* Project metadata (checklist style) */
    .project-meta {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
    }
    .project-meta h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--redwood);
      margin: 0 0 0.75rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-light);
    }
    .meta-row {
      display: flex;
      align-items: baseline;
      padding: 0.35rem 0;
      font-size: 0.9rem;
      border-bottom: 1px dotted var(--border-light);
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-label {
      font-family: 'Bitter', Georgia, serif;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 140px;
      flex-shrink: 0;
    }
    .meta-label::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid var(--pine);
      border-radius: 1px;
      margin-right: 0.5rem;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .meta-value {
      color: var(--text);
    }

    /* Section list */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }
    ul.section-list li {
      margin-bottom: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--white);
      border-radius: 2px;
      border: 1px solid var(--border-light);
      border-left: 3px solid var(--craft-dark);
    }
    ul.section-list li a { font-weight: 600; color: var(--redwood-dark); }
    ul.section-list li a:hover { color: var(--pine-dark); }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    nav.pagination a {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Bitter', Georgia, serif;
    }
    nav.pagination a:hover { color: var(--redwood); border-color: var(--redwood); }
    .pagination-current span {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 2px;
      border: 1px solid var(--redwood);
      background: var(--redwood);
      color: var(--white);
    }

    /* Inline tree ring decoration for sections */
    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 2.5rem 0;
      color: var(--border);
    }
    .section-divider .mini-ring {
      width: 8px;
      height: 8px;
      border: 2px solid var(--craft-dark);
      border-radius: 50%;
    }
    .section-divider .mini-ring.center {
      width: 14px;
      height: 14px;
      border-color: var(--redwood);
    }
    .section-divider::before,
    .section-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    /* Page date */
    .page-date {
      font-family: 'Bitter', Georgia, serif;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    /* Footer */
    .site-footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      border-top: 3px solid var(--redwood);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
    }
    .site-footer a { color: var(--redwood); }

    /* 404 */
    .not-found {
      text-align: center;
      padding: 4rem 0;
    }
    .not-found h1 { border: none; }
    .not-found .ring-404 {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .not-found .ring-404 .ring {
      position: absolute;
      border: 3px solid var(--redwood);
      border-radius: 50%;
      opacity: 0.3;
    }
    .not-found .ring-404 .ring:nth-child(1) { width: 120px; height: 120px; top: 0; left: 0; }
    .not-found .ring-404 .ring:nth-child(2) { width: 90px; height: 90px; top: 15px; left: 15px; }
    .not-found .ring-404 .ring:nth-child(3) { width: 60px; height: 60px; top: 30px; left: 30px; }
    .not-found .ring-404 .ring:nth-child(4) { width: 30px; height: 30px; top: 45px; left: 45px; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      .meta-row { flex-direction: column; }
      .meta-label { min-width: auto; margin-bottom: 0.15rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="tree-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>
  <div class="tree-rings-left">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Sawmill</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Projects</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
