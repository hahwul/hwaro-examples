{% include "header.html" %}

<section class="taxonomy-page">
  <h1 class="section-title">{{ taxonomy_name | capitalize }}</h1>
  <div class="tag-grid">
    {% for term in taxonomy_terms %}
    <a href="{{ term.url }}" class="tag-card">
      <span class="tag-name">{{ term.name }}</span>
      <span class="tag-count">{{ term.pages | length }}</span>
    </a>
    {% endfor %}
  </div>
</section>

{% include "footer.html" %}
