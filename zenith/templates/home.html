{% include "header.html" %}

  <main class="home">
    <section class="hero-section section-ascent">
      <div class="hero-content">
        <h1 class="hero-title">Zenith</h1>
        <p class="hero-subtitle">The highest point</p>
      </div>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </section>

    <section class="hero-section section-stratosphere">
      <div class="hero-content">
        <h2 class="hero-title">Above the weather</h2>
        <p class="hero-subtitle">Where turbulence ends and stillness begins</p>
      </div>
      <div class="cloud cloud-4"></div>
    </section>

    <section class="hero-section section-thermosphere">
      <div class="hero-content">
        <h2 class="hero-title">Near space</h2>
        <p class="hero-subtitle">The sky is no longer blue</p>
      </div>
    </section>

    <section class="hero-section section-exosphere">
      <div class="hero-content">
        <h2 class="hero-title">Void</h2>
        <p class="hero-subtitle">Atmosphere dissolves into silence</p>
      </div>
    </section>

    <section class="hero-section section-zenith">
      <div class="hero-content">
        <h2 class="hero-title zenith-final">{{ site.title }}</h2>
        <p class="hero-subtitle">{{ content | safe }}</p>
      </div>
    </section>
  </main>

{% include "footer.html" %}
