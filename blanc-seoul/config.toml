title = "Blanc Seoul"
description = "A refined light blog theme inspired by Seoul's elegance — clean, luminous, and gracefully modern"
base_url = "http://localhost:3000"

[processors]
markdown = {}

[file_extensions]
images = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
enabled = true
format = "fuse.json"

[taxonomies]
tags = { feed = true }
categories = {}

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
[feeds.rss]
sections = ["posts"]
limit = 10

[markdown]
safe = false
lazy_loading = true

[seo]
llms_txt = true
