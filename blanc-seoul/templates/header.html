<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} | {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ highlight_css }}
  {{ auto_includes_css }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="logo">
        <span class="logo-kr">블랑서울</span>
        <span class="logo-en">Blanc Seoul</span>
      </a>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="{{ base_url }}/">Home</a></li>
          <li><a href="{{ base_url }}/posts/">Posts</a></li>
          <li><a href="{{ base_url }}/about/">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
