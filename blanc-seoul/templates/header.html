<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <link rel="canonical" href="{{ page.permalink }}">
  {{ seo_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ 'css/style.css' | url }}">
  {{ highlight_css }}
  <title>{{ page.title | default: site.title }}</title>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | url }}" class="logo">
        <span class="logo-kr">블랑서울</span>
        <span class="logo-en">Blanc Seoul</span>
      </a>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav">
        <a href="{{ '/' | url }}">홈</a>
        <a href="{{ 'posts/' | url }}">글</a>
        <a href="{{ 'about/' | url }}">소개</a>
      </nav>
    </div>
  </header>
