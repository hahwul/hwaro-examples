<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <style>
    :root {
      --bg-color: #0b050d;
      --text-color: #f1e6f5;
      --accent-color: #d8b4e2;
      --gold-accent: #cfa85e;
      --border-color: rgba(216, 180, 226, 0.15);
      --card-bg: #140918;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Playfair Display', serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(216, 180, 226, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(207, 168, 94, 0.05) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border-color);
      background: rgba(11, 5, 13, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--gold-accent);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--text-color);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--accent-color);
    }

    main {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem;
      width: 100%;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      color: var(--accent-color);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      color: var(--gold-accent);
    }

    h2 {
      font-size: 2rem;
      margin-top: 3rem;
    }

    p {
      margin-bottom: 1.5rem;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: #ccc;
    }

    a {
      color: var(--gold-accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }

    a:hover {
      border-bottom-color: var(--gold-accent);
    }

    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 2rem;
      font-family: 'Lora', serif;
      color: #ccc;
      font-size: 1.1rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    .hero {
      text-align: center;
      padding: 4rem 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 3rem;
    }

    .hero-title {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: var(--accent-color);
      font-style: italic;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .tag {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(216, 180, 226, 0.1);
      color: var(--accent-color);
      border-radius: 20px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      text-align: center;
      padding: 3rem 0;
      border-top: 1px solid var(--border-color);
      font-family: 'Lora', serif;
      color: #888;
    }

    /* Code Highlighting Support */
    pre, code, .hljs {
      background: #1a0f1f !important;
      color: #d8b4e2 !important;
      font-family: 'Fira Code', monospace;
      padding: 1rem;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  {% if site.highlight is defined and site.highlight.enabled %}
    {{ highlight_css | safe }}
  {% endif %}
</head>
<body>
  <header>
    <nav>
      <a href="{{ base_url }}" class="logo">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
        <a href="{{ base_url }}tags/">Tags</a>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
  </footer>
</body>
</html>
