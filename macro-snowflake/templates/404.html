{% extends "base.html" %}

{% block content %}
<div class="error-container glass-panel">
    <div class="melted-snowflake">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 Q60 40 50 80 Q40 40 50 20" fill="none" stroke="var(--accent-blue)" stroke-width="2" />
            <circle cx="50" cy="85" r="3" fill="var(--accent-cyan)" />
            <circle cx="50" cy="95" r="1.5" fill="var(--accent-cyan)" />
        </svg>
    </div>
    <h1>404</h1>
    <h2>Structure Dissolved</h2>
    <p>The crystalline formation you are looking for has melted or drifted away in the wind.</p>
    <a href="{{ base_url }}/" class="home-link">Return to Solid Ground</a>
</div>

<style>
    .error-container {
        max-width: 600px;
        margin: 4rem auto;
        padding: 4rem 2rem;
        text-align: center;
    }

    .error-container h1 {
        font-size: 6rem;
        margin-bottom: 0;
        background: linear-gradient(to bottom, #fff, var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .error-container h1::before, .error-container h1::after {
        display: none;
    }

    .melted-snowflake {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem auto;
        opacity: 0.7;
    }

    .home-link {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.8rem 2rem;
        border: 1px solid var(--accent-cyan);
        border-radius: 2px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        transition: all 0.3s;
    }

    .home-link:hover {
        background: rgba(0, 240, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }
</style>
{% endblock %}
