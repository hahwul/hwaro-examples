<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title | default(site.title) }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
</head>
<body>
  <div class="soundwave-background" aria-hidden="true">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <path d="M0,500 Q 125,100 250,500 T 500,500 T 750,500 T 1000,500 L1000,1000 L0,1000 Z" class="wave wave1"></path>
      <path d="M0,500 Q 125,300 250,500 T 500,500 T 750,500 T 1000,500 L1000,1000 L0,1000 Z" class="wave wave2"></path>
      <path d="M0,500 Q 125,400 250,500 T 500,500 T 750,500 T 1000,500 L1000,1000 L0,1000 Z" class="wave wave3"></path>
    </svg>
  </div>
  <header class="site-header">
    <div class="container">
      <div class="logo">
        <a href="{{ site.base_url }}/">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
          </svg>
          <span class="logo-text">{{ site.title }}</span>
        </a>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="{{ site.base_url }}/">Home</a></li>
          <li><a href="{{ site.base_url }}/tracks/">Tracks</a></li>
          <li><a href="{{ site.base_url }}/about/">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <div class="page-container container">
