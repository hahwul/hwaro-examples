{% include "header.html" %}

<main class="site-main">
  <div class="section-header">
    <h1 class="section-title">{{ taxonomy_term.name }}</h1>
  </div>

  <div class="track-list">
    {% for page in taxonomy_pages %}
      <div class="track-card">
        <div class="track-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="track-info">
          <div class="track-title"><a href="{{ page.url }}">{{ page.title }}</a></div>
          <div class="track-artist">{{ page.date | date(format="%B %d, %Y") }}</div>
          <div class="track-waveform"></div>
        </div>
      </div>
    {% endfor %}
  </div>
</main>

{% include "footer.html" %}
