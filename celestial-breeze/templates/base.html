<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-bg"></div>
    <div class="content-wrapper">
        <header class="site-header">
            <nav>
                <a href="/" class="logo">{{ site.title }}</a>
                <div class="nav-links">
                    <a href="/posts/">Essays</a>
                    <a href="/about/">About</a>
                </div>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>&copy; {{ site.title }} &mdash; A graceful whisper.</p>
        </footer>
    </div>
</body>
</html>
