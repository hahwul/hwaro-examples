# =============================================================================
# Hardcore Pit - Controlled Chaos
# Issue #1586 | Tags: event, punk, hardcore, show, chaotic
# Site name variant of mosh-pit; existing mosh-pit/ was built from issue #1642.
# =============================================================================

title = "BASEMENT MATINEE - HARDCORE PIT FEST"
description = "Sunday basement matinee. Six bands. Paint splatter flyers. Permanent marker setlists. Safety pins and combat boots encouraged."
base_url = "http://localhost:3000"

sections = ["bands"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "DIY show info. No AI training. Pay the bands."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
emoji = false
