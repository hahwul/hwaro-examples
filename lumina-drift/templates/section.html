{% extends "base.html" %}

{% block content %}
  <div class="glow-container">
    <h1 class="lumina-title">{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for page in section.pages %}
        <li><a href="{{ page.permalink }}">{{ page.title | e }}</a></li>
      {% endfor %}
    </ul>
    {{ pagination | safe }}
  </div>
{% endblock %}
