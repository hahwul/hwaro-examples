<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            coral: '#ff6b6b',
            warmgray: {
              50: '#fafafa',
              100: '#f5f5f4',
              200: '#e7e5e4',
              300: '#d6d3d1',
              800: '#292524',
              900: '#1c1917',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Fraunces', 'serif'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-warmgray-50 text-warmgray-800 font-sans antialiased;
      }
      h1, h2, h3, h4 {
        @apply font-serif text-warmgray-900 tracking-tight;
      }
      a {
        @apply transition-colors duration-200;
      }
      .prose {
        @apply max-w-none;
      }
      .prose h1 { @apply text-4xl mb-8 border-b border-warmgray-200 pb-4; }
      .prose h2 { @apply text-2xl mt-12 mb-6 text-coral; }
      .prose p { @apply mb-6 leading-relaxed text-lg; }
      .prose ul { @apply list-none pl-0 mb-8; }
      .prose li { @apply relative pl-8 mb-4 before:content-[''] before:absolute before:left-0 before:top-3 before:w-2 before:h-2 before:bg-coral; }
      .prose blockquote { @apply border-l-4 border-coral pl-6 py-2 italic bg-white shadow-sm my-8 text-xl text-warmgray-900; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}" class="min-h-screen flex flex-col">
  <header class="bg-white border-b border-warmgray-200 py-8">
    <div class="max-w-4xl mx-auto px-6 flex items-center justify-between">
      <a href="{{ base_url }}/" class="group flex items-center space-x-3">
        <div class="w-10 h-10 bg-coral flex items-center justify-center text-white font-bold text-xl">E</div>
        <span class="text-xl font-serif font-bold tracking-tight group-hover:text-coral">{{ site.title }}</span>
      </a>
      <nav class="flex items-center space-x-8 font-medium text-sm tracking-wide uppercase">
        <a href="{{ base_url }}/" class="hover:text-coral border-b-2 border-transparent hover:border-coral pb-1">Principles</a>
        <a href="{{ base_url }}/about/" class="hover:text-coral border-b-2 border-transparent hover:border-coral pb-1">About</a>
      </nav>
    </div>
  </header>
  <main class="flex-grow max-w-4xl mx-auto px-6 py-16 w-full">
