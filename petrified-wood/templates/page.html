{% include "header.html" %}

<article class="page-content">
    {% if page.title and page.url != site.base_url ~ "/" %}
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
            <div class="page-meta">
                <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
            </div>
        {% endif %}
    {% endif %}

    <div class="content-body">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
