<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(site.title) }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
</head>
<body>

    <!-- SVG Filters for Textures -->
    <svg style="display: none;">
        <defs>
            <!-- Wood Grain Texture -->
            <filter id="wood-grain" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.01 0.4" numOctaves="4" result="noise1"/>
                <feColorMatrix type="matrix" values="
                    0.2  0    0    0   0.3
                    0.15 0    0    0   0.2
                    0.1  0    0    0   0.15
                    0    0    0    1   0" in="noise1" result="coloredNoise"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.8"/>
                </feComponentTransfer>
            </filter>

            <!-- Mineral Streak Overlay (Fractal Noise) -->
            <filter id="mineral-streak" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="turbulence" baseFrequency="0.05 0.02" numOctaves="3" result="mineralNoise"/>
                <feColorMatrix type="matrix" values="
                    0    0    0    0   0.4
                    0    0    0    0   0.8
                    0    0    0    0   0.7
                    1    0    0    0   0" in="mineralNoise" result="mineralColor"/>
            </filter>
        </defs>
    </svg>

    <div class="site-wrapper">
        <header class="site-header">
            <div class="header-inner">
                <a href="{{ site.base_url }}/" class="site-title">{{ site.title }}</a>
                <p class="site-description">{{ site.description }}</p>
            </div>
        </header>

        <main class="site-main">
