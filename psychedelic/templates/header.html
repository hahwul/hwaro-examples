<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');

    :root {
      --bg: #09090b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #1e293b;
      --accent-color-1: rgba(236, 72, 153, 1);
      --accent-color-2: rgba(139, 92, 246, 1);
      --accent-color-3: rgba(56, 189, 248, 1);

      --accent-glow-1: rgba(236, 72, 153, 0.4);
      --accent-glow-2: rgba(139, 92, 246, 0.4);
      --accent-glow-3: rgba(56, 189, 248, 0.4);

      --surface: #111115;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      overflow-x: hidden;
    }

    /* Elegant, glowing orbs using box-shadow (no gradients!) */
    .orb-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background-color: transparent;
      box-shadow: inset 0 0 100px var(--accent-glow-1), 0 0 200px var(--accent-glow-1);
    }

    .orb-2 {
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background-color: transparent;
      box-shadow: inset 0 0 100px var(--accent-glow-2), 0 0 250px var(--accent-glow-2);
      animation-delay: -5s;
    }

    .orb-3 {
      top: 40%;
      left: 60%;
      width: 30vw;
      height: 30vw;
      background-color: transparent;
      box-shadow: inset 0 0 100px var(--accent-glow-3), 0 0 150px var(--accent-glow-3);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5%, -5%) scale(1.1); }
      66% { transform: translate(-5%, 5%) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .site-logo {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      color: #fff;
      text-shadow: 0 0 15px var(--accent-color-1), 0 0 30px var(--accent-color-2);
    }

    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background-color: var(--accent-color-3);
      box-shadow: 0 0 10px var(--accent-color-3);
      transition: width 0.3s ease;
    }

    .site-header nav a:hover { color: #fff; }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Cinzel', serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 600;
      color: #fff;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      text-shadow: 0 0 30px rgba(255,255,255,0.1);
    }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }

    p { margin: 1.2em 0; }

    a {
      color: var(--accent-color-3);
      text-decoration: none;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    a:hover {
      color: #fff;
      text-shadow: 0 0 10px var(--accent-glow-3);
    }

    code {
      background: var(--surface);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.05);
    }

    pre {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
    }

    pre code { background: none; padding: 0; border: none; }

    /* Content Elements */
    .content-box {
      background-color: rgba(17, 17, 21, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 2.5rem;
      margin: 2rem 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4),
                  inset 0 0 0 1px rgba(255,255,255,0.02);
      position: relative;
      overflow: hidden;
    }

    .content-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background-color: transparent;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    /* Lists */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: rgba(17, 17, 21, 0.5);
      backdrop-filter: blur(5px);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.1);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3),
                  0 0 15px rgba(139, 92, 246, 0.1);
    }

    ul.section-list li a {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.5rem;
    }

    /* Taxonomy & Pagination */
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center;
    }

    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: 1px;
    }

    nav.pagination a {
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      background: rgba(17, 17, 21, 0.5);
    }

    nav.pagination a:hover {
      color: #fff;
      border-color: var(--accent-color-2);
      box-shadow: 0 0 15px var(--accent-glow-2);
    }

    .pagination-current span {
      border: 1px solid var(--accent-color-1);
      color: #fff;
      background: rgba(236, 72, 153, 0.1);
      box-shadow: 0 0 10px var(--accent-glow-1);
    }

    .pagination-disabled span {
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
      h1 { font-size: 2rem; }
      .content-box { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
