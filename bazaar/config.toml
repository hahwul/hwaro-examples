title = "Bazaar Market"
description = "A practical marketplace and classifieds theme for Hwaro"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 12

[[taxonomies]]
name = "categories"

[[taxonomies]]
name = "locations"

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
lazy_loading = true
