{% include "header.html" %}

<article class="page-container">
    <div class="page-inner">
        <header class="page-header">
            <h1 class="page-title">{{ page.title }}</h1>
            {% if page.date %}
            <p class="page-date">{{ page.date | date("%B %d, %Y") }}</p>
            {% endif %}
        </header>

        <div class="page-content">
            {{ content | safe }}
        </div>
    </div>
</article>

<style>
    .page-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 3rem 2rem;
    }

    .page-inner {
        background: rgba(255, 255, 255, 0.85);
        padding: 3rem;
        border-radius: 15px;
        box-shadow:
            0 10px 40px rgba(0, 0, 0, 0.05),
            0 0 30px rgba(255, 215, 0, 0.1);
        backdrop-filter: blur(10px);
    }

    .page-header {
        text-align: center;
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 2px solid rgba(255, 215, 0, 0.2);
    }

    .page-title {
        font-family: 'Cinzel', serif;
        font-size: 2.5rem;
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
    }

    .page-date {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.1rem;
        color: #999;
        font-style: italic;
    }

    .page-content {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.2rem;
        line-height: 1.9;
        color: #444;
    }

    .page-content p {
        margin-bottom: 1.5rem;
    }

    .page-content h2 {
        font-family: 'Cinzel', serif;
        font-size: 1.8rem;
        color: #333;
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .page-content h3 {
        font-family: 'Cinzel', serif;
        font-size: 1.4rem;
        color: #555;
        margin-top: 2rem;
        margin-bottom: 0.8rem;
    }

    .page-content a {
        color: var(--divine-gold);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        transition: all 0.3s ease;
    }

    .page-content a:hover {
        border-bottom-color: var(--divine-gold);
    }

    .page-content img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        margin: 2rem 0;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .page-content blockquote {
        border-left: 4px solid var(--divine-gold);
        padding-left: 2rem;
        margin: 2rem 0;
        font-style: italic;
        color: #666;
    }

    .page-content code {
        background: rgba(230, 243, 255, 0.5);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.9em;
    }

    .page-content pre {
        background: rgba(230, 243, 255, 0.3);
        padding: 1.5rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 2rem 0;
    }

    .page-content pre code {
        background: none;
        padding: 0;
    }

    @media (max-width: 768px) {
        .page-container {
            padding: 2rem 1rem;
        }

        .page-inner {
            padding: 2rem 1.5rem;
        }

        .page-title {
            font-size: 1.8rem;
        }

        .page-content {
            font-size: 1.1rem;
        }
    }
</style>

{% include "footer.html" %}
