<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(site.title) }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --divine-gold: #FFD700;
            --heaven-white: #FAFAFA;
            --ether-blue: #E6F3FF;
            --cloud-lavender: #E8E0F5;
            --gold-bright: #FFF4CC;
            --angel-glow: rgba(255, 255, 255, 0.9);
            --light-beam: rgba(255, 250, 230, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(to bottom, #E6F3FF 0%, #F0F4FF 50%, #FAFAFA 100%);
            color: #333;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* God Ray Effects - Multiple layers */
        .god-rays {
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 300%;
            height: 200%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .ray {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom,
                rgba(255, 255, 255, 0.8) 0%,
                rgba(255, 250, 210, 0.4) 30%,
                transparent 60%);
            transform-origin: top center;
            animation: fadeRay 8s ease-in-out infinite;
        }

        .ray:nth-child(1) { transform: translateX(-50%) rotate(-15deg); animation-delay: 0s; }
        .ray:nth-child(2) { transform: translateX(-50%) rotate(-8deg); animation-delay: 1s; }
        .ray:nth-child(3) { transform: translateX(-50%) rotate(0deg); animation-delay: 2s; }
        .ray:nth-child(4) { transform: translateX(-50%) rotate(8deg); animation-delay: 3s; }
        .ray:nth-child(5) { transform: translateX(-50%) rotate(15deg); animation-delay: 1.5s; }

        @keyframes fadeRay {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Floating cloud layers */
        .cloud-layer {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .cloud {
            position: absolute;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatCloud 30s ease-in-out infinite;
        }

        .cloud1 {
            width: 400px;
            height: 150px;
            top: 20%;
            left: -10%;
            animation-delay: 0s;
        }

        .cloud2 {
            width: 300px;
            height: 120px;
            top: 40%;
            right: -5%;
            animation-delay: 5s;
        }

        .cloud3 {
            width: 350px;
            height: 130px;
            top: 60%;
            left: 10%;
            animation-delay: 10s;
        }

        @keyframes floatCloud {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(20px); }
        }

        /* Halo/Divine glow effect */
        .divine-glow {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.5) 0%,
                rgba(255, 250, 210, 0.3) 20%,
                rgba(230, 243, 255, 0.2) 40%,
                transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
        }

        /* Header Navigation */
        .site-header {
            position: relative;
            z-index: 10;
            padding: 2rem 1rem;
            text-align: center;
        }

        .site-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--divine-gold);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-shadow:
                0 0 10px rgba(255, 215, 0, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { text-shadow:
                0 0 10px rgba(255, 215, 0, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.1); }
            50% { text-shadow:
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 30px rgba(255, 255, 255, 0.5),
                2px 2px 4px rgba(0, 0, 0, 0.1); }
        }

        .site-title a {
            color: var(--divine-gold);
            text-decoration: none;
        }

        .site-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 1.5rem;
        }

        .site-nav a {
            font-family: 'Cinzel', serif;
            color: #666;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            position: relative;
        }

        .site-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--divine-gold);
            transition: width 0.3s ease;
        }

        .site-nav a:hover {
            color: var(--divine-gold);
        }

        .site-nav a:hover::after {
            width: 100%;
        }

        /* Main Content Container */
        .main-content {
            position: relative;
            z-index: 3;
            min-height: calc(100vh - 200px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .site-title {
                font-size: 2rem;
                letter-spacing: 0.2em;
            }

            .site-nav {
                flex-direction: column;
                gap: 1rem;
            }

            .cloud1, .cloud2, .cloud3 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Divine glow effect -->
    <div class="divine-glow"></div>

    <!-- God rays -->
    <div class="god-rays">
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
    </div>

    <!-- Floating clouds -->
    <div class="cloud-layer">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>

    <!-- Header -->
    <header class="site-header">
        <h1 class="site-title">
            <a href="{{ base_url }}/">{{ site.title }}</a>
        </h1>
        <nav class="site-nav">
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/#about">About</a>
            <a href="{{ base_url }}/#contact">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
