{% include "header.html" %}

<h2>{{ taxonomy_name | default("Tags") }}</h2>

<ul class="taxonomy-list">
  {% for term in taxonomy_terms %}
  <li>
    <a href="{{ base_url }}/{{ taxonomy_name | default("tags") }}/{{ term.name | slugify }}/">{{ term.name }}</a>
    <span class="count">{{ term.pages | length }}</span>
  </li>
  {% endfor %}
</ul>
