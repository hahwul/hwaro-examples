# =============================================================================
# Flong Press -- Matrix Mold Publication
# Issue #1532 | Tags: book, dark, industrial, reversed, typography
# =============================================================================

title = "Flong Press -- The Stereotype Process"
description = "A dark industrial publication exploring the flong, matrix mold, and stereotype process that revolutionized mass printing in the nineteenth century."
base_url = "http://localhost:3000"

sections = ["chapters"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]

[pagination]
enabled = false

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true
rules = [
  { user_agent = "*", disallow = [] }
]

[llms]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["chapters"]

[markdown]
safe = false
lazy_loading = true
emoji = false
