<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} -- {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;700;900&family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ base_url }}/" class="site-logo">
      <svg width="30" height="36" viewBox="0 0 30 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Matrix mold / type block icon -->
        <rect x="2" y="2" width="26" height="32" rx="1" fill="#d4a853" stroke="none"/>
        <rect x="5" y="5" width="20" height="26" rx="0.5" fill="#1a1a1a" stroke="none"/>
        <!-- Reversed letter F -->
        <line x1="10" y1="10" x2="10" y2="26" stroke="#d4a853" stroke-width="2"/>
        <line x1="10" y1="10" x2="20" y2="10" stroke="#d4a853" stroke-width="2"/>
        <line x1="10" y1="17" x2="18" y2="17" stroke="#d4a853" stroke-width="1.5"/>
      </svg>
      <span>Flong Press</span>
    </a>
    <nav class="site-nav">
      <a href="{{ base_url }}/">Title</a>
      <a href="{{ base_url }}/chapters/">Chapters</a>
      <a href="{{ base_url }}/colophon/">Colophon</a>
    </nav>
  </div>
</header>
