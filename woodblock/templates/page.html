{% extends "base.html" %}

{% block content %}
<article class="block-print ink-bleed prose">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <span class="post-date">{{ page.date | date("%B %d, %Y") }}</span>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
