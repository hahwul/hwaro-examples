{% extends "base.html" %}

{% block content %}
<article class="block-print ink-bleed prose">
    <header class="post-header">
        <span class="post-date">{{ page.date | date("%B %d, %Y") }}</span>
        <h1>{{ page.title }}</h1>
        {% if page.taxonomies.tags %}
        <div class="post-tags">
            {% for tag in page.taxonomies.tags %}
            <a href="{{ get_taxonomy_url(kind='tags', name=tag) }}">#{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="wood-carving wood-grain ink-bleed"></div>

    <div class="post-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
