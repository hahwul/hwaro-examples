{% extends "base.html" %}

{% block content %}
<section class="block-print ink-bleed">
    <h1 class="prose">{{ taxonomy_name | upper }}</h1>
    <div class="taxonomy-list prose">
        <ul>
            {% for term in taxonomy_terms %}
            <li><a href="{{ term.url }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
            {% endfor %}
        </ul>
    </div>
</section>
{% endblock %}
