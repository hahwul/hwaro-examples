{% include "header.html" %}

<article class="max-w-3xl mx-auto px-6 py-16">
    <header class="text-center mb-16">
        <h1 class="text-5xl font-script text-rosegold mb-6">{{ page.title }}</h1>
        {% if page.date %}
        <time class="block text-slate uppercase tracking-widest font-serif mb-8">{{ page.date | date(format="%B %d, %Y") }}</time>
        {% endif %}
        <div class="w-24 h-px bg-rosegold mx-auto"></div>
    </header>

    <div class="content-body text-slate">
        {{ content | safe }}
    </div>

    {% if page.tags %}
    <footer class="mt-16 pt-8 border-t border-champagne text-center">
        <p class="font-serif italic text-slate mb-4">Tags</p>
        <div class="flex justify-center flex-wrap gap-2">
            {% for tag in page.tags %}
            <a href="{{ base_url }}/tags/{{ tag | slugify }}" class="px-4 py-2 border border-rosegold text-rosegold hover:bg-rosegold hover:text-white transition-colors text-sm uppercase tracking-wider rounded-full">{{ tag }}</a>
            {% endfor %}
        </div>
    </footer>
    {% endif %}
</article>
