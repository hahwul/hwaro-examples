{% include "header.html" %}
  <main class="site-main">
    <div class="glass-container">
      <h1>{{ page.title | e }}</h1>
      {{ content | safe }}
    </div>

    <div class="post-list">
      {% for child in section.pages %}
        <a href="{{ child.permalink }}" class="post-item">
          <article class="post-card glass-container">
            <h2>{{ child.title | e }}</h2>
            {% if child.description %}
              <p>{{ child.description | e }}</p>
            {% endif %}
          </article>
        </a>
      {% endfor %}
    </div>

    {{ pagination }}
  </main>
{% include "footer.html" %}
