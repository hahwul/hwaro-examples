{% extends "base.html" %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 4rem 0;">
    <h1 style="font-size: 5rem; margin-bottom: 0;">404</h1>
    <p style="font-size: 1.5rem; color: var(--text-muted);">Page Not Found</p>
    <a href="{{ base_url }}" style="display: inline-block; margin-top: 2rem; padding: 0.5rem 1rem; border: 1px solid var(--gold-accent); border-radius: 4px;">Return Home</a>
</div>
{% endblock %}
