{% extends "base.html" %}

{% block content %}
<article class="layer full-post">
    <div class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
        </div>
    </div>
    <div class="post-body">
        {{ page.content | safe }}
    </div>
    
    <div class="paper-clip"></div>
</article>
{% endblock %}
