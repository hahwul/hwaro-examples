<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ base_url }}" style="border: none; color: inherit;">{{ config.title }}</a></h1>
            <nav>
                <ul>
                    <li><a href="{{ base_url }}">Home</a></li>
                    <li><a href="{{ get_url(path="about") }}">About</a></li>
                </ul>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock content %}
        </main>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {{ config.title }}. Crafted with Tempera.</p>
        </footer>
    </div>
</body>
</html>
