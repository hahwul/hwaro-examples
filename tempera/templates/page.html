{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>

    {% if page.date %}
    <div class="meta">Written on {{ page.date | date(format="%B %d, %Y") }}</div>
    {% endif %}

    <div class="content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
