{% extends "base.html" %}
{% block content %}
<div>
  {{ content | safe }}
</div>
<div class="post-list">
  {% for post in section.pages %}
  <div class="card">
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    {% if post.summary %}<p>{{ post.summary | strip_html }}</p>{% endif %}
  </div>
  {% endfor %}
</div>
{% endblock %}
