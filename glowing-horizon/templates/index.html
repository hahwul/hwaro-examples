<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {% if site.highlight is defined and site.highlight.enabled %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.highlight.theme }}.min.css">
    {% endif %}
</head>
<body>
    {% include "nav.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            &copy; {{ current_year }} {{ site.title }}. Built with <a href="https://hwaro.hahwul.com" target="_blank">Hwaro</a>.
        </div>
    </footer>

    {% if site.highlight is defined and site.highlight.enabled %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    {% endif %}
</body>
</html>
