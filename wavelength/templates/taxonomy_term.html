{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_term | e }}</h1>
  <p class="taxonomy-desc">Pages tagged with <strong>{{ taxonomy_term | e }}</strong> in {{ taxonomy_name | capitalize }}.</p>

  <ul class="section-list">
    {% for p in taxonomy_pages %}
    <li>
      <a href="{{ base_url }}{{ p.path }}">{{ p.title | e }}</a>
    </li>
    {% endfor %}
  </ul>
{% endblock content %}
