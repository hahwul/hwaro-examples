<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.description | default('') | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-subtle: #1a1a1a;
      --text: #f0f0f0;
      --text-muted: #888888;
      --accent: #ffffff;
      --border: #333333;
      --glow: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Equalizer logo animation */
    .eq-logo {
      display: flex;
      gap: 2px;
      height: 16px;
      align-items: flex-end;
    }
    .eq-bar {
      width: 3px;
      background-color: var(--accent);
      border-radius: 1px;
      animation: eq-bounce 1.5s infinite ease-in-out alternate;
    }
    .eq-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 100%; animation-delay: -0.4s; }
    .eq-bar:nth-child(3) { height: 40%; animation-delay: -0.2s; }
    .eq-bar:nth-child(4) { height: 80%; animation-delay: -0.6s; }

    @keyframes eq-bounce {
      0% { transform: scaleY(0.3); transform-origin: bottom; }
      100% { transform: scaleY(1); transform-origin: bottom; }
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .site-header nav a:hover {
      color: var(--text);
      text-shadow: 0 0 8px var(--glow);
    }

    .site-main {
      flex-grow: 1;
      padding: 3rem 0;
    }

    .site-footer {
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Typography */
    h1, h2, h3, h4 {
      line-height: 1.2;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    h1 { font-size: 3rem; margin: 0 0 1rem 0; }
    h2 { font-size: 2rem; margin: 2rem 0 1rem 0; }
    h3 { font-size: 1.5rem; }
    p { margin: 0 0 1.5rem 0; color: var(--text-muted); }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #ddd;
    }

    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* Lists & Pagination */
    ul {
      padding-left: 1.5rem;
      color: var(--text-muted);
    }

    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    ul.section-list li {
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    ul.section-list li:hover {
      border-color: #555;
      box-shadow: 0 4px 20px var(--glow);
    }

    ul.section-list li a {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text);
    }

    ul.section-list li a:hover {
      text-decoration: none;
    }

    nav.pagination {
      margin: 3rem 0;
      display: flex;
      justify-content: center;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 0.5rem;
    }

    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      height: 2.5rem;
      padding: 0 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    nav.pagination a:hover {
      border-color: #555;
      color: var(--text);
      box-shadow: 0 0 10px var(--glow);
    }

    .pagination-current span {
      border-color: var(--text);
      color: var(--bg);
      background: var(--text);
    }

    .pagination-disabled span {
      opacity: 0.5;
    }

    /* Waveform visual elements (decorative) */
    .waveform-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 400px;
      opacity: 0.03;
      z-index: -1;
      pointer-events: none;
      background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, #fff 2px, #fff 4px);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
    }

    /* Tags / Taxonomies */
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: flex-start; }
      h1 { font-size: 2.25rem; }
      .site-footer { flex-direction: column; gap: 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default('') }}">
  <div class="waveform-bg"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <div class="eq-logo">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
        {{ site.title }}
      </a>
      <nav>
        <a href="{{ base_url }}/">Discover</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
      <div class="footer-left">
        &copy; {{ current_year }} {{ site.title }}. All rights reserved.
      </div>
      <div class="footer-right">
        Powered by Hwaro
      </div>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
