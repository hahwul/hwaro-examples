{% extends "base.html" %}

{% block content %}
<section class="taxonomy-list">
    <h2 class="rough-edges">{{ taxonomy.name | capitalize }}</h2>
    <div class="content-block rough-edges">
        <ul class="custom-list">
            {% for term in terms %}
            <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
            {% endfor %}
        </ul>
    </div>
</section>
{% endblock %}
