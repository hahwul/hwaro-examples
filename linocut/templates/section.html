{% extends "base.html" %}

{% block content %}
<section class="section-container">
    <h2 class="rough-edges">{{ section.title }}</h2>
    <div class="section-content content-block rough-edges">
        {{ content | safe }}
    </div>

    <div class="pages-list">
        {% for page in section.pages %}
        <div class="page-item content-block rough-edges">
            <h3><a href="{{ page.permalink }}">{{ page.title }}</a></h3>
            {% if page.summary %}
            <p>{{ page.summary | safe }}</p>
            {% endif %}
            <a href="{{ page.permalink }}" class="btn">Read More</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
