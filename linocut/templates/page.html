{% extends "base.html" %}

{% block content %}
<article class="prose content-block rough-edges">
    <h2 class="rough-edges">{{ page.title }}</h2>
    {% if page.date %}
    <p class="meta">Carved on {{ page.date | date(format="%B %d, %Y") }}</p>
    {% endif %}
    <div class="page-body">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
