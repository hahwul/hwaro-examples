{% extends "base.html" %}

{% block content %}
<div class="hero-section">
    <div class="hero-content">
        <h1 class="hero-title">{{ section.title }}</h1>
        <div class="hero-description">
            {{ section.content | safe }}
        </div>
    </div>
</div>

<div class="collection-grid">
    {% for page in section.pages %}
    <article class="collection-item">
        <div class="item-inner">
            <h2 class="item-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.date %}
            <div class="item-meta">
                <span class="item-date">{{ page.date | date(format="%B %d, %Y") }}</span>
            </div>
            {% endif %}
            <p class="item-description">{{ page.description }}</p>
            <a href="{{ page.permalink }}" class="read-more">View Collection</a>
        </div>
    </article>
    {% endfor %}
</div>
{% endblock content %}
