{% extends "base.html" %}

{% block title %}Taxonomies | {{ site.title }}{% endblock %}

{% block content %}
<article class="illuminated-page">
    <header class="page-header">
        <h1>Taxonomies</h1>
        <div class="meta-date">Categorized Scrolls</div>
    </header>

    <div class="page-layout">
        <div class="main-column">
            <ul class="chronicle-list">
                {% for taxonomy in site.taxonomies %}
                <li>
                    <h2><a href="{{ site.base_url }}/{{ taxonomy.name }}">{{ taxonomy.name | capitalize }}</a></h2>
                </li>
                {% endfor %}
            </ul>
        </div>
        
        <aside class="marginalia">
            <div class="marginalia-item">
                <div class="marginalia-drawing">&#x269C;</div>
                <p>The archives are vast and varied.</p>
            </div>
        </aside>
    </div>
</article>
{% endblock %}
