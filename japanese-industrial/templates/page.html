{% extends "base.html" %}

{% block content %}
    <article>
        <h1>{{ page.title }}</h1>
        {% if page.date %}
            <div style="font-family: monospace; font-size: 0.9rem; color: var(--color-accent); margin-bottom: 2rem; border-bottom: 1px solid var(--color-black); padding-bottom: 0.5rem; display: inline-block;">
                DATE_LOG: {{ page.date }}
            </div>
        {% endif %}

        <div class="page-content">
            {{ page.content | safe }}
        </div>
    </article>

    <div class="decor-line"></div>
    <a href="{{ base_url }}/" style="text-transform: uppercase; font-size: 0.9rem;">&lt;&lt; Return to Base</a>
{% endblock content %}
