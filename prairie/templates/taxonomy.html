{% include "header.html" %}
  <h1 class="text-3xl font-semibold text-earth mb-8">{{ taxonomy_name | title }}</h1>
  <div class="flex flex-wrap gap-3">
    {% for term in taxonomy_terms %}
    <a href="{{ term.url }}" class="px-4 py-2 bg-prairie-card border border-wheat/20 rounded hover:border-wheat/40 text-earth/70 hover:text-earth transition-all text-sm">
      {{ term.name }} <span class="text-earth/30">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
