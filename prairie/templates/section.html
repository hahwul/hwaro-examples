{% include "header.html" %}
  <header class="mb-12">
    <h1 class="text-3xl font-semibold text-earth mb-2">{{ section.title }}</h1>
    {{ content }}
  </header>
  <div class="space-y-8">
    {% for post in section.pages %}
    <a href="{{ post.url }}" class="block p-6 bg-prairie-card border border-wheat/10 rounded hover:border-wheat/30 transition-all group">
      <h2 class="text-xl font-medium text-earth group-hover:text-wheat-dark transition-colors mb-2">{{ post.title }}</h2>
      <div class="flex items-center gap-4 text-sm text-earth/40 mb-3">
        <time>{{ post.date }}</time>
      </div>
      {% if post.summary %}
      <p class="text-earth/60 line-clamp-2">{{ post.summary | strip_html | truncate_words(30) }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
  {{ pagination }}
{% include "footer.html" %}
