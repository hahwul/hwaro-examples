{% include "header.html" %}

<header class="article-header">
  <h1 class="taxonomy-title">All {{ taxonomy.name | capitalize }}</h1>
</header>

<div class="tag-list" style="max-width: 800px; margin: 0 auto;">
  {% for term in taxonomy_terms %}
    <a href="{{ term.permalink }}" class="tag-pill">{{ term.name }} <span style="opacity: 0.6; font-size: 0.8em; margin-left: 5px;">({{ term.pages | length }})</span></a>
  {% endfor %}
</div>

{% include "footer.html" %}
