<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="venue-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="House Lights home">
        <svg viewBox="0 0 56 44" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- truss bar -->
          <rect x="2" y="8" width="52" height="4" fill="#d4d7db"/>
          <rect x="2" y="14" width="52" height="2" fill="#6b7280"/>
          <line x1="4" y1="12" x2="4" y2="16" stroke="#6b7280" stroke-width="1"/>
          <line x1="14" y1="12" x2="14" y2="16" stroke="#6b7280" stroke-width="1"/>
          <line x1="24" y1="12" x2="24" y2="16" stroke="#6b7280" stroke-width="1"/>
          <line x1="34" y1="12" x2="34" y2="16" stroke="#6b7280" stroke-width="1"/>
          <line x1="44" y1="12" x2="44" y2="16" stroke="#6b7280" stroke-width="1"/>
          <!-- PAR can -->
          <rect x="10" y="18" width="8" height="12" fill="#1f2937" stroke="#d4d7db" stroke-width="1"/>
          <rect x="26" y="18" width="8" height="12" fill="#1f2937" stroke="#d4d7db" stroke-width="1"/>
          <rect x="42" y="18" width="8" height="12" fill="#1f2937" stroke="#d4d7db" stroke-width="1"/>
          <!-- beam cones -->
          <polygon points="10,30 18,30 22,42 6,42" fill="#f0c330" opacity="0.4"/>
          <polygon points="26,30 34,30 38,42 22,42" fill="#c21d42" opacity="0.4"/>
          <polygon points="42,30 50,30 54,42 38,42" fill="#2b77d4" opacity="0.4"/>
        </svg>
        <span class="logo-text">HOUSE LIGHTS</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">VENUE</a>
        <a href="{{ base_url }}/rig/">RIG</a>
        <a href="{{ base_url }}/schedule/">SCHEDULE</a>
        <a href="{{ base_url }}/crew/">CREW</a>
      </nav>
    </header>
