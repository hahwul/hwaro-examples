{% include "header.html" %}

<main class="max-w-4xl mx-auto px-6 py-16">

  <div class="mb-12">
    <div class="hud-label mb-3">// taxonomy index</div>
    <h1 class="glow-text text-4xl font-mono font-semibold mb-4">
      {{ page.title | default(value="Tags") }}
    </h1>
    <p style="color: rgba(226,232,240,0.45); font-style: italic;">
      Classification system for the abyssal archive.
    </p>
    <div class="mt-6 h-px" style="background-color: rgba(34,211,238,0.2); box-shadow: 0 0 6px rgba(34,211,238,0.1);"></div>
  </div>

  <div class="flex flex-wrap gap-3">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/tags/{{ term.name }}/" class="tag-pill text-sm py-2 px-4">
      {{ term.name }}
      {% if term.count %}
      <span class="ml-2 opacity-50">({{ term.count }})</span>
      {% endif %}
    </a>
    {% endfor %}
  </div>

</main>

{% include "footer.html" %}
