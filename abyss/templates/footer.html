  <script>
    // Depth / pressure scroll simulation
    (function() {
      var overlay   = document.getElementById('depthOverlay');
      var navDepth  = document.getElementById('navDepth');
      var navPressure = document.getElementById('navPressure');
      var footPressure = document.getElementById('footerPressure');

      var MAX_DEPTH = 10924; // Challenger Deep in metres
      var MAX_DARK  = 0.55;  // max overlay opacity

      function update() {
        var scrolled = window.scrollY;
        var total    = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        var ratio    = Math.min(1, scrolled / total);

        // Darken overlay
        if (overlay) overlay.style.opacity = (ratio * MAX_DARK).toFixed(3);

        // Depth + pressure HUD
        var depth    = Math.round(ratio * MAX_DEPTH);
        var pressure = (1 + depth * 0.1).toFixed(1); // ~0.1 atm per 10 m

        var depthStr = String(depth).padStart(4, '0') + ' m';
        if (navDepth)    navDepth.textContent    = depthStr;
        if (navPressure) navPressure.textContent = pressure + ' atm';
        if (footPressure) footPressure.textContent = pressure;
      }

      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>
