{% include "header.html" %}

<header class="taxonomy-header">
  <div class="container container--wide">
    <h1 class="taxonomy-title">{{ taxonomy_name | default("Tags") }}</h1>
    <p class="taxonomy-subtitle">Browse all terms</p>
  </div>
</header>

<div class="taxonomy-list">
  <div class="container container--wide">
    {{ content | safe }}
    {% if taxonomy_terms %}
    {% for term in taxonomy_terms %}
    <div class="taxonomy-term-item">
      <a href="{{ term.url }}">{{ term.name }}</a>
      <span class="taxonomy-term-count">{{ term.pages | length }}</span>
    </div>
    {% endfor %}
    {% endif %}
  </div>
</div>

{% include "footer.html" %}
