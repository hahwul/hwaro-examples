{% include "header.html" %}

  <main class="site-main">
    <header class="section-header">
      <h1>{{ page.title }}</h1>
    </header>

    {{ content | safe }}

    <ul class="post-list">
      {% for item in section.pages %}
      <li class="post-card">
        <a href="{{ base_url }}{{ item.url }}">
          <span class="post-card-date">{{ item.date }}</span>
          <span class="post-card-title">{{ item.title }}</span>
          {% if item.description %}
          <span class="post-card-desc">{{ item.description }}</span>
          {% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>

    {{ pagination }}
  </main>

{% include "footer.html" %}
