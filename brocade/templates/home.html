<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <title>{{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="home-hero">
    <div class="home-pattern"></div>
    <div class="home-content">
      <p class="home-label">Est. MMXXVI</p>
      <h1 class="home-title">{{ site.title }}</h1>
      <div class="home-divider">
        <span class="divider-diamond"></span>
      </div>
      <p class="home-subtitle">{{ site.description }}</p>
      <nav class="home-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
    <div class="home-footer">
      <p>&copy; 2026 <a href="{{ base_url }}/">{{ site.title }}</a>
        &#183; <a href="{{ base_url }}/rss.xml" target="_blank" title="RSS">RSS</a>
      </p>
      <p>Powered by <a href="https://github.com/hahwul/hwaro" target="_blank" rel="noopener">Hwaro</a></p>
    </div>
  </div>
</body>
</html>
