<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">

    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Proposal home">

          <rect x="6" y="2" width="28" height="36" rx="2" fill="none" stroke="#1a5276" stroke-width="1.5"/>
          <line x1="11" y1="10" x2="29" y2="10" stroke="#1a5276" stroke-width="1" opacity="0.4"/>
          <line x1="11" y1="15" x2="25" y2="15" stroke="#1a5276" stroke-width="1" opacity="0.4"/>
          <line x1="11" y1="20" x2="27" y2="20" stroke="#1a5276" stroke-width="1" opacity="0.4"/>
          <circle cx="34" cy="28" r="10" fill="none" stroke="#1a5276" stroke-width="1.5"/>
          <text x="34" y="33" text-anchor="middle" font-family="serif" font-size="14" font-weight="700" fill="#1a5276">$</text>
        </svg>
        <span class="logo-text">
          <span class="agency-name">National Science Foundation</span>
          <span class="proposal-ref">Award No. NSF-CBET-2026-04182</span>
        </span>
      </a>
      <nav class="site-nav">
