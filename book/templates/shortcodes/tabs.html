<div class="tabs" data-tabs-id="{{ id | default(value="default") }}">
  <div class="tabs-header">
    {% for tab in items %}
      <button class="{% if loop.first %}active{% endif %}" data-tab="{{ loop.index }}">{{ tab }}</button>
    {% endfor %}
  </div>
  {{ content }}
</div>
<script>
document.querySelectorAll('.tabs').forEach(tabs => {
  const btns = tabs.querySelectorAll('.tabs-header button');
  const panels = tabs.querySelectorAll('.tab-content');
  btns.forEach((btn, i) => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      if (panels[i]) panels[i].classList.add('active');
    });
  });
});
</script>
