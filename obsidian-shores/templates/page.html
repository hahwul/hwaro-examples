{% include "header.html" %}

<div class="container">
    <article class="glass-panel content-area">
        <h1>{{ page.title }}</h1>
        {% if page.date is defined and page.date %}
        <span class="post-meta">{{ page.date | date("%Y-%m-%d") }}</span>
        {% endif %}
        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</div>
