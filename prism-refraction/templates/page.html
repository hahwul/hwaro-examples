{% include "header.html" %}

<article class="prism-card">
    <h1 class="page-title" data-text="{{ page.title }}">{{ page.title }}</h1>

    {% if page.date %}
    <time class="post-date">{{ page.date | date(format="%B %d, %Y") }}</time>
    {% endif %}

    <div class="content-body">
        {{ page.content | safe }}
    </div>
</article>

{% include "footer.html" %}
