{% include "header.html" %}
<style>
  .error-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
  }

  .error-code {
    font-size: 120px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--solar-gold), var(--mars-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .error-message {
    font-size: 24px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  .error-link {
    display: inline-block;
    padding: 12px 32px;
    background: var(--card-bg);
    border: 1px solid var(--solar-gold);
    border-radius: 8px;
    color: var(--solar-gold);
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .error-link:hover {
    background: var(--solar-gold);
    color: var(--deep-space);
    box-shadow: 0 0 20px rgba(244, 208, 63, 0.3);
  }
</style>

<div class="error-container">
  <div class="error-code">404</div>
  <p class="error-message">Mission coordinates not found</p>
  <a href="{{ base_url }}" class="error-link">Return to Mission Control</a>
</div>
