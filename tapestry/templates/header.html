<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{% if page.title == site.title %}{{ site.title }}{% else %}{{ page.title }} - {{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  {{ canonical_tag }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: {
              50: '#faf8f4',
              100: '#f5f0e8',
              200: '#ebe5d9',
              300: '#d9cfc0',
              400: '#c4b69e',
              500: '#a99a7e',
              600: '#8a7b62',
            },
            ink: {
              DEFAULT: '#3d2b1f',
              light: '#5c4433',
              muted: '#7a6555',
            },
            era: {
              ancient: '#96572a',
              medieval: '#2d6a3f',
              renaissance: '#2c4f7c',
              modern: '#8b2c2c',
            }
          },
          fontFamily: {
            serif: ['Crimson Text', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    body {
      @apply bg-parchment-50 text-ink font-serif antialiased;
    }

    .timeline-line {
      @apply absolute left-1/2 top-0 bottom-0 w-px bg-parchment-400;
      transform: translateX(-50%);
    }

    .timeline-dot {
      @apply absolute left-1/2 w-3 h-3 rounded-full border-2 border-parchment-300 bg-parchment-50;
      transform: translateX(-50%);
      top: 2rem;
    }

    .timeline-item:nth-child(odd) .timeline-card {
      @apply mr-auto pr-12;
      margin-right: calc(50% + 1.5rem);
    }

    .timeline-item:nth-child(even) .timeline-card {
      @apply ml-auto pl-12;
      margin-left: calc(50% + 1.5rem);
    }

    .timeline-item:nth-child(odd) .timeline-dot {
      right: auto;
    }

    .timeline-item:nth-child(even) .timeline-dot {
      left: 50%;
    }

    .era-ancient { @apply border-era-ancient; }
    .era-ancient .timeline-dot { @apply bg-era-ancient border-era-ancient; }
    .era-ancient .era-label { @apply text-era-ancient; }

    .era-medieval { @apply border-era-medieval; }
    .era-medieval .timeline-dot { @apply bg-era-medieval border-era-medieval; }
    .era-medieval .era-label { @apply text-era-medieval; }

    .era-renaissance { @apply border-era-renaissance; }
    .era-renaissance .timeline-dot { @apply bg-era-renaissance border-era-renaissance; }
    .era-renaissance .era-label { @apply text-era-renaissance; }

    .era-modern { @apply border-era-modern; }
    .era-modern .timeline-dot { @apply bg-era-modern border-era-modern; }
    .era-modern .era-label { @apply text-era-modern; }

    .prose-tapestry h1, .prose-tapestry h2, .prose-tapestry h3 {
      @apply font-serif text-ink;
    }
    .prose-tapestry h1 { @apply text-3xl font-bold mb-4; }
    .prose-tapestry h2 { @apply text-2xl font-bold mt-10 mb-4; }
    .prose-tapestry h3 { @apply text-xl font-bold mt-8 mb-3; }
    .prose-tapestry p { @apply text-lg leading-relaxed mb-5 text-ink-light; }
    .prose-tapestry ul, .prose-tapestry ol { @apply text-lg leading-relaxed mb-5 pl-6 text-ink-light; }
    .prose-tapestry li { @apply mb-2; }
    .prose-tapestry strong { @apply text-ink font-bold; }
    .prose-tapestry a { @apply text-era-renaissance underline underline-offset-2 decoration-parchment-400 hover:decoration-era-renaissance transition-colors; }
    .prose-tapestry blockquote { @apply border-l-2 border-parchment-400 pl-5 italic text-ink-muted my-6; }
    .prose-tapestry hr { @apply border-parchment-300 my-10; }

    @media (max-width: 768px) {
      .timeline-line {
        @apply left-6;
      }
      .timeline-dot {
        @apply left-6;
      }
      .timeline-item:nth-child(odd) .timeline-card,
      .timeline-item:nth-child(even) .timeline-card {
        margin-left: 3.5rem;
        margin-right: 0;
        padding-left: 0;
        padding-right: 0;
      }
    }
  </style>
  {{ highlight_css }}
</head>
<body>
