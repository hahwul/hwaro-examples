{% include "header.html" %}

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
  <div class="text-center mb-16">
    <h1 class="text-4xl md:text-5xl font-serif text-brand-black mb-6">{{ taxonomy_name | capitalize }}</h1>
    <p class="text-lg text-brand-gray font-light max-w-2xl mx-auto">Explore properties by {{ taxonomy_name }}.</p>
  </div>

  <div class="flex flex-wrap justify-center gap-6">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term }}" class="btn-outline bg-white hover:bg-brand-black hover:text-white transition-colors py-4 px-8 text-sm uppercase tracking-widest font-medium border border-gray-200 shadow-sm">
      {{ term | capitalize }}
    </a>
    {% endfor %}
  </div>
</div>

{% include "footer.html" %}
