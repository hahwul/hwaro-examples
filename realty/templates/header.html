<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              gold: '#C5A880',
              black: '#1A1A1A',
              offwhite: '#F9F8F6',
              gray: '#8C8C8C',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F9F8F6;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
    }
    .hero-image {
      object-fit: cover;
      width: 100%;
      height: 70vh;
      min-height: 500px;
    }
    .gold-accent {
      color: #C5A880;
    }
    .btn-primary {
      background-color: #1A1A1A;
      color: #FFFFFF;
      transition: background-color 0.3s ease;
      display: inline-block;
      padding: 1rem 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .btn-primary:hover {
      background-color: #C5A880;
    }
    .btn-outline {
      border: 1px solid #1A1A1A;
      color: #1A1A1A;
      transition: all 0.3s ease;
      display: inline-block;
      padding: 1rem 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .btn-outline:hover {
      background-color: #1A1A1A;
      color: #FFFFFF;
    }
    .property-card {
      background-color: #FFFFFF;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .property-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }
    .property-img {
      height: 300px;
      object-fit: cover;
      width: 100%;
    }
    nav a.nav-link {
      position: relative;
    }
    nav a.nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 0;
      background-color: #C5A880;
      transition: width 0.3s ease;
    }
    nav a.nav-link:hover::after {
      width: 100%;
    }
  </style>
</head>
<body class="font-sans flex flex-col min-h-screen">

  <header class="bg-brand-offwhite border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-24">
        <div class="flex-shrink-0 flex items-center">
          <a href="{{ base_url }}/" class="font-serif text-3xl font-bold tracking-tight text-brand-black">Aura<span class="gold-accent">.</span></a>
        </div>
        <nav class="hidden md:flex space-x-10">
          <a href="{{ base_url }}/" class="nav-link text-brand-black text-sm uppercase tracking-widest font-medium">Home</a>
          <a href="{{ base_url }}/properties/" class="nav-link text-brand-black text-sm uppercase tracking-widest font-medium">Properties</a>
          <a href="{{ base_url }}/about/" class="nav-link text-brand-black text-sm uppercase tracking-widest font-medium">Agents</a>
          <a href="{{ base_url }}/contact/" class="nav-link text-brand-black text-sm uppercase tracking-widest font-medium">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-grow">
