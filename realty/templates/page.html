{% include "header.html" %}

<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <header class="mb-12 text-center">
    <h1 class="text-4xl md:text-5xl font-serif text-brand-black mb-6">{{ page.title }}</h1>
    {% if page.description %}
    <p class="text-lg text-brand-gray font-light max-w-2xl mx-auto">{{ page.description }}</p>
    {% endif %}
  </header>

  {% if page.image %}
  <div class="mb-16">
    <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-auto object-cover rounded-sm shadow-sm" style="max-height: 600px;">
  </div>
  {% endif %}

  <div class="prose prose-lg prose-gray mx-auto font-light leading-relaxed text-brand-black max-w-none">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
