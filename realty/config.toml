title = "Aura Real Estate"
description = "Luxury real estate and premium property showcase"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "locations"
feed = false

[[taxonomies]]
name = "tags"
feed = false

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
lazy_loading = true
