<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(site.title) }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbf8; /* soft cream background */
            --text-color: #3b3530; /* warm dark brown/grey */
            --link-color: #8c6b5d; /* warm muted brown for links */
            --meta-color: #9c928a; /* soft grey for dates/meta */
            --border-color: #e8e3dc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Lora', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Caveat', cursive;
            font-weight: 500;
            color: var(--text-color);
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        h1 {
            font-size: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        h2 {
            font-size: 2.2rem;
        }
        a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        a:hover {
            border-bottom: 1px solid var(--link-color);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }
        header.site-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .site-title {
            font-size: 4rem;
            margin: 0;
            border: none;
        }
        .site-title a {
            color: var(--text-color);
            border: none;
        }
        .site-nav {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-style: italic;
        }
        .site-nav a {
            margin: 0 0.5rem;
        }
        p {
            margin-bottom: 1.2rem;
        }
        .post-meta {
            color: var(--meta-color);
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 1.5rem;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post-list li {
            margin-bottom: 3rem;
        }
        .post-list h2 {
            margin-bottom: 0.2rem;
            margin-top: 0;
        }
        .post-summary {
            margin-top: 1rem;
        }
        .read-more {
            font-style: italic;
            font-size: 0.95rem;
            color: var(--meta-color);
        }
        .tags {
            margin-top: 1rem;
            font-size: 0.9rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .tags a {
            color: var(--meta-color);
            border-bottom: 1px dotted var(--meta-color);
        }
        .tags a:hover {
            color: var(--text-color);
            border-bottom-color: var(--text-color);
        }
        footer.site-footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--meta-color);
            font-size: 0.9rem;
            font-style: italic;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        code {
            font-family: monospace;
            background-color: var(--border-color);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-size: 0.9em;
        }
        pre {
            background-color: #f0ebe1;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }
        pre code {
            background-color: transparent;
            padding: 0;
        }
        blockquote {
            border-left: 3px solid var(--border-color);
            margin-left: 0;
            padding-left: 1rem;
            font-style: italic;
            color: #6a6159;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
            <div class="site-nav">
                <a href="{{ base_url }}/">Entries</a>
                <a href="{{ base_url }}/tags/">Tags</a>
            </div>
        </header>
        <main>
