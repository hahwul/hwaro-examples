{% include "header.html" %}

<article class="post">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
        {{ page.date | date("%B %d, %Y") }}
        {% if page.taxonomies and page.taxonomies.tags %}
            <div class="tags">
                {% for tag in page.taxonomies.tags %}
                    <a href="{{ base_url }}/tags/{{ tag | slugify }}/">#{{ tag }}</a>
                {% endfor %}
            </div>
        {% endif %}
    </div>

    <div class="post-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
