<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120; /* Deep rich navy */
            --text-color: #f1ebd9; /* Soft parchment/cream */
            --accent-color: #d4af37; /* Solid gold */
            --border-color: rgba(212, 175, 55, 0.3); /* Subtle gold border */
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Lato', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-serif);
            line-height: 1.8;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease, border-bottom-color 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        a:hover {
            color: #fff;
            border-bottom-color: var(--accent-color);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
        }

        header {
            padding: 4rem 0 3rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4rem;
        }

        .site-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            border: none;
        }

        .site-title:hover {
            color: var(--accent-color);
            border: none;
        }

        .site-subtitle {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(241, 235, 217, 0.7);
        }

        nav {
            margin-top: 2rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        nav a {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
            color: var(--text-color);
        }

        nav a:hover, nav a.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        main {
            flex: 1;
        }

        /* Markdown Content Styling */
        .content-area p {
            margin-bottom: 1.5rem;
            color: rgba(241, 235, 217, 0.9);
        }

        .content-area ul, .content-area ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
            color: rgba(241, 235, 217, 0.9);
        }

        .content-area li {
            margin-bottom: 0.5rem;
        }

        .content-area blockquote {
            border-left: 3px solid var(--accent-color);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            font-size: 1.2rem;
            color: rgba(241, 235, 217, 0.8);
        }

        .content-area hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 3rem 0;
        }

    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <div class="site-subtitle">{{ site.description }}</div>
            <nav>
                <ul>
                    <li><a href="{{ base_url }}/">Home</a></li>
                    <li><a href="{{ base_url }}/about/">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
