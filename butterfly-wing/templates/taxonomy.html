{% extends "base.html" %}

{% block content %}
<div class="section-header" style="margin-bottom: 3rem; text-align: center;">
    <h1 class="glow-text-magenta">Taxonomies</h1>
    <p class="content" style="font-size: 1.2rem;">Explore the structural taxonomy of the site.</p>
</div>

<div class="card" style="text-align: center;">
    <div class="tag-list" style="justify-content: center; gap: 1.5rem;">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="tag" style="font-size: 1.1rem; padding: 0.6rem 1.5rem;">{{ term }}</a>
        {% endfor %}
    </div>
</div>
{% endblock %}
