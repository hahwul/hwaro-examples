<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page_description %}{{ page_description }}{% else %}{{ site.description }}{% endif %}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f15;
            --text-color: #e0e0e0;
            --accent-blue: #00f3ff;
            --accent-magenta: #ff00f3;
            --accent-gold: #ffd700;
            --card-bg: rgba(255, 255, 255, 0.03);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            padding: 3rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 3rem;
        }

        .site-title {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 243, 0.5);
            letter-spacing: 1px;
        }

        .site-title:hover {
            color: #ffffff;
            text-shadow: 0 0 25px rgba(255, 0, 243, 0.8);
        }

        nav a {
            margin-left: 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: #cccccc;
        }

        nav a:hover {
            color: var(--accent-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 243, 0.6);
        }

        main {
            min-height: 60vh;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.15), 0 0 20px rgba(0, 243, 255, 0.1) inset;
        }

        .post-title {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: #ffffff;
        }

        .post-title a:hover {
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .post-meta {
            font-size: 0.9rem;
            color: #888888;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .content {
            font-size: 1.1rem;
            color: #d0d0d0;
        }

        .content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .content p {
            margin-bottom: 1.5rem;
        }

        .content blockquote {
            margin: 2rem 0;
            padding: 1.5rem 2rem;
            border-left: 4px solid var(--accent-magenta);
            background-color: rgba(255, 0, 243, 0.05);
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-style: italic;
            border-radius: 0 8px 8px 0;
            box-shadow: inset 0 0 20px rgba(255, 0, 243, 0.05);
        }

        .tag-list {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .tag {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--accent-gold);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
        }

        .tag:hover {
            background-color: rgba(255, 215, 0, 0.1);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            border-color: rgba(255, 215, 0, 0.5);
        }

        footer {
            margin-top: 5rem;
            padding: 3rem 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #777777;
            font-size: 0.9rem;
        }

        /* Glowing text elements */
        .glow-text-blue {
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .glow-text-magenta {
            color: var(--accent-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 243, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/posts/">Posts</a>
                <a href="{{ base_url }}/tags/">Tags</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
