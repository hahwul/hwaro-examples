{% include "header.html" %}

<main>
    <div class="container">
        <div class="glass-panel">
            <h1>{{ page.title | e }}</h1>

            {% if content %}
            <div class="prose">
                {{ content | safe }}
            </div>
            {% endif %}

            <div class="section-pages">
                {% for p in section.pages %}
                <article class="page-summary">
                    <h2><a href="{{ p.permalink }}">{{ p.title }}</a></h2>
                    {% if p.description %}
                    <p>{{ p.description }}</p>
                    {% endif %}
                </article>
                {% endfor %}
            </div>

            {{ pagination }}
        </div>
    </div>
</main>

{% include "footer.html" %}
