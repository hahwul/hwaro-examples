# =============================================================================
# Site Configuration
# =============================================================================

title = "Supreme Sun"
description = "An elegant community board for sharing stories and ideas."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = true
per_page = 15

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"
feed = true

[[taxonomies]]
name = "authors"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[markdown]
safe = false
emoji = false

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["notice", "daily", "photos", "qa"]
