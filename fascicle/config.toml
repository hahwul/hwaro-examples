# =============================================================================
# Fascicle - An Unbound Installment Publication
# Issue #1552 | Tags: book, light, serial, unbound, installment
# =============================================================================

title = "FASCICLE - An Unbound Installment Publication"
description = "A serial publication issued in unbound fascicles - loose gatherings within printed wrapper bands, delivered to subscribers in periodic installments. Period serial typography in Old Standard TT and Libre Baskerville."
base_url = "http://localhost:3000"

sections = ["issues"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "series"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A serial publication of unbound fascicles. Scholarly use; please cite if referenced."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["issues"]

[markdown]
safe = false
lazy_loading = false
emoji = false
