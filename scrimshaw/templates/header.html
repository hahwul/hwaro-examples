<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #000000;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #000000;
      --bg: #ffffff;
      --bg-subtle: #f0f0f0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; border-left: 4px solid var(--primary); border-right: 4px solid var(--primary); min-height: 100vh; display: flex; flex-direction: column; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 4px solid var(--primary); margin-bottom: 3rem; }
    .site-logo { font-weight: 900; font-size: 2rem; color: var(--primary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo:hover { background-color: var(--primary); color: var(--bg); }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--primary); text-decoration: none; font-size: 1rem; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid transparent; }
    .site-header nav a:hover { border-bottom-color: var(--primary); }
    .site-main { flex: 1; margin-bottom: 3rem; }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 2em; margin-bottom: 0.5em; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
    h1 { font-size: 3rem; margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    p { margin: 1.5em 0; font-size: 1.1rem; }
    a { color: var(--primary); text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; font-weight: bold; }
    a:hover { background-color: var(--primary); color: var(--bg); }
    code { background: var(--primary); color: var(--bg); padding: 0.2rem 0.4rem; font-size: 0.9em; font-family: monospace; font-weight: bold; }
    pre { background: var(--bg-subtle); padding: 1.5rem; overflow-x: auto; border: 2px solid var(--primary); }
    pre code { background: none; color: var(--text); padding: 0; font-weight: normal; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; border: 2px solid var(--primary); position: relative; }
    ul.section-list li::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--primary); transition: width 0.2s ease; z-index: -1; }
    ul.section-list li:hover::before { width: 100%; }
    ul.section-list li a { font-weight: 700; font-size: 1.2rem; text-decoration: none; display: block; color: var(--primary); }
    ul.section-list li:hover a { color: var(--bg); }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.2rem; font-weight: bold; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: flex-start; }
      h1 { font-size: 2.5rem; }
      .site-wrapper { border-left: none; border-right: none; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title | default("SCRIMSHAW") }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
      </nav>
    </header>
