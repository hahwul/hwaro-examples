{% include "header.html" %}

<article>
    <header>
        <h2>{{ page.title }}</h2>
        {% if page.date %}
        <div class="post-meta">Published on {{ page.date | date("%B %d, %Y") }}</div>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
