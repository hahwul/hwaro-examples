<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} | {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ highlight_css }}
  {{ auto_includes_css }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-jp">東京</span>
        <span class="logo-en">Neon Tokyo</span>
      </a>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="{{ base_url }}/">ホーム</a></li>
          <li><a href="{{ base_url }}/posts/">記事</a></li>
          <li><a href="{{ base_url }}/about/">概要</a></li>
        </ul>
      </nav>
    </div>
  </header>
