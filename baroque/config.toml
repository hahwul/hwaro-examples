# =============================================================================
# Baroque - Site Configuration
# =============================================================================
# Lavish gold scrollwork, dramatic symmetry, and opulent ornamental design.

title = "Baroque"
description = "Ornamental grandeur with lavish gold scrollwork, dramatic symmetry, and opulent details."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 5

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
