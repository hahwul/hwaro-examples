{% include "header.html" %}
  <main class="screening">
    <div class="eyebrow">Section</div>
    <h1 style="font-family:'Cinzel Decorative',serif;font-weight:900;font-size:3.2rem;color:#e2b95a;text-transform:uppercase;letter-spacing:0.02em;margin:0.3rem 0 0.5rem;">{{ page.title | e }}</h1>
    {% if page.description is present %}
      <p style="font-family:'Raleway',sans-serif;font-style:italic;font-size:1.2rem;color:#bfa074;margin-bottom:2rem;">{{ page.description }}</p>
    {% endif %}
    <div class="page-article" style="max-width:960px;margin:0;">{{ content }}</div>
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
