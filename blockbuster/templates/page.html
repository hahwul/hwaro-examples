{% include "header.html" %}
  <main class="screening">
    <article class="page-article">
      {% if page.title is present %}
        <div class="eyebrow">{% if page.section is present %}{{ page.section }}{% else %}Blockbuster{% endif %}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description is present %}
          <p style="font-family:'Raleway',sans-serif;font-style:italic;font-size:1.2rem;color:#bfa074;margin-bottom:2rem;">{{ page.description }}</p>
        {% endif %}
      {% endif %}
      {{ content }}
    </article>
  </main>
{% include "footer.html" %}
