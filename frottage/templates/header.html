<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #000000;
      --text: #111111;
      --text-muted: #666666;
      --border: #dddddd;
      --bg: #ffffff;
      --bg-subtle: #f9f9f9;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        color: var(--text);
        background-color: var(--bg);
        position: relative;
    }
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1;}
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 3rem 0; border-bottom: 2px solid var(--text); margin-bottom: 4rem; }
    .site-logo { font-weight: 700; font-size: 2rem; letter-spacing: -0.05em; color: var(--text); text-decoration: none; text-transform: uppercase; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .site-header nav a:hover { text-decoration: underline; text-underline-offset: 4px; }
    .site-main { min-height: calc(100vh - 300px); font-size: 1.1rem; }
    .site-footer { margin-top: 5rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Typography */
    h1, h2, h3 { line-height: 1.1; margin-top: 2em; margin-bottom: 0.5em; font-weight: 700; letter-spacing: -0.03em; }
    h1 { font-size: 3.5rem; margin-top: 0; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    p { margin: 1.5em 0; }
    a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
    a:hover { color: var(--text-muted); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; font-size: 0.85em; font-family: ui-monospace, monospace; border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1.5rem; overflow-x: auto; border: 1px solid var(--text); }
    pre code { background: none; padding: 0; border: none; }
    blockquote { margin: 2rem 0; padding: 1rem 2rem; border-left: 4px solid var(--text); font-style: italic; background: var(--bg-subtle); }

    /* Components */
    ul { padding-left: 1.5rem; }
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; border-top: 1px solid var(--border); }
    ul.section-list li { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
    ul.section-list li a { font-weight: 600; font-size: 1.25rem; text-decoration: none; display: block; }
    ul.section-list li a:hover { text-decoration: underline; text-underline-offset: 4px; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; padding: 2rem 0; }
      h1 { font-size: 2.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
