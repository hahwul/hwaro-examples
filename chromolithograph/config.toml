# =============================================================================
# Chromolithograph - A Cabinet of Coloured Plates
# Issue #1564 | Tags: book, light, color-plate, print, illustration
# =============================================================================

title = "CHROMOLITHOGRAPH - A Cabinet of Coloured Plates"
description = "A color plate publication in the Victorian tradition: separated flat-colour chromolithographic illustrations with translucent tissue guards, printed in the old manner upon fine paper."
base_url = "http://localhost:3000"

sections = ["plates"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "plate_class"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A cabinet of chromolithographic plates for study. Reproductions only; originals reside in archive."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["plates"]

[markdown]
safe = false
lazy_loading = false
emoji = false
