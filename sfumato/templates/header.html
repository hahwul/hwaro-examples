<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} - {% endif %}{{ site_title }}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="site-title">{{ site_title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">home</a>
        <a href="{{ base_url }}/posts/">writings</a>
        <a href="{{ base_url }}/about/">about</a>
      </nav>
    </div>
  </header>
