{% include "header.html" %}

<div class="site-wrapper">
  <main class="site-main">
    <article class="deckle-page">
      <div class="deckle-border-top" aria-hidden="true">
        <svg width="100%" height="12" viewBox="0 0 400 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 0 8 Q 5 2, 12 6 Q 18 10, 26 5 Q 32 1, 40 7 Q 46 11, 54 6 Q 60 2, 68 7 Q 74 10, 82 5 Q 88 1, 96 6 Q 103 10, 110 6 Q 116 2, 124 7 Q 130 11, 138 5 Q 145 1, 152 7 Q 158 10, 166 5 Q 172 1, 180 6 Q 186 10, 194 5 Q 200 2, 208 7 Q 214 11, 222 6 Q 228 2, 236 7 Q 242 10, 250 5 Q 256 2, 264 7 Q 270 10, 278 6 Q 284 2, 292 7 Q 298 11, 306 5 Q 312 1, 320 6 Q 326 10, 334 5 Q 340 1, 348 7 Q 354 10, 362 6 Q 368 2, 376 7 Q 382 10, 390 5 Q 396 2, 400 6" fill="none" stroke="#c4b08a" stroke-width="1"/>
        </svg>
      </div>

      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-subtitle">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="deckle-body">
        {{ content | safe }}
      </div>

      {% if page.tags and page.tags | length > 0 %}
      <div class="page-tags">
        <h4 class="tags-label">Related Topics</h4>
        <div class="tag-list">
          {% for tag in page.tags %}
          <a href="{{ base_url }}/tags/{{ tag | slugify }}/">{{ tag }}</a>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      <div class="deckle-border-bottom" aria-hidden="true">
        <svg width="100%" height="12" viewBox="0 0 400 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 0 6 Q 7 2, 14 7 Q 20 11, 28 5 Q 34 1, 42 6 Q 48 10, 56 5 Q 63 1, 70 7 Q 76 10, 84 6 Q 90 2, 98 7 Q 104 10, 112 5 Q 118 1, 126 6 Q 132 10, 140 5 Q 146 2, 154 7 Q 160 11, 168 6 Q 174 2, 182 7 Q 188 10, 196 5 Q 202 1, 210 6 Q 216 10, 224 5 Q 230 2, 238 7 Q 244 10, 252 6 Q 258 2, 266 7 Q 272 10, 280 5 Q 286 1, 294 6 Q 300 10, 308 5 Q 314 2, 322 7 Q 328 11, 336 6 Q 342 2, 350 7 Q 356 10, 364 5 Q 370 1, 378 6 Q 384 10, 392 5 Q 398 2, 400 6" fill="none" stroke="#c4b08a" stroke-width="1"/>
        </svg>
      </div>
    </article>
  </main>

{% include "footer.html" %}
