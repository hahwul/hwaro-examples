<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &#8212; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <div class="stage">
    <aside class="lanyard" aria-hidden="true">
      <svg class="lanyard-svg" viewBox="0 0 72 1600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <title>Lanyard strap</title>
        <rect x="0" y="0" width="72" height="1600" fill="#1a1a1a"/>
        <rect x="24" y="0" width="24" height="1600" fill="#0d0d0d"/>
        <g stroke="#f5ff24" stroke-width="1.2">
          <line x1="24" y1="0" x2="24" y2="1600"/>
          <line x1="48" y1="0" x2="48" y2="1600"/>
        </g>
        <g fill="none" stroke="#f5ff24" stroke-width="0.8" stroke-dasharray="4 4">
          <line x1="36" y1="0" x2="36" y2="1600" opacity="0.5"/>
        </g>
        <g fill="#f5ff24" font-family="Exo 2, sans-serif" font-weight="900" font-size="13" letter-spacing="5" text-anchor="middle">
          <text x="36" y="160" transform="rotate(90 36 160)">BACKSTAGE &#183; CREW &#183; ALL ACCESS &#183;</text>
          <text x="36" y="460" transform="rotate(90 36 460)">BACKSTAGE &#183; CREW &#183; ALL ACCESS &#183;</text>
          <text x="36" y="760" transform="rotate(90 36 760)">BACKSTAGE &#183; CREW &#183; ALL ACCESS &#183;</text>
          <text x="36" y="1060" transform="rotate(90 36 1060)">BACKSTAGE &#183; CREW &#183; ALL ACCESS &#183;</text>
          <text x="36" y="1360" transform="rotate(90 36 1360)">BACKSTAGE &#183; CREW &#183; ALL ACCESS &#183;</text>
        </g>
        <g transform="translate(36, 30)" fill="#f5ff24" stroke="#f5ff24" stroke-width="1.5">
          <circle r="10" fill="#0d0d0d"/>
          <circle r="6" fill="#0d0d0d" stroke="#f5ff24"/>
          <circle r="3" fill="#f5ff24"/>
        </g>
        <g transform="translate(36, 60)" stroke="#f5ff24" stroke-width="1.2" fill="none">
          <path d="M -10 0 L 10 0 L 10 10 L -10 10 Z" fill="#f5ff24"/>
          <path d="M -6 12 L 6 12" stroke="#0d0d0d"/>
        </g>
      </svg>
    </aside>
    <main class="pass">
      <section class="masthead">
        <div class="masthead-tag">Event Credential &#183; Non-Transferable</div>
        <h1 class="masthead-title">ALL <span class="accent">ACCESS</span></h1>
        <div class="masthead-bar">
          <p class="masthead-legend">{{ site.description }}</p>
          <svg class="masthead-barcode" viewBox="0 0 140 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <title>Barcode</title>
            <rect x="0" y="0" width="140" height="44" fill="#0d0d0d"/>
            <g fill="#f3f3f3">
              <rect x="4" y="4" width="2" height="36"/>
              <rect x="8" y="4" width="1" height="36"/>
              <rect x="11" y="4" width="3" height="36"/>
              <rect x="16" y="4" width="1" height="36"/>
              <rect x="19" y="4" width="2" height="36"/>
              <rect x="23" y="4" width="4" height="36"/>
              <rect x="29" y="4" width="1" height="36"/>
              <rect x="32" y="4" width="2" height="36"/>
              <rect x="36" y="4" width="3" height="36"/>
              <rect x="41" y="4" width="1" height="36"/>
              <rect x="44" y="4" width="2" height="36"/>
              <rect x="48" y="4" width="4" height="36"/>
              <rect x="54" y="4" width="1" height="36"/>
              <rect x="57" y="4" width="3" height="36"/>
              <rect x="62" y="4" width="1" height="36"/>
              <rect x="65" y="4" width="2" height="36"/>
              <rect x="69" y="4" width="3" height="36"/>
              <rect x="74" y="4" width="1" height="36"/>
              <rect x="77" y="4" width="2" height="36"/>
              <rect x="81" y="4" width="4" height="36"/>
              <rect x="87" y="4" width="1" height="36"/>
              <rect x="90" y="4" width="3" height="36"/>
              <rect x="95" y="4" width="2" height="36"/>
              <rect x="99" y="4" width="1" height="36"/>
              <rect x="102" y="4" width="3" height="36"/>
              <rect x="107" y="4" width="2" height="36"/>
              <rect x="111" y="4" width="1" height="36"/>
              <rect x="114" y="4" width="4" height="36"/>
              <rect x="120" y="4" width="1" height="36"/>
              <rect x="123" y="4" width="2" height="36"/>
              <rect x="127" y="4" width="3" height="36"/>
              <rect x="132" y="4" width="1" height="36"/>
              <rect x="135" y="4" width="2" height="36"/>
            </g>
            <text x="70" y="42" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="500" font-size="5.6" fill="#7a7a7a" letter-spacing="1.4">2026 / ALL ACC / 00042</text>
          </svg>
        </div>
      </section>
      <section class="credential-strip">
        <div class="credential">
          <div class="credential-label sm">Holder</div>
          <div class="credential-value big">{{ site.title }}</div>
        </div>
        <div class="credential">
          <div class="credential-label sm">Pass Class</div>
          <div class="credential-value big">Tier 01</div>
        </div>
        <div class="credential">
          <div class="credential-label sm">Issue Date</div>
          <div class="credential-value">17 APR 2026</div>
        </div>
        <div class="credential">
          <div class="credential-label sm">Valid Through</div>
          <div class="credential-value">31 DEC 2026</div>
        </div>
      </section>
      <nav class="zones">
        <a href="{{ base_url }}/">Front</a>
        <a href="{{ base_url }}/runs/">Run of Show</a>
        <a href="{{ base_url }}/about/">Crew</a>
        <a href="{{ base_url }}/tags/">Zones</a>
      </nav>
