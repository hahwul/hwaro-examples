# Open Mic Configuration
title = "Open Mic"
description = "Raw Voices Night: An intimate comedy and poetry theme with sketchy aesthetics."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[og.auto_image]
enabled = true
background = "#FFF9E5"
text_color = "#333333"
accent_color = "#333333"
font_size = 48
show_title = true
style = "minimal"
format = "svg"

[markdown]
safe = false
lazy_loading = true
emoji = false
