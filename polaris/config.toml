title = "Polaris"
description = "A celestial navigation guide centered on the North Star"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "base16-ocean.dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[[taxonomies]]
name = "constellations"

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["guides"]

[markdown]
safe = false
lazy_loading = true
