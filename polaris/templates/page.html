{% include "header.html" %}
<article class="celestial-content">
    <header class="page-title-block">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <p class="observation-date">Observed: {{ page.date | date("%Y-%m-%d") }}</p>
        {% endif %}
    </header>
    <div class="content-body">
        {{ content | safe }}
    </div>
</article>
