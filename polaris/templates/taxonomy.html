<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ taxonomy_name | capitalize }} | {{ site.title | default(value='Polaris') }}</title>
    <meta name="description" content="Browse by {{ taxonomy_name }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="container">
        {% include "header.html" %}

        <main>
            <h1>{{ taxonomy_name | capitalize }}</h1>

            <div class="post-tags">
            {% for term in taxonomy_terms %}
                <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
            {% endfor %}
            </div>
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
