<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <meta name="base-url" content="{{ base_url }}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            arctic: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-[#f8fafc] text-arctic-900 selection:bg-arctic-200;
        background-image:
          radial-gradient(at 0% 0%, hsla(202, 100%, 95%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(190, 100%, 95%, 1) 0, transparent 50%);
      }
    }
    @layer components {
      .glass {
        @apply backdrop-blur-lg bg-white/70 border border-white/40 shadow-xl shadow-arctic-100/50;
      }
      .glass-hover {
        @apply transition-all duration-300 hover:bg-white/90 hover:border-white/60 hover:shadow-arctic-200/50;
      }
    }
    #searchOverlay.active {
      @apply flex;
    }
    .search-result-item {
      @apply block p-4 rounded-xl glass-hover mb-2 transition-all;
    }
    .search-result-item.active {
      @apply bg-white/90 border-white/60 shadow-arctic-200/50;
    }
    .search-result-title {
      @apply font-bold text-arctic-900 mb-1;
    }
    .search-result-snippet {
      @apply text-sm text-arctic-500 line-clamp-2;
    }
    .search-result-snippet mark {
      @apply bg-arctic-100 text-arctic-900 font-bold px-0.5 rounded;
    }
    .search-no-results {
      @apply text-center py-12 text-arctic-400 font-medium;
    }
    .search-hint {
      @apply flex justify-center space-x-6 pt-6 mt-6 border-t border-arctic-100 text-[10px] font-bold text-arctic-300 uppercase tracking-widest;
    }
    .search-hint kbd {
      @apply bg-arctic-50 px-1.5 py-0.5 rounded border border-arctic-100 mr-1;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
  <header class="sticky top-0 z-50 w-full glass border-b border-white/40">
    <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="{{ base_url }}/" class="text-2xl font-bold tracking-tight text-arctic-900">
        <span class="text-arctic-500">Glacial</span>Blog
      </a>
      <nav class="hidden md:flex items-center space-x-8 font-medium">
        <a href="{{ base_url }}/posts/" class="hover:text-arctic-500 transition-colors">Posts</a>
        <a href="{{ base_url }}/archives/" class="hover:text-arctic-500 transition-colors">Archives</a>
        <a href="{{ base_url }}/about/" class="hover:text-arctic-500 transition-colors">About</a>
        <button onclick="openSearch()" class="p-2 rounded-full glass-hover">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-grow max-w-5xl w-full mx-auto px-6 py-12">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-auto py-12 border-t border-arctic-100 bg-white/30">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <p class="text-arctic-400 font-medium">&copy; {{ current_year }} {{ site.title }}. Inspired by the Arctic.</p>
    </div>
  </footer>

  <div id="searchOverlay" class="fixed inset-0 z-[100] hidden bg-arctic-900/20 backdrop-blur-sm" onclick="if(event.target===this)closeSearch()">
    <div class="max-w-2xl mx-auto mt-20 px-6">
      <div class="glass rounded-3xl p-8 shadow-2xl">
        <div class="flex items-center space-x-4 mb-6">
          <svg class="w-6 h-6 text-arctic-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" id="searchInput" placeholder="Search the glacier..." class="w-full bg-transparent border-none text-xl focus:outline-none placeholder-arctic-300">
          <button onclick="closeSearch()" class="text-arctic-300 hover:text-arctic-500">
            <kbd class="px-2 py-1 rounded bg-arctic-50 text-xs">ESC</kbd>
          </button>
        </div>
        <div id="searchResults" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script src="{{ base_url }}/js/search.js"></script>
  {{ highlight_js }}
</body>
</html>
