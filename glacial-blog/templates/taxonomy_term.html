{% extends "base.html" %}

{% block content %}
<section class="space-y-12">
  <header class="mb-16">
    <div class="inline-block px-4 py-1.5 rounded-full bg-arctic-100 text-arctic-700 text-sm font-bold mb-4 uppercase tracking-widest">
      {{ taxonomy_name }}
    </div>
    <h1 class="text-4xl font-extrabold tracking-tight text-arctic-900">
      Filtered by: <span class="text-arctic-500">{{ taxonomy_term }}</span>
    </h1>
  </header>

  <div class="grid gap-12">
    {% for p in taxonomy_pages %}
    <article class="glass glass-hover p-8 rounded-3xl group">
      <div class="flex flex-col space-y-4">
        <time class="text-sm font-semibold text-arctic-400 uppercase tracking-wider">{{ p.date }}</time>
        <h2 class="text-2xl font-bold text-arctic-900 group-hover:text-arctic-500 transition-colors">
          <a href="{{ p.url }}">{{ p.title }}</a>
        </h2>
        <p class="text-arctic-600 leading-relaxed">{{ p.description }}</p>
        <div class="pt-4">
          <a href="{{ p.url }}" class="inline-flex items-center text-arctic-500 font-bold hover:translate-x-1 transition-transform">
            Read Story
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
          </a>
        </div>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
