{% extends "base.html" %}

{% block content %}

    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-arctic-900 mb-6">
      {{ page.title }}
    </h1>
  </header>

  <div class="glass p-8 md:p-12 rounded-[2.5rem] prose prose-arctic max-w-none">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
