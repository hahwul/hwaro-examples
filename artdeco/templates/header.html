<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }} - {% endif %}{{ site_title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site_description }}{% endif %}">

    <!-- ArtDeco Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f14;
            --text-color: #e5e5e0;
            --gold: #d4af37;
            --gold-dim: #a67c00;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
            --border-width: 2px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-align: center;
        }

        a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--text-color);
        }

        /* The Outer Frame (Art Deco style) */
        .page-wrapper {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            flex: 1;
            position: relative;
        }

        .page-wrapper::before,
        .page-wrapper::after {
            content: '';
            position: absolute;
            border: var(--border-width) solid var(--gold);
            pointer-events: none;
        }

        .page-wrapper::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-width: 4px;
        }

        .page-wrapper::after {
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-width: 1px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 2rem 0 1rem;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 2rem;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: 50%;
            height: 1px;
            background-color: var(--gold);
            margin: 5px auto 0;
        }

        .site-title {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 4px;
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin: 0 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Content Areas */
        main {
            padding: 0 1rem;
        }

        .artdeco-intro {
            text-align: center;
            margin-bottom: 3rem;
        }

        .artdeco-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .feature-box {
            border: 1px solid var(--gold);
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        /* Corner accents for boxes */
        .feature-box::before, .feature-box::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--gold);
        }

        .feature-box::before {
            top: -5px; left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .feature-box::after {
            bottom: -5px; right: -5px;
            border-left: none;
            border-top: none;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: auto;
            border-top: 1px solid var(--gold);
            font-size: 0.9rem;
            font-family: var(--font-heading);
            letter-spacing: 1px;
            color: var(--gold-dim);
        }

        /* Typography inside markdown */
        article p {
            margin-bottom: 1.5rem;
        }

        article blockquote {
            border-left: 3px solid var(--gold);
            margin-left: 0;
            padding-left: 1.5rem;
            font-style: italic;
            color: var(--gold-dim);
        }

        article img {
            max-width: 100%;
            height: auto;
            border: 2px solid var(--gold);
            padding: 5px;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: var(--gold);
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site_title }}</a></h1>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about">About</a>
                <a href="{{ base_url }}/posts">Posts</a>
            </nav>
        </header>
        <main>
