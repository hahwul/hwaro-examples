# =============================================================================
# Gradient Mesh Theme - Site Configuration
# =============================================================================
# A glamorous blog with complex multi-color fluid backgrounds and organic
# color transitions

title = "Gradient Mesh"
description = "A glamorous blog with fluid multi-color gradient mesh backgrounds and organic color transitions"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 5

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
