{% include "header.html" %}

<div class="breadcrumbs">
    <a href="{{ base_url }}">Home</a> <span class="separator">/</span>
    <a href="{{ base_url }}/{{ taxonomy_name }}"><span style="text-transform: capitalize;">{{ taxonomy_name }}</span></a> <span class="separator">/</span>
    <span>{{ taxonomy_term }}</span>
</div>

<h1>Guides tagged with "{{ taxonomy_term }}"</h1>

<div class="guide-list" style="margin-top: 2rem;">
    {% for post in taxonomy_pages %}
    <a href="{{ post.url }}" class="guide-list-item">
        <h2 class="guide-list-title" style="margin: 0; border: none; font-size: 1.25rem;">{{ post.title }}</h2>
        {% if post.description %}
        <p class="guide-list-meta" style="margin: 0.5rem 0 0 0;">{{ post.description }}</p>
        {% endif %}
    </a>
    {% endfor %}
</div>

{% include "footer.html" %}
