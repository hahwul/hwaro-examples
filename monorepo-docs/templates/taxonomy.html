{% include "header.html" %}

<article class="prose">
  <h1>Tags</h1>

  <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
    {% for term in taxonomy.terms %}
      <a href="{{ term.permalink }}" class="cross-ref" style="text-decoration: none;">
        {{ term.name }} ({{ term.pages | length }})
      </a>
    {% endfor %}
  </div>
</article>
