{% include "header.html" %}

<article class="prose">
  <h1>{{ section.title }}</h1>
  {{ content | safe }}

  {% if section.pages %}
    <div style="margin-top: 2rem;">
      <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">In this section</h2>
      <ul style="list-style: none;">
        {% for page in section.pages %}
          <li style="margin-bottom: 0.5rem;">
            <a href="{{ page.permalink }}" style="font-weight: 500;">{{ page.title }}</a>
            <p style="font-size: 0.875rem; margin: 0;">{{ page.description | default(value="") }}</p>
          </li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
</article>

{% include "footer.html" %}
