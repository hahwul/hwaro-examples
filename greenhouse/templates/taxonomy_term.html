{% include "header.html" %}

<section>
  <div class="section-header">
    <h2>{{ taxonomy_name | capitalize }}: {{ taxonomy_term }}</h2>
    <p class="taxonomy-desc">Showing all items tagged with "{{ taxonomy_term }}".</p>
  </div>

  <div class="plant-grid">
    {% for post in taxonomy_pages %}
    <div class="plant-card">
      <div class="plant-content">
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <p>{{ post.description }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</section>

{% include "footer.html" %}
