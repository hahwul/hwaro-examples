<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxonomies | Quantum Flux</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    <div class="content-block">
      <h1 class="pulse">Data Vectors</h1>
      <ul style="list-style: none; display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
        {% for term, pages in terms %}
          <li>
            <a href="{{ term.permalink }}" class="tag" style="font-size: 1rem;">
              {{ term.name | capitalize }} <span style="opacity: 0.7; font-size: 0.8em;">({{ pages | length }})</span>
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </main>

  {% include "footer.html" %}
</body>
</html>
