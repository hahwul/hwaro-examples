{% extends "base.html" %}

{% block title %}Taxonomies | {{ config.title }}{% endblock %}

{% block content %}
<div class="section-header" style="margin-bottom: 3rem;">
    <h1 class="post-title" style="color: var(--rust); font-size: 2.5rem;">{{ taxonomy.name | capitalize }}</h1>
</div>

<div class="tags">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
    {% endfor %}
</div>
{% endblock %}
