{% include "header.html" %}
<main class="site-main">
  <article class="content">
    <h1>{{ taxonomy_name | e }}</h1>
    <p class="taxonomy-desc">Editorial index of terms used in this galley.</p>
    <ul class="section-list">
      {% for term in taxonomy_terms %}
        <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></li>
      {% endfor %}
    </ul>
  </article>
</main>
<aside class="margin-col" aria-label="Proofreader's margin">
  <div class="folio-marker">Index, verified</div>
  <div class="margin-note">Alphabetized, cross-checked against main text.</div>
</aside>
{% include "footer.html" %}
