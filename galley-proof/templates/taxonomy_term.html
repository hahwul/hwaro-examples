{% include "header.html" %}
<main class="site-main">
  <article class="content">
    <h1>{{ taxonomy_term | e }}</h1>
    <p class="taxonomy-desc">Entries filed under this editorial term.</p>
    <ul class="section-list">
      {% for p in taxonomy_pages %}
        <li><a href="{{ p.url }}">{{ p.title }}</a></li>
      {% endfor %}
    </ul>
  </article>
</main>
<aside class="margin-col" aria-label="Proofreader's margin">
  <div class="folio-marker">Cross-ref</div>
  <div class="margin-note">See also: related terms in index.</div>
</aside>
{% include "footer.html" %}
