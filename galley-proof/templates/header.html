<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &mdash; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div class="masthead">
        <span class="stamp">Galley Proof &bull; Not for Distribution</span>
        <h1><a href="{{ base_url }}/">{{ site.title }}</a></h1>
        <p class="subtitle">{{ site.description | e }}</p>
      </div>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Front</a>
        <a href="{{ base_url }}/articles/">Articles</a>
        <a href="{{ base_url }}/about/">Masthead</a>
        <a href="{{ base_url }}/tags/">Index</a>
      </nav>
    </header>
