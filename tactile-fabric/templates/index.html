<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if site.extra is defined and site.extra.description is defined %}{{ site.extra.description }}{% endif %}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body class="texture-linen">

    <!-- Fabric overlays for visual depth -->
    <div class="fabric-overlay denim-overlay" aria-hidden="true"></div>
    <div class="fabric-overlay silk-overlay" aria-hidden="true"></div>

    <header class="site-header texture-denim">
        <div class="container">
            <h1 class="site-title"><a href="./">{{ site.title }}</a></h1>
            <p class="site-description">{% if site.extra is defined and site.extra.description is defined %}{{ site.extra.description }}{% endif %}</p>
        </div>
    </header>

    <main class="site-content container texture-silk">
        <article class="content-body">
            {{ content | safe }}
        </article>

        <div class="fabric-showcase">
            <div class="swatch swatch-linen">
                <h3>Linen</h3>
                <p>Natural & Breathable</p>
            </div>
            <div class="swatch swatch-silk">
                <h3>Silk</h3>
                <p>Smooth & Elegant</p>
            </div>
            <div class="swatch swatch-denim">
                <h3>Denim</h3>
                <p>Rugged & Classic</p>
            </div>
        </div>
    </main>

    <footer class="site-footer texture-denim">
        <div class="container">
            <p>&copy; {{ site.title }}. Crafted with care.</p>
        </div>
    </footer>

</body>
</html>
