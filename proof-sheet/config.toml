# =============================================================================
# Proof Sheet - Printer's Proof Publication
# Issue #1571 | Tags: book, light, proof, unfinished, editorial
# =============================================================================

title = "Proof Sheet"
description = "A printer's proof publication -- clean typeset awaiting approval, with PROOF watermarks, proofreader marks in the margin, and STET, REVISE, APPROVED stamps on each page."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
