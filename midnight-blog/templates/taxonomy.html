{% include "header.html" %}

<header style="margin-bottom: 3rem;">
  <h1 style="font-size: 2.4rem;">Browse Tags</h1>
  <p style="color: var(--text-muted); font-family: 'Inter', sans-serif;">Filter posts by topic</p>
</header>

<ul class="tag-list" style="font-size: 1.1rem; gap: 1rem;">
  {% for term in taxonomy_terms %}
  <li>
    <a href="{{ base_url }}{{ term.url }}" class="tag" style="padding: 0.5rem 1rem; font-size: 1rem;">
      {{ term.name }} <span style="color: var(--text-muted); margin-left: 0.5rem;">({{ term.pages | length }})</span>
    </a>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
