<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} - {% endif %}{{ site_title }}</title>
  <meta name="description" content="{{ page_description | default(site_description) }}">
  {{ auto_includes | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1a1c;
      --text-color: #e5e5e0;
      --text-muted: #9e9e98;
      --border-color: #333336;
      --link-color: #f5f5f0;
      --link-hover: #ffffff;
      --max-width: 680px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Inter', sans-serif;
      color: var(--text-color);
      font-weight: 600;
      line-height: 1.3;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    a {
      color: var(--link-color);
      text-decoration: underline;
      text-decoration-color: var(--text-muted);
      text-underline-offset: 4px;
      transition: text-decoration-color 0.2s ease;
    }

    a:hover {
      text-decoration-color: var(--link-hover);
      color: var(--link-hover);
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .site-header {
      margin-bottom: 4rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-color);
    }

    .site-nav a {
      margin-left: 1.5rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .site-nav a:hover {
      color: var(--text-color);
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-item {
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border-color);
    }

    .post-item:last-child {
      border-bottom: none;
    }

    .post-title {
      font-size: 1.8rem;
      margin: 0 0 0.5rem 0;
    }

    .post-title a {
      text-decoration: none;
    }

    .post-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .post-summary {
      margin: 0;
      color: var(--text-muted);
    }

    .read-more {
      display: inline-block;
      margin-top: 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .post-content {
      margin-top: 2rem;
    }

    .post-content p {
      margin-bottom: 1.5rem;
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1.5rem 0;
    }

    .post-content pre {
      background-color: #111112;
      padding: 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    .post-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .post-content blockquote {
      margin: 2rem 0;
      padding-left: 1.5rem;
      border-left: 4px solid var(--border-color);
      color: var(--text-muted);
      font-style: italic;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    .tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      background-color: #2a2a2d;
      color: var(--text-color);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      text-decoration: none;
      border: 1px solid var(--border-color);
    }

    .tag:hover {
      background-color: #333336;
      text-decoration: none;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-title">{{ site_title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
    <main>
