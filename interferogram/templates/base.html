<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="interferogram-bg"></div>
    <div class="container">
        <header>
            <h1><a href="{{ base_url }}" style="color: inherit; text-decoration: none; border: none; text-shadow: inherit;">{{ site.title }}</a></h1>
            <p>{{ site.description }}</p>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.title }}</p>
            <p>Interferogram Aesthetic Design</p>
        </footer>
    </div>
</body>
</html>
