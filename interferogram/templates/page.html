{% extends "base.html" %}

{% block content %}
    <article class="content-box">
        <h2>{{ page.title }}</h2>
        {% if page.date %}
        <span class="post-meta">{{ page.date | date(format="%Y-%m-%d") }}</span>
        {% endif %}

        <div class="page-content">
            {{ content | safe }}
        </div>
    </article>
    <div style="margin-top: 2rem;">
        <a href="{{ base_url }}">&lt;-- Back to Home</a>
    </div>
{% endblock content %}
