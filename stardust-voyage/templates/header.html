<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #a8b0fa;
      --primary-glow: rgba(168, 176, 250, 0.4);
      --text: #e0e6ed;
      --text-muted: #8b95a5;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #05050f;
      --bg-glass: rgba(15, 15, 25, 0.6);
      --bg-glass-hover: rgba(25, 25, 40, 0.8);
      --glow: 0 0 15px var(--primary-glow);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(30, 30, 80, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(50, 20, 60, 0.25) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem;
      margin: 2rem 0;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .site-logo {
      font-weight: 700; font-size: 1.3rem; color: #fff; text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: var(--glow);
    }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text); text-decoration: none; font-size: 0.95rem; font-weight: 500;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .site-header nav a:hover { color: var(--primary); text-shadow: var(--glow); }
    .site-main {
      min-height: calc(100vh - 250px);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .site-footer {
      margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.85rem; text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #fff; }
    h1 { font-size: 2rem; margin-top: 0; text-shadow: var(--glow); }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; transition: all 0.2s; }
    a:hover { text-shadow: var(--glow); }
    code { background: rgba(255, 255, 255, 0.05); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: var(--primary); }
    pre { background: rgba(10, 10, 20, 0.8); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; color: inherit; text-shadow: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem; padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px; border: 1px solid var(--border);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }
    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      border-color: rgba(168, 176, 250, 0.3);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 0.3rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text); background: rgba(255, 255, 255, 0.05); }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); background: rgba(168, 176, 250, 0.1); box-shadow: var(--glow); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(168, 176, 250, 0.15); color: #fff; box-shadow: inset 0 0 10px rgba(168, 176, 250, 0.2); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.2rem; }
      .site-main { padding: 1.5rem; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/explore/">Explore</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
