{% include "header.html" %}

<main class="site-main">
    <article class="container">
        <header class="page-header">
            <h1 class="page-title">{{ page.title }}</h1>
            {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
            {% endif %}
        </header>

        <div class="prose">
            {{ page.content | safe }}
        </div>
    </article>
</main>
