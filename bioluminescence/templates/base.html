<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ config.description }}{% endif %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
</head>
<body class="bioluminescence-body">
    <div class="particles-container" id="particles"></div>
    <div class="app-container">
        <header class="app-header">
            <h1 class="glow-text"><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
            <nav class="app-nav">
                <a href="{{ config.base_url }}" class="nav-link">Home</a>
                <a href="{{ config.base_url }}/about" class="nav-link">About</a>
            </nav>
        </header>

        <main class="app-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="app-footer">
            <p>&copy; {{ current_year | default(value=2025) }} {{ config.title }}. Illuminated from within.</p>
        </footer>
    </div>
    <script>
        // Simple particles script for deep sea vibe
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
