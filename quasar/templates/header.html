<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #050505;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #333333;
      --primary: #ffffff;
      --accent: #222222;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 4rem;
    }
    .site-logo {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .site-logo:hover { opacity: 0.8; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.2s ease;
    }
    .site-header nav a:hover { color: var(--primary); }

    .site-main { min-height: calc(100vh - 300px); }

    .site-footer {
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.75em;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 { font-size: 3rem; margin-top: 0; text-transform: uppercase; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    p { margin: 1.5em 0; font-size: 1.1rem; color: #bbbbbb; }

    a {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }
    a:hover { text-decoration-thickness: 2px; }

    code {
      background: var(--accent);
      padding: 0.2rem 0.4rem;
      font-size: 0.9em;
      font-family: "Courier New", Courier, monospace;
    }
    pre {
      background: var(--accent);
      padding: 1.5rem;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; }

    blockquote {
      border-left: 4px solid var(--primary);
      margin: 2rem 0;
      padding: 1rem 0 1rem 2rem;
      font-style: italic;
      color: var(--text-muted);
    }

    hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: border-color 0.2s ease;
    }
    ul.section-list li:hover {
      border-color: var(--primary);
    }
    ul.section-list li a {
      font-weight: 600;
      font-size: 1.25rem;
      text-decoration: none;
    }
    .post-date {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.2rem; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: 600;
    }
    nav.pagination a:hover { border-color: var(--primary); }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--bg);
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .tag-item {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tag-item:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: flex-start; padding: 2rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2.25rem; }
      .site-footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
