<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <a href="{{ base_url }}/" class="topbar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        {{ site.title }}
      </a>
    </div>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search...">
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="layout">

    <aside class="sidebar" id="sidebar">

        <span class="sidebar-heading">Getting Started</span>

          <li><a href="{{ base_url }}/docs/getting-started/overview/">Overview</a></li>
          <li><a href="{{ base_url }}/docs/getting-started/terminology/">Terminology</a></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <span class="sidebar-heading">Algorithms</span>
        <ul class="sidebar-nav">
          <li><a href="{{ base_url }}/docs/algorithms/">Overview</a></li>
          <li><a href="{{ base_url }}/docs/algorithms/symmetric/">Symmetric Ciphers</a></li>
          <li><a href="{{ base_url }}/docs/algorithms/asymmetric/">Asymmetric Ciphers</a></li>
          <li><a href="{{ base_url }}/docs/algorithms/hashing/">Hashing</a></li>
        </ul>
      </div>
      <div class="sidebar-section">
        <span class="sidebar-heading">Protocols</span>

          <li><a href="{{ base_url }}/docs/protocols/">Overview</a></li>
          <li><a href="{{ base_url }}/docs/protocols/key-exchange/">Key Exchange</a></li>

        </ul>
