{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ page.title | default(site.title) }}</h1>
  {% if page.description %}
    <p class="page-subtitle">{{ page.description }}</p>
  {% endif %}
</div>
<div class="page-content">
  {{ content | safe }}
</div>
{% endblock %}
