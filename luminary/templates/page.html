{% extends "base.html" %}

{% block content %}
  <h1>{{ page.title | e }}</h1>
  {% if page.date %}
    <div class="post-meta">
      <time class="post-date">{{ page.date | date("%Y-%m-%d") }}</time>
    </div>
  {% endif %}
  <div class="page-content">
    {{ content | safe }}
  </div>
{% endblock %}
