<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: rgba(140, 160, 200, 1);
      --primary-glow: rgba(140, 160, 200, 0.4);
      --text: #333333;
      --text-muted: #666666;
      --border: #eaeaea;
      --bg: #fafafa;
      --bg-card: #ffffff;
      --bg-subtle: #f0f0f0;

      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      --font-heading: "Playfair Display", Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4rem;
    }

    .site-logo {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary-glow);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--text);
    }

    .site-main {
      flex: 1;
    }

    .site-footer {
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.35rem; }

    p { margin: 1.5em 0; }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    a:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    blockquote {
      margin: 2em 0;
      padding: 1em 2em;
      border-left: 3px solid var(--primary);
      background: var(--bg-card);
      font-style: italic;
      color: var(--text-muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #e83e8c;
    }

    pre {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* Components */
    .section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    .section-list li {
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .section-list li:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.05), 0 0 20px var(--primary-glow);
    }

    .section-list li a {
      display: block;
      padding: 2rem;
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 600;
      border-bottom: none;
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    nav.pagination {
      margin: 4rem 0 2rem;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a, nav.pagination span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    nav.pagination a:hover {
      color: var(--text);
      border-color: var(--text);
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .pagination-current span {
      border-color: var(--text);
      background: var(--text);
      color: var(--bg);
    }

    .pagination-disabled span {
      opacity: 0.5;
      background: var(--bg-subtle);
    }

    /* Post specific */
    .post-meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: -1rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .post-date {
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 2rem 0;
      }

      .site-wrapper {
        padding: 0 1.5rem;
      }

      h1 { font-size: 2rem; }

      .section-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ current_year }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
