{% include "header.html" %}

<main class="dashboard-grid">
  <div class="panel col-12 markdown-content">
    <div class="panel-header">
      <span>{{ section.title | upper }}</span>
      <span>[DIR]</span>
    </div>

    <div style="margin-bottom: 20px; color: var(--text-dim);">
      TOTAL FILES: {{ section.posts | length }}
    </div>

    <ul style="list-style: none; padding-left: 0;">
      {% for post in section.posts %}
      <li style="margin-bottom: 15px; border-bottom: 1px dashed var(--panel-bg); padding-bottom: 5px;">
        <span class="color-accent">></span> <a href="{{ base_url }}/{{ post.url }}">{{ post.title | upper }}</a>
        <br>
        <span style="font-size: 14px; color: var(--text-dim); padding-left: 15px;">CREATED: {{ post.date | date("%Y-%m-%d %H:%M:%S") }}</span>
      </li>
      {% endfor %}
    </ul>

    <div style="margin-top: 40px; border-top: 1px dashed var(--text-dim); padding-top: 10px;">
      <a href="{{ base_url }}/">>> BACK TO MAIN</a>
    </div>
  </div>
</main>

{% include "footer.html" %}
