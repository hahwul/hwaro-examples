{% include "header.html" %}

<main class="dashboard-grid">
  <div class="panel col-12 markdown-content">
    <div class="panel-header">
      <span>SYSTEM {{ taxonomy.name | upper }}</span>
      <span>[INDEX]</span>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;">
      {% for term in taxonomy.terms %}
        <a href="{{ base_url }}/{{ taxonomy.name }}/{{ term.name }}" style="padding: 5px 10px; border: 1px solid var(--text-main); text-decoration: none;">
          {{ term.name | upper }} <span class="color-accent">[{{ term.pages | length }}]</span>
        </a>
      {% endfor %}
    </div>

    <div style="margin-top: 40px; border-top: 1px dashed var(--text-dim); padding-top: 10px;">
      <a href="{{ base_url }}/">>> BACK TO MAIN</a>
    </div>
  </div>
</main>

{% include "footer.html" %}
