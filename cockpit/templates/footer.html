  </main>
  <footer class="mt-12 pt-4 border-t border-telemetry-muted text-center text-sm text-telemetry-muted">
    <div class="flex justify-between items-center w-full uppercase">
      <div>END_OF_TRANSMISSION</div>
      <div>&copy; {{ current_year }} {{ site.title }}</div>
      <div>SYSTEM NOMINAL</div>
    </div>
  </footer>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const timeString = now.toISOString().substring(11, 19);
    document.getElementById('clock').textContent = timeString;
  }
  setInterval(updateClock, 1000);
  updateClock();
</script>
