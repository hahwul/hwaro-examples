{% include "header.html" %}

<main class="dashboard-grid">
  <div class="panel col-12 markdown-content">
    <div class="panel-header">
      <span>{{ page.title | upper }}</span>
      <span>[FILE]</span>
    </div>

    <div style="font-size: 14px; color: var(--text-dim); margin-bottom: 20px;">
      DATE: {{ page.date | date("%Y-%m-%d %H:%M:%S") }} |
      {% if page.taxonomies.tags %}
        TAGS:
        {% for tag in page.taxonomies.tags %}
          <a href="{{ base_url }}/tags/{{ tag }}">{{ tag }}</a>
        {% endfor %}
      {% endif %}
    </div>

    {{ content }}

    <div style="margin-top: 40px; border-top: 1px dashed var(--text-dim); padding-top: 10px;">
      <a href="{{ base_url }}/">>> BACK TO MAIN</a>
    </div>
  </div>
</main>

{% include "footer.html" %}
