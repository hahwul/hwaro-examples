  <h1 class="text-3xl md:text-5xl font-bold uppercase tracking-tight text-white mb-6 border-y-2 border-telemetry-red py-2 w-full max-w-2xl bg-telemetry-red/10">

  <div class="mt-12 text-telemetry-muted text-sm font-mono flex items-center gap-2">
