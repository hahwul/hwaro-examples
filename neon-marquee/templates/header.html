<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Special+Elite&family=VT323&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="ticker-bar" role="banner">
    <span class="ticker-dot" aria-hidden="true"></span>
    <span class="ticker-label">NOW SHOWING</span>
    <span class="ticker-text">THE VELVET DETOUR - DAILY 7PM &amp; 9:30PM - - - BOX OFFICE OPEN 12PM - - - CASH OR CHECK ONLY - - - STEP RIGHT UP - - -</span>
  </div>
  <div class="marquee-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="The Orpheum marquee home">
        <svg viewBox="0 0 72 56" xmlns="http://www.w3.org/2000/svg" class="logo-marquee" aria-hidden="true">
          <polygon points="6,16 66,16 60,40 12,40" fill="#081018" stroke="#FF1493" stroke-width="2"/>
          <polygon points="6,16 66,16 60,40 12,40" fill="none" stroke="#00FFFF" stroke-width="1"/>
          <line x1="36" y1="4" x2="36" y2="16" stroke="#FF1493" stroke-width="2"/>
          <polygon points="30,2 42,2 36,12" fill="#FF1493"/>
          <circle cx="12" cy="16" r="2" fill="#F5D76E"/>
          <circle cx="24" cy="16" r="2" fill="#F5D76E"/>
          <circle cx="36" cy="16" r="2" fill="#F5D76E"/>
          <circle cx="48" cy="16" r="2" fill="#F5D76E"/>
          <circle cx="60" cy="16" r="2" fill="#F5D76E"/>
          <circle cx="18" cy="40" r="2" fill="#F5D76E"/>
          <circle cx="30" cy="40" r="2" fill="#F5D76E"/>
          <circle cx="42" cy="40" r="2" fill="#F5D76E"/>
          <circle cx="54" cy="40" r="2" fill="#F5D76E"/>
          <text x="36" y="32" text-anchor="middle" font-family="Fascinate, cursive" font-size="11" fill="#00FFFF">ORPHEUM</text>
          <circle cx="36" cy="50" r="3" fill="none" stroke="#F5D76E" stroke-width="1"/>
          <circle cx="36" cy="50" r="1.2" fill="#F5D76E"/>
        </svg>
        <span class="logo-text">
          <span class="logo-title">THE ORPHEUM</span>
          <span class="logo-sub">MAIN &amp; FOURTH - EST. 1924</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">MARQUEE</a>
        <a href="{{ base_url }}/showtimes/">SHOWTIMES</a>
        <a href="{{ base_url }}/boxoffice/">BOX OFFICE</a>
        <a href="{{ base_url }}/lobby/">LOBBY</a>
      </nav>
    </header>
