<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --concrete-gray: #95a5a6;
      --steel-blue: #4682b4;
      --zaha-white: #f5f5f5;
      --edge-black: #2c3e50;
      --bg: var(--zaha-white);
      --text: var(--edge-black);
      --accent: var(--steel-blue);
      --decorative: var(--concrete-gray);
    }

    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      overflow-x: hidden;
      perspective: 1000px;
    }

    /* Construction Lines */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 10%;
      width: 1px;
      height: 100%;
      background: var(--decorative);
      opacity: 0.2;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      top: 20%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--decorative);
      opacity: 0.2;
      z-index: -1;
    }

    .construction-line-v {
      position: fixed;
      top: 0;
      right: 15%;
      width: 1px;
      height: 100%;
      background: var(--decorative);
      opacity: 0.15;
      z-index: -1;
    }

    .construction-line-h {
      position: fixed;
      bottom: 15%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--decorative);
      opacity: 0.15;
      z-index: -1;
    }

    /* Layout */
    .site-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
    }

    header.site-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8rem;
      padding-top: 2rem;
      position: relative;
    }

    .logo-container {
      transform: rotate(-5deg) translateY(20px);
      background: var(--text);
      padding: 1rem 2rem;
      z-index: 10;
    }

    .site-logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--bg);
      text-decoration: none;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transform: rotate(3deg) skewX(-10deg);
      background: var(--bg);
      padding: 1.5rem;
      border: 1px solid var(--decorative);
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    nav a:hover {
      color: var(--accent);
      transform: translateX(10px);
    }

    /* Main Content Styling */
    .site-main {
      position: relative;
    }

    h1 {
      font-size: 5rem;
      font-weight: 900;
      line-height: 0.9;
      margin-bottom: 4rem;
      text-transform: uppercase;
      transform: skewY(-2deg);
      border-left: 8px solid var(--accent);
      padding-left: 1.5rem;
    }

    h2 {
      font-size: 2.5rem;
      margin-top: 4rem;
      text-transform: uppercase;
      border-bottom: 2px solid var(--text);
      display: inline-block;
      margin-bottom: 2rem;
    }

    .content-block {
      background: white;
      padding: 3rem;
      margin: 4rem 0;
      box-shadow: 20px 20px 0 var(--decorative);
      transform: rotate(1deg);
      border: 1px solid var(--decorative);
    }

    .overlapping-block {
      position: relative;
      background: var(--accent);
      color: white;
      padding: 2rem;
      width: 60%;
      margin-left: auto;
      margin-top: -6rem;
      transform: rotate(-2deg);
      z-index: 5;
    }

    /* Typography */
    p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      max-width: 65ch;
    }

    /* Footer */
    .site-footer {
      margin-top: 10rem;
      padding: 4rem 0;
      border-top: 1px solid var(--decorative);
      position: relative;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      transform: skewX(5deg);
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 3rem; }
      .overlapping-block { width: 90%; margin-top: -2rem; }
      header.site-header { flex-direction: column; gap: 4rem; }
      .logo-container { transform: none; }
      nav { transform: none; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="construction-line-v"></div>
  <div class="construction-line-h"></div>
  
  <div class="site-wrapper">
    <header class="site-header">
      <div class="logo-container">
        <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      </div>
      <nav>
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
