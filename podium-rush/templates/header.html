<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Exo+2:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="podium-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Podium Rush home">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Mini three-tier podium -->
          <rect x="6" y="28" width="12" height="14" fill="#b87333"/>
          <rect x="18" y="18" width="12" height="24" fill="#d4af37"/>
          <rect x="30" y="24" width="12" height="18" fill="#9ca3af"/>
          <text x="12" y="38" font-family="Exo 2, sans-serif" font-size="9" font-weight="900" fill="#0a0a0a" text-anchor="middle">3</text>
          <text x="24" y="34" font-family="Exo 2, sans-serif" font-size="11" font-weight="900" fill="#0a0a0a" text-anchor="middle">1</text>
          <text x="36" y="36" font-family="Exo 2, sans-serif" font-size="10" font-weight="900" fill="#0a0a0a" text-anchor="middle">2</text>
        </svg>
        <span class="logo-text">PODIUM RUSH</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">RESULTS</a>
        <a href="{{ base_url }}/winners/">WINNERS</a>
        <a href="{{ base_url }}/event/">EVENT</a>
        <a href="{{ base_url }}/awards/">AWARDS</a>
      </nav>
    </header>
