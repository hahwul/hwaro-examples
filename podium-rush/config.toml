title = "Podium Rush"
description = "A competition awards event site celebrating the victory moment, featuring an SVG three-tier podium hero with inline medal-and-ribbon graphics, stencil display titles, and bold athletic typography."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
