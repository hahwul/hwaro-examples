{% include "header.html" %}
  <h1 class="text-2xl font-bold text-ops-dark mb-6">{{ taxonomy_name | title }}</h1>
  <div class="flex flex-wrap gap-2">
    {% for term in taxonomy_terms %}
    <a href="{{ term.url }}" class="px-3 py-1.5 bg-ops-surface border border-ops-border rounded text-sm text-ops-muted hover:text-ops-dark hover:border-gray-300 transition-all">
      {{ term.name }} ({{ term.pages | length }})
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
