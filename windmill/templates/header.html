<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags | safe }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ base_url }}/" class="site-brand">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="46" y="30" width="8" height="55" rx="2" fill="#003da5"/>
          <rect x="44" y="85" width="12" height="6" rx="1" fill="#003da5"/>
          <circle cx="50" cy="38" r="5" fill="#003da5"/>
          <line x1="50" y1="38" x2="22" y2="18" stroke="#003da5" stroke-width="5" stroke-linecap="round"/>
          <line x1="50" y1="38" x2="78" y2="18" stroke="#003da5" stroke-width="5" stroke-linecap="round"/>
          <line x1="50" y1="38" x2="78" y2="58" stroke="#003da5" stroke-width="5" stroke-linecap="round"/>
          <line x1="50" y1="38" x2="22" y2="58" stroke="#003da5" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <span class="site-title">{{ config.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </div>
  </header>
