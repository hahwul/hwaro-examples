{% extends "base.html" %}

{% block title %}All {{ taxonomy_name | capitalize }} | {{ site.title }}{% endblock %}

{% block content %}
<div class="taxonomy-container">
    <header class="section-header">
        <h1 class="section-title">Explore by {{ taxonomy_name | capitalize }}</h1>
    </header>

    <div class="taxonomy-terms-list">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="taxonomy-term-pill">
            {{ term }}
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
