title = "Graffiti"
description = "Street art stories from the urban underground"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[[taxonomies]]
name = "authors"

[sitemap]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
