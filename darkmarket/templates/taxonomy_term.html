{% include "header.html" %}

<main class="main">
  <section class="taxonomy-term-listing">
    <div class="container">
      <h1>{{ taxonomy_term }}</h1>
      <div class="product-grid">
        {% for page in taxonomy_pages %}
        <a href="{{ page.url }}" class="product-card">
          <div class="card-body">
            <div class="card-meta">
              {% if page.extra.vendor %}
                <span class="card-vendor">{{ page.extra.vendor }}</span>
              {% endif %}
              {% if page.extra.price %}
                <span class="card-price">{{ page.extra.price }}</span>
              {% endif %}
            </div>
            <h3 class="card-title">{{ page.title }}</h3>
            <p class="card-desc">{{ page.description }}</p>
          </div>
        </a>
        {% endfor %}
      </div>
    </div>
  </section>
</main>

{% include "footer.html" %}
