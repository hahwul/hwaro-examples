title = "DarkMarket"
description = "A bold, daring dark marketplace with clean aesthetics and elegant commerce."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [{ user_agent = "*", disallow = ["/admin"] }]

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["products"]

[markdown]
safe = false
lazy_loading = true
emoji = false
