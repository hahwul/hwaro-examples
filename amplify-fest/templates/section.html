{% extends "base.html" %}
{% block content %}
<h1 class="band-name" style="font-size: 100px; color: var(--magenta);">{{ section.title }}</h1>
<div style="margin-top: 4rem;">
  {% for page in section.pages %}
  <div class="band-row">
    <h2 class="band-name" style="font-size: 48px;"><a href="{{ page.permalink }}" style="color: var(--black); text-decoration: none;">{{ page.title }}</a></h2>
    <div class="stage-meta">{{ page.description }}</div>
  </div>
  {% endfor %}
</div>
{% endblock %}
