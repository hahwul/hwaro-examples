<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Barlow+Condensed:wght@600&family=Space+Mono&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --blue: #0000FF;
      --yellow: #FFFF00;
      --white: #FFFFFF;
      --black: #111111;
      --magenta: #FF00FF;
      --cyan: #00FFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--white);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      line-height: 1.1;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      background-color: var(--blue);
      color: var(--white);
      padding: 4rem 0;
      text-align: center;
      border-bottom: 10px solid var(--black);
    }

    .site-logo {
      font-family: 'Righteous', cursive;
      font-size: 180px;
      margin: 0;
      text-transform: uppercase;
      line-height: 0.9;
    }

    nav {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      border-bottom: 4px solid transparent;
    }

    nav a:hover {
      border-bottom-color: var(--yellow);
    }

    main {
      padding: 4rem 0;
    }

    .band-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0;
      border-bottom: 4px solid var(--black);
    }

    .band-name {
      font-size: 80px;
      font-weight: 600;
      text-transform: uppercase;
      margin: 0;
    }

    .stage-meta {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      text-align: right;
    }

    .color-block {
      padding: 2rem;
      color: var(--white);
      margin-bottom: 2rem;
    }

    .knob-svg {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
    }

    .speaker-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 40px;
    }

    .speaker-box {
      width: 40px;
      height: 40px;
      border: 3px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speaker-cone {
      width: 20px;
      height: 20px;
      border: 2px solid var(--black);
      border-radius: 50%;
    }

    .equalizer-footer {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      background-color: var(--black);
      padding: 10px;
    }

    .eq-bar {
      flex: 1;
      background-color: var(--yellow);
    }

    footer {
      background-color: var(--black);
      color: var(--white);
      padding: 4rem 0;
    }

    @media (max-width: 768px) {
      .site-logo { font-size: 60px; }
      .band-name { font-size: 40px; }
      .band-row { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .stage-meta { text-align: left; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="site-logo">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Lineup</a>
        <a href="{{ base_url }}/about/">Stages</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <div class="equalizer-footer">
      {% for i in range(30) %}
      <div class="eq-bar" style="height: {{ [10, 30, 50, 80, 40, 90, 20, 70] | random }}%;"></div>
      {% endfor %}
    </div>
    <div class="container" style="margin-top: 2rem; text-align: center;">
      <p style="font-family: 'Space Mono'; font-size: 12px; text-transform: uppercase;">NO EMOJIS // NO GRADIENTS // AMPLIFIED CONTENT</p>
    </div>
  </footer>
</body>
</html>
