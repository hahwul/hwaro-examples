{% include "header.html" %}
  <main class="page-main">
    <div class="menu-board">
      <h1 class="menu-board-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="menu-board-desc">{{ page.description }}</p>
      {% endif %}

      <div class="menu-grid">
        {% for page in section.pages %}
        <a href="{{ page.url }}" class="menu-card">
          <h3 class="menu-card-name">{{ page.title }}</h3>
          {% if page.description %}
          <p class="menu-card-desc">{{ page.description }}</p>
          {% endif %}
        </a>
        {% endfor %}
      </div>
    </div>
    {{ pagination }}
  </main>
{% include "footer.html" %}
