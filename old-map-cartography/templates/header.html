<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined %}{{ page.section | default(value='') }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ base_url }}/">The World Map</a>
        <a href="{{ base_url }}/about/">Legends</a>
      </nav>
    </header>
    <div class="map-container">
      <div class="compass-rose"></div>
      <div class="sea-monster"></div>
      <main class="site-main">
