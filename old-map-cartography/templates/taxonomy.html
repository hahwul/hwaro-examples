{% include "header.html" %}
    <h1>{{ taxonomy_name | e }}</h1>
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
    <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li><a href="{{ site.base_url }}/{{ taxonomy_name | slugify }}/{{ term.name | slugify }}/">{{ term.name | e }}</a> ({{ term.count }})</li>
    {% endfor %}
    </ul>
{% include "footer.html" %}
