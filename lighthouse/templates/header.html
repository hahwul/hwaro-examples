<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ config.title }}{% if page.title %} - {{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(value=config.description) }}">
  <link rel="stylesheet" href="{{ get_url(path='static/css/style.css', trailing_slash=false) }}">
</head>
<body>
  <header>
    <h1><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
    <p>{{ config.description }}</p>
  </header>
  
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search resources, tags, categories...">
  </div>
