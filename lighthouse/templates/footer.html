  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 {{ site.title }}. Built with <a href="https://github.com/hahwul/hwaro">Hwaro</a>.</p>
    </div>
  </footer>
  <script>
    // Simple search filter
    const searchInput = document.querySelector('.search-input');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
          const title = card.querySelector('.card-title').textContent.toLowerCase();
          const desc = card.querySelector('.card-description').textContent.toLowerCase();
          if (title.includes(query) || desc.includes(query)) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      });
    }

    // Simple alphabetical filter
    const alphaBtns = document.querySelectorAll('.alpha-btn');
    if (alphaBtns.length > 0) {
      alphaBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const char = e.target.textContent.toLowerCase();
          const cards = document.querySelectorAll('.card');
          cards.forEach(card => {
            const title = card.querySelector('.card-title').textContent.toLowerCase();
            if (char === '#' || title.startsWith(char)) {
              card.style.display = 'flex';
            } else {
              card.style.display = 'none';
            }
          });
        });
      });
    }
  </script>
</body>
</html>
