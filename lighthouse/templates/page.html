{% include "header.html" %}

<main>
  <article>
    <h1>{{ page.title }}</h1>
    {% if page.extra.link %}
    <p>Redirecting to <a href="{{ page.extra.link }}">{{ page.extra.link }}</a>...</p>
    <script>window.location.href = "{{ page.extra.link }}";</script>
    {% endif %}
    
    <div class="content">
      {{ page.content }}
    </div>
  </article>
</main>
