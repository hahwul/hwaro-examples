# =============================================================================
# Site Configuration
# =============================================================================

title = "Lighthouse"
description = "A curated navigation guide and resource directory"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"

# =============================================================================
# Search
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content", "extra.tags"]
filename = "search.json"

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false

# =============================================================================
# Asset Pipeline
# =============================================================================

[assets]
enabled = true
minify = true
fingerprint = true
