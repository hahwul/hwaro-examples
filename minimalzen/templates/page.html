{% include "header.html" %}

<article>
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        <div class="post-meta">
            <time>{{ page.date | date(format="%B %d, %Y") }}</time>
        </div>
    </header>

    <div class="content">
        {{ page.content | safe }}
    </div>
</article>

<div style="margin-top: calc(var(--spacing-unit) * 4); padding-top: var(--spacing-unit); border-top: 1px solid var(--border-color);">
    <a href="{{ base_url }}/posts/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">&larr; Back to writing</a>
</div>

{% include "footer.html" %}
