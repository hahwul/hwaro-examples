<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} &mdash; {% elif section.title %}{{ section.title }} &mdash; {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% elif site.description %}{{ site.description }}{% endif %}">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --text-muted: #888888;
            --accent-color: #000000;
            --border-color: #eeeeee;
            --spacing-unit: 2rem;
            --max-width: 650px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            font-size: 16px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: calc(var(--spacing-unit) * 3) var(--spacing-unit);
        }

        header {
            margin-bottom: calc(var(--spacing-unit) * 4);
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .site-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        .site-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--text-color);
        }

        a {
            color: var(--accent-color);
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 500;
            line-height: 1.3;
            margin-top: calc(var(--spacing-unit) * 2);
            margin-bottom: var(--spacing-unit);
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }

        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.25rem; }

        p, ul, ol, blockquote, pre {
            margin-bottom: var(--spacing-unit);
        }

        ul, ol {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        blockquote {
            border-left: 2px solid var(--border-color);
            padding-left: 1.5rem;
            color: var(--text-muted);
            font-style: italic;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: calc(var(--spacing-unit) * 3) 0;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .post-title {
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
        }

        .post-title a {
            text-decoration: none;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .post-summary {
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .page-header {
            margin-bottom: calc(var(--spacing-unit) * 3);
        }

        .page-title {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        /* Utilities */
        .text-muted { color: var(--text-muted); }
        .text-center { text-align: center; }

        @media (max-width: 600px) {
            .container {
                padding: calc(var(--spacing-unit) * 1.5) var(--spacing-unit);
            }
            .page-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="site-title"><a href="{{ config.base_url }}/">{{ site.title }}</a></div>
            <div class="site-description">{{ site.description }}</div>
            <nav>
                <a href="{{ config.base_url }}/">Home</a>
                <a href="{{ config.base_url }}/posts/">Writing</a>
            </nav>
        </header>
        <main>
