<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinimalZen</title>
    <meta name="description" content="극단적 미니멀리즘, 여백의 미">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --text-muted: #888888;
            --accent-color: #000000;
            --border-color: #eeeeee;
            --spacing-unit: 2rem;
            --max-width: 650px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            font-size: 16px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: calc(var(--spacing-unit) * 3) var(--spacing-unit);
        }

        header {
            margin-bottom: calc(var(--spacing-unit) * 4);
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .site-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        .site-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--text-color);
        }

        a {
            color: var(--accent-color);
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 500;
            line-height: 1.3;
            margin-top: calc(var(--spacing-unit) * 2);
            margin-bottom: var(--spacing-unit);
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }

        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.25rem; }

        p, ul, ol, blockquote, pre {
            margin-bottom: var(--spacing-unit);
        }

        ul, ol {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        blockquote {
            border-left: 2px solid var(--border-color);
            padding-left: 1.5rem;
            color: var(--text-muted);
            font-style: italic;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: calc(var(--spacing-unit) * 3) 0;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .post-title {
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
        }

        .post-title a {
            text-decoration: none;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .post-summary {
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .page-header {
            margin-bottom: calc(var(--spacing-unit) * 3);
        }

        .page-title {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        /* Utilities */
        .text-muted { color: var(--text-muted); }
        .text-center { text-align: center; }

        @media (max-width: 600px) {
            .container {
                padding: calc(var(--spacing-unit) * 1.5) var(--spacing-unit);
            }
            .page-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="site-title"><a href="../">MinimalZen</a></div>
            <div class="site-description">극단적 미니멀리즘, 여백의 미</div>
            <nav>
                <a href="../">Home</a>
                <a href="../posts/">Writing</a>
            </nav>
        </header>
        <main>

<div class="content">
    <p>This space is dedicated to the essential. A place to focus on thoughts, unburdened by distraction.</p>
</div>

<div class="recent-posts" style="margin-top: calc(var(--spacing-unit) * 3);">
    <h2 style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem;">Recent Writing</h2>


    <ul class="post-list">

        <li class="post-item" style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <div class="post-title" style="margin: 0; font-size: 1.1rem;"><a href="../posts/the-art-of-less.html">The Art of Less</a></div>
            <time class="post-meta" style="margin: 0; min-width: 100px; text-align: right;">2024-05-12</time>
        </li>

    </ul>
    <div style="margin-top: 1.5rem;">
        <a href="../posts/" style="font-size: 0.9rem; color: var(--text-muted); text-decoration: none;">View all writing &rarr;</a>
    </div>
</div>

        </main>
        <footer style="margin-top: calc(var(--spacing-unit) * 4); padding-top: calc(var(--spacing-unit) * 2); border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem; text-align: center;">
            <p>&copy; 2024 MinimalZen. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
