{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{{ page.title }}</h1>
</div>

<ul class="post-list">
    {% for post in content %}
    <li class="glass-card">
        <a href="{{ base_url }}{{ post.path }}" class="post-item">
            <h2 class="post-title">{{ post.title }}</h2>
            <div class="post-meta">{{ post.date | date(format="%B %d, %Y") }}</div>
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
