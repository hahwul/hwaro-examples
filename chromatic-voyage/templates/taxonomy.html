{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{{ page.title }}</h1>
</div>

<div class="content">
    <ul class="post-list" style="display: flex; flex-wrap: wrap; gap: 1rem;">
        {% for term in content %}
        <li>
            <a href="{{ base_url }}{{ term.path }}" class="btn" style="background: var(--surface); border: 1px solid var(--surface-border); box-shadow: none; color: var(--text-primary) !important;">
                {{ term.name }} ({{ term.pages | length }})
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
