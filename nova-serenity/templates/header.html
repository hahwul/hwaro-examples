<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-cyan: #00f0ff;
      --primary-magenta: #ff0055;
      --bg-deep: #050510;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.08), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.3;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(135deg, var(--text-main), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; }

    a {
      color: var(--primary-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a:hover {
      color: var(--primary-magenta);
      text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
    }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      border: 1px solid var(--glass-border);
      color: var(--primary-cyan);
    }
    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 10; }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      margin: 2rem 0;
      border-radius: 100px;
    }
    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text-main);
      letter-spacing: 0.05em;
      position: relative;
    }
    .site-logo::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--primary-cyan), var(--primary-magenta));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .site-logo:hover::after { opacity: 1; }
    .site-logo:hover { color: var(--text-main); text-shadow: none; }

    .site-header nav { display: flex; gap: 1.5rem; align-items: center; }
    .site-header nav a {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .site-header nav a:hover { color: var(--primary-cyan); }

    .site-main { min-height: calc(100vh - 250px); }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      border-radius: 16px;
    }

    /* Lists & Pagination */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.1);
      border-color: rgba(0, 240, 255, 0.3);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem;}

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 40px; height: 40px;
      padding: 0 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      text-decoration: none;
      background: rgba(255,255,255,0.02);
      transition: all 0.2s;
    }
    nav.pagination a:hover {
      color: var(--primary-cyan);
      border-color: var(--primary-cyan);
      background: rgba(0,240,255,0.1);
      box-shadow: 0 0 10px rgba(0,240,255,0.2);
    }
    .pagination-current span {
      color: var(--bg-deep);
      border-color: var(--primary-cyan);
      background: var(--primary-cyan);
      font-weight: 700;
    }
    .pagination-disabled span { opacity: 0.3; cursor: not-allowed; }

    /* Ambient background glowing orbs */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      opacity: 0.5;
      pointer-events: none;
    }
    .orb-1 {
      top: -10%; left: -10%;
      width: 40vw; height: 40vw;
      background: var(--primary-cyan);
      animation: float1 20s infinite alternate ease-in-out;
    }
    .orb-2 {
      bottom: -10%; right: -5%;
      width: 35vw; height: 35vw;
      background: var(--primary-magenta);
      animation: float2 25s infinite alternate ease-in-out;
    }

    @keyframes float1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 10%) scale(1.1); } }
    @keyframes float2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-10%, -15%) scale(1.2); } }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; border-radius: 16px; }
      .site-wrapper { padding: 0 1rem; }
      .glass-panel { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
