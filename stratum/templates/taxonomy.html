{% include "header.html" %}

  <main class="taxonomy-main">
    <header class="taxonomy-header">
      <h1 class="taxonomy-title">{{ page.title }}</h1>
      <p class="taxonomy-desc">Classified specimens from the geological record.</p>
    </header>
    <div class="taxonomy-list">
      {% for term in page.terms %}
      <a href="{{ base_url }}/{{ page.taxonomy }}/{{ term.name }}/" class="taxonomy-item">
        <span class="taxonomy-name">{{ term.name }}</span>
        <span class="taxonomy-count">{{ term.pages | length }} specimens</span>
      </a>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
