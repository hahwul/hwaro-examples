{% include "header.html" %}

<article class="anaglyph-box">
    <h2 class="anaglyph-text">{{ page.title }}</h2>
    {% if page.date and page.date != "" %}
    <span class="post-meta">{{ page.date | date("%B %d, %Y") }}</span>
    {% endif %}
    <div class="content">
        {{ content | safe }}
    </div>
</article>
