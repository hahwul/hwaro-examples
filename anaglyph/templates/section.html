{% include "header.html" %}

<section>
    <h2 class="anaglyph-text">{{ section.title }}</h2>

    <div class="content" style="margin-bottom: 4rem;">
        {{ content | safe }}
    </div>

    <div class="post-list">
        {% for post in section.pages %}
        <div class="post-item anaglyph-box">
            <span class="post-meta">{{ post.date | date("%B %d, %Y") }}</span>
            <h2 class="anaglyph-text"><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <p>{{ post.summary | strip_html | truncate_words(30) }}</p>
            <a href="{{ post.url }}" class="anaglyph-text-sub" style="margin-top: 1rem; display: inline-block; font-weight: bold;">Read More &rarr;</a>
        </div>
        {% endfor %}
    </div>
</section>

{% include "footer.html" %}
