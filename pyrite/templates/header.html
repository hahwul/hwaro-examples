<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ og_all_tags }}
</head>
<body>
  <div class="sparkle-overlay" aria-hidden="true"></div>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ base_url }}/" class="site-brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/products/">Products</a>
        <a href="{{ base_url }}/tags/">Collection</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
