{% extends "base.html" %}

{% block content %}
    <h2>{{ taxonomy_name | upper }}</h2>
    <ul class="post-list">
        {% for term, pages in taxonomy_terms %}
            <li class="post-item" style="border: none; margin-bottom: 20px;">
                <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}" style="font-size: 1.5rem; font-family: 'Cormorant Garamond', serif; color: var(--yarn-accent1);">{{ term }} ({{ pages | length }})</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
