{% extends "base.html" %}

{% block content %}
    <article>
        <h2>{{ page.title }}</h2>
        {% if page.date %}
            <div class="meta">Woven on {{ page.date | date(format="%B %d, %Y") }}</div>
        {% endif %}
        
        <div class="content">
            {{ content | safe }}
        </div>
    </article>
{% endblock %}
