{% include "header.html" %}
{% include "nav.html" %}
<div class="blog-container">
  <main class="blog-main">
    <h1>{{ page.title | e }}</h1>
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>

    <ul class="tags-list">
      {% for term in taxonomy_terms %}
        <li class="tag-item">
          <a href="{{ term.url }}">{{ term.name }} ({{ term.pages | length }})</a>
        </li>
      {% endfor %}
    </ul>

    {{ content | safe }}
{% include "footer.html" %}
