<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(site.title) }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #334155;
            --heading-color: #0f172a;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --sidebar-bg: #f8fafc;
            --info-bg: #eff6ff;
            --info-border: #bfdbfe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        .site-title:hover {
            text-decoration: none;
            color: var(--accent-color);
        }

        .nav-section {
            margin-bottom: 1.5rem;
        }

        .nav-section-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.75rem;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            color: var(--text-color);
            font-size: 0.95rem;
            display: block;
            padding: 0.25rem 0;
        }

        .nav-link:hover {
            color: var(--accent-color);
            text-decoration: none;
        }

        /* Main Content */
        .main-wrapper {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content {
            flex: 1;
            max-width: 800px;
            padding: 3rem 4rem;
        }

        /* Typography Hierarchy */
        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            font-weight: 600;
            line-height: 1.3;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.25rem; margin-top: 0; }
        h2 { font-size: 1.875rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        h3 { font-size: 1.5rem; }
        h4 { font-size: 1.25rem; }

        p { margin-bottom: 1.25rem; }

        /* Lists */
        ul, ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        li { margin-bottom: 0.5rem; }

        /* Info Boxes / Blockquotes */
        blockquote {
            background-color: var(--info-bg);
            border-left: 4px solid var(--accent-color);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 0.25rem 0.25rem 0;
        }

        blockquote p:last-child {
            margin-bottom: 0;
        }

        /* Code */
        code {
            background-color: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875em;
        }

        pre {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        th, td {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
        }

        /* Page Meta */
        .page-meta {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .main-wrapper { margin-left: 0; }
            .content { padding: 2rem; }
        }
    </style>
    {{ auto_includes | safe }}
</head>
<body>
    <aside class="sidebar">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>

        <nav>
            {% for section_path in site.sections %}
                {% set s = get_section(path=section_path) %}
                <div class="nav-section">
                    <h3 class="nav-section-title">{{ s.title }}</h3>
                    <ul class="nav-list">
                        {% for p in s.pages %}
                            <li class="nav-item">
                                <a href="{{ p.url }}" class="nav-link">{{ p.title }}</a>
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            {% endfor %}
        </nav>
    </aside>
    <div class="main-wrapper">
        <main class="content">
