{% include "header.html" %}

<article>
    <header>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p class="page-meta">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="page-content">
        {{ content | safe }}
    </div>

    {% if page.taxonomies.tags %}
        <div class="tags" style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
            <strong style="font-size: 0.875rem; color: #64748b;">Tags:</strong>
            {% for tag in page.taxonomies.tags %}
                <a href="{{ base_url }}/tags/{{ tag | slugify }}/" style="display: inline-block; background-color: #f1f5f9; color: var(--text-color); font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 9999px; text-decoration: none; margin-left: 0.5rem;">#{{ tag }}</a>
            {% endfor %}
        </div>
    {% endif %}
</article>

{% include "footer.html" %}
