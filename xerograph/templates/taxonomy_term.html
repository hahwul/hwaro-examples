{% include "header.html" %}

<div class="section-header">
  <span class="hero-label">{{ taxonomy_name }} /</span>
  <h1 class="section-title">{{ taxonomy_term }}</h1>
</div>

{% for post in taxonomy_pages %}
<a href="{{ base_url }}{{ post.url }}" class="post-entry">
  <h2 class="post-entry-title">{{ post.title }}</h2>
  {% if post.description %}
  <p class="post-entry-desc">{{ post.description }}</p>
  {% endif %}
  <p class="post-entry-meta">{{ post.date | date("%Y.%m.%d") }}</p>
</a>
{% endfor %}

<div>
  <a href="{{ base_url }}/{{ taxonomy_name }}/" class="back-link">All {{ taxonomy_name }}</a>
</div>

{% include "footer.html" %}
