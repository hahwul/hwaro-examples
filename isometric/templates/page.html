<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ config.title }}</title>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --text-color: #333333;
            --accent-color: #4a90e2;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --border-color: #e1e4e8;
            --nav-bg: #ffffff;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background-color: var(--nav-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            z-index: 100;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        /* Main Layout */
        main {
            flex-grow: 1;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-area {
            max-width: 800px;
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            width: 100%;
            box-sizing: border-box;

            /* Add a subtle isometric feel to the content area itself */
            position: relative;
            transform-style: preserve-3d;
            box-shadow:
                -1px 1px 0px var(--border-color),
                -2px 2px 0px var(--border-color),
                -3px 3px 0px var(--border-color),
                -4px 4px 0px var(--border-color),
                -5px 5px 0px var(--border-color),
                -10px 10px 20px var(--shadow-color);
        }

        .content-area::before, .content-area::after {
            content: '';
            position: absolute;
            background-color: #e8eaed;
            display: block;
        }

        .content-area::before {
            top: 0;
            left: -10px;
            width: 10px;
            height: 100%;
            transform-origin: right;
            background-color: #e8eaed;
        }

        .content-area::after {
            bottom: -10px;
            left: -10px;
            width: calc(100% + 10px);
            height: 10px;
            transform-origin: top;
            background-color: #d1d5db;
        }

        .page-header {
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        h1 {
            color: #1a1a1a;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .page-meta {
            color: #666;
            font-size: 0.9rem;
        }

        h2, h3 {
            color: var(--accent-color);
            margin-top: 2rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: var(--accent-color);
        }

        code {
            background-color: var(--bg-color);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid var(--border-color);
        }

        footer {
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 2rem;
            border-top: 5px solid var(--accent-color);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ISO</div>
        <div>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </div>
    </nav>

    <main>
        <article class="content-area">
            <header class="page-header">
                <h1>{{ page.title }}</h1>
                {% if page.description %}
                <p class="page-meta">{{ page.description }}</p>
                {% endif %}
            </header>

            <div class="page-content">
                {{ page.content | safe }}
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 Isometric UI. Elegant design with pure CSS transforms.</p>
    </footer>

</body>
</html>
