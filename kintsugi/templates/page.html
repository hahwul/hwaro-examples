{% extends "base.html" %}

{% block content %}
<article class="single-page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="meta-line">
            <div class="gold-dot"></div>
            <time class="page-date">{{ page.date | date(format="%B %d, %Y") }}</time>
            <div class="gold-dot"></div>
        </div>
        {% endif %}
        <div class="header-fracture"></div>
    </header>

    <div class="page-content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
