<!DOCTYPE html>
<html lang="{{ config.default_language }}">
<head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ config.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ config.description }}">
    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="kintsugi-vessel">
        <header class="header">
            <h1 class="site-title"><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
            <p class="site-tagline">{{ config.description }}</p>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="{{ config.base_url }}" class="nav-link">Home</a></li>
                </ul>
            </nav>
            <div class="fracture top-fracture"></div>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <div class="fracture bottom-fracture"></div>
            <p>&copy; {{ config.extra.author | default(value="Hwaro") }}. All rights reserved.</p>
        </footer>
    </div>

    <!-- Background crack overlays using SVG -->
    <svg class="crack-overlay crack-1" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M0,20 L30,35 L40,60 L70,55 L90,80 L100,75" stroke="var(--gold-main)" stroke-width="0.5" fill="none" vector-effect="non-scaling-stroke"/>
        <path d="M40,60 L20,80" stroke="var(--gold-main)" stroke-width="0.3" fill="none" vector-effect="non-scaling-stroke"/>
    </svg>
    <svg class="crack-overlay crack-2" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M20,100 L35,70 L60,80 L75,40 L100,30" stroke="var(--gold-main)" stroke-width="0.4" fill="none" vector-effect="non-scaling-stroke"/>
    </svg>
</body>
</html>
