{% extends "base.html" %}

{% block content %}
<div class="plate-frame">
    <div class="plate-content">
        <h1>Term: {{ term.name }}</h1>
        <ul class="post-list">
            {% for page in term.pages %}
                <li class="post-item">
                    <h2 class="post-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
                    <div class="post-meta">
                        {% if page.date %}
                            <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
                        {% endif %}
                    </div>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock content %}
