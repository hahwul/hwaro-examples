{% extends "base.html" %}

{% block content %}
<div class="plate-frame">
    <div class="plate-content">
        <h1>Taxonomies</h1>
        <ul class="taxonomy-list">
            {% for term in terms %}
                <li class="taxonomy-item">
                    <a href="{{ term.permalink }}">{{ term.name }} ({{ term.pages | length }})</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock content %}
