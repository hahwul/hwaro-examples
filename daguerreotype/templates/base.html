<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% elif section.description %}{{ section.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1 class="site-title"><a href="{{ base_url }}" style="border:none; color:inherit;">{{ site.title }}</a></h1>
            {% if site.description %}
                <p class="site-description">{{ site.description }}</p>
            {% endif %}

            <nav class="main-nav">
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/about">About</a>
                <a href="{{ base_url }}/gallery">Gallery</a>
                <a href="{{ base_url }}/tags">Tags</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.title }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
