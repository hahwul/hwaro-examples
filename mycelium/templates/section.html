{% extends "base.html" %}

{% block content %}
<div class="glowing-article">
    <header class="article-header">
        <h1 class="glow-text">{{ section.title }}</h1>
        {% if section.description %}
            <p class="header-desc">{{ section.description }}</p>
        {% endif %}
    </header>
    
    <div class="article-body">
        <ul>
            {% for page in section.pages %}
                <li>
                    <a href="{{ page.url }}" class="glow-text">{{ page.title }}</a>
                    {% if page.date %}
                        - <span style="opacity: 0.7">{{ page.date | date("%Y-%m-%d") }}</span>
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
