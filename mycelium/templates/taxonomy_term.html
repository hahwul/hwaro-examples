{% extends "base.html" %}

{% block content %}
<div class="glowing-article">
    <header class="article-header">
        <h1 class="glow-text">{{ taxonomy_term | capitalize }}</h1>
    </header>

    <div class="article-body">
        <ul>
            {% for page in taxonomy_pages %}
                <li>
                    <a href="{{ page.url }}" class="glow-text">{{ page.title }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
