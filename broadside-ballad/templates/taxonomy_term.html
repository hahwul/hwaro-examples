{% include "header.html" %}
<section class="content">
  <h1>{{ taxonomy_term | e }}</h1>
  <p class="taxonomy-desc">Broadsides pertaining to this subject:</p>
  <div class="ornament" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="14" viewBox="0 0 240 14" fill="currentColor">
      <path d="M0 7 h100 M140 7 h100" stroke="currentColor" stroke-width="1" />
      <path d="M114 7 l6 -5 6 5 -6 5 z" />
    </svg>
  </div>
  <ul class="section-list">
    {% for p in taxonomy_pages %}
      <li><a href="{{ p.url }}">{{ p.title }}</a></li>
    {% endfor %}
  </ul>
</section>
{% include "footer.html" %}
