{% include "header.html" %}
<section class="content">
  <h1>{{ taxonomy_name | e }}</h1>
  <p class="taxonomy-desc">A register of subjects treated in these sheets:</p>
  <div class="ornament" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="240" height="14" viewBox="0 0 240 14" fill="currentColor">
      <path d="M0 7 h100 M140 7 h100" stroke="currentColor" stroke-width="1" />
      <circle cx="120" cy="7" r="3" />
    </svg>
  </div>
  <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></li>
    {% endfor %}
  </ul>
</section>
{% include "footer.html" %}
