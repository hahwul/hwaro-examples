<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page_title and page_title != site_title %}{{ page_title }} - {{ site_title }}{% else %}{{ site_title }} - Outdoor Trekking Journal{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --contour-green: #2d5016;
      --elevation-brown: #8b6f47;
      --ridge-white: #f5f3ed;
      --valley-blue: #4a7c8c;
      --lowland-green: #5a7c3e;
      --highland-brown: #6b5333;
      --snow-white: #fafaf8;
      --text-dark: #1a1a1a;
      --text-medium: #4a4a4a;
      --text-light: #7a7a7a;
      --spacing: 1rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ridge-white);
      color: var(--text-dark);
      line-height: 1.7;
      position: relative;
    }

    /* Contour line background pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 49px, var(--contour-green) 49px, var(--contour-green) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, var(--contour-green) 49px, var(--contour-green) 50px);
      background-size: 50px 50px;
    }

    /* SVG contour pattern overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.03;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20,100 Q50,80 80,100 T140,100 T180,100' stroke='%232d5016' fill='none' stroke-width='1'/%3E%3Cpath d='M20,120 Q50,100 80,120 T140,120 T180,120' stroke='%232d5016' fill='none' stroke-width='0.8'/%3E%3Cpath d='M20,140 Q50,120 80,140 T140,140 T180,140' stroke='%232d5016' fill='none' stroke-width='0.6'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    .site-header {
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, var(--snow-white) 0%, var(--ridge-white) 100%);
      border-bottom: 3px solid var(--contour-green);
      padding: 2rem 0;
      box-shadow: 0 2px 8px rgba(45, 80, 22, 0.1);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .site-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--contour-green);
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      transform: translateY(-2px);
      color: var(--lowland-green);
    }

    .topo-icon {
      width: 50px;
      height: 50px;
      color: var(--elevation-brown);
    }

    .site-title-text {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--contour-green) 0%, var(--elevation-brown) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .elevation-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      background: var(--lowland-green);
      color: white;
      border-radius: 12px;
      margin-left: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .site-nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .site-nav a {
      text-decoration: none;
      color: var(--text-medium);
      font-weight: 500;
      font-size: 1rem;
      position: relative;
      transition: color 0.3s ease;
      padding: 0.5rem 0;
    }

    .site-nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--contour-green);
      transition: width 0.3s ease;
    }

    .site-nav a:hover {
      color: var(--contour-green);
    }

    .site-nav a:hover::after {
      width: 100%;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      min-height: calc(100vh - 400px);
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        text-align: center;
      }

      .site-nav {
        flex-direction: column;
        gap: 1rem;
      }

      .site-title-text {
        font-size: 1.5rem;
      }

      main {
        padding: 2rem 1rem;
      }
    }
  </style>
  {% if site.feeds and site.feeds.enabled %}
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{{ base_url }}/rss.xml">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <a href="{{ base_url }}/" class="site-logo">
          <svg class="topo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Mountain peaks with contour lines -->
            <path d="M10,80 L30,40 L50,60 L70,25 L90,80" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Contour lines representing elevation -->
            <ellipse cx="50" cy="50" rx="40" ry="8" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/>
            <ellipse cx="50" cy="55" rx="35" ry="7" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5"/>
            <ellipse cx="50" cy="60" rx="30" ry="6" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
            <ellipse cx="50" cy="65" rx="25" ry="5" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.3"/>
            <!-- Peak marker -->
            <circle cx="70" cy="25" r="3" fill="currentColor"/>
            <text x="70" y="20" text-anchor="middle" font-size="8" fill="currentColor" font-weight="600">▲</text>
          </svg>
          <span class="site-title-text">Topography</span>
        </a>
      </div>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Trails</a>
        <a href="{{ base_url }}/tags/">Regions</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
  <main>
