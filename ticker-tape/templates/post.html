{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <header class="post-header">
        {% if page.extra.award %}
        <p class="post-award">{{ page.extra.award }}</p>
        {% endif %}
        <h1 class="post-title">{{ page.title | e }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
      <footer class="post-footer">
        <a href="{{ base_url }}/winners/" class="back-link">&larr; Back to the winners</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
