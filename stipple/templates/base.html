<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="st-frame">
        <header class="st-header">
            <div class="st-header-inner">
                <a href="{{ base_url }}" class="st-logo">{{ site.title }}</a>
                <nav class="st-nav">
                    <a href="{{ base_url }}" class="st-nav-link">Works</a>
                    <a href="#about" class="st-nav-link">About</a>
                </nav>
            </div>
        </header>

        <main class="st-main">
            {% block content %}{% endblock content %}
        </main>

        <footer class="st-footer">
            <div class="st-footer-inner">
                <div class="st-footer-mark">
                    <span class="st-footer-dot"></span>
                    <span class="st-footer-dot"></span>
                    <span class="st-footer-dot"></span>
                </div>
                <p class="st-footer-text">&copy; {{ site.title }}. Point by point.</p>
            </div>
        </footer>
    </div>
</body>
</html>
