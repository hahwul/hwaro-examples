<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@900&family=Pathway+Extreme:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --red: #D20000;
      --black: #050505;
      --dark-gray: #151515;
      --white: #FFFFFF;
      --gray: #888888;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Pathway Extreme', sans-serif;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 2rem 0;
      border-bottom: 4px solid var(--white);
      margin-bottom: 2rem;
    }

    .nav-belt {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-belt a {
      color: var(--white);
      text-decoration: none;
      margin-right: 2rem;
    }

    .hero-split {
      display: flex;
      min-height: 70vh;
      position: relative;
    }

    .fighter {
      flex: 1;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .fighter-red {
      background-color: var(--red);
      text-align: right;
    }

    .fighter-blue {
      background-color: var(--dark-gray);
      text-align: left;
    }

    .fighter-name {
      font-family: 'Passion One', sans-serif;
      font-size: 220px;
      line-height: 0.8;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -0.05em;
    }

    .fighter-stats {
      margin-top: 2rem;
      font-family: 'Pathway Extreme', sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .vs-separator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background-color: var(--white);
      color: var(--black);
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 700;
      clip-path: circle(50% at 50% 50%);
    }

    .vs-svg {
      position: absolute;
      width: 150px;
      height: 150px;
      opacity: 0.2;
    }

    .main-content {
      padding: 4rem 0;
    }

    .tape-measure {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2rem;
      align-items: center;
      margin: 4rem 0;
      font-family: 'Pathway Extreme', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }

    .tape-label {
      text-align: center;
      color: var(--gray);
      font-size: 14px;
    }

    .ring-diagram {
      border: 2px solid var(--white);
      padding: 4rem;
      text-align: center;
      margin: 4rem 0;
    }

    .stake-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 4rem;
    }

    footer {
      background-color: var(--white);
      color: var(--black);
      padding: 2rem 0;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    @media (max-width: 1024px) {
      .hero-split { flex-direction: column; }
      .fighter-name { font-size: 120px; }
      .vs-separator { width: 80px; height: 80px; font-size: 24px; }
      .fighter { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="nav-belt">
        <div class="logo">
          <a href="{{ base_url }}/" style="font-weight: 900; font-size: 24px;">{{ site.title }}</a>
        </div>
        <nav>
          <a href="{{ base_url }}/">Fight Card</a>
          <a href="{{ base_url }}/about/">Venue</a>
        </nav>
        <div class="time">
          <span style="color: var(--red);">LIVE</span> 20:00 PT
        </div>
      </div>
    </header>

    {% block hero %}{% endblock %}

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <p>NO EMOJIS. NO GRADIENTS. TOTAL DOMINATION.</p>
  </footer>
</body>
</html>
