{% extends "base.html" %}

{% block content %}
<header class="section-header">
  <h1>{{ taxonomy_name | capitalize }}</h1>
</header>

<div class="tags-list">
  {% for term in taxonomy_terms %}
  <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="tag-item">{{ term }}</a>
  {% endfor %}
</div>
{% endblock %}
