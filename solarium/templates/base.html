<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <header class="blog-header">
    <div class="blog-header-inner">
      <a href="{{ base_url }}/" class="logo">Solarium</a>
      <nav class="nav-links">
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>

  <div class="blog-container">
    {% block content %}{% endblock %}
  </div>

  <footer class="blog-footer">
    <div class="container">
      <p>&copy; {{ current_year }} {{ site.title }}. Made with Hwaro.</p>
    </div>
  </footer>

  {{ highlight_js | safe }}
</body>
</html>
