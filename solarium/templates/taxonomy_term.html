{% extends "base.html" %}

{% block content %}
<header class="section-header">
  <span class="post-card-meta">{{ taxonomy_name | capitalize }}</span>
  <h1>{{ taxonomy_term }}</h1>
</header>

<div class="post-list">
  {% for p in taxonomy_pages %}
  <article class="post-card">
    <span class="post-card-meta">{{ p.date | date("%B %d, %Y") }}</span>
    <h2 class="post-card-title">
      <a href="{{ p.url }}">{{ p.title | e }}</a>
    </h2>
    <div class="post-card-excerpt">
      {{ p.summary | default("") | strip_html | truncate_words(30) }}
    </div>
    <a href="{{ p.url }}" class="read-more">Read Entry &rarr;</a>
  </article>
  {% endfor %}
</div>
{% endblock %}
