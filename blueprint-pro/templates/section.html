{% include "header.html" %}
  <div class="page-content">
    <h1>{{ page.title }}</h1>
    <div class="prose">{{ content | safe }}</div>
    {% for post in section.pages %}
    <div style="margin-bottom: 1.5rem; padding: 1.25rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;">
      <h3 style="margin: 0 0 0.25rem;"><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h3>
      {% if post.date %}<span style="font-size: 0.8125rem; color: var(--text-dim); font-family: var(--font-mono);">{{ post.date | date("%B %d, %Y") }}</span>{% endif %}
    </div>
    {% endfor %}
  </div>
{% include "footer.html" %}
