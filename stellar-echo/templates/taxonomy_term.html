{% extends "base.html" %}

{% block content %}
<section class="taxonomy-term-content">
  <header class="page-header">
    <h1 class="page-title">{{ term.name | e }}</h1>
    <p class="page-description">Pages in {{ taxonomy.name | capitalize | e }}</p>
  </header>
  <div class="term-pages">
    <ul class="page-list">
      {% for page in term.pages %}
        <li>
          <a href="{{ base_url }}{{ page.path }}" class="page-link">{{ page.title | e }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</section>
{% endblock %}
