<script>
(function(){
  let lastScroll = 0;
  let ticking = false;
  const root = document.documentElement;
  window.addEventListener('scroll', function(){
    if (!ticking) {
      window.requestAnimationFrame(function(){
        const currentScroll = window.scrollY;
        const speed = Math.min(Math.abs(currentScroll - lastScroll), 20);
        const intensity = 1 + speed * 0.3;
        root.style.setProperty('--aberration-x', intensity + 'px');
        root.style.setProperty('--aberration-y', (intensity * 0.5) + 'px');
        lastScroll = currentScroll;
        ticking = false;
      });
      ticking = true;
    }
  });
})();
</script>
