<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forge: { orange: '#ea580c', bg: '#ffffff', surface: '#f9fafb', border: '#e5e7eb', text: '#1f2937', muted: '#6b7280', light: '#fff7ed' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-forge-bg text-forge-text font-sans; }
    .prose { @apply max-w-none text-forge-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-forge-text; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-forge-text border-b border-forge-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-forge-text; }
    .prose p { @apply my-3 leading-relaxed; }
    .prose a { @apply text-forge-orange hover:underline; }
    .prose strong { @apply font-semibold; }
    .prose code { @apply bg-forge-surface px-1.5 py-0.5 rounded text-sm font-mono border border-forge-border; }
    .prose pre { @apply bg-gray-900 text-gray-100 p-4 rounded my-4 overflow-x-auto text-sm; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-gray-100; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5; }
    .prose ul li { @apply list-disc marker:text-forge-orange; }
    .prose ol li { @apply list-decimal marker:text-forge-orange; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-forge-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold border border-forge-border; }
    .prose td { @apply px-4 py-2 border border-forge-border; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-forge-border bg-forge-text sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-bold text-white hover:text-forge-orange transition-colors flex items-center gap-2">
        <svg class="w-5 h-5 text-forge-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"/></svg>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/getting-started/" class="text-gray-400 hover:text-white transition-colors">Getting Started</a>
        <a href="{{ base_url }}/contributing/" class="text-gray-400 hover:text-white transition-colors">Contributing</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
