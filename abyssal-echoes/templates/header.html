<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif site.description %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ auto_includes | safe }}
</head>
<body>
    <header>
        <div class="container nav-content">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav>
                <ul>
                    <li><a href="{{ base_url }}/">Home</a></li>
                    <li><a href="{{ base_url }}/posts/">Echoes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
