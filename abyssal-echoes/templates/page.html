{% include "header.html" %}

<article class="glass-panel">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <span class="post-meta">{{ page.date | date("%B %d, %Y") }}</span>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
