<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
</head>
<body>
    <header class="heliograph-header">
        <div class="logo-container">
            <h1 class="logo">{{ config.title }}</h1>
            <div class="logo-reflection" aria-hidden="true">{{ config.title }}</div>
        </div>
        <nav class="nav-links">
            <a href="{{ config.base_url }}/">Home</a>
        </nav>
    </header>
    <main class="heliograph-main">
        {% block content %}{% endblock content %}
    </main>
    <footer class="heliograph-footer">
        <p>&copy; {{ config.extra.author | default(value="Heliograph") }}</p>
    </footer>
</body>
</html>
