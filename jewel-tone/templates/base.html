<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --emerald: #50C878;
      --ruby: #E0115F;
      --sapphire: #0F52BA;
      --amethyst: #9966CC;
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --text-muted: #a0a0a0;
      --border: #222;
      --bg-subtle: #111;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--emerald); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(80, 200, 120, 0.5); }
    .site-logo:hover { color: var(--ruby); text-shadow: 0 0 10px rgba(224, 17, 95, 0.5); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--sapphire); text-shadow: 0 0 10px rgba(15, 82, 186, 0.5); }

    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 1em; font-weight: 700; }
    h1 { font-size: 2.5rem; margin-top: 0; color: var(--sapphire); text-shadow: 0 0 15px rgba(15, 82, 186, 0.4); }
    h2 { font-size: 1.8rem; color: var(--amethyst); text-shadow: 0 0 15px rgba(153, 102, 204, 0.4); }
    h3 { font-size: 1.4rem; color: var(--emerald); }
    p { margin: 1.5em 0; font-size: 1.1rem; }
    a { color: var(--ruby); text-decoration: none; }
    a:hover { text-shadow: 0 0 10px rgba(224, 17, 95, 0.5); }

    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, Consolas, monospace; border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; }

    .card { background: var(--bg-subtle); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); margin: 2rem 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: var(--amethyst); box-shadow: 0 10px 30px rgba(153, 102, 204, 0.2); }

    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: all 0.3s; }
    ul.section-list li:hover { border-color: var(--sapphire); box-shadow: 0 0 15px rgba(15, 82, 186, 0.2); transform: translateX(5px); }
    ul.section-list li a { font-weight: 600; font-size: 1.2rem; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
    <footer class="site-footer">
      <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
    </footer>
  </div>
</body>
</html>
