<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
</head>
<body>

  <svg class="svg-filters">
    <defs>
      <filter id="moss-texture" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise" />
        <feColorMatrix type="matrix" values="
          0 0 0 0 0.33
          0 0 0 0 0.42
          0 0 0 0 0.18
          0 0 0 0.15 0" in="noise" result="coloredNoise" />
        <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply" />
      </filter>
    </defs>
  </svg>

  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{{ site.base_url }}/">{{ site.title }}</a></h1>
      <p class="site-description">{{ site.description }}</p>
      <nav class="site-nav">
        <a href="{{ site.base_url }}/">Home</a>
        <a href="{{ site.base_url }}/about/">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
