{% include "header.html" %}

<article class="organic-box">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
    <div class="post-meta">
      <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
    </div>
    {% endif %}
  </header>
  
  <div class="post-content">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
