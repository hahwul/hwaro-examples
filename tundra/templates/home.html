{% include "header.html" %}

  <main>
    <div class="container">
      {% for item in site.pages %}
      <article class="post-item">
        <a href="{{ item.url }}">
          <h2 class="post-item-title">{{ item.title }}</h2>
          <div class="post-item-meta">
            {% if item.date %}{{ item.date }}{% endif %}
            {% if item.reading_time %} &middot; {{ item.reading_time }} min read{% endif %}
          </div>
          {% if item.description %}<p class="post-item-desc">{{ item.description }}</p>{% endif %}
        </a>
      </article>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
