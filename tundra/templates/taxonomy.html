{% include "header.html" %}

<h1 class="page-title">{{ page.title }}</h1>

<ul class="taxonomy-list">
  {% for term in og_all_tags %}
  <li>
    <a href="{{ base_url }}/tags/{{ term.name }}/">
      <span>{{ term.name }}</span>
      <span class="taxonomy-count">{{ term.count }}</span>
    </a>
  </li>
  {% endfor %}
</ul>
