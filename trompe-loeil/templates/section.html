{% include "header.html" %}

<main>
  <article>
    <header>
      <h1>{{ section.title | default(page.title) }}</h1>
      {% if section.description %}
        <p>{{ section.description }}</p>
      {% endif %}
    </header>

    <ul class="post-list">
      {% for item in section.pages %}
      <li>
        <a href="{{ base_url }}{{ item.url }}">{{ item.title }}</a>
        <span class="post-date">{{ item.date | date("%Y-%m-%d") }}</span>
      </li>
      {% endfor %}
    </ul>
  </article>
</main>

{% include "footer.html" %}
