<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(site.title) }}</title>
  <style>
    :root {
      --bg: #fdf5e6;
      --fg: #111;
      --accent: #ff3366;
      --shadow-color: #111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Courier New", Courier, monospace;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    a {
      color: var(--fg);
      text-decoration: none;
      font-weight: bold;
      border-bottom: 2px solid var(--fg);
      transition: all 0.2s ease;
    }

    a:hover {
      background-color: var(--fg);
      color: var(--bg);
    }

    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 3rem;
      border: 4px solid var(--fg);
      background-color: white;
      padding: 1.5rem;
      box-shadow: 12px 12px 0px var(--shadow-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    main {
      width: 100%;
      max-width: 800px;
      background-color: white;
      border: 4px solid var(--fg);
      padding: 2.5rem;
      box-shadow: 16px 16px 0px var(--shadow-color);
      margin-bottom: 3rem;
      position: relative;
    }

    /* Trompe-l'œil folded corner effect */
    main::after {
      content: '';
      position: absolute;
      top: -4px;
      right: -4px;
      border-width: 0 40px 40px 0;
      border-style: solid;
      border-color: var(--bg) var(--bg) var(--fg) var(--fg);
      display: block;
      width: 0;
      box-shadow: -4px 4px 0px rgba(0,0,0,0.1);
    }

    article header {
      border: none;
      box-shadow: none;
      padding: 0;
      margin-bottom: 2rem;
      display: block;
    }

    article h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .post-meta {
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      padding: 0.5rem;
      background-color: var(--fg);
      color: white;
      display: inline-block;
      box-shadow: 4px 4px 0px var(--accent);
      margin-bottom: 2rem;
    }

    .post-meta a {
      color: white;
      border-color: white;
    }

    .post-meta a:hover {
      background-color: white;
      color: var(--fg);
    }

    .content h2, .content h3 {
      margin-top: 2rem;
      margin-bottom: 1rem;
      border-left: 8px solid var(--accent);
      padding-left: 1rem;
    }

    .content p {
      margin-bottom: 1.5rem;
    }

    .content img {
      max-width: 100%;
      height: auto;
      border: 4px solid var(--fg);
      box-shadow: 8px 8px 0px var(--accent);
      margin: 1rem 0;
    }

    .content blockquote {
      border-left: 0;
      padding: 1.5rem;
      margin: 2rem 0;
      background-color: var(--fg);
      color: white;
      font-style: italic;
      box-shadow: 8px 8px 0px var(--accent);
    }

    .post-list {
      list-style: none;
    }

    .post-list li {
      margin-bottom: 1.5rem;
      border: 3px solid var(--fg);
      padding: 1rem;
      background: white;
      box-shadow: 6px 6px 0px var(--accent);
      transition: transform 0.1s ease;
    }

    .post-list li:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px var(--accent);
    }

    .post-list a {
      font-size: 1.5rem;
      border: none;
    }

    .post-list a:hover {
      background: none;
      color: var(--accent);
    }

    .post-date {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    footer {
      width: 100%;
      max-width: 800px;
      text-align: center;
      font-weight: bold;
      padding: 2rem;
      border-top: 4px solid var(--fg);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ base_url }}/" style="border:none;">{{ site.title }}</a></h1>
    <nav>
      <ul>
        <li><a href="{{ base_url }}/">Home</a></li>
        <li><a href="{{ base_url }}/about/">About</a></li>
        <li><a href="{{ base_url }}/posts/">Posts</a></li>
      </ul>
    </nav>
  </header>
