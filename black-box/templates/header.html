<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Josefin+Sans:wght@200;300;400&family=Inter:wght@200;300;400&family=Outfit:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <rect x="2" y="2" width="36" height="36" fill="none" stroke="#e8e2d5" stroke-width="1"/>
          <circle cx="20" cy="20" r="5" fill="#f4efdf"/>
          <circle cx="20" cy="20" r="11" fill="none" stroke="#f4efdf" stroke-width="0.5" opacity="0.3"/>
        </svg>
        <span>black&nbsp;box</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Stage</a>
        <a href="{{ base_url }}/shows/">Shows</a>
        <a href="{{ base_url }}/company/">Company</a>
        <a href="{{ base_url }}/reserve/" class="nav-cta">Reserve</a>
      </nav>
    </header>
