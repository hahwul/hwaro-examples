{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <div class="spotlight-pool">
        <svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" class="spotlight-svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="spotPost" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#f4efdf" stop-opacity="0.2"/>
              <stop offset="55%" stop-color="#f4efdf" stop-opacity="0.05"/>
              <stop offset="100%" stop-color="#f4efdf" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <ellipse cx="400" cy="140" rx="300" ry="120" fill="url(#spotPost)"/>
        </svg>
        <div class="spotlight-text">
          {% if page.extra.showtime %}
          <p class="showtime-monos">{{ page.extra.showtime }}</p>
          {% endif %}
          <h1 class="post-title">{{ page.title | e }}</h1>
          {% if page.description %}
          <p class="post-description">{{ page.description | e }}</p>
          {% endif %}
        </div>
      </div>
      <div class="post-content">
        {{ content }}
      </div>
      <footer class="post-footer">
        <a href="{{ base_url }}/shows/" class="back-link">&larr; back to the programme</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
