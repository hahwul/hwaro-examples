{% include "header.html" %}

  <main class="site-main container">
    <h1>{{ page.title }}</h1>

    {{ content }}

    <ul class="posts-list">
      {% for item in section.pages %}
      <li class="post-card-item">
        <a href="{{ base_url }}{{ item.url }}">
          <span class="post-date">{{ item.date | date("%b %d, %Y") }}</span>
          <span class="post-title">{{ item.title }}</span>
          {% if item.description %}
          <span class="post-description">{{ item.description }}</span>
          {% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>

    {{ pagination }}
  </main>

{% include "footer.html" %}
