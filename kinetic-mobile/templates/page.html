{% extends "base.html" %}

{% block content %}
<article class="hanging-element full-post-element" data-weight="15" data-length="0.1">
    <div class="wire"></div>
    <div class="content-box">
        <h1>{{ page.title }}</h1>
        <div class="meta">{{ page.date | date(format="%B %d, %Y") }}</div>
        <div class="post-content">
            {{ content | safe }}
        </div>
    </div>
</article>

<div class="nav-links hanging-element nav-element" data-weight="4" data-length="0.4">
    <div class="wire"></div>
    <div class="content-box">
        <a href="{{ site.base_url }}">← Back to Mobile</a>
    </div>
</div>
{% endblock %}
