{% extends "base.html" %}

{% block content %}
<div class="gallery">
    {% for page in section.pages %}
    <article class="hanging-element post-element" data-weight="{{ loop.index | modulo(value=5) | plus(value=2) }}" data-length="{{ loop.index | modulo(value=3) | plus(value=1) | divided_by(value=10.0) | plus(value=0.2) }}">
        <div class="wire"></div>
        <div class="content-box">
            <h2><a href="{{ base_url }}{{ page.permalink }}">{{ page.title }}</a></h2>
            <div class="meta">{{ page.date | date(format="%B %d, %Y") }}</div>
            <div class="summary">
                {{ page.content | striptags | truncate(length=100) }}
            </div>
            <a href="{{ base_url }}{{ page.permalink }}" class="read-more">View Object</a>
        </div>
    </article>
    {% endfor %}

    <!-- Decorative hanging shapes -->
    <div class="hanging-element deco-shape" data-weight="1" data-length="0.5" style="left: 10%; top: 20vh;">
        <div class="wire"></div>
        <div class="shape circle"></div>
    </div>
    <div class="hanging-element deco-shape" data-weight="8" data-length="0.8" style="right: 15%; top: 40vh;">
        <div class="wire"></div>
        <div class="shape square"></div>
    </div>
    <div class="hanging-element deco-shape" data-weight="3" data-length="0.3" style="left: 20%; top: 70vh;">
        <div class="wire"></div>
        <div class="shape triangle"></div>
    </div>
    <div class="hanging-element deco-shape" data-weight="5" data-length="0.6" style="right: 5%; top: 90vh;">
        <div class="wire"></div>
        <div class="shape arch"></div>
    </div>
</div>
{% endblock %}
