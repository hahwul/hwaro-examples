<!DOCTYPE html>
<html lang="{{ site.extra.default_language | default(value='en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.g{{ site.base_url }}.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ceiling-wire"></div>
    <div class="mobile-container" id="mobile-root">
        <header class="hanging-element title-element" data-weight="10" data-length="0.2">
            <div class="wire"></div>
            <div class="content-box">
                <h1>{{ site.title }}</h1>
                <p>{{ site.description }}</p>
                <nav>
                    <a href="{{ site.base_url }}">Home</a>
                </nav>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ site.base_url }}/js/main.js"></script>
</body>
</html>
