<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ config.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags | safe }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ base_url }}/" class="site-title">Cobblestone</a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">Menu</button>
      <ul class="nav-links">
        <li><a href="{{ base_url }}/">Home</a></li>
        <li><a href="{{ base_url }}/posts/">Journal</a></li>
        <li><a href="{{ base_url }}/tags/">Topics</a></li>
        <li><a href="{{ base_url }}/about/">About</a></li>
      </ul>
    </div>
  </nav>
