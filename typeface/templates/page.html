{% extends "base.html" %}

{% block content %}
<article class="post-content">
    <div class="container">
        <header class="post-header">
            {% if page.date %}
            <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
            {% endif %}
            <h1>{{ page.title }}</h1>
        </header>

        <div class="content">
            {{ content | safe }}
        </div>

        {% if page.tags %}
        <div class="post-tags" style="margin-top: 4rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--secondary-text);">
            Tags:
            {% for tag in page.tags %}
            <a href="{{ base_url }}/tags/{{ tag | slugify }}" style="margin-right: 1rem;">#{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</article>
{% endblock content %}
