{% extends "base.html" %}

{% block content %}
<div class="container" style="padding: 6rem 0;">
    <header style="margin-bottom: 4rem;">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; text-transform: capitalize;">{{ taxonomy_name }}</h1>
    </header>

    <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}" style="font-family: 'Syne', sans-serif; padding: 1rem 2rem; border: 1px solid var(--border-color); text-transform: uppercase; font-size: 0.9rem; font-weight: 700;">
            {{ term }}
        </a>
        {% endfor %}
    </div>
</div>
{% endblock content %}
