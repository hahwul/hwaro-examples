{% include "header.html" %}
  <main class="glass-panel">
    <div class="content">
      <header class="taxonomy-header">
        <h1>Tag: {{ taxonomy_term.name }}</h1>
        <p class="meta">{{ taxonomy_term.pages | length }} items</p>
      </header>

      <div class="posts-list">
        {% for post in taxonomy_term.pages %}
          <article class="post-item">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            <div class="post-meta">
              {% if post.date %}
                <time>{{ post.date | date(format="%Y-%m-%d") }}</time>
              {% endif %}
            </div>
          </article>
        {% endfor %}
      </div>

      <a href="{{ base_url }}/tags/" class="back-link">&larr; View all tags</a>
    </div>
  </main>

  <style>
    .taxonomy-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 1.5rem;
    }

    .taxonomy-header h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

    .meta {
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }

    .post-item {
      padding: 1rem;
      margin-bottom: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-left: 2px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .post-item:hover {
      background: rgba(255, 255, 255, 0.03);
      border-left-color: var(--accent);
    }

    .post-item h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .post-item h3 a {
      color: #fff;
    }

    .post-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }
  </style>
{% include "footer.html" %}
