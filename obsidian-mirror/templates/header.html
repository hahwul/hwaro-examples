<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Deep obsidian blacks and charcoals */
      --bg-color: #050505;
      --glass-bg: rgba(20, 20, 22, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);

      /* Sharp, volcanic accents */
      --accent: #e04a3d; /* Subdued magma red */
      --accent-glow: rgba(224, 74, 61, 0.3);

      /* Text colors */
      --text-main: #e2e2e2;
      --text-muted: #88888e;

      /* Shadows for depth */
      --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.8);
      --shadow-sharp: 2px 2px 0px rgba(0, 0, 0, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      /* Subtle noise texture to simulate stone/glass micro-imperfections */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Glassmorphism utilities */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-left: 1px solid var(--glass-highlight);
      box-shadow: var(--shadow-deep);
      border-radius: 0; /* Sharp edges */
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Reflective sheen effect */
    .glass-panel::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      animation: sheen 8s infinite;
      pointer-events: none;
    }

    @keyframes sheen {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      position: relative;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a:hover {
      color: #fff;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--accent);
      transition: width 0.3s ease;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      color: #fff;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: -1px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: text-shadow 0.3s ease;
    }

    a:hover {
      text-shadow: 0 0 8px var(--accent-glow);
    }

    /* Content styling */
    .content {
      font-size: 1.05rem;
      color: var(--text-main);
    }

    .content p {
      margin-bottom: 1.5rem;
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--glass-border);
      margin: 2rem 0;
    }

    /* Code blocks */
    pre {
      background: rgba(0, 0, 0, 0.6) !important;
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--accent);
      padding: 1.2rem;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--glass-border);
      font-size: 0.9em;
    }

    pre code {
      background: transparent;
      padding: 0;
      border: none;
    }

    blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      background: var(--glass-bg);
      border-left: 4px solid var(--accent);
      color: var(--text-muted);
      font-style: italic;
    }

    /* Lists */
    ul, ol {
      padding-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
