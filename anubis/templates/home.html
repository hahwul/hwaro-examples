{% include "header.html" %}

    <main>
      <p>{{ site.description }}</p>

      <h2>Recent Posts</h2>
      <ul class="post-list">
        {% for item in site.pages %}
        {% if item.date != "" %}
        <li>
          <a href="{{ base_url }}{{ item.url }}">{{ item.title }}</a>
          <span class="post-date">{{ item.date }}</span>
        </li>
        {% endif %}
        {% endfor %}
      </ul>
    </main>

{% include "footer.html" %}
