# =============================================================================
# Box Office - Sold Out Fast
# Issue #1576 | Tags: event, tickets, sales, urgency, countdown
# =============================================================================

title = "Box Office"
description = "A ticketing urgency site with SVG tear-off ticket shapes per tier, a bold countdown clock, and heavyweight display type shouting SOLD OUT across the hero."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
