{% include "header.html" %}

  <main class="wide-wrap">
    <div class="section-header">
      <div class="accent-bar"></div>
      <h1>Tagged: {{ taxonomy_term }}</h1>
    </div>

    <div class="post-list">
      {% for post in taxonomy_pages %}
      <a href="{{ post.url }}" class="post-item" style="text-decoration:none;">
        <span class="post-date">{{ post.date | date("%Y.%m.%d") }}</span>
        <span class="post-title">{{ post.title }}</span>
      </a>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
