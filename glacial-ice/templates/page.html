{% extends "base.html" %}

{% block content %}
<article class="glass-panel page-content">
    <header class="page-header cracked-effect">
        <h1 class="glow-text">{{ page.title }}</h1>
        <div class="post-meta">
            {% if page.date %}
            <span>{{ page.date | date(format="%B %d, %Y") }}</span>
            {% endif %}
        </div>
    </header>

    <div class="prose">
        {{ page.content | safe }}
    </div>
</article>
{% endblock %}
