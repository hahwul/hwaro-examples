<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@700&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --black: #000000;
      --white: #FFFFFF;
      --gray: #333333;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Nunito Sans', sans-serif;
      line-height: 1.6;
    }

    .spotlight-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 5;
    }

    header {
      padding: 8rem 0 4rem;
      text-align: center;
      position: relative;
    }

    .curtain-drape {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 Q 25 0 25 50 Q 25 100 0 100 L100 100 Q 75 100 75 50 Q 75 0 100 0 Z' fill='%23333333'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      opacity: 0.5;
    }

    .site-title {
      font-family: 'DM Serif Display', serif;
      font-size: 130px;
      margin: 0;
      text-transform: uppercase;
      line-height: 0.9;
    }

    nav {
      margin-top: 4rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.3em;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      border-bottom-color: var(--white);
    }

    main {
      padding: 4rem 0;
    }

    .act-label {
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.7;
      margin-bottom: 1rem;
      display: block;
      font-variant: small-caps;
    }

    .cast-name {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }

    .mask-icon {
      width: 40px;
      height: 40px;
      margin-bottom: 1rem;
      fill: var(--white);
    }

    .stage-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200px;
      z-index: -1;
      opacity: 0.1;
    }

    footer {
      padding: 6rem 0;
      text-align: center;
      border-top: 1px solid var(--gray);
      font-variant: small-caps;
      font-size: 14px;
      letter-spacing: 0.2em;
    }

    @media (max-width: 768px) {
      .site-title { font-size: 60px; }
      nav { flex-direction: column; align-items: center; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="spotlight-overlay">
    <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <polygon points="450,0 550,0 1000,1000 0,1000" fill="white" opacity="0.03" />
      <polygon points="100,0 200,0 500,1000 -200,1000" fill="white" opacity="0.02" />
      <polygon points="800,0 900,0 1200,1000 500,1000" fill="white" opacity="0.02" />
    </svg>
  </div>

  <div class="stage-floor">
    <svg width="100%" height="100%" viewBox="0 0 1000 200" preserveAspectRatio="none">
      <path d="M0 200 L450 0 M1000 200 L550 0 M200 200 L475 0 M800 200 L525 0" stroke="white" stroke-width="1" />
    </svg>
  </div>

  <div class="container">
    <header>
      <div class="curtain-drape"></div>
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Program</a>
        <a href="{{ base_url }}/about/">Auditorium</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>ILLUMINATED PERFORMANCE // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
</body>
</html>
