{% include "header.html" %}
  <main style="max-width: 1100px; margin: 0 auto; padding: 0 2rem; flex: 1; display: flex; flex-direction: column; justify-content: center;">

    <div class="hero">
      <div class="hero-label">Presentation</div>
      <h1 class="hero-title">{{ site.title }}</h1>
      <p class="hero-desc">{{ site.description }}</p>
      <div class="hero-actions">
        <a href="{{ base_url }}/slides/" class="hero-btn-primary">
          View Slides
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </a>
      </div>

      <div class="hero-info">
        <div class="hero-info-item">
          <span class="hero-info-label">Navigate</span>
          <span class="hero-info-value">Arrow Keys</span>
        </div>
        <div class="hero-info-divider"></div>
        <div class="hero-info-item">
          <span class="hero-info-label">Engine</span>
          <span class="hero-info-value">Hwaro</span>
        </div>
      </div>
    </div>

    <div class="prose" style="margin-top: 3rem;">
      {{ content }}
    </div>
  </main>

  <style>
    .hero {
      padding: 4rem 0 2rem;
    }

    .hero-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 1rem;
    }

    .hero-desc {
      font-size: 1.125rem;
      color: var(--text-muted);
      max-width: 32rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .hero-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .hero-btn-primary:hover {
      background: var(--white);
      color: var(--bg);
    }

    .hero-info {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
    }

    .hero-info-item {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .hero-info-label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .hero-info-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--white);
    }

    .hero-info-divider {
      width: 1px;
      height: 2rem;
      background: var(--border);
    }

    @media (max-width: 640px) {
      .hero { padding: 2rem 0 1rem; }
      .hero-title { font-size: 2.5rem; }
      .hero-desc { font-size: 1rem; }
    }
  </style>
{% include "footer.html" %}
