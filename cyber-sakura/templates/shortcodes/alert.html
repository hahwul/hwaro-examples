<div class="alert" style="padding: 1rem; border: 1px solid var(--border); background-color: var(--bg-subtle); border-left: 5px solid var(--primary); color: var(--text); margin: 1rem 0; box-shadow: var(--glow-pink);">
  <strong style="color: var(--secondary); font-family: 'Share Tech Mono', monospace; text-shadow: var(--glow-cyan);">{{ type | upper }}:</strong> {{ body }}
</div>
