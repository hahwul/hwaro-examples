<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1e3a5f', light: '#2a5080', dark: '#152a45' },
            gold: { DEFAULT: '#c9a84c', light: '#e0c872', dark: '#a08530' },
            lex: { bg: '#ffffff', surface: '#f8f9fc', border: '#e2e6ee', text: '#2d3748', muted: '#718096' },
          },
          fontFamily: {
            serif: ['Merriweather', 'serif'],
            sans: ['Source Sans 3', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-lex-bg text-lex-text font-sans; }
    .prose { @apply max-w-none text-lex-text; }
    .prose h1 { @apply text-2xl font-serif font-bold mb-6 text-navy; }
    .prose h2 { @apply text-xl font-serif font-bold mt-10 mb-4 text-navy border-b border-lex-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-navy-light; }
    .prose p { @apply my-3 leading-relaxed; }
    .prose a { @apply text-navy hover:text-gold underline underline-offset-4 decoration-navy/20; }
    .prose strong { @apply font-semibold text-navy; }
    .prose code { @apply bg-lex-surface px-1.5 py-0.5 rounded text-sm font-mono text-navy border border-lex-border; }
    .prose pre { @apply bg-navy-dark text-gray-100 p-4 rounded my-4 overflow-x-auto text-sm; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-gray-100; }
    .prose blockquote { @apply my-4 py-2 px-4 border-l-4 border-gold bg-lex-surface italic; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5; }
    .prose ul li { @apply list-disc marker:text-gold; }
    .prose ol li { @apply list-decimal marker:text-gold; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-lex-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold text-navy border border-lex-border; }
    .prose td { @apply px-4 py-2 border border-lex-border; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-lex-border bg-navy sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-serif font-bold text-white text-lg hover:text-gold transition-colors">{{ site.title }}</a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/api-terms/" class="text-white/60 hover:text-white transition-colors">API Terms</a>
        <a href="{{ base_url }}/infrastructure/" class="text-white/60 hover:text-white transition-colors">Infrastructure</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
