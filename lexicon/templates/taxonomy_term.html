{% include "header.html" %}
  <header class="mb-10">
    <nav class="flex items-center gap-2 text-xs text-lex-muted mb-4">
      <a href="{{ base_url }}/" class="hover:text-navy">Home</a>
      <span>/</span>
      <a href="{{ base_url }}{{ taxonomy.url }}" class="hover:text-navy">Tags</a>
      <span>/</span>
      <span class="text-navy">{{ term.name }}</span>
    </nav>
    <h1 class="text-2xl font-serif font-bold text-navy mb-2">Tag: {{ term.name }}</h1>
    <p class="text-lex-muted">{{ term.pages | length }} term(s) tagged with "{{ term.name }}".</p>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for page in term.pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-5 bg-lex-surface border border-lex-border rounded hover:border-navy/30 transition-all group">
      <h2 class="font-serif font-bold text-navy group-hover:text-gold-dark transition-colors mb-1">{{ page.title }}</h2>
      {% if page.description %}
      <p class="text-sm text-lex-muted line-clamp-2">{{ page.description }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
