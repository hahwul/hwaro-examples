{% include "header.html" %}
  <header class="mb-10">
    <h1 class="text-2xl font-serif font-bold text-navy mb-2">All Tags</h1>
    <p class="text-lex-muted">Browse glossary terms by tag.</p>
  </header>
  <div class="flex flex-wrap gap-3">
    {% for term in taxonomy.terms %}
    <a href="{{ base_url }}{{ term.url }}" class="px-4 py-2 bg-lex-surface border border-lex-border rounded hover:border-navy/30 transition-all text-sm text-navy hover:text-gold-dark">
      {{ term.name }} <span class="text-lex-muted ml-1">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
