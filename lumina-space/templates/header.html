<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #00e5ff;
      --secondary: #b054ff;
      --text: #e0e0e0;
      --text-muted: #9aa0a6;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #050510;
      --bg-subtle: rgba(255, 255, 255, 0.03);
      --glass-bg: rgba(10, 10, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glow: 0 0 15px rgba(0, 229, 255, 0.3);
    }

    @keyframes gradient-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(176, 84, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 50%);
      background-size: 200% 200%;
      animation: gradient-bg 15s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: var(--glow);
    }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.3s ease;
    }

    .site-header nav a:hover { color: #fff; }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { flex-grow: 1; }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.8em;
      font-weight: 700;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: linear-gradient(90deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.3rem; }
    p { margin: 1.2em 0; font-size: 1.05rem; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    a:hover { color: var(--secondary); text-decoration: none; }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      color: var(--primary);
      border: 1px solid var(--border);
    }
    pre {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; display: grid; gap: 1rem; }
    ul.section-list li {
      padding: 1.2rem;
      background: var(--glass-bg);
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(5px);
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow);
      border-color: var(--primary);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; color: #fff; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>
