<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <div class="letter">
    <header class="masthead">
      <div class="masthead-title">
        <a href="{{ base_url }}/">{{ site.title }}</a>
      </div>
      <div class="masthead-tagline">{{ site.description }}</div>
      <div class="masthead-meta">
        <nav class="masthead-nav">
          <a href="{{ base_url }}/posts/">Archive</a>
          <a href="{{ base_url }}/search/">Search</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
        <span>Since 2026</span>
      </div>
    </header>
