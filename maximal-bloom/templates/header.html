<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary-magenta: #d81b60;
      --lush-green: #1b5e20;
      --bright-gold: #ffb300;
      --deep-purple: #2a0845;
      --text-light: #ffffff;
      --text-muted: #e0e0e0;
      --bg-color: #1a052b; /* Very dark purple, almost black */
      --card-bg: rgba(42, 8, 69, 0.8);
      --border-color: rgba(255, 179, 0, 0.5); /* Semi-transparent gold */
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-light);
      background-color: var(--bg-color);
      /* Using a rich floral pattern base via plain color blocks or box shadow glow, explicitly no gradients */
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background-color: var(--bg-color);
      box-shadow: 0 0 50px rgba(216, 27, 96, 0.3), 0 0 100px rgba(27, 94, 32, 0.2);
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 2px solid var(--primary-magenta);
      margin-bottom: 3rem;
      box-shadow: 0 10px 20px -10px rgba(216, 27, 96, 0.5);
    }

    .site-logo {
      font-weight: bold;
      font-size: 2.5rem;
      color: var(--bright-gold);
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255, 179, 0, 0.8), 0 0 20px rgba(255, 179, 0, 0.4);
      letter-spacing: 2px;
    }
    .site-logo:hover {
      color: var(--primary-magenta);
      text-shadow: 0 0 15px rgba(216, 27, 96, 0.8), 0 0 30px rgba(216, 27, 96, 0.6);
    }

    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .site-header nav a:hover {
      color: var(--bright-gold);
      text-shadow: 0 0 8px rgba(255, 179, 0, 0.7);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 2px solid var(--lush-green);
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
      box-shadow: 0 -10px 20px -10px rgba(27, 94, 32, 0.5);
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.2;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: bold;
      color: var(--bright-gold);
    }
    h1 {
      font-size: 3rem;
      margin-top: 0;
      text-shadow: 0 0 15px rgba(255, 179, 0, 0.6);
    }
    h2 {
      font-size: 2.2rem;
      color: var(--primary-magenta);
      text-shadow: 0 0 10px rgba(216, 27, 96, 0.5);
    }
    h3 { font-size: 1.6rem; color: var(--lush-green); }
    p { margin: 1.2em 0; font-size: 1.1rem; }

    a {
      color: var(--bright-gold);
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
      color: var(--primary-magenta);
      text-shadow: 0 0 8px rgba(216, 27, 96, 0.6);
    }

    code {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--bright-gold);
    }
    pre {
      background-color: var(--deep-purple);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px rgba(216, 27, 96, 0.2);
    }
    pre code { background: none; padding: 0; color: var(--text-light); text-shadow: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background-color: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--primary-magenta);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 20px rgba(216, 27, 96, 0.15);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    ul.section-list li:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 30px rgba(216, 27, 96, 0.4);
      border-color: var(--bright-gold);
    }
    ul.section-list li a { font-size: 1.4rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.2rem; font-style: italic; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--primary-magenta);
      color: var(--text-light);
      text-decoration: none;
      background-color: rgba(216, 27, 96, 0.2);
      font-weight: bold;
    }
    nav.pagination a:hover {
      color: var(--bright-gold);
      border-color: var(--bright-gold);
      background-color: rgba(255, 179, 0, 0.2);
      box-shadow: 0 0 15px rgba(255, 179, 0, 0.5);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 2px solid var(--bright-gold);
      background-color: rgba(255, 179, 0, 0.3);
      color: var(--bright-gold);
      font-weight: bold;
      box-shadow: 0 0 10px rgba(255, 179, 0, 0.5);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; text-align: center; }
      .site-wrapper { padding: 1rem; }
      h1 { font-size: 2.2rem; }
      h2 { font-size: 1.8rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
