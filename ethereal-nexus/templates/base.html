<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {% if site.highlight is defined and site.highlight.enabled %}
    {% if site.highlight.use_cdn %}
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.highlight.theme }}.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    {% else %}
      <link rel="stylesheet" href="{{ base_url }}/css/highlight/{{ site.highlight.theme }}.css">
      <script src="{{ base_url }}/js/highlight.pack.js"></script>
    {% endif %}
    <script>hljs.highlightAll();</script>
  {% endif %}
</head>
<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <ul>
          <li><a href="{{ base_url }}/">Home</a></li>
          <li><a href="{{ base_url }}/about/">About</a></li>
        </ul>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
    </footer>
  </div>
</body>
</html>
