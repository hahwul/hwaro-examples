{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.title }}{% endblock %}

{% block content %}
<article class="content">
    <header>
        <h1>{{ page.title }}</h1>
        {% if page.date %}
            <span class="post-meta">{{ page.date | date("%B %d, %Y") }}</span>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
