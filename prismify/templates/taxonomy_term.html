{% extends "base.html" %}

{% block content %}
<div class="taxonomy-term-header">
  <h1>{{ taxonomy_name }}: {{ term_name }}</h1>
</div>

<ul class="section-list">
  {% for page in taxonomy_pages %}
  <li>
    <a href="{{ page.permalink }}">{{ page.title }}</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
