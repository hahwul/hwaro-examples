{% extends "base.html" %}

{% block content %}
<div class="taxonomy-header">
  <h1>{{ taxonomy_name }}</h1>
</div>

<ul class="section-list">
  {% for term in taxonomy_terms %}
  <li>
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/">{{ term }}</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
