{% include "header.html" %}
<main class="content">
  <article>
    <header>
      <h1>{{ page.title }}</h1>
      {% if page.date %}
      <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
      {% endif %}
    </header>
    <div class="post-content">
      {{ content | safe }}
    </div>
  </article>
</main>
