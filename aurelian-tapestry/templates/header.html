<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #d4af37; /* Metallic Gold */
      --primary-glow: rgba(212, 175, 55, 0.4);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --bg: #0b1325; /* Deep Navy */
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(212, 175, 55, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Lato', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.03), transparent 25%),
        linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6, .site-logo {
      font-family: 'Playfair Display', serif;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      margin-bottom: 3rem;
      position: relative;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.3;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 1px;
      text-shadow: 0 0 15px var(--primary-glow);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-header nav a:hover {
      color: var(--primary);
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 50%;
      background-color: var(--primary);
      transition: all 0.3s ease;
    }

    .site-header nav a:hover::after {
      width: 100%;
      left: 0;
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      color: #fff;
    }
    h1 { font-size: 2.5rem; margin-top: 0; font-weight: 700; font-style: italic; color: var(--primary); }
    h2 { font-size: 1.8rem; font-weight: 600; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 0.3em; }
    h3 { font-size: 1.4rem; font-weight: 400; color: #cbd5e1; }
    p { margin: 1.2em 0; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    a:hover {
      text-decoration: none;
      text-shadow: 0 0 8px var(--primary-glow);
    }

    code {
      background: rgba(15, 23, 42, 0.8);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', Consolas, monospace;
      border: 1px solid rgba(212, 175, 55, 0.1);
      color: #e2e8f0;
    }

    pre {
      background: rgba(5, 8, 15, 0.8);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.2rem;
      background: var(--glass-bg);
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(212, 175, 55, 0.1);
      border-color: rgba(212, 175, 55, 0.4);
    }
    ul.section-list li a { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; display: block; margin-bottom: 0.5rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1rem; }
      .glass-panel { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
