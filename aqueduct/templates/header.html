<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default(value=site.description) }}">
  {{ og_all_tags }}
  {{ canonical_tag }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400; line-height: 1.75; color: #3b3530; background: #f5f0eb;
    }
    h1, h2, h3, h4 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700; line-height: 1.25; color: #2a2520;
    }
    a { color: #3a8a8c; text-decoration: none; }
    a:hover { color: #2d6d6f; text-decoration: underline; }
    #reading-progress {
      position: fixed; top: 0; left: 0; width: 0%; height: 3px;
      background: #c4a35a; z-index: 1000; transition: width 0.1s linear;
    }
    .arch-row {
      display: flex; justify-content: center; overflow: hidden; height: 28px;
    }
    .arch-unit {
      width: 44px; height: 28px; border: 2px solid #c4a35a;
      border-bottom: none; border-radius: 44px 44px 0 0; flex-shrink: 0;
    }
    .site-header { background: #2a2520; color: #f5f0eb; }
    .site-header .arch-row { padding-top: 4px; }
    .header-inner {
      max-width: 820px; margin: 0 auto; padding: 1.25rem 1.5rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-logo {
      font-family: 'Playfair Display', serif; font-size: 1.5rem;
      font-weight: 900; color: #f5f0eb; letter-spacing: 0.05em;
    }
    .site-logo:hover { text-decoration: none; color: #c4a35a; }
    .site-nav { display: flex; gap: 1.5rem; }
    .site-nav a {
      color: #d8cfc5; font-size: 0.9rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .site-nav a:hover { color: #c4a35a; text-decoration: none; }
    .container { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .post-list { list-style: none; }
    .post-card {
      border: 1px solid #d8cfc5; border-left: 4px solid #3a8a8c;
      background: #fff; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
    }
    .post-card h2 { font-size: 1.3rem; margin-bottom: 0.25rem; }
    .post-card h2 a { color: #2a2520; }
    .post-card h2 a:hover { color: #3a8a8c; }
    .post-meta { font-size: 0.85rem; color: #8a8078; margin-bottom: 0.5rem; }
    .post-summary { color: #5a5249; font-size: 0.95rem; }
    .post-header { margin-bottom: 2rem; border-bottom: 2px solid #c4a35a; padding-bottom: 1.25rem; }
    .post-header h1 { font-size: 2rem; margin-bottom: 0.4rem; }
    .post-content h2 { font-size: 1.45rem; margin: 2rem 0 0.75rem; color: #3a8a8c; }
    .post-content h3 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
    .post-content p { margin-bottom: 1rem; }
    .post-content ul, .post-content ol { margin: 0.5rem 0 1rem 1.5rem; }
    .post-content li { margin-bottom: 0.3rem; }
    .post-content code {
      font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.88em;
      background: #e8e0d8; padding: 0.15em 0.4em; border-radius: 3px;
    }
    .post-content pre {
      background: #2a2520; color: #f5f0eb; padding: 1.25rem;
      overflow-x: auto; margin: 1rem 0 1.5rem; border-left: 4px solid #c4a35a;
    }
    .post-content pre code { background: none; padding: 0; color: inherit; }
    .post-content blockquote {
      border-left: 4px solid #3a8a8c; padding: 0.5rem 1rem;
      margin: 1rem 0; background: #e8e0d8; font-style: italic;
    }
    .post-content img { max-width: 100%; height: auto; }
    .post-content table {
      width: 100%; border-collapse: collapse; border: 2px solid #d8cfc5;
      background: #fff; margin: 1.5rem 0;
    }
    .post-content th, .post-content td {
      border: 1px solid #d8cfc5; padding: 0.5rem 0.75rem; text-align: left;
    }
    .post-content th { background: #e8e0d8; font-weight: 600; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; list-style: none; }
    .tag-item a {
      display: inline-block; padding: 0.25rem 0.75rem;
      border: 1px solid #3a8a8c; font-size: 0.85rem; color: #3a8a8c;
    }
    .tag-item a:hover { background: #3a8a8c; color: #fff; text-decoration: none; }
    .page-title {
      font-size: 2rem; margin-bottom: 1.5rem;
      border-bottom: 2px solid #c4a35a; padding-bottom: 0.75rem;
    }
    .not-found { text-align: center; padding: 4rem 1.5rem; }
    .not-found h1 { font-size: 5rem; color: #c4a35a; }
    .taxonomy-heading { font-size: 1.6rem; margin-bottom: 1rem; }
    .home-intro { font-size: 1.1rem; color: #5a5249; margin-bottom: 2rem; }
    .section-label {
      font-family: 'Playfair Display', serif; font-size: 1.3rem;
      color: #2a2520; margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid #d8cfc5;
    }
    nav.pagination { margin: 1.5rem 0; }
    nav.pagination .pagination-list {
      list-style: none; display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    nav.pagination a {
      display: inline-block; padding: 0.25rem 0.6rem;
      border: 1px solid #d8cfc5; color: #3a8a8c;
    }
    nav.pagination a:hover { border-color: #3a8a8c; }
    .pagination-current span {
      display: inline-block; padding: 0.25rem 0.6rem;
      border: 1px solid #c4a35a; background: #fff;
    }
    @media (max-width: 600px) {
      .header-inner { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .container { padding: 1.5rem 1rem; }
      .post-header h1 { font-size: 1.6rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
<div id="reading-progress"></div>
<header class="site-header">
  <div class="arch-row">
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
    <div class="arch-unit"></div><div class="arch-unit"></div>
  </div>
  <div class="header-inner">
    <a href="{{ base_url }}/" class="site-logo">AQUEDUCT</a>
    <nav class="site-nav">
      <a href="{{ base_url }}/posts/">Articles</a>
      <a href="{{ base_url }}/about/">About</a>
      <a href="{{ base_url }}/tags/">Tags</a>
    </nav>
  </div>
</header>
<main class="container">
