{% include "header.html" %}

<h1 class="taxonomy-heading">Tagged: {{ page.title }}</h1>

<ul class="post-list">
{% for post in taxonomy_pages %}
  <li class="post-card">
    <h2><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h2>
    <div class="post-meta">{{ post.date }}</div>
    {% if post.description %}
    <p class="post-summary">{{ post.description }}</p>
    {% endif %}
  </li>
{% endfor %}
</ul>

{% include "footer.html" %}
