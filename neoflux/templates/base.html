<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% if site.highlight is defined and site.highlight.enabled %}
  {{ highlight_css }}
  {% endif %}
  <style>
    :root {
      --bg-color: #0b0c10;
      --text-color: #c5c6c7;
      --accent-color: #66fcf1;
      --accent-secondary: #45a29e;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(102, 252, 241, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(69, 162, 158, 0.08), transparent 25%);
      background-attachment: fixed;
    }

    /* Background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
    }
    .blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: rgba(102, 252, 241, 0.15); }
    .blob-2 { bottom: -150px; right: -50px; width: 500px; height: 500px; background: rgba(69, 162, 158, 0.15); }

    header {
      padding: 2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-color);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
    }

    nav a {
      color: var(--text-color);
      text-decoration: none;
      margin-left: 1.5rem;
      font-weight: 500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    nav a:hover {
      color: var(--accent-color);
      text-shadow: 0 0 8px rgba(102, 252, 241, 0.6);
    }

    main {
      flex: 1;
      padding: 3rem 5%;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .glass-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: var(--glass-shadow);
    }

    h1, h2, h3, h4, h5, h6 {
      color: #fff;
      margin-top: 0;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -10px;
      height: 3px;
      width: 50px;
      background: var(--accent-color);
      box-shadow: 0 0 10px var(--accent-color);
      border-radius: 2px;
    }

    a {
      color: var(--accent-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: rgba(102, 252, 241, 0.1);
      color: var(--accent-color);
      border: 1px solid rgba(102, 252, 241, 0.3);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: rgba(102, 252, 241, 0.2);
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
      color: #fff;
      text-decoration: none;
    }

    /* Code blocks */
    pre {
      background: rgba(0, 0, 0, 0.5) !important;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 1.5rem;
      overflow-x: auto;
    }

    pre code.hljs {
      background: transparent !important;
      color: #e0e0e0;
    }

    code {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 0.9em;
      color: var(--accent-color);
    }

    /* Lists */
    ul, ol {
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--glass-border);
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .glass-container {
        padding: 2rem 1.5rem;
      }
      header {
        flex-direction: column;
        gap: 1rem;
      }
      nav a {
        margin: 0 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <header>
    <a href="{{ base_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}">Home</a>
      <a href="{{ base_url }}about/">About</a>
    </nav>
  </header>

  <main>
    <div class="glass-container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer>
    <p>&copy; {{ site.title }}. Designed with NeoFlux.</p>
  </footer>
</body>
</html>
