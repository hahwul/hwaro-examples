{% include "header.html" %}

<article class="glass-panel">
    <header class="page-header">
        <h1>{% if page is defined and page.title %}{{ page.title }}{% endif %}</h1>
        {% if page is defined and page.date %}
        <p class="date">{{ page.date | date(format="%B %d, %Y") }}</p>
        {% endif %}
    </header>

    <div class="content">
        {{ content | safe }}
    </div>
</article>
