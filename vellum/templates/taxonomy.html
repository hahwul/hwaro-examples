{% include "header.html" %}

<section class="section-header">
  <h1 class="section-header__title">Index</h1>
  <p class="section-header__desc">Browse essays by subject</p>
  <div class="section-header__rule"></div>
</section>

<ul class="taxonomy-list">
  {% for term in taxonomy_terms %}
  <li class="taxonomy-list__item">
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="taxonomy-list__link">
      <span class="taxonomy-list__name">{{ term.name }}</span>
      <span class="taxonomy-list__count">{{ term.pages | length }}</span>
    </a>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
