<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rosemary: #4a7c59;
      --rosemary-dark: #3a6347;
      --rosemary-light: #6a9c79;
      --lavender: #9b8ec0;
      --lavender-light: #b8aed4;
      --cream: #faf7f0;
      --cream-dark: #f0ead8;
      --text-dark: #2c2c2c;
      --text-medium: #5a5a5a;
      --text-light: #8a8a8a;
      --white: #ffffff;
    }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-dark);
      background-color: var(--cream);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      line-height: 1.3;
      color: var(--rosemary-dark);
    }

    a {
      color: var(--rosemary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--lavender);
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* Leaf border pattern */
    .leaf-border-top {
      border-top: 3px solid var(--rosemary);
      position: relative;
    }

    .leaf-border-top::after {
      content: "";
      display: block;
      width: 100%;
      height: 6px;
      border-top: 2px dashed var(--rosemary-light);
      opacity: 0.4;
      margin-top: 2px;
    }

    .leaf-border-bottom {
      border-bottom: 3px solid var(--rosemary);
      position: relative;
    }

    .leaf-border-bottom::before {
      content: "";
      display: block;
      width: 100%;
      height: 6px;
      border-bottom: 2px dashed var(--rosemary-light);
      opacity: 0.4;
      margin-bottom: 2px;
    }

    /* Site header */
    .site-header {
      background-color: var(--white);
      padding: 1.5rem 0;
      border-bottom: 3px solid var(--rosemary);
    }

    .site-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--rosemary-dark);
      letter-spacing: 0.02em;
    }

    .site-logo span {
      color: var(--lavender);
    }

    .site-nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .site-nav a {
      font-size: 0.95rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-medium);
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .site-nav a:hover {
      color: var(--rosemary);
      border-bottom-color: var(--rosemary);
    }

    /* Layout */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .main-content {
      padding: 3rem 0;
      min-height: 60vh;
    }

    /* Page title area */
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
    }

    .page-header .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-light);
      font-size: 1.1rem;
    }

    /* Recipe metadata badges */
    .recipe-meta {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .recipe-meta .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 2px solid var(--rosemary);
      color: var(--rosemary-dark);
      background-color: var(--white);
    }

    .recipe-meta .badge.herb-badge {
      border-color: var(--lavender);
      color: var(--lavender);
      background-color: var(--white);
    }

    .recipe-meta .badge .badge-label {
      font-weight: 300;
      color: var(--text-light);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
    }

    /* Recipe cards grid */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .recipe-card {
      background-color: var(--white);
      border: 1px solid var(--cream-dark);
      border-top: 4px solid var(--rosemary);
      padding: 1.8rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .recipe-card:hover {
      border-top-color: var(--lavender);
      box-shadow: 0 4px 16px rgba(74, 124, 89, 0.08);
    }

    .recipe-card h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .recipe-card h3 a {
      color: var(--rosemary-dark);
    }

    .recipe-card h3 a:hover {
      color: var(--lavender);
    }

    .recipe-card .card-date {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .recipe-card .card-description {
      font-size: 0.95rem;
      color: var(--text-medium);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .recipe-card .card-meta {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .recipe-card .card-meta .tag {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      background-color: var(--cream);
      color: var(--rosemary);
      border: 1px solid var(--cream-dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .recipe-card .card-meta .tag.herb {
      color: var(--lavender);
      border-color: var(--lavender-light);
    }

    /* Botanical divider */
    .botanical-divider {
      text-align: center;
      margin: 2.5rem 0;
      position: relative;
    }

    .botanical-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background-color: var(--cream-dark);
    }

    .botanical-divider span {
      position: relative;
      background-color: var(--cream);
      padding: 0 1rem;
      color: var(--rosemary-light);
      font-size: 1.4rem;
      letter-spacing: 0.3rem;
    }

    /* Article content */
    .article-content {
      max-width: 700px;
      margin: 0 auto;
    }

    .article-content p {
      margin-bottom: 1.2rem;
      font-size: 1.05rem;
    }

    .article-content h2 {
      font-size: 1.6rem;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--cream-dark);
    }

    .article-content h3 {
      font-size: 1.3rem;
      margin: 2rem 0 0.8rem;
    }

    .article-content ul,
    .article-content ol {
      margin-bottom: 1.2rem;
      padding-left: 1.5rem;
    }

    .article-content li {
      margin-bottom: 0.4rem;
    }

    .article-content blockquote {
      border-left: 4px solid var(--lavender);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      background-color: var(--white);
      font-style: italic;
      color: var(--text-medium);
    }

    .article-content code {
      font-size: 0.9em;
      background-color: var(--cream-dark);
      padding: 0.15em 0.4em;
    }

    .article-content pre {
      background-color: var(--text-dark);
      color: var(--cream);
      padding: 1.2rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    .article-content pre code {
      background: none;
      padding: 0;
    }

    /* Taxonomy pages */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin: 2rem 0;
    }

    .tag-list a {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border: 2px solid var(--rosemary);
      color: var(--rosemary);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .tag-list a:hover {
      background-color: var(--rosemary);
      color: var(--white);
    }

    /* 404 page */
    .not-found {
      text-align: center;
      padding: 5rem 0;
    }

    .not-found h1 {
      font-size: 5rem;
      color: var(--lavender);
      margin-bottom: 1rem;
    }

    .not-found p {
      font-size: 1.1rem;
      color: var(--text-medium);
      margin-bottom: 2rem;
    }

    .not-found a.back-link {
      display: inline-block;
      padding: 0.7rem 2rem;
      border: 2px solid var(--rosemary);
      color: var(--rosemary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .not-found a.back-link:hover {
      background-color: var(--rosemary);
      color: var(--white);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 3rem;
    }

    .pagination a,
    .pagination span {
      padding: 0.5rem 1rem;
      border: 1px solid var(--cream-dark);
      font-size: 0.9rem;
    }

    .pagination a:hover {
      border-color: var(--rosemary);
    }

    /* Home hero */
    .home-hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .home-hero h1 {
      font-size: 3rem;
      font-weight: 700;
      color: var(--rosemary-dark);
      margin-bottom: 0.8rem;
    }

    .home-hero .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-light);
      max-width: 500px;
      margin: 0 auto;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-header .container {
        flex-direction: column;
        gap: 1rem;
      }

      .site-nav {
        gap: 1.2rem;
      }

      .page-header h1 {
        font-size: 1.8rem;
      }

      .home-hero h1 {
        font-size: 2.2rem;
      }

      .recipe-grid {
        grid-template-columns: 1fr;
      }

      .recipe-meta {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ base_url }}/" class="site-logo">Rosemary<span>.</span></a>
      <nav>
        <ul class="site-nav">
          <li><a href="{{ base_url }}/">Home</a></li>
          <li><a href="{{ base_url }}/posts/">Recipes</a></li>
          <li><a href="{{ base_url }}/about/">About</a></li>
          <li><a href="{{ base_url }}/tags/">Herbs</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="main-content">
    <div class="container">
