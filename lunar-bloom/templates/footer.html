<footer class="site-footer">
  <div class="footer-inner">
    <p>&copy; {{ site.title }}. All rights reserved.</p>
    <div class="footer-links">
      {% if site.feeds is defined and site.feeds.enabled %}
      <a href="{{ site.base_url }}/{{ site.feeds.filename | default("rss.xml") }}">RSS</a>
      {% endif %}
    </div>
  </div>
</footer>
