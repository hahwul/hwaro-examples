<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="poster-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Headliner Bold home">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Bracket -->
          <path d="M6,4 L4,4 L4,44 L6,44" fill="none" stroke="#ffe000" stroke-width="3"/>
          <path d="M42,4 L44,4 L44,44 L42,44" fill="none" stroke="#ffe000" stroke-width="3"/>
          <!-- Star in the middle -->
          <polygon points="24,14 27,22 36,22 28,27 31,36 24,30 17,36 20,27 12,22 21,22" fill="#ffe000"/>
        </svg>
        <span class="logo-text">HEADLINER BOLD</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">LINEUP</a>
        <a href="{{ base_url }}/stages/">STAGES</a>
        <a href="{{ base_url }}/schedule/">SCHEDULE</a>
        <a href="{{ base_url }}/info/">INFO</a>
      </nav>
    </header>
