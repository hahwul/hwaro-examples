<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
    :root {
      /* Palette */
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.8);
      --primary: #8EE4AF;
      --secondary: #5CDB95;

      /* Vibrant animated gradient background variables */
      --bg-color-1: #0f2027;
      --bg-color-2: #203a43;
      --bg-color-3: #2c5364;
      --bg-color-4: #4ca1af;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4));
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      position: relative;
    }

    /* Animated floating orbs in background for depth */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: #8EE4AF;
      top: -100px;
      left: -100px;
      animation: float 10s ease-in-out infinite alternate;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: #4ca1af;
      bottom: -150px;
      right: -100px;
      animation: float 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(50px) translateX(50px); }
    }

    /* Layout & Glassmorphism Core */
    .site-wrapper {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 2rem;
    }

    .site-logo {
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 8px rgba(142, 228, 175, 0.6);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--text);
      transform: translateY(-2px);
    }

    .site-main { min-height: calc(100vh - 300px); }

    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    h1 { font-size: 2.2rem; margin-top: 0; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1.2em 0; font-size: 1.05rem; }

    a {
      color: var(--primary);
      text-decoration: none;
      position: relative;
    }
    a:hover { color: var(--secondary); }

    main a::after {
      content: '';
      position: absolute;
      width: 100%;
      transform: scaleX(0);
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: var(--primary);
      transform-origin: bottom right;
      transition: transform 0.25s ease-out;
    }
    main a:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    /* Code Blocks */
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(255,255,255,0.1);
    }
    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.2rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Lists and Blockquotes */
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    blockquote {
      border-left: 4px solid var(--primary);
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0 12px 12px 0;
      font-style: italic;
    }

    /* Glass Components */
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      background: rgba(255, 255, 255, 0.12);
    }

    /* Hwaro Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(5px);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }
    ul.section-list li a::after { display: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    nav.pagination a::after { display: none; }
    nav.pagination a:hover {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #000;
      font-weight: 800;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-wrapper { margin: 1rem; padding: 1.5rem; border-radius: 16px; }
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      h1 { font-size: 1.8rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>

      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>

        <a href="{{ base_url }}/about/">About</a>
      </nav>
