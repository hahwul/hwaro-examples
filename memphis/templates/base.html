<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <link rel="stylesheet" href="{{ config.base_url }}/css/style.css">
</head>
<body>
    <div class="shape-circle"></div>
    <div class="shape-zigzag"></div>
    <div class="container">
        <header class="site-header">
            <h1 class="site-title"><a href="{{ config.base_url }}/">{{ config.title }}</a></h1>
            <nav class="site-nav">
                <a href="{{ config.base_url }}/">Home</a>
                <a href="{{ config.base_url }}/portfolio/">Portfolio</a>
                <a href="{{ config.base_url }}/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; 1985 {{ config.title }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
