{% extends "base.html" %}

{% block content %}
    <article class="single-post">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            {% if page.date %}
                Published on {{ page.date }}
            {% endif %}
            {% if page.taxonomies.categories %}
                in {{ page.taxonomies.categories | join(sep=", ") }}
            {% endif %}
        </div>
        <div class="post-content">
            {{ page.content | safe }}
        </div>
    </article>
{% endblock content %}
