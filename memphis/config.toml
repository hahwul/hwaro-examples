# =============================================================================
# Memphis - Site Configuration
# =============================================================================
# An 80s Memphis Design inspired theme featuring bold colors and geometric shapes

title = "Memphis"
description = "80s Memphis Design Style Theme"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = false
theme = "base16-ocean"
