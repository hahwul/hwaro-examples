{% include "header.html" %}
<main>
  {% if page.template != "home" %}
  <section class="block">
    <div class="block-head">
      <h2>{{ page.title }}</h2>
      {% if page.description %}<div class="block-tag">{{ page.description }}</div>{% endif %}
    </div>
    <div class="prose">{{ content | safe }}</div>
  </section>
  {% else %}
  {{ content | safe }}
  {% endif %}
</main>
