<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Red+Hat+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

<div class="curtain" aria-hidden="true">
  <svg viewBox="0 0 1600 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="folds" x="0" y="0" width="80" height="160" patternUnits="userSpaceOnUse">
        <path d="M0 0 L40 160 L80 0 Z" fill="#141A26"/>
        <path d="M40 0 L40 160" stroke="#1F2A3B" stroke-width="2"/>
        <path d="M0 0 L0 160" stroke="#1F2A3B" stroke-width="1"/>
      </pattern>
    </defs>
    <rect x="0" y="0" width="1600" height="160" fill="#0A0E17"/>
    <path d="M0 0 L800 0 L760 70 L720 40 L680 90 L640 50 L600 110 L560 60 L520 120 L480 50 L440 130 L400 40 L360 100 L320 30 L280 90 L240 20 L200 80 L160 10 L120 70 L80 0 L0 0 Z" fill="url(#folds)"/>
    <path d="M1600 0 L800 0 L840 70 L880 40 L920 90 L960 50 L1000 110 L1040 60 L1080 120 L1120 50 L1160 130 L1200 40 L1240 100 L1280 30 L1320 90 L1360 20 L1400 80 L1440 10 L1480 70 L1520 0 L1600 0 Z" fill="url(#folds)"/>
    <rect x="0" y="0" width="1600" height="8" fill="#00B4D8"/>
    <circle cx="800" cy="4" r="6" fill="#FFB703"/>
  </svg>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="{{ base_url }}/" class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 15 L9 3 L17 15 Z" fill="none" stroke="#00B4D8" stroke-width="2"/>
          <line x1="1" y1="15" x2="17" y2="15" stroke="#FFB703" stroke-width="2"/>
        </svg>
      </span>
      <span>Opening Act</span>
    </a>
    <nav class="topnav">
      <a href="{{ base_url }}/">Tonight</a>
      <a href="{{ base_url }}/lineup/">Lineup</a>
      <a href="{{ base_url }}/nights/">Nights</a>
      <a href="{{ base_url }}/news/">Dispatch</a>
      <a href="{{ base_url }}/tickets/" class="cta">Get Seats</a>
    </nav>
  </div>
</header>
