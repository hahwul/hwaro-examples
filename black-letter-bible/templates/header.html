<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=UnifrakturCook:wght@700&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="folio" role="document">
    <header class="folio-head" role="banner">
      <div class="rubric-rule top" aria-hidden="true">
        <svg viewBox="0 0 800 18" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <line x1="40" y1="9" x2="360" y2="9" stroke="#b49660" stroke-width="0.8"/>
          <line x1="440" y1="9" x2="760" y2="9" stroke="#b49660" stroke-width="0.8"/>
          <g transform="translate(400,9)">
            <path d="M 0 -6 L 6 0 L 0 6 L -6 0 Z" fill="none" stroke="#c5321a" stroke-width="0.8"/>
            <circle r="1.5" fill="#c5321a"/>
          </g>
        </svg>
      </div>
      <a href="{{ base_url }}/" class="folio-brand" aria-label="Black-letter Bible home">
        <svg viewBox="0 0 400 84" xmlns="http://www.w3.org/2000/svg" class="brand-svg" aria-hidden="true">
          <!-- Ornamental cross and monogram -->
          <g transform="translate(30,42)">
            <rect x="-6" y="-28" width="12" height="56" fill="#b49660"/>
            <rect x="-20" y="-6" width="40" height="12" fill="#b49660"/>
            <circle cx="0" cy="0" r="4" fill="#0a0806"/>
            <circle cx="0" cy="0" r="2" fill="#c5321a"/>
          </g>
          <text x="70" y="40" font-family="UnifrakturCook, UnifrakturMaguntia, serif" font-size="36" font-weight="700" fill="#e8dcba">Black-Letter</text>
          <text x="70" y="70" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#b49660" letter-spacing="4">Bible</text>
        </svg>
      </a>
      <p class="folio-sub">A STUDY IN SACRED TYPOGRAPHY - PRINTED UPON THE STONES OF MAINZ, STRASBURG &amp; LONDON</p>
      <nav class="folio-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Frontispiece</a>
        <a href="{{ base_url }}/chapters/">The Chapters</a>
        <a href="{{ base_url }}/specimen/">Specimen</a>
        <a href="{{ base_url }}/colophon/">Colophon</a>
      </nav>
      <div class="rubric-rule bottom" aria-hidden="true">
        <svg viewBox="0 0 800 18" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <line x1="40" y1="9" x2="360" y2="9" stroke="#b49660" stroke-width="0.8"/>
          <line x1="440" y1="9" x2="760" y2="9" stroke="#b49660" stroke-width="0.8"/>
          <g transform="translate(400,9)">
            <path d="M 0 -6 L 6 0 L 0 6 L -6 0 Z" fill="none" stroke="#c5321a" stroke-width="0.8"/>
            <circle r="1.5" fill="#c5321a"/>
          </g>
        </svg>
      </div>
    </header>
