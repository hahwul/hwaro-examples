{% include "header.html" %}

<article style="max-width: 800px; margin: 0 auto;">
  <header class="article-header">
    <p class="section-heading">Essay</p>
    <h1 class="article-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="article-desc">{{ page.description }}</p>
    {% endif %}
    <div class="article-meta">
      <time datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date("%B %d, %Y") }}</time>
    </div>
  </header>

  <div class="article-content">
    {{ content | safe }}
  </div>

  {% if page.tags %}
  <hr class="thin-rule">
  <div class="tag-list">
    {% for tag in page.tags %}
    <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag-pill">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}

  <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);">
    <a href="{{ base_url }}/essays/" style="font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 0.2s;">
      Back to Essays
    </a>
  </div>
</article>

{% include "footer.html" %}
