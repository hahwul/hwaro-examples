  </main>

  <footer style="background-color: var(--footer-bg); border-top: 1px solid var(--border); padding: 2.5rem 2rem; transition: background-color 0.3s ease;">
    <div style="max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
      <p style="font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);">
        &copy; {{ current_year }} {{ site.title }}
      </p>
      <p style="font-size: 0.78rem; color: var(--text-dim); font-style: italic;">
        {{ site.description }}
      </p>
    </div>
  </footer>

  {{ highlight_js }}
  {{ auto_includes_js }}

  <script>
    function getStoredTheme() {
      return localStorage.getItem('mono-theme') || 'light';
    }

    function applyTheme(theme) {
      const root = document.getElementById('html-root');
      const btn  = document.getElementById('theme-btn');
      if (theme === 'dark') {
        root.setAttribute('data-theme', 'dark');
        if (btn) btn.textContent = 'Light';
      } else {
        root.removeAttribute('data-theme');
        if (btn) btn.textContent = 'Dark';
      }
    }

    function toggleTheme() {
      const current = getStoredTheme();
      const next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('mono-theme', next);
      applyTheme(next);
    }

    // Apply on load
    applyTheme(getStoredTheme());
  </script>
</body>
</html>
