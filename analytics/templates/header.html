<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title | default(site.title) }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f3f4f6;
      color: #1f2937;
      font-family: 'Inter', sans-serif;
    }

    .card {
      background-color: #ffffff;
      border-radius: 0.5rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
    }

    .stat-value {
      font-size: 1.875rem;
      font-weight: 700;
      color: #111827;
      line-height: 2.25rem;
    }

    .stat-label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .positive-trend {
      color: #059669;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .negative-trend {
      color: #dc2626;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .chart-placeholder {
      width: 100%;
      height: 250px;
      background-color: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 0.875rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      color: #6b7280;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #e5e7eb;
    }

    td {
      padding: 0.75rem 0;
      font-size: 0.875rem;
      color: #374151;
      border-bottom: 1px solid #f3f4f6;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .progress-bar-bg {
      background-color: #f3f4f6;
      border-radius: 9999px;
      height: 0.5rem;
      width: 100%;
      overflow: hidden;
    }

    .progress-bar-fill {
      background-color: #3b82f6;
      height: 100%;
      border-radius: 9999px;
    }
  </style>
  {{ auto_includes | safe }}
</head>
<body class="antialiased flex flex-col min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <a href="{{ base_url }}/" class="text-xl font-bold text-brand-600 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
              </svg>
              Analytics
            </a>
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a href="{{ base_url }}/" class="border-brand-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Overview
            </a>
            <a href="{{ base_url }}/about" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              About
            </a>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-500">Last updated: Just now</span>
          <button class="bg-white p-1 rounded-full text-gray-400 hover:text-gray-500 border border-gray-200">
            <span class="sr-only">Refresh</span>
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
