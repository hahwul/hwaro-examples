{% include "header.html" %}

<div class="mb-8">
  <h1 class="text-2xl font-bold text-gray-900">{{ taxonomy_term }}</h1>
  <p class="mt-1 text-sm text-gray-500">{{ taxonomy_pages | length }} items tagged with "{{ taxonomy_term }}"</p>
</div>

<div class="space-y-4">
  {% for page in taxonomy_pages %}
  <div class="card hover:shadow-md transition-shadow">
    <h2 class="text-lg font-medium text-gray-900"><a href="{{ page.url }}" class="hover:text-brand-600">{{ page.title }}</a></h2>
    <p class="text-sm text-gray-500 mt-1">{{ page.date | date("%B %d, %Y") }}</p>
  </div>
  {% endfor %}
</div>

{% include "footer.html" %}
