{% include "header.html" %}

<div class="mb-8">
  <h1 class="text-2xl font-bold text-gray-900">{{ taxonomy_name | upper }}</h1>
</div>

<div class="card">
  <ul class="divide-y divide-gray-200">
    {% for term in taxonomy_terms %}
    <li class="py-4 flex justify-between items-center">
      <a href="{{ base_url }}{{ term.url }}" class="text-sm font-medium text-brand-600 hover:text-brand-900">{{ term.name }}</a>
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
        {{ term.pages | length }} items
      </span>
    </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
