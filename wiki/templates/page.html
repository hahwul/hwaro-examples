{% include "header.html" %}
  <div class="wiki-body">
    <main class="wiki-content wiki-content-centered">
      <article class="wiki-article">
        <header class="article-header">
          <h1>{{ page.title }}</h1>
          {% if page.description %}
            <p class="description">{{ page.description }}</p>
          {% endif %}
        </header>
        <div class="prose">
          {{ content | safe }}
        </div>
      </article>
    </main>
  </div>
{% include "footer.html" %}
