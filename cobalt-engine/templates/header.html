<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-base: #050810;
      --bg-surface: #0a0f1c;
      --bg-glass: rgba(10, 15, 28, 0.6);

      --accent-cyan: #06B6D4;
      --accent-cyan-glow: rgba(6, 182, 212, 0.3);
      --accent-blue: #3B82F6;
      --accent-blue-glow: rgba(59, 130, 246, 0.3);

      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --text-heading: #F8FAFC;

      --border-color: rgba(255, 255, 255, 0.1);
      --border-glow: rgba(6, 182, 212, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-base);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.08), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Glassmorphic Nav */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: var(--bg-glass);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text-heading);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .site-logo::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--accent-cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    .site-logo:hover {
      text-shadow: 0 0 8px var(--accent-cyan-glow);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .site-header nav a:hover {
      color: var(--accent-cyan);
      text-shadow: 0 0 8px var(--accent-cyan-glow);
    }

    /* Main Container */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      flex: 1;
      width: 100%;
    }

    /* Content Typography */
    .prose {
      max-width: 100%;
    }

    .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
      color: var(--text-heading);
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 0.75em;
      font-weight: 600;
    }

    .prose h1 {
      font-size: 2.5rem;
      margin-top: 0;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, var(--text-heading), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .prose h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
    .prose h3 { font-size: 1.35rem; }

    .prose p { margin: 1.2em 0; font-size: 1.05rem; }

    .prose a {
      color: var(--accent-cyan);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .prose a:hover {
      border-color: var(--accent-cyan);
    }

    .prose blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-left: 4px solid var(--accent-blue);
      background: var(--bg-surface);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .prose ul, .prose ol {
      padding-left: 1.5rem;
      margin: 1.2em 0;
    }

    .prose li {
      margin-bottom: 0.5em;
    }

    /* Code Blocks */
    .prose code {
      background: var(--bg-surface);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cyan);
      border: 1px solid var(--border-color);
    }

    .prose pre {
      background: var(--bg-surface);
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    .prose pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    /* Lists/Cards */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1rem;
    }

    ul.section-list li {
      background: var(--bg-surface);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    ul.section-list li a {
      display: block;
      padding: 1.25rem;
      color: var(--text-heading);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: var(--accent-blue);
      box-shadow: 0 4px 20px var(--accent-blue-glow);
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      height: 2.5rem;
      padding: 0 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface);
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }

    nav.pagination a:hover {
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.1);
    }

    .pagination-current span {
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.1);
      box-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    .pagination-disabled span {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Footer */
    .site-footer {
      margin-top: auto;
      padding: 2rem 0;
      border-top: 1px solid var(--border-color);
      background: var(--bg-surface);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-content { flex-direction: column; gap: 1rem; align-items: center; padding: 1rem; }
      .site-wrapper { padding: 2rem 1rem; }
      .prose h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default(value='') }}">
  <header class="site-header">
    <div class="header-content">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/posts/">Posts</a>
      </nav>
    </div>
  </header>
  <div class="site-wrapper">
