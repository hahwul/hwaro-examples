{% include "header.html" %}
  <main class="site-main prose">
    <h1>{{ term.name }}</h1>
    <p class="taxonomy-desc">Pages tagged with "{{ term.name }}"</p>

    <ul class="section-list">
      {% for page in taxonomy_pages %}
        <li>
          <a href="{{ base_url }}{{ page.permalink }}">
            {{ page.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
