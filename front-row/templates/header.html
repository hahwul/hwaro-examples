<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &#8212; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <header class="masthead">
    <div class="masthead-top">
      <span>Season XI &#183; Private Circle</span>
      <span>Patron Services</span>
      <span>Established 1978</span>
    </div>
    <div class="masthead-eyebrow">VIP Access &#183; Premium Events</div>
    <h1 class="masthead-title">{{ site.title }}</h1>
    <p class="masthead-sub">{{ site.description }}</p>
    <div class="masthead-ornament">
      <div class="rule"></div>
      <svg width="44" height="26" viewBox="0 0 44 26" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <title>Crown mark</title>
        <g fill="none" stroke="#b38a3a" stroke-width="1.4" stroke-linejoin="round">
          <path d="M 4 22 L 4 8 L 12 16 L 22 4 L 32 16 L 40 8 L 40 22 Z"/>
          <line x1="4" y1="22" x2="40" y2="22"/>
        </g>
        <g fill="#6f1a25">
          <circle cx="4" cy="8" r="1.8"/>
          <circle cx="22" cy="4" r="2"/>
          <circle cx="40" cy="8" r="1.8"/>
        </g>
      </svg>
      <div class="rule"></div>
    </div>
  </header>
  <nav class="navline">
    <div class="navline-inner">
      <div class="navline-left">
        <a href="{{ base_url }}/">Overview</a>
        <a href="{{ base_url }}/tiers/">Membership Tiers</a>
        <a href="{{ base_url }}/about/">Protocol</a>
        <a href="{{ base_url }}/tags/">Index</a>
      </div>
      <div class="navline-right">
        <span>By Invitation Only</span>
      </div>
    </div>
  </nav>
