{% include "header.html" %}
  <main class="stage">
    <div class="eyebrow" style="font-family:'Inter',sans-serif;font-size:0.7rem;letter-spacing:0.36em;text-transform:uppercase;color:#6f1a25;font-weight:700;">Section</div>
    <h1 style="font-family:'Playfair Display SC',serif;font-weight:900;font-size:3rem;margin:0.3rem 0 0.5rem;">{{ page.title | e }}</h1>
    {% if page.description is present %}
      <p style="font-family:'Cormorant Infant',serif;font-style:italic;font-size:1.3rem;color:#3b2e2a;margin-bottom:2rem;">{{ page.description }}</p>
    {% endif %}
    <div class="page-article">{{ content }}</div>
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
