# =============================================================================
# Roll Scroll - Scroll Format Publication
# Issue #1573 | Tags: book, light, scroll, continuous, ancient
# =============================================================================

title = "Roll Scroll"
description = "A scroll-format publication inspired by ancient papyrus and vellum rolls, with classical inscriptional headings, narrow columns, and kollema joints that divide the continuous text."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
