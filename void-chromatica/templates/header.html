<!DOCTYPE html>
<html lang="{{ page_language | default("en") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  {{ og_all_tags | default("") }}
  {{ hreflang_tags | default("") }}
  <link rel="stylesheet" href="/css/style.css">
  {{ highlight_css | default("") }}
  {{ auto_includes_css | default("") }}
</head>
<body data-section="{% if page is defined and page.section %}{{ page.section }}{% endif %}">
  <div class="background-animations">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="/" class="site-logo">
        <span class="logo-icon">▲</span>
        {{ site.title }}
      </a>
      <nav class="main-nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/features/" class="nav-link">Features</a>
        <a href="/about/" class="nav-link">About</a>
      </nav>
    </header>
