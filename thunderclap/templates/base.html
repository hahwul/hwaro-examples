<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Archivo+Black&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --yellow: #FFFF00;
      --black: #000000;
      --white: #FFFFFF;
      --gray: #222222;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Archivo Black', sans-serif;
      line-height: 1.1;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 6rem 0;
      text-align: center;
      position: relative;
    }

    .site-title {
      font-family: 'Bungee', cursive;
      font-size: 160px;
      line-height: 0.9;
      color: var(--yellow);
      margin: 0;
      text-transform: uppercase;
      word-break: break-all;
    }

    nav {
      margin-top: 4rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 24px;
      border: 4px solid var(--white);
      padding: 0.5rem 1.5rem;
    }

    nav a:hover {
      background-color: var(--yellow);
      color: var(--black);
      border-color: var(--yellow);
    }

    main {
      padding: 4rem 0;
    }

    .section-title-wrap {
      position: relative;
      margin-bottom: 4rem;
      display: inline-block;
    }

    .starburst-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      z-index: -1;
      fill: var(--gray);
    }

    .act-listing {
      font-size: 36px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      border-left: 10px solid var(--yellow);
      padding-left: 2rem;
    }

    .schedule-grid {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-top: 4rem;
    }

    .crossed-sticks {
      width: 100px;
      height: 100px;
      margin: 4rem auto;
      display: block;
      stroke: var(--yellow);
    }

    .sound-waves {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.1;
      pointer-events: none;
    }

    footer {
      padding: 6rem 0;
      text-align: center;
      background-color: var(--yellow);
      color: var(--black);
    }

    @media (max-width: 768px) {
      .site-title { font-size: 60px; }
      nav { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="sound-waves">
    <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <circle cx="500" cy="500" r="100" fill="none" stroke="white" stroke-width="2" />
      <circle cx="500" cy="500" r="200" fill="none" stroke="white" stroke-width="2" />
      <circle cx="500" cy="500" r="300" fill="none" stroke="white" stroke-width="2" />
      <circle cx="500" cy="500" r="400" fill="none" stroke="white" stroke-width="2" />
    </svg>
  </div>

  <header>
    <div class="container">
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Acts</a>
        <a href="{{ base_url }}/about/">Impact</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <p>THUNDERCLAP // NO EMOJIS // NO GRADIENTS // TOTAL IMPACT</p>
  </footer>
</body>
</html>
