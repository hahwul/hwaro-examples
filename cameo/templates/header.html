<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #000000;
      --text: #000000;
      --text-muted: #666666;
      --border: #000000;
      --bg: #ffffff;
      --bg-subtle: #f0f0f0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.4;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      letter-spacing: -0.02em;
    }

    /* Layout */
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 3rem;
      text-transform: uppercase;
    }
    .site-logo {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.05em;
    }
    .site-logo:hover { color: var(--text-muted); }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .site-header nav a:hover { text-decoration: underline; }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 2px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      text-align: left;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.1; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 800; text-transform: uppercase; }
    h1 { font-size: 3.5rem; margin-top: 0; letter-spacing: -0.05em; }
    h2 { font-size: 2rem; letter-spacing: -0.03em; }
    h3 { font-size: 1.5rem; }
    p { margin: 1.5em 0; font-size: 1.1rem; }
    a { color: var(--primary); text-decoration: underline; text-underline-offset: 4px; }
    a:hover { background: var(--text); color: var(--bg); text-decoration: none; }
    code {
      background: var(--text);
      color: var(--bg);
      padding: 0.2rem 0.5rem;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    }
    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      overflow-x: auto;
      border: 2px solid var(--border);
    }
    pre code { background: none; color: var(--text); padding: 0; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 0;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    ul.section-list li:first-child { border-top: 1px solid var(--border); }
    ul.section-list li a { font-weight: 600; font-size: 1.25rem; text-decoration: none; display: block; }
    ul.section-list li a:hover { background: none; color: var(--text); text-decoration: underline; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-weight: 500; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    nav.pagination a:hover { background: var(--text); color: var(--bg); }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--text);
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
