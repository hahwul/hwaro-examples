<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #FF3366; /* Bold red/pink accent */
      --text: #ffffff;
      --text-muted: #888888;
      --border: #444444;
      --bg: #000000;
      --bg-subtle: #111111;
      --font-display: "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .site-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
    }

    .site-logo:hover { color: var(--primary); }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: color 0.2s;
    }

    .site-header nav a:hover { color: var(--primary); }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 5rem;
      padding: 2rem 0;
      border-top: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: var(--font-display);
      line-height: 1.1;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    h1 { font-size: 3.5rem; margin-top: 0; color: var(--text); }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.25rem; }

    p { margin: 1.5em 0; font-size: 1.1rem; }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      background-color: var(--primary);
      color: var(--bg);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.5rem;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      overflow-x: auto;
      border: 2px solid var(--border);
    }

    pre code { background: none; padding: 0; border: none; }

    /* Components */
    .hero {
      margin-bottom: 4rem;
      border-left: 8px solid var(--primary);
      padding-left: 1.5rem;
    }

    .hero p {
      font-size: 1.5rem;
      color: var(--text-muted);
      max-width: 600px;
    }

    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: var(--bg);
      border: 2px solid var(--border);
      transition: transform 0.2s, border-color 0.2s;
    }

    ul.section-list li:hover {
      transform: translateX(10px);
      border-color: var(--primary);
    }

    ul.section-list li a {
      font-weight: 900;
      font-size: 1.25rem;
      font-family: var(--font-display);
      text-transform: uppercase;
      color: var(--text);
    }

    ul.section-list li a:hover {
      background: none;
      color: var(--primary);
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.2rem; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
    }

    nav.pagination a:hover {
      background-color: var(--primary);
      border-color: var(--primary);
      color: var(--bg);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--primary);
      background: var(--primary);
      color: var(--bg);
      font-weight: 900;
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--bg-subtle);
      color: var(--text-muted);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background-color: var(--primary);
      color: var(--bg);
      font-family: var(--font-display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #fff;
      color: var(--bg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
