# =============================================================================
# Marbled Paper Theme - Site Configuration
# =============================================================================

title = "Marbled Paper"
description = "Traditional hand-dipped bookbinding endpaper patterns."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"
