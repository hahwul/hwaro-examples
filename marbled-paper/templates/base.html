<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
</head>
<body>
    <!-- SVG Filter for the marbled background -->
    <svg style="display: none;">
        <defs>
            <filter id="marbling-filter">
                <!-- Base turbulence for the fluid patterns -->
                <feTurbulence type="fractalNoise" baseFrequency="0.015 0.05" numOctaves="3" result="noise1"/>
                
                <!-- Secondary turbulence for finer details -->
                <feTurbulence type="turbulence" baseFrequency="0.08" numOctaves="2" result="noise2"/>
                
                <!-- Displace the fine noise with the fluid noise -->
                <feDisplacementMap in="noise2" in2="noise1" scale="50" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
                
                <!-- Colorize the pattern to mimic traditional marbling (reds, blues, golds) -->
                <feColorMatrix type="matrix" values="
                    1 0 0 0 0.1
                    0 0.2 0 0 0.1
                    0 0 0.8 0 0.2
                    0 0 0 1 0
                " in="displaced" result="colored"/>
                
                <!-- Blend the colored pattern -->
                <feBlend mode="multiply" in="SourceGraphic" in2="colored" />
            </filter>
        </defs>
    </svg>

    <!-- The actual background element using the filter -->
    <div class="marbled-background"></div>

    <div class="book-container">
        <header>
            <h1><a href="{{ site.base_url }}/" style="border: none; color: inherit;">{{ site.title }}</a></h1>
            <p style="font-style: italic; font-size: 1.2rem; color: var(--color-ink-red);">{{ site.description }}</p>
            <nav>
                <a href="{{ site.base_url }}/">Home</a>
                <a href="{{ site.base_url }}/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <div class="page-ornament">❧ ❦ ☙</div>
            <p>&copy; {{ site.title }}. Handcrafted with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
