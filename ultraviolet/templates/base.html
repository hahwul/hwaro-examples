<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-wrapper">
        <header class="site-header">
            <div class="logo">
                <a href="{{ base_url }}">{{ site.title }}</a>
            </div>
            <nav class="site-nav">
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/about">About</a>
                <a href="{{ base_url }}/work">Work</a>
            </nav>
        </header>

        <main class="site-main">
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; 2024 {{ site.extra.author }}</p>
        </footer>
    </div>
</body>
</html>
