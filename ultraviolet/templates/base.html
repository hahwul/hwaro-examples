<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-wrapper">
        <header class="site-header">
            <div class="logo">
                <a href="{{ config.base_url }}">{{ config.title }}</a>
            </div>
            <nav class="site-nav">
                <a href="{{ config.base_url }}">Home</a>
                <a href="{{ get_url(path="about") }}">About</a>
                <a href="{{ get_url(path="work") }}">Work</a>
            </nav>
        </header>

        <main class="site-main">
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; 2024 {{ config.extra.author }}</p>
        </footer>
    </div>
</body>
</html>
