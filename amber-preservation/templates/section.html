{% extends "base.html" %}

{% block content %}
<div class="fossil-grid">
    {% for post in section.pages %}
    <article class="fossil-card">
        <div class="fossil-inner">
            <header>
                <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                <time datetime="{{ post.date | date(fmt="%Y-%m-%d") }}">{{ post.date | date(fmt="%B %d, %Y") }}</time>
            </header>
            <div class="summary">
                {{ post.summary | default(val=post.content | strip_html | truncate_words(n=30)) }}
            </div>
            <a href="{{ post.url }}" class="read-more">Examine Specimen</a>
        </div>
    </article>
    {% endfor %}
</div>
{% endblock %}
