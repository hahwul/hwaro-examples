<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    :root {
      --primary: #9b8d7c;
      --primary-hover: #bdae9c;
      --text: #2c2925;
      --text-muted: #7b756d;
      --border: #eae6e0;
      --bg: #fcfbfa;
      --bg-subtle: #f5f2ed;
      --shadow-sm: 0 4px 12px rgba(155, 141, 124, 0.05);
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      line-height: 1.8;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4rem;
    }

    .site-logo {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 2rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .site-logo:hover { color: var(--primary); }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover { color: var(--primary); }

    .site-main { min-height: calc(100vh - 300px); }

    .site-footer {
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-family: var(--font-serif);
      letter-spacing: 0.05em;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: var(--font-serif);
      color: var(--text);
      line-height: 1.3;
      font-weight: 400;
      margin-top: 2em;
      margin-bottom: 0.75em;
    }

    h1 { font-size: 3rem; margin-top: 0; font-weight: 300; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }

    p { margin: 1.25em 0; font-weight: 300; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover { color: var(--primary-hover); }

    .site-main a {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }

    .site-main a:hover {
      border-bottom-color: var(--primary);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      font-size: 0.85em;
      color: var(--primary);
    }

    pre {
      background: #faf8f5;
      padding: 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    pre code { background: none; padding: 0; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }

    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: #ffffff;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(155, 141, 124, 0.08);
    }

    ul.section-list li a {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--text);
      border-bottom: none;
    }

    ul.section-list li a:hover {
      color: var(--primary);
      border-bottom: none;
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; font-family: var(--font-serif); font-size: 1.2rem;}

    nav.pagination { margin: 3rem 0; font-family: var(--font-serif); }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center;}

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--primary);
      color: var(--primary);
      background: transparent;
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--border);
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 2rem 0;
        margin-bottom: 2rem;
      }
      h1 { font-size: 2.25rem; }
      .site-wrapper { padding: 0 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
