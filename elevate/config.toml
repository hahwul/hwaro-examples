title = "Elevate"
description = "Enterprise SaaS landing with structured sections, trust badges, testimonials, and feature comparison"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = true
per_page = 5

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["posts"]

[markdown]
safe = false
lazy_loading = true
