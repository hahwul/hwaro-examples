{% include "header.html" %}
  <div class="page-wrapper">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <div class="page-meta">
      <span>{{ page.date | date("%B %d, %Y") }}</span>
      {% if page.reading_time %}<span>{{ page.reading_time }} min read</span>{% endif %}
    </div>
    {% endif %}
    <div class="page-content">
      {{ content | safe }}
    </div>
  </div>
{% include "footer.html" %}
