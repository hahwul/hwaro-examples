<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page_title %}{{ page_title }} - {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="{{ base_url }}/" class="nav-brand">
        <span class="nav-brand-icon">E</span>
        Elevate
      </a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="{{ base_url }}/#features">Features</a>
        <a href="{{ base_url }}/#testimonials">Testimonials</a>
        <a href="{{ base_url }}/#pricing">Pricing</a>
        <a href="{{ base_url }}/#" class="nav-cta">Get Started</a>
      </div>
    </div>
  </nav>
