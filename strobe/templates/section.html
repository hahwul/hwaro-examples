{% include "header.html" %}
<main>
    <header style="margin-bottom: 2rem;">
        <h2 class="fluorescent-text" style="font-size: 3rem;">{{ section.title }}</h2>
    </header>

    <div class="section-content" style="margin-bottom: 3rem;">
        {{ section.content | safe }}
    </div>

    <div class="pages-list" style="display: grid; gap: 1.5rem;">
        {% for post in section.pages %}
        <a href="{{ post.url }}" style="text-decoration: none; color: inherit;">
            <div class="post-item" style="border: 1px solid var(--uv-purple); padding: 1.5rem; transition: all 0.3s ease; background: rgba(107,0,255,0.02);">
                <h3 class="uv-text" style="margin: 0 0 0.5rem 0;">{{ post.title }}</h3>
                <p style="margin: 0; opacity: 0.7;">{{ post.description }}</p>
                {% if post.date %}<small class="uv-text">{{ post.date | date("%Y.%m.%d") }}</small>{% endif %}
            </div>
        </a>
        {% endfor %}
    </div>
</main>
<style>
    .post-item:hover {
        background: rgba(107,0,255,0.1) !important;
        border-color: var(--laser-green) !important;
        transform: scale(1.02);
    }
    .post-item:hover h3 {
        color: var(--laser-green);
        text-shadow: var(--neon-glow);
    }
</style>
{% include "footer.html" %}
