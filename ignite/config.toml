title = "Ignite"
description = "Bold startup landing with oversized hero text, gradient CTAs, animated counters, and a strong founder story"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
lazy_loading = true
