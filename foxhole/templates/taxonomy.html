{% include "header.html" %}
  <main class="site-main">
    <h2 class="taxonomy-title">{{ taxonomy_name | title }}</h2>
    <ul class="taxonomy-list">
      {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}{{ term.url }}">{{ term.name }} ({{ term.pages | length }})</a></li>
      {% endfor %}
    </ul>
  </main>
