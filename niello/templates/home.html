{% include "header.html" %}
  <main class="site-main">
    <div class="wrapper">
      <div class="hero">
        <h1 class="hero-title">{{ site.title }}</h1>
        <p class="hero-desc">{{ site.description }}</p>
      </div>
      <p class="section-heading">Recent Writing</p>
      <ul class="post-list">
        {% for post in site.pages %}
        {% if post.section == "posts" %}
        <li class="post-item">
          <a href="{{ base_url }}{{ post.url }}" class="post-link">{{ post.title }}</a>
          {% if post.date %}<span class="post-date">{{ post.date | date("%Y-%m-%d") }}</span>{% endif %}
        </li>
        {% endif %}
        {% endfor %}
      </ul>
    </div>
  </main>
{% include "footer.html" %}
