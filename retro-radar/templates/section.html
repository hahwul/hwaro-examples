{% extends "base.html" %}

{% block content %}
    <h1>INDEX</h1>
    {{ content | safe }}
    
    {% if section.pages %}
        <div style="margin-top: 2rem;">
            <h2>DATABASE ENTRIES</h2>
            <ul>
                {% for page in section.pages %}
                    <li>
                        <a href="{{ page.url }}">{{ page.title | upper }}</a>
                        <span style="opacity: 0.6; margin-left: 1rem;">[{{ page.date | date(format="%Y-%m-%d") }}]</span>
                    </li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
{% endblock %}
