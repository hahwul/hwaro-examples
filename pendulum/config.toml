title = "Pendulum"
description = "A time-focused productivity blog with clockwork aesthetics and dark wood tones."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[markdown]
safe = false

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[search]
enabled = true

[taxonomies]
tags = true
categories = true
authors = true

[sitemap]
enabled = true

[robots]
enabled = true

[[feeds]]
section = "posts"
format = "rss"
