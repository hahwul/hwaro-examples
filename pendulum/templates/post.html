{% include "header.html" %}
  <article class="max-w-3xl">
    <header class="mb-10">
      <h1 class="text-3xl font-display font-bold text-cream mb-3">{{ page.title }}</h1>
      <div class="flex items-center gap-4 text-sm text-cream/40">
        <time>{{ page.date }}</time>
        {% if page.taxonomies.tags %}
        <div class="flex gap-2">
          {% for tag in page.taxonomies.tags %}
          <span class="px-2 py-0.5 bg-bronze/10 border border-bronze/20 rounded text-xs text-bronze">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </header>
    <div class="prose">
      {{ content }}
    </div>
  </article>
{% include "footer.html" %}
