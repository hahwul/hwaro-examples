{% include "header.html" %}
  <header class="mb-12">
    <h1 class="text-3xl font-display font-bold text-cream mb-2">{{ section.title }}</h1>
    {{ content }}
  </header>
  <div class="space-y-6">
    {% for post in section.pages %}
    <a href="{{ post.url }}" class="block p-6 bg-wood-light border border-bronze/10 rounded hover:border-bronze/30 transition-all group">
      <h2 class="text-xl font-display text-cream group-hover:text-bronze-light transition-colors mb-2">{{ post.title }}</h2>
      <div class="flex items-center gap-4 text-sm text-cream/30 mb-3">
        <time>{{ post.date }}</time>
      </div>
      {% if post.summary %}
      <p class="text-cream/50 line-clamp-2">{{ post.summary | strip_html | truncate_words(30) }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
  {{ pagination }}
{% include "footer.html" %}
