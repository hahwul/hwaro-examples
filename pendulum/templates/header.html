<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wood: { DEFAULT: '#2a1f14', light: '#3d2e1e', lighter: '#4a3828' },
            bronze: { DEFAULT: '#b08d57', light: '#d4b87a', dark: '#8a6d3b', muted: '#907548' },
            cream: { DEFAULT: '#f5f0e8', dark: '#e8dfd0', muted: '#d8cfc0' },
            clockface: '#1e1610',
          },
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            sans: ['Source Sans 3', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-wood text-cream font-sans; }
    .prose { @apply max-w-none text-cream/80; }
    .prose h1 { @apply text-3xl font-display font-bold mb-6 text-cream border-b border-bronze/30 pb-4; }
    .prose h2 { @apply text-2xl font-display font-semibold mt-10 mb-4 text-bronze-light; }
    .prose h3 { @apply text-xl font-display mt-8 mb-3 text-cream; }
    .prose p { @apply my-4 leading-relaxed text-lg text-cream/70; }
    .prose a { @apply text-bronze-light hover:text-bronze underline underline-offset-4 decoration-bronze/30; }
    .prose strong { @apply font-semibold text-cream; }
    .prose code { @apply bg-wood-lighter px-1.5 py-0.5 rounded text-sm text-bronze-light; }
    .prose pre { @apply bg-clockface text-cream/80 p-5 rounded my-6 overflow-x-auto border border-bronze/10; }
    .prose pre code { @apply bg-transparent p-0 text-cream/80; }
    .prose blockquote { @apply my-6 py-3 px-6 border-l-4 border-bronze bg-wood-light italic text-cream/60; }
    .prose ul, .prose ol { @apply my-4 ml-6; }
    .prose li { @apply my-2 text-lg; }
    .prose ul li { @apply list-disc marker:text-bronze; }
    .prose ol li { @apply list-decimal marker:text-bronze; }
    .prose table { @apply w-full border-collapse my-8; }
    .prose thead { @apply bg-wood-lighter; }
    .prose th { @apply px-4 py-3 text-left text-sm font-semibold text-bronze uppercase tracking-wide border-b border-bronze/30; }
    .prose td { @apply px-4 py-3 border-b border-wood-lighter text-cream/70; }

    @keyframes pendulumSwing {
      0% { transform: rotate(30deg); }
      50% { transform: rotate(-30deg); }
      100% { transform: rotate(30deg); }
    }
    .pendulum-arm {
      animation: pendulumSwing 2s ease-in-out infinite;
      transform-origin: top center;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-bronze/20 bg-wood sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ base_url }}/" class="flex items-center gap-3 group">
        <div class="w-8 h-8 relative">
          <div class="absolute top-0 left-1/2 w-px h-full -translate-x-1/2">
            <div class="pendulum-arm">
              <div class="w-px h-5 bg-bronze mx-auto"></div>
              <div class="w-3 h-3 rounded-full bg-bronze-light mx-auto border border-bronze"></div>
            </div>
          </div>
        </div>
        <span class="font-display text-xl text-cream group-hover:text-bronze-light transition-colors">{{ site.title }}</span>
      </a>
      <div class="flex items-center gap-6 text-sm font-medium">
        <a href="{{ base_url }}/posts/" class="text-cream/50 hover:text-cream transition-colors">Posts</a>
        <a href="{{ base_url }}/about/" class="text-cream/50 hover:text-cream transition-colors">About</a>
      </div>
    </div>
  </nav>
  <div class="max-w-4xl mx-auto px-6 py-12">
