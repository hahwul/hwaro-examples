{% include "header.html" %}
  <h1 class="text-3xl font-display font-bold text-cream mb-8">{{ taxonomy_term }}</h1>
  <div class="space-y-4">
    {% for post in taxonomy_pages %}
    <a href="{{ base_url }}{{ post.url }}" class="block p-5 bg-wood-light border border-bronze/10 rounded hover:border-bronze/30 transition-all">
      <h2 class="text-lg font-display text-cream mb-1">{{ post.title }}</h2>
      <time class="text-sm text-cream/30">{{ post.date }}</time>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
