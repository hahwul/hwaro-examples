<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Paper home">
        <svg viewBox="0 0 52 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Clinical trial capsule split in two halves -->
          <rect x="4" y="8" width="18" height="24" rx="9" fill="none" stroke="#1a5276" stroke-width="1.8"/>
          <path d="M4 20 L22 20" stroke="#1a5276" stroke-width="1"/>
          <rect x="7" y="11" width="12" height="9" rx="6" fill="#1a5276" opacity="0.25"/>
          <rect x="7" y="20" width="12" height="9" rx="6" fill="#1a5276" opacity="0.12"/>
          <!-- Randomization arrow -->
          <line x1="26" y1="15" x2="34" y2="10" stroke="#2874a6" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="26" y1="25" x2="34" y2="30" stroke="#839192" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="26" cy="20" r="2" fill="#1a5276"/>
          <!-- Treatment arm indicator -->
          <rect x="36" y="6" width="12" height="8" rx="2" fill="none" stroke="#1a5276" stroke-width="1.2"/>
          <text x="42" y="12.5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="5" fill="#1a5276">T</text>
          <!-- Control arm indicator -->
          <rect x="36" y="26" width="12" height="8" rx="2" fill="none" stroke="#839192" stroke-width="1.2"/>
          <text x="42" y="32.5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="5" fill="#839192">C</text>
        </svg>
        <span class="logo-text">
          <span class="journal-name">Clinical Trials in Rheumatology</span>
          <span class="journal-sub">Vol. 19 &middot; Issue 03 &middot; Jun 2026</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">ABSTRACT</a>
        <a href="{{ base_url }}/sections/">SECTIONS</a>
        <a href="{{ base_url }}/consort/">CONSORT</a>
        <a href="{{ base_url }}/appendix/">APPENDIX</a>
        <span class="nct-badge">NCT04829174</span>
      </nav>
    </header>
