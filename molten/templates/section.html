{% include "header.html" %}
<div class="blog-container">
  <main class="blog-main">
    <h1 class="melt-hover">{{ page.title | e }}</h1>
    <div class="section-content">
      {{ content | safe }}
    </div>

    <ul class="post-list">
      {% for post in section.pages %}
      <li class="post-item">
        <div class="post-meta">{{ post.date }}</div>
        <h2 class="post-title"><a href="{{ post.permalink }}" class="melt-hover">{{ post.title | e }}</a></h2>
        {% if post.description %}
        <p class="post-excerpt">{{ post.description | e }}</p>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
