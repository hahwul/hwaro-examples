{% include "header.html" %}
<section>
    <h2>{{ section.title }}</h2>
    <ul class="posts-list">
        {% for post in section.pages %}
        <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
            <time>{{ post.date | date("%Y-%m-%d") }}</time>
        </li>
        {% endfor %}
    </ul>
</section>
{% include "footer.html" %}
