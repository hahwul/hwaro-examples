{% extends "base.html" %}

{% block content %}
<div class="section-container">
  <header class="section-header glass-panel">
    <h1 class="section-title">{{ page.title | e }}</h1>
    <p class="section-description">Posts tagged with this term:</p>
  </header>

  <div class="post-list">
    {{ content | safe }}
  </div>
</div>
{% endblock %}
