# =============================================================================
# Site Configuration
# =============================================================================

title = "Solstice"
description = "A dual-themed blog exploring the duality of light between summer and winter"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 6

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

# =============================================================================
# Robots
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
]

# =============================================================================
# Feeds
# =============================================================================

[feeds]
enabled = true
filename = "atom.xml"
type = "atom"
limit = 20

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false

# =============================================================================
# Search
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
