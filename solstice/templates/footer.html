  <script>
    function toggleTheme() {
      var html = document.documentElement;
      if (html.classList.contains('summer')) {
        html.classList.remove('summer');
        html.classList.add('winter');
      } else {
        html.classList.remove('winter');
        html.classList.add('summer');
      }
    }
  </script>
