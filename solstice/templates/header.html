<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script>
    (function() {
      var now = new Date();
      var hour = now.getHours();
      var month = now.getMonth();
      var theme;

      if (month >= 5 && month <= 7) {
        theme = 'summer';
      } else if (month === 11 || month <= 1) {
        theme = 'winter';
      } else if (hour >= 6 && hour < 18) {
        theme = 'summer';
      } else {
        theme = 'winter';
      }

      document.documentElement.className = theme;
    })();
  </script>
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <div class="sun-orbit">
          <div class="sun-track">
            <div class="sun-dot"></div>
          </div>
        </div>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Writing</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <span class="toggle-summer">Summer</span>
          <span class="toggle-divider">/</span>
          <span class="toggle-winter">Winter</span>
        </button>
      </nav>
    </header>
