{% include "header.html" %}

<main class="page-content">
    <h1 class="page-title">{{ taxonomy_name | title }}</h1>
    <div class="taxonomy-list">
        {% for term in taxonomy_terms %}
            <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="taxonomy-tag">
                {{ term.name }} ({{ term.pages | length }})
            </a>
        {% endfor %}
    </div>
</main>

{% include "footer.html" %}
