{% include "header.html" %}

<main>
    <div class="hero">
        <h1 style="font-size: clamp(3rem, 10vw, 8rem);">{{ taxonomy_term.name | upper }}</h1>
        <p style="font-size: 1.5rem;">Projects tagged with {{ taxonomy_term.name }}</p>
    </div>

    <div class="grid-asymmetric">
        {% for post in taxonomy_pages %}
            <a href="{{ post.url }}" class="project-card">
                {% if post.extra.image %}
                    <img src="{{ base_url }}{{ post.extra.image }}" alt="{{ post.title }}" loading="lazy">
                {% else %}
                    <div style="width: 100%; height: 100%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #555;">No Image</div>
                {% endif %}
                <div class="project-info">
                    <h2 class="project-title">{{ post.title }}</h2>
                </div>
            </a>
        {% endfor %}
    </div>
</main>

{% include "footer.html" %}
