{% include "header.html" %}
  <main class="site-main">
    <div class="card">
      <h1 class="card-title">{{ page.title | e }}</h1>
      <p class="taxonomy-desc" style="color: var(--text-muted);">Posts tagged with this term:</p>
      {{ content | safe }}
      <ul class="section-list" style="list-style: none; padding: 0;">
        {% for post in taxonomy_pages %}
        <li style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
          <h2 style="margin-bottom: 0.5rem;"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        </li>
        {% endfor %}
      </ul>
    </div>
  </main>
{% include "footer.html" %}
