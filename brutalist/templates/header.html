<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Times New Roman', Times, Georgia, serif;
      font-size: 18px;
      line-height: 1.6;
      color: #000;
      background: #fff;
    }

    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    .site-header {
      border-bottom: 6px solid #000;
      padding: 40px 0 30px;
    }

    .site-header .wrapper {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      line-height: 1;
    }

    .site-title:hover {
      text-decoration: none;
      background: #000;
      color: #fff;
    }

    .site-nav {
      display: flex;
      gap: 0;
    }

    .site-nav a {
      display: block;
      padding: 8px 16px;
      color: #000;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 3px solid #000;
      border-right: none;
    }

    .site-nav a:last-child {
      border-right: 3px solid #000;
    }

    .site-nav a:hover {
      background: #000;
      color: #fff;
    }

    /* Main content area */
    .site-main {
      min-height: calc(100vh - 280px);
      padding: 40px 0;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Times New Roman', Times, Georgia, serif;
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
    }

    h1 { font-size: 2.8rem; letter-spacing: -1px; margin: 0 0 30px; }
    h2 { font-size: 1.8rem; margin: 40px 0 15px; border-bottom: 3px solid #000; padding-bottom: 8px; }
    h3 { font-size: 1.3rem; margin: 30px 0 10px; }

    p { margin: 0 0 1.2em; }

    a { color: #000; text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 2px; }
    a:hover { background: #000; color: #fff; text-decoration: none; }

    code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9em;
      background: #f0f0f0;
      padding: 2px 6px;
      border: 1px solid #000;
    }

    pre {
      background: #f0f0f0;
      border: 3px solid #000;
      padding: 20px;
      overflow-x: auto;
      margin: 20px 0;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
    }

    blockquote {
      border-left: 6px solid #000;
      margin: 20px 0;
      padding: 10px 20px;
      font-style: italic;
    }

    ul, ol { margin: 0 0 1.2em 30px; }
    li { margin-bottom: 4px; }

    img {
      max-width: 100%;
      border: 3px solid #000;
      display: block;
      margin: 20px 0;
    }

    hr {
      border: none;
      border-top: 3px solid #000;
      margin: 40px 0;
    }

    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 10px 14px; border: 2px solid #000; text-align: left; }
    th { background: #000; color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; }

    /* Post list */
    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-item {
      border: 3px solid #000;
      margin-bottom: -3px;
      padding: 25px 30px;
      position: relative;
    }

    .post-item:hover {
      background: #000;
      color: #fff;
    }

    .post-item:hover a { color: #fff; }

    .post-item-title {
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      margin: 0 0 6px;
    }

    .post-item-title a {
      text-decoration: none;
    }

    .post-item-meta {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .post-item-summary {
      margin: 10px 0 0;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Tags */
    .tag-list {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .tag-link {
      display: inline-block;
      padding: 4px 12px;
      border: 2px solid #000;
      border-right: none;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      color: #000;
    }

    .tag-link:last-child {
      border-right: 2px solid #000;
    }

    .tag-link:hover {
      background: #000;
      color: #fff;
    }

    /* Taxonomy page list */
    .taxonomy-list {
      list-style: none;
      padding: 0;
      margin: 20px 0;
    }

    .taxonomy-list li {
      display: inline-block;
    }

    .taxonomy-list li a {
      display: inline-block;
      padding: 8px 18px;
      border: 3px solid #000;
      margin: 0 -3px 6px 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .taxonomy-list li a:hover {
      background: #000;
      color: #fff;
    }

    /* Pagination */
    nav.pagination { margin: 40px 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }
    nav.pagination a {
      display: inline-block;
      padding: 8px 16px;
      border: 3px solid #000;
      border-right: none;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
    }
    nav.pagination a:hover { background: #000; color: #fff; }
    nav.pagination li:last-child a { border-right: 3px solid #000; }
    .pagination-current span {
      display: inline-block;
      padding: 8px 16px;
      border: 3px solid #000;
      border-right: none;
      background: #000;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .pagination-disabled span {
      display: none;
    }

    /* Post navigation */
    .post-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-top: 50px;
      border-top: 6px solid #000;
      padding-top: 0;
    }

    .post-nav-link {
      padding: 20px;
      border: 3px solid #000;
      border-top: none;
      text-decoration: none;
      color: #000;
    }

    .post-nav-link:first-child {
      border-right: none;
    }

    .post-nav-link:hover {
      background: #000;
      color: #fff;
    }

    .post-nav-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .post-nav-title {
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    /* Alert shortcode */
    .alert {
      border: 3px solid #000;
      padding: 15px 20px;
      margin: 20px 0;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-header .wrapper {
        flex-direction: column;
        gap: 20px;
      }

      .site-title { font-size: 2.2rem; }
      h1 { font-size: 2rem; }

      .post-nav {
        grid-template-columns: 1fr;
      }

      .post-nav-link:first-child {
        border-right: 3px solid #000;
        border-bottom: none;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="site-header">
    <div class="wrapper">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
  <div class="wrapper">
    <main class="site-main">
