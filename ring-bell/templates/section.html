{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <div class="section-header">
        <span class="section-label">THE CARD</span>
        <h1 class="section-title">{{ page.title | e }}</h1>
      </div>
      <div class="section-ropes">
        <svg viewBox="0 0 1000 30" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <line x1="0" y1="8" x2="1000" y2="8" stroke="#d4352a" stroke-width="3"/>
          <line x1="0" y1="18" x2="1000" y2="18" stroke="#e5d8a8" stroke-width="2"/>
          <line x1="0" y1="26" x2="1000" y2="26" stroke="#d4352a" stroke-width="3"/>
        </svg>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
