{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <header class="post-header">
        <div class="post-round-card">
          <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" class="round-card-svg">
            <rect x="10" y="10" width="180" height="120" fill="#f4e8c0" stroke="#1a0f10" stroke-width="4"/>
            <rect x="18" y="18" width="164" height="104" fill="none" stroke="#1a0f10" stroke-width="1"/>
            <text x="100" y="60" text-anchor="middle" font-family="Anton, Impact, sans-serif" font-size="24" fill="#1a0f10">ROUND</text>
            <text x="100" y="108" text-anchor="middle" font-family="Anton, Impact, sans-serif" font-size="54" fill="#d4352a">{{ page.extra.round_number | default(value="--") }}</text>
          </svg>
        </div>
        <h1 class="post-title">{{ page.title | e }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
      <footer class="post-footer">
        <a href="{{ base_url }}/rounds/" class="back-link">&larr; Return to the Card</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
