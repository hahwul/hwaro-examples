{% include "header.html" %}

<div style="
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
">

  <div style="
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: #4b5563;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  ">TERRAFORM COMMAND / ERROR</div>

  <div style="
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  ">
    <div style="
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background-color: #1c0a0a;
      clip-path: circle(50%);
      box-shadow: inset -14px -8px 0 rgba(0,0,0,0.5);
    "></div>
    <div style="
      position: absolute;
      width: 148px;
      height: 148px;
      border: 1px solid #2a0f0f;
      border-radius: 50%;
    "></div>
  </div>

  <div style="
    font-family: 'Share Tech Mono', monospace;
    font-size: 5rem;
    color: #dc2626;
    line-height: 1;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  ">404</div>

  <div style="
    font-family: 'Rajdhani', system-ui, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #6b7280;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  ">SECTOR NOT FOUND</div>

  <div style="
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: #374151;
    letter-spacing: 0.06em;
    max-width: 380px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  ">
    The requested coordinates do not correspond to any known planetary sector. Navigation data may be corrupted or the target may have been decommissioned.
  </div>

  <a href="{{ base_url }}/" style="
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: #16a34a;
    border: 1px solid rgba(22,163,74,0.35);
    padding: 0.6rem 1.5rem;
    text-decoration: none;
    text-transform: uppercase;
    transition: background-color 0.15s;
  ">RETURN TO COMMAND CENTER</a>

</div>

{% include "footer.html" %}
