<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Contrail+One&family=Saira+Condensed:wght@500;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="club">
    <header class="club-masthead" role="banner">
      <a href="{{ base_url }}/" class="mark" aria-label="Afterparty home">
        <svg viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" class="mark-svg" aria-hidden="true">
          <g transform="translate(30,30)">
            <circle r="22" fill="#05040b" stroke="#00c8ff" stroke-width="1.2"/>
            <g stroke="#00c8ff" stroke-width="0.4" fill="none">
              <line x1="-22" y1="0" x2="22" y2="0"/>
              <line x1="0" y1="-22" x2="0" y2="22"/>
              <line x1="-16" y1="-16" x2="16" y2="16"/>
              <line x1="-16" y1="16" x2="16" y2="-16"/>
            </g>
            <circle r="3" fill="#ff2bac"/>
          </g>
          <text x="70" y="26" font-family="Contrail One, sans-serif" font-size="20" fill="#00c8ff" letter-spacing="4">AFTER</text>
          <text x="70" y="46" font-family="Contrail One, sans-serif" font-size="20" fill="#ff2bac" letter-spacing="4">PARTY</text>
        </svg>
      </a>
      <nav class="club-nav" aria-label="Primary">
        <a href="{{ base_url }}/">The Night</a>
        <a href="{{ base_url }}/lineup/">Lineup</a>
        <a href="{{ base_url }}/menu/">Bar</a>
        <a href="{{ base_url }}/info/">Info</a>
        <a href="{{ base_url }}/rsvp/" class="club-cta">RSVP</a>
      </nav>
    </header>
