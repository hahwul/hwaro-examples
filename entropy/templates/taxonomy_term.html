{% include "header.html" %}

  <main class="taxonomy-term-main">
    <div class="term-header-split">
      <div class="term-order-side">
        <h1 class="term-title">{{ page.title }}</h1>
        <p class="term-desc">Articles tagged with this term:</p>
      </div>
      <div class="term-chaos-side">
        <span class="term-decoration" style="transform: rotate(-6deg) translateX(10px);">*</span>
        <span class="term-decoration" style="transform: rotate(4deg) translateY(-5px);">*</span>
      </div>
    </div>
    <div class="term-content">
      {{ content | safe }}
    </div>
  </main>

{% include "footer.html" %}
