<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080c;
      color: #a0a8b8;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    a { color: #c084fc; text-decoration: none; transition: color 0.3s; }
    a:hover { color: #e0b0ff; }

    .site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.25rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(8, 8, 12, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.1);
    }
    .site-brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .site-nav-links a {
      margin-left: 2rem;
      color: #607080;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 400;
    }
    .site-nav-links a:hover { color: #c084fc; }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      position: relative;
    }
    .hero-ring {
      position: absolute;
      border: 1px solid rgba(192, 132, 252, 0.08);
      border-radius: 50%;
      animation: pulse-ring 6s ease-in-out infinite;
    }
    .hero-ring-1 { width: 400px; height: 400px; animation-delay: 0s; }
    .hero-ring-2 { width: 550px; height: 550px; animation-delay: 2s; }
    .hero-ring-3 { width: 700px; height: 700px; animation-delay: 4s; }
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.03); }
    }
    .hero-content { position: relative; z-index: 2; }
    .hero-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #c084fc;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .hero-desc {
      font-size: 1.1rem;
      color: #607080;
      max-width: 480px;
      margin: 1.5rem auto 0;
      font-weight: 300;
    }
    .hero-cta {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.875rem 2.5rem;
      border: 1px solid #c084fc;
      color: #c084fc;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    .hero-cta:hover {
      background: #c084fc;
      color: #08080c;
    }

    .products-section {
      padding: 6rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .products-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #c084fc;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(192, 132, 252, 0.1);
      padding: 2.5rem 2rem;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .product-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: #c084fc;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .product-card:hover::before { transform: scaleX(1); }
    .product-card:hover {
      border-color: rgba(192, 132, 252, 0.3);
      background: rgba(192, 132, 252, 0.04);
      transform: translateY(-4px);
    }
    .product-category {
      font-size: 0.7rem;
      color: #c084fc;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .product-card h3 {
      font-size: 1.4rem;
      color: #fff;
      margin: 0.75rem 0 0.5rem;
      font-weight: 600;
    }
    .product-card h3 a { color: #fff; }
    .product-card h3 a:hover { color: #c084fc; }
    .product-card p { color: #607080; font-size: 0.9rem; line-height: 1.6; }
    .product-price {
      display: inline-block;
      margin-top: 1.25rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }

    .site-main {
      max-width: 720px;
      margin: 0 auto;
      padding: 8rem 2rem 4rem;
    }
    .site-main h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .page-date { color: #4a5568; font-size: 0.85rem; margin-bottom: 2rem; }
    .site-main p { margin-bottom: 1.25rem; line-height: 1.8; }
    .site-main h2 { color: #fff; font-size: 1.5rem; margin: 2rem 0 1rem; font-weight: 600; }
    .site-main h3 { color: #d0d8e8; font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
    .site-main code { background: #12121a; color: #c084fc; padding: 0.15em 0.4em; font-size: 0.9em; border: 1px solid rgba(192,132,252,0.15); }
    .site-main pre { background: #12121a; border: 1px solid rgba(192,132,252,0.1); padding: 1.25rem; overflow-x: auto; margin-bottom: 1.5rem; }
    .site-main pre code { background: none; border: none; padding: 0; }
    .site-main blockquote { border-left: 2px solid #c084fc; padding-left: 1rem; color: #607080; margin: 1.5rem 0; font-style: italic; }
    .site-main ul, .site-main ol { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .site-main li { margin-bottom: 0.25rem; }
    .site-main a { border-bottom: 1px solid rgba(192,132,252,0.3); }
    .site-main a:hover { border-bottom-color: #c084fc; }
    .site-main img { max-width: 100%; height: auto; }

    .post-list { list-style: none; }
    .post-list li {
      padding: 1.25rem 0;
      border-bottom: 1px solid rgba(192,132,252,0.08);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .post-list a { color: #fff; border-bottom: none; font-weight: 600; }
    .post-list a:hover { color: #c084fc; }
    .post-date { color: #4a5568; font-size: 0.8rem; }

    .taxonomy-desc { color: #607080; margin-bottom: 2rem; }

    .site-footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #2a3040;
      font-size: 0.8rem;
      border-top: 1px solid rgba(192,132,252,0.08);
      margin-top: 4rem;
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.5rem; }
      .hero-ring { display: none; }
      .site-nav { padding: 1rem; }
      .site-nav-links a { margin-left: 1rem; font-size: 0.75rem; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ base_url }}/" class="site-brand">Hologram</a>
    <div class="site-nav-links">
      <a href="{{ base_url }}/products/">Products</a>
      <a href="{{ base_url }}/about/">About</a>
    </div>
  </nav>
