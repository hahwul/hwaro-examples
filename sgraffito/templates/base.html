<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elif section.description %}{{ section.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <div class="scratch-bg">
    <div class="s1"></div>
    <div class="s2"></div>
    <div class="s3"></div>
    <div class="s4"></div>
  </div>

  <div class="container">
    <header>
      <h1><a href="{{ base_url }}" style="text-decoration: none; color: inherit;">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}/about">About</a>
        <a href="{{ base_url }}/posts">Writing</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; {{ now() | date(format="%Y") }} {{ site.extra.author | default(value=site.title) }}. Designed with a Sgraffito aesthetic.</p>
    </footer>
  </div>
</body>
</html>
