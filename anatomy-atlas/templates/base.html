<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="atlas-container">
        <header class="atlas-header">
            <h1><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
            <p class="subtitle">{{ config.description }}</p>
            <nav class="atlas-nav">
                <ul>
                    <li><a href="{{ config.base_url }}">Index</a></li>
                    <li><a href="{{ config.base_url }}/about">About</a></li>
                </ul>
            </nav>
            <div class="decorative-line"></div>
        </header>

        <main class="atlas-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="atlas-footer">
            <div class="decorative-line"></div>
            <p>&copy; {{ config.title }} - Ex Libris Medicus</p>
        </footer>
    </div>
</body>
</html>
