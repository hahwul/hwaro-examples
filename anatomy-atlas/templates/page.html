{% extends "base.html" %}

{% block content %}
<article class="plate-detail">
    <header class="plate-header">
        <h2>{{ page.title }}</h2>
        {% if page.description is defined %}
        <p class="plate-meta">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="plate-content">
        {{ page.content | safe }}
    </div>
    
    <div class="plate-return">
        <a href="{{ config.base_url }}">&larr; Return to Index</a>
    </div>
</article>
{% endblock %}
