{% extends "base.html" %}

{% block content %}
<article class="metallic-card page-card">
    <header>
        <h1 class="embossed-text">{{ page.title }}</h1>
        {% if page.description %}
            <p class="engraved-text">{{ page.description }}</p>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
