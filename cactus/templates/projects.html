{% include "header.html" %}

        <h1>Projects</h1>
        <ul class="projects-list">
          {% for project in section.pages %}
          <li>
            {% if project.extra and project.extra.url %}
            <a class="project-name" href="{{ base_url }}{{ project.extra.url }}">{{ project.title }}</a>
            {% else %}
            <a class="project-name" href="{{ base_url }}{{ project.url }}">{{ project.title }}</a>
            {% endif %}
            <p class="project-desc">{{ project.description }}</p>
          </li>
          {% endfor %}
        </ul>

{% include "footer.html" %}
