# =============================================================================
# Main Act - Headline Performer
# Issue #1551 | Tags: event, concert, headline, performer, dramatic
# =============================================================================

title = "MAIN ACT - Headline Performer"
description = "The headline performer takes the stage - a dramatic concert event site with bold Oswald typography, stage truss framing, and moving-head light fixtures rendered in SVG. Dark and intense."
base_url = "http://localhost:3000"

sections = ["lineup"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "stage"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.6
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A single-night electronic music festival. Three stages, ten performers, one headline act. Dark, dramatic, intense."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 20
sections = ["lineup"]

[markdown]
safe = false
lazy_loading = false
emoji = false
