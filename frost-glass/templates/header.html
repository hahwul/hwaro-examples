<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is defined and page.description %}{{ page.description | e }}{% elif site is defined and site.description is defined %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{% if site is defined and site.title is defined %}{{ site.title | e }}{% endif %}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="background-glow">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="/" class="site-logo">{% if site is defined and site.title is defined %}{{ site.title }}{% else %}Frost Glass{% endif %}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
