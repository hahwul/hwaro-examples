{% include "header.html" %}
  <main class="site-main glass-panel content-container">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for item in section.pages %}
        <li><a href="{{ item.url }}">{{ item.title | e }}</a></li>
      {% endfor %}
    </ul>
    {% if pagination is defined and pagination.total_pages > 1 %}
      {{ pagination }}
    {% endif %}
  </main>
{% include "footer.html" %}
