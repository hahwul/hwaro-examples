{% include "header.html" %}
  <main class="site-main">
    {% if page.title %}
      <h1>{{ page.title | escape }}</h1>
      {% if page.date %}
        <span class="post-meta">{{ page.date | date(format="%B %d, %Y") }}</span>
      {% endif %}
    {% endif %}

    <div class="repousse-divider"></div>

    <article>
      {{ content | safe }}
    </article>

    <div class="repousse-divider"></div>
  </main>
{% include "footer.html" %}
