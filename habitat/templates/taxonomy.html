{% include "header.html" %}
  <main class="page-main">
    <h1 class="taxonomy-title">{{ page.title }}</h1>
    <div class="taxonomy-list">
      {% for term in taxonomy_terms %}
      <a href="{{ base_url }}{{ term.url }}" class="taxonomy-card">
        {{ term.name }}
        <span class="taxonomy-count">{{ term.pages | length }}</span>
      </a>
      {% endfor %}
    </div>
  </main>
{% include "footer.html" %}
