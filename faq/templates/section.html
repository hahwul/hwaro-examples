{% include "header.html" %}
  <div class="container">
    <div class="section-header">
      <div class="breadcrumb">
        <a href="{{ base_url }}/">Home</a>
        <span class="sep">/</span>
        <span>{{ section.title }}</span>
      </div>
      <h1>{{ section.title }}</h1>
      {{ content | safe }}
    </div>

    <ul class="faq-list">
      {% for p in section.pages %}
      <li class="faq-item">
        <button class="faq-question" aria-expanded="false" onclick="toggleFaq(this)">
          <span>{{ p.title }}</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-inner">
            {{ p.content | safe }}
          </div>
        </div>
      </li>
      {% endfor %}
    </ul>
  </div>

  <script>
  function toggleFaq(btn) {
    var item = btn.parentElement;
    var answer = item.querySelector('.faq-answer');
    var isOpen = item.classList.contains('open');

    if (isOpen) {
      answer.style.maxHeight = null;
      item.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    } else {
      answer.style.maxHeight = answer.scrollHeight + 'px';
      item.classList.add('open');
      btn.setAttribute('aria-expanded', 'true');
    }
  }
  </script>
{% include "footer.html" %}
