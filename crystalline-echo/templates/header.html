<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #94d2ff;
      --primary-hover: #ffffff;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.5);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
      background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; display: flex; flex-direction: column; min-height: 100vh;}

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin-bottom: 2rem;
      margin-top: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
    }

    .site-logo { font-weight: 700; font-size: 1.2rem; color: #fff; text-decoration: none; letter-spacing: 0.5px;}
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 10px rgba(148, 210, 255, 0.5); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    .site-header nav a:hover { color: var(--primary-hover); }

    .site-main {
      flex-grow: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
    }

    .site-footer {
      padding: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; color: #fff; }
    h1 { font-size: 2rem; margin-top: 0; background: linear-gradient(to right, #94d2ff, #d8b4fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; transition: all 0.2s;}
    a:hover { color: var(--primary-hover); text-decoration: underline; text-underline-offset: 4px; }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }
    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.2rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul { padding-left: 1.5rem; }
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; display: grid; gap: 1rem;}
    ul.section-list li {
      padding: 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: transform 0.2s, background 0.2s;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 0.3rem;}
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center;}
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text); text-decoration: none; background: rgba(255,255,255,0.05); }
    nav.pagination a:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); text-decoration: none;}
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--primary); background: rgba(148, 210, 255, 0.15); color: #fff;}
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; padding: 1.25rem; }
      .site-wrapper { padding: 0 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
