{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div class="hero-text-container">
        <h1>Anamorphic</h1>
        <p>A bold exploration of perspective, contrast, and form. No gradients.</p>
    </div>
</section>

<section class="grid">
    {% for page in section.pages %}
    <article class="card">
        <h2>{{ page.title }}</h2>
        <p>{{ page.description }}</p>
        <a href="{{ page.permalink }}">View Details</a>
    </article>
    {% endfor %}
</section>
{% endblock content %}
