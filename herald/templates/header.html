<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default(site.title) }}</title>
    <meta name="description" content="{{ page_description | default(site.description) }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ auto_includes_css }}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-top">
                <span class="date">{{ current_date | date("%A, %B %d, %Y") }}</span>
                <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
                <span class="edition">Global Edition</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="{{ base_url }}/">Front Page</a></li>
                    <li><a href="{{ base_url }}/posts/">All Articles</a></li>
                    <li><a href="{{ base_url }}/categories/politics/">Politics</a></li>
                    <li><a href="{{ base_url }}/categories/business/">Business</a></li>
                    <li><a href="{{ base_url }}/categories/technology/">Technology</a></li>
                    <li><a href="{{ base_url }}/tags/">Topics</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="content-wrapper">
