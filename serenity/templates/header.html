<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #717171;
      --border: #e5e5e5;
      --accent: #000000;
      --container-width: 720px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 4rem 2rem;
      max-width: var(--container-width);
      margin: 0 auto;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .site-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    nav {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--muted);
    }

    main {
      padding: 4rem 2rem;
      max-width: var(--container-width);
      margin: 0 auto;
    }

    h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    p {
      margin-bottom: 1.5rem;
    }

    .post-list {
      list-style: none;
    }

    .post-item {
      margin-bottom: 4rem;
    }

    .post-meta {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .post-title {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .post-title a {
      text-decoration: none;
      color: var(--text);
      transition: color 0.2s;
    }

    .post-title a:hover {
      color: var(--muted);
    }

    .post-summary {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .read-more {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .content {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      line-height: 1.8;
    }

    .content p {
      margin-bottom: 2rem;
    }

    footer {
      padding: 4rem 2rem;
      max-width: var(--container-width);
      margin: 0 auto;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      header, main, footer {
        padding: 2rem 1.5rem;
      }
      .site-title {
        font-size: 2rem;
      }
      nav ul {
        gap: 1rem;
      }
    }
  </style>
  {{ highlight_css }}
</head>
<body>
  <header>
    <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
    <p class="site-tagline">{{ site.description }}</p>
    <nav>
      <ul>
        <li><a href="{{ base_url }}/">Home</a></li>
        <li><a href="{{ base_url }}/posts/">Journal</a></li>
        <li><a href="{{ base_url }}/about/">About</a></li>
      </ul>
    </nav>
  </header>
  <main>
