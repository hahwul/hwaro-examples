title = "Serenity"
description = "Reflections on art, life, and the beauty of less."
base_url = "https://serenity.example.com"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = true
per_page = 5

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true
filename = "sitemap.xml"

[markdown]
safe = false
