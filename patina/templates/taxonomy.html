{% include "header.html" %}

  <main class="site-main">
    <div class="container">
      <h1 class="section-title">{{ taxonomy_name | default("Tags") }}</h1>

      <div class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name | slugify }}/{{ term.name | slugify }}/" class="taxonomy-item">
          <span class="taxonomy-name">{{ term.name }}</span>
          <span class="taxonomy-count">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
      </div>
    </div>
  </main>

{% include "footer.html" %}
