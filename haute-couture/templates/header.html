<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is present %}{{ page.title | e }} | {% endif %}{{ site.title | e }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: #f4f4f4;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Subtle background texture for elegance, no gradients */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0;
            font-weight: 400;
        }

        header.site-header {
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        header.site-header a.site-logo {
            font-size: 3.5rem;
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #fff;
            text-decoration: none;
            border: none;
            display: block;
            margin-bottom: 1rem;
        }

        header.site-header nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        header.site-header nav a {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #aaa;
            text-decoration: none;
            border: none;
            transition: color 0.3s ease;
        }
        header.site-header nav a:hover {
            color: #fff;
        }

        .site-main {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: 300;
            min-height: calc(100vh - 400px);
        }

        .site-main p {
            margin-bottom: 2rem;
        }

        /* Elegant image styling */
        .site-main img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 3rem 0;
            filter: grayscale(20%) contrast(110%);
            transition: filter 0.5s ease;
        }

        .site-main img:hover {
            filter: grayscale(0%) contrast(100%);
        }

        a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: border-color 0.3s ease;
        }

        a:hover {
            border-color: rgba(255, 255, 255, 1);
        }

        blockquote {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            border-left: 2px solid #555;
            margin: 3rem 0;
            padding-left: 2rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>

    <header class="site-header">
        <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>
