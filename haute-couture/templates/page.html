{% include "header.html" %}

    <main class="site-main">
        <header style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 0.15em;">{{ page.title | default(site.title) }}</h1>
            {% if page.description %}
                <p style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.2em; color: #aaa; max-width: 600px; margin: 0 auto; border: none;">{{ page.description }}</p>
            {% elif site.description %}
                <p style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.2em; color: #aaa; max-width: 600px; margin: 0 auto; border: none;">{{ site.description }}</p>
            {% endif %}
        </header>

        <div style="font-size: 1.1rem; line-height: 1.8;">
            {{ content | safe }}
        </div>
    </main>

{% include "footer.html" %}
