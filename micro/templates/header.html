<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  {{ og_all_tags }}
  {{ canonical_tag }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-top">
        <div class="site-identity">
          <div class="site-avatar">m</div>
          <div>
            <a href="{{ base_url }}/" class="site-name">{{ site.title }}</a>
            <span class="site-handle">{{ site.description }}</span>
          </div>
        </div>
        <nav class="header-nav">
          <a href="{{ base_url }}/">Timeline</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
      <p class="site-bio">Short thoughts, links, and notes. A stream of ideas too small for a blog post.</p>
    </header>
