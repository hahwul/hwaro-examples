{% include "header.html" %}
    <main class="site-main">
      <div class="section-header">{{ page.title }}</div>
      {% for item in section.pages %}
      <article class="post-entry">
        <div class="post-meta">
          <span class="post-timestamp">
            <a href="{{ item.url }}">{{ item.date }}</a>
          </span>
        </div>
        <div class="post-body">
          <p>{{ item.description }}</p>
        </div>
        {% if item.tags %}
        <div class="post-tags">
          {% for tag in item.tags %}
          <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="post-tag">#{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </article>
      {% endfor %}
      {{ pagination }}
    </main>
{% include "footer.html" %}
