# =============================================================================
# Closed Theme - Site Configuration
# =============================================================================
# A clean, elegant error page example for HTTP 499 (Client Closed Request)
# Created for Issue #499 - No gradients, no emojis.

title = "499 Client Closed Request"
description = "A sophisticated error page for when the connection is terminated by the client."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github-dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
lazy_loading = true
