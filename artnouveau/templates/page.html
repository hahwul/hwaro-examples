{% include "header.html" %}

<article class="page-content">
    {% if page.title %}
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        </div>
        {% endif %}
        {% if page.tags %}
        <div class="page-tags">
            {% for tag in page.tags %}
            <a href="{{ site.base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>
    {% endif %}

    <div class="prose">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
