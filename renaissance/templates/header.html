<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ECE8E1; /* Muted Ivory Wall */
            --text-color: #2D1A11; /* Dark Wood */
            --gold: #D4AF37;
            --gold-dark: #8B6508;
            --matte-color: #FAF8F5; /* Museum Matte Board */
            --frame-outer: #3E2723; /* Very dark brown wood */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.8;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--frame-outer);
        }

        .site-header {
            text-align: center;
            padding: 3rem 1rem;
            background-color: var(--matte-color);
            border-bottom: 4px double var(--gold-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 3rem;
        }

        .site-title a {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            text-decoration: none;
            color: var(--frame-outer);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .site-nav {
            margin-top: 1.5rem;
        }

        .site-nav a {
            font-family: 'Cinzel', serif;
            color: var(--gold-dark);
            text-decoration: none;
            margin: 0 1.5rem;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .site-nav a:hover {
            color: var(--frame-outer);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Classic Oil Painting Frame */
        .frame {
            background-color: var(--matte-color);
            padding: 4rem 3rem;
            margin: 4rem auto;
            border: 16px solid var(--frame-outer);
            position: relative;
            box-shadow:
                inset 0 0 0 4px var(--gold-dark),
                inset 0 0 0 30px var(--matte-color),
                inset 0 0 0 32px var(--gold),
                inset 0 0 0 33px rgba(0,0,0,0.1),
                15px 20px 30px rgba(0,0,0,0.4);
        }

        .frame-content {
            position: relative;
            z-index: 10;
        }

        /* Decorative Plaque */
        .plaque-wrapper {
            text-align: center;
            margin-bottom: 2rem;
        }

        .plaque {
            background-color: var(--gold);
            color: #fff;
            padding: 0.5rem 2rem;
            display: inline-block;
            border: 2px solid var(--gold-dark);
            box-shadow: 2px 3px 6px rgba(0,0,0,0.3);
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
        }

        .post-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .post-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .post-meta {
            font-style: italic;
            color: #666;
            font-size: 1.1rem;
        }

        .post-content p {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            text-align: justify;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 2rem auto;
            border: 8px solid var(--frame-outer);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .gallery {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .gallery-item {
            margin-bottom: 5rem;
            text-align: center;
        }

        .gallery-item .frame {
            margin-bottom: 2rem;
            padding: 3.5rem 2.5rem;
        }

        .gallery-item h2 {
            font-size: 2rem;
            margin-top: 0;
        }

        .read-more {
            display: inline-block;
            margin-top: 1rem;
            font-family: 'Cinzel', serif;
            color: var(--gold-dark);
            text-decoration: none;
            border-bottom: 1px solid var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.9rem;
        }

        .read-more:hover {
            color: var(--frame-outer);
        }

        .site-footer {
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 5rem;
            border-top: 1px solid var(--gold);
            color: var(--gold-dark);
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            background-color: var(--matte-color);
        }

        /* Blockquotes looking like scripts */
        blockquote {
            border-left: none;
            text-align: center;
            font-style: italic;
            font-size: 1.4rem;
            margin: 2rem 0;
            color: var(--gold-dark);
        }

        blockquote::before {
            content: "“";
            font-size: 3rem;
            display: block;
            line-height: 0;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-title">
            <a href="{{ base_url }}/">{{ config.title }}</a>
        </div>
        <nav class="site-nav">
            <a href="{{ base_url }}/">Gallery</a>
            <a href="{{ base_url }}/posts">Exhibitions</a>
        </nav>
    </header>
    <main class="container">
