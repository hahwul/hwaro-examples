{% include "header.html" %}

<article class="frame">
    <div class="frame-content">
        <header class="post-header">
            <div class="plaque-wrapper">
                <span class="plaque">Masterpiece</span>
            </div>
            <h1 class="post-title">{{ page.title }}</h1>
            <p class="post-meta">{{ page.date | default("Undated") }}</p>
        </header>
        <div class="post-content">
            {{ content | safe }}
        </div>
    </div>
</article>

{% include "footer.html" %}
