{% include "header.html" %}

<div class="frame" style="margin-bottom: 4rem; padding: 2rem;">
    <div class="frame-content">
        <h1 class="post-title" style="margin: 0; font-size: 2rem;">Collection: {{ term.name }}</h1>
    </div>
</div>

<ul class="gallery">
    {% for page in term.pages %}
    <li class="gallery-item">
        <div class="frame">
            <div class="frame-content">
                <h2><a href="{{ base_url }}{{ page.path }}" style="text-decoration: none; color: inherit;">{{ page.title }}</a></h2>
                <a href="{{ base_url }}{{ page.path }}" class="read-more">View Masterpiece</a>
            </div>
        </div>
    </li>
    {% endfor %}
</ul>

{% include "footer.html" %}
