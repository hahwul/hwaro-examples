{% include "header.html" %}

<ul class="gallery">
    {% for page in section.pages %}
    <li class="gallery-item">
        <div class="frame">
            <div class="frame-content">
                <div class="plaque-wrapper">
                    <span class="plaque">Exhibit {{ loop.index }}</span>
                </div>
                <h2><a href="{{ base_url }}{{ page.path }}" style="text-decoration: none; color: inherit;">{{ page.title }}</a></h2>
                <p class="post-meta">{{ page.date | default("Undated") }}</p>
                {% if page.description %}
                    <p>{{ page.description }}</p>
                {% endif %}
                <a href="{{ base_url }}{{ page.path }}" class="read-more">View Masterpiece</a>
            </div>
        </div>
    </li>
    {% endfor %}
</ul>

{% include "footer.html" %}
