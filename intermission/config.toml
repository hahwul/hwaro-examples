# Intermission Configuration
title = "Intermission"
description = "Between Acts: A refined theater festival theme with elegant pause motifs."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[og.auto_image]
enabled = true
background = "#2E1A47"
text_color = "#E0C9A6"
accent_color = "#E0C9A6"
font_size = 48
show_title = true
style = "minimal"
format = "svg"

[markdown]
safe = false
lazy_loading = true
emoji = false
