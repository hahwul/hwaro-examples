<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ description }}{% endif %}">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>

<div class="cosmic-container">

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-title">{{ title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/" class="nav-link {% if current_path == '/' %}active{% endif %}">Home</a>
        <a href="{{ base_url }}/posts/" class="nav-link {% if current_path | truncate(length=7, end="") == '/posts/' %}active{% endif %}">Transmissions</a>
        <a href="{{ base_url }}/archives/" class="nav-link {% if current_path == '/archives/' %}active{% endif %}">Archives</a>
        <a href="{{ base_url }}/about/" class="nav-link {% if current_path == '/about/' %}active{% endif %}">About</a>
        <button class="search-trigger" onclick="openSearch()" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="main-content">
