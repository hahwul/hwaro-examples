{% include "header.html" %}

<div class="content-glass">
  <header class="taxonomy-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <p class="post-summary">Explore the cosmos by {{ page.title | lower }}.</p>
  </header>

  <ul class="tag-list" style="justify-content: center; margin-top: 2rem;">
    {% for term in terms %}
      <li class="tag-item">
        <a href="{{ base_url }}{{ term.permalink }}">{{ term.name }} ({{ term.pages | length }})</a>
      </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
