<div style="padding: 1.5rem; margin: 2rem 0; border-left: 4px solid {% if type == 'warning' %}var(--rust-orange){% elif type == 'info' %}var(--patina-green){% else %}var(--steel){% endif %}; background: rgba(58, 58, 58, 0.4);">
  <strong style="display: block; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; color: {% if type == 'warning' %}var(--rust-orange){% elif type == 'info' %}var(--patina-green){% else %}var(--steel){% endif %};">{{ type | capitalize }}</strong>
  {{ message }}
</div>
