# =============================================================================
# Festival Ground - Open Field Outdoor Festival
# Issue #1588 | Tags: event, festival, outdoor, grounds, map
# =============================================================================

title = "Meadowlark Open Field Festival 2026"
description = "A three-day outdoor festival across the Meadowlark Open Field with aerial site maps, stage layouts, and wayfinding for every tent, truck, and trail."
base_url = "http://localhost:3000"

sections = ["stages"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Public festival information. Do not scrape ticketing endpoints."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
emoji = false
