<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@400;600;700&family=Encode+Sans+Condensed:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="field-banner" role="banner">
    <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg" class="banner-compass" aria-hidden="true">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#0a2010" stroke-width="1.5"/>
      <polygon points="12,4 14,12 12,20 10,12" fill="#0a2010"/>
      <polygon points="4,12 12,10 20,12 12,14" fill="none" stroke="#0a2010" stroke-width="1"/>
      <text x="12" y="3.5" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="3" font-weight="600" fill="#0a2010">N</text>
    </svg>
    <span class="banner-coords">44.2831N - 073.0149W</span>
    <span class="banner-sep">|</span>
    <span class="banner-temp">HI 78F - LO 54F</span>
    <span class="banner-sep">|</span>
    <span class="banner-wx">PARTLY CLOUDY - WIND SSW 8MPH</span>
  </div>
  <div class="ground-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Meadowlark Open Field Festival home">
        <svg viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg" class="logo-tent" aria-hidden="true">
          <polygon points="4,42 32,6 60,42" fill="#d45828" stroke="#0a2010" stroke-width="1.5"/>
          <polygon points="32,6 46,42 18,42" fill="#f4b942" stroke="#0a2010" stroke-width="1"/>
          <line x1="32" y1="6" x2="32" y2="42" stroke="#0a2010" stroke-width="1"/>
          <rect x="26" y="30" width="12" height="12" fill="#0a2010"/>
          <polygon points="26,30 32,24 38,30" fill="#f4b942" stroke="#0a2010" stroke-width="1"/>
        </svg>
        <span class="logo-text">
          <span class="logo-title">MEADOWLARK</span>
          <span class="logo-sub">OPEN FIELD - AUG 14-16 - 2026</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">GROUND</a>
        <a href="{{ base_url }}/stages/">STAGES</a>
        <a href="{{ base_url }}/facilities/">FACILITIES</a>
        <a href="{{ base_url }}/tickets/">TICKETS</a>
      </nav>
    </header>
