<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.title }}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0a0a0f;
            --color-mesh-1: #ff2a5f;
            --color-mesh-2: #00ffcc;
            --color-mesh-3: #6b21ff;
            --color-mesh-4: #ff9900;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* The dynamic glowing mesh background */
        .mesh-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            background: var(--color-bg);
            /* Adds a subtle noise texture overlay if desired, but blur dominates */
        }

        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.7;
            animation: float 20s infinite alternate ease-in-out;
            mix-blend-mode: screen;
        }

        .mesh-orb:nth-child(1) {
            background: var(--color-mesh-1);
            width: 60vw;
            height: 60vw;
            top: -10vw;
            left: -10vw;
            animation-duration: 25s;
        }

        .mesh-orb:nth-child(2) {
            background: var(--color-mesh-2);
            width: 50vw;
            height: 50vw;
            bottom: -5vw;
            right: -10vw;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .mesh-orb:nth-child(3) {
            background: var(--color-mesh-3);
            width: 45vw;
            height: 45vw;
            top: 40%;
            left: 30%;
            animation-duration: 28s;
            animation-delay: -10s;
        }

        .mesh-orb:nth-child(4) {
            background: var(--color-mesh-4);
            width: 40vw;
            height: 40vw;
            top: 10%;
            right: 20%;
            animation-duration: 24s;
            animation-delay: -15s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(10vw, 15vh) scale(1.1);
            }
            66% {
                transform: translate(-10vw, 5vh) scale(0.9);
            }
            100% {
                transform: translate(5vw, -10vh) scale(1.05);
            }
        }

        /* Glassmorphism content overlay */
        .content-wrapper {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 4rem 3rem;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 400;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            /* Subtle text glow */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 200;
            color: var(--color-text-muted);
            line-height: 1.8;
            letter-spacing: 0.05em;
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .content-body {
            font-size: 1rem;
            font-weight: 300;
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .explore-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--color-text);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            transition: all 0.3s ease;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .explore-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
            z-index: -1;
        }

        .explore-btn:hover {
            border-color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .explore-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        @media (max-width: 768px) {
            .mesh-orb {
                filter: blur(60px);
            }
            .content-wrapper {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="mesh-container">
        <div class="mesh-orb"></div>
        <div class="mesh-orb"></div>
        <div class="mesh-orb"></div>
        <div class="mesh-orb"></div>
    </div>

    <div class="content-wrapper">
        <h1>{{ page.title | default(config.title) }}</h1>
        <div class="subtitle">
            Dynamic glowing mesh gradients with thin, elegant typography.
        </div>
        <div class="content-body">
            {% if page.content is defined %}
                {{ page.content | safe }}
            {% else %}
                Experience the harmony of vivid fluid colors and structured minimalism.
            {% endif %}
        </div>
        <a href="#" class="explore-btn">Discover More</a>
    </div>
</body>
</html>
