{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <div class="section-header">
        <span class="section-label">XEROXED</span>
        <h1 class="section-title">{{ page.title | e }}</h1>
        <div class="scribble-underline">
          <svg viewBox="0 0 300 10" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M0,6 Q20,2 40,6 T80,6 T120,6 T160,6 T200,6 T240,6 T280,6 L300,4" stroke="#e84e2c" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
