<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&family=Archivo+Black&family=Work+Sans:wght@700;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" class="logo-pin" aria-hidden="true">
          <circle cx="22" cy="22" r="6" fill="none" stroke="#f0edea" stroke-width="2"/>
          <path d="M22,16 Q10,16 10,26 Q10,36 22,36 Q34,36 34,26 Q34,16 22,16 M34,26 L40,30" fill="none" stroke="#f0edea" stroke-width="2"/>
          <circle cx="22" cy="22" r="2" fill="#f0edea"/>
        </svg>
        <span class="logo-text">MOSH PIT</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">FLYER</a>
        <a href="{{ base_url }}/lineup/">LINEUP</a>
        <a href="{{ base_url }}/rules/">RULES</a>
        <a href="{{ base_url }}/doors/" class="nav-cta">DOORS</a>
      </nav>
    </header>
