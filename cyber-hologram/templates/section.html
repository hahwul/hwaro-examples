{% extends "base.html" %}

{% block content %}
  <h1>{{ page.title | e }}</h1>
  {{ content | safe }}
  <ul class="section-list">
    {% for post in section.pages %}
      <li><a href="{{ base_url }}{{ post.path }}">{{ post.title | e }}</a></li>
    {% endfor %}
  </ul>
  {{ pagination | safe }}
{% endblock %}
