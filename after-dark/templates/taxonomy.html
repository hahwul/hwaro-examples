{% include "header.html" %}
    <section class="taxonomy-list-page">
      <header class="section-header">
        <h1>{{ taxonomy_name | capitalize }}</h1>
      </header>

      <div class="taxonomy-cloud">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name | slugify }}/{{ term.name | slugify }}/" class="taxonomy-item">
          <span class="term-name">#{{ term.name }}</span>
          <span class="term-count">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
      </div>

      <div class="page-content">
        {{ content | safe }}
      </div>
    </section>
{% include "footer.html" %}
