<div class="after-dark-alert alert-{{ type | default('info') }}">
  <div class="alert-icon">
    {% if type == 'warning' %}
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    {% elif type == 'tip' %}
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.674"/><path d="M10 20h4"/><path d="M12 2v1"/><path d="M8 3.5l1 1"/><path d="M16 3.5l-1 1"/><path d="M12 17a5 5 0 0 0 5-5c0-2.206-1.794-4-4-4s-4 1.794-4 4a5 5 0 0 0 5 5z"/></svg>
    {% else %}
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    {% endif %}
  </div>
  <div class="alert-content">
    {{ body | safe }}
  </div>
</div>
