{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <header class="post-header">
        <h1 class="post-title">{{ page.title | e }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
      <footer class="post-footer">
        <a href="{{ base_url }}/acts/" class="back-link">Return to Programme</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
