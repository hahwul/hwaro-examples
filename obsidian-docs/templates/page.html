{% include "header.html" %}

<article>
  <header>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="page-content">
    {{ content | safe }}
  </div>

  {% if page.taxonomies and page.taxonomies.tags %}
  <footer class="page-footer">
    <div class="tags">
      {% for tag in page.taxonomies.tags %}
      <a href="{{ get_taxonomy_url(kind="tags", name=tag) }}" class="tag">#{{ tag }}</a>
      {% endfor %}
    </div>
  </footer>
  {% endif %}
</article>
