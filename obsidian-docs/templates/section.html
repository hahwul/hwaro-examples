{% include "header.html" %}

<div class="section-container">
  <header>
    <h1>{{ section.title }}</h1>
    {% if section.content %}
    <div class="section-description">
      {{ section.content | safe }}
    </div>
    {% endif %}
  </header>

  <div class="section-pages">
    <ul class="section-list">
      {% for page in section.pages %}
      <li class="glass-card">
        <a href="{{ base_url }}{{ page.path }}">
          <h3>{{ page.title }}</h3>
          {% if page.description %}
          <p>{{ page.description }}</p>
          {% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>

{% include "footer.html" %}
