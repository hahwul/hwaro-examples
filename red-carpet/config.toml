title = "Red Carpet"
description = "A film premiere red-carpet arrival site with repeating SVG camera-and-flash motif backgrounds, high-heel shoe icons for fashion sections, refined serif display typography for the event name, and wide-tracked celebrity credits."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
