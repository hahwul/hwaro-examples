title = "Control Room"
description = "Server monitoring dashboard"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = false

[robots]
enabled = false

[feeds]
enabled = false

[markdown]
safe = true
lazy_loading = true
