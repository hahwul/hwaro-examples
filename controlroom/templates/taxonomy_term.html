{% include "header.html" %}

<div class="content-area">
    <h1>Tag: {{ taxonomy_term }}</h1>

    <div class="panel" style="margin-top: 30px;">
        <div class="panel-header">Results</div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Type</th>
                    <th>Reference</th>
                </tr>
            </thead>
            <tbody>
                {% for page in taxonomy_pages %}
                <tr>
                    <td>{{ page.date | date("%Y-%m-%d %H:%M:%S") }}</td>
                    <td><span class="tag-pill">{{ page.section.title | default("SYSTEM") }}</span></td>
                    <td><a href="{{ page.url }}">{{ page.title }}</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% include "footer.html" %}
