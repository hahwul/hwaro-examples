{% include "header.html" %}

<div class="content-area">
    <h1>Taxonomy: {{ taxonomy_name }}</h1>

    <div class="dashboard-grid">
        {% for term in taxonomy_terms %}
        <a href="{{ term.url }}" class="panel" style="display: block; text-decoration: none;">
            <div class="panel-header">{{ term.name }}</div>
            <div class="metric-value" style="color: var(--accent);">{{ term.pages | length }}</div>
            <div class="metric-label">Items</div>
        </a>
        {% endfor %}
    </div>
</div>

{% include "footer.html" %}
