<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111111;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #00ffcc;
            --status-ok: #00ff66;
            --status-warn: #ffcc00;
            --status-err: #ff3333;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            line-height: 1.5;
            font-size: 14px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header.site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .site-title {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .site-nav a {
            margin-left: 20px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .site-nav a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .panel-header {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-dot.ok { background-color: var(--status-ok); }
        .status-dot.warn { background-color: var(--status-warn); }
        .status-dot.err { background-color: var(--status-err); }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .data-table th, .data-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: normal;
            border-bottom-width: 2px;
        }

        .data-table tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .content-area {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            margin-bottom: 30px;
        }

        .content-area h1 {
            font-family: var(--font-mono);
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .content-area h2, .content-area h3 {
            margin: 20px 0 10px;
            font-family: var(--font-mono);
        }

        .content-area p {
            margin-bottom: 15px;
        }

        .content-area ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .tag-pill {
            display: inline-block;
            padding: 2px 8px;
            background-color: var(--border-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            margin-right: 5px;
            text-transform: uppercase;
        }

        .page-meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .timestamp {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
            <a href="{{ base_url }}/">Dashboard</a>
            <a href="{{ base_url }}/servers/">Servers</a>
            <a href="{{ base_url }}/alerts/">Alerts</a>
        </nav>
    </header>
    <main class="container">
