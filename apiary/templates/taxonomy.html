{% include "header.html" %}
<div class="endpoint-desc" style="width: 100%; max-width: 800px; margin: 0 auto; padding-top: 2rem;">
  <h1>Taxonomies</h1>
  <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
    {% for term in taxonomy_terms %}
      <a href="{{ term.permalink }}" style="padding: 0.5rem 1rem; background-color: #f3f4f6; color: #111827; text-decoration: none; border-radius: 9999px; border: 1px solid #d1d5db; display: inline-block;">
        {{ term.name }} ({{ term.pages | length }})
      </a>
    {% endfor %}
  </div>
</div>
{% include "footer.html" %}
