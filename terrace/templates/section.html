{% include "header.html" %}
  <main>
    <div class="section-header">
      <h1>{{ page.title }}</h1>
    </div>

    <div class="container">
      <div class="magazine-grid">
        {% for post in section.pages %}
          <article class="magazine-card">
            <div class="magazine-card-image">
            </div>
            <div class="magazine-card-body">
              <h2><a href="{{ base_url }}/{{ post.path }}">{{ post.title }}</a></h2>
              <div class="magazine-card-meta">{{ post.date }}</div>
              <p class="magazine-card-excerpt">{{ post.description }}</p>
              <a href="{{ base_url }}/{{ post.path }}" class="read-more">Continue Reading</a>
            </div>
          </article>
        {% endfor %}
      </div>

      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
