# =============================================================================
# Chalkboard Theme - Site Configuration
# =============================================================================
# A classroom chalkboard-inspired blog with chalk textures and dark green tones

title = "Chalkboard"
description = "A classroom-inspired blog with chalk-textured typography and lecture-note aesthetics"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 8

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin"] }
]

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["lessons"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
