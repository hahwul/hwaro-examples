{% include "header.html" %}

<div class="glass-panel">
  <h1>{{ section.title }}</h1>
  {% if section.content %}
    <div class="section-content">
      {{ content | safe }}
    </div>
  {% endif %}

  <div class="pages-list">
    {% for page in pages %}
      <article class="page-summary">
        <h2><a href="{{ base_url }}{{ page.path }}">{{ page.title }}</a></h2>
        {% if page.description is defined %}
          <p>{{ page.description }}</p>
        {% endif %}
      </article>
    {% endfor %}
  </div>
</div>

{% include "footer.html" %}
