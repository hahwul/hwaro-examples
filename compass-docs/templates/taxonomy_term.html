{% include "header.html" %}
  <h1 class="text-2xl font-bold text-compass-text mb-2">Tag: {{ term.name }}</h1>
  <p class="text-compass-muted mb-6">Pages tagged with "{{ term.name }}"</p>
  <div class="space-y-3">
    {% for page in pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-4 bg-compass-surface border border-compass-border rounded hover:border-compass-green/30 transition-all group">
      <h2 class="font-semibold text-compass-text group-hover:text-compass-green transition-colors">{{ page.title }}</h2>
      {% if page.description %}
      <p class="text-sm text-compass-muted mt-1">{{ page.description }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
