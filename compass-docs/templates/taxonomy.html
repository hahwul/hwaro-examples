{% include "header.html" %}
  <h1 class="text-2xl font-bold text-compass-text mb-6">Tags</h1>
  <div class="flex flex-wrap gap-2">
    {% for term in terms %}
    <a href="{{ term.url }}" class="inline-block px-3 py-1.5 bg-compass-surface border border-compass-border rounded text-sm text-compass-text hover:border-compass-green hover:text-compass-green transition-colors">
      {{ term.name }} <span class="text-compass-muted ml-1">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
