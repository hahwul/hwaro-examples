# =============================================================================
# Markdown (Optional)
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false

# =============================================================================
# Robots.txt
# =============================================================================
# Controls search engine crawler access

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] }
]

