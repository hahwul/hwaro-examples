{% include "header.html" %}
  <main class="site-main">
    <article class="quest-card">
      <div class="quest-meta">
        {{ page.date }} {% if page.tags %} | Tags: {% for tag in page.tags %}<a href="{{ base_url }}/tags/{{ tag }}/">{{ tag }}</a>{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
      <div class="ancient-scroll-content">
        {{ content }}
      </div>
      
      <div style="margin-top: 4rem; text-align: center;">
        <a href="{{ base_url }}/" class="btn-action">Return to Hall of Records</a>
      </div>
    </article>
  </main>
{% include "footer.html" %}
