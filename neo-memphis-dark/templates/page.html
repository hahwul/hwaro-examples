{% extends "base.html" %}

{% block content %}
    <article class="single-page block-box">
        <header class="page-header">
            <h1 class="page-title neon-text-alt">{{ page.title }}</h1>
            {% if page.date %}
                <div class="card-meta">{{ page.date }}</div>
            {% endif %}
            <div class="header-decorative-stripes"></div>
        </header>

        <div class="page-body">
            {{ content | safe }}
        </div>

        <div class="page-decorative-triangle"></div>
    </article>

    <div class="back-link-container">
         <a href="{{ base_url }}/portfolio/" class="button-link alt-button">&lt; Back to Portfolio</a>
    </div>
{% endblock content %}
