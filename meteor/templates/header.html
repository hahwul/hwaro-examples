<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg-deep: #050505;
      --bg-card: #0F172A;
      --text-main: #FFFFFF;
      --text-muted: #94A3B8;
      --star-white: #FFFFFF;
      --streak-gold: #FDE047;
      --cosmic-purple: #312E81;
      --night-indigo: #1E1B4B;
      --border-accent: #334155;
    }

    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      overflow-x: hidden;
    }

    /* Meteor Background Effect */
    #meteor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: var(--bg-deep);
    }

    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 10;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-accent);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--streak-gold);
      text-decoration: none;
      letter-spacing: -0.05em;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--text-main);
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 2em; margin-bottom: 0.5em; font-weight: 700; }
    h1 { font-size: 2.5rem; margin-top: 0; color: var(--star-white); }
    h2 { font-size: 1.75rem; color: var(--streak-gold); }
    p { margin: 1.2em 0; color: var(--text-muted); font-size: 1.1rem; }

    /* Interactive Elements */
    .wish-container {
      margin: 3rem 0;
      text-align: center;
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--border-accent);
    }

    .wish-btn {
      background: var(--streak-gold);
      color: var(--bg-deep);
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .wish-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(253, 224, 71, 0.4);
    }

    #wish-box {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      background: var(--night-indigo);
      border: 1px solid var(--border-accent);
      border-radius: 8px;
      color: var(--text-main);
      padding: 1rem;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
    }

    #send-wish-btn {
      background: var(--star-white);
      color: var(--bg-deep);
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .hidden { display: none; }

    #wish-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .wish-card {
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      padding: 1.5rem;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease-out;
    }

    .wish-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--streak-gold);
    }

    .wish-card-text {
      color: var(--text-main);
      font-style: italic;
    }

    .wish-card-date {
      display: block;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .site-header { flex-direction: column; gap: 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <canvas id="meteor-canvas"></canvas>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
