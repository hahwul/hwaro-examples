{% include "header.html" %}

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 lg:py-24">
    <div class="text-center mb-16">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight sm:text-5xl capitalize">{{ taxonomy_name }}</h1>
        <p class="mt-4 max-w-2xl text-xl text-gray-500 mx-auto">Browse all {{ taxonomy_name }}.</p>
    </div>

    <div class="flex flex-wrap justify-center gap-4">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}{{ term.url }}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-full shadow-sm text-primary bg-blue-50 hover:bg-blue-100 transition-colors">
            {{ term.name }}
            <span class="ml-2 bg-white text-gray-600 rounded-full px-2 py-0.5 text-xs font-semibold">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
    </div>
</div>

{% include "footer.html" %}
