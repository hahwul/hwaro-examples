{% include "header.html" %}

<div class="container taxonomy-page">
  <header class="taxonomy-header">
    <h1 class="taxonomy-title">All {{ taxonomy_name | upper }}</h1>
  </header>

  <ul class="taxonomy-list">
    {% for term, term_data in taxonomy_terms %}
      <li class="taxonomy-item">
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/">
          <span class="term-name">{{ term }}</span>
          <span class="term-count">({{ term_data.pages | length }})</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
