{% include "header.html" %}

<div class="container taxonomy-term-page">
  <header class="taxonomy-header">
    <h1 class="taxonomy-title">{{ taxonomy_name | capitalize }}: {{ taxonomy_term }}</h1>
  </header>

  <div class="product-grid">
    {% for post in taxonomy_pages %}
      <article class="product-card">
        <a href="{{ post.url | absolute_url }}" class="product-link">
          <div class="product-card-image">
            {% if post.image %}
              <img src="{{ base_url }}{{ post.image }}" alt="{{ post.title }}" loading="lazy">
            {% else %}
              <div class="placeholder-image"></div>
            {% endif %}
          </div>
          <div class="product-card-info">
            <h4 class="product-card-title">{{ post.title }}</h4>
            <div class="product-card-price">{{ post.extra.price | default("$0.00") }}</div>
          </div>
        </a>
      </article>
    {% endfor %}
  </div>
</div>

{% include "footer.html" %}
