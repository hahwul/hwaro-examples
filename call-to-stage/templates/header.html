<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@400;600;700&family=Signika:wght@400;600;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="status-bar" role="banner">
    <span class="status-pulse" aria-hidden="true"></span>
    <span class="status-label">LIVE CALL</span>
    <span class="status-text">AUDITIONS THIS SATURDAY 09:00 - 16:00 - CITY HALL BLACK BOX</span>
    <span class="status-reg">REGISTRATION OPEN</span>
  </div>
  <div class="stage-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Center Stage Open Call home">
        <svg viewBox="0 0 80 72" xmlns="http://www.w3.org/2000/svg" class="logo-spot" aria-hidden="true">
          <!-- Spotlight cone -->
          <polygon points="40,4 72,62 8,62" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
          <polygon points="40,4 56,62 24,62" fill="#FFD60A"/>
          <circle cx="40" cy="62" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
          <circle cx="40" cy="62" r="3" fill="#FFD60A"/>
          <!-- Small arrow below -->
          <polygon points="40,72 34,66 38,66 38,60 42,60 42,66 46,66" fill="#FFD60A" opacity="0" />
        </svg>
        <span class="logo-text">
          <span class="logo-title">CENTER STAGE</span>
          <span class="logo-sub">SUMMER TALENT HUNT - AUG 2026</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">THE CALL</a>
        <a href="{{ base_url }}/categories/">CATEGORIES</a>
        <a href="{{ base_url }}/register/">REGISTER</a>
        <a href="{{ base_url }}/rules/">RULES</a>
      </nav>
    </header>
