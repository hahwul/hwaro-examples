<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title"><a href="{{ base_url }}">{{ site.title }}</a></h1>
        <p class="site-description">{{ site.description }}</p>
    </header>

    <main class="content-container">
        {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
        <p>&copy; {{ site.extra.author | default(value="Author") }}</p>
    </footer>
</body>
</html>
