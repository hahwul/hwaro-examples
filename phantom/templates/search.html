{% include "header.html" %}

<section class="search-page">
    <header class="section-header phantom-appear">
        <h1 class="section-title">Search</h1>
        <p class="section-description">Peer through the fog</p>
        <div class="section-divider"></div>
    </header>

    <div class="search-container phantom-appear">
        <input type="text" id="search-input" class="search-input" placeholder="What haunts you..." autocomplete="off" autofocus>
        <ul id="search-results" class="search-results"></ul>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script>
(function() {
    var input = document.getElementById('search-input');
    var resultsEl = document.getElementById('search-results');
    var fuse;

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    fetch('{{ base_url }}/search.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3 });
        });

    input.addEventListener('input', function() {
        var query = input.value.trim();
        if (!query || !fuse) { resultsEl.innerHTML = ''; return; }
        var results = fuse.search(query).slice(0, 10);
        if (results.length === 0) {
            resultsEl.innerHTML = '<li class="search-empty">Nothing stirs in the darkness for that query.</li>';
            return;
        }
        resultsEl.innerHTML = results.map(function(r) {
            return '<li class="search-result-item"><a href="' + escapeHtml(r.item.url) + '">' + escapeHtml(r.item.title) + '</a></li>';
        }).join('');
    });
})();
</script>
