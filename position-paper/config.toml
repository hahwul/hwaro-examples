# =============================================================================
# Position Paper - Stance Declaration Paper
# Issue #1632 | Tags: paper, dark, position, argumentative, bold
# =============================================================================

title = "The Case for Algorithmic Transparency"
description = "A stance declaration paper arguing for mandatory algorithmic transparency in public-sector decision systems, structured as a formal position paper with claim-warrant-evidence architecture."
base_url = "http://localhost:3000"

sections = ["sections"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
emoji = false
