{% include "header.html" %}
  <main class="stage">
    <div class="eyebrow">Section</div>
    <h1 style="font-family:'Sora',sans-serif;font-weight:800;font-size:3.4rem;letter-spacing:-0.03em;line-height:1;margin:0.3rem 0 0.5rem;">{{ page.title | e }}</h1>
    {% if page.description is present %}
      <p style="font-family:'Albert Sans',sans-serif;font-size:1.2rem;color:#3e3942;margin-bottom:2rem;font-weight:500;line-height:1.45;">{{ page.description }}</p>
    {% endif %}
    <div class="page-article" style="max-width:960px;margin:0;">{{ content }}</div>
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
