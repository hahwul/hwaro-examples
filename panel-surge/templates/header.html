<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &#8212; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <header class="masthead">
    <svg class="bubble-bg" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
      <title>Background pattern: speech bubbles</title>
      <g fill="#ffd4cc" stroke="#141216" stroke-width="1.5">
        <path d="M 60 60 Q 60 30 90 30 L 200 30 Q 230 30 230 60 L 230 110 Q 230 140 200 140 L 110 140 L 80 160 L 90 140 Q 60 140 60 110 Z"/>
      </g>
      <g fill="#dde3ff" stroke="#141216" stroke-width="1.5">
        <path d="M 870 340 Q 870 310 900 310 L 1090 310 Q 1120 310 1120 340 L 1120 390 Q 1120 420 1090 420 L 990 420 L 960 440 L 970 420 Q 870 420 870 390 Z"/>
      </g>
      <g fill="#fbeeb3" stroke="#141216" stroke-width="1.2" opacity="0.85">
        <path d="M 980 40 Q 980 20 1000 20 L 1080 20 Q 1100 20 1100 40 L 1100 80 Q 1100 100 1080 100 L 1020 100 L 1000 115 L 1006 100 Q 980 100 980 80 Z"/>
      </g>
      <g fill="#dde3ff" stroke="#141216" stroke-width="1.2" opacity="0.7">
        <path d="M 60 300 Q 60 280 80 280 L 200 280 Q 220 280 220 300 L 220 350 Q 220 370 200 370 L 120 370 L 95 390 L 105 370 Q 60 370 60 350 Z"/>
      </g>
      <g fill="none" stroke="#141216" stroke-width="1" opacity="0.3">
        <path d="M 440 200 Q 440 180 460 180 L 580 180 Q 600 180 600 200 L 600 240 Q 600 260 580 260 L 510 260 L 485 280 L 495 260 Q 440 260 440 240 Z"/>
      </g>
    </svg>
    <div class="masthead-content">
      <div class="masthead-top">
        <span>Conference 2026 &#183; Day 02 of 03</span>
        <span class="live-chip">On Stage</span>
        <span>Room A &#183; 09:00 &ndash; 18:00</span>
      </div>
      <div class="eyebrow">Expert Collision &#183; Moderated Panels</div>
      <h1 class="title">{{ site.title }}</h1>
      <p class="subhead">{{ site.description }}</p>
      <div class="masthead-meta">
        <span>Panels today <strong>07</strong></span>
        <span>Panelists <strong>36</strong></span>
        <span>Moderators <strong>07</strong></span>
        <span>Stage A <strong>Live</strong></span>
      </div>
    </div>
  </header>
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-left">
        <a href="{{ base_url }}/">Stage</a>
        <a href="{{ base_url }}/panels/">Panels</a>
        <a href="{{ base_url }}/about/">Programme</a>
        <a href="{{ base_url }}/tags/">Index</a>
      </div>
      <div class="navbar-right">
        <span>Next Panel &#183; 14:00 Stage A</span>
      </div>
    </div>
  </nav>
