{% include "header.html" %}
  <main class="stage">
    <article class="page-article">
      {% if page.title is present %}
        <div class="eyebrow">{% if page.section is present %}{{ page.section }}{% else %}Panel{% endif %}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description is present %}
          <p style="font-family:'Albert Sans',sans-serif;font-size:1.25rem;color:#3e3942;font-weight:500;margin-bottom:2rem;line-height:1.45;">{{ page.description }}</p>
        {% endif %}
      {% endif %}
      {{ content }}
    </article>
  </main>
{% include "footer.html" %}
