# =============================================================================
# Site Configuration
# =============================================================================

title = "Bauhaus Design"
description = "Swiss design and primary colors, geometric layout."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = true
lazy_loading = true
