title = "Dewdrop"
description = "A wellness journal for mindful mornings and gentle living."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
allow_all = true

[feeds]
enabled = true
format = "atom"

[markdown]
safe = false
