<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ base_url }}" style="color: inherit; text-decoration: none; border: none;">{{ site.title }}</a></h1>
            <p style="font-family: var(--font-heading); font-style: italic;">{{ site.description }}</p>
            <nav>
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/posts">Prints</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.extra.author | default(value="Publisher") }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
