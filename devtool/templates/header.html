<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    {% if auto_includes %}{{ auto_includes | safe }}{% endif %}
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent-color: #4CAF50;
            --code-bg: #0d0d0d;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-mono);
            font-weight: 600;
            color: #ffffff;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
        }

        .logo::before {
            content: ">_ ";
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: var(--text-main);
            text-decoration: none;
        }

        .hero {
            text-align: center;
            margin: 4rem 0;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            margin-top: 0;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .button {
            display: inline-block;
            background-color: var(--accent-color);
            color: #000000;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .button:hover {
            text-decoration: none;
            opacity: 0.9;
        }

        .button-secondary {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .button-secondary:hover {
            background-color: var(--border-color);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }

        .stat-item strong {
            color: var(--text-main);
        }

        pre {
            background-color: var(--code-bg) !important;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        code {
            font-family: var(--font-mono);
            background-color: var(--surface-color);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.875em;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 4rem 0;
        }

        .feature-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
        }

        .feature-card h3 {
            margin-top: 0;
            font-size: 1.25rem;
        }

        .feature-card p {
            color: var(--text-muted);
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        footer {
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--surface-color);
        }

        .post-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .post-meta {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
            <div class="nav-links">
                <a href="https://github.com/example/devtool" target="_blank">GitHub</a>
                <a href="{{ base_url }}/docs">Docs</a>
                <a href="{{ base_url }}/blog">Blog</a>
            </div>
        </header>
        <main>
