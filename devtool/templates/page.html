{% include "header.html" %}

<article class="page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="post-meta">
            <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        </div>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
