{% include "header.html" %}

<div class="taxonomy">
    <header class="page-header">
        <h1>{{ taxonomy_name }}</h1>
    </header>

    <ul class="tag-list">
        {% for term in taxonomy_terms %}
        <li><a href="{{ base_url }}{{ term.url }}">#{{ term.name }}</a> <span class="count">({{ term.pages | length }})</span></li>
        {% endfor %}
    </ul>
</div>
