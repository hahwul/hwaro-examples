{% include "header.html" %}
<div class="max-w-4xl mx-auto px-4 py-12">
    <div class="mb-12">
        <a href="{{ base_url }}/{{ taxonomy_name }}" class="text-brand-600 font-medium hover:text-brand-700 transition-colors inline-flex items-center gap-1 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            All {{ taxonomy_name }}
        </a>
        <h1 class="text-4xl font-bold font-display text-slate-900 capitalize">{{ taxonomy_term.name }}</h1>
    </div>

    <div class="grid gap-6">
        {% for post in taxonomy_pages %}
        <article class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">
                <a href="{{ post.url }}" class="hover:text-brand-600 transition-colors">{{ post.title }}</a>
            </h2>
            {% if post.description %}
            <p class="text-slate-600 mb-4">{{ post.description }}</p>
            {% endif %}
            <a href="{{ post.url }}" class="text-brand-600 font-semibold hover:text-brand-700 transition-colors inline-flex items-center gap-1">
                Read more
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>
        </article>
        {% endfor %}
    </div>
</div>
{% include "footer.html" %}
