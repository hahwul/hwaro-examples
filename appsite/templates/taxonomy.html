{% include "header.html" %}
<div class="max-w-4xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold font-display text-slate-900 mb-8 capitalize">{{ taxonomy_name }}</h1>
    <div class="flex flex-wrap gap-4">
        {% for term in taxonomy_terms %}
        <a href="{{ term.url }}" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-slate-700 hover:bg-brand-50 hover:text-brand-600 hover:border-brand-200 transition-all shadow-sm font-medium">
            {{ term.name }} ({{ term.pages | length }})
        </a>
        {% endfor %}
    </div>
</div>
{% include "footer.html" %}
