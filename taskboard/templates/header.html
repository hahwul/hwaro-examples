<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            kanban: {
              bg: '#f3f4f6', // gray-100 soft background
              sidebar: '#ffffff',
              card: '#ffffff',
              todo: '#e5e7eb', // gray-200
              inprogress: '#dbeafe', // blue-100
              done: '#dcfce3', // green-100
              text: '#1f2937', // gray-800
              muted: '#6b7280', // gray-500
              border: '#e5e7eb', // gray-200
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: theme('colors.kanban.bg');
      color: theme('colors.kanban.text');
    }

    /* Strict no gradient, no emoji rules apply */
    .btn {
      @apply inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500;
    }

    .badge {
      @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium;
    }

    .badge-high {
      @apply bg-red-100 text-red-800;
    }

    .badge-medium {
      @apply bg-yellow-100 text-yellow-800;
    }

    .badge-low {
      @apply bg-green-100 text-green-800;
    }

    .badge-assignee {
      @apply bg-indigo-100 text-indigo-800 rounded-full px-2 py-0.5 border border-indigo-200;
    }

    .column-header {
      @apply flex justify-between items-center mb-4;
    }

    .card-container {
      @apply bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-3 hover:shadow-md transition-shadow cursor-pointer;
    }
  </style>

  {{ auto_includes_css }}
</head>
<body class="font-sans antialiased h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <a href="{{ base_url }}/" class="text-xl font-bold text-gray-900 tracking-tight">{{ site.title }}</a>
    </div>

    <div class="p-4 flex-1 overflow-y-auto">
      <div class="mb-6">
        <h3 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Projects</h3>
        <ul class="space-y-1">
          <li>
            <a href="{{ base_url }}/" class="block px-2 py-2 rounded-md bg-blue-50 text-blue-700 font-medium text-sm">
              <span class="inline-block w-2 h-2 rounded-full bg-blue-500 mr-2"></span>
              TaskBoard Beta
            </a>
          </li>
          <li>
            <a href="#" class="block px-2 py-2 rounded-md text-gray-600 hover:bg-gray-50 font-medium text-sm">
              <span class="inline-block w-2 h-2 rounded-full bg-purple-500 mr-2"></span>
              Website Redesign
            </a>
          </li>
          <li>
            <a href="#" class="block px-2 py-2 rounded-md text-gray-600 hover:bg-gray-50 font-medium text-sm">
              <span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-2"></span>
              Marketing Campaign
            </a>
          </li>
        </ul>
      </div>

      <div>
        <h3 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Team</h3>
        <ul class="space-y-1">
          <li>
            <a href="#" class="flex items-center px-2 py-2 rounded-md text-gray-600 hover:bg-gray-50 text-sm">
              <div class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-800 flex items-center justify-center text-xs font-bold mr-2 border border-indigo-200">J</div>
              Jules
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center px-2 py-2 rounded-md text-gray-600 hover:bg-gray-50 text-sm">
              <div class="w-6 h-6 rounded-full bg-pink-100 text-pink-800 flex items-center justify-center text-xs font-bold mr-2 border border-pink-200">A</div>
              Alice
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="p-4 border-t border-gray-200">
      <a href="#" class="flex items-center text-sm text-gray-600 hover:text-gray-900">
        <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Settings
      </a>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0">
      <div class="flex items-center">
        <h1 class="text-xl font-semibold text-gray-800">TaskBoard Beta</h1>
        <span class="ml-3 px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">Private</span>
      </div>

      <div class="flex items-center space-x-4">
        <div class="relative">
          <input type="text" placeholder="Search tasks..." class="w-64 pl-9 pr-4 py-1.5 text-sm bg-gray-100 border-transparent rounded-md focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors">
          <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <button class="btn">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          New Task
        </button>
      </div>
    </header>

    <!-- Page Content Container -->
    <div class="flex-1 overflow-x-auto overflow-y-hidden p-6">
