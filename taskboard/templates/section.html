{% include "header.html" %}
<div class="h-full">
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Tasks</h1>
            <p class="text-gray-500 text-sm">All tasks across the board.</p>
        </div>
        <a href="{{ base_url }}/" class="btn">View Kanban Board</a>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <ul class="divide-y divide-gray-200">
            {% for post in section.pages %}
            <li class="hover:bg-gray-50 transition-colors">
                <a href="{{ post.url }}" class="flex items-center justify-between p-4 block">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-gray-900">{{ post.title }}</span>
                        <span class="text-xs text-gray-500 mt-1">{{ post.date | date(format="%B %d, %Y") }}</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        {% if post.extra.status %}
                            <span class="inline-flex px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-700 border border-gray-200">{{ post.extra.status }}</span>
                        {% endif %}
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% include "footer.html" %}
