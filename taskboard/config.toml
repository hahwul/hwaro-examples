title = "TaskBoard"
description = "A productive and colorful Kanban project management board"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = true
per_page = 20

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "status"

[[taxonomies]]
name = "assignee"

[[taxonomies]]
name = "priority"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["tasks"]

[markdown]
safe = true
lazy_loading = true
