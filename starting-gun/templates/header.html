<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="logo-gun">
          <circle cx="18" cy="18" r="16" fill="none" stroke="#ff4e1a" stroke-width="2"/>
          <circle cx="18" cy="18" r="10" fill="none" stroke="#ff4e1a" stroke-width="1"/>
          <circle cx="18" cy="18" r="3" fill="#ff4e1a"/>
          <line x1="18" y1="2" x2="18" y2="10" stroke="#ff4e1a" stroke-width="2"/>
          <line x1="18" y1="26" x2="18" y2="34" stroke="#ff4e1a" stroke-width="2"/>
          <line x1="2" y1="18" x2="10" y2="18" stroke="#ff4e1a" stroke-width="2"/>
          <line x1="26" y1="18" x2="34" y2="18" stroke="#ff4e1a" stroke-width="2"/>
        </svg>
        <span>STARTING&nbsp;GUN</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Track</a>
        <a href="{{ base_url }}/lanes/">Lanes</a>
        <a href="{{ base_url }}/schedule/">Schedule</a>
        <a href="{{ base_url }}/register/" class="nav-cta">Enter Race</a>
      </nav>
    </header>
