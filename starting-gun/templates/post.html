{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <header class="post-header">
        <span class="post-lane">LANE {{ page.extra.lane | default(value="--") }}</span>
        <h1 class="post-title">{{ page.title | e }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="post-lane-rule">
        <svg viewBox="0 0 800 12" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <line x1="0" y1="6" x2="800" y2="6" stroke="#ff4e1a" stroke-width="2" stroke-dasharray="24 12"/>
        </svg>
      </div>
      <div class="post-content">
        {{ content }}
      </div>
      <footer class="post-footer">
        <a href="{{ base_url }}/lanes/" class="back-link">&larr; Back to the lanes</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
