{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <div class="section-header">
        <span class="section-label">LANE ASSIGNMENTS</span>
        <h1 class="section-title">{{ page.title | e }}</h1>
      </div>
      <div class="section-lane-rule">
        <svg viewBox="0 0 1000 16" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <line x1="0" y1="4" x2="1000" y2="4" stroke="#ff4e1a" stroke-width="2" stroke-dasharray="30 14"/>
          <line x1="0" y1="12" x2="1000" y2="12" stroke="#ff4e1a" stroke-width="2" stroke-dasharray="30 14"/>
        </svg>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
