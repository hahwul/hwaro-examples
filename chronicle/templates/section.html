{% include "header.html" %}

<div class="archive-header">
  <h1 class="archive-title">{{ section.title }}</h1>
  {% if section.description %}
    <p class="archive-description">{{ section.description }}</p>
  {% endif %}
</div>

<div class="archive-content">
  <ul class="archive-list">
    {% for post in section.pages %}
    <li class="archive-item">
      <span class="archive-year">{{ post.date | date("%Y") }}</span>
      <a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a>
      <span class="archive-date">{{ post.date | date("%b %d") }}</span>
    </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
