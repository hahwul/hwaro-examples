{% include "header.html" %}

<div class="taxonomy-header">
  <h1 class="taxonomy-title">All Tags</h1>
</div>

<div class="taxonomy-content">
  <ul class="tags-list" style="margin-top: 2rem;">
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}{{ term.url }}" style="font-size: 1rem; padding: 0.5rem 1rem;">{{ term.name }} ({{ term.pages | length }})</a></li>
    {% endfor %}
  </ul>
</div>
