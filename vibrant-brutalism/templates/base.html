<!DOCTYPE html>
<html lang="{{ config.default_language | default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
    {% block extra_head %}{% endblock extra_head %}
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1><a href="{{ base_url }}">{{ config.title }}</a></h1>
            <nav class="site-nav">
                <ul>
                    <li><a href="{{ base_url }}">Home</a></li>
                    <li><a href="{{ base_url }}/about">About</a></li>
                    <li><a href="{{ base_url }}/archive">Archive</a></li>
                </ul>
            </nav>
        </header>

        <main class="content-area">
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>{{ config.extra.footer_text | default('© ' ~ config.title) }}</p>
        </footer>
    </div>
</body>
</html>
