{% include "header.html" %}

  <section class="hero">
    <div class="vortex-ring vortex-ring-1"></div>
    <div class="vortex-ring vortex-ring-2"></div>
    <div class="vortex-ring vortex-ring-3"></div>
    <div class="hero-content">
      <h1>{{ page.title }}</h1>
      <p class="hero-tagline">{{ page.description }}</p>
      <a href="{{ base_url }}/works/" class="hero-cta">Enter the Spiral</a>
    </div>
  </section>

  <section class="works-preview">
    <h2 class="section-title">Selected Works</h2>
    <div class="spiral-grid">
      {% for work in site.pages %}
      <article class="work-card" style="--i: {{ loop.index }}">
        <div class="work-card-inner">
          <span class="work-number">{{ "%02d" | format(loop.index) }}</span>
          <h3><a href="{{ base_url }}{{ work.url }}">{{ work.title }}</a></h3>
          <p>{{ work.description }}</p>
          <div class="work-meta">
            <span>{{ work.extra.role }}</span>
            <span>{{ work.extra.year }}</span>
          </div>
        </div>
      </article>
      {% endfor %}
    </div>
  </section>

{% include "footer.html" %}
