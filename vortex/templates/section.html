{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title }}</h1>
    {{ content | safe }}
    <ul class="post-list">
      {% for post in section.pages %}
      <li>
        <a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a>
        {% if post.date %}<span class="post-date">{{ post.date }}</span>{% endif %}
      </li>
      {% endfor %}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
