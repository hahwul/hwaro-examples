{% include "header.html" %}

<div class="page-title-simple">
  <p style="color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem;">Posts tagged</p>
  <h1 style="margin: 0; font-size: 2.5rem; letter-spacing: 1px;">{{ taxonomy_term.name }}</h1>
</div>

<div class="photo-grid">
  {% for post in taxonomy_pages %}
  <article class="photo-item">
    <a href="{{ base_url }}{{ post.url }}">
      {% if post.image %}
      <img src="{{ base_url }}{{ post.image }}" alt="{{ post.title }}" loading="lazy" />
      {% else %}
      <div style="width: 100%; height: 100%; background-color: #111; display: flex; align-items: center; justify-content: center; color: #444;">No Image</div>
      {% endif %}
      <div class="photo-overlay">
        <h2 class="photo-title">{{ post.title }}</h2>
        <span class="photo-date">{{ post.date | date("%B %d, %Y") }}</span>
      </div>
    </a>
  </article>
  {% endfor %}
</div>

{% include "footer.html" %}
