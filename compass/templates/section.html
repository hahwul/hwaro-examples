{% include "header.html" %}

  <main class="max-w-5xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">{{ section.title }}</h1>
    <div class="prose prose-slate max-w-none mb-8">
      {{ content | safe }}
    </div>
    {% if section.pages | length > 0 %}
    <div class="space-y-4">
      {% for p in section.pages %}
      <a href="{{ p.url }}" class="card block hover:border-brand-300 hover:shadow transition-all">
        <h2 class="font-semibold text-slate-900">{{ p.title }}</h2>
        {% if p.description %}
        <p class="text-sm text-slate-500 mt-1">{{ p.description }}</p>
        {% endif %}
      </a>
      {% endfor %}
    </div>
    {% endif %}
  </main>

{% include "footer.html" %}
