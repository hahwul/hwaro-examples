<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f5ff',
              100: '#e0eaff',
              200: '#c7d7fe',
              300: '#a4bcfd',
              400: '#7c9cfb',
              500: '#5b7ef5',
              600: '#3d5ce8',
              700: '#2f49d4',
              800: '#2a3dab',
              900: '#283987',
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    body {
      @apply font-sans bg-slate-50 text-slate-800 antialiased;
    }
    .progress-bar {
      @apply h-2 rounded-full bg-slate-200 overflow-hidden;
    }
    .progress-fill {
      @apply h-full rounded-full bg-brand-600;
    }
    .timeline-dot {
      @apply w-3 h-3 rounded-full bg-brand-600 border-2 border-white ring-2 ring-brand-200 flex-shrink-0;
    }
    .badge {
      @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-brand-50 text-brand-700 border border-brand-200;
    }
    .card {
      @apply bg-white rounded-lg border border-slate-200 p-6 shadow-sm;
    }
    .check-done {
      @apply text-brand-600;
    }
    .check-pending {
      @apply text-slate-300;
    }
    .nav-link {
      @apply text-slate-500 hover:text-brand-700 text-sm font-medium transition-colors;
    }
    .section-title {
      @apply text-lg font-semibold text-slate-900 tracking-tight;
    }
  </style>
</head>
<body>
  <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="{{ base_url }}/" class="text-lg font-bold text-slate-900 tracking-tight">Compass</a>
      <div class="flex items-center gap-6">
        <a href="{{ base_url }}/" class="nav-link">Overview</a>
        <a href="{{ base_url }}/timeline/" class="nav-link">Timeline</a>
        <a href="{{ base_url }}/skills/" class="nav-link">Skills</a>
        <a href="{{ base_url }}/goals/" class="nav-link">Goals</a>
      </div>
    </div>
  </nav>
