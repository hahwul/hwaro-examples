{% include "header.html" %}
<main>
  <article>
    <section class="block">
      <div class="block-head">
        <h2>{{ page.title }}</h2>
        {% if page.date %}<div class="block-tag">{{ page.date | date("%b %d, %Y") }}</div>{% endif %}
      </div>
      {% if page.description %}<p style="font-family: 'Courier Prime', monospace; font-weight: 700; color: var(--fire); letter-spacing: 0.14em; text-transform: uppercase; font-size: 13px; margin: -28px 0 36px;">{{ page.description }}</p>{% endif %}
      <div class="prose">{{ content | safe }}</div>
    </section>
  </article>
</main>
{% include "footer.html" %}
