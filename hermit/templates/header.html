<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body id="page">

  <!-- Fixed Bottom Header -->
  <header id="site-header" class="animated slideInUp">
    <div class="hdr-wrapper section-inner">
      <div class="hdr-left">
        <div class="site-branding">
          <a href="{{ base_url }}/">{{ site.title }}</a>
        </div>
        <nav class="site-nav hide-in-mobile">
          <a href="{{ base_url }}/posts/">Posts</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
      <div class="hdr-right hdr-icons">
        <span class="hdr-social hide-in-mobile">
          <a href="https://github.com" target="_blank" rel="noopener me" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3M23 19V15a5 5 0 0 0-4-5 5 5 0 0 0-4 0 5 5 0 0 0-4 0 5 5 0 0 0-4 5v4"></path><path d="M16 11a4 4 0 1 0-8 0 4 4 0 0 0 8 0z"></path></svg>
          </a>
          <a href="https://twitter.com" target="_blank" rel="noopener me" title="Twitter">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-twitter"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
          </a>
        </span>
        <button id="menu-btn" class="hdr-btn" title="Menu" onclick="toggleMobileMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu">
    <ul>
      <li><a href="{{ base_url }}/posts/">Posts</a></li>
      <li><a href="{{ base_url }}/about/">About</a></li>
    </ul>
  </div>
