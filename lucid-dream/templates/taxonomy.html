{% include "header.html" %}
<div class="content">
  <h1>{{ taxonomy_name | upper }}</h1>
  <p class="taxonomy-desc">Explore by {{ taxonomy_name }}.</p>
  <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li>
        <a href="{{ base_url }}{{ taxonomy_name }}/{{ term | slugify }}/">{{ term }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
