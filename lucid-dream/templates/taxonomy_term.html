{% include "header.html" %}
<div class="content">
  <h1>{{ taxonomy_name | upper }}: {{ taxonomy_term }}</h1>
  <div class="cards-container">
    {% for post in taxonomy_pages %}
      <div class="card">
        <h2 class="card-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        {% if post.date %}
        <div class="date">{{ post.date | date("%B %d, %Y") }}</div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
</div>
{% include "footer.html" %}
