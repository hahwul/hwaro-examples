{% include "header.html" %}
  <main class="site-main glass-container content-area">
    <h1>{{ page.title | e }}</h1>
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
    <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name | e }}</a></li>
    {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
