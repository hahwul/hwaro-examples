{% extends "base.html" %}

{% block content %}
<div class="section-content">
    {% if page.title %}
    <h1 class="page-title">{{ page.title | e }}</h1>
    {% endif %}

    {% if content %}
    <div class="content-body">
        {{ content | safe }}
    </div>
    {% endif %}

    <div class="section-list">
        {% for p in pages %}
        <article class="post-summary">
            <h2><a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a></h2>
            {% if p.description %}
            <p>{{ p.description | e }}</p>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
