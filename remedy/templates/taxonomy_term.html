{% include "header.html" %}
  <main class="min-h-[calc(100vh-200px)] pt-20 pb-20 max-w-4xl mx-auto">
    <div class="mb-12 text-center">
      <span class="inline-block px-3 py-1 rounded-full bg-surface text-primary text-xs font-bold uppercase tracking-wider mb-4 border border-primary/20">Tag</span>
      <h1 class="text-4xl md:text-5xl font-extrabold text-text tracking-tight mb-4">#{{ page.title }}</h1>
      <p class="text-muted text-lg max-w-2xl mx-auto">Posts tagged with <span class="text-text font-medium">{{ page.title }}</span></p>
    </div>

    <div class="prose prose-lg max-w-none mx-auto">
      {{ content }}
    </div>
  </main>
