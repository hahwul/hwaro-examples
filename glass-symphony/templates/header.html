<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-highlight: rgba(255, 255, 255, 0.2);
      --text-main: rgba(255, 255, 255, 0.95);
      --text-muted: rgba(255, 255, 255, 0.7);
      --primary-color: #8b5cf6;
      --secondary-color: #ec4899;
      --bg-color-1: #0f172a;
      --bg-color-2: #312e81;
      --bg-color-3: #4c1d95;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-color-1);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.25), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.25), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Animated background elements */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite ease-in-out alternate;
    }

    .bg-shape-1 {
      width: 400px;
      height: 400px;
      background: var(--primary-color);
      top: -100px;
      left: -100px;
      opacity: 0.3;
    }

    .bg-shape-2 {
      width: 500px;
      height: 500px;
      background: var(--secondary-color);
      bottom: -150px;
      right: -100px;
      opacity: 0.2;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 50px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Glass Container Utilities */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin: 2rem 0 3rem 0;
      position: relative;
      z-index: 10;
    }

    .site-logo {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-header nav a:hover {
      color: var(--text-main);
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      transition: width 0.3s ease;
    }

    .site-header nav a:hover::after {
      width: 100%;
    }

    .site-main {
      flex-grow: 1;
      padding: 3rem;
      margin-bottom: 3rem;
    }

    /* Typography inside main content */
    .site-main h1, .site-main h2, .site-main h3 {
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .site-main h1 { font-size: 2.5rem; margin-top: 0; }
    .site-main h2 { font-size: 1.8rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;}
    .site-main h3 { font-size: 1.4rem; }

    p { margin: 1.2em 0; font-weight: 300; font-size: 1.1rem; }

    a {
      color: #c4b5fd;
      text-decoration: none;
      border-bottom: 1px solid rgba(196, 181, 253, 0.3);
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    a:hover {
      color: #fff;
      border-color: #fff;
    }

    /* Code and Blocks */
    code {
      background: rgba(0,0,0,0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      border: 1px solid var(--glass-border);
      color: #fca5a5;
    }

    pre {
      background: rgba(0,0,0,0.5);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    blockquote {
      border-left: 4px solid var(--primary-color);
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
      border-radius: 0 12px 12px 0;
      font-style: italic;
      color: var(--text-muted);
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--glass-border);
      margin: 2rem 0;
    }

    ul, ol {
      padding-left: 1.5rem;
      margin: 1.2em 0;
    }

    li {
      margin-bottom: 0.5rem;
      font-weight: 300;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; display: grid; gap: 1rem; }
    ul.section-list li {
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--glass-highlight);
    }
    ul.section-list li a { font-weight: 600; border: none; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; border-radius: 16px; padding: 1rem; }
      .site-main { padding: 1.5rem; border-radius: 16px; }
      .site-wrapper { padding: 0 1rem; }
      .site-main h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>
