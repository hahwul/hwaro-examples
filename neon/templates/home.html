<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="{{ page.description }}">
  <title>{{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="spotlight" class="animated fadeIn">
    <div id="home-center">
      <h1 id="home-title">{{ site.title }}</h1>
      <div class="neon-divider"></div>
      <p id="home-subtitle">{{ site.description }}</p>
      <nav id="home-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>

    <div id="home-footer">
      <p>&copy; 2026 <a href="{{ base_url }}/">{{ site.title }}</a>
        &#183; <a href="{{ base_url }}/rss.xml" target="_blank" title="RSS">RSS</a>
      </p>
      <p>Powered by <a href="https://github.com/hahwul/hwaro" target="_blank" rel="noopener">Hwaro</a></p>
    </div>
  </div>
</body>
</html>
