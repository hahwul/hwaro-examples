<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="{{ page.description }}">
  <title>{{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0d0221;
      --neon-pink: #ff2a6d;
      --neon-cyan: #05d9e8;
      --neon-purple: #b537f2;
      --text-bright: #d1f7ff;
      --text-dim: #8b9cc2;
      --text-muted: #5a6785;
      --border-glow: rgba(5, 217, 232, 0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--bg-deep);
      line-height: 1.7;
    }

    body {
      color: var(--text-bright);
      font-family: 'Rajdhani', 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
    }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--neon-pink);
      text-shadow: 0 0 8px rgba(255, 42, 109, 0.6);
    }

    /* Home Spotlight */
    #spotlight {
      display: flex;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 90%;
      margin: auto;
      text-align: center;
    }

    #home-center {
      display: flex;
      flex-grow: 1;
      flex-direction: column;
      justify-content: center;
    }

    #home-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 3.5em;
      color: var(--neon-cyan);
      text-shadow:
        0 0 10px var(--neon-cyan),
        0 0 30px rgba(5, 217, 232, 0.5),
        0 0 60px rgba(5, 217, 232, 0.3),
        0 0 100px rgba(5, 217, 232, 0.1);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.2em;
    }

    #home-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: 1.2em;
      color: var(--text-dim);
      margin-top: 0;
      margin-bottom: 2em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Neon line divider */
    .neon-divider {
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-purple), var(--neon-cyan), transparent);
      margin: 0 auto 2em;
      box-shadow:
        0 0 5px var(--neon-pink),
        0 0 10px rgba(181, 55, 242, 0.3);
    }

    #home-nav {
      margin-top: 1.5em;
    }

    #home-nav a {
      display: inline-block;
      margin: 0.3em 0.8em;
      padding: 0.5em 1.5em;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    #home-nav a:hover {
      border-color: var(--neon-pink);
      box-shadow:
        0 0 10px rgba(255, 42, 109, 0.3),
        0 0 20px rgba(255, 42, 109, 0.1);
      background: rgba(255, 42, 109, 0.1);
      color: var(--neon-pink);
    }

    #home-footer {
      text-align: center;
      font-size: 0.8em;
      color: var(--text-muted);
      padding-bottom: 2em;
    }

    #home-footer p { margin: 0.3em 0; }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 10px var(--neon-cyan),
          0 0 30px rgba(5, 217, 232, 0.5),
          0 0 60px rgba(5, 217, 232, 0.3);
      }
      50% {
        text-shadow:
          0 0 15px var(--neon-cyan),
          0 0 40px rgba(5, 217, 232, 0.6),
          0 0 80px rgba(5, 217, 232, 0.4);
      }
    }

    .animated.fadeIn { animation: fadeIn 0.8s ease-out; }

    #home-title {
      animation: glowPulse 3s ease-in-out infinite;
    }

    @media (max-width: 600px) {
      #home-title { font-size: 2em; }
      #home-subtitle { font-size: 0.9em; }
    }
  </style>
</head>
<body>
  <div id="spotlight" class="animated fadeIn">
    <div id="home-center">
      <h1 id="home-title">{{ site.title }}</h1>
      <div class="neon-divider"></div>
      <p id="home-subtitle">{{ site.description }}</p>
      <nav id="home-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>

    <div id="home-footer">
      <p>&copy; 2026 <a href="{{ base_url }}/">{{ site.title }}</a>
        &#183; <a href="{{ base_url }}/rss.xml" target="_blank" title="RSS">RSS</a>
      </p>
      <p>Powered by <a href="https://github.com/hahwul/hwaro" target="_blank" rel="noopener">Hwaro</a></p>
    </div>
  </div>
</body>
</html>
