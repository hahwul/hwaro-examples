<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="vellum" role="document">
    <div class="flourish-top" aria-hidden="true">
      <svg viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

          <path d="M 40 30 Q 120 0 200 30 Q 280 60 360 30"/>
          <path d="M 440 30 Q 520 0 600 30 Q 680 60 760 30"/>

        <g fill="#8a6e2e">
          <circle cx="360" cy="30" r="3"/>
          <circle cx="440" cy="30" r="3"/>
        </g>
        <g transform="translate(400,30)">
          <circle r="10" fill="none" stroke="#8a6e2e" stroke-width="1"/>
          <circle r="5" fill="none" stroke="#8a6e2e" stroke-width="0.8"/>
          <circle r="1.5" fill="#8a6e2e"/>
          <g stroke="#8a6e2e" stroke-width="0.7" fill="none">
            <path d="M -10 0 L -16 0"/>
            <path d="M 10 0 L 16 0"/>
            <path d="M 0 -10 L 0 -16"/>
            <path d="M 0 10 L 0 16"/>
          </g>
        </g>
      </svg>
    </div>
    <header class="masthead" role="banner">
      <a href="{{ base_url }}/" class="brand" aria-label="Ketubah Studio home">
        <svg viewBox="0 0 300 110" xmlns="http://www.w3.org/2000/svg" class="brand-mark" aria-hidden="true">

            <g fill="#b48b42">
              <circle cx="-80" cy="0" r="3"/>
              <circle cx="80" cy="0" r="3"/>
              <circle cx="-40" cy="-14" r="2"/>
              <circle cx="40" cy="-14" r="2"/>
              <circle cx="-40" cy="14" r="2"/>
              <circle cx="40" cy="14" r="2"/>
            </g>
            <text x="0" y="6" text-anchor="middle" font-family="Cinzel Decorative, serif" font-size="20" font-weight="900" fill="#6b4a1e" letter-spacing="4">KETUBAH</text>
          </g>
        </svg>
      </a>
      <p class="sub">A STUDIO OF ORNAMENTAL &amp; CEREMONIAL CONTRACTS</p>
      <nav class="nav" aria-label="Primary">
        <a href="{{ base_url }}/">Atelier</a>
