{% include "header.html" %}

<div class="site-wrapper">
  <main class="site-main">
    <article class="monograph-page">
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-subtitle">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="monograph-body">
        {{ content | safe }}
      </div>

      {% if page.tags and page.tags | length > 0 %}
      <div class="page-tags">
        <h4 class="tags-label">Subject Headings</h4>
        <div class="tag-list">
          {% for tag in page.tags %}
          <a href="{{ base_url }}/tags/{{ tag | slugify }}/">{{ tag }}</a>
          {% endfor %}
        </div>
      </div>
      {% endif %}
    </article>
  </main>

{% include "footer.html" %}
