<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Source+Sans+3:wght@600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Paper home">
        <svg viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <rect x="2" y="2" width="60" height="36" fill="none" stroke="#1a2337" stroke-width="1.5"/>
          <line x1="10" y1="36" x2="10" y2="14" stroke="#1a2337" stroke-width="1.5"/>
          <line x1="10" y1="14" x2="30" y2="22" stroke="#1a2337" stroke-width="1.5"/>
          <line x1="30" y1="22" x2="50" y2="8" stroke="#c43a2b" stroke-width="1.5"/>
          <circle cx="10" cy="14" r="2" fill="#1a2337"/>
          <circle cx="30" cy="22" r="2" fill="#1a2337"/>
          <circle cx="50" cy="8" r="2" fill="#c43a2b"/>
        </svg>
        <span class="logo-text">
          <span class="journal-name">Health Economics Quarterly</span>
          <span class="journal-sub">Vol. 42 &middot; Issue 03 &middot; Sept 2026</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">ABSTRACT</a>
        <a href="{{ base_url }}/sections/">SECTIONS</a>
        <a href="{{ base_url }}/methods/">METHODS</a>
        <a href="{{ base_url }}/results/">RESULTS</a>
        <a href="{{ base_url }}/appendix/">APPENDIX</a>
      </nav>
    </header>
