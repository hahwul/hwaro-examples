<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      background: #1a1a1a;
      color: #a0a0a0;
      line-height: 1.85;
      font-size: 15px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Ember particles */
    .ember {
      position: fixed;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #8b2500;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }
    .ember-1 {
      left: 12%;
      bottom: 20%;
      animation: ember-float-1 8s ease-in-out infinite;
    }
    .ember-2 {
      left: 45%;
      bottom: 10%;
      animation: ember-float-2 11s ease-in-out infinite 2s;
    }
    .ember-3 {
      left: 78%;
      bottom: 30%;
      animation: ember-float-3 9s ease-in-out infinite 4s;
    }
    .ember-4 {
      left: 30%;
      bottom: 5%;
      width: 2px;
      height: 2px;
      animation: ember-float-4 13s ease-in-out infinite 1s;
    }
    .ember-5 {
      left: 62%;
      bottom: 15%;
      width: 2px;
      height: 2px;
      animation: ember-float-5 10s ease-in-out infinite 3s;
    }

    @keyframes ember-float-1 {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      50% { opacity: 0.3; }
      90% { opacity: 0; }
      100% { transform: translateY(-120px) translateX(15px); }
    }
    @keyframes ember-float-2 {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.5; }
      50% { opacity: 0.25; }
      90% { opacity: 0; }
      100% { transform: translateY(-150px) translateX(-20px); }
    }
    @keyframes ember-float-3 {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      15% { opacity: 0.55; }
      50% { opacity: 0.2; }
      85% { opacity: 0; }
      100% { transform: translateY(-100px) translateX(10px); }
    }
    @keyframes ember-float-4 {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      12% { opacity: 0.4; }
      50% { opacity: 0.2; }
      88% { opacity: 0; }
      100% { transform: translateY(-180px) translateX(-10px); }
    }
    @keyframes ember-float-5 {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.45; }
      50% { opacity: 0.15; }
      90% { opacity: 0; }
      100% { transform: translateY(-130px) translateX(18px); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      padding: 3rem 0 2rem;
    }

    .site-logo {
      font-size: 1.1rem;
      font-weight: 500;
      color: #a0a0a0;
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .site-logo:hover {
      color: #8b2500;
    }

    .site-nav {
      margin-top: 0.75rem;
    }

    .site-nav a {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 0.8rem;
      margin-right: 1.25rem;
      letter-spacing: 0.04em;
    }

    .site-nav a:hover {
      color: #8b2500;
    }

    .site-main {
      padding: 1rem 0 4rem;
      min-height: calc(100vh - 250px);
    }

    /* Typography */
    h1 {
      font-size: 1.3rem;
      font-weight: 400;
      color: #c0c0c0;
      margin-bottom: 1.5rem;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }

    h2 {
      font-size: 1.05rem;
      font-weight: 400;
      color: #b0b0b0;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    h3 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #a0a0a0;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin: 1rem 0;
    }

    a {
      color: #8b2500;
      text-decoration: none;
    }

    a:hover {
      color: #a63000;
    }

    code {
      background: #242424;
      padding: 0.15rem 0.4rem;
      font-size: 0.85em;
      font-family: 'IBM Plex Mono', monospace;
    }

    pre {
      background: #242424;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.6;
    }

    pre code {
      background: none;
      padding: 0;
    }

    blockquote {
      margin: 1.5rem 0;
      padding-left: 1rem;
      border-left: 2px solid #8b2500;
      color: #6b6b6b;
      font-style: italic;
    }

    ul, ol {
      padding-left: 1.25rem;
      margin: 1rem 0;
    }

    li {
      margin-bottom: 0.3rem;
    }

    hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 2rem 0;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* Post list */
    .post-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0;
    }

    .post-list li {
      margin-bottom: 1.25rem;
    }

    .post-list a {
      color: #c0c0c0;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .post-list a:hover {
      color: #8b2500;
    }

    .post-date {
      display: block;
      font-size: 0.75rem;
      color: #4a4a4a;
      margin-top: 0.15rem;
      letter-spacing: 0.04em;
    }

    /* Page content */
    .page-date {
      font-size: 0.8rem;
      color: #4a4a4a;
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }

    /* Taxonomy */
    .taxonomy-desc {
      color: #6b6b6b;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .section-list {
      list-style: none;
      padding: 0;
    }

    .section-list li {
      margin-bottom: 0.5rem;
    }

    .section-list li a {
      color: #a0a0a0;
    }

    .section-list li a:hover {
      color: #8b2500;
    }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    nav.pagination a { display: inline-block; padding: 0.25rem 0.55rem; color: #6b6b6b; text-decoration: none; font-size: 0.85rem; }
    nav.pagination a:hover { color: #8b2500; }
    .pagination-current span { display: inline-block; padding: 0.25rem 0.55rem; color: #8b2500; font-size: 0.85rem; }
    .pagination-disabled span { display: inline-block; padding: 0.25rem 0.55rem; color: #3a3a3a; font-size: 0.85rem; }

    /* Footer */
    .site-footer {
      padding: 2rem 0;
      color: #3a3a3a;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .site-footer a {
      color: #4a4a4a;
    }

    .site-footer a:hover {
      color: #8b2500;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-wrapper { padding: 0 1rem; }
      .site-header { padding: 2rem 0 1.5rem; }
      body { font-size: 14px; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="ember ember-1"></div>
  <div class="ember ember-2"></div>
  <div class="ember ember-3"></div>
  <div class="ember ember-4"></div>
  <div class="ember ember-5"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">index</a>
        <a href="{{ base_url }}/posts/">posts</a>
        <a href="{{ base_url }}/about/">about</a>
      </nav>
    </header>
