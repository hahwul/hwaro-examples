<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Bodoni Moda for elegant serif, and DM Sans for clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=DM+Sans:opsz,wght@9..40,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chiaroscuro-container">
        <header class="c-header">
            <div class="c-header-inner">
                <a href="{{ base_url }}" class="c-site-title">{{ site.title }}</a>
                <nav class="c-nav">
                    <a href="{{ base_url }}" class="c-nav-link">Home</a>
                    <a href="#" class="c-nav-link">Exhibitions</a>
                    <a href="#" class="c-nav-link">Artists</a>
                </nav>
            </div>
        </header>

        <main class="c-main">
            {% block content %}{% endblock content %}
        </main>

        <footer class="c-footer">
            <div class="c-footer-inner">
                <div class="c-footer-logo">
                    {{ site.title }}<br>
                    <span style="font-size: 0.5em; opacity: 0.5;">STUDIO</span>
                </div>
                <div class="c-footer-info">
                    <p>&copy; {{ site.title }}. <br>Light and Shadow.</p>
                    {% if site.extra.author %}
                    <p class="c-author">By {{ site.extra.author }}</p>
                    {% endif %}
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
