{% extends "base.html" %}

{% block content %}
<article class="c-page">
    <header class="c-page-header">
        <h1 class="c-page-title">{{ page.title }}</h1>
        <div class="c-page-meta">
            {% if page.date %}
            <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
            {% endif %}
        </div>
    </header>

    <div class="c-page-content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
