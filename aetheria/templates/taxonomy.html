{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <div class="tags" style="margin-top: 2rem;">
    {% for term in taxonomy_terms %}
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="tag">{{ term }}</a>
    {% endfor %}
  </div>
{% endblock %}
