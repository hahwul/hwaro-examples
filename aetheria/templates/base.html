<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-subtle: #12121c;
      --border: rgba(100, 200, 255, 0.1);
      --text: #e0e0e0;
      --text-muted: #8b92a5;
      --primary: #64c8ff;
      --primary-glow: rgba(100, 200, 255, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .site-wrapper {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary-glow);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow);
    }

    .site-main {
      flex-grow: 1;
      padding-bottom: 4rem;
    }

    .site-footer {
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3, h4 {
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 1px;
    }

    h1 { font-size: 2.5rem; margin-top: 0; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    a:hover {
      text-shadow: 0 0 8px var(--primary-glow);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--primary);
    }

    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* Components */
    .card {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(100, 200, 255, 0.3);
      box-shadow: 0 0 20px var(--primary-glow);
      transform: translateY(-2px);
    }

    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    ul.section-list li {
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    ul.section-list li:hover {
      border-color: rgba(100, 200, 255, 0.3);
      box-shadow: 0 0 20px var(--primary-glow);
      transform: translateY(-2px);
    }

    ul.section-list li a {
      padding: 1.5rem;
      display: block;
      flex-grow: 1;
      font-weight: 300;
      font-size: 1.1rem;
      color: #fff;
    }

    ul.section-list li a:hover {
      text-shadow: none;
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    nav.pagination a:hover {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--primary);
      background: var(--primary-glow);
      color: #fff;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .tag {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tag:hover {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 2rem 0;
      }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/portfolio/">Portfolio</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
    </footer>
  </div>
</body>
</html>
