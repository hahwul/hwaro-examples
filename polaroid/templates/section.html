{% include "header.html" %}

  <!-- Section Header -->
  <div class="page-header">
    <div class="container">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p>{{ page.description }}</p>
      {% endif %}
    </div>
  </div>

  <!-- Polaroid Grid -->
  <div class="container">
    <div class="main-content">
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </div>

{% include "footer.html" %}
