{% include "header.html" %}

  <!-- Hero: Cathedral Interior -->
  <section style="background-color: #0d0d0d; border-bottom: 1px solid #4b5563; position: relative; overflow: hidden;">
    <!-- Decorative vertical lines suggesting cathedral pillars -->
    <div style="position: absolute; left: 8%; top: 0; bottom: 0; width: 1px; background-color: #252525;"></div>
    <div style="position: absolute; left: 16%; top: 0; bottom: 0; width: 1px; background-color: #252525;"></div>
    <div style="position: absolute; right: 8%; top: 0; bottom: 0; width: 1px; background-color: #252525;"></div>
    <div style="position: absolute; right: 16%; top: 0; bottom: 0; width: 1px; background-color: #252525;"></div>

    <div class="max-w-4xl mx-auto px-6 py-20 text-center" style="position: relative; z-index: 1;">
      <!-- Gothic arch SVG above title -->
      <div class="flex justify-center mb-6">
        <svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M 20 100 L 20 45 Q 20 0 100 0 Q 180 0 180 45 L 180 100" stroke="#4b5563" stroke-width="1.5" fill="none"/>
          <path d="M 35 100 L 35 50 Q 35 15 100 15 Q 165 15 165 50 L 165 100" stroke="#991b1b" stroke-width="1" fill="none" opacity="0.5"/>
          <path d="M 50 100 L 50 55 Q 50 30 100 30 Q 150 30 150 55 L 150 100" stroke="#4b5563" stroke-width="0.5" fill="none" opacity="0.4"/>
          <!-- Keystone -->
          <polygon points="100,0 93,12 107,12" fill="#d4a017" opacity="0.9"/>
          <!-- Candle glow dots at base -->
          <circle cx="20" cy="100" r="2.5" fill="#d4a017" opacity="0.7" style="animation: candle 3s ease-in-out infinite;"/>
          <circle cx="180" cy="100" r="2.5" fill="#d4a017" opacity="0.7" style="animation: candle 3s ease-in-out infinite 1.5s;"/>
        </svg>
      </div>

      <h1 style="font-family: 'UnifrakturMaguntia', serif; font-size: 4rem; color: #d4a017; line-height: 1.1; margin-bottom: 1rem; animation: candle-slow 5s ease-in-out infinite;">
        {{ site.title }}
      </h1>
      <p style="font-family: 'Cinzel', serif; font-size: 0.85rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 2rem;">
        {{ site.description }}
      </p>

      <!-- Rose window divider -->
      <div class="rose-divider" style="margin: 2rem auto; max-width: 24rem;">
        <svg class="rose-window" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="16" cy="16" r="15" stroke="#4b5563" stroke-width="1"/>
          <circle cx="16" cy="16" r="8" stroke="#4b5563" stroke-width="1"/>
          <circle cx="16" cy="16" r="3" fill="#991b1b"/>
          <line x1="16" y1="1" x2="16" y2="8" stroke="#4b5563" stroke-width="1"/>
          <line x1="16" y1="24" x2="16" y2="31" stroke="#4b5563" stroke-width="1"/>
          <line x1="1" y1="16" x2="8" y2="16" stroke="#4b5563" stroke-width="1"/>
          <line x1="24" y1="16" x2="31" y2="16" stroke="#4b5563" stroke-width="1"/>
          <line x1="5.04" y1="5.04" x2="10.69" y2="10.69" stroke="#4b5563" stroke-width="1"/>
          <line x1="21.31" y1="21.31" x2="26.96" y2="26.96" stroke="#4b5563" stroke-width="1"/>
          <line x1="26.96" y1="5.04" x2="21.31" y2="10.69" stroke="#4b5563" stroke-width="1"/>
          <line x1="10.69" y1="21.31" x2="5.04" y2="26.96" stroke="#4b5563" stroke-width="1"/>
          <path d="M 16 1 Q 20 8 16 8 Q 12 8 16 1" fill="#0d0d0d" stroke="#4b5563" stroke-width="0.5"/>
          <path d="M 16 31 Q 20 24 16 24 Q 12 24 16 31" fill="#0d0d0d" stroke="#4b5563" stroke-width="0.5"/>
          <path d="M 1 16 Q 8 12 8 16 Q 8 20 1 16" fill="#0d0d0d" stroke="#4b5563" stroke-width="0.5"/>
          <path d="M 31 16 Q 24 12 24 16 Q 24 20 31 16" fill="#0d0d0d" stroke="#4b5563" stroke-width="0.5"/>
        </svg>
      </div>

      <a href="{{ base_url }}/chronicles/" style="display: inline-block; font-family: 'Cinzel', serif; font-size: 0.75rem; color: #d4a017; border: 1px solid #d4a017; padding: 0.75rem 2rem; text-decoration: none; text-transform: uppercase; letter-spacing: 0.2em; transition: all 0.3s;" onmouseover="this.style.backgroundColor='#d4a017'; this.style.color='#0d0d0d';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='#d4a017';">
        Enter the Scriptorium
      </a>
    </div>
  </section>

  <!-- Homepage content from index.md -->
  <section class="max-w-5xl mx-auto px-6 py-16">
    <div class="prose max-w-none">
      {{ content | safe }}
    </div>
  </section>

{% include "footer.html" %}
