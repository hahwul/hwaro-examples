title = "Rosetta"
description = "Internationalization and localization guide for building multilingual applications"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [{ user_agent = "*", disallow = [] }]

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[markdown]
safe = false
