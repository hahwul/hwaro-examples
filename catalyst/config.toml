# =============================================================================
# Catalyst - Chemistry-Inspired Startup Landing
# =============================================================================
# Reaction green, energy yellow, carbon black palette

title = "Catalyst"
description = "A chemistry-inspired startup landing page where innovation meets reaction"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# SEO
# =============================================================================

[sitemap]
enabled = true

[robots]
enabled = true

# =============================================================================
# Feeds
# =============================================================================

[feeds]
enabled = true
type = "atom"
limit = 20
sections = ["posts"]

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false
lazy_loading = true
