<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0d1117;
      --bg-subtle: #161b22;
      --bg-card: #0d1117;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --primary: #58a6ff;
      --success: #3fb950;
      --archive: #6e7681;
      --hover-bg: #1f242c;
      --mono: 'JetBrains Mono', monospace;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      line-height: 1.6; 
      margin: 0; 
      color: var(--text); 
      background: var(--bg); 
      -webkit-font-smoothing: antialiased; 
    }

    .site-wrapper { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }
    
    header.site-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 3rem 0; 
      border-bottom: 1px solid var(--border); 
      margin-bottom: 4rem; 
    }
    
    .site-logo { 
      font-weight: 700; 
      font-size: 1.5rem; 
      color: var(--text); 
      text-decoration: none; 
      letter-spacing: -0.04em; 
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .site-logo::before {
      content: "";
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 2px;
    }
    
    header nav { display: flex; gap: 2rem; }
    header nav a { 
      color: var(--text-muted); 
      text-decoration: none; 
      font-size: 0.9rem; 
      font-weight: 500; 
      transition: color 0.2s; 
    }
    header nav a:hover { color: var(--primary); }
    header nav a.active { color: var(--text); }

    .site-main { min-height: calc(100vh - 400px); }
    
    .site-footer { 
      margin-top: 8rem; 
      padding: 4rem 0; 
      border-top: 1px solid var(--border); 
      color: var(--text-muted); 
      font-size: 0.85rem; 
    }

    h1, h2, h3 { color: var(--text); line-height: 1.2; margin: 0 0 1rem; font-weight: 600; letter-spacing: -0.02em; }
    h1 { font-size: 2.5rem; font-weight: 700; }
    h2 { font-size: 1.75rem; margin-top: 3rem; margin-bottom: 1.5rem; }
    h3 { font-size: 1.25rem; }
    
    p { margin: 1.25em 0; color: var(--text-muted); font-size: 1rem; }
    
    a { color: var(--primary); text-decoration: none; transition: 0.2s; }
    a:hover { color: #79c0ff; }

    .hero { margin-bottom: 5rem; }
    .hero p { font-size: 1.25rem; max-width: 650px; line-height: 1.5; }

    /* Grouping */
    .project-section { margin-bottom: 4rem; }
    .project-section-title { font-family: var(--mono); text-transform: uppercase; font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.1em; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 2rem; }

    /* Grid & Cards */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    
    .project-card { 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      padding: 1.5rem; 
      display: flex; 
      flex-direction: column; 
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      height: 100%;
    }
    
    .project-card:hover { 
      border-color: #8b949e; 
      background: var(--hover-bg);
    }
    
    .project-title { font-size: 1.15rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--primary); }
    .project-card:hover .project-title { text-decoration: underline; }
    
    .project-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; flex-grow: 1; line-height: 1.6; }
    
    .project-footer { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; margin-top: auto; }
    .project-links { display: flex; gap: 1rem; }
    .project-links a { color: var(--text-muted); }
    .project-links a:hover { color: var(--primary); }

    .badge { 
      display: inline-flex; 
      align-items: center; 
      padding: 0 0.5rem; 
      border-radius: 2rem; 
      font-size: 0.75rem; 
      font-weight: 500; 
      height: 20px;
      line-height: 1;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    
    .status-active .status-dot { background: var(--success); box-shadow: 0 0 0 4px rgba(63, 185, 80, 0.1); }
    .status-archived .status-dot { background: var(--archive); }

    .tag { 
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(48, 54, 61, 0.5);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }

    @media (max-width: 640px) {
      header.site-header { padding: 2rem 0; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
      h1 { font-size: 2rem; }
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Archipelago</a>
      <nav>
        <a href="{{ base_url }}/" class="active">Ecosystem</a>
        <a href="{{ base_url }}/about/">Company</a>
        <a href="https://github.com/example/archipelago">Source</a>
      </nav>
    </header>
