{% include "header.html" %}
<main class="site-main">
  <article class="single-page">
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </header>
    
    <div class="page-content">
      {{ page.content }}
    </div>
  </article>
</main>

<style>
  .single-page { max-width: 700px; margin: 0 auto; }
  .page-header { margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
  .page-title { font-size: 3rem; margin-bottom: 0.5rem; }
  .page-description { font-size: 1.25rem; color: var(--text-muted); }
  .page-content { line-height: 1.8; font-size: 1.1rem; }
  .page-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-top: 3rem; }
  .page-content code { font-family: var(--mono); background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
  .page-content pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
  .page-content pre code { background: none; padding: 0; }
</style>

{% include "footer.html" %}
