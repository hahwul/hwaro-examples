<div class="alert alert-{{ type | default(value='info') }}" style="padding: 1rem; border: 1px solid var(--border); background-color: var(--bg-subtle); border-left: 4px solid var(--primary); margin: 1.5rem 0; border-radius: 6px;">
  <strong style="color: var(--text); font-family: var(--mono); font-size: 0.85rem; text-transform: uppercase; display: block; margin-bottom: 0.25rem;">{{ type | default(value='info') }}:</strong>
  <div style="color: var(--text-muted); font-size: 0.95rem;">
    {{ body | markdown }}
  </div>
</div>
