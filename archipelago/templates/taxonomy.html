{% include "header.html" %}
<main class="site-main">
  <header class="section-header">
    <h1 class="section-title">Tags</h1>
  </header>

  <div class="taxonomy-list" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
    {% for term in terms %}
      <a href="{{ term.permalink }}" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-subtle); color: var(--primary); font-family: var(--mono);">
        {{ term.name }} <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 0.5rem;">({{ term.pages | length }})</span>
      </a>
    {% endfor %}
  </div>
</main>

<style>
  .section-header { margin-bottom: 3rem; }
  .section-title { font-size: 2.5rem; margin-bottom: 0.5rem; }
</style>
