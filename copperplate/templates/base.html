<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="page-border">
        <div class="inner-border">
            <header>
                <div class="header-flourish">C.E.</div>
                <h1>{{ site.title }}</h1>
                <div class="header-flourish">C.E.</div>
            </header>

            <main>
                {% block content %}{% endblock content %}
            </main>

            <footer>
                <div class="wax-seal">
                    <div class="seal-inner">C</div>
                </div>
                <p>Est. 2024 — Fine Typography</p>
                <p class="author-credits">Artistic Curation by {{ site.title }}</p>
            </footer>
        </div>
    </div>
</body>
</html>
