<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --vertigo-black: #050505;
      --spiral-red: #ff0033;
      --dizzy-white: #f0f0f0;
      --vortex-purple: #4b0082;
      --scroll: 0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--vertigo-black);
      color: var(--dizzy-white);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      min-height: 400vh;
    }

    .vertigo-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--vortex-purple) 0%, var(--vertigo-black) 70%);
    }

    .spiral-container {
      position: absolute;
      width: 200vmax;
      height: 200vmax;
      background-image:
        repeating-conic-gradient(
          from 0deg,
          transparent 0deg 15deg,
          var(--spiral-red) 15deg 30deg
        );
      mask-image: radial-gradient(circle, transparent 20%, black 70%);
      -webkit-mask-image: radial-gradient(circle, transparent 20%, black 70%);
      animation: rotate-spiral 20s linear infinite;
      opacity: 0.15;
    }

    @keyframes rotate-spiral {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .dolly-zoom-viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      perspective: calc(2000px - (var(--scroll) * 1800px));
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .dolly-zoom-content {
      transform-style: preserve-3d;
      transform:
        translateZ(calc(var(--scroll) * 800px))
        scale(calc(1 - (var(--scroll) * 0.7)))
        rotate(calc(var(--scroll) * 30deg));
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      text-align: center;
      width: 100%;
    }

    .site-nav {
      position: fixed;
      top: 2rem;
      left: 2rem;
      right: 2rem;
      display: flex;
      justify-content: space-between;
      z-index: 100;
      mix-blend-mode: difference;
    }

    .site-nav a {
      color: var(--dizzy-white);
      text-decoration: none;
      font-family: 'Syncopate', sans-serif;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.2em;
      font-size: 0.8rem;
    }

    .sections-container {
      position: relative;
      z-index: 5;
    }

    .v-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .vertigo-title {
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--spiral-red);
      text-shadow:
        3px 3px 0 var(--vortex-purple),
        -3px -3px 0 var(--vertigo-black);
      margin-bottom: 2rem;
      font-weight: 700;
    }

    .vertigo-subtitle {
      font-size: 1.2rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      opacity: 0.8;
      font-family: 'Syncopate', sans-serif;
    }

    .distortion-card {
      background: rgba(5, 5, 5, 0.8);
      border: 2px solid var(--spiral-red);
      padding: 4rem;
      max-width: 800px;
      box-shadow: 20px 20px 0 var(--vortex-purple);
      transform: skew(-5deg) rotate(-2deg);
      transition: all 0.5s ease;
    }

    .distortion-card:hover {
      transform: skew(0deg) rotate(0deg);
      box-shadow: 0 0 50px var(--spiral-red);
    }

    .distortion-card h2 {
      font-family: 'Syncopate', sans-serif;
      font-size: 2rem;
      color: var(--spiral-red);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .distortion-card p {
      font-size: 1.1rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      font-family: 'Syncopate', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .site-footer {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--vertigo-black);
      border-top: 1px solid var(--vortex-purple);
      text-align: center;
    }

    .footer-text {
      font-family: 'Syncopate', sans-serif;
      font-size: 4rem;
      color: var(--vortex-purple);
      opacity: 0.5;
    }

    /* Scroll progress indicator */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: var(--spiral-red);
      width: calc(var(--scroll) * 100%);
      z-index: 1000;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="progress-bar"></div>
  <nav class="site-nav">
    <a href="{{ base_url }}/" class="logo">Vertigo</a>
    <div>
      <a href="#vortex">The Vortex</a>
    </div>
  </nav>

  <div class="vertigo-bg">
    <div class="spiral-container"></div>
  </div>

  <div class="dolly-zoom-viewport">
    <div class="dolly-zoom-content">
