<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald: #2d7d46;
      --emerald-dark: #1f5c32;
      --gold: #c4a35a;
      --gold-light: #d4b76e;
      --sand: #f5e6c8;
      --sand-light: #faf6ef;
      --sand-dark: #e8d5ab;
      --text: #3a3226;
      --text-muted: #7a6f60;
      --border: #e0d5c3;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Lora', Georgia, serif;
      line-height: 1.8;
      margin: 0;
      color: var(--text);
      background: var(--sand-light);
    }

    /* Palm tree silhouette decorations */
    body::before {
      content: '';
      position: fixed;
      top: -40px;
      right: -30px;
      width: 10px;
      height: 180px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      background: var(--emerald-dark);
      transform: translateX(95px) translateY(120px);
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20px;
      left: -40px;
      width: 8px;
      height: 160px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      background: var(--emerald-dark);
      transform: translateX(85px) translateY(-100px);
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 3rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--emerald);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .site-logo:hover {
      color: var(--emerald-dark);
    }

    /* Palm accent next to logo */
    .site-logo::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 10px;
      vertical-align: middle;
      border-radius: 50% 0 50% 50%;
      background: var(--emerald);
      opacity: 0.3;
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .site-header nav a:hover {
      color: var(--emerald);
    }

    .site-main {
      min-height: calc(100vh - 280px);
      padding-bottom: 2rem;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 0.6em;
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 2.4rem;
      margin-top: 0;
      letter-spacing: 0.01em;
    }

    h2 {
      font-size: 1.7rem;
      color: var(--emerald-dark);
    }

    h3 {
      font-size: 1.3rem;
    }

    p {
      margin: 1.2em 0;
    }

    a {
      color: var(--emerald);
      text-decoration: none;
    }

    a:hover {
      color: var(--emerald-dark);
      text-decoration: underline;
    }

    blockquote {
      border-left: 3px solid var(--gold);
      margin: 2em 0;
      padding: 0.8em 1.5em;
      background: var(--sand);
      font-style: italic;
      color: var(--text-muted);
    }

    code {
      background: var(--sand);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    }

    pre {
      background: var(--sand);
      padding: 1.2rem;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    pre code {
      background: none;
      padding: 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* Post cards */
    .post-grid {
      display: grid;
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .post-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem 2.2rem;
      box-shadow: 0 2px 8px rgba(58, 50, 38, 0.06);
      transition: box-shadow 0.2s ease;
    }

    .post-card:hover {
      box-shadow: 0 4px 16px rgba(58, 50, 38, 0.1);
    }

    .post-card h3 {
      font-size: 1.4rem;
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

    .post-card h3 a {
      color: var(--text);
    }

    .post-card h3 a:hover {
      color: var(--emerald);
      text-decoration: none;
    }

    .post-excerpt {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin: 0.5rem 0;
      line-height: 1.7;
    }

    .post-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }

    .post-tags {
      margin-top: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .post-tags a {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      background: var(--sand);
      color: var(--emerald);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
    }

    .post-tags a:hover {
      background: var(--emerald);
      color: var(--white);
      text-decoration: none;
    }

    /* Page content card */
    .page-content {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem 3.5rem;
      box-shadow: 0 2px 8px rgba(58, 50, 38, 0.06);
    }

    /* Section header */
    .section-intro {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .section-intro h1 {
      color: var(--emerald);
    }

    .section-intro p {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 560px;
      margin: 0.5rem auto 0;
    }

    /* Palm divider */
    .palm-divider {
      text-align: center;
      margin: 3rem 0;
      position: relative;
    }

    .palm-divider::before {
      content: '';
      display: inline-block;
      width: 40px;
      height: 2px;
      background: var(--gold);
      vertical-align: middle;
    }

    .palm-divider::after {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--emerald);
      border-radius: 50%;
      margin: 0 12px;
      vertical-align: middle;
    }

    /* Taxonomy list */
    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    ul.section-list li {
      margin-bottom: 0.6rem;
      padding: 0.8rem 1.2rem;
      background: var(--white);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    ul.section-list li a {
      font-weight: 500;
      color: var(--emerald);
    }

    ul.section-list li a:hover {
      color: var(--emerald-dark);
    }

    /* Pagination */
    nav.pagination {
      margin: 2.5rem 0;
      text-align: center;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav.pagination a:hover {
      color: var(--emerald);
      border-color: var(--emerald);
      text-decoration: none;
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--emerald);
      background: var(--emerald);
      color: var(--white);
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Page date */
    .page-date {
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 1.5rem;
      letter-spacing: 0.03em;
    }

    /* 404 */
    .not-found {
      text-align: center;
      padding: 4rem 0;
    }

    .not-found h1 {
      font-size: 3rem;
      color: var(--gold);
    }

    .not-found p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .not-found a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.7rem 2rem;
      background: var(--emerald);
      color: var(--white);
      border-radius: 6px;
      font-weight: 500;
      text-decoration: none;
    }

    .not-found a:hover {
      background: var(--emerald-dark);
      text-decoration: none;
    }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    .site-footer a {
      color: var(--gold);
    }

    .site-footer a:hover {
      color: var(--emerald);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-wrapper {
        padding: 0 1.5rem;
      }

      .site-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
        padding: 1.5rem 0;
        margin-bottom: 2rem;
      }

      .site-header nav {
        gap: 1.2rem;
      }

      h1 {
        font-size: 1.8rem;
      }

      .page-content {
        padding: 2rem 1.5rem;
      }

      .post-card {
        padding: 1.5rem;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
