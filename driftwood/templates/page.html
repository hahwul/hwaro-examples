{% include "header.html" %}

  <article class="page-article">
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </header>

    <div class="page-content prose">
      {{ content | safe }}
    </div>
  </article>
