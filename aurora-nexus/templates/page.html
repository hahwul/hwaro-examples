{% include "header.html" %}

<article class="glass-panel">
    {% if page is defined and page.title %}
    <header class="hero">
        <h1>{{ page.title }}</h1>
        {% if page.description is defined and page.description %}
        <p>{{ page.description }}</p>
        {% endif %}
    </header>
    {% endif %}

    <div class="content">
        {% if content is defined and content %}
            {{ content | safe }}
        {% endif %}
    </div>
</article>

{% include "footer.html" %}
