{% extends "base.html" %}

{% block content %}
<div class="page-content">
  <h1>{{ page.title | e }}</h1>
  {{ content | safe }}
  <ul class="section-list">
    {% for page in section.pages %}
      <li><a href="{{ page.url }}">{{ page.title | e }}</a></li>
    {% endfor %}
  </ul>
  {{ pagination | safe }}
</div>
{% endblock %}
