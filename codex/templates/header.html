<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}

  <!-- Fonts: UnifrakturMaguntia (blackletter) + Crimson Pro (body) + IM Fell English SC (small caps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

  <!-- RSS -->
  <link href="{{ base_url }}/atom.xml" type="application/atom+xml" rel="alternate" title="ATOM Feed">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <!-- Manuscript Border Frame -->
  <div class="manuscript-frame">

    <!-- Colophon (Header) -->
    <header class="colophon">
      <div class="colophon-ornament">&#x2767;</div>
      <h1><a href="{{ base_url }}/" class="colophon-title">{{ site.title }}</a></h1>
      <p class="colophon-subtitle">{{ site.description }}</p>
      <nav class="chapter-nav">
        <a href="{{ base_url }}/">Frontispiece</a>
        <span class="nav-separator">&#x2022;</span>
        <a href="{{ base_url }}/chapters/">Chapters</a>
        <span class="nav-separator">&#x2022;</span>
        <a href="{{ base_url }}/tags/">Index</a>
        <span class="nav-separator">&#x2022;</span>
        <a href="{{ base_url }}/about/">Colophon</a>
      </nav>
      <div class="colophon-rule"></div>
    </header>

    <!-- Main -->
    <div class="scriptorium">
      <main>
