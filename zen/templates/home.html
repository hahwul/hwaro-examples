{% include "header.html" %}

  <main class="wrapper">
    <div class="home-intro">
      {{ content }}
    </div>

    <p class="section-heading">Recent writing</p>

    <div class="post-list">
      {% for item in site.pages | sort_by("date", reverse=true) %}
      {% if item.section == "posts" %}
      <article class="post-entry">
        <a href="{{ base_url }}{{ item.url }}">
          <h2 class="entry-title">{{ item.title }}</h2>
          <div class="entry-meta">
            {% if item.date %}{{ item.date }}{% endif %}
          </div>
        </a>
      </article>
      {% endif %}
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
