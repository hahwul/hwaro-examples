{% include "header.html" %}

  <main class="page-main">
    <article class="page-article">
      <header class="page-header">
        <h1 class="page-title glitch-text" data-text="{{ page.title }}">{{ page.title }}</h1>
        {% if page.date %}
        <time class="page-date">{{ page.date }}</time>
        {% endif %}
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
        {% if page.tags %}
        <div class="page-tags">
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </header>
      <div class="rift-divider-sm">
        <div class="crack-line"></div>
      </div>
      <div class="page-content">
        {{ content | safe }}
      </div>
    </article>
  </main>

{% include "footer.html" %}
