{% include "header.html" %}

  <main class="section-main">
    <header class="section-header">
      <h1 class="section-title glitch-text" data-text="{{ section.title }}">{{ section.title }}</h1>
      <div class="section-desc">{{ content | safe }}</div>
    </header>

    <div class="rift-divider-sm">
      <div class="crack-line"></div>
    </div>

    <div class="works-grid">
      {% for page in section.pages %}
      <a href="{{ base_url }}{{ page.url }}" class="work-card">
        <div class="work-card-inner">
          <div class="work-card-dimension"></div>
          <div class="work-card-content">
            <h3 class="work-card-title">{{ page.title }}</h3>
            <p class="work-card-desc">{{ page.description }}</p>
            {% if page.date %}
            <span class="work-card-date">{{ page.date }}</span>
            {% endif %}
          </div>
        </div>
      </a>
      {% endfor %}
    </div>

    {{ pagination }}
  </main>

{% include "footer.html" %}
