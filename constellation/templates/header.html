<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0e1a;
      --navy-light: #111729;
      --navy-mid: #161d30;
      --white: #e8ecf1;
      --white-dim: #a0a8b8;
      --gold: #d4a855;
      --gold-dim: #b8933f;
      --border: #1e2740;
      --border-light: #2a3452;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.7;
      color: var(--white);
      background: var(--navy);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Star field is rendered via the SVG constellation-bg element below */

    /* -- Constellation SVG lines (animated) -- */
    .constellation-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
    }
    .constellation-bg line {
      stroke: var(--gold);
      stroke-width: 1;
      animation: constellation-pulse 8s ease-in-out infinite alternate;
    }
    .constellation-bg line:nth-child(2n) { animation-delay: -2s; }
    .constellation-bg line:nth-child(3n) { animation-delay: -4s; }
    .constellation-bg line:nth-child(4n) { animation-delay: -6s; }
    .constellation-bg circle {
      fill: var(--white);
      animation: star-twinkle 5s ease-in-out infinite alternate;
    }
    .constellation-bg circle:nth-child(2n) { animation-delay: -1.5s; }
    .constellation-bg circle:nth-child(3n) { animation-delay: -3s; }

    @keyframes constellation-pulse {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    @keyframes star-twinkle {
      0% { opacity: 0.4; r: 1.5; }
      100% { opacity: 1; r: 2.5; }
    }

    /* -- Layout -- */
    .site-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* -- Header -- */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .site-logo span {
      color: var(--gold);
    }
    .site-logo:hover {
      color: var(--gold);
    }
    .site-header nav {
      display: flex;
      gap: 1.75rem;
    }
    .site-header nav a {
      color: var(--white-dim);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .site-header nav a:hover {
      color: var(--gold);
    }

    /* -- Main -- */
    .site-main {
      min-height: calc(100vh - 220px);
      padding-bottom: 2rem;
    }

    /* -- Footer -- */
    .site-footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      color: var(--white-dim);
      font-size: 0.8rem;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .site-footer a {
      color: var(--gold-dim);
      text-decoration: none;
    }
    .site-footer a:hover {
      color: var(--gold);
    }

    /* -- Typography -- */
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.25;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      color: var(--white);
    }
    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.5rem; color: var(--gold); }
    h3 { font-size: 1.15rem; }
    p { margin: 1em 0; color: var(--white-dim); }
    a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--white); }
    strong { color: var(--white); }
    em { color: var(--white-dim); }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    blockquote {
      border-left: 3px solid var(--gold);
      margin: 1.5em 0;
      padding: 0.75em 1.25em;
      background: var(--navy-light);
      color: var(--white-dim);
    }
    ul, ol { color: var(--white-dim); padding-left: 1.5em; }
    li { margin: 0.4em 0; }

    code {
      background: var(--navy-light);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--gold);
    }
    pre {
      background: var(--navy-light);
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--white-dim);
    }

    /* -- Page title area -- */
    .page-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      margin-bottom: 0.25rem;
    }
    .page-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--white-dim);
      letter-spacing: 0.05em;
    }

    /* -- Celestial metadata card -- */
    .celestial-meta {
      display: flex;
      gap: 1px;
      margin: 1.5rem 0 2rem;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .celestial-meta-item {
      flex: 1;
      background: var(--navy-light);
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .celestial-meta-label {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }
    .celestial-meta-value {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--white);
      font-weight: 500;
    }

    /* -- Post cards for section listing -- */
    .post-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .post-card {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      transition: border-color 0.25s;
    }
    .post-card:hover {
      border-color: var(--gold-dim);
    }
    .post-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .post-card-title a {
      color: var(--white);
      text-decoration: none;
    }
    .post-card-title a:hover {
      color: var(--gold);
    }
    .post-card-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--white-dim);
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    .post-card-desc {
      font-size: 0.9rem;
      color: var(--white-dim);
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }
    .post-card-meta {
      display: flex;
      gap: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--white-dim);
    }
    .post-card-meta span {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .post-card-meta .meta-label {
      color: var(--gold-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* -- Section list (for taxonomy pages) -- */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }
    ul.section-list li {
      margin-bottom: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--navy-light);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    ul.section-list li a {
      font-weight: 500;
      color: var(--white);
    }
    ul.section-list li a:hover {
      color: var(--gold);
    }

    /* -- Taxonomy pages -- */
    .taxonomy-desc {
      color: var(--white-dim);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    /* -- Pagination -- */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.3rem 0.65rem; border-radius: 4px; border: 1px solid var(--border); color: var(--white-dim); text-decoration: none; font-size: 0.85rem; }
    nav.pagination a:hover { color: var(--gold); border-color: var(--gold-dim); }
    .pagination-current span { display: inline-block; padding: 0.3rem 0.65rem; border-radius: 4px; border: 1px solid var(--gold); background: var(--navy-mid); color: var(--gold); font-size: 0.85rem; }
    .pagination-disabled span { display: inline-block; padding: 0.3rem 0.65rem; border-radius: 4px; border: 1px solid var(--border); color: var(--white-dim); opacity: 0.4; font-size: 0.85rem; }

    /* -- Home page hero -- */
    .hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    .hero h1 {
      font-size: 2.5rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .hero h1 span {
      color: var(--gold);
    }
    .hero p {
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0.5rem auto 0;
    }
    .section-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* -- 404 -- */
    .error-page {
      text-align: center;
      padding: 4rem 0;
    }
    .error-page h1 {
      font-size: 4rem;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }
    .error-page p {
      font-size: 1.05rem;
    }

    /* -- Responsive -- */
    @media (max-width: 640px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1.25rem; }
      .hero h1 { font-size: 1.75rem; }
      .celestial-meta { flex-direction: column; }
      .post-card-meta { flex-wrap: wrap; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
