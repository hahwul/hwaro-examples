<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxonomy | {{ config.title | default(value='Constellation') }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
</head>
<body>
    <div class="container">
        {% include "header.html" %}

        <main>
            <h1>{{ taxonomy.name | capitalize }}</h1>

            <div class="post-tags">
                {% for term in terms %}
                <a href="{{ term.permalink }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
                {% endfor %}
            </div>
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
