<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | {{ config.title | default(value='Constellation') }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
</head>
<body>
    <div class="container">
        {% include "header.html" %}
        
        <main>
            <h1>Search the Catalog</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Enter star, constellation, or coordinates...">
            </div>
            <ul id="search-results" class="post-list" style="margin-top: 2rem;"></ul>
        </main>
        
        {% include "footer.html" %}
    </div>
</body>
</html>
