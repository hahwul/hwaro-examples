<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ term.name }} | {{ config.title | default(value='Constellation') }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
</head>
<body>
    <div class="container">
        {% include "header.html" %}

        <main>
            <h1>Items tagged with "{{ term.name }}"</h1>

            <ul class="post-list">
            {% for post in term.pages %}
                <li class="post-item">
                    <h3 class="post-title"><a href="{{ post.permalink }}">{{ post.title }}</a></h3>
                    <time class="post-date">{{ post.date | date(format="%B %d, %Y") }}</time>
                    <p>{{ post.description }}</p>
                </li>
            {% endfor %}
            </ul>
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
