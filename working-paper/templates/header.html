<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="draft-banner">
    <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" class="draft-icon" aria-hidden="true">
      <rect x="2" y="2" width="16" height="16" fill="none" stroke="#b85c1a" stroke-width="1.5"/>
      <line x1="5" y1="6" x2="15" y2="6" stroke="#b85c1a" stroke-width="1"/>
      <line x1="5" y1="10" x2="15" y2="10" stroke="#b85c1a" stroke-width="1"/>
      <line x1="5" y1="14" x2="11" y2="14" stroke="#b85c1a" stroke-width="1"/>
    </svg>
    <span class="draft-label">DRAFT v0.3</span>
    <span class="draft-date">Last updated 2026-04-10 -- Not for citation</span>
  </div>
  <div class="paper-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Paper home">
        <svg viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Construction scaffolding icon -->
          <rect x="8" y="6" width="48" height="28" fill="none" stroke="#d4782a" stroke-width="1.5" stroke-dasharray="4 3"/>
          <line x1="8" y1="20" x2="56" y2="20" stroke="#d4782a" stroke-width="0.8"/>
          <line x1="20" y1="6" x2="20" y2="34" stroke="#d4782a" stroke-width="0.8"/>
          <line x1="44" y1="6" x2="44" y2="34" stroke="#d4782a" stroke-width="0.8"/>
          <rect x="12" y="10" width="6" height="6" fill="#2a5a3c" opacity="0.6"/>
          <rect x="24" y="10" width="6" height="6" fill="#2a5a3c" opacity="0.6"/>
          <rect x="36" y="10" width="6" height="6" fill="#d4782a" opacity="0.4"/>
          <rect x="48" y="10" width="6" height="6" fill="none" stroke="#d4782a" stroke-width="0.8" stroke-dasharray="2 1"/>
        </svg>
        <span class="logo-text">
          <span class="journal-name">Working Paper Series</span>
          <span class="journal-sub">WP-2026-04 &middot; AI Ethics Lab</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">ABSTRACT</a>
        <a href="{{ base_url }}/sections/">SECTIONS</a>
        <a href="{{ base_url }}/revisions/">REVISIONS</a>
        <a href="{{ base_url }}/todos/">TODO LIST</a>
        <a href="{{ base_url }}/appendix/">APPENDIX</a>
      </nav>
    </header>
