<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;700;900&family=Fira+Mono:wght@400;500;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="chase-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Chase Frame home">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Miniature chase frame with locked type -->
          <rect x="4" y="4" width="52" height="52" fill="none" stroke="#c7c0b3" stroke-width="3"/>
          <rect x="9" y="9" width="42" height="42" fill="none" stroke="#c7c0b3" stroke-width="1"/>
          <!-- Furniture blocks -->
          <rect x="12" y="12" width="12" height="8" fill="#5a4a38" stroke="#9a8968" stroke-width="0.7"/>
          <rect x="36" y="12" width="12" height="8" fill="#5a4a38" stroke="#9a8968" stroke-width="0.7"/>
          <!-- Type block (center) -->
          <rect x="20" y="22" width="20" height="18" fill="#f2ede0" stroke="#2a2420" stroke-width="1"/>
          <text x="30" y="35" text-anchor="middle" font-family="Roboto Slab, serif" font-weight="900" font-size="11" fill="#2a2420">C</text>
          <!-- Quoin wedge -->
          <polygon points="44,22 52,22 50,40 44,40" fill="#c9a374" stroke="#8a6535" stroke-width="0.7"/>
          <!-- Furniture bottom -->
          <rect x="12" y="42" width="36" height="8" fill="#5a4a38" stroke="#9a8968" stroke-width="0.7"/>
        </svg>
        <span class="logo-text">
          <span class="logo-main">CHASE FRAME</span>
          <span class="logo-sub">Type &middot; Locked &middot; For &middot; Press</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">FORME</a>
        <a href="{{ base_url }}/galleries/">GALLEY</a>
        <a href="{{ base_url }}/specimen/">SPECIMEN</a>
        <a href="{{ base_url }}/presswork/">PRESSWORK</a>
      </nav>
    </header>
