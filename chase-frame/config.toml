# =============================================================================
# Chase Frame - Locked Type Publication
# Issue #1569 | Tags: book, dark, letterpress, mechanical, craft
# =============================================================================

title = "Chase Frame"
description = "A locked-type publication -- heavy slab typography held in a letterpress chase frame by iron quoins and wooden furniture. Mechanical precision; the page as a locked form."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
