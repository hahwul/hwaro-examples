{% include "header.html" %}

<article class="content">
    <header style="margin-bottom: 3rem;">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
            <div class="post-meta">{{ page.date | date(format="%Y.%m.%d") }}</div>
        {% endif %}
    </header>

    {{ content | safe }}

    <div class="decor-line"></div>
</article>
