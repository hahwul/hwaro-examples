<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(value=site.title) }}</title>
    <style>
        /*
        Radiolaria Theme
        Bold, creative, and elegant.
        Skeletal geometric structures, solid colors, typography. No gradients. No emojis.
        */

        :root {
            --bg-color: #0d131a; /* Deep sea blue-black */
            --text-color: #d1e2eb; /* Pale icy blue */
            --accent: #ff3366; /* Vibrant coral red */
            --border: rgba(209, 226, 235, 0.15); /* Faint structural lines */
            --struct-thick: rgba(209, 226, 235, 0.8);
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-display: 'Didot', 'Bodoni MT', 'Times New Roman', serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M0 40 L40 40 L40 0" fill="none" stroke="rgba(209,226,235,0.08)" stroke-width="1"/></svg>');
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Large structural background elements using SVG data URIs to mimic radiolarian skeletons */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="80" fill="none" stroke="rgba(209,226,235,0.05)" stroke-width="2"/><circle cx="100" cy="100" r="60" fill="none" stroke="rgba(209,226,235,0.03)" stroke-width="1"/><polygon points="100,20 169,60 169,140 100,180 31,140 31,60" fill="none" stroke="rgba(209,226,235,0.04)" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-position: center;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            flex-grow: 1;
            position: relative;
        }

        /* Header / Logo */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--struct-thick);
            margin-bottom: 4rem;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: normal;
            color: var(--text-color);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: -10px;
            width: calc(100% + 20px);
            height: 1px;
            background-color: var(--accent);
            z-index: -1;
            transform: rotate(-2deg);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-left: 2rem;
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
        }

        nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Typography */
        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: normal;
            margin-top: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 4rem;
            line-height: 1.1;
            border-left: 10px solid var(--accent);
            padding-left: 2rem;
            margin-left: -2rem;
        }

        h2 {
            font-size: 2.5rem;
            border-bottom: 1px solid var(--struct-thick);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Structural Content Blocks */
        .post-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-item {
            border: 1px solid var(--border);
            padding: 2rem;
            position: relative;
            background-color: rgba(13, 19, 26, 0.8);
            transition: transform 0.3s ease;
        }

        .post-item::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        .post-item::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            background-color: var(--text-color);
            border-radius: 50%;
        }

        .post-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .post-title {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: var(--text-color);
        }

        .post-meta {
            font-size: 0.8rem;
            color: rgba(209, 226, 235, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .content {
            font-size: 1.1rem;
            max-width: 800px;
        }

        .content img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--accent);
            padding: 10px;
            background-color: var(--bg-color);
        }

        blockquote {
            border-left: 1px solid var(--accent);
            border-right: 1px solid var(--accent);
            margin: 2rem 0;
            padding: 1rem 2rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-style: italic;
            text-align: center;
        }

        code {
            background-color: rgba(209, 226, 235, 0.1);
            padding: 0.2rem 0.4rem;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid var(--border);
        }

        pre {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            overflow-x: auto;
            border: 1px solid var(--struct-thick);
            border-left: 5px solid var(--accent);
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border: none;
        }

        /* Abstract structural decor in post */
        .decor-line {
            width: 100%;
            height: 1px;
            background-color: var(--border);
            margin: 4rem 0;
            position: relative;
        }

        .decor-line::after {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent);
            background-color: var(--bg-color);
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="{{ base_url }}" class="logo">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/posts">Index</a>
                <a href="{{ base_url }}/about">Thesis</a>
            </nav>
        </header>
