title = "Cauldron"
description = "A witch's compendium of potions, ingredients, and arcane recipes"
base_url = "http://localhost:3000"
tags = ["dark", "wiki", "fantasy", "potion"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "base16-ocean.dark"
use_cdn = true

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[[taxonomies]]
name = "authors"

[sitemap]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
