{% extends "base.html" %}

{% block content %}
<article class="single-page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
        </div>
        {% endif %}
        <div class="header-divider"></div>
    </header>
    
    <div class="page-content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
