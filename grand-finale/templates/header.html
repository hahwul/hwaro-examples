<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Cabin:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

<div class="streamers" aria-hidden="true">
  <svg viewBox="0 0 1600 240" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Cascading ribbons -->
    <g stroke-width="8" fill="none" stroke-linecap="round">
      <path d="M60 0 C 80 60, 30 110, 90 180 S 110 240, 130 240" stroke="#E63946"/>
      <path d="M180 0 C 220 40, 160 120, 240 200 S 260 240, 280 240" stroke="#FFC300"/>
      <path d="M320 0 C 300 80, 380 130, 340 240" stroke="#2A9D8F"/>
      <path d="M460 0 C 500 70, 420 160, 480 240" stroke="#457B9D"/>
      <path d="M600 0 C 580 80, 650 140, 580 240" stroke="#E63946"/>
      <path d="M760 0 C 800 90, 720 160, 770 240" stroke="#FFC300"/>
      <path d="M900 0 C 860 100, 940 170, 880 240" stroke="#2A9D8F"/>
      <path d="M1060 0 C 1100 70, 1020 160, 1080 240" stroke="#E63946"/>
      <path d="M1200 0 C 1180 90, 1260 140, 1200 240" stroke="#FFC300"/>
      <path d="M1340 0 C 1380 80, 1300 160, 1360 240" stroke="#457B9D"/>
      <path d="M1480 0 C 1440 70, 1520 150, 1470 240" stroke="#E63946"/>
      <path d="M1560 0 C 1590 80, 1530 160, 1580 240" stroke="#2A9D8F"/>
    </g>
    <!-- Confetti scattered -->
    <g>
      <rect x="120"  y="40"  width="12" height="4" fill="#FFC300" transform="rotate(18 126 42)"/>
      <rect x="240"  y="90"  width="14" height="4" fill="#E63946" transform="rotate(-30 247 92)"/>
      <rect x="400"  y="30"  width="10" height="4" fill="#2A9D8F" transform="rotate(55 405 32)"/>
      <rect x="540"  y="140" width="12" height="4" fill="#FFFBF0" transform="rotate(-15 546 142)"/>
      <rect x="700"  y="50"  width="14" height="4" fill="#FFC300" transform="rotate(70 707 52)"/>
      <rect x="860"  y="180" width="12" height="4" fill="#E63946" transform="rotate(-40 866 182)"/>
      <rect x="1020" y="70"  width="10" height="4" fill="#457B9D" transform="rotate(30 1025 72)"/>
      <rect x="1160" y="130" width="12" height="4" fill="#FFC300" transform="rotate(-60 1166 132)"/>
      <rect x="1320" y="40"  width="14" height="4" fill="#2A9D8F" transform="rotate(25 1327 42)"/>
      <rect x="1480" y="110" width="12" height="4" fill="#E63946" transform="rotate(-20 1486 112)"/>
      <circle cx="80"   cy="150" r="4" fill="#FFFBF0"/>
      <circle cx="350"  cy="170" r="5" fill="#FFC300"/>
      <circle cx="580"  cy="80"  r="4" fill="#E63946"/>
      <circle cx="780"  cy="160" r="5" fill="#2A9D8F"/>
      <circle cx="1100" cy="50"  r="4" fill="#FFFBF0"/>
      <circle cx="1280" cy="180" r="5" fill="#FFC300"/>
      <circle cx="1420" cy="90"  r="4" fill="#E63946"/>
    </g>
  </svg>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="{{ base_url }}/" class="brand">
      <span class="mark" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#FFC300" stroke-width="2">
            <line x1="18" y1="2"  x2="18" y2="34"/>
            <line x1="2"  y1="18" x2="34" y2="18"/>
            <line x1="5"  y1="5"  x2="31" y2="31"/>
            <line x1="31" y1="5"  x2="5"  y2="31"/>
            <line x1="18" y1="9"  x2="27" y2="18"/>
            <line x1="18" y1="9"  x2="9"  y2="18"/>
            <line x1="18" y1="27" x2="27" y2="18"/>
            <line x1="18" y1="27" x2="9"  y2="18"/>
          </g>
        </svg>
      </span>
      <span>Grand Finale</span>
    </a>
    <nav class="topnav">
      <a href="{{ base_url }}/">Overview</a>
      <a href="{{ base_url }}/programme/">Programme</a>
      <a href="{{ base_url }}/nights/">Nights</a>
      <a href="{{ base_url }}/dispatch/">Dispatch</a>
      <a href="{{ base_url }}/tickets/" class="cta">Final Tickets</a>
    </nav>
  </div>
</header>
