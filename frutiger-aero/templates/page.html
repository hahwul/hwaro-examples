{% include "header.html" %}

<article class="post glass-panel">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            {% if page.date %}
            <span class="date">{{ page.date | date("%Y-%m-%d") }}</span>
            {% endif %}
            {% if page.tags %}
            <div class="tags">
                {% for tag in page.tags %}
                <span class="tag-badge">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </header>

    <div class="post-content">
        {{ page.content | safe }}
    </div>
</article>

{% include "footer.html" %}
