{% extends "base.html" %}

{% block content %}
    <article class="stone-tablet">
        <div class="tablet-header">
            <div class="frieze-pattern"></div>
            <h1>{{ page.title }}</h1>
            {% if page.date %}
            <div class="tablet-date">{{ page.date | date(format="%B %d, %Y") }}</div>
            {% endif %}
        </div>

        <div class="tablet-content">
            {{ content | safe }}
        </div>

        <div class="tablet-footer">
            <div class="frieze-pattern"></div>
        </div>
    </article>
{% endblock content %}
