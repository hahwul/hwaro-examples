<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Jura:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container header-container">
            <h1 class="site-title"><a href="{{ config.base_url }}">{{ config.title }}</a></h1>
            <nav class="site-nav">
                <a href="{{ config.base_url }}">Temple</a>
                <a href="{{ config.base_url }}/artifacts">Artifacts</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
        <div class="container footer-container">
            <p>&copy; 2024 {{ config.title }}. Carved in stone.</p>
        </div>
    </footer>
</body>
</html>
