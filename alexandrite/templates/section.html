{% include "header.html" %}

  <main class="wrapper page-main">
    <h1 class="section-page-title">{{ page.title }}</h1>

    {{ content | safe }}

    <ul class="posts-list">
      {% for item in section.pages %}
      <li class="post-list-item">
        <a href="{{ base_url }}{{ item.url }}">
          <time class="post-date">{{ item.date }}</time>
          <span class="post-title">{{ item.title }}</span>
          {% if item.description %}
          <span class="post-description">{{ item.description }}</span>
          {% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>

    {{ pagination }}
  </main>

{% include "footer.html" %}
