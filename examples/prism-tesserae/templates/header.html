<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #38bdf8;
      --accent: #c084fc;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* Ambient background glowing orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.3;
      pointer-events: none;
    }
    body::before { top: -20%; left: -10%; background: var(--primary); }
    body::after { bottom: -20%; right: -10%; background: var(--accent); }

    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      box-sizing: border-box;
    }
    .site-header {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .site-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary); }
    .site-main {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 3rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      flex-grow: 1;
    }
    .site-main h1 { margin-top: 0; color: #fff; }
    .site-main a { color: var(--primary); text-decoration: none; }
    .site-main a:hover { text-decoration: underline; }

    .site-footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      margin-top: 3rem;
    }
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.5rem; padding: 0.6rem 0.75rem; background: var(--glass-bg); border-radius: 6px; border: 1px solid var(--glass-border); }
    ul.section-list li a { font-weight: 500; }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
