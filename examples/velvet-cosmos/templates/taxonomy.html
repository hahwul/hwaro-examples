{% extends "base.html" %}

{% block content %}
<div class="glass-panel content-area" style="margin-bottom: 3rem;">
    <h1>{{ taxonomy.name | capitalize }}</h1>
    <p>Explore all terms in the {{ taxonomy.name }} taxonomy.</p>
</div>

<ul class="post-list" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem;">
    {% for term in terms %}
    <li class="glass-panel post-card" style="padding: 1.5rem; text-align: center;">
        <h2 style="font-size: 1.5rem; margin: 0;"><a href="{{ site.base_url }}/{{ taxonomy.name }}/{{ term.name | lower | replace(' ', '-') }}">{{ term.name }}</a></h2>
        <div style="margin-top: 0.5rem; opacity: 0.7;">{{ term.pages | length }} items</div>
    </li>
    {% endfor %}
</ul>
{% endblock %}
