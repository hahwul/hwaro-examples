<!DOCTYPE html>
<html lang="{{ site.language_code | default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description | default('') }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-bg: #0a0212;
            --velvet-deep: #1a052e;
            --velvet-glow: #38115c;
            --accent-pink: #ff3385;
            --accent-cyan: #00e5ff;
            --accent-gold: #ffd700;
            --glass-bg: rgba(30, 10, 50, 0.25);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0d8ea;
            --text-heading: #ffffff;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
            background-color: var(--velvet-bg);
            color: var(--text-main);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 51, 133, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(56, 17, 92, 0.2) 0%, transparent 60%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* Ambient Stars Animation */
        .stars-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration, 4s) ease-in-out infinite alternate;
            opacity: var(--opacity, 0.5);
            box-shadow: 0 0 4px #fff, 0 0 10px var(--accent-cyan);
        }

        @keyframes twinkle {
            0% { transform: scale(0.8); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--text-heading);
            font-weight: 700;
            margin-top: 0;
            letter-spacing: 0.5px;
        }

        a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--accent-pink);
            text-shadow: 0 0 8px rgba(255, 51, 133, 0.5);
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        main {
            flex: 1;
            padding: 4rem 0;
        }

        /* Header Styles */
        header {
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-top: 1rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .site-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-heading);
            background: linear-gradient(to right, #fff, var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 51, 133, 0.3);
            margin: 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* Footer Styles */
        footer {
            padding: 3rem 0;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }

        /* Content Formatting */
        .content-area {
            padding: 3rem;
        }

        .content-area p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .content-area h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-area h2 {
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .content-area ul, .content-area ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content-area li {
            margin-bottom: 0.5rem;
        }

        /* Post List */
        .post-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 2rem;
        }

        .post-card {
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(255, 51, 133, 0.2);
            border-color: rgba(255, 51, 133, 0.3);
        }

        .post-card h2 {
            margin-top: 0;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .post-card h2 a {
            color: var(--text-heading);
        }

        .post-card h2 a:hover {
            color: var(--accent-cyan);
            text-shadow: none;
            -webkit-text-fill-color: initial;
            background: none;
        }

        .post-meta {
            font-size: 0.85rem;
            color: #a090b0;
            margin-bottom: 1rem;
        }

        .read-more {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .read-more:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        /* Tag/Category Links */
        .taxonomies a {
            display: inline-block;
            margin-right: 0.5rem;
            padding: 0.2rem 0.8rem;
            background: rgba(255, 51, 133, 0.1);
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--accent-pink);
            border: 1px solid rgba(255, 51, 133, 0.2);
        }

        .taxonomies a:hover {
            background: rgba(255, 51, 133, 0.2);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            .content-area {
                padding: 2rem 1.5rem;
            }
            .content-area h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars-container"></div>

    <div class="container">
        <header>
            {% include "header.html" %}
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer>
        <div class="container">
            {% include "footer.html" %}
        </div>
    </footer>

    <script>
        // Generate random stars for the background
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('stars-container');
            const starCount = 50;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');

                // Randomize position, size, opacity, and animation duration
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 3 + 1;
                const opacity = Math.random() * 0.7 + 0.1;
                const duration = Math.random() * 3 + 2;

                star.style.left = `${x}vw`;
                star.style.top = `${y}vh`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--opacity', opacity);
                star.style.setProperty('--duration', `${duration}s`);

                // Randomly assign a tint color to some stars
                if (Math.random() > 0.8) {
                    star.style.boxShadow = `0 0 ${size*2}px #ff3385`;
                    star.style.background = '#ffcce0';
                }

                container.appendChild(star);
            }
        });
    </script>
</body>
</html>
