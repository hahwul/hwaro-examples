<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --nm-bg: #e0e5ec;
      --nm-light: #ffffff;
      --nm-dark: #a3b1c6;
      --text: #4a5568;
      --text-muted: #718096;
      --primary: #8b5cf6;
      --accent-1: #3b82f6;
      --accent-2: #10b981;
    }
    *, *::before, *::after { box-sizing: border-box; }
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--nm-bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      position: relative;
      z-index: 0;
      line-height: 1.6;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(120deg, rgba(139,92,246,0.15), rgba(59,130,246,0.15), rgba(16,185,129,0.15));
      background-size: 300% 300%;
      animation: aurora 15s ease infinite;
      z-index: -1;
      pointer-events: none;
    }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
    .site-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 2rem; border-radius: 20px;
      background-color: var(--nm-bg);
      box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
      margin-bottom: 3rem;
    }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); text-decoration: none; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
    nav { display: flex; gap: 1.5rem; }
    nav a {
      color: var(--text); text-decoration: none; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 12px;
      transition: all 0.3s ease;
    }
    nav a:hover {
      color: var(--primary);
      box-shadow: inset 4px 4px 8px rgb(163,177,198,0.5), inset -4px -4px 8px rgba(255,255,255, 0.6);
    }
    .site-main {
      padding: 2rem; border-radius: 24px;
      background-color: rgba(224, 229, 236, 0.6);
      backdrop-filter: blur(10px);
      box-shadow: 12px 12px 24px rgb(163,177,198,0.5), -12px -12px 24px rgba(255,255,255, 0.6);
      min-height: calc(100vh - 350px);
    }
    h1, h2, h3 { color: var(--text); line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
    h1 { font-size: 2.2rem; background: linear-gradient(90deg, var(--primary), var(--accent-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; font-weight: 500; }
    a:hover { color: var(--accent-1); }
    code { background: rgba(255,255,255,0.4); padding: 0.2rem 0.5rem; border-radius: 8px; box-shadow: inset 2px 2px 5px rgb(163,177,198,0.4), inset -2px -2px 5px rgba(255,255,255, 0.5); font-family: monospace; font-size: 0.9em; }
    pre { background: rgba(224, 229, 236, 0.8); padding: 1.5rem; border-radius: 16px; overflow-x: auto; box-shadow: inset 6px 6px 12px rgb(163,177,198,0.5), inset -6px -6px 12px rgba(255,255,255, 0.6); }
    pre code { background: none; box-shadow: none; padding: 0; font-size: 1em; }
    ul.section-list { list-style: none; padding: 0; display: grid; gap: 1.5rem; margin: 1.5rem 0;}
    ul.section-list li {
      padding: 1.5rem; border-radius: 16px;
      background-color: var(--nm-bg);
      box-shadow: 6px 6px 12px rgb(163,177,198,0.5), -6px -6px 12px rgba(255,255,255, 0.5);
      transition: transform 0.2s ease;
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }
    ul.section-list li:hover { transform: translateY(-3px); }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }
    nav.pagination { margin: 1.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--primary); background: color-mix(in srgb, var(--primary) 12%, transparent); }
    .pagination-disabled span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.6; }
    .site-footer { margin-top: 4rem; padding: 2rem; text-align: center; color: var(--text-muted); border-radius: 20px; box-shadow: 6px 6px 12px rgb(163,177,198,0.4), -6px -6px 12px rgba(255,255,255, 0.4); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: center; padding: 1rem; }
      .site-wrapper { padding: 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
