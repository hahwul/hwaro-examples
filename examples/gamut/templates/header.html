<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Gamut — home">
        <span class="brand__mark" aria-hidden="true">
          <span class="brand__chip" style="--r: -20deg; --c: #f5b722"></span>
          <span class="brand__chip" style="--r: -7deg; --c: #3f9e5a"></span>
          <span class="brand__chip" style="--r: 7deg; --c: #2b6fb0"></span>
          <span class="brand__chip" style="--r: 20deg; --c: #b0245a"></span>
        </span>
        <span class="brand__word">Gamut</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/plates/">Plates</a>
        <a href="{{ base_url }}/about/">About</a>
        <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
          <kbd>/</kbd>
        </button>
      </nav>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-labelledby="search-heading" hidden>
    <div class="search-panel" role="document">
      <h2 class="search-heading" id="search-heading">Search the collection</h2>
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search shops, cities, ink names" autocomplete="off" aria-label="Search Gamut" aria-describedby="search-hint">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <p class="search-hint" id="search-hint">Arrow keys to move, Enter to open a plate, Esc to close.</p>
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>No plates match that.</p>
    </div>
  </div>
