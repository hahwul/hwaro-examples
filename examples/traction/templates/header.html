<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="site-logo">
        <svg class="site-logo-mark" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 2c7 0 13.5 4 14 11 .4 6-3 10-8 11.5-1 3-4 5.5-6 5.5s-5-2.5-6-5.5C5 23.5 1.6 19.6 2 13.5 2.5 6.5 9 2 16 2Z"/>
          <path class="site-logo-t" d="M10 12h12v2.6h-4.6V23h-2.8v-8.4H10Z"/>
        </svg>
        <span>Traction</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/features/">Features</a>
        <a href="{{ base_url }}{{ lang_prefix }}/pricing/">Pricing</a>
        <a href="{{ base_url }}{{ lang_prefix }}/story/">Story</a>
        <a href="{{ base_url }}{{ lang_prefix }}/comparisons/">Comparisons</a>
        <a href="{{ base_url }}{{ lang_prefix }}/contact/">Contact</a>
      </nav>
      <a class="btn btn-primary btn-small" href="{{ base_url }}{{ lang_prefix }}/pricing/">See the only plan</a>
    </div>
  </header>
