{% include "header.html" %}
  <main id="main" class="site-main">
    <div class="wrap page-head">
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      {% if page.description %}<p class="page-lede">{{ page.description | e }}</p>{% endif %}
    </div>
    <div class="wrap prose">
      {{ content | safe }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
