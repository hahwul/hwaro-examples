<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Clinical glass torso favicon for GLASS STOMACH -->
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d4e3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7e8c9e" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  
  <!-- Outer glass membrane (torso outline) -->
  <path d="M8.5 5 Q8 11 9 17 Q10 24 12 28.5 Q16 31 20 28.5 Q22 24 23 17 Q24 11 23.5 5" 
        fill="none" stroke="#b4c0d0" stroke-width="1.65" stroke-linecap="round"/>
  
  <!-- Inner membrane / rib cage suggestion -->
  <path d="M10 7.5 Q11 13 11.5 18.5 Q12.5 24 15 27" fill="none" stroke="#8a9db5" stroke-width="0.7" opacity="0.7"/>
  <path d="M22 7.5 Q21 13 20.5 18.5 Q19.5 24 17 27" fill="none" stroke="#8a9db5" stroke-width="0.7" opacity="0.7"/>
  
  <!-- Heart (subtle but visible) -->
  <path d="M13.6 12.8 Q14.9 11.2 16.3 12.9 Q17.8 11.1 19 12.8 Q18.6 15.3 16.3 16.9 Q13.9 15.2 13.6 12.8" 
        fill="none" stroke="#c45a6e" stroke-width="1.05" stroke-linejoin="round"/>
  <circle cx="16.3" cy="13.9" r="1.1" fill="#c45a6e" opacity="0.55"/>
  
  <!-- Lungs (paired translucent) -->
  <ellipse cx="12.1" cy="14.4" rx="2.4" ry="3.3" fill="none" stroke="#d8b8a8" stroke-width="0.85" opacity="0.65"/>
  <ellipse cx="19.9" cy="14.4" rx="2.4" ry="3.3" fill="none" stroke="#d8b8a8" stroke-width="0.85" opacity="0.65"/>
  
  <!-- Stomach / upper viscera suggestion -->
  <path d="M13.2 19.4 Q15.1 18.7 17.8 19.5 Q19.4 21.1 18.1 23.2 Q15.4 23.6 13.5 22.4 Q12.4 20.8 13.2 19.4" 
        fill="none" stroke="#b86a4a" stroke-width="0.9" opacity="0.7"/>
  
  <!-- Major vessel / aorta line -->
  <path d="M16.2 9.8 L16.3 19.1" fill="none" stroke="#5f7db8" stroke-width="0.85" opacity="0.75"/>
  
  <!-- Subtle glass highlight on left edge -->
  <path d="M9.3 6.8 Q9.7 14 10.5 21.5" fill="none" stroke="#e8eef5" stroke-width="0.5" opacity="0.35"/>
</svg>