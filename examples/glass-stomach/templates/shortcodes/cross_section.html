{# cross_section() shortcode — Layered transparent body cross-section viewer #}
{# Usage: {{ cross_section() }} or {{ cross_section(title="Mid-Thoracic Slice") }} #}
<div class="glass-membrane cross-section" style="margin: 1.9rem auto; max-width: 480px;">
  <div class="layer skin" title="Dermis — 1.2mm translucent membrane"></div>
  <div class="layer subcut" title="Subcutaneous fat — yellow strata"></div>
  <div class="layer muscle" title="Intercostal &amp; abdominal wall"></div>
  <div class="layer ribs" title="Ribcage — calcium lattice"></div>
  <div class="layer organs" title="Visceral mass — stomach, liver, spleen"></div>
  <div class="layer vessels" title="Aorta &amp; vena cava"></div>
  
  <div class="condensation"></div>
  <div class="xray-overlay"></div>
  
  <div style="position:absolute; bottom:12px; left:12px; font-size:0.62rem; letter-spacing:0.12em; color:var(--text-muted); z-index:40; text-shadow:0 1px 2px rgba(0,0,0,0.6);">
    {{ title | default("TRANSVERSE SECTION — T8") }}
  </div>
</div>
