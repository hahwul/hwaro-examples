{% include "header.html" %}

  <div class="section-header">
    <h1>{{ term.name }}</h1>
  </div>

  <div class="ornament"></div>

  <main class="wide-container">
    <section class="timeline">
      {% for post in term.pages %}
      <article class="timeline-item">
        <div class="timeline-date">
          <span class="day">{{ post.date | date(format="%d") }}</span>
          <span class="month">{{ post.date | date(format="%b") }}</span>
        </div>
        <div class="timeline-dot"></div>
        <div class="arch-card">
          <h2><a href="{{ base_url }}/{{ post.path }}">{{ post.title }}</a></h2>
          {% if post.description %}
          <p class="excerpt">{{ post.description }}</p>
          {% endif %}
          <a href="{{ base_url }}/{{ post.path }}" class="read-more">Continue Reading</a>
        </div>
      </article>
      {% endfor %}
    </section>
  </main>

{% include "footer.html" %}
