{% include "header.html" %}
      <main id="main" class="content">
        <article class="page-article">
          <h1>{{ page.title | e }}</h1>
          {% if page.description %}<p class="page-dek">{{ page.description }}</p>{% endif %}
          {% if page.date %}
          <div class="page-meta">
            <time datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date('%B %d, %Y') }}</time>
          </div>
          {% endif %}
          <div class="prose">
            {{ content | safe }}
          </div>
        </article>
      </main>
{% include "footer.html" %}
