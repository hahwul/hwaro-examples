<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #900;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 3px solid var(--text);
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .catechism-hero {
            padding: 80px 0;
            text-align: center;
        }
        .catechism-hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article { padding-bottom: 100px; }
        .qa-section { margin-top: 60px; }
        .question { font-family: 'Work Sans', sans-serif; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .answer { margin-bottom: 40px; font-size: 1.2rem; }
        h2 { font-size: 2.5rem; text-align: center; margin-bottom: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">CATECHISM</div>
            <nav>
                <a href="/">Doctrine</a>
                <a href="/about">Truth</a>
            </nav>
        </div>
    </header>
