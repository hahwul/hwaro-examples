{% include "header.html" %}

<div class="container">
  <article class="post">
    <header class="post-header">
      <div class="post-meta">
        <span>{{ page.date | date("%Y.%m.%d") }}</span>
        {% if page.categories %}
        <span class="text-accent">//</span>
        <span>{{ page.categories | join(", ") }}</span>
        {% endif %}
      </div>
      <h1>{{ page.title }}</h1>
    </header>

    <div class="post-content">
      {{ content | safe }}
    </div>

    {% if page.tags %}
    <div class="post-tags" style="margin-top: 3rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);">
      TAGS: {{ page.tags | join(", ") }}
    </div>
    {% endif %}
  </article>
</div>

{% include "footer.html" %}
