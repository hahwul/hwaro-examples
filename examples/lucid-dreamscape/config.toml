# =============================================================================
# Global Configuration
# =============================================================================
# The core settings for your site

title = "Lucid Dreamscape"
base_url = "https://examples.hwaro.hahwul.com/lucid-dreamscape/"
description = "A surreal, dreamy blog crafted with Hwaro and glassmorphism"
language_code = "en"
author = "Hwaro Dreams"

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# Series
# =============================================================================

[series]
enabled = true

# =============================================================================
# Related Posts
# =============================================================================

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[[taxonomies]]
name = "authors"

# =============================================================================
# Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

# =============================================================================
# LLMs.txt
# =============================================================================

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."
full_enabled = false
full_filename = "llms-full.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
filename = "rss.xml"
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = true
