{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
  <h1 class="hero-title">{{ term.name }}</h1>
  <div class="page-content">
    <ul>
    {% for page in paginator.pages | default(value=term.pages) %}
      <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
    {% endfor %}
    </ul>
  </div>
</div>
{% endblock content %}
