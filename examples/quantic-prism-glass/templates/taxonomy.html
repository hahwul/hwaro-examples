{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
  <h1 class="hero-title">{{ taxonomy.name | capitalize }}</h1>
  <div class="page-content">
    <ul>
      {% for term in terms %}
        <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock content %}
