<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0; min-height: 100vh; }
        header { padding: 60px 40px; border-bottom: 2px solid #000; }
        .logo { font-weight: 800; font-size: 2.5rem; text-transform: uppercase; letter-spacing: -2px; }
        .wire-surface { padding: 80px 40px; position: relative; }
        .wire { height: 1px; background: #000; width: 100%; position: absolute; left: 0; }
        .wire-1 { top: 100px; opacity: 0.1; }
        .wire-2 { top: 105px; opacity: 0.2; }
        .wire-3 { top: 110px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">tension.wire</div></header>
