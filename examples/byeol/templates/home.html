{% include "header.html" %}
  <main id="main">
    <section class="masthead">
      <svg class="masthead-ornament" viewBox="0 0 120 24" width="120" height="24" aria-hidden="true" focusable="false">
        <line x1="0" y1="12" x2="44" y2="12" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
        <path d="M60 2 L62.2 9.8 L70 12 L62.2 14.2 L60 22 L57.8 14.2 L50 12 L57.8 9.8 Z" fill="currentColor"/>
        <line x1="76" y1="12" x2="120" y2="12" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
      </svg>
      <h1 class="masthead-title">Byeol</h1>
      <p class="masthead-sub"><span lang="ko">별</span> · an atlas of the southern folk sky</p>
      <div class="masthead-lede">{{ content | safe }}</div>
    </section>

    <section class="atlas" aria-labelledby="plates-heading">
      <div class="atlas-bar">
        <h2 class="atlas-heading" id="plates-heading">The Surviving Plates</h2>
        <div class="atlas-search">
          <label class="visually-hidden" for="atlas-search">Search the atlas</label>
          <svg class="search-glyph" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false">
            <circle cx="7" cy="7" r="4.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
            <line x1="10.4" y1="10.4" x2="14" y2="14" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <input id="atlas-search" type="search" placeholder="Search the atlas…" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <p class="visually-hidden" id="search-status" role="status" aria-live="polite"></p>
      <div class="plate-wall" id="plate-wall">
        {% for p in get_section(path="charts").pages | sort_by("date", reverse=true) %}
          {% include "partials/card.html" %}
        {% endfor %}
      </div>
      <ol class="search-results" id="search-results" hidden></ol>
    </section>
  </main>
{% include "footer.html" %}
