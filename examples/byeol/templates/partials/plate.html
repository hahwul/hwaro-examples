<svg class="plate-svg" viewBox="0 0 100 {{ plate_page.extra.vh }}" role="img" aria-label="Star chart of {{ plate_page.title | e }}" preserveAspectRatio="xMidYMid meet">
  {%- for g in plate_page.extra.grats %}
  <path class="graticule" d="M2,{{ g[0] }} Q50,{{ g[1] }} 98,{{ g[0] }}" />
  {%- endfor %}
  {%- for d in plate_page.extra.field %}
  <circle class="fieldstar" cx="{{ d[0] }}" cy="{{ d[1] }}" r="0.45" />
  {%- endfor %}
  <g class="asterism">
  {%- for l in plate_page.extra.lines %}
    <line x1="{{ l[0] }}" y1="{{ l[1] }}" x2="{{ l[2] }}" y2="{{ l[3] }}" />
  {%- endfor %}
  </g>
  {%- for s in plate_page.extra.stars %}
  {%- if s[3] == "m1" %}
  <path class="spike" d="M{{ s[0] }},{{ s[1] }} m0,-4.8 v9.6 m-4.8,-4.8 h9.6" />
  {%- endif %}
  <circle class="{{ s[3] }} star" cx="{{ s[0] }}" cy="{{ s[1] }}" r="{{ s[2] }}" />
  {%- endfor %}
  {%- if plate_detail %}
  {%- for n in plate_page.extra.names %}
  <text class="starname" x="{{ n[0] }}" y="{{ n[1] }}" text-anchor="{{ n[2] }}">{{ n[3] }}</text>
  {%- endfor %}
  {%- endif %}
</svg>
