<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ section.title }} | Quantum Flux</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    <div class="content-block">
      <h1 class="pulse">{{ section.title }}</h1>
      <div class="prose">
        {{ content | safe }}
      </div>

      {% if section.pages %}
        <div class="section-pages">
          {% for page in section.pages %}
            <article class="page-summary" style="margin-top: 2rem; border-top: 1px solid rgba(0,242,254,0.1); padding-top: 1rem;">
              <h3><a href="{{ page.permalink }}">{{ page.title }}</a></h3>
              {% if page.description %}
                <p style="color: var(--text-secondary);">{{ page.description }}</p>
              {% endif %}
            </article>
          {% endfor %}
        </div>
      {% endif %}
    </div>
  </main>

  {% include "footer.html" %}
</body>
</html>
