<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vector: {{ page.title | default(term.name) }} | Quantum Flux</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    <div class="content-block">
      <h1 class="pulse">Vector: {{ page.title | default(term.name) | capitalize }}</h1>
      <div style="margin-top: 2rem;">
        {% for page in taxonomy_pages | default(term.pages) %}
          <article style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(0,242,254,0.1);">
            <h3><a href="{{ page.permalink }}">{{ page.title }}</a></h3>
            {% if page.description %}
              <p style="color: var(--text-secondary); margin-top: 0.5rem;">{{ page.description }}</p>
            {% endif %}
          </article>
        {% endfor %}
      </div>
    </div>
  </main>

  {% include "footer.html" %}
</body>
</html>
