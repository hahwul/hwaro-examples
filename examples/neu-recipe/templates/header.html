<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #5a4b41;
            --accent: #d8c4b4;
            --shadow: rgba(0,0,0,0.05);
            --highlight: rgba(255,255,255,0.8);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--text);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .recipe-hero {
            padding: 80px 0;
            background: var(--bg);
            border-radius: 40px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 15px 15px 40px var(--shadow), -15px -15px 40px var(--highlight);
        }
        .recipe-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 4rem;
            font-weight: 400;
            font-style: italic;
            margin: 0;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: inset 10px 10px 30px var(--shadow), inset -10px -10px 30px var(--highlight);
        }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2.2rem; color: var(--text); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">neu.recipe</div>
            <nav>
                <a href="/">Flavor</a>
                <a href="/about">Kitchen</a>
            </nav>
        </div>
    </header>
