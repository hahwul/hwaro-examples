<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="{{ base_url }}/" class="site-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          {{ site.title }}
        </a>
        <nav class="site-nav">
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-left">
          <p>&copy; {{ current_year }} {{ site.title }}. All rights reserved.</p>
        </div>
        <div class="footer-right">
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
        </div>
      </div>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
