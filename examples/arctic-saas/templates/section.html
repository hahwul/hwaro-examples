{% extends "base.html" %}

{% block content %}
<main class="site-main">
  <div class="page-header">
    <h1>{{ page.title | e }}</h1>
  </div>
  <div class="page-content">
    {{ content | safe }}
  </div>
  <div class="section-listing">
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </div>
</main>
{% endblock %}
