{%- if temp < 3 -%}{% set band = "b0" %}{%- elif temp < 6 -%}{% set band = "b1" %}{%- elif temp < 9 -%}{% set band = "b2" %}{%- elif temp < 12 -%}{% set band = "b3" %}{%- elif temp < 15 -%}{% set band = "b4" %}{%- else -%}{% set band = "b5" %}{%- endif -%}
<span class="temp-badge temp-{{ band }}" role="img" aria-label="Water temperature {{ temp }} degrees Celsius"><span class="temp-value">{{ temp }}</span><span class="temp-unit" aria-hidden="true">°</span></span>
