<li class="swim-row swim-row-tall">
  <a class="swim-row-link" href="{{ base_url }}{{ p.url }}">
    {% if p.date %}<time class="swim-date" datetime="{{ p.date | date("%Y-%m-%d") }}">{{ p.date | date("%b %d, %Y") }}</time>{% endif %}
    <span class="swim-body">
      <span class="swim-title">{{ p.title }}</span>
      {% if p.summary %}<span class="swim-summary">{{ p.summary | strip_html | truncate_words(26) }}</span>{% endif %}
    </span>
    {% if p.extra.water_temp %}{% set temp = p.extra.water_temp %}{% include "partials/badge.html" %}{% endif %}
  </a>
</li>
