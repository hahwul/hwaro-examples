{% include "header.html" %}
  <main>
    <div class="post-arch-header">
      <p class="post-label">Colosseum</p>
      <h1 class="post-title">{{ taxonomy_name | title }}</h1>
      <p class="post-meta">Browse all categories within the Colosseum archive</p>
      <div class="post-divider">
        <span class="divider-rule"></span>
        <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L9 9H2L7.5 13.5L5.5 21L12 16.5L18.5 21L16.5 13.5L22 9H15Z" fill="#b8860b"/>
        </svg>
        <span class="divider-rule"></span>
      </div>
    </div>

    <div class="taxonomy-section">
      <div class="tag-grid">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/tags/{{ term.name | slugify }}/" class="tag-pill">{{ term.name }}</a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
