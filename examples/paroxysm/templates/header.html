<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff00ff;
            --glitch: #00ffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.2;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--accent);
            text-shadow: 2px 2px var(--glitch);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .paroxysm-hero {
            padding: 100px 0;
            position: relative;
        }
        .paroxysm-hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.7;
            text-transform: uppercase;
            letter-spacing: -10px;
            text-align: center;
        }
        .burst-line {
            position: absolute;
            width: 100%;
            height: 20px;
            background: var(--accent);
            top: 50%;
            left: 0;
            z-index: -1;
            transform: skewY(-10deg);
            opacity: 0.5;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; text-transform: uppercase; letter-spacing: -3px; color: var(--glitch); }
        .burst-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            background: #333;
            margin-top: 60px;
        }
        .burst-item { background: var(--bg); padding: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">PARO//XYSM</div>
            <nav>
                <a href="/">Burst</a>
                <a href="/about">Erupt</a>
            </nav>
        </div>
    </header>
