<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #0084ff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; }
        .wiring-surface { padding: 60px; background: #fafafa; border: 1px dashed #ccc; position: relative; }
        .line { height: 1px; background: var(--accent); width: 50px; position: absolute; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">wiring.diagram</div></header>
