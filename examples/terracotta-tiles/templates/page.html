{% extends "base.html" %}

{% block content %}
<article>
    <header class="section-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="meta">{{ page.date | date(format="%B %d, %Y") }}</div>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
