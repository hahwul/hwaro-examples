{% include "header.html" %}
  <main class="site-main">
    <article>
      <h1>{{ page.title | e }}</h1>
      {% if page.date %}
        <p style="font-weight: bold; font-family: monospace; border-bottom: 2px solid var(--primary); padding-bottom: 1rem; margin-bottom: 2rem;">{{ page.date }}</p>
      {% endif %}
      <div class="content">
        {{ content }}
      </div>
    </article>
  </main>
