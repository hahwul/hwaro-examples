<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {% raw %}<script>
    (function () {
      try {
        var t = localStorage.getItem("cadmium-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>{% endraw %}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="bar">
      <a class="mark" href="{{ base_url }}/" aria-label="Cadmium — home">
        <svg class="mark-glyph" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M16 4v5M16 23v5M4 16h5M23 16h5" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          <circle cx="16" cy="16" r="1.6" fill="currentColor"/>
        </svg>
        <span class="mark-text">Cadmium</span>
      </a>

      <nav class="primary-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/tools/">Tools</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>

      <div class="bar-tools">
        <button class="tool-btn" id="search-button" type="button" aria-haspopup="dialog" aria-controls="search-overlay" aria-label="Search the case studies (press slash)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="8.6" cy="8.6" r="5.4"/><path d="M12.7 12.7 16.5 16.5"/></svg>
          <kbd class="tool-kbd" aria-hidden="true">/</kbd>
        </button>
        <button class="tool-btn theme-btn" id="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to the dark workshop view">
          <svg class="icon-light" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="10" cy="10" r="3.6"/><path d="M10 1.6v2.1M10 16.3v2.1M2.7 10h2.1M15.2 10h2.1M4.9 4.9l1.5 1.5M13.6 13.6l1.5 1.5M15.1 4.9l-1.5 1.5M6.4 13.6l-1.5 1.5"/></svg>
          <svg class="icon-dark" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M16.4 12.4A6.6 6.6 0 0 1 7.6 3.6a6.6 6.6 0 1 0 8.8 8.8Z"/></svg>
        </button>
      </div>
    </div>
  </header>
