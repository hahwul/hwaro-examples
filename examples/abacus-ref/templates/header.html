<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf7; --text: #4a3a2a; --accent: #8b4513; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'IBM Plex Mono'; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; color: var(--accent); }
        .abacus-surface { background: #fff; padding: 60px; border: 1px solid #ddd; box-shadow: 10px 10px 0 rgba(0,0,0,0.02); }
        .beads { display: flex; gap: 5px; margin-bottom: 40px; }
        .bead { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">abacus.ref</div></header>
