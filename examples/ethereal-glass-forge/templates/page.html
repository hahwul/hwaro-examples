{% extends "base.html" %}

{% block content %}
<article class="page-content">
  <div class="glass-panel">
    <header class="page-header">
      <h1 class="page-title">{{ page.title | e }}</h1>
      {% if page.date %}
      <div class="page-meta">
        <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
      </div>
      {% endif %}
    </header>

    <div class="content">
      {{ content | safe }}
    </div>
  </div>
</article>
{% endblock %}
