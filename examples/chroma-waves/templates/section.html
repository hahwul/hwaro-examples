{% extends "base.html" %}

{% block content %}
<div class="section">
    <header class="section-header">
        <h1 class="section-title">{{ section.title }}</h1>
        {% if section.content %}
        <div class="section-content">
            {{ section.content | safe }}
        </div>
        {% endif %}
    </header>

    <div class="post-list">
        {{ section.list | safe }}
    </div>

    {{ pagination | safe }}
</div>
{% endblock %}
