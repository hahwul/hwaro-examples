<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --magazine: #f0f0f0;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--magazine);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
            border-bottom: 4px solid #000;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.5rem;
            letter-spacing: -2px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .broadsheet-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 20px 20px 0 #000;
            margin-bottom: 100px;
            margin-top: 40px;
            border: 1px solid #ddd;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 4rem; color: #000; margin-top: 0; line-height: 1.0; font-weight: 700; }
        article { font-size: 1.2rem; columns: 3; column-gap: 60px; column-rule: 1px solid #eee; }
        @media (max-width: 992px) { article { columns: 2; } }
        @media (max-width: 768px) { article { columns: 1; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">broadsheet.mag</div>
            <nav>
                <a href="/">Edition</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
