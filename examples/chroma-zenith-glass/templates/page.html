{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>

    {% if page.date is defined %}
    <div class="post-meta">
        Published on {{ page.date | date("%B %d, %Y") }}
    </div>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>

    {% if page.tags is defined %}
    <div class="tags" style="margin-top: 40px;">
        {% for tag in page.tags %}
        <a href="{{ base_url }}/tags/{{ tag | lower | replace(from=" ", to="-") }}/" class="tag">#{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</article>
{% endblock %}
