<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #888;
            --accent: #ff6600;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 30px 0;
            border-bottom: 2px solid var(--accent);
        }
        .logo {
            font-family: 'Work Sans', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        nav a:hover { color: #fff; }
        .contra-hero {
            padding: 100px 0;
            background: repeating-linear-gradient(45deg, #111, #111 10px, #000 10px, #000 20px);
            border: 1px solid var(--muted);
            margin-top: 40px;
            text-align: center;
        }
        .contra-hero h1 {
            font-family: 'Work Sans', sans-serif;
            font-size: 10vw;
            font-weight: 900;
            margin: 0;
            color: #fff;
            line-height: 0.8;
            text-transform: uppercase;
        }
        .restricted-label {
            display: inline-block;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 5px 20px;
            font-weight: 700;
            margin-top: 30px;
            text-transform: uppercase;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Work Sans', sans-serif; font-size: 3rem; color: #fff; text-transform: uppercase; border-left: 10px solid var(--accent); padding-left: 20px; }
        .stamped {
            font-family: 'Work Sans', sans-serif;
            font-weight: 900;
            font-size: 4rem;
            color: rgba(255, 102, 0, 0.1);
            position: absolute;
            transform: rotate(-15deg);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">CONTRABAND//DATA</div>
            <nav>
                <a href="/">Vault</a>
                <a href="/about">Manifest</a>
            </nav>
        </div>
    </header>
