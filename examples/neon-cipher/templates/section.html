{% include "header.html" %}
  <main class="site-main content-box">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for p in pages %}
        <li><a href="{{ p.url }}">{{ p.title }}</a></li>
      {% endfor %}
    </ul>
    {% if pagination is defined and pagination.total_pages is defined and pagination.total_pages > 1 %}
      {{ pagination }}
    {% endif %}
  </main>
{% include "footer.html" %}
