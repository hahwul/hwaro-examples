title = "Split Tone"
description = "A photography blog with a classic split-toning aesthetic of warm highlights and cool shadows"
base_url = "http://localhost:3000"
[plugins]
processors = ["markdown"]
[content.files]
allow_extensions = ["jpg","jpeg","png","gif","svg","webp"]
[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true
[pagination]
enabled = true
per_page = 5
[[taxonomies]]
name = "tags"
feed = true
[[taxonomies]]
name = "categories"
[sitemap]
enabled = true
[robots]
enabled = true
[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]
[markdown]
safe = false
lazy_loading = true
