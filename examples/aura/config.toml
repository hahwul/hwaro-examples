base_url = "https://examples.hwaro.hahwul.com/aura/"
title = "Aura"
description = "An ethereal glassmorphism theme with ambient neon glows."
author = "Hwaro"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = true
per_page = 10

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5
