<!DOCTYPE html>
<html lang="{{ site.language | default(value='en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {{ highlight_tags | safe }}
    {{ auto_includes | safe }}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="aura-bg"></div>
    <header class="glass-header">
        <div class="container nav-wrapper">
            <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/posts/">Posts</a>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
            <div class="search-overlay" id="searchOverlay" style="display:none;">
                <input type="text" id="searchInput" placeholder="Search...">
                <div id="searchResults"></div>
            </div>
        </div>
    </header>
    <main class="container">
