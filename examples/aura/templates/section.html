{% include "header.html" %}
<div class="section-wrapper" style="margin-top: 2rem;">
  <h1 style="margin-bottom: 1rem;">{{ section.title | default(value="Posts") }}</h1>
  <div class="posts-grid">
    {% for p in section.pages %}
    <a href="{{ base_url }}{{ p.url }}" class="glass-card">
      <h2 style="margin: 0 0 0.5rem 0; font-size: 1.25rem;">{{ p.title }}</h2>
      {% if p.description is defined %}<p style="margin: 0; opacity: 0.8;">{{ p.description }}</p>{% endif %}
    </a>
    {% endfor %}
  </div>
</div>
{% include "footer.html" %}
