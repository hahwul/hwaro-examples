{% include "header.html" %}
<article class="glass-panel post-full">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="meta" style="opacity: 0.6; font-size: 0.9rem; margin-bottom: 2rem;">
        {% if page.date is defined %}<time>{{ page.date }}</time>{% endif %}
    </div>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
