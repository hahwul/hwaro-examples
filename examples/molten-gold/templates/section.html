{% extends "base.html" %}

{% block content %}
<div class="section-container">
  <h1>{{ page.title | e }}</h1>
  {% if content %}
  <div class="content">
    {{ content | safe }}
  </div>
  {% endif %}
  <ul class="section-list">
    {{ section.list }}
  </ul>
  {{ pagination }}
</div>
{% endblock %}
