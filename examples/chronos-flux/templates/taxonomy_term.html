{% include "header.html" %}
<div class="glass-card">
  <h1>{{ taxonomy_name | default("Taxonomy") | upper }}: {{ term }}</h1>
</div>
<div class="post-list">
  {% if pages is defined %}
    {% for p in pages %}
    <div class="glass-card">
      <h2><a href="{{ p.url }}">{{ p.title }}</a></h2>
      <p>{{ p.description | default("") }}</p>
    </div>
    {% endfor %}
  {% endif %}
</div>
{% include "footer.html" %}
