{% include "header.html" %}
<div class="glass-card">
  <h1>{{ taxonomy_name | default("Taxonomy") | upper }}</h1>
</div>
<div class="glass-card">
  {% if terms is defined %}
    {% for t in terms %}
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ t | slugify }}/" class="tag">{{ t }}</a>
    {% endfor %}
  {% endif %}
</div>
{% include "footer.html" %}
