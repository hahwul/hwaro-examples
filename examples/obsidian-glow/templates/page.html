{% include "header.html" %}
<article>
    <header class="page-header">
        <h2>{{ page.title | e }}</h2>
        {% if page.date %}
            <p class="date">{{ page.date | date(format="%Y-%m-%d") }}</p>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% include "footer.html" %}
