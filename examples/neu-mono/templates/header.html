<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eee;
            --text: #555;
            --accent: #000;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .mono-hero {
            padding: 100px 0;
            background: var(--bg);
            border-radius: 4px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
        }
        .mono-hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            color: var(--accent);
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 4px;
            box-shadow: inset 5px 5px 15px var(--shadow), inset -5px -5px 15px var(--highlight);
        }
        h2 { font-weight: 700; font-size: 1.5rem; color: var(--accent); text-transform: uppercase; margin-top: 0; }
        .code-block {
            background: var(--bg);
            padding: 20px;
            box-shadow: 2px 2px 5px var(--shadow), -2px -2px 5px var(--highlight);
            margin-top: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">neu.mono</div>
            <nav>
                <a href="/">Static</a>
                <a href="/about">Code</a>
            </nav>
        </div>
    </header>
