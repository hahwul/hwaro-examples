<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #ff0055;
      --tertiary: #8a2be2;
      --text: #e0e0e0;
      --text-muted: #8b949e;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #03010a;
      --bg-subtle: rgba(255, 255, 255, 0.05);
      --glass-bg: rgba(10, 5, 20, 0.4);
      --glass-border: rgba(0, 240, 255, 0.2);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }
    .site-main {
      min-height: calc(100vh - 250px);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .site-footer {
      margin: 3rem 0;
      padding: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 700;
      color: #fff;
    }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(to right, #00f0ff, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.35rem; }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; transition: color 0.3s; }
    a:hover { color: var(--secondary); text-decoration: underline; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: #ff0055; }
    pre { background: #050310; padding: 1.25rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; color: inherit; }

    /* Custom Grid */
    .crystal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .crystal-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .crystal-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 240, 255, 0.4);
      background: rgba(0, 240, 255, 0.05);
    }
    .crystal-card h3 {
      font-size: 1.1rem;
      margin-top: 0;
      color: #fff;
    }
    .crystal-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.75rem; padding: 1rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: border-color 0.3s; }
    ul.section-list li:hover { border-color: var(--primary); }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; color: #fff; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
