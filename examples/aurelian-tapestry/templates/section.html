{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for p in section.pages %}
      <li>
        <a href="{{ p.permalink }}">{{ p.title }}</a>
        {% if p.description %}<p class="taxonomy-desc">{{ p.description }}</p>{% endif %}
      </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
