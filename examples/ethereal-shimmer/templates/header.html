<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined and page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {% if site.highlight is defined and site.highlight.enabled %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.highlight.theme }}.min.css">
  {% endif %}
</head>
<body>
  <div class="layout">
    <header class="site-header glass-container">
      <div class="site-title">
        <a href="{{ base_url }}/">{{ site.title }}</a>
      </div>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
