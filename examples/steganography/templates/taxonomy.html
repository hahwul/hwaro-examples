{% include "header.html" %}
<main id="main">
  <header class="section-head">
    <div class="article-meta-row">
      <span class="file-perms">drwxr-xr-x</span>
      <span class="file-meta">1 steg master index</span>
    </div>
    <h1 class="section-title">/tags/</h1>
  </header>

  <section class="section-listing">
    <h2 class="dir-header">total tags</h2>
    {% set tax = get_taxonomy(kind="tags") %}
    <ul class="file-list">
      {% for term in tax.items | sort_by("name") %}
      <li class="file-item">
        <span class="file-perms">drw-r--r--</span>
        <span class="file-meta">1 steg master {{ term.pages | length }} items</span>
        <a class="file-link" href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">{{ term.name }}/</a>
      </li>
      {% endfor %}
    </ul>
  </section>
</main>
{% include "footer.html" %}
