<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <style>
    :root {
      /* Refined Minimalist Palette - Grayscale & Whites */
      --bg-color: #ffffff;
      --bg-alt: #f9f9fb;
      --text-main: #111111;
      --text-muted: #666666;
      --accent: #000000;
      --accent-hover: #333333;
      --border-color: #e5e5e5;

      /* Typography */
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-serif: "Playfair Display", "Merriweather", Georgia, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      background-color: var(--bg-color);
      line-height: 1.6;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Sticky Header */
    .site-header {
      position: sticky;
      top: 0;
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-color);
      z-index: 1000;
      padding: 1.25rem 0;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .site-logo {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .main-nav {
      display: flex;
      gap: 2rem;
    }

    .main-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .main-nav a:hover {
      color: var(--accent);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 2px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Hero Section */
    .hero-section {
      padding: 10rem 2rem 8rem;
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-color: var(--bg-color);
    }

    .hero-content {
      max-width: 800px;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: 4rem;
      line-height: 1.1;
      font-weight: 400;
      color: var(--text-main);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-weight: 300;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Common Section Styles */
    section {
      padding: 6rem 0;
    }

    .section-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: var(--text-main);
    }

    .section-desc {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Features Section */
    .feature-section {
      background-color: var(--bg-alt);
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
    }

    .feature-card {
      background: var(--bg-color);
      padding: 3rem 2rem;
      border: 1px solid var(--border-color);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .feature-icon {
      margin-bottom: 1.5rem;
      color: var(--accent);
    }

    .feature-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .feature-text {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* About Section */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .about-text {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
    }

    .about-image-placeholder {
      aspect-ratio: 4/5;
      background-color: var(--bg-alt);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .abstract-shape {
      width: 60%;
      height: 60%;
      border: 1px solid var(--border-color);
      border-radius: 50% 50% 0 0;
      transform: rotate(45deg);
    }

    /* CTA Section */
    .cta-section {
      background-color: var(--text-main);
      color: white;
      text-align: center;
      padding: 8rem 0;
    }

    .cta-section .section-title {
      color: white;
    }

    .cta-desc {
      color: #a0a0a0;
      font-size: 1.2rem;
      margin-bottom: 3rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta-section .btn-primary {
      background-color: white;
      color: var(--text-main);
      border-color: white;
    }

    .cta-section .btn-primary:hover {
      background-color: #f0f0f0;
    }

    /* Utility */
    .text-center {
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }
      .main-nav {
        display: none; /* In a real app, add a hamburger menu */
      }
      .about-grid {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
      section {
        padding: 4rem 0;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav class="main-nav">
        <a href="#home">Home</a>
        <a href="#features">Features</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>
