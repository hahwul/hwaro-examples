{% extends "base.html" %}

{% block content %}
    <h2>Taxonomy: {{ taxonomy_name }}</h2>
    {% if taxonomy_terms %}
        <ul class="taxonomy-terms">
        {% for term in taxonomy_terms %}
            <li><a href="/{{ taxonomy_name }}/{{ term | lower }}/">{{ term }}</a></li>
        {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
