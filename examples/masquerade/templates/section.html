{% extends "base.html" %}

{% block content %}
    <h2>{{ page.title }}</h2>
    <div class="content-body">
        {{ content | safe }}
    </div>

    {% if section.pages %}
        <ul class="page-list">
        {% for p in section.pages %}
            <li><a href="{{ p.permalink }}">{{ p.title }}</a></li>
        {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
