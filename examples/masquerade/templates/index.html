{% extends "base.html" %}

{% block content %}
    <div class="content-body">
        {{ content | safe }}
    </div>

    {% if section and section.pages %}
        <h3>Recent Revelries</h3>
        <ul class="page-list">
        {% for p in section.pages %}
            <li><a href="{{ p.permalink }}">{{ p.title }}</a></li>
        {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
