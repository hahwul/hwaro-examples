<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
        :root {
            --bg-color: #0d0008;
            --text-color: #e5d8d9;
            --accent-color: #8b002a;
            --gold-color: #d4af37;
            --glow-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Georgia", serif;
            line-height: 1.6;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold-color);
            box-shadow: var(--glow-shadow);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            color: var(--gold-color);
            font-weight: normal;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            letter-spacing: 2px;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.2rem;
            color: #b09e9f;
            font-style: italic;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: rgba(139, 0, 42, 0.1);
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(139, 0, 42, 0.3);
        }

        a {
            color: var(--gold-color);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s;
        }

        a:hover {
            color: #ffdf00;
            text-shadow: 0 0 8px rgba(255, 223, 0, 0.6);
        }

        h2, h3 {
            color: var(--gold-color);
            font-weight: normal;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 5px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid var(--accent-color);
            font-size: 0.9rem;
            color: #7a6e6f;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved in mystery.</p>
    </footer>
</body>
</html>
