<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #9b5de5;
      --secondary: #00f5d4;
      --text: #e0e0e0;
      --text-muted: #8892b0;
      --border: #2d2d3b;
      --bg: #0b0c10;
      --bg-subtle: #1f2833;
      --glow: 0 0 10px rgba(155, 93, 229, 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Fira Code", Consolas, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); background-image: radial-gradient(circle at 50% 50%, rgba(155, 93, 229, 0.1) 0%, rgba(11, 12, 16, 1) 70%); min-height: 100vh;}

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; border-left: 1px dashed var(--border); border-right: 1px dashed var(--border); background: rgba(11, 12, 16, 0.8); backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 2px solid var(--primary); margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--secondary); text-decoration: none; text-shadow: var(--glow); }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px rgba(0, 245, 212, 0.8); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid transparent; transition: all 0.3s ease;}
    .site-header nav a:hover { color: var(--secondary); border-bottom: 1px solid var(--secondary); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: var(--primary); text-shadow: 0 0 5px rgba(155, 93, 229, 0.3); }
    h1 { font-size: 1.75rem; margin-top: 0; }
    h2 { font-size: 1.35rem; }
    h3 { font-size: 1.1rem; }
    p { margin: 1em 0; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { color: var(--primary); text-decoration: underline; text-decoration-style: dashed; }
    code { background: var(--bg-subtle); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: "Fira Code", Consolas, monospace; color: var(--secondary); }
    pre { background: var(--bg-subtle); padding: 1rem; border-radius: 6px; overflow-x: auto; border: 1px solid var(--primary); box-shadow: inset 0 0 10px rgba(155, 93, 229, 0.1); }
    pre code { background: none; padding: 0; color: var(--text); }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.5rem; padding: 0.6rem 0.75rem; background: var(--bg-subtle); border-radius: 6px; border: 1px solid var(--primary); box-shadow: 0 0 5px rgba(155, 93, 229, 0.2); }
    ul.section-list li a { font-weight: 500; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }
    nav.pagination { margin: 1.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--primary); color: var(--text-muted); text-decoration: none; }
    nav.pagination a:hover { color: var(--secondary); border-color: var(--secondary); }
    .pagination-current span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--secondary); background: rgba(0, 245, 212, 0.1); color: var(--secondary); box-shadow: var(--glow); }
    .pagination-disabled span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px dashed var(--border); color: var(--text-muted); opacity: 0.4; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
