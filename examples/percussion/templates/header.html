<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #00ffaa;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .percussion-hero {
            padding: 100px 0;
            text-align: center;
        }
        .beat-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 10px;
            margin-bottom: 60px;
        }
        .beat-dot {
            aspect-ratio: 1;
            background: var(--muted);
            border-radius: 2px;
        }
        .beat-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .percussion-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 12vw;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
        }
        article { padding: 80px 0; }
        h2 { font-size: 2.5rem; text-transform: uppercase; color: var(--accent); }
        .rhythm-box {
            border: 1px solid var(--accent);
            padding: 30px;
            margin-top: 40px;
            position: relative;
        }
        .rhythm-box::before {
            content: '4/4_TIME';
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">PERCUSSION//MIDI</div>
            <nav>
                <a href="/">Tempo</a>
                <a href="/about">Sequence</a>
            </nav>
        </div>
    </header>
