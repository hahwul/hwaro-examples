<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="cyber-header">
    <div class="header-inner">
      <a href="{{ base_url }}" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}posts/">Posts</a>
        <a href="{{ base_url }}archives/">Archives</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </div>
  </header>
  <main class="site-main cyber-container">
    {% block content %}{% endblock %}
  </main>
  <footer class="cyber-footer">
    <p>Powered by Hwaro</p>
  </footer>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
