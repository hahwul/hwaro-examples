{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>

    {% if page.date %}
    <div class="post-meta">
        {{ page.date | date(format="%B %d, %Y") }}
    </div>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>

    {% if page.taxonomies and page.taxonomies.tags %}
    <div class="tags">
        {% for tag in page.taxonomies.tags %}
        <a href="{{ base_url }}tags/{{ tag | replace(' ', '-') | lower }}/" class="tag">#{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</article>
{% endblock %}
