<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        :root {
            --bg-color: #0d0d12;
            --text-color: #e0e0e0;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-purple: #bd00ff;
            --glass-bg: rgba(20, 20, 30, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 234, 0.05), transparent 25%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        header h1 a {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-purple),
                0 0 40px var(--neon-purple);
        }

        header h1 a:hover {
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            margin: 0 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        nav a:hover {
            color: var(--neon-cyan);
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: relative;
        }

        main::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            z-index: -1;
            border-radius: 18px;
            filter: blur(10px);
            opacity: 0.3;
            animation: glowing 20s linear infinite;
        }

        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        h1, h2, h3 {
            color: #fff;
            margin-top: 0;
        }

        h1 {
            font-size: 2.2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        h2 {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
            color: var(--neon-cyan);
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .post-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .post-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .tags {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 0, 234, 0.1);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .tag:hover {
            background: var(--neon-pink);
            color: #000;
            text-shadow: none;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: #666;
            background: var(--glass-bg);
        }

        /* Syntax Highlighting overrides for dark theme */
        pre {
            background: #000 !important;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
        }

        pre code.hljs {
            color: #e0e0e0 !important;
            background: transparent !important;
        }
    </style>
    {{ highlight_css | safe }}
</head>
<body>
    <header>
        <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ base_url }}">Home</a>
            <a href="{{ base_url }}about/">About</a>
            <a href="{{ base_url }}tags/">Tags</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; {{ now() | date(format="%Y") }} {{ site.title }}. Designed with Neon Canvas.
    </footer>
</body>
</html>
