{% extends "base.html" %}

{% block content %}
<h1>{{ taxonomy_name | capitalize }}</h1>

<div class="tags" style="margin-top: 2rem;">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
        #{{ term.name }} ({{ term.pages | length }})
    </a>
    {% endfor %}
</div>
{% endblock %}
