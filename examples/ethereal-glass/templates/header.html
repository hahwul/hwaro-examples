<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --primary: #8a2be2;
      --secondary: #00d2ff;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --border: rgba(255, 255, 255, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-glow: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --aurora-1: #3a0088;
      --aurora-2: #0088ff;
      --aurora-3: #8a2be2;
      --aurora-4: #00ffcc;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: #050510;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Aurora Background */
    body::before, body::after {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      z-index: -1;
      filter: blur(120px);
      animation: aurora-flow 20s ease-in-out infinite alternate;
      opacity: 0.6;
    }

    body::before {
      background: radial-gradient(circle at 30% 30%, var(--aurora-1) 0%, transparent 40%),
                  radial-gradient(circle at 70% 70%, var(--aurora-2) 0%, transparent 40%);
    }

    body::after {
      background: radial-gradient(circle at 80% 20%, var(--aurora-3) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, var(--aurora-4) 0%, transparent 40%);
      animation-duration: 25s;
      animation-direction: alternate-reverse;
    }

    @keyframes aurora-flow {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Layout */
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin: 2rem 0;
      border-radius: 16px;
    }

    .site-logo {
      font-weight: 600;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
    .site-header nav a:hover {
      color: var(--text);
      background: var(--glass-glow);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin: 3rem 0;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      border-radius: 12px;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Edge Highlight */
    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    }

    .glass-header {
      background: rgba(20, 20, 30, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: var(--glass-shadow);
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(to right, #fff, #b3e5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.3rem; }
    p { margin: 1em 0; color: var(--text-muted); font-size: 1.05rem; }

    a { color: var(--secondary); text-decoration: none; transition: text-shadow 0.3s ease; }
    a:hover { text-shadow: 0 0 8px var(--secondary); text-decoration: underline; }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(255,255,255,0.1);
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; display: grid; gap: 1rem; }
    ul.section-list li {
      padding: 1.25rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.2);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
    }
    nav.pagination a:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    .pagination-current span { border-color: var(--secondary); background: rgba(0, 210, 255, 0.15); color: #fff; }
    .pagination-disabled span { opacity: 0.4; }

    blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-left: 4px solid var(--secondary);
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      border-radius: 0 8px 8px 0;
      font-style: italic;
    }

    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin: 2rem 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.5rem; }
      .glass-panel { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header glass-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
