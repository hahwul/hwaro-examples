<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eee; --text: #333; --accent: #ff4500; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'IBM Plex Mono'; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .gauge-surface { background: #fff; padding: 80px; border-radius: 50%; width: 400px; height: 400px; margin: 0 auto 60px; border: 4px solid #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .needle { position: absolute; top: 50%; left: 50%; width: 2px; height: 150px; background: var(--accent); transform-origin: top center; transform: rotate(45deg); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">pressure.gauge</div></header>
