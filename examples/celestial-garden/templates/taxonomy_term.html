{% include "header.html" %}
  <h1>{% if page is defined and page.title is defined %}{{ page.title | e }}{% else %}Term{% endif %}</h1>
  <p>Data linked to {{ term }}:</p>
  {{ content | safe }}
  <div class="list">
    {% if pages is defined %}
      {% for p in pages %}
        <div class="list-item">
          <a href="{{ p.url }}">{{ p.title | e }}</a>
        </div>
      {% endfor %}
    {% endif %}
  </div>
{% include "footer.html" %}
