{% include "header.html" %}
  <h1>{% if page is defined and page.title is defined %}{{ page.title | e }}{% else %}Taxonomy{% endif %}</h1>
  <p>Exploring {{ taxonomy }}</p>
  {{ content | safe }}
  <ul>
    {% if terms is defined %}
      {% for t in terms %}
        <li><a href="{{ base_url }}/{{ taxonomy }}/{{ t }}/">{{ t }}</a></li>
      {% endfor %}
    {% endif %}
  </ul>
{% include "footer.html" %}
