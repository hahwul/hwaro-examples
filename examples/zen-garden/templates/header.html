<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --primary: #4a5d23; /* Muted Green */
    --text: #2f3630; /* Deep Gray/Green */
    --text-muted: #5e6b5a;
    --border: #d5d9cf;
    --bg: #f9f8f6; /* Soft Beige/White */
    --bg-subtle: #f0efe9;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: "Georgia", serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); }

  /* Layout */
  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
  .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
  .site-logo { font-weight: normal; font-size: 1.5rem; color: var(--text); text-decoration: none; font-style: italic; letter-spacing: 1px; }
  .site-logo:hover { color: var(--primary); }
  .site-header nav { display: flex; gap: 2rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
  .site-header nav a:hover { color: var(--primary); }
  .site-main { min-height: calc(100vh - 250px); }
  .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

  /* Typography */
  h1, h2, h3 { line-height: 1.4; margin-top: 2em; margin-bottom: 0.75em; font-weight: normal; color: var(--primary); }
  h1 { font-size: 2.5rem; margin-top: 0; }
  h2 { font-size: 1.8rem; }
  h3 { font-size: 1.4rem; }
  p { margin: 1.5em 0; }
  a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
  a:hover { border-color: var(--primary); }

  /* Responsive */
  @media (max-width: 600px) {
    .site-header { flex-direction: column; gap: 1rem; align-items: center; }
    .site-wrapper { padding: 0 1.5rem; }
  }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
