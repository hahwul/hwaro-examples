<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --digest: #f8f8f8;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--digest);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
            border-bottom: 2px solid #000;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .digest-surface {
            background: #fff;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
            border: 1px solid #eee;
        }
        h2 { font-family: 'Fraunces', serif; font-size: 2.5rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; font-style: italic; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">architecture.digest</div>
            <nav>
                <a href="/">Space</a>
                <a href="/about">Design</a>
            </nav>
        </div>
    </header>
