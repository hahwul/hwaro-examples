{% include "header.html" %}
<section>
    <h1>{{ section.title }}</h1>
    <div class="content">
        {{ content | safe }}
    </div>
    <ul class="post-list">
        {% if section.pages is defined %}
            {% for p in section.pages %}
            <li>
                <h2><a href="{{ p.url }}">{{ p.title }}</a></h2>
                {% if p.description is defined %}
                <p>{{ p.description }}</p>
                {% endif %}
            </li>
            {% endfor %}
        {% endif %}
    </ul>
</section>
{% include "footer.html" %}
