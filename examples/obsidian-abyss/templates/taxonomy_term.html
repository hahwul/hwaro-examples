{% include "header.html" %}
<section>
    <h1>Pages tagged with "{{ term }}"</h1>
    <ul>
        {% if pages is defined %}
            {% for p in pages %}
            <li><a href="{{ p.url }}">{{ p.title }}</a></li>
            {% endfor %}
        {% endif %}
    </ul>
</section>
