<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #09090b;
      --glass-bg: rgba(20, 20, 25, 0.7);
      --border: rgba(0, 255, 255, 0.2);
      --text: #e2e8f0;
      --primary: #00ffff;
      --accent: #ff00ff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.6;
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05), transparent 60%);
    }
    .site-wrapper {
      max-width: 800px; margin: 2rem auto; padding: 2rem;
      background: var(--glass-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }
    .site-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
    .site-logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; text-shadow: 0 0 8px var(--primary); }
    nav a { color: var(--text); text-decoration: none; margin-left: 1rem; transition: color 0.3s ease; }
    nav a:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
    h1, h2, h3 { color: var(--primary); }
    a { color: var(--accent); }
    a:hover { text-decoration: none; text-shadow: 0 0 8px var(--accent); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
