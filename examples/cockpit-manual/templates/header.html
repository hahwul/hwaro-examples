<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #00ff41; --accent: #00ff41; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px; border: 1px solid #333; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .cockpit-surface { padding: 40px; background: #0c0c0c; border: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">cockpit.manual</div><div style="font-size: 0.7rem; opacity: 0.5;">FLIGHT_v2.0</div></header>
