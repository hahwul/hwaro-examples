<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <div class="cosmic-bg"></div>
  <header class="glass-nav">
    <div class="nav-inner">
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/archives/">Archives</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button class="search-trigger" onclick="openSearch()">Search</button>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <input type="text" id="searchInput" placeholder="Search...">
      <div id="searchResults"></div>
    </div>
  </div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="glass-footer">
    <p>Powered by Hwaro | Stellaris Fractal</p>
  </footer>
  <script src="{{ base_url }}/js/search.js"></script>
  {{ highlight_js }}
</body>
</html>
