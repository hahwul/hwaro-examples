<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg-color: #0f1014;
    --text-color: #e2e4e9;
    --accent-color: #d63230;
    --border-color: #2a2c35;
    --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-mono: 'Courier New', Courier, monospace;
  }
  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-sans);
    margin: 0;
    padding: 0;
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  a {
    color: var(--text-color);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }
  a:hover {
    color: var(--accent-color);
    border-bottom: 1px solid var(--accent-color);
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }
  .site-header {
    border-bottom: 4px solid var(--border-color);
    padding-bottom: 1.5rem;
    margin-bottom: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .site-title {
    font-size: 2.5rem;
    font-weight: 900;
    margin: 0;
    letter-spacing: 0.1em;
  }
  .site-title a { border-bottom: none; }
  .site-title a:hover { color: var(--text-color); }
  .site-nav {
    display: flex;
    gap: 2rem;
    font-weight: bold;
    font-size: 0.9rem;
  }
  h1, h2, h3 {
    font-weight: 900;
    margin-top: 3rem;
    margin-bottom: 1rem;
    color: var(--text-color);
  }
  h1 {
    font-size: 3rem;
    border-bottom: 2px solid var(--border-color);
    padding-bottom: 0.5rem;
  }
  p {
    text-transform: none;
    letter-spacing: normal;
    font-size: 1.1rem;
    color: #a0a4b0;
    margin-bottom: 1.5rem;
    max-width: 70ch;
  }
  .post-list { list-style: none; padding: 0; margin: 0; }
  .post-item {
    border-top: 1px solid var(--border-color);
    padding: 1.5rem 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .post-item:last-child { border-bottom: 1px solid var(--border-color); }
  .post-title { font-size: 1.5rem; font-weight: bold; margin: 0; }
  .post-meta { font-family: var(--font-mono); font-size: 0.8rem; color: #6a6f80; }
  .site-footer {
    border-top: 4px solid var(--border-color);
    margin-top: 6rem;
    padding-top: 2rem;
    padding-bottom: 4rem;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: #6a6f80;
    display: flex;
    justify-content: space-between;
  }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/records/">Records</a>
      </nav>
    </header>
