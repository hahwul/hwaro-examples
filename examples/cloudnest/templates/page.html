{% include "header.html" %}

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 lg:py-24">
    <article class="prose prose-lg prose-blue mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight sm:text-5xl mb-4">{{ page.title }}</h1>
            {% if page.description %}
            <p class="text-xl text-gray-500">{{ page.description }}</p>
            {% endif %}
            {% if page.date %}
            <p class="text-sm text-gray-400 mt-4">{{ page.date | date("%B %d, %Y") }}</p>
            {% endif %}
        </header>

        <div class="text-gray-700 leading-relaxed">
            {{ content | safe }}
        </div>
    </article>
</div>

{% include "footer.html" %}
