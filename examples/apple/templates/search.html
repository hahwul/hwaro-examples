{% include "header.html" %}
<main id="main" class="layout-spread search-spread">
  <article class="prose spread-page-content">
    <header class="page-header-running">
      <span class="running-title">Search &middot; Apple Monograph</span>
      <span class="page-number">iv</span>
    </header>

    <div class="chapter-header-container">
      <h1 class="chapter-title">
        Search Monograph
        <svg class="blossom-icon" viewBox="0 0 100 100" width="24" height="24" aria-hidden="true">
          <path class="petal" d="M 50,50 C 40,30 45,15 50,15 C 55,15 60,30 50,50" />
          <path class="petal" d="M 50,50 C 70,40 85,45 85,50 C 85,55 70,60 50,50" />
          <path class="petal" d="M 50,50 C 60,70 55,85 50,85 C 45,85 40,70 50,50" />
          <path class="petal" d="M 50,50 C 30,60 15,55 15,50 C 15,45 30,40 50,50" />
          <path class="pistils" d="M 50,50 L 50,40 M 50,50 L 57,45 M 50,50 L 43,45 M 50,50 L 55,55 M 50,50 L 45,55" />
          <circle cx="50" cy="50" r="5" class="center-disk" />
        </svg>
      </h1>
    </div>

    <div class="page-body">
      <form role="search" class="search-form" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label for="search-input" class="search-label">Search the Monograph Chapters and Glossary</label>
        <div class="search-input-wrapper">
          <input id="search-input" type="search" class="search-input" placeholder="Type keywords..." autocomplete="off" autofocus>
        </div>
      </form>
      
      <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
      <ul id="search-results" class="search-results"></ul>
    </div>
  </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
