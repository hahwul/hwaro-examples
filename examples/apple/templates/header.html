<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Lato:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('apple-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="site-head-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="site-logo-leaf" viewBox="0 0 100 100" width="24" height="24" aria-hidden="true">
          <path d="M 50,85 C 25,60 25,35 50,15 C 75,35 75,60 50,85 Z" fill="none" stroke="currentColor" stroke-width="3" />
          <path d="M 50,85 C 50,60 50,35 50,15" fill="none" stroke="currentColor" stroke-dasharray="2,2" stroke-width="2" />
        </svg>
        <span class="brand-text">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">
          <svg class="blossom-icon" viewBox="0 0 100 100" width="16" height="16" aria-hidden="true">
            <path class="petal" d="M 50,50 C 40,30 45,15 50,15 C 55,15 60,30 50,50" />
            <path class="petal" d="M 50,50 C 70,40 85,45 85,50 C 85,55 70,60 50,50" />
            <path class="petal" d="M 50,50 C 60,70 55,85 50,85 C 45,85 40,70 50,50" />
            <path class="petal" d="M 50,50 C 30,60 15,55 15,50 C 15,45 30,40 50,50" />
            <path class="pistils" d="M 50,50 L 50,40 M 50,50 L 57,45 M 50,50 L 43,45 M 50,50 L 55,55 M 50,50 L 45,55" />
            <circle cx="50" cy="50" r="5" class="center-disk" />
          </svg>
          Home
        </a>
        <a href="{{ base_url }}/chapters/">
          <svg class="blossom-icon" viewBox="0 0 100 100" width="16" height="16" aria-hidden="true">
            <path class="petal" d="M 50,50 C 40,30 45,15 50,15 C 55,15 60,30 50,50" />
            <path class="petal" d="M 50,50 C 70,40 85,45 85,50 C 85,55 70,60 50,50" />
            <path class="petal" d="M 50,50 C 60,70 55,85 50,85 C 45,85 40,70 50,50" />
            <path class="petal" d="M 50,50 C 30,60 15,55 15,50 C 15,45 30,40 50,50" />
            <path class="pistils" d="M 50,50 L 50,40 M 50,50 L 57,45 M 50,50 L 43,45 M 50,50 L 55,55 M 50,50 L 45,55" />
            <circle cx="50" cy="50" r="5" class="center-disk" />
          </svg>
          Chapters
        </a>
        <a href="{{ base_url }}/glossary/">
          <svg class="blossom-icon" viewBox="0 0 100 100" width="16" height="16" aria-hidden="true">
            <path class="petal" d="M 50,50 C 40,30 45,15 50,15 C 55,15 60,30 50,50" />
            <path class="petal" d="M 50,50 C 70,40 85,45 85,50 C 85,55 70,60 50,50" />
            <path class="petal" d="M 50,50 C 60,70 55,85 50,85 C 45,85 40,70 50,50" />
            <path class="petal" d="M 50,50 C 30,60 15,55 15,50 C 15,45 30,40 50,50" />
            <path class="pistils" d="M 50,50 L 50,40 M 50,50 L 57,45 M 50,50 L 43,45 M 50,50 L 55,55 M 50,50 L 45,55" />
            <circle cx="50" cy="50" r="5" class="center-disk" />
          </svg>
          Glossary
        </a>
        <a href="{{ base_url }}/search/">
          <svg class="blossom-icon" viewBox="0 0 100 100" width="16" height="16" aria-hidden="true">
            <path class="petal" d="M 50,50 C 40,30 45,15 50,15 C 55,15 60,30 50,50" />
            <path class="petal" d="M 50,50 C 70,40 85,45 85,50 C 85,55 70,60 50,50" />
            <path class="petal" d="M 50,50 C 60,70 55,85 50,85 C 45,85 40,70 50,50" />
            <path class="petal" d="M 50,50 C 30,60 15,55 15,50 C 15,45 30,40 50,50" />
            <path class="pistils" d="M 50,50 L 50,40 M 50,50 L 57,45 M 50,50 L 43,45 M 50,50 L 55,55 M 50,50 L 45,55" />
            <circle cx="50" cy="50" r="5" class="center-disk" />
          </svg>
          Search
        </a>
        <button id="theme-toggle" aria-label="Toggle theme" class="theme-toggle-btn">
          <span class="sun-icon" aria-hidden="true">☼</span>
          <span class="moon-icon" aria-hidden="true">☾</span>
        </button>
      </nav>
    </div>
  </header>
