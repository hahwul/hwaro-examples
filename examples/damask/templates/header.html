<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% include "auto_og_tags.html" ignore missing %}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% include "auto_head.html" ignore missing %}
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <div class="header-inner">
        <a href="{{ base_url }}/" class="site-brand">
          <svg class="brand-motif" viewBox="0 0 40 40" width="32" height="32" aria-hidden="true">
            <path d="M20 2 C20 2, 30 10, 30 20 C30 30, 20 38, 20 38 C20 38, 10 30, 10 20 C10 10, 20 2, 20 2Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M20 8 C20 8, 26 14, 26 20 C26 26, 20 32, 20 32 C20 32, 14 26, 14 20 C14 14, 20 8, 20 8Z" fill="none" stroke="currentColor" stroke-width="1"/>
            <circle cx="20" cy="20" r="2" fill="currentColor"/>
          </svg>
          <span class="site-title">{{ site.title }}</span>
        </a>
        <nav class="site-nav">
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/posts/">Archive</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </div>
  </header>
