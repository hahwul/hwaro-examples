{# Manuscript slugline — expects sl_title, sl_draft, sl_words set by the caller. #}
<p class="slugline">
  <span class="slugline-title">{{ sl_title | e }}</span>
  <span class="slugline-sep" aria-hidden="true">/</span>
  <span class="slugline-draft">Draft {{ sl_draft | e }}</span>
  <span class="slugline-sep" aria-hidden="true">/</span>
  <span class="slugline-words">{{ sl_words | e }} words</span>
</p>
