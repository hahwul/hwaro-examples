title = "Seoul Modern"
description = "A light, concrete-and-neon theme for a modern Seoul — clean sans-serif type with a single electric accent."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
enabled = true
format = "fuse_json"

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

[markdown]
safe = false
lazy_loading = true

[seo]
llms_txt = true
