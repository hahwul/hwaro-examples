<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #00e5ff;
      --primary-glow: rgba(0, 229, 255, 0.4);
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --bg: #0a0a0f;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6; margin: 0; color: var(--text); background: var(--bg);
      background-image: radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.15), transparent 25%);
      background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; margin-bottom: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .site-logo { font-weight: 700; font-size: 1.25rem; color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.3s; }
    .site-header nav a:hover { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }

    .site-main {
      min-height: calc(100vh - 250px);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 3rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
    }

    .site-footer {
      margin-top: 3rem; padding: 1.5rem 0; color: var(--text-muted); font-size: 0.85rem; text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #fff; }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; color: var(--primary); border: 1px solid var(--glass-border); }
    pre { background: rgba(0,0,0,0.4); padding: 1.5rem; border-radius: 16px; overflow-x: auto; border: 1px solid var(--glass-border); }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; display: grid; gap: 1rem; }
    ul.section-list li { padding: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid var(--glass-border); transition: transform 0.3s, box-shadow 0.3s; }
    ul.section-list li:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); background: rgba(255,255,255,0.05); }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; border-radius: 24px; }
      .site-main { padding: 1.5rem; border-radius: 24px; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
