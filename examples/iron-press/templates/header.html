<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #222; --text: #ddd; --accent: #888; --iron: #111; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 4px solid #444; padding: 20px 0; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; color: #fff; }
        .iron-surface { background: var(--iron); padding: 80px; border: 1px solid #333; box-shadow: 20px 20px 60px rgba(0,0,0,0.5); position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">iron.press</div></header>
