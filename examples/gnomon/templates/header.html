<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('gnomon-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="sundial-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false" width="24" height="24">
          <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="24" y2="24" stroke="currentColor" stroke-width="2" stroke-dasharray="2,2" opacity="0.7"/>
          <circle cx="16" cy="16" r="2" fill="currentColor"/>
        </svg>
        <span>{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/releases/">Releases</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
          <span class="theme-toggle-icon"></span>
        </button>
      </nav>
    </div>
  </header>
