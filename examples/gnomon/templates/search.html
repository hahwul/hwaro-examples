{% include "header.html" %}
<main id="main" class="search-page-container">
  <div class="search-panel">
    <h1>{{ page.title | e }}</h1>
    <p class="search-intro">Query Gnomon's job scheduler changelogs and documentation index.</p>
    <form role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;" class="search-form">
      <div class="search-input-wrapper">
        <label for="search-input" class="sr-only">Search</label>
        <input id="search-input" type="search" autocomplete="off" autofocus placeholder="Type to search (e.g. cron, locking, v2.0)...">
      </div>
    </form>
    <p id="search-status" role="status" aria-live="polite" class="search-status"></p>
    <ul id="search-results" class="search-results-list"></ul>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
