{% include "header.html" %}
<main id="main">
  <article class="prose">
    <h1>{{ page.title | e }}</h1>
    {% if page.date %}
    <time class="page-date" datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
    {% endif %}
    <div class="prose-content">
      {{ content | safe }}
    </div>
    {% if page.tags %}
    <div class="page-tags-footer">
      <span class="tags-label">Tags:</span>
      <ul class="tag-list">
        {% for t in page.tags %}
        <li><a href="{{ get_taxonomy_url(kind='tags', term=t) }}">#{{ t }}</a></li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}
  </article>
</main>
{% include "footer.html" %}
