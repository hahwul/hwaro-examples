{% include "header.html" %}
<main id="main" class="taxonomy-container">
  <h1>Tags Index</h1>
  <p class="taxonomy-intro">All classified job tags tracked by the Gnomon scheduling daemon.</p>
  {% set tax = get_taxonomy(kind="tags") %}
  <ul class="term-list">
    {% for term in tax.items | sort_by("name") %}
    <li class="term-item">
      <a href="{{ get_taxonomy_url(kind='tags', term=term.name) }}" class="term-link">
        <span class="term-name">#{{ term.name }}</span>
        <span class="term-count">{{ term.pages | length }} job(s)</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>
{% include "footer.html" %}
