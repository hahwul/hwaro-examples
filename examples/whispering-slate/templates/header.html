<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #2c3e50;
      --accent: #4a5568;
      --border: #cbd5e1;
      --container-bg: #ffffff;
    }
    body {
      font-family: "Georgia", "Times New Roman", serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.8;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background-color: var(--container-bg);
      padding: 40px 60px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border-top: 5px solid var(--accent);
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 40px;
      text-align: center;
    }
    .site-title {
      font-size: 2.5rem;
      font-weight: normal;
      margin: 0 0 10px 0;
      color: var(--text);
    }
    .site-title a {
      text-decoration: none;
      color: inherit;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 15px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    h1, h2, h3 {
      font-weight: normal;
      color: var(--text);
      margin-top: 1.5em;
    }
    a {
      color: var(--accent);
    }
    .site-main {
      min-height: 50vh;
    }
    ul.section-list {
      list-style: none;
      padding: 0;
    }
    ul.section-list li {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px dashed var(--border);
    }
    ul.section-list a {
      font-size: 1.2rem;
      text-decoration: none;
      color: var(--text);
    }
    ul.section-list a:hover {
      color: var(--accent);
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header>
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
