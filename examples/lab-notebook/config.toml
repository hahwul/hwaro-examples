title = "Laboratory Notebook: Electrochemical CO2 Reduction"
description = "A laboratory record paper documenting experimental observations on copper-tin catalyst performance, featuring grid paper backgrounds, hand-drawn data plots with error bars, and raw data tables."
base_url = "http://localhost:3000"

sections = ["entries"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
