<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="brand" href="{{ base_url }}/" aria-label="Moonbow home">
        <svg class="brand-mark" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="22" height="22" rx="6" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
          <rect x="5" y="14.5" width="3" height="3" rx="0.6" fill="currentColor"/>
          <rect x="10.5" y="9.5" width="3" height="3" rx="0.6" fill="currentColor"/>
          <rect x="10.5" y="14.5" width="3" height="3" rx="0.6" fill="currentColor" opacity="0.4"/>
          <rect x="16" y="6" width="3" height="3" rx="0.6" fill="currentColor"/>
        </svg>
        <span class="brand-word">Moonbow</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/patches/">Patches</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <button class="cmdk" type="button" id="search-open" aria-haspopup="dialog" aria-label="Open command palette search">
          <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true" focusable="false">
            <circle cx="7" cy="7" r="4.4" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="cmdk-keys"><kbd>Ctrl</kbd><kbd>K</kbd></span>
        </button>
      </nav>
    </div>
  </header>
