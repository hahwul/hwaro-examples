{% extends "base.html" %}

{% block content %}
<section class="section">
    <h2>{{ section.title }}</h2>
    <div class="content">
        {{ content | safe }}
    </div>

    <ul class="section-list">
    {% for page in section.pages %}
        <li><a href="{{ base_url }}{{ page.url }}">{{ page.title }}</a></li>
    {% endfor %}
    </ul>
</section>
{% endblock %}
