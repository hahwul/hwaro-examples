{% extends "base.html" %}

{% block content %}
<section class="taxonomy-term">
    <h2>{{ taxonomy }}: {{ term }}</h2>
    <ul class="pages-list">
    {% for page in pages %}
        <li><a href="{{ base_url }}{{ page.url }}">{{ page.title }}</a></li>
    {% endfor %}
    </ul>
</section>
{% endblock %}
