{% extends "base.html" %}

{% block content %}
<section class="taxonomy">
    <h2>{{ taxonomy }}</h2>
    <ul class="taxonomy-list">
    {% for term in terms %}
        <li><a href="{{ base_url }}{{ term.url }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
    {% endfor %}
    </ul>
</section>
{% endblock %}
