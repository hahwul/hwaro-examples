{% include "header.html" %}
  <main class="site-main">
    <div class="hero-section">
      <h1 class="hero-title">Index of <em>{{ taxonomy_name | e }}</em></h1>
      <p class="hero-subtitle">Browse publication archives filtered by {{ taxonomy_name | e }}.</p>
    </div>

    <div class="post-wrapper" style="border-top: var(--border); padding-top: 3rem;">
      <div class="badge-container" style="gap: 3rem;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1rem; color: var(--text); border-bottom: 1px solid var(--text);">
            {{ term.name | upper }} <span style="font-weight: 300; font-size: 0.85rem; color: var(--text-muted);">({{ term.pages | length }})</span>
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
