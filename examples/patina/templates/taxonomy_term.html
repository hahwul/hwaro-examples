{% include "header.html" %}

  <main class="site-main">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">{{ taxonomy_term }}</h1>
      </div>

      <div class="post-list">
        {% for post in taxonomy_pages %}
        <article class="post-card">
          <div class="post-card-accent"></div>
          <div class="post-card-body">
            <h2 class="post-card-title">
              <a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a>
            </h2>
            <div class="post-card-meta">
              <time>{{ post.date | date("%B %d, %Y") }}</time>
            </div>
            {% if post.summary %}
            <p class="post-card-summary">{{ post.summary | strip_html | truncate_words(30) }}</p>
            {% endif %}
          </div>
        </article>
        {% endfor %}
      </div>
    </div>
  </main>

{% include "footer.html" %}
