<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #ff007f;
      --secondary: #00e5ff;
      --text: #f0e6ff;
      --text-muted: #b0a3c7;
      --border: rgba(255, 0, 127, 0.3);
      --bg: #1a0b2e;
      --bg-subtle: rgba(26, 11, 46, 0.8);
      --glow: rgba(255, 0, 127, 0.5);
      --glow-secondary: rgba(0, 229, 255, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; box-shadow: 0 4px 20px -10px var(--glow); }
    .site-logo { font-weight: 700; font-size: 1.4rem; color: var(--text); text-decoration: none; text-shadow: 0 0 10px var(--glow); letter-spacing: 1px; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px var(--glow), 0 0 25px var(--glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.3s, text-shadow 0.3s; }
    .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px var(--glow-secondary); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; box-shadow: 0 -4px 20px -10px var(--glow); }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; color: var(--text); text-shadow: 0 0 8px rgba(240, 230, 255, 0.3); }
    h1 { font-size: 2rem; margin-top: 0; color: var(--primary); text-shadow: 0 0 15px var(--glow); }
    h2 { font-size: 1.5rem; color: var(--secondary); text-shadow: 0 0 10px var(--glow-secondary); }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; text-shadow: 0 0 5px var(--glow); transition: text-shadow 0.3s, color 0.3s; }
    a:hover { color: var(--secondary); text-shadow: 0 0 10px var(--glow-secondary); text-decoration: none; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: var(--secondary); }
    pre { background: var(--bg-subtle); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 0 15px var(--glow) inset; }
    pre code { background: none; padding: 0; border: none; box-shadow: none; color: inherit; text-shadow: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.3s, box-shadow 0.3s; }
    ul.section-list li:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--glow); border-color: var(--primary); }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; color: var(--text); text-shadow: none; }
    ul.section-list li a:hover { color: var(--primary); text-shadow: 0 0 8px var(--glow); }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; background: var(--bg-subtle); transition: all 0.3s; text-shadow: none; }
    nav.pagination a:hover { color: var(--text); border-color: var(--secondary); box-shadow: 0 0 10px var(--glow-secondary); text-shadow: 0 0 5px var(--glow-secondary); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(255, 0, 127, 0.2); color: var(--text); box-shadow: 0 0 10px var(--glow); text-shadow: 0 0 5px var(--glow); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.3); opacity: 0.6; }

    /* Image handling for Pop Surreal */
    img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
