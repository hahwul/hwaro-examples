{% extends "base.html" %}

{% block content %}
<section class="block-print ink-bleed">
    <h1 class="prose">{{ taxonomy_name | upper }}: {{ taxonomy_term.name }}</h1>

    <div class="post-list">
        {% for page in taxonomy_pages %}
        <article class="post-item">
            <span class="post-date">{{ page.date | date("%B %d, %Y") }}</span>
            <h2 class="post-title"><a href="{{ page.url }}">{{ page.title }}</a></h2>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
