<header class="site-header ink-bleed">
    <div class="header-inner">
        <div class="site-branding">
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
            <p class="site-subtitle">{{ site.description }}</p>
        </div>
        <nav class="site-navigation">
            <a href="{{ base_url }}/posts/">Journal</a>
            <a href="{{ base_url }}/about/">About</a>
            <button class="search-trigger" onclick="openSearch()" title="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
        </nav>
    </div>
</header>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal block-print ink-bleed">
    <div class="search-input-wrap">
      <input type="text" id="searchInput" placeholder="SEARCH IMPRESSIONS..." autocomplete="off">
      <kbd onclick="closeSearch()">[X]</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
