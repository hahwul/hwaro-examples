<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="sheet">
    <span class="crop crop-tl" aria-hidden="true"></span>
    <span class="crop crop-tr" aria-hidden="true"></span>
    <span class="crop crop-bl" aria-hidden="true"></span>
    <span class="crop crop-br" aria-hidden="true"></span>

    <header class="masthead">
      <a href="{{ base_url }}/" class="masthead__mark">
        <span class="masthead__name">PASCAL</span>
        <span class="masthead__sub">PRESS &amp; RISO</span>
      </a>
      <nav class="masthead__nav" aria-label="Primary">
        <a href="{{ base_url }}/services/">Services</a>
        <a href="{{ base_url }}/papers/">Papers</a>
        <a href="{{ base_url }}/pricing/">Pricing</a>
        <a href="{{ base_url }}/visit/">Visit</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <span class="masthead__stamp" aria-hidden="true">EST. 2019 &mdash; SHEET NO. 04</span>
    </header>
