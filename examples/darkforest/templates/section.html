{% include "header.html" %}
<div class="eyebrow">Index — {{ page.title | e }}</div>
<h1>{{ page.title | e }}</h1>
{% if page.description %}<p class="lead">{{ page.description | e }}</p>{% endif %}
<div class="divider-ornament">
  <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="11" cy="11" r="2.5" fill="#5fae7d"/>
    <circle cx="11" cy="11" r="6" fill="none" stroke="#324f3e" stroke-width="1"/>
    <circle cx="11" cy="11" r="10" fill="none" stroke="#243b2f" stroke-width="1"/>
  </svg>
</div>
<div class="post-content">
  {{ content | safe }}
</div>
<ul class="section-list">
  {{ section.list }}
</ul>
{{ pagination }}
{% include "footer.html" %}
