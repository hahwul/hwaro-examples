<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page and page.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
  <style>
    :root {
      --bg: #0b1410;
      --bg-2: #0f1a14;
      --surface: #142019;
      --surface-2: #1a2820;
      --line: #243b2f;
      --line-2: #324f3e;
      --moss: #5fae7d;
      --moss-deep: #2f7a4d;
      --bark: #8b6f4a;
      --parchment: #ece4cf;
      --ink: #e6efe7;
      --ink-dim: #a4b8a8;
      --ink-mute: #6b7d6f;
      --warn: #d68a3c;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
      font-size: 19px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .sans { font-family: 'Inter', -apple-system, sans-serif; }
    a { color: var(--moss); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
    a:hover { border-bottom-color: var(--moss); }

    .container { max-width: 980px; margin: 0 auto; padding: 0 28px; }
    .narrow { max-width: 720px; margin: 0 auto; padding: 0 28px; }

    header.site-top { border-bottom: 1px solid var(--line); position: relative; }
    .top-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 26px 0;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 14px;
      color: var(--ink); border: none;
    }
    .brand:hover { border-bottom: none; }
    .brand-name {
      letter-spacing: 0.18em; text-transform: uppercase;
      font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 600;
    }

    .nav-links { display: flex; gap: 28px; list-style: none; padding: 0; margin: 0; }
    .nav-links a {
      font-family: 'Inter', sans-serif; font-size: 11px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--ink-dim); padding: 6px 0; border: none;
    }
    .nav-links a:hover { color: var(--moss); border-bottom: 1px solid var(--moss); }

    .canopy { display: block; width: 100%; height: 96px; border-bottom: 1px solid var(--line); }

    main { display: block; padding: 64px 0 96px; }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; line-height: 1.18;
      color: var(--ink); letter-spacing: -0.01em;
    }
    h1 { font-size: clamp(2.6rem, 6vw, 4.4rem); margin: 0 0 24px; font-weight: 600; }
    h2 { font-size: 2rem; margin: 56px 0 16px; }
    h3 { font-size: 1.5rem; margin: 40px 0 12px; }
    p { color: var(--ink-dim); }
    .lead { font-style: italic; color: var(--parchment); font-size: 1.18rem; max-width: 60ch; }

    code {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      background: var(--surface); border: 1px solid var(--line);
      padding: 1px 6px; font-size: 0.85em; color: var(--moss);
    }
    pre { background: var(--surface); border: 1px solid var(--line); padding: 18px; overflow-x: auto; font-family: ui-monospace, monospace; }
    pre code { background: none; border: none; padding: 0; color: var(--ink); }
    blockquote { border-left: 2px solid var(--moss); padding: 4px 0 4px 22px; margin: 28px 0; color: var(--parchment); font-style: italic; font-size: 1.1em; }
    hr { border: none; border-top: 1px solid var(--line); margin: 48px 0; }
    img { max-width: 100%; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; margin: 24px 0; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); color: var(--ink-dim); }
    th { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }

    .eyebrow {
      font-family: 'Inter', sans-serif; font-size: 11px;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--moss); margin-bottom: 22px;
      display: inline-flex; align-items: center; gap: 14px;
    }
    .eyebrow::before { content: ""; width: 32px; height: 1px; background: var(--moss); }

    .meta {
      font-family: 'Inter', sans-serif; font-size: 12px;
      color: var(--ink-mute); letter-spacing: 0.18em; text-transform: uppercase;
      margin-top: 18px;
    }

    .divider-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin: 56px 0; color: var(--moss);
    }
    .divider-ornament::before, .divider-ornament::after {
      content: ""; flex: 1; height: 1px; background: var(--line);
    }

    .section-list { list-style: none; padding: 0; margin: 32px 0; }
    .section-list li { border-bottom: 1px solid var(--line); padding: 28px 0; }
    .section-list li a {
      display: block; color: var(--ink); font-size: 1.5rem; font-weight: 600;
      border: none;
    }
    .section-list li a:hover { color: var(--moss); }

    article.tale .post-content p:first-of-type::first-letter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 4.4rem; line-height: 0.9;
      float: left; padding: 8px 12px 0 0;
      color: var(--moss);
    }

    footer.site-bottom {
      border-top: 1px solid var(--line);
      padding: 40px 0 60px;
      text-align: center;
    }
    footer .copyright {
      font-family: 'Inter', sans-serif; font-size: 11px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--ink-mute);
    }
    footer .copyright a { color: var(--moss); border: none; }

    @media (max-width: 720px) {
      body { font-size: 18px; }
      .nav-links { gap: 18px; }
      .top-row { padding: 18px 0; }
    }
  </style>
</head>
<body>
<header class="site-top">
  <div class="container top-row">
    <a class="brand" href="{{ base_url }}/">
      <svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
