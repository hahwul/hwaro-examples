{% include "header.html" %}

<article class="glass-panel">
    <header class="page-header">
        {% if page.title %}
        <h1>{{ page.title }}</h1>
        {% endif %}
        {% if page.date %}
        <div class="article-date">{{ page.date | date("%B %d, %Y") }}</div>
        {% endif %}
    </header>

    <div class="page-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
