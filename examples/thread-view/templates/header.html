<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --border: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; font-size: 1.2rem; }
        .thread { padding: 20px; }
        .node { position: relative; padding-left: 40px; margin-bottom: 30px; }
        .node::before { content: ''; position: absolute; left: 10px; top: 0; bottom: -30px; width: 2px; background: var(--border); }
        .node:last-child::before { display: none; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #000; position: absolute; left: -5px; top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">thread.view</div></header>
