{% include "header.html" %}

<div class="section-header">
  <span class="hero-label">Taxonomy</span>
  <h1 class="section-title">{{ taxonomy_name }}</h1>
</div>

<ul class="taxonomy-list">
  {% for term in taxonomy_terms %}
  <li>
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">
      <span>{{ term.name }}</span>
      <span class="taxonomy-count">{{ term.pages | length }}</span>
    </a>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
