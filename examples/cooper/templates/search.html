{% include "header.html" %}
<main id="main" class="search-main">
  <article class="prose">
    <h1 class="chapter-title">{{ page.title | e }}</h1>
    
    <div class="hoop-line">
      <svg class="rivet-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="8" fill="var(--surface)" stroke="var(--muted)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3" fill="#151210"/>
      </svg>
    </div>

    <form role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;" class="search-form">
      <label for="search-input" class="sr-only">Search the handbook...</label>
      <input id="search-input" type="search" placeholder="Search the handbook..." autocomplete="off" autofocus>
    </form>
    
    <p id="search-status" role="status" aria-live="polite" class="search-status"></p>
    <ul id="search-results" class="search-results-list"></ul>
  </article>
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
