{% include "header.html" %}
<main id="main" class="section-main">
  <article class="prose">
    <h1 class="chapter-title">{{ section.title | e }}</h1>
    
    {{ content | safe }}
    
    <div class="hoop-line">
      <svg class="rivet-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="8" fill="var(--surface)" stroke="var(--muted)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3" fill="#151210"/>
      </svg>
    </div>

    <ul class="section-pages-list">
      {% for p in section.pages %}
      <li>
        <span class="chap-num">{{ loop.index }}.</span>
        <a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a>
        {% if p.description %}
        <p class="page-desc">{{ p.description | e }}</p>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </article>
</main>
{% include "footer.html" %}
