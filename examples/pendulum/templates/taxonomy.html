{% include "header.html" %}
  <h1 class="text-3xl font-display font-bold text-cream mb-8">{{ taxonomy_name | title }}</h1>
  <div class="flex flex-wrap gap-3">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}{{ term.url }}" class="px-4 py-2 bg-wood-light border border-bronze/20 rounded hover:border-bronze/40 text-cream/60 hover:text-cream transition-all text-sm">
      {{ term.name }} <span class="text-cream/20">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
