<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #111;
            --accent: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 2px solid var(--text);
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .type-hero {
            padding: 100px 0;
        }
        .type-hero h1 {
            font-family: 'Inter', sans-serif;
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -4px;
        }
        article { padding: 60px 0; font-size: 1.2rem; }
        h2 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 3rem; margin-top: 60px; }
        b { font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">CLEARTYPE.</div>
            <nav>
                <a href="/">Reading</a>
                <a href="/about">Clarity</a>
            </nav>
        </div>
    </header>
