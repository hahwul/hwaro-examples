<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | e }} — Episodes" href="{{ base_url }}/episodes/rss.xml">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site-frame">
    <header class="site-header">
      <div class="site-header-inner">
        <a href="{{ base_url }}/" class="masthead-mark">
          <span class="masthead-glyph" aria-hidden="true">ə</span>
          <span class="masthead-word">{{ site.title | e }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/episodes/">Episodes</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
          <a href="{{ base_url }}/search/">Search</a>
        </nav>
      </div>
    </header>
