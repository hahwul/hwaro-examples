{% include "header.html" %}
<main id="main" class="site-main">
  <header class="page-head">
    <p class="page-kicker">Find an episode</p>
    <h1 class="page-title">{{ page.title | e }}</h1>
    <p class="page-intro">Search titles, tags, and show-note text across every episode of Cadence.</p>
  </header>

  <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
    <label class="search-label" for="search-input">Search episodes</label>
    <input class="search-input" id="search-input" type="search" name="q" placeholder="uptalk, vowel shift, loanwords&hellip;" autocomplete="off" autofocus>
  </form>
  <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
  <ol class="spine spine-search" id="search-results"></ol>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
