<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@900&family=Work+Sans:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f1e9;
            --text: #1a1a1a;
            --accent: #d00;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 900;
            font-size: 3rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .incunabula-hero {
            padding: 60px 0;
            text-align: center;
        }
        .incunabula-hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 10vw;
            line-height: 0.8;
            margin: 0;
        }
        article {
            background: #fff;
            padding: 80px;
            border: 2px solid #ddd;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            position: relative;
        }
        .first-letter {
            float: left;
            font-family: 'Crimson Pro', serif;
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin-right: 10px;
            color: var(--accent);
        }
        h2 { font-family: 'Crimson Pro', serif; font-size: 2.5rem; border-bottom: 2px solid var(--text); padding-bottom: 10px; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">INCUNABULA</div>
            <nav>
                <a href="/">Cradle</a>
                <a href="/about">Press</a>
            </nav>
        </div>
    </header>
