<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #000; }
        body { background-color: #f5f5f5; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'IBM Plex Mono'; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .ammeter-surface { background: #fff; border: 2px solid #000; padding: 80px; text-align: center; position: relative; }
        .scale { border-top: 2px solid #000; height: 100px; margin-top: 40px; position: relative; }
        .pointer { position: absolute; bottom: 0; left: 50%; width: 2px; height: 120px; background: #ff0000; transform-origin: bottom center; transform: rotate(15deg); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">ammeter.ref</div></header>
