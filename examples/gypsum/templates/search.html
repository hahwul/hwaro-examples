{% include "header.html" %}
  <main id="main" class="wrap">
    <article class="doc">
      <header class="doc-head">
        <p class="doc-kicker">Reference</p>
        <h1>{{ page.title | e }}</h1>
        {% if page.description %}<p class="doc-lede">{{ page.description | e }}</p>{% endif %}
      </header>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the syntax reference</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="emphasis, blockquote, fenced code…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="search-results" id="search-results"></ol>
    </article>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
