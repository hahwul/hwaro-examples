<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf3e8;
            --text: #2e1d1a;
            --accent: #8b0000;
            --border: #4a3b32;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IM Fell English', serif;
            margin: 0;
            line-height: 1.7;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.04"/></svg>');
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 60px;
            border: 4px double var(--border);
            background: rgba(255,255,255,0.3);
            min-height: 90vh;
        }
        header {
            padding-bottom: 40px;
            border-bottom: 1px solid var(--accent);
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-family: 'Cinzel Decorative', cursive;
            font-weight: 900;
            font-size: 3rem;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1rem;
            font-variant: small-caps;
        }
        .best-hero {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .best-hero h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 4rem;
            margin: 0;
            color: var(--border);
        }
        article { padding-bottom: 60px; font-size: 1.2rem; }
        h2 { font-family: 'Cinzel Decorative', cursive; font-size: 2.5rem; color: var(--accent); text-align: center; margin-top: 60px; }
        .creature-card {
            border: 2px solid var(--accent);
            padding: 40px;
            margin-top: 40px;
            background: rgba(139, 0, 0, 0.03);
            text-align: center;
        }
        .creature-card h3 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2rem;
            color: var(--text);
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">BESTIARY</div>
        <nav>
            <a href="/">Creatures</a>
            <a href="/about">Myths</a>
        </nav>
    </header>
