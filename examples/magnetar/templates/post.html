{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.title }}{% endblock %}

{% block content %}
<article class="content-box">
    <h2>{{ page.title }}</h2>
    {% if page.date %}
    <div class="post-date">{{ page.date | date(format="%B %d, %Y") }}</div>
    {% endif %}
    <div class="prose">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
