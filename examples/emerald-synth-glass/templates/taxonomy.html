{% extends "base.html" %}

{% block content %}
<div class="section-header" style="margin-bottom: 3rem; text-align: center;">
    <h1>{{ taxonomy.name | capitalize }}</h1>
</div>

<div class="glass-panel" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;">
    {% if terms is defined %}
        {% for term in terms %}
        <a href="{{ base_url }}{{ term.url }}" class="tag-pill" style="font-size: 1rem; padding: 0.5rem 1rem;">
            {{ term.name }} ({{ term.pages | length }})
        </a>
        {% endfor %}
    {% endif %}
</div>
{% endblock content %}
