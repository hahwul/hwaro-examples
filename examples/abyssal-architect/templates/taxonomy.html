{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <h1 class="page-title">{{ taxonomy_name }}</h1>
</header>
<div class="page-tags">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name | slugify }}/{{ term | slugify }}/" class="tag">{{ term }}</a>
    {% endfor %}
</div>
{% endblock %}
