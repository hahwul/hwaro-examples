<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #00ffcc;
            --muted: #222;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 1px solid var(--muted);
        }
        .logo {
            font-family: 'Major Mono Display', monospace;
            font-size: 2rem;
            color: var(--accent);
            text-transform: lowercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.5;
        }
        nav a:hover { opacity: 1; color: var(--accent); }
        .shock-hero {
            padding: 100px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .shock-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
        }
        .shock-ripple-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            opacity: 0.2;
            z-index: -1;
        }
        .shock-hero h1 {
            font-family: 'Major Mono Display', monospace;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
        }
        article { padding: 60px 0; }
        h2 { font-family: 'Major Mono Display', monospace; font-size: 3rem; color: var(--accent); }
        .reach-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        .reach-item {
            border: 1px solid var(--muted);
            padding: 30px;
            text-align: center;
        }
        .reach-item span { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">sh0ck.waVe</div>
            <nav>
                <a href="/">Origin</a>
                <a href="/about">Radius</a>
            </nav>
        </div>
    </header>
