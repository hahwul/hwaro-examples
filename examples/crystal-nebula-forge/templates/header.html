<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | e }} - {% elif section.title %}{{ section.title | e }} - {% endif %}{{ site.title | e }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes | safe }}
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="blog-container">
    <header class="blog-header">
      <a class="blog-title" href="{{ base_url }}/">{{ site.title | e }}</a>
      <nav class="blog-nav">
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/archives/">Archives</a>
      </nav>
    </header>
    <main class="blog-main">
