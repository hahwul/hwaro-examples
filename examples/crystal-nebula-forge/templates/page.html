{% include "header.html" %}
<article class="post-content">
  <header>
    <h1>{{ page.title | e }}</h1>
    {% if page.description %}
    <p class="post-meta">{{ page.description | e }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content | safe }}
  </div>
</article>
