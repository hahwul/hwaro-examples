<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg-dark: #0f111a;
    --text-light: #e2e8f0;
    --accent: #38bdf8;
    --accent-hover: #7dd3fc;
    --border: #1e293b;
  }
  body {
    background-color: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    line-height: 1.7;
  }
  a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
  a:hover { color: var(--accent-hover); }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: baseline; }
  .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text-light); }
  nav a { margin-left: 1.5rem; font-size: 0.95rem; }
  h1, h2, h3 { color: #f8fafc; font-weight: 600; }
  .section-list { list-style: none; padding: 0; }
  .section-list li { margin-bottom: 1rem; border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; background-color: rgba(255, 255, 255, 0.02); }
  .section-list a { font-size: 1.1rem; font-weight: 500; display: block; margin-bottom: 0.5rem; }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
