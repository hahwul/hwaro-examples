<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --primary: #00f0ff;
      --primary-glow: rgba(0, 240, 255, 0.4);
      --bg: #09090b;
      --surface: rgba(20, 20, 25, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; width: 100%; flex: 1; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; background: var(--bg); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); transition: color 0.3s; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { padding-bottom: 4rem; }

    h1, h2, h3 { color: #fff; line-height: 1.3; margin-top: 2em; margin-bottom: 0.75em; font-weight: 600; }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(90deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    a { color: var(--primary); text-decoration: none; transition: text-shadow 0.3s; }
    a:hover { text-shadow: 0 0 8px var(--primary-glow); }
    code { background: var(--surface); border: 1px solid var(--border); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; color: var(--primary); }
    pre { background: var(--surface); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; backdrop-filter: blur(5px); }
    pre code { background: none; border: none; padding: 0; color: inherit; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
