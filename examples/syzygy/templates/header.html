<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0e1210">
  <title>{% if page.title and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="{{ base_url }}/" aria-label="Syzygy — home">
        <svg class="brand-mark" viewBox="0 0 32 12" aria-hidden="true" focusable="false">
          <line x1="1" y1="6" x2="31" y2="6" stroke="currentColor" stroke-width="1"></line>
          <circle cx="2.5" cy="6" r="2" fill="currentColor"></circle>
          <circle cx="16" cy="6" r="2.75" fill="currentColor"></circle>
          <circle cx="29.5" cy="6" r="2" fill="currentColor"></circle>
        </svg>
        <span class="brand-word">SYZYGY</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/talks/"{% if page.section == "talks" %} aria-current="page"{% endif %}>Schedule</a>
        <a href="{{ base_url }}/venue/"{% if page.url == "/venue/" %} aria-current="page"{% endif %}>Venue</a>
        <a class="site-nav-cta" href="{{ base_url }}/register/"{% if page.url == "/register/" %} aria-current="page"{% endif %}>Register</a>
      </nav>
    </div>
  </header>
