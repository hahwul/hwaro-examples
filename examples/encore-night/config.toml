title = "Encore Night"
description = "A farewell concert event site -- one last show, one more song, warm amber lights on an empty stage. Large display typography over a vinyl record backdrop with song lists in old-style figures."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
