<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Vollkorn:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="encore-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Encore Night home">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Miniature vinyl record -->
          <circle cx="24" cy="24" r="22" fill="#1a0f08" stroke="#c78a3c" stroke-width="1"/>
          <circle cx="24" cy="24" r="18" fill="none" stroke="#3a2616" stroke-width="0.5"/>
          <circle cx="24" cy="24" r="15" fill="none" stroke="#3a2616" stroke-width="0.5"/>
          <circle cx="24" cy="24" r="12" fill="none" stroke="#3a2616" stroke-width="0.5"/>
          <circle cx="24" cy="24" r="9" fill="#c78a3c"/>
          <circle cx="24" cy="24" r="2" fill="#1a0f08"/>
        </svg>
        <span class="logo-text">
          <span class="logo-main">Encore Night</span>
          <span class="logo-sub">One More Song</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">THE NIGHT</a>
        <a href="{{ base_url }}/setlist/">SETLIST</a>
        <a href="{{ base_url }}/band/">THE BAND</a>
        <a href="{{ base_url }}/tickets/">TICKETS</a>
      </nav>
    </header>
