<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #ddd;
            --accent: #ffd700;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .vault-hero {
            padding: 100px 0;
            text-align: center;
        }
        .vault-hero h1 {
            font-family: 'Space Mono', monospace;
            font-size: 5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 4px;
            border: 1px solid #333;
            margin-top: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-family: 'Space Mono', monospace; font-size: 2.2rem; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.vault</div>
        <nav>
            <a href="/">Secure</a>
            <a href="/about">Assets</a>
        </nav>
    </header>
