<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="wrap">
    <header class="masthead">
      <div class="flag-line-top">
        <span>Vol. XXIV &middot; No. 118</span>
        <span>Weekly Edition</span>
        <span>Independent Since 2011</span>
      </div>
      <h1 class="flag"><a href="{{ base_url }}/" style="text-decoration:none;color:inherit;">Ink <span class="amp">&amp;</span> Press</a></h1>
      <div class="flag-line-bottom">
        <span>Reporting on culture, technology, and the print that precedes them both.</span>
        <span>Two copper a copy</span>
      </div>
      <nav>
        <a href="{{ base_url }}/">Front Page</a>
        <a href="{{ base_url }}/stories/">Stories</a>
        <a href="{{ base_url }}/about/">Colophon</a>
        <a href="{{ base_url }}/rss.xml">RSS</a>
      </nav>
    </header>
