title = "Radiolaria"
description = "A bold, skeletal, and elegant geometric theme"
base_url = "http://localhost:3000"
default_language = "en"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = false
sitemap = false

[sitemap]
enabled = false

[robots]
enabled = false

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = true
emoji = false

[extra]
author = "Hwaro Examples"
