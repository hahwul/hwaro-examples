<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(value=site.title) }}</title>
    <style>
        /*
        Radiolaria Theme
        Bold, creative, and elegant.
        Skeletal geometric structures, solid colors, typography. No gradients. No emojis.
        */

        :root {
            --bg-color: #05080a; /* Darker, deeper void */
            --text-color: #e0f2f7; /* Brighter icy blue */
            --accent: #ff2d55; /* Sharp neon coral */
            --border: rgba(224, 242, 247, 0.1); /* Sharp structural lines */
            --struct-thick: rgba(224, 242, 247, 0.9);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-display: 'Playfair Display', 'Cormorant Garamond', 'Georgia', serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            background-image:
                url('data:image/svg+xml;utf8,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><path d="M0 60 L60 60 L60 0" fill="none" stroke="rgba(224,242,247,0.05)" stroke-width="0.5"/></svg>'),
                url('data:image/svg+xml;utf8,<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg"><path d="M0 0 L300 300 M300 0 L0 300" fill="none" stroke="rgba(224,242,247,0.02)" stroke-width="0.5"/></svg>');
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Intricate skeletal background patterns */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="rgba(224,242,247,0.03)" stroke-width="1"><circle cx="200" cy="200" r="150"/><circle cx="200" cy="200" r="100"/><circle cx="200" cy="200" r="50"/><path d="M200 50 L200 350 M50 200 L350 200"/><polygon points="200,80 304,140 304,260 200,320 96,260 96,140"/><path d="M200 200 L304 140 M200 200 L304 260 M200 200 L200 320 M200 200 L96 260 M200 200 L96 140 M200 200 L200 80"/></g></svg>');
            background-repeat: repeat;
            background-position: center;
            z-index: -1;
            animation: slowRotate 120s linear infinite;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            flex-grow: 1;
            position: relative;
        }

        /* Header / Logo */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 4rem 0 2rem;
            border-bottom: 4px solid var(--struct-thick);
            margin-bottom: 6rem;
            position: relative;
        }

        .site-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border-top: 4px solid var(--accent);
            border-left: 4px solid var(--accent);
        }

        .logo {
            font-family: var(--font-display);
            font-size: 4.5rem;
            font-weight: 300;
            color: var(--text-color);
            text-decoration: none;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            position: relative;
            line-height: 0.8;
        }

        .logo span {
            color: var(--accent);
            font-weight: 900;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            padding: 0.4rem 1.2rem;
            transition: all 0.2s ease;
            background: rgba(224, 242, 247, 0.02);
        }

        nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateX(-5px);
            background: rgba(255, 45, 85, 0.05);
        }

        /* Typography */
        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: normal;
            margin-top: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 6rem;
            line-height: 0.9;
            border-left: 20px solid var(--accent);
            padding-left: 3rem;
            margin-left: -4rem;
            letter-spacing: -0.05em;
            text-transform: lowercase;
        }

        h2 {
            font-size: 2.5rem;
            border-bottom: 1px solid var(--struct-thick);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Structural Content Blocks */
        .post-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-item {
            border: 1px solid var(--border);
            padding: 2.5rem;
            position: relative;
            background-color: rgba(5, 8, 10, 0.9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .post-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .post-item::after {
            content: '';
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border-right: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            opacity: 0.3;
            transition: all 0.4s ease;
        }

        .post-item:hover {
            transform: translateY(-10px);
            border-color: rgba(224, 242, 247, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .post-item:hover::before {
            transform: scaleX(1);
        }

        .post-item:hover::after {
            opacity: 1;
            bottom: 5px;
            right: 5px;
        }

        .post-title {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: var(--text-color);
        }

        .post-meta {
            font-size: 0.8rem;
            color: rgba(209, 226, 235, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .content {
            font-size: 1.1rem;
            max-width: 800px;
        }

        .content img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--accent);
            padding: 10px;
            background-color: var(--bg-color);
        }

        blockquote {
            border: 1px solid var(--border);
            border-left: 10px solid var(--accent);
            margin: 4rem 0;
            padding: 3rem;
            font-family: var(--font-display);
            font-size: 2rem;
            line-height: 1.2;
            background: rgba(255, 45, 85, 0.03);
            position: relative;
        }

        blockquote::after {
            content: "“";
            position: absolute;
            top: -20px;
            right: 20px;
            font-size: 10rem;
            color: var(--border);
            font-family: var(--font-display);
            line-height: 1;
            pointer-events: none;
        }

        code {
            background-color: rgba(209, 226, 235, 0.1);
            padding: 0.2rem 0.4rem;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid var(--border);
        }

        pre {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            overflow-x: auto;
            border: 1px solid var(--struct-thick);
            border-left: 5px solid var(--accent);
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border: none;
        }

        /* Abstract structural decor in post */
        .decor-line {
            width: 100%;
            height: 1px;
            background-color: var(--border);
            margin: 4rem 0;
            position: relative;
        }

        .decor-line::after {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent);
            background-color: var(--bg-color);
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="{{ base_url }}" class="logo">Radio<span>laria</span></a>
            <nav>
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/posts">Index</a>
                <a href="{{ base_url }}/about">Thesis</a>
            </nav>
        </header>
