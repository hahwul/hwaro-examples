{% include "header.html" %}
  <main class="site-main">
    <div class="hero-section">
      <div class="hero-text-block">
        <h1 class="hero-title">Index: <span>{{ taxonomy_name | e }}</span></h1>
      </div>
      <div class="hero-side-block">
        <p class="hero-subtitle">Browse archival publications classified by the {{ taxonomy_name | e }} taxonomy.</p>
      </div>
    </div>

    <div class="card" style="border-top-color: var(--primary);">
      <div class="badge-container" style="gap: 1.5rem; padding: 1.5rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
            #{{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
