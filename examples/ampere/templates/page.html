{% include "header.html" %}
<main id="main" class="page">
  <div class="shell">
    <article class="page-article">
      <header class="page-header">
        {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
        {% if page.description %}<p class="page-lede">{{ page.description | e }}</p>{% endif %}
        {% if page.date %}<p class="page-meta"><time datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date('%B %Y') }}</time></p>{% endif %}
      </header>
      <div class="prose">
        {{ content | safe }}
      </div>
    </article>
  </div>
</main>
{% include "footer.html" %}
