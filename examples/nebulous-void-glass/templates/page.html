{% extends "base.html" %}

{% block content %}
<style>
    .page-header {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--glass-border);
    }

    .page-header h1 {
        font-size: 2.5rem;
        color: #fff;
    }

    .page-content {
        line-height: 1.8;
        font-size: 1.05rem;
    }

    .page-content p {
        margin-bottom: 1.5rem;
    }
</style>

<div class="glass-panel">
    <div class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Published on {{ page.date | date("%B %d, %Y") }}
        </p>
        {% endif %}
    </div>
    <div class="page-content">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
