{% extends "base.html" %}

{% block content %}
<style>
    .error-container {
        text-align: center;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
    }

    .error-code {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 6rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
        text-shadow: 0 0 30px rgba(255, 0, 85, 0.4);
    }

    .error-message {
        font-size: 1.5rem;
        color: #fff;
    }

    .btn-return {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: rgba(138, 43, 226, 0.1);
        border: 1px solid rgba(138, 43, 226, 0.4);
        border-radius: 8px;
        color: #fff;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.3s ease;
        margin-top: 2rem;
    }

    .btn-return:hover {
        background: rgba(138, 43, 226, 0.2);
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        color: #fff;
    }
</style>

<div class="glass-panel error-container">
    <div class="error-code">404</div>
    <div class="error-message">Signal Lost in the Void</div>
    <p style="color: var(--text-muted); max-width: 500px;">
        The coordinates you provided do not correspond to any known construct in this sector.
    </p>
    <a href="{{ base_url }}/" class="btn-return">Return to Nexus</a>
</div>
{% endblock %}
