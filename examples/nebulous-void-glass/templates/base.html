<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-bg: #030108;
            --glass-bg: rgba(20, 15, 35, 0.25);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-muted: #9a95b0;
            --cyan: #00f0ff;
            --magenta: #ff0055;
            --purple: #8a2be2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--void-bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Nebulas */
        .nebula-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .nebula-cyan {
            top: 10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
            animation-duration: 25s;
        }

        .nebula-magenta {
            bottom: 20%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--magenta) 0%, transparent 70%);
            animation-duration: 22s;
        }

        .nebula-purple {
            top: 40%;
            left: 60%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
            animation-duration: 28s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        a {
            color: var(--cyan);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        a:hover {
            color: var(--magenta);
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
        }

        /* Layout Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            letter-spacing: 0.05em;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 3rem 0;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Glass Panel Styling */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-2px);
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="nebula-container">
        <div class="nebula nebula-cyan"></div>
        <div class="nebula nebula-magenta"></div>
        <div class="nebula nebula-purple"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <a href="{{ base_url }}/" style="color: inherit; text-decoration: none; text-shadow: inherit;">NEBULA.GLASS</a>
            </div>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="{{ base_url }}/">Home</a></li>
                    <li><a href="{{ base_url }}/about/">About</a></li>
                </ul>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ current_year | default("2024") }} {{ site.title }}. Engineered in the void.</p>
        </footer>
    </div>
</body>
</html>
