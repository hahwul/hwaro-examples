{% extends "base.html" %}

{% block content %}
<article class="page glass-panel">
  <header class="page-header">
    <h1 class="page-title">{{ page.title | e }}</h1>
    {% if page.date %}
      <div class="page-meta">{{ page.date | date("%B %d, %Y") }}</div>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
