<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #111; --text: #00ff41; --accent: #008f11; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px; border: 1px solid var(--accent); min-height: 100vh; }
        header { border-bottom: 1px solid var(--accent); padding: 20px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: lowercase; }
        .forge-surface { padding: 40px; position: relative; }
        .forge-surface::before { content: 'FORGING_v1.0'; position: absolute; top: 10px; right: 10px; font-size: 0.6rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">syntax.forge</div></header>
