<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,500;0,600;0,700;1,500&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site">
    <header class="site-header">
      <div class="wrap site-header-inner">
        <a class="brand" href="{{ base_url }}/">
          <svg class="brand-mark" viewBox="0 0 200 240" aria-hidden="true" focusable="false">
            <path d="M42.0,50.0 C8.0,82.0 54.0,204.0 100.0,204.0 C146.0,204.0 184.0,78.0 152.0,44.0"/>
          </svg>
          <span class="brand-word">Raku</span>
        </a>
        <nav class="site-nav" aria-label="Site">
          <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
          <a href="{{ base_url }}/firings/"{% if page.section == "firings" %} aria-current="page"{% endif %}>Firings</a>
          <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        </nav>
      </div>
    </header>
