<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Ultra&family=Zilla+Slab:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <!-- Hidden SVG defs: coarse hatch pattern + reusable woodcut ornaments -->
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <defs>
      <pattern id="wc-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="8" height="8" fill="none"></rect>
        <line x1="0" y1="0" x2="0" y2="8" stroke="#15130f" stroke-width="3"></line>
      </pattern>
      <pattern id="wc-hatch-fine" width="6" height="6" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="0" y2="6" stroke="#15130f" stroke-width="2"></line>
      </pattern>
    </defs>
  </svg>

  <header class="site-header">
    <!-- coarse hatch band behind the masthead -->
    <svg class="masthead-hatch" viewBox="0 0 100 14" preserveAspectRatio="none" aria-hidden="true">
      <rect width="100" height="14" fill="url(#wc-hatch)"></rect>
    </svg>

    <div class="wrapper masthead">
      <div class="masthead-top">
        <span class="masthead-rule-left">No. XII</span>
        <span class="masthead-imprint">Printed From The Block</span>
        <span class="masthead-rule-right">Two Inks Only</span>
      </div>

      <a href="{{ base_url }}/" class="site-brand">{{ site.title }}</a>

      <!-- carved rule with notch serration + vermilion center ornament -->
      <svg class="carved-rule" viewBox="0 0 400 22" preserveAspectRatio="none" aria-hidden="true">
        <rect x="0" y="6" width="180" height="10" fill="#15130f"></rect>
        <rect x="220" y="6" width="180" height="10" fill="#15130f"></rect>
        <path d="M0 6 L8 0 L16 6 Z M16 6 L24 0 L32 6 Z M168 6 L176 0 L184 6 Z" fill="#15130f"></path>
        <circle cx="200" cy="11" r="9" fill="#b5341f"></circle>
        <circle cx="200" cy="11" r="3.5" fill="#efe9dc"></circle>
      </svg>

      <div class="masthead-dateline">
        <span class="dateline-rule"></span>
        <span class="dateline-text">A Relief Printing Broadside &middot; Set In Wood Type &middot; {{ current_year }}</span>
        <span class="dateline-rule"></span>
      </div>

      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/search/">Search</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
