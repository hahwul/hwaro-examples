<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% elif section.description %}{{ section.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Pure structural CSS */
        :root {
            --bg-color: #050505;
            --text-color: #f4f4f5;
            --border-color: #3f3f46;
            --accent-color: #00ffcc; /* neon cyan accent */
            --accent-alt: #ff0055; /* neon pink accent */
            --grid-line: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s, background-color 0.2s;
        }

        a:hover {
            color: var(--bg-color);
            background-color: var(--accent-color);
        }

        /* Layout Structure */
        .site-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        @media (max-width: 768px) {
            .site-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Header */
        .sidebar {
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        @media (max-width: 768px) {
            .sidebar {
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 1.5rem;
            }
        }

        .site-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #fff;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 0.5rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .site-brand a {
            color: inherit;
            background: none;
        }

        .site-brand a:hover {
            color: var(--accent-color);
            background: none;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-link {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-color);
            padding: 0.5rem 0;
            border-left: 2px solid transparent;
            padding-left: 1rem;
            margin-left: -1rem;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-color);
            background: none;
            border-left: 2px solid var(--accent-color);
            background-color: rgba(0, 255, 204, 0.05);
        }

        /* Main Content Area */
        .main-content {
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 2rem 1.5rem;
            }
        }

        .content-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        .page-title {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .page-desc {
            color: #a1a1aa;
            font-size: 1.25rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Markdown Content Styling */
        .markdown-body {
            font-size: 1.125rem;
            max-width: 800px;
        }

        .markdown-body p {
            margin-bottom: 1.5rem;
        }

        .markdown-body h2 {
            font-size: 2rem;
            margin-top: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .markdown-body h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent-alt);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            color: #d4d4d8;
            font-style: italic;
            background-color: rgba(255, 0, 85, 0.05);
            padding: 1rem 1.5rem;
        }

        .markdown-body code {
            font-family: monospace;
            background-color: #18181b;
            padding: 0.2em 0.4em;
            border: 1px solid var(--border-color);
            font-size: 0.9em;
            color: var(--accent-color);
        }

        .markdown-body pre {
            background-color: #18181b;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border-left: 2px solid var(--accent-color);
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border: none;
            color: inherit;
        }

        /* Nodes/Posts Grid */
        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .node-card {
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            background-color: #0a0a0a;
            transition: border-color 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .node-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .node-card-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .node-card-title a {
            color: #fff;
            background: none;
        }

        .node-card-title a:hover {
            color: var(--accent-color);
            background: none;
        }

        .node-card-desc {
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .node-card-meta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            color: #71717a;
            border-top: 1px dashed var(--border-color);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .node-action {
            color: var(--accent-alt);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.875rem;
        }

        /* Footer */
        .site-footer {
            margin-top: auto;
            padding-top: 4rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            color: #71717a;
            font-size: 0.875rem;
        }

        @media (max-width: 600px) {
            .site-footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="site-wrapper">
    <aside class="sidebar">
        <div>
            <div class="site-brand">
                <a href="{{ site.base_url }}/">{{ site.title }}</a>
            </div>
            <p style="color: #a1a1aa; font-size: 0.875rem; margin-bottom: 2rem;">{{ site.description }}</p>
        </div>

        <nav>
            <ul class="nav-menu">
                <li><a href="{{ site.base_url }}/" class="nav-link">Lattice Core</a></li>
                <li><a href="{{ site.base_url }}/about/" class="nav-link">Specifications</a></li>
                <li><a href="{{ site.base_url }}/posts/" class="nav-link">Active Nodes</a></li>
            </ul>
        </nav>

        <div style="margin-top: auto; padding-top: 2rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; color: #52525b; text-transform: uppercase; letter-spacing: 0.1em;">
            Status: <span style="color: var(--accent-color);">Online</span><br>
            Mode: Strict Arch
        </div>
    </aside>

    <main class="main-content">
