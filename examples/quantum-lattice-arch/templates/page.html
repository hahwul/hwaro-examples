{% include "header.html" %}

<article class="page-content">
    <header class="content-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}
        <div class="page-desc">{{ page.description }}</div>
        {% endif %}
    </header>

    <div class="markdown-body">
        {{ page.content | safe }}
    </div>
</article>
