{% include "header.html" %}

      {% if page.title is present %}
      <header class="doc-head">
        <p class="eyebrow">Reference</p>
        <h1 class="doc-title">{{ page.title | e }}</h1>

      {% endif %}
      <div class="prose">{{ content }}</div>
    </article>
  </main>
