{% include "header.html" %}
  <main id="main" class="detail">
    <article class="doc">
      <header class="doc-head">
        <p class="eyebrow">Index</p>
        <h1 class="doc-title">Tags</h1>
        <p class="doc-desc">Every release filed by the part of the engine it touched.</p>
      </header>
      <ul class="tagcloud">
        {% for term in taxonomy_terms %}
        <li><a class="tagcloud-item" href="{{ base_url }}/tags/{{ term.name | slugify }}/">{{ term.name | e }}<span class="tagcloud-count">{{ term.pages | length }}</span></a></li>
        {% endfor %}
      </ul>
    </article>
  </main>
{% include "footer.html" %}
