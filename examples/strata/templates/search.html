{% include "header.html" %}
  <main id="main" class="detail">
    <article class="doc search-page">
      <header class="doc-head">
        <p class="eyebrow">Query</p>
        <h1 class="doc-title">{{ page.title | e }}</h1>
        {% if page.description %}<p class="doc-desc">{{ page.description | e }}</p>{% endif %}
      </header>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <span class="search-prompt" aria-hidden="true">/</span>
        <label class="sr-only" for="search-input">Search releases and reference</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="taint analysis, cache format, Go concurrency, autofix…" autocomplete="off" autofocus>
      </form>

      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="search-results" id="search-results"></ol>

      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </article>
  </main>
{% include "footer.html" %}
