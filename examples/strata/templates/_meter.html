{# Signature element: a stacked segment meter. Expects `added`, `fixed`,
   `removed` in context. Segments use flex-grow so widths are exactly
   proportional to the rule counts with no arithmetic in the template. #}
<div class="meter" role="img" aria-label="{{ added }} rules added, {{ fixed }} fixed, {{ removed }} removed">
  <span class="seg seg-add" style="flex-grow: {{ added }};"></span>
  <span class="seg seg-fix" style="flex-grow: {{ fixed }};"></span>
  <span class="seg seg-rm" style="flex-grow: {{ removed }};"></span>
</div>
<dl class="legend">
  <div class="legend-item"><dt><span class="key key-add" aria-hidden="true"></span>Added</dt><dd>{{ added }}</dd></div>
  <div class="legend-item"><dt><span class="key key-fix" aria-hidden="true"></span>Fixed</dt><dd>{{ fixed }}</dd></div>
  <div class="legend-item"><dt><span class="key key-rm" aria-hidden="true"></span>Removed</dt><dd>{{ removed }}</dd></div>
</dl>
