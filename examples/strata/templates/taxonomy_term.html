{% include "header.html" %}
  <main id="main" class="detail">
    <article class="doc">
      <nav class="crumbs" aria-label="Breadcrumb">
        <a href="{{ base_url }}/tags/">Tags</a>
        <span aria-hidden="true">/</span>
        <span aria-current="page">{{ taxonomy_term | e }}</span>
      </nav>
      <header class="doc-head">
        <p class="eyebrow">Tag</p>
        <h1 class="doc-title">{{ taxonomy_term | e }}</h1>
        <p class="doc-desc">Releases that touched this area of the engine.</p>
      </header>
      <section class="feed" aria-label="Tagged releases">
        {% for p in taxonomy_pages | sort_by("date", reverse=true) %}{% include "_release.html" %}{% endfor %}
      </section>
    </article>
  </main>
{% include "footer.html" %}
