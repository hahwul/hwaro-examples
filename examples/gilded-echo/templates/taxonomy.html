{% extends "base.html" %}

{% block content %}
  <div class="taxonomy-content">
    {% if page.title %}
      <h1>{{ page.title | e }}</h1>
    {% endif %}
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
    {{ content | safe }}
    <ul class="taxonomy-list">
      {% for term in taxonomy_terms %}
        <li><a href="{{ term.url }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
