{% extends "base.html" %}

{% block content %}
  <div class="taxonomy-term-content">
    {% if page.title %}
      <h1>{{ page.title | e }}</h1>
    {% endif %}
    <p class="taxonomy-desc">Posts tagged with this term:</p>
    {{ content | safe }}
    <ul class="term-pages-list">
      {% for p in taxonomy_pages %}
        <li><a href="{{ p.url }}">{{ p.title }}</a></li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
