title = "Moonlit Sakura"
description = "An elegant, dark-mode theme inspired by cherry blossoms under the moonlight."
base_url = "http://localhost:3000"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[feeds]
enabled = true
filename = "rss.xml"
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []