<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --text: #a0a0a0;
            --accent: #ff3333;
            --line: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--line);
        }
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        nav a:hover { color: var(--accent); }
        .crosshair-hero {
            padding: 120px 0;
            text-align: center;
            position: relative;
        }
        .hero-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid rgba(255, 51, 51, 0.2);
            border-radius: 50%;
            z-index: -1;
        }
        .hero-mark::before, .hero-mark::after {
            content: '';
            position: absolute;
            background: var(--accent);
        }
        .hero-mark::before { top: 50%; left: -20px; width: 340px; height: 1px; }
        .hero-mark::after { left: 50%; top: -20px; width: 1px; height: 340px; }
        .crosshair-hero h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            color: #fff;
            line-height: 1;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'JetBrains Mono', monospace; font-size: 2rem; color: #fff; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">CROSS//HAIR</div>
            <nav>
                <a href="/">Target</a>
                <a href="/about">Align</a>
            </nav>
        </div>
    </header>
