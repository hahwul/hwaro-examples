{% include "header.html" %}

<article class="portfolio-article main-container">
  <header class="portfolio-header">
    <span class="hero-sub">ATELIER ARCHIVE</span>
    <h1 class="portfolio-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="tagline" style="font-family: var(--font-serif); font-size: 1.2rem; color: var(--color-text-muted); margin-top: 1rem;">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="portfolio-content">
    {{ content | safe }}
  </div>

  {% if page.tags %}
    <div style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--color-border); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--color-text-muted);">
      INDEX TAGS — {{ page.tags | join(" — ") }}
    </div>
  {% endif %}
</article>

{% include "footer.html" %}
