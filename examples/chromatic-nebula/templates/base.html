<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --primary: #ffffff;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.15);
      --bg-glass: rgba(15, 23, 42, 0.4);
      --bg-subtle: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; }

    @keyframes nebula-gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: linear-gradient(-45deg, #0f172a, #312e81, #1e1b4b, #111827);
      background-size: 400% 400%;
      animation: nebula-gradient 15s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Layout - Glassmorphism Wrapper */
    .site-wrapper {
      max-width: 800px;
      margin: 3rem auto;
      padding: 2rem 2.5rem;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 90%;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s;}
    .site-header nav a:hover { color: var(--primary); }

    .site-main { flex: 1; }

    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: var(--primary); }
    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; }
    a { color: #a5b4fc; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; text-decoration: underline; }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.25rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Code block styling specifically for dark mode readability */
    .hljs { color: #e2e8f0; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.2s, background 0.2s;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.06);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; color: var(--primary); text-decoration: none;}

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; transition: all 0.2s; background: rgba(255,255,255,0.03); }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); background: rgba(255,255,255,0.1); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--primary); background: rgba(255,255,255,0.15); color: var(--primary); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }

    /* Tags/Badges */
    .tags { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .tag { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: rgba(255,255,255,0.1); color: var(--text-muted); text-decoration: none; border: 1px solid var(--border); }
    .tag:hover { color: var(--primary); border-color: rgba(255,255,255,0.4); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-wrapper { margin: 1rem auto; padding: 1.5rem; border-radius: 12px; }
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>Powered by Hwaro</p>
    </footer>
  </div>
  {{ highlight_js | safe }}
  {{ auto_includes_js | safe }}
</body>
</html>
