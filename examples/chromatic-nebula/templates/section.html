{% extends "base.html" %}
{% block content %}
  <h1>{{ page.title | e }}</h1>
  {{ content | safe }}

  <ul class="section-list">
  {% for p in section.pages %}
    <li>
      <a href="{{ p.permalink }}">{{ p.title | e }}</a>
    </li>
  {% endfor %}
  </ul>

  {{ pagination | safe }}
{% endblock %}
