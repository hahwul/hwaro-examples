<script>function initAbyss(){document.querySelectorAll('[data-count]').forEach(e=>{const t=parseFloat(e.dataset.count);let c=0;const i=setInterval(()=>{c+=Math.ceil(t/28);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});setInterval(()=>{const s=document.getElementById('sonar');if(s)s.classList.toggle('opacity-20')},1400);console.log('%c[ABYSS] Pressure hull integrity nominal. We are not alone down here.','color:#006a80')}window.addEventListener('load',initAbyss)</script></body></html>
