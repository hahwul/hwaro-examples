<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="{{ page.description | default(site.description, true) | e }}"><title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title><link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">{{ og_all_tags }}{{ canonical_tag }}<script src="https://cdn.tailwindcss.com"></script><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');body{font-family:'Inter',system-ui,sans-serif}.display{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.03em}.abyss-bg{background:#01060f;background-image:radial-gradient(circle at 20% 30%,#002a3d 0,transparent 60%),radial-gradient(circle at 85% 75%,#001a2e 0,transparent 55%)}.bio-cyan{color:#00e5ff}.sonar{animation:ping 3s cubic-bezier(0,0,.2,1) infinite}@keyframes ping{0%{transform:scale(1);opacity:1}80%,100%{transform:scale(2.4);opacity:0}}.depth-gauge{background:linear-gradient(#001a2e,#01060f);box-shadow:inset 0 0 0 1px #003a55}</style></head><body class="bg-[#01060f] text-[#d4e8f0] abyss-bg">
