<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --primary: #d4af37;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --border: #333333;
      --bg: #0f0f11;
      --bg-subtle: #1a1a1c;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Playfair Display", Georgia, serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); transition: background-color 0.5s ease; }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }

    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; letter-spacing: 1px; position: relative; font-family: "Inter", sans-serif;}
    .site-logo::after { content: ''; display: inline-block; width: 8px; height: 8px; background-color: var(--primary); border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
      100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
    }

    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-family: "Inter", sans-serif; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s ease; }
    .site-header nav a:hover { color: var(--text); }
    .site-main { min-height: calc(100vh - 250px); animation: fadeIn 1s ease-in-out; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; font-family: "Inter", sans-serif; letter-spacing: 1px; }

    /* Typography */
    h1, h2, h3 { line-height: 1.4; margin-top: 2em; margin-bottom: 0.75em; font-weight: 400; color: #ffffff; }
    h1 { font-size: 2.5rem; margin-top: 0; position: relative; display: inline-block; }
    h1::after { content: ''; display: block; width: 40px; height: 2px; background: var(--primary); margin-top: 15px; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: #ffffff; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; font-family: "Fira Code", monospace; color: var(--primary); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; color: var(--text); }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1.5rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.3s ease, border-color 0.3s ease; }
    ul.section-list li:hover { transform: translateY(-3px); border-color: var(--primary); }
    ul.section-list li a { font-weight: 400; font-size: 1.2rem; color: #ffffff; display: block; margin-bottom: 0.5rem; }
    ul.section-list li a:hover { color: var(--primary); }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }

    nav.pagination { margin: 2.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; font-family: "Inter", sans-serif; transition: all 0.3s ease; }
    nav.pagination a:hover { color: var(--bg); background: var(--primary); border-color: var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--primary); background: rgba(212, 175, 55, 0.1); color: var(--primary); font-family: "Inter", sans-serif; }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; font-family: "Inter", sans-serif; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: center; padding: 2rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
