<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ff0000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 40px; border-bottom: 20px solid var(--accent); }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; }
        .siren-surface { padding: 80px 40px; position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">siren.call</div><div style="font-weight: 800; color: var(--accent);">EMERGENCY</div></header>
