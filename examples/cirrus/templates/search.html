{% include "header.html" %}
  <main id="main" class="wrap">
    <section class="search-wrap">
      <header class="page-head">
        <h1>{{ page.title | e }}</h1>
        <div class="page-intro">{{ content }}</div>
      </header>
      <form class="search-form" role="search" onsubmit="return false;">
        <label class="visually-hidden" for="search-input">Search build logs</label>
        <input id="search-input" class="search-field" type="search" name="q"
               placeholder="Try &ldquo;bridle&rdquo;, &ldquo;ripstop&rdquo;, or &ldquo;crash&rdquo;&hellip;"
               autocomplete="off" autofocus aria-describedby="search-status">
      </form>
      <p id="search-status" class="search-status" role="status" aria-live="polite">Loading the bench index&hellip;</p>
      <ul id="search-results" class="search-results" aria-label="Search results"></ul>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script>window.CIRRUS_SEARCH_URL = "{{ base_url }}/search.json";</script>
  <script src="{{ base_url }}/js/search.js" defer></script>
{% include "footer.html" %}
