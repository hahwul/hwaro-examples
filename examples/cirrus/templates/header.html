<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="band">
    <div class="band-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Cirrus — home">
        <span class="brand-name">Cirrus</span>
        <svg class="string-loop" viewBox="0 0 240 46" aria-hidden="true" focusable="false">
          <path class="string" d="M4 24 C 38 4, 70 6, 92 24 C 108 38, 132 40, 150 24 C 162 13, 178 15, 186 24" fill="none" stroke-width="2.6" stroke-linecap="round"/>
          <g class="bow" transform="translate(196 24)">
            <path d="M0 0 C -13 -13, -25 -10, -19 0 C -25 10, -13 13, 0 0 Z"/>
            <path d="M0 0 C 13 -13, 25 -10, 19 0 C 25 10, 13 13, 0 0 Z"/>
            <path class="ribbon" d="M2 3 L 13 19 M -2 3 L -10 20" fill="none" stroke-width="2.4" stroke-linecap="round"/>
            <circle class="knot" cx="0" cy="0" r="3.6"/>
          </g>
        </svg>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="{{ base_url }}/builds/">Builds</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </div>
  </header>
