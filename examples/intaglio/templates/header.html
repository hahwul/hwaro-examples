<!DOCTYPE html>
<html lang="{{ page_language | default("en") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    /*
      Intaglio Theme
      Strictly black and white/cream, sharp borders, strong typography, no gradients.
    */
    :root {
      --bg: #F9F8F6; /* Cream/off-white */
      --text: #111111; /* Deep charcoal/black */
      --border: #111111;
      --accent: #111111;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--text);
      color: var(--bg);
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      border-left: 2px solid var(--border);
      border-right: 2px solid var(--border);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 3rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      border: 2px solid var(--border);
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
    }

    .site-logo:hover {
      background: var(--text);
      color: var(--bg);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--text);
      transform: scaleX(0);
      transform-origin: bottom right;
      transition: transform 0.25s ease-out;
    }

    .site-header nav a:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    .site-main {
      flex: 1;
    }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 2px solid var(--border);
      font-size: 0.85rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: sans-serif;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 700;
      color: var(--text);
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      border-bottom: 4px solid var(--border);
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    h2 {
      font-size: 1.8rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3rem;
    }

    h3 { font-size: 1.4rem; }

    p { margin: 1.5em 0; font-size: 1.1rem; }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text);
    }

    a:hover {
      background: var(--text);
      color: var(--bg);
    }

    blockquote {
      border-left: 4px solid var(--border);
      margin: 2em 0;
      padding: 1em 2em;
      font-style: italic;
      font-size: 1.2rem;
      background: rgba(0, 0, 0, 0.03);
    }

    hr {
      border: 0;
      border-bottom: 2px solid var(--border);
      margin: 3em 0;
    }

    /* Code */
    code {
      background: rgba(0, 0, 0, 0.05);
      padding: 0.2rem 0.4rem;
      font-size: 0.9em;
      font-family: "Courier New", Courier, monospace;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg);
      padding: 1.5rem;
      overflow-x: auto;
      border: 2px solid var(--border);
      border-left: 6px solid var(--border);
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
    }

    /* Images */
    img {
      max-width: 100%;
      height: auto;
      border: 2px solid var(--border);
      filter: grayscale(100%) contrast(120%);
    }

    /* Components */
    .section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      border-top: 2px solid var(--border);
    }

    .section-list li {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .section-list li:hover {
      background: rgba(0,0,0,0.02);
    }

    .section-list li a {
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
    }

    .section-list li a:hover {
      background: none;
      text-decoration: underline;
    }

    .section-list .post-date {
      font-family: sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Date and Meta */
    .post-meta {
      font-family: sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-wrapper { padding: 0 1.5rem; border: none; }
      .site-header { flex-direction: column; gap: 1rem; }
      h1 { font-size: 2rem; }
      .section-list li { flex-direction: column; gap: 0.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
