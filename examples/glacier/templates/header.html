<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title == site.title %}{{ site.title }}{% else %}{{ page.title }} - {{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-logo">Glacier</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button class="mobile-menu-toggle" aria-label="Toggle menu" onclick="document.body.classList.toggle('menu-open')">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav">
    <a href="{{ base_url }}/posts/">Posts</a>
    <a href="{{ base_url }}/tags/">Tags</a>
    <a href="{{ base_url }}/about/">About</a>
  </nav>
