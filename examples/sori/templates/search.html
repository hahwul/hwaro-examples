{% include "header.html" %}
<main id="main" class="site-main">
  <header class="page-hero">
    <div class="wrap">
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}<p>{{ page.description | e }}</p>{% endif %}
    </div>
  </header>

  <div class="wrap">
    <div class="prose-wrap">
      <form class="search-form" role="search" autocomplete="off" onsubmit="return false;">
        <label class="visually-hidden" for="search-input">Search episodes and pages</label>
        <input id="search-input" type="search" placeholder="Search for a tale, a village, a jangdan…" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite">Type to search every episode and page on Sori.</p>
      <ul class="search-results" id="search-results"></ul>
    </div>
  </div>
</main>
{% include "footer.html" %}
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script src="{{ base_url }}/js/search.js" data-base-url="{{ base_url }}"></script>
