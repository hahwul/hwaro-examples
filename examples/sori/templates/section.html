{% include "header.html" %}
<main id="main" class="site-main">

  <header class="page-hero">
    <div class="wrap">
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}<p>{{ page.description | e }}</p>{% endif %}
    </div>
  </header>

  {% if content %}
  <div class="prose-wrap prose section-intro">
    {{ content | safe }}
  </div>
  {% endif %}

  <div class="wrap">
    <ol class="spine" aria-label="All episodes, newest first">
      {% for ep in section.pages %}
        {% include "partials/episode-row.html" %}
      {% endfor %}
    </ol>
  </div>

</main>
{% include "footer.html" %}
