<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0f1a;
            --text: #e0d0e0;
            --accent: #ff00ff;
            --secondary: #00ffff;
            --surface: #2a1a2a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            background: var(--surface);
        }
        .logo {
            font-family: 'Righteous', cursive;
            font-size: 2.5rem;
            color: var(--secondary);
            text-shadow: 3px 3px 0 var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .jukebox-hero {
            padding: 100px 0;
            text-align: center;
        }
        .jukebox-hero h1 {
            font-family: 'Righteous', cursive;
            font-size: 8rem;
            margin: 0;
            line-height: 0.9;
            color: #fff;
            text-shadow: 5px 5px var(--accent), 10px 10px var(--secondary);
        }
        .selection-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 60px;
        }
        .selection-item {
            background: var(--surface);
            padding: 20px;
            border: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Righteous', cursive;
            text-transform: uppercase;
        }
        .selection-item span { color: var(--secondary); }
        article { padding: 80px 0; }
        h2 { font-family: 'Righteous', cursive; font-size: 3rem; color: var(--secondary); margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">JUKE//BOX</div>
            <nav>
                <a href="/">Select</a>
                <a href="/about">Queue</a>
            </nav>
        </div>
    </header>
