{% include "header.html" %}

<div class="photo-grid">
  {% set posts_section = get_section(path="posts/_index.md") %}
  {% for post in posts_section.pages %}
  <article class="photo-item">
    <a href="{{ base_url }}{{ post.url }}">
      {% if post.image %}
      <img src="{{ base_url }}{{ post.image }}" alt="{{ post.title }}" loading="lazy" />
      {% else %}
      <div style="width: 100%; height: 100%; background-color: #111; display: flex; align-items: center; justify-content: center; color: #444;">No Image</div>
      {% endif %}
      <div class="photo-overlay">
        <h2 class="photo-title">{{ post.title }}</h2>
        <span class="photo-date">{{ post.date | date("%B %d, %Y") }}</span>
      </div>
    </a>
  </article>
  {% endfor %}
</div>

{% include "footer.html" %}
