# =============================================================================
# Rubric - A Red-Marked Publication
# Issue #1550 | Tags: book, light, rubricated, two-color, traditional
# =============================================================================

title = "RUBRIC - A Red-Marked Publication"
description = "A study of the rubrication tradition - red initial letters, paragraph marks, and section symbols applied to manuscripts and early printed books. Two-color printing in the medieval and Renaissance manner."
base_url = "http://localhost:3000"

sections = ["chapters"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "script"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A study of the medieval rubrication tradition. Scholarly use; please cite if referenced."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["chapters"]

[markdown]
safe = false
lazy_loading = false
emoji = false
