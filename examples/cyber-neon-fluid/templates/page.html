{% include "header.html" %}

<main class="site-main">
  {% if page is defined %}
    <h1>{{ page.title }}</h1>

    {% if page.date is defined %}
      <div class="post-meta">
        <time datetime="{{ page.date | date(format='%Y-%m-%d') }}">
          {{ page.date | date(format='%B %d, %Y') }}
        </time>
      </div>
    {% endif %}

    <div class="content-body">
      {{ content | safe }}
    </div>

  {% else %}
    <div class="content-body">
      {{ content | safe }}
    </div>
  {% endif %}
</main>

{% include "footer.html" %}
