<!DOCTYPE html>
<html lang="{{ lang | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined and page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {% if auto_includes is defined %}
    {{ auto_includes | safe }}
  {% endif %}
  {% if highlight_tags is defined %}
    {{ highlight_tags | safe }}
  {% endif %}
</head>
<body>

<header class="site-header">
  <div class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></div>
  <nav>
    <ul class="nav-links">
      <li><a href="{{ base_url }}/">Home</a></li>
      <li><a href="{{ base_url }}/about/">About</a></li>
    </ul>
  </nav>
</header>
