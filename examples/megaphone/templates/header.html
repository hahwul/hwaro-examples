<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff0000;
            --muted: #f0f0f0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text);
        }
        .logo {
            font-family: 'Lexend Mega', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .megaphone-hero {
            padding: 100px 0;
            text-align: left;
            position: relative;
        }
        .megaphone-hero h1 {
            font-family: 'Lexend Mega', sans-serif;
            font-size: 15vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -5px;
        }
        .wave-decoration {
            display: flex;
            gap: 10px;
            margin-top: 40px;
        }
        .wave-bar {
            width: 10px;
            background: var(--text);
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Lexend Mega', sans-serif; font-size: 3rem; text-transform: uppercase; border-bottom: 5px solid var(--accent); display: inline-block; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">MEGA//PHONE</div>
            <nav>
                <a href="/">Broadcast</a>
                <a href="/about">Amplify</a>
            </nav>
        </div>
    </header>
