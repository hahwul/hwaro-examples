{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.date %}
  <div class="page-meta">
    <time datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
  </div>
  {% endif %}
</div>
<div class="page-content">
  {{ content | safe }}
</div>
{% endblock %}
