<!DOCTYPE html>
<html lang="{% if page_language is defined %}{{ page_language }}{% else %}en{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg-color: #050510;
      --bg-surface: rgba(15, 15, 30, 0.6);
      --text-main: #e0e0ff;
      --text-muted: #8b8bb0;
      --neon-cyan: #00f3ff;
      --neon-magenta: #ff00ff;
      --border-color: rgba(0, 243, 255, 0.2);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background wave */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      background: radial-gradient(circle at center, #110b29 0%, #050510 100%);
      overflow: hidden;
    }
    .wave {
      position: absolute;
      bottom: -10%;
      left: 0;
      width: 200%;
      height: 40%;
      background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
      border-top: 1px solid var(--neon-cyan);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      animation: wave-move 10s infinite linear;
      box-shadow: 0 -5px 20px rgba(0, 243, 255, 0.3);
    }
    .wave:nth-child(2) {
      bottom: -15%;
      animation: wave-move 14s infinite linear reverse;
      border-top: 1px solid var(--neon-magenta);
      background: linear-gradient(90deg, transparent, rgba(255, 0, 255, 0.1), transparent);
      box-shadow: 0 -5px 20px rgba(255, 0, 255, 0.3);
    }
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 160px 120px, #ffffff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.3;
      animation: twinkle 5s infinite alternate;
    }

    @keyframes wave-move {
      0% { transform: translateX(0) scaleY(1); }
      50% { transform: translateX(-25%) scaleY(1.2); }
      100% { transform: translateX(-50%) scaleY(1); }
    }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.6; }
    }

    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 3rem;
    }
    .site-logo {
      font-size: 1.8rem;
      font-weight: 800;
      text-decoration: none;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
    }
    .nav-links a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .nav-links a:hover {
      color: var(--neon-magenta);
      text-shadow: 0 0 8px var(--neon-magenta);
    }

    /* Main Container */
    .site-main {
      flex: 1;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2.5rem;
      margin-bottom: 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
    }

    /* Typography */
    h1, h2, h3 {
      color: #fff;
      margin-top: 0;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
      background: -webkit-linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    a {
      color: var(--neon-cyan);
      text-decoration: none;
    }
    a:hover {
      text-shadow: 0 0 5px var(--neon-cyan);
    }
    p {
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    /* Code blocks */
    code { background: rgba(0,0,0,0.5); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); color: var(--neon-magenta); }
    pre { background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 8px; border: 1px solid rgba(0,243,255,0.2); overflow-x: auto; }
    pre code { background: none; border: none; color: inherit; padding: 0; text-shadow: none; }

    /* Lists */
    .post-list, .section-list, .term-list { list-style: none; padding: 0; }
    .post-list li, .section-list li, .term-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .post-list li:hover, .section-list li:hover, .term-list li:hover {
      transform: translateY(-2px);
      border-color: var(--neon-cyan);
      box-shadow: 0 5px 15px rgba(0,243,255,0.1);
    }
    .post-list h2, .section-list h2, .term-list h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
    }
    .post-list h2 a, .section-list h2 a, .term-list h2 a {
      background: none;
      -webkit-text-fill-color: initial;
      color: #fff;
      text-shadow: none;
    }
    .post-list h2 a:hover, .section-list h2 a:hover, .term-list h2 a:hover {
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
    }
    .post-meta { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }

    .tags-container {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;
    }
    .tag {
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 12px;
      border: 1px solid var(--neon-magenta);
      color: var(--neon-magenta);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag:hover {
      background: var(--neon-magenta);
      color: #fff;
      text-shadow: none;
      box-shadow: 0 0 10px var(--neon-magenta);
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: auto;
    }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {% if highlight_tags is defined %}{{ highlight_tags | safe }}{% endif %}
  {% if auto_includes is defined %}{{ auto_includes | safe }}{% endif %}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="bg-animation">
    <div class="stars"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav class="nav-links">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
