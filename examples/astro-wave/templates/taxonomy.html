{% include "header.html" %}

<header class="page-head">
  <svg class="corner" width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true">
    <rect x="40" y="20" width="20" height="20" stroke="#4cf3ff" stroke-width="1" fill="none"/>
    <rect x="65" y="20" width="20" height="20" stroke="#ff5cd1" stroke-width="1" fill="none"/>
    <rect x="40" y="45" width="20" height="20" stroke="#ffd166" stroke-width="1" fill="none"/>
    <rect x="65" y="45" width="20" height="20" stroke="#1f2742" stroke-width="1" fill="none"/>
  </svg>
  <div class="eyebrow">{{ taxonomy }} index</div>
  <h1>{{ taxonomy | capitalize }}</h1>
  <p style="color:var(--muted);margin:0;">All {{ taxonomy }} indexed across the broadcast log.</p>
</header>

<ul class="term-list" style="display:flex;flex-wrap:wrap;gap:0.6rem;list-style:none;padding:0;">
  {% for term in terms %}
  <li style="margin:0;padding:0;background:none;border:none;">
    <a href="{{ base_url }}/{{ taxonomy }}/{{ term | slugify }}/" class="tag" style="font-size:0.85rem;padding:0.5rem 0.9rem;">{{ term }}</a>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
