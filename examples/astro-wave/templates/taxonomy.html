{% include "header.html" %}

<div class="taxonomy-container">
  <h1>{{ taxonomy | capitalize }}</h1>

  <p style="color: var(--text-muted); margin-bottom: 2rem;">Explore all {{ taxonomy }}.</p>

  <ul class="term-list" style="display: flex; flex-wrap: wrap; gap: 1rem; list-style: none; padding: 0;">
    {% for term in terms %}
    <li style="margin: 0; padding: 0; background: none; border: none;">
      <a href="{{ base_url }}/{{ taxonomy }}/{{ term | slugify }}/" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem;">
        {{ term }}
      </a>
    </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
