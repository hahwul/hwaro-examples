<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: left; padding: 40px 0; border-bottom: 20px solid #000; }
        .logo { font-weight: 800; font-size: 4rem; text-transform: uppercase; letter-spacing: -4px; line-height: 0.8; }
        h2 { font-weight: 800; font-size: 5rem; color: #000; margin-top: 60px; line-height: 0.8; text-transform: uppercase; letter-spacing: -5px; }
        article { font-size: 1.5rem; font-weight: 800; margin-top: 40px; line-height: 1.1; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">heavy.type</div></header>
