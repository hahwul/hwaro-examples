<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --accent: #ff3c00;
            --border: #222;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Baskervville', serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-family: 'Unbounded', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .rupture-hero {
            padding: 100px 0;
            position: relative;
        }
        .rupture-hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 12vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -8px;
            color: #fff;
            transform: rotate(-3deg);
        }
        .rupture-sub {
            font-size: 2rem;
            margin-top: 60px;
            max-width: 600px;
            font-style: italic;
            border-right: 5px solid var(--accent);
            padding-right: 30px;
            text-align: right;
            margin-left: auto;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Unbounded', sans-serif; font-size: 3rem; color: #fff; transform: rotate(1deg); }
        .grid-rupture {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-top: 80px;
        }
        .grid-item {
            background: var(--border);
            padding: 20px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">RUPTURE</div>
            <nav>
                <a href="/">Break</a>
                <a href="/about">Fragment</a>
            </nav>
        </div>
    </header>
