<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} -- {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  {{ highlight_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ base_url }}/" class="site-logo">Storefront</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/products/">Shop</a>
        <a href="{{ base_url }}/categories/">Categories</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
