{% include "header.html" %}
  <main>
    <div class="container">
      {% if page.section == "products" %}
      <div class="breadcrumb">
        <a href="{{ base_url }}/">Home</a>
        <span>/</span>
        <a href="{{ base_url }}/products/">Shop</a>
        <span>/</span>
        {{ page.title }}
      </div>
      <div class="content-section">
        {{ content | safe }}
      </div>
      {% else %}
      <div class="breadcrumb">
        <a href="{{ base_url }}/">Home</a>
        <span>/</span>
        {{ page.title }}
      </div>
      <div class="taxonomy-page">
        <h1>{{ page.title }}</h1>
        <div class="content-section">
          {{ content | safe }}
        </div>
      </div>
      {% endif %}
    </div>
  </main>
