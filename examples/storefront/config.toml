title = "Storefront"
description = "Modern e-commerce product catalog with category filtering and clean design"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[pagination]
enabled = true
per_page = 12

[[taxonomies]]
name = "tags"
feed = false

[[taxonomies]]
name = "categories"
feed = false

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
lazy_loading = true

# =============================================================================
# PWA (Progressive Web App) (Optional)
