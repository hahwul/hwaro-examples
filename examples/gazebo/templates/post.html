{% include "header.html" %}
<header class="site-header">
  <div class="header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Events</a>
      <a href="{{ base_url }}/archives/">Archives</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
    <div class="header-right">
      <button class="search-trigger" onclick="openSearch()" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
        <kbd>&#8984;K</kbd>
      </button>
    </div>
  </div>
</header>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search events..." autocomplete="off">
      <kbd onclick="closeSearch()">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
<div class="site-container">
  <main class="site-main">
    <article class="event-card floral-frame">
      <header class="event-header">
        <h1>{{ page.title }}</h1>
        <div class="event-meta">
          <time>{{ page.date }}</time>
        </div>
      </header>
      <div class="event-content">
        {{ content }}
      </div>
    </article>
{% include "footer.html" %}
