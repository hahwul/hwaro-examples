{% include "header.html" %}

<section>
  <div class="section-header">
    <h2>{{ taxonomy.name | capitalize }}</h2>
  </div>

  <ul class="section-list">
    {% for term in taxonomy_terms %}
    <li>
      <a href="{{ base_url }}{{ term.url }}">{{ term.name }}</a>
      <span class="text-muted">({{ term.pages | length }} items)</span>
    </li>
    {% endfor %}
  </ul>
</section>

{% include "footer.html" %}
