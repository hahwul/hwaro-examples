<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Chomsky&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f1ea;
            --text: #1a1a1a;
            --border: #333333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Old Standard TT', serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 4px double var(--border);
        }
        .date-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .broadside-hero {
            padding: 60px 0;
            text-align: center;
        }
        .broadside-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
        }
        article {
            column-count: 3;
            column-gap: 40px;
            column-rule: 1px solid #ccc;
            padding-bottom: 80px;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 0; line-height: 1.1; }
        .dropcap {
            float: left;
            font-size: 5rem;
            line-height: 1;
            margin-right: 10px;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">BROADSIDE</h1>
            <div class="date-line">
                <div>VOL. CLXII... NO. 54,321</div>
                <div>SATURDAY, APRIL 18, 2026</div>
                <div>PRICE: ONE CENT</div>
            </div>
            <nav>
                <a href="/">Dispatch</a>
                <a href="/about">Editorial</a>
            </nav>
        </div>
    </header>
