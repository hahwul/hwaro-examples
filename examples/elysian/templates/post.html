{% extends "base.html" %}
{% block content %}
  <article class="post">
    <header class="post-header">
      <h1>{% if page and page.title %}{{ page.title | e }}{% endif %}</h1>
      <div class="post-meta">
        <time>{% if page and page.date %}{{ page.date }}{% endif %}</time>
      </div>
    </header>
    <div class="post-content">
      {{ content | safe }}
    </div>
  </article>
{% endblock %}
