<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --line: #eee;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid var(--line);
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .conc-hero {
            padding: 80px 0;
            text-align: left;
        }
        .conc-hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article { padding: 40px 0; }
        .index-list {
            margin-top: 60px;
            border-top: 2px solid var(--text);
        }
        .index-entry {
            display: grid;
            grid-template-columns: 1fr 3fr;
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
            font-size: 1.1rem;
        }
        .entry-word { font-family: 'IBM Plex Mono', monospace; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .entry-refs { color: var(--accent); font-style: italic; }
        h2 { font-size: 2rem; margin-top: 60px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">CONCORDANCE</div>
            <nav>
                <a href="/">Crossref</a>
                <a href="/about">Thesaurus</a>
            </nav>
        </div>
    </header>
