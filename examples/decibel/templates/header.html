<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #00ff00;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Major Mono Display', monospace;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: lowercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .decibel-hero {
            padding: 100px 0;
            text-align: center;
        }
        .decibel-hero h1 {
            font-family: 'Major Mono Display', monospace;
            font-size: 12vw;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
        }
        .meter-bar {
            height: 10px;
            background: var(--muted);
            margin: 40px 0;
            position: relative;
            overflow: hidden;
        }
        .meter-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 80%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        article { padding: 60px 0; max-width: 800px; }
        h2 { font-family: 'Major Mono Display', monospace; font-size: 3rem; color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">deCi.beL</div>
            <nav>
                <a href="/">Volume</a>
                <a href="/about">Gain</a>
            </nav>
        </div>
    </header>
