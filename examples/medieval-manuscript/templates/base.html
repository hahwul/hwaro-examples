<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="manuscript-container">
        <header class="manuscript-header">
            <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
            <p class="subtitle">{{ site.description }}</p>
        </header>

        <main class="manuscript-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="manuscript-footer">
            <p>&copy; {{ current_year | default("2024") }} {{ site.title }}. Penned by the Scribes.</p>
        </footer>
    </div>
</body>
</html>
