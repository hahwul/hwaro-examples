{% include "header.html" %}
<article class="content">
  <header class="page-header">
    <div class="eyebrow">Catalogue</div>
    <h1>{{ taxonomy_name | e }}</h1>
  </header>
  <p class="taxonomy-desc">All categories under which our jackets are filed.</p>
  <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></li>
    {% endfor %}
  </ul>
</article>
{% include "footer.html" %}
