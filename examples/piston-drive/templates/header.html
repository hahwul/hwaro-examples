<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #262626;
            --text: #e5e5e5;
            --accent: #ffcc00;
            --border: #333333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Archivo', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            background: var(--surface);
            padding: 20px 0;
            border-bottom: 4px solid var(--border);
        }
        .logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .piston-hero {
            padding: 80px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .piston-block {
            height: 60px;
            background: var(--surface);
            border-left: 10px solid var(--accent);
            display: flex;
            align-items: center;
            padding-left: 30px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .piston-block:hover {
            transform: translateX(20px);
        }
        article {
            background: var(--surface);
            padding: 60px;
            border: 1px solid var(--border);
            margin-top: 40px;
        }
        h2 { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">PISTON//DRIVE</div>
            <nav>
                <a href="/">Internal Combustion</a>
                <a href="/about">Crankshaft</a>
            </nav>
        </div>
    </header>
