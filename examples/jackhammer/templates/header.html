<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #e5e5e5;
            --accent: #ffcc00;
            --muted: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 8px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #fff;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .jack-hero {
            padding: 100px 0;
            text-align: center;
        }
        .jack-hero h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 12vw;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 10px 10px 0 #000;
        }
        .vibration-line {
            height: 2px;
            background: var(--accent);
            margin: 20px 0;
            width: 100%;
        }
        article { padding: 60px 0; }
        h2 { font-family: 'Archivo Black', sans-serif; font-size: 3rem; text-transform: uppercase; border-left: 15px solid var(--accent); padding-left: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">JACK//HAMMER</div>
            <nav>
                <a href="/">Pressure</a>
                <a href="/about">Strike</a>
            </nav>
        </div>
    </header>
