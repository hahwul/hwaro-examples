{% include "header.html" %}
  <main style="padding-top: 64px;">
    <div class="wrapper" style="padding-top: 3rem;">
      <div class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}<p class="post-meta">{{ page.date | date("%B %d, %Y") }}</p>{% endif %}
        {% if page.tags %}
        <div style="margin-top: 0.8rem;">
          {% for tag in page.tags %}<span class="tag-badge">{{ tag }}</span>{% endfor %}
        </div>
        {% endif %}
      </div>
      <div class="post-content">
        {{ content | safe }}
      </div>
    </div>
  </main>
{% include "footer.html" %}
