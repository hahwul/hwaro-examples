{% include "header.html" %}
<article class="card">
  <header>
    <h1>{{ page.title | e }}</h1>
    {% if page.date is defined %}
      <div style="color: #777; font-size: 0.85rem; margin-bottom: 1rem;">{{ page.date }}</div>
    {% endif %}
  </header>
  <div class="content">
    {{ content | safe }}
  </div>
</article>
{% include "footer.html" %}
