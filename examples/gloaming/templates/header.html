<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — a rooftop apiary log{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {% raw %}<script>
    (function () {
      try {
        var t = localStorage.getItem("gloaming-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>{% endraw %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="frame">
    <header class="site-head">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 40 44" aria-hidden="true" focusable="false">
          <polygon points="20,2 37.5,12 37.5,32 20,42 2.5,32 2.5,12" fill="none" stroke="currentColor" stroke-width="3"/>
          <polygon points="20,20.5 31,26.8 31,32 20,38.3 9,32 9,26.8" fill="currentColor" stroke="none"/>
        </svg>
        <span class="brand-name">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/apiary/">The log</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div class="head-tools">
        <button class="tool-btn" id="search-button" type="button" aria-haspopup="dialog" aria-label="Search the log (press slash)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M13 13l4.5 4.5"/></svg>
          <kbd class="tool-kbd" aria-hidden="true">/</kbd>
        </button>
        <button class="tool-btn" id="theme-button" type="button" aria-pressed="false" aria-label="Switch colour theme">
          <svg class="icon-day" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="10" cy="10" r="4"/><path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4 4l1.4 1.4M14.6 14.6L16 16M16 4l-1.4 1.4M5.4 14.6L4 16"/></svg>
          <svg class="icon-dusk" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M16.5 12.2A7 7 0 0 1 7.8 3.5a7 7 0 1 0 8.7 8.7Z"/></svg>
        </button>
      </div>
    </header>
