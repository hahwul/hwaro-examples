<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f6f8;
            --text: #334155;
            --accent: #4a5568;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.8;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: lowercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .reader-hero {
            padding: 80px 0;
            background: var(--bg);
            border-radius: 40px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
        }
        .reader-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 4rem;
            font-weight: 400;
            font-style: italic;
            margin: 0;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: inset 5px 5px 15px var(--shadow), inset -5px -5px 15px var(--highlight);
            font-size: 1.2rem;
        }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">neu.reader</div>
            <nav>
                <a href="/">Prose</a>
                <a href="/about">Focus</a>
            </nav>
        </div>
    </header>
