{% include "header.html" %}
<section class="prose">
  {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
  {{ content | safe }}
  <ul class="post-list">
    {% for post in section.pages %}
    <li>
      <span class="post-date">{{ post.date | date(format="%Y / %m") }}</span>
      <a href="{{ post.url }}">{{ post.title | e }}</a>
    </li>
    {% endfor %}
  </ul>
</section>
{{ pagination }}
{% include "footer.html" %}
