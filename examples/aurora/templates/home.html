{% include "header.html" %}
  <main id="main">
    <section class="masthead">
      <svg class="masthead-nib" viewBox="0 0 24 32" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="A fountain pen nib, the mark of the Aurora catalog">
        <path d="M12 2.6 C15.4 5.2 19 8.8 19 14.2 C19 21 15.6 26.9 12 29.4 C8.4 26.9 5 21 5 14.2 C5 8.8 8.6 5.2 12 2.6 Z"/>
        <circle cx="12" cy="13.6" r="1.7"/>
        <path d="M12 15.3 L12 29.4"/>
        <path d="M6.4 8.4 C8.2 9.9 10 10.6 12 10.6 C14 10.6 15.8 9.9 17.6 8.4"/>
      </svg>
      <p class="masthead-kicker">A Catalog of Repairs · Kept After Hours</p>
      <h1 class="masthead-title">Aurora</h1>
      <div class="masthead-line">{{ content | safe }}</div>
    </section>

    <section class="wall-block" aria-label="Restoration plates">
      <div class="wall-head">
        <p class="wall-kicker"><span>The Collection · Plates No. 01–06</span></p>
      </div>
      <div class="wall">
        {% set coll = get_section(path="restorations") %}
        {% for entry in coll.pages %}
          {% include "plate.html" %}
        {% endfor %}
      </div>
    </section>
  </main>
{% include "footer.html" %}
