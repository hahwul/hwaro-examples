<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/">
      <svg class="brand-nib" viewBox="0 0 24 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M12 2.6 C15.4 5.2 19 8.8 19 14.2 C19 21 15.6 26.9 12 29.4 C8.4 26.9 5 21 5 14.2 C5 8.8 8.6 5.2 12 2.6 Z"/>
        <circle cx="12" cy="13.6" r="1.7"/>
        <path d="M12 15.3 L12 29.4"/>
      </svg>
      <span class="brand-name">Aurora</span>
    </a>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ base_url }}/restorations/">Collection</a>
      <a href="{{ base_url }}/tags/">Subjects</a>
      <a href="{{ base_url }}/about/">About</a>
      <button class="search-open" id="search-open" type="button" aria-haspopup="dialog" aria-controls="search-overlay">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3 L17 17"/></svg>
        <span>Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </nav>
  </header>
