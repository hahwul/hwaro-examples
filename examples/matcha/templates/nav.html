<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Posts</a>
      <a href="{{ base_url }}/archives/">Archives</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
    <div class="header-right">
      <button class="search-trigger" onclick="openSearch()" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search for wisdom..." autocomplete="off">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
