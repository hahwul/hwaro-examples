{% include "header.html" %}

<div class="section-content">
  {% if page.title %}
    <h1>{{ page.title | e }}</h1>
  {% endif %}

  {{ content | safe }}

  <ul class="section-list">
    {% for child in section.pages %}
      <li>
        <a href="{{ child.permalink }}">{{ child.title | e }}</a>
        {% if child.description %}
          <p>{{ child.description | e }}</p>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
