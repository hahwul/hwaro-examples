{% extends "base.html" %}

{% block content %}
    <h1>{{ page.title | e }}</h1>

    <div class="content">
        {{ content | safe }}
    </div>

    {% if section is defined and section.list is defined %}
    <ul class="section-list post-list">
      {{ section.list | safe }}
    </ul>
    {% endif %}

    {% if pagination is defined %}
    <div class="pagination">
      {{ pagination | safe }}
    </div>
    {% endif %}
{% endblock %}
