<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% if page and page.title != site.title %}{{ page.title }} - {{ site.title }}{% elif section %}{{ section.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page %}{{ page.description | default(value=site.description) }}{% else %}{{ site.description }}{% endif %}">
  {{ og_all_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% if highlight_css %}{{ highlight_css | safe }}{% endif %}
</head>
<body>
<div class="site-wrapper">
  <header class="site-header">
    <a href="{{ base_url }}/" class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </div>
      <div>
        <span class="brand-name">Frequency</span>
        <span class="brand-freq">FM 98.7 MHz</span>
      </div>
    </a>
    <nav class="site-nav">
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/shows/">Shows</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
