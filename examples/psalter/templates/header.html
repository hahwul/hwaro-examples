<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;1,300&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.8;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-family: 'Work Sans', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ccc;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .psalter-hero {
            padding: 100px 0;
        }
        .psalter-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            font-style: italic;
        }
        article { padding-bottom: 100px; font-size: 1.5rem; }
        h2 { font-weight: 400; font-size: 2.5rem; margin-top: 60px; font-style: italic; }
        .lyric-line { margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">PSALTER</div>
            <nav>
                <a href="/">Verse</a>
                <a href="/about">Tune</a>
            </nav>
        </div>
    </header>
