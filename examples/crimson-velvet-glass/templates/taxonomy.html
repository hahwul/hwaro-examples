{% extends "base.html" %}

{% block title %}
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    Taxonomy | {{ site.title }}
  {% endif %}
{% endblock %}

{% block content %}
<div class="taxonomy-container">
    {% if page.title %}
        <h1 class="taxonomy-title">{{ page.title }}</h1>
    {% endif %}

    <div class="taxonomy-list">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
