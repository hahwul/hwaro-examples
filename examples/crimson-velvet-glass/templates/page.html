{% extends "base.html" %}

{% block title %}
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
{% endblock %}

{% block content %}
<article class="page">
    {% if page.title %}
        <h1>{{ page.title }}</h1>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
