{% include "header.html" %}

  <main class="wide-wrap">
    <div class="section-header">
      <div class="accent-bar"></div>
      <h1>Tags</h1>
    </div>

    <div class="taxonomy-list">
      {% for term in taxonomy_terms %}
      <a href="{{ term.url }}" class="taxonomy-item">
        {{ term.name }}
        <span class="count">{{ term.pages | length }}</span>
      </a>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
