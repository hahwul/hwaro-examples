{% include "header.html" %}
<main class="site-main">
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <p class="taxonomy-desc">Browse patterns by {{ taxonomy_name }}</p>

  <ul class="section-list">
  {% for term in taxonomy_terms %}
    <li>
      <a href="{{ term.url }}">{{ term.name }}</a>
      <time>{{ term.pages | length }} pattern{% if term.pages | length != 1 %}s{% endif %}</time>
    </li>
  {% endfor %}
  </ul>
</main>
{% include "footer.html" %}
