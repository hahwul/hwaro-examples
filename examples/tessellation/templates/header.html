<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Source+Sans+3:wght@300;400;600&display=swap');

    :root {
      --escher-white: #f8f8f8;
      --escher-black: #1a1a1a;
      --escher-mid-grey: #6b6b6b;
      --escher-light-grey: #d4d4d4;
      --escher-gold: #d4af37;
      --text: #2a2a2a;
      --text-muted: #555555;
      --border: #cccccc;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background-color: var(--escher-white);
      position: relative;
      overflow-x: hidden;
    }

    /* Escher-style tessellation background pattern (lizard-inspired) */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4d4d4' stroke-width='0.5' opacity='0.3'%3E%3Cpath d='M20,60 Q30,45 40,40 Q50,35 60,40 Q70,45 80,60 Q70,75 60,80 Q50,85 40,80 Q30,75 20,60 Z'/%3E%3Cpath d='M50,10 Q55,15 60,10 L65,15 Q70,10 75,15 L70,25 Q65,30 60,25 L55,30 Q50,25 45,30 L40,25 Q45,20 50,10 Z'/%3E%3Cpath d='M100,20 Q110,25 120,20 L120,40 Q110,45 100,40 L100,20 Z'/%3E%3Cpath d='M0,80 Q10,85 20,80 L20,100 Q10,105 0,100 L0,80 Z'/%3E%3Cpath d='M80,100 Q90,95 100,100 L110,105 Q105,110 100,115 L90,110 Q85,105 80,100 Z'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 120px 120px;
      background-repeat: repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* Impossible cube accent */
    .impossible-cube {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 80px;
      height: 80px;
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }

    .impossible-cube svg {
      width: 100%;
      height: 100%;
    }

    /* Layout */
    .site-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0 2rem;
      margin-bottom: 3rem;
      border-bottom: 2px solid var(--escher-black);
      position: relative;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 80px;
      height: 2px;
      background-color: var(--escher-gold);
    }

    .site-logo {
      font-family: 'Merriweather', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--escher-black);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }

    .site-logo::after {
      content: '∞';
      position: absolute;
      top: -8px;
      right: -20px;
      font-size: 1.2rem;
      color: var(--escher-gold);
      opacity: 0.7;
    }

    .site-logo:hover { color: var(--escher-gold); }

    .site-header nav { display: flex; gap: 2.5rem; }

    .site-header nav a {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: color 0.3s;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--escher-gold);
      transition: width 0.3s;
    }

    .site-header nav a:hover { color: var(--escher-black); }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { min-height: calc(100vh - 250px); }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Merriweather', serif;
      line-height: 1.3;
      margin-top: 1.8em;
      margin-bottom: 0.6em;
      font-weight: 700;
      color: var(--escher-black);
    }

    h1 {
      font-size: 2.4rem;
      margin-top: 0;
      letter-spacing: -0.02em;
      position: relative;
      display: inline-block;
    }

    h1::before {
      content: '';
      position: absolute;
      left: -15px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 60%;
      background-color: var(--escher-gold);
    }

    h2 {
      font-size: 1.7rem;
      position: relative;
      padding-bottom: 0.5rem;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 2px;
      background-color: var(--escher-gold);
    }

    h3 { font-size: 1.3rem; font-weight: 400; }

    p {
      margin: 1.2em 0;
      font-size: 1rem;
      line-height: 1.8;
      font-weight: 300;
    }

    a {
      color: var(--escher-gold);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover { color: var(--escher-black); }

    code {
      background: rgba(212, 175, 55, 0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      font-size: 0.88em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--text);
    }

    pre {
      background: #fafafa;
      padding: 1.5rem;
      border-radius: 3px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-left: 3px solid var(--escher-gold);
    }

    pre code { background: none; padding: 0; }

    /* Gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin: 2.5rem 0;
    }

    .gallery-item {
      background: #fff;
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--escher-gold) 0%, transparent 100%);
    }

    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26, 26, 26, 0.08);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 1rem;
      filter: grayscale(0.2);
      transition: filter 0.3s;
    }

    .gallery-item:hover img { filter: grayscale(0); }

    .gallery-item h3 {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Post list */
    ul#posts, ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2.5rem 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    ul#posts li, ul.section-list li {
      background: #fff;
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    ul#posts li::before, ul.section-list li::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--escher-gold) 0%, transparent 100%);
    }

    ul#posts li:hover, ul.section-list li:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26, 26, 26, 0.08);
    }

    ul#posts li a, ul.section-list li a {
      font-family: 'Merriweather', serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--escher-black);
      display: block;
      margin-bottom: 0.5rem;
    }

    ul#posts li a:hover, ul.section-list li a:hover { color: var(--escher-gold); }

    ul#posts li time, ul.section-list li time {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Article */
    article {
      padding: 1.5rem 0;
      max-width: 780px;
    }

    article img {
      max-width: 100%;
      height: auto;
      margin: 2rem 0;
      border: 1px solid var(--border);
      padding: 0.5rem;
      background: #fff;
    }

    /* Blockquote - Escher quote style */
    blockquote {
      margin: 2.5rem 0;
      padding: 1.5rem 2rem 1.5rem 3rem;
      border-left: 4px solid var(--escher-gold);
      background: linear-gradient(90deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
      font-family: 'Merriweather', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--text-muted);
      position: relative;
    }

    blockquote::before {
      content: '"';
      position: absolute;
      left: 0.5rem;
      top: 0.5rem;
      font-size: 3rem;
      line-height: 1;
      color: var(--escher-gold);
      opacity: 0.3;
      font-family: Georgia, serif;
    }

    /* Footer */
    .site-footer {
      margin-top: 5rem;
      padding: 2.5rem 0;
      border-top: 2px solid var(--escher-black);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      position: relative;
    }

    .site-footer::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background-color: var(--escher-gold);
    }

    /* Taxonomy */
    .taxonomy-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: all 0.3s;
      background: #fff;
    }

    nav.pagination a:hover {
      color: var(--escher-white);
      background-color: var(--escher-gold);
      border-color: var(--escher-gold);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid var(--escher-gold);
      color: var(--escher-gold);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      font-weight: 600;
      background: #fff;
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      opacity: 0.4;
      background: #fff;
    }

    /* Divider with impossible triangle */
    hr {
      border: none;
      text-align: center;
      margin: 3rem 0;
      height: 1px;
      background-color: var(--border);
      position: relative;
    }

    hr::after {
      content: '△';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      color: var(--escher-gold);
      background-color: var(--escher-white);
      padding: 0 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start;
      }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 1.9rem; }
      .gallery-grid,
      ul#posts,
      ul.section-list {
        grid-template-columns: 1fr;
      }
      .impossible-cube { display: none; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Impossible cube decoration -->
  <div class="impossible-cube">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#d4af37" stroke-width="2" fill="none">
        <path d="M30,30 L70,30 L70,70 L30,70 Z"/>
        <path d="M40,20 L80,20 L80,60 L40,60 Z"/>
        <path d="M30,30 L40,20"/>
        <path d="M70,30 L80,20"/>
        <path d="M70,70 L80,60"/>
        <path d="M30,70 L40,60"/>
      </g>
    </svg>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Gallery</a>
        <a href="{{ base_url }}/posts/">Artworks</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Patterns</a>
      </nav>
    </header>
