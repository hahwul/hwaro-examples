{% include "header.html" %}
  <main id="main">
    <article class="leaf leaf--narrow">
      <header class="page-open">
        {% if page.extra.portrait_initial %}
        <div class="author-portrait" aria-hidden="true">{{ page.extra.portrait_initial }}</div>
        {% endif %}
        <h1 class="section-title">{{ page.title | e }}</h1>
        {% if page.description %}<p class="section-intro">{{ page.description | e }}</p>{% endif %}
        <hr class="section-rule" aria-hidden="true">
      </header>
      <div class="page-prose prose">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
