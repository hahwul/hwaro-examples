<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}

  <!-- Google Fonts: Cinzel for headings, EB Garamond for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            parchment: {
              DEFAULT: '#f4ecd8',
              dark: '#e0d5b8',
              light: '#faf6e9',
            },
            ink: {
              DEFAULT: '#2c241e',
              muted: '#5c4d42',
            },
            accent: {
              DEFAULT: '#8b1d1d', // Deep crimson
              gold: '#b4975a',   // Muted gold
            },
            border: '#c4b494',
          },
          fontFamily: {
            serif: ['EB Garamond', 'serif'],
            display: ['Cinzel', 'serif'],
          },
        },
      },
    }
  </script>

  <style type="text/tailwindcss">
    body {
      @apply bg-parchment text-ink font-serif selection:bg-accent/20 selection:text-ink;
    }

    h1, h2, h3, h4, h5, h6 {
      @apply font-display tracking-wide uppercase;
    }

    /* Decorative Border */
    .ornamental-border {
      @apply border-4 border-double border-accent-gold p-1;
    }

    .ornamental-frame {
      @apply border border-border relative;
    }

    /* Prose styling */
    .prose { @apply max-w-none text-ink; }
    .prose h1 { @apply text-4xl mb-8 border-b-2 border-accent-gold pb-4 text-accent; }
    .prose h2 { @apply text-2xl mt-12 mb-6 border-b border-border pb-2 text-accent/80; }
    .prose h3 { @apply text-xl mt-8 mb-4 text-ink; }
    .prose p { @apply my-6 leading-relaxed text-lg text-justify; }
    .prose a { @apply text-accent hover:text-accent-gold underline underline-offset-4 decoration-accent/30 transition-all; }
    .prose strong { @apply text-ink font-bold; }
    .prose code {
      @apply bg-parchment-dark px-1.5 py-0.5 rounded text-sm font-mono text-accent border border-border;
    }
    .prose pre {
      @apply bg-ink text-parchment-light p-6 rounded shadow-inner my-8 overflow-x-auto;
    }
    .prose pre code { @apply bg-transparent p-0 border-0 text-parchment-light; }
    .prose blockquote {
      @apply my-8 py-4 px-8 border-l-4 border-accent-gold bg-parchment-dark/30 italic text-ink/80;
    }
    .prose ul, .prose ol { @apply my-6 ml-8; }
    .prose li { @apply my-2; }
    .prose ul li { @apply list-disc marker:text-accent-gold; }
    .prose ol li { @apply list-decimal marker:text-accent-gold; }
    .prose img { @apply max-w-full rounded shadow-md border border-border p-1 bg-white; }
    .prose table { @apply w-full border-collapse my-10 bg-parchment-light/50; }
    .prose thead { @apply bg-parchment-dark border-b-2 border-accent-gold; }
    .prose th { @apply px-4 py-3 text-left font-display text-sm uppercase text-accent; }
    .prose td { @apply px-4 py-3 border-b border-border text-lg; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #e0d5b8; }
    ::-webkit-scrollbar-thumb { background: #b4975a; border-radius: 5px; border: 2px solid #e0d5b8; }
    ::-webkit-scrollbar-thumb:hover { background: #8b1d1d; }

    /* Ornament */
    .separator {
      @apply flex items-center justify-center my-12 text-accent-gold;
    }
    .separator::before, .separator::after {
      content: "";
      @apply flex-grow border-t border-accent-gold mx-4;
    }
  </style>

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <!-- Top Navigation -->
  <nav class="border-b border-accent-gold/30 bg-parchment/95 sticky top-0 z-50 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ base_url }}/" class="flex items-center gap-4 group">
        <div class="w-10 h-10 border-2 border-accent-gold flex items-center justify-center bg-white rotate-45 group-hover:bg-accent group-hover:border-white transition-all">
          <span class="font-display text-accent -rotate-45 group-hover:text-white">P</span>
        </div>
        <span class="font-display text-xl text-ink group-hover:text-accent transition-colors">{{ site.title }}</span>
      </a>
      
      <div class="hidden md:flex items-center gap-8">
        <a href="{{ base_url }}/" class="font-display text-sm tracking-widest hover:text-accent transition-colors">Chronicles</a>
        <a href="{{ base_url }}/races/" class="font-display text-sm tracking-widest hover:text-accent transition-colors">Lineages</a>
        <a href="{{ base_url }}/regions/" class="font-display text-sm tracking-widest hover:text-accent transition-colors">Atlas</a>
      </div>

      <div class="flex items-center gap-4">
        <div class="relative hidden sm:block">
          <input type="text" placeholder="Search Lore..." class="bg-parchment-dark/50 border border-border py-1 px-4 pl-10 rounded-none focus:outline-none focus:border-accent text-sm w-48 transition-all italic">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-border">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
