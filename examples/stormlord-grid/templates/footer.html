<script>function initStorm(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/24);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[STORMLORD] The sky itself kneels. Lightning is our currency.','color:#38bdf8')}addEventListener('load',initStorm)</script></body></html>
