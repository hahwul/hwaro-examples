<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=IBM+Plex+Sans:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #555;
            --indie: #f0f0f0;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--indie);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
        }
        .logo {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .indie-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 0 #000;
            margin-bottom: 80px;
            border: 4px solid #000;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #000; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; text-transform: uppercase; }
        article { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">indie.mag</div>
            <nav>
                <a href="/">Scene</a>
                <a href="/about">Voice</a>
            </nav>
        </div>
    </header>
