<div class="table-scroll" tabindex="0" role="region" aria-label="Write-up listing">
  <table class="ls-table">
    <thead>
      <tr>
        <th scope="col" class="c-mode">mode</th>
        <th scope="col" class="c-date">date</th>
        <th scope="col" class="c-tags">tags</th>
        <th scope="col" class="c-name">name</th>
      </tr>
    </thead>
    <tbody>
      {% for p in rows %}
      <tr>
        <td class="c-mode">-rw-r--r--</td>
        <td class="c-date"><time datetime="{{ p.date | date('%Y-%m-%d') }}">{{ p.date | date('%Y-%m-%d') }}</time></td>
        <td class="c-tags">
          {% for t in p.tags %}<a class="tag-chip" href="{{ base_url }}/tags/{{ t | slugify }}/">{{ t }}</a>{% endfor %}
        </td>
        <td class="c-name"><a href="{{ base_url }}{{ p.url }}">{{ p.title | slugify }}.md</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
