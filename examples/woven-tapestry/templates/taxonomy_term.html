{% extends "base.html" %}

{% block content %}
    <h2>Threads for "{{ taxonomy_term }}"</h2>
    <ul class="post-list">
        {% for post in taxonomy_pages %}
            <li class="post-item">
                <a href="{{ post.url }}" style="font-size: 1.5rem; font-family: 'Cormorant Garamond', serif; color: var(--yarn-accent1);">{{ post.title }}</a>
                {% if post.date %}
                    <div class="meta" style="font-size: 1rem; margin-bottom: 0; margin-top: 5px;">Woven on {{ post.date | date(format="%B %d, %Y") }}</div>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
