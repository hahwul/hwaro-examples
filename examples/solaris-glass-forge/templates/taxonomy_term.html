{% extends "base.html" %}

{% block content %}
<div class="glass-panel main-content">
  <h1>{{ taxonomy_name | capitalize }}: {{ taxonomy_term }}</h1>

  <div class="grid-layout mt-4">
    {% for post in taxonomy_pages %}
      <article class="glass-card">
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        {% if post.date %}
          <div class="meta">{{ post.date | date("%Y-%m-%d") }}</div>
        {% endif %}
      </article>
    {% endfor %}
  </div>
</div>
{% endblock %}
