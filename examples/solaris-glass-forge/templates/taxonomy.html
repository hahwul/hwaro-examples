{% extends "base.html" %}

{% block content %}
<div class="glass-panel main-content">
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <div class="taxonomy-list">
    {% for term in taxonomy_terms %}
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="taxonomy-tag" style="display: inline-block; margin: 0.5rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px;">
        #{{ term }}
      </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
