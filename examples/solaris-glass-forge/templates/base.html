<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(site.title) }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  <meta name="description" content="{{ page.description | default(site.description) }}">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Ambient Glow Overlay -->
  <div class="ambient-glow"></div>

  <!-- Navigation -->
  <nav class="glass-nav">
    <div class="nav-container">
      <a href="{{ base_url }}/" class="logo">Solaris<span class="highlight">Forge</span></a>
      <ul class="nav-links">
        <li><a href="{{ base_url }}/">Home</a></li>
        <li><a href="{{ base_url }}/about/">About</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="glass-footer">
    <div class="footer-content">
      <p>&copy; {{ current_year }} {{ site.title }}. Powered by Hwaro.</p>
    </div>
  </footer>
</body>
</html>
