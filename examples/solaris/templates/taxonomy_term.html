{% include "header.html" %}
<style>
  .term-header {
    margin-bottom: 32px;
  }

  .term-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .term-count {
    font-size: 16px;
    color: var(--text-secondary);
  }

  .pages-list {
    display: grid;
    gap: 20px;
  }

  .page-item {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 24px;
    text-decoration: none;
    color: var(--text-primary);
    transition: all 0.2s ease;
  }

  .page-item:hover {
    transform: translateY(-2px);
    border-color: var(--solar-gold);
  }

  .page-item-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .page-item-description {
    color: var(--text-secondary);
  }
</style>

<div class="term-header">
  <h1 class="term-title">{{ taxonomy_term }}</h1>
  <p class="term-count">{{ taxonomy_pages | length }} items</p>
</div>

<div class="pages-list">
  {% for page in taxonomy_pages %}
  <a href="{{ page.url }}" class="page-item">
    <h2 class="page-item-title">{{ page.title }}</h2>
    <p class="page-item-description">{{ page.description | default(value=page.summary | strip_html | truncate_words(30)) }}</p>
  </a>
  {% endfor %}
</div>

{% include "footer.html" %}
