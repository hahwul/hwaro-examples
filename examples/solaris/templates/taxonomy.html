{% include "header.html" %}
<style>
  .taxonomy-header {
    margin-bottom: 32px;
  }

  .taxonomy-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .tags-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .tag-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 20px;
    text-decoration: none;
    color: var(--text-primary);
    transition: all 0.2s ease;
  }

  .tag-card:hover {
    transform: translateY(-2px);
    border-color: var(--solar-gold);
  }

  .tag-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .tag-count {
    font-size: 14px;
    color: var(--text-secondary);
  }
</style>

<div class="taxonomy-header">
  <h1 class="taxonomy-title">Tags</h1>
</div>

<div class="tags-grid">
  {% for term in taxonomy_terms %}
  <a href="{{ term.url }}" class="tag-card">
    <div class="tag-name">{{ term.name }}</div>
    <div class="tag-count">{{ term.pages | length }} items</div>
  </a>
  {% endfor %}
</div>

{% include "footer.html" %}
