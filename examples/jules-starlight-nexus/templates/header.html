<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --primary: #9d4edd;
    --secondary: #c77dff;
    --text: #f8f9fa;
    --text-muted: #adb5bd;
    --bg-dark: #10002b;
    --bg-card: rgba(36, 0, 70, 0.6);
    --border: rgba(123, 44, 191, 0.3);
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at center, #240046 0%, #10002b 100%);
    color: var(--text);
    margin: 0;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* Stars Background */
  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    animation: drift 100s linear infinite;
    opacity: 0.5;
  }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-200px); } }

  /* Navbar */
  .navbar {
    background: rgba(16, 0, 43, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .navbar-brand {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--secondary);
    text-decoration: none;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--primary);
  }
  .nav-links a {
    color: var(--text);
    text-decoration: none;
    margin-left: 1.5rem;
    transition: color 0.3s;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  .nav-links a:hover {
    color: var(--secondary);
    text-shadow: 0 0 5px var(--secondary);
  }

  /* Main Layout */
  .main-content {
    flex: 1;
    max-width: 800px;
    margin: 3rem auto;
    padding: 2rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
  }

  /* Typography & Links */
  h1, h2, h3 { color: var(--secondary); text-shadow: 0 0 5px rgba(199, 125, 255, 0.5); }
  a { color: var(--secondary); text-decoration: none; }
  a:hover { text-decoration: underline; color: #e0aaff; }

  /* Lists & Cards */
  ul.section-list { list-style: none; padding: 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; transition: transform 0.2s; }
  ul.section-list li:hover { transform: translateY(-2px); border-color: var(--secondary); }

  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="stars"></div>
  <nav class="navbar">
    <a href="{{ base_url }}/" class="navbar-brand">{{ site.title }}</a>
    <div class="nav-links">
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/posts/">Logs</a>
      <a href="{{ base_url }}/about/">About</a>
    </div>
  </nav>
  <main class="main-content">
