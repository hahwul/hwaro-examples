{% extends "base.html" %}

{% block content %}
  <header class="section-header">
    <h1>{{ page.title | e }}</h1>
  </header>

  <div class="glass-panel">
    {{ content | safe }}
  </div>

  <ul class="section-list">
    {{ section.list | safe }}
  </ul>

  {% if pagination is defined %}
    <div class="pagination">
      {{ pagination | safe }}
    </div>
  {% endif %}
{% endblock %}
