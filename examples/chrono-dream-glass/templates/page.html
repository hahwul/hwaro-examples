{% extends "base.html" %}

{% block content %}
  <article class="page-content">
    {% if page.title is defined and page.title %}
      <header class="page-header">
        <h1>{{ page.title | e }}</h1>
      </header>
    {% endif %}
    <div class="glass-panel">
      {{ content | safe }}
    </div>
  </article>
{% endblock %}
