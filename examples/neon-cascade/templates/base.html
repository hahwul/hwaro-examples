<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if site is defined %}<title>{{ site.title }}{% if page is defined and page.title %} - {{ page.title }}{% endif %}</title>{% endif %}
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% elif site is defined and site.description %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="background-cascade"></div>
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="layout-container">
    {% include "header.html" %}

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}
  </div>
</body>
</html>
