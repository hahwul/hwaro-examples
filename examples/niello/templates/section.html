{% include "header.html" %}
  <main class="site-main">
    <div class="wrapper">
      <h1>{{ page.title }}</h1>
      {{ content | safe }}
      <ul class="post-list">
        {% for post in section.pages %}
        <li class="post-item">
          <a href="{{ base_url }}{{ post.url }}" class="post-link">{{ post.title }}</a>
          {% if post.date %}<span class="post-date">{{ post.date | date("%Y-%m-%d") }}</span>{% endif %}
        </li>
        {% endfor %}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
