{% extends "base.html" %}

{% block content %}
<article class="glass-panel page-content">
    <header class="page-header">
        <h1 class="chrome-title">{{ page.title }}</h1>
        {% if page.description %}
            <p class="description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
