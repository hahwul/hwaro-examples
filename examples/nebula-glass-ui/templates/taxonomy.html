{% extends "base.html" %}

{% block content %}
<div class="section-header" style="margin-bottom: 3rem; text-align: center;">
    <h1>{{ taxonomy_name | upper }}</h1>
</div>

<div class="glass-panel" style="text-align: center;">
    {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name | slugify }}/{{ term | slugify }}/" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1rem; margin: 0.5rem;">
            {{ term }}
        </a>
    {% endfor %}
</div>
{% endblock %}
