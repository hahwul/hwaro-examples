{% extends "base.html" %}

{% block title %}{{ taxonomy_name }} | {{ site.title }}{% endblock %}

{% block content %}
<h1>{{ taxonomy_name | title }}</h1>
<ul class="taxonomy-list">
    {% for term in taxonomy_terms %}
    <li>
        <a href="{{ term.url }}">{{ term.name }} ({{ term.pages | length }})</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
