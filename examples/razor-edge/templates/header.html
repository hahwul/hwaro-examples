<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ff0000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 0; border-right: 2px solid #000; min-height: 100vh; }
        header { padding: 40px; border-bottom: 2px solid #000; text-align: right; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: -1px; }
        .razor-surface { padding: 60px; position: relative; border-bottom: 2px solid #000; }
        .razor-surface::after { content: ''; position: absolute; bottom: -2px; right: 0; width: 100px; height: 4px; background: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">razor.edge</div></header>
