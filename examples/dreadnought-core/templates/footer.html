<script>function initDread(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/26);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[DREADNOUGHT] All guns loaded. The sea itself fears us.','color:#64748b')}addEventListener('load',initDread)</script></body></html>
