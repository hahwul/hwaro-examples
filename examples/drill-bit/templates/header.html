<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eee; --text: #333; --accent: #000; --metal: #ccc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding: 20px 0; margin-bottom: 60px; text-align: center; }
        .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; }
        .drill-surface { background: #fff; padding: 60px; border: 2px solid #000; box-shadow: 10px 10px 0 #000; position: relative; }
        .drill-hole { width: 40px; height: 40px; border-radius: 50%; background: #000; position: absolute; top: -20px; left: -20px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">drill.bit</div></header>
