<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c1c1c;
            --text: #888;
            --stone: #2a2a2a;
            --accent: #eee;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cinzel', serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
            border-bottom: 20px solid var(--stone);
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .tablets-hero {
            padding: 100px 0;
            text-align: center;
        }
        .tablets-hero h1 {
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            color: var(--accent);
            line-height: 0.8;
        }
        article {
            background: var(--stone);
            padding: 100px;
            border: 1px solid #333;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            margin-bottom: 100px;
            color: var(--accent);
        }
        h2 { font-size: 3rem; text-transform: uppercase; letter-spacing: -2px; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">TABLETS.</div>
            <nav>
                <a href="/">Laws</a>
                <a href="/about">Edict</a>
            </nav>
        </div>
    </header>
