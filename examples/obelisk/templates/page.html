{% include "header.html" %}
  <main class="site-main">
    <article class="page-article">
      <div class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <p class="page-date">{{ page.date }}</p>
        {% endif %}
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </div>
      <div class="hieroglyph-border"></div>
      <div class="page-content">
        {{ content | safe }}
      </div>
      <div class="hieroglyph-border"></div>
      <div class="page-nav">
        <a href="{{ base_url }}/">Return to the Monument</a>
      </div>
    </article>
  </main>
{% include "footer.html" %}
