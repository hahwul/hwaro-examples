{% include "header.html" %}

<article class="page-content">
  {% if page.title %}<h1>{{ page.title | e }}</h1>{% endif %}
  {% if content %}{{ content | safe }}{% endif %}

  <ul class="section-list">
    {% for p in pages %}
    <li><a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a></li>
    {% endfor %}
  </ul>
</article>
