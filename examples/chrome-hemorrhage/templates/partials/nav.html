<header class="blog-header">
  <div class="blog-header-inner">
    <!-- CHROME HEMORRHAGE — DISTORTED GLITCH LOGO -->
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo" data-text="CHROME HEMORRHAGE">CHROME HEMORRHAGE</a>

    <!-- THEATRE NAV: LOGS / THEATRE / SUBJECTS / EXIT -->
    <nav aria-label="Surgical navigation">
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">LOGS</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">THEATRE</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">SUBJECTS</a>
      <a href="https://github.com/hahwul/hwaro-examples/tree/main/examples/chrome-hemorrhage" target="_blank" rel="noopener">EXIT</a>
    </nav>

    <div class="header-right">
      <!-- PULSING VITAL SIGNS HUD -->
      <div class="vitals-hud" aria-label="Patient vitals">
        <div class="heart-rate">
          <span class="vitals-label">HR</span>
          <span class="bpm">142</span>
        </div>
        <div>
          <span class="vitals-label">BLOOD</span>
          <div class="blood-bar" title="64% blood loss"></div>
        </div>
      </div>

      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}

      <button class="search-trigger" onclick="openSearch()" title="Search Incisions">
        <span>SEARCH</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
  </div>
</header>
