{% extends "base.html" %}

{% block content %}
<header class="mb-lg">
    <h1>Tag: {{ term.name }}</h1>
</header>

<ul class="article-list">
    {% for page in term.pages %}
    <li class="article-item">
        <h2 class="article-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
        {% if page.date %}
        <div class="post-meta">
            <time datetime="{{ page.date }}">{{ page.date }}</time>
        </div>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock %}
