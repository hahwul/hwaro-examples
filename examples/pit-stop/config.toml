title = "Pit Stop"
description = "Motorsport pit event"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[feeds]
enabled = true
type = "rss"
full_content = true
limit = 20
sections = ["positions"]
