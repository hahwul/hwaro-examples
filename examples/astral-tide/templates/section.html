{% extends "base.html" %}

{% block content %}
  <div class="section-content">
    {% if page.title is present %}
      <h1 class="page-title">{{ page.title | e }}</h1>
    {% endif %}
    <div class="prose">
      {{ content | safe }}
    </div>

    <div class="astral-list-container">
      {{ section.list | safe }}
    </div>

    {% if pagination %}
      <div class="pagination-container">
        {{ pagination | safe }}
      </div>
    {% endif %}
  </div>
{% endblock %}
