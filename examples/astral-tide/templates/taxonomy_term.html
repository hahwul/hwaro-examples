{% extends "base.html" %}

{% block content %}
  <div class="taxonomy-term-content">
    <div class="taxonomy-header">
      <span class="taxonomy-label">{{ taxonomy_name | capitalize }}:</span>
      <h1 class="page-title">{{ taxonomy_term.name }}</h1>
    </div>

    <div class="astral-list-container">
      <ul class="section-list">
        {% for page in taxonomy_pages %}
          <li>
            <a href="{{ page.url }}">{{ page.title }}</a>
            {% if page.date is present %}
              <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
{% endblock %}
