{% include "header.html" %}
  <div class="blog-container">
    <header class="site-header">
      <div class="header-inner">
        <a href="{{ base_url }}/" class="site-logo">Cloister</a>
        <nav class="site-nav">
          <a href="{{ base_url }}/posts/">Meditations</a>
          <a href="{{ base_url }}/archives/">Archives</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
        <button class="search-btn" onclick="openSearch()" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <kbd>Cmd+K</kbd>
        </button>
      </div>
    </header>
    <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
      <div class="search-modal">
        <input type="text" id="searchInput" placeholder="Search meditations..." autocomplete="off">
        <div id="searchResults"></div>
      </div>
    </div>
    <div class="content-wrap">
      <article class="page-article">
        <h1 class="page-title">{{ page.title }}</h1>
        <div class="page-content">
          {{ content | safe }}
        </div>
      </article>
{% include "footer.html" %}
