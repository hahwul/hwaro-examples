<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0c0c0c; --text: #eee; --accent: #ff0050; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; border: 1px solid #222; }
        header { padding-bottom: 20px; border-bottom: 1px solid var(--accent); margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; }
        .protocol-surface { padding: 40px 0; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">protocol.x</div></header>
