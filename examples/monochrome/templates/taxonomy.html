{% include "header.html" %}

<div style="margin-bottom: 3rem;">
  <p class="section-heading">Index</p>
  <h1 class="section-title">{{ taxonomy_name | title }}</h1>
</div>

<hr class="thin-rule" style="margin-top: 0;">

<ul class="taxonomy-list">
  {% for term in taxonomy_terms %}
  <li>
    <a href="{{ base_url }}{{ term.url }}">
      <span style="letter-spacing: 0.06em;">{{ term.name }}</span>
      <span class="taxonomy-count">{{ term.pages | length }} {% if term.pages | length == 1 %}essay{% else %}essays{% endif %}</span>
    </a>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
