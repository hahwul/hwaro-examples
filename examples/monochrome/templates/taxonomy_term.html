{% include "header.html" %}

<div style="margin-bottom: 3rem;">
  <p class="section-heading">Tagged</p>
  <h1 class="section-title">{{ taxonomy_term }}</h1>
</div>

<hr class="thin-rule" style="margin-top: 0;">

<div style="display: flex; flex-direction: column; gap: 0;">
  {% for post in taxonomy_pages %}
  <article style="border-bottom: 1px solid var(--border);">
    <a href="{{ base_url }}{{ post.url }}" style="display: block; padding: 2rem 0; text-decoration: none; color: inherit;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 0;">
          <p class="section-heading" style="margin-bottom: 0.25rem;">{{ post.date | date("%B %Y") }}</p>
          <h2 style="font-size: 1.4rem; font-weight: 400; letter-spacing: 0.03em; color: var(--text-main); margin-bottom: 0.5rem;">{{ post.title }}</h2>
          {% if post.description %}
          <p style="font-size: 0.92rem; color: var(--text-muted); font-style: italic;">{{ post.description }}</p>
          {% endif %}
        </div>
        <span style="font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; align-self: center;">Read</span>
      </div>
    </a>
  </article>
  {% endfor %}
</div>

<div style="margin-top: 3rem;">
  <a href="{{ base_url }}/tags/" style="font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px;">
    All Tags
  </a>
</div>

{% include "footer.html" %}
