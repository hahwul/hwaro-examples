<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fragment+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="site-head">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/releases/"{% if page.section == "releases" %} aria-current="page"{% endif %}>Releases</a>
        <a href="{{ base_url }}/pricing/"{% if page.url == "/pricing/" %} aria-current="page"{% endif %}>Pricing</a>
        <a href="{{ base_url }}/privacy/"{% if page.url == "/privacy/" %} aria-current="page"{% endif %}>Privacy</a>
      </nav>
      <div class="head-actions">
        <button type="button" class="search-trigger" id="search-trigger" aria-haspopup="dialog" aria-controls="search-modal" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.4-4.4"/></svg>
          <span>Search</span>
          <span class="key-group" aria-hidden="true"><kbd>&#8984;</kbd><kbd>K</kbd></span>
        </button>
        <a class="btn btn-accent" href="{{ base_url }}/pricing/">Start free</a>
      </div>
    </header>
