<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,400;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfaf5;
            --text: #2c3e50;
            --accent: #900;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Unna', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-weight: 700;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .brev-hero {
            padding: 80px 0;
            text-align: center;
        }
        .brev-hero h1 {
            font-size: 3.5rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article {
            background: #fff;
            padding: 60px;
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            margin-bottom: 80px;
        }
        h2 { font-weight: 700; font-size: 1.8rem; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-top: 0; color: var(--accent); }
        .office-label { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">BREVIARY</div>
            <nav>
                <a href="/">Office</a>
                <a href="/about">Psalms</a>
            </nav>
        </div>
    </header>
