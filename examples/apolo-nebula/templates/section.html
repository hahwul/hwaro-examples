{% include "header.html" %}
  <main class="site-main">
    <div class="glass-container">
      <h1>{{ page.title | e }}</h1>
      {{ content | safe }}
    </div>
    {% if section.list %}
    <div class="glass-container">
      <ul class="section-list">
        {{ section.list | safe }}
      </ul>
    </div>
    {% endif %}
    {% if pagination %}
    <div class="glass-container">
      {{ pagination | safe }}
    </div>
    {% endif %}
  </main>
{% include "footer.html" %}
