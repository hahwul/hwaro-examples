{% include "header.html" %}
  <div class="glass-panel">
    <h1 class="page-title">
      {% if taxonomy is defined %}
        {{ taxonomy.name | upper }}
      {% else %}
        TAXONOMY
      {% endif %}
    </h1>

    <div class="tag-cloud" style="justify-content: center; margin-top: 2rem;">
      {% if terms is defined %}
        {% for term in terms %}
        <a href="{{ term.url }}" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
          {{ term.name }} ({{ term.pages_count }})
        </a>
        {% endfor %}
      {% endif %}
    </div>
  </div>
{% include "footer.html" %}
