{% extends "base.html" %}

{% block title %}
    {% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}
{% endblock %}

{% block content %}
<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="post-meta">
            <time datetime="{{ page.date }}">{{ page.date | date(format="%Y-%m-%d") }}</time>
        </div>
        {% endif %}
    </header>
    <div class="post-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
