<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% if page.description %}
  <meta name="description" content="{{ page.description }}">
  {% else %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #03010A;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent-cyan: #00F0FF;
      --accent-purple: #8A2BE2;
      --accent-magenta: #FF0055;

      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Elements */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
      animation-delay: -5s;
    }

    .orb-3 {
      top: 40%;
      left: 60%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--accent-magenta) 0%, transparent 70%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5%, 10%) scale(1.1); }
      66% { transform: translate(-5%, 5%) scale(0.9); }
      100% { transform: translate(0, -10%) scale(1); }
    }

    /* Layout */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 2rem 0;
      margin-bottom: 3rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .site-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--accent-cyan);
    }

    /* Main Content Area */
    main {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      margin-bottom: 4rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* Typography inside main */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      color: #fff;
      margin-bottom: 1.2rem;
      margin-top: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    main > h1:first-child {
      margin-top: 0;
      font-size: 3rem;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--accent-magenta);
      text-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
    }

    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    code {
      font-family: monospace;
      background: rgba(255,255,255,0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--accent-cyan);
    }

    pre {
      background: rgba(0,0,0,0.4);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
    }

    pre code {
      background: transparent;
      padding: 0;
      color: var(--text-main);
    }

    blockquote {
      border-left: 4px solid var(--accent-purple);
      padding-left: 1.5rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--glass-border);
      margin-top: 4rem;
    }

    /* Taxonomy & Lists Specific */
    .taxonomy-desc {
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 2rem;
    }

    .section-list {
      list-style: none;
      padding: 0;
    }

    .section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }

    .section-list li a {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    /* Tags styling */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    .tag {
      background: rgba(138, 43, 226, 0.1);
      border: 1px solid rgba(138, 43, 226, 0.3);
      color: var(--accent-cyan);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <header>
      <nav>
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <div class="nav-links">
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/about/">About</a>
        </div>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer>
      <p>&copy; {{ site.title }}. Built with Hwaro.</p>
    </footer>
  </div>
</body>
</html>
