<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #4ade80; /* A soft, tech-forward green */
      --primary-dark: #22c55e;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --bg: #0f172a;
      --bg-subtle: #1e293b;
      --card-bg: rgba(30, 41, 59, 0.7);
      --glow: rgba(74, 222, 128, 0.15);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        margin: 0;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 0;
        margin-bottom: 3rem;
        border-bottom: 1px solid var(--border);
    }
    .site-logo {
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text);
        text-decoration: none;
        letter-spacing: -0.02em;
    }
    .site-logo span { color: var(--primary); }
    .site-header nav { display: flex; gap: 2rem; align-items: center; }
    .site-header nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: color 0.2s ease;
    }
    .site-header nav a:hover { color: var(--text); }
    .nav-cta {
        background: var(--primary);
        color: var(--bg) !important;
        padding: 0.5rem 1.25rem;
        border-radius: 999px;
        font-weight: 600 !important;
    }
    .nav-cta:hover { background: var(--primary-dark); }

    .site-main { min-height: calc(100vh - 200px); }
    .site-footer {
        margin-top: 5rem;
        padding: 2rem 0;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; letter-spacing: -0.02em; }
    h1 { font-size: 3rem; margin-top: 0; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; color: var(--text-muted); font-size: 1.1rem; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Landing Specifics */
    .hero {
        text-align: center;
        padding: 5rem 0;
        max-width: 800px;
        margin: 0 auto;
    }
    .hero h1 { margin-bottom: 1.5rem; }
    .hero p { margin-bottom: 2.5rem; font-size: 1.25rem; }
    .btn-group { display: flex; gap: 1rem; justify-content: center; }
    .btn {
        display: inline-block;
        padding: 0.875rem 1.75rem;
        border-radius: 8px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
    }
    .btn:hover { text-decoration: none; }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 0 20px var(--glow); }
    .btn-outline { border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--text-muted); background: var(--bg-subtle); }

    .dashboard-preview {
        margin: 4rem auto;
        border-radius: 12px;
        background: var(--bg-subtle);
        border: 1px solid var(--border);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        overflow: hidden;
        position: relative;
    }
    .dashboard-preview::before {
       content: '';
       display: block;
       height: 30px;
       background: var(--border);
       border-bottom: 1px solid var(--bg);
    }
    .dashboard-preview img {
        width: 100%;
        display: block;
        opacity: 0.8;
    }

    .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin: 5rem 0;
    }
    .feature-card {
        padding: 2rem;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .feature-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .feature-card h3 { margin-top: 0; color: var(--text); }
    .feature-card p { font-size: 1rem; margin-bottom: 0; }

    .stats {
        display: flex;
        justify-content: space-around;
        padding: 3rem 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        margin: 4rem 0;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .stat-label { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1rem; }
      .site-header nav { width: 100%; justify-content: center; flex-wrap: wrap; }
      .hero h1 { font-size: 2.25rem; }
      .stats { flex-direction: column; gap: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Fintech<span>Pulse</span></a>
      <nav>
        <a href="{{ base_url }}/">Platform</a>
        <a href="{{ base_url }}/">Solutions</a>
        <a href="{{ base_url }}/">Pricing</a>
        <a href="{{ base_url }}/" class="nav-cta">Get Started</a>
      </nav>
    </header>
