<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true" focusable="false">
          <path d="M16 5 C 12 11, 9 14, 9 18 a7 7 0 0 0 14 0 C 23 14, 20 11, 16 5 Z" fill="currentColor" opacity="0.9"/>
          <path d="M16 12 C 16 17, 16 21, 16 26" fill="none" stroke="var(--bg)" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M16 17 C 13.5 16, 12 17.5, 11 19" fill="none" stroke="var(--bg)" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M16 20 C 18.5 19, 20 20.5, 21 22" fill="none" stroke="var(--bg)" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <span class="brand-word">Petrichor</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/plantings/">diary</a>
        <a href="{{ base_url }}/tags/">tags</a>
        <a href="{{ base_url }}/about/">about</a>
      </nav>
    </div>
  </header>
