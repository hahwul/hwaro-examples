<form class="find-form" role="search" action="{{ base_url }}/">
  <label class="find-label" for="diary-search">Search the diary</label>
  <div class="find-field">
    <svg class="find-icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true" focusable="false">
      <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <line x1="13.5" y1="13.5" x2="17.5" y2="17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <input class="find-input" id="diary-search" name="q" type="search"
           placeholder="clay, drainage, sedges&hellip;" autocomplete="off" spellcheck="false">
  </div>
</form>
