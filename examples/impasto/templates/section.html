{% include "header.html" %}

      <div class="section-header">
        <h1>{{ page.title }}</h1>
        {{ content | safe }}
      </div>

      <ul class="post-list">
        {% for item in section.pages %}
        <li class="post-card">
          <a href="{{ base_url }}{{ item.url }}">
            <span class="post-date">{{ item.date | date("%Y-%m-%d") }}</span>
            <span class="post-link">{{ item.title }}</span>
            {% if item.description %}
            <span class="post-description">{{ item.description }}</span>
            {% endif %}
          </a>
        </li>
        {% endfor %}
      </ul>

      {{ pagination }}

{% include "footer.html" %}
