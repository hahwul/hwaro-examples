{% include "header.html" %}
<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Logs</a>
      <a href="{{ base_url }}/archives/">Data Archives</a>
    </nav>
    <button class="search-trigger" onclick="openSearch()" title="Search">
      <span>Search</span>
      <kbd>⌘K</kbd>
    </button>
  </div>
</header>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-input-wrap">
      <input type="text" id="searchInput" placeholder="Querying databases..." autocomplete="off">
      <kbd onclick="closeSearch()">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
<div class="blog-container">
  <main class="blog-main">
    <h1>{{ section.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
    {% for p in section.pages %}
      <li class="post-item">
        <h2><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        {% if p.description %}<p>{{ p.description | e }}</p>{% endif %}
      </li>
    {% endfor %}
    </ul>
{% include "footer.html" %}
