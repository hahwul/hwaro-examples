{% include "header.html" %}

  <main class="wrapper board-main">
    <section class="board-intro">
      <h1 class="board-title" aria-label="{{ page.title }}">
        <span class="flap-row" aria-hidden="true">
          <span class="flap flap--amber">S</span><span class="flap flap--amber">E</span><span class="flap flap--amber">A</span><span class="flap flap--amber">R</span><span class="flap flap--amber">C</span><span class="flap flap--amber">H</span>
        </span>
      </h1>
      <p class="board-sub">Type a destination. The board re-flaps as you go.</p>
    </section>

    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="DESTINATION / KEYWORD" autofocus>
      <ul id="search-results" class="search-results"></ul>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script>
    (function() {
      var input = document.getElementById('search-input');
      var resultsEl = document.getElementById('search-results');
      var fuse;

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      fetch('{{ base_url }}/search.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3 });
        });

      input.addEventListener('input', function() {
        var query = input.value.trim();
        if (!query || !fuse) { resultsEl.innerHTML = ''; return; }
        var results = fuse.search(query).slice(0, 10);
        resultsEl.innerHTML = results.map(function(r) {
          return '<li><a href="{{ base_url }}' + escapeHtml(r.item.url) + '">' + escapeHtml(r.item.title) + '</a></li>';
        }).join('');
      });
    })();
  </script>
