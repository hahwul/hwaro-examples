<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <header class="board-housing">
    <div class="wrapper housing-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="{{ site.title }}">
        <span class="flap-row" aria-hidden="true">
          <span class="flap flap--amber">S</span><span class="flap flap--amber">P</span><span class="flap flap--amber">L</span><span class="flap flap--amber">I</span><span class="flap flap--amber">T</span><span class="flap flap--gap"></span><span class="flap flap--amber">F</span><span class="flap flap--amber">L</span><span class="flap flap--amber">A</span><span class="flap flap--amber">P</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/posts/" class="nav-tile">Posts</a>
        <a href="{{ base_url }}/search/" class="nav-tile">Search</a>
        <a href="{{ base_url }}/about/" class="nav-tile">About</a>
      </nav>
    </div>
    <div class="housing-rivets" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </header>
