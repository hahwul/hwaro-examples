<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page and page.section %}{{ page.section }}{% endif %}">
  <header>
    <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
    <nav>
      <a href="{{ base_url }}">Home</a>
      <a href="{{ base_url }}/posts">Blog</a>
      <a href="{{ base_url }}/about">About</a>
      <a href="{{ base_url }}/archives">Archives</a>
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
  </footer>

  <div id="searchOverlay">
    <input type="text" id="searchInput" placeholder="Search...">
    <div id="searchResults"></div>
  </div>
  <script src="{{ base_url }}/js/search.js"></script>
</body>
</html>
