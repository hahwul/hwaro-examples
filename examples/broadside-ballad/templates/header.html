<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &mdash; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <article class="sheet">
      <header class="site-header">
        <div class="masthead">
          <div class="dateline">Printed in the Year of Our Lord &bull; No. XVII</div>
          <h1 class="paper-name"><a href="{{ base_url }}/" style="color:inherit;text-decoration:none;">{{ site.title }}</a></h1>
          <div class="tagline">{{ site.description | e }}</div>
          <div class="price-line">
            <span>Hawked in the Streets</span>
            <span>Sold for One Penny</span>
          </div>
        </div>
        <div class="ornament" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="380" height="22" viewBox="0 0 380 22" fill="currentColor">
            <path d="M0 11 h130 M250 11 h130" stroke="currentColor" stroke-width="1" />
            <circle cx="140" cy="11" r="2.5" />
            <circle cx="240" cy="11" r="2.5" />
            <path d="M150 11 q10 -9 20 0 t20 0 t20 0 t20 0" stroke="currentColor" stroke-width="1" fill="none" />
            <path d="M190 4 l4 7 -4 7 -4 -7 z" />
          </svg>
        </div>
        <nav>
          <a href="{{ base_url }}/">Front Page</a>
          <a href="{{ base_url }}/ballads/">Ballads</a>
          <a href="{{ base_url }}/about/">Colophon</a>
          <a href="{{ base_url }}/tags/">Subjects</a>
        </nav>
      </header>
      <main class="site-main">
