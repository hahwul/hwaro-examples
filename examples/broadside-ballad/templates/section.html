{% include "header.html" %}
<section class="content">
  <h1>{% if page is present and page.title %}{{ page.title | e }}{% elif section is present and section.title %}{{ section.title | e }}{% else %}Ballads &amp; Broadsides{% endif %}</h1>
  <div class="ornament" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="260" height="18" viewBox="0 0 260 18" fill="currentColor">
      <path d="M0 9 h100 M160 9 h100" stroke="currentColor" stroke-width="1" />
      <path d="M110 9 l8 -6 8 6 -8 6 z" />
      <path d="M150 9 l-8 -6 -8 6 8 6 z" />
      <circle cx="130" cy="9" r="2" />
    </svg>
  </div>
  <div class="content-intro">{{ content }}</div>
  <ul class="section-list">
    {{ section.list }}
  </ul>
  {{ pagination }}
</section>
{% include "footer.html" %}
