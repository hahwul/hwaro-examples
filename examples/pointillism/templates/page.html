{% include "header.html" %}

<article class="page-article">
    <header class="article-header">
        <h1 class="article-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="article-meta">
            <time>{{ page.date | date("%B %d, %Y") }}</time>
        </div>
        {% endif %}
    </header>
    <div class="article-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
