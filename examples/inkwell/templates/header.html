<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-faint: #8a8a8a;
      --rule: #c8c0b8;
      --rule-light: #e0dbd5;
      --parchment: #faf8f5;
      --parchment-warm: #f3efe9;
      --serif: 'Cormorant Garamond', 'Georgia', serif;
      --body-serif: 'EB Garamond', 'Georgia', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--body-serif);
      font-size: 18px;
      line-height: 1.8;
      color: var(--ink);
      background: var(--parchment);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-frame {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    .site-header {
      padding: 3rem 0 2rem;
      text-align: center;
      border-bottom: 1px solid var(--rule);
    }

    .site-title {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      display: block;
    }

    .site-title:hover {
      color: var(--ink-light);
    }

    .site-nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }

    .site-nav a {
      font-family: var(--serif);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .site-nav a:hover {
      color: var(--ink);
    }

    /* Main */
    .site-main {
      min-height: 60vh;
      padding: 3rem 0;
    }

    /* Footer */
    .site-footer {
      padding: 2rem 0;
      border-top: 1px solid var(--rule);
      text-align: center;
      font-family: var(--serif);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
    }

    .site-footer a {
      color: var(--ink-faint);
      text-decoration: none;
    }

    .site-footer a:hover {
      color: var(--ink);
    }

    /* Typography */
    h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 2rem;
      line-height: 1.3;
      letter-spacing: 0.02em;
      margin-bottom: 0.5em;
    }

    h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.4rem;
      line-height: 1.4;
      margin-top: 2em;
      margin-bottom: 0.5em;
    }

    p {
      margin-bottom: 1.2em;
    }

    a {
      color: var(--ink);
      text-decoration-color: var(--rule);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }

    a:hover {
      text-decoration-color: var(--ink);
    }

    /* Home page */
    .home-epigraph {
      text-align: center;
      padding: 6rem 0 4rem;
    }

    .home-epigraph .book-title {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink);
      margin-bottom: 0.4em;
    }

    .home-epigraph .book-subtitle {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--ink-light);
      letter-spacing: 0.05em;
    }

    .home-divider {
      width: 60px;
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem auto;
    }

    /* Poem card list */
    .poem-list {
      list-style: none;
      padding: 0;
    }

    .poem-entry {
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--rule-light);
    }

    .poem-entry:last-child {
      border-bottom: none;
    }

    .poem-entry-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 0.3em;
    }

    .poem-entry-title a {
      color: var(--ink);
      text-decoration: none;
    }

    .poem-entry-title a:hover {
      text-decoration: underline;
      text-decoration-color: var(--rule);
    }

    .poem-entry-excerpt {
      font-family: var(--body-serif);
      font-size: 0.95rem;
      color: var(--ink-light);
      line-height: 1.7;
      font-style: italic;
    }

    .poem-entry-meta {
      margin-top: 0.5em;
      font-family: var(--serif);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* Poem page */
    .poem-header {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--rule-light);
      margin-bottom: 2.5rem;
    }

    .poem-header h1 {
      font-style: italic;
      font-weight: 300;
      font-size: 2.2rem;
      margin-bottom: 0.3em;
    }

    .poem-header .poem-meta {
      font-family: var(--serif);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* Poem body — the verse itself */
    .poem-body {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem 0 2rem;
    }

    .poem-body p {
      text-align: center;
      line-height: 2;
      margin-bottom: 2em;
      font-size: 1.05rem;
    }

    .poem-body p:last-child {
      margin-bottom: 0;
    }

    .poem-end-mark {
      text-align: center;
      margin-top: 3rem;
      font-family: var(--serif);
      font-size: 0.9rem;
      color: var(--rule);
      letter-spacing: 0.5em;
    }

    .poem-footer-nav {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule-light);
      text-align: center;
    }

    .poem-footer-nav a {
      font-family: var(--serif);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
    }

    .poem-footer-nav a:hover {
      color: var(--ink);
    }

    /* About / prose page */
    .prose {
      max-width: 540px;
      margin: 0 auto;
    }

    .prose h1 {
      text-align: center;
      margin-bottom: 1.5em;
      padding-bottom: 1em;
      border-bottom: 1px solid var(--rule-light);
    }

    .prose p {
      text-indent: 1.5em;
      margin-bottom: 0.8em;
    }

    .prose p:first-of-type {
      text-indent: 0;
    }

    .prose blockquote {
      margin: 2em 0;
      padding-left: 1.5em;
      border-left: 2px solid var(--rule);
      font-style: italic;
      color: var(--ink-light);
    }

    /* Section list */
    .section-header {
      text-align: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule-light);
      margin-bottom: 1rem;
    }

    .section-header h1 {
      font-style: italic;
      letter-spacing: 0.05em;
    }

    ul.section-list {
      list-style: none;
      padding: 0;
    }

    ul.section-list li {
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule-light);
    }

    ul.section-list li:last-child {
      border-bottom: none;
    }

    ul.section-list li a {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.15rem;
      color: var(--ink);
      text-decoration: none;
    }

    ul.section-list li a:hover {
      text-decoration: underline;
      text-decoration-color: var(--rule);
    }

    /* Taxonomy */
    .taxonomy-desc {
      text-align: center;
      font-style: italic;
      color: var(--ink-light);
      margin-bottom: 1.5rem;
    }

    /* Tags */
    .tag-list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5em;
    }

    .tag-list a {
      font-family: var(--serif);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      padding: 0.2em 0.6em;
      border: 1px solid var(--rule-light);
    }

    .tag-list a:hover {
      color: var(--ink);
      border-color: var(--rule);
    }

    /* Pagination */
    nav.pagination {
      margin-top: 2rem;
      text-align: center;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    nav.pagination a {
      font-family: var(--serif);
      font-size: 0.85rem;
      padding: 0.3em 0.6em;
      color: var(--ink-faint);
      text-decoration: none;
    }

    nav.pagination a:hover {
      color: var(--ink);
    }

    .pagination-current span {
      font-family: var(--serif);
      font-size: 0.85rem;
      padding: 0.3em 0.6em;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
    }

    .pagination-disabled span {
      font-family: var(--serif);
      font-size: 0.85rem;
      padding: 0.3em 0.6em;
      color: var(--rule);
    }

    /* 404 */
    .not-found {
      text-align: center;
      padding: 4rem 0;
    }

    .not-found h1 {
      font-style: italic;
      font-weight: 300;
    }

    .not-found p {
      color: var(--ink-light);
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 600px) {
      body { font-size: 16px; }
      .site-frame { padding: 0 1.2rem; }
      .home-epigraph { padding: 3rem 0 2rem; }
      .home-epigraph .book-title { font-size: 2rem; }
      .poem-header h1 { font-size: 1.7rem; }
      .poem-body { padding: 0.5rem 0 1.5rem; }
      .site-nav { gap: 1.2rem; }
    }
  </style>
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-frame">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/poems/">Poems</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
