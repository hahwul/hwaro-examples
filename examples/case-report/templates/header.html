<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Case report home">
        <svg viewBox="0 0 48 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Medical cross + document icon -->
          <rect x="4" y="2" width="26" height="36" rx="2" fill="none" stroke="#1a6b8a" stroke-width="1.5"/>
          <line x1="9" y1="12" x2="25" y2="12" stroke="#1a6b8a" stroke-width="0.8" opacity="0.4"/>
          <line x1="9" y1="17" x2="22" y2="17" stroke="#1a6b8a" stroke-width="0.8" opacity="0.4"/>
          <line x1="9" y1="22" x2="24" y2="22" stroke="#1a6b8a" stroke-width="0.8" opacity="0.4"/>
          <line x1="9" y1="27" x2="20" y2="27" stroke="#1a6b8a" stroke-width="0.8" opacity="0.4"/>
          <!-- Medical cross -->
          <rect x="30" y="18" width="14" height="14" rx="2" fill="none" stroke="#c44a2a" stroke-width="1.5"/>
          <line x1="37" y1="21" x2="37" y2="29" stroke="#c44a2a" stroke-width="1.5"/>
          <line x1="33" y1="25" x2="41" y2="25" stroke="#c44a2a" stroke-width="1.5"/>

        <span class="logo-text">
          <span class="journal-name">Journal of Clinical Case Reports</span>
          <span class="journal-sub">Case Report &middot; Vol. 18 &middot; Apr 2026</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">CASE</a>
        <a href="{{ base_url }}/sections/">SECTIONS</a>
        <a href="{{ base_url }}/vitals/">VITALS</a>
        <a href="{{ base_url }}/discussion/">DISCUSSION</a>
      </nav>
    </header>
