{% include "header.html" %}
  <main id="main" class="site-main">
    <h1>{{ page.title | e }}</h1>
    {% if page.description %}<p class="section-lede">{{ page.description | e }}</p>{% endif %}
    {{ content | safe }}

    <div class="wall wall--index">
      {% for p in section.pages | sort_by("date", reverse=true) %}
      <article class="exhibit-card exhibit-card--{{ loop.index }}">
        <a class="exhibit-card__link" href="{{ base_url }}{{ p.url }}" aria-label="{{ p.title | e }} &mdash; uploaded {{ p.extra.bbs_date }} by {{ p.extra.handle }}. {{ p.description | e }}">
          <div class="exhibit-card__art" aria-hidden="true">{{ p.summary | safe }}</div>
          <span class="exhibit-card__open">open exhibit &rarr;</span>
        </a>
      </article>
      {% endfor %}
    </div>
  </main>
{% include "footer.html" %}
