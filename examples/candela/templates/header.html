<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} :: {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="site-header__row">
        <a class="wordmark" href="{{ base_url }}{{ lang_prefix }}/">
          <span class="wordmark__glyph" aria-hidden="true">[</span>CANDELA<span class="wordmark__glyph" aria-hidden="true">]</span><span class="cursor" aria-hidden="true">&#9608;</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}{{ lang_prefix }}/">home</a>
          <a href="{{ base_url }}{{ lang_prefix }}/exhibits/">exhibits</a>
          <a href="{{ base_url }}{{ lang_prefix }}/about/">about</a>
        </nav>
      </div>
      <p class="site-subhead">recovered transmissions &middot; BBS art archive &middot; 1993&ndash;1998</p>
    </header>
