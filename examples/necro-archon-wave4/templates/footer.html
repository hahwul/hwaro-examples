<script>function initNecro(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/24);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[NECRO ARCHON] Death is the only promotion. Paperwork eternal.','color:#4ade80')}addEventListener('load',initNecro)</script></body></html>
