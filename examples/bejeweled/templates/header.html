<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #e6005c; /* Ruby red */
      --secondary: #00b386; /* Emerald green */
      --tertiary: #0073e6; /* Sapphire blue */
      --text: #f0f0f5;
      --text-muted: #a0a0b5;
      --border: #2a2a35;
      --bg: #0d0d12;
      --bg-subtle: #16161e;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Optima", "Didot", "Times New Roman", serif; line-height: 1.7; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px rgba(230, 0, 92, 0.6); transition: all 0.3s ease; }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
    .site-header nav a:hover { color: var(--text); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    .site-main { min-height: calc(100vh - 220px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 0.75em; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
    h1 { font-size: 2.2rem; margin-top: 0; color: var(--primary); text-shadow: 0 0 15px rgba(230, 0, 92, 0.4); }
    h2 { font-size: 1.6rem; color: var(--secondary); text-shadow: 0 0 15px rgba(0, 179, 134, 0.4); }
    h3 { font-size: 1.3rem; color: var(--tertiary); text-shadow: 0 0 15px rgba(0, 115, 230, 0.4); }
    p { margin: 1.2em 0; }
    a { color: var(--tertiary); text-decoration: none; }
    a:hover { color: var(--primary); text-shadow: 0 0 10px rgba(230, 0, 92, 0.5); }

    /* Elegant code blocks */
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: var(--secondary); }
    pre { background: var(--bg-subtle); padding: 1.2rem; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); box-shadow: inset 0 0 10px rgba(0, 115, 230, 0.1); }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components - Gemstone aesthetic */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg-subtle);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    ul.section-list li:hover {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(230, 0, 92, 0.2), inset 0 0 10px rgba(230, 0, 92, 0.1);
      transform: translateY(-2px);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.2rem; color: var(--text); }
    ul.section-list li a:hover { text-shadow: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }

    /* Pagination */
    nav.pagination { margin: 2.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      color: var(--text-muted);
      text-decoration: none;
      font-family: ui-monospace, monospace;
    }
    nav.pagination a:hover {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(230, 0, 92, 0.3);
    }
    .pagination-current span {
      color: var(--secondary);
      border-color: var(--secondary);
      box-shadow: inset 0 0 8px rgba(0, 179, 134, 0.3);
    }
    .pagination-disabled span { opacity: 0.4; }

    /* Custom Gemstone Elements */
    hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
      position: relative;
    }
    hr::after {
      content: "♦";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg);
      padding: 0 10px;
      color: var(--primary);
      font-size: 1.2rem;
      text-shadow: 0 0 8px rgba(230, 0, 92, 0.6);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1.25rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
