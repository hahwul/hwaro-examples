{% extends "base.html" %}

{% block content %}
<main class="cyber-main">
  <article class="cyber-post">
    <header class="post-header">
      <h1 class="neon-text">{{ page.title | e }}</h1>
      <div class="post-meta">
        <time class="neon-text-dim">{{ page.date }}</time>
      </div>
    </header>
    <div class="post-content cyber-content">
      {{ content | safe }}
    </div>
  </article>
</main>
{% endblock %}
