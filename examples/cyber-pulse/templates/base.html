<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}" class="cyber-theme">
  <header class="cyber-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="logo neon-text">{{ site.title }}</a>
      <nav class="cyber-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/archives/">Archives</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div class="header-right">
        <button class="search-trigger" onclick="openSearch()" title="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
          <kbd>&#8984;K</kbd>
        </button>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal cyber-modal">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search data streams..." autocomplete="off">
        <kbd onclick="closeSearch()">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div class="cyber-container">
    {% block content %}{% endblock %}
  </div>

  <footer class="cyber-footer">
    <p>Powered by Hwaro &bull; SYSTEM ONLINE</p>
  </footer>

  {{ highlight_js }}
  <script src="{{ base_url }}/js/search.js"></script>
  {{ auto_includes_js }}
</body>
</html>
