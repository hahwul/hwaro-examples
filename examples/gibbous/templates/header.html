<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-moon" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="30" height="30" fill="none" focusable="false">
            <circle cx="16" cy="16" r="14" fill="var(--accent)"/>
            <path d="M21.5 3.6a14 14 0 0 1 0 24.8 11 11 0 0 0 0-24.8z" fill="var(--bg)"/>
          </svg>
        </span>
        <span class="brand-word">Gibbous</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/rules/">Rules</a>
        <a href="{{ base_url }}/workshops/">Workshops</a>
        <a href="{{ base_url }}/venue/">Venue</a>
        <a class="nav-cta" href="{{ base_url }}/register/">Register</a>
      </nav>
    </header>
