{% include "header.html" %}
<article class="luminous-card post">
  <header class="post-header">
    <h1>{{ page.title | e }}</h1>
    <div class="post-meta">
      <time>{{ page.date }}</time>
    </div>
  </header>
  <div class="post-content content">
    {{ content | safe }}
  </div>
</article>
