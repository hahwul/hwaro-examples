# =============================================================================
# Jade Palace - Site Configuration
# =============================================================================
# Eastern gemstone luxury with deep green translucency and imperial motifs

title = "Jade Palace"
description = "Eastern gemstone luxury with deep green translucency and imperial motifs"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = true
per_page = 5

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

[markdown]
safe = false
lazy_loading = true
