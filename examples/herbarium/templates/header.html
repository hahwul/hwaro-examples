<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300&family=Nunito:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7;
            --text: #4a4a4a;
            --accent: #556b2f; /* dark olive green */
            --leaf: #e8ecd8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            line-height: 1.8;
            background-image: radial-gradient(var(--leaf) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
            background: rgba(255,255,255,0.8);
            border-left: 1px solid #eee;
            border-right: 1px solid #eee;
            min-height: 100vh;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 1px solid var(--leaf);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: lowercase;
            letter-spacing: 5px;
            font-style: italic;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        nav a:hover { color: var(--accent); opacity: 1; }
        .herb-hero {
            padding: 80px 0;
            text-align: center;
        }
        .herb-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            margin: 0;
            color: var(--accent);
            font-weight: 300;
            line-height: 1;
        }
        article { padding: 40px 0; font-size: 1.1rem; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--accent); font-style: italic; border-bottom: 1px solid var(--leaf); padding-bottom: 10px; margin-top: 40px; }
        .specimen-label {
            display: inline-block;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">herbarium.</div>
        <nav>
            <a href="/">Flora</a>
            <a href="/about">Press</a>
        </nav>
    </header>
