{% include "header.html" %}
  <main class="site-main">
    <div class="ancient-border">
      <h1>Records Tagged: {{ page.title }}</h1>
    </div>

    <ul class="quest-log" style="margin-top: 3rem;">
      {% for post in section.pages %}
      <li class="quest-card">
        <div class="quest-meta">Entry {{ post.date }}</div>
        <h2><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h2>
        {% if post.description %}
        <p class="quest-desc">{{ post.description }}</p>
        {% endif %}
        <a href="{{ base_url }}{{ post.url }}" class="btn-action">Venture In</a>
      </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
