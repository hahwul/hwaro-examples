{% extends "base.html" %}

{% block content %}
<article class="glass-card page-article">
  <header class="page-header">
    <h1 class="gradient-text">{{ page.title }}</h1>
    {% if page.date %}
    <p class="page-meta">
      <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
    </p>
    {% endif %}
  </header>
  <div class="page-content">
    {{ content | safe }}
  </div>
</article>
{% endblock content %}
