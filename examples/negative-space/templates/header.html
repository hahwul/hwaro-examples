<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #555;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .negative-hero {
            padding: 100px 0;
            text-align: left;
        }
        .negative-hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
            color: #000;
            -webkit-text-stroke: 2px #fff;
        }
        article { padding: 80px 0; font-size: 1.3rem; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; text-transform: uppercase; color: #000; -webkit-text-stroke: 1px #fff; margin-top: 60px; }
        .negative-block {
            background: #fff;
            color: #000;
            padding: 60px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">NEGATIVE//SPACE</div>
            <nav>
                <a href="/">Absence</a>
                <a href="/about">Void</a>
            </nav>
        </div>
    </header>
