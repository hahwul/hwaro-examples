<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.title | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
  <meta name="base-url" content="{{ base_url }}">
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>
  <header class="site-header">
    <div class="container header-container">
      <a href="{{ base_url }}/" class="logo">
        <span class="logo-icon">✨</span>
        <span class="logo-text">{{ site.title | default("Stellar Echo", true) | e }}</span>
      </a>
      <nav class="nav-links">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-container">
      <p>&copy; 2024 {{ site.title | default("Stellar Echo", true) | e }}. Exploring the digital cosmos.</p>
    </div>
  </footer>
</body>
</html>
