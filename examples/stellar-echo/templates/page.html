{% extends "base.html" %}

{% block content %}
<article class="page-content">
  <header class="page-header">
    <h1 class="page-title">{{ page.title | e }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description | e }}</p>
    {% endif %}
  </header>
  <div class="content-body">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
