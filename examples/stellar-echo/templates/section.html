{% extends "base.html" %}

{% block content %}
<section class="section-content">
  <header class="section-header">
    <h1 class="section-title">{{ section.title | default(section.name | capitalize, true) | e }}</h1>
  </header>
  <div class="content-body">
    {{ content | safe }}
  </div>

  <div class="section-list">
    {{ section.list | safe }}
  </div>
</section>
{% endblock %}
