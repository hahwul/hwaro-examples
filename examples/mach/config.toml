title = "Mach"
description = "A self-hosted CI runner that bills by the build-second, not the seat"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "vs2015"
use_cdn = true
mode = "server"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
sections = ["devlog"]

[og]
type = "website"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
