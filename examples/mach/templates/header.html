<!DOCTYPE html>
<html lang="en" data-base-url="{{ base_url }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-label="Search mach" hidden>
    <div class="search-modal-backdrop" data-search-close></div>
    <div class="search-modal-panel">
      <div class="search-modal-field">
        <span class="search-modal-prompt" aria-hidden="true">&#10095;</span>
        <input type="text" id="search-input" class="search-input" placeholder="search devlog, runners, pricing&hellip;" autocomplete="off" spellcheck="false" aria-label="Search" aria-controls="search-results" aria-expanded="false" role="combobox" aria-autocomplete="list">
        <kbd class="search-esc">Esc</kbd>
      </div>
      <ul id="search-results" class="search-results" role="listbox"></ul>
      <p class="search-empty" id="search-empty" hidden>No matching pages.</p>
    </div>
  </div>

  <div class="shell">
    <header class="topbar">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true">&#10095;_</span>
        <span class="brand-name">mach</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/devlog/">devlog</a>
        <a href="{{ base_url }}/runners/">runners</a>
        <a href="{{ base_url }}/pricing/">pricing</a>
        <a href="{{ base_url }}/about/">about</a>
      </nav>
      <div class="topbar-actions">
        <button type="button" id="search-trigger" class="search-trigger" aria-haspopup="dialog" aria-controls="search-modal">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="13.2" y1="13.2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>search</span>
          <kbd>&#8984;K</kbd>
        </button>
      </div>
    </header>

    <main id="main" class="site-main">
