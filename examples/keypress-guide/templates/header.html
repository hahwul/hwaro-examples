<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #000; }
        body { background-color: #f1f1f1; color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 60px 40px; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: lowercase; }
        .key { display: inline-block; padding: 5px 10px; border: 1px solid #000; border-radius: 4px; box-shadow: 0 4px 0 #000; font-size: 0.7rem; font-weight: 700; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">keypress.guide</div></header>
