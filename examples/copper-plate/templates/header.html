<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2b1d1d;
            --text: #e0d0d0;
            --accent: #b87333;
            --copper: #4a2b2b;
            --shadow: rgba(0,0,0,0.5);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .copper-plate {
            background: var(--copper);
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow), inset -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 4px solid #5a3a3a;
            border-radius: 4px;
            position: relative;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; border-bottom: 2px solid #5a3a3a; padding-bottom: 10px; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">copper.plate</div>
            <nav>
                <a href="/">Etch</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
