{% include "header.html" %}
<div class="hero-section glass-panel animate-fade-in">
  <h1 class="hero-title">{{ page.title | default(site.title) }}</h1>
  <p class="hero-subtitle">{{ page.description | default(site.description) }}</p>
  {% if page.extra is defined and page.extra.action_link %}
    <a href="{{ page.extra.action_link }}" class="btn-primary">{{ page.extra.action_text | default("Explore") }}</a>
  {% endif %}
</div>

<div class="content-section glass-panel animate-slide-up">
  {{ content | safe }}
</div>
{% include "footer.html" %}
