      </main>

      <footer class="term-statusbar">
        <span class="sb-path">~{% if page.url != "/" %}{{ page.url }}{% endif %}</span>
        <span class="sb-sep" aria-hidden="true">&middot;</span>
        <span class="sb-info">beryl 2.4.0 &middot; aws + gcp + azure</span>
        <span class="sb-sep" aria-hidden="true">&middot;</span>
        <span class="sb-info">built with Hwaro</span>
      </footer>
    </div>
  </div>

  <div id="search-overlay" class="search-overlay" hidden>
    <div class="search-panel" role="dialog" aria-modal="true" aria-label="Search beryl docs">
      <div class="search-field">
        <span class="search-prompt" aria-hidden="true">/</span>
        <label for="search-input" class="sr-only">Search commands and pages</label>
        <input id="search-input" type="search" placeholder="search commands&hellip;" autocomplete="off" autocapitalize="off" spellcheck="false" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}">
        <kbd>esc</kbd>
      </div>
      <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
      <ul id="search-results" class="search-results"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js" data-base-url="{{ base_url }}"></script>
  {{ highlight_js | safe }}
  {{ auto_includes_js | safe }}
</body>
</html>
