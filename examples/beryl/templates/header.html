<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0f120a">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &mdash; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="term">
    <div class="term-titlebar" aria-hidden="true">
      <span class="term-lights"><span></span><span></span><span></span></span>
      <span class="term-titletext">beryl &mdash; ops session</span>
      <span class="term-dims">80&times;24</span>
    </div>

    <div class="term-shell">
      <header class="term-header">
        <a class="term-brand" href="{{ base_url }}/">
          <span class="term-caret" aria-hidden="true">&gt;</span>beryl<span class="term-brand-cursor" aria-hidden="true">_</span>
        </a>
        <nav class="term-topnav" aria-label="Primary">
          <a href="{{ base_url }}/commands/"{% if page.section == "commands" %} aria-current="page"{% endif %}>commands</a>
          <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>about</a>
        </nav>
        <button type="button" id="search-trigger" class="search-trigger" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg aria-hidden="true" viewBox="0 0 20 20" width="15" height="15"><circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.6"></circle><line x1="13.2" y1="13.2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line></svg>
          <span>search</span>
          <kbd>/</kbd>
        </button>
      </header>

      <main id="main" class="term-main">
