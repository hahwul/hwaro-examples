<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Hive background - dark chitin -->
  <rect width="32" height="32" rx="3" fill="#0b0a09"/>
  
  <!-- Subtle honeycomb facets -->
  <g fill="none" stroke="#1a1511" stroke-width="0.6" opacity="0.6">
    <path d="M8 6 L12 8 L12 12 L8 14 L4 12 L4 8 Z"/>
    <path d="M20 6 L24 8 L24 12 L20 14 L16 12 L16 8 Z"/>
    <path d="M14 14 L18 16 L18 20 L14 22 L10 20 L10 16 Z"/>
    <path d="M8 18 L12 20 L12 24 L8 26 L4 24 L4 20 Z"/>
    <path d="M20 18 L24 20 L24 24 L20 26 L16 24 L16 20 Z"/>
  </g>
  
  <!-- Queen body - elongated thorax/abdomen, chitin black with amber ridge -->
  <ellipse cx="16" cy="17" rx="5.5" ry="7" fill="#11100e" stroke="#3a2118" stroke-width="1.2"/>
  <!-- Iridescent carapace highlight -->
  <ellipse cx="15.5" cy="15" rx="3" ry="4" fill="none" stroke="#2a4a3a" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Segmented abdomen rings -->
  <ellipse cx="16" cy="19" rx="4.8" ry="1.2" fill="none" stroke="#3a2118" stroke-width="0.7" opacity="0.9"/>
  <ellipse cx="16" cy="22" rx="4.2" ry="1.1" fill="none" stroke="#3a2118" stroke-width="0.7" opacity="0.9"/>
  
  <!-- Thorax -->
  <ellipse cx="16" cy="11" rx="4" ry="3.2" fill="#0f0e0d" stroke="#2f2118" stroke-width="0.8"/>
  
  <!-- Queen head - small, crowned -->
  <ellipse cx="16" cy="7.5" rx="2.8" ry="2.4" fill="#0c0b0a" stroke="#3a2118" stroke-width="0.9"/>
  
  <!-- Compound eyes - many-faceted horror -->
  <ellipse cx="14.3" cy="7.2" rx="0.9" ry="1.1" fill="#b38a3a"/>
  <ellipse cx="17.7" cy="7.2" rx="0.9" ry="1.1" fill="#b38a3a"/>
  <!-- Eye facets -->
  <ellipse cx="14.3" cy="7.2" rx="0.4" ry="0.5" fill="#0b0a09" opacity="0.6"/>
  <ellipse cx="17.7" cy="7.2" rx="0.4" ry="0.5" fill="#0b0a09" opacity="0.6"/>
  
  <!-- Mandibles / mouth horror -->
  <path d="M14.8 9.2 Q16 9.8 17.2 9.2" fill="none" stroke="#5c3526" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Crown / royal antennae - many thin legs reaching up -->
  <g stroke="#d4af5a" stroke-width="0.7" stroke-linecap="round" opacity="0.95">
    <!-- Central antennae -->
    <path d="M16 5.3 L16 2.4"/>
    <path d="M15.2 5.1 L14.4 2.1"/>
    <path d="M16.8 5.1 L17.6 2.1"/>
    <!-- Side feelers -->
    <path d="M14 5.8 L12.2 3.6"/>
    <path d="M18 5.8 L19.8 3.6"/>
    <!-- Tiny leg-like protrusions on crown -->
    <path d="M13.5 5.5 L12.8 4.2"/>
    <path d="M18.5 5.5 L19.2 4.2"/>
  </g>
  
  <!-- Many legs - the horror of too many limbs, radiating -->
  <g stroke="#3a2118" stroke-width="0.85" stroke-linecap="round" fill="none" opacity="0.95">
    <!-- Left side legs (4 pairs for queenly horror) -->
    <path d="M11.8 10 Q7.5 8 5.5 10.5"/>
    <path d="M11.5 12.5 Q6 13 5 15"/>
    <path d="M11.8 15.5 Q7 18 6 21"/>
    <path d="M12.2 18.5 Q8.5 22 7.5 25"/>
    
    <!-- Right side legs -->
    <path d="M20.2 10 Q24.5 8 26.5 10.5"/>
    <path d="M20.5 12.5 Q26 13 27 15"/>
    <path d="M20.2 15.5 Q25 18 26 21"/>
    <path d="M19.8 18.5 Q23.5 22 24.5 25"/>
  </g>
  
  <!-- Tiny moving specks / swarm mites on the icon itself -->
  <g fill="#8c6f2e" opacity="0.8">
    <circle cx="9" cy="14" r="0.5"/>
    <circle cx="23" cy="13.5" r="0.4"/>
    <circle cx="10.5" cy="22" r="0.45"/>
    <circle cx="21" cy="23" r="0.35"/>
    <circle cx="15" cy="26" r="0.4"/>
  </g>
  
  <!-- Queen face suggestion - subtle mandala horror inside head -->
  <circle cx="16" cy="7.5" r="1.1" fill="none" stroke="#d4af5a" stroke-width="0.3" opacity="0.4"/>
</svg>
