{% include "header.html" %}

<main class="container">
  <h1>{{ taxonomy.name | title }}</h1>
  <ul class="taxonomy-list">
    {% for term in terms %}
    <li>
      <a href="{{ base_url }}/{{ taxonomy.name }}/{{ term.name }}/">
        {{ term.name }} <span class="term-count">({{ term.pages | length }})</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>

{% include "footer.html" %}
