{% include "header.html" %}

<main class="container">
  <h1>Posts tagged "{{ term.name }}"</h1>

  {% for post in term.pages %}
  <article class="post-card">
    <h2><a href="{{ base_url }}/{{ post.path }}">{{ post.title }}</a></h2>
    <div class="post-meta">
      <span>{{ post.date }}</span>
    </div>
    {% if post.summary %}
    <p class="post-excerpt">{{ post.summary }}</p>
    {% endif %}
  </article>
  {% endfor %}
</main>

{% include "footer.html" %}
