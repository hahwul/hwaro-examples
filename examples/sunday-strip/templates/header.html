<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #333;
            --accent: #555;
            --paper: #fff;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #f4ece4;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: lowercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .strip-surface {
            background: #fff;
            padding: 40px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border: 1px solid #eee;
            display: flex;
            gap: 20px;
        }
        .strip-panel {
            flex: 1;
            padding: 20px;
            border-right: 1px solid #eee;
        }
        .strip-panel:last-child { border-right: none; }
        h2 { font-family: 'Fraunces', serif; font-size: 1.5rem; color: #444; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; font-style: italic; }
        article { font-size: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">sunday.strip</div>
            <nav>
                <a href="/">Comic</a>
                <a href="/about">Weekly</a>
            </nav>
        </div>
    </header>
