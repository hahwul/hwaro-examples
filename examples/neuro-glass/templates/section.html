{% include "header.html" %}
<div class="neuro-glass-card">
    <h1 class="neuro-title">{{ page.title }}</h1>
    <div class="post-content">
        {{ content | safe }}
    </div>
</div>
<div class="post-list">
    {% for p in pages %}
    <article class="neuro-glass-card">
        <h2><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        <div class="post-meta">
            {% if p.date %}<span>{{ p.date }}</span>{% endif %}
        </div>
        {% if p.description %}
        <p>{{ p.description | e }}</p>
        {% endif %}
    </article>
    {% endfor %}
</div>
{% include "footer.html" %}
