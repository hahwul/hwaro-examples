{% include "header.html" %}
<article class="neuro-glass-card">
    <h1 class="neuro-title">{{ page.title }}</h1>
    <div class="post-meta">
        {% if page.date %}<span>Published: {{ page.date }}</span>{% endif %}
        {% if page.taxonomies.tags %}
        <span> | Tags:
            {% for tag in page.taxonomies.tags %}
            <a href="{{ base_url }}/tags/{{ tag }}/">#{{ tag }}</a>
            {% endfor %}
        </span>
        {% endif %}
    </div>
    <div class="post-content">
        {{ content | safe }}
    </div>
</article>
{% include "footer.html" %}
