{% include "header.html" %}
<main class="site-main">
  <h1>All {{ taxonomy | capitalize }}</h1>
  <ul class="item-list">
    {% for term in terms %}
      <li><a href="{{ base_url }}/{{ taxonomy }}/{{ term | urlencode }}/">{{ term | e }}</a></li>
    {% endfor %}
  </ul>
</main>
