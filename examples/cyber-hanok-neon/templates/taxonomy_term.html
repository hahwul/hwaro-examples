{% include "header.html" %}
<main class="site-main">
  <h1>{{ term | e }}</h1>
  <div class="grid">
    {% for page in pages %}
      <div class="card">
        <h3 class="card-title"><a href="{{ base_url }}{{ page.url }}">{{ page.title | e }}</a></h3>
        <p>{% if page.description is defined %}{{ page.description | e }}{% endif %}</p>
      </div>
    {% endfor %}
  </div>
</main>
{% include "footer.html" %}
