<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #ff0066;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border: #333333;
      --bg: #0a0a0a;
      --bg-subtle: #1a1a1a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 10px rgba(255, 0, 102, 0.5); }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px rgba(255, 0, 102, 0.5); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }
    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 0.5em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    h1 { font-size: 2.5rem; margin-top: 0; color: var(--primary); text-shadow: 0 0 15px rgba(255, 0, 102, 0.3); }
    p { margin: 1.2em 0; font-size: 1.1rem; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-shadow: 0 0 8px rgba(255, 0, 102, 0.5); }
    .canvas-container { margin: 3rem 0; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 0, 102, 0.2); border: 1px solid rgba(255, 0, 102, 0.3); background: #000; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
