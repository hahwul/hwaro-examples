<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Fira+Mono&family=Rubik:wght@500&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --phosphor-green: #00FF00;
      --dim-green: #004400;
      --black: #000000;
      --gray: #222222;
      --light-gray: #AAAAAA;
      --text: #FFFFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--text);
      font-family: 'Rubik', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0;
      border-bottom: 1px solid var(--dim-green);
    }

    .site-title {
      font-family: 'Major Mono Display', monospace;
      font-size: 80px;
      color: var(--phosphor-green);
      margin: 0;
      text-transform: lowercase;
    }

    nav {
      margin-top: 2rem;
      font-family: 'Fira Mono', monospace;
    }

    nav a {
      color: var(--light-gray);
      text-decoration: none;
      margin-right: 2rem;
      text-transform: uppercase;
    }

    nav a:hover {
      color: var(--phosphor-green);
    }

    main {
      padding: 4rem 0;
    }

    .technical-panel {
      border: 1px solid var(--dim-green);
      padding: 2rem;
      background-color: var(--gray);
      margin-bottom: 4rem;
      position: relative;
    }

    .panel-header {
      position: absolute;
      top: -10px;
      left: 20px;
      background-color: var(--black);
      padding: 0 10px;
      font-family: 'Fira Mono', monospace;
      font-size: 12px;
      color: var(--phosphor-green);
      text-transform: uppercase;
    }

    h1, h2, h3 {
      font-family: 'Major Mono Display', monospace;
      color: var(--phosphor-green);
    }

    .fader-grid {
      display: flex;
      gap: 2rem;
      margin: 2rem 0;
      height: 200px;
      align-items: flex-end;
      padding: 0 1rem;
      border-left: 1px solid var(--dim-green);
      border-bottom: 1px solid var(--dim-green);
    }

    .fader-track {
      width: 4px;
      height: 100%;
      background-color: var(--dim-green);
      position: relative;
      flex: 1;
    }

    .fader-knob {
      width: 24px;
      height: 40px;
      background-color: var(--phosphor-green);
      position: absolute;
      left: -10px;
      bottom: 50%;
    }

    .equipment-list {
      font-family: 'Fira Mono', monospace;
      color: var(--phosphor-green);
      font-size: 16px;
      list-style: none;
      padding: 0;
    }

    .equipment-list li::before {
      content: "> ";
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Fira Mono', monospace;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .data-table td, .data-table th {
      padding: 0.5rem;
      border: 1px solid var(--dim-green);
      text-align: left;
    }

    .data-table th {
      color: var(--phosphor-green);
      text-transform: uppercase;
    }

    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 60px;
      margin: 1rem 0;
    }

    .eq-bar {
      flex: 1;
      background-color: var(--dim-green);
    }

    .eq-bar.active {
      background-color: var(--phosphor-green);
    }

    footer {
      padding: 4rem 0;
      text-align: center;
      font-family: 'Fira Mono', monospace;
      font-size: 12px;
      color: var(--dim-green);
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .site-title { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Input List</a>
        <a href="{{ base_url }}/about/">Signal Path</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>SYSTEM STATUS: READY // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
</body>
</html>
