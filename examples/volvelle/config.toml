# =============================================================================
# Volvelle -- Rotating Wheel Publication
# Issue #1530 | Tags: book, light, interactive, medieval, layered
# =============================================================================

title = "Volvelle -- The Rotating Wheel"
description = "A publication exploring the volvelle: the rotating paper disc instrument found in medieval manuscripts for astronomical calculation and data display."
base_url = "http://localhost:3000"

sections = ["chapters"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]

[pagination]
enabled = false

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true
rules = [
  { user_agent = "*", disallow = [] }
]

[llms]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["chapters"]

[markdown]
safe = false
lazy_loading = true
emoji = false
