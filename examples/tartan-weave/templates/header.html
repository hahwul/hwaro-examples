<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

    <div class="tartan-band tartan-band--header" role="presentation" aria-hidden="true"></div>
    <div class="wrapper site-header__inner">
      <a href="{{ base_url }}/" class="site-brand">
        <span class="site-brand__name">{{ site.title }}</span>
        <span class="site-brand__sett">est. by the loom &bull; sett &amp; selvage</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/search/">Search</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
    <div class="tartan-rule" role="presentation" aria-hidden="true"></div>
