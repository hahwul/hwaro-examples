<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #d9d9d9;
            --text: #4a4a4a;
            --accent: #888;
            --metal: #c0c0c0;
            --shadow: rgba(0,0,0,0.2);
            --highlight: rgba(255,255,255,0.5);
        }
        body {
            background-color: #f0f0f0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .cabinet-surface {
            background: var(--metal);
            border-radius: 4px;
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow), -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 2px solid #aaa;
        }
        .drawer-handle {
            width: 100px;
            height: 10px;
            background: #888;
            margin: 0 auto 40px;
            border-radius: 5px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }
        article {
            background: #fff;
            padding: 60px;
            box-shadow: inset 5px 5px 15px var(--shadow);
        }
        h2 { font-weight: 700; font-size: 2rem; color: #666; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .data-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">filing.cabinet</div>
            <nav>
                <a href="/">Archive</a>
                <a href="/about">System</a>
            </nav>
        </div>
    </header>
