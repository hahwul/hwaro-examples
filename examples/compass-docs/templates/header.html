<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            compass: { green: '#16a34a', bg: '#ffffff', surface: '#f3f4f6', border: '#e5e7eb', text: '#1f2937', muted: '#6b7280', light: '#dcfce7' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-compass-bg text-compass-text font-sans; }
    .prose { @apply max-w-none text-compass-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-compass-text; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-compass-text border-b border-compass-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-compass-text; }
    .prose p { @apply my-3 leading-relaxed; }
    .prose a { @apply text-compass-green hover:underline; }
    .prose strong { @apply font-semibold; }
    .prose code { @apply bg-compass-surface px-1.5 py-0.5 rounded text-sm font-mono border border-compass-border; }
    .prose pre { @apply bg-gray-900 text-gray-100 p-4 rounded my-4 overflow-x-auto text-sm; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-gray-100; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5; }
    .prose ul li { @apply list-disc marker:text-compass-green; }
    .prose ol li { @apply list-decimal marker:text-compass-green; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-compass-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold border border-compass-border; }
    .prose td { @apply px-4 py-2 border border-compass-border; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-compass-border bg-compass-bg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-bold text-compass-text hover:text-compass-green transition-colors flex items-center gap-2">
        <svg class="w-5 h-5 text-compass-green" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/quickstart/" class="text-compass-muted hover:text-compass-text transition-colors">Quick Start</a>
        <a href="{{ base_url }}/guide/" class="text-compass-muted hover:text-compass-text transition-colors">Full Guide</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
