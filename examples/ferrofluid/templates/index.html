{% extends "base.html" %}

{% block content %}
<main class="main-container">
    <section class="hero-section">
        <div class="hero-text">
            <h1 class="hero-title">FERRO<br>FLUID</h1>
            <p class="hero-subtitle">Magnetic Fluid Dynamics</p>
        </div>

        <div class="ferrofluid-canvas">
            <div class="fluid-blob drop" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
            <div class="fluid-blob drop" style="top: 60%; left: 20%; animation-delay: -2s;"></div>
            <div class="fluid-blob drop" style="top: 70%; left: 60%; animation-delay: -4s;"></div>
            <div class="fluid-blob drop" style="top: 30%; left: 70%; animation-delay: -6s;"></div>
            <div class="fluid-blob center-mass"></div>
        </div>

        <div class="spikes-wrapper">
            <div class="magnetic-spike" style="animation-delay: 0.1s; border-bottom-width: 80px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.5s; border-bottom-width: 120px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.2s; border-bottom-width: 60px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.7s; border-bottom-width: 150px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.3s; border-bottom-width: 90px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.6s; border-bottom-width: 110px;"></div>
            <div class="magnetic-spike" style="animation-delay: 0.4s; border-bottom-width: 70px;"></div>
        </div>
    </section>

    <section class="details-section">
        <div class="content-grid">
            <div class="content-block">
                {{ content | safe }}
            </div>
            <div class="content-block">
                <strong>01. DYNAMICS</strong>
                <p>Liquid that becomes strongly magnetized in the presence of a magnetic field. Visible spikes represent the alignment with magnetic field lines.</p>
            </div>
        </div>
    </section>
</main>
{% endblock %}
