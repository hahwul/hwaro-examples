{% include "header.html" %}
  <main class="site-main">
    <article>
      <header class="article-header">
        <h1 class="article-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="article-meta">
          {{ page.date }}{% if page.reading_time %} / {{ page.reading_time }} min read{% endif %}
        </div>
        {% endif %}
      </header>
      <div class="article-body">
        {{ content | safe }}
      </div>
      {% if page.tags %}
      <div class="project-card-tags" style="margin-top: 2rem;">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </div>
      {% endif %}
    </article>
  </main>
{% include "footer.html" %}
