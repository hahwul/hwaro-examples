{% include "header.html" %}
  <main id="main">
    <section class="lost">
      <svg class="lost-mark" viewBox="0 0 32 32" width="40" height="40" aria-hidden="true" focusable="false">
        <rect x="5" y="8" width="20" height="16" rx="2.4" transform="rotate(-10 15 16)" fill="none" stroke="var(--muted)" stroke-width="1.6"/>
        <rect x="9" y="12" width="20" height="16" rx="2.4" transform="rotate(6 19 20)" fill="none" stroke="var(--accent)" stroke-width="1.6"/>
      </svg>
      <p class="kicker kicker--center">
        <svg class="kicker-tab" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true" focusable="false">
          <rect x="3" y="4" width="14" height="12" rx="2" transform="rotate(-8 10 10)" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Misfiled
      </p>
      <h1>This note slid off the stack</h1>
      <p class="lost-note">Nothing lives at this address. Momentum doesn't use folders, so there's nowhere for a page to be lost inside — this one just never existed.</p>
      <p class="lost-link"><a class="btn" href="{{ base_url }}/">Return home</a></p>
    </section>
  </main>
