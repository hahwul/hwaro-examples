<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/">
      <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
        <rect x="5" y="8" width="20" height="16" rx="2.4" transform="rotate(-6 15 16)" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
        <rect x="8" y="11" width="20" height="16" rx="2.4" fill="var(--accent)"/>
        <path d="M12 17h12M12 21h8" stroke="var(--accent-fg)" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="brand-word">Momentum</span>
    </a>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ base_url }}/features/">Features</a>
      <a href="{{ base_url }}/sync/">Sync</a>
      <a href="{{ base_url }}/pricing/">Pricing</a>
      <a href="{{ base_url }}/manifesto/">Manifesto</a>
      <a class="nav-cta" href="{{ base_url }}/download/">Download</a>
    </nav>
  </header>
