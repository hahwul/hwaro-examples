<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #ff4500;
            --zine: #f0f0f0;
            --shadow: rgba(0,0,0,0.2);
        }
        body {
            background-color: var(--zine);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -2px;
            color: #000;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .zine-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 0 #000;
            margin-bottom: 80px;
            border: 4px solid #000;
            position: relative;
        }
        h2 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; color: #000; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; text-transform: uppercase; }
        article { margin-top: 40px; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">culture.zine</div>
            <nav>
                <a href="/">Issue</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
