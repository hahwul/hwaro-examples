<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Montserrat:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="watch-mechanism-bg">
        <div class="gear gear-1"></div>
        <div class="gear gear-2"></div>
        <div class="gear gear-3"></div>
        <div class="gear gear-4"></div>
    </div>

    <div class="case-container">
        <header class="site-header">
            <div class="brand">
                <a href="{{ base_url }}/">
                    <span class="logo-mark"></span>
                    <span class="site-title">{{ site.title }}</span>
                </a>
            </div>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Collection</a>
                <a href="{{ base_url }}/about">Heritage</a>
                <a href="{{ base_url }}/journal">Journal</a>
            </nav>
        </header>

        <main class="content-area">
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; 2024 {{ site.title }}. Precision Crafted.</p>
            <div class="hallmarks">
                <span class="hallmark">PT950</span>
                <span class="hallmark">GENEVE</span>
            </div>
        </footer>
    </div>
</body>
</html>
