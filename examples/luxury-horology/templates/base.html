<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <div class="case-bg" aria-hidden="true">
    <svg class="gear-a" width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#c9a961" stroke-width="1">
      <circle cx="320" cy="320" r="300"/>
      <circle cx="320" cy="320" r="240"/>
      <circle cx="320" cy="320" r="180" stroke-dasharray="4 6"/>
      <circle cx="320" cy="320" r="120"/>
      <circle cx="320" cy="320" r="60" stroke-dasharray="2 4"/>
      <g>
        <line x1="320" y1="20" x2="320" y2="50"/>
        <line x1="320" y1="590" x2="320" y2="620"/>
        <line x1="20" y1="320" x2="50" y2="320"/>
        <line x1="590" y1="320" x2="620" y2="320"/>
      </g>
    </svg>
    <svg class="gear-b" width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#c9a961" stroke-width="1">
      <circle cx="360" cy="360" r="340"/>
      <circle cx="360" cy="360" r="280" stroke-dasharray="6 8"/>
      <circle cx="360" cy="360" r="220"/>
      <circle cx="360" cy="360" r="160" stroke-dasharray="2 6"/>
      <circle cx="360" cy="360" r="100"/>
      <circle cx="360" cy="360" r="40"/>
    </svg>
  </div>

  <div class="case-container">
    <header class="site-header">
      <div class="brand">
        <a href="{{ base_url }}/">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="22" cy="22" r="21" stroke="#c9a961" stroke-width="1"/>
            <circle cx="22" cy="22" r="17" stroke="#c9a961" stroke-width="0.5" stroke-dasharray="1 3"/>
            <line x1="22" y1="6" x2="22" y2="11" stroke="#c9a961" stroke-width="1"/>
            <line x1="22" y1="33" x2="22" y2="38" stroke="#c9a961" stroke-width="1"/>
            <line x1="6" y1="22" x2="11" y2="22" stroke="#c9a961" stroke-width="1"/>
            <line x1="33" y1="22" x2="38" y2="22" stroke="#c9a961" stroke-width="1"/>
            <line x1="22" y1="22" x2="22" y2="14" stroke="#e6c98c" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="22" y1="22" x2="28" y2="22" stroke="#e6c98c" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="22" cy="22" r="1.5" fill="#c9a961"/>
          </svg>
          <span class="site-title">
            {{ site.title }}
            <small>Manufacture &mdash; Geneve</small>
          </span>
        </a>
      </div>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Collection</a>
        <a href="{{ base_url }}/about/">Heritage</a>
        <a href="{{ base_url }}/journal/">Journal</a>
        <a href="{{ base_url }}/atelier/">Atelier</a>
      </nav>
      <div class="header-aside">
        <span>Est. MCMXLVII</span>
      </div>
    </header>

    <main class="content-area">
      {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
      <p>&copy; 2024 {{ site.title }} &mdash; Precision Crafted</p>
      <div class="hallmarks">
        <span class="hallmark">PT950</span>
        <span class="hallmark">GENEVE</span>
        <span class="hallmark">CHRONOMETER</span>
      </div>
    </footer>
  </div>
</body>
</html>
