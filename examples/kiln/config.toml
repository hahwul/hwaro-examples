# =============================================================================
# Site Configuration
# =============================================================================

title = "*kiln"
description = "a ceramics and pottery showcase"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 10

[[taxonomies]]
name = "tags"

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
