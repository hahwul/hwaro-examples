<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  {{ og_all_tags }}

  <!-- Google Fonts: Inter and Lora -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            clay: {
              50: '#fcfaf9',
              100: '#f6f1ec',
              200: '#efe6dd',
              300: '#e3d2c5',
              400: '#d1b19e', // Terracotta light
              500: '#be8c73', // Terracotta base
              600: '#b17458', // Terracotta darker
              700: '#945c43',
              800: '#7a4d3a',
              900: '#634031',
              950: '#352018',
            },
            earth: {
              50: '#f9faf9',
              100: '#eff2ee',
              200: '#dde5da',
              300: '#c1cfbd',
              400: '#9fb199',
              500: '#81957a', // Earthy green
              600: '#64765d',
              700: '#505d4b',
              800: '#414b3d',
              900: '#363e33',
              950: '#1d221c',
            },
            stone: {
              50: '#fafafa',
              100: '#f5f5f4',
              200: '#e7e5e4',
              300: '#d6d3d1',
              400: '#a8a29e',
              500: '#78716c',
              600: '#57534e',
              700: '#44403c',
              800: '#292524',
              900: '#1c1917',
              950: '#0c0a09',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>

  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-clay-50 text-stone-800 font-sans antialiased selection:bg-clay-200 selection:text-stone-900;
      }
    }

    /* Prose: markdown rendered content */
    .prose h1, .prose h2, .prose h3 { @apply text-stone-900 font-serif font-medium leading-tight tracking-tight; }
    .prose h1 { @apply text-4xl mt-0 mb-6; }
    .prose h2 { @apply text-2xl mt-10 mb-4 border-b border-clay-200 pb-2; }
    .prose h3 { @apply text-xl mt-8 mb-3; }
    .prose p { @apply mb-6 leading-relaxed text-stone-700; }
    .prose a { @apply text-clay-700 hover:text-clay-900 transition-colors duration-200 underline decoration-clay-300 underline-offset-4 hover:decoration-clay-500; }
    .prose code { @apply text-[0.9em] bg-stone-100 text-stone-800 px-1.5 py-0.5 rounded border border-stone-200 font-mono; }
    .prose pre { @apply bg-stone-50 border border-stone-200 text-stone-800 px-5 py-4 overflow-x-auto my-6 rounded-md shadow-sm; }
    .prose pre code { @apply bg-transparent p-0 text-inherit border-none; }
    .prose blockquote { @apply border-l-4 border-l-clay-400 bg-clay-100/50 py-3 px-5 my-6 text-stone-700 italic rounded-r-md; }
    .prose ul, .prose ol { @apply mb-6 ml-6 space-y-2 text-stone-700; }
    .prose li::marker { @apply text-clay-500; }
    .prose img { @apply max-w-full rounded shadow-sm border border-stone-200 my-8; }

    /* Custom utility classes */
    .gallery-grid {
      @apply grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4;
    }

    .gallery-item {
      @apply aspect-square overflow-hidden rounded-md border border-stone-200 bg-stone-100 flex items-center justify-center;
    }

    .gallery-item img {
      @apply w-full h-full object-cover transition-transform duration-500 hover:scale-105;
    }

    .meta-tag {
      @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-clay-100 text-clay-800 border border-clay-200;
    }

    .process-step {
      @apply relative pl-8 pb-8 border-l border-clay-300;
    }
    .process-step:last-child { @apply pb-2 border-l-transparent; }
    .process-step::before {
      content: "";
      @apply absolute -left-[5px] top-1.5 w-2.5 h-2.5 rounded-full bg-clay-500 border-2 border-clay-50;
    }
  </style>

  {{ auto_includes_css }}
</head>
<body class="font-sans leading-relaxed min-h-screen flex flex-col">
  <header class="border-b border-clay-200 bg-clay-50/90 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="{{ base_url }}/" class="text-2xl font-serif font-medium text-stone-900 tracking-tight no-underline hover:text-clay-700 transition-colors flex items-center gap-3">
        <span class="w-4 h-4 rounded-full bg-clay-500 inline-block"></span>
        {{ site.title }}
      </a>
      <nav class="flex gap-8">
        <a href="{{ base_url }}/works/" class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors no-underline relative">
          Works
        </a>
        <a href="{{ base_url }}/log/" class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors no-underline relative">
          Process Log
        </a>
        <a href="{{ base_url }}/about/" class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors no-underline relative">
          About
        </a>
      </nav>
    </div>
  </header>
