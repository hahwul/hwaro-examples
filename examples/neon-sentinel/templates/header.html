<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">{{ og_all_tags }}{{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Inter',system-ui,sans-serif;background:#00070a;color:#c3f7e8}
    .display{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.03em}
    .sentinel-bg{background:#00070a;background-image:linear-gradient(#22f5c2 1px,transparent 1px),linear-gradient(90deg,#22f5c2 1px,transparent 1px);background-size:42px 42px;opacity:.04}
    .neon-panel{background:#00120f;border:1px solid #0a3a32}
    .section-label{font-size:10px;letter-spacing:3.5px;color:#22f5c2;font-weight:700}
    .metric{font-size:42px;line-height:.85;font-weight:700;font-family:'Space Grotesk',sans-serif}
    .radar{position:relative;width:220px;height:220px;border:1px solid #22f5c2;border-radius:9999px}
    .radar::before{content:'';position:absolute;inset:0;border-radius:9999px;background:conic-gradient(transparent 0deg,#22f5c2 40deg,transparent 90deg);animation:spin 1.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body class="sentinel-bg">
