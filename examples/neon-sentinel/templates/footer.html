<script>function initSentinel(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/30);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},26)});console.log('%c[NEON SENTINEL] All threats neutralized. Watching forever.','color:#22f5c2')}addEventListener('load',initSentinel)</script></body></html>
