<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <title>{% if page.title != site.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {{ og_all_tags | safe }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <header class="wiki-header">
    <div class="wiki-header-inner">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">&#9776;</button>
      <a href="{{ base_url }}/" class="wiki-logo">{{ site.title }}</a>
      <div class="wiki-search">
        <input type="text" placeholder="Search documentation..." id="search-input" aria-label="Search">
      </div>
      <nav class="wiki-header-nav">
        <a href="{{ base_url }}/docs/getting-started/">Getting Started</a>
        <a href="{{ base_url }}/docs/guides/">Guides</a>
        <a href="{{ base_url }}/docs/reference/">Reference</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
