<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% if site.description %}<meta name="description" content="{{ site.description }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020108;
      --text-main: #f0f0f5;
      --text-muted: #a0a0b0;
      --accent-cyan: #00f0ff;
      --accent-magenta: #ff0055;
      --accent-purple: #8a2be2;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    a:hover {
      color: var(--text-main);
      text-shadow: 0 0 8px var(--accent-cyan);
    }

    p {
      margin-bottom: 1.5rem;
      color: var(--text-muted);
    }

    /* Vortex Background Animation */
    .vortex-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at center, #050212 0%, var(--bg-color) 100%);
    }

    .vortex-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      animation: rotate-orb 20s linear infinite;
      transform-origin: center;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: var(--accent-cyan);
      top: -20%;
      left: -10%;
      animation-duration: 25s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: var(--accent-magenta);
      bottom: -10%;
      right: -10%;
      animation-duration: 30s;
      animation-direction: reverse;
    }

    .orb-3 {
      width: 700px;
      height: 700px;
      background: var(--accent-purple);
      top: 20%;
      left: 40%;
      animation-duration: 35s;
    }

    @keyframes rotate-orb {
      0% {
        transform: rotate(0deg) translate(50px) rotate(0deg);
      }
      100% {
        transform: rotate(360deg) translate(50px) rotate(-360deg);
      }
    }

    /* Layout & Glassmorphism */
    .site-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      margin-bottom: 3rem;
      padding: 1.5rem 2rem;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, var(--accent-cyan), var(--text-main));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    main {
      flex: 1;
    }

    .content-container {
      padding: 3rem;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
    }

    .content-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: skewX(-20deg);
      animation: shine 8s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    footer {
      margin-top: 3rem;
      padding: 2rem;
      text-align: center;
      border-radius: 16px;
      font-size: 0.9rem;
    }

    /* Typography inside content */
    .content-container h1 {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--text-main), var(--accent-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content-container h2 {
      font-size: 2rem;
      margin-top: 2.5rem;
      color: var(--accent-cyan);
    }

    .content-container ul {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
      color: var(--text-muted);
    }

    .content-container li {
      margin-bottom: 0.5rem;
    }

    /* Page list styling */
    .page-list {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .page-card {
      padding: 1.5rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
    }

    .page-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .page-card h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    .page-card h3 a {
      color: var(--text-main);
    }

    .page-card p {
      font-size: 0.95rem;
      margin: 0;
    }

  </style>
</head>
<body>
  <div class="vortex-container">
    <div class="vortex-orb orb-1"></div>
    <div class="vortex-orb orb-2"></div>
    <div class="vortex-orb orb-3"></div>
  </div>
  <div class="site-wrapper">
    <header class="glass-panel">
      <div class="site-title"><a href="{{ base_url }}/" style="color: inherit; text-decoration: none;">{{ site.title }}</a></div>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
