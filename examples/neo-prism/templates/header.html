<!DOCTYPE html>
<html lang="{% if page_language %}{{ page_language }}{% else %}en{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg: #0d0d12;
      --bg-panel: #161620;
      --text: #e0e0f0;
      --text-muted: #8c8cba;
      --border: #2a2a40;

      --neon-cyan: #00f3ff;
      --neon-purple: #9d00ff;
      --neon-pink: #ff00ea;

      --gradient-prism: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
      --gradient-text: linear-gradient(to right, #ffffff, #a0a0ff);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(157, 0, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.08), transparent 25%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--gradient-prism);
      opacity: 0.5;
    }

    .site-logo {
      font-weight: 800;
      font-size: 1.5rem;
      text-decoration: none;
      background: var(--gradient-prism);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
    }

    .site-header nav a:hover {
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 { font-size: 1.8rem; color: #fff; }
    h3 { font-size: 1.3rem; color: #e0e0e0; }

    p { margin: 1.2em 0; }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: text-shadow 0.2s;
    }

    a:hover {
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
    }

    code {
      background: var(--bg-panel);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--neon-pink);
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg-panel);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }

    pre code {
      background: none;
      padding: 0;
      color: var(--text);
      border: none;
    }

    /* Components */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
    }

    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: var(--neon-purple);
      box-shadow: 0 5px 15px rgba(157, 0, 255, 0.1);
    }

    ul.section-list li a {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    nav.pagination {
      margin: 3rem 0;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--bg-panel);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }

    nav.pagination a:hover {
      color: var(--bg);
      background: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--neon-purple);
      background: rgba(157, 0, 255, 0.15);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 0 10px rgba(157, 0, 255, 0.2);
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.5;
      background: transparent;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
      }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{% if page.section %}{{ page.section }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
