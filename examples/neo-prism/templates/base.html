<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #ff007f;
      --secondary: #00f0ff;
      --bg: #0a0a0a;
      --text: #ffffff;
      --text-muted: #aaaaaa;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      filter: blur(120px);
      border-radius: 50%;
      opacity: 0.3;
      z-index: -1;
      top: -100px;
      left: -100px;
      animation: drift 10s infinite alternate ease-in-out;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }
    .site-wrapper {
      max-width: 800px;
      width: 100%;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      flex: 1;
    }
    h1, h2, h3 {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    a {
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    a:hover {
      color: var(--primary);
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 1rem;
    }
    .site-header a {
      color: var(--text);
    }
    .site-header a:hover {
      color: var(--primary);
    }
    .site-footer {
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    /* Pre / Code block styling */
    pre {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
    }
    code {
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }
    pre code {
      background: none;
      padding: 0;
    }

    /* Lists styling */
    ul.section-list { list-style: none; padding: 0; }
    ul.section-list li { margin-bottom: 0.75rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    ul.section-list li a { font-weight: bold; font-size: 1.1em; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: var(--text); text-decoration: none; background: rgba(0,0,0,0.2); }
    nav.pagination a:hover { border-color: var(--primary); background: rgba(255,0,127,0.1); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--primary); background: rgba(255,0,127,0.2); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); opacity: 0.5; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="blob"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo"><strong>{{ site.title }}</strong></a>
      <nav>
        <a href="{{ base_url }}/">Home</a> |
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      &copy; {{ site.title }}
    </footer>
  </div>
</body>
</html>
