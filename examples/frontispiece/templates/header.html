<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Work+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #eee;
            --accent: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .front-hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px solid var(--accent);
            margin: 40px;
            position: relative;
        }
        .front-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-style: italic;
            margin: 0;
            line-height: 1;
        }
        .decorative-corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid var(--accent);
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
        article { padding: 80px 0; }
        h2 { font-family: 'Playfair Display', serif; font-size: 3rem; text-align: center; margin-bottom: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">FRONTISPIECE.</div>
            <nav>
                <a href="/">Entrance</a>
                <a href="/about">Proem</a>
            </nav>
        </div>
    </header>
