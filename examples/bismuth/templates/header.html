<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --gold: #ffd700;
      --pink: #ff69b4;
      --blue: #00bfff;
      --green: #00fa9a;
      --bg: #050505;
      --card-bg: #0f0f0f;
      --text: #f0f0f0;
      --text-muted: #888;
      --font-main: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(to bottom, rgba(5,5,5,0.92), rgba(5,5,5,0.92)),
        repeating-conic-gradient(
          from 0deg at 50% 50%,
          var(--gold) 0deg 22.5deg,
          var(--pink) 22.5deg 45deg,
          var(--blue) 45deg 67.5deg,
          var(--green) 67.5deg 90deg
        );
      background-size: 80px 80px;
      background-attachment: fixed;
    }

    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header.site-header {
      padding: 3rem 0;
      text-align: center;
    }

    .site-logo {
      font-size: 2.5rem;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold);
      letter-spacing: 0.2rem;
      display: block;
      margin-bottom: 1rem;
      text-shadow:
        2px 2px 0 var(--pink),
        4px 4px 0 var(--blue),
        6px 6px 0 var(--green);
    }

    nav.site-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
    }

    nav.site-nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      padding: 0.5rem 1rem;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    nav.site-nav a:hover {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 3px 3px 0 var(--pink);
    }

    main.site-main {
      min-height: 60vh;
      padding-bottom: 4rem;
    }

    /* Hopper Frame Effect */
    .hopper-frame {
      background: var(--card-bg);
      border: 1px solid var(--gold);
      padding: 2.5rem;
      position: relative;
      margin: 3rem 0;
      box-shadow:
        5px 5px 0 -1px var(--bg), 5px 5px 0 0 var(--pink),
        10px 10px 0 -1px var(--bg), 10px 10px 0 0 var(--blue),
        15px 15px 0 -1px var(--bg), 15px 15px 0 0 var(--green);
    }

    h1, h2, h3 {
      color: var(--gold);
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    h1 { font-size: 2.2rem; border-left: 4px solid var(--gold); padding-left: 1rem; }
    h2 { font-size: 1.8rem; }

    p { margin: 1.2rem 0; }

    a { color: var(--blue); text-decoration: none; }
    a:hover { color: var(--pink); text-decoration: underline; }

    code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      font-size: 0.9rem;
      color: var(--green);
    }

    pre {
      background: #111;
      padding: 1.5rem;
      border: 1px solid #333;
      overflow-x: auto;
      border-left: 3px solid var(--gold);
    }

    .specimen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .specimen-card {
      background: var(--card-bg);
      border: 1px solid #333;
      padding: 1.5rem;
      transition: transform 0.3s ease, border-color 0.3s ease;
      position: relative;
    }

    .specimen-card:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
    }

    .specimen-card h3 {
      margin-top: 0;
      font-size: 1.4rem;
      color: var(--text);
    }

    .specimen-card .date {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    @media (max-width: 600px) {
      .site-logo { font-size: 1.8rem; }
      nav.site-nav { gap: 1rem; flex-wrap: wrap; }
      .hopper-frame { padding: 1.5rem; margin: 2rem 0; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/collection/">Collection</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
