<!DOCTYPE html>
<html lang="{{ site.language | default(value='en') }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <link rel="stylesheet" href="/style.css">

    {% if site.plugins is defined and site.plugins.highlight is defined and site.plugins.highlight.theme %}
        <style>{{ highlight_css(theme=site.plugins.highlight.theme) | safe }}</style>
    {% endif %}
</head>
<body>
    <header>
        <div class="container nav-container">
            <nav>
                <a href="/" class="logo">{{ site.title }}</a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/about/">About</a>
                </div>
            </nav>
        </div>
    </header>
    <main class="container">
