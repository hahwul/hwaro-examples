{% include "header.html" %}
  <main class="site-main">
    <div class="hero-section" style="margin-bottom: 3rem;">
      <h1 class="hero-title">Taxonomy: {{ taxonomy_name | e }}</h1>
      <p class="hero-subtitle">Browse all terms in the {{ taxonomy_name | e }} taxonomy</p>
    </div>

    <div class="post-wrapper">
      <div class="badge-container" style="gap: 1rem; padding: 1rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
            #{{ term.name }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
