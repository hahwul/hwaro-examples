{% include "header.html" %}

<article class="page-content">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <time class="page-date">{{ page.date | date("%B %d, %Y") }}</time>
    {% endif %}
  </header>
  <div class="prose">
    {{ content | safe }}
  </div>
  {% if page.tags %}
  <div class="page-tags">
    {% for tag in page.tags %}
    <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}
</article>

{% include "footer.html" %}
