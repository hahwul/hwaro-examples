<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fffcfd; --text: #4a4a4a; --accent: #ffb7c5; --pastel: #fff0f5; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px; }
        header { padding: 40px 0; text-align: center; border-bottom: 2px solid var(--pastel); }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        .post { background: #fff; padding: 30px; border-radius: 20px; border: 2px solid var(--pastel); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">social.pastel</div></header>
