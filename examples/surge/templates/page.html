{% include "header.html" %}

<article class="band band--roast-1 page">
  <div class="band__inner page__inner">
    <header class="page__head">
      {% if page.extra.kicker %}<p class="eyebrow">{{ page.extra.kicker | e }}</p>{% endif %}
      <h1 class="page__title">{{ page.title | e }}</h1>
      {% if page.description %}<p class="lede">{{ page.description | e }}</p>{% endif %}
    </header>
    <div class="prose">
      {{ content | safe }}
    </div>
    <p class="page__back"><a href="{{ base_url }}/">&larr; Back to the counter</a></p>
  </div>
</article>

{% include "footer.html" %}
