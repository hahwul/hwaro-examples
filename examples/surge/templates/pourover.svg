<svg class="pourover" viewBox="0 0 360 400" xmlns="http://www.w3.org/2000/svg" focusable="false">
  <defs>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7ece0"/>
      <stop offset="1" stop-color="#e9d6bd"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9601f"/>
      <stop offset="1" stop-color="#6e3b12"/>
    </linearGradient>
    <linearGradient id="brew" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a4a1c"/>
      <stop offset="1" stop-color="#5a2f10"/>
    </linearGradient>
  </defs>

  <!-- steam -->
  <g class="pourover__steam" fill="none" stroke="#c7a985" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <path d="M150 70 q14 -18 0 -36 q-14 -18 0 -36"/>
    <path d="M182 66 q14 -18 0 -36 q-14 -18 0 -36"/>
    <path d="M214 70 q14 -18 0 -36 q-14 -18 0 -36"/>
  </g>

  <!-- pour stream -->
  <rect x="176" y="96" width="7" height="60" rx="3.5" fill="#8a4a1c"/>

  <!-- dripper cone -->
  <path d="M92 150 h176 l-58 96 a10 10 0 0 1 -8.6 5 h-42.8 a10 10 0 0 1 -8.6 -5 Z" fill="url(#cone)" stroke="#2b2016" stroke-width="4" stroke-linejoin="round"/>
  <!-- rib lines -->
  <g stroke="#d8c3a4" stroke-width="3" stroke-linecap="round">
    <path d="M118 158 l38 82"/>
    <path d="M156 158 l14 84"/>
    <path d="M204 158 l-14 84"/>
    <path d="M242 158 l-38 82"/>
  </g>

  <!-- blooming coffee bed -->
  <path d="M104 156 h152 l-9 15 a112 112 0 0 1 -134 0 Z" fill="url(#bed)"/>
  <g class="pourover__bloom" fill="#c98a4a">
    <circle cx="150" cy="163" r="7"/>
    <circle cx="180" cy="167" r="9"/>
    <circle cx="210" cy="162" r="6"/>
    <circle cx="196" cy="160" r="4.5"/>
    <circle cx="164" cy="160" r="4.5"/>
  </g>

  <!-- drip -->
  <circle class="pourover__drop" cx="180" cy="268" r="5" fill="#5a2f10"/>

  <!-- carafe -->
  <path d="M120 300 h120 v56 a34 34 0 0 1 -34 34 h-52 a34 34 0 0 1 -34 -34 Z" fill="#faf3ea" stroke="#2b2016" stroke-width="4" stroke-linejoin="round"/>
  <path d="M240 314 h20 a16 16 0 0 1 0 32 h-20" fill="none" stroke="#2b2016" stroke-width="4"/>
  <!-- brewed coffee -->
  <path d="M132 348 h96 v6 a30 30 0 0 1 -30 30 h-36 a30 30 0 0 1 -30 -30 Z" fill="url(#brew)"/>
</svg>
