<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Surge home">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="30" height="30" focusable="false">
            <path d="M8 8h16l-3.6 9.6a2.4 2.4 0 0 1-2.25 1.55h-4.3a2.4 2.4 0 0 1-2.25-1.55L8 8Z" fill="currentColor"/>
            <path d="M12.5 22.5h7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand__word">Surge</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/how-it-works/">How it works</a>
        <a href="{{ base_url }}/roasts/">Roasts</a>
        <a href="{{ base_url }}/pricing/">Pricing</a>
        <a href="{{ base_url }}/gear/">Gear</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
  <main id="main" class="site-main">
