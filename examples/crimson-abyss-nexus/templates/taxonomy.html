{% extends "base.html" %}

{% block content %}
<div class="glass-panel content">
  {% if taxonomy is defined and taxonomy.name is defined %}
  <h1>{{ taxonomy.name | capitalize }}</h1>
  {% endif %}

  {% if terms is defined %}
  <div class="tags">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag">{{ term.name }}</a>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
