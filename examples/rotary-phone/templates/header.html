<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #ddd;
            --accent: #ff4500;
            --phone: #222;
            --shadow: rgba(0,0,0,0.8);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .phone-surface {
            background: var(--phone);
            border-radius: 20px;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow), -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 1px solid #333;
            text-align: center;
        }
        .rotary-dial {
            width: 300px;
            height: 300px;
            background: #111;
            border-radius: 50%;
            margin: 0 auto 40px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 5px 5px 15px rgba(255,255,255,0.05);
            border: 8px solid #333;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 40px;
            gap: 20px;
        }
        .dial-hole { width: 40px; height: 40px; background: #000; border-radius: 50%; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left; }
        article { text-align: left; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">rotary.phone</div>
            <nav>
                <a href="/">Call</a>
                <a href="/about">Line</a>
            </nav>
        </div>
    </header>
