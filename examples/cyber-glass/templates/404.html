{% extends "base.html" %}

{% block content %}
<article class="cyber-card not-found-card">
  <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:1.6rem">
    <rect x="2" y="2" width="116" height="116" stroke="#ff2bd6" stroke-width="1"/>
    <line x1="2" y1="2" x2="118" y2="118" stroke="#ff2bd6" stroke-width="1" opacity="0.4"/>
    <line x1="118" y1="2" x2="2" y2="118" stroke="#ff2bd6" stroke-width="1" opacity="0.4"/>
    <text x="60" y="74" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#ff2bd6" text-anchor="middle">404</text>
  </svg>
  <h1 class="neon-title error-title">Signal lost</h1>
  <p style="color: var(--text-dim); margin-bottom: 1.6rem">The page you are looking for does not exist or has been moved off-grid.</p>
  <p><a href="{{ base_url }}" class="cyber-button">&larr; Return to base</a></p>
</article>
{% endblock %}
