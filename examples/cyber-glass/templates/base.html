<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}css/style.css">
</head>
<body>
  <div class="cyber-background" aria-hidden="true">
    <svg class="blob-a" width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="210" cy="210" r="160" stroke="#00f0ff" stroke-width="1" opacity="0.35"/>
      <circle cx="210" cy="210" r="120" stroke="#00f0ff" stroke-width="1" opacity="0.25"/>
      <circle cx="210" cy="210" r="80" stroke="#00f0ff" stroke-width="1" opacity="0.18"/>
      <circle cx="210" cy="210" r="40" stroke="#00f0ff" stroke-width="1" opacity="0.12"/>
    </svg>
    <svg class="blob-b" width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="180,10 350,180 180,350 10,180" stroke="#ff2bd6" stroke-width="1" fill="none" opacity="0.3"/>
      <polygon points="180,60 300,180 180,300 60,180" stroke="#ff2bd6" stroke-width="1" fill="none" opacity="0.2"/>
      <polygon points="180,110 250,180 180,250 110,180" stroke="#ff2bd6" stroke-width="1" fill="none" opacity="0.15"/>
    </svg>
  </div>

  <header class="cyber-header">
    <div class="header-inner">
      <a href="{{ base_url }}" class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" stroke="#00f0ff" stroke-width="1.5"/>
          <rect x="6" y="6" width="12" height="12" stroke="#ff2bd6" stroke-width="1.5"/>
          <rect x="10" y="10" width="4" height="4" fill="#00f0ff"/>
        </svg>
        <span>{{ site.title }}</span>
      </a>
      <nav>
        <a href="{{ base_url }}posts/">Posts</a>
        <a href="{{ base_url }}archives/">Archives</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
      <div class="header-right">
        <button class="search-trigger" onclick="openSearch()" title="Search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
          <kbd>&#8984;K</kbd>
        </button>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search posts..." autocomplete="off">
        <kbd onclick="closeSearch()">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <main class="cyber-container">
    {% block content %}{% endblock %}
  </main>

  <footer class="cyber-footer">
    <div class="footer-inner">
      <span>&copy; {{ site.title }} &mdash; signal/noise ratio: maximum.</span>
      <span>Built with <a href="https://github.com/hahwul/hwaro">Hwaro</a></span>
    </div>
  </footer>

  <script src="{{ base_url }}js/search.js"></script>
</body>
</html>
