{% extends "base.html" %}

{% block content %}
<article class="post cyber-card">
  <header class="post-header">
    <h1 class="neon-title">{{ page.title | e }}</h1>
    <div class="post-meta">
      <time>{{ page.date }}</time>
    </div>
  </header>
  <div class="post-content cyber-content">
    {{ content }}
  </div>
</article>
{% endblock %}
