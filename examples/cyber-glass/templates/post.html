{% extends "base.html" %}

{% block content %}
<article class="cyber-card">
  <header class="post-header">
    <div class="post-meta">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <time>{{ page.date }}</time>
    </div>
    <h1 class="neon-title">{{ page.title | e }}</h1>
  </header>
  <div class="post-content cyber-content">
    {{ content }}
  </div>
</article>
{% endblock %}
