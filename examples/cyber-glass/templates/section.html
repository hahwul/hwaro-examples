{% extends "base.html" %}

{% block content %}
<section class="hero-band">
  <span class="hero-tag">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" fill="#00f0ff"/></svg>
    Index
  </span>
  <h1 class="neon-title">{{ page.title | e }}</h1>
  <div class="cyber-content">
    {{ content | safe }}
  </div>
</section>

<div class="cyber-card">
  <ul class="section-list">
    {{ section.list }}
  </ul>
  {{ pagination }}
</div>
{% endblock %}
