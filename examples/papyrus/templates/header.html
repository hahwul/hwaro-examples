<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;1,200&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2e9d9;
            --text: #4a3c2f;
            --accent: #b8860b;
        }
        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(90deg, rgba(74, 60, 47, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(74, 60, 47, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.7;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 1px solid rgba(74, 60, 47, 0.1);
        }
        .logo {
            font-weight: 200;
            font-size: 2rem;
            text-transform: lowercase;
            letter-spacing: 15px;
            font-style: italic;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .papyrus-hero {
            padding: 100px 0;
            text-align: center;
        }
        .papyrus-hero h1 {
            font-size: 5rem;
            font-weight: 200;
            margin: 0;
            font-style: italic;
        }
        article {
            background: rgba(255, 255, 255, 0.4);
            padding: 80px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(184, 134, 11, 0.2);
        }
        h2 { font-weight: 200; font-size: 2.5rem; font-style: italic; color: var(--accent); border-bottom: 1px solid rgba(184, 134, 11, 0.1); padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">papyrus.</div>
            <nav>
                <a href="/">Origin</a>
                <a href="/about">Reed</a>
            </nav>
        </div>
    </header>
