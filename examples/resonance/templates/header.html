<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#f7faf3">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Resonance home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="9" fill="currentColor"/>
          <path d="M16 25V15" stroke="var(--bg)" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M16 17c0-4 3-6.5 7-6.5-.3 4.2-3 6.5-7 6.5Z" fill="var(--bg)"/>
          <path d="M16 20c0-3.4-2.6-5.6-6-5.6.3 3.6 2.6 5.6 6 5.6Z" fill="var(--bg)"/>
        </svg>
        <span>Resonance</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/episodes/"{% if page.section == "episodes" %} aria-current="page"{% endif %}>Episodes</a>
        <a href="{{ base_url }}/hosts/"{% if page.url == "/hosts/" %} aria-current="page"{% endif %}>Hosts</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
      <a class="search-trigger" href="{{ base_url }}/search/" aria-label="Search episodes">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
      </a>
    </div>
  </header>
