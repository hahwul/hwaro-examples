{% include "header.html" %}
  <main id="main">
    <div class="wrap">
      <header class="section-head">
        <p class="kicker">Find a show</p>
        <h1 class="section-title">{{ page.title | e }}</h1>
        <div class="doc-lede">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search episodes, hosts, and notes</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="compost, rooftop load, three sisters…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="search-results" id="search-results"></ul>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </div>
  </main>
{% include "footer.html" %}
