<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #555; --border: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
        .timeline { position: relative; padding-left: 30px; border-left: 2px solid var(--border); }
        .timeline-item { position: relative; margin-bottom: 50px; }
        .timeline-item::before { content: ''; position: absolute; left: -39px; top: 0; width: 16px; height: 16px; border-radius: 50%; background: #000; border: 4px solid #fff; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">timeline.feed</div></header>
