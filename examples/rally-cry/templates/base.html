<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Narrow:wght@700&family=Source+Code+Pro&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --red: #D20000;
      --black: #000000;
      --white: #FFFFFF;
      --paper: #E6E6E6;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--paper);
      color: var(--black);
      font-family: 'Archivo Narrow', sans-serif;
      line-height: 1.4;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0;
      text-align: center;
      background-color: var(--black);
      color: var(--white);
    }

    .slogan {
      font-family: 'Bebas Neue', cursive;
      font-size: 200px;
      line-height: 0.8;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    nav {
      margin-top: 2rem;
      border-top: 4px solid var(--white);
      padding-top: 1rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      margin: 0 1.5rem;
      letter-spacing: 0.1em;
    }

    nav a:hover {
      color: var(--red);
    }

    main {
      padding: 4rem 0;
    }

    .hero-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 4rem;
    }

    .fist-svg {
      width: 150px;
      height: 150px;
      fill: var(--black);
    }

    .section-banner {
      background-color: var(--black);
      color: var(--white);
      padding: 1rem 2rem;
      display: inline-block;
      font-family: 'Bebas Neue', cursive;
      font-size: 48px;
      margin-bottom: 2rem;
      transform: rotate(-1deg);
    }

    .speaker-name {
      font-family: 'Archivo Narrow', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-transform: uppercase;
      margin: 0;
      color: var(--red);
    }

    .logistics {
      font-family: 'Source Code Pro', monospace;
      font-size: 14px;
      background-color: var(--white);
      border: 2px solid var(--black);
      padding: 2rem;
      margin: 4rem 0;
    }

    .cta-button {
      display: block;
      width: 100%;
      background-color: var(--red);
      color: var(--white);
      text-align: center;
      padding: 1.5rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      letter-spacing: 0.05em;
      text-decoration: none;
      margin-top: 2rem;
    }

    .cta-button:hover {
      background-color: var(--black);
    }

    .megaphone-icon {
      margin-bottom: 1rem;
    }

    footer {
      background-color: var(--black);
      color: var(--white);
      padding: 4rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .crowd-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='30' viewBox='0 0 60 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 30 C 10 20, 20 20, 20 30 M30 30 C 30 15, 45 15, 45 30 M50 30 C 50 25, 55 25, 55 30' fill='none' stroke='%23E6E6E6' stroke-width='2'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      opacity: 0.2;
    }

    @media (max-width: 768px) {
      .slogan { font-size: 80px; }
      nav a { margin: 0 0.5rem; font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="slogan">RISE UP</h1>
      <nav>
        <a href="{{ base_url }}/">Assembly</a>
        <a href="{{ base_url }}/about/">Directions</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <div class="crowd-pattern"></div>
    <div class="container" style="margin-top: 2rem;">
      <p style="font-family: 'Source Code Pro'; font-size: 12px; letter-spacing: 0.1em;">NO EMOJIS. NO GRADIENTS. POWER TO THE PEOPLE.</p>
    </div>
  </footer>
</body>
</html>
