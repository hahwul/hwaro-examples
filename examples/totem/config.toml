title = "Totem"
description = "Tribal art portfolio - Pacific Northwest totem pole gallery"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[markdown]
safe = false
lazy_loading = false
emoji = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[feeds]
enabled = true
type = "rss"
full_content = true
limit = 10

[sitemap]
enabled = true
filename = "sitemap.xml"

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]
