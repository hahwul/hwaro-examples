<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="totem-nav">
    <div class="nav-pole">
      <a href="{{ base_url }}/" class="nav-brand">
        <span class="brand-icon">&loz;</span>
        <span class="brand-text">Totem</span>
      </a>
      <div class="nav-pieces">
        <a href="{{ base_url }}/" class="nav-piece">
          <span class="piece-symbol">&Delta;</span>
          <span class="piece-label">Home</span>
        </a>
        <a href="{{ base_url }}/posts/" class="nav-piece">
          <span class="piece-symbol">&diams;</span>
          <span class="piece-label">Projects</span>
        </a>
        <a href="{{ base_url }}/about/" class="nav-piece">
          <span class="piece-symbol">&#9675;</span>
          <span class="piece-label">About</span>
        </a>
        <a href="{{ base_url }}/tags/" class="nav-piece">
          <span class="piece-symbol">&nabla;</span>
          <span class="piece-label">Tags</span>
        </a>
      </div>
    </div>
  </nav>
  <main class="totem-main">
