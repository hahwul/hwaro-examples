<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{% if site.title is defined %}{{ site.title | e }}{% else %}Apolo Stellar Nexus{% endif %}</title>
    <meta name="description" content="{% if page.description is defined %}{{ page.description | e }}{% elif site.description is defined %}{{ site.description | e }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #05050A;
            --orb-cyan: rgba(0, 240, 255, 0.4);
            --orb-magenta: rgba(255, 0, 85, 0.4);
            --orb-purple: rgba(138, 43, 226, 0.4);
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #E0E0E0;
            --text-muted: #8892B0;
            --accent: #00F0FF;
            --accent-glow: rgba(0, 240, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: drift 20s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--orb-cyan);
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--orb-magenta);
            bottom: -150px;
            right: -100px;
            animation-duration: 30s;
        }
        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--orb-purple);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 28s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 40px) scale(1.05); }
            100% { transform: translate(-20px, -30px) scale(0.95); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
        }

        .nav-back {
            display: inline-block;
            margin-bottom: 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
        }

        .nav-back::before {
            content: '←';
            margin-right: 0.5rem;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .nav-back:hover::before {
            transform: translateX(-4px);
        }

        header {
            margin-bottom: 3rem;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #FFFFFF;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 3rem;
        }

        .content {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .content h2 {
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .content h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .content p {
            margin-bottom: 1.5rem;
        }

        .content ul, .content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content a {
            text-decoration: underline;
            text-decoration-color: var(--accent-glow);
            text-underline-offset: 4px;
        }

        .content a:hover {
            color: var(--accent);
            text-decoration-color: var(--accent);
        }

        .content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            margin-left: 0;
            margin-right: 0;
            font-style: italic;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .content pre {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .content code {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: #ff80bf;
        }

        .content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 2rem 1rem; }
            .glass-panel { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <a href="{{ base_url }}/" class="nav-back">Back to Nexus</a>

        <div class="glass-panel">
            <header>
                <h1>{{ page.title | e }}</h1>
                {% if page.date is defined %}
                    <div class="meta">{{ page.date | date(format="%Y-%m-%d") }}</div>
                {% endif %}
            </header>

            <main class="content">
                {{ content }}
            </main>
        </div>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.title | e }}. Built with <a href="https://hwaro.hahwul.com" target="_blank">Hwaro</a>.</p>
        </footer>
    </div>
</body>
</html>
