{% include "header.html" %}

  <main class="container">
    <div class="section-header">
      <h2>All {{ taxonomy.name | title }}</h2>
    </div>

    <div class="taxonomy-list">
      {% for term in taxonomy.terms %}
      <a href="{{ base_url }}/{{ taxonomy.name }}/{{ term.slug }}/" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
