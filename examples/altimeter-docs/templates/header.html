<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #fff; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: left; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-family: 'IBM Plex Mono'; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .alt-surface { background: #0c0c0c; padding: 80px; border: 1px solid #333; position: relative; }
        .level { position: absolute; right: 20px; top: 20px; font-family: 'IBM Plex Mono'; font-size: 2rem; font-weight: 700; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">altimeter.docs</div></header>
