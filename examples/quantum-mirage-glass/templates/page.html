<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #040108;
            --bg-void: #0a0314;
            --text-main: #f0f0f5;
            --text-muted: #a0a0b5;

            --orb-cyan: #00f0ff;
            --orb-pink: #ff007f;
            --orb-purple: #8a2be2;

            --glass-bg: rgba(20, 15, 35, 0.3);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.03);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-void) 0%, var(--bg-deep) 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Quantum Orbs Background Animation */
        .quantum-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--orb-cyan), transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--orb-pink), transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
            animation-duration: 30s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--orb-purple), transparent 70%);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            animation-duration: 22s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -50px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .site-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .site-desc {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        /* Glass Content Area */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        /* Markdown Content Styling */
        .content {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .content h1, .content h2, .content h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .content h1 {
            font-size: 2.5rem;
            margin-top: 0;
            background: linear-gradient(to right, var(--orb-cyan), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .content h2 {
            font-size: 1.8rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .content p {
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .content ul, .content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
            font-weight: 300;
        }

        .content li strong {
            color: #fff;
            font-weight: 500;
        }

        .content blockquote {
            border-left: 3px solid var(--orb-purple);
            background: rgba(138, 43, 226, 0.05);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: var(--text-muted);
        }

        .content blockquote p:last-child {
            margin-bottom: 0;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            padding-top: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }
            .glass-panel {
                padding: 2rem;
            }
            .content h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="quantum-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="site-title">{{ site.title }}</div>
            {% if site.description %}
            <div class="site-desc">{{ site.description }}</div>
            {% endif %}
        </header>

        <main class="glass-panel">
            <article class="content">
                {{ content | safe }}
            </article>
        </main>

        <footer>
            &copy; {{ now() | date(format="%Y") }} {{ site.title }}. Powered by Hwaro.
        </footer>
    </div>
</body>
</html>
