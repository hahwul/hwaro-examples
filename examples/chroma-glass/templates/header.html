<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="glass-header">
    <div class="container header-inner">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="nav-links">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/archives/">Archives</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div class="header-right" style="margin-left: 1rem; display: flex; align-items: center;">
        <button class="search-trigger" onclick="openSearch()" title="Search" style="background: transparent; border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--text-color); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; transition: background 0.2s, border-color 0.2s;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
          <kbd style="background: rgba(255, 255, 255, 0.1); padding: 0.1rem 0.3rem; border-radius: 4px; font-size: 0.7rem; color: var(--text-muted); font-family: var(--font-mono);">⌘K</kbd>
        </button>
      </div>
    </div>
  </header>
