<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #1a1a1a;
            --accent: #555;
            --note: #fff;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
            border-bottom: 2px solid #000;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .note-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
            border: 1px solid #ddd;
            position: relative;
        }
        h2 { font-weight: 700; font-size: 1.5rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; }
        article { font-size: 1rem; }
        .note-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #999; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">briefing.note</div>
            <nav>
                <a href="/">Update</a>
                <a href="/about">Summary</a>
            </nav>
        </div>
    </header>
