# =============================================================================
# Annotation-Layer - A Study in Deep Commentary
# Issue #1553 | Tags: book, light, scholarly, annotated, dense
# =============================================================================

title = "ANNOTATION-LAYER - A Study in Deep Commentary"
description = "A scholarly publication in the tradition of the apparatus criticus - original texts displayed above dense commentary annotations, with variant readings, stemma codicum diagrams, and layered editorial notes filling the margins."
base_url = "http://localhost:3000"

sections = ["texts"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "tradition"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A scholarly apparatus criticus publication. Academic use; please cite if referenced."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["texts"]

[markdown]
safe = false
lazy_loading = false
emoji = false
