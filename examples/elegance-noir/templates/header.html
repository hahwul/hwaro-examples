<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root { --bg: #111111; --text: #e0e0e0; --accent: #a0a0a0; --border: #333333; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
    a:hover { border-bottom: 1px solid var(--accent); }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: baseline; }
    .site-title { font-size: 1.5rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #ffffff; }
    nav a { margin-left: 1.5rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 1.5rem; color: #ffffff; letter-spacing: 1px; }
    h2, h3 { font-weight: 400; color: #f0f0f0; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1rem; border-bottom: 1px dashed var(--border); padding-bottom: 1rem; }
    .meta { font-size: 0.85rem; color: #888888; text-transform: uppercase; letter-spacing: 1px; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
