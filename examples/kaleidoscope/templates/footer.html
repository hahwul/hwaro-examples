  <script>
    /* Mobile nav toggle */
    (function() {
      var toggle = document.querySelector('.nav-toggle');
      var links = document.querySelector('.nav-links');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('open');
          toggle.classList.toggle('active');
        });
      }
    })();

    /* Scroll-driven rotation for kaleidoscope decorations */
    (function() {
      var scrollEls = document.querySelectorAll('.kal-rotate');
      if (!scrollEls.length) return;
      window.addEventListener('scroll', function() {
        var y = window.scrollY;
        scrollEls.forEach(function(el, i) {
          var speed = parseFloat(el.dataset.speed || '0.1');
          var dir = i % 2 === 0 ? 1 : -1;
          el.style.transform = 'rotate(' + (y * speed * dir) + 'deg)';
        });
      });
    })();
  </script>
