<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body class="texture-linen">

    <header class="site-header texture-denim">
        <div class="container">
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
        </div>
    </header>

    <main class="site-content container texture-silk">
        <article class="content-body">
            {% if page.title %}
            <h1 class="page-title">{{ page.title }}</h1>
            {% endif %}
            {{ content | safe }}
        </article>
    </main>

    <footer class="site-footer texture-denim">
        <div class="container">
            <p>&copy; {{ site.title }}. Crafted with care.</p>
        </div>
    </footer>

</body>
</html>
