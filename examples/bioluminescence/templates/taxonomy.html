{% extends "base.html" %}
{% block content %}
<article class="page-content glowing-box">
    <h1 class="page-title glow-text">{{ taxonomy.name | capitalize }}</h1>
    <div class="content-body">
        <ul>
        {% for term in terms %}
            <li><a href="{{ base_url }}{{ term.url }}">{{ term.name }}</a></li>
        {% endfor %}
        </ul>
    </div>
</article>
{% endblock %}
