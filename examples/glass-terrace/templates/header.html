<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #334155;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.4);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .terrace-hero {
            padding: 100px 0;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            margin-top: 40px;
        }
        .terrace-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
            color: var(--text);
        }
        .terrace-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        article {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            padding: 60px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--accent); margin-top: 0; }
        .sidebar-box {
            background: var(--glass);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.terrace</div>
        <nav>
            <a href="/">View</a>
            <a href="/about">Steps</a>
        </nav>
    </header>
