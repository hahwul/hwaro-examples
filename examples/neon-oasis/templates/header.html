<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #00ffff;
      --primary-glow: rgba(0, 255, 255, 0.6);
      --secondary: #ff00ff;
      --secondary-glow: rgba(255, 0, 255, 0.6);
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: #333333;
      --bg: #0a0a0f;
      --bg-subtle: #12121a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Courier New', Courier, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); border-top: 4px solid var(--primary); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px dashed var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; text-shadow: 0 0 10px var(--primary-glow); letter-spacing: 2px; text-transform: uppercase;}
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
    .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px var(--secondary-glow); }
    .site-main { min-height: calc(100vh - 250px); animation: glitch-load 0.5s ease-in; }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px dashed var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 2em; margin-bottom: 0.5em; font-weight: bold; letter-spacing: 1px; color: #ffffff;}
    h1 { font-size: 2.5rem; margin-top: 0; border-left: 5px solid var(--primary); padding-left: 15px; text-shadow: 0 0 5px var(--primary-glow);}
    h2 { font-size: 1.8rem; border-left: 3px solid var(--secondary); padding-left: 10px; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; font-size: 1.1rem; color: #cccccc;}
    a { color: var(--primary); text-decoration: none; transition: text-shadow 0.3s; }
    a:hover { text-shadow: 0 0 8px var(--primary-glow); }

    /* Code block fix */
    pre { border: 1px solid var(--secondary); box-shadow: 0 0 10px var(--secondary-glow); border-radius: 4px; padding: 1.5rem; background: var(--bg-subtle) !important;}
    pre code.hljs { background: transparent !important; color: var(--text) !important;}

    @keyframes glitch-load { 0% { opacity: 0; transform: skewX(-5deg); } 50% { opacity: 0.8; transform: skewX(5deg); } 100% { opacity: 1; transform: skewX(0); } }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1.5rem; background: var(--bg-subtle); border-radius: 4px; border: 1px solid var(--border); transition: border-color 0.3s, box-shadow 0.3s; border-left: 3px solid transparent;}
    ul.section-list li a { font-weight: bold; font-size: 1.2rem; display:block; margin-bottom: 0.5rem; color: #fff;}
    ul.section-list li:hover { border-color: var(--primary); border-left-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center;}
    nav.pagination a, .pagination-current span, .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--border); font-size: 0.9rem;}
    nav.pagination a { color: var(--text-muted); text-decoration: none; transition: all 0.3s ease;}
    nav.pagination a:hover { color: var(--secondary); border-color: var(--secondary); box-shadow: 0 0 10px var(--secondary-glow);}
    .pagination-current span { border-color: var(--primary); background: rgba(0, 255, 255, 0.1); color: var(--primary); box-shadow: 0 0 10px var(--primary-glow);}
    .pagination-disabled span { color: var(--text-muted); opacity: 0.5; border-color: #222;}

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>
