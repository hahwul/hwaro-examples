<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fffafa;
            --text: #4a4a4a;
            --accent: #ffebf0;
            --shadow: rgba(0,0,0,0.02);
            --highlight: rgba(255,255,255,0.9);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .mallow-hero {
            padding: 100px 0;
            text-align: center;
        }
        .mallow-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            color: #ffdae9;
            text-shadow: 2px 2px 0 #fff;
        }
        article {
            background: var(--bg);
            padding: 80px;
            border-radius: 60px;
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--highlight);
            margin-bottom: 80px;
        }
        h2 { font-weight: 600; font-size: 2.2rem; color: #ffdae9; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">marshmallow</div>
            <nav>
                <a href="/">Sweet</a>
                <a href="/about">Soft</a>
            </nav>
        </div>
    </header>
