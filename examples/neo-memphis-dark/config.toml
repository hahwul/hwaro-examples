# =============================================================================
# Neo-Memphis Dark - Site Configuration
# =============================================================================

title = "Neo-Memphis Dark"
description = "A dark, moody, neon-lit take on Memphis design."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = false
theme = "base16-ocean"
