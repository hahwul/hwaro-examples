<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <!-- Background Memphis Shapes -->
    <div class="shape shape-grid"></div>
    <div class="shape shape-circle" style="top: 10%; left: 5%;"></div>
    <div class="shape shape-triangle" style="top: 30%; right: 10%;"></div>
    <div class="shape shape-zigzag" style="bottom: 15%; left: 15%;"></div>
    <div class="shape shape-pill" style="bottom: 25%; right: 5%;"></div>
    <div class="shape shape-square" style="top: 50%; left: 8%;"></div>

    <div class="layout-container">
        <header class="site-header">
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/portfolio/">Portfolio</a>
            </nav>
        </header>

        <main class="main-content">
            {% block content %}{% endblock content %}
        </main>

        <footer class="site-footer">
            <p>&copy; 2024 {{ site.title }}. <span class="neon-text-alt">A Moody Memphis Experience.</span></p>
        </footer>
    </div>
</body>
</html>
