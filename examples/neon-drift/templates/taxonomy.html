    <h1>{{ taxonomy }} Index</h1>

        {% for term in terms %}
        <li><a href="{{ site.base_url }}/{{ taxonomy }}/{{ term }}/">{{ term }}</a></li>

    {% endif %}
    </ul>
</div>
