{% include "header.html" %}
<div class="glow-box">
    {% if page is defined and page.title is defined %}
        <h1>{{ page.title }}</h1>
    {% endif %}
    <div class="section-content">
        {{ content | safe }}
    </div>
    <ul class="section-pages">
    {% if section.pages is defined %}
        {% for p in section.pages %}
            <li><a href="{{ site.base_url }}{{ p.url }}">{{ p.title }}</a></li>
        {% endfor %}
    {% endif %}
    </ul>
</div>
{% include "footer.html" %}
