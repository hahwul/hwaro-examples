<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {{ auto_includes_css }}
    <style>
        :root {
            --bg: #0b0c10;
            --fg: #c5c6c7;
            --neon-cyan: #66fcf1;
            --neon-dark: #45a29e;
            --border: #1f2833;
        }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background-color: var(--border);
            padding: 2rem;
            border-right: 2px solid var(--neon-cyan);
            box-shadow: 2px 0 10px rgba(102, 252, 241, 0.2);
        }
        .sidebar h1 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-cyan);
            margin-top: 0;
        }
        .sidebar nav ul {
            list-style: none;
            padding: 0;
        }
        .sidebar nav ul li {
            margin-bottom: 1rem;
        }
        .sidebar nav a {
            color: var(--fg);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .sidebar nav a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .main-content {
            padding: 3rem;
            max-width: 900px;
        }
        a {
            color: var(--neon-dark);
            text-decoration: none;
        }
        a:hover {
            color: var(--neon-cyan);
        }
        h1, h2, h3 {
            color: var(--neon-cyan);
        }
        .glow-box {
            border: 1px solid var(--neon-dark);
            padding: 1.5rem;
            border-radius: 4px;
            background: rgba(31, 40, 51, 0.5);
            box-shadow: inset 0 0 10px rgba(69, 162, 158, 0.2);
            margin-bottom: 2rem;
        }
        {{ highlight_tags | safe }}
    </style>
</head>
<body>
<div class="grid-container">
    <aside class="sidebar">
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a href="{{ site.base_url }}/">System Core</a></li>
                <li><a href="{{ site.base_url }}/about/">About Protocol</a></li>
                <li><a href="{{ site.base_url }}/tags/">Tag Nodes</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main-content">
