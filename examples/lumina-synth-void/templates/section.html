{% include "header.html" %}
  <main class="site-main">
    <div class="glass-panel main-article">
      {% if page.title is defined %}
        <h1 class="page-title">{{ page.title | e }}</h1>
      {% endif %}
      <div class="content-body">
        {{ content | safe }}
      </div>

      {% if section.list %}
        <div class="section-items">
          {{ section.list }}
        </div>
      {% endif %}

      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
