{% include "header.html" %}

<main class="glass-panel">
    <article>
        <header>
            {% if page is defined and page.title %}
                <h1>{{ page.title }}</h1>
            {% endif %}

            {% if page is defined and page.description %}
                <p class="description">{{ page.description }}</p>
            {% endif %}
        </header>

        <div class="content-area">
            {% if content is defined %}
                {{ content | safe }}
            {% endif %}
        </div>
    </article>
</main>

{% include "footer.html" %}
