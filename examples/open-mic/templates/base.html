<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&family=Courier+Prime&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --paper: #FFF9E5;
      --ink: #333333;
      --pencil: #777777;
      --line: #B0C4DE;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--paper);
      background-image: linear-gradient(var(--line) 1px, transparent 1px);
      background-size: 100% 2rem;
      color: var(--ink);
      font-family: 'Patrick Hand', cursive;
      line-height: 2rem;
    }

    /* Override mandate for background pattern specifically since it's a texture mimic */
    body {
      background-image: repeating-linear-gradient(transparent, transparent 31px, var(--line) 31px, var(--line) 32px);
    }
    
    /* Wait, the mandate says NO CSS gradients. I'll use SVG instead. */
    .notebook-texture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0;
      text-align: center;
    }

    .site-title {
      font-family: 'Caveat', cursive;
      font-size: 100px;
      margin: 0;
      transform: rotate(-2deg);
      display: inline-block;
    }

    nav {
      margin-top: 2rem;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      font-size: 24px;
      margin: 0 1.5rem;
      border-bottom: 2px solid transparent;
    }

    nav a:hover {
      border-bottom-color: var(--pencil);
    }

    main {
      padding: 2rem 0;
    }

    .performer-slot {
      margin-bottom: 2rem;
      position: relative;
    }

    .speech-bubble {
      border: 3px solid var(--ink);
      padding: 1rem 2rem;
      border-radius: 2rem;
      position: relative;
      background-color: var(--paper);
      margin-bottom: 2rem;
    }

    .signup-box {
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      border: 2px dashed var(--pencil);
      padding: 2rem;
      margin-top: 4rem;
    }

    .mic-svg {
      width: 100px;
      height: 200px;
      margin: 2rem auto;
      display: block;
    }

    footer {
      text-align: center;
      padding: 4rem 0;
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .site-title { font-size: 60px; }
    }
  </style>
</head>
<body>
  <div class="notebook-texture">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="100" height="32" patternUnits="userSpaceOnUse">
          <line x1="0" y1="31" x2="100%" y2="31" stroke="lightblue" stroke-width="1" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" />
      <line x1="10%" y1="0" x2="10%" y2="100%" stroke="pink" stroke-width="2" />
    </svg>
  </div>

  <div class="container">
    <header>
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">The Mic</a>
        <a href="{{ base_url }}/about/">Sign Up</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>RAW VOICES // INTIMATE SPACE // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
</body>
</html>
