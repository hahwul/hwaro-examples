{% extends "base.html" %}
{% block content %}
<h1 style="font-family: 'Caveat'; font-size: 60px; transform: rotate(-1deg);">{{ section.title }}</h1>
<div style="margin-top: 4rem;">
  {% for page in section.pages %}
  <div class="speech-bubble">
    <h2 style="font-family: 'Caveat'; font-size: 32px;"><a href="{{ page.permalink }}" style="color: var(--ink); text-decoration: none;">{{ page.title }}</a></h2>
    <p style="font-size: 18px;">{{ page.description }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
