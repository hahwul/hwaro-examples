<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
    :root {
      --bg: #030014;
      --bg-stars: #0f0c29;
      --text: #e0e0ff;
      --text-muted: #a0a0c0;
      --primary: #cba6f7;
      --accent: #89b4fa;
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(15, 12, 41, 0.6);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, var(--bg-stars), var(--bg));
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-image:
        radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 130px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.3;
      z-index: -1;
      animation: stars 100s linear infinite;
    }
    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .site-header {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .site-logo {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(203, 166, 247, 0.5);
    }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { flex: 1; display: flex; flex-direction: column; }
    h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 400; color: var(--primary); }
    h1 { font-size: 2.5rem; text-align: center; margin-bottom: 2rem; }
    p { line-height: 1.8; margin-bottom: 1.5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    ul.section-list { list-style: none; padding: 0; }
    ul.section-list li { margin-bottom: 1rem; }
    ul.section-list li a { display: block; padding: 1.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; transition: transform 0.3s, background 0.3s; }
    ul.section-list li a:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); text-decoration: none; }
    .pagination { display: flex; justify-content: center; gap: 1rem; margin-top: 3rem; }
    .pagination a, .pagination span { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .pagination .current { background: var(--primary); color: #000; border-color: var(--primary); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
