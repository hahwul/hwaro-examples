title = "Lab Notes"
description = "An experiment log and research journal built with Hwaro"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
enabled = true
format = "fuse_json"

[pagination]
enabled = true
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 3
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["experiments"]

[markdown]
safe = false
lazy_loading = true
emoji = false

