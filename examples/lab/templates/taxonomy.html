{% include "header.html" %}
<div class="grid-paper">
  <div class="main-content">
    <header class="site-header">
      <div class="header-inner">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ base_url }}/experiments/">Log</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="taxonomy-title">{{ taxonomy_name | title }}</h1>
      <div class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="taxonomy-item">
          {{ term.name }}<span class="taxonomy-count">({{ term.pages | length }})</span>
        </a>
        {% endfor %}
      </div>
{% include "footer.html" %}
