<div class="testimonial-card">
  <div class="testimonial-stars">★★★★★</div>
  <p class="testimonial-quote">"{{ quote }}"</p>
  <div class="testimonial-author">
    <div class="testimonial-avatar">{{ initials }}</div>
    <div class="testimonial-info">
      <strong>{{ name }}</strong>
      <span>{{ role }}</span>
    </div>
  </div>
</div>
