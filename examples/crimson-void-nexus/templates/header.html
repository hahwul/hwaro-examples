<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff0055;
      --secondary: #8a2be2;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --border: rgba(255, 0, 85, 0.2);
      --bg: #050002;
      --glass-bg: rgba(20, 0, 10, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(255, 0, 85, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(255, 0, 85, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.15), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: rgba(255, 0, 85, 0.12);
      animation-duration: 25s;
    }

    .orb-2 {
      bottom: -10%; right: -10%;
      width: 40vw; height: 40vw;
      background: rgba(138, 43, 226, 0.12);
      animation-duration: 30s;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 10%) scale(1.1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px 0 rgba(255, 0, 85, 0.25);
      border-color: rgba(255, 0, 85, 0.3);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin: 2rem 0;
      background: rgba(10, 0, 5, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff0055, #ff4d88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255,0,85,0.4);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .site-header nav a:hover {
      color: #fff;
      text-shadow: 0 0 8px var(--primary);
    }

    /* Main Content */
    .site-main { min-height: calc(100vh - 250px); }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.2;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(90deg, #fff, #ffb3c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; color: #ccc; }

    a { color: #ff4d88; text-decoration: none; transition: color 0.2s; }
    a:hover { color: #fff; text-shadow: 0 0 8px rgba(255, 77, 136, 0.6); }

    /* Code Blocks */
    code {
      background: rgba(255, 0, 85, 0.1);
      color: #ffb3c6;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(255, 0, 85, 0.2);
    }

    pre {
      background: rgba(5, 0, 2, 0.8) !important;
      padding: 1.25rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; }
    ul.section-list li a {
      display: block;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      color: #fff;
    }
    ul.section-list li a:hover {
      background: rgba(255, 0, 85, 0.1);
      border-color: rgba(255, 0, 85, 0.4);
      transform: translateX(5px);
      box-shadow: -4px 0 15px rgba(255, 0, 85, 0.2);
    }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; border-radius: 20px; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
