{% extends "base.html" %}

{% block content %}
<article class="page-container">
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        <div class="page-meta">
            {% if page.date %}
            <span>{{ page.date | date("%B %d, %Y") }}</span>
            {% endif %}
            {% if page.reading_time %}
            <span>{{ page.reading_time }} min read</span>
            {% endif %}
        </div>
    </header>

    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
