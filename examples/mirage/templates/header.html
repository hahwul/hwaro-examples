<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter id="heat-haze">
        <feTurbulence type="turbulence" baseFrequency="0.015 0.04" numOctaves="3" seed="2" result="turbulence">
          <animate attributeName="baseFrequency" dur="8s" values="0.015 0.04;0.02 0.06;0.015 0.04" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="heat-haze-subtle">
        <feTurbulence type="turbulence" baseFrequency="0.01 0.03" numOctaves="2" seed="5" result="turbulence">
          <animate attributeName="baseFrequency" dur="12s" values="0.01 0.03;0.015 0.045;0.01 0.03" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="heat-haze-strong">
        <feTurbulence type="turbulence" baseFrequency="0.02 0.05" numOctaves="4" seed="8" result="turbulence">
          <animate attributeName="baseFrequency" dur="6s" values="0.02 0.05;0.03 0.07;0.02 0.05" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="sand-particles" aria-hidden="true">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/gallery/">Gallery</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
