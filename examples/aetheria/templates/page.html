{% extends "base.html" %}

{% block content %}
  <article class="card">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <p class="taxonomy-desc">{{ page.date | date(format="%B %d, %Y") }}</p>
    {% endif %}
    <div class="content">
      {{ content | safe }}
    </div>
  </article>
{% endblock %}
