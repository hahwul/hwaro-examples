<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap');
    :root {
      --primary: #00f3ff;
      --secondary: #ff00ea;
      --bg: #0d0e15;
      --bg-glass: rgba(13, 14, 21, 0.7);
      --text: #e0e0e0;
      --border: rgba(0, 243, 255, 0.2);
      --glow: 0 0 10px rgba(0, 243, 255, 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin-bottom: 3rem;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: var(--glow);
    }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      font-family: 'Orbitron', sans-serif;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: var(--glow);
    }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: rgba(224, 224, 224, 0.6);
      font-size: 0.9rem;
      text-align: center;
      background: var(--bg-glass);
    }
    h1, h2, h3 { font-family: 'Orbitron', sans-serif; color: var(--primary); text-shadow: var(--glow); margin-top: 2rem; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { text-decoration: underline; text-shadow: 0 0 8px rgba(255, 0, 234, 0.6); }
    code, pre { background: rgba(0, 243, 255, 0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--primary); }
    pre { padding: 1rem; overflow-x: auto; }
    ul.section-list { list-style: none; padding: 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(0, 243, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow);
      border-color: var(--primary);
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="site-header">
    <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
  <div class="site-wrapper">
