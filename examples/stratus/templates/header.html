<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-row">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-led" aria-hidden="true"></span>
        <span class="brand-word">Stratus</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/recordings/"{% if page.section is present and page.section == "recordings" %} aria-current="page"{% endif %}>Recordings</a>
        <a href="{{ base_url }}/tags/"{% if page.url is present and page.url == "/tags/" %} aria-current="page"{% endif %}>Tags</a>
        <a href="{{ base_url }}/about/"{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
    </div>
  </header>
