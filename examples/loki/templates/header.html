<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('loki-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="terminal-frame">
    <header class="site-head">
      <div class="head-left">
        <a class="brand" href="{{ base_url }}/">[LOKI://SECURITY.CONSOLE]</a>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/issues/">Dispatches</a>
        <a href="{{ base_url }}/about/">About</a>
        <button class="search-trigger" type="button" data-search-open aria-haspopup="dialog" aria-label="Search dispatches, Ctrl+K">
          <span class="search-trigger-label">SEARCH</span>
          <kbd class="kbd" aria-hidden="true">[^K]</kbd>
        </button>
        <button id="theme-toggle" aria-label="Toggle visual theme" class="theme-btn">SYS_THEME</button>
      </nav>
    </header>
