<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
        :root {
            --bauhaus-red: #E62A10;
            --bauhaus-blue: #004D9F;
            --bauhaus-yellow: #FBD500;
            --bauhaus-black: #1A1A1A;
            --bauhaus-white: #F8F8F8;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bauhaus-white);
            color: var(--bauhaus-black);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* The Grid System */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Geometric Header */
        header {
            border-bottom: 8px solid var(--bauhaus-black);
            padding: 40px 0;
            margin-bottom: 60px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            background-color: var(--bauhaus-yellow);
            border-radius: 50%;
            transform: translate(-30%, -30%);
            z-index: -1;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: 10%;
            width: 150px;
            height: 40px;
            background-color: var(--bauhaus-blue);
            transform: rotate(-15deg);
            z-index: -1;
        }

        .site-title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--bauhaus-black);
            text-decoration: none;
            display: inline-block;
            border-left: 20px solid var(--bauhaus-red);
            padding-left: 15px;
            line-height: 1;
        }

        nav {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--bauhaus-black);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
            padding: 5px 10px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        nav a:hover {
            border-color: var(--bauhaus-black);
            background-color: var(--bauhaus-black);
            color: var(--bauhaus-white);
        }

        main {
            flex-grow: 1;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        h1 { font-size: 4rem; }
        h2 { font-size: 2.5rem; }

        p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            max-width: 700px;
        }

        a {
            color: var(--bauhaus-blue);
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 2px;
        }

        a:hover {
            color: var(--bauhaus-red);
        }

        /* Geometric Accents for Content */
        .page-title {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .page-title::after {
            content: '';
            display: block;
            width: 100%;
            height: 15px;
            background-color: var(--bauhaus-red);
            margin-top: -10px;
            mix-blend-mode: multiply;
        }

        /* Post Lists */
        .post-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .post-card {
            border: 4px solid var(--bauhaus-black);
            padding: 30px;
            position: relative;
            background-color: var(--bauhaus-white);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .post-card:nth-child(3n+1) { border-color: var(--bauhaus-red); }
        .post-card:nth-child(3n+2) { border-color: var(--bauhaus-blue); }
        .post-card:nth-child(3n+3) { border-color: var(--bauhaus-yellow); }

        .post-card:hover {
            transform: translate(5px, -5px);
            box-shadow: -10px 10px 0 var(--bauhaus-black);
        }

        .post-card h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .post-card h3 a {
            color: var(--bauhaus-black);
            text-decoration: none;
        }

        .post-card time {
            font-family: monospace;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            display: block;
        }

        /* Footer */
        footer {
            margin-top: 80px;
            padding: 60px 0;
            background-color: var(--bauhaus-black);
            color: var(--bauhaus-white);
            text-align: center;
            border-top: 20px solid var(--bauhaus-yellow);
        }

        footer p {
            margin: 0 auto;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        /* Content Styling */
        .content ul {
            margin-left: 20px;
            margin-bottom: 1.5rem;
            list-style-type: square;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content blockquote {
            border-left: 10px solid var(--bauhaus-blue);
            padding-left: 20px;
            margin: 2rem 0;
            font-size: 1.5rem;
            font-style: italic;
            font-weight: bold;
        }

        .content code {
            background-color: var(--bauhaus-black);
            color: var(--bauhaus-white);
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/posts/">Posts</a>
        </nav>
    </div>
</header>

<main class="container">
