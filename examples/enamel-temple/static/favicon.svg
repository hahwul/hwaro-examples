<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Ornate golden cross forged from sanctified teeth -->
  <rect width="32" height="32" rx="3" fill="#0a0807"/>
  <!-- Central golden tooth cross -->
  <path d="M16 5 L16 27" stroke="#d4af37" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M8 13 L24 13" stroke="#d4af37" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Upper crown (incisor) -->
  <path d="M11 8 Q16 4 21 8" fill="none" stroke="#c5a26f" stroke-width="1.6"/>
  <!-- Side molars as cross arms -->
  <circle cx="8" cy="13" r="2.6" fill="#c5a26f"/>
  <circle cx="24" cy="13" r="2.6" fill="#c5a26f"/>
  <!-- Lower roots with subtle blood hint -->
  <path d="M13 21 Q16 27 19 21" fill="none" stroke="#8c6f3c" stroke-width="1.4"/>
  <path d="M16 18 L16 25" stroke="#6b1111" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <!-- Enamel highlights -->
  <circle cx="16" cy="9" r="1.1" fill="#fffaf0" opacity="0.5"/>
</svg>