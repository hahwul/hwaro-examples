<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Dental Arch Rail -->
  <div class="temple-rail" aria-hidden="true"></div>

  <header class="temple-header">
    <div class="temple-header-inner">
      <div>
        <a href="{{ base_url }}/" class="temple-logo">ENAMEL TEMPLE</a>
        <span class="temple-tagline">Est. 1892 • Ordo Perfecti Morsus</span>
      </div>
      <nav class="temple-nav" aria-label="Liturgical navigation">
        <a href="{{ base_url }}/">THE ALTAR</a>
        <a href="{{ base_url }}/posts/">SERMONS</a>
        <a href="{{ base_url }}/tags/">THE RELIQUARY</a>
        <a href="{{ base_url }}/about/">THE CONFESSIONAL</a>
      </nav>
    </div>
  </header>
