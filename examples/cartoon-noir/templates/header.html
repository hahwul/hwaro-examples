<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ddd;
            --accent: #555;
            --noir: #111;
            --shadow: rgba(0,0,0,0.8);
        }
        body {
            background-color: #000;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #fff;
            font-style: italic;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .noir-panel {
            background: var(--noir);
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 80px;
            border: 2px solid #222;
            position: relative;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-style: italic; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">cartoon.noir</div>
        <nav>
            <a href="/">Shadow</a>
            <a href="/about">Depth</a>
        </nav>
    </header>
