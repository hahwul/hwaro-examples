<script>function initPharaoh(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/22);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},30)});console.log('%c[IRON PHARAOH] The god-king awakens. All bow before the golden sarcophagus.','color:#d4af37')}addEventListener('load',initPharaoh)</script></body></html>
