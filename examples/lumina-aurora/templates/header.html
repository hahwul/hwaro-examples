<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
      :root { --primary: #00f0ff; --bg: #0a0a1a; --text: #e0e0ff; --glass: rgba(20, 20, 40, 0.6); }
      body { margin: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; position: relative; overflow-x: hidden; }
      .aurora-bg { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 50%, rgba(0,240,255,0.15), transparent 60%), radial-gradient(circle at 80% 20%, rgba(255,0,255,0.1), transparent 50%); animation: drift 20s linear infinite alternate; z-index: -1; }
      @keyframes drift { 0% { transform: rotate(0deg); } 100% { transform: rotate(5deg); } }
      .site-wrapper { max-width: 800px; margin: 2rem auto; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(0,240,255,0.2); border-radius: 12px; padding: 2rem; box-shadow: 0 0 20px rgba(0,240,255,0.1); }
      .site-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 1rem; margin-bottom: 2rem; }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-shadow: 0 0 8px var(--primary); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="aurora-bg"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav style="display: flex; gap: 1.5rem;">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
