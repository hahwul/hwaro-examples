<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#7c3aed', hover: '#6d28d9', light: '#ede9fe', text: '#5b21b6' },
            ds: { bg: '#ffffff', surface: '#f9fafb', border: '#e5e7eb', text: '#1f2937', muted: '#6b7280' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-ds-bg text-ds-text font-sans; }
    .prose { @apply max-w-none text-ds-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-ds-text; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-ds-text border-b border-ds-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-ds-text; }
    .prose p { @apply my-3 leading-relaxed; }
    .prose a { @apply text-brand hover:text-brand-hover underline underline-offset-4 decoration-brand/30; }
    .prose strong { @apply font-semibold; }
    .prose code { @apply bg-ds-surface px-1.5 py-0.5 rounded text-sm font-mono text-brand-text border border-ds-border; }
    .prose pre { @apply bg-gray-900 text-gray-100 p-4 rounded my-4 overflow-x-auto text-sm; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-gray-100; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5; }
    .prose ul li { @apply list-disc marker:text-brand; }
    .prose ol li { @apply list-decimal marker:text-brand; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-ds-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold border border-ds-border; }
    .prose td { @apply px-4 py-2 border border-ds-border; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-ds-border bg-ds-bg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-bold text-ds-text hover:text-brand transition-colors flex items-center gap-2">
        <div class="w-5 h-5 bg-brand rounded"></div>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/foundations/" class="text-ds-muted hover:text-ds-text transition-colors">Foundations</a>
        <a href="{{ base_url }}/components/" class="text-ds-muted hover:text-ds-text transition-colors">Components</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
