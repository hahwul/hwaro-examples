{% include "header.html" %}
  <header class="mb-10">
    <h1 class="text-2xl font-bold text-ds-text mb-2">{{ taxonomy.name }}</h1>
    <p class="text-ds-muted">Browse all tags used across the documentation.</p>
  </header>
  <div class="flex flex-wrap gap-2">
    {% for term in terms %}
    <a href="{{ base_url }}{{ term.url }}" class="px-3 py-1.5 bg-ds-surface border border-ds-border rounded text-sm text-ds-muted hover:text-brand hover:border-brand/30 transition-all">
      {{ term.name }} <span class="ml-1 text-xs text-ds-muted">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
