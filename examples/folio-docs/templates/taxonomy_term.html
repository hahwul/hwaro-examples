{% include "header.html" %}
  <header class="mb-10">
    <nav class="flex items-center gap-2 text-xs text-ds-muted mb-4">
      <a href="{{ base_url }}/" class="hover:text-ds-text">Home</a>
      <span>/</span>
      <a href="{{ base_url }}/tags/" class="hover:text-ds-text">Tags</a>
      <span>/</span>
      <span class="text-ds-text">{{ term.name }}</span>
    </nav>
    <h1 class="text-2xl font-bold text-ds-text mb-2">Tag: {{ term.name }}</h1>
    <p class="text-ds-muted">{{ pages | length }} page(s) tagged with "{{ term.name }}".</p>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for page in pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-5 bg-ds-surface border border-ds-border rounded hover:border-brand/30 transition-all group">
      <h2 class="font-semibold text-ds-text group-hover:text-brand transition-colors mb-1">{{ page.title }}</h2>
      <p class="text-sm text-ds-muted line-clamp-2">{{ page.description }}</p>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
