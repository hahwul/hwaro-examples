<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to the pours</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="site-wordmark">
        Tabloid<span class="site-wordmark__dot" aria-hidden="true">.</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="visually-hidden">Menu</span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/pours/">Pours</a>
        <a href="{{ base_url }}{{ lang_prefix }}/categories/">Styles</a>
        <a href="{{ base_url }}{{ lang_prefix }}/tags/">Tags</a>
        <a href="{{ base_url }}{{ lang_prefix }}/about/">About</a>
        <a href="{{ base_url }}{{ lang_prefix }}/search/" class="site-nav__search">Search</a>
      </nav>
    </div>
  </header>
