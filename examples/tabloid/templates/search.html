{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="section-band">
      <p class="section-band__kicker">Find A Pour</p>
      <h1 class="section-band__title">{{ page.title | e }}</h1>
      {% if page.description %}<p class="section-band__intro">{{ page.description | e }}</p>{% endif %}
    </header>

    <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="search-label" for="search-input">Search reviews and rooms</label>
      <input class="search-input" id="search-input" type="search" name="q" placeholder="hazy, cask ale, barleywine&hellip;" autocomplete="off" autofocus>
    </form>
    <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
    <ul class="pour-grid pour-grid--search" id="search-results"></ul>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
