<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f7f4;
            --text: #444;
            --accent: #999;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            margin: 0;
            line-height: 2;
            text-align: center;
        }
        .chapbook-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 60px;
            background: #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border-radius: 2px;
            border-left: 2px solid #e0ddd5;
            min-height: 80vh;
        }
        header {
            padding-bottom: 40px;
            border-bottom: 1px solid #eee;
            margin-bottom: 40px;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 15px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .chap-hero { padding: 40px 0; }
        .chap-hero h1 {
            font-size: 2.5rem;
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: var(--text);
        }
        article { font-size: 1.1rem; }
        h2 { font-size: 1.5rem; font-weight: 400; color: var(--accent); font-style: italic; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="chapbook-container">
    <header>
        <div class="logo">CHAPBOOK</div>
        <nav>
            <a href="/">Poem</a>
            <a href="/about">Stanza</a>
        </nav>
    </header>
