{% extends "base.html" %}

{% block content %}
<article class="glass-panel content">
  <h1>{{ page.title | escape }}</h1>
  {% if page.date %}
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: -1rem; margin-bottom: 2rem;">{{ page.date | date("%B %d, %Y") }}</p>
  {% endif %}
  {{ content | safe }}
</article>
{% endblock %}
