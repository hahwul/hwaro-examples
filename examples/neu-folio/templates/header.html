<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f0f0;
            --text: #1a1a1a;
            --accent: #555;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .folio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
        }
        .folio-item {
            background: var(--bg);
            aspect-ratio: 1;
            border-radius: 20px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
        }
        .folio-hero {
            padding: 80px 0;
            text-align: center;
        }
        .folio-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 4px;
            box-shadow: inset 10px 10px 30px var(--shadow), inset -10px -10px 30px var(--highlight);
            margin-top: 60px;
            margin-bottom: 100px;
        }
        h2 { font-weight: 600; font-size: 2.2rem; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">neu.folio</div>
        <nav>
            <a href="/">Works</a>
            <a href="/about">Process</a>
        </nav>
    </header>
