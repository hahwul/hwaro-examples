<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,700;1,700&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --text: #2d3748;
            --accent: #3182ce;
            --border: #cbd5e1;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .vade-container {
            max-width: 650px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        header {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        nav a:hover { color: var(--accent); }
        .vade-hero {
            background: #e2e8f0;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .vade-hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            margin: 0;
            color: var(--text);
        }
        article { padding-bottom: 40px; }
        h2 { font-family: 'Crimson Pro', serif; font-size: 1.5rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 30px; }
        .reference-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .reference-table th, .reference-table td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }
        .reference-table th { background: #f8fafc; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>
    <div class="vade-container">
    <header>
        <div class="logo">VADEMECUM</div>
        <nav>
            <a href="/">Manual</a>
            <a href="/about">Index</a>
        </nav>
    </header>
