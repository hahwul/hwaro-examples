<!-- header.html -->
<!DOCTYPE html>
<html lang="{{ site.language | default(value='en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ highlight_tags | safe }}
    {{ auto_includes | safe }}
</head>
<body>
    <header class="glass-container" style="margin-top: 1rem; margin-bottom: 1rem; padding: 1rem;">
        <h1><a href="{{ base_url }}/" style="color: white; text-decoration: none;">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/posts/">Posts</a>
            <a href="{{ base_url }}/about/">About</a>
            <a href="#" id="searchBtn">Search</a>
        </nav>
    </header>
    <main class="glass-container">
