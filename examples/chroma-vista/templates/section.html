<!-- section.html -->
{% include "header.html" %}
<h1>{{ section.title | e }}</h1>
<ul style="list-style: none; padding: 0;">
    {% for p in section.pages %}
    <li style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border);">
        <h2 style="margin: 0 0 0.5rem 0;"><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        {% if p.date is defined %}<div class="post-meta">{{ p.date | date(format="%Y-%m-%d") }}</div>{% endif %}
        <p>{{ p.description | default(value="") }}</p>
    </li>
    {% endfor %}
</ul>
{% include "footer.html" %}
