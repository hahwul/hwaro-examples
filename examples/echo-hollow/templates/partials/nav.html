<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo">
      ECHO HOLLOW
      <span class="sound-wave" aria-hidden="true" style="margin-left:6px;">
        <span class="bar" style="height:4px;"></span>
        <span class="bar" style="height:9px;"></span>
        <span class="bar" style="height:14px;"></span>
        <span class="bar" style="height:7px;"></span>
      </span>
    </a>
    <nav>
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">Recordings</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">The Archive</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">The Chamber</a>
    </nav>
    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}
      <button class="search-trigger" onclick="openSearch()" title="Search the echoes">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
        <kbd>&#8984;K</kbd>
      </button>
    </div>
  </div>
</header>
