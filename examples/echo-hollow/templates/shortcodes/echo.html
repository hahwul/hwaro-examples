{# Echo shortcode: renders text with accumulating visual echo layers #}
{# Usage: echo(text="...", count=3)  #}
<div class="echo-block echo-chamber">
  <div class="echo-text">
    <span class="original-voice">{{ text | default(body) | e }}</span>
    <span class="layer" style="opacity:0.17; left:3px;">{{ text | default(body) | e }}</span>
    <span class="layer" style="opacity:0.10; left:7px;">{{ text | default(body) | e }}</span>
    <span class="layer" style="opacity:0.05; left:12px;">{{ text | default(body) | e }}</span>
  </div>
</div>
