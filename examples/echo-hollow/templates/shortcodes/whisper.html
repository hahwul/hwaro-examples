{# Whisper shortcode — faint, distant, decaying repetitions #}
{# Usage: whisper(message="...")  #}
<div class="whisper">
  {% set msg = message | default(body) | e %}
  <span class="reverb">{{ msg }}</span>
  <span class="echo-layer" style="opacity:0.35; margin-left:4px;">{{ msg }}</span>
  <span class="echo-layer" style="opacity:0.15; margin-left:9px;">{{ msg }}</span>
</div>
