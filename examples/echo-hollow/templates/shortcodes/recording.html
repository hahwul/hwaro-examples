{# Recording chrome shortcode — frames content as decaying analog tape #}
{# Usage: recording(title="...", body="...")  #}
<div class="recording-meta" style="margin-top:1.6rem; margin-bottom:0.9rem;">
  <span><span class="rec-dot"></span> REC</span>
  <span>{{ title | default("UNLABELED REEL") | e }}</span>
  <span>{{ duration | default("∞") }}</span>
</div>
<div class="post-content" style="padding-left:0.4rem; border-left:1px dotted var(--border);">
  {{ body | safe }}
</div>
