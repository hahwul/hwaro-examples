{% include "header.html" %}

<section class="taxonomy-list">
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <p class="text-muted">Browse by {{ taxonomy_name }}</p>

  <ul class="tag-cloud">
    {% for term in taxonomy_terms %}
    <li>
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="tag">
        {{ term.name }} ({{ term.count }})
      </a>
    </li>
    {% endfor %}
  </ul>
</section>

{% include "footer.html" %}
