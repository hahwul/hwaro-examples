{% extends "base.html" %}

{% block title %}{{ page.title | e }} | {{ site.title }}{% endblock %}

{% block content %}
<div class="glass-panel">
    <h1>{{ page.title | e }}</h1>

    <div class="tags-container" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
        {% for term in terms %}
        <a href="{{ term.url }}" class="btn" style="text-transform: capitalize;">
            {{ term.name }} ({{ term.pages | length }})
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
