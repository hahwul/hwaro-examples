{% include "header.html" %}

<article class="glass-panel">
    <div class="article-content">
        <header class="article-header">
            <h1 class="article-title">{{ page.title | e }}</h1>
        </header>

        <ul class="taxonomy-list">
            {% for term in terms %}
                <li>
                    <a href="{{ term.path }}">{{ term.name | e }}</a> ({{ term.pages | length }})
                </li>
            {% endfor %}
        </ul>
    </div>
</article>
