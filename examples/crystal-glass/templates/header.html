<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
    {% if page.description is defined %}
    <meta name="description" content="{{ page.description | e }}">
    {% else %}
    <meta name="description" content="{{ site.description | e }}">
    {% endif %}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    {{ auto_includes | safe }}
</head>
<body>
    <header class="site-header glass-panel">
        <div class="header-inner">
            <a href="{{ base_url }}/" class="site-title">{{ site.title | e }}</a>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/posts/">Blog</a>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
