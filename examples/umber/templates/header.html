<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#12100e">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Umber home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="7" fill="currentColor"/>
          <g fill="var(--bg)">
            <rect x="4" y="15" width="3" height="6"/>
            <rect x="9" y="10" width="3" height="16"/>
            <rect x="14" y="4" width="3" height="24"/>
            <rect x="19" y="11" width="3" height="12"/>
            <rect x="24" y="13.5" width="3" height="7"/>
          </g>
        </svg>
        <span>Umber</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/installations/"{% if page.section == "installations" %} aria-current="page"{% endif %}>Installations</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-label="Search the installations">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
