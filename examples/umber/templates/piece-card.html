<article class="piece-card">
  <a class="piece-card-link" href="{{ base_url }}{{ p.url }}">
    <p class="piece-kicker">{{ p.extra.format | e }} <span aria-hidden="true">·</span> {{ p.extra.venue | e }}</p>
    <h3 class="piece-title">{{ p.title | e }}</h3>
    <svg class="piece-wave" viewBox="0 0 48 40" preserveAspectRatio="none" role="img" aria-labelledby="wave-title-{{ p.title | slugify }}">
      <title id="wave-title-{{ p.title | slugify }}">Amplitude waveform of the finished mix for {{ p.title | e }}</title>
      {% for v in p.extra.wave %}
      <rect x="{{ loop.index0 }}" y="{{ (40 - v) / 2 }}" width="0.68" height="{{ v }}"></rect>
      {% endfor %}
    </svg>
    {% if p.summary %}<p class="piece-summary">{{ p.summary | strip_html | truncate_words(26) }}</p>{% endif %}
    <p class="piece-meta">
      {% if p.date %}<time datetime="{{ p.date }}">{{ p.date | date("%b %Y") }}</time> <span aria-hidden="true">·</span> {% endif %}
      {{ p.extra.duration | e }} <span aria-hidden="true">·</span> {{ p.extra.topology | e }}
    </p>
    <span class="piece-link-label">Read the mix notes<span aria-hidden="true"> →</span></span>
  </a>
</article>
