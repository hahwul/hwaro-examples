title = "Umber"
description = "Sound design for planetariums and museum halls, mapped speaker by speaker"
base_url = "http://localhost:3000"   # CI overrides with --base-url; never hardcode production URLs

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]           # no binary raster assets

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[og]
type = "article"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
