<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <style>
    :root {
      --bg: #0A0A0C;
      --bg-card: #121214;
      --bg-header: #000000;
      --text: #F8F8F2;
      --text-muted: #8B8B8B;
      --border: #2A2A2E;
      --critical: #FF3B30;
      --warning: #FF9F0A;
      --info: #0A84FF;
      --success: #30D158;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    
    body { 
      font-family: var(--font-sans); 
      line-height: 1.5; 
      margin: 0; 
      color: var(--text); 
      background: var(--bg); 
      -webkit-font-smoothing: antialiased;
    }

    .site-wrapper { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 0 1.5rem; 
    }

    .site-header { 
      padding: 1.5rem 0; 
      border-bottom: 2px solid var(--border); 
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-logo { 
      font-family: var(--font-mono);
      font-weight: 700; 
      font-size: 1.5rem; 
      color: var(--text); 
      text-decoration: none; 
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--success);
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 0; /* Square for more technical feel */
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { 
      color: var(--text-muted); 
      text-decoration: none; 
      font-size: 0.85rem; 
      font-family: var(--font-mono);
      text-transform: uppercase;
    }
    .site-header nav a:hover { color: var(--text); }

    .site-main { min-height: calc(100vh - 300px); }

    h1, h2, h3 { 
      font-family: var(--font-mono);
      margin-top: 2em; 
      margin-bottom: 0.5em; 
      font-weight: 600; 
      letter-spacing: -0.02em;
    }
    h1 { font-size: 2rem; margin-top: 0; }
    
    a { color: var(--info); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Alert List */
    .alert-feed {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .alert-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.25rem;
      position: relative;
    }

    .alert-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--info);
    }

    .alert-item.critical::before { background: var(--critical); }
    .alert-item.warning::before { background: var(--warning); }
    .alert-item.info::before { background: var(--info); }

    .alert-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .alert-timestamp { color: var(--text-muted); }
    .alert-level { font-weight: bold; text-transform: uppercase; }
    
    .critical .alert-level { color: var(--critical); }
    .warning .alert-level { color: var(--warning); }
    .info .alert-level { color: var(--info); }

    .alert-title {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      display: block;
      color: var(--text);
    }

    .alert-summary {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0;
    }

    /* Details Toggle - Using HTML <details> for simplicity & elegance */
    details summary {
      cursor: pointer;
      list-style: none;
      outline: none;
    }
    details summary::-webkit-details-marker { display: none; }

    .alert-content {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
    }

    /* Footer */
    .site-footer { 
      margin-top: 4rem; 
      padding: 2rem 0; 
      border-top: 1px solid var(--border); 
      color: var(--text-muted); 
      font-size: 0.75rem; 
      font-family: var(--font-mono);
      text-transform: uppercase;
      text-align: center; 
    }

    /* Code & Pre */
    code { 
      background: #1E1E1E; 
      padding: 0.2rem 0.4rem; 
      font-family: var(--font-mono); 
      font-size: 0.85em; 
      color: var(--warning);
    }
    pre { 
      background: #1E1E1E; 
      padding: 1.5rem; 
      overflow-x: auto; 
      border: 1px solid var(--border); 
    }
    pre code { background: none; padding: 0; color: inherit; }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .site-header nav { gap: 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div>
        <a href="{{ base_url }}/" class="site-logo">BEACON</a>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>System Active</span>
        </div>
      </div>
      <nav>
        <a href="{{ base_url }}/">Feed</a>
        <a href="{{ base_url }}/about/">Protocol</a>
      </nav>
    </header>
    <main class="site-main">
