<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #0ff;
      --secondary: #f0f;
      --text: #e0e0e0;
      --text-muted: #8892b0;
      --border: #1e1e24;
      --bg: #0a0a0f;
      --bg-subtle: #121218;
      --glow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .site-logo { font-weight: 700; font-size: 1.2rem; color: var(--primary); text-decoration: none; text-transform: uppercase; text-shadow: var(--glow); letter-spacing: 2px; }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 1.25rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s ease; }
    .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px rgba(255, 0, 255, 0.5); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; color: var(--text); text-transform: uppercase; }
    h1 { font-size: 1.75rem; margin-top: 0; text-shadow: var(--glow); }
    h2 { font-size: 1.35rem; color: var(--primary); }
    h3 { font-size: 1.1rem; }
    p { margin: 1em 0; color: #a0a0a0; }
    a { color: var(--primary); text-decoration: none; transition: all 0.2s; }
    a:hover { color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
    code { background: var(--bg-subtle); padding: 0.15rem 0.4rem; border-radius: 2px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; color: var(--secondary); border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); border-left: 4px solid var(--primary); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; color: var(--text); border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.75rem; padding: 0.75rem 1rem; background: var(--bg-subtle); border-radius: 4px; border: 1px solid var(--border); border-left: 3px solid var(--primary); transition: all 0.2s; }
    ul.section-list li:hover { border-color: var(--primary); box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1); transform: translateX(5px); }
    ul.section-list li a { font-weight: 600; display: block; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }
    nav.pagination { margin: 1.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--primary); background: color-mix(in srgb, var(--primary) 12%, transparent); }
    .pagination-disabled span { display: inline-block; padding: 0.25rem 0.55rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.6; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
