<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% elif section %}{{ section.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f8;
      --text: #111111;
      --text-secondary: #555555;
      --text-muted: #888888;
      --border: #d0d0d0;
      --border-light: #e5e5e5;
      --accent: #c41e1e;
      --accent-bg: #c41e1e;
      --accent-text: #ffffff;
      --urgent-bg: #b35900;
      --tag-bg: #eaeaea;
      --tag-text: #444444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--text); text-decoration: none; }
    a:hover { color: var(--accent); }

    .masthead {
      border-bottom: 3px solid var(--text);
      padding: 20px 0 16px;
    }
    .masthead-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .masthead-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }
    .masthead h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }
    .masthead h1 a { color: var(--text); }
    .masthead h1 a:hover { color: var(--text); }
    .wire-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .masthead-rule {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0 0;
    }

    .site-nav {
      border-bottom: 1px solid var(--border-light);
      background: var(--bg);
    }
    .site-nav-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .site-nav a {
      display: block;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .site-nav a:hover {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .ticker-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      padding: 8px 0;
    }
    .ticker-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .ticker-label {
      background: var(--accent-bg);
      color: var(--accent-text);
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .site-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .wire-feed { list-style: none; }
    .wire-item {
      border-bottom: 1px solid var(--border-light);
      padding: 18px 0;
    }
    .wire-item:first-child { padding-top: 24px; }
    .wire-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .wire-timestamp {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .wire-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 1px 6px;
      background: var(--tag-bg);
      color: var(--tag-text);
    }
    .wire-badge--breaking {
      background: var(--accent-bg);
      color: var(--accent-text);
    }
    .wire-badge--urgent {
      background: var(--urgent-bg);
      color: #ffffff;
    }
    .wire-headline {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }
    .wire-headline a { color: var(--text); }
    .wire-headline a:hover { color: var(--accent); }
    .wire-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .article {
      padding: 32px 0 48px;
    }
    .article-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .article-header h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .article-dateline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .article-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .article-tags a {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      background: var(--tag-bg);
      color: var(--tag-text);
    }
    .article-tags a:hover {
      background: var(--text);
      color: var(--bg);
    }

    .prose { max-width: 640px; }
    .prose p { margin-bottom: 16px; }
    .prose h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 32px 0 12px;
      letter-spacing: -0.2px;
    }
    .prose h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 24px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .prose ul, .prose ol {
      margin: 0 0 16px 20px;
    }
    .prose li { margin-bottom: 4px; }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      margin: 20px 0;
      padding: 12px 20px;
      color: var(--text-secondary);
      font-style: italic;
    }
    .prose code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--bg-secondary);
      padding: 2px 5px;
    }
    .prose pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .prose pre code { background: none; padding: 0; }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .prose strong { font-weight: 700; }
    .prose p:first-of-type {
      font-size: 16px;
      line-height: 1.55;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 24px 0 48px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pagination a {
      color: var(--text-secondary);
      padding: 6px 14px;
      border: 1px solid var(--border);
    }
    .pagination a:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .pagination .current {
      color: var(--text-muted);
    }

    .taxonomy-page { padding: 32px 0 48px; }
    .taxonomy-page h1 {
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--text);
    }
    .taxonomy-list { list-style: none; }
    .taxonomy-list li {
      display: inline-block;
      margin: 0 8px 8px 0;
    }
    .taxonomy-list a {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      display: block;
    }
    .taxonomy-list a:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .site-footer {
      border-top: 3px solid var(--text);
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
    }
    .site-footer-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .error-page {
      text-align: center;
      padding: 80px 24px;
    }
    .error-page h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .error-page p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    @media (max-width: 600px) {
      .masthead h1 { font-size: 22px; }
      .masthead-top { flex-direction: column; gap: 4px; }
      .site-nav-inner { gap: 16px; }
      .wire-headline { font-size: 16px; }
      .article-header h1 { font-size: 22px; }
    }
  </style>
  {{ highlight_css }}
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-top">
        <h1><a href="{{ base_url }}/">Telegraph Wire</a></h1>
        <span class="wire-label">Real-Time News Service</span>
      </div>
      <hr class="masthead-rule">
    </div>
  </header>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="{{ base_url }}/">Wire</a>
      <a href="{{ base_url }}/posts/">Archive</a>
      <a href="{{ base_url }}/tags/">Topics</a>
      <a href="{{ base_url }}/about/">About</a>
    </div>
  </nav>
  <main class="site-main">
