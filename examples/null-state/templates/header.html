<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% elif section.title %}{{ section.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ base_url }}/css/style.css">
{{ og_all_tags | safe }}
{{ canonical_tag | safe }}
</head>
<body>
<div class="stamp"><span class="blink"></span>STATUS · ONLINE · {{ current_date }}</div>
<div class="frame">
<header class="head">
  <span class="id">/ NULL-STATE</span>
  <nav>
    <a href="{{ base_url }}/">[ index ]</a>
    <a href="{{ base_url }}/work/">[ work ]</a>
    <a href="{{ base_url }}/about/">[ about ]</a>
    <a href="{{ base_url }}/tags/">[ tags ]</a>
  </nav>
  <span>v0.14 · build · {{ current_year }}</span>
</header>
