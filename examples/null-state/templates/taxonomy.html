{% include "header.html" %}
<div class="label" style="margin-top:48px;"><h2>/ {{ taxonomy_name | lower }}</h2><span class="ord">{{ taxonomy_terms | length }} terms</span></div>
<div class="tag-cloud">
  {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name }} · {{ term.pages | length }}</a>
  {% endfor %}
</div>
