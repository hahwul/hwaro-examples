<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0f2fe;
            --text: #0c4a6e;
            --accent: #0ea5e9;
            --glass: rgba(255, 255, 255, 0.5);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .aqua-hero {
            padding: 100px 0;
            text-align: center;
        }
        .aqua-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">aqua.glass</div>
        <nav>
            <a href="/">Flow</a>
            <a href="/about">Ocean</a>
        </nav>
    </header>
