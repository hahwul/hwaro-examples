title = "Phosphor"
description = "Bioluminescent visions from the deep"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["gallery"]

[markdown]
safe = false
