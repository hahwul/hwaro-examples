<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(site.title) }}</title>
  {% if site.description %}<meta name="description" content="{{ site.description }}">{% endif %}
  <style>
    :root {
      --bg-color: #0f0c29;
      --bg-gradient: linear-gradient(to right, #24243e, #302b63, #0f0c29);
      --text-main: #f1f1f1;
      --text-muted: #a0a0b0;
      --neon-blue: #00f0ff;
      --neon-pink: #ff007f;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-glow: rgba(0, 240, 255, 0.2);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-attachment: fixed;
    }

    /* Starry effect */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
      background-size: 550px 550px, 350px 350px, 250px 250px;
      background-position: 0 0, 40px 60px, 130px 270px;
      z-index: -1;
      opacity: 0.3;
    }

    header {
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    nav {
      margin-top: 1rem;
    }

    nav a {
      color: var(--text-main);
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
      transition: color 0.3s, text-shadow 0.3s;
    }

    nav a:hover {
      color: var(--neon-pink);
      text-shadow: 0 0 10px var(--neon-pink);
    }

    main {
      flex: 1;
      max-width: 800px;
      margin: 3rem auto;
      padding: 2rem;
      width: 90%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 0 0 20px var(--glass-glow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    h1, h2, h3 {
      color: var(--neon-blue);
    }

    a {
      color: var(--neon-pink);
      text-decoration: none;
      transition: text-shadow 0.3s;
    }

    a:hover {
      text-shadow: 0 0 8px var(--neon-pink);
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .glass-panel {
      padding: 1.5rem;
      margin: 2rem 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .glass-panel h3 {
      margin-top: 0;
      color: var(--neon-pink);
    }

    .neon-button {
      display: inline-block;
      padding: 10px 25px;
      margin-top: 15px;
      border: 1px solid var(--neon-blue);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      box-shadow: 0 0 10px var(--neon-blue) inset, 0 0 10px var(--neon-blue);
      transition: all 0.3s ease;
    }

    .neon-button:hover {
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 20px var(--neon-blue) inset, 0 0 20px var(--neon-blue);
    }

    code {
      background: rgba(0,0,0,0.5);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      color: var(--neon-pink);
    }

    pre code {
      display: block;
      padding: 1rem;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
    }

    /* Taxonomy Styles */
    .taxonomy-desc {
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 2rem;
    }
    .section-list {
      list-style: none;
      padding: 0;
    }
    .section-list li {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--glass-border);
    }

  </style>
</head>
<body>
  <header>
    <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
    <nav>
      <a href="{{ base_url }}">Home</a>
      <a href="{{ base_url }}about/">About</a>
      <a href="{{ base_url }}tags/">Tags</a>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ site.title }}. Powered by Hwaro.</p>
  </footer>
</body>
</html>
