{% include "header.html" %}
  <div class="site-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="{{ base_url }}/" class="site-logo">
          <span class="logo-leaf"></span>
          <span class="logo-text">Bramble</span>
        </a>
        <nav class="site-nav">
          <a href="{{ base_url }}/posts/">Field Notes</a>
          <a href="{{ base_url }}/tags/">Archives</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
        <button class="search-toggle" aria-label="Search" onclick="openSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <kbd>Cmd+K</kbd>
        </button>
      </div>
    </header>

    <div class="search-overlay" id="searchOverlay">
      <div class="search-modal">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search field notes..." autocomplete="off">
          <kbd>ESC</kbd>
        </div>
        <ul id="searchResults" class="search-results"></ul>
      </div>
    </div>

    <main class="site-main">
    <article class="page-content">
      <header class="page-header">
        <h1>{{ page.title }}</h1>
      </header>
      {{ content }}
    </article>
{% include "footer.html" %}
