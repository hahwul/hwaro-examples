<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg-color: #FFF5E1; /* Off-white paper */
    --riso-blue: #0078BF;
    --riso-red: #FF4C65;
    --riso-yellow: #FFE800;
    --riso-black: #1A1A1A;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: 'Courier New', Courier, monospace;
    line-height: 1.6;
    margin: 0;
    color: var(--riso-black);
    background-color: var(--bg-color);
  }

  /* Riso print effect via mix-blend-mode */
  .riso-layer-blue { color: var(--riso-blue); mix-blend-mode: multiply; }
  .riso-layer-red { color: var(--riso-red); mix-blend-mode: multiply; }
  .riso-layer-yellow { color: var(--riso-yellow); mix-blend-mode: multiply; }

  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem; position: relative; }

  /* Simulating slight registration offset */
  .site-header {
    border-bottom: 3px solid var(--riso-blue);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
    position: relative;
  }
  .site-header::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 2px;
    width: 100%;
    height: 3px;
    background-color: var(--riso-red);
    mix-blend-mode: multiply;
    z-index: -1;
  }

  .site-logo {
    font-weight: bold;
    font-size: 2rem;
    color: var(--riso-black);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .site-logo:hover { color: var(--riso-blue); }

  .site-header nav { display: flex; gap: 1.5rem; margin-top: 1rem; }
  .site-header nav a {
    color: var(--riso-red);
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1rem;
    text-transform: uppercase;
  }
  .site-header nav a:hover { color: var(--riso-blue); }

  .site-main { min-height: 60vh; }

  /* Halftone-like background pattern */
  .halftone-bg {
    background-image: radial-gradient(var(--riso-yellow) 20%, transparent 20%);
    background-size: 10px 10px;
    padding: 2rem;
    margin: 2rem 0;
    border: 2px solid var(--riso-black);
  }

  .site-footer {
    margin-top: 4rem;
    padding: 2rem 0;
    border-top: 3px dashed var(--riso-blue);
    color: var(--riso-black);
    text-align: center;
    font-weight: bold;
  }

  h1, h2, h3 {
    line-height: 1.2;
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    font-weight: 900;
    text-transform: uppercase;
  }
  h1 { font-size: 2.5rem; color: var(--riso-blue); mix-blend-mode: multiply; position: relative; }
  h1::before {
    content: attr(data-text);
    position: absolute;
    left: -3px;
    top: 3px;
    color: var(--riso-red);
    z-index: -1;
    mix-blend-mode: multiply;
  }
  h2 { font-size: 1.8rem; color: var(--riso-red); }
  p { margin: 1.2em 0; font-size: 1.1rem; }
  a { color: var(--riso-blue); text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; }
  a:hover { color: var(--riso-red); }

  @media (max-width: 600px) {
    .site-wrapper { padding: 1rem; }
    h1 { font-size: 2rem; }
  }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Risograph Print</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
