<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000c1f;
            --text: #ffffff;
            --accent: #00eaff;
            --secondary: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 30px 0;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Bungee', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .thunder-hero {
            padding: 100px 0;
            text-align: center;
            background: linear-gradient(180deg, #000c1f 0%, #001a3d 100%);
            border-bottom: 10px solid var(--accent);
        }
        .thunder-hero h1 {
            font-family: 'Bungee', cursive;
            font-size: 10vw;
            line-height: 0.8;
            margin: 0;
            color: var(--secondary);
            text-shadow: 0 0 20px var(--accent);
        }
        .thunder-sub {
            font-size: 1.5rem;
            margin-top: 40px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
        }
        article {
            padding: 80px 0;
        }
        h2 { font-family: 'Bungee', cursive; font-size: 3rem; color: var(--accent); }
        .flash-card {
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 40px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">THUNDER//BOLT</div>
            <nav>
                <a href="/">Static</a>
                <a href="/about">Discharge</a>
            </nav>
        </div>
    </header>
