{% extends "base.html" %}
{% block content %}
<div class="section-content">
    {{ content | safe }}
</div>
<ul class="post-list">
    {% for post in section.pages %}
    <li class="post-item">
        <h2 class="post-title"><a href="{{ post.path }}">{{ post.title }}</a></h2>
        {% if post.description is present %}
        <p>{{ post.description }}</p>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock content %}
