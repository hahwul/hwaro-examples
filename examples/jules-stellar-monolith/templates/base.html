<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is present %}{{ page.title }} - {% endif %}{{ site_title }}</title>
    <meta name="description" content="{% if page.description is present %}{{ page.description | e }}{% endif %}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ highlight_tags | safe }}
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="site-title">{{ site_title }}</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock content %}
        </main>
        <footer>
            <p>&copy; 2024 {{ site_title }}. All rights reserved.</p>
            {{ highlight_js }}
            {{ auto_includes_js }}
        </footer>
    </div>
</body>
</html>
