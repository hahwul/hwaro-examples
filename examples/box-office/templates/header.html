<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rubik:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="box-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Box Office home">
        <svg viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <rect x="2" y="6" width="52" height="28" fill="#c41e3a" stroke="#0a0a0a" stroke-width="2"/>
          <circle cx="36" cy="6" r="2" fill="#fffbe6"/>
          <circle cx="36" cy="14" r="2" fill="#fffbe6"/>
          <circle cx="36" cy="22" r="2" fill="#fffbe6"/>
          <circle cx="36" cy="30" r="2" fill="#fffbe6"/>
          <circle cx="36" cy="34" r="2" fill="#fffbe6"/>
          <text x="18" y="27" font-family="Archivo Black, sans-serif" font-size="14" fill="#fffbe6" text-anchor="middle">OUT</text>
        </svg>
        <span class="logo-text">BOX OFFICE</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">SALE</a>
        <a href="{{ base_url }}/tiers/">TIERS</a>
        <a href="{{ base_url }}/faq/">FAQ</a>
        <a href="{{ base_url }}/resale/">RESALE</a>
      </nav>
    </header>
