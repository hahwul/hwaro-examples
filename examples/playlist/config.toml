title = "Playlist"
description = "A music collection and playlist showcase with album art grids, track listings, and a dark listening-room aesthetic."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp", "avif"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = true
per_page = 9

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true
rules = [{ user_agent = "*", disallow = [] }]

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["playlists"]

[markdown]
safe = false
lazy_loading = true
