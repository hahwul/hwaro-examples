<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f0;
            --text-color: #1a1a1a;
            --accent-color: #3b4252;
            --border-color: #d8d3c8;
            --muted-color: #7b7f87;

            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: minmax(1rem, 1fr) minmax(auto, 800px) minmax(1rem, 1fr);
            gap: 2rem;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        header, main, footer {
            grid-column: 2;
        }

        header {
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .site-title {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--text-color);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            font-weight: 400;
            color: var(--text-color);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        h1 {
            font-size: 3rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 2rem;
            margin-top: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }

        a {
            color: var(--text-color);
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        a:hover {
            text-decoration-thickness: 2px;
        }

        .meta {
            font-size: 0.85rem;
            color: var(--muted-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
            display: block;
        }

        .content-box {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }

        .item-list {
            list-style: none;
        }

        .item-list li {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .item-title {
            font-size: 1.5rem;
            font-family: var(--font-serif);
            margin-bottom: 0.5rem;
        }

        .item-title a {
            text-decoration: none;
        }

        .item-title a:hover {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted-color);
            text-align: center;
        }

        /* Blocks for specialized content */
        blockquote {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.25rem;
            border-left: 3px solid var(--accent-color);
            padding-left: 1.5rem;
            margin: 2rem 0;
            color: var(--accent-color);
        }

        code {
            font-family: 'Inter', monospace;
            background-color: #eae7df;
            padding: 0.2em 0.4em;
            font-size: 0.9em;
        }

        pre code {
            display: block;
            padding: 1.5rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            overflow-x: auto;
            border-radius: 0;
            margin: 1.5rem 0;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 3rem 0;
        }

    </style>
</head>
<body>

    <header>
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; {{ now() | date("%Y") }} {{ site.title }}. Built with Hwaro.
    </footer>

</body>
</html>
