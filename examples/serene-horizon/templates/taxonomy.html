{% extends "base.html" %}

{% block content %}
<div class="content-box">
    <h1>{{ taxonomy_name | capitalize }}</h1>

    <ul class="item-list">
        {% for term in taxonomy_terms %}
        <li>
            <h2 class="item-title"><a href="{{ term.permalink }}">{{ term.name }}</a></h2>
            <span class="meta">{{ term.pages | length }} items</span>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
