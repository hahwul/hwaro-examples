<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');

    :root {
      --lava-black: #050505;
      --lava-dark: #120a05;
      --lava-red: #ff3300;
      --lava-orange: #ff6600;
      --lava-yellow: #ffcc00;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --bg: var(--lava-black);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Lava Animation Background Container */
    .lava-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--lava-black);
      filter: blur(20px) contrast(1.5);
      pointer-events: none;
    }

    /* Organic Shapes */
    .lava-blob {
      position: absolute;
      background: linear-gradient(135deg, var(--lava-red), var(--lava-orange), var(--lava-yellow));
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.8;
      animation: shift 20s infinite alternate ease-in-out;
    }

    .blob1 {
      width: 40vw;
      height: 40vw;
      top: -10vw;
      left: -10vw;
      animation-duration: 25s;
    }

    .blob2 {
      width: 50vw;
      height: 40vw;
      bottom: -15vw;
      right: -10vw;
      background: linear-gradient(135deg, var(--lava-orange), var(--lava-red));
      animation-duration: 30s;
      animation-delay: -5s;
    }

    .blob3 {
      width: 35vw;
      height: 35vw;
      top: 30vh;
      left: 20vw;
      background: linear-gradient(135deg, var(--lava-yellow), var(--lava-orange));
      animation-duration: 20s;
      animation-delay: -10s;
    }

    .blob4 {
      width: 20vw;
      height: 20vw;
      top: 60vh;
      right: 30vw;
      background: linear-gradient(135deg, var(--lava-red), var(--lava-yellow));
      animation-duration: 15s;
      animation-delay: -15s;
    }

    @keyframes shift {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      }
      33% {
        transform: translate(10vw, -10vh) scale(1.1) rotate(45deg);
        border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
      }
      66% {
        transform: translate(-5vw, 15vh) scale(0.9) rotate(90deg);
        border-radius: 50% 50% 40% 60% / 40% 40% 60% 50%;
      }
      100% {
        transform: translate(15vw, 5vh) scale(1.05) rotate(135deg);
        border-radius: 40% 60% 50% 50% / 60% 40% 50% 40%;
      }
    }

    /* Content Overlay */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      background: rgba(5, 5, 5, 0.4);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      min-height: calc(100vh - 4rem);
      box-shadow: 0 0 40px rgba(255, 51, 0, 0.1);
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 102, 0, 0.3);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
      transition: text-shadow 0.3s ease;
    }

    .site-logo:hover {
      text-shadow: 0 0 20px rgba(255, 204, 0, 0.8), 0 0 30px rgba(255, 51, 0, 0.6);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-header nav a:hover {
      color: var(--lava-yellow);
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--lava-yellow);
      transition: width 0.3s ease;
      box-shadow: 0 0 8px var(--lava-yellow);
    }

    .site-header nav a:hover::after {
      width: 100%;
    }

    .site-main {
      min-height: calc(100vh - 350px);
    }

    .site-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 102, 0, 0.3);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.5em;
      font-weight: 700;
      color: var(--text);
    }
    h1 { font-size: 2.5rem; margin-top: 0; letter-spacing: -1px; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.3rem; }

    p { margin: 1.2em 0; font-size: 1.05rem; }

    a {
      color: var(--lava-orange);
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
    }
    a:hover {
      color: var(--lava-yellow);
      text-shadow: 0 0 8px rgba(255, 204, 0, 0.6);
    }

    /* Markdown Elements */
    code {
      background: rgba(255, 51, 0, 0.1);
      color: var(--lava-yellow);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'Space Grotesk', ui-monospace, monospace;
      border: 1px solid rgba(255, 102, 0, 0.2);
    }
    pre {
      background: rgba(0, 0, 0, 0.6);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid rgba(255, 102, 0, 0.2);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    blockquote {
      margin: 1.5em 0;
      padding: 1em 1.5em;
      border-left: 4px solid var(--lava-orange);
      background: linear-gradient(90deg, rgba(255, 102, 0, 0.1) 0%, transparent 100%);
      font-style: italic;
      border-radius: 0 8px 8px 0;
    }

    /* Components */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1.5rem;
    }

    ul.section-list li {
      padding: 1.5rem;
      background: rgba(18, 10, 5, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(255, 102, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    ul.section-list li::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: linear-gradient(to bottom, var(--lava-red), var(--lava-yellow));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 102, 0, 0.2);
      border-color: rgba(255, 102, 0, 0.5);
    }

    ul.section-list li:hover::before {
      opacity: 1;
    }

    ul.section-list li a {
      font-weight: 600;
      font-size: 1.3rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 1.5rem 1rem; margin: 1rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined %}{{ page.section }}{% endif %}">

  <div class="lava-background">
    <div class="lava-blob blob1"></div>
    <div class="lava-blob blob2"></div>
    <div class="lava-blob blob3"></div>
    <div class="lava-blob blob4"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
