{% include "header.html" %}
  <main class="site-main">
    <div style="margin-bottom: 2rem; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">
      {% if page is defined and page.date %}
        {{ page.date | date(format="%B %d, %Y") }}
      {% endif %}
    </div>
    <h1 style="margin-top: 0;">{% if page is defined %}{{ page.title | e }}{% endif %}</h1>
    <div class="content">
      {{ content | safe }}
    </div>
  </main>
{% include "footer.html" %}
