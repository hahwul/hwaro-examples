# =============================================================================
# Observatory - Site Configuration
# =============================================================================
# A deep space astronomy blog with celestial observation data

title = "Observatory"
description = "Deep space astronomy and celestial observation logs"
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "dracula"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/observatory-og.png"
type = "article"
twitter_card = "summary_large_image"

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "constellations"

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] }
]

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
