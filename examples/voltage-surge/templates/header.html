<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --text: #ffffff;
            --accent: #ffdf00;
            --secondary: #ff8c00;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 30px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        nav a:hover { opacity: 1; color: var(--accent); }
        .surge-hero {
            padding: 120px 0;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
            background: linear-gradient(90deg, #1a1a1c 0%, #0a0a0b 100%);
            margin-top: 40px;
        }
        .surge-hero h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -4px;
        }
        .voltage-indicator {
            font-family: 'JetBrains Mono', monospace;
            color: var(--secondary);
            font-size: 1rem;
            margin-bottom: 20px;
        }
        article {
            padding: 80px 0;
            max-width: 800px;
        }
        h2 { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        pre { background: #1a1a1c; padding: 20px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">VOLTAGE//SURGE</div>
            <nav>
                <a href="/">Circuitry</a>
                <a href="/about">Ampere</a>
            </nav>
        </div>
    </header>
