<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  <!-- RITUAL FONTS: Blackletter / Brutal grotesque + readable body via CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;700&family=Spectral:wght@400;600&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

  <!-- MONSTER OCCULT BRUTALIST STYLESHEET -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ og_all_tags }}
  {{ hreflang_tags }}
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <!-- THE ALTAR / STONE LINTEL -->
    <header class="site-header">
      <div class="ash-layer" aria-hidden="true">
        <!-- CSS-driven ash/smoke particles (multiple delayed) -->
        <span class="ash-particle" style="left:12%; animation-duration:2.8s; animation-delay:-0.4s;"></span>
        <span class="ash-particle" style="left:23%; animation-duration:3.6s; animation-delay:-1.9s;"></span>
        <span class="ash-particle" style="left:31%; width:1.5px; height:1.5px; animation-duration:2.4s; animation-delay:-0.7s;"></span>
        <span class="ash-particle" style="left:41%; animation-duration:4.1s; animation-delay:-2.6s;"></span>
        <span class="ash-particle" style="left:54%; animation-duration:2.9s; animation-delay:-1.2s;"></span>
        <span class="ash-particle" style="left:66%; width:3px; height:3px; animation-duration:3.8s; animation-delay:-3.1s;"></span>
        <span class="ash-particle" style="left:78%; animation-duration:2.2s; animation-delay:-0.1s;"></span>
        <span class="ash-particle" style="left:87%; animation-duration:3.3s; animation-delay:-2.3s;"></span>
      </div>

      <div class="candle" aria-hidden="true"></div>

      <h1 class="ritual-title">THE RUPTURE</h1>
      <div class="ritual-subtitle">THE FINAL COVENANT • WRITTEN IN THE LANGUAGE OF BREAKING THINGS</div>

      <!-- THE 4 DIRECTIONS — NAV AS SEALS -->
      <nav class="nav-seals" aria-label="The Four Directions">
        <a href="{{ base_url }}/" class="seal">WITNESS</a>
        <a href="{{ base_url }}/posts/" class="seal">OFFERINGS</a>
        <a href="{{ base_url }}/about/" class="seal">THE BOOK</a>
        <a href="{{ base_url }}/tags/" class="seal">THE SEALS</a>
      </nav>
    </header>
