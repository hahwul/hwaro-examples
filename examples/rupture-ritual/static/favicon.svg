<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer protective circle / seal -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#b8973a" stroke-width="2.25"/>
  <!-- Inner blood ring -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="#6b1e1e" stroke-width="1.75"/>
  <!-- The Knife — vertical brutal blade -->
  <rect x="14.6" y="5" width="2.8" height="19" rx="0.3" fill="#e8dcc8"/>
  <!-- Blade tip (sharp) -->
  <polygon points="14.6,24 16,29.2 17.4,24" fill="#d4c8b0"/>
  <!-- Crossguard / hilt detail (brutal) -->
  <rect x="11.5" y="9.6" width="9" height="2.1" rx="0.2" fill="#9f2a2a"/>
  <!-- Handle end cap -->
  <rect x="13.8" y="3.6" width="4.4" height="2.8" rx="0.4" fill="#3a3329"/>
  <!-- Central void / rupture point -->
  <circle cx="16" cy="16" r="2.1" fill="#0a0a0a"/>
  <circle cx="16" cy="16" r="1.05" fill="#c9a227"/>
</svg>