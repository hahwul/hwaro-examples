{% include "header.html" %}
<main>
  <article>
    <section class="block">
      <div class="block-head">
        <h2>{{ page.title }}</h2>
        {% if page.date %}<div class="block-tag">{{ page.date | date("%b %d, %Y") }}</div>{% endif %}
      </div>
      {% if page.description %}<p style="text-align: center; font-family: 'JetBrains Mono', monospace; color: var(--gold); letter-spacing: 0.14em; text-transform: uppercase; font-size: 13px; margin: -24px 0 40px;">{{ page.description }}</p>{% endif %}
      <div class="prose" style="margin: 0 auto;">{{ content | safe }}</div>
    </section>
  </article>
</main>
{% include "footer.html" %}
