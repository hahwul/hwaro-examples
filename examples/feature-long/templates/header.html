<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --feature: #fcfcfc;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--feature);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.8;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: left;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .feature-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 100px;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #000; margin-top: 0; line-height: 1.1; }
        article { font-size: 1.3rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">feature.long</div>
            <nav>
                <a href="/">Read</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
