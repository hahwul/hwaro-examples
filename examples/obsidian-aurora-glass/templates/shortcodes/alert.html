<div class="glass-panel" style="padding: 1.5rem; margin: 2rem 0; border-left: 4px solid var(--aurora-cyan); background: rgba(0, 240, 255, 0.05);">
  {% if type %}
  <strong style="display: block; margin-bottom: 0.5rem; color: var(--aurora-cyan); text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.05em;">{{ type }}</strong>
  {% endif %}
  {{ content | safe }}
</div>
