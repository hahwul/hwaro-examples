<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if title %}{{ title }} | {% endif %}{{ site.title }}</title>
  {% if description %}
  <meta name="description" content="{{ description }}">
  {% elif site.description %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #020108;
      --bg-surface: rgba(15, 10, 25, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --text-main: #f0f4f8;
      --text-muted: #a0a8b8;

      --aurora-cyan: #00f0ff;
      --aurora-magenta: #ff0055;
      --aurora-purple: #8a2be2;

      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-dark);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Aurora Background */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-dark);
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--aurora-cyan) 0%, transparent 70%);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--aurora-magenta) 0%, transparent 70%);
      animation-delay: -5s;
    }

    .orb-3 {
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--aurora-purple) 0%, transparent 70%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(5%, 10%) scale(1.1); opacity: 0.6; }
      100% { transform: translate(-5%, -5%) scale(0.9); opacity: 0.4; }
    }

    /* Layout */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      padding: 4rem 0;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 3.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 2.2rem; }
    h3 { font-size: 1.5rem; }

    p { margin-bottom: 1.5rem; color: var(--text-muted); }
    a { color: var(--aurora-cyan); text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: #fff; }

    /* Glassmorphism Elements */
    .glass-panel {
      background: var(--bg-surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-panel:hover {
      border-color: var(--glass-highlight);
      transform: translateY(-5px);
      box-shadow: 0 12px 48px rgba(0, 240, 255, 0.1);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: #fff;
      font-family: var(--font-heading);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--aurora-cyan);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
      color: #fff;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2) 0%, rgba(138, 43, 226, 0.2) 100%);
      border-color: rgba(0, 240, 255, 0.3);
    }

    /* Header & Footer */
    header {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo::before {
      content: '';
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--aurora-cyan), var(--aurora-purple));
      box-shadow: 0 0 15px var(--aurora-cyan);
    }

    nav {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 500;
      position: relative;
    }

    nav a:hover {
      color: #fff;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--aurora-cyan);
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    footer {
      padding: 2rem 0;
      border-top: 1px solid var(--glass-border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      header { flex-direction: column; gap: 1.5rem; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora-orb orb-1"></div>
    <div class="aurora-orb orb-2"></div>
    <div class="aurora-orb orb-3"></div>
  </div>

  <div class="container">
    {% include "header.html" %}
    <main>
      {% block content %}{% endblock content %}
    </main>
    {% include "footer.html" %}
  </div>
</body>
</html>
