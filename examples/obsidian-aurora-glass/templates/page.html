{% extends "base.html" %}

{% block content %}
<article class="glass-panel">
  <h1>{{ page.title }}</h1>
  {% if page.date %}
    <p style="font-size: 0.9rem; margin-bottom: 2rem;">{{ page.date | date(format="%B %d, %Y") }}</p>
  {% endif %}
  <div class="content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
