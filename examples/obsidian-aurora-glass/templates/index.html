{% extends "base.html" %}

{% block content %}
<article class="glass-panel" style="text-align: center; padding: 4rem 2rem;">
  <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">{{ section.title | default(value=site.title) }}</h1>
  <p style="font-size: 1.2rem; margin-bottom: 2rem;">{{ section.description | default(value=site.description) }}</p>
  {% if section.content %}
    <div class="content" style="text-align: left; margin-top: 3rem;">
      {{ section.content | safe }}
    </div>
  {% endif %}
</article>
{% endblock content %}
