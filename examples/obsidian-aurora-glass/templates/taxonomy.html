{% extends "base.html" %}

{% block content %}
<section class="glass-panel">
  <h1>{{ taxonomy.name | capitalize }}</h1>
  <ul style="list-style: none; display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
    {% if terms is defined %}
    {% for term in terms %}
      <li>
        <a href="{{ term.url }}" class="btn">{{ term.name }} <span style="opacity: 0.6; font-size: 0.8em; margin-left: 0.5rem;">({{ term.pages | length }})</span></a>
      </li>
    {% endfor %}
    {% endif %}
  </ul>
</section>
{% endblock content %}
