# =============================================================================
# arXiv Preprint - Self-Published Preprint Paper
# Issue #1612 | Tags: paper, light, preprint, self-published, raw
# =============================================================================

title = "Sparse Gated Attention for Efficient Long-Context Transformers"
description = "A self-published preprint presenting Sparse Gated Attention (SGA), a novel attention mechanism for efficient long-context processing in transformers, with version control badges and submission status tracking."
base_url = "http://localhost:3000"

sections = ["sections"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[[taxonomies]]
name = "authors"

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
emoji = false

