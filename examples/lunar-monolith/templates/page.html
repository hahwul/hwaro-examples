{% extends "base.html" %}
{% block content %}
<div class="content-body" style="width: 100%; max-width: 800px; text-align: left;">
    <h1>{{ page.title | e }}</h1>
    <div class="meta">
        {% if page.date %}<time>{{ page.date | date("%Y-%m-%d") }}</time>{% endif %}
    </div>
    {{ content | safe }}
</div>
{% endblock %}
