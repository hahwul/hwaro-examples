{% include "header.html" %}

<div class="cockpit-panel p-6 md:p-10">
  <header class="border-b border-telemetry-green pb-6 mb-8 flex justify-between items-end">
    <div>
      <h1 class="text-3xl md:text-5xl font-bold uppercase tracking-tight text-white mb-2 shadow-[0_0_10px_rgba(255,255,255,0.2)]">
        SYSTEM INDEX: {{ taxonomy_name | upper }}
      </h1>
      <p class="text-xl text-telemetry-green mt-2 max-w-2xl">Classified categorization.</p>
    </div>
  </header>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 font-mono text-sm">
    {% for term in taxonomy_terms %}
      <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="cockpit-panel p-4 flex flex-col items-center justify-center text-center hover:bg-telemetry-muted/30 transition-colors group">
        <span class="text-xl font-bold text-telemetry-green group-hover:text-white uppercase mb-2">#{{ term.name }}</span>
        <span class="text-xs text-telemetry-muted uppercase">ENTRIES: {{ term.pages | length }}</span>
      </a>
    {% endfor %}
  </div>
</div>

{% include "footer.html" %}
