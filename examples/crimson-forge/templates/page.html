{% include "header.html" %}

<article class="page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">{{ page.date | date(format="%B %d, %Y") }}</div>
        {% endif %}
    </header>

    <div class="content">
        {{ page.content | safe }}
    </div>
</article>
