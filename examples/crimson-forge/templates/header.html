<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% elif section and section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0303;
            --text-color: #f0f0f0;
            --accent-color: #d11a2a;
            --border-color: #330b0f;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease, border-bottom-color 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        a:hover {
            color: #ff3344;
            border-bottom-color: #ff3344;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .site-header {
            border-bottom: 2px solid var(--border-color);
            padding: 2rem 0;
            margin-bottom: 3rem;
            text-align: center;
        }

        .site-title {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: none;
            display: inline-block;
        }

        .site-title:hover {
            color: var(--accent-color);
            border-bottom: none;
        }

        .site-nav {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .site-nav a {
            font-family: var(--font-heading);
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-color);
            padding-bottom: 4px;
        }

        .site-nav a:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .content {
            font-size: 1.1rem;
        }

        .content p {
            margin-bottom: 1.5rem;
        }

        .content h2 {
            margin-top: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .page-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .page-title {
            font-size: 2rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .page-meta {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: var(--text-color);
            border-bottom: none;
        }

        .post-title a:hover {
            color: var(--accent-color);
        }

        .post-summary {
            color: #ccc;
            margin-bottom: 1rem;
        }

        .read-more {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 2px;
        }

        .read-more:hover {
            color: #ff3344;
            border-bottom-color: #ff3344;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: var(--border-color);
            margin: 3rem 0;
        }

        blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1.5rem;
            margin-left: 0;
            font-style: italic;
            color: #ccc;
            background-color: rgba(209, 26, 42, 0.05);
            padding: 1rem 1.5rem;
        }

        code {
            font-family: monospace;
            background-color: #1a0808;
            padding: 0.2rem 0.4rem;
            border-radius: 2px;
            color: #ff9999;
        }

        pre {
            background-color: #1a0808;
            padding: 1.5rem;
            overflow-x: auto;
            border-left: 2px solid var(--accent-color);
        }

        pre code {
            background-color: transparent;
            padding: 0;
            color: #f0f0f0;
        }

        .site-footer {
            margin-top: 5rem;
            padding: 3rem 0;
            border-top: 2px solid var(--border-color);
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            font-family: var(--font-heading);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container">
