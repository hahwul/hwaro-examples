<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/tombstone-hud.css">
</head>
<body class="tombstone-hud">
  <!-- Top dispatch bar -->
  <div class="dispatch-bar">
    <div class="dispatch-inner">
      <span class="badge">TOMBSTONE COUNTY</span>
      <span class="dispatch-text">SHERIFF'S DEPT • HUD v1887.4 • LAST ROLL CALL: <span id="rollcall-time"></span></span>
      <span class="legend">PRESS <kbd>B</kbd> FOR BOLO • CLICK POSTERS TO HUNT</span>
    </div>
  </div>
