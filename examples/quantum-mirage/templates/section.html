{% include "header.html" %}

<div class="glass-panel">
    <div class="content-area" style="margin-bottom: 2rem;">
        {{ content | safe }}
    </div>

    {% if section is defined and section.pages %}
        <ul class="item-list">
            {% for page in section.pages %}
                <li>
                    <a href="{{ page.permalink }}">{{ page.title }}</a>
                    {% if page.date %}
                        <div class="item-date">{{ page.date | date(format="%Y-%m-%d") }}</div>
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    {% endif %}
</div>

{% include "footer.html" %}
