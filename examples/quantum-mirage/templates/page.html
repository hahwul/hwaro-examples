{% include "header.html" %}

<article class="glass-panel">
    <div class="content-area">
        {{ content | safe }}
    </div>

    {% if page is defined and page.taxonomies is defined %}
        {% if page.taxonomies.tags is defined and page.taxonomies.tags %}
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <span style="color: var(--text-muted); margin-right: 0.5rem; font-family: var(--font-heading); font-size: 0.9rem;">TAGS:</span>
            {% for tag in page.taxonomies.tags %}
                <a href="/tags/{{ tag | lower | replace(from=' ', to='-') }}/" style="display: inline-block; padding: 0.25rem 0.75rem; background: rgba(0, 242, 254, 0.1); border-radius: 20px; font-size: 0.85rem; margin-right: 0.5rem; margin-bottom: 0.5rem; border: 1px solid rgba(0, 242, 254, 0.2);">#{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    {% endif %}
</article>

{% include "footer.html" %}
