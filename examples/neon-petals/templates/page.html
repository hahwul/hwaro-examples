{% include "header.html" %}

<article class="glass-panel">
    <header class="page-title">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
        {% endif %}
        <div class="accent-line"></div>
    </header>

    <div class="prose">
        {{ content | safe }}
    </div>
</article>
