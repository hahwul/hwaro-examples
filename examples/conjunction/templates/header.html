<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=Rubik:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="bar">
      <a href="{{ base_url }}/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="28" height="28" focusable="false">
            <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="1.4"></circle>
            <circle cx="14" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1.4"></circle>
            <circle cx="26" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1.4"></circle>
          </svg>
        </span>
        <span class="brand-name">Conjunction</span>
      </a>
      <nav aria-label="Primary">
        <a href="{{ base_url }}/exhibitors/">Exhibitors</a>
        <a href="{{ base_url }}/visit/">Visit</a>
        <a href="{{ base_url }}/register/">Register</a>
      </nav>
    </div>
  </header>
