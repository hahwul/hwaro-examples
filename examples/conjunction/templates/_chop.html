<span class="chop{% if chop_size == 'lg' %} chop-lg{% endif %}" role="img" aria-label="{{ chop_label | e }} maker's mark">
  <svg viewBox="0 0 100 100" focusable="false">
    <circle cx="50" cy="50" r="47" fill="none" stroke="currentColor" stroke-width="2.4"></circle>
    <circle cx="50" cy="50" r="39.5" fill="none" stroke="currentColor" stroke-width="0.9" stroke-dasharray="1.5 3.2"></circle>
    {% if chop_motif == "flame" %}
    <path d="M50 12 L46 22 Q50 26 54 22 Z" fill="currentColor"></path>
    <path d="M50 88 L46 78 Q50 74 54 78 Z" fill="currentColor"></path>
    {% elif chop_motif == "salt" %}
    <circle cx="50" cy="14" r="2.2" fill="currentColor"></circle>
    <circle cx="86" cy="50" r="2.2" fill="currentColor"></circle>
    <circle cx="50" cy="86" r="2.2" fill="currentColor"></circle>
    <circle cx="14" cy="50" r="2.2" fill="currentColor"></circle>
    {% elif chop_motif == "wave" %}
    <path d="M30 14 Q40 8 50 14 T70 14" fill="none" stroke="currentColor" stroke-width="2"></path>
    <path d="M30 86 Q40 92 50 86 T70 86" fill="none" stroke="currentColor" stroke-width="2"></path>
    {% elif chop_motif == "slip" %}
    <path d="M28 15 A 40 40 0 0 1 72 15" fill="none" stroke="currentColor" stroke-width="2"></path>
    <path d="M28 85 A 40 40 0 0 0 72 85" fill="none" stroke="currentColor" stroke-width="2"></path>
    {% else %}
    <line x1="50" y1="9" x2="50" y2="17" stroke="currentColor" stroke-width="2"></line>
    <line x1="50" y1="83" x2="50" y2="91" stroke="currentColor" stroke-width="2"></line>
    <line x1="9" y1="50" x2="17" y2="50" stroke="currentColor" stroke-width="2"></line>
    <line x1="83" y1="50" x2="91" y2="50" stroke="currentColor" stroke-width="2"></line>
    {% endif %}
    <text x="50" y="53" text-anchor="middle" dominant-baseline="middle" class="chop-text">{{ chop_mark | e }}</text>
  </svg>
</span>
