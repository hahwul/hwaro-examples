<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper">
    <header class="masthead" role="banner">
      <div class="masthead-rule top"></div>
      <a href="{{ base_url }}/" class="masthead-brand" aria-label="Chromolithograph home">
        <svg viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" class="mark" aria-hidden="true">
          <rect x="1" y="1" width="218" height="62" fill="none" stroke="#2a1d12" stroke-width="1"/>
          <rect x="6" y="6" width="208" height="52" fill="none" stroke="#2a1d12" stroke-width="0.5"/>
          <g transform="translate(12,12)">
            <circle cx="20" cy="20" r="18" fill="#c8324a"/>
            <circle cx="28" cy="16" r="14" fill="#f1a13c" opacity="0.85"/>
            <circle cx="22" cy="26" r="12" fill="#3c8a68" opacity="0.80"/>
            <circle cx="14" cy="16" r="8" fill="#2d4a8f" opacity="0.80"/>
          </g>
          <text x="64" y="28" font-family="Playfair Display, serif" font-size="17" font-weight="700" fill="#2a1d12" letter-spacing="2">CHROMO</text>
          <text x="64" y="48" font-family="Playfair Display, serif" font-size="14" font-style="italic" fill="#7a4a2a">lithograph</text>
        </svg>
      </a>
      <nav class="masthead-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Frontispiece</a>
        <a href="{{ base_url }}/plates/">The Plates</a>
        <a href="{{ base_url }}/process/">On the Process</a>
        <a href="{{ base_url }}/colophon/">Colophon</a>
      </nav>
      <div class="masthead-rule bottom"></div>
      <p class="masthead-sub">VOLUME I - COLOURED FROM THE STONES - PUBLISHED IN THE YEAR MDCCCLXXVIII</p>
    </header>
