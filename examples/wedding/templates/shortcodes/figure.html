<figure class="my-8 flex flex-col items-center">
    <img src="{{ src }}" alt="{{ alt | default(value=caption) }}" class="max-w-full h-auto border-4 border-champagne shadow-sm {% if class %}{{ class }}{% endif %}">
    {% if caption %}
    <figcaption class="mt-4 text-center text-slate font-serif italic text-sm">{{ caption }}</figcaption>
    {% endif %}
</figure>
