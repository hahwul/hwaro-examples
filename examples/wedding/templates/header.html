<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ivory': '#fffff0',
                        'champagne': '#f7e7ce',
                        'rosegold': '#b76e79',
                        'rosegold-light': '#d49a9e',
                        'charcoal': '#36454f',
                        'slate': '#4a5568',
                    },
                    fontFamily: {
                        'script': ['"Great Vibes"', 'cursive'],
                        'serif': ['"Playfair Display"', 'serif'],
                        'body': ['"Lora"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fffff0; /* ivory */
            color: #36454f; /* charcoal */
            font-family: 'Lora', serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            color: #b76e79; /* rosegold */
        }

        .font-script {
            font-family: 'Great Vibes', cursive;
        }

        .text-rosegold {
            color: #b76e79;
        }

        .bg-champagne {
            background-color: #f7e7ce;
        }

        .border-rosegold {
            border-color: #b76e79;
        }

        /* Utility for solid colors replacing gradients */
        .solid-accent {
            background-color: #b76e79;
        }

        /* Links */
        a {
            color: #b76e79;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #d49a9e; /* rosegold-light */
        }

        /* Nav specific styles */
        nav a {
            color: #4a5568; /* slate */
        }

        nav a:hover {
            color: #b76e79;
        }

        /* Content rendering */
        .content-body p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: #4a5568;
        }

        .content-body h2 {
            font-size: 2rem;
            margin-top: 3rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .content-body ul {
            list-style-type: disc;
            margin-left: 2rem;
            margin-bottom: 1.5rem;
            color: #4a5568;
        }

        .content-body li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="py-8 bg-ivory border-b border-champagne sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
            <a href="{{ base_url }}/" class="text-3xl font-script text-rosegold mb-4 md:mb-0">{{ site.title }}</a>
            <nav class="flex space-x-6 text-sm uppercase tracking-widest font-serif">
                <a href="{{ base_url }}/" class="hover:text-rosegold transition-colors">Home</a>
                <a href="{{ base_url }}/#our-story" class="hover:text-rosegold transition-colors">Our Story</a>
                <a href="{{ base_url }}/#details" class="hover:text-rosegold transition-colors">Details</a>
                <a href="{{ base_url }}/#rsvp" class="hover:text-rosegold transition-colors">RSVP</a>
            </nav>
        </div>
    </header>
    <main class="flex-grow">
