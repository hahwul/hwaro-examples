{% include "header.html" %}

<section class="max-w-4xl mx-auto px-6 py-24 text-center">
    <header class="mb-16">
        <h1 class="text-6xl font-script text-rosegold mb-6 capitalize">{{ taxonomy_name }}</h1>
        <p class="text-slate font-serif italic text-xl">Filter by categories and tags</p>
        <div class="w-32 h-px bg-rosegold mx-auto mt-12 mb-16"></div>
    </header>

    <div class="flex flex-wrap justify-center gap-6">
        {% for term in taxonomy_terms %}
        <a href="{{ term.permalink }}" class="px-8 py-4 border-2 border-champagne text-rosegold hover:bg-champagne hover:border-rosegold transition-all text-sm uppercase tracking-widest rounded-full font-serif shadow-sm">
            {{ term.name }}
            <span class="ml-2 text-slate opacity-75">({{ term.pages | length }})</span>
        </a>
        {% endfor %}
    </div>
</section>

{% include "footer.html" %}
