{% include "header.html" %}
<h1>Posts tagged "{{ term }}"</h1>
<div class="post-list">
  {% for post in taxonomy_pages %}
    <div class="card">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      {% if post.date %}
        <span class="post-meta">{{ post.date | date("%Y-%m-%d") }}</span>
      {% endif %}
    </div>
  {% endfor %}
</div>
{% include "footer.html" %}
