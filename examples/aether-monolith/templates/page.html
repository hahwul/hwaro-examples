{% include "header.html" %}

<article class="page-content">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="prose">
        {{ page.content | safe }}
    </div>
</article>

<style>
    .page-header {
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--accent-color);
    }

    .page-title {
        font-size: 3.5rem;
        margin-bottom: 0.5rem;
    }

    .page-description {
        font-size: 1.2rem;
        color: #555;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
    }

    .prose {
        font-size: 1.1rem;
        max-width: 65ch;
    }

    .prose p {
        margin-bottom: 1.5rem;
    }
</style>

{% include "footer.html" %}
