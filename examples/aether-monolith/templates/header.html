<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap');
    :root {
      --bg: #0A0A0A;
      --surface: #121212;
      --text: #E0E0E0;
      --text-muted: #888888;
      --accent: #FFFFFF;
      --border: #2A2A2A;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
    }
    header {
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }
    nav a:hover {
      color: var(--accent);
    }
    main { flex-grow: 1; }
    h1, h2, h3 { color: var(--accent); font-weight: 600; margin-top: 2.5rem; }
    h1 { font-size: 2.5rem; letter-spacing: -1px; margin-top: 0; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.2s ease; }
    a:hover { border-color: var(--accent); }
    .post-meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .card:hover { border-color: #444; transform: translateY(-2px); }
    .card h2 { margin-top: 0; font-size: 1.5rem; }
    .card a { border-bottom: none; }
    .card a::after { content: " →"; opacity: 0; transition: opacity 0.2s ease; }
    .card a:hover::after { opacity: 1; }
    .tags { margin-top: 1rem; display: flex; gap: 0.5rem; }
    .tag { font-size: 0.8rem; padding: 0.2rem 0.5rem; background: #222; color: #AAA; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
