<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}Aether Monolith</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #f7f7f5;
            --text-color: #0f0f0f;
            --border-color: #0f0f0f;
            --accent-color: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom-color 0.2s ease;
        }

        a:hover {
            border-bottom-color: var(--text-color);
        }

        .monolith-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
        }

        .site-header {
            border-bottom: 2px solid var(--border-color);
            padding: 2.5rem 0;
            margin-bottom: 4rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .site-title {
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .site-nav {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 400;
        }

        .main-content {
            flex: 1;
            padding-bottom: 6rem;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="monolith-container header-content">
            <h1 class="site-title"><a href="/">Aether Monolith</a></h1>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/about/">About</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
        <div class="monolith-container">
