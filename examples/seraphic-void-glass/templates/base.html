<!DOCTYPE html>
<html lang="{{ page_language | default(value=site.language_code | default(value='en')) }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <meta name="description" content="{{ page.description | default(value=site.description) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/style.css">
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="site-title"><a href="{{ base_url }}/" style="color: var(--text-primary); text-shadow: none;">{{ site.title }}</a></div>
            <nav>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock content %}
        </main>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {% if site.extra and site.extra.author %}{{ site.extra.author }}{% else %}{{ site.title }}{% endif %}. Powered by <a href="https://github.com/hahwul/hwaro">Hwaro</a>.</p>
        </footer>
    </div>
</body>
</html>
