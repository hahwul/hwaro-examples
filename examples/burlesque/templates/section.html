{% include "header.html" %}
    <main class="site-main">
      <div class="section-header">
        <h1 class="section-title"><span class="heading-ornament">✦</span> {{ page.title }} <span class="heading-ornament">✦</span></h1>
      </div>
      <div class="posts-list">
        {% for post in section.pages %}
          <article class="post-card">
            <div class="post-card-inner">
              {% if post.date %}
                <time class="post-date" datetime="{{ post.date }}">{{ post.date | date("%B %d, %Y") }}</time>
              {% endif %}
              <h3 class="post-title"><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h3>
              {% if post.description %}
                <p class="post-excerpt">{{ post.description }}</p>
              {% endif %}
            </div>
          </article>
        {% endfor %}
      </div>
      {{ pagination }}
    </main>
{% include "footer.html" %}
