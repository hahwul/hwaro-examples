{% include "header.html" %}
    <main id="main">
      <header class="page-head">
        <p class="kicker"><span class="kicker-word">Find a ride</span></p>
        <h1 class="page-title">{{ page.title | e }}</h1>
        <div class="page-intro">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the archive</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="ventoux, gorge, brevet, crosswind&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="ride-list ride-list-section" id="search-results"></ol>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
