<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="sheet">
    <header class="masthead">
      <div class="masthead-brand">
        <a class="wordmark" href="{{ base_url }}/">
          <svg class="wordmark-gusts" viewBox="0 0 26 22" aria-hidden="true" focusable="false"><g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M2 4.5h15"/><path d="M2 11h22"/><path d="M2 17.5h11"/></g></svg>
          <span>Mistral</span>
        </a>
        <p class="masthead-tag">A journal of riding into the wind</p>
      </div>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/rides/">Rides</a>
        <a href="{{ base_url }}/bikes/">Bikes</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </header>
