<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: left; padding: 40px 0; border-bottom: 10px solid #000; }
        .logo { font-weight: 800; font-size: 3rem; text-transform: uppercase; letter-spacing: -2px; }
        .fault-surface { margin-top: 60px; position: relative; }
        .line { height: 2px; background: #000; width: 100%; margin: 40px 0; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">fault.line</div></header>
