{% include "header.html" %}

<article class="content-area page-article">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="page-content">
        {{ content | safe }}
    </div>
</article>

<style>
    .page-article {
        max-width: 100%;
    }

    .page-header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .page-title {
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }

    .page-description {
        font-family: var(--font-sans);
        font-size: 1.1rem;
        font-style: italic;
        color: rgba(241, 235, 217, 0.7);
    }

    .page-content {
        margin-top: 2rem;
    }
</style>

{% include "footer.html" %}
