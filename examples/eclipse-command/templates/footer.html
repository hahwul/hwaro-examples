<script>function initEclipse(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/26);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[ECLIPSE] The sun is dead. We rule the sky now.','color:#f59e0b')}addEventListener('load',initEclipse)</script></body></html>
