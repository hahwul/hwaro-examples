{% include "header.html" %}
<article class="page-content">
  <header style="margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
    <h1 class="page-title" style="margin-top: 0; margin-bottom: 0.5rem; font-size: 3rem;">{{ page.title }}</h1>
    {% if page.description %}
      <p style="color: var(--muted); font-size: 1.1rem; margin-top: 0;">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content-body" style="font-size: 1.05rem;">
    {{ content | safe }}
  </div>
</article>
{% include "footer.html" %}
