<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <style>
  :root {
    --bg: #0c0a0d;
    --text: #e8e3dc;
    --accent: #8e1c31; /* Velvet Red */
    --accent-hover: #b0233d;
    --muted: #8b8580;
    --border: #2c2528;
    --font-heading: 'Didot', 'Bodoni MT', 'Times New Roman', serif;
    --font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    line-height: 1.8;
    margin: 0;
    color: var(--text);
    background-color: var(--bg);
  }

  .site-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  .site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3.5rem;
  }

  .site-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0;
    font-family: var(--font-heading);
    letter-spacing: -0.02em;
  }

  .site-title a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.4s ease;
  }

  .site-title a:hover {
    color: var(--accent);
  }

  nav {
    display: flex;
    gap: 2rem;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: color 0.4s ease;
  }

  nav a:hover {
    color: var(--accent);
  }

  a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.4s ease, color 0.4s ease;
  }

  a:hover {
    border-bottom-color: var(--accent);
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-heading);
    font-weight: normal;
    color: #f5f0eb;
    margin-top: 2em;
    margin-bottom: 0.75em;
  }

  h1 { font-size: 2.5rem; }
  h2 { font-size: 2rem; }
  h3 { font-size: 1.5rem; }

  p { margin-bottom: 1.5em; }

  .site-footer {
    margin-top: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    font-family: var(--font-body);
    letter-spacing: 0.05em;
  }

  code {
    background: #1a1618;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    color: #e8e3dc;
  }

  pre {
    background: #1a1618;
    padding: 1.5rem;
    border-radius: 4px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }

  pre code {
    background: none;
    padding: 0;
  }

  /* Components */
  ul.section-list {
    list-style: none;
    padding: 0;
    margin: 2rem 0;
  }

  ul.section-list li {
    margin-bottom: 1rem;
    padding: 1rem 0;
    border-bottom: 1px dashed var(--border);
  }

  ul.section-list li:last-child {
    border-bottom: none;
  }

  ul.section-list li a {
    font-size: 1.25rem;
    font-family: var(--font-heading);
    color: #f5f0eb;
    border-bottom: none;
  }

  ul.section-list li a:hover {
    color: var(--accent);
  }

  .taxonomy-desc { color: var(--muted); margin-bottom: 2rem; font-style: italic; }

  @media (max-width: 600px) {
    .site-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
    }
    .site-title { font-size: 2rem; }
    nav { gap: 1.5rem; }
  }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
