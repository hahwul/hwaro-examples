<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #2d3748;
            --accent: #4a5568;
            --glass: rgba(255, 255, 255, 0.6);
        }
        body {
            background-color: #f7f7f7;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .folio-hero {
            padding: 80px 0;
            text-align: center;
        }
        .folio-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            font-style: italic;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 80px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.03);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 300; font-style: italic; color: var(--accent); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.folio</div>
        <nav>
            <a href="/">Works</a>
            <a href="/about">Process</a>
        </nav>
    </header>
