<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="crt" aria-hidden="true"></div>
  <div class="frame">
    <header class="masthead">
      <a href="{{ base_url }}/" class="brand" aria-label="Bolide, demoparty home">
        <span class="brand-word glitch" data-text="BOLIDE">BOLIDE</span>
        <span class="brand-tag">// demoparty · 3&ndash;5 APR 2026</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/">index</a>
        <a href="{{ base_url }}/compos/">compos</a>
        <a href="{{ base_url }}/venue/">venue</a>
        <a href="{{ base_url }}/register/" class="nav-cta">register &rsaquo;</a>
      </nav>
    </header>
