{% extends "base.html" %}

{% block content %}
<div class="error-page" style="text-align: center; padding: 4rem 0;">
  <h1 style="font-size: 6rem; color: var(--gold-accent); margin-bottom: 0;">404</h1>
  <h2 style="margin-top: 0;">Page Not Found</h2>
  <p>The bloom you are searching for has faded or never existed.</p>
  <a href="{{ base_url }}" class="button" style="display: inline-block; margin-top: 2rem; padding: 0.8rem 2rem; border: 1px solid var(--gold-accent); border-radius: 4px;">Return to the Garden</a>
</div>
{% endblock %}
