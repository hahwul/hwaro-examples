{% extends "base.html" %}

{% block content %}
<article class="page-content">
  {% if not page.url == base_url and not page.url == base_url ~ "about/" %}
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <p class="post-meta">{{ page.date | date("%B %d, %Y") }}</p>
    {% endif %}
  </header>
  {% endif %}
  <div class="content-body">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
