<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is defined and page.description %}{{ page.description | e }}{% else %}A deep space glassmorphism example site.{% endif %}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{% if site is defined %}{{ site.title | e }}{% endif %}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page.section is defined %}{{ page.section }}{% endif %}">
  <div class="background-animation"></div>
  <div class="site-wrapper">
    <div class="glass-container">
      <header class="site-header">
        <a href="/" class="site-logo">
          <span class="logo-icon">✨</span>
          {% if site is defined %}{{ site.title }}{% else %}Astro Pulse{% endif %}
        </a>
        <nav>
          <a href="/">Home</a>
          <a href="/about/">About</a>
          <a href="/tags/">Tags</a>
        </nav>
      </header>
