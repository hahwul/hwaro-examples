<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #05010a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b5;
      --accent-pink: #ff007f;
      --accent-cyan: #00f0ff;
      --accent-purple: #8a2be2;

      --glass-bg: rgba(20, 15, 30, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --glass-blur: blur(12px);

      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text-primary);
      background-color: var(--bg-dark);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Orbs */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a0215 0%, var(--bg-dark) 100%);
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }
    .orb-1 {
      top: -10%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, var(--accent-pink), transparent 70%);
      animation-delay: 0s;
    }
    .orb-2 {
      bottom: -20%; right: -10%; width: 60vw; height: 60vw;
      background: radial-gradient(circle, var(--accent-purple), transparent 70%);
      animation-delay: -5s;
    }
    .orb-3 {
      top: 30%; left: 40%; width: 40vw; height: 40vw;
      background: radial-gradient(circle, var(--accent-cyan), transparent 70%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(5%, 5%) scale(1.1); }
      100% { transform: translate(-5%, -5%) scale(0.9); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .site-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem;
      margin: 2rem 0;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      text-align: center;
    }
    .site-logo {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 3rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, var(--accent-cyan), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .site-description {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1.1rem;
      font-family: var(--font-heading);
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--accent-cyan);
    }

    .site-main {
      min-height: calc(100vh - 350px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      margin-bottom: 3rem;
      font-size: 1.1rem;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 700;
    }
    h1 {
      font-size: 2.5rem;
      margin-top: 0;
    }
    p { margin: 1.2em 0; }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    a:hover {
      color: var(--accent-pink);
    }
    strong { color: #fff; font-weight: 600; }

    /* Components */
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: rgba(20, 15, 30, 0.3);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.2rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-main { padding: 1.5rem; }
      .site-logo { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <p class="site-description">An ethereal glassmorphism example site powered by Hwaro</p>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
