<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="brand">
        <svg width="36" height="18" viewBox="0 0 36 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="36" height="4" fill="currentColor"/>
          <rect x="0" y="7" width="28" height="4" fill="currentColor"/>
          <rect x="0" y="14" width="20" height="4" fill="currentColor"/>
        </svg>
        {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/work/">Work</a>
        <a href="{{ base_url }}/about/">Studio</a>
        <a href="{{ base_url }}/contact/">Contact</a>
      </nav>
    </header>
