<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,400;1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f4ef;
            --text: #3c2f2f;
            --accent: #8b4513;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Unna', serif;
            margin: 0;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        .scroll-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 100px 40px;
            background: #fffdfa;
            box-shadow: 0 0 100px rgba(0,0,0,0.05);
            min-height: 100vh;
            border-left: 1px solid #e0d5d0;
            border-right: 1px solid #e0d5d0;
        }
        header {
            padding-bottom: 60px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: var(--accent);
            opacity: 0.8;
        }
        nav { margin-top: 30px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.5;
        }
        .scroll-hero {
            padding: 80px 0;
            text-align: center;
        }
        .scroll-hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article { padding: 40px 0; font-size: 1.2rem; }
        h2 { font-weight: 400; font-size: 2rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 60px; font-style: italic; }
    </style>
</head>
<body>
    <div class="scroll-container">
    <header>
        <div class="logo">SCROLL.</div>
        <nav>
            <a href="/">Unfold</a>
            <a href="/about">Origin</a>
        </nav>
    </header>
