<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-cyan: #00f2fe;
      --primary-magenta: #ff007f;
      --primary-green: #00ff88;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #03050a;
      --bg-glass: rgba(15, 20, 30, 0.4);
      --bg-glass-hover: rgba(25, 30, 45, 0.6);

      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Orbs */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: drift 20s infinite alternate ease-in-out;
    }
    .orb-1 {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--primary-cyan) 0%, transparent 70%);
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 35vw;
      height: 35vw;
      background: radial-gradient(circle, var(--primary-magenta) 0%, transparent 70%);
      bottom: -10%;
      right: -10%;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 30vw;
      height: 30vw;
      background: radial-gradient(circle, var(--primary-green) 0%, transparent 70%);
      top: 40%;
      left: 60%;
      animation-delay: -10s;
      opacity: 0.2;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5%, 5%) scale(1.1); }
      66% { transform: translate(-5%, 10%) scale(0.9); }
      100% { transform: translate(10%, -5%) scale(1.05); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .site-logo {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.4rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.5px;
      background: linear-gradient(45deg, var(--primary-cyan), var(--primary-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary-cyan); }
    .site-main { min-height: calc(100vh - 250px); }

    .glass-panel {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .site-footer {
      margin-top: 3rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: var(--font-heading);
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      color: #fff;
    }
    h1 { font-size: 2.2rem; margin-top: 0; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.3rem; }
    p { margin: 1em 0; }
    a {
      color: var(--primary-cyan);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    a:hover {
      color: var(--primary-magenta);
      text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
    }
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--primary-green);
    }
    pre {
      background: rgba(5, 5, 10, 0.6);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 0.75rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
      border-color: rgba(0, 242, 254, 0.3);
    }
    ul.section-list li a { font-weight: 500; font-family: var(--font-heading); font-size: 1.1rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.02);
    }
    nav.pagination a:hover {
      color: #fff;
      border-color: var(--primary-cyan);
      background: rgba(0, 242, 254, 0.1);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--primary-magenta);
      color: #fff;
      background: rgba(255, 0, 127, 0.15);
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.25rem; }
      .site-wrapper { padding: 0 1rem; }
      .glass-panel { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{% if site is defined %}{{ site.title }}{% else %}Aurora Drift{% endif %}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
