{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for post in section.pages %}
      <li><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
    {% if pagination %}
    <div class="pagination">
      {{ pagination }}
    </div>
    {% endif %}
  </main>
{% include "footer.html" %}
