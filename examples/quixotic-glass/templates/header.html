<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

    :root {
      --primary-hue: 280;
      --bg-gradient: linear-gradient(135deg, hsl(280, 80%, 15%), hsl(320, 80%, 20%), hsl(220, 80%, 15%));
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent: #ff007f;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* The Glass Container */
    .glass-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      max-width: 900px;
      width: 100%;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle decorative orb */
    .glass-container::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: rgba(255, 0, 127, 0.4);
      border-radius: 50%;
      filter: blur(40px);
      z-index: -1;
    }

    /* Layout inside glass */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 2rem;
    }

    .site-logo {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--text-primary); text-shadow: 0 0 8px rgba(255,255,255,0.5); }

    .site-main { min-height: 40vh; }

    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 800; color: var(--text-primary); }
    h1 { font-size: 2.5rem; margin-top: 0; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1em 0; color: var(--text-secondary); font-weight: 300; font-size: 1.1rem; }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }

    /* Code */
    code {
      background: rgba(0, 0, 0, 0.2);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: 'Courier New', Courier, monospace;
      color: #ff99cc;
      border: 1px solid rgba(255,255,255,0.1);
    }
    pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.2rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 0.8rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.1);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; color: var(--text-primary); }

    .taxonomy-desc { color: var(--text-secondary); margin-bottom: 1.5rem; }

    /* Blockquotes */
    blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-left: 4px solid var(--accent);
      background: rgba(255,255,255,0.05);
      border-radius: 0 12px 12px 0;
      font-style: italic;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .glass-container { padding: 1.5rem; }
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="glass-container">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
