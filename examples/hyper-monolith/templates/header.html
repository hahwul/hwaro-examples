<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #FFFFFF;
      --accent-color: #0055FF;
      --border-color: #FFFFFF;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-body);
      line-height: 1.6;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      border: 10px solid var(--border-color);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      border-bottom: 2px solid var(--border-color);
      padding: 1.5rem 2rem;
      align-items: center;
    }

    header a {
      color: var(--text-color);
      text-decoration: none;
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    header a.site-title {
      font-size: 1.5rem;
    }

    header nav {
      display: flex;
      gap: 2rem;
    }

    header a:hover {
      color: var(--accent-color);
      text-shadow: 2px 2px 0px var(--border-color);
    }

    main {
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-mono);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      color: var(--accent-color);
    }

    h1 {
      font-size: 3rem;
      letter-spacing: -0.05em;
    }

    p {
      margin-bottom: 1.5rem;
      font-size: 1.125rem;
    }

    a {
      color: var(--accent-color);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    a:hover {
      background-color: var(--accent-color);
      color: var(--bg-color);
      text-decoration: none;
    }

    code {
      font-family: var(--font-mono);
      background-color: var(--text-color);
      color: var(--bg-color);
      padding: 0.2em 0.4em;
      font-size: 0.9em;
    }

    pre {
      background-color: var(--text-color);
      color: var(--bg-color);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    pre code {
      background-color: transparent;
      color: inherit;
      padding: 0;
    }

    hr {
      border: 0;
      border-top: 1px dashed var(--border-color);
      margin: 3rem 0;
    }

    footer {
      border-top: 2px solid var(--border-color);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
  <main>
