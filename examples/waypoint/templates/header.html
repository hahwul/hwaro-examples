<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="frame-border" aria-hidden="true"></div>

  <header class="tabbar">
    <a class="brand" href="{{ base_url }}/" aria-label="Waypoint home">
      <svg class="brand-mark" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path d="M12 3 L21 12 L12 21 L3 12 Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2.6" fill="currentColor"/>
      </svg>
      <span class="brand-name">waypoint</span>
    </a>
    <nav class="tabs" aria-label="Primary">
      <a class="tab{% if page.url is present and page.url == "/" %} is-active{% endif %}" href="{{ base_url }}/">~</a>
      <a class="tab{% if page.section is present and page.section == "releases" %} is-active{% endif %}" href="{{ base_url }}/releases/">releases</a>
      <a class="tab{% if page.url is present and page.url == "/about/" %} is-active{% endif %}" href="{{ base_url }}/about/">about</a>
      <a class="tab tab-feed" href="{{ base_url }}/releases/rss.xml" aria-label="Releases feed">feed<span class="ext" aria-hidden="true"> ↗</span></a>
    </nav>
  </header>

  <main id="main" class="screen">
    <div class="screen-inner">
