    </div>
  </main>

  {%- set rel = get_section(path="releases") -%}
  {%- set latest = rel.pages | sort_by("date", reverse=true) | first -%}
  <footer class="statusline" role="contentinfo">
    <span class="st-key">stable</span>
    <span class="st-item st-ver">{{ latest.title }}</span>
    <span class="st-sep" aria-hidden="true">·</span>
    <span class="st-item st-date">released {{ latest.date | date("%Y-%m-%d") }}</span>
    <span class="st-sep st-sep-flex" aria-hidden="true">·</span>
    <span class="st-item st-digest" title="latest stable image digest">
      <span class="st-label">image</span> {{ latest.extra.digest_short }}<span class="st-trunc" aria-hidden="true">…</span>
    </span>
  </footer>

  {{ highlight_js }}
  {{ auto_includes_js }}
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js" defer></script>
</body>
</html>
