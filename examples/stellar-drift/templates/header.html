<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #ff0055;
      --bg-dark: #0a0b10;
      --bg-light: #141526;
      --text: #e0e6ed;
      --text-muted: #8a94a6;
      --glass-bg: rgba(20, 21, 38, 0.4);
      --glass-border: rgba(0, 240, 255, 0.15);
      --glow-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.08) 0%, transparent 50%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Particle Background Layer */
    .particle-layer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        radial-gradient(#fff 1px, transparent 1px),
        radial-gradient(#fff 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 25px 25px;
      opacity: 0.05;
      animation: drift 100s linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-50px) scale(1.1); }
      100% { transform: translateY(-100px) scale(1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: relative;
    }

    .site-logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .site-logo:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    /* Content Styling */
    .site-main h1 { font-size: 3rem; margin-top: 0; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .site-main h2 { font-size: 1.8rem; margin-top: 2.5rem; position: relative; display: inline-block; }
    .site-main h2::after { content:''; position:absolute; bottom:-5px; left:0; width:40px; height:2px; background:var(--secondary); }

    p { margin: 1.2em 0; font-weight: 300; }

    a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--secondary); text-shadow: 0 0 8px rgba(255, 0, 85, 0.4); }

    code {
      background: rgba(0,0,0,0.3);
      color: var(--primary);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(0, 240, 255, 0.1);
    }

    pre {
      background: rgba(0,0,0,0.5);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    pre code { background: none; border: none; padding: 0; color: inherit; }

    blockquote {
      margin: 2rem 0;
      padding: 1.5rem 2rem;
      border-left: 3px solid var(--primary);
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.05), transparent);
      font-style: italic;
      color: #fff;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: var(--glass-bg);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    ul.section-list li::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateX(5px);
      border-color: rgba(0, 240, 255, 0.3);
      box-shadow: var(--glow-shadow);
    }

    ul.section-list li:hover::before {
      opacity: 1;
    }

    ul.section-list li a { font-weight: 600; font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; display: block; margin-bottom: 0.5rem; color: #fff;}
    ul.section-list li a:hover { color: var(--primary); text-shadow: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.3s ease;
    }

    nav.pagination a:hover {
      color: #fff;
      border-color: var(--primary);
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .pagination-current span {
      color: #fff;
      border-color: var(--primary);
      background: rgba(0, 240, 255, 0.15);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }

    .pagination-disabled span { opacity: 0.3; }

    /* Tags styling */
    .post-tags {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .post-tags a {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      background: rgba(255, 0, 85, 0.1);
      color: var(--secondary);
      border: 1px solid rgba(255, 0, 85, 0.2);
      border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }
    .post-tags a:hover {
      background: rgba(255, 0, 85, 0.2);
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
    }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1.5rem; }
      .site-main h1 { font-size: 2.2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="particle-layer"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
