{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    <div class="content-glass" style="margin-bottom: 2rem; padding: 1.5rem;">
      {{ content }}
    </div>
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </main>
  <style>
    .content-glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
{% include "footer.html" %}
