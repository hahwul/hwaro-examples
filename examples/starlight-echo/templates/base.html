<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #fafafa;
            --accent-color: #3b82f6;
            --border-color: #fafafa;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 2px solid var(--accent-color);
            transition: background-color 0.2s, color 0.2s;
        }

        a:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-mono);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            margin-top: 2rem;
        }

        .site-header {
            border-bottom: 4px solid var(--border-color);
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            border-bottom: none;
            text-transform: uppercase;
        }

        .site-title:hover {
            background-color: transparent;
            color: var(--accent-color);
        }

        .site-nav {
            display: flex;
            gap: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .site-main {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .site-footer {
            border-top: 4px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* Brutalist content elements */
        pre {
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 1.5rem;
            font-family: var(--font-mono);
            overflow-x: auto;
            border: 2px solid var(--border-color);
            margin: 2rem 0;
        }

        code {
            font-family: var(--font-mono);
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 0.2rem 0.4rem;
        }

        pre code {
            padding: 0;
            background-color: transparent;
            color: inherit;
        }

        blockquote {
            border-left: 8px solid var(--accent-color);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            font-size: 1.2rem;
        }

        img {
            max-width: 100%;
            height: auto;
            border: 4px solid var(--border-color);
            display: block;
            margin: 2rem 0;
        }

        ul, ol {
            margin: 1rem 0 1rem 2rem;
        }

        hr {
            border: none;
            border-top: 4px solid var(--border-color);
            margin: 3rem 0;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
            <a href="{{ base_url }}/">Index</a>
            <a href="{{ base_url }}/about/">About</a>
            <a href="{{ base_url }}/posts/">Archive</a>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        &copy; 2024 {{ site.title }}. Built with Hwaro.
    </footer>
</body>
</html>
