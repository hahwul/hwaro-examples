{#- A row of five panel faders whose knob positions are derived from the
    entry's word count: knob_y = 4 + ((word_count * m) % 23) for five fixed
    multipliers m. Set `fader_page` before including. -#}
{% set wc = fader_page.word_count %}
<svg class="faders" viewBox="0 0 96 36" role="img" aria-label="Panel faders set by this entry's length: {{ wc }} words">
  {% for i in range(5) %}
  {% set x = 8 + i * 20 %}
  {% set knob = 4 + ((wc * (3 + i * 4)) % 23) %}
  <line class="fader-tick" x1="{{ x - 7 }}" y1="6" x2="{{ x - 5 }}" y2="6"/>
  <line class="fader-tick" x1="{{ x - 7 }}" y1="18" x2="{{ x - 5 }}" y2="18"/>
  <line class="fader-tick" x1="{{ x - 7 }}" y1="30" x2="{{ x - 5 }}" y2="30"/>
  <line class="fader-track" x1="{{ x }}" y1="3" x2="{{ x }}" y2="33"/>
  <rect class="fader-knob" x="{{ x - 6 }}" y="{{ knob }}" width="12" height="6" rx="1.5"/>
  <line class="fader-line" x1="{{ x - 6 }}" y1="{{ knob + 3 }}" x2="{{ x + 6 }}" y2="{{ knob + 3 }}"/>
  {% endfor %}
</svg>
