<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  {{ jsonld | safe }}
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | e }} — restoration log" href="{{ base_url }}/rss.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <line x1="6" y1="4" x2="6" y2="20"/>
          <line x1="12" y1="4" x2="12" y2="20"/>
          <line x1="18" y1="4" x2="18" y2="20"/>
          <rect x="3" y="6" width="6" height="4" rx="1"/>
          <rect x="9" y="13" width="6" height="4" rx="1"/>
          <rect x="15" y="8" width="6" height="4" rx="1"/>
        </svg>
        <span class="brand-name">Foehn</span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/restorations/">Restorations</a>
        <a href="{{ base_url }}/about/">About</a>
        <button class="search-btn" id="search-open" type="button" aria-haspopup="dialog" aria-label="Search the log">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2L17 17"/></svg>
          <span class="search-btn-label">Search</span>
          <kbd class="kbd" aria-hidden="true">/</kbd>
        </button>
      </nav>
    </div>
  </header>
