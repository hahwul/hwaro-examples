{% include "header.html" %}
<div class="taxonomy-term-container">
  <h1 style="margin-bottom: 2rem; font-size: 2.2rem; letter-spacing: -0.02em;">{{ term }}</h1>
  <ul style="list-style-type: none; padding-left: 0;">
    {% for page in pages %}
      <li style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
        <a href="{{ page.permalink }}" style="font-size: 1.2rem; text-decoration: none;">{{ page.title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
