{% include "header.html" %}
<div class="taxonomy-container">
  <h1 style="margin-bottom: 2rem; font-size: 2.2rem; letter-spacing: -0.02em; text-transform: capitalize;">{{ taxonomy }}</h1>
  <ul style="list-style-type: none; padding-left: 0; display: flex; flex-wrap: wrap; gap: 1rem;">
    {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}" style="display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-color); text-decoration: none; font-size: 0.9rem; color: var(--accent-color); transition: all 0.2s ease;">{{ term.name }} ({{ term.pages | length }})</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
