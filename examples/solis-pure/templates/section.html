{% include "header.html" %}
<div class="section-container">
  <h1 style="margin-bottom: 2rem; font-size: 2.2rem; letter-spacing: -0.02em;">{{ page.title }}</h1>
  {% if content is present %}
    <div style="margin-bottom: 2rem;">{{ content | safe }}</div>
  {% endif %}
  <ul style="list-style-type: none; padding-left: 0;">
    {% for post in section.pages %}
      <li style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
        <a href="{{ post.permalink }}" style="font-size: 1.2rem; text-decoration: none;">{{ post.title }}</a>
        {% if post.description is present %}
          <p style="color: #666; margin-top: 0.5rem; font-size: 0.95rem;">{{ post.description }}</p>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
