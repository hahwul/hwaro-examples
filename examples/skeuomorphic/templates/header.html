<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    {% if auto_includes %}
        {{ auto_includes | safe }}
    {% endif %}

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="desk">
        <header class="leather-header">
            <h1 class="site-title"><a href="{{ base_url }}/" style="color: inherit; border-bottom: none;">{{ site.title }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
        </header>

        <nav class="nav-tabs">
            <a href="{{ base_url }}/" class="nav-tab">Index</a>
            <a href="{{ base_url }}/posts/" class="nav-tab">Ledger</a>
            <a href="{{ base_url }}/tags/" class="nav-tab">Tags</a>
        </nav>

        <main class="paper-ledger">
