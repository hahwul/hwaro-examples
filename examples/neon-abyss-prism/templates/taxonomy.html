{% extends "base.html" %}

{% block content %}
<section class="glass-panel">
    <header class="section-header">
        <h1>{{ taxonomy.name | capitalize }}</h1>
    </header>

    <div class="card-list">
        {% for term, count in taxonomy.terms %}
        <a href="{{ base_url }}/{{ taxonomy.name }}/{{ term }}" class="card">
            <h2>{{ term }}</h2>
            <p>{{ count }} pages</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock content %}
