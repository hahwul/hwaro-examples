{% extends "base.html" %}

{% block content %}
<article class="glass-panel">
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="meta">{{ page.date | date("%B %d, %Y") }}</div>
        {% endif %}
    </header>
    <div class="page-content">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
