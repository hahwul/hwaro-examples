<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Fraunces:opsz,wght@9..144,400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7ede2;
            --text: #2f3e46;
            --accent: #84a59d;
            --dark: #354f52;
            --border: #2f3e46;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 8px solid var(--border);
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--dark);
            text-transform: lowercase;
            font-style: italic;
        }
        nav {
            margin-top: 20px;
            display: flex;
            gap: 40px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }
        nav a:hover {
            border-color: var(--accent);
        }
        .tectonic-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 100px 0;
            align-items: center;
        }
        .tectonic-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 6rem;
            line-height: 0.8;
            margin: 0;
            color: var(--dark);
        }
        .tectonic-desc {
            font-size: 1.4rem;
            border-left: 4px solid var(--accent);
            padding-left: 30px;
        }
        article {
            background: #fff;
            padding: 80px;
            border: 4px solid var(--border);
            box-shadow: 20px 20px 0 var(--accent);
            margin-bottom: 100px;
        }
        h2 { font-family: 'Fraunces', serif; font-size: 3rem; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">tectonic.shift</div>
            <nav>
                <a href="/">Seismology</a>
                <a href="/about">Strata</a>
            </nav>
        </div>
    </header>
