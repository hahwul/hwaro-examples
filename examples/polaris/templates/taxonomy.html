{% include "header.html" %}
<section class="celestial-content">
    <header class="page-title-block">
        <h1>Taxonomy: {{ taxonomy_name }}</h1>
    </header>
    <div class="content-body">
        <ul class="taxonomy-terms">
        {% for term in taxonomy_terms %}
            <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
        {% endfor %}
        </ul>
    </div>
</section>
{% include "footer.html" %}
