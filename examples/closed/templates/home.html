<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(value=site.title) }}</title>
    <meta name="description" content="{{ page.description | default(value=site.description) }}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="status-badge">Error 499</div>
        </header>
        <main>
            <article class="content">
                {{ content | safe }}
            </article>
        </main>
        <footer>
            <div class="divider"></div>
            <p>&copy; {{ current_year }} - Request Lifecycle Monitor</p>
        </footer>
    </div>
</body>
</html>
