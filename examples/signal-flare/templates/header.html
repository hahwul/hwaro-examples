<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text: #ff4500; --accent: #ff4500; --flare: rgba(255, 69, 0, 0.2); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; padding: 60px 0; border-bottom: 1px solid var(--text); }
        .logo { font-weight: 800; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 10px; }
        .flare-surface { margin-top: 60px; padding: 60px; border: 2px solid var(--text); box-shadow: 0 0 50px var(--flare); position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">signal.flare</div></header>
