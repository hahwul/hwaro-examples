{% include "header.html" %}

<article class="xeno-card">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date is defined %}
      <time datetime="{{ page.date }}">{{ page.date | date(format="%Y-%m-%d") }}</time>
    {% endif %}
  </header>

  <div class="content">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
