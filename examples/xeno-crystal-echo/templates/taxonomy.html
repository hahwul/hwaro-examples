{% include "header.html" %}

<h1>{{ taxonomy.name | capitalize }}</h1>

{% if terms is defined %}
  <ul class="taxonomy-list">
    {% for term in terms %}
      <li class="xeno-card">
        <a href="{{ term.permalink }}">{{ term.name }}</a>
      </li>
    {% endfor %}
  </ul>
{% endif %}
