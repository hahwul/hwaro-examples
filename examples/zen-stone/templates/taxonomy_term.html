{% include "header.html" %}
  <main>
    <h2 style="font-weight: 300; color: var(--stone-dark); border-bottom: 1px solid var(--stone-light); padding-bottom: 10px;">{{ term }}</h2>
    <ul style="list-style: none; padding: 0;">
      {% for page in pages %}
        <li style="margin-bottom: 15px;">
          <a href="{{ base_url }}{{ page.url }}" style="font-size: 1.2rem; color: var(--text-color);">{{ page.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
