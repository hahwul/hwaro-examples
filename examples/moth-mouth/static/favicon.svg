<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true">
  <!-- Velvet night background -->
  <rect width="32" height="32" rx="3" fill="#0d0b0a"/>
  <!-- Left wing (dust cream with scale texture suggestion) -->
  <path d="M16 11 Q 5.5 7 4 16 Q 5.8 23.5 15.5 21.5" fill="#d4c8b5" stroke="#3a312a" stroke-width="0.9" stroke-linejoin="round"/>
  <!-- Right wing -->
  <path d="M16 11 Q 26.5 7 28 16 Q 26.2 23.5 16.5 21.5" fill="#d4c8b5" stroke="#3a312a" stroke-width="0.9" stroke-linejoin="round"/>
  <!-- Inner wing veins / scales (subtle) -->
  <path d="M9 14 Q 11.5 18 14.8 17" fill="none" stroke="#3a312a" stroke-width="0.55" opacity="0.5"/>
  <path d="M23 14 Q 20.5 18 17.2 17" fill="none" stroke="#3a312a" stroke-width="0.55" opacity="0.5"/>
  <!-- Body (black velvet) -->
  <ellipse cx="16" cy="15.8" rx="2.1" ry="6.4" fill="#161310"/>
  <!-- The mouth — open, slightly too wide, on the thorax -->
  <ellipse cx="16" cy="15.4" rx="1.35" ry="0.72" fill="#0d0b0a" stroke="#c97a8e" stroke-width="0.8"/>
  <!-- Tiny tongue / inner pink -->
  <ellipse cx="16" cy="15.55" rx="0.55" ry="0.28" fill="#e89fb0" opacity="0.85"/>
  <!-- Antennae (delicate, wrong) -->
  <path d="M15.1 10.2 Q 13.4 7.3 11.8 8.6" fill="none" stroke="#a89c8a" stroke-width="0.65" stroke-linecap="round"/>
  <path d="M16.9 10.2 Q 18.6 7.3 20.2 8.6" fill="none" stroke="#a89c8a" stroke-width="0.65" stroke-linecap="round"/>
  <!-- Antenna tips (small hungry points) -->
  <circle cx="11.65" cy="8.45" r="0.55" fill="#c97a8e"/>
  <circle cx="20.35" cy="8.45" r="0.55" fill="#c97a8e"/>
  <!-- Subtle scale dust flecks -->
  <circle cx="8.5" cy="18" r="0.45" fill="#d4c8b5" opacity="0.6"/>
  <circle cx="23.6" cy="17.8" r="0.4" fill="#d4c8b5" opacity="0.55"/>
</svg>