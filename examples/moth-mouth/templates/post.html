{% include "header.html" %}
{% include "partials/nav.html" %}
{% include "partials/search.html" %}
<div class="blog-container">
  <div class="site-frame cabinet" style="margin-top:1.1rem; padding:2.35rem 2.5rem 2.9rem;">
    <main class="blog-main">
      <article class="post">
        <header class="post-header">
          <div class="date">collected {{ page.date | date("%d %B %Y") }}</div>
          <h1 class="infested">{{ page.title | e }}</h1>
        </header>
        <div class="post-content">
          {{ content | safe }}
        </div>
        <div class="post-closing">
          The specimen is still warm. Do not touch the glass.
          <span class="mouth-container">{{ open_mouth() }}</span>
        </div>
      </article>
    </main>
  </div>
{% include "footer.html" %}
