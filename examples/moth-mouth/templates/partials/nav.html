<header class="site-header">
  <div class="header-inner site-frame">
    <a href="{{ base_url }}{{ lang_prefix }}/" class="brand">
      <span class="moth-mark" aria-hidden="true"></span>
      <span>{{ site.title }}</span>
    </a>
    <nav class="nav">
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">Field Notes</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">Drawer</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">Remains</a>
    </nav>
    <div class="header-right" style="margin-left:auto; display:flex; align-items:center; gap:0.6rem;">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language" style="font-size:0.7rem; letter-spacing:0.1em; color:var(--text-faint);">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}
      <button class="search-trigger" onclick="openSearch()" title="Search the specimens" style="font-family:inherit;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span style="font-size:0.72rem;">Search</span>
      </button>
    </div>
  </div>
</header>
