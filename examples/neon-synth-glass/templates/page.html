{% include "header.html" %}
  <main class="site-main">
    <article class="glass-panel">
      <h1>{{ page.title | e }}</h1>
      {% if page.date %}
      <div class="post-meta">
        <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        {% if page.reading_time %} &middot; {{ page.reading_time }} min read{% endif %}
      </div>
      {% endif %}
      <div class="content">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
