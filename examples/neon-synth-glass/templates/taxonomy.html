{% include "header.html" %}
  <main class="site-main">
    <div class="glass-panel">
      <h1>{{ page.title | default("Taxonomy") | e }}</h1>
      <p class="taxonomy-desc">Browse all terms:</p>

      {% if terms is defined %}
      <ul class="tag-list">
        {% for term in terms %}
        <li class="tag-item">
          <a href="{{ term.url }}">{{ term.name | e }} <span class="count">({{ term.pages_count }})</span></a>
        </li>
        {% endfor %}
      </ul>
      {% endif %}

      <div class="content">
        {{ content | safe }}
      </div>
    </div>
  </main>
{% include "footer.html" %}
