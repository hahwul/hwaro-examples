    </main>

    <footer class="phantom-footer">
        <div class="footer-inner">
            <p class="footer-text">Phantom -- whispers from the other side</p>
            <p class="footer-sub">Drifting through the digital fog since 2026</p>
        </div>
    </footer>

    <script>
    (function() {
        if (CSS.supports && CSS.supports('animation-timeline', 'view()')) return;
        var targets = document.querySelectorAll('.phantom-appear');
        if (!targets.length) return;
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, { threshold: 0.1 });
        targets.forEach(function(el) { observer.observe(el); });
    })();
    </script>
</body>
