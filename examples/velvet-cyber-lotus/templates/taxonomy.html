{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% if terms is defined %}
        {% for term in terms %}
          <li><a href="{{ term.url }}">{{ term.name | e }}</a></li>
        {% endfor %}
      {% endif %}
    </ul>
  </main>
{% include "footer.html" %}
