{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% if section.pages is defined %}
        {% for p in section.pages %}
          <li><a href="{{ p.url }}">{{ p.title | e }}</a></li>
        {% endfor %}
      {% endif %}
    </ul>
  </main>
{% include "footer.html" %}
