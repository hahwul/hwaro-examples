{% include "header.html" %}
  <main id="main">
    <header class="section-head">
      <div class="shell">
        <p class="eyebrow">Find a jar</p>
        <h1 class="section-title section-title--lg">{{ page.title | e }}</h1>
        <div class="section-intro prose">{{ content | safe }}</div>
      </div>
    </header>
    <section class="shell search">
      <form class="search__form" role="search" autocomplete="off" onsubmit="return false;">
        <label class="search__label" for="search-input">Search the pantry</label>
        <input class="search__input" id="search-input" type="search" placeholder="miso, brine, koji, day 200…" aria-describedby="search-status" autofocus>
      </form>
      <p class="search__status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="search__results" id="search-results"></ul>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script>window.MONSOON_BASE = "{{ base_url }}"; window.MONSOON_SEARCH_JSON = "{{ base_url }}/search.json";</script>
  <script src="{{ base_url }}/js/search.js" defer></script>
{% include "footer.html" %}
