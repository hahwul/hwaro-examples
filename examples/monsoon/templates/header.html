<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Vollkorn:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page">
    <header class="site-header">
      <div class="shell site-header__inner">
        <a href="{{ base_url }}/" class="brand" aria-label="Monsoon — home">
          <svg class="brand__mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
            <path d="M9 13c0-1 .8-1.6 1.8-1.6h10.4c1 0 1.8.6 1.8 1.6l-.9 10.2c-.1 1.3-1.2 2.2-2.5 2.2h-6.7c-1.3 0-2.4-.9-2.5-2.2z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11.5 9.4c0-.8.7-1.4 1.5-1.4h6c.8 0 1.5.6 1.5 1.4v1.2h-9z" fill="currentColor"/>
          </svg>
          <span class="brand__word">Monsoon</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/ferments/">Ferments</a>
          <a href="{{ base_url }}/about/">About</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/search/">Search</a>
        </nav>
      </div>
    </header>
