<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- SVG dune wave top -->
  <svg class="dune-wave dune-wave--top" viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,40 C240,10 480,55 720,30 C960,5 1200,50 1440,25 L1440,0 L0,0 Z" fill="#c2956b" opacity="0.3"/>
    <path d="M0,45 C360,15 600,55 900,25 C1100,5 1300,45 1440,30 L1440,0 L0,0 Z" fill="#c2956b" opacity="0.15"/>
  </svg>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Dune</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
