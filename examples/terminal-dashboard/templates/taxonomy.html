{% include "header.html" %}
  <main class="site-main">
    <div class="panel-left-block">
      <div class="panel-header">
        <h1 class="panel-title">Index: <span>{{ taxonomy_name | e }}</span></h1>
        <span class="tag tag-ok"> OK </span>
      </div>

      <div class="badge-container" style="gap: 0.6rem; padding: 0.6rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.85rem; padding: 0.3rem 0.7rem;">
            #{{ term.name | e }} <span style="color: var(--phosphor-dim);">({{ term.pages | length }})</span>
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
