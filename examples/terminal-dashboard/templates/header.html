<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Phosphor CRT terminal console stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="crt">
  <div class="site-wrapper">
    <div class="term-window">
      <div class="term-titlebar">
        <span class="term-prompt">user@build-node:~$ monitor --live</span>
        <span class="term-buttons" aria-hidden="true">
          <span class="term-btn"></span><span class="term-btn"></span><span class="term-btn"></span>
        </span>
      </div>
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">tty<span>.monitor</span><b class="cursor" aria-hidden="true">&#9612;</b></a>
      <nav>
        <a href="{{ base_url }}/">ROOT</a>
        <a href="{{ base_url }}/posts/">PROCESSES</a>
        <a href="{{ base_url }}/about/">MANPAGE</a>
      </nav>
    </header>
