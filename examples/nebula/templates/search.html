{% include "header.html" %}

<section class="search-page">
  <header class="section-header">
    <h1 class="section-title">{{ page.title }}</h1>
    <p class="section-desc">Search the cosmic collection</p>
  </header>

  <div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="Search the collection..." autocomplete="off" autofocus>
    <div id="search-results" class="search-results"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script>
(function() {
  var input = document.getElementById('search-input');
  var resultsEl = document.getElementById('search-results');
  var fuse;

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  fetch('{{ base_url }}/search.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3 });
    });

  input.addEventListener('input', function() {
    var query = input.value.trim();
    if (!query || !fuse) { resultsEl.innerHTML = ''; return; }
    var results = fuse.search(query).slice(0, 10);
    if (results.length === 0) {
      resultsEl.innerHTML = '<p class="no-results">No celestial objects match your query.</p>';
      return;
    }
    resultsEl.innerHTML = results.map(function(r) {
      return '<article class="search-result">' +
        '<h3><a href="' + escapeHtml(r.item.url) + '">' + escapeHtml(r.item.title) + '</a></h3>' +
        '</article>';
    }).join('');
  });
})();
</script>
