<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4ece4; --text: #4a3a2a; --accent: #5a4b41; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 1px solid #d8c4b4; padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; }
        .log-surface { background: #fff; padding: 60px; border-radius: 4px; box-shadow: 10px 10px 30px rgba(0,0,0,0.02); border: 1px solid #d8c4b4; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">excavation.log</div></header>
