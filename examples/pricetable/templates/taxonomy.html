{% include "header.html" %}

<div class="taxonomy-container">
    <header class="page-header">
        <h1>{{ taxonomy.name | capitalize }}</h1>
    </header>

    <ul class="term-list">
        {% for term in taxonomy_terms %}
        <li>
            <a href="{{ term.permalink }}">{{ term.name }}</a>
            <span class="count">({{ term.pages | length }})</span>
        </li>
        {% endfor %}
    </ul>
</div>

{% include "footer.html" %}
