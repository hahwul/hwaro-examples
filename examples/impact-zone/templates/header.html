<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ff4500; --text: #fff; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: center; padding: 60px 0; }
        .logo { font-family: 'Bangers', cursive; font-size: 4rem; text-transform: uppercase; -webkit-text-stroke: 2px #000; letter-spacing: 5px; }
        .impact-surface { background: #fff; color: #000; padding: 60px; border: 10px solid #000; box-shadow: 20px 20px 0 #000; position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">impact.zone</div></header>
