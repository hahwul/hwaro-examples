{% include "header.html" %}

  <main class="composition">
    <div class="comp-block comp-red" aria-hidden="true"></div>
    <div class="comp-block comp-blue" aria-hidden="true"></div>

    <div class="post-grid">
      {% for item in site.pages %}
      <article class="post-card card-tab-{{ loop.index0 % 3 }}">
        <a href="{{ base_url }}{{ item.url }}">
          <span class="card-tab" aria-hidden="true"></span>
          <h2 class="card-title">{{ item.title }}</h2>
          <div class="card-meta">
            {% if item.date %}<span class="meta-date">{{ item.date }}</span>{% endif %}
            {% if item.reading_time %}<span class="meta-time">{{ item.reading_time }} min</span>{% endif %}
          </div>
          {% if item.description %}
          <p class="card-desc">{{ item.description }}</p>
          {% endif %}
          <span class="read-more">Read &rarr;</span>
        </a>
      </article>
      {% endfor %}
    </div>

    <div class="comp-block comp-yellow" aria-hidden="true"></div>
  </main>

{% include "footer.html" %}
