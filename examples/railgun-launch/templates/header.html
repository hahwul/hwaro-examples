<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #00f2ff;
            --line: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .rail-wrapper {
            position: relative;
            padding: 100px 0;
        }
        .rail-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--accent);
            z-index: -1;
        }
        .rail-hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            text-transform: uppercase;
            margin: 0;
            background: var(--bg);
            display: inline-block;
            padding-right: 40px;
        }
        .rail-stats {
            display: flex;
            gap: 100px;
            margin-top: 60px;
            border-top: 1px solid var(--line);
            padding-top: 40px;
        }
        .stat-item span {
            display: block;
            color: var(--accent);
            font-size: 0.6rem;
            margin-bottom: 10px;
        }
        .stat-item div {
            font-size: 1.5rem;
            font-weight: 700;
        }
        article { padding: 60px 0; max-width: 800px; }
        h2 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; color: var(--accent); margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">RAILGUN//PROJECT</div>
            <nav>
                <a href="/">Telemetry</a>
                <a href="/about">Payload</a>
            </nav>
        </div>
    </header>
