{% extends "base.html" %}

{% block content %}
<div class="glass-card main-card">
  <h1>{{ taxonomy_name | capitalize }}: {{ taxonomy_term.name }}</h1>

  <ul class="section-list">
    {% for post in taxonomy_pages %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>

  <a href="{{ base_url }}/{{ taxonomy_name }}/" class="glass-btn">Back to {{ taxonomy_name }}</a>
</div>
{% endblock %}
