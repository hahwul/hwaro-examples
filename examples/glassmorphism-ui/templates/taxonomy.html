{% extends "base.html" %}

{% block content %}
<div class="glass-card main-card">
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <div class="taxonomy-terms glass-pill-container">
    {% for term in taxonomy_terms %}
      <a href="{{ term.url }}" class="glass-pill">{{ term.name }} ({{ term.count }})</a>
    {% endfor %}
  </div>
</div>
{% endblock %}
