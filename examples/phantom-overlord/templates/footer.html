<script>function initPhantom(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=t*.1,i=setInterval(()=>{c+=t*.12;if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c|0},32)});console.log('%c[PHANTOM] We are already inside.','color:#64748b')}addEventListener('load',initPhantom)</script></body></html>
