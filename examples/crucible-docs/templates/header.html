<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #fff; --accent: #ff4500; --fire: rgba(255, 69, 0, 0.2); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 40px; margin-bottom: 60px; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); }
        .crucible-surface { background: #0c0c0c; padding: 60px; border: 1px solid #333; box-shadow: 0 0 50px var(--fire); position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">crucible.docs</div></header>
