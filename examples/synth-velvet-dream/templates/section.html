{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
  <h1>{{ page.title | e }}</h1>
  <div class="content">
    {{ content | safe }}
  </div>
</div>

{% if section.list is defined and section.list | length > 0 %}
<ul class="section-list">
  {{ section.list | safe }}
</ul>
{% endif %}

{% if pagination is defined %}
  {{ pagination | safe }}
{% endif %}
{% endblock %}
