<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="term-window">
    <header class="term-titlebar">
      <span class="titlebar-dots" aria-hidden="true">
        <span class="dot dot-close"></span>
        <span class="dot dot-min"></span>
        <span class="dot dot-max"></span>
      </span>
      <a class="titlebar-title" href="{{ base_url }}/">semaphore — {% if page.url is present and page.url == "/" %}~{% else %}{{ page.title | default("session", true) | lower }}{% endif %} — 132×36</a>
      <span class="titlebar-gpu" aria-hidden="true">gpu:on</span>
    </header>
    <nav class="term-tabs" aria-label="Primary">
      <a class="tab{% if page.url is present and page.url == "/" %} is-active{% endif %}" href="{{ base_url }}/"><span class="tab-index">1</span>~</a>
      <a class="tab{% if page.section is present and page.section == "releases" %} is-active{% endif %}" href="{{ base_url }}/releases/"><span class="tab-index">2</span>releases</a>
      <a class="tab{% if page.url is present and page.url == "/about/" %} is-active{% endif %}" href="{{ base_url }}/about/"><span class="tab-index">3</span>about</a>
      <a class="tab{% if taxonomy_name %} is-active{% endif %}" href="{{ base_url }}/tags/"><span class="tab-index">4</span>tags</a>
      <a class="tab tab-feed" href="{{ base_url }}/releases/rss.xml">rss ↗</a>
    </nav>
    <main id="main" class="term-screen">
      <div class="screen-inner">
