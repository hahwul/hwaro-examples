<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2a2a2a;
      --text: #333333;
      --text-muted: #777777;
      --border: #eaeaea;
      --bg: #fafafa;
      --bg-alt: #ffffff;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #e0e0e0;
        --text: #d4d4d4;
        --text-muted: #999999;
        --border: #333333;
        --bg: #121212;
        --bg-alt: #1a1a1a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
    }

    .site-logo {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
    }

    .site-main {
      flex: 1;
      padding: 2rem 0;
      animation: fadeIn 0.8s ease-out forwards;
    }

    .site-footer {
      padding: 3rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-serif);
      color: var(--primary);
      line-height: 1.3;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 400;
    }

    h1 { font-size: 2.5rem; margin-top: 0; letter-spacing: -0.02em; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }

    p {
      margin: 0 0 1.5rem 0;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.3s ease;
    }

    a:hover {
      border-bottom-color: var(--primary);
    }

    /* Code and Pre */
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85em;
      background: var(--bg-alt);
      padding: 0.2em 0.4em;
      border-radius: 3px;
    }

    pre {
      background: var(--bg-alt);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      font-size: 0.9em;
      line-height: 1.5;
    }

    pre code {
      background: transparent;
      padding: 0;
      border: none;
    }

    /* Lists */
    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    /* Blockquote */
    blockquote {
      margin: 2rem 0;
      padding: 1rem 1.5rem;
      border-left: 2px solid var(--primary);
      background: var(--bg-alt);
      font-style: italic;
      color: var(--text-muted);
    }

    /* Hero / Intro specific styles */
    .hero {
      margin-bottom: 4rem;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.6;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Work</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <p>&copy; {{ current_year }} Serenata. Powered by Hwaro.</p>
    </footer>
  </div>
  {{ highlight_js | safe }}
  {{ auto_includes_js | safe }}
</body>
</html>
