<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eaddc5; /* dark ivory */
            --text: #2a2a2a;
            --accent: #8b0000; /* dark red ink */
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IM Fell English', serif;
            margin: 0;
            line-height: 1.5;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.05"/></svg>');
        }
        .container {
            max-width: 750px;
            margin: 40px auto;
            padding: 60px;
            border: 2px solid var(--text);
            background: rgba(255,255,255,0.1);
            box-shadow: 10px 10px 0 var(--text);
        }
        header {
            padding-bottom: 40px;
            border-bottom: 2px solid var(--text);
            text-align: center;
        }
        .logo {
            font-family: 'Cinzel Decorative', cursive;
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1rem;
            font-variant: small-caps;
            font-weight: bold;
            border-bottom: 1px solid transparent;
        }
        nav a:hover { border-bottom: 1px solid var(--text); }
        .inc-hero {
            padding: 60px 0;
            text-align: center;
        }
        .inc-hero h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 4rem;
            margin: 0;
            color: var(--accent);
        }
        article { padding: 40px 0; font-size: 1.2rem; }
        h2 { font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; border-bottom: 1px solid var(--text); padding-bottom: 10px; margin-top: 50px; }
        .drop-cap {
            float: left;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 5rem;
            line-height: 0.8;
            padding-right: 10px;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">INCUNABULUM</div>
        <nav>
            <a href="/">Folio</a>
            <a href="/about">Imprint</a>
        </nav>
    </header>
