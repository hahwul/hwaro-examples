    <h1>All {{ taxonomy }}</h1>
    <ul class="section-list taxonomy-list">
      {% for term in taxonomy_terms %}
        <li class="glass-panel">
          <a href="{{ base_url }}/{{ taxonomy }}/{{ term | slugify }}/">{{ term }}</a>
        </li>
      {% endfor %}
    </ul>
  </main>
