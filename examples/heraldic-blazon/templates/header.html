<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <header class="banner">
    <div class="banner-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="{{ site.title }}">
        <span class="brand-crest" aria-hidden="true">
          <svg viewBox="0 0 64 76" width="44" height="52" role="img">
            <path class="crest-field" d="M4 4 H60 V40 C60 58 46 68 32 73 C18 68 4 58 4 40 Z"/>
            <path class="crest-chevron" d="M32 24 L52 50 H44 L32 34 L20 50 H12 Z"/>
            <path class="crest-frame" d="M4 4 H60 V40 C60 58 46 68 32 73 C18 68 4 58 4 40 Z" fill="none"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">{{ site.title }}</span>
          <span class="brand-motto">Azure, a chevron Or</span>
        </span>
      </a>
      <nav class="banner-nav">
        <a href="{{ base_url }}/posts/">Roll of Arms</a>
        <a href="{{ base_url }}/search/">Search</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>

  <div class="ribbon-divider" aria-hidden="true">
    <svg viewBox="0 0 320 22" preserveAspectRatio="none" width="100%" height="22" role="presentation">
      <path class="ribbon-tail" d="M0 11 L26 3 L20 11 L26 19 Z"/>
      <path class="ribbon-tail" d="M320 11 L294 3 L300 11 L294 19 Z"/>
      <rect class="ribbon-body" x="24" y="6" width="272" height="10"/>
    </svg>
  </div>
