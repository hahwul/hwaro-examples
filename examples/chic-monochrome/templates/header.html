<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="site-header">
    <div class="header-container">
      <div class="logo-area">
        <a href="{{ base_url }}/" class="site-logo">CHIC / MONOCHROME</a>
        <p class="tagline">An Editorial Space for Haute Couture</p>
      </div>
      <nav class="site-nav">
        <ul>
          <li><a href="{{ base_url }}/" class="nav-link">Journal</a></li>
          <li><a href="{{ base_url }}/about/" class="nav-link">The Studio</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="site-main">
