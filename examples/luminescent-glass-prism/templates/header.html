<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #00e5ff;
      --primary-glow: rgba(0, 229, 255, 0.6);
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: rgba(255, 255, 255, 0.1);
      --bg-glass: rgba(255, 255, 255, 0.05);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin-top: 2rem;
      margin-bottom: 2rem;
      border-radius: 12px;
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.3rem;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--primary-glow);
    }
    .site-logo:hover { color: var(--primary); }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 3rem;
      margin-bottom: 2rem;
      padding: 1.5rem 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Glass Panel Component */
    .glass-panel {
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      margin-bottom: 2rem;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 0;
      margin-bottom: 1em;
      font-weight: 600;
      color: #fff;
    }
    h1 { font-size: 2.2rem; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.3rem; }
    p { margin: 1em 0; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: text-shadow 0.3s ease;
    }
    a:hover {
      text-decoration: underline;
      text-shadow: 0 0 8px var(--primary-glow);
    }

    code {
      background: rgba(0,0,0,0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(255,255,255,0.05);
    }

    pre {
      background: rgba(0,0,0,0.4);
      padding: 1.2rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Lists */
    ul.section-list, ul {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }
    ul li {
      margin-bottom: 0.8rem;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    ul li:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
      border-color: rgba(255,255,255,0.15);
    }
    ul li a { font-weight: 500; display: block; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.5rem; }
      .site-wrapper { padding: 0 1rem; }
      .glass-panel { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
