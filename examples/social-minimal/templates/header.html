<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #000; --border: #f1f1f1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px; }
        header { padding: 40px 0; border-bottom: 1px solid var(--border); text-align: center; }
        .logo { font-weight: 200; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; }
        .post { padding: 30px 0; border-bottom: 1px solid var(--border); }
        .meta { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">minimal.feed</div></header>
