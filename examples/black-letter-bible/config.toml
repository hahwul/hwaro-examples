# =============================================================================
# Black-Letter Bible - A Sacred Typography Publication
# Issue #1560 | Tags: book, dark, sacred, blackletter, dense
# =============================================================================

title = "BLACK-LETTER BIBLE - A Study in Sacred Typography"
description = "A typographic study of the black-letter Bibles of Western printing - the 42-line, the Coverdale, the 1611 Great, and their descendants. Illuminated initials, column dividers, and the dense gothic text set upon a dark ground."
base_url = "http://localhost:3000"

sections = ["chapters"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "era"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A typographic study of historic Bible editions. Scholarly use; please cite if used."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["chapters"]

[markdown]
safe = false
lazy_loading = false
emoji = false
