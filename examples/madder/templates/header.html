<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="7" fill="var(--accent)"></rect>
          <rect x="6" y="6" width="6" height="6" fill="var(--accent-fg)"></rect>
          <rect x="20" y="6" width="6" height="6" fill="var(--accent-fg)"></rect>
          <rect x="13" y="13" width="6" height="6" fill="var(--accent-fg)"></rect>
          <rect x="6" y="20" width="6" height="6" fill="var(--accent-fg)"></rect>
          <rect x="20" y="20" width="6" height="6" fill="var(--accent-fg)"></rect>
        </svg>
        <span class="brand-word">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/tapestries/">Tapestries</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
