{% include "header.html" %}
  <main id="main">
    <header class="section-head">
      <div class="wrap">
        <p class="section-kicker">Studio archive <span aria-hidden="true">·</span> {{ section.pages_count }} pieces</p>
        <h1>{{ page.title | e }}</h1>
        {% if content %}<div class="section-lede">{{ content | safe }}</div>{% endif %}
      </div>
    </header>
    <section class="wall wall--section" aria-label="{{ page.title | e }}">
      <div class="wrap">
        <div class="wall-grid">
          {% for t in section.pages | sort_by("date", reverse=true) %}
            {% include "partials/card.html" %}
          {% endfor %}
        </div>
      </div>
    </section>
  </main>
{% include "footer.html" %}
