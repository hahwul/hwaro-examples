<article class="card">
  <a class="card-link" href="{{ base_url }}{{ t.url }}">
    <div class="card-draft">{% include "partials/weave-draft.html" %}</div>
    <p class="card-meta">
      {% if t.extra.structure %}<span class="card-structure">{{ t.extra.structure }}</span>{% endif %}
      {% if t.date %}<span class="card-dot" aria-hidden="true">·</span><time datetime="{{ t.date | date('%Y-%m-%d') }}">{{ t.date | date('%b %Y') }}</time>{% endif %}
    </p>
    <h3 class="card-title">{{ t.title | e }}</h3>
    {% if t.summary %}<p class="card-summary">{{ t.summary | strip_html | truncate_words(26) }}</p>{% endif %}
    <span class="card-cta">Weaving notes<span aria-hidden="true"> →</span></span>
  </a>
</article>
