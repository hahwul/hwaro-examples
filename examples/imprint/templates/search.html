{% include "header.html" %}
  <main id="main" class="page-main">
    <article class="plain-page search-page">
      <p class="page-kicker">Find an essay</p>
      <h1 class="page-title">{{ page.title | e }}</h1>
      <p class="search-intro">Search titles, kickers, tags, and body text across every essay in the annual.</p>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search Imprint</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="Caslon, punchcutter, revival&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="search-results" id="search-results"></ol>
    </article>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
