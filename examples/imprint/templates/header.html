<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="leaf">
    <p class="running-head" aria-hidden="true">
      <span>Imprint</span>
      <span>Volume&nbsp;VII &middot; Summer 2026</span>
    </p>
    <header class="masthead">
      <a class="wordmark" href="{{ base_url }}/">
        <svg class="wordmark-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <path d="M11 9h10v2.6h-3.4v8.8H21V23H11v-2.6h3.4v-8.8H11z" fill="currentColor"/>
        </svg>
        <span>Imprint</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/specimens/">Specimens</a>
        <a href="{{ base_url }}/tags/">Subject Index</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </header>
