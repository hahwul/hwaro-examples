<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap site-header__inner">
      <a class="brand" href="{{ base_url }}/" aria-label="Cinnabar — home">
        <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="16" fill="currentColor"/>
          <circle cx="13" cy="13" r="4.5" fill="var(--bg)" opacity="0.35"/>
        </svg>
        <span class="brand__word">Cinnabar</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/vessels/">Vessels</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
