<script>function initPlague(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/24);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[PLAGUE DOMINION] The perfect pandemic. Everything decays beautifully.','color:#4ade80')}addEventListener('load',initPlague)</script></body></html>
