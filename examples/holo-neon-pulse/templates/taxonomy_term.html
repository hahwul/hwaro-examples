{% include "header.html" %}

<header class="page-head">
  <svg class="corner" width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true">
    <line x1="0" y1="60" x2="120" y2="60" stroke="#1f1f33" stroke-dasharray="2 4"/>
    <path d="M0,60 L 30,60 L 40,20 L 60,100 L 80,30 L 100,60 L 120,60" stroke="#ff2d92" stroke-width="1.4" fill="none"/>
    <circle cx="40" cy="20" r="2" fill="#c1ff3b"/>
    <circle cx="80" cy="30" r="2" fill="#2de2ff"/>
  </svg>
  <div class="eyebrow">tagged</div>
  <h1>{{ page.title | e }}</h1>
  <p class="lead">Posts tagged with this term.</p>
</header>

<div class="content-body">
  {{ content | safe }}
</div>
