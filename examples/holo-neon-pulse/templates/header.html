<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #ff00ff;
      --secondary: #00ffff;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --border: rgba(0, 255, 255, 0.3);
      --bg: #050510;
      --bg-subtle: rgba(255, 0, 255, 0.05);
      --glass: rgba(10, 10, 25, 0.7);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: "Courier New", Courier, monospace;
        line-height: 1.6;
        margin: 0;
        color: var(--text);
        background: var(--bg);
        background-image:
            linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* Layout */
    .site-wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 1.5rem;
        background: var(--glass);
        backdrop-filter: blur(10px);
        min-height: 100vh;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }
    .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 0;
        border-bottom: 2px solid var(--primary);
        margin-bottom: 2rem;
        text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
    }
    .site-logo {
        font-weight: bold;
        font-size: 1.5rem;
        color: var(--secondary);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 5px var(--secondary), 0 0 10px var(--secondary), 0 0 20px var(--secondary);
    }
    .site-logo:hover { color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--secondary), 0 0 30px var(--secondary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
    .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: normal; color: var(--primary); text-shadow: 0 0 5px var(--primary); }
    h1 { font-size: 2rem; margin-top: 0; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--secondary); text-decoration: none; transition: all 0.2s; }
    a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }
    code { background: rgba(0,0,0,0.5); padding: 0.2rem 0.4rem; border-radius: 2px; font-size: 0.9em; border: 1px solid var(--border); color: var(--secondary); }
    pre { background: rgba(0,0,0,0.8); padding: 1rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--primary); box-shadow: inset 0 0 10px rgba(255,0,255,0.2); }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 4px; border: 1px solid var(--border); transition: all 0.3s; }
    ul.section-list li:hover { border-color: var(--secondary); box-shadow: 0 0 10px rgba(0,255,255,0.2); transform: translateX(5px); }
    ul.section-list li a { font-size: 1.2rem; font-weight: bold; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; border-left: 3px solid var(--primary); padding-left: 1rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { border: none; }
    }
    </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
