{% include "header.html" %}

<header class="page-head">
  <svg class="corner" width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true">
    <rect x="20" y="20" width="20" height="20" stroke="#2de2ff" stroke-width="1" fill="none"/>
    <rect x="50" y="20" width="20" height="20" stroke="#ff2d92" stroke-width="1" fill="none"/>
    <rect x="80" y="20" width="20" height="20" stroke="#c1ff3b" stroke-width="1" fill="none"/>
    <rect x="20" y="50" width="20" height="20" stroke="#1f1f33" stroke-width="1" fill="none"/>
    <rect x="50" y="50" width="20" height="20" stroke="#2de2ff" stroke-width="1" fill="none"/>
    <rect x="80" y="50" width="20" height="20" stroke="#1f1f33" stroke-width="1" fill="none"/>
  </svg>
  <div class="eyebrow">channels</div>
  <h1>{{ page.title | e }}</h1>
  <p class="lead">Browse all terms in this taxonomy.</p>
</header>

<div class="content-body">
  {{ content | safe }}
</div>
