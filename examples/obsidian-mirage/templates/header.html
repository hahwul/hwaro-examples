<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #45f3ff;
      --secondary: #ff0055;
      --text: #e0e6ed;
      --text-muted: #8b9eb0;
      --border: rgba(44, 49, 58, 0.5);
      --bg: #0b0c10;
      --bg-subtle: rgba(28, 30, 38, 0.6);
      --mirage-glow: rgba(69, 243, 255, 0.15);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(69, 243, 255, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.05), transparent 25%);
      background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      margin: 1.5rem 0 2rem 0;
      background: rgba(11, 12, 16, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--mirage-glow);
      transition: all 0.3s ease;
    }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px rgba(69, 243, 255, 0.4); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 220px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      background: rgba(11, 12, 16, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.3;
      margin-top: 1.8em;
      margin-bottom: 0.8em;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    h1 { font-size: 2.2rem; margin-top: 0; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; transition: all 0.2s; }
    a:hover { text-shadow: 0 0 8px rgba(69, 243, 255, 0.4); }
    code {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #a8b2d1;
      border: 1px solid rgba(255,255,255,0.05);
    }
    pre {
      background: rgba(11, 12, 16, 0.8);
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: rgba(69, 243, 255, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(69, 243, 255, 0.1);
    }
    ul.section-list li a { font-weight: 600; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; font-family: 'Space Grotesk', sans-serif; }
    nav.pagination a:hover { color: var(--text); border-color: var(--primary); box-shadow: 0 0 10px rgba(69, 243, 255, 0.2); }
    .pagination-current span { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(69, 243, 255, 0.1); color: var(--primary); font-family: 'Space Grotesk', sans-serif; font-weight: 600; text-shadow: 0 0 5px rgba(69,243,255,0.3); }
    .pagination-disabled span { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; font-family: 'Space Grotesk', sans-serif; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.25rem; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
