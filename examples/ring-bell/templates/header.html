<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-bell">
          <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20,4 L20,8 M14,8 L26,8 L28,14 L26,28 L14,28 L12,14 Z" stroke="#d4352a" stroke-width="2.5" fill="#1a0f10"/>
            <circle cx="20" cy="32" r="2.5" fill="#d4352a"/>
            <line x1="20" y1="28" x2="20" y2="34" stroke="#d4352a" stroke-width="1.5"/>
          </svg>
        </span>
        RING BELL
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Card</a>
        <a href="{{ base_url }}/rounds/">Rounds</a>
        <a href="{{ base_url }}/fighters/">Fighters</a>
        <a href="{{ base_url }}/tickets/" class="nav-cta">Tickets</a>
      </nav>
    </header>
