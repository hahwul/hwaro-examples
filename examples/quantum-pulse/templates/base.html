<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <style>
    body { background: #0a0a12; color: #e0e0ff; font-family: monospace; }
    .site-main { padding: 2rem; border: 1px solid #00ffff; box-shadow: 0 0 10px #00ffff; max-width: 800px; margin: 2rem auto; }
    a { color: #ff00ff; text-decoration: none; text-shadow: 0 0 5px #ff00ff; }
    a:hover { color: #00ffff; text-shadow: 0 0 8px #00ffff; }
    h1, h2, h3 { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
  </style>
  {{ highlight_css }}
</head>
<body>
  <div class="site-wrapper">
    <header><h1><a href="{{ base_url }}/">{{ site.title }}</a></h1></header>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
    <footer><p>&copy; {{ site.title }}</p></footer>
  </div>
</body>
</html>
