{% include "header.html" %}
<article class="post-detail">
  <header class="post-header">
    <h1>{{ page.title | escape }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
      {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
        <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content | safe }}
  </div>
</article>
{% include "footer.html" %}
