<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | escape }}">
  <title>{{ page.title | escape }} - {{ site.title | escape }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="sea-level-wrapper">
    <div class="sea-level">
      <div class="tidal-wave"></div>
    </div>
  </div>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search journal..." autocomplete="off">
        <kbd onclick="closeSearch()">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <header class="blog-header">
    <a href="{{ base_url }}/" class="logo">TIDAL</a>
    <nav>
      <a href="{{ base_url }}/posts/">Journal</a>
      <a href="{{ base_url }}/archives/">Archives</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
    <div class="header-right">
      <button class="search-trigger" id="search-btn" onclick="openSearch()" title="Search (Ctrl/Cmd+K)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </header>

  <main class="blog-container">
    <div class="animate-drift">
