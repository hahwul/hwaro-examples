{% include "header.html" %}
<div class="blog-container">
  <div class="bismuth-panel">
    <main class="site-main">
      <h1>{{ page.title | e }}</h1>
      <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
      {% if terms is defined %}
        <ul>
          {% for term in terms %}
            <li><a href="{{ term.permalink }}">{{ term.name | e }}</a></li>
          {% endfor %}
        </ul>
      {% endif %}
      {{ content }}
    </main>
  </div>
</div>
{% include "footer.html" %}
