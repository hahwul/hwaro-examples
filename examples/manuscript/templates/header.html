<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;1,300&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f7f2;
            --text: #333;
            --ink: #222;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.7;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px dashed #ccc;
        }
        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .manuscript-hero {
            padding: 80px 0;
        }
        .manuscript-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            font-style: italic;
            margin: 0;
        }
        .draft-mark {
            display: inline-block;
            border: 1px solid var(--text);
            padding: 2px 10px;
            font-size: 0.6rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        article {
            background: #fff;
            padding: 60px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid #eee;
        }
        h2 { font-weight: 400; font-style: italic; font-size: 2rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">manuscript.draft.v1</div>
            <nav>
                <a href="/">Folio</a>
                <a href="/about">Notes</a>
            </nav>
        </div>
    </header>
