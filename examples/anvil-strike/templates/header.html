<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c1c1c;
            --iron: #333333;
            --steel: #666666;
            --text: #d4d4d4;
            --accent: #ffae00;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.7;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 4px solid var(--iron);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 2rem;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .anvil-hero {
            padding: 100px 0;
            text-align: center;
        }
        .anvil-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            line-height: 1;
        }
        .anvil-mark {
            width: 80px;
            height: 4px;
            background: var(--accent);
            margin: 40px auto;
        }
        article {
            padding: 60px 0;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 3rem; color: #fff; border-bottom: 1px solid var(--iron); padding-bottom: 10px; }
        blockquote {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            border-left: 4px solid var(--accent);
            padding-left: 30px;
            margin: 40px 0;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Anvil Strike</div>
            <nav>
                <a href="/">Forge</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
