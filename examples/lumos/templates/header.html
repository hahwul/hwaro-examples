<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #4a4a4a;
      --text: #2c2c2c;
      --text-muted: #737373;
      --border: #eaeaea;
      --bg: #ffffff;
      --bg-subtle: #fdfdfd;
      --font-serif: "Georgia", "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: var(--font-serif); line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); font-size: 1.125rem; }

    /* Layout */
    .site-wrapper { max-width: 640px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; flex-direction: column; align-items: center; padding: 4rem 0 3rem; margin-bottom: 2rem; }
    .site-logo { font-weight: normal; font-size: 2rem; color: var(--text); text-decoration: none; letter-spacing: 0.05em; font-family: var(--font-sans); }
    .site-logo:hover { color: var(--text-muted); }
    .site-header nav { display: flex; gap: 2rem; margin-top: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s ease; }
    .site-header nav a:hover { color: var(--text); }
    .site-main { min-height: calc(100vh - 350px); }
    .site-footer { margin-top: 5rem; padding: 2rem 0; color: var(--text-muted); font-size: 0.9rem; text-align: center; font-family: var(--font-sans); border-top: 1px solid var(--border); }

    /* Typography */
    h1, h2, h3 { line-height: 1.4; margin-top: 2em; margin-bottom: 1em; font-weight: normal; color: var(--text); font-family: var(--font-sans); }
    h1 { font-size: 2rem; margin-top: 0; letter-spacing: -0.02em; text-align: center; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.25em 0; }
    a { color: var(--text); text-decoration: underline; text-underline-offset: 4px; text-decoration-color: var(--border); transition: text-decoration-color 0.2s ease; }
    a:hover { text-decoration-color: var(--text); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1.5rem; overflow-x: auto; border: 1px solid var(--border); font-size: 0.9rem; }
    pre code { background: none; padding: 0; border: none; }
    blockquote { margin: 2rem 0; padding-left: 1.5rem; border-left: 1px solid var(--text-muted); color: var(--text-muted); font-style: italic; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    ul.section-list li:last-child { border-bottom: none; }
    ul.section-list li a { font-size: 1.25rem; font-family: var(--font-sans); text-decoration: none; display: block; margin-bottom: 0.5rem; }
    ul.section-list li a:hover { color: var(--text-muted); text-decoration: none; }
    ul.section-list li .post-date { font-family: var(--font-sans); font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }
    nav.pagination { margin: 3rem 0; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; font-family: var(--font-sans); }
    nav.pagination a { padding: 0.5rem 1rem; color: var(--text); text-decoration: none; border: 1px solid var(--border); transition: all 0.2s; }
    nav.pagination a:hover { border-color: var(--text); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--text); background: var(--text); color: var(--bg); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { padding: 2rem 0; }
      .site-header nav { flex-wrap: wrap; justify-content: center; gap: 1rem; }
      h1 { font-size: 1.75rem; }
      body { font-size: 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
