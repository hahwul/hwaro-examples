<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      /* Mint Green / Fresh Vibe Palette */
      --primary: #10B981; /* Emerald / Mint */
      --primary-light: rgba(16, 185, 129, 0.1);
      --primary-hover: #059669;
      --accent: #34D399;

      /* Typography & Backgrounds */
      --text: #1F2937; /* Slate dark */
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --bg: #FAFAFA;
      --bg-subtle: #FFFFFF;
      --bg-card: #FFFFFF;

      /* Shadows for glowing/luminescent effects without gradients */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
      --shadow-glow: 0 10px 25px -5px rgba(16, 185, 129, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper {
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-bottom: 2rem;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.025em;
    }

    .site-logo span {
      color: var(--text);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
    }

    .nav-cta {
      background-color: var(--primary);
      color: white !important;
      padding: 0.5rem 1.25rem;
      border-radius: 9999px; /* full rounded */
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .nav-cta:hover {
      background-color: var(--primary-hover);
      box-shadow: var(--shadow-glow);
    }

    .site-main {
      flex: 1;
    }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.875rem;
      text-align: center;
    }

    /* Landing Page Specific Components */
    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: -0.025em;
    }

    .hero h1 span {
      color: var(--primary);
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: var(--shadow-glow);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .dashboard-preview {
      margin: 4rem auto;
      max-width: 900px;
      border-radius: 1rem;
      overflow: hidden;
      background-color: var(--bg-card);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      border: 1px solid var(--border);
    }

    .dashboard-header {
      background-color: var(--bg-subtle);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--border);
    }

    .dashboard-body {
      padding: 2rem;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      background-color: var(--primary-light);
      font-weight: 500;
      border-radius: 0 0 1rem 1rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin: 4rem 0;
    }

    .feature-card {
      background-color: var(--bg-card);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      border-color: var(--primary-light);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background-color: var(--primary-light);
      color: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .feature-card h3 {
      font-size: 1.25rem;
      margin-top: 0;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .feature-card p {
      color: var(--text-muted);
      margin: 0;
      font-size: 0.95rem;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; font-weight: 700; color: var(--text); }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1rem; }
      .site-header nav { flex-wrap: wrap; justify-content: center; }
      .hero h1 { font-size: 2.5rem; }
      .hero-actions { flex-direction: column; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Mint<span>Fresh</span></a>
      <nav>
        <a href="{{ base_url }}/">Product</a>
        <a href="{{ base_url }}/about/">Features</a>
        <a href="{{ base_url }}/about/">Pricing</a>
        <a href="{{ base_url }}/about/" class="nav-cta">Get Started</a>
      </nav>
    </header>
