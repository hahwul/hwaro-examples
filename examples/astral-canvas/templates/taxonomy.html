{% extends "base.html" %}
{% block content %}
<main class="site-main">
  <h1>{{ taxonomy.name | capitalize }}</h1>
  <p class="taxonomy-desc">All terms in {{ taxonomy.name }}</p>
  <ul class="section-list">
    {% for term in terms %}
      <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
    {% endfor %}
  </ul>
</main>
{% endblock %}
