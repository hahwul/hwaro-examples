<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div>
        <strong><a href="{{ base_url }}/" style="color:var(--text-color);">{{ site.title }}</a></strong>
      </div>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer style="margin-top: 4rem; text-align: center; font-size: 0.875rem; color: #64748b;">
      &copy; {{ site.title }}. Built with Hwaro.
    </footer>
  </div>
</body>
</html>
