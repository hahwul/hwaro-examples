title = "Changelog"
description = "Release notes and changelog powered by Hwaro"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = true
per_page = 20

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[robots]
enabled = true
rules = [{ user_agent = "*", disallow = [] }]

[feeds]
enabled = true
type = "rss"
limit = 20
sections = ["releases"]

[markdown]
safe = false
lazy_loading = true
