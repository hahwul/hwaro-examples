<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/" aria-label="Tramontana — home">
      <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
        <path d="M4 23 L11 11 L17 19 L22 13 L28 23" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <line x1="4" y1="26" x2="28" y2="26" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
        <path d="M23 4 L28 4 L28 12 Z" class="brand-nib"/>
      </svg>
      <span class="brand-word">Tramontana</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ base_url }}/sketches/">Sketches</a>
      <a href="{{ base_url }}/tags/">Tags</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
