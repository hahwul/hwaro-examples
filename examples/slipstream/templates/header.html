<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;1,600;1,700;1,800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="bar">
      <a href="{{ base_url }}/" class="brand" aria-label="Slipstream home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 20" width="30" height="19" focusable="false">
            <g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <path d="M4 5 L20 5"/><path d="M2 10 L23 10"/><path d="M6 15 L18 15"/>
            </g>
            <path d="M19 2 L28 10 L19 18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-word">Slipstream</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/bikes/">Bikes</a>
        <a href="{{ base_url }}/geometry/">Geometry</a>
        <a href="{{ base_url }}/wind-tunnel/">Wind Tunnel</a>
        <a href="{{ base_url }}/dealers/">Dealers</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
