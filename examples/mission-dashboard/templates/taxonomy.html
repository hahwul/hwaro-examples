{% include "header.html" %}
  <main class="site-main">
    <div class="panel-left-block" style="margin-bottom: 2rem;">
      <div class="panel-header">
        <h1 class="panel-title">Channel Index: <span>{{ taxonomy_name | upper | e }}</span></h1>
        <span class="indicator-badge indicator-cyan">CATALOG</span>
      </div>

      <div class="badge-container" style="gap: 0.75rem; padding: 0.5rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.85rem; padding: 0.4rem 0.8rem;">
            {{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
