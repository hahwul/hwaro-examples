<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Mission Control console stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <div class="status-bar">
      <div class="status-clock">
        <span class="status-clock-label">MET</span>
        <span class="status-clock-value">T- 00:14:22</span>
      </div>
      <div class="status-mission">
        <span class="lamp lamp-green"></span>
        <span>MISSION: NOMINAL</span>
      </div>
      <div class="lamp-row">
        <span class="lamp-cell"><span class="lamp lamp-green"></span>PWR</span>
        <span class="lamp-cell"><span class="lamp lamp-green"></span>NAV</span>
        <span class="lamp-cell"><span class="lamp lamp-amber"></span>COMM</span>
        <span class="lamp-cell"><span class="lamp lamp-green"></span>THR</span>
        <span class="lamp-cell"><span class="lamp lamp-green"></span>LIFE</span>
      </div>
    </div>

    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">MCC-7<span class="logo-mark"></span><span class="logo-tail">FLIGHT</span></a>
      <nav aria-label="Primary">
        <a href="{{ base_url }}/">Flight</a>
        <a href="{{ base_url }}/posts/">Telemetry</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
