<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&display=swap');

    :root {
      --primary: #e0a96d;
      --primary-glow: rgba(224, 169, 109, 0.4);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(224, 169, 109, 0.2);
      --bg: #0b0f19;
      --bg-subtle: #1e293b;
      --bg-card: rgba(30, 41, 59, 0.6);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
    }
    .stardust-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--bg) 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      text-shadow: 0 0 10px var(--primary-glow);
      letter-spacing: 1px;
    }
    .site-logo:hover { text-shadow: 0 0 20px var(--primary-glow); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { font-family: 'Cinzel', serif; line-height: 1.3; margin-top: 2em; margin-bottom: 0.8em; font-weight: 600; color: var(--primary); }
    h1 { font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 15px var(--primary-glow); }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; transition: all 0.3s ease; }
    a:hover { color: #f3cda0; text-shadow: 0 0 8px var(--primary-glow); }

    code { background: var(--bg-card); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: #e2e8f0; }
    pre { background: var(--bg-card); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); backdrop-filter: blur(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; }

    blockquote { border-left: 3px solid var(--primary); margin: 1.5em 0; padding-left: 1.5em; font-style: italic; color: var(--text-muted); }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1.2rem; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.3s ease, box-shadow 0.3s ease; backdrop-filter: blur(4px); }
    ul.section-list li:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px var(--primary-glow); border-color: var(--primary); }
    ul.section-list li a { font-weight: 500; font-size: 1.2rem; color: #fff; }
    ul.section-list li a:hover { text-shadow: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; background: var(--bg-card); transition: all 0.3s; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--primary); background: rgba(224, 169, 109, 0.1); color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; }

    /* .hljs specific overrides for dark mode code blocks */
    .hljs { background: transparent !important; color: #e2e8f0; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; text-align: center; }
      .site-wrapper { padding: 0 1rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="stardust-overlay"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>
