{% extends "base.html" %}

{% block content %}
<section class="taxonomy-term">
    <h2 class="rough-edges">{{ taxonomy.name | capitalize }}: {{ term.name }}</h2>

    <div class="pages-list">
        {% for page in pages %}
        <div class="page-item content-block rough-edges">
            <h3><a href="{{ base_url }}{{ page.permalink }}">{{ page.title }}</a></h3>
            {% if page.summary %}
            <p>{{ page.summary | safe }}</p>
            {% endif %}
            <a href="{{ base_url }}{{ page.permalink }}" class="btn">Read More</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
