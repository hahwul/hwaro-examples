<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ base_url }}/" aria-label="Marl home">
        <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="3" y="4"  width="18" height="3" rx="1.5" fill="var(--accent)"/>
          <rect x="3" y="9"  width="18" height="3" rx="1.5" fill="var(--accent)" opacity="0.68"/>
          <rect x="3" y="14" width="18" height="3" rx="1.5" fill="var(--accent)" opacity="0.42"/>
          <rect x="3" y="19" width="18" height="2" rx="1"   fill="var(--accent)" opacity="0.26"/>
        </svg>
        <span class="brand-name">Marl</span>
        <span class="brand-tag" aria-hidden="true">tsdb</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/manual/">Manual</a>
        <a href="{{ base_url }}/quickstart/">Quickstart</a>
      </nav>
    </div>
  </header>
