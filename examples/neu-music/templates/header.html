<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --text: #e0e0e0;
            --accent: #555;
            --shadow: rgba(0,0,0,0.5);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .music-hero {
            padding: 100px 0;
            text-align: center;
        }
        .music-hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 6rem;
            margin: 0;
            line-height: 0.8;
            color: #fff;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 4px;
            box-shadow: 10px 10px 30px var(--shadow), -5px -5px 15px var(--highlight);
            margin-top: 40px;
            border: 1px solid #1a1a1a;
        }
        h2 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; text-transform: uppercase; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">neu.music</div>
        <nav>
            <a href="/">Track</a>
            <a href="/about">Wave</a>
        </nav>
    </header>
