<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="glade-orb"></div>
  <style>
    .glade-orb {
      position: fixed;
      top: 10%;
      right: 15%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(102, 252, 241, 0.4), transparent 70%);
      box-shadow: 0 0 40px rgba(102, 252, 241, 0.2), 0 0 100px rgba(69, 162, 158, 0.1);
      z-index: -1;
      pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  </style>
