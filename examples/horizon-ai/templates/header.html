<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050505;
      --bg-surface: #0a0a0c;
      --bg-card: #111114;
      --border-color: #22222a;
      --text-main: #f0f0f2;
      --text-muted: #a0a0ab;
      --accent-blue: #00d2ff;
      --accent-purple: #9d00ff;
      --accent-glow-blue: rgba(0, 210, 255, 0.15);
      --accent-glow-purple: rgba(157, 0, 255, 0.15);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Layout */
    .site-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background-color: transparent;
      border: 2px solid var(--text-main);
      box-shadow: 0 0 10px var(--accent-glow-blue), inset 0 0 10px var(--accent-glow-blue);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark::after {
      content: '';
      width: 10px;
      height: 10px;
      background-color: var(--accent-blue);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-blue);
    }

    .site-title {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .main-nav {
      display: flex;
      gap: 2rem;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--text-main);
      text-shadow: 0 0 8px rgba(240, 240, 242, 0.3);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--bg-dark);
      background-color: var(--text-main);
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary:hover {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-main);
      background-color: transparent;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-outline:hover {
      border-color: var(--text-muted);
      background-color: rgba(255, 255, 255, 0.05);
    }

    /* Utility Classes */
    .glow-blue { color: var(--accent-blue); text-shadow: 0 0 12px var(--accent-glow-blue); }
    .glow-purple { color: var(--accent-purple); text-shadow: 0 0 12px var(--accent-glow-purple); }

    @media (max-width: 768px) {
      .main-nav, .header-actions .btn-outline {
        display: none;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div class="container header-content">
        <a href="{{ base_url }}/" class="logo-container">
          <div class="logo-mark"></div>
          <span class="site-title">{{ site.title }}</span>
        </a>
        <nav class="main-nav">
          <a href="#features" class="nav-link">Features</a>
          <a href="#architecture" class="nav-link">Architecture</a>
          <a href="#pricing" class="nav-link">Pricing</a>
          <a href="#docs" class="nav-link">Documentation</a>
        </nav>
        <div class="header-actions">
          <a href="#" class="btn-outline" style="margin-right: 0.75rem;">Log In</a>
          <a href="#" class="btn-primary">Get Access</a>
        </div>
      </div>
    </header>
