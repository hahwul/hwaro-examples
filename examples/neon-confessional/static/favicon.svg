<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Deep rain-slick background -->
  <rect width="32" height="32" rx="3" fill="#050508"/>
  <!-- Neon circle / booth frame -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#ff00aa" stroke-width="2.25"/>
  <!-- Subtle outer glow ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#ff00aa" stroke-width="0.6" opacity="0.35"/>
  <!-- Simple neon cross inside (sacred + data) -->
  <g stroke="#00f0ff" stroke-width="2.1" stroke-linecap="round">
    <!-- Vertical -->
    <line x1="16" y1="8.5" x2="16" y2="23.5"/>
    <!-- Horizontal -->
    <line x1="9.5" y1="14.2" x2="22.5" y2="14.2"/>
  </g>
  <!-- Tiny accent dots like terminal pixels -->
  <circle cx="16" cy="8.5" r="0.9" fill="#39ff14"/>
  <circle cx="16" cy="23.5" r="0.9" fill="#39ff14"/>
</svg>