{# sin_input shortcode — the trembling confessional input terminal #}
<div class="sin-terminal" data-sin-input>
  <label>TRANSMIT YOUR SIN TO THE CORE</label>
  <textarea placeholder="I let the daemon take the last of me...&#10;The rain washed the proof away but the packet logs remain.&#10;Tell the machine everything. It already knows."></textarea>
  <div class="terminal-actions">
    <button type="button" class="sin-btn" data-action="transmit">TRANSMIT SIN</button>
    <button type="button" class="sin-btn secondary" data-action="clear">CLEAR</button>
  </div>
  <div class="absolution" data-absolution style="display:none;"></div>
</div>
