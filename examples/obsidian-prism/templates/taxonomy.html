{% extends "base.html" %}

{% block title %}{{ taxonomy_name | capitalize }} | {{ site.title }}{% endblock %}

{% block content %}
<section class="taxonomy-content">
    <header class="taxonomy-header">
        <h1 class="taxonomy-title">{{ taxonomy_name | capitalize }}</h1>
    </header>

    <div class="taxonomy-terms">
        {% for term_name, term_obj in taxonomy_terms %}
        <div class="term-card">
            <h2><a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term_name }}/">{{ term_name }}</a></h2>
            <span class="term-count">{{ term_obj.pages | length }} items</span>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
