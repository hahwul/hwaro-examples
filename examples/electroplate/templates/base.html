<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% elif section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <header class="metallic-panel">
        <div class="logo">
            <a href="{{ base_url }}">{{ site.title }}</a>
        </div>
        <nav>
            <a href="{{ base_url }}/about" class="metallic-btn">About</a>
        </nav>
    </header>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <footer class="metallic-panel">
        <p>&copy; {{ site.title }} - Styled with reflective shadows.</p>
    </footer>
</body>
</html>
