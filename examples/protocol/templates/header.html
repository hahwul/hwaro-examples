<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}

  <!-- Google Fonts: Inter + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            'primary-light': '#4ade80',
            'primary-dark': '#16a34a',
            'dark-blue': '#1e3a5f',
            background: '#0c1222',
            surface: '#162032',
            'surface-alt': '#1c2a40',
            border: '#243447',
            muted: '#94a3b8',
            text: '#cbd5e1',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'Menlo', 'monospace'],
          },
        },
      },
    }
  </script>

  <style type="text/tailwindcss">
    /* Prose: markdown rendered content */
    .prose { @apply text-text/90; }
    .prose h1, .prose h2, .prose h3 { @apply font-semibold leading-tight text-[#e2e8f0]; }
    .prose h1 { @apply text-3xl mt-0 mb-6; }
    .prose h2 { @apply text-2xl mt-10 mb-4 border-b border-border pb-2; }
    .prose h3 { @apply text-xl mt-8 mb-3 text-[#e2e8f0]/90; }
    .prose p { @apply my-5 leading-relaxed text-muted; }
    .prose a { @apply text-primary hover:text-primary-light hover:underline underline-offset-4 decoration-2 decoration-primary/30 transition-all; }
    .prose strong { @apply text-[#e2e8f0] font-semibold; }
    .prose code {
      @apply bg-surface-alt px-1.5 py-0.5 rounded text-sm font-mono text-primary-light border border-[#e2e8f0]/5;
    }
    .prose pre {
      @apply bg-[#0d1a2d] p-5 rounded-xl overflow-x-auto border border-[#e2e8f0]/5 shadow-2xl shadow-black/50 my-6 font-mono;
    }
    .prose pre code { @apply bg-transparent p-0 border-0 text-[#e2e8f0]/80; }
    .prose blockquote {
      @apply my-6 py-3 px-5 border-l-4 border-primary bg-primary/5 text-muted italic rounded-r-lg;
    }
    .prose blockquote p { @apply my-2; }
    .prose ul, .prose ol { @apply my-4 ml-6 text-muted; }
    .prose li { @apply my-1.5 pl-1; }
    .prose ul li { @apply list-disc marker:text-primary; }
    .prose ol li { @apply list-decimal marker:text-primary; }
    .prose img { @apply max-w-full rounded-xl border border-[#e2e8f0]/10 shadow-lg; }
    .prose table { @apply w-full border-collapse my-8 rounded-lg overflow-hidden; }
    .prose thead { @apply bg-surface-alt text-[#e2e8f0]; }
    .prose th, .prose td { @apply px-4 py-3 border-b border-[#e2e8f0]/5 text-left text-sm text-muted; }
    .prose tbody tr:last-child td { @apply border-b-0; }
    .prose tbody tr:hover { @apply bg-[#e2e8f0]/[0.02]; }

    /* Pagination */
    nav.pagination { @apply my-8; }
    nav.pagination .pagination-list {
      @apply list-none p-0 m-0 flex gap-2 flex-wrap items-center;
    }
    nav.pagination a {
      @apply inline-block px-3 py-1.5 rounded-md border border-border text-muted no-underline text-sm
             hover:text-[#e2e8f0] hover:border-primary-light hover:bg-[#e2e8f0]/5 transition-all;
    }
    .pagination-current span {
      @apply inline-block px-3 py-1.5 rounded-md border border-primary bg-primary/20 text-[#e2e8f0] text-sm font-medium;
    }
    .pagination-disabled span {
      @apply inline-block px-3 py-1.5 rounded-md border border-[#e2e8f0]/5 text-muted opacity-30 text-sm;
    }

    /* Section list */
    ul.section-list { @apply list-none p-0 my-6 space-y-3; }
    ul.section-list li {
      @apply p-4 bg-surface-alt rounded-xl border border-[#e2e8f0]/5 hover:border-primary/50 transition-colors;
    }
    ul.section-list li a { @apply font-medium text-primary hover:text-primary-light; }

    /* TOC */
    .toc ul { @apply ml-4 my-0 space-y-1; }
    .toc li { @apply relative; }
    .toc a { @apply text-muted no-underline text-sm hover:text-primary-light transition-colors block py-0.5; }
    .toc .active > a { @apply text-primary font-medium; }

    /* Alert shortcode */
    .alert {
      @apply p-4 rounded-lg border-l-4 border-l-primary bg-primary/10 my-6 text-sm text-[#e2e8f0]/90 shadow-sm;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0c1222;
    }
    ::-webkit-scrollbar-thumb {
      background: #243447;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #2d4a63;
    }
  </style>

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body class="font-sans text-text bg-background leading-relaxed selection:bg-primary/30 selection:text-[#e2e8f0]" data-section="{{ page.section }}">

  <div class="sticky top-0 z-50 backdrop-blur-xl bg-[#0c1222]/80 border-b border-[#e2e8f0]/5 supports-[backdrop-filter]:bg-[#0c1222]/60">
    <header class="flex items-center justify-between px-6 py-4 max-w-7xl mx-auto">
      <div class="flex items-center gap-8">
        <a href="{{ base_url }}/" class="group flex items-center gap-2 font-bold text-xl text-[#e2e8f0] no-underline transition-colors z-50 relative">
          <div class="w-8 h-8 rounded-lg bg-dark-blue flex items-center justify-center border border-primary/30">
            <span class="text-primary text-sm font-mono font-bold">NW</span>
          </div>
          <span class="text-[#e2e8f0]">{{ site.title }}</span>
        </a>
        <nav class="hidden md:flex gap-1 items-center">
          <a href="{{ base_url }}/" class="px-3 py-2 rounded-lg text-sm font-medium text-muted hover:text-[#e2e8f0] hover:bg-[#e2e8f0]/5 transition-all">Home</a>
          <a href="{{ base_url }}/docs/specification/" class="px-3 py-2 rounded-lg text-sm font-medium text-muted hover:text-[#e2e8f0] hover:bg-[#e2e8f0]/5 transition-all">Specification</a>
          <a href="{{ base_url }}/docs/implementation/" class="px-3 py-2 rounded-lg text-sm font-medium text-muted hover:text-[#e2e8f0] hover:bg-[#e2e8f0]/5 transition-all">Implementation</a>
          <a href="{{ base_url }}/about/" class="px-3 py-2 rounded-lg text-sm font-medium text-muted hover:text-[#e2e8f0] hover:bg-[#e2e8f0]/5 transition-all">About</a>
        </nav>
      </div>

      <div class="flex items-center gap-4 z-50 relative">
        <div class="relative group hidden sm:block">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-muted group-hover:text-primary transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input type="text" placeholder="Search docs..." class="bg-surface-alt/50 border border-[#e2e8f0]/10 text-sm rounded-full py-1.5 pl-9 pr-4 w-48 md:w-64 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary/50 transition-all text-[#e2e8f0] placeholder-muted hover:bg-surface-alt hover:border-[#e2e8f0]/20 font-mono">
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
            <span class="text-xs text-muted border border-[#e2e8f0]/10 rounded px-1.5 py-0.5 font-mono">/</span>
          </div>
        </div>
        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden p-2 text-muted hover:text-[#e2e8f0] transition-colors focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-40 bg-[#0c1222]/95 backdrop-blur-xl pt-24 px-6 md:hidden transition-opacity duration-300 opacity-0 pointer-events-none">
      <nav class="flex flex-col gap-4 text-lg font-medium">
        <a href="{{ base_url }}/" class="text-muted hover:text-[#e2e8f0] py-2 border-b border-[#e2e8f0]/5">Home</a>
        <a href="{{ base_url }}/docs/specification/" class="text-muted hover:text-[#e2e8f0] py-2 border-b border-[#e2e8f0]/5">Specification</a>
        <a href="{{ base_url }}/docs/implementation/" class="text-muted hover:text-[#e2e8f0] py-2 border-b border-[#e2e8f0]/5">Implementation</a>
        <a href="{{ base_url }}/about/" class="text-muted hover:text-[#e2e8f0] py-2 border-b border-[#e2e8f0]/5">About</a>
        <!-- Mobile Search -->
        <div class="relative mt-4">
           <input type="text" placeholder="Search docs..." class="w-full bg-surface-alt border border-[#e2e8f0]/10 text-sm rounded-lg py-3 pl-4 pr-4 focus:outline-none focus:ring-2 focus:ring-primary/50 text-[#e2e8f0] placeholder-muted font-mono">
        </div>
      </nav>
    </div>
  </div>
  <div class="max-w-7xl mx-auto px-6">

  <script src="{{ base_url }}/js/mobile-menu.js"></script>
