{% extends "base.html" %}
{% block content %}
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <ul class="sidebar-links" style="padding-left: 0;">
    {% for term in taxonomy_terms %}
    <li style="margin-bottom: 0.5rem;">
      <a href="{{ term.url }}" style="font-size: 1.1rem; font-weight: 500;">{{ term.name }}</a>
      <span style="color: #666; font-size: 0.9rem;">({{ term.pages | length }} items)</span>
    </li>
    {% endfor %}
  </ul>
{% endblock %}
