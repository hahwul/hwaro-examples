{% extends "base.html" %}
{% block content %}
  <h1>{{ taxonomy_name | capitalize }}: {{ taxonomy_term }}</h1>
  <ul class="sidebar-links" style="padding-left: 0;">
    {% for post in taxonomy_pages %}
    <li style="margin-bottom: 0.5rem;">
      <a href="{{ post.url }}" style="font-size: 1.1rem; font-weight: 500;">{{ post.title }}</a>
      <p style="font-size: 0.9rem; color: #666; margin-top: 0.25rem;">{{ post.description | default(value="No description available.") }}</p>
    </li>
    {% endfor %}
  </ul>
{% endblock %}
