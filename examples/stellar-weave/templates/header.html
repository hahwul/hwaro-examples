<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg: #050814;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #1e293b;
    --primary: #cbd5e1;
    --bg-subtle: #0f172a;
    --accent: #38bdf8;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
  .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem 0; margin-bottom: 3rem; border-bottom: 1px solid var(--border); }
  .site-logo { font-weight: 300; font-size: 1.25rem; color: var(--text); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; }
  .site-logo:hover { color: var(--accent); }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s ease; }
  .site-header nav a:hover { color: var(--text); }
  .site-main { min-height: calc(100vh - 250px); }
  .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

  h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 1em; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
  h1 { font-size: 2.5rem; margin-top: 0; }
  h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  h3 { font-size: 1.25rem; }
  p { margin: 1.25em 0; color: var(--text); }
  a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
  a:hover { color: var(--text); }
  code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; border: 1px solid var(--border); color: var(--primary); }
  pre { background: var(--bg-subtle); padding: 1.25rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); margin: 1.5rem 0; }
  pre code { background: none; padding: 0; border: none; color: inherit; }

  ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1.25rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s ease, border-color 0.2s ease; }
  ul.section-list li:hover { transform: translateY(-2px); border-color: var(--text-muted); }
  ul.section-list li a { font-weight: 400; font-size: 1.1rem; color: var(--text); display: block; margin-bottom: 0.5rem; }
  ul.section-list li a:hover { color: var(--accent); }
  .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; font-weight: 300; }
  nav.pagination { margin: 2rem 0; }
  nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
  nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; transition: all 0.2s ease; background: var(--bg-subtle); }
  nav.pagination a:hover { color: var(--bg); background: var(--text); border-color: var(--text); }
  .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); background: transparent; }
  .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; }

  @media (max-width: 640px) {
    .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; padding: 1.5rem 0; }
    .site-wrapper { padding: 0 1.25rem; }
    h1 { font-size: 2rem; }
  }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
      </nav>
    </header>
