<article class="spectrum-card">
  <a class="card-link" href="{{ base_url }}{{ p.url }}">
    <figure class="card-plate" aria-hidden="true">
      {%- set plate_page = p %}{% set plate_detail = false %}{% include "partials/plate.html" %}
    </figure>
    <div class="card-body">
      <p class="card-kicker">Plate {{ p.extra.plate_no }} · {{ p.extra.wavelength }}</p>
      <h3 class="card-title">{{ p.title | e }}</h3>
      {% if p.summary %}<p class="card-summary">{{ p.summary | strip_html | truncate_words(24) }}</p>{% endif %}
    </div>
  </a>
</article>
