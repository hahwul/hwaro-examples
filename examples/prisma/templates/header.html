<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/">
      <svg class="brand-mark" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true" focusable="false">
        <path d="M16 6 L25 24 L7 24 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M20 24 L23.5 17.5" stroke="#e0475c" stroke-width="1.5"/>
        <path d="M16 24 L19 17.5" stroke="#c98a1f" stroke-width="1.5"/>
        <path d="M12 24 L15 17.6" stroke="#2f8f5b" stroke-width="1.5"/>
      </svg>
      <span class="brand-word">Prisma</span>
    </a>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ base_url }}/spectra/">Spectra</a>
      <a href="{{ base_url }}/colophon/">Colophon</a>
    </nav>
  </header>
