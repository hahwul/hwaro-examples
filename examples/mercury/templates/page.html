{% extends "base.html" %}

{% block content %}
<article class="metallic-card">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <div class="post-meta">
        <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
      </div>
    {% endif %}
  </header>

  <div class="content">
    {{ content | safe }}
  </div>

  {% if page.taxonomies and page.taxonomies.tags %}
    <div class="tag-list">
      {% for tag in page.taxonomies.tags %}
        <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
      {% endfor %}
    </div>
  {% endif %}
</article>
{% endblock %}
