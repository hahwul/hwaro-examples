{% extends "base.html" %}

{% block content %}
<header>
  <h1>{{ taxonomy_name | capitalize }}</h1>
</header>

<div class="metallic-card">
  <div class="tag-list" style="padding: 1rem 0;">
    {% for term in taxonomy_terms %}
      <a href="{{ term.url }}" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem;">
        {{ term.name }} ({{ term.pages_count }})
      </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
