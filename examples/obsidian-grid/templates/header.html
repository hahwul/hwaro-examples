<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-title">
        <svg class="mark" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0.5" y="0.5" width="13" height="13" fill="none" stroke="currentColor"/>
          <rect x="3.5" y="3.5" width="7" height="7" fill="currentColor"/>
        </svg>
        {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/posts/">Dispatches</a>
        <a href="{{ base_url }}/notes/">Notes</a>
        <a href="{{ base_url }}/about/">Colophon</a>
      </nav>
    </header>

    <div class="meta-strip">
      <span>Vol. 01</span>
      <span>Issue 024</span>
      <span>{{ current_year }}</span>
      <span>Monochrome Edition</span>
    </div>
