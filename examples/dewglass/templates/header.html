<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f7f9;
            --text: #2c3e50;
            --accent: #a3d8f4;
            --glass: rgba(255, 255, 255, 0.4);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(163, 216, 244, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(163, 216, 244, 0.1) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .dew-hero {
            padding: 100px 0;
            text-align: center;
        }
        .dew-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 200;
            margin: 0;
            letter-spacing: -2px;
            color: #fff;
            text-shadow: 0 0 20px rgba(163, 216, 244, 0.3);
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 50% 50% 10px 10px / 10% 10% 5% 5%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">dewglass</div>
        <nav>
            <a href="/">Droplet</a>
            <a href="/about">Morning</a>
        </nav>
    </header>
