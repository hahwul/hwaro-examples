<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <svg class="hold-sprite" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="hold-a" viewBox="0 0 64 56">
        <path d="M8 30 C4 18 14 6 28 5 C42 4 56 12 58 26 C60 40 48 52 32 53 C16 54 12 42 8 30 Z"/>
      </symbol>
      <symbol id="hold-b" viewBox="0 0 64 56">
        <path d="M14 12 C26 3 46 4 55 16 C62 26 58 42 46 49 C33 56 15 53 8 42 C1 31 4 19 14 12 Z"/>
      </symbol>
      <symbol id="hold-c" viewBox="0 0 64 56">
        <path d="M6 26 C3 14 20 5 36 5 C51 5 61 13 61 24 C61 37 47 47 30 48 C15 49 9 38 6 26 Z"/>
      </symbol>
      <symbol id="hold-d" viewBox="0 0 64 56">
        <path d="M20 6 C34 2 50 8 56 20 C61 30 55 44 42 50 C29 56 12 52 7 40 C2 29 8 10 20 6 Z"/>
      </symbol>
    </defs>
  </svg>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 40 40" width="34" height="34" aria-hidden="true" focusable="false">
          <rect x="2" y="2" width="36" height="36" rx="12" fill="var(--accent)"/>
          <path d="M13 27 C13 20, 13 14, 13 12" fill="none" stroke="var(--accent-fg)" stroke-width="4.4" stroke-linecap="round"/>
          <path d="M13 12 C18 12, 23 14, 27 18" fill="none" stroke="var(--accent-fg)" stroke-width="4.4" stroke-linecap="round"/>
          <circle cx="27" cy="18" r="3.1" fill="var(--accent-fg)"/>
        </svg>
        <span class="brand-word">Lift</span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/membership/">Membership</a>
        <a href="{{ base_url }}/classes/">Classes</a>
        <a href="{{ base_url }}/the-wall/">The Wall</a>
        <a href="{{ base_url }}/about/">About</a>
        <a class="nav-cta" href="{{ base_url }}/visit/">Visit<span aria-hidden="true"> →</span></a>
      </nav>
    </div>
  </header>
