<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="masthead">
    <div class="masthead-top wrap">
      <p class="masthead-tag">Architecture criticism <span aria-hidden="true">·</span> postwar civic &amp; adaptive reuse</p>
      <nav class="masthead-nav" aria-label="Primary">
        <a href="{{ base_url }}/reviews/">Reviews</a>
        <a href="{{ base_url }}/categories/">Categories</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </div>
    <a class="nameplate wrap" href="{{ base_url }}/" aria-label="Masthead — home">
      <span class="nameplate-text hl hl--lg">Masthead</span>
    </a>
    <p class="masthead-dek wrap">{{ site.description | e }}</p>
    <div class="masthead-rule" aria-hidden="true"></div>
  </header>
