<li class="well-item">
  {% if entry.taxonomies.categories %}<p class="kicker-chip kicker-chip--sm">{{ entry.taxonomies.categories | join(" / ") }}</p>{% endif %}
  <h3 class="well-title hl hl--sm"><a href="{{ base_url }}{{ entry.url }}">{{ entry.title | e }}</a></h3>
  <p class="well-byline">
    {% if entry.authors %}<span class="byline-name">{{ entry.authors | join(", ") }}</span>{% endif %}
    {% if entry.date %}<span class="byline-sep" aria-hidden="true">·</span><time datetime="{{ entry.date | date("%Y-%m-%d") }}">{{ entry.date | date("%b %d, %Y") }}</time>{% endif %}
  </p>
</li>
