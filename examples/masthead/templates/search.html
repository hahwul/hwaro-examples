{% include "header.html" %}
  <main id="main">
    <header class="section-head wrap">
      <p class="kicker-chip">Search</p>
      <h1 class="section-title hl hl--lg">{{ page.title | e }}</h1>
      {% if content %}<div class="section-intro prose">{{ content | safe }}</div>{% endif %}
    </header>

    <form class="search-form wrap" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="search-label" for="search-input">Search Masthead</label>
      <input class="search-input" id="search-input" type="search" name="q" placeholder="brutalism, terrazzo, a critic&#8217;s name…" autocomplete="off" autofocus>
    </form>
    <p class="search-status wrap" id="search-status" role="status" aria-live="polite"></p>
    <ol class="row-list wrap" id="search-results"></ol>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
