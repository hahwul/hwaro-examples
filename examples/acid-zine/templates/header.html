<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div class="row">
        <div class="issue">Issue #07 &middot; Photocopied</div>
        <div style="text-align:center;">Distributed hand to hand &middot; Pay what you like</div>
        <div>Printed at 3am</div>
      </div>
      <div class="titlewrap">
        <svg class="deco-a" width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="32,4 40,24 60,24 44,38 50,58 32,46 14,58 20,38 4,24 24,24" fill="#ff006e" stroke="#ff006e" stroke-width="1"/>
        </svg>
        <svg class="deco-b" width="72" height="36" viewBox="0 0 72 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M 2 18 L 12 8 L 22 18 L 32 6 L 42 18 L 52 10 L 62 18 L 72 12" stroke="#ff006e" stroke-width="2" fill="none"/>
        </svg>
        <h1>Acid <span class="strike">Zine</span></h1>
        <div class="sub">A Xeroxed Quarterly &middot; For readers who staple</div>
      </div>
      <nav class="zinenav">
        <a href="{{ base_url }}/">Cover</a>
        <a href="{{ base_url }}/issues/">Issues</a>
        <a href="{{ base_url }}/about/">Staff</a>
        <a href="{{ base_url }}/tags/">Scenes</a>
        <a href="{{ base_url }}/atom.xml">Feed</a>
      </nav>
    </header>
