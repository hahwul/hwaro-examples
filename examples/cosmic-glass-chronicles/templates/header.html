<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(site.title) }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020108;
      --bg-gradient: radial-gradient(circle at center, #0a0418 0%, #020108 100%);
      --text-main: #f0f0f5;
      --text-muted: #a0a0b0;
      --glass-bg: rgba(20, 15, 30, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-1: #00f0ff; /* Cyan */
      --accent-2: #ff0055; /* Magenta */
      --accent-3: #8a2be2; /* Deep Purple */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--accent-1);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: var(--accent-2);
    }

    /* Background Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-1), transparent);
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-2), transparent);
      bottom: -150px;
      right: -100px;
      animation-duration: 25s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--accent-3), transparent);
      top: 40%;
      left: 60%;
      animation-duration: 18s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 2rem;
    }

    header.site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav.site-nav a {
      margin-left: 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      color: var(--text-main);
    }

    nav.site-nav a:hover {
      color: var(--accent-1);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="container">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
