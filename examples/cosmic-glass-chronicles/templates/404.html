{% include "header.html" %}

<main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center;">
  <div class="glass-panel">
    <h1 style="font-size: 5rem; line-height: 1; margin-bottom: 1rem; background: linear-gradient(90deg, var(--accent-2), var(--accent-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">Lost in the Void</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">The cosmic coordinates you provided seem to point to an empty sector.</p>
    <a href="{{ base_url }}/" style="display: inline-block; background: rgba(0, 240, 255, 0.1); border: 1px solid var(--accent-1); color: var(--accent-1); padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: 500; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(0, 240, 255, 0.2)'; this.style.boxShadow='0 0 15px rgba(0, 240, 255, 0.4)';" onmouseout="this.style.background='rgba(0, 240, 255, 0.1)'; this.style.boxShadow='none';">Return to Hub</a>
  </div>
</main>
