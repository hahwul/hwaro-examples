{% include "header.html" %}

<main>
  <div class="glass-panel" style="margin-bottom: 2rem;">
    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #fff, var(--accent-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">{{ taxonomy.name | capitalize }}</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem;">Explore topics across the cosmos.</p>
  </div>

  <div class="glass-panel" style="display: flex; flex-wrap: wrap; gap: 1rem;">
    {% if terms is defined %}
      {% for term in terms %}
      <a href="{{ term.url }}" style="display: inline-block; background: rgba(138, 43, 226, 0.1); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 20px; padding: 0.5rem 1rem; color: #fff; text-decoration: none; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(138, 43, 226, 0.3)'; this.style.borderColor='var(--accent-3)';" onmouseout="this.style.background='rgba(138, 43, 226, 0.1)'; this.style.borderColor='rgba(138, 43, 226, 0.3)';">
        {{ term.name }} <span style="opacity: 0.5; margin-left: 0.5rem;">({{ term.pages | length }})</span>
      </a>
      {% endfor %}
    {% else %}
      <p style="color: var(--text-muted);">No terms found.</p>
    {% endif %}
  </div>
</main>

{% include "footer.html" %}
