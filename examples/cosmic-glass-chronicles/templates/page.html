{% include "header.html" %}

<main>
  <article class="glass-panel">
    <header style="margin-bottom: 2rem;">
      <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #fff, var(--accent-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">{{ page.title }}</h1>
      {% if page.date %}
      <div style="color: var(--text-muted); font-size: 0.9rem;">
        {{ page.date | date("%B %d, %Y") }}
      </div>
      {% endif %}
    </header>

    <div class="content">
      {{ content | safe }}
    </div>

    {% if page.extra and page.extra.tags %}
    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);">
      <span style="color: var(--text-muted); margin-right: 0.5rem;">Tags:</span>
      {% for tag in page.extra.tags %}
      <span style="display: inline-block; background: rgba(0, 240, 255, 0.1); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.8rem; margin-right: 0.5rem; color: var(--accent-1);">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </article>
</main>

{% include "footer.html" %}
