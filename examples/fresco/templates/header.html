<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <meta name="color-scheme" content="light">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <svg class="defs" aria-hidden="true" focusable="false">
    <defs>
      <clipPath id="wall-gable" clipPathUnits="userSpaceOnUse">
        <polygon points="0,40 50,0 100,40 100,120 0,120"></polygon>
      </clipPath>
      <clipPath id="wall-silo" clipPathUnits="userSpaceOnUse">
        <path d="M0,30 A50,30 0 0 1 100,30 L100,120 L0,120 Z"></path>
      </clipPath>
      <clipPath id="wall-arch" clipPathUnits="userSpaceOnUse">
        <path d="M0,50 Q0,0 50,0 Q100,0 100,50 L100,120 L0,120 Z"></path>
      </clipPath>
      <clipPath id="wall-pier" clipPathUnits="userSpaceOnUse">
        <polygon points="10,0 90,0 90,95 75,120 60,98 45,120 30,98 10,120"></polygon>
      </clipPath>
      <clipPath id="wall-panel" clipPathUnits="userSpaceOnUse">
        <polygon points="0,0 80,0 100,20 100,120 0,120"></polygon>
      </clipPath>
    </defs>
  </svg>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="site-mark" aria-label="{{ site.title | e }} — home">
        <svg class="site-mark__swatch" viewBox="0 0 100 120" aria-hidden="true">
          <g style="clip-path:url(#wall-gable)">
            <rect width="100" height="120" fill="#f2b705"></rect>
            <rect y="55" width="100" height="65" fill="#6d3ac2"></rect>
            <circle cx="50" cy="30" r="14" fill="#fdfaf4"></circle>
          </g>
        </svg>
        <span>{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/walls/">Walls</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
