<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --border: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; border: 2px solid #000; min-height: 100vh; padding: 0; }
        header { border-bottom: 2px solid #000; padding: 20px; text-align: center; }
        .logo { font-weight: 700; font-size: 1.2rem; }
        .post { padding: 30px; border-bottom: 2px solid #000; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">social.mono</div></header>
