<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root { --bg: #0a0a0f; --text: #e0e0e0; --accent: #7888ff; }
    body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { padding-bottom: 2rem; border-bottom: 1px solid #333; margin-bottom: 2rem; }
    header h1 { font-weight: 300; letter-spacing: 2px; margin: 0; }
    nav { margin-top: 1rem; }
    nav a { color: var(--accent); text-decoration: none; margin-right: 1rem; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
    nav a:hover { color: #fff; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header>
      <h1>{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
