<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="column">
    <header class="site-header">
      <a class="site-name" href="{{ base_url }}/">
        <span class="site-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="21" height="21" role="presentation" focusable="false">
            <path class="mark-leaf" d="M5.5 19c-1-6.6 2.6-12.2 12.5-13.4-.8 10.3-6.3 14-12.5 13.4Z"/>
            <path class="mark-vein" d="M6.6 17.7C10.3 12.7 13.1 9 17.4 6" fill="none" stroke-width="1.15" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="site-word-group">
          <span class="site-word">Dodam</span>
          <span class="site-sub">dodam · 도담 · growing healthily</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/issues/">Issues</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
        <a href="{{ base_url }}/issues/rss.xml">RSS</a>
      </nav>
    </header>
