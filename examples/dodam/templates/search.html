{% include "header.html" %}
    <main id="main" class="listing">
      <header class="page-head">
        <p class="page-kicker">Find a letter</p>
        <h1 class="page-title">{{ page.title | e }}</h1>
        <div class="page-intro">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search past issues</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="balcony, mint, repotting, jangma…" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="issue-cards" id="search-results"></ol>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
