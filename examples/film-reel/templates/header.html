<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --text: #e0e0e0;
            --accent: #ff4500;
            --shadow: rgba(0,0,0,0.8);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: #050505;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .reel-surface {
            background: #111;
            border-radius: 4px;
            padding: 60px;
            box-shadow: 20px 20px 60px var(--shadow), -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 1px solid #222;
            text-align: center;
        }
        .reel-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
        }
        .reel-unit {
            width: 150px;
            height: 150px;
            background: #000;
            border-radius: 50%;
            border: 4px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        h2 { font-weight: 700; font-size: 2rem; color: var(--accent); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; text-align: left; }
        article { text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">film.reel</div>
        <nav>
            <a href="/">Stream</a>
            <a href="/about">Cut</a>
        </nav>
    </header>
