{% extends "base.html" %}

{% block content %}
<article class="page-content">
  {% if page.title %}
    <div class="page-header">
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}
        <p>{{ page.description | e }}</p>
      {% endif %}
    </div>
  {% endif %}
  {{ content | safe }}
</article>
{% endblock %}
