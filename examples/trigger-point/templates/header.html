<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --accent: #ff0000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { padding: 40px 0; border-bottom: 10px solid var(--accent); text-align: left; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; }
        .trigger-surface { margin-top: 60px; padding: 60px; background: #111; border: 1px solid #222; position: relative; }
        .point { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: absolute; top: -5px; left: -5px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">trigger.point</div></header>
