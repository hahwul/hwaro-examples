# =============================================================================
# Ketubah - A Cabinet of Ornamental Contracts
# Issue #1563 | Tags: book, light, ceremonial, decorated, formal
# =============================================================================

title = "KETUBAH - A Studio of Ornamental Contracts"
description = "A volume of ornamental ceremonial contracts - floral frames, geometric borders, and calligraphic flourishes lettered upon hand-marbled paper. Commissions received, portfolio displayed, craft described."
base_url = "http://localhost:3000"

sections = ["gallery"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "tradition"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A studio portfolio of ceremonial contract design. Commissioned work; do not copy decorative layouts without permission."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["gallery"]

[markdown]
safe = false
lazy_loading = false
emoji = false
