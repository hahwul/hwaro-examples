<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}" data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-cap" aria-hidden="true">D</span>
        <span class="brand-word">Derecho</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a{% if page.section is present and page.section == "builds" %} aria-current="page"{% endif %} href="{{ base_url }}/builds/">Builds</a>
        <a{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %} href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <button class="search-trigger" type="button" data-search-open aria-haspopup="dialog" aria-label="Search the bench, Control K">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="m10.6 10.6 3.4 3.4"/></svg>
          <span class="search-trigger-label">Search</span>
          <kbd class="kbd" aria-hidden="true"><span>Ctrl</span><span>K</span></kbd>
        </button>
      </nav>
    </div>
  </header>
