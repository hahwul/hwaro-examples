{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for item in section.pages %}
      <li>
        <a href="{{ item.permalink }}">{{ item.title | e }}</a>
        <p>{{ item.description | default(value="") | e }}</p>
      </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
