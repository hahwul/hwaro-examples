<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <style>
  :root {
    --bg-void: #060608;
    --text-core: #f0f0f5;
    --text-dim: #888899;
    --accent: #d0d0d8;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --glass-bg: rgba(15, 15, 20, 0.6);
    --veil: rgba(255, 255, 255, 0.03);
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    margin: 0;
    color: var(--text-core);
    background-color: var(--bg-void);
    overflow-x: hidden;
  }

  /* Structural Veil Layers */
  body::before, body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
  }

  body::before {
    background-color: var(--veil);
    clip-path: polygon(0 0, 100% 10%, 100% 100%, 0 90%);
  }

  body::after {
    background-color: rgba(0, 0, 0, 0.2);
    clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
  }

  /* Layout */
  .site-wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem;
    position: relative;
    z-index: 1;
  }

  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2.5rem 0;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 3rem;
  }

  .site-logo {
    font-weight: 300;
    font-size: 1.4rem;
    color: var(--text-core);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .site-header nav {
    display: flex;
    gap: 2rem;
  }

  .site-header nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }

  .site-header nav a:hover {
    color: var(--text-core);
  }

  .site-main {
    min-height: calc(100vh - 250px);
  }

  .site-footer {
    margin-top: 4rem;
    padding: 2rem 0;
    border-top: 1px solid var(--border-subtle);
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Typography */
  h1, h2, h3 {
    line-height: 1.2;
    margin-top: 2em;
    margin-bottom: 1em;
    font-weight: 300;
    color: var(--text-core);
    letter-spacing: -0.02em;
  }

  h1 { font-size: 2.5rem; margin-top: 0; }
  h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; }
  h3 { font-size: 1.4rem; }

  p { margin: 1.2em 0; color: var(--text-dim); }

  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
  a:hover { border-color: var(--accent); }

  code {
    background-color: var(--glass-bg);
    padding: 0.2rem 0.4rem;
    border: 1px solid var(--border-subtle);
    font-size: 0.85em;
    font-family: "IBM Plex Mono", Consolas, monospace;
    color: var(--accent);
  }

  pre {
    background-color: var(--glass-bg);
    padding: 1.5rem;
    overflow-x: auto;
    border: 1px solid var(--border-subtle);
  }

  pre code { background: none; padding: 0; border: none; color: inherit; }

  /* Components */
  ul.section-list {
    list-style: none;
    padding: 0;
    margin: 2rem 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  ul.section-list li {
    padding: 1.5rem;
    background-color: var(--glass-bg);
    border: 1px solid var(--border-subtle);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: border-color 0.3s ease, transform 0.3s ease;
  }

  ul.section-list li:hover {
    border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
  }

  ul.section-list li a {
    font-weight: 400;
    font-size: 1.1rem;
    color: var(--text-core);
    display: block;
    margin-bottom: 0.5rem;
    border: none;
  }

  .taxonomy-desc { color: var(--text-dim); margin-bottom: 2rem; font-style: italic; }

  /* Responsive */
  @media (max-width: 600px) {
    .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; padding: 1.5rem 0; }
    ul.section-list { grid-template-columns: 1fr; }
  }
  </style>
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.base_url }}/rss.xml">
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ site.base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ site.base_url }}/">Home</a>
        <a href="{{ site.base_url }}/about/">About</a>
        <a href="{{ site.base_url }}/tags/">Tags</a>
      </nav>
    </header>
