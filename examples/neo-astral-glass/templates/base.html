<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>

  {{ og_all_tags | default(value='') }}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --space-black: #030108;
      --void-dark: #0a0514;
      --astral-cyan: #00f0ff;
      --astral-purple: #9d00ff;
      --astral-magenta: #ff0055;

      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);

      --text-main: #f0f0f5;
      --text-muted: #a0a0b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--space-black);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
    }

    /* Animated Astral Orbs Background */
    .astral-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, var(--void-dark) 0%, var(--space-black) 100%);
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--astral-purple);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: var(--astral-cyan);
      bottom: -50px;
      right: -50px;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: var(--astral-magenta);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
      opacity: 0.3;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Base Layout */
    .site-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      margin-bottom: 4rem;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--astral-cyan), var(--text-main));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-nav {
      display: flex;
      gap: 2rem;
    }

    .site-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-nav a:hover {
      color: var(--text-main);
    }

    .site-nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: var(--astral-cyan);
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--astral-cyan);
    }

    .site-nav a:hover::after {
      width: 100%;
    }

    /* Main Content Area */
    .site-main {
      flex: 1;
    }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--glass-border);
    }

    /* Glass Panel Component */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .glass-panel:hover {
      border-color: var(--glass-highlight);
      transform: translateY(-2px);
    }

    /* Markdown Content Styling */
    .content h1 { font-size: 3rem; margin-bottom: 1.5rem; background: linear-gradient(135deg, #fff, var(--astral-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .content h2 { font-size: 2rem; margin-top: 2rem; margin-bottom: 1rem; color: var(--text-main); }
    .content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-muted); }
    .content a { color: var(--astral-cyan); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .content a:hover { border-color: var(--astral-cyan); }
    .content ul, .content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; color: var(--text-muted); }
    .content li { margin-bottom: 0.5rem; }

    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1rem; }
      .site-wrapper { padding: 1rem; }
      .glass-panel { padding: 1.5rem; }
      .content h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="astral-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; 2024 {{ site.title }}. Powered by Hwaro.</p>
    </footer>
  </div>
</body>
</html>
