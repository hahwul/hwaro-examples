<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,700;1,700&family=Work+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #c0c0c0;
            --accent: #d4af37;
            --surface: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .hardcover-jacket {
            max-width: 800px;
            margin: 40px auto;
            background: var(--surface);
            padding: 80px;
            border: 1px solid #333;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
        }
        .hardcover-jacket::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.05);
        }
        header {
            padding-bottom: 40px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .logo {
            font-family: 'Unna', serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hard-hero h1 {
            font-family: 'Unna', serif;
            font-size: 4rem;
            margin: 40px 0;
            color: #fff;
        }
        article { margin-top: 60px; }
        h2 { font-family: 'Unna', serif; font-size: 2.5rem; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="hardcover-jacket">
    <header>
        <div class="logo">HARD//COVER</div>
        <nav>
            <a href="/">Collector</a>
            <a href="/about">Library</a>
        </nav>
    </header>
