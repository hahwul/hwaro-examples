{% extends "base.html" %}
{% block content %}
<article class="glass-panel content-panel">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.date %}
      <div class="page-meta">
        <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
      </div>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
