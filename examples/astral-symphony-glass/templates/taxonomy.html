{% extends "base.html" %}
{% block content %}
<div class="glass-panel content-panel section-header">
  <h1 class="page-title">{{ taxonomy_name | capitalize }}</h1>
  <p class="section-description">Browse all terms in this taxonomy.</p>
</div>

<div class="glass-panel content-panel">
  <ul class="taxonomy-list">
    {% for term in taxonomy_terms %}
      <li>
        <a href="{{ term.permalink }}" class="btn btn-outline">{{ term.name }} ({{ term.pages | length }})</a>
      </li>
    {% endfor %}
  </ul>
</div>

<style>
  .taxonomy-list {
    list-style: none;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
  }
</style>
{% endblock %}
