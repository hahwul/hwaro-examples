<!DOCTYPE html>
<html lang="{{ page_language | default("en") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is present %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ og_all_tags }}
  {{ hreflang_tags }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined %}{{ page.section }}{% endif %}">

  <!-- Animated Background Elements -->
  <div class="astral-background">
    <div class="orb orb-cyan"></div>
    <div class="orb orb-magenta"></div>
    <div class="orb orb-purple"></div>
    <div class="stars-overlay"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-icon">✧</span>
        {{ site.title }}
      </a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/posts/">Posts</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer glass-panel">
      <p>&copy; {{ current_year }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>

  {{ auto_includes_js }}
</body>
</html>
