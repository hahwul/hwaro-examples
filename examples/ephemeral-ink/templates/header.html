<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --text: #2a2a2a;
      --text-muted: #6b6b6b;
      --border: #e8e4dc;
      --accent: #111111;
      --link: #3a3a3a;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-serif);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 1.1rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-title {
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent);
    }

    nav {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    nav a {
      margin-left: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      min-height: 60vh;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-weight: 600;
      color: var(--accent);
      line-height: 1.3;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 2.5rem; font-style: italic; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }

    p {
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    a {
      color: var(--link);
      text-decoration-color: var(--border);
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
    }

    blockquote {
      margin: 2rem 0;
      padding-left: 1.5rem;
      border-left: 2px solid var(--accent);
      font-style: italic;
      color: var(--text-muted);
    }

    /* Lists */
    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    /* Posts List */
    .post-list {
      list-style: none;
      padding: 0;
    }

    .post-item {
      margin-bottom: 2.5rem;
    }

    .post-item a {
      text-decoration: none;
    }

    .post-title {
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
      font-weight: 600;
    }

    .post-meta {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .post-summary {
      margin: 0;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 3rem 0 2rem;
      }
      nav a {
        margin-left: 0;
        margin-right: 1.5rem;
      }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="site-title">{{ site.title | e }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
