{% include "header.html" %}
<main class="site-main venue">
  <div class="section-header">
    <div class="eyebrow">CLASSIFIED BY MEMORY</div>
    <h1>{{ taxonomy_name | upper | e }}</h1>
  </div>

  <ul class="taxonomy-list">
    {% for term in taxonomy_terms %}
      <li><a href="{{ term.url }}">{{ term.name | e }} <span style="opacity:0.5">({{ term.pages_count }})</span></a></li>
    {% endfor %}
  </ul>

  <div style="margin-top:4rem;text-align:center;opacity:0.5;">
    <svg width="68" height="78" viewBox="0 0 110 120" style="opacity:0.5"><path d="M55 22 Q29 9 21 31 Q27 52 48 46 Q55 36 55 22" fill="#3f1f24" stroke="#6b5235" stroke-width="0.9"/><path d="M55 22 Q81 9 89 31 Q83 52 62 46 Q55 36 55 22" fill="#3f1f24" stroke="#6b5235" stroke-width="0.9"/><ellipse cx="55" cy="33" rx="7" ry="8" fill="#1a070d"/><path d="M55 48 Q49 82 53 108" fill="none" stroke="#3f2a22" stroke-width="2.5" stroke-linecap="round"/></svg>
  </div>
</main>
{% include "footer.html" %}
