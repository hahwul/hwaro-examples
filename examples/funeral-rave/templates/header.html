<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#050505">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body class="funeral-rave">
  <!-- THE BOUNCER — Fixed door at the end of time -->
  <header>
    <div>
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <span class="bouncer-tag">EST. THE LAST NIGHT</span>
    </div>
    <nav>
      <a href="{{ base_url }}/">THE VENUE</a>
      <a href="{{ base_url }}/posts/">THE FLOOR</a>
      <a href="{{ base_url }}/posts/">EULOGIES</a>
      <a href="#last-call" onclick="document.querySelector('.last-call')?.scrollIntoView({behavior:'smooth'})">THE BAR</a>
    </nav>
    <div class="rope"></div>
  </header>

  <!-- Load the dancefloor rituals -->
  <script src="{{ base_url }}/js/dancefloor.js" defer></script>
