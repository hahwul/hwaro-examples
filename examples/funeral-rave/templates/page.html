{% include "header.html" %}
  <main class="site-main venue">
    {% if page.title is present %}
      <div class="post-hero">
        <h1 class="bloom">{{ page.title | e }}</h1>
        {% if page.date is present %}
          <div class="post-meta">{{ page.date | date("%B %d, %Y") }} • THE FINAL SET</div>
        {% endif %}
      </div>
    {% endif %}
    <div class="post-content">
      {{ content | safe }}
    </div>
  </main>
{% include "footer.html" %}
