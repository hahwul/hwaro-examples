{# dying_flower() — A single wilting rose that slowly collapses in grief #}
<div class="shortcode-flower" aria-hidden="true" style="position:relative;height:160px;margin:1.6rem auto 2rem;width:110px;">
  <svg width="110" height="160" viewBox="0 0 110 160" style="display:block;margin:0 auto;filter:drop-shadow(0 12px 18px rgba(0,0,0,0.6));">
    <defs>
      <linearGradient id="petalGrad" x1="30%" y1="10%" x2="70%" y2="90%">
        <stop offset="0%" stop-color="#5c2a32"/>
        <stop offset="60%" stop-color="#3f1f24"/>
        <stop offset="100%" stop-color="#2a1216"/>
      </linearGradient>
    </defs>

    <!-- Stem -->
    <path d="M55 68 Q49 102 53 148" fill="none" stroke="#3f2a22" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M55 82 Q42 89 35 101" fill="none" stroke="#2f231d" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Outer wilted petals (slow collapse animation) -->
    <g class="wilting">
      <path id="p1" d="M55 42 Q29 29 21 51 Q27 72 48 66 Q55 56 55 42" fill="url(#petalGrad)" stroke="#46324f" stroke-width="0.8"/>
      <path id="p2" d="M55 42 Q81 29 89 51 Q83 72 62 66 Q55 56 55 42" fill="url(#petalGrad)" stroke="#46324f" stroke-width="0.8"/>
      <path id="p3" d="M55 48 Q32 37 26 58 Q35 79 52 71 Q55 61 55 48" fill="#3a1218" opacity="0.85"/>
      <path id="p4" d="M55 48 Q78 37 84 58 Q75 79 58 71 Q55 61 55 48" fill="#3a1218" opacity="0.85"/>
    </g>

    <!-- Inner dying heart of the flower -->
    <ellipse cx="55" cy="53" rx="7" ry="9" fill="#2a1216" stroke="#6b5235" stroke-width="1"/>
    <circle cx="55" cy="53" r="3.2" fill="#1a070d"/>

    <!-- Falling single petal (separate animation) -->
    <g style="animation: petal-drift 6.8s linear infinite;">
      <path d="M72 67 Q79 81 71 94 Q64 88 72 67" fill="#5c2a32" opacity="0.7"/>
    </g>
  </svg>

  <style>
    .shortcode-flower .wilting { animation: wilt-slow 14s ease-in-out infinite; transform-origin: 55px 48px; }
    @keyframes wilt-slow {
      0%, 100% { transform: rotate(-1deg) scale(1); }
      45% { transform: rotate(4.5deg) scale(0.985); }
      52% { transform: rotate(-2.8deg) scale(0.978); }
    }
  </style>
</div>
