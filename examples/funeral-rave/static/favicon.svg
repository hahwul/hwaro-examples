<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep void + velvet gradients -->
    <radialGradient id="ballCore" cx="46%" cy="38%" r="64%" fx="38%" fy="31%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="42%" stop-color="#111111"/>
      <stop offset="78%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <linearGradient id="facetGold" x1="20%" y1="15%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#d4af7a" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#8c6641" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3f2a1a" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Tiny glitter sparkles -->
    <filter id="glitterSpark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Outer black ring / frame of mirrorball -->
  <circle cx="32" cy="32" r="29.5" fill="#0a0a0a" stroke="#3a2a22" stroke-width="2.5"/>

  <!-- Main faceted mirrorball body -->
  <circle cx="32" cy="32" r="25" fill="url(#ballCore)" stroke="#1f1812" stroke-width="0.8"/>

  <!-- Facet lines — geometric tragedy -->
  <g stroke="#8c6641" stroke-width="0.65" stroke-opacity="0.65" fill="none">
    <!-- Horizontal & vertical cuts -->
    <line x1="8" y1="32" x2="56" y2="32"/>
    <line x1="32" y1="8" x2="32" y2="56"/>
    <!-- Diagonal facets -->
    <line x1="14.5" y1="14.5" x2="49.5" y2="49.5"/>
    <line x1="49.5" y1="14.5" x2="14.5" y2="49.5"/>
    <!-- Additional crushed facets -->
    <polyline points="11,22 22,11 32,19 42,11 53,22"/>
    <polyline points="11,42 22,53 32,45 42,53 53,42"/>
    <line x1="17" y1="32" x2="32" y2="21"/>
    <line x1="32" y1="21" x2="47" y2="32"/>
    <line x1="17" y1="32" x2="32" y2="43"/>
    <line x1="32" y1="43" x2="47" y2="32"/>
  </g>

  <!-- Glitter highlights on facets -->
  <g fill="#f8f4ec" opacity="0.75" filter="url(#glitterSpark)">
    <circle cx="19" cy="18" r="1.1"/>
    <circle cx="44" cy="20" r="0.85"/>
    <circle cx="25" cy="41" r="1.3"/>
    <circle cx="46" cy="43" r="0.7"/>
    <circle cx="14" cy="34" r="0.6"/>
    <circle cx="37" cy="13" r="0.95"/>
  </g>

  <!-- Center: Wilted flower (rose) — delicate gold linework -->
  <g transform="translate(32 32) scale(0.82)">
    <!-- Outer wilted petals -->
    <path d="M0 -7.5 Q-4.5 -5.5 -3.8 -0.8 Q-5.8 3.2 -1.6 4.6 Q0 5.8 1.6 4.6 Q5.8 3.2 3.8 -0.8 Q4.5 -5.5 0 -7.5" 
          fill="none" stroke="#d4af7a" stroke-width="1.35" stroke-linejoin="round"/>
    <path d="M0 -6.2 Q-3.1 -3.8 -2.6 -0.1 Q-3.9 2.4 -0.9 3.7" 
          fill="none" stroke="#b89b6e" stroke-width="0.85"/>
    <path d="M0 -6.2 Q3.1 -3.8 2.6 -0.1 Q3.9 2.4 0.9 3.7" 
          fill="none" stroke="#b89b6e" stroke-width="0.85"/>
    
    <!-- Inner collapsed petals + stigma -->
    <circle cx="0" cy="0.6" r="1.8" fill="none" stroke="#8c6641" stroke-width="1.15"/>
    <circle cx="0" cy="0.6" r="0.75" fill="#3f2a1a"/>
    
    <!-- Drooping stem + leaf hint -->
    <path d="M0 3.1 Q-0.4 7.8 1.8 10.5" fill="none" stroke="#6b5235" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M-0.1 6.2 Q-2.9 6.9 -3.6 8.9" fill="none" stroke="#5c4a3a" stroke-width="0.75" stroke-linecap="round"/>
  </g>

  <!-- Subtle outer rim glow — like catching the last strobe -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#d4af7a" stroke-width="0.6" opacity="0.18"/>
</svg>