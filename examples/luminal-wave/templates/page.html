{% include "header.html" %}

<main>
    {% if current_path == "/" %}
    <div class="hero">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p>{{ page.description }}</p>
        {% endif %}
        <a href="/about/" class="btn">Discover More</a>
    </div>
    {% else %}
    <div class="glass-panel">
        <h1>{{ page.title }}</h1>
        <div class="content-wrapper">
            {{ content | safe }}
        </div>
    </div>
    {% endif %}
</main>

{% include "footer.html" %}
