{% include "header.html" %}

<div class="glass-panel content-wrapper">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>

  <div class="page-content">
    {{ content | safe }}
  </div>

  {% if taxonomy is defined and taxonomy.terms %}
    <div class="tags-container">
      {% for term in taxonomy.terms %}
        <a href="{{ term.url }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
      {% endfor %}
    </div>
  {% endif %}
</div>

{% include "footer.html" %}
