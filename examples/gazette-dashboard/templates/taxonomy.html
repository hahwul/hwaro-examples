{% include "header.html" %}
  <main class="site-main">
    <div class="panel-left-block">
      <div class="panel-header">
        <h1 class="panel-title">The Index: <span>{{ taxonomy_name | e }}</span></h1>
        <span class="indicator-badge indicator-red">CATALOGUE</span>
      </div>

      <div class="badge-container" style="gap: 0.8rem; padding: 1rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">
            {{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
