<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- The Data Gazette — broadsheet stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div class="masthead-dateline">
        VOL. XII &middot; NO. 147 &middot; {{ current_year }} &middot; <strong>LATE EDITION</strong> &middot; PRICE ONE BYTE
      </div>
      <a href="{{ base_url }}/" class="site-logo">The Data <span>Gazette</span></a>
      <div class="masthead-motto">&ldquo;All the readings fit to print&rdquo; &mdash; an editorial data desk</div>
      <nav>
        <a href="{{ base_url }}/">Front Page</a>
        <a href="{{ base_url }}/posts/">Dispatches</a>
        <a href="{{ base_url }}/about/">Masthead</a>
      </nav>
    </header>
