<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #c0c0c0;
            --accent: #ff0000;
            --white: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
        }
        .vertical-line {
            position: fixed;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100vh;
            background: rgba(255, 0, 0, 0.3);
            z-index: -1;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Bodoni Moda', serif;
            font-weight: 900;
            font-size: 3rem;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 15px;
            font-style: italic;
        }
        nav { margin-top: 30px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .incision-hero {
            padding: 100px 0;
            border-top: 1px solid var(--accent);
            border-bottom: 1px solid var(--accent);
            margin-top: 40px;
        }
        .incision-hero h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 6rem;
            margin: 0;
            color: var(--white);
            line-height: 1;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Bodoni Moda', serif; font-size: 3rem; color: var(--white); text-align: center; margin-bottom: 60px; }
        p { margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="vertical-line"></div>
    <header>
        <div class="container">
            <div class="logo">INCISION</div>
            <nav>
                <a href="/">Cut</a>
                <a href="/about">Deep</a>
            </nav>
        </div>
    </header>
