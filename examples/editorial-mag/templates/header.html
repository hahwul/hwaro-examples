<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --magazine: #f8f8f8;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--magazine);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 2px solid #000;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .editorial-surface {
            background: #fff;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 3rem; color: #000; margin-top: 0; line-height: 1.1; }
        article { font-size: 1.2rem; columns: 2; column-gap: 40px; }
        @media (max-width: 768px) { article { columns: 1; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">editorial.mag</div>
            <nav>
                <a href="/">Feature</a>
                <a href="/about">Index</a>
            </nav>
        </div>
    </header>
