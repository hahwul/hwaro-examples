# =============================================================================
# Site Configuration
# =============================================================================

title = "Starlight Synth Glass"
description = "A neon-infused glassmorphism theme for Hwaro"
base_url = "/"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp", "css"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[markdown]
safe = false
lazy_loading = true
emoji = true
