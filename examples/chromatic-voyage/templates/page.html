{% extends "base.html" %}

{% block content %}
<article class="content">
    <div class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <p class="post-meta">{{ page.date | date(format="%B %d, %Y") }}</p>
        {% endif %}
    </div>

    <div class="page-body">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
