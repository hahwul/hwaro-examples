{% include "header.html" %}
  <div class="docs-shell">
    {% include "sidebar.html" %}
    <main id="main" class="docs-main">
      <div class="doc-columns doc-columns-wide">
        <article class="doc-article">
          <nav class="crumbs" aria-label="Breadcrumb">
            <a href="{{ base_url }}/tags/">Tags</a>
            <span aria-hidden="true">/</span>
            <span aria-current="page">{{ taxonomy_term | e }}</span>
          </nav>
          <h1>#{{ taxonomy_term | e }}</h1>
          <p class="doc-dek">Rules and pages filed under this tag.</p>
          <div class="prose taxonomy-list">{{ content | safe }}</div>
        </article>
      </div>
    </main>
  </div>
{% include "footer.html" %}
