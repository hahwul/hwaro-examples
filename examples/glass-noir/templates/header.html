<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ddd;
            --accent: #555;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
            font-style: italic;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .noir-hero {
            padding: 100px 0;
            text-align: center;
        }
        .noir-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            margin: 0;
            color: #fff;
            font-style: italic;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 60px;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #fff; font-style: italic; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.noir</div>
        <nav>
            <a href="/">Shadow</a>
            <a href="/about">Depth</a>
        </nav>
    </header>
