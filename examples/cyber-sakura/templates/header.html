<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0221;
      --bg-subtle: #1a0b2e;
      --text: #e0e0e0;
      --text-muted: #8c8c8c;
      --primary: #ff2a6d;
      --secondary: #05d9e8;
      --border: #261447;
      --glow-pink: 0 0 10px rgba(255, 42, 109, 0.5), 0 0 20px rgba(255, 42, 109, 0.3);
      --glow-cyan: 0 0 10px rgba(5, 217, 232, 0.5), 0 0 20px rgba(5, 217, 232, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      position: relative;
    }

    /* Scanline effect */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 10;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 3rem;
      box-shadow: 0 2px 10px rgba(255, 42, 109, 0.2);
    }

    .site-logo {
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: var(--glow-pink);
    }
    .site-logo:hover { color: #fff; }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--secondary);
      text-decoration: none;
      font-size: 1rem;
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: #fff;
      text-shadow: var(--glow-cyan);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 700;
      color: #fff;
    }
    h1 { font-size: 2.5rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
    h2 { font-size: 1.75rem; color: var(--secondary); text-shadow: var(--glow-cyan); }
    h3 { font-size: 1.25rem; color: var(--primary); }
    p { margin: 1.2em 0; }

    a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--secondary); text-shadow: var(--glow-cyan); }

    blockquote {
      border-left: 4px solid var(--primary);
      margin: 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      background: var(--bg-subtle);
      color: var(--text);
      font-style: italic;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    code {
      background: var(--bg-subtle);
      color: var(--secondary);
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      font-size: 0.9em;
      font-family: 'Share Tech Mono', monospace;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
    }
    pre code { background: none; padding: 0; color: #fff; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--bg-subtle);
      border-left: 3px solid var(--secondary);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    ul.section-list li:hover {
      transform: translateX(5px);
      box-shadow: var(--glow-cyan);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-family: 'Share Tech Mono', monospace; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border); color: var(--secondary); text-decoration: none; font-family: 'Share Tech Mono', monospace; }
    nav.pagination a:hover { border-color: var(--secondary); background: rgba(5, 217, 232, 0.1); box-shadow: var(--glow-cyan); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--primary); background: rgba(255, 42, 109, 0.2); color: #fff; font-family: 'Share Tech Mono', monospace; box-shadow: var(--glow-pink); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; font-family: 'Share Tech Mono', monospace; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.5rem 0; }
      .site-wrapper { padding: 0 1.2rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
