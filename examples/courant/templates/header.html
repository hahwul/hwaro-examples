<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="masthead">
    <div class="masthead-top wrap">
      <p class="masthead-tag">Weekly dispatch <span aria-hidden="true">/</span> Electronic &amp; experimental</p>
      <nav class="masthead-nav" aria-label="Primary">
        <a href="{{ base_url }}/notices/">Notices</a>
        <a href="{{ base_url }}/categories/">Genres</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <button class="search-open" id="search-open" type="button" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3 L17 17"/></svg>
          <span>Search</span>
          <kbd aria-hidden="true">/</kbd>
        </button>
      </nav>
    </div>
    <a class="nameplate wrap" href="{{ base_url }}/" aria-label="The Courant — home">
      <span class="nameplate-text">The Courant</span>
    </a>
    <p class="masthead-dek wrap">{{ site.description | e }}</p>
    <div class="masthead-rule" aria-hidden="true"></div>
  </header>
