<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | default("Astral UI") | e }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | default("Astral Glass UI") | e }}{% endif %}">
  {{ auto_includes | safe }}
  {{ highlight_tags | safe }}
  <style>
    :root {
      --bg-color: #0b0f19;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.5);
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      background-image: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    nav {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    nav a:hover {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }
    h1, h2, h3 {
      color: #fff;
      margin-top: 0;
    }
    a { color: var(--accent); }
    a:hover { text-shadow: 0 0 5px var(--accent-glow); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ base_url }}/" style="font-size: 1.25rem; font-weight: bold; letter-spacing: 1px;">ASTRAL UI</a>
      <div class="nav-links">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </div>
    </nav>
  </header>
  <div class="container">
