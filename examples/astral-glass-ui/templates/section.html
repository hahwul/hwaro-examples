{% include "header.html" %}
<div class="glass-card">
  <h1>{{ section.title | e }}</h1>
  <div class="content">
    {{ content | safe }}
  </div>
</div>
<div class="page-list">
  {% for p in pages %}
    <article class="glass-card" style="padding: 1.5rem;">
      <h2 style="margin-bottom: 0.5rem;"><a href="{{ p.url }}" style="text-decoration: none;">{{ p.title | e }}</a></h2>
      {% if p.description %}
        <p style="color: var(--text-secondary); margin: 0;">{{ p.description | e }}</p>
      {% endif %}
    </article>
  {% endfor %}
</div>
{% include "footer.html" %}
