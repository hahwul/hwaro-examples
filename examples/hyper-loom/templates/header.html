<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #03040a;
      --bg-accent: #0a0c18;
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff0055;
      --neon-purple: #8a2be2;
      --text-main: #f0f4f8;
      --text-muted: #94a3b8;
      --glass-bg: rgba(10, 12, 24, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-deep);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background Animation */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      background: var(--bg-deep);
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite alternate ease-in-out;
    }

    .glow-orb:nth-child(1) {
      top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, var(--neon-purple), transparent 70%);
      animation-delay: 0s;
    }

    .glow-orb:nth-child(2) {
      bottom: -20%; right: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, var(--neon-cyan), transparent 70%);
      animation-delay: -5s;
    }

    .glow-orb:nth-child(3) {
      top: 40%; left: 60%;
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, var(--neon-magenta), transparent 70%);
      opacity: 0.3;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, 15%) scale(1.1); }
    }

    /* Moving Grid */
    .loom-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      perspective: 1000px;
      transform-origin: center top;
      opacity: 0.6;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(50px); }
    }

    /* Layout */
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      border-radius: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 1px var(--glass-highlight);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--text-main));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .site-header nav a:hover { color: var(--neon-cyan); }

    .site-main { min-height: calc(100vh - 250px); margin-bottom: 3rem; }

    .site-footer {
      margin-top: 3rem;
      padding: 2rem;
      border-radius: 16px 16px 0 0;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-bottom: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Glass Panels */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .glass-panel:hover {
      border-color: rgba(0, 240, 255, 0.3);
      transform: translateY(-2px);
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.2;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 700;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; color: var(--neon-cyan); }
    p { margin: 1.2em 0; color: var(--text-muted); font-size: 1.05rem; }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--neon-magenta);
      border-bottom-color: var(--neon-magenta);
      text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
    }

    code {
      background: rgba(0, 0, 0, 0.4);
      color: var(--neon-magenta);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid rgba(255, 0, 85, 0.2);
    }

    pre {
      background: rgba(5, 5, 10, 0.8);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    pre code {
      background: none;
      padding: 0;
      color: var(--text-main);
      border: none;
    }

    /* Components */
    ul { padding-left: 1.5rem; color: var(--text-muted); }
    li { margin-bottom: 0.5rem; }
    li::marker { color: var(--neon-purple); }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
    }
    ul.section-list li a { font-weight: 500; font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; border-bottom: none; }
    ul.section-list li p { margin-top: 0.5rem; margin-bottom: 0; font-size: 0.95rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    nav.pagination a:hover {
      color: #fff;
      border-color: var(--neon-cyan);
      background: rgba(0, 240, 255, 0.1);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--neon-magenta);
      background: rgba(255, 0, 85, 0.15);
      color: #fff;
      font-weight: bold;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Tags */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
    .tag {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(138, 43, 226, 0.1);
      border: 1px solid rgba(138, 43, 226, 0.3);
      color: var(--text-main);
      border-bottom: none;
    }
    .tag:hover {
      background: rgba(138, 43, 226, 0.3);
      border-color: var(--neon-purple);
      color: #fff;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.25rem; }
      .site-wrapper { padding: 0 1rem; }
      .glass-panel { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="bg-animation">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
  </div>
  <div class="loom-grid"></div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{% if site is defined and site.title %}{{ site.title }}{% else %}Hyper Loom{% endif %}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/tags/">Tags</a>
      </nav>
    </header>
    <main class="site-main">
