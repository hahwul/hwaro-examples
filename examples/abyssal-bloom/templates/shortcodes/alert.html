<div class="glass-panel alert {{ type | default(value="info") }}" style="padding: 1.5rem; margin: 2rem 0; border-left: 4px solid var(--neon-cyan);">
  <strong style="color: var(--neon-cyan); display: block; margin-bottom: 0.5rem; text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;">{{ type | default(value="Note") }}</strong>
  <p style="margin: 0;">{{ message }}</p>
</div>
