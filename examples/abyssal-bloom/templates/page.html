{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
  <div class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <div class="meta">
      <span>{{ page.date | date("%B %d, %Y") }}</span>
      {% if page.reading_time %}
      <span>&bull; {{ page.reading_time }} min read</span>
      {% endif %}
    </div>
    {% endif %}
  </div>

  <div class="page-content">
    {{ content | safe }}
  </div>
</div>
{% endblock %}
