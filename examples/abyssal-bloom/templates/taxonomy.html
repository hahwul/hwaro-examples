{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
  <div class="page-header">
    <h1>{{ taxonomy_name | capitalize }}</h1>
    <p>All terms in this taxonomy.</p>
  </div>

  <div class="grid">
    {% if taxonomy_terms is defined %}
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.slug }}/" class="card" style="text-align: center;">
      <h3 style="margin-bottom: 0;">{{ term.name }}</h3>
    </a>
    {% endfor %}
    {% endif %}
  </div>
</div>
{% endblock %}
