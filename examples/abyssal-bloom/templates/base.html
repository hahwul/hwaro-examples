<!DOCTYPE html>
<html lang="{{ default_language | default(value="en") }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  {% if og_tags %}
  {{ og_tags | safe }}
  {% endif %}

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {% if auto_includes %}
  {{ auto_includes | safe }}
  {% endif %}
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orb orb-pink"></div>
  <div class="bg-orb orb-cyan"></div>
  <div class="bg-orb orb-purple"></div>

  <header>
    <div class="container nav-container">
      <nav>
        <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
        <div class="nav-links">
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/about/">About</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ current_year }} {{ site.title }}. Built with <a href="https://hwaro.hahwul.com">Hwaro</a>.</p>
    </div>
  </footer>
</body>
</html>
