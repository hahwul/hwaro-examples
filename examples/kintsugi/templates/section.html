{% extends "base.html" %}

{% block content %}
<section class="section-page">
    <header class="section-header">
        <h1 class="section-title">{{ section.title }}</h1>
        <div class="header-fracture"></div>
    </header>

    {% if section.content %}
    <div class="section-content">
        {{ section.content | safe }}
    </div>
    {% endif %}

    <div class="post-list">
        {% for page in section.pages %}
        <article class="list-item">
            <div class="list-fracture"></div>
            <div class="list-content">
                <h2 class="list-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
                {% if page.date %}
                <time class="list-date">{{ page.date | date(format="%Y-%m-%d") }}</time>
                {% endif %}
            </div>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock content %}
