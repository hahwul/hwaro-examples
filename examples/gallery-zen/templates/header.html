<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #777;
            --accent: #eee;
            --zen: #fafafa;
            --shadow: rgba(0,0,0,0.02);
        }
        body {
            background-color: var(--zen);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.8;
            letter-spacing: 1px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 100px 0;
            text-align: center;
        }
        .logo {
            font-weight: 200;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 10px;
        }
        nav { margin-top: 40px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.5;
        }
        .zen-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 0 0 50px var(--shadow);
            margin-bottom: 100px;
            text-align: center;
        }
        h2 { font-weight: 200; font-size: 2rem; color: #333; margin-top: 0; margin-bottom: 40px; text-transform: lowercase; letter-spacing: 8px; }
        article { font-size: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">gallery.zen</div>
            <nav>
                <a href="/">Silence</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
