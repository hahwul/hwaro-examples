<!-- MEAT CATHEDRAL: subtle heartbeat pulse + slow dripping controller -->
<script>
(function(){
  // Heartbeat pulse on key architectural meat surfaces
  function pulseMeat() {
    var targets = document.querySelectorAll('.post-item, .sermon-callout, .dripping-pillar, .blog-main h1, .cathedral-entrance');
    targets.forEach(function(el, i){
      setTimeout(function(){
        el.classList.add('pulse');
        setTimeout(function(){ el.classList.remove('pulse'); }, 4200);
      }, i * 180);
    });
  }

  // Random slow blood bead / drip spawns on the pulpit and major sermon blocks
  function spawnDrips() {
    var pulpit = document.querySelector('.blog-header');
    if (pulpit) {
      setInterval(function(){
        if (Math.random() > 0.64) {
          var bead = document.createElement('span');
          bead.style.cssText = 'position:absolute;bottom:-2px;left:'+(18+Math.random()*68)+'%;width:3px;height:3px;border-radius:50%;background:#c73e3e;opacity:.65;pointer-events:none;z-index:10;';
          pulpit.appendChild(bead);
          setTimeout(function(){
            bead.style.transition = 'transform 980ms linear, opacity 980ms linear';
            bead.style.transform = 'translateY(38px)';
            bead.style.opacity = '0';
            setTimeout(function(){ bead.parentNode && bead.parentNode.removeChild(bead); }, 1020);
          }, 40);
        }
      }, 2650);
    }
  }

  // Gentle breathing on the entire nave container
  function cathedralBreath() {
    var nave = document.querySelector('.blog-container');
    if (nave) {
      nave.style.transition = 'filter 4200ms ease';
      setInterval(function(){
        nave.style.filter = 'brightness(1.015) saturate(1.03)';
        setTimeout(function(){ if(nave) nave.style.filter = 'brightness(1) saturate(1)'; }, 2100);
      }, 8700);
    }
  }

  // Boot all grotesque micro-interactions
  function initCathedralHorror() {
    // initial pulse wave
    setTimeout(pulseMeat, 820);
    // recurring slow heartbeat
    setInterval(pulseMeat, 14200);
    // dripping from the fixed pulpit header
    setTimeout(spawnDrips, 1600);
    // the nave itself breathes
    setTimeout(cathedralBreath, 2400);

    // Bonus: clicking the logo triggers a full nave tremor
    var logo = document.querySelector('.blog-header .logo');
    if (logo) {
      logo.addEventListener('click', function(e){
        document.querySelectorAll('.post-item, .sermon-callout').forEach(function(el){
          el.style.transitionDuration = '60ms';
          el.style.transform = 'translateX(1px)';
          setTimeout(function(){
            if (el) el.style.transform = '';
            if (el) el.style.transitionDuration = '';
          }, 180);
        });
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCathedralHorror);
  } else {
    initCathedralHorror();
  }
})();
</script>
</body>
</html>
