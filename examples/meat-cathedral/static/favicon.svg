<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Meat Cathedral Favicon: a dripping cross of living flesh inside a bone frame -->
  <defs>
    <linearGradient id="meatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c73e3e"/>
      <stop offset="42%" stop-color="#9c2a2a"/>
      <stop offset="100%" stop-color="#3a0f0f"/>
    </linearGradient>
    <linearGradient id="fatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e8d3"/>
      <stop offset="100%" stop-color="#c9b8a0"/>
    </linearGradient>
  </defs>
  <!-- Outer bone frame / cathedral silhouette -->
  <rect x="2" y="2" width="28" height="28" rx="2" fill="#1f0808" stroke="#e8e0d0" stroke-width="2.5"/>
  <!-- Central vertical meat pillar (cross stem) -->
  <rect x="13.5" y="6" width="5" height="20" rx="1" fill="url(#meatGrad)"/>
  <!-- Horizontal cross beam of marbled flesh -->
  <rect x="7" y="11" width="18" height="4.5" rx="0.6" fill="url(#meatGrad)"/>
  <!-- Fat marbling veins on the cross -->
  <path d="M9 12.2 Q14 11.6 17 13.1 Q22 12.3 24 13.5" stroke="#f5e8d3" stroke-width="0.9" fill="none" opacity="0.65"/>
  <path d="M14 7.5 Q15.2 14 14.6 23" stroke="#f5e8d3" stroke-width="0.7" fill="none" opacity="0.55"/>
  <!-- Slow drip accents (3 beads) -->
  <circle cx="15" cy="26.5" r="1.35" fill="#9c2a2a"/>
  <circle cx="16.1" cy="27.9" r="0.9" fill="#3a0f0f"/>
  <!-- Tiny bone rivets at the four corners of the cathedral frame -->
  <circle cx="5" cy="5" r="1.4" fill="#e8e0d0"/>
  <circle cx="27" cy="5" r="1.4" fill="#e8e0d0"/>
  <circle cx="5" cy="27" r="1.4" fill="#e8e0d0"/>
  <circle cx="27" cy="27" r="1.4" fill="#e8e0d0"/>
</svg>