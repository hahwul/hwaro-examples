{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content }}
    <ul class="section-list">
      {% for page in section.pages %}
      <li>
        <a href="{{ page.url }}">{{ page.title | e }}</a>
        {% if page.description %}
          <p class="taxonomy-desc">{{ page.description | e }}</p>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
    {{ pagination | safe }}
  </main>
{% include "footer.html" %}
