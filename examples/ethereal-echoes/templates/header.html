<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --primary: #8a2be2;
      --secondary: #00ffff;
      --text: #f0f0f0;
      --text-muted: #a0aab5;
      --bg-dark: #0f1015;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.15), transparent 25%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Ambient animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite alternate ease-in-out;
    }
    .orb-1 {
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: rgba(138, 43, 226, 0.2);
    }
    .orb-2 {
      bottom: -150px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: rgba(0, 255, 255, 0.15);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      border-radius: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.3s ease;
    }

    .site-header nav a:hover { color: var(--text); }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { flex-grow: 1; display: flex; flex-direction: column; gap: 2rem;}

    /* Typography & Elements */
    h1, h2, h3 {
      line-height: 1.3;
      margin-top: 0;
      margin-bottom: 1rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(to right, #fff, #a0aab5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 { font-size: 1.8rem; color: #fff; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;}
    h3 { font-size: 1.3rem; color: #e0e0e0;}

    p { margin: 0 0 1.5rem 0; color: #d0d0d0; font-size: 1.1rem; line-height: 1.7; }

    a {
      color: var(--secondary);
      text-decoration: none;
      transition: text-shadow 0.3s ease, color 0.3s ease;
    }

    a:hover {
      color: #fff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
    }

    code {
      background: rgba(0,0,0,0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--secondary);
      border: 1px solid var(--glass-border);
    }

    pre {
      background: rgba(0,0,0,0.4) !important;
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }

    pre code { background: none; padding: 0; border: none; color: inherit;}

    /* Components */
    ul { padding-left: 1.5rem; color: #d0d0d0; }
    li { margin-bottom: 0.5rem; }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; display: grid; gap: 1rem; }
    ul.section-list li {
      margin-bottom: 0;
      padding: 1.25rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255,255,255,0.06);
      transform: translateX(5px);
      border-color: rgba(0, 255, 255, 0.3);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; display: block; margin-bottom: 0.25rem;}

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic;}

    nav.pagination { margin: 2rem 0; display: flex; justify-content: center; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text);
      transition: all 0.3s ease;
    }
    nav.pagination a:hover {
      background: rgba(138, 43, 226, 0.2);
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--secondary);
      background: rgba(0, 255, 255, 0.1);
      color: var(--secondary);
      font-weight: bold;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; padding: 1.25rem;}
      .site-wrapper { padding: 0 1rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
