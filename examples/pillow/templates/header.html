<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f1f1;
            --text: #5a4b4b;
            --accent: #d8b4b4;
            --soft: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .pillow-hero {
            padding: 100px 0;
            background: var(--soft);
            border-radius: 60px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.02), -20px -20px 60px rgba(255,255,255,0.8);
        }
        .pillow-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            color: var(--accent);
        }
        article {
            background: var(--soft);
            padding: 60px;
            border-radius: 40px;
            box-shadow: inset 10px 10px 30px rgba(0,0,0,0.01), inset -10px -10px 30px rgba(255,255,255,0.8);
        }
        h2 { font-weight: 600; font-size: 2rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">pillow</div>
            <nav>
                <a href="/">Soft</a>
                <a href="/about">Rest</a>
            </nav>
        </div>
    </header>
