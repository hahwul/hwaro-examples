<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="column">
    <header class="site-header">
      <a class="site-name" href="{{ base_url }}/">
        <span class="site-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" role="presentation" focusable="false">
            <path d="M12 21V5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 9c-2.3-.2-3.9-1.7-4.2-3.6C9.9 5.6 11.6 7.1 12 9Zm0 0c2.3-.2 3.9-1.7 4.2-3.6C14.1 5.6 12.4 7.1 12 9Z" fill="currentColor"/>
            <path d="M12 13c-2.3-.2-3.9-1.7-4.2-3.6C9.9 9.6 11.6 11.1 12 13Zm0 0c2.3-.2 3.9-1.7 4.2-3.6C14.1 9.6 12.4 11.1 12 13Z" fill="currentColor"/>
            <path d="M12 17c-2.3-.2-3.9-1.7-4.2-3.6C9.9 13.6 11.6 15.1 12 17Zm0 0c2.3-.2 3.9-1.7 4.2-3.6C14.1 13.6 12.4 15.1 12 17Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="site-word">Drizzle</span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/experiments/">Experiments</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </header>
