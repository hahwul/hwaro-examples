<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --primary: #c084fc;
    --primary-glow: #e879f9;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
    --bg: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.6);
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    margin: 0;
    color: var(--text);
    background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 60%);
    min-height: 100vh;
  }
  .starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    opacity: 0.3;
    animation: drift 60s linear infinite;
  }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-200px); } }
  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; }
  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 2rem; margin-top: 2rem; margin-bottom: 3rem;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
  }
  .site-logo { font-weight: 700; font-size: 1.25rem; color: var(--text); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; }
  .site-logo span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; transition: color 0.3s; }
  .site-header nav a:hover { color: var(--primary-glow); }
  .site-main {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    min-height: calc(100vh - 300px);
  }
  .site-footer { margin-top: 3rem; padding: 2rem 0; color: var(--text-muted); font-size: 0.85rem; text-align: center; border-top: 1px solid var(--border); }
  h1, h2, h3 { line-height: 1.3; font-weight: 300; }
  h1 { font-size: 2.5rem; margin-top: 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
  h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-glow); }
  pre { background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; }
  code { font-family: monospace; color: #e2e8f0; }
  ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s; }
  ul.section-list li:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 0 15px rgba(192, 132, 252, 0.2); }
  ul.section-list li a { font-weight: 500; font-size: 1.2rem; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined %}{{ page.section }}{% endif %}">
  <div class="starfield"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Nebulous <span>Enigma</span></a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>

<main class="site-main">
