<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #030406;
            --color-text: #e2e8f0;
            --color-accent: #0ea5e9;
            --color-border: #1e293b;
            --color-panel: #0f172a;

            --font-main: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--color-border);
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.5rem;
            text-decoration: none;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .logo span {
            color: var(--color-accent);
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--color-accent);
        }

        main {
            padding: 4rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        footer {
            border-top: 1px solid var(--color-border);
            padding: 2rem 5%;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #64748b;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            margin-bottom: 1.5rem;
        }

        a {
            color: var(--color-accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        code, pre {
            font-family: var(--font-mono);
            background-color: var(--color-panel);
            font-size: 0.9em;
        }

        code {
            padding: 0.2em 0.4em;
            border-radius: 2px;
        }

        pre {
            padding: 1.5rem;
            border: 1px solid var(--color-border);
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--color-panel);
            border: 1px solid var(--color-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--color-accent);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .card .meta {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .card .summary {
            flex-grow: 1;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .card a.read-more {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--color-accent);
            text-decoration: none;
            align-self: flex-start;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .card a.read-more:hover {
            border-color: var(--color-accent);
            text-decoration: none;
        }

        .page-header {
            margin-bottom: 4rem;
            border-bottom: 4px solid var(--color-accent);
            padding-bottom: 2rem;
            display: inline-block;
        }

        .page-header h1 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        /* Specific styles for lists */
        .content-area ul, .content-area ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .content-area li {
            margin-bottom: 0.5rem;
        }

        /* Tags */
        .tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            padding: 0.2rem 0.6rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Ethereal<span>Horizon</span></a>
        <nav>
            <a href="/posts/">Posts</a>
            <a href="/about/">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ site.title }}. Built with Hwaro.</p>
    </footer>

</body>
</html>
