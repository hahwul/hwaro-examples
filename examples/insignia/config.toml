title = "Insignia"
description = "CV of a robotics researcher working on compliant manipulation and grasping"
base_url = "http://localhost:3000"   # CI overrides with --base-url; never hardcode production URLs

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[og]
type = "profile"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
