<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0f1218">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }} — Robotics CV</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="{{ base_url }}/">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
            <path d="M10 25 L10 15 L23 9" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="10" cy="15" r="2.6" fill="currentColor"/>
            <circle cx="10" cy="25" r="2" fill="currentColor" opacity="0.55"/>
            <circle cx="23" cy="9" r="2" fill="currentColor" opacity="0.85"/>
          </svg>
          <span class="brand-word">{{ site.title | e }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
          <a href="{{ base_url }}/research/"{% if page.section == "research" %} aria-current="page"{% endif %}>Research</a>
          <a href="{{ base_url }}/cv/"{% if page.url == "/cv/" %} aria-current="page"{% endif %}>CV</a>
          <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        </nav>
      </div>
    </header>
