<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #4ade80;
      --text: #f8fafc;
      --text-muted: #cbd5e1;
      --border: rgba(255, 255, 255, 0.2);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    *, *::before, *::after { box-sizing: border-box; }
    @keyframes gradient-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
      background-size: 400% 400%;
      animation: gradient-bg 15s ease infinite;
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--glass-shadow);
    }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: #fff; text-decoration: none; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 1.25rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; transition: color 0.2s ease; }
    .site-header nav a:hover { color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); }
    .site-main { min-height: calc(100vh - 300px); }
    .site-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #fff; }
    h1 { font-size: 2.2rem; margin-top: 0; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
    a:hover { color: #86efac; text-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
    code { background: rgba(0,0,0,0.3); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); }
    pre { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s, background 0.2s; }
    ul.section-list li:hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; background: rgba(0,0,0,0.2); transition: all 0.2s; }
    nav.pagination a:hover { color: #fff; border-color: var(--primary); background: rgba(74, 222, 128, 0.1); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--primary); background: rgba(74, 222, 128, 0.2); color: #fff; }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 1.5rem; margin: 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
