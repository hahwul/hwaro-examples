<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <meta name="theme-color" content="#0c1018">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="site-logo">
        <span class="site-logo__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="18" height="18"><path d="M20.5 5.3a11 11 0 1 0 6.2 15.4A9 9 0 0 1 20.5 5.3Z" fill="currentColor"/></svg>
        </span>
        <span class="site-logo__word">{{ site.title | e }}</span>
      </a>
      <nav aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/nocturnes/">Nocturnes</a>
        <a href="{{ base_url }}{{ lang_prefix }}/about/">About</a>
      </nav>
    </div>
  </header>
