{% extends "base.html" %}

{% block content %}
    <h1>{{ term.name | capitalize }}</h1>
    <ul>
        {% if term is defined and term.pages is defined %}
            {% for page in term.pages %}
                <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
            {% endfor %}
        {% endif %}
    </ul>
{% endblock %}
