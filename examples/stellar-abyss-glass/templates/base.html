<!DOCTYPE html>
<html lang="{{ site.language | default(default="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-dark: #020108;
            --color-glass-bg: rgba(20, 15, 30, 0.25);
            --color-glass-border: rgba(255, 255, 255, 0.08);
            --color-text-main: #e0e0e8;
            --color-text-muted: #8b8a9c;

            --glow-cyan: #00f0ff;
            --glow-magenta: #ff0055;
            --glow-purple: #8a2be2;

            --font-body: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg-dark);
            color: var(--color-text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Cosmic Background Orbs */
        .cosmic-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--glow-cyan), transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow-purple), transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--glow-magenta), transparent 70%);
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation-duration: 25s;
            opacity: 0.2;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glassmorphism Header */
        header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        nav a {
            color: var(--color-text-main);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--glow-cyan);
        }

        /* Main Content Glass Panel */
        main {
            flex: 1;
            background: var(--color-glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--color-glass-border);
            border-radius: 24px;
            padding: 3rem;
            margin-top: 2rem;
            margin-bottom: 4rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            color: #fff;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3rem;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--color-text-muted);
        }

        a {
            color: var(--glow-cyan);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        img {
            max-width: 100%;
            border-radius: 12px;
            margin: 2rem 0;
            border: 1px solid var(--color-glass-border);
        }

        footer {
            padding: 2rem 0;
            text-align: center;
            color: var(--color-text-muted);
            border-top: 1px solid var(--color-glass-border);
            margin-top: auto;
        }

        /* Glass Cards for lists (if needed) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

    </style>
</head>
<body>
    <div class="cosmic-orb orb-1"></div>
    <div class="cosmic-orb orb-2"></div>
    <div class="cosmic-orb orb-3"></div>

    <div class="container">
        <header>
            <a href="/" class="logo">{{ site.title }}</a>
            <nav>
                <a href="/">Home</a>
                <a href="/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
