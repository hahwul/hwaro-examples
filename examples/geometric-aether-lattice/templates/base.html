<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-aether: #090b10;
            --grid-line-color: #1a1d26;
            --text-stark: #e5e7eb;
            --text-muted: #9ca3af;
            --accent-electric: #4b8bf5;
            --border-width: 1px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep-aether);
            color: var(--text-stark);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-image:
                linear-gradient(to right, var(--grid-line-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line-color) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            color: var(--text-stark);
            margin-top: 2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        a {
            color: var(--accent-electric);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--text-stark);
        }

        /* Layout Structure */
        .lattice-container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            background-color: var(--bg-deep-aether); /* Mask underlying grid */
            border-left: var(--border-width) solid var(--grid-line-color);
            border-right: var(--border-width) solid var(--grid-line-color);
            min-height: 100vh;
        }

        header {
            padding: 3rem 2rem;
            border-bottom: var(--border-width) solid var(--grid-line-color);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .site-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-stark);
        }

        nav a {
            margin-left: 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        nav a:hover {
            color: var(--accent-electric);
        }

        main {
            padding: 3rem 2rem;
            flex-grow: 1;
        }

        footer {
            padding: 2rem;
            border-top: var(--border-width) solid var(--grid-line-color);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Typography components */
        .meta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: block;
        }

        hr {
            border: 0;
            border-top: var(--border-width) solid var(--grid-line-color);
            margin: 2rem 0;
        }

        /* Post Content Styles */
        .content {
            font-size: 1.1rem;
            max-width: 65ch;
            margin: 0 auto;
        }

        .content pre {
            background-color: #11131a;
            border: var(--border-width) solid var(--grid-line-color);
            padding: 1.5rem;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .content code {
            font-family: monospace;
            background-color: #11131a;
            padding: 0.2em 0.4em;
            font-size: 0.9em;
            border: var(--border-width) solid var(--grid-line-color);
        }

        .content pre code {
            border: none;
            padding: 0;
            background-color: transparent;
        }

        .content blockquote {
            border-left: 3px solid var(--accent-electric);
            margin: 1.5rem 0;
            padding-left: 1.5rem;
            font-style: italic;
            color: var(--text-muted);
        }

        .content ul, .content ol {
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        /* Lists */
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 2rem;
        }

        .post-item {
            border: var(--border-width) solid var(--grid-line-color);
            padding: 2rem;
            transition: border-color 0.2s ease;
        }

        .post-item:hover {
            border-color: var(--accent-electric);
        }

        .post-item h2 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        .post-item h2 a {
            color: var(--text-stark);
        }

        .post-item h2 a:hover {
            color: var(--accent-electric);
        }

        .post-summary {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .tag-list {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.75rem;
            border: var(--border-width) solid var(--grid-line-color);
            color: var(--text-muted);
        }

        .tag:hover {
            border-color: var(--accent-electric);
            color: var(--accent-electric);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: var(--border-width) solid var(--grid-line-color);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }
            nav a {
                margin-left: 0;
                margin-right: 1.5rem;
            }
            main {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="lattice-container">
        <header>
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}/posts/">Structure</a>
                <a href="{{ base_url }}/tags/">Nodes</a>
                <a href="{{ base_url }}/about/">Protocol</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            &copy; {{ current_year }} {{ site.title }} &middot; Structured Aether
        </footer>
    </div>
</body>
</html>
