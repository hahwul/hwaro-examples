<!DOCTYPE html>
<html lang="{{ site.language | default(value="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
    {{ auto_includes | safe }}
    {{ highlight_tags | safe }}
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-brand">
                <a href="{{ "/" | relative_url }}">{{ site.title }}</a>
            </div>
            <div class="nav-links">
                <a href="{{ "/" | relative_url }}">Home</a>
                <a href="{{ "/about/" | relative_url }}">About</a>
            </div>
        </nav>
    </header>
    {% if site.search is defined and site.search.enable == true %}
    <div class="search-overlay">
        <!-- Search implementation here if needed -->
    </div>
    {% endif %}
