# =============================================================================
# Site Configuration
# =============================================================================

title = "Kinetic Mobile"
description = "A bold, artistic theme with UI elements that appear to hang and swing like a mobile as you scroll."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false
