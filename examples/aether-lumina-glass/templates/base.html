<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(value=site.title) }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% if page.description is defined %}
  <meta name="description" content="{{ page.description }}">
  {% elif site.description is defined %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
</head>
<body>
  <div class="aether-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="glass-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/archives/">Archives</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div class="header-right">
        <button class="search-trigger" onclick="openSearch()" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="search-overlay glass-panel" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal glass-card">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search the void..." autocomplete="off">
        <kbd onclick="closeSearch()">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <main class="main-container">
    {% block content %}{% endblock %}
  </main>

  <footer class="glass-footer">
    <div class="footer-inner">
      <p>&copy; {{ site.title }}. Built with <a href="https://github.com/hahwul/hwaro">Hwaro</a>.</p>
    </div>
  </footer>

  <script src="{{ base_url }}/js/search.js"></script>
</body>
</html>
