{% extends "base.html" %}

{% block content %}
<div class="taxonomy-term-card glass-card">
  <header class="section-header">
    <h1 class="section-title">{{ taxonomy.name | capitalize }}: {{ term.name }}</h1>
  </header>

  <div class="post-list">
    {% for post in term.pages %}
    <article class="post-item glass-panel">
      <h2 class="post-item-title"><a href="{{ base_url }}{{ post.url }}">{{ post.title | e }}</a></h2>
      <div class="post-meta">
        <time datetime="{{ post.date | date(format='%Y-%m-%d') }}">{{ post.date | date(format="%b %d, %Y") }}</time>
      </div>
    </article>
    {% endfor %}
  </div>
</div>
{% endblock %}
