{% extends "base.html" %}

{% block content %}
<div class="taxonomy-card glass-card">
  <h1 class="taxonomy-title">All {{ taxonomy.name | capitalize }}</h1>

  <div class="terms-cloud">
    {% for term in terms %}
    <a href="{{ base_url }}{{ term.url }}" class="term-link glass-badge">
      <span class="term-name">{{ term.name }}</span>
      <span class="term-count">{{ term.pages | length }}</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
