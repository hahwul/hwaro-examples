# =============================================================================
# Site Configuration
# =============================================================================

base_url = "http://localhost:3000"
title = "Aether Lumina"
description = "Echoes from the glass void."
author = "Hwaro Architect"
languageCode = "en-us"

[taxonomies_config]
enabled = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."

[feeds]
enabled = true
filename = "rss.xml"
type = "rss"
full_content = true
limit = 10

[markdown]
safe = false
lazy_loading = false
emoji = false
