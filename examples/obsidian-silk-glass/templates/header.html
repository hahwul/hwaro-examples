<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #94A3B8; /* Muted slate/silver for silk touch */
      --primary-glow: rgba(148, 163, 184, 0.4);
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: rgba(255, 255, 255, 0.08);
      --bg: #0B0C10; /* Deep Obsidian */
      --bg-subtle: rgba(255, 255, 255, 0.03);
      --glass-bg: rgba(15, 23, 42, 0.4); /* Slate glass */
      --font-body: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(51, 65, 85, 0.15), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(30, 41, 59, 0.2), transparent 40%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: -1;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }

    .site-logo {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .site-logo:hover {
      color: #fff;
      text-shadow: 0 0 12px var(--primary-glow);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      font-family: var(--font-display);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: #fff;
    }

    .site-main {
      flex: 1;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.15);
      margin-bottom: 2rem;
    }

    .site-footer {
      margin-top: auto;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-family: var(--font-display);
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: linear-gradient(180deg, #FFFFFF 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.25em 0; color: var(--text); }

    a {
      color: #E2E8F0;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    a:hover {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* Code styling */
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #E2E8F0;
      border: 1px solid var(--border);
    }

    pre {
      background: rgba(0, 0, 0, 0.4) !important;
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    /* Components */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1rem;
    }

    ul.section-list li {
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
    }

    ul.section-list li a {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.1rem;
      border: none;
      color: #fff;
      display: block;
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-display);
      background: rgba(255, 255, 255, 0.02);
    }

    nav.pagination a:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-family: var(--font-display);
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      color: var(--text-muted);
      opacity: 0.4;
      font-family: var(--font-display);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .site-header {
        flex-direction: column;
        gap: 1rem;
        padding: 1.25rem;
      }
      .site-wrapper { padding: 0 1rem; }
      .site-main { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
