<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Curtain drapes fixed to left and right of viewport -->
  <aside class="curtain-drape curtain-left" aria-hidden="true">
    <svg viewBox="0 0 160 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <defs>
        <pattern id="drape-left" width="32" height="1200" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="32" height="1200" fill="#3e0b14"/>
          <path d="M 16 0 Q 8 300 16 600 Q 24 900 16 1200" fill="none" stroke="#1a0309" stroke-width="2"/>
          <path d="M 4 0 Q 0 300 4 600 Q 8 900 4 1200" fill="none" stroke="#5a1420" stroke-width="1"/>
          <path d="M 28 0 Q 32 300 28 600 Q 24 900 28 1200" fill="none" stroke="#5a1420" stroke-width="1"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="160" height="1200" fill="url(#drape-left)"/>
      <!-- Tassel at top -->
      <ellipse cx="140" cy="18" rx="14" ry="16" fill="#b58a2a" stroke="#7a5a1a" stroke-width="1.5"/>
      <path d="M 128 30 Q 126 50 130 66 M 134 30 Q 134 52 136 68 M 140 30 Q 140 52 140 68 M 146 30 Q 146 52 144 68 M 152 30 Q 152 50 150 66" fill="none" stroke="#b58a2a" stroke-width="1.5"/>
      <!-- Cord -->
      <path d="M 80 40 Q 110 80 140 18" fill="none" stroke="#b58a2a" stroke-width="2"/>
    </svg>
  </aside>
  <aside class="curtain-drape curtain-right" aria-hidden="true">
    <svg viewBox="0 0 160 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <defs>
        <pattern id="drape-right" width="32" height="1200" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="32" height="1200" fill="#3e0b14"/>
          <path d="M 16 0 Q 8 300 16 600 Q 24 900 16 1200" fill="none" stroke="#1a0309" stroke-width="2"/>
          <path d="M 4 0 Q 0 300 4 600 Q 8 900 4 1200" fill="none" stroke="#5a1420" stroke-width="1"/>
          <path d="M 28 0 Q 32 300 28 600 Q 24 900 28 1200" fill="none" stroke="#5a1420" stroke-width="1"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="160" height="1200" fill="url(#drape-right)"/>
      <ellipse cx="20" cy="18" rx="14" ry="16" fill="#b58a2a" stroke="#7a5a1a" stroke-width="1.5"/>
      <path d="M 8 30 Q 6 50 10 66 M 14 30 Q 14 52 16 68 M 20 30 Q 20 52 20 68 M 26 30 Q 26 52 24 68 M 32 30 Q 32 50 30 66" fill="none" stroke="#b58a2a" stroke-width="1.5"/>
      <path d="M 80 40 Q 50 80 20 18" fill="none" stroke="#b58a2a" stroke-width="2"/>
    </svg>
  </aside>

  <div class="proscenium-banner" role="banner">
    <span>THE GRAND MONARCH THEATRE</span>
    <span class="banner-sep">&bull;</span>
    <span>PRINCIPAL STAGE</span>
    <span class="banner-sep">&bull;</span>
    <span>SEASON MMXXVI</span>
  </div>

  <div class="drama-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="The Caldera House home">
        <svg viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg" class="logo-masks" aria-hidden="true">
          <!-- Tragedy mask -->
          <path d="M 10 16 Q 10 8 18 8 L 38 8 Q 46 8 46 16 L 46 58 Q 46 78 28 86 Q 10 78 10 58 Z" fill="#b58a2a" stroke="#2a0609" stroke-width="2"/>
          <ellipse cx="20" cy="32" rx="5" ry="3" fill="#2a0609"/>
          <ellipse cx="36" cy="32" rx="5" ry="3" fill="#2a0609"/>
          <path d="M 18 58 Q 28 48 38 58" fill="none" stroke="#2a0609" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Comedy mask behind -->
          <path d="M 34 20 Q 34 12 42 12 L 62 12 Q 70 12 70 20 L 70 62 Q 70 80 54 88 Q 40 82 38 70" fill="#3e0b14" stroke="#b58a2a" stroke-width="2"/>
          <ellipse cx="46" cy="36" rx="4.5" ry="2.5" fill="#b58a2a"/>
          <ellipse cx="60" cy="36" rx="4.5" ry="2.5" fill="#b58a2a"/>
          <path d="M 44 60 Q 54 68 64 60" fill="none" stroke="#b58a2a" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">
          <span class="logo-title">The Caldera House</span>
          <span class="logo-sub">A Tragedy in Three Acts - Principal Stage</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Playbill</a>
        <a href="{{ base_url }}/acts/">The Acts</a>
        <a href="{{ base_url }}/cast/">Cast</a>
        <a href="{{ base_url }}/director/">Director's Note</a>
      </nav>
    </header>
