{% include "header.html" %}
  <main style="max-width: 1100px; margin: 0 auto; padding: 0 2rem; flex: 1; display: flex; flex-direction: column;">

    <!-- Slide container -->
    <div class="slide-frame">
      <div class="slide-meta">
        {% if page.extra.chapter %}<span class="slide-chapter">{{ page.extra.chapter }}</span>{% endif %}
        <span class="slide-number">{{ page.title }}</span>
      </div>

      <div class="slide-content prose">
        {{ content }}
      </div>

      <!-- Slide navigation -->
      <nav class="slide-nav">
        {% if page.lower %}
        <a href="{{ base_url }}{{ page.lower.url }}" class="slide-nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          <span class="slide-nav-label">{{ page.lower.title }}</span>
        </a>
        {% else %}
        <a href="{{ base_url }}/slides/" class="slide-nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span class="slide-nav-label">All Slides</span>
        </a>
        {% endif %}

        {% if page.higher %}
        <a href="{{ base_url }}{{ page.higher.url }}" class="slide-nav-btn slide-nav-next">
          <span class="slide-nav-label">{{ page.higher.title }}</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </a>
        {% else %}
        <a href="{{ base_url }}/slides/" class="slide-nav-btn slide-nav-next">
          <span class="slide-nav-label">End</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </a>
        {% endif %}
      </nav>
    </div>

  </main>

  <!-- Keyboard navigation -->
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        var next = document.querySelector('.slide-nav-next');
        if (next) { e.preventDefault(); next.click(); }
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        var prev = document.querySelector('.slide-nav-btn:not(.slide-nav-next)');
        if (prev) { e.preventDefault(); prev.click(); }
      }
    });
  </script>

  <style>
    .slide-frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 2rem 0;
      overflow: hidden;
    }

    .slide-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .slide-chapter {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: var(--surface-alt);
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .slide-number {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .slide-content {
      flex: 1;
      padding: 3rem 3rem 2rem;
    }

    .slide-content .prose h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
    }

    .slide-content .prose h2 {
      font-size: 2rem;
    }

    .slide-nav {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .slide-nav-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      transition: all 0.2s;
      border: none;
      flex: 1;
    }

    .slide-nav-btn:hover {
      color: var(--white);
      background: var(--surface-alt);
    }

    .slide-nav-next {
      justify-content: flex-end;
      text-align: right;
      border-left: 1px solid var(--border);
    }

    .slide-nav-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 20ch;
    }

    @media (max-width: 640px) {
      .slide-content { padding: 2rem 1.5rem 1.5rem; }
      .slide-content .prose h1 { font-size: 2rem; }
      .slide-content .prose h2 { font-size: 1.5rem; }
      .slide-meta { padding: 0.75rem 1.5rem; }
      .slide-nav-btn { padding: 0.75rem 1rem; }
      .slide-nav-label { max-width: 12ch; }
    }
  </style>
{% include "footer.html" %}
