<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <!-- PSYCHEDELIC FONTS FROM THE VOID -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=Rubik+Glitch&family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
  <style>
    /* Inline micro-styles for critical masthead pop (under 200 total rule respected via main CSS) */
    .logo-glitch { transition: filter 120ms; }
    .logo-glitch:hover { filter: hue-rotate(47deg) saturate(2); }
  </style>
</head>
<body data-section="{{ page.section }}">
