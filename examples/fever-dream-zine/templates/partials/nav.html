<header class="blog-header">
  <div class="blog-header-inner">
    <!-- THE MASTHEAD FROM HELL: 1969 ZINE EXPLOSION -->
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo logo-glitch" aria-label="FEVER DREAM ZINE — Home">FEVER<br>DREAM</a>
    
    <nav aria-label="Zine navigation">
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">TRIPS</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">ARCHIVES</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">THE VOID</a>
    </nav>

    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}

      <!-- DROP ACID MODE — THE MAIN EVENT -->
      <button class="acid-button" id="acidButton" onclick="toggleAcidTrip()" title="CRANK THE FILTERS TO ELEVEN">
        DROP ACID
      </button>

      <button class="search-trigger" onclick="openSearch()" title="Search the zine">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>SEEK</span>
      </button>
    </div>
  </div>
</header>
