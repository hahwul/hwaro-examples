{# Swirling psychedelic mandala shortcode #}
{% set s = size | default(180) %}
<div class="mandala" style="width: {{ s }}px; height: {{ s }}px; border: 7px solid #000; box-shadow: 0 0 0 9px #ff00aa, 0 0 0 16px #ffee00; margin: 1.5rem auto; position: relative;">
  <svg width="{{ s }}" height="{{ s }}" viewBox="0 0 100 100" style="position:absolute; top:0; left:0; animation: mandala-spin 9s linear infinite;">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    <g stroke="#ff00aa" stroke-width="1.2" fill="none">
      {% for i in range(0, 12) %}
      <line x1="50" y1="6" x2="50" y2="22" transform="rotate({{ i * 30 }} 50 50)"/>
      {% endfor %}
    </g>
    <circle cx="50" cy="50" r="13" fill="#7b2cbf"/>
    <circle cx="50" cy="50" r="6" fill="#ffee00"/>
  </svg>
</div>
