{# Pullquote on acid blotter paper #}
{% set c = color | default("magenta") %}
{% set border = "#ff00aa" if c == "magenta" else "#00ffcc" if c == "cyan" else "#ffee00" if c == "yellow" else "#7b2cbf" %}
<div class="blotter" style="border-color: {{ border }}; background: repeating-linear-gradient(38deg, #fff 0px, #fff 3px, {{ border }}11 3px, {{ border }}11 7px);">
  {{ message | default("Everything is a hallucination including this sentence.") }}
</div>
