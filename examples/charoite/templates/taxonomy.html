{% include "header.html" %}
<main id="main">
  <div class="shell band">
    <div class="page-head">
      <h1>{{ page.title | e }}</h1>
      <p class="lede">Every tag used across the specimens and the journal.</p>
    </div>
    {% set tax = get_taxonomy(kind="tags") %}
    <ul class="term-list">
      {% for term in tax.items | sort_by("name") %}
      <li>
        <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">
          {{ term.name }} <span class="term-count">{{ term.pages | length }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</main>
{% include "footer.html" %}
