<!DOCTYPE html>
<html lang="en" data-base-url="{{ base_url }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search the archive" hidden>
    <div class="search-panel">
      <div class="search-field">
        <input type="text" id="search-input" class="search-input" placeholder="Search the archive" autocomplete="off" spellcheck="false" aria-label="Search the archive" aria-controls="search-results" aria-expanded="false" role="combobox" aria-autocomplete="list">
        <kbd class="search-esc">Esc</kbd>
      </div>
      <ul id="search-results" class="search-results" role="listbox"></ul>
      <p class="search-hint" id="search-hint">Type to search specimens and journal entries. Arrow keys move, Enter opens.</p>
      <p class="search-empty" id="search-empty" hidden>No stone in the archive matches that.</p>
    </div>
  </div>

  <header class="site-head">
    <div class="shell">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="8" fill="var(--stone-6)"/>
          <path fill="var(--accent)" d="M0 21c5-7 10 1 16-3s11-7 16-3v17H0Z"/>
          <path fill="var(--stone-2)" d="M0 25c6-5 11 1 17-2s10-4 15-1v10H0Z"/>
          <path fill="var(--stone-1)" d="M0 29c7-4 13 1 19-1s9-2 13 0v4H0Z"/>
        </svg>
        <span>Charoite</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/specimens/"{% if page.section == "specimens" %} aria-current="page"{% endif %}>Specimens</a>
        <a href="{{ base_url }}/journal/"{% if page.section == "journal" %} aria-current="page"{% endif %}>Journal</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <button type="button" id="search-trigger" class="search-trigger" aria-haspopup="dialog" aria-controls="search-overlay">
          <span class="trigger-label">Search</span>
          <kbd>&#8984;K</kbd>
        </button>
      </nav>
    </div>
  </header>
