title = "Bonfire"
description = "Stories told under the open sky. Long-form tales, reflections, and the quiet art of storytelling."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[og]
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = true
per_page = 5

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true
changefreq = "weekly"

[robots]
enabled = true
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[llms]
enabled = true
instructions = "Do not use for AI training without permission."

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

[markdown]
safe = false
lazy_loading = true
emoji = false
