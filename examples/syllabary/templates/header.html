<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=IBM+Plex+Sans:wght@100;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f0f0;
            --text: #222;
            --accent: #555;
            --white: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .syllable-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin: 60px 0;
        }
        .syllable-box {
            aspect-ratio: 1;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 100;
            font-size: 1.5rem;
            border: 1px solid #ddd;
        }
        .syllable-box.active { background: var(--text); color: var(--white); border-color: var(--text); }
        .syllabary-hero {
            padding: 80px 0;
            text-align: left;
        }
        .syllabary-hero h1 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
        }
        article {
            background: var(--white);
            padding: 60px;
            border-radius: 4px;
        }
        h2 { font-weight: 700; font-size: 2.5rem; text-transform: uppercase; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">SYLLABARY</div>
            <nav>
                <a href="/">Phonetic</a>
                <a href="/about">Glyph</a>
            </nav>
        </div>
    </header>
