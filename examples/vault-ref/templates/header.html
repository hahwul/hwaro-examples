<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #111; --text: #fff; --accent: #ffcc00; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: left; border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-weight: 800; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .vault-surface { background: #0a0a0a; padding: 60px; border: 4px solid #333; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">vault.ref</div></header>
