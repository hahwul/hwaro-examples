{% include "header.html" %}
<div class="section-h">// index · {{ taxonomy_name }}</div>
<div class="card-grid">
  {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">
      <div class="id">#{{ term.name }}</div>
      <h3>{{ term.name | lower }}</h3>
      <p>{{ term.pages | length }} pages tagged with #{{ term.name }}</p>
    </a>
  {% endfor %}
</div>
{% include "footer.html" %}
