<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf7; --text: #4a3a2a; --accent: #8b4513; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .gyro-surface { background: #fff; padding: 60px; border: 1px solid #ddd; box-shadow: 10px 10px 30px rgba(0,0,0,0.02); position: relative; }
        .ring { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 1px solid #eee; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">gyroscope.ref</div></header>
