<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #9b51e0;
      --primary-glow: rgba(155, 81, 224, 0.6);
      --secondary: #2d9cdb;
      --secondary-glow: rgba(45, 156, 219, 0.6);
      --text: #e0e6ed;
      --text-muted: #8b9eb5;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.03);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background-color: #050b14;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(45, 156, 219, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(155, 81, 224, 0.15), transparent 25%);
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      background-image: radial-gradient(white 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.03;
      z-index: -1;
      animation: float 60s linear infinite;
    }

    @keyframes float {
      0% { background-position: 0 0; }
      100% { background-position: 500px 500px; }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .site-header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .site-logo {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
      text-shadow: 0 0 10px var(--primary-glow);
      transition: text-shadow 0.3s ease;
    }

    .site-logo:hover {
      text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--secondary-glow);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
      position: relative;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      width: 0;
      height: 1px;
      background: var(--secondary);
      transition: all 0.3s ease;
      transform: translateX(-50%);
      box-shadow: 0 0 8px var(--secondary-glow);
    }

    .site-header nav a:hover {
      color: #fff;
    }

    .site-header nav a:hover::after {
      width: 100%;
    }

    .site-main {
      min-height: calc(100vh - 250px);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .site-main::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, var(--glass-highlight) 0%, transparent 100%);
      border-radius: 20px;
      pointer-events: none;
    }

    .site-footer {
      margin: 3rem 0 2rem;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      position: relative;
    }

    .site-footer::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Cinzel', serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.8em;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255,255,255,0.1);
    }

    h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h3 { font-size: 1.4rem; color: var(--secondary); }

    p { margin: 1.2em 0; }

    a {
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    a:hover {
      color: #fff;
      text-shadow: 0 0 8px var(--secondary-glow);
    }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: 'SFMono-Regular', Consolas, monospace;
      border: 1px solid var(--border);
      color: #a7b6c2;
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-left: 3px solid var(--primary);
      background: linear-gradient(90deg, rgba(155, 81, 224, 0.1), transparent);
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: #fff;
    }

    /* Components */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1.5rem;
    }

    ul.section-list li {
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), 0 0 12px rgba(155, 81, 224, 0.2);
      border-color: rgba(155, 81, 224, 0.3);
    }

    ul.section-list li a {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #fff;
      display: block;
      margin-bottom: 0.5rem;
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    nav.pagination {
      margin: 3rem 0 1rem;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 0.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    nav.pagination a {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: var(--text);
    }

    nav.pagination a:hover {
      background: rgba(155, 81, 224, 0.1);
      border-color: rgba(155, 81, 224, 0.5);
      color: #fff;
      text-shadow: 0 0 8px var(--primary-glow);
    }

    .pagination-current span {
      background: linear-gradient(135deg, rgba(155, 81, 224, 0.2), rgba(45, 156, 219, 0.2));
      border: 1px solid rgba(155, 81, 224, 0.5);
      color: #fff;
      box-shadow: 0 0 12px rgba(155, 81, 224, 0.3);
    }

    .pagination-disabled span {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-main { padding: 2rem 1.5rem; }
      h1 { font-size: 2rem; }
      .site-header { flex-direction: column; gap: 1rem; padding: 1.25rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
