<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #fff; --accent: #ffcc00; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 1px solid var(--accent); padding-bottom: 20px; margin-bottom: 60px; text-align: center; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 10px; }
        .telegraph-surface { border: 2px solid #333; padding: 60px; background: #0c0c0c; position: relative; }
        .signal { display: inline-block; width: 20px; height: 4px; background: var(--accent); margin-right: 5px; }
        .long { width: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">telegraph</div></header>
