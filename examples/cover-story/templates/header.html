<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #555;
            --cover: #f0f0f0;
            --shadow: rgba(0,0,0,0.2);
        }
        body {
            background-color: var(--cover);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.2;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 100px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 6rem;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.8;
        }
        nav { margin-top: 40px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .cover-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 20px 20px 0 #000;
            margin-bottom: 100px;
            border: 4px solid #000;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 4rem; color: #000; margin-top: 0; line-height: 0.9; font-weight: 900; }
        article { font-size: 1.5rem; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cover.story</div>
            <nav>
                <a href="/">Headline</a>
                <a href="/about">Lead</a>
            </nav>
        </div>
    </header>
