<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | e }} &mdash; Episodes" href="{{ base_url }}/episodes/rss.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,500&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Timbre &mdash; home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24" focusable="false">
            <rect x="1" y="1" width="22" height="22" rx="4" fill="var(--fg)"/>
            <rect x="4.5" y="4" width="15" height="10.5" rx="1" fill="var(--bg)"/>
            <rect x="6.5" y="6" width="11" height="6.5" fill="var(--accent)"/>
            <rect x="6.5" y="16.5" width="11" height="1.2" fill="var(--fg)" opacity="0.4"/>
            <rect x="6.5" y="19" width="7" height="1" fill="var(--fg)" opacity="0.25"/>
          </svg>
        </span>
        <span class="brand-word">Timbre</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/episodes/"{% if page.section == "episodes" %} aria-current="page"{% endif %}>Episodes</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/search/"{% if page.url == "/search/" %} aria-current="page"{% endif %}>Search</a>
      </nav>
    </div>
  </header>
