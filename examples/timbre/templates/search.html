{% include "header.html" %}
<main id="main" class="site-main">
  <header class="wrap page-head">
    <p class="page-kicker">Find an artifact</p>
    <h1 class="page-title">{{ page.title | e }}</h1>
    <p class="page-intro">Search episode titles, artifacts, and show-note text across the full catalog.</p>
  </header>

  <div class="wrap section-list">
    <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="search-label" for="search-input">Search episodes</label>
      <input class="search-input" id="search-input" type="search" name="q" placeholder="Bauhaus, Vignelli, silkscreen&hellip;" autocomplete="off" autofocus>
    </form>
    <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
    <ul class="search-results" id="search-results"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
