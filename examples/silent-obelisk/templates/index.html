{% extends "base.html" %}

{% block content %}
<div class="home-hero">
    <h1>{{ page.title | default(site.title) }}</h1>
    {% if page.description %}
    <p class="hero-description">{{ page.description }}</p>
    {% endif %}
</div>

<div class="home-content content-body">
    {{ content | safe }}
</div>
{% endblock %}
