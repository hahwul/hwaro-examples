{% extends "base.html" %}

{% block content %}
<article class="page-content">
    {% if page.title %}
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        </div>
        {% endif %}
    </header>
    {% endif %}

    <div class="content-body">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
