{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <h1>{{ taxonomy_name | default("Taxonomy") | upper }}</h1>
</header>

<div class="taxonomy-list">
    <ul style="list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 1rem;">
        {% for term in taxonomy_terms %}
        <li>
            <a href="{{ term.url }}" style="display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--color-border); color: var(--color-fg); text-decoration: none; font-family: var(--font-mono); text-transform: uppercase;">
                {{ term.name }} <span style="color: var(--color-dim); margin-left: 0.5rem;">[{{ term.pages | length }}]</span>
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
