{% include "header.html" %}
<header class="quantum-header">
  <a href="{{ base_url }}/" class="quantum-logo">{{ site.title }}</a>
  <nav class="quantum-nav">
    <a href="{{ base_url }}/posts/">Posts</a>
  </nav>
</header>
<div class="quantum-container">
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    <p>Posts tagged with this term:</p>
    <ul class="post-list">
      {% for p in pages %}
        <li><a href="{{ p.url }}">{{ p.title | e }}</a></li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
