{% include "header.html" %}
<header class="quantum-header">
  <a href="{{ base_url }}/" class="quantum-logo">{{ site.title }}</a>
  <nav class="quantum-nav">
    <a href="{{ base_url }}/posts/">Posts</a>
    <a href="{{ base_url }}/archives/">Archives</a>
    <a href="{{ base_url }}/about/">About</a>
  </nav>
</header>
<div class="quantum-container">
  <article class="post">
    <header class="post-header">
      <h1>{{ page.title | e }}</h1>
      <time>{{ page.date }}</time>
    </header>
    <div class="post-content">{{ content | safe }}</div>
  </article>
{% include "footer.html" %}
