{% include "header.html" %}
<div class="glass-card">
    <h1 class="hero-title">{{ section.title }}</h1>
    {% if content %}
    <div class="section-content">
        {{ content | safe }}
    </div>
    {% endif %}
</div>

<div class="post-list">
    {% for page in section.pages %}
    <article class="glass-card">
        <h2><a href="{{ page.permalink }}" style="color: var(--text-primary); text-decoration: none;">{{ page.title }}</a></h2>
        {% if page.description is defined %}
        <p>{{ page.description }}</p>
        {% endif %}
        <a href="{{ page.permalink }}" style="color: var(--primary-color);">Read more &rarr;</a>
    </article>
    {% endfor %}
</div>
{% include "footer.html" %}
