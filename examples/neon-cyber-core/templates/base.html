<!DOCTYPE html>
<html lang="{{ site.language | default("en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cyber Core Color Palette */
            --bg-color: #050508;
            --surface-color: rgba(15, 20, 30, 0.4);
            --border-color: rgba(0, 240, 255, 0.2);
            --text-primary: #e0f2fe;
            --text-secondary: #94a3b8;

            /* Neon Accents */
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --neon-purple: #8a2be2;

            /* Typography */
            --font-main: 'Outfit', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Mesh Gradient */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
            animation: pulse-bg 15s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Glassmorphism Elements */
        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 2rem;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        main {
            min-height: calc(100vh - 200px);
            padding: 4rem 0;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--neon-magenta);
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        footer {
            padding: 3rem 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Generic content styling */
        .content-area {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .content-area p {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>

    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="logo">Neon Core</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
