<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #4facfe;
            --glass: rgba(255, 255, 255, 0.4);
        }
        body {
            background-color: #f0f0f0;
            background-image: 
                linear-gradient(45deg, rgba(79, 172, 254, 0.05) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(79, 172, 254, 0.05) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(79, 172, 254, 0.05) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(79, 172, 254, 0.05) 75%);
            background-size: 40px 40px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .prism-hero {
            padding: 100px 0;
            text-align: center;
        }
        .prism-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            margin: 0;
            letter-spacing: -4px;
            color: #000;
            text-shadow: 5px 5px 0 var(--accent);
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 20px 20px 0 rgba(79, 172, 254, 0.1);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: #000; border-bottom: 5px solid var(--accent); display: inline-block; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">prism.glass</div>
        <nav>
            <a href="/">Angle</a>
            <a href="/about">Light</a>
        </nav>
    </header>
