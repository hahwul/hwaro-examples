<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} // {% endif %}{{ site.title | e }}</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">

    </div>

  <header class="site-header">

      <div class="logo-area">
        <a href="{{ base_url }}/" class="site-logo">STREETWEAR_DROP</a>
      </div>
      <nav class="site-nav">
        <ul>
          <li><a href="{{ base_url }}/" class="nav-link">Active Drops</a></li>
          <li><a href="{{ base_url }}/about/" class="nav-link">Info</a></li>
        </ul>
      </nav>
