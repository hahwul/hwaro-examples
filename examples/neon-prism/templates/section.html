{% extends "base.html" %}

{% block content %}
  <div class="section-content">
    <header class="section-header">
      <h1 class="neon-title">{{ page.title | e }}</h1>
    </header>
    <div class="content-body">
      {{ content | safe }}
    </div>

    <div class="item-list">
      <ul class="neon-list">
        {{ section.list | safe }}
      </ul>
    </div>

    <div class="pagination-container">
      {{ pagination | safe }}
    </div>
  </div>
{% endblock %}
