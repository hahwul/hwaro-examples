{% include "header.html" %}

<article class="content-area">
    <header>
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            LOG DATE: <span class="timestamp">{{ page.date | date("%Y-%m-%d %H:%M:%S") }}</span>
        </div>
        {% endif %}
        {% if page.tags %}
        <div class="page-meta">
            TAGS:
            {% for tag in page.tags %}
            <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag-pill">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
