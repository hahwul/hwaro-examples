  <script>
    function initStygian() {
      // Counter animations
      document.querySelectorAll('[data-count]').forEach(el => {
        const t = parseFloat(el.dataset.count), isP = el.dataset.count.includes('%');
        let c = t * .2; const dur = 1100, s = Date.now();
        const i = setInterval(() => {
          const p = Math.min((Date.now()-s)/dur,1), e = 1-Math.pow(1-p,3);
          el.textContent = (t*e).toFixed(isP?1:0) + (isP?'%':'');
          if (p>0.99) { clearInterval(i); el.textContent = t + (isP?'%':''); }
        }, 18);
      });
      // Fake live temp
      setInterval(() => {
        const t = document.getElementById('core-temp');
        if (t) { const v = (parseFloat(t.textContent) + (Math.random()-0.5)*0.8).toFixed(1); t.textContent = v; }
      }, 2400);
      console.log('%c[STYGIAN] Core online. Heat levels critical but stable.', 'color:#ff4d00');
    }
    window.addEventListener('load', initStygian);
  </script>
</body>
</html>
