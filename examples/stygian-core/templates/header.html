<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600&amp;display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -.025em; }
    .stygian-bg { background: #0c0302; background-image: radial-gradient(circle at 30% 20%, #3a1208 0%, transparent 55%), radial-gradient(circle at 80% 85%, #2a0a05 0%, transparent 50%); }
    .lava { background: linear-gradient(180deg, #ff6a00, #ff2d00 60%, #9f1f00); }
    .ember-glow { box-shadow: 0 0 18px -2px #ff4d00, inset 0 0 18px -6px #fff3; }
    .molten-panel { background: #120805; border: 1px solid #33170f; }
    .section-label { font-size: 10px; letter-spacing: 3.5px; color: #ff6a00; font-weight: 700; }
    .metric-num { font-size: 42px; line-height: .9; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .heat-bar { background: #1f0a05; position: relative; overflow: hidden; }
    .heat-bar > div { background: linear-gradient(90deg, #ff4d00, #ff9500, #ff4d00); background-size: 200% 100%; animation: heatflow 1.6s linear infinite; }
    @keyframes heatflow { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
    .live { animation: livepulse 2s ease-in-out infinite; }
    .crack { position: relative; }
    .crack::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(120deg, transparent, transparent 3px, rgba(255,60,0,.15) 3px, rgba(255,60,0,.15) 4px); pointer-events: none; }
    table.lava-table th { background:#1a0c07; color:#ff6a00; font-size:10px; letter-spacing:1.5px; }
    .warning-glow { animation: warn 1.5s ease-in-out infinite alternate; }
  </style>
</head>
<body class="bg-[#0c0302] text-[#f8f1e9] stygian-bg">
