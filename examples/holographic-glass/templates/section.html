{% include "header.html" %}
  <main class="site-main">
    <article class="glass-panel content-panel">
      {% if page.title is present %}
        <header class="page-header">
          <h1 class="page-title">{{ page.title | e }}</h1>
        </header>
      {% endif %}
      <div class="prose">
        {{ content | safe }}
      </div>

      <div class="section-grid">
        {{ section.list }}
      </div>

      <div class="pagination-container">
        {{ pagination }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
