{% include "header.html" %}

<article class="anaglyph-box">
    <h2 class="anaglyph-text">{{ page.title }}</h2>
    <span class="post-meta">{{ page.date | date("%B %d, %Y") }} | Reading time: {{ page.reading_time }} min</span>

    <div class="content">
        {{ content | safe }}
    </div>

    {% if page.tags %}
    <div class="post-tags" style="margin-top: 3rem; font-family: var(--font-header); font-size: 0.8rem;">
        {% for tag in page.tags %}
        <a href="{{ base_url }}/tags/{{ tag | slugify }}" class="anaglyph-text-sub" style="margin-right: 1rem;">#{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</article>

{% include "footer.html" %}
