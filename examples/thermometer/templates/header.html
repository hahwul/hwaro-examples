<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #111;
            --accent: #ff4d00;
            --line: #eee;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 40px;
            border-left: 2px solid var(--line);
            border-right: 2px solid var(--line);
            min-height: 100vh;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 2px solid var(--line);
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .thermo-hero {
            padding: 100px 0;
            text-align: center;
        }
        .scale-mark {
            height: 10px;
            width: 100%;
            border-bottom: 1px solid var(--line);
            margin-bottom: 10px;
            position: relative;
        }
        .scale-mark::after {
            content: attr(data-val);
            position: absolute;
            right: -30px;
            top: 0;
            font-size: 0.6rem;
            color: #ccc;
        }
        .thermo-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            margin: 0;
            line-height: 1;
        }
        article { padding: 60px 0; }
        h2 { font-family: 'Outfit', sans-serif; font-size: 2rem; color: var(--accent); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">THERMO//METER</div>
        <nav>
            <a href="/">Scale</a>
            <a href="/about">Level</a>
        </nav>
    </header>
