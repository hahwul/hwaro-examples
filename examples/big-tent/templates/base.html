<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;900&family=DM+Mono&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #FF4500;
      --secondary: #FFD700;
      --accent: #1E90FF;
      --white: #FFFFFF;
      --black: #222222;
      --bg: #FFF8F0;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--black);
      font-family: 'Nunito', sans-serif;
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .tent-top {
      background-color: var(--primary);
      color: var(--white);
      padding: 6rem 0 4rem;
      text-align: center;
      position: relative;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
      margin-bottom: 4rem;
    }

    .site-title {
      font-family: 'Lilita One', cursive;
      font-size: 150px;
      line-height: 1.0;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .bunting {
      display: flex;
      justify-content: center;
      gap: 0;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    .nav-links {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 18px;
      border-bottom: 3px solid transparent;
    }

    .nav-links a:hover {
      border-bottom-color: var(--secondary);
    }

    .ticket-stub {
      background-color: var(--white);
      border: 4px solid var(--primary);
      padding: 2rem;
      position: relative;
      margin-bottom: 2rem;
    }

    .ticket-stub::before, .ticket-stub::after {
      content: "";
      position: absolute;
      width: 40px;
      height: 40px;
      background-color: var(--bg);
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }

    .ticket-stub::before { left: -24px; border-right: 4px solid var(--primary); }
    .ticket-stub::after { right: -24px; border-left: 4px solid var(--primary); }

    .event-card {
      background-color: var(--secondary);
      padding: 2rem;
      border: 4px solid var(--black);
      box-shadow: 10px 10px 0 var(--black);
      margin-bottom: 3rem;
    }

    .event-title {
      font-family: 'Lilita One', cursive;
      font-size: 48px;
      margin: 0 0 1rem;
      text-transform: uppercase;
    }

    .booth-number {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      background-color: var(--black);
      color: var(--white);
      padding: 0.2rem 0.5rem;
      display: inline-block;
    }

    footer {
      text-align: center;
      padding: 6rem 0 4rem;
      background-color: var(--black);
      color: var(--white);
      margin-top: 4rem;
    }

    @media (max-width: 768px) {
      .site-title { font-size: 60px; }
      .nav-links { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="tent-top">
    <div class="bunting">
      {% for i in range(10) %}
      <svg width="100" height="40" viewBox="0 0 100 40">
        <polygon points="0,0 100,0 50,40" fill="{% if loop.index % 2 == 0 %}var(--secondary){% else %}var(--white){% endif %}" />
      </svg>
      {% endfor %}
    </div>
    <div class="container">
      <h1 class="site-title">{{ site.title }}</h1>
      <nav class="nav-links">
        <a href="{{ base_url }}/">Main Tent</a>
        <a href="{{ base_url }}/about/">Event Map</a>
      </nav>
    </div>
  </div>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <div class="container">
      <div style="font-family: 'Lilita One'; font-size: 32px; margin-bottom: 1rem;">THE BIG TENT</div>
      <p style="font-family: 'DM Mono'; font-size: 13px;">NO EMOJIS. NO GRADIENTS. ALL COMMUNITY.</p>
    </div>
  </footer>
</body>
</html>
