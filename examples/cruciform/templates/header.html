<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="grid-overlay" aria-hidden="true">
    <div class="grid-line grid-line--v1"></div>
    <div class="grid-line grid-line--v2"></div>
    <div class="grid-line grid-line--v3"></div>
    <div class="grid-line grid-line--v4"></div>
    <div class="grid-line grid-line--h1"></div>
    <div class="grid-line grid-line--h2"></div>
  </div>

  <header class="site-header">
    <div class="wrapper">

        <span class="site-title__cross">+</span>
        <span class="site-title__text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/" class="site-nav__link">Home</a>
        <a href="{{ base_url }}/posts/" class="site-nav__link">Posts</a>
        <a href="{{ base_url }}/about/" class="site-nav__link">About</a>
        <a href="{{ base_url }}/tags/" class="site-nav__link">Tags</a>
      </nav>

  <main class="site-main">
