<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% raw %}<script>(function(){try{var t=localStorage.getItem("theme");if(t==="dark"||t==="light"){document.documentElement.setAttribute("data-theme",t);}}catch(e){}})();</script>{% endraw %}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="shell header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Kelvin, home">
        <svg class="wordmark-mark" viewBox="0 0 32 26" width="26" height="21" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
            <path d="M4 12 16 3l12 9"/>
            <rect x="6" y="12" width="20" height="11"/>
            <line x1="16" y1="12" x2="16" y2="23"/>
          </g>
        </svg>
        <span>Kelvin</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/models/">Models</a>
        <a href="{{ base_url }}/process/">Process</a>
        <a href="{{ base_url }}/pricing/">Pricing</a>
        <a href="{{ base_url }}/faq/">FAQ</a>
        <a href="{{ base_url }}/about/">About</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color scheme" title="Toggle color scheme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/><line x1="18.8" y1="5.2" x2="17" y2="7"/><line x1="7" y1="17" x2="5.2" y2="18.8"/></g></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
      </nav>
    </div>
  </header>
