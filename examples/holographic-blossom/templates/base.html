<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is present %}{{ page.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a040b;
      --text-main: #f0e6f5;
      --text-muted: #b0a3b5;
      --primary-cyan: #00f2fe;
      --primary-pink: #ff0844;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Holographic background elements */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
      animation: float 20s infinite ease-in-out alternate;
    }

    body::before {
      top: -20%;
      left: -10%;
      background: radial-gradient(circle, var(--primary-pink) 0%, transparent 70%);
    }

    body::after {
      bottom: -20%;
      right: -10%;
      background: radial-gradient(circle, var(--primary-cyan) 0%, transparent 70%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 10%) scale(1.1); }
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--primary-pink), var(--primary-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    a {
      color: var(--primary-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--primary-pink);
      text-shadow: 0 0 8px rgba(255, 8, 68, 0.5);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Glassmorphism */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      background: linear-gradient(to right, #fff, var(--text-main));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    nav a:hover {
      color: var(--primary-cyan);
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      margin-top: 4rem;
      border-top: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    code {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
      color: var(--primary-cyan);
    }

    pre {
      background: rgba(0, 0, 0, 0.3) !important;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    ul.section-list li {
      margin-bottom: 1rem;
    }

    ul.section-list li a {
      display: block;
      padding: 1rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.3s ease;
    }

    ul.section-list li a:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary-cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 242, 254, 0.2);
    }

    .content-body p {
        margin-bottom: 1rem;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header class="glass-panel" style="margin-bottom: 3rem; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: none;">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; {{ site.title }}. Powered by Hwaro.</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
