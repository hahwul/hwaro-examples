{% include "header.html" %}

<article class="glass-panel content">
  <header style="margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    {% if page.date is defined and page.date %}
      <span class="post-date">{{ page.date | date(format="%B %d, %Y") }}</span>
    {% endif %}
  </header>

  {{ content | safe }}
</article>
