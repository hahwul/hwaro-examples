{% include "header.html" %}

<h2>Tagged: {{ taxonomy_term }}</h2>

<ul class="post-list">
  {% for post in taxonomy_pages %}
  <li class="post-item">
    <div class="post-title">
      <a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a>
    </div>
    <div class="post-meta">
      {% if post.date %}{{ post.date | date("%Y.%m.%d") }}{% endif %}
    </div>
  </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
