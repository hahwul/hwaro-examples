<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;1,200&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #333;
            --accent: #000;
            --line: #eee;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 200;
            font-size: 2rem;
            text-transform: lowercase;
            letter-spacing: 10px;
            font-style: italic;
        }
        nav { margin-top: 40px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.4;
        }
        .essence-hero {
            padding: 100px 0;
            text-align: center;
        }
        .essence-hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 5rem;
            font-weight: 200;
            margin: 0;
            color: var(--accent);
            line-height: 1;
            font-style: italic;
        }
        .essence-line {
            width: 1px;
            height: 100px;
            background: var(--line);
            margin: 40px auto;
        }
        article { padding-bottom: 100px; }
        h2 { font-family: 'Crimson Pro', serif; font-size: 2.5rem; font-weight: 200; color: var(--accent); font-style: italic; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">essence.</div>
            <nav>
                <a href="/">Core</a>
                <a href="/about">Pure</a>
            </nav>
        </div>
    </header>
