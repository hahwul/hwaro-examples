{% include "header.html" %}
<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Logs</a>
      <a href="{{ base_url }}/archives/">Archives</a>
      <a href="{{ base_url }}/about/">System</a>
    </nav>
    <div class="header-right">
      <button class="search-trigger" onclick="openSearch()" title="Search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        SCAN
      </button>
    </div>
  </div>
</header>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Initialize scan query..." autocomplete="off">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
<div class="blog-container">
  <main class="blog-main">
    <h1>{{ page.title | e }}</h1>
    <div class="post-content">
      {{ content | safe }}
    </div>
    <ul class="post-list">
      {% for p in section.pages %}
        <li class="post-item">
          <h2 class="post-title"><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
          <div class="post-meta">{{ p.date }}</div>
        </li>
      {% endfor %}
    </ul>
{% include "footer.html" %}
