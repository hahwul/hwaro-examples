{% include "header.html" %}
<main>
  <div class="section-header">
    <div class="clinical-label">CLASSIFIED BY MATERIAL</div>
    <h1>{{ taxonomy_name | upper }}</h1>
    <p class="lead">Browse the archive by the threads that bind our most exclusive procedures.</p>
  </div>

  <div class="taxonomy-list">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.slug }}/">{{ term.name }} <span style="opacity:0.4;">({{ term.count }})</span></a>
    {% endfor %}
  </div>
</main>
{% include "footer.html" %}
