<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <!-- Luxe Editorial Typography: Cinzel + Playfair Display + Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default('home') }}">
  <!-- Fixed Scrub Header: Private Underground Fashion Clinic -->
  <header class="scrub-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="logo" aria-label="Suture Couture Home">
        <svg class="logo-svg" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Crossed scalpels -->
          <line x1="6.5" y1="6.2" x2="21.5" y2="21.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="21.5" y1="6.2" x2="6.5" y2="21.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <!-- Needle eye + thread accent -->
          <circle cx="14" cy="14" r="3.6" stroke="#D4AF37" stroke-width="1.1"/>
          <path d="M11.8 14.6 Q14 12.9 16.2 14.6" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-linecap="round"/>
        </svg>
        <span>SUTURE COUTURE</span>
        <span class="season-badge">SEASON 13 — BLOOD TYPE A/W</span>
      </a>
      <nav class="nav-scrub" aria-label="Primary navigation">
        <a href="{{ base_url }}/">THE RUNWAY</a>
        <a href="{{ base_url }}/posts/">THE COLLECTION</a>
        <a href="{{ base_url }}/tags/">SUTURES</a>
        <a href="{{ base_url }}/about/">THE CLINIC</a>
      </nav>
    </div>
  </header>
