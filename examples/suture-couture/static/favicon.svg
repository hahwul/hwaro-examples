<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A26F"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Clinical bone circle -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#F5F2EB" stroke-width="0.75" opacity="0.9"/>
  <!-- Crossed scalpels: elegant surgical blades -->
  <!-- Left scalpel (blade down right) -->
  <g>
    <line x1="9" y1="8.5" x2="22" y2="23.5" stroke="#C5A26F" stroke-width="1.6" stroke-linecap="round"/>
    <!-- handle detail -->
    <line x1="8" y1="7.8" x2="10.2" y2="10" stroke="#8A8A8A" stroke-width="2.2" stroke-linecap="round"/>
    <!-- blade tip highlight -->
    <line x1="21.3" y1="22.8" x2="22.8" y2="24.2" stroke="#F5F2EB" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Right scalpel (blade down left) crossed -->
  <g>
    <line x1="23" y1="8.5" x2="10" y2="23.5" stroke="#C5A26F" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="24" y1="7.8" x2="21.8" y2="10" stroke="#8A8A8A" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="10.7" y1="22.8" x2="9.2" y2="24.2" stroke="#F5F2EB" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Needle + gold surgical thread accent -->
  <circle cx="16" cy="16" r="2.8" fill="none" stroke="url(#goldGrad)" stroke-width="1.25"/>
  <path d="M14.5 16.5 Q16 14.8 17.5 16.5" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Tiny thread dash -->
  <line x1="15.2" y1="15.3" x2="15.9" y2="14.7" stroke="#C5A26F" stroke-width="0.6"/>
</svg>
