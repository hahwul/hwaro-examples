<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site-shell">
    <header class="site-header">
      <div class="wrap header-row">
        <a class="brand" href="{{ base_url }}/">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 28 28" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="26" height="26" rx="3" stroke="currentColor" stroke-width="1.4"/>
              <path d="M9 8v12M9 14h9M18 8v12" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/>
            </svg>
          </span>
          <span class="brand-name">Carmine Press</span>
        </a>
        <nav aria-label="Primary">
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/broadsides/">Broadsides</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </header>
    <main id="main" class="site-main">
