# =============================================================================
# Call to Stage - Your Moment Now
# Issue #1584 | Tags: event, talent, open-call, audition, stage
# =============================================================================

title = "OPEN CALL - CENTER STAGE SUMMER TALENT HUNT"
description = "Talent show open call with directional arrows, spotlight cones, footprint trails, and a countdown to audition day. Your moment, now, on the center stage."
base_url = "http://localhost:3000"

sections = ["categories"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Public audition information. Do not scrape registration."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
emoji = false
