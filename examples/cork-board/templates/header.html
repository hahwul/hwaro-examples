<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #d7b491;
            --text: #4a3a2a;
            --accent: #8b4513;
            --cork: #c29b7a;
            --shadow: rgba(0,0,0,0.2);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
            background-image: 
                radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .cork-surface {
            background: var(--cork);
            border-radius: 4px;
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow), inset 2px 2px 5px rgba(255,255,255,0.1);
            margin-bottom: 80px;
            border: 8px solid #5a4b41;
        }
        .pin-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .note {
            background: #fff9c4;
            padding: 20px;
            box-shadow: 2px 2px 5px var(--shadow);
            transform: rotate(-1deg);
            color: #333;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
        }
        .note:nth-child(even) { transform: rotate(1.5deg); background: #e1f5fe; }
        article {
            background: #fff;
            padding: 60px;
            box-shadow: 5px 5px 15px var(--shadow);
            margin-top: 40px;
        }
        h2 { font-weight: 700; font-size: 2rem; color: #5a4b41; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cork.board</div>
            <nav>
                <a href="/">Pins</a>
                <a href="/about">Notes</a>
            </nav>
        </div>
    </header>
