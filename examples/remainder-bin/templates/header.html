<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Special+Elite&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="bin">
    <div class="marquee" role="banner">
      <div class="marquee-reel">
        <span class="marquee-item">EVERYTHING MUST MOVE</span>
        <span class="marquee-sep">-</span>
        <span class="marquee-item">NO HOLDS</span>
        <span class="marquee-sep">-</span>
        <span class="marquee-item">CASH OR CARD</span>
        <span class="marquee-sep">-</span>
        <span class="marquee-item">STICKER IS THE PRICE</span>
        <span class="marquee-sep">-</span>
        <span class="marquee-item">STOCK TURNS WEEKLY</span>
        <span class="marquee-sep">-</span>
        <span class="marquee-item">NO TRADE-INS ON REMAINDERS</span>
      </div>
    </div>
    <header class="shop-header" role="banner">
      <a href="{{ base_url }}/" class="shop-brand" aria-label="The Remainder Bin home">
        <svg viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg" class="shop-mark" aria-hidden="true">
          <!-- Crate / bin silhouette -->
          <rect x="16" y="24" width="328" height="72" fill="#efe7d6" stroke="#222" stroke-width="2"/>
          <rect x="16" y="24" width="328" height="10" fill="#c95c3b"/>
          <line x1="48" y1="24" x2="48" y2="96" stroke="#222" stroke-width="0.8"/>
          <line x1="312" y1="24" x2="312" y2="96" stroke="#222" stroke-width="0.8"/>
          <!-- Title lettering -->
          <text x="180" y="68" text-anchor="middle" font-family="Bebas Neue, Oswald, sans-serif" font-size="34" fill="#222" letter-spacing="4">THE REMAINDER BIN</text>
          <text x="180" y="88" text-anchor="middle" font-family="Special Elite, monospace" font-size="11" fill="#666" letter-spacing="4">BOOKS - REDUCED - UNFUSSED</text>
          <!-- A stuck-on SALE sticker -->
          <g transform="translate(320,44) rotate(-8)">
            <circle r="18" fill="#e0b030" stroke="#222" stroke-width="1.2"/>
            <text y="4" text-anchor="middle" font-family="Bebas Neue, sans-serif" font-size="11" fill="#222" letter-spacing="1">SALE</text>
          </g>
        </svg>
      </a>
      <nav class="shop-nav" aria-label="Primary">
        <a href="{{ base_url }}/">THE BIN</a>
        <a href="{{ base_url }}/stock/">THE STOCK</a>
        <a href="{{ base_url }}/policy/">POLICY</a>
        <a href="{{ base_url }}/about/">THE SHOP</a>
      </nav>
    </header>
