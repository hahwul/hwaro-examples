# =============================================================================
# Remainder Bin - A Catalogue of Well-Read Books
# Issue #1562 | Tags: book, light, secondhand, discount, worn
# =============================================================================

title = "THE REMAINDER BIN - Well-Read Books at Reduced Prices"
description = "A working catalogue of remaindered, secondhand, and lightly worn books at marked-down prices. Prices stickered once, peeled, and reduced again. All stock marked for the bin."
base_url = "http://localhost:3000"

sections = ["stock"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "condition"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Catalogue of remaindered books. Stock changes weekly; prices are live and binding only in store."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 20
sections = ["stock"]

[markdown]
safe = false
lazy_loading = false
emoji = false
