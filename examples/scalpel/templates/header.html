<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9fb;
            --text: #1a1c1e;
            --accent: #2e5bff;
            --line: #e1e4e8;
            --clinical-white: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 20px 0;
            background: var(--clinical-white);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-family: 'IBM+Plex+Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .scalpel-hero {
            padding: 120px 0 80px;
            text-align: left;
        }
        .scalpel-hero h1 {
            font-size: 6rem;
            font-weight: 300;
            margin: 0;
            line-height: 1;
            letter-spacing: -3px;
        }
        .precision-mark {
            width: 100%;
            height: 1px;
            background: var(--line);
            margin: 40px 0;
            position: relative;
        }
        .precision-mark::after {
            content: 'INCISION_POINT';
            position: absolute;
            right: 0;
            top: -20px;
            font-family: 'IBM+Plex+Mono', monospace;
            font-size: 0.6rem;
            color: var(--accent);
        }
        article {
            background: var(--clinical-white);
            padding: 60px;
            border: 1px solid var(--line);
            border-radius: 4px;
        }
        h2 { font-weight: 700; font-size: 2rem; border-left: 3px solid var(--accent); padding-left: 20px; margin-top: 0; }
        .spec-label { font-family: 'IBM+Plex+Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav-inner">
                <div class="logo">SCALPEL//v2.0</div>
                <nav>
                    <a href="/">Anatomy</a>
                    <a href="/about">Protocol</a>
                </nav>
            </div>
        </div>
    </header>
