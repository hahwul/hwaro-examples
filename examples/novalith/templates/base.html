<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap');

    :root {
      --bg-color: #050a15;
      --text-main: #e0e6ed;
      --text-muted: #8a9bb3;
      --accent: #00d2ff;
      --accent-glow: rgba(0, 210, 255, 0.4);
      --glass-bg: rgba(15, 25, 45, 0.5);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      font-family: 'Rajdhani', sans-serif;
      background: radial-gradient(circle at top left, #0f192d 0%, #050a15 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      text-shadow: 0 0 8px var(--accent-glow);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      color: #fff;
    }

    .site-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      font-size: 1.1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .site-nav a:hover {
      color: var(--accent);
    }

    /* Main Content */
    .site-main {
      flex: 1;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* Code blocks */
    pre.hljs, pre {
      background: rgba(0, 0, 0, 0.4) !important;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
    }

    code {
      font-family: 'Courier New', Courier, monospace;
      color: #a0c0e0;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }

    /* Lists */
    ul.section-list {
      list-style: none;
      padding: 0;
    }

    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-2px);
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding-top: 2rem;
      margin-top: auto;
      color: var(--text-muted);
      border-top: 1px solid var(--glass-border);
      font-size: 0.9rem;
    }

    .neon-line {
      height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-bottom: 1rem;
      box-shadow: 0 0 10px var(--accent-glow);
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-container">
    {% include "header.html" %}

    <div class="glass-panel">
      {% block content %}{% endblock %}
    </div>

    {% include "footer.html" %}
  </div>

  {{ highlight_js | safe }}
  {{ auto_includes_js | safe }}
</body>
</html>
