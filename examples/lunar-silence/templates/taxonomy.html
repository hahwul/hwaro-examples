{% extends "base.html" %}

{% block content %}
<header class="section-header">
    <h1>{{ taxonomy_name | capitalize }}</h1>
</header>

<div class="tags">
    {% for term in taxonomy_terms %}
        <a href="/{{ taxonomy_name }}/{{ term | slugify }}/" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem;">{{ term }}</a>
    {% endfor %}
</div>
{% endblock %}
