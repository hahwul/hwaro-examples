{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <h1>{% if taxonomy is defined %}{{ taxonomy.name | capitalize }}{% else %}Tags{% endif %}</h1>

    <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
        {% if terms is defined %}
            {% for term in terms %}
            <a href="{{ term.url }}" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem;">
                {{ term.name }} <span style="opacity: 0.6; font-size: 0.8rem; margin-left: 0.25rem;">({{ term.pages | length }})</span>
            </a>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
