<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">

    {% if site.plugins is defined and site.plugins.highlight is defined and site.plugins.highlight.enabled %}
    {% if site.plugins.highlight.use_cdn %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.plugins.highlight.theme }}.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    {% endif %}
    {% endif %}
</head>
<body>
    <div class="ambient-cyan"></div>

    <div class="container">
        {% include "header.html" %}

        <main>
            {% block content %}{% endblock %}
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
