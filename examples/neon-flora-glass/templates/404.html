{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="text-align: center; padding: 5rem 2rem;">
    <h1 style="font-size: 5rem; margin-bottom: 0;">404</h1>
    <h2>Page Not Found</h2>
    <p style="margin-top: 1.5rem; color: var(--text-muted);">The requested page could not be found in this neon jungle.</p>
    <a href="{{ base_url }}/" style="display: inline-block; margin-top: 2rem; padding: 0.75rem 2rem; background: rgba(57, 255, 20, 0.1); border: 1px solid var(--neon-green); color: var(--neon-green); border-radius: 100px; text-decoration: none; font-weight: 500; transition: all 0.3s ease;">
        Return Home
    </a>
</div>
{% endblock %}
