{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>

    {% if page.date or page.tags %}
    <div class="post-meta">
        {% if page.date %}
        <span>{{ page.date | date("%B %d, %Y") }}</span>
        {% endif %}

        {% if page.tags %}
        <div class="tags">
            {% for tag in page.tags %}
            <a href="{{ base_url }}/tags/{{ tag | slugify }}" class="tag">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </div>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
