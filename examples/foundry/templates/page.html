{% include "header.html" %}
<div class="site-wrapper">
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-logo">Foundry</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Build Logs</a>
        <a href="{{ base_url }}/archives/">Archives</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button class="search-trigger" aria-label="Search" onclick="openSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="search-shortcut">Cmd+K</span>
      </button>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search build logs..." autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <main class="site-main">
    <article class="page-content">
      {{ content }}
    </article>
  </main>
{% include "footer.html" %}
