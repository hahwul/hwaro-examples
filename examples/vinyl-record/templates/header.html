<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #ddd;
            --accent: #555;
            --vinyl: #0c0c0c;
            --shadow: rgba(0,0,0,0.8);
            --highlight: rgba(255,255,255,0.02);
        }
        body {
            background-color: #050505;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .vinyl-surface {
            background: var(--vinyl);
            border-radius: 50%;
            width: 500px;
            height: 500px;
            margin: 0 auto 60px;
            box-shadow: 20px 20px 60px var(--shadow), inset -5px -5px 15px var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #222;
            position: relative;
            background-image: repeating-radial-gradient(circle, #000 0, #000 2px, #111 2px, #111 4px);
        }
        .vinyl-label {
            width: 150px;
            height: 150px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            padding: 20px;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; color: #aaa; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">vinyl.record</div>
        <nav>
            <a href="/">Spin</a>
            <a href="/about">Groove</a>
        </nav>
    </header>
