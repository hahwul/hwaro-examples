{% extends "base.html" %}

{% block content %}
<div class="section-content">
  <div class="glass-card page-content">
    <h1>{{ page.title | e }}</h1>
    {% if content %}
    <div class="prose">
      {{ content }}
    </div>
    {% endif %}
  </div>

  <div class="section-list-container">
    <ul class="section-list glass-list">
      {{ section.list }}
    </ul>
  </div>

  <div class="pagination-container glass-card">
    {{ pagination }}
  </div>
</div>
{% endblock content %}
