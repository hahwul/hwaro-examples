{% extends "base.html" %}

{% block content %}
<article class="glass-card page-content">
  <header class="page-header">
    <h1>{{ page.title | e }}</h1>
    {% if page.date %}
    <p class="meta-date">{{ page.date | date(format="%Y-%m-%d") }}</p>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
{% endblock content %}
