{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <div class="spotlight-pool">
        <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" class="spotlight-svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="spotSec" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#f4efdf" stop-opacity="0.18"/>
              <stop offset="60%" stop-color="#f4efdf" stop-opacity="0.04"/>
              <stop offset="100%" stop-color="#f4efdf" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <ellipse cx="400" cy="150" rx="320" ry="130" fill="url(#spotSec)"/>
          <ellipse cx="400" cy="150" rx="180" ry="70" fill="none" stroke="#f4efdf" stroke-width="0.5" opacity="0.15"/>
        </svg>
        <div class="spotlight-text">
          <p class="section-label">the programme</p>
          <h1 class="section-title">{{ page.title | e }}</h1>
        </div>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
