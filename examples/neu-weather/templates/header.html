<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --text: #2d3748;
            --accent: #4a90e2;
            --shadow: rgba(0,0,0,0.05);
            --highlight: rgba(255,255,255,0.8);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .weather-hero {
            padding: 100px 0;
            text-align: center;
            background: var(--bg);
            border-radius: 40px;
            box-shadow: 15px 15px 40px var(--shadow), -15px -15px 40px var(--highlight);
            margin-bottom: 60px;
        }
        .weather-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            color: var(--accent);
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: inset 10px 10px 30px var(--shadow), inset -10px -10px 30px var(--highlight);
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; }
        .temp { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: #a0aec0; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">neu.weather</div>
        <nav>
            <a href="/">Forecast</a>
            <a href="/about">Atmosphere</a>
        </nav>
    </header>
