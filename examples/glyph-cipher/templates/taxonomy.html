{% include "header.html" %}
<div class="cipher-label"><span class="name">index · {{ taxonomy_name }}</span><span class="meta">{{ taxonomy_terms | length }} terms</span></div>
<div class="tax-grid">
{% for term in taxonomy_terms %}
  <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">
    <span class="label">#{{ term.name }}</span>
    <span class="count">{{ term.pages | length }} ·</span>
  </a>
{% endfor %}
</div>
{% include "footer.html" %}
