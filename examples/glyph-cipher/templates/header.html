<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% elif section.title %}{{ section.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ base_url }}/css/style.css">
{{ og_all_tags | safe }}
{{ canonical_tag | safe }}
</head>
<body>
<div class="container">
<div class="system-bar">
  <span class="id">// GC.NODE.0x47A1</span>
  <span class="stream">stream &gt; <code>0xA31C4F0D · sig=verified · rcv={{ current_date }}T03:14Z · hops=3</code></span>
  <span class="right">CHAN ▮ OPEN</span>
</div>
