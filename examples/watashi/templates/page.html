{% include "header.html" %}
<main id="main">
  <div class="prose-container">
    <article class="prose">
      <h1>{{ page.title | e }}</h1>
      {% if page.date %}
        <p><time class="timeline-date" datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time></p>
      {% endif %}
      
      {{ content | safe }}
      
      {% if page.tags %}
        <ul class="tag-list">
          {% for t in page.tags %}
            <li><a href="{{ get_taxonomy_url(kind="tags", term=t) }}">{{ t }}</a></li>
          {% endfor %}
        </ul>
      {% endif %}
    </article>
  </div>
</main>
{% include "footer.html" %}
