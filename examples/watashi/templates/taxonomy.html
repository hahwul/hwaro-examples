{% include "header.html" %}
<main id="main">
  <div class="prose-container">
    <h1>Tags</h1>
    {% set tax = get_taxonomy(kind="tags") %}
    <ul class="tag-list">
      {% for term in tax.items | sort_by("name") %}
      <li>
        <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">
          {{ term.name }} <span class="term-count">({{ term.pages | length }})</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</main>
{% include "footer.html" %}
