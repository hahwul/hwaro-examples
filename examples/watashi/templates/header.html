<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  {{ jsonld | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Vollkorn:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('watashi-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  
  <header class="site-header" style="padding-top: var(--space-4); padding-bottom: var(--space-3); border-bottom: 1px solid var(--border); background-color: var(--bg);">
    <div class="site-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
      <div class="site-branding" style="display: flex; align-items: center; gap: var(--space-2);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-wind" aria-hidden="true">
          <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
        </svg>
        {% if current_path == "/" or page.url == "/" %}
        <h1 style="font-family: Vollkorn, Georgia, serif; font-size: var(--text-lg); margin: 0;"><a href="{{ base_url }}/" style="color: var(--fg); text-decoration: none;">{{ site.title | e }}</a></h1>
        {% else %}
        <div style="font-family: Vollkorn, Georgia, serif; font-size: var(--text-lg); margin: 0;"><a href="{{ base_url }}/" style="color: var(--fg); text-decoration: none;">{{ site.title | e }}</a></div>
        {% endif %}
      </div>
      <div class="header-meta" style="display: flex; gap: var(--space-4); align-items: center; margin: 0; padding: 0;">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/">Archive</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">Theme</button>
      </div>
    </div>
  </header>
</body>
</html>
