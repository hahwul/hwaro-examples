<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <div class="layout">
    <header>
      <a href="{{ base_url }}/" class="logo">Aegis<span>Shield</span></a>
      <nav>
        <a href="{{ base_url }}/">Core</a>
        <a href="{{ base_url }}/about/">Architecture</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer>
      <p>&copy; {{ current_year }} {{ site.title }}. System architecture intact.</p>
    </footer>
  </div>
</body>
</html>
