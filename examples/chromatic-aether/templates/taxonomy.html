{% include "header.html" %}
<header class="blog-header">
  <a href="{{ base_url }}/">Chromatic Aether</a>
  <nav>
    <a href="{{ base_url }}/about/">About</a>
    <a href="{{ base_url }}/tags/">Tags</a>
  </nav>
</header>
<div class="blog-container">
  <main>
    <h1 style="color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.5);">Tags</h1>
    <ul>
      {% for term in terms %}
        <li><a href="{{ term.url }}" style="color: #ff007f;">{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </main>
</div>
