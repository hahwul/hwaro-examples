<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
  <style>
    body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
    .blog-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .blog-header a { color: #fff; text-decoration: none; font-size: 1.2rem; font-weight: bold; }
    .blog-header nav a { margin-left: 20px; font-size: 1rem; font-weight: normal; transition: color 0.3s; }
    .blog-header nav a:hover { color: #ff007f; text-shadow: 0 0 10px #ff007f; }
    .blog-container { flex: 1; padding: 40px; max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); margin-top: 40px; margin-bottom: 40px; width: 100%; box-sizing: border-box;}
  </style>
</head>
