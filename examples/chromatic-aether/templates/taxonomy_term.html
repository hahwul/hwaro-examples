{% include "header.html" %}
<header class="blog-header">
  <a href="{{ base_url }}/">Chromatic Aether</a>
  <nav>
    <a href="{{ base_url }}/about/">About</a>
    <a href="{{ base_url }}/tags/">Tags</a>
  </nav>
</header>
<div class="blog-container">
  <main>
    <h1 style="color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.5);">Tag</h1>
    <ul style="list-style: none; padding: 0;">
      {% for p in pages %}
        <li style="margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
          <h2 style="margin: 0 0 10px 0;"><a href="{{ p.url }}" style="color: #00ffff; text-decoration: none;">{{ p.title | e }}</a></h2>
          {% if p.date %}
            <p style="color: #aaa; font-size: 0.9em; margin: 0 0 10px 0;">{{ p.date | e }}</p>
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </main>
</div>
{% include "footer.html" %}
