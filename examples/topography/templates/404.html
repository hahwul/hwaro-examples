<style>
  .error-container {
    text-align: center;
    padding: 4rem 2rem;
    background: white;
    border-radius: 12px;
    margin: 3rem auto;
    max-width: 600px;
    box-shadow: 0 4px 16px rgba(45, 80, 22, 0.15);
    border: 2px solid var(--ridge-white);
  }

  .error-icon {
    font-size: 6rem;
    margin-bottom: 1rem;
  }

  .error-container h1 {
    font-size: 2.5rem;
    color: var(--contour-green);
    margin-bottom: 1rem;
  }

  .error-container p {
    font-size: 1.1rem;
    color: var(--text-medium);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .error-container a {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: linear-gradient(135deg, var(--lowland-green) 0%, var(--highland-brown) 100%);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .error-container a:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(45, 80, 22, 0.3);
  }
</style>

<div class="error-container">
  <div class="error-icon"><svg viewBox="0 0 32 32" width="1em" height="1em" aria-hidden="true" focusable="false"><path fill="currentColor" d="M2 28 L11 12 L17 22 L22 14 L30 28 Z"/><path fill="rgba(255,255,255,0.45)" d="M9 16 L11 12 L13 16 L11 19 Z M21 16 L22 14 L24 17 Z"/></svg></div>
  <h1>404 - Trail Not Found</h1>
  <p>You've ventured off the marked path. This trail doesn't seem to exist in our maps.</p>
  <a href="{{ base_url }}/">Return to Base Camp</a>
</div>
