<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="wrap">
    <div class="termhead">
      <div class="termhead-bar">
        <div class="dots">
          <svg width="42" height="10" viewBox="0 0 42 10" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="1" width="8" height="8" fill="#f0e130"/>
            <rect x="14" y="1" width="8" height="8" fill="#00ff41"/>
            <rect x="28" y="1" width="8" height="8" fill="#f0e130" opacity="0.4"/>
          </svg>
        </div>
        <div class="path">{{ site.title }}:~{% if page.url and page.url != "/" %}{{ page.url }}{% endif %} &mdash; zsh</div>
        <div class="status">[ LINK UP ]</div>
      </div>

      <nav class="topnav" style="padding: 0.75rem 1rem; margin: 0; border-bottom: 1px solid var(--rule);">
        <a href="{{ base_url }}/">home</a>
        <a href="{{ base_url }}/logs/">logs</a>
        <a href="{{ base_url }}/about/">whoami</a>
        <a href="{{ base_url }}/atom.xml">feed</a>
      </nav>
