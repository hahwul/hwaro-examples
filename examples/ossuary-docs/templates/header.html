<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0c0c0c; --text: #eee; --accent: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; border-bottom: 1px solid var(--accent); padding-bottom: 40px; margin-bottom: 60px; }
        .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 3rem; text-transform: uppercase; letter-spacing: 10px; }
        .ossuary-surface { padding: 80px; background: #111; border: 1px solid var(--accent); position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">ossuary.docs</div></header>
