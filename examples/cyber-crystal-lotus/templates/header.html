<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="cyber-lotus-bg">
    <div class="glow-orb orb-pink"></div>
    <div class="glow-orb orb-cyan"></div>
    <div class="glow-orb orb-purple"></div>
  </div>

  <div class="site-wrapper glass-container">
    <header class="site-header">
      <a href="/" class="site-logo">
        <span class="logo-icon">🪷</span>
        {{ site.title }}
      </a>
      <nav>
        <a href="/">Terminal</a>
        <a href="/about/">Lore</a>
      </nav>
    </header>
