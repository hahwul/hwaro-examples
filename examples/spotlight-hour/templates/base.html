<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Work+Sans:wght@500&family=Fira+Sans:wght@400&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --gold: #FFD700;
      --black: #000000;
      --dark-gray: #121212;
      --light-gray: #A0A0A0;
      --text: #FFFFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--text);
      font-family: 'Fira Sans', sans-serif;
      line-height: 1.65;
      overflow-x: hidden;
    }

    .watermark {
      position: fixed;
      top: 10%;
      right: -5%;
      z-index: -1;
      opacity: 0.05;
      pointer-events: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0;
      text-align: center;
      position: relative;
    }

    .event-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 120px;
      line-height: 0.9;
      color: var(--gold);
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .event-subtitle {
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      font-size: 24px;
      color: var(--text);
      margin-top: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav {
      margin-top: 2rem;
      border-top: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
      padding: 1rem 0;
    }

    nav a {
      color: var(--gold);
      text-decoration: none;
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0 1.5rem;
      transition: opacity 0.3s;
    }

    nav a:hover {
      opacity: 0.7;
    }

    main {
      padding: 4rem 0;
    }

    .speaker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 4rem;
      margin-top: 4rem;
    }

    .speaker-card {
      position: relative;
      text-align: center;
    }

    .spotlight-halo {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
      width: 240px;
      height: 240px;
    }

    .speaker-image {
      width: 200px;
      height: 200px;
      background-color: var(--dark-gray);
      border: 4px solid var(--gold);
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speaker-name {
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      font-size: 28px;
      color: var(--gold);
      margin: 0 0 0.5rem;
    }

    .talk-title {
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .talk-abstract {
      font-size: 15px;
      color: var(--light-gray);
      max-width: 280px;
      margin: 0 auto;
    }

    .time-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Work Sans', sans-serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .stage-section {
      margin-top: 8rem;
      padding: 4rem;
      background-color: var(--dark-gray);
      border: 2px solid var(--gold);
      text-align: center;
      position: relative;
    }

    .podium-icon {
      margin-bottom: 2rem;
    }

    footer {
      padding: 4rem 0;
      text-align: center;
      border-top: 1px solid var(--dark-gray);
      color: var(--light-gray);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .event-title { font-size: 60px; }
      .event-subtitle { font-size: 18px; }
      nav a { margin: 0 0.5rem; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="watermark">
    <svg width="600" height="600" viewBox="0 0 24 24" fill="currentColor">
      <path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V9C20.017 8.44772 19.5693 8 19.017 8H16.017C14.9124 8 14.017 7.10457 14.017 6V3H22.017V15C22.017 18.3137 19.3307 21 16.017 21H14.017ZM2.01695 21L2.01695 18C2.01695 16.8954 2.91238 16 4.01695 16H7.01695C7.56923 16 8.01695 15.5523 8.01695 15V9C8.01695 8.44772 7.56923 8 7.01695 8H4.01695C2.91238 8 2.01695 7.10457 2.01695 6V3H10.017V15C10.017 18.3137 7.33066 21 4.01695 21H2.01695Z" />
    </svg>
  </div>

  <div class="container">
    <header>
      <h1 class="event-title">{{ site.title }}</h1>
      <p class="event-subtitle">Golden Hour Talk series</p>
      <nav>
        <a href="{{ base_url }}/">Main Stage</a>
        <a href="{{ base_url }}/about/">Event Details</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; 2026 Spotlight Hour Events. No emojis. No gradients. Pure authority.</p>
    </footer>
  </div>
</body>
</html>
