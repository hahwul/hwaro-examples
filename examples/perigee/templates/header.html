<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="shell header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Perigee, home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <defs>
            <clipPath id="brandLuneClip"><circle cx="16" cy="16" r="8.6"/></clipPath>
          </defs>
          <circle class="dial-bezel" cx="16" cy="16" r="13.2"/>
          <g clip-path="url(#brandLuneClip)">
            <circle class="moon-lit" cx="16" cy="16" r="8.6"/>
            <circle class="moon-shadow" cx="11.4" cy="16" r="8.6"/>
          </g>
          <circle class="moon-ring" cx="16" cy="16" r="8.6"/>
        </svg>
        <span class="brand-word">Perigee</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/the-watch/">The Watch</a>
        <a href="{{ base_url }}/specifications/">Specifications</a>
        <a href="{{ base_url }}/journal/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
