<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #00ff41;
            --accent: #008f11;
            --pixel: #000;
            --shadow: rgba(0,0,0,0.8);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            line-height: 1.6;
            font-size: 0.8rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 4px 4px 0 var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.6rem;
            text-transform: uppercase;
        }
        .pixel-surface {
            background: var(--pixel);
            padding: 60px;
            box-shadow: 10px 10px 0 var(--accent);
            margin-bottom: 80px;
            border: 4px solid #fff;
            position: relative;
        }
        h2 { font-size: 1rem; color: #fff; margin-top: 0; border-bottom: 4px solid var(--accent); padding-bottom: 20px; text-transform: uppercase; line-height: 1.4; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">pixel.toon</div>
            <nav>
                <a href="/">Level</a>
                <a href="/about">Status</a>
            </nav>
        </div>
    </header>
