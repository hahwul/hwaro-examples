<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="{{ base_url }}/" aria-label="Chinook — home">
        <svg class="brand-swirl" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true" focusable="false">
          <circle class="ic-disc" cx="16" cy="16" r="15" stroke-width="0"/>
          <path class="ic-swirl" stroke-width="2" stroke-linecap="round"
            d="M16 16 a1.5 1.5 0 0 1 3 0 a3 3 0 0 1 -6 0 a4.5 4.5 0 0 1 9 0 a6 6 0 0 1 -12 0 a7.5 7.5 0 0 1 15 0"/>
        </svg>
        <span class="brand-name">Chinook</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a{% if page.section is present and page.section == "bakes" %} aria-current="page"{% endif %} href="{{ base_url }}/bakes/">Bakes</a>
        <a{% if page.url is present and page.url == "/tags/" %} aria-current="page"{% endif %} href="{{ base_url }}/tags/">Tags</a>
        <a{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %} href="{{ base_url }}/about/">About</a>
        <a class="nav-search"{% if page.url is present and page.url == "/search/" %} aria-current="page"{% endif %} href="{{ base_url }}/search/">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true" focusable="false"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3.5 3.5"/></svg>
          <span>Search</span>
        </a>
      </nav>
    </div>
  </header>
