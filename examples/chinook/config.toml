title = "Chinook"
description = "High-altitude bake logs in pursuit of the perfect cinnamon roll"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
mode = "client"
theme = "github"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
sections = ["bakes"]

[og]
type = "article"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
