<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .austere-hero {
            padding: 100px 0;
        }
        .austere-hero h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -5px;
        }
        article { padding: 80px 0; }
        h2 { font-weight: 900; font-size: 3rem; text-transform: uppercase; margin-bottom: 40px; }
        p { opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">AUSTERE.</div>
            <nav>
                <a href="/">Function</a>
                <a href="/about">Necessity</a>
            </nav>
        </div>
    </header>
