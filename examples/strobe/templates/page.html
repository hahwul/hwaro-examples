{% include "header.html" %}
<main>
    <article>
        <header style="margin-bottom: 2rem;">
            <h2 class="fluorescent-text" style="font-size: 3rem;">{{ page.title }}</h2>
            {% if page.date %}<time class="uv-text">{{ page.date | date("%Y.%m.%d") }}</time>{% endif %}
        </header>
        <div class="page-content">
            {{ content | safe }}
        </div>
    </article>
</main>
