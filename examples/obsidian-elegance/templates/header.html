<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #d4af37;
      --text: #eaeaea;
      --text-muted: #a0a0a0;
      --border: #333333;
      --bg: #0d0d0d;
      --bg-subtle: #1a1a1a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Georgia", serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; letter-spacing: 1px; }
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 400; color: var(--primary); }
    h1 { font-size: 2.2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1em 0; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; font-family: monospace; color: #ccc; }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.8rem; padding: 1rem; background: var(--bg-subtle); border-radius: 6px; border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s; }
    ul.section-list li:hover { transform: translateY(-2px); border-color: var(--primary); }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
