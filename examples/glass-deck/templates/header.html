<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .deck-hero {
            padding: 100px 0;
            text-align: center;
        }
        .deck-hero h1 {
            font-family: 'Space Mono', monospace;
            font-size: 5rem;
            margin: 0;
            color: #fff;
        }
        article { padding: 60px 0; }
        h2 { font-family: 'Space Mono', monospace; font-size: 2.2rem; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">glass.deck</div>
            <nav>
                <a href="/">Cards</a>
                <a href="/about">Stack</a>
            </nav>
        </div>
    </header>
