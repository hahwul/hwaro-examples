{% include "header.html" %}

<article class="manifesto-box main-container">
  <header class="manifesto-header">
    <div style="display:flex; gap: 1rem; align-items:center;">
      <span style="color: var(--color-text-alt); font-size:0.8rem; font-weight:700;">// PROTOCOL_{{ page.extra.protocol | default("0.9") }}</span>
      <span style="color: var(--color-text-muted); font-size:0.8rem;">LAUNCH: {{ page.date | date("%Y-%m-%d") }}</span>
    </div>
    <h1 class="manifesto-title">{{ page.title }}</h1>
  </header>

  <div class="manifesto-content">
    {{ content | safe }}
  </div>

  {% if page.tags %}
    <div style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--color-border); font-size: 0.8rem; color: var(--color-text-muted);">
      NEURAL_KEYS // {{ page.tags | join(" // ") }}
    </div>
  {% endif %}
</article>

{% include "footer.html" %}
