{% extends "base.html" %}

{% block content %}
<article class="post">
  <header class="post-header">
    <span class="post-card-meta">{{ page.date | date("%B %d, %Y") }}</span>
    <h1>{{ page.title | e }}</h1>
  </header>
  <div class="post-content">
    {{ content | safe }}
  </div>

  {% if page.tags %}
  <div class="tags-list">
    {% for tag in page.tags %}
    <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag-item">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}
</article>
{% endblock %}
