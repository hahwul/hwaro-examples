<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #4a3a2a;
            --accent: #8b4513;
            --journal: #f4ece4;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .journal-surface {
            background: #fff;
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 4px;
            border: 1px solid #eee;
            position: relative;
        }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2.2rem; color: var(--accent); font-style: italic; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">travel.journal</div>
            <nav>
                <a href="/">Destination</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
