<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('propel-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="site-head">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 12.6 21 3.5l-6 18-1.7-6-6-1.9Z"/></svg>
        </span>
        <span>Propel</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/features/"{% if page.url == "/features/" %} aria-current="page"{% endif %}>Features</a>
        <a href="{{ base_url }}/shortcuts/"{% if page.url == "/shortcuts/" %} aria-current="page"{% endif %}>Shortcuts</a>
        <a href="{{ base_url }}/pricing/"{% if page.url == "/pricing/" %} aria-current="page"{% endif %}>Pricing</a>
        <a href="{{ base_url }}/security/"{% if page.url == "/security/" %} aria-current="page"{% endif %}>Security</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
      <div class="head-actions">
        <button type="button" class="search-trigger" id="search-trigger" aria-haspopup="dialog" aria-controls="search-modal" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.4-4.4"/></svg>
          <span>Search</span>
          <span class="key-group" aria-hidden="true"><kbd>&#8984;</kbd><kbd>K</kbd></span>
        </button>
        <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle day and night reading mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2"/>
            <path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M18.8 5.2l-1.7 1.7M6.9 17.1l-1.7 1.7"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20.2 14.1A8.3 8.3 0 0 1 9.9 3.8a8.3 8.3 0 1 0 10.3 10.3Z"/>
          </svg>
        </button>
        <a class="btn btn-accent" href="{{ base_url }}/pricing/">Start free</a>
      </div>
    </header>
