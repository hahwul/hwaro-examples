title = "Propel"
description = "A keyboard-driven email client built to reach inbox zero in minutes a day"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[og]
type = "website"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
