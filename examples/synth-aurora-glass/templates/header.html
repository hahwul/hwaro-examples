<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} | {% endif %}{{ site.title | e }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

  {{ og_all_tags | default(value='') }}
  {{ hreflang_tags | default(value='') }}

  <style>
    :root {
      /* Synth Aurora Core Colors */
      --bg-dark: #030108;
      --bg-surface: rgba(15, 10, 30, 0.4);
      --glass-bg: rgba(20, 15, 45, 0.25);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.12);

      /* Neon Accents */
      --neon-cyan: #00f0ff;
      --neon-pink: #ff007f;
      --neon-purple: #8a2be2;

      /* Typography */
      --text-main: #f0f0f5;
      --text-muted: #9ba0b8;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.7;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-dark);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Ambient Aurora Background */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-dark);
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: drift 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      top: -10%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, var(--neon-purple), transparent 70%);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -20%; right: -10%; width: 60vw; height: 60vw;
      background: radial-gradient(circle, var(--neon-cyan), transparent 70%);
      animation-duration: 25s;
    }

    .orb-3 {
      top: 40%; left: 30%; width: 40vw; height: 40vw;
      background: radial-gradient(circle, var(--neon-pink), transparent 70%);
      animation-duration: 30s;
      opacity: 0.3;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10%, 10%) scale(1.1); }
      100% { transform: translate(-5%, -15%) scale(0.9); }
    }

    /* Layout & Glassmorphism */
    .site-wrapper {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 var(--glass-highlight);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      margin: 2rem 0;
      z-index: 10;
    }

    .site-logo {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
      position: relative;
    }

    .site-logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .site-logo:hover::after { opacity: 1; }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--text-main);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    /* Main Content */
    .site-main {
      flex: 1;
      padding: 3rem;
      margin-bottom: 3rem;
    }

    /* Typography Styles */
    h1, h2, h3, h4 {
      font-family: var(--font-heading);
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.8em;
      font-weight: 600;
      color: #fff;
    }

    h1 {
      font-size: 3rem;
      margin-top: 0;
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 { font-size: 2rem; }
    h3 { font-size: 1.4rem; }

    p { margin: 1.2em 0; font-size: 1.05rem; }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .site-main a:not(.btn):hover {
      color: var(--neon-pink);
      text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
    }

    /* Code blocks */
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: 'Fira Code', ui-monospace, monospace;
      color: var(--neon-pink);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    pre {
      background: rgba(5, 5, 10, 0.6) !important;
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
      border: none;
    }

    /* Lists */
    ul, ol { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem;
      }
      .site-main { padding: 2rem 1.5rem; }
      h1 { font-size: 2.2rem; }
    }
  </style>
  {{ highlight_css | default(value='') }}
  {{ auto_includes_css | default(value='') }}
</head>
<body data-section="{% if page is defined and page.section %}{{ page.section }}{% endif %}">

  <div class="aurora-bg">
    <div class="aurora-orb orb-1"></div>
    <div class="aurora-orb orb-2"></div>
    <div class="aurora-orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="/" class="site-logo">{% if site is defined and site.title %}{{ site.title }}{% else %}Synth Aurora{% endif %}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/tags/">Tags</a>
      </nav>
    </header>
