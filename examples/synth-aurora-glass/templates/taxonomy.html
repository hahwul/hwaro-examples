{% include "header.html" %}
  <main class="site-main glass-panel">
    <h1>All {% if taxonomy is defined and taxonomy.name %}{{ taxonomy.name | capitalize }}{% else %}Tags{% endif %}</h1>

    <ul class="section-list" style="display: flex; flex-wrap: wrap; gap: 1rem; list-style: none; padding: 0;">
    {% if terms is defined %}
      {% for term in terms %}
        <li>
          <a href="{{ term.permalink }}" class="glass-panel" style="display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; color: var(--neon-cyan); border-color: rgba(0, 240, 255, 0.3); transition: all 0.3s ease;">
            #{{ term.name }} ({{ term.pages | length }})
          </a>
        </li>
      {% endfor %}
    {% endif %}
    </ul>
  </main>
{% include "footer.html" %}
