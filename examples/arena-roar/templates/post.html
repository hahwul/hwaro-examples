{% include "header.html" %}
<article>
  <header style="border: none; padding: 0; margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    <div class="meta">
      {{ page.date | date("%B %d, %Y") }}
      {% if page.tags %}
      <div style="margin-top: 0.5rem;">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </header>
  <div class="content">
    {{ content | safe }}
  </div>
  
  <div style="margin-top: 4rem; border-top: 4px solid var(--text); padding-top: 2rem;">
    <a href="{{ base_url }}/posts/" class="btn">Back to Field</a>
  </div>
</article>
{% include "footer.html" %}
