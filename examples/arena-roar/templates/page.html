{% include "header.html" %}
<article>
  <header style="border: none; padding: 0; margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <div class="meta">{{ page.date | date("%B %d, %Y") }}</div>
    {% endif %}
  </header>
  <div class="content">
    {{ content | safe }}
  </div>
</article>
{% include "footer.html" %}
