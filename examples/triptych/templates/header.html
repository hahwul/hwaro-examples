<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f8f8;
            --text: #111;
            --accent: #555;
            --white: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 10px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .triptych-hero {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 80px 0;
        }
        .panel {
            background: var(--white);
            padding: 40px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .panel h2 {
            font-family: 'Fraunces', serif;
            font-size: 3rem;
            margin-top: 0;
        }
        article { padding-bottom: 100px; }
        .center-content { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">TRIPTYCH</div>
            <nav>
                <a href="/">Panels</a>
                <a href="/about">Synthesis</a>
            </nav>
        </div>
    </header>
