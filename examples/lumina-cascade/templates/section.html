{% include "header.html" %}

<div class="glass-panel">
  {{ content | safe }}
</div>

{% if section.pages is defined %}
  {% for child in section.pages %}
    <div class="glass-panel">
      <h2><a href="{{ base_url }}{{ child.path }}">{{ child.title }}</a></h2>
      {% if child.description is defined %}
        <p>{{ child.description }}</p>
      {% endif %}
    </div>
  {% endfor %}
{% endif %}

{% include "footer.html" %}
