{% extends "base.html" %}

{% block content %}
<article class="glass-panel">
  <div class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    <div class="meta">
      {% if page.date %}
        <span>{{ page.date | date(format="%B %d, %Y") }}</span>
      {% endif %}
      {% if page.reading_time %}
        <span>{{ page.reading_time }} min read</span>
      {% endif %}
    </div>
  </div>

  <div class="content-body">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
