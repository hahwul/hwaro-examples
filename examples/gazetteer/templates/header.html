<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #333;
            --accent: #2c3e50;
            --grid: #f0f0f0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .gazetteer-hero {
            padding: 80px 0;
            border-bottom: 1px solid var(--grid);
        }
        .gazetteer-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            margin: 0;
            line-height: 1;
        }
        .map-coords {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 10px;
        }
        article { padding: 60px 0; }
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--grid);
            border: 1px solid var(--grid);
            margin-top: 40px;
        }
        .directory-item {
            background: #fff;
            padding: 20px;
        }
        .directory-item b { display: block; font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">GAZETTEER//v1</div>
            <nav>
                <a href="/">Index</a>
                <a href="/about">Region</a>
            </nav>
        </div>
    </header>
