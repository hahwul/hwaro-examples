<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Archivo Narrow', sans-serif;
            margin: 0;
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .pith-wrapper {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 10px solid var(--text);
        }
        header {
            text-align: left;
            margin-bottom: 40px;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: var(--text);
            color: var(--bg);
            padding: 5px 10px;
            display: inline-block;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
        .pith-hero h1 {
            font-family: 'Inter', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -5px;
        }
        article { margin-top: 40px; }
        h2 { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid var(--text); padding-bottom: 5px; }
        p { font-size: 1rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="pith-wrapper">
    <header>
        <div class="logo">PITH.</div>
        <nav>
            <a href="/">Concise</a>
            <a href="/about">Brief</a>
        </nav>
    </header>
