{% include "header.html" %}

<header class="post-header">
  <h1>Tag: #{{ page.title }}</h1>
</header>

<ul class="post-list">
  {% for page in taxonomy_pages %}
    <li class="post-item">
      <h2><a href="{{ base_url }}{{ page.path }}">{{ page.title }}</a></h2>
      <div class="post-meta">
        {{ page.date | date(format="%B %d, %Y") }}
      </div>
      <a href="{{ base_url }}{{ page.path }}" class="read-more">Read more →</a>
    </li>
  {% endfor %}
</ul>

{% include "footer.html" %}
