{% include "header.html" %}
  <h1 class="text-2xl font-bold text-white mb-6">{{ taxonomy_term }}</h1>
  <div class="space-y-3">
    {% for page in taxonomy_pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-4 bg-vault-surface border border-vault-border rounded hover:border-vgreen-light/30 transition-all">
      <h2 class="font-medium text-white">{{ page.title }}</h2>
      {% if page.description %}<p class="text-sm text-vault-dim mt-1">{{ page.description }}</p>{% endif %}
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
