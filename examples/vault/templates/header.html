<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vault: { bg: '#0a0a0a', surface: '#141414', border: '#262626', text: '#e5e5e5', muted: '#a3a3a3', dim: '#737373' },
            vgreen: { DEFAULT: '#064e3b', light: '#10b981', dim: '#065f46' },
            vgold: { DEFAULT: '#d4a843', light: '#e8c868', dark: '#b08930' },
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-vault-bg text-vault-text font-sans; }
    .prose { @apply max-w-none text-vault-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-white; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-white border-b border-vault-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-vault-text; }
    .prose p { @apply my-3 leading-relaxed text-vault-muted; }
    .prose a { @apply text-vgreen-light hover:text-vgold underline underline-offset-4 decoration-vgreen-light/30; }
    .prose strong { @apply font-semibold text-white; }
    .prose code { @apply bg-vault-surface px-1.5 py-0.5 rounded text-sm font-mono text-vgold border border-vault-border; }
    .prose pre { @apply bg-vault-surface text-vault-text p-4 rounded my-4 overflow-x-auto font-mono text-sm border border-vault-border; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-vault-text; }
    .prose blockquote { @apply my-4 py-2 px-4 border-l-4 border-vgold bg-vault-surface text-vault-muted; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5 text-vault-muted; }
    .prose ul li { @apply list-disc marker:text-vgold; }
    .prose ol li { @apply list-decimal marker:text-vgold; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-vault-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold text-white border border-vault-border; }
    .prose td { @apply px-4 py-2 border border-vault-border text-vault-muted; }
    .badge-critical { @apply inline-block px-2 py-0.5 bg-red-950 text-red-400 text-xs font-semibold rounded; }
    .badge-high { @apply inline-block px-2 py-0.5 bg-amber-950 text-amber-400 text-xs font-semibold rounded; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-vault-border bg-vault-surface sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-bold text-white hover:text-vgold transition-colors flex items-center gap-2">
        <svg class="w-5 h-5 text-vgold" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/secrets/" class="text-vault-dim hover:text-vault-text transition-colors">Secrets</a>
        <a href="{{ base_url }}/access-control/" class="text-vault-dim hover:text-vault-text transition-colors">Access Control</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
