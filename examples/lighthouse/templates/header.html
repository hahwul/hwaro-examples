<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #64748b;
      --accent: #f59e0b;
      --bg: #ffffff;
      --bg-alt: #f8fafc;
      --text: #0f172a;
      --text-muted: #475569;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --card-hover-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: var(--text);
      background-color: var(--bg-alt);
    }

    a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--primary-hover); }

    .container { max-width: 1024px; margin: 0 auto; padding: 0 1.5rem; }

    /* Header */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .logo i { color: var(--primary); }
    .nav { display: flex; gap: 1.5rem; }
    .nav a { color: var(--secondary); font-weight: 500; font-size: 0.95rem; }
    .nav a:hover { color: var(--primary); }
    .nav a.active { color: var(--primary); }

    /* Search */
    .search-container { margin: 2rem 0; position: relative; }
    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 3rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary); }

    /* Hero */
    .hero { padding: 3rem 0; text-align: center; background: var(--bg); border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; color: var(--text); }
    .hero p { font-size: 1.125rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

    /* Directory Grid */
    .grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: inherit;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--card-hover-shadow); border-color: var(--primary); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .card-description { font-size: 0.95rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Badges & Tags */
    .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .badge-recommend { background: #dcfce7; color: #166534; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag { background: var(--bg-alt); color: var(--secondary); padding: 0.2rem 0.6rem; border-radius: 0.375rem; font-size: 0.75rem; font-weight: 500; border: 1px solid var(--border); }

    /* Rating */
    .rating { color: var(--accent); font-size: 0.875rem; display: flex; align-items: center; gap: 0.25rem; }

    /* Footer */
    .footer { background: var(--bg); border-top: 1px solid var(--border); padding: 3rem 0; margin-top: 4rem; text-align: center; color: var(--text-muted); }

    /* Alphabetical Index */
    .alpha-index { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; padding: 1rem; background: var(--bg); border-radius: 0.5rem; border: 1px solid var(--border); }
    .alpha-btn { width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 0.25rem; font-size: 0.875rem; font-weight: 600; color: var(--secondary); border: 1px solid var(--border); }
    .alpha-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    @media (max-width: 640px) {
      .hero h1 { font-size: 2rem; }
      .grid { grid-template-cols: 1fr; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="{{ base_url }}/" class="logo">
        <i class="fas fa-lighthouse"></i>
        <span>Lighthouse</span>
      </a>
      <nav class="nav">
        <a href="{{ base_url }}/tools/" {% if page.section == "tools" %}class="active"{% endif %}>Tools</a>
        <a href="{{ base_url }}/learning/" {% if page.section == "learning" %}class="active"{% endif %}>Learning</a>
        <a href="{{ base_url }}/community/" {% if page.section == "community" %}class="active"{% endif %}>Community</a>
      </nav>
    </div>
  </header>
