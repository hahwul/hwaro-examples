<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-bg: #1a0b1c;
            --velvet-dark: #120713;
            --gold-accent: #d4af37;
            --gold-light: #f3d573;
            --text-main: #f4e8c1;
            --text-muted: #b5a591;
        }

        body {
            background-color: var(--velvet-bg);
            background-image: radial-gradient(circle at 50% 0%, var(--velvet-bg) 0%, var(--velvet-dark) 100%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-accent);
            font-weight: 400;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
            animation: fadeIn 1.5s ease-in;
            width: 100%;
            box-sizing: border-box;
        }

        a {
            color: var(--gold-light);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--gold-accent);
            border-color: var(--gold-accent);
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 2rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            background: rgba(18, 7, 19, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .site-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            color: var(--gold-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .site-title a {
            border: none;
            color: var(--gold-accent);
        }

        .site-title a:hover {
            border: none;
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            margin: 0 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4rem;
        }

        pre {
            background-color: var(--velvet-dark);
            padding: 1rem;
            border-radius: 4px;
            border-left: 3px solid var(--gold-accent);
            overflow-x: auto;
        }

        code {
            font-family: monospace;
            color: var(--gold-light);
        }
    </style>
</head>
<body>
    {% include "header.html" %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}
</body>
</html>
