{% extends "base.html" %}

{% block content %}
<section>
    <h1>{{ page.title }}</h1>
    <div class="content">
        {{ content | safe }}
    </div>

    {% if section.pages %}
    <ul class="page-list" style="list-style: none; padding: 0;">
        {% for page in section.pages %}
        <li style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(212, 175, 55, 0.1);">
            <h2 style="margin-top: 0;"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.description %}
            <p style="color: var(--text-muted);">{{ page.description }}</p>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
    {% endif %}
</section>
{% endblock %}
