{% include "header.html" %}
<article class="prose">
  {% if page.title is present %}
    <div class="prose-plate">PLATE &middot; {{ page.title | e | upper }}</div>
    <h1 class="prose-title">{{ page.title | e }}</h1>
  {% endif %}
  <div class="prose-rule" aria-hidden="true"></div>
  <div class="prose-body">
    {{ content | safe }}
  </div>
</article>
