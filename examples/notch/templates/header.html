<!DOCTYPE html>
<html lang="{{ page_language | default('en', true) }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="site-header">
      <a class="brand" href="{{ base_url }}/" aria-label="Notch — home">
        <svg class="brand-mark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.6"/>
          <path d="M5 20 L9 20 L9 12 L13 12 L13 24 L17 24 L17 8 L21 8 L21 17 L27 17"
                fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="square" stroke-linejoin="miter"/>
        </svg>
        <span class="brand-name">notch</span>
        <span class="brand-sub">fm&nbsp;tracker</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/"{% if page.url is present and page.url == "/" %} aria-current="page"{% endif %}>home</a>
        <a href="{{ base_url }}/releases/"{% if page.section is present and page.section == "releases" %} aria-current="page"{% endif %}>releases</a>
        <a href="{{ base_url }}/about/"{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %}>about</a>
        <a class="nav-feed" href="{{ base_url }}/releases/rss.xml">rss</a>
      </nav>
    </header>
