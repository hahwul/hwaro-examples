title = "Habitat Realty"
description = "Premium properties, expertly matched to your lifestyle"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 12

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[feeds]
enabled = true
type = "rss"
limit = 20
sections = ["properties"]

[markdown]
safe = false
lazy_loading = false
emoji = false

[search]
enabled = false
