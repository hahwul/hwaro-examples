  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">
        <svg viewBox="0 0 34 24" width="26" height="18" aria-hidden="true" focusable="false">
          <path d="M9 21a5 5 0 0 1 .6-9.96 6.7 6.7 0 0 1 12.9-1.8A5.15 5.15 0 0 1 24 21z" fill="currentColor"/>
        </svg>
        {{ site.title | e }}
      </p>
      <p class="footer-note">{{ site.description | e }}</p>
      <nav class="footer-nav" aria-label="Footer">
        <a href="{{ base_url }}{{ lang_prefix }}/sightings/">Sightings</a>
        <a href="{{ base_url }}{{ lang_prefix }}/tags/">Genera</a>
        <a href="{{ base_url }}{{ lang_prefix }}/about/">About</a>
        <a href="{{ base_url }}/sightings/rss.xml">RSS</a>
      </nav>
      <p class="footer-fine">Logged by hand along the coast, {{ current_year }}. Built with Hwaro.</p>
    </div>
  </footer>

  <div class="search-overlay" id="search-dialog" role="dialog" aria-modal="true" aria-labelledby="search-title" hidden>
    <div class="search-panel" role="document">
      <div class="search-head">
        <h2 id="search-title">Search the log</h2>
        <button type="button" class="search-close" id="search-close" aria-label="Close search">
          <svg viewBox="0 0 20 20" width="18" height="18" aria-hidden="true" focusable="false">
            <line x1="5" y1="5" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="15" y1="5" x2="5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <input type="search" id="search-input" class="search-input"
             placeholder="Cloud genus, condition, headland…"
             autocomplete="off" spellcheck="false"
             aria-label="Search sightings" aria-controls="search-results">
      <ul id="search-results" class="search-results" aria-live="polite"></ul>
      <p id="search-status" class="search-status">Type to search the sighting log.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js" defer></script>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
