<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="brand" aria-label="{{ site.title | e }} — home">
        <svg class="brand-mark" viewBox="0 0 34 24" width="34" height="24" aria-hidden="true" focusable="false">
          <path d="M9 21a5 5 0 0 1 .6-9.96 6.7 6.7 0 0 1 12.9-1.8A5.15 5.15 0 0 1 24 21z" fill="currentColor"/>
        </svg>
        <span class="brand-name">{{ site.title | e }}</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/sightings/">Sightings</a>
        <a href="{{ base_url }}{{ lang_prefix }}/tags/">Genera</a>
        <a href="{{ base_url }}{{ lang_prefix }}/about/">About</a>
        <button type="button" class="search-trigger" id="search-trigger"
                aria-haspopup="dialog" aria-controls="search-dialog"
                data-search-url="{{ base_url }}/search.json">
          <svg viewBox="0 0 20 20" width="15" height="15" aria-hidden="true" focusable="false">
            <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="13.5" y1="13.5" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="search-trigger-label">Search</span>
          <kbd>/</kbd>
        </button>
      </nav>
    </div>
  </header>
