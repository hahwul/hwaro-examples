<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0E;
      --bg-subtle: #12121A;
      --border: #2A2A35;
      --primary: #00F0FF;
      --accent: #FF0055;
      --accent2: #8A2BE2;
      --text: #E0E0E0;
      --text-muted: #888888;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      position: relative;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.5;
    }

    .site-logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
    }

    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255, 0, 85, 0.6);
    }

    .site-main { min-height: calc(100vh - 250px); }

    /* Typography */
    .prose h1, .prose h2, .prose h3 {
      font-family: var(--font-mono);
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 700;
      color: #fff;
    }

    .prose h1 {
      font-size: 2.5rem;
      margin-top: 0;
      color: var(--primary);
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
      position: relative;
      display: inline-block;
    }

    .prose h2 {
      font-size: 1.8rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .prose h3 { font-size: 1.3rem; color: var(--accent2); }

    .prose p { margin: 1.5em 0; font-size: 1.1rem; color: var(--text); }

    .prose a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 240, 255, 0.3);
      transition: all 0.3s ease;
    }

    .prose a:hover {
      border-bottom-color: var(--primary);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }

    .prose code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: var(--font-mono);
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .prose pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
    }

    .prose pre::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--primary));
      opacity: 0.7;
    }

    .prose pre code {
      background: none;
      padding: 0;
      color: var(--text);
      border: none;
    }

    .prose ul, .prose ol {
      font-size: 1.1rem;
      padding-left: 1.5rem;
    }

    .prose li {
      margin-bottom: 0.5rem;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; display: grid; gap: 1.5rem; }
    ul.section-list li {
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    ul.section-list li::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--primary);
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-color: rgba(0, 240, 255, 0.3);
    }

    ul.section-list li:hover::before {
      opacity: 1;
      box-shadow: 0 0 10px var(--primary);
    }

    ul.section-list li a {
      font-weight: 700;
      font-family: var(--font-mono);
      font-size: 1.3rem;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
    }

    ul.section-list li:hover a {
      color: var(--primary);
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      background: var(--bg-subtle);
      transition: all 0.3s ease;
    }

    nav.pagination a { color: var(--text); text-decoration: none; }
    nav.pagination a:hover {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .pagination-current span {
      border-color: var(--primary);
      color: var(--bg);
      background: var(--primary);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .pagination-disabled span { color: var(--text-muted); opacity: 0.5; }

    /* Custom Thread Element */
    .thread {
      height: 1px;
      width: 100%;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
      margin-bottom: 2rem;
      border-radius: 50%;
    }

    .glow-text {
      text-shadow: 0 0 10px var(--primary);
      color: var(--primary);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; text-align: center; }
      .site-header nav { flex-wrap: wrap; justify-content: center; }
      .site-wrapper { padding: 0 1rem; }
      .prose h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
