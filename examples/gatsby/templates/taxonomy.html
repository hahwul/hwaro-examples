{% include "header.html" %}
<main id="main" class="layout-spread taxonomy-spread">
  <article class="prose standalone-page-content">
    <header class="page-header-running">
      <span class="running-title">Tags &middot; The Great Gatsby</span>
      <span class="page-number">Folio T</span>
    </header>

    <h1 class="page-title">Tags</h1>
    
    {% set tax = get_taxonomy(kind="tags") %}
    <ul class="term-list">
      {% for term in tax.items | sort_by("name") %}
      <li>
        <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">
          {{ term.name }} <span class="term-count">({{ term.pages | length }})</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </article>
</main>
{% include "footer.html" %}
