{% include "header.html" %}
<main id="main" class="layout-spread search-spread">
  <article class="prose standalone-page-content">
    <header class="page-header-running">
      <span class="running-title">Search &middot; The Great Gatsby</span>
      <span class="page-number">Folio S</span>
    </header>

    <h1 class="page-title">{{ page.title | e }}</h1>
    
    <form role="search" data-index="{{ base_url }}/search.json" onsubmit="return false;" class="search-form">
      <label for="search-input" class="sr-only">Search the Edition</label>
      <input id="search-input" type="search" placeholder="Type keywords to search chapters and notes..." autocomplete="off" autofocus>
    </form>
    <p id="search-status" role="status" aria-live="polite"></p>
    <ul id="search-results"></ul>
  </article>
</main>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
