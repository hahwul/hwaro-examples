<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('gatsby-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="header-container">
      <a class="brand" href="{{ base_url }}/">{{ site.title | e }}</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/characters/">Characters</a>
        <a href="{{ base_url }}/search/">Search</a>
        <button id="theme-toggle" aria-label="Toggle theme">
          <span class="theme-icon-light" aria-hidden="true">Light</span>
          <span class="theme-icon-dark" aria-hidden="true">Dark</span>
        </button>
      </nav>
    </div>
  </header>
