<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #555; }
        body { background-color: #f1f1f1; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 10px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: -1px; }
        .target { position: relative; padding: 80px; background: #fff; border: 2px solid #000; box-shadow: 10px 10px 0 #000; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid #ff0000; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">ballistics.ref</div></header>
