<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="proof-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Proof Sheet home">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Proof sheet mark: stacked page with a proofreader's delete loop -->
          <rect x="8" y="8" width="40" height="46" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
          <rect x="12" y="12" width="40" height="46" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
          <line x1="18" y1="22" x2="44" y2="22" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="18" y1="28" x2="44" y2="28" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="18" y1="34" x2="38" y2="34" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="18" y1="40" x2="44" y2="40" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="18" y1="46" x2="36" y2="46" stroke="#1a1a1a" stroke-width="0.8"/>
          <!-- Proof correction loop on last line -->
          <path d="M 28 46 Q 36 38 42 44 Q 46 48 40 50" fill="none" stroke="#b01818" stroke-width="1.3"/>
        </svg>
        <span class="logo-text">
          <span class="logo-main">PROOF SHEET</span>
          <span class="logo-sub">Awaiting Approval</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">FIRST PROOF</a>
        <a href="{{ base_url }}/marks/">PROOF MARKS</a>
        <a href="{{ base_url }}/schedule/">SCHEDULE</a>
        <a href="{{ base_url }}/imprint/">IMPRINT</a>
      </nav>
    </header>
