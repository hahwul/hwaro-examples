<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {% raw %}<script>(function(){try{var t=localStorage.getItem("milepost-theme");if(t==="light"||t==="dark"){document.documentElement.setAttribute("data-theme",t);}}catch(e){}})();</script>{% endraw %}
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&family=Fira+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header__inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Milepost home">
        <svg class="wordmark__mark" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" focusable="false">
          <rect x="4" y="4" width="1.9" height="17" rx="0.95" fill="currentColor"/>
          <path d="M5.9 4.5 H15.2 L19 8.4 L15.2 12.3 H5.9 Z" fill="currentColor"/>
        </svg>
        <span class="wordmark__text">Milepost</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/releases/">Releases</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/releases/rss.xml">RSS</a>
      </nav>
      <div class="site-header__tools">
        <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
          <kbd>/</kbd>
        </button>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle night road" aria-pressed="false">
          <svg class="theme-toggle__sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="2"/>
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/>
              <line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/>
              <line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/>
              <line x1="18.8" y1="5.2" x2="17" y2="7"/><line x1="7" y1="17" x2="5.2" y2="18.8"/>
            </g>
          </svg>
          <svg class="theme-toggle__moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-labelledby="search-heading" hidden>
    <div class="search-panel" role="document">
      <h2 class="search-heading" id="search-heading">Search the strip</h2>
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search releases, plugin API, status" autocomplete="off" aria-label="Search Milepost" aria-describedby="search-hint" aria-controls="search-results" aria-activedescendant="">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <p class="search-hint" id="search-hint">Type to filter. Arrow keys move, Enter opens, Esc closes.</p>
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>No mileposts match that.</p>
    </div>
  </div>
