{% include "header.html" %}
<h1>Items tagged with: <span style="color: var(--accent);">{{ term }}</span></h1>
<ul style="list-style: none; padding: 0;">
    {% if pages is defined %}
    {% for p in pages %}
    <li style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color);">
        <h2 style="border: none; padding: 0; margin-bottom: 0.5rem;"><a href="{{ p.url }}">{{ p.title }}</a></h2>
    </li>
    {% endfor %}
    {% endif %}
</ul>
{% include "footer.html" %}
