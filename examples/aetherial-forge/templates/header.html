<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ site.title }} - {{ page.title | default(value="Home") }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if page is defined and page.description is defined %}
    <meta name="description" content="{{ page.description }}">
    {% else %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: #1a1c23;
            --border-color: #2e323a;
            --text-main: #e2e4e9;
            --text-muted: #9ba1b0;
            --accent: #d4af37; /* Elegant gold accent */
            --font-heading: "Playfair Display", serif;
            --font-body: "Inter", "Helvetica Neue", sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a {
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }
        a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        header {
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .site-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .site-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .site-brand:hover {
            border-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        main {
            padding: 4rem 0;
            min-height: 60vh;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: normal;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }
        h1 {
            font-size: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }
        .post-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<header>
    <div class="container site-nav">
        <a href="{{ site.base_url }}/" class="site-brand">{{ site.title }}</a>
        <nav class="nav-links">
            <a href="{{ site.base_url }}/">Journal</a>
            <a href="{{ site.base_url }}/about/">Manifesto</a>
        </nav>
    </div>
</header>
<main class="container">
