{% include "header.html" %}
<h1>Taxonomy: {{ taxonomy | capitalize }}</h1>
<ul style="list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 1rem;">
    {% if terms is defined %}
    {% for term in terms %}
    <li>
        <a href="{{ site.base_url }}/{{ taxonomy }}/{{ term | slugify }}/" style="padding: 0.5rem 1rem; background-color: var(--surface-color); border: 1px solid var(--border-color); display: inline-block;">
            {{ term }}
        </a>
    </li>
    {% endfor %}
    {% endif %}
</ul>
{% include "footer.html" %}
