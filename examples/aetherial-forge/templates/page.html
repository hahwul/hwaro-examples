{% include "header.html" %}
<article>
    <header>
        <h1>{{ page.title }}</h1>
        {% if page.date is defined %}
        <div class="post-meta">{{ page.date | date(format="%B %d, %Y") }}</div>
        {% endif %}
    </header>
    <div class="content-body">
        {{ content | safe }}
    </div>
</article>
{% include "footer.html" %}
