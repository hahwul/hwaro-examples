{% extends "base.html" %}
{% block content %}
<main class="site-main">
  <h1>{{ page.title | e }}</h1>
  <p class="taxonomy-desc">Showing all terms for this taxonomy.</p>
  <ul class="section-list">
    {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">{{ term.name | e }}</a>
        <span class="count">({{ term.pages | length }})</span>
      </li>
    {% endfor %}
  </ul>
</main>
{% endblock %}
