<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #c77dff;
      --bg-color: #0f0c29;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --text-main: #e0e0e0;
      --text-muted: #9e9e9e;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 800px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      flex-grow: 1;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 1rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
    nav a {
      color: var(--text-main);
      text-decoration: none;
      margin-left: 1rem;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: var(--primary);
    }
    h1, h2, h3 {
      color: #fff;
    }
    a {
      color: var(--primary);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .site-footer {
      text-align: center;
      padding: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--glass-border);
      margin-top: 2rem;
    }
    .hljs {
      background: rgba(0, 0, 0, 0.5) !important;
      color: #fff !important;
      padding: 1rem;
      border-radius: 8px;
    }
    ul.section-list {
      list-style: none;
      padding: 0;
    }
    ul.section-list li {
      margin-bottom: 0.8rem;
      background: rgba(0,0,0,0.2);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
    }
    ul.section-list li a {
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
    <footer class="site-footer">
      <p>Powered by Hwaro | Aether Whisper Theme</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
