<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #ff0000;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.4;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -2px;
        }
        nav { display: flex; flex-direction: column; align-items: flex-end; }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        nav a:hover { border-color: var(--accent); }
        .provoke-hero {
            padding: 100px 0;
            text-align: left;
        }
        .provoke-hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 15vw;
            font-weight: 800;
            margin: 0;
            line-height: 0.7;
            text-transform: uppercase;
            letter-spacing: -0.08em;
        }
        .provoke-sub {
            font-size: 2.5rem;
            margin-top: 40px;
            max-width: 800px;
            font-weight: 700;
            line-height: 1.1;
        }
        article { padding: 100px 0; font-size: 1.5rem; }
        h2 { font-family: 'Syne', sans-serif; font-size: 5rem; text-transform: uppercase; letter-spacing: -3px; }
        .challenge-box {
            border: 5px solid var(--text);
            padding: 60px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">PROVOKE//<br>STUDIO</div>
            <nav>
                <a href="/">Challenge</a>
                <a href="/about">Response</a>
            </nav>
        </div>
    </header>
