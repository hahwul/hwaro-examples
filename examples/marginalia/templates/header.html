<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #d00;
            --margin-text: #888;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 60px;
        }
        header {
            grid-column: span 2;
            padding: 40px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .marginalia-hero {
            grid-column: span 2;
            padding: 80px 0;
        }
        .marginalia-hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article { padding: 40px 0; font-size: 1.3rem; }
        .margin-note {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--margin-text);
            border-left: 1px solid #eee;
            padding-left: 20px;
            margin-top: 40px;
        }
        .margin-note b { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">marginalia.</div>
        <nav>
            <a href="/">Notes</a>
            <a href="/about">Commentary</a>
        </nav>
    </header>
