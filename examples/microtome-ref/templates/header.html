<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #000; }
        body { background-color: #f5f5f5; color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .slice-surface { background: #fff; padding: 40px; border: 1px solid #ddd; position: relative; }
        .slice-line { height: 1px; background: #000; width: 100%; margin: 2px 0; opacity: 0.1; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">microtome.ref</div></header>
