{% extends "base.html" %}

{% block content %}
<header class="section-header">
  <h1>{{ taxonomy.name | capitalize }}: {{ term.name }}</h1>
</header>
<ul class="section-list">
  {% for p in pages %}
  <li>
    <a href="{{ base_url }}{{ p.permalink }}">{{ p.title | default(p.slug) }}</a>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
