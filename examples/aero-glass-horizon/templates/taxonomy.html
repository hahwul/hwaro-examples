{% extends "base.html" %}

{% block content %}
<header class="section-header">
  <h1>{{ taxonomy.name | capitalize }}</h1>
</header>
<ul class="section-list">
  {% for term in terms %}
  <li>
    <a href="{{ base_url }}/{{ taxonomy.name }}/{{ term.slug }}/">{{ term.name }}</a>
    <span style="float: right; color: var(--text-muted);">{{ term.count }} items</span>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
