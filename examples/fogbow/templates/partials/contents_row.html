<li class="contents-row">
  <a class="row-link" href="{{ base_url }}{{ entry.url }}">
    <span class="row-title">{{ entry.title | e }}</span>
    <span class="row-leader" aria-hidden="true"></span>
    <span class="row-meta">{% if entry.date %}<time datetime="{{ entry.date | date("%Y-%m-%d") }}">{{ entry.date | date("%b %Y") }}</time>{% endif %}{% if entry.extra.folio %}<span class="row-folio">fol.&thinsp;{{ entry.extra.folio }}</span>{% endif %}</span>
  </a>
  {% if entry.description %}<p class="row-gloss">{{ entry.description | e }}</p>{% endif %}
</li>
