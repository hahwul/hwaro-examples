<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="leaf">
    <div class="spine" aria-hidden="true"></div>
    <header class="running-head">
      <p class="rh-verso"><a class="rh-mast" href="{{ base_url }}/">Fogbow</a><span class="rh-sub">A bench journal</span></p>
      <p class="rh-recto"><span class="rh-label">{{ rh_label }}</span>{% if rh_folio %}<span class="rh-folio">fol.&thinsp;{{ rh_folio }}</span>{% endif %}</p>
    </header>
    <nav class="book-nav" aria-label="Primary">
      <a href="{{ base_url }}/bindings/">Bindings</a>
      <a href="{{ base_url }}/tags/">Threads</a>
      <a href="{{ base_url }}/about/">Colophon</a>
      <a href="{{ base_url }}/search/">Search</a>
    </nav>
