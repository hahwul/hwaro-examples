{% set rh_label = "Search the journal" %}
{% set rh_folio = "iii" %}
{% include "header.html" %}
    <main id="main">
      <header class="chapter-head">
        <p class="chapter-kicker">Combing the signatures</p>
        <h1 class="chapter-title stitched">{{ page.title | e }}</h1>
        <div class="chapter-intro prose">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search every entry</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="kettle stitch, wheat paste, grain direction&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="contents contents-main" id="search-results"></ol>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
