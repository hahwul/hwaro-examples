<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --line: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
            border-left: 1px solid var(--line);
            border-right: 1px solid var(--line);
            min-height: 100vh;
        }
        header {
            padding-bottom: 40px;
            border-bottom: 1px solid var(--line);
        }
        .logo {
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            border: 1px solid var(--line);
            padding: 5px 15px;
        }
        .bare-hero {
            padding: 100px 0;
            border-bottom: 1px solid var(--line);
        }
        .bare-hero h1 {
            font-size: 6rem;
            font-weight: 300;
            margin: 0;
            line-height: 1;
        }
        article { padding: 60px 0; }
        h2 { font-weight: 600; font-size: 1.5rem; text-transform: uppercase; margin-top: 0; }
        .box { border: 1px solid var(--line); padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">BAREBONE//01</div>
        <nav>
            <a href="/">Structure</a>
            <a href="/about">Skeleton</a>
        </nav>
    </header>
