<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #e0e0e0;
            --accent: #555;
            --cinematic-black: #000000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-style: italic;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.5;
        }
        .cinema-hero {
            padding: 100px 0;
            text-align: center;
            background: var(--cinematic-black);
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
        }
        .cinema-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            font-style: italic;
        }
        .aspect-ratio-box {
            width: 100%;
            aspect-ratio: 21 / 9;
            background: #111;
            margin: 60px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
        }
        article { padding: 80px 0; max-width: 800px; margin: 0 auto; }
        h2 { font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">CINEMAGRAPH</div>
            <nav>
                <a href="/">Frame</a>
                <a href="/about">Motion</a>
            </nav>
        </div>
    </header>
