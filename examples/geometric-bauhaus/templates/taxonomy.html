{% include "header.html" %}
  <main class="site-main">
    <div class="hero-section">
      <div>
        <h1 class="hero-title">Index: <span>{{ taxonomy_name | e }}</span></h1>
        <p class="hero-subtitle">Browse art archives classified by the {{ taxonomy_name | e }} taxonomy.</p>
      </div>
      <div class="hero-art-block">
        <div class="geometric-shape-container">
          <div class="shape-circle" style="background-color: var(--ochre);"></div>
          <div class="shape-square" style="background-color: var(--red);"></div>
          <div class="shape-triangle" style="border-bottom-color: var(--blue);"></div>
        </div>
      </div>
    </div>

    <div class="card" style="padding: 2rem;">
      <div class="badge-container" style="gap: 1.5rem;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
            #{{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
