<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;1,200&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9fbfd;
            --text: #5a6a7a;
            --accent: #a0b0c0;
            --white: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 2;
            letter-spacing: 1px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 200;
            font-size: 1.5rem;
            text-transform: lowercase;
            letter-spacing: 15px;
            font-style: italic;
            color: var(--accent);
        }
        nav { margin-top: 40px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.5;
        }
        .quiet-hero {
            padding: 100px 0;
            text-align: center;
        }
        .quiet-hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 5rem;
            font-weight: 200;
            margin: 0;
            font-style: italic;
            color: var(--text);
            opacity: 0.8;
        }
        article {
            background: var(--white);
            padding: 80px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        h2 { font-family: 'Crimson Pro', serif; font-size: 2.5rem; font-weight: 200; font-style: italic; margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">quietude.</div>
            <nav>
                <a href="/">Silence</a>
                <a href="/about">Stillness</a>
            </nav>
        </div>
    </header>
