<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --interview: #f8f8f8;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--interview);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
            border-bottom: 2px solid #000;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .interview-surface {
            background: #fff;
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
            border: 1px solid #eee;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
        .q { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: #999; margin-right: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">interview.mag</div>
            <nav>
                <a href="/">Feature</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
