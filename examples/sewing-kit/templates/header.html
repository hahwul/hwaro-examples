<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #4a3a2a;
            --accent: #5a4b41;
            --fabric: #f4ece4;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .kit-surface {
            background: var(--fabric);
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow), inset 2px 2px 5px rgba(255,255,255,0.5);
            margin-bottom: 80px;
            border-radius: 4px;
            border: 2px dashed #d8c4b4;
            position: relative;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid #d8c4b4; padding-bottom: 10px; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">sewing.kit</div>
            <nav>
                <a href="/">Stitch</a>
                <a href="/about">Fabric</a>
            </nav>
        </div>
    </header>
