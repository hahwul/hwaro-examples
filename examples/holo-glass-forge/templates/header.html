<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined %}{{ page.description | e }}{% elif section is defined %}{{ section.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} - {% elif section is defined and section.title %}{{ section.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="stylesheet" href="/css/style.css">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="site-wrapper">
    <header class="glass-panel site-header">
      <a href="/" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
