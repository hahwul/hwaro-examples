{% include "header.html" %}
    <main id="main">
      <header class="section-head">
        <p class="section-kicker">Find a week</p>
        <h1 class="section-title">{{ page.title | e }}</h1>
        <div class="section-intro">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the log</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="hills, electrolytes, twenty-miler…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="timeline timeline-search" id="search-results"></ol>
    </main>
{% include "footer.html" %}
