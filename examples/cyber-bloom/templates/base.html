<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% else %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="cyber-bg">
        <div class="glow-orb magenta"></div>
        <div class="glow-orb cyan"></div>
        <div class="glow-orb purple"></div>
    </div>

    <div class="container">
        {% include "header.html" %}

        <main class="glass-panel">
            {% block content %}{% endblock %}
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
