<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap');

    :root {
      --primary: #ff00ff; /* Neon Pink */
      --secondary: #00ffff; /* Cyan */
      --bg-dark: #050510;
      --bg-panel: rgba(10, 10, 25, 0.8);
      --text-main: #e0e0ff;
      --text-muted: #8888aa;
      --border-glow: #ff00ff80;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(255, 0, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(255, 0, 255, 0.2);
      box-shadow: 0 4px 20px -10px rgba(255, 0, 255, 0.3);
    }

    .site-logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      color: var(--secondary);
      text-shadow: 0 0 10px var(--secondary), 0 0 20px var(--secondary);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      transition: color 0.3s;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--secondary);
      box-shadow: 0 0 8px var(--secondary);
      transition: width 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--secondary);
    }

    .site-header nav a:hover::after {
      width: 100%;
    }

    .site-main {
      flex: 1;
      background: var(--bg-panel);
      padding: 2.5rem;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .site-footer {
      margin-top: 3rem;
      padding: 2rem 0;
      border-top: 1px solid rgba(0, 255, 255, 0.2);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Orbitron', sans-serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.8em;
      font-weight: 700;
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 0;
      color: var(--secondary);
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    h2 {
      font-size: 1.6rem;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
    }

    h3 { font-size: 1.2rem; }
    p { margin: 1.2em 0; font-size: 1.1rem; }

    a {
      color: var(--secondary);
      text-decoration: none;
      transition: all 0.2s;
    }

    a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary);
    }

    code {
      background: rgba(255, 0, 255, 0.1);
      color: var(--primary);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'Courier New', Courier, monospace;
      border: 1px solid rgba(255, 0, 255, 0.3);
    }

    pre {
      background: rgba(0, 0, 0, 0.6);
      padding: 1.2rem;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
    }
    pre code { background: none; padding: 0; border: none; color: #aaddff; text-shadow: none;}

    /* Components */
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; font-size: 1.1rem; }
    li::marker { color: var(--primary); }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      border-left: 3px solid var(--primary);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    ul.section-list li:hover {
      transform: translateX(5px);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
      background: rgba(255, 0, 255, 0.05);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.2rem; display: block; margin-bottom: 0.3rem;}

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.8rem; justify-content: center; align-items: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      border: 1px solid var(--secondary);
      color: var(--text-main);
      background: rgba(0, 255, 255, 0.05);
    }
    nav.pagination a:hover {
      background: rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      border: 1px solid var(--primary);
      background: rgba(255, 0, 255, 0.2);
      color: #fff;
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
