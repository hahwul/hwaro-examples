{% include "header.html" %}
  <main class="site-main">
    <section class="taxonomy-page fade-in">
      <header class="section-header">
        <div class="time-signature">
          <span class="measure-line"></span>
          <span class="measure-count">4/4</span>
          <span class="measure-line"></span>
        </div>
        <h1 class="section-title">{{ taxonomy_name | title }}</h1>
      </header>

      <div class="taxonomy-list">
        {% for term in taxonomy_terms | sort %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="taxonomy-tag">
          <span class="tag-name">#{{ term }}</span>
          <span class="tag-count">{{ taxonomy_pages | where(attribute="tags", value=term) | length }}</span>
        </a>
        {% endfor %}
      </div>
    </section>
  </main>
{% include "footer.html" %}
