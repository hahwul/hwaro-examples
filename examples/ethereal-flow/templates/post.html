{% include "header.html" %}
<main class="main-content">
  <div class="content-container">
    <article class="post-content frosted-container glass-card">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
          {% if page.date %}
          <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
          {% endif %}
          {% if page.taxonomies is defined and page.taxonomies.tags %}
          <div class="post-tags">
            {% for tag in page.taxonomies.tags %}
            <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </header>
      <div class="prose">
        {{ content | safe }}
      </div>
    </article>
  </div>
</main>
{% include "footer.html" %}
