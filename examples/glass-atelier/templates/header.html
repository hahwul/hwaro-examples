<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --glass: rgba(255, 255, 255, 0.8);
        }
        body {
            background-color: #f7f7f7;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }
        .atelier-hero {
            padding: 100px 0;
            text-align: center;
        }
        .atelier-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 80px;
            border: 1px solid #eee;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 80px;
        }
        h2 { font-weight: 600; font-size: 2.2rem; margin-top: 0; border-left: 5px solid var(--text); padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.atelier</div>
        <nav>
            <a href="/">Studio</a>
            <a href="/about">Works</a>
        </nav>
    </header>
