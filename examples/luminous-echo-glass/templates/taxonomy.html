{% include "header.html" %}
  <main class="site-main">
    <div class="glass-panel">
      <h1>All Terms</h1>
      <ul class="section-list" style="display: flex; flex-wrap: wrap; gap: 1rem; list-style: none; padding: 0;">
      {% for name, term in terms %}
        <li style="margin: 0; padding: 0.5rem 1rem;">
          <a href="{{ base_url }}{{ term.permalink }}">{{ term.name | e }} ({{ term.pages | length }})</a>
        </li>
      {% endfor %}
      </ul>
    </div>
  </main>
{% include "footer.html" %}
