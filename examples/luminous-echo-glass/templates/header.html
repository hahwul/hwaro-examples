<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --void-bg-1: #03010A;
      --void-bg-2: #080314;
      --orb-cyan: #00f0ff;
      --orb-magenta: #ff0055;
      --orb-purple: #8a2be2;
      --text-main: #f0f4f8;
      --text-muted: #a0aec0;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background: linear-gradient(135deg, var(--void-bg-1), var(--void-bg-2));
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Background Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      animation: pulse 8s infinite alternate ease-in-out;
    }
    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--orb-cyan);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px;
      height: 400px;
      background: var(--orb-magenta);
      bottom: 20%;
      right: 5%;
      animation-delay: -2s;
    }
    .orb-3 {
      width: 250px;
      height: 250px;
      background: var(--orb-purple);
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: -4s;
    }

    @keyframes pulse {
      0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
      100% { transform: scale(1.1) translate(20px, 20px); opacity: 0.7; }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin-top: 2rem;
      margin-bottom: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--orb-cyan), var(--orb-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--orb-cyan);
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-main);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
    }
    h1 { font-size: 2.5rem; margin-top: 0; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    p { margin: 1em 0; color: var(--text-muted); font-size: 1.1rem; }
    a { color: var(--orb-cyan); text-decoration: none; transition: all 0.2s ease; }
    a:hover { color: var(--orb-magenta); text-shadow: 0 0 8px rgba(255,0,85,0.4); }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--orb-cyan);
      border: 1px solid rgba(0, 240, 255, 0.2);
    }

    pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
    }
    pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 240, 255, 0.3);
    }
    ul.section-list li a { font-weight: 600; font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic; }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); color: var(--text-main); text-decoration: none; background: rgba(255,255,255,0.02); }
    nav.pagination a:hover { border-color: var(--orb-cyan); background: rgba(0,240,255,0.1); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--orb-cyan); background: rgba(0,240,255,0.15); color: #fff; }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); color: var(--text-muted); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Background Animation Elements -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
