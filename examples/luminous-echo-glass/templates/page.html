{% include "header.html" %}
  <main class="site-main">
    <article class="glass-panel">
      {% if page.title is present %}
        <h1>{{ page.title | e }}</h1>
      {% endif %}
      {% if page.date is present %}
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">
          Published on {{ page.date | date(format="%B %d, %Y") }}
        </p>
      {% endif %}
      <div class="content">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
