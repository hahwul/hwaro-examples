<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=IBM+Plex+Sans:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #ff00ff;
            --fashion: #f8f8f8;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--fashion);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 4rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            font-style: italic;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .spread-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 100px;
            display: flex;
            gap: 60px;
        }
        .spread-left, .spread-right { flex: 1; }
        h2 { font-family: 'Playfair Display', serif; font-size: 4rem; color: #000; margin-top: 0; line-height: 0.9; font-weight: 900; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">fashion.spread</div>
            <nav>
                <a href="/">Vogue</a>
                <a href="/about">Style</a>
            </nav>
        </div>
    </header>
