{% include "header.html" %}
  <article class="content">
    {% if page.title %}
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.date %}
      <div class="page-meta">{{ page.date | date("%Y-%m-%d") }}</div>
      {% endif %}
    </header>
    {% endif %}
    {{ content | safe }}
  </article>
{% include "footer.html" %}
