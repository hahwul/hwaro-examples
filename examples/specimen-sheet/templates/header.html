<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #555; }
        body { background-color: #f1f1f1; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 60px 40px; background: #fff; border: 1px solid #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; }
        .specimen-id { font-family: 'IBM Plex Mono'; font-size: 0.7rem; font-weight: 700; color: #999; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">specimen.sheet</div></header>
