{% include "header.html" %}
<main>
  <section class="page-content">
    <div class="container">
      <h1>{{ page.title }}</h1>
      <div class="prose">{{ content | safe }}</div>
      {% for post in section.pages %}
      <article class="post-item">
        <h2><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h2>
        {% if post.description %}<p>{{ post.description }}</p>{% endif %}
      </article>
      {% endfor %}
    </div>
  </section>
</main>
{% include "footer.html" %}
