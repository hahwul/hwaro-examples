<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f2;
            --text: #1a1a1a;
            --accent: #555;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fraunces', serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #ccc;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            text-transform: lowercase;
            letter-spacing: -2px;
            line-height: 0.8;
            transform: translateX(-10px);
        }
        nav { display: flex; gap: 40px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .diss-hero {
            padding: 120px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        .diss-hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 10rem;
            line-height: 0.7;
            margin: 0;
            transform: rotate(-10deg) translateX(40px);
            opacity: 0.1;
            position: absolute;
            z-index: -1;
        }
        .diss-title {
            font-family: 'Syne', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            line-height: 0.9;
            margin-top: 40px;
        }
        article {
            padding: 80px 0;
            background: #fff;
            margin-top: -60px;
            box-shadow: 40px 40px 0 #e0e0e0;
            position: relative;
            z-index: 1;
        }
        h2 { font-family: 'Syne', sans-serif; font-size: 3rem; text-transform: uppercase; margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">disso.<br>nance</div>
            <nav>
                <a href="/">Conflict</a>
                <a href="/about">Resolution</a>
            </nav>
        </div>
    </header>
