<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .display { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -.025em; }
    .obsidian-bg { background: #0a0a0c; background-image: linear-gradient(rgba(226,232,240,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(226,232,240,.03) 1px, transparent 1px); background-size: 36px 36px; }
    .glass { background: rgba(17,17,19,.85); border: 1px solid rgba(226,232,240,.15); backdrop-filter: blur(20px); }
    .section-label { font-size: 10px; letter-spacing: 3.5px; color: #e2e8f0; font-weight: 700; opacity: .6; }
    .metric { font-size: 42px; line-height: .85; font-weight: 700; font-family: 'Playfair Display', serif; }
    .sharp { clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); }
  </style>
</head>
<body class="bg-[#0a0a0c] text-[#e2e8f0] obsidian-bg">
