<script>
function initObsidian() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const t = parseFloat(el.dataset.count);
    let c = 0;
    const i = setInterval(() => {
      c += Math.max(1, Math.floor(t / 28));
      if (c >= t) { el.textContent = t; clearInterval(i); } else el.textContent = c;
    }, 24);
  });
  console.log('%c[OBSIDIAN CROWN] The blade is eternal. All kneel before glass.', 'color:#64748b');
}
window.addEventListener('load', initObsidian);
</script>
</body>
</html>
