<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | e }}">
    <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
    {{ og_all_tags }}
    {{ hreflang_tags }}
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #333333;
            --accent-color: #8a7b66;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: 'Playfair Display', Georgia, serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
        }
        header {
            padding: 4rem 0 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 3rem;
        }
        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .site-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-color);
            letter-spacing: -0.02em;
        }
        nav a {
            color: var(--accent-color);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: var(--text-color);
        }
        main {
            flex-grow: 1;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            font-weight: normal;
            color: var(--text-color);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-top: 0;
        }
        p {
            margin-bottom: 1.5rem;
        }
        a {
            color: var(--accent-color);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }
        a:hover {
            color: var(--text-color);
        }
        ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
        ul.section-list li { margin-bottom: 0.5rem; padding: 0.6rem 0; }
        ul.section-list li a { font-weight: 500; font-family: var(--font-serif); font-size: 1.2rem; text-decoration: none;}
        ul.section-list li a:hover { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px;}
    </style>
    {{ highlight_tags | safe }}
    {{ auto_includes_css }}
</head>
<body>
    <header>
        <div class="container nav-wrapper">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </div>
    </header>
    <main class="container site-main">
