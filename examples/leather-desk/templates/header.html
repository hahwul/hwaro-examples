<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2b1d1d;
            --text: #e0d0d0;
            --accent: #8b4513;
            --leather: #3d2b2b;
            --shadow: rgba(0,0,0,0.5);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
            background-image: radial-gradient(var(--leather) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #d2b48c;
            text-transform: lowercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .desk-surface {
            background: var(--leather);
            border-radius: 10px;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow), inset -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 2px solid #332222;
        }
        .desk-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 4rem;
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: #d2b48c;
        }
        article { font-size: 1.1rem; }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2.2rem; color: #d2b48c; margin-top: 0; border-bottom: 1px solid #443333; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">leather.desk</div>
            <nav>
                <a href="/">Office</a>
                <a href="/about">Craft</a>
            </nav>
        </div>
    </header>
