<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

    <div class="topbar-search">

      <input type="text" placeholder="Search...">
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->

  <div class="layout">
