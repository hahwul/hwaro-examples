<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #c2dfff;
      --primary-glow: rgba(194, 223, 255, 0.4);
      --accent: #e2f0ff;
      --text: #e6ebf1;
      --text-muted: #95a3b3;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #040814;
      --bg-glass: rgba(10, 16, 30, 0.6);
      --glow-moon: radial-gradient(circle at 50% 0%, rgba(194, 223, 255, 0.15) 0%, rgba(4, 8, 20, 0) 50%);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(20, 30, 60, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(30, 45, 80, 0.2) 0%, transparent 50%);
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--glow-moon);
      pointer-events: none;
      z-index: -1;
    }

    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      top: -10%; left: 20%;
      width: 40vw; height: 40vw;
      background: rgba(100, 150, 255, 0.08);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -20%; right: -10%;
      width: 50vw; height: 50vw;
      background: rgba(180, 200, 255, 0.05);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(5%, 10%); }
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin: 2rem 0 3rem;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
      text-shadow: 0 0 10px var(--primary-glow);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }

    .site-main { min-height: calc(100vh - 250px); }

    .glass-panel {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 700;
      color: var(--accent);
    }
    h1 { font-size: 2.5rem; margin-top: 0; letter-spacing: -0.03em; }
    h2 { font-size: 1.75rem; letter-spacing: -0.02em; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; color: var(--text); }

    a { color: var(--primary); text-decoration: none; transition: all 0.2s; }
    a:hover { text-shadow: 0 0 8px var(--primary-glow); }

    code {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }
    pre {
      background: rgba(5, 10, 20, 0.8);
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }
    ul.section-list li a { font-weight: 600; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); background: rgba(194, 223, 255, 0.05); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(194, 223, 255, 0.1); color: var(--primary); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; }

    blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-left: 3px solid var(--primary);
      background: linear-gradient(90deg, rgba(194, 223, 255, 0.05) 0%, transparent 100%);
      font-style: italic;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1rem; border-radius: 12px; }
      .glass-panel { padding: 1.5rem; border-radius: 12px; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page.section is defined %}{{ page.section }}{% endif %}">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
