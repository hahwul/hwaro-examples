{% include "header.html" %}

  <main class="page-main">
    <div class="section-header-block">
      <h1>{{ page.title }}</h1>
      {{ content | safe }}
    </div>
    {% if section and section.pages %}
    <div class="post-list">
      {% for post in section.pages %}
      <a href="{{ base_url }}{{ post.url }}" class="post-card">
        <div class="post-card-inner">
          <h2 class="post-card-title">{{ post.title }}</h2>
          <p class="post-card-description">{{ post.description | default("") }}</p>
          {% if post.date %}
          <time class="post-card-date">{{ post.date }}</time>
          {% endif %}
        </div>
      </a>
      {% endfor %}
    </div>
    {% endif %}
  </main>

{% include "footer.html" %}
