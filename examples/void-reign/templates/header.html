<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600&amp;display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -.03em; }
    .void-bg { background: #05050a; background-image: radial-gradient(circle at 30% 20%, rgba(167,139,250,.06) 0, transparent 60%), radial-gradient(circle at 75% 80%, rgba(196,181,253,.04) 0, transparent 55%); }
    .void-panel { background: #0a0a10; border: 1px solid #1f1f2e; }
    .ethereal { box-shadow: 0 0 0 1px rgba(167,139,250,.15), 0 20px 60px -15px rgb(0 0 0 / .6); }
    .section-label { font-size: 10px; letter-spacing: 3px; color: #a78bfa; font-weight: 700; }
    .metric { font-size: 42px; line-height: .85; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .void-grid { background-image: linear-gradient(rgba(167,139,250,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(167,139,250,.035) 1px, transparent 1px); background-size: 38px 38px; }
    .float { animation: float 6s ease-in-out infinite; }
    @keyframes float { 50% { transform: translateY(-6px); } }
  </style>
</head>
<body class="bg-[#05050a] text-[#e0d7f0] void-bg void-grid">
