<script>
function initVoid() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const t = parseFloat(el.dataset.count);
    let c = 0;
    const step = Math.max(1, Math.floor(t / 36));
    const i = setInterval(() => { c += step; if (c >= t) { el.textContent = t; clearInterval(i); } else el.textContent = c; }, 26);
  });
  console.log('%c[VOID] Empire floating. Nothing escapes the reign.', 'color:#7c6ae8');
}
window.addEventListener('load', initVoid);
</script>
</body>
</html>
