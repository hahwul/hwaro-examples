{% include "header.html" %}

<div class="w-full max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
  <div class="mb-12">
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-4 capitalize">Browse by {{ taxonomy_name }}</h1>
    <p class="text-xl text-gray-500">Explore all available {{ taxonomy_name }} below.</p>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}{{ term.url }}" class="group relative flex flex-col items-center justify-center p-6 bg-white rounded-xl border border-border hover:shadow-md transition-shadow duration-200">
      <span class="text-lg font-bold text-gray-900 group-hover:text-primary mb-2 capitalize">{{ term.name }}</span>
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
        {{ term.count }} items
      </span>
    </a>
    {% endfor %}
  </div>
</div>

{% include "footer.html" %}
