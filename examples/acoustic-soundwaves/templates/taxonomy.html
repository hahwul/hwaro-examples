{% include "header.html" %}

<main class="site-main">
  <div class="section-header">
    <h1 class="section-title">Taxonomy: {{ taxonomy_name }}</h1>
  </div>

  <div class="taxonomy-terms">
    <ul>
      {% for term in taxonomy_terms %}
        <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </div>
</main>

{% include "footer.html" %}
