<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="bar">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Dolomite home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true" focusable="false">
          <path d="M16 3 L29 11 L16 19 L3 11 Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M16 13 L29 21 L16 29 L3 21 Z" fill="currentColor" opacity="0.22"/>
        </svg>
        <span>Dolomite</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/spec/">Spec</a>
        <a href="{{ base_url }}/faq/">FAQ</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </div>
  </header>
