<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:wght@700&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --text: #aaa;
            --accent: #eee;
            --heavy: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Unna', serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            border-bottom: 20px solid var(--heavy);
            text-align: center;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .tome-hero {
            padding: 120px 0;
            text-align: center;
        }
        .tome-hero h1 {
            font-size: 6rem;
            font-weight: 700;
            margin: 0;
            color: var(--accent);
        }
        article {
            background: var(--heavy);
            padding: 100px;
            border: 1px solid #222;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            margin-bottom: 100px;
            font-size: 1.5rem;
        }
        h2 { font-size: 4rem; color: var(--accent); text-transform: uppercase; letter-spacing: -2px; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">TOME.</div>
            <nav>
                <a href="/">Chapter</a>
                <a href="/about">Vault</a>
            </nav>
        </div>
    </header>
