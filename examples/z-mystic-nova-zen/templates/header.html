<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site_title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #8C7B65;
      --bg: #F9F8F6;
      --text: #2C2A29;
      --text-muted: #7E7873;
      --border: #E8E5DF;
      --accent: #BFA98F;
      --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-serif: 'Georgia', serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: var(--font-main); background-color: var(--bg); color: var(--text); line-height: 1.8; margin: 0; padding: 0; }
    .wrapper { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
    header { display: flex; justify-content: space-between; align-items: baseline; padding: 4rem 0 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .logo { font-family: var(--font-serif); font-size: 1.8rem; font-weight: normal; color: var(--text); text-decoration: none; letter-spacing: 1px; }
    nav a { color: var(--text-muted); text-decoration: none; margin-left: 2rem; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
    nav a:hover { color: var(--primary); }
    main { min-height: 60vh; }
    h1, h2, h3 { font-family: var(--font-serif); font-weight: normal; color: var(--text); }
    h1 { font-size: 2.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.8rem; margin-top: 2.5rem; margin-bottom: 1rem; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
    a:hover { border-bottom-color: var(--primary); }
    .section-list { list-style: none; padding: 0; }
    .section-list li { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
    .section-list a { font-size: 1.2rem; color: var(--text); font-family: var(--font-serif); }
    .section-list a:hover { color: var(--primary); border-bottom-color: transparent; }
    blockquote { margin: 2rem 0; padding-left: 1.5rem; border-left: 3px solid var(--accent); color: var(--text-muted); font-style: italic; }
    code { background-color: rgba(140, 123, 101, 0.1); padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.9em; color: var(--text); }
    pre { background-color: var(--text); color: var(--bg); padding: 1.5rem; overflow-x: auto; border-radius: 4px; }
    pre code { background-color: transparent; color: inherit; padding: 0; }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="wrapper">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site_title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
