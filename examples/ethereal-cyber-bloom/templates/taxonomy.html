{% include "header.html" %}

<div class="glass-panel">
    <h1>Archive Index: {{ taxonomy_name | upper }}</h1>
    <ul class="post-list">
        {% for term in taxonomy_terms %}
            <li class="post-item" style="display:inline-block; border:none; margin:10px;">
                <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="btn-glow" style="padding: 15px 30px; font-size: 1.2rem;">
                    #{{ term }} <span style="font-size: 0.8rem; opacity: 0.7;"></span>
                </a>
            </li>
        {% endfor %}
    </ul>
</div>

{% include "footer.html" %}
