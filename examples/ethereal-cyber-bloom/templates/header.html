<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description is defined %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {{ canonical_tag | safe }}
    {{ og_all_tags | safe }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    {{ highlight_tags | safe }}
    {{ auto_includes | safe }}
</head>
<body>
    <div class="cyber-overlay"></div>
    <div class="grid-background"></div>
    <nav class="glass-nav">
        <a href="{{ base_url }}/" class="nav-brand">
            <span class="glitch-text" data-text="ECB">ECB</span>
        </a>
        <div class="nav-links">
            <a href="{{ base_url }}/about/">About</a>
            <a href="{{ base_url }}/posts/">Archive</a>
            <a href="{{ base_url }}/tags/">Tags</a>
        </div>
    </nav>
