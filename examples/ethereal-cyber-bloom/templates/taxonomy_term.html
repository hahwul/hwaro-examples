{% include "header.html" %}

<div class="glass-panel">
    <h1>Filtered Node: #{{ taxonomy_term }}</h1>
    <ul class="post-list">
    {% for p in pages %}
        <li class="post-item">
            <h2><a href="{{ p.url }}">{{ p.title }}</a></h2>
            <div class="post-meta">
                {% if p.date is defined %}<span class="date">{{ p.date | date("%Y-%m-%d") }}</span>{% endif %}
            </div>
        </li>
    {% endfor %}
    </ul>
</div>

{% include "footer.html" %}
