<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #ff0000; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; border: 1px solid var(--text); }
        header { padding-bottom: 20px; border-bottom: 5px solid var(--text); margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: -1px; }
        .spec-surface { padding: 40px 0; border-top: 1px solid var(--text); border-bottom: 1px solid var(--text); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">redline.spec</div></header>
