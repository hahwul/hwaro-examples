{% include "header.html" %}

<main class="page-content">
    <h1 class="page-title">{{ page.title }}</h1>

    {% if page.extra.image %}
    <div style="margin-bottom: 3rem; aspect-ratio: 16/9; overflow: hidden;">
        <img src="{{ base_url }}{{ page.extra.image }}" alt="{{ page.title }}" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    {% endif %}

    <div class="content-body">
        {{ content | safe }}
    </div>
</main>

{% include "footer.html" %}
