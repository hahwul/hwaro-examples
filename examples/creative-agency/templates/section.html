{% include "header.html" %}

<main>
    <div class="hero">
        <h1>{{ section.title }}</h1>
        {% if section.description %}
            <p style="font-size: 1.5rem; max-width: 600px;">{{ section.description }}</p>
        {% endif %}
    </div>

    <div class="grid-asymmetric">
        {% for post in site.pages %}
        {% if post.section == "projects" %}
            <a href="{{ base_url }}{{ post.url }}" class="project-card">
                <div style="width: 100%; height: 100%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #555;">{{ post.title }}</div>
                <div class="project-info">
                    <h2 class="project-title">{{ post.title }}</h2>
                    <div class="project-tags">{{ post.description }}</div>
                </div>
            </a>
        {% endif %}
        {% endfor %}
    </div>
</main>

{% include "footer.html" %}
