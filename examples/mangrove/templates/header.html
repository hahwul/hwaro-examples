<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {{ site.title | e }}{% else %}{{ site.title | e }} &mdash; {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,500&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {% raw %}<script>
    (function () {
      try {
        var t = localStorage.getItem("mangrove-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>{% endraw %}
</head>
<body data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="7" fill="var(--accent)"/>
          <path d="M16 7 L18.6 15.4 L16 24 L13.4 15.4 Z" fill="var(--accent-fg)"/>
          <path d="M8 16 L16 13.6 L24 16 L16 18.4 Z" fill="var(--accent-fg)" opacity="0.62"/>
        </svg>
        <span class="brand-text">
          <span class="brand-name">Mangrove</span>
          <span class="brand-tag" aria-hidden="true">coastal pilotage</span>
        </span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/pilotage/">Pilotage</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div class="topbar-tools">
        <button class="search-btn" id="search-button" type="button" aria-haspopup="dialog" aria-label="Search the handbook">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2L17 17"/></svg>
          <span class="search-btn-label">Search</span>
          <kbd class="kbd" aria-hidden="true">Ctrl K</kbd>
        </button>
        <button class="theme-btn" id="theme-button" type="button" aria-pressed="false" aria-label="Switch to night passage view">
          <svg class="icon-sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="10" cy="10" r="4"/><path d="M10 1.8v2M10 16.2v2M1.8 10h2M16.2 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M15.8 4.2l-1.4 1.4M5.6 14.4l-1.4 1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M16.5 12.2A7 7 0 0 1 7.8 3.5a7 7 0 1 0 8.7 8.7z"/></svg>
        </button>
      </div>
    </div>
  </header>
