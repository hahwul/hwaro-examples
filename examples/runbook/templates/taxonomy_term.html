{% include "header.html" %}
  <h1 class="text-2xl font-bold text-ops-dark mb-6">{{ taxonomy_term }}</h1>
  <div class="space-y-3">
    {% for page in taxonomy_pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-4 bg-ops-surface border border-ops-border rounded hover:border-gray-300 transition-all">
      <h2 class="font-medium text-ops-dark">{{ page.title }}</h2>
      {% if page.description %}<p class="text-sm text-ops-muted mt-1">{{ page.description }}</p>{% endif %}
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
