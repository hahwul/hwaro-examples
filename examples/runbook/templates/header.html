<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ops: { bg: '#ffffff', surface: '#f9fafb', border: '#e5e7eb', dark: '#1f2937', text: '#374151', muted: '#6b7280' },
            severity: { critical: '#dc2626', warning: '#d97706', info: '#2563eb' },
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-ops-bg text-ops-text font-sans; }
    .prose { @apply max-w-none text-ops-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-ops-dark; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-ops-dark border-b border-ops-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-ops-dark; }
    .prose p { @apply my-3 leading-relaxed; }
    .prose a { @apply text-severity-info hover:underline; }
    .prose strong { @apply font-semibold text-ops-dark; }
    .prose code { @apply bg-ops-surface px-1.5 py-0.5 rounded text-sm font-mono text-ops-dark border border-ops-border; }
    .prose pre { @apply bg-ops-dark text-gray-100 p-4 rounded my-4 overflow-x-auto font-mono text-sm border border-gray-700; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-gray-100; }
    .prose blockquote { @apply my-4 py-2 px-4 border-l-4 border-severity-warning bg-amber-50 text-ops-text; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5; }
    .prose ul li { @apply list-disc marker:text-ops-muted; }
    .prose ol li { @apply list-decimal marker:text-ops-muted; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-ops-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold text-ops-dark border border-ops-border; }
    .prose td { @apply px-4 py-2 border border-ops-border; }
    .badge-critical { @apply inline-block px-2 py-0.5 bg-red-100 text-severity-critical text-xs font-semibold rounded uppercase tracking-wide; }
    .badge-warning { @apply inline-block px-2 py-0.5 bg-amber-100 text-severity-warning text-xs font-semibold rounded uppercase tracking-wide; }
    .badge-info { @apply inline-block px-2 py-0.5 bg-blue-100 text-severity-info text-xs font-semibold rounded uppercase tracking-wide; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-ops-border bg-ops-bg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="flex items-center gap-2 font-bold text-ops-dark hover:text-severity-critical transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/incidents/" class="text-ops-muted hover:text-ops-dark transition-colors">Incidents</a>
        <a href="{{ base_url }}/deployments/" class="text-ops-muted hover:text-ops-dark transition-colors">Deployments</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
