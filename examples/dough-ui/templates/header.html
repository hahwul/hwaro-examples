<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e6e9ef;
            --text: #4a5568;
            --accent: #a0aec0;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.6);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .dough-hero {
            padding: 100px 0;
            background: var(--bg);
            border-radius: 80px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 25px 25px 50px var(--shadow), -25px -25px 50px var(--highlight);
        }
        .dough-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            color: var(--text);
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 50px;
            box-shadow: inset 15px 15px 40px var(--shadow), inset -15px -15px 40px var(--highlight);
        }
        h2 { font-weight: 600; font-size: 2rem; color: var(--text); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">dough.ui</div>
            <nav>
                <a href="/">Soft</a>
                <a href="/about">Elastic</a>
            </nav>
        </div>
    </header>
