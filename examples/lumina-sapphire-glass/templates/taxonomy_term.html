{% include "header.html" %}
<div class="glass-panel">
    <h1>{{ term }}</h1>
    <div class="post-list">
        {% if pages is defined %}
            {% for p in pages %}
                <div class="post-item" style="margin-bottom: 1.5rem;">
                    <h2><a href="{{ p.url }}">{{ p.title }}</a></h2>
                    <p>{{ p.description }}</p>
                </div>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% include "footer.html" %}
