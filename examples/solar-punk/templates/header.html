<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <style>
        :root {
            --bg-color: #fffaf0; /* Sun-bleached white */
            --text-color: #1b4d3e; /* Deep forest green */
            --primary-color: #00e676; /* Vibrant green */
            --secondary-color: #aeea00; /* Vibrant lime */
            --accent-color: #ffab00; /* Sun yellow/orange accent */
            --card-bg: #ffffff;
            --border-color: #b2dfdb;
            --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-serif: 'Georgia', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(174, 234, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header Navigation */
        .site-header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 3rem;
        }

        .site-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .site-title::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: var(--primary-color);
            border-radius: 50% 0 50% 50%; /* Leaf shape */
            transform: rotate(45deg);
        }

        .site-nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s, box-shadow 0.2s;
            padding-bottom: 2px;
        }

        .site-nav a:hover {
            color: var(--primary-color);
            box-shadow: inset 0 -2px 0 var(--primary-color);
        }

        /* Content Areas */
        main {
            min-height: 60vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-serif);
            margin-bottom: 1rem;
            color: var(--text-color);
            line-height: 1.3;
        }

        h1 {
            font-size: 2.5rem;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: rgba(0, 230, 118, 0.3);
            z-index: -1;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Post Cards */
        .post-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .post-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px 12px 12px 0; /* Tech but organic */
            padding: 2rem;
            box-shadow: 4px 4px 0 rgba(0, 230, 118, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary-color);
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0 rgba(0, 230, 118, 0.2);
        }

        .post-card h2 {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .post-card h2 a {
            color: var(--text-color);
        }

        .post-card h2 a:hover {
            text-decoration: none;
            color: var(--primary-color);
        }

        .post-meta {
            font-size: 0.9rem;
            color: #558b2f;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .post-summary {
            color: #33691e;
        }

        /* Tags */
        .tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            background-color: var(--secondary-color);
            color: var(--text-color);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
        }

        .tag:hover {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
        }

        /* Tech Element styling for code blocks */
        pre {
            background-color: #f1f8e9;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--secondary-color);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
        }

        code {
            background-color: #f1f8e9;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--text-color);
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        /* Page styling */
        .page-content {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .page-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .page-header h1::after {
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/posts/">Manifesto</a>
            </nav>
        </header>
        <main>
