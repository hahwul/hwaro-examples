<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --text: #eee;
            --accent: #555;
            --gallery: #1a1a1a;
            --shadow: rgba(0,0,0,0.8);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .gallery-surface {
            background: var(--gallery);
            padding: 100px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 80px;
            border: 1px solid #333;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">dark.gallery</div>
            <nav>
                <a href="/">Archive</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
