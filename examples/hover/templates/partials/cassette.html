<li class="cassette{% if plan.featured %} is-featured{% endif %}">
  <article class="cassette-shell" aria-labelledby="cassette-{{ plan.name | slugify }}-name">
    {% if plan.featured %}<p class="cassette-flag">Most loaded</p>{% endif %}
    <div class="cassette-label">
      <div class="cassette-reel-window" aria-hidden="true">
        <svg class="cassette-reel" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="23" fill="none" stroke="currentColor" stroke-width="2"></circle>
          <circle cx="30" cy="30" r="7" fill="currentColor"></circle>
          <g stroke="currentColor" stroke-width="1.4">
            <line x1="30" y1="12" x2="30" y2="19"></line>
            <line x1="30" y1="41" x2="30" y2="48"></line>
            <line x1="12" y1="30" x2="19" y2="30"></line>
            <line x1="41" y1="30" x2="48" y2="30"></line>
            <line x1="17" y1="17" x2="22" y2="22"></line>
            <line x1="38" y1="38" x2="43" y2="43"></line>
            <line x1="43" y1="17" x2="38" y2="22"></line>
            <line x1="22" y1="38" x2="17" y2="43"></line>
          </g>
        </svg>
      </div>
      <div class="cassette-label-text">
        <p class="cassette-format">{{ plan.format }}</p>
        <h3 class="cassette-name" id="cassette-{{ plan.name | slugify }}-name">{{ plan.name }}</h3>
        <p class="cassette-price"><span class="price-amount">{{ plan.price }}</span><span class="price-period">{{ plan.period }}</span></p>
      </div>
      <div class="cassette-reel-window" aria-hidden="true">
        <svg class="cassette-reel" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="23" fill="none" stroke="currentColor" stroke-width="2"></circle>
          <circle cx="30" cy="30" r="7" fill="currentColor"></circle>
          <g stroke="currentColor" stroke-width="1.4">
            <line x1="30" y1="12" x2="30" y2="19"></line>
            <line x1="30" y1="41" x2="30" y2="48"></line>
            <line x1="12" y1="30" x2="19" y2="30"></line>
            <line x1="41" y1="30" x2="48" y2="30"></line>
            <line x1="17" y1="17" x2="22" y2="22"></line>
            <line x1="38" y1="38" x2="43" y2="43"></line>
            <line x1="43" y1="17" x2="38" y2="22"></line>
            <line x1="22" y1="38" x2="17" y2="43"></line>
          </g>
        </svg>
      </div>
    </div>
    <div class="cassette-tape-strip" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <p class="cassette-tagline">{{ plan.tagline }}</p>
    <p class="cassette-side" aria-hidden="true">Side A</p>
    <ol class="cassette-tracklist" aria-label="{{ plan.name }} plan includes">
      {% for track in plan.features %}
      <li>{{ track }}</li>
      {% endfor %}
    </ol>
    <a class="cassette-cta" href="mailto:start@hover.fm?subject=Load%20the%20{{ plan.name }}%20tape">Load this tape</a>
  </article>
</li>
