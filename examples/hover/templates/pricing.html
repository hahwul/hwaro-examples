{% include "header.html" %}
<article class="page-head">
  <div class="page-head-inner">
    <p class="page-kicker">Tapes</p>
    <h1>{{ page.title | e }}</h1>
    {% if page.description %}<p class="page-lede">{{ page.description | e }}</p>{% endif %}
  </div>
</article>

<ul class="cassette-grid cassette-grid-standalone">
  {% for plan in page.extra.plans %}
  {% include "partials/cassette.html" %}
  {% endfor %}
</ul>

<div class="page-prose-wrap">
  <div class="page-prose">
    {{ content | safe }}
  </div>
</div>

<div class="page-cross-link">
  <a class="see-all" href="{{ base_url }}/features/">Read the full feature board <span aria-hidden="true">&rarr;</span></a>
</div>
{% include "footer.html" %}
