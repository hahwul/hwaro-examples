<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <meta name="theme-color" content="#14101c">
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="{{ site.title | e }} home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="none" stroke="currentColor" stroke-width="2"></circle>
          <path d="M9 20 L9 12 L13 12 L18 20 L18 12 L23 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span class="brand-word">Hover</span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/#features">Features</a>
        <a href="{{ base_url }}/#plans">Plans</a>
        <a href="{{ base_url }}/signal/">Signal</a>
      </nav>

      <div class="header-actions">
        <button type="button" class="search-trigger" id="search-trigger" aria-haspopup="dialog" aria-controls="search-overlay" data-search-url="{{ base_url }}/search.json">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"></circle><line x1="14" y1="14" x2="18.5" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line></svg>
          <span>Search</span>
          <kbd>/</kbd>
        </button>
        <a class="header-cta" href="{{ base_url }}/pricing/">Start hosting</a>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Site search" hidden>
    <div class="search-overlay-panel">
      <div class="search-overlay-head">
        <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"></circle><line x1="14" y1="14" x2="18.5" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line></svg>
        <input type="search" id="search-input" placeholder="Search episodes, plans, dispatches&hellip;" autocomplete="off" aria-label="Search Hover">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="4" y1="4" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line><line x1="16" y1="4" x2="4" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line></svg>
        </button>
      </div>
      <p class="search-hint" id="search-status" role="status" aria-live="polite">Type to search episodes and pages &mdash; results update as you go. Press Esc to close.</p>
      <ul class="search-results" id="search-results"></ul>
    </div>
  </div>

  <main id="main">
