{% include "header.html" %}
<main id="main" class="interior-main">
  <div class="sig-frame interior-container">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <article class="prose">
      <h1 class="page-title">{{ page.title | e }}</h1>
      {% if page.date %}
        <time class="page-date" datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
      {% endif %}
      <div class="prose-content">
        {{ content | safe }}
      </div>
      {% if page.tags %}
      <div class="page-tags-section">
        <span class="tags-label">Filed under:</span>
        <ul class="tag-list">
          {% for t in page.tags %}<li><a href="{{ get_taxonomy_url(kind="tags", term=t) }}">{{ t }}</a></li>{% endfor %}
        </ul>
      </div>
      {% endif %}
    </article>
  </div>
</main>
{% include "footer.html" %}
