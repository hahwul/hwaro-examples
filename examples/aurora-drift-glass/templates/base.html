<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030408;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-cyan: #00f2fe;
            --accent-purple: #8a2be2;
            --accent-pink: #ff007f;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-color);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, var(--accent-pink) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation-duration: 28s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 10%) scale(1.1); }
            66% { transform: translate(-5%, 5%) scale(0.9); }
            100% { transform: translate(10%, -5%) scale(1.05); }
        }

        /* Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3rem 0;
            margin-bottom: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 0;
            font-weight: 700;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 { font-size: 2rem; color: #fff; margin-top: 2rem; }

        a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        p {
            line-height: 1.7;
            color: var(--text-muted);
        }

        /* Glass Panel Container */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--glass-shadow);
            margin-bottom: 3rem;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: auto;
        }

    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>{{ site.title }}</h1>
            <div class="nav-links">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about">About</a>
            </div>
        </header>

        <main>
            <div class="glass-panel">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer>
            <p>&copy; {{ current_year }} {{ site.title }}. Powered by Hwaro.</p>
        </footer>
    </div>
</body>
</html>
