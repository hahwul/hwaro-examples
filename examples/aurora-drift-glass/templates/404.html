{% extends "base.html" %}

{% block content %}
<div class="error-page" style="text-align: center; padding: 3rem 0;">
    <h2 style="font-size: 5rem; margin-bottom: 1rem; color: var(--accent-pink);">404</h2>
    <p style="font-size: 1.5rem; margin-bottom: 2rem;">Lost in the aurora drift. The page you're looking for doesn't exist.</p>
    <a href="{{ base_url }}/" style="display: inline-block; padding: 0.75rem 1.5rem; background: rgba(255,255,255,0.1); border: 1px solid var(--accent-cyan); border-radius: 8px; color: var(--text-main); font-weight: 500; transition: all 0.3s;">Return to Home</a>
</div>
{% endblock %}
