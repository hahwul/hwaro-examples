<!DOCTYPE html>
<html lang="{{ page_language | default("en") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  <footer>
    <div class="container">
      &copy; {{ current_year }} {{ site.title }}
    </div>
  </footer>
</body>
</html>
