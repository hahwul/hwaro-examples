<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0410;
      --velvet: #4b003a;
      --neon-pink: #ff007f;
      --neon-cyan: #00f0ff;
      --text-main: #f0f0f0;
      --glass-bg: rgba(75, 0, 58, 0.2);
      --glass-border: rgba(255, 0, 127, 0.3);
    }
    body {
      margin: 0;
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, #1a0b2e 0%, var(--bg-dark) 70%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1, h2, h3, .brand {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a:hover {
      color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink);
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .site-header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(10, 4, 16, 0.8);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(255, 0, 127, 0.15);
    }
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--velvet);
    }
    .nav-links {
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
      width: 100%;
    }
    .content-area {
      margin-top: 20px;
    }
    .cyber-btn {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .cyber-btn:hover {
      background: var(--neon-cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 15px var(--neon-cyan);
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <header class="site-header">
    <a href="{{ base_url }}/" class="brand">{{ site.title }}</a>
    <nav class="nav-links">
      <a href="{{ base_url }}/">Nexus</a>
      <a href="{{ base_url }}/about/">Core Data</a>
    </nav>
  </header>
  <main class="container">
    <div class="glass-panel content-area">
