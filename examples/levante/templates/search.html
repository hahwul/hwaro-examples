{% include "header.html" %}
  <main id="main" class="main">
    <article class="page search-page">
      <p class="page-kicker">Find a species, cove, or tag</p>
      <h1 class="page-title">{{ page.title | e }}</h1>
      {% if page.description %}<p class="page-lede">{{ page.description | e }}</p>{% endif %}

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the tide log</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="urchin, Roig, anemones…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="search-results" id="search-results"></ol>
    </article>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
