<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="{{ base_url }}{{ lang_prefix }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" role="img" aria-label="Levante wave mark">
          <path d="M4 15.5c2.1 0 2.7-2.3 4.8-2.3s2.7 2.3 4.8 2.3 2.7-2.3 4.8-2.3 2.7 2.3 4.8 2.3 2.7-2.3 4.8-2.3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="4" y1="22" x2="28" y2="22" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <span class="brand-word">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/tide-logs/">Tide Logs</a>
        <a href="{{ base_url }}{{ lang_prefix }}/about/">About</a>
        <a href="{{ base_url }}{{ lang_prefix }}/search/">Search</a>
      </nav>
    </div>
  </header>
