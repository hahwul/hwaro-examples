title = "Basalt"
description = "Docs for a partitioned log broker built for at-least-once delivery at scale"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true
mode = "server"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[og]
type = "website"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
