{% include "header.html" %}
<main class="content">
  <header>
    <h1>{{ section.title }}</h1>
  </header>
  <div class="post-list">
    {% for page in section.pages %}
    <article class="post-item">
      <span class="date">{{ page.date | date("%B %d, %Y") }}</span>
      <h3><a href="{{ base_url }}/{{ page.path }}">{{ page.title }}</a></h3>
      <p>{{ page.description }}</p>
    </article>
    {% endfor %}
  </div>
</main>
{% include "footer.html" %}
