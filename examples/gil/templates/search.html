{% include "header.html" %}
    <main id="main">
      <header class="section-head">
        <p class="section-kicker">Find a kilometre</p>
        <h1 class="section-title">{{ page.title | e }}</h1>
        <div class="section-intro">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the journal</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="granite, shelters, rain on the fly sheet…" autocomplete="off" autofocus>
      </form>
      <div class="search-status" id="search-status" role="status" aria-live="polite"></div>
      <ol class="trail trail-results" id="search-results"></ol>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
