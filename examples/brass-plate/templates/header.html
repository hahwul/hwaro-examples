<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eee;
            --text: #333;
            --accent: #b8860b;
            --brass: #d4af37;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: #e0e0e0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .brass-plate {
            background: var(--brass);
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow), -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 2px solid #b8860b;
            border-radius: 4px;
            position: relative;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 1px solid #b8860b; padding-bottom: 10px; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: #444; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">brass.plate</div>
            <nav>
                <a href="/">Honor</a>
                <a href="/about">Record</a>
            </nav>
        </div>
    </header>
