{% include "header.html" %}
<article style="animation: fadeIn 0.8s ease-in;">
  <h1 style="font-size: 2.5rem; font-weight: 300; margin-bottom: 0.5rem; color: var(--text);">{{ page.title }}</h1>
  {% if page.date %}
    <time style="color: var(--accent); font-size: 0.9rem; display: block; margin-bottom: 2rem;">{{ page.date }}</time>
  {% endif %}
  <div class="content" style="font-size: 1.1rem; color: #4a4a4a;">
    {{ content | safe }}
  </div>
</article>
<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .content h2 { font-weight: 400; margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  .content p { margin-bottom: 1.5rem; }
</style>
