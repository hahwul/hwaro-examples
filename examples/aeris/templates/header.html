<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | e }}">
  <style>
    :root { --bg: #fdfdfc; --text: #2b2b2b; --accent: #8e9eab; --border: #e6e6e6; }
    body { margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }
    header { padding: 2rem 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    h1 { font-weight: 300; font-size: 1.8rem; margin: 0; letter-spacing: 0.05em; color: var(--accent); }
    nav a { color: var(--text); text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.3s ease; }
    nav a:hover { color: var(--accent); }
    main { padding: 4rem 5%; max-width: 800px; margin: 0 auto; min-height: 60vh; }
  </style>
  {{ auto_includes_css }}
  {{ highlight_tags | safe }}
</head>
<body>
  <header>
    <h1><a href="{{ base_url }}/" style="color:inherit; text-decoration:none;">{{ site.title }}</a></h1>
    <nav>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
