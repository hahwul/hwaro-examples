<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e3a5f;
            --text: #fff;
            --accent: #ffcc00;
            --blueprint: #2c5282;
            --shadow: rgba(0,0,0,0.3);
            --highlight: rgba(255,255,255,0.1);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .blueprint-surface {
            background: var(--blueprint);
            border-radius: 4px;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow), -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
        }
        .blueprint-surface::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">blueprint.table</div>
            <nav>
                <a href="/">Draft</a>
                <a href="/about">Plan</a>
            </nav>
        </div>
    </header>
