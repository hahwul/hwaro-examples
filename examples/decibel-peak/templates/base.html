<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Saira+Extra+Condensed:wght@900&family=Anonymous+Pro&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --red: #FF0000;
      --black: #000000;
      --white: #FFFFFF;
      --dark-gray: #111111;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Anonymous Pro', monospace;
      text-transform: uppercase;
      line-height: 1.2;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 4rem 0;
      border-bottom: 20px solid var(--red);
    }

    .site-title {
      font-family: 'Dela Gothic One', cursive;
      font-size: 200px;
      color: var(--red);
      margin: 0;
      line-height: 0.8;
      letter-spacing: 0;
      word-break: break-all;
    }

    nav {
      margin-top: 2rem;
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid var(--white);
      padding: 0.5rem 1rem;
    }

    nav a:hover {
      background-color: var(--red);
      border-color: var(--red);
    }

    main {
      padding: 4rem 0;
    }

    .act-name {
      font-family: 'Saira Extra Condensed', sans-serif;
      font-weight: 900;
      font-size: 80px;
      line-height: 0.9;
      margin: 0;
      color: var(--white);
    }

    .tech-specs {
      font-family: 'Anonymous Pro', monospace;
      font-size: 13px;
      color: var(--red);
      margin-top: 1rem;
    }

    .waveform-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.1;
      pointer-events: none;
    }

    .divider {
      height: 2px;
      background-color: var(--white);
      margin: 4rem 0;
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      width: 2px;
      height: 20px;
      background-color: var(--red);
      transform: rotate(45deg);
    }

    .vu-meter {
      width: 300px;
      height: 150px;
      border: 4px solid var(--white);
      margin: 4rem auto;
      position: relative;
      overflow: hidden;
    }

    .vu-needle {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 4px;
      height: 140px;
      background-color: var(--red);
      transform-origin: bottom center;
      transform: rotate(60deg);
    }

    .warning-box {
      border: 10px solid var(--red);
      padding: 2rem;
      margin: 4rem 0;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    footer {
      padding: 4rem 0;
      border-top: 2px solid var(--white);
      text-align: center;
    }

    @media (max-width: 768px) {
      .site-title { font-size: 80px; }
      .act-name { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="waveform-bg">
    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M0 50 L10 20 L20 80 L30 10 L40 90 L50 30 L60 70 L70 5 L80 95 L90 40 L100 50" fill="none" stroke="white" stroke-width="0.5" />
    </svg>
  </div>

  <header>
    <div class="container">
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">ACTS</a>
        <a href="{{ base_url }}/about/">SPECS</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>MAXIMUM VOLUME // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
</body>
</html>
