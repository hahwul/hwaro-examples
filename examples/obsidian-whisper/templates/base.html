<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #bb86fc;
            --accent-glow: rgba(187, 134, 252, 0.4);
            --border-color: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-heading: "Georgia", "Times New Roman", serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: text-shadow 0.3s ease;
        }

        a:hover {
            text-shadow: 0 0 8px var(--accent-glow);
            text-decoration: underline;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: normal;
            color: #ffffff;
            margin-top: 2em;
            margin-bottom: 1em;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        header {
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .site-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .site-title:hover {
            text-decoration: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            margin-right: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--accent);
        }

        main {
            flex: 1;
        }

        footer {
            margin-top: 60px;
            padding: 30px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        code {
            background-color: #1a1a1a;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
            color: #cccccc;
            border: 1px solid #333;
        }

        pre code {
            display: block;
            padding: 15px;
            overflow-x: auto;
            line-height: 1.4;
        }

        blockquote {
            border-left: 3px solid var(--accent);
            margin: 0;
            padding-left: 20px;
            color: #aaaaaa;
            font-style: italic;
        }

        .page-list {
            list-style: none;
            padding: 0;
        }

        .page-list li {
            margin-bottom: 20px;
        }

        .page-list h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .page-list h3 a {
            color: var(--text-main);
        }

        .page-list h3 a:hover {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .page-date {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 10px;
        }

        /* Fix for code highlighting styles */
        pre code.hljs {
            background-color: #1a1a1a !important;
            color: #e0e0e0 !important;
        }
    </style>
    {% if site.highlight is defined and site.highlight.enabled %}
        {{ highlight_css | safe }}
    {% endif %}
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="/">Home</a>
                <a href="/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2024 {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
