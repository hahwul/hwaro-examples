<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --accent-color: #d1d1d1;
            --border-color: #333333;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .site-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        nav a {
            color: var(--accent-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: lowercase;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        nav a:hover {
            color: var(--text-color);
            border-bottom-color: var(--text-color);
        }

        main {
            flex: 1;
        }

        footer {
            border-top: 2px solid var(--border-color);
            padding-top: 1rem;
            margin-top: 4rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-color);
            text-align: right;
            text-transform: uppercase;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 1.5rem; }
        h2 { font-size: 2rem; margin-top: 2rem; }
        h3 { font-size: 1.5rem; margin-top: 1.5rem; }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: #e0e0e0;
        }

        a {
            color: var(--text-color);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        a:hover {
            text-decoration-thickness: 2px;
        }

        code {
            font-family: var(--font-mono);
            background-color: #1a1a1d;
            padding: 0.2em 0.4em;
            font-size: 0.9em;
            border: 1px solid var(--border-color);
        }

        pre {
            background-color: #111114;
            padding: 1.5rem;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border: none;
            color: #d1d1d1;
        }

        blockquote {
            border-left: 4px solid var(--text-color);
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: var(--accent-color);
        }

        hr {
            border: 0;
            border-top: 1px dashed var(--border-color);
            margin: 2rem 0;
        }

        ul, ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
            color: #e0e0e0;
        }

        li {
            margin-bottom: 0.5rem;
        }

        .meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 2rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-list li {
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .post-list li:hover {
            border-color: var(--text-color);
        }

        .post-list h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
        }

        .post-list h2 a {
            text-decoration: none;
        }

        .post-list .meta {
            margin-bottom: 1rem;
            border: none;
            padding: 0;
        }

        .post-list p {
            margin-bottom: 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></div>
            <nav>
                <a href="{{ base_url }}/about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            {{ site.title }} &copy; 2024
        </footer>
    </div>
</body>
</html>
