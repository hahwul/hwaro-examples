{% extends "base.html" %}

{% block content %}
    {{ content | safe }}

    <ul class="post-list">
    {% for page in pages %}
        <li>
            <div class="meta">{{ page.date | date(format="%Y-%m-%d") }}</div>
            <h2><a href="{{ base_url }}{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.description %}
            <p>{{ page.description }}</p>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
{% endblock %}
