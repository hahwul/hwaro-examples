{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ site.title }}{% endblock %}

{% block content %}
    <article>
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="meta">{{ page.date | date(format="%Y-%m-%d") }}</div>
        {% endif %}

        <div class="content">
            {{ content | safe }}
        </div>
    </article>
{% endblock %}
