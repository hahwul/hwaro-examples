<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="shell header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Torque, home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
          <rect x="8" y="11" width="16" height="12" rx="2" fill="currentColor"/>
          <rect x="11" y="15" width="10" height="2" rx="1" fill="var(--bg)" opacity="0.6"/>
        </svg>
        <span>Torque</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/keyboards/">Keyboards</a>
        <a href="{{ base_url }}/switches/">Switches</a>
        <a href="{{ base_url }}/materials/">Materials</a>
        <a href="{{ base_url }}/support/">Support</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
