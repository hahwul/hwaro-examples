{% include "header.html" %}
<main id="main">
  <section class="page-masthead">
    <div class="shell">
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      {% if page.description %}<p class="page-lede">{{ page.description | e }}</p>{% endif %}
    </div>
  </section>
  <section class="page-body">
    <div class="shell prose-shell">
      <div class="prose">
        {{ content | safe }}
      </div>
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </section>
</main>
{% include "footer.html" %}
