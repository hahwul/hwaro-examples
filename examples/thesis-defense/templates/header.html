<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=Cinzel:wght@400;600;700;900&family=STIX+Two+Text:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Dissertation home">
        <!-- SVG institutional seal/crest -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Outer ring -->
          <circle cx="24" cy="24" r="22" fill="none" stroke="#c4a35a" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="19" fill="none" stroke="#c4a35a" stroke-width="0.8"/>
          <!-- Shield shape -->
          <path d="M16,14 L32,14 L32,28 Q24,36 16,28 Z" fill="none" stroke="#c4a35a" stroke-width="1.2"/>
          <!-- Book inside shield -->
          <line x1="24" y1="18" x2="24" y2="30" stroke="#c4a35a" stroke-width="0.8"/>
          <path d="M19,19 Q21.5,21 24,19" fill="none" stroke="#c4a35a" stroke-width="0.6"/>
          <path d="M24,19 Q26.5,21 29,19" fill="none" stroke="#c4a35a" stroke-width="0.6"/>
          <line x1="19" y1="22" x2="23" y2="22" stroke="#c4a35a" stroke-width="0.4" opacity="0.6"/>
          <line x1="25" y1="22" x2="29" y2="22" stroke="#c4a35a" stroke-width="0.4" opacity="0.6"/>
          <line x1="19" y1="24" x2="23" y2="24" stroke="#c4a35a" stroke-width="0.4" opacity="0.6"/>
          <line x1="25" y1="24" x2="29" y2="24" stroke="#c4a35a" stroke-width="0.4" opacity="0.6"/>
          <!-- Top text arc placeholder -->
          <text x="24" y="10" text-anchor="middle" font-family="'Cinzel',serif" font-size="3.5" fill="#c4a35a" letter-spacing="0.15em">UNIVERSITAS</text>
        </svg>
        <span class="logo-text">
          <span class="institution-name">Massachusetts Institute of Technology</span>
          <span class="department-name">Department of Physics</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">TITLE PAGE</a>
        <a href="{{ base_url }}/chapters/">CHAPTERS</a>
        <a href="{{ base_url }}/committee/">COMMITTEE</a>
        <a href="{{ base_url }}/abstract/">ABSTRACT</a>
      </nav>
    </header>
