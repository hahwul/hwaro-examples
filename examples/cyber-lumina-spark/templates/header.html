<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #00ffcc;
      --secondary: #ff00ff;
      --text: #e0e0e0;
      --text-muted: #8b9bb4;
      --border: #1a1c29;
      --bg: #08090f;
      --bg-subtle: #0d0e15;
      --glow: 0 0 10px rgba(0, 255, 204, 0.5), 0 0 20px rgba(0, 255, 204, 0.3);
      --glass: rgba(13, 14, 21, 0.7);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 0; border-bottom: 1px solid var(--primary);
      margin-bottom: 2rem; box-shadow: 0 4px 10px rgba(0, 255, 204, 0.1);
    }
    .site-logo {
      font-weight: bold; font-size: 1.5rem; color: var(--primary);
      text-decoration: none; text-shadow: var(--glow); text-transform: uppercase; letter-spacing: 2px;
    }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text); text-decoration: none; font-size: 1rem;
      text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
    }
    .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }
    .site-main { min-height: calc(100vh - 200px); padding: 2rem; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 8px; }
    .site-footer {
      margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--primary);
      color: var(--text-muted); font-size: 0.85rem; text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; color: var(--primary); text-shadow: var(--glow); }
    h1 { font-size: 2rem; margin-top: 0; text-transform: uppercase; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { text-shadow: 0 0 5px var(--secondary); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; color: var(--primary); border: 1px solid var(--primary); }
    pre { background: var(--bg-subtle); padding: 1rem; border-radius: 6px; overflow-x: auto; border: 1px solid var(--primary); box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle);
      border-radius: 6px; border: 1px solid var(--border); border-left: 4px solid var(--primary); transition: 0.3s;
    }
    ul.section-list li:hover { border-left-color: var(--secondary); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
    ul.section-list li a { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
