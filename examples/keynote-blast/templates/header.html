<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #ff007f;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.2;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -2px;
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-weight: 400;
            font-size: 0.9rem;
            text-transform: lowercase;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        nav a:hover {
            opacity: 1;
        }
        .blast-hero {
            padding: 100px 0;
        }
        .blast-hero h1 {
            font-size: 12vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
        .blast-sub {
            font-size: 2rem;
            font-weight: 400;
            margin-top: 40px;
            max-width: 800px;
            line-height: 1.4;
        }
        article {
            padding: 80px 0;
            font-size: 1.5rem;
            line-height: 1.6;
        }
        h2 { font-size: 3rem; margin-top: 100px; text-transform: uppercase; letter-spacing: -2px; }
        p { opacity: 0.8; margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">BLAST/2026</div>
            <nav>
                <a href="/">Talks</a>
                <a href="/about">Speakers</a>
            </nav>
        </div>
    </header>
