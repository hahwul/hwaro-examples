<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="blast-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Keynote Blast home">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-blast" aria-hidden="true">
          <circle cx="24" cy="24" r="4" fill="#ff3a2d"/>
          <circle cx="24" cy="24" r="10" fill="none" stroke="#ff3a2d" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="16" fill="none" stroke="#ff3a2d" stroke-width="1" opacity="0.7"/>
          <circle cx="24" cy="24" r="22" fill="none" stroke="#ff3a2d" stroke-width="0.8" opacity="0.4"/>
          <g stroke="#ff3a2d" stroke-width="1.5" stroke-linecap="round">
            <line x1="24" y1="2" x2="24" y2="8"/>
            <line x1="24" y1="40" x2="24" y2="46"/>
            <line x1="2" y1="24" x2="8" y2="24"/>
            <line x1="40" y1="24" x2="46" y2="24"/>
            <line x1="8" y1="8" x2="12" y2="12"/>
            <line x1="36" y1="36" x2="40" y2="40"/>
            <line x1="40" y1="8" x2="36" y2="12"/>
            <line x1="12" y1="36" x2="8" y2="40"/>
          </g>
        </svg>
        <span class="logo-text">KEYNOTE<br>BLAST</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">DETONATION</a>

      </nav>
    </header>
