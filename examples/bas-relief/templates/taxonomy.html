{% include "header.html" %}
    <main class="site-main">
      <h1 class="section-heading">{{ taxonomy_name }}</h1>
      <div class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}{{ term.url }}" class="taxonomy-badge">
          {{ term.name }} <span class="taxonomy-count">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
      </div>
    </main>
{% include "footer.html" %}
