<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Aphelion — home">
        <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="19" cy="19" r="7" fill="var(--accent)"></circle>
          <path d="M4 21.5h16" stroke="var(--accent)" stroke-width="2" opacity="0.55" stroke-linecap="round"></path>
        </svg>
        <span class="brand__name">Aphelion</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/screenings/">Screenings</a>
        <a href="{{ base_url }}/venue/">Venue</a>
        <a href="{{ base_url }}/tickets/">Tickets</a>
      </nav>
    </div>
  </header>
