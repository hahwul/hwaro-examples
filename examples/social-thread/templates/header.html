<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #1d9bf0; --border: #eff3f4; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); }
        .logo { font-weight: 700; font-size: 1.2rem; }
        .thread-line { width: 2px; background: var(--border); position: absolute; top: 0; bottom: 0; left: 30px; }
        .post { position: relative; padding: 20px 20px 20px 70px; border-bottom: 1px solid var(--border); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #eee; position: absolute; left: 10px; top: 20px; z-index: 1; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">social.thread</div></header>
