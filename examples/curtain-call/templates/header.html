<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Unna:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #991b1b;
      --bg: #1a0505;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #450a0a;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Libre Baskerville', serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    header {
      padding: 6rem 0;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4rem;
    }
    
    .logo {
      font-family: 'Unna', serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
    
    nav {
      margin-top: 2rem;
    }
    
    .nav-links {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 3rem;
    }
    
    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-family: 'Unna', serif;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    
    .nav-links a:hover {
      color: var(--primary);
    }
    
    main {
      padding-bottom: 6rem;
    }
    
    h1, h2, h3 {
      font-family: 'Unna', serif;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    
    h1 { font-size: 3.5rem; text-align: center; margin-bottom: 3rem; color: var(--text); }
    h2 { font-size: 2rem; margin-top: 4rem; color: var(--primary); border-top: 1px solid var(--border); padding-top: 1rem; }
    
    p { margin-bottom: 2rem; }
    
    .post-entry {
      margin-bottom: 5rem;
      text-align: center;
    }
    
    .meta {
      font-family: 'Unna', serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    
    .btn {
      display: inline-block;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 1rem 2.5rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-family: 'Unna', serif;
      font-weight: 700;
      transition: all 0.4s;
    }
    
    .btn:hover {
      background: var(--primary);
      color: var(--bg);
    }
    
    footer {
      padding: 6rem 0 4rem;
      text-align: center;
      border-top: 1px solid var(--border);
      font-family: 'Unna', serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    
    footer a { color: var(--text); }
    
    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      .logo { font-size: 1.75rem; }
    }
  </style>
  {{ og_all_tags }}
  {{ highlight_css }}
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ base_url }}/" class="logo">Curtain Call</a>
      <nav>
        <ul class="nav-links">
          <li><a href="{{ base_url }}/posts/">Acts</a></li>
          <li><a href="{{ base_url }}/about/">Backstage</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="container">
