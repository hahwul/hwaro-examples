<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Josefin+Sans:wght@300&family=Overpass+Mono&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --velvet: #2A0000;
      --crimson: #800000;
      --gold: #FFD700;
      --black: #000000;
      --white: #FFFFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Josefin Sans', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .curtain-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      border: 40px solid transparent;
      border-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 Q 25 0 25 50 Q 25 100 0 100 L100 100 Q 75 100 75 50 Q 75 0 100 0 Z' fill='%232A0000'/%3E%3C/svg%3E") 40 stretch;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 4rem;
      position: relative;
      z-index: 5;
    }

    header {
      padding: 8rem 0 4rem;
      text-align: center;
    }

    .show-title {
      font-family: 'Abril Fatface', cursive;
      font-size: 160px;
      line-height: 0.9;
      color: var(--gold);
      margin: 0;
      text-transform: uppercase;
    }

    nav {
      margin-top: 4rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
      font-family: 'Overpass Mono', monospace;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.2em;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--crimson);
    }

    nav a:hover {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    main {
      padding: 4rem 0;
    }

    .credits-roll {
      text-align: center;
      font-weight: 300;
      font-size: 18px;
    }

    .technical-credits {
      font-family: 'Overpass Mono', monospace;
      font-size: 13px;
      color: var(--crimson);
      text-transform: uppercase;
      margin-top: 4rem;
    }

    .spotlight-reveal {
      position: relative;
      padding: 4rem 0;
      text-align: center;
    }

    .spotlight-beam {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 100%;
      background-color: rgba(255, 215, 0, 0.05);
      clip-path: polygon(40% 0, 60% 0, 100% 100%, 0 100%);
      z-index: -1;
    }

    .rose-svg {
      width: 40px;
      height: 40px;
      margin: 2rem auto;
      fill: var(--crimson);
    }

    footer {
      padding: 8rem 0 4rem;
      text-align: center;
      font-family: 'Overpass Mono', monospace;
      font-size: 12px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .show-title { font-size: 60px; }
      .container { padding: 0 2rem; }
    }
  </style>
</head>
<body>
  <div class="curtain-frame"></div>
  
  <div class="container">
    <header>
      <h1 class="show-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">The Bow</a>
        <a href="{{ base_url }}/about/">Backstage</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>THE FINAL PERFORMANCE // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
</body>
</html>
