{% extends "base.html" %}

{% block content %}
<div class="section-header" style="margin-bottom: 3rem;">
    <h1 class="glow-text-blue">{{ taxonomy_term }}</h1>
    <p class="content" style="font-size: 1.2rem;">All pages tagged with "{{ taxonomy_term }}"</p>
</div>

<div class="post-list">
    {% for post in taxonomy_pages %}
    <div class="card">
        <h2 class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        {% if post.date %}
        <div class="post-meta">{{ post.date | date("%B %d, %Y") }}</div>
        {% endif %}
        <a href="{{ post.url }}" style="font-weight: 600; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Read More &rarr;</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
