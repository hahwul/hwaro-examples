{% extends "base.html" %}

{% block content %}
<article>
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <div class="post-meta">{{ page.date | date("%B %d, %Y") }}</div>
    {% endif %}
  </header>

  <div class="content">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
