{% extends "base.html" %}

{% block content %}
<article>
  <header>
    <h1 style="border-bottom: none; font-size: 3rem; text-align: center; margin-bottom: 2rem;">{{ page.title }}</h1>
  </header>

  <div class="content" style="text-align: center; font-size: 1.2rem; max-width: 600px; margin: 0 auto;">
    {{ content | safe }}
  </div>

  <div style="text-align: center; margin-top: 3rem;">
    <a href="{{ site.base_url | default('/') }}/posts/" style="display: inline-block; padding: 0.8rem 2rem; border: 1px solid var(--neon-cyan); border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;">Explore Posts</a>
  </div>
</article>
{% endblock %}
