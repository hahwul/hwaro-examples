{% include "header.html" %}
  <h1>{{ taxonomy_name | capitalize }}</h1>
  <ul class="section-list">
    {% for term in taxonomy_terms %}
    <li class="post-card">
      <h2><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name }}</a></h2>
      <p class="post-meta">{{ term.pages | length }} entries</p>
    </li>
    {% endfor %}
  </ul>
{% include "footer.html" %}
