{% include "header.html" %}
  <main class="page-main">
    <article class="page-content">
      <h1>{{ page.title }}</h1>
      {% if page.tags %}
      <div class="menu-item-tags">
        {% for tag in page.tags %}
        <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
        {% endfor %}
      </div>
      {% endif %}
      <div class="page-body">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
