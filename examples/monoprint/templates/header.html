<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #000000;
      --text: #000000;
      --text-muted: #444444;
      --border: #000000;
      --bg: #ffffff;
      --bg-subtle: #f0f0f0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Courier New", Courier, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); font-weight: 600; }

    /* Layout */
    .site-wrapper { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; border-left: 3px solid var(--border); border-right: 3px solid var(--border); min-height: 100vh; background: var(--bg); }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0; border-bottom: 5px solid var(--text); margin-bottom: 2rem; }
    .site-logo { font-weight: 800; font-size: 1.5rem; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo:hover { background: var(--text); color: var(--bg); }
    .site-header nav { display: flex; gap: 1.25rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; font-weight: 800; text-transform: uppercase; border: 2px solid transparent; padding: 0.2rem 0.5rem; }
    .site-header nav a:hover { border: 2px solid var(--text); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 5px solid var(--text); color: var(--text); font-size: 0.85rem; text-align: center; font-weight: 800; text-transform: uppercase; }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
    h1 { font-size: 2.5rem; margin-top: 0; border-bottom: 3px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.75rem; border-bottom: 2px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1em 0; font-weight: 500; font-size: 1.1rem; }
    a { color: var(--primary); text-decoration: underline; font-weight: 800; text-decoration-thickness: 2px; }
    a:hover { background: var(--text); color: var(--bg); text-decoration: none; }
    code { background: var(--bg-subtle); padding: 0.15rem 0.4rem; border: 2px solid var(--border); font-size: 0.85em; font-family: "Courier New", Courier, monospace; font-weight: 800; }
    pre { background: var(--bg-subtle); padding: 1rem; overflow-x: auto; border: 3px solid var(--border); }
    pre code { background: none; padding: 0; border: none; font-weight: 500; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg); border: 3px solid var(--border); position: relative; }
    ul.section-list li::before { content: ""; position: absolute; top: 4px; left: 4px; right: -7px; bottom: -7px; background: var(--text); z-index: -1; }
    ul.section-list li a { font-weight: 800; text-decoration: none; font-size: 1.2rem; text-transform: uppercase; }
    ul.section-list li p { margin: 0.5rem 0 0 0; font-size: 0.95rem; font-weight: 500; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 800; border-bottom: 3px dotted var(--border); padding-bottom: 1rem; }
    nav.pagination { margin: 2rem 0; border-top: 3px solid var(--border); padding-top: 1.5rem; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border: 3px solid var(--border); color: var(--text); text-decoration: none; font-weight: 800; text-transform: uppercase; }
    nav.pagination a:hover { background: var(--text); color: var(--bg); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border: 3px solid var(--text); background: var(--text); color: var(--bg); font-weight: 800; }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border: 3px solid var(--border); color: var(--text); opacity: 0.3; font-weight: 800; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: center; border-bottom-width: 3px; }
      .site-wrapper { padding: 0 1rem; border-left: none; border-right: none; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
