# =============================================================================
# Meridiem - AM/PM Time-Based Dual Theme Time Tracker
# =============================================================================

title = "Meridiem"
description = "AM/PM time-based automatic dual theme time tracker"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
enabled = false

[pagination]
enabled = false

[series]
enabled = false

[related]
enabled = false

[[taxonomies]]
name = "tags"
feed = false

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
emoji = false
