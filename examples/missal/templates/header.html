<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,700;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #b00;
            --gold: #d4af37;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
            border-left: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            min-height: 100vh;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent);
        }
        .logo {
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .missal-hero {
            padding: 80px 0;
            text-align: center;
        }
        .rubric { color: var(--accent); font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 20px; }
        .missal-hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin: 0;
            font-style: italic;
        }
        article { padding: 40px 0; }
        h2 { font-weight: 700; font-size: 2rem; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-top: 60px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">MISSAL</div>
        <nav>
            <a href="/">Rites</a>
            <a href="/about">Process</a>
        </nav>
    </header>
