title = "Mapping the Invisible College: Citation Network Topology in Computational Neuroscience"
description = "A network analysis paper examining citation graph topology, co-citation clusters, and knowledge diffusion pathways across 47,000 publications in computational neuroscience."
base_url = "http://localhost:3000"

sections = ["sections"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
