{% extends "base.html" %}

{% block content %}
    <h1>Pages tagged with "{% if term is defined %}{{ term.name }}{% endif %}"</h1>
    <ul>
    {% if pages %}
        {% for page in pages %}
            <li><a href="{{ base_url }}{{ page.permalink }}">{{ page.title }}</a></li>
        {% endfor %}
    {% else %}
        <li>No pages found.</li>
    {% endif %}
    </ul>
{% endblock %}
