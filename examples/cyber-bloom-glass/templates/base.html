<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% elif section and section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #010206;
            --cyber-cyan: #00f0ff;
            --cyber-magenta: #ff003c;
            --cyber-purple: #b026ff;
            --glass-bg: rgba(10, 15, 30, 0.4);
            --glass-border: rgba(0, 240, 255, 0.15);
            --text-main: #e0e0ff;
            --text-muted: #8c9bbf;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--void);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Bloom Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--cyber-magenta);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--cyber-cyan);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--cyber-purple);
            top: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(50px, 30px) scale(1.1); opacity: 0.6; }
            100% { transform: translate(-30px, 50px) scale(0.9); opacity: 0.4; }
        }

        /* Glassmorphism Elements */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            margin-top: 0;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        a {
            color: var(--cyber-cyan);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s;
        }

        a:hover {
            color: var(--cyber-magenta);
            text-shadow: 0 0 10px var(--cyber-magenta);
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-top: none;
            border-left: none;
            border-right: none;
            margin-bottom: 2rem;
        }

        .site-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            margin-left: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            box-sizing: border-box;
        }

        .content-card {
            padding: 3rem;
            margin-bottom: 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            border-bottom: none;
            border-left: none;
            border-right: none;
        }

        code {
            font-family: monospace;
            background: rgba(0, 240, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--cyber-cyan);
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
        }

        pre code {
            background: transparent;
            padding: 0;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="glass-panel">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>

    <main>
        <div class="glass-panel content-card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="glass-panel">
        <p>&copy; 2024 {{ site.title }}. Built with Hwaro.</p>
    </footer>
</body>
</html>
