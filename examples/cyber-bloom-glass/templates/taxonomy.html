{% extends "base.html" %}

{% block content %}
    <h1>{% if taxonomy is defined %}{{ taxonomy.name | capitalize }}{% else %}Taxonomy{% endif %}</h1>
    <ul>
    {% if terms %}
        {% for term in terms %}
            <li><a href="{{ base_url }}{{ term.permalink }}">{{ term.name }}</a></li>
        {% endfor %}
    {% else %}
        <li>No terms found.</li>
    {% endif %}
    </ul>
{% endblock %}
