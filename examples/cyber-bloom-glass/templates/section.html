{% extends "base.html" %}

{% block content %}
    <h1>{{ section.title }}</h1>

    <div class="section-content">
        {{ content | safe }}
    </div>

    {% if pages %}
        <div class="page-list mt-4">
            <h2>Pages in this section</h2>
            <ul>
            {% for page in pages %}
                <li><a href="{{ base_url }}{{ page.permalink }}">{{ page.title }}</a></li>
            {% endfor %}
            </ul>
        </div>
    {% endif %}
{% endblock %}
