<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #333;
            --accent: #3b82f6;
            --bubble: #fff;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #f0f4f8;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .bubble-surface {
            background: var(--bubble);
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 40px;
            border: 4px solid #000;
            position: relative;
        }
        .bubble-surface::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 60px;
            width: 30px;
            height: 30px;
            background: #fff;
            border-right: 4px solid #000;
            border-bottom: 4px solid #000;
            transform: rotate(45deg);
        }
        h2 { font-family: 'Bangers', cursive; font-size: 2.5rem; color: #000; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">bubble.talk</div>
            <nav>
                <a href="/">Speak</a>
                <a href="/about">Voice</a>
            </nav>
        </div>
    </header>
