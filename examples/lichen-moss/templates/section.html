{% include "header.html" %}

<div class="organic-box">
  {{ content | safe }}

  <ul class="post-list">
  {% for post in section.pages %}
    <li class="post-item">
      <h2 class="post-item-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <div class="post-item-meta">{{ post.date | date("%B %d, %Y") }}</div>
      {% if post.summary %}
      <div class="post-item-summary">
        {{ post.summary | safe }}
      </div>
      {% endif %}
    </li>
  {% endfor %}
  </ul>
</div>

{% include "footer.html" %}
