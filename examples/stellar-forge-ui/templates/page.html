{% include "header.html" %}
<article class="forge-article">
    <header>
        <h1 class="forge-title">{{ page.title | e }}</h1>
        {% if page.date %}
            <div class="forge-meta">{{ page.date | date("%B %d, %Y") }}</div>
        {% endif %}
    </header>
    <div class="forge-content">
        {{ content | safe }}
    </div>
</article>
{% include "footer.html" %}
