{% include "header.html" %}
<div class="forge-section">
    <h1 class="forge-title">{{ section.title | e }}</h1>
    <ul class="forge-list">
    {% for p in section.pages %}
        <li>
            <a href="{{ p.url }}" class="forge-link">{{ p.title | e }}</a>
            {% if p.date %}
                <span class="forge-date">{{ p.date | date("%Y-%m-%d") }}</span>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
</div>
{% include "footer.html" %}
