{% include "header.html" %}
  <main id="main" class="page-main">
    <header class="page-band">
      <p class="page-kicker" aria-hidden="true">{{ page.section | default("page", true) }}</p>
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      {% if page.date %}<p class="page-date">{{ page.date | date("%Y.%m.%d") }}</p>{% endif %}
    </header>
    <div class="prose">{{ content | safe }}</div>
  </main>
{% include "footer.html" %}
