<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#101210">
  <title>{% if page.title is present %}{{ page.title | e }} :: {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-head">
    <div class="site-head-inner">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" focusable="false"><path d="M5 25 L12 7 L18 21 L27 5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"/></svg>
        </span>
        <span class="brand-name">Gesso</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/plots/">Plots</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button type="button" class="search-trig" id="search-open" aria-haspopup="dialog" aria-label="Search plots and code">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trig-label">search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
