<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0a1220">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}{% if page.url == "/" %} &mdash; {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Murmur home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
          <path d="M4 24a12 12 0 0 1 24 0" fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.4"/>
          <path d="M7 24a9 9 0 0 1 18 0" fill="none" stroke="currentColor" stroke-width="1.9" opacity="0.7"/>
          <path d="M10.5 24a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="2.1"/>
          <circle cx="16" cy="24" r="2.2" fill="currentColor"/>
        </svg>
        <span class="wordmark-text">Murmur</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/episodes/"{% if page.section == "episodes" %} aria-current="page"{% endif %}>Dispatches</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/tags/"{% if page.url == "/tags/" %} aria-current="page"{% endif %}>Tags</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-expanded="false" aria-controls="search-overlay" aria-label="Search dispatches">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
