{#- Duration badge styled as a sonar ping readout.
    Set before including:
      sonar_duration — running time, e.g. "42:18"
      sonar_size     — "hero" | "row" | "inline"
-#}
<span class="sonar-chip sonar-chip--{{ sonar_size }}">
  <svg class="sonar-ping" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
    <circle class="sonar-ring sonar-ring--2" cx="10" cy="10" r="7.5"/>
    <circle class="sonar-ring sonar-ring--1" cx="10" cy="10" r="4.5"/>
    <circle class="sonar-dot" cx="10" cy="10" r="1.7"/>
  </svg>
  <span class="sonar-duration">{{ sonar_duration }}</span>
</span>
