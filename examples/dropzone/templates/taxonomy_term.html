{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_term | capitalize }}</h1>
  <p class="taxonomy-desc">Pages tagged with '{{ taxonomy_term }}'</p>

  <ul class="section-list">
    {% for p in taxonomy_pages %}
      <li>
        <a href="{{ base_url }}{{ p.path }}">{{ p.title | e }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
