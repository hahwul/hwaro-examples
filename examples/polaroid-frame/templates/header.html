<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f8f8;
            --text: #333;
            --accent: #555;
            --polaroid: #fff;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #eee;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .polaroid-box {
            background: var(--polaroid);
            padding: 40px 40px 100px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 4px;
            position: relative;
        }
        .polaroid-box::after {
            content: 'INSTANT_v1.0';
            position: absolute;
            bottom: 30px;
            left: 40px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 1.2rem;
            color: #ccc;
            font-style: italic;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">polaroid.frame</div>
            <nav>
                <a href="/">Snap</a>
                <a href="/about">Focus</a>
            </nav>
        </div>
    </header>
