{% include "header.html" %}
<main id="main">
  <div class="container" style="padding-top: var(--space-4);">
    <header class="interior-header">
      <h1 class="interior-title">All Tags</h1>
      <p style="color: var(--muted); margin: 0;">Browse our recipe collections and articles by culinary themes and tags.</p>
    </header>
    
    {% set tax = get_taxonomy(kind="tags") %}
    <ul class="term-list" style="margin-top: var(--space-4);">
      {% for term in tax.items | sort_by("name") %}
      <li>
        <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">
          {{ term.name }} <span class="term-count">{{ term.pages | length }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</main>
{% include "footer.html" %}
