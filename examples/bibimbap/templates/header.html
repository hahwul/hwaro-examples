<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;0,700;1,400&family=Rubik:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('bibimbap-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="container">
      <div class="brand-wrapper">
        <a href="{{ base_url }}/" class="logo-link" aria-label="Bibimbap Home">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="logo-svg">
            <ellipse cx="50" cy="55" rx="35" ry="12" fill="#fcfbf9" stroke="var(--fg)" stroke-width="2.5"/>
            <path d="M 38 48 C 38 42, 62 42, 62 48 C 62 54, 38 54, 38 48 Z" fill="#ffffff" stroke="var(--fg)" stroke-width="2"/>
            <circle cx="50" cy="47" r="7" fill="#ff9800"/>
            <path d="M 12 55 C 12 80, 88 80, 88 55 Z" fill="var(--surface)" stroke="var(--fg)" stroke-width="3"/>
            <path d="M 12 55 L 88 55" stroke="var(--fg)" stroke-width="2.5"/>
            <path d="M 35 77 L 65 77 C 60 84, 40 84, 35 77 Z" fill="color-mix(in srgb, var(--fg) 20%, transparent)" stroke="var(--fg)" stroke-width="2"/>
          </svg>
        </a>
        {% if page.url == "/" %}
          <span class="brand-h1"><a class="brand" href="{{ base_url }}/">{{ site.title | e }}</a></span>
        {% else %}
          <span class="brand-span"><a class="brand" href="{{ base_url }}/">{{ site.title | e }}</a></span>
        {% endif %}
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/recipes/">Recipes</a>
        <a href="{{ base_url }}/ingredients/">Ingredients</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <div style="display: flex; align-items: center; gap: var(--space-2);">
        <form role="search" data-index="{{ base_url }}/search.json" onsubmit="return false;" class="header-search">
          <label for="search-input" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Search recipes and ingredients</label>
          <input id="search-input" type="search" placeholder="Search..." autocomplete="off">
        </form>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 18c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm0-10c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zM11 1h2v3h-2zm0 19h2v3h-2zM3.5 3.5l2.1 2.1-1.4 1.4L2.1 4.9zm16.3 16.3l2.1 2.1-1.4 1.4-2.1-2.1zM1 11h3v2H1zm19 0h3v2h-3zM3.5 20.5L5.6 18.4l1.4 1.4-2.1 2.1zm16.3-16.3l2.1-2.1 1.4 1.4-2.1 2.1z" />
          </svg>
        </button>
      </div>
    </div>
  </header>
