<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text: #eee; --accent: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Playfair Display', serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; border-bottom: 1px solid var(--accent); padding-bottom: 60px; margin-bottom: 80px; }
        .logo { font-weight: 900; font-size: 3rem; text-transform: uppercase; font-style: italic; letter-spacing: 5px; }
        .codex-surface { border: 1px solid var(--accent); padding: 80px; background: #0a0a0a; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">codex.noir</div></header>
