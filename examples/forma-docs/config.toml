title = "Forma"
description = "Documentation for Forma, a typed UI primitives framework. Modern light surface, oversized chapter numerals, narrow read column."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10

[markdown]
safe = false
lazy_loading = true
heading_ids = true
footnotes = true

[doctor]
ignore = []
