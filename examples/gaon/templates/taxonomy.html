{% include "header.html" %}
{% set tax = get_taxonomy(kind="tags") %}
      <main id="main" class="docs-main">
        <div class="doc-columns">
          <article class="doc-article">
            <p class="topic-path">Tags</p>
            <h1>{{ page.title }}</h1>
            <p class="doc-dek">Every grammar point in Gaon, browsable by tag rather than by family.</p>

            <ul class="taxonomy-term-list">
              {% for t in tax.items | sort_by("name") %}
              <li><a class="tag-chip tag-chip--lg" href="{{ base_url }}/tags/{{ t.slug }}/">#{{ t.name }}<span class="tag-chip-count">{{ t.count }}</span></a></li>
              {% endfor %}
            </ul>
          </article>
        </div>
      </main>
{% include "footer.html" %}
