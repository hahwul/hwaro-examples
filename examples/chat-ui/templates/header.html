<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0f2f5; --text: #000; --accent: #0084ff; --bubble-me: #0084ff; --bubble-you: #e4e6eb; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .chat-container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        header { padding: 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #31a24c; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 70%; font-size: 0.9rem; }
        .me { background: var(--bubble-me); color: #fff; align-self: flex-end; }
        .you { background: var(--bubble-you); color: #000; align-self: flex-start; }
    </style>
</head>
<body>
    <div class="chat-container">
    <header><div class="status-dot"></div><div style="font-weight: 700;">chat.ui</div></header>
