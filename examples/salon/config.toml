title = "Salon"
description = "Photography criticism with no photographs — the prints live in the prose"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = true
per_page = 6

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
sections = ["criticism"]

[og]
type = "article"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
