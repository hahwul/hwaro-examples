<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/">
      <svg class="brand-tuft" viewBox="0 0 22 14" width="22" height="14" aria-hidden="true" focusable="false">
        <circle cx="4" cy="11" r="2.4" fill="currentColor" opacity="0.55"/>
        <circle cx="9" cy="8" r="3" fill="currentColor" opacity="0.85"/>
        <circle cx="14.5" cy="10" r="2.6" fill="currentColor" opacity="0.65"/>
        <circle cx="18.5" cy="12" r="1.8" fill="currentColor" opacity="0.45"/>
        <circle cx="11.5" cy="4" r="1.6" fill="currentColor"/>
      </svg>
      <span class="brand-word">Brume</span>
    </a>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ base_url }}/mosses/">mosses</a>
      <a href="{{ base_url }}/tags/">tags</a>
      <a href="{{ base_url }}/about/">about</a>
    </nav>
    <form class="find" role="search" action="{{ base_url }}/">
      <label class="find-label" for="find-moss">find a moss</label>
      <input class="find-input" id="find-moss" name="q" type="search"
             placeholder="bryum, slurry, stone&hellip;" autocomplete="off" spellcheck="false">
    </form>
  </header>
