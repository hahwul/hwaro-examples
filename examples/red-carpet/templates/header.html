<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Tenor+Sans&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="carpet-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Red Carpet home">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Camera body -->
          <rect x="8" y="18" width="32" height="20" fill="#0a0608" stroke="#d4af37" stroke-width="1.5"/>
          <!-- Lens -->
          <circle cx="24" cy="28" r="7" fill="#1a1012" stroke="#d4af37" stroke-width="1.5"/>
          <circle cx="24" cy="28" r="3" fill="#d4af37"/>
          <!-- Viewfinder -->
          <rect x="18" y="14" width="12" height="4" fill="#0a0608" stroke="#d4af37" stroke-width="1"/>
          <!-- Flash on top -->
          <rect x="32" y="12" width="6" height="6" fill="#f4e6a7"/>
          <!-- Flash burst rays -->
          <line x1="35" y1="15" x2="44" y2="8" stroke="#f4e6a7" stroke-width="1"/>
          <line x1="35" y1="15" x2="42" y2="18" stroke="#f4e6a7" stroke-width="1"/>
          <line x1="35" y1="15" x2="44" y2="12" stroke="#f4e6a7" stroke-width="1"/>
        </svg>
        <span class="logo-text">Red Carpet</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">ARRIVALS</a>
        <a href="{{ base_url }}/fashion/">FASHION</a>
        <a href="{{ base_url }}/premiere/">PREMIERE</a>
        <a href="{{ base_url }}/gallery/">GALLERY</a>
      </nav>
    </header>
