<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <title>{% if page.title is present %}{{ page.title | e }}{% endif %} - Obsidian Shard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: baseline; }
        header h1 { margin: 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        nav a { color: #888; text-decoration: none; margin-left: 1rem; text-transform: uppercase; }
        nav a:hover { color: #fff; border-bottom: 1px solid #fff; }
        h1, h2, h3 { color: #fff; font-weight: normal; }
        a { color: #f0f0f0; text-decoration: underline; }
        a:hover { color: #888; }
        .post-item { border: 1px solid #333; padding: 1rem; margin-bottom: 1rem; background: #1a1a1a; }
        .post-item h2 { margin-top: 0; }
        footer { margin-top: 4rem; border-top: 2px solid #333; padding-top: 1rem; text-align: center; color: #555; font-size: 0.8rem; }
        .section-list { padding: 0; list-style: none; }
        .section-list li { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        {% include "header.html" %}
        <main>
            {% block content %}{% endblock %}
        </main>
        {% include "footer.html" %}
    </div>
</body>
</html>
