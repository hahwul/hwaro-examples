<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Ochre home">
        <svg class="wordmark__mark" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" focusable="false">
          <path d="M5 27 C5 27 11 9 27 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M5 27 L5 15 M27 5 L17 5" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>
          <circle cx="5" cy="15" r="1.6" fill="none" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="17" cy="5" r="1.6" fill="none" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="5" cy="27" r="2.3" fill="currentColor"/>
          <circle cx="27" cy="5" r="2.3" fill="currentColor"/>
        </svg>
        <span class="wordmark__text">Ochre</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/titles/">Titles</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
        <kbd>/</kbd>
      </button>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-labelledby="search-heading" hidden>
    <div class="search-panel" role="document">
      <h2 class="search-heading" id="search-heading">Search the wall</h2>
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search titles, idents, curves" autocomplete="off" aria-label="Search Ochre" aria-describedby="search-hint">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <p class="search-hint" id="search-hint">Type to filter. Arrow keys to move, Enter to open a project.</p>
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>Nothing on the wall matches that.</p>
    </div>
  </div>
