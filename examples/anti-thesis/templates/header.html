<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Playfair Display', serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 0; border-left: 1px solid #000; border-right: 1px solid #000; min-height: 100vh; }
        header { text-align: center; padding: 80px 40px; border-bottom: 1px solid #000; }
        .logo { font-weight: 700; font-size: 3rem; text-transform: lowercase; font-style: italic; }
        .thesis-surface { padding: 100px 80px; }
        h2 { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">anti.thesis</div></header>
