<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ff0000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid #000; padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: -1px; }
        .status { font-family: 'IBM Plex Mono'; font-size: 0.7rem; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">nerve.center</div><div class="status">OPERATIONAL</div></header>
