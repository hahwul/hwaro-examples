{% extends "base.html" %}

{% block content %}
<div class="content">
    <h1>{{ taxonomy.name | capitalize }}</h1>

    <div class="taxonomy-terms" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
        {% if terms is defined %}
            {% for term in terms %}
            <a href="{{ base_url }}{{ term.url }}" style="padding: 0.5rem 1rem; background: rgba(138,43,226,0.1); border: 1px solid var(--neon-purple); border-radius: 20px; font-size: 0.9em;">
                {{ term.name }} <span style="opacity: 0.6; margin-left: 0.5rem;">({{ term.pages | length }})</span>
            </a>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
