<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description is defined %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-velvet: #0a0213;
            --bg-deep: #160424;
            --glass-bg: rgba(22, 4, 36, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-magenta: #ff0055;
            --neon-cyan: #00f0ff;
            --neon-purple: #8a2be2;
            --text-primary: #f0e6fa;
            --text-secondary: #bba0d6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-velvet);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Glow Backgrounds */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        body::before {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--neon-purple), transparent 70%);
        }

        body::after {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--neon-magenta), transparent 70%);
            animation-delay: -10s;
        }

        .ambient-cyan {
            position: fixed;
            top: 40%;
            left: 60%;
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.3), transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            padding: 2rem 0;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 2, 19, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan));
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-links a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Main Content Container (Glass Panel) */
        main {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 0 32px rgba(138, 43, 226, 0.05);
            margin-bottom: 4rem;
            position: relative;
            overflow: hidden;
        }

        main::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Typography inside main */
        .content {
            font-size: 1.1rem;
        }

        .content h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .content h2 {
            font-size: 2rem;
            margin-top: 2.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .content p {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .content ul, .content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        /* Code Blocks */
        pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            font-family: monospace;
            font-size: 0.9rem;
        }

        code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--neon-cyan);
        }

        pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--neon-purple);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-right: 0;
            font-style: italic;
            color: var(--text-secondary);
            background: rgba(138, 43, 226, 0.05);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
            background: rgba(10, 2, 19, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        @media (max-width: 768px) {
            main {
                padding: 2rem;
            }
            .content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-cyan"></div>
    <header>
        <div class="container">
            <nav>
                <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
                <div class="nav-links">
                    <a href="{{ base_url }}/">Home</a>
                    <a href="{{ base_url }}/about">About</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 {{ site.title }}. Built with <a href="https://hwaro.hahwul.com" target="_blank">Hwaro</a>.</p>
        </div>
    </footer>
</body>
</html>
