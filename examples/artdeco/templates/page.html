{% include "header.html" %}

<article>
    <header class="post-header">
        <h2>{{ page.title }}</h2>
        {% if page.date %}
        <p style="text-align: center; color: var(--gold-dim); font-family: var(--font-heading); margin-top: -10px;">
            {{ page.date | date("%B %d, %Y") }}
        </p>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
