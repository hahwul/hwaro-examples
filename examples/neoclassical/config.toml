title = "Neoclassical"
description = "A light, elegant theme inspired by neoclassical architecture with marble textures and statue pedestal layouts."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = true
per_page = 10

[[taxonomies]]
name = "tags"
feed = false

[[taxonomies]]
name = "categories"
feed = false

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = true
lazy_loading = true
