<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg: #0f172a;
      --bg-glass: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --border: rgba(255, 255, 255, 0.1);
      --border-glow: rgba(56, 189, 248, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
      background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; display: flex; flex-direction: column; min-height: 100vh; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .site-header nav a:hover { color: var(--accent); }

    .site-main {
      flex: 1;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .site-footer {
      margin: 2rem 0;
      padding: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: var(--text); }
    h1 { font-size: 2rem; margin-top: 0; letter-spacing: -1px; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; color: #cbd5e1; }
    a { color: var(--accent); text-decoration: none; transition: all 0.2s; }
    a:hover { color: var(--accent-hover); text-decoration: underline; text-underline-offset: 4px; }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.25rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: transform 0.2s, border-color 0.2s;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      border-color: var(--border-glow);
      background: rgba(255, 255, 255, 0.04);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1.1rem; }

    nav.pagination { margin: 2.5rem 0 1rem; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.02);
    }
    nav.pagination a:hover { color: var(--accent); border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: rgba(56, 189, 248, 0.15);
      color: var(--text);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.4;
      background: rgba(0, 0, 0, 0.2);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.25rem; text-align: center; }
      .site-header nav { justify-content: center; width: 100%; flex-wrap: wrap; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      <p>&copy; {{ now() | date(format="%Y") }} {{ site.title | e }}. Built with <a href="https://github.com/hahwul/hwaro">Hwaro</a>.</p>
    </footer>
  </div>
</body>
</html>
