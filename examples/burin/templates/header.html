<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a href="{{ base_url }}/" class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
        <rect x="0.5" y="0.5" width="31" height="31" rx="5" fill="none" stroke="var(--border-strong)"/>
        <path fill-rule="evenodd" clip-rule="evenodd" fill="var(--accent)" d="M9 6h9.5c3.4 0 5.6 1.7 5.6 4.6 0 2-1.1 3.3-2.7 3.9 2 .5 3.4 2 3.4 4.3 0 3.1-2.4 5.2-6.1 5.2H9V6Zm4.1 3.4v5h4.6c2 0 3.1-.9 3.1-2.5s-1.1-2.5-3.1-2.5h-4.6Zm0 8.3v5.5h5c2.1 0 3.3-1 3.3-2.75s-1.2-2.75-3.3-2.75h-5Z"/>
      </svg>
      <span class="brand-name">Burin</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ base_url }}/typefaces/">Typefaces</a>
      <a href="{{ base_url }}/about/">About</a>
      <a href="{{ base_url }}/tags/">Tags</a>
      <a href="{{ base_url }}/search/" class="nav-search">Search</a>
    </nav>
  </header>
