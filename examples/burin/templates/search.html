{% include "header.html" %}
  <main id="main">
    <div class="container">
      <div class="list-head">
        <p class="eyebrow">Search</p>
        {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
        <p>Search by typeface name, source, engraver, or tag. The index covers every specimen and the About page.</p>
      </div>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="visually-hidden" for="search-input">Search Burin</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="bookplate, banknote, cartouche&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="search-results" id="search-results"></ul>

      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </div>
  </main>
{% include "footer.html" %}
