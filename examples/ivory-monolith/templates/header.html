<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
  :root {
    --bg-ivory: #FDFBF7;
    --text-dark: #1A1A1A;
    --text-muted: #595959;
    --border-stark: #1A1A1A;
    --accent: #000000;
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    margin: 0;
    color: var(--text-dark);
    background-color: var(--bg-ivory);
    border: 12px solid var(--border-stark);
    min-height: 100vh;
  }

  /* Layout */
  .site-wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3rem 0;
    border-bottom: 2px solid var(--border-stark);
    margin-bottom: 4rem;
  }

  .site-logo {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2rem;
    color: var(--text-dark);
    text-decoration: none;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .site-header nav {
    display: flex;
    gap: 2rem;
  }

  .site-header nav a {
    color: var(--text-dark);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 0.2rem;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s ease;
  }

  .site-header nav a:hover {
    border-color: var(--border-stark);
  }

  .site-main {
    min-height: calc(100vh - 350px);
  }

  .site-footer {
    margin-top: 5rem;
    padding: 2rem 0;
    border-top: 2px solid var(--border-stark);
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Typography */
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Playfair Display', serif;
    line-height: 1.2;
    margin-top: 2em;
    margin-bottom: 0.75em;
    font-weight: 700;
    color: var(--text-dark);
  }

  h1 { font-size: 3rem; margin-top: 0; letter-spacing: -0.02em; }
  h2 { font-size: 2.25rem; }
  h3 { font-size: 1.5rem; }

  p {
    margin: 1.2em 0;
    font-size: 1.05rem;
    color: var(--text-dark);
  }

  a {
    color: var(--text-dark);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  a:hover {
    text-decoration-thickness: 2px;
  }

  code {
    background: transparent;
    border: 1px solid var(--border-stark);
    padding: 0.2rem 0.4rem;
    font-size: 0.85em;
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
  }

  pre {
    background: var(--bg-ivory);
    padding: 1.5rem;
    overflow-x: auto;
    border: 2px solid var(--border-stark);
  }

  pre code { border: none; padding: 0; }

  blockquote {
    border-left: 4px solid var(--border-stark);
    margin: 2rem 0;
    padding-left: 1.5rem;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--text-muted);
  }

  /* Components */
  ul.section-list {
    list-style: none;
    padding: 0;
    margin: 2rem 0;
  }

  ul.section-list li {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-stark);
  }

  ul.section-list li:last-child {
    border-bottom: none;
  }

  ul.section-list li a {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    text-decoration: none;
  }

  ul.section-list li a:hover {
    text-decoration: underline;
    text-decoration-thickness: 2px;
  }

  .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

  nav.pagination { margin: 3rem 0; border-top: 2px solid var(--border-stark); padding-top: 1.5rem; }
  nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-stark); color: var(--text-dark); text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem;}
  nav.pagination a:hover { background-color: var(--border-stark); color: var(--bg-ivory); }
  .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-stark); background-color: var(--border-stark); color: var(--bg-ivory); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
  .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--text-muted); color: var(--text-muted); opacity: 0.5; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }

  /* Responsive */
  @media (max-width: 600px) {
    body { border-width: 6px; }
    .site-header { flex-direction: column; gap: 1.5rem; padding: 2rem 0; }
    .site-wrapper { padding: 0 1.5rem; }
    h1 { font-size: 2.25rem; }
  }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
  <a href="{{ base_url }}/">Monolith</a>
  <a href="{{ base_url }}/records/">Records</a>
  <a href="{{ base_url }}/about/">About</a>
</nav>
    </header>
