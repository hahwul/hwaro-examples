<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="brand" aria-label="{{ site.title | e }} — home">
        <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M4.5 22.2c0-7.1 4.9-12.4 10.7-12.4s10.7 5.3 10.7 12.4c0 2.6-2.1 4.6-4.8 4.6H9.3c-2.7 0-4.8-2-4.8-4.6Z" fill="var(--accent)"></path>
          <path d="M10.6 12.9 8.1 18.5M15.5 11.3v7.4M20.4 12.9l2.5 5.6" stroke="var(--bg)" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
        </svg>
        <span class="brand__name">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Schedule</a>
        <a href="{{ base_url }}/bakers/">Bakers</a>
        <a href="{{ base_url }}/venue/">Venue</a>
        <a href="{{ base_url }}/register/" class="site-nav__cta">Register</a>
      </nav>
    </div>
  </header>
