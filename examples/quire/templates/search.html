{% include "header.html" %}
    <main id="main" class="doc">
      <article class="article search-page">
        <header class="article-head">
          <p class="article-kicker"><span class="kicker-link">Search</span></p>
          <h1>{{ page.title | e }}</h1>
          {% if page.description %}<p class="lede">{{ page.description }}</p>{% endif %}
        </header>

        <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
          <svg class="search-glyph" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="7" cy="7" r="4.4"/><path d="M10.4 10.4 14 14"/></svg>
          <label class="visually-hidden" for="search-input">Search the handbook</label>
          <input class="search-input" id="search-input" type="search" name="q" placeholder="measure, leading, clamp, restraint…" autocomplete="off" autofocus>
        </form>

        <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
        <ol class="search-results" id="search-results"></ol>

        <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
        <script src="{{ base_url }}/js/search.js"></script>
      </article>
    </main>
{% include "footer.html" %}
