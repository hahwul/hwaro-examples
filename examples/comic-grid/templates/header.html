<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #555;
            --grid: #f0f0f0;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--grid);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .comic-grid-surface {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 80px;
        }
        .grid-panel {
            background: #fff;
            padding: 40px;
            box-shadow: 5px 5px 0 #000;
            border: 4px solid #000;
        }
        h2 { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; color: #000; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; text-transform: uppercase; }
        article { font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">comic.grid</div>
            <nav>
                <a href="/">Panel</a>
                <a href="/about">Layout</a>
            </nav>
        </div>
    </header>
