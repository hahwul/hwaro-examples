{% include "header.html" %}

  <main class="site-main">
    <h1 class="section-heading">{{ page.title }}</h1>

    {{ content | safe }}

    <ul class="post-list">
      {% for post in section.pages %}
      <li class="post-list-item">
        <a href="{{ base_url }}{{ post.url }}" class="post-list-link">
          {% if post.date %}<time class="post-list-date">{{ post.date }}</time>{% endif %}
          <span class="post-list-title">{{ post.title }}</span>
          {% if post.description %}<span class="post-list-desc">{{ post.description }}</span>{% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>

    {{ pagination }}
  </main>

{% include "footer.html" %}
