{% extends "base.html" %}

{% block content %}
  <div class="glass-panel content-area">
    <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Tags</h1>
    {% if taxonomy_terms is defined and taxonomy_terms %}
      <ul style="list-style: none; display: flex; flex-wrap: wrap; gap: 1rem;">
        {% for term in taxonomy_terms %}
          <li>
            <a href="{{ term.url }}" style="padding: 0.5rem 1rem; border: 1px solid var(--glass-border); border-radius: 20px; background: rgba(255,255,255,0.05);">
              #{{ term.name }} ({{ term.pages_count }})
            </a>
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
{% endblock %}
