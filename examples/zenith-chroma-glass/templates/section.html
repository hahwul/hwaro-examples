{% extends "base.html" %}

{% block content %}
    <h1>{{ section.title }}</h1>

    <div class="content">
        {{ content | safe }}
    </div>

    <ul>
    {% for p in pages %}
        <li><a href="{{ p.url }}">{{ p.title }}</a> - {{ p.date | date("%Y-%m-%d") }}</li>
    {% endfor %}
    </ul>
{% endblock %}
