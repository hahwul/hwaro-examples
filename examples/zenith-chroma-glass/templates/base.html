<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Aurora background effects */
        .aurora-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.4), transparent 60%);
            filter: blur(80px);
            z-index: -1;
            animation: float1 15s ease-in-out infinite alternate;
        }

        .aurora-2 {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.3), transparent 60%);
            filter: blur(80px);
            z-index: -1;
            animation: float2 20s ease-in-out infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10%, -10%) scale(1.2); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 800px;
            margin: 4rem auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1.5rem;
        }

        h1, h2, h3 {
            color: #ffffff;
            font-weight: 700;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        nav a {
            margin-right: 1.5rem;
            font-weight: 500;
        }

        main {
            line-height: 1.6;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        /* Syntax highlighting override for dark mode */
        pre {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
        }

        pre code.hljs {
            background: transparent !important;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="aurora-1"></div>
    <div class="aurora-2"></div>

    <div class="glass-container">
        <header>
            <nav>
                <a href="{{ base_url }}/">{{ site.title }}</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
