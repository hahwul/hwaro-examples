<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --primary: #66fcf1;
      --primary-dim: rgba(102, 252, 241, 0.2);
      --text: #c5c6c7;
      --text-muted: #8b8e91;
      --border: #1f2833;
      --bg: #0b0c10;
      --bg-subtle: #14171d;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Lora', serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, var(--bg-subtle) 0%, var(--bg) 80%);
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; position: relative; }
    .site-wrapper::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(102,252,241,0.05) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.5rem; color: #fff; text-decoration: none; text-shadow: 0 0 10px rgba(102, 252, 241, 0.3); letter-spacing: 2px; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; font-family: 'Cinzel', serif; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { font-family: 'Cinzel', serif; line-height: 1.3; margin-top: 2em; margin-bottom: 0.5em; font-weight: 400; color: #fff; }
    h1 { font-size: 2.2rem; margin-top: 0; text-shadow: 0 0 10px rgba(255,255,255,0.1); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; transition: text-shadow 0.3s; }
    a:hover { text-shadow: 0 0 8px var(--primary-dim); }
    code { background: var(--bg-subtle); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; color: #fff; border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem 1.25rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; }
    ul.section-list li:hover { transform: translateY(-2px); border-color: rgba(102, 252, 241, 0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    ul.section-list li a { font-weight: 500; font-family: 'Cinzel', serif; font-size: 1.1rem; color: #fff; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; font-family: 'Cinzel', serif; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px var(--primary-dim); }
    .pagination-current span { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--primary); background: var(--primary-dim); color: #fff; font-family: 'Cinzel', serif; }
    .pagination-disabled span { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; font-family: 'Cinzel', serif; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1.25rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
