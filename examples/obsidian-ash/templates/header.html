<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg: #111111;
    --bg-subtle: #1c1c1c;
    --text: #e0e0e0;
    --text-muted: #888888;
    --border: #333333;
    --accent: #555555;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
  .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
  .site-logo { font-weight: 700; font-size: 1.2rem; color: var(--text); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: lowercase; }
  .site-header nav a:hover { color: var(--text); }
  .site-main { min-height: calc(100vh - 250px); }
  .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }
  h1, h2, h3 { color: #ffffff; line-height: 1.3; margin-top: 2em; margin-bottom: 1em; font-weight: 400; }
  h1 { font-size: 2.5rem; margin-top: 0; }
  p { margin: 1.2em 0; }
  a { color: var(--text); text-decoration: underline; text-decoration-color: var(--accent); }
  a:hover { color: #ffffff; text-decoration-color: #ffffff; }
  ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1.5rem; background: var(--bg-subtle); border-radius: 4px; border: 1px solid var(--border); }
  ul.section-list li a { font-weight: 600; text-decoration: none; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
