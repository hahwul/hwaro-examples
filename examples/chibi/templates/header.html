<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf6f0;
            --text: #5d4a44;
            --accent: #ff8c94;
            --secondary: #a8e6cf;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: lowercase;
            letter-spacing: 2px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 5px 0 var(--secondary);
            transition: transform 0.2s;
        }
        nav a:hover { transform: translateY(3px); box-shadow: 0 2px 0 var(--secondary); }
        .chibi-hero {
            padding: 80px 0;
            text-align: center;
        }
        .chibi-hero h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--accent);
        }
        article {
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            border: 4px solid var(--secondary);
        }
        h2 { font-size: 2rem; color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">chibi.site</div>
            <nav>
                <a href="/">Small</a>
                <a href="/about">Cute</a>
            </nav>
        </div>
    </header>
