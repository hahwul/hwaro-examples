title = "ML Air Quality Prediction: Conference Poster P-247"
description = "A conference poster presentation on Machine Learning for Real-Time Air Quality Prediction in Urban Environments, featuring model comparison results and sensor network data."
base_url = "http://localhost:3000"

sections = ["sections"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[[taxonomies]]
name = "authors"

[sitemap]
enabled = true

[robots]
enabled = true
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."

[feeds]
enabled = true
type = "rss"
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = false
