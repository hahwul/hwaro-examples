<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg-color: #0b0c10;
      --text-main: #c5c6c7;
      --text-bright: #ffffff;
      --aurora-1: #66fcf1;
      --aurora-2: #45a29e;
      --aurora-3: #1f2833;
      --glass-bg: rgba(31, 40, 51, 0.4);
      --glass-border: rgba(102, 252, 241, 0.2);
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Animated Aurora Background */
    .aurora-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, var(--aurora-3), var(--bg-color));
      overflow: hidden;
    }
    .aurora-bg::before, .aurora-bg::after {
      content: '';
      position: absolute;
      width: 200vw;
      height: 200vh;
      top: -50%; left: -50%;
      background: conic-gradient(from 0deg at 50% 50%, var(--aurora-1), transparent 30%, var(--aurora-2) 60%, transparent 80%);
      filter: blur(120px);
      animation: spin 30s linear infinite;
      opacity: 0.3;
    }
    .aurora-bg::after {
      background: conic-gradient(from 180deg at 50% 50%, var(--aurora-2), transparent 40%, var(--aurora-1) 70%, transparent 90%);
      animation: spin 45s linear infinite reverse;
      opacity: 0.2;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Glassmorphism Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      margin-bottom: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-bright);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
    }

    .site-nav a {
      color: var(--text-main);
      text-decoration: none;
      margin-left: 1.5rem;
      font-weight: 500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .site-nav a:hover {
      color: var(--aurora-1);
      text-shadow: 0 0 8px var(--aurora-1);
    }

    /* Content Styles */
    h1, h2, h3 {
      color: var(--text-bright);
      font-weight: 600;
    }

    h1 { font-size: 2.5rem; margin-bottom: 1rem; }

    a { color: var(--aurora-1); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .content-box {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="container">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Logs</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="content-box">
