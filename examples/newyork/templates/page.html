{% include "header.html" %}
<main id="main">
  <article class="prose">
    <header class="page-header">
      <h1 class="page-title">{{ page.title | e }}</h1>
      {% if page.date %}
        <div class="page-meta">
          Published on <time datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
        </div>
      {% endif %}
    </header>
    {{ content | safe }}
    {% if page.tags %}
      <ul class="tag-list">
        {% for t in page.tags %}
          <li><a href="{{ get_taxonomy_url(kind="tags", term=t) }}" class="tag-link">{{ t }}</a></li>
        {% endfor %}
      </ul>
    {% endif %}
  </article>
</main>
{% include "footer.html" %}
