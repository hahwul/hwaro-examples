{% include "header.html" %}
<main id="main">
  <header class="page-header">
    <h1 class="page-title">{{ page.title | e }}</h1>
  </header>
  {% set tax = get_taxonomy(kind="tags") %}
  <div class="prose">
    <ul class="entry-list">
      {% for term in tax.items | sort_by("name") %}
      <li>
        <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}">
          {{ term.name }} <span class="term-count">({{ term.pages | length }} dispatches)</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</main>
{% include "footer.html" %}
