{% include "header.html" %}
<div class="blog-container">
    <header class="blog-header">
        <div class="site-title"><a href="{{ base_url }}/">{{ site.title | e }}</a></div>
        <nav class="nav-links">
            <a href="{{ base_url }}/about/">About</a>
            <a href="{{ base_url }}/posts/">Archive</a>
        </nav>
    </header>
    <main>
        <article>
            <h1>{{ page.title | e }}</h1>
            <div class="post-meta">
                {% if page.date is defined %}{{ page.date | date("%Y-%m-%d") }}{% endif %}
            </div>
            <div class="content">
                {{ content | safe }}
            </div>
        </article>
{% include "footer.html" %}
