{% extends "base.html" %}

{% block content %}
  <div class="taxonomy-content">
    <h1>{{ taxonomy_name | capitalize }}</h1>

    {% if taxonomy_terms %}
      <ul class="post-list">
        {% for term in taxonomy_terms %}
          <li class="post-item">
            <h2><a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></h2>
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
{% endblock %}
