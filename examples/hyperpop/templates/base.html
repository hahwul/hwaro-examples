<!DOCTYPE html>
<html lang="{{ site.default_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {% if site.description %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
  <style>
    :root {
      --bg-color: #0d0d0d;
      --text-color: #e0e0e0;
      --accent-color: #ff2a6d;
      --accent-glow: rgba(255, 42, 109, 0.6);
      --secondary-color: #05d9e8;
      --secondary-glow: rgba(5, 217, 232, 0.4);
      --container-bg: #111111;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2rem 0;
      text-align: center;
      border-bottom: 1px solid #222;
      box-shadow: 0 4px 20px var(--secondary-glow);
    }

    header h1 {
      margin: 0;
      font-size: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
    }

    header a {
      text-decoration: none;
      color: inherit;
    }

    nav {
      margin-top: 1rem;
    }

    nav a {
      color: var(--secondary-color);
      text-decoration: none;
      margin: 0 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      transition: text-shadow 0.3s ease;
    }

    nav a:hover {
      text-shadow: 0 0 8px var(--secondary-glow);
    }

    main {
      flex: 1;
      max-width: 800px;
      margin: 3rem auto;
      padding: 2rem;
      background-color: var(--container-bg);
      border-radius: 8px;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    h1, h2, h3, h4, h5, h6 {
      color: #fff;
    }

    a {
      color: var(--accent-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-shadow: 0 0 5px var(--accent-glow);
    }

    ul, ol {
      padding-left: 1.5rem;
    }

    .post-list {
      list-style: none;
      padding: 0;
    }

    .post-item {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #333;
    }

    .post-item h2 {
      margin: 0 0 0.5rem 0;
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.9rem;
      color: #666;
      border-top: 1px solid #222;
    }

    pre {
      background-color: #1a1a1a;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    code {
      font-family: "Courier New", Courier, monospace;
      color: var(--secondary-color);
    }

    /* Subtle glow for images */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 0 10px var(--secondary-glow);
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ site.base_url }}/">{{ site.title }}</a></h1>
    <nav>
      <a href="{{ site.base_url }}/">Home</a>
      <a href="{{ site.base_url }}/about/">About</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ site.title }}. Built with Hwaro.</p>
  </footer>
</body>
</html>
