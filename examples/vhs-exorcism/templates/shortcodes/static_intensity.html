{% set lvl = level | default("65") %}
<div class="static-intensity" style="--static-intensity: {{ (lvl | int) / 100 }};">
  <div class="noise" style="opacity: {{ (lvl | int) / 140 }};"></div>
  {% if body or content %}
    <div style="position:relative; z-index:2; font-family:monospace; font-size:0.95rem; color:#9a8f70;">
      {{ body | default(content) | safe }}
    </div>
  {% endif %}
</div>
