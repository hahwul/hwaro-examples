<header class="blog-header">
  <div class="blog-header-inner">
    <!-- Distorted logo -->
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo">VHS EXORCISM</a>

    <!-- Channel selector nav -->
    <nav class="channel-selector" aria-label="Channel selector">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="channel-btn{% if page.url == '/' or page.url == '/index.html' %} active{% endif %}" data-ch="00">CH 00</a>
      <a href="{{ base_url }}{{ lang_prefix }}/posts/" class="channel-btn{% if page.section == 'posts' %} active{% endif %}" data-ch="07">LOGS</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/" class="channel-btn" data-ch="09">ARCH</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/" class="channel-btn" data-ch="11">ABOUT</a>
      <a href="{{ base_url }}{{ lang_prefix }}/tags/" class="channel-btn" data-ch="13">TAGS</a>
      <button class="channel-btn" onclick="openSearch()" style="border-color:#444;">SEARCH</button>
    </nav>

    <!-- REC + Channel watermark -->
    <div style="display:flex; align-items:center; gap:8px; margin-left:0.75rem;">
      <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span>REC</span>
      </div>
      <div style="font-family:'Press Start 2P',monospace; font-size:10px; color:#8b0000; letter-spacing:2px; opacity:0.9;">CH 13</div>
    </div>

    <!-- Fake signal strength meter -->
    <div class="signal-meter" title="SIGNAL STRENGTH — WEAK">
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
    </div>

    {% if page.translations | length > 0 %}
    <nav class="lang-switcher" aria-label="Language" style="margin-left:8px; font-size:10px;">
      {% for t in page.translations %}
      <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
      {% endfor %}
    </nav>
    {% endif %}
  </div>
</header>
