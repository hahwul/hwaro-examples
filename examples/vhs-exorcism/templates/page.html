{% include "header.html" %}
{% include "partials/nav.html" %}
{% include "partials/search.html" %}

<main class="blog-main" style="padding-top:0.8rem; max-width:820px;">
  {% if page.title is present %}
    <div class="broadcast-log" style="margin-bottom:1.5rem;">
      <h1 style="margin-bottom:0.3rem;">{{ page.title | e }}</h1>
      {% if page.description %}<p style="color:#9a8f70;font-size:0.95rem;">{{ page.description }}</p>{% endif %}
    </div>
  {% endif %}

  <div class="broadcast-log" style="background:#0a0a0a;">
    {{ content | safe }}
  </div>
</main>
{% include "footer.html" %}
