<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- VHS cassette shell -->
  <rect x="2" y="6" width="28" height="20" rx="1" fill="#1a1a1a"/>
  <rect x="3" y="7" width="26" height="18" rx="0.5" fill="#2a2a2a"/>
  
  <!-- Tape window (the terrifying part) -->
  <rect x="9" y="10" width="14" height="9" fill="#0a0a0a"/>
  
  <!-- Distorted screaming face in tape window -->
  <!-- Eyes -->
  <circle cx="12.5" cy="13.2" r="1.1" fill="#8b0000"/>
  <circle cx="19.5" cy="13.2" r="1.1" fill="#8b0000"/>
  <!-- Mouth screaming -->
  <path d="M12.5 15.8 Q16 17.8 19.5 15.8" stroke="#fff" stroke-width="1.1" fill="none"/>
  <!-- Teeth / static lines -->
  <line x1="13.8" y1="16.2" x2="13.8" y2="17.1" stroke="#fff" stroke-width="0.6"/>
  <line x1="16" y1="16.4" x2="16" y2="17.1" stroke="#fff" stroke-width="0.6"/>
  <line x1="18.2" y1="16.2" x2="18.2" y2="17.1" stroke="#fff" stroke-width="0.6"/>
  
  <!-- Reel hubs -->
  <circle cx="8" cy="15" r="3.2" fill="#111"/>
  <circle cx="24" cy="15" r="3.2" fill="#111"/>
  <circle cx="8" cy="15" r="1.6" fill="#8b0000"/>
  <circle cx="24" cy="15" r="1.6" fill="#8b0000"/>
  
  <!-- Label area -->
  <rect x="5" y="20.5" width="22" height="4.5" fill="#c4b59d"/>
  <!-- "13" on label, slightly warped -->
  <text x="11.5" y="24.2" font-family="monospace" font-size="5.5" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">13</text>
  
  <!-- Static noise specks on label -->
  <circle cx="19" cy="21.5" r="0.4" fill="#222"/>
  <circle cx="21" cy="22.8" r="0.3" fill="#222"/>
  <circle cx="24" cy="21.8" r="0.35" fill="#222"/>
  
  <!-- Top edge highlight -->
  <rect x="2" y="6" width="28" height="1.5" fill="#3a3a3a" opacity="0.6"/>
</svg>