{% include "header.html" %}
  <main class="site-main">
    <div class="glass-panel">
      <h1>{{ page.title | e }}</h1>
      <div class="content">
        {{ content | safe }}
      </div>
      <ul class="section-list">
        {% for child in section.pages %}
          <li><a href="{{ child.permalink }}">{{ child.title }}</a></li>
        {% endfor %}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
