<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Impulse home">
        <svg class="wordmark-mark" viewBox="0 0 28 20" aria-hidden="true" focusable="false">
          <path d="M1 10 H6 L9 2 L13 18 L16 6 L19 13 L21 10 H27" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Impulse</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/features/">Features</a>
        <a href="{{ base_url }}/sound-engine/">Sound Engine</a>
        <a href="{{ base_url }}/presets/">Presets</a>
        <a href="{{ base_url }}/specs/">Specs</a>
        <a href="{{ base_url }}/buy/" class="nav-cta">Buy</a>
      </nav>
    </div>
  </header>
