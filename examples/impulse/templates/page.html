{% include "header.html" %}
<main id="main">
  <article class="page">
    <header class="page-head">
      <div class="page-head-inner">
        {% if page.section is present and page.section %}<p class="band-tag">{{ page.section | e }}</p>{% endif %}
        <h1>{{ page.title | e }}</h1>
        {% if page.description %}<p class="page-desc">{{ page.description | e }}</p>{% endif %}
      </div>
    </header>
    <div class="page-body">
      <div class="prose">
        {{ content | safe }}
      </div>
    </div>
  </article>
</main>
{% include "footer.html" %}
