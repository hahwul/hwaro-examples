{% include "header.html" %}
<main id="main">
  <article class="page">
    <header class="page-head">
      <div class="page-head-inner">
        <h1>{{ section.title | e }}</h1>
        {% if section.description %}<p class="page-desc">{{ section.description | e }}</p>{% endif %}
      </div>
    </header>
    <div class="page-body">
      <ul class="section-list">
        {% for p in section.pages %}
        <li>
          <a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a>
          {% if p.description %}<p>{{ p.description | e }}</p>{% endif %}
        </li>
        {% endfor %}
      </ul>
    </div>
  </article>
</main>
{% include "footer.html" %}
