{% include "header.html" %}
{% set tax = get_taxonomy(kind="tags") %}
  <main id="main" class="site-main">
    <div class="list-head">
      <p class="study-eyebrow">Index</p>
      <h1>Tags</h1>
      <p>Every study filed by climate, methodology, and desk. Pick a thread to follow it across the archive.</p>
    </div>
    <div class="tag-row">
      {% for t in tax.items | sort_by("name") %}
      <a class="tag-chip" href="{{ base_url }}/tags/{{ t.slug }}/">{{ t.name }} &middot; {{ t.count }}</a>
      {% endfor %}
    </div>
  </main>
{% include "footer.html" %}
