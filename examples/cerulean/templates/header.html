<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="grid-backdrop" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="site-header">
      <a href="{{ base_url }}/" class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect x="1.5" y="4.5" width="26" height="24" rx="2" fill="none" stroke="var(--border)" stroke-width="1"/>
          <path d="M4.5 20h20M4.5 15h20M4.5 10h20" stroke="var(--border)" stroke-width="0.75"/>
          <path d="M5 21L11.5 13.5L16.5 17L27 5" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="27" cy="5" r="2" fill="var(--accent)"/>
        </svg>
        <span class="brand-name">Cerulean</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/studies/">Studies</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/" class="nav-search">Search</a>
      </nav>
    </header>
