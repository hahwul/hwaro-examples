{% include "header.html" %}
  <main id="main" class="site-main">
    <div class="list-head">
      <p class="study-eyebrow">Search</p>
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      <p>Search by client, chart type, metric, or place. The index covers every study and the About page.</p>
    </div>

    <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="visually-hidden" for="search-input">Search Cerulean</label>
      <input class="search-input" id="search-input" type="search" name="q" placeholder="sea ice, turnout, policy rate&hellip;" autocomplete="off" autofocus>
    </form>
    <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
    <ul class="search-results" id="search-results"></ul>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
