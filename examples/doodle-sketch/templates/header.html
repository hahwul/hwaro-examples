<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #333;
            --accent: #555;
            --pencil: #888;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: #fdfdfd;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
            background-image: linear-gradient(#eee 1px, transparent 1px), linear-gradient(90deg, #eee 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Indie Flower', cursive;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .sketch-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border: 2px solid #eee;
            position: relative;
        }
        .sketch-surface::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            pointer-events: none;
        }
        h2 { font-family: 'Indie Flower', cursive; font-size: 2.5rem; color: #444; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">doodle.sketch</div>
            <nav>
                <a href="/">Draw</a>
                <a href="/about">Canvas</a>
            </nav>
        </div>
    </header>
