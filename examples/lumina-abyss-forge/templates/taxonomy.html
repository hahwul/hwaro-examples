{% extends "base.html" %}

{% block title %}Taxonomies - {{ site.title }}{% endblock %}

{% block content %}
    <h1>Taxonomies</h1>
    {% if taxonomy is defined and terms is defined %}
        <div class="tags">
            {% for term in terms %}
                <a href="{{ term.url }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
            {% endfor %}
        </div>
    {% endif %}
{% endblock %}
