<!DOCTYPE html>
<html lang="{{ lang | default(value="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <style>
        :root {
            --bg-color: #030408;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --lumina-cyan: #00f2fe;
            --lumina-purple: #8a2be2;
            --lumina-pink: #ff007f;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-heading: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Lumina Background */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 0, 127, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.1) rotate(2deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(-2deg);
                opacity: 0.8;
            }
        }

        /* Layout Container */
        .glass-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--lumina-cyan), var(--lumina-purple), var(--lumina-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        a {
            color: var(--lumina-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--lumina-pink);
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
        }

        p {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        /* Header / Nav */
        header {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-brand:hover {
            color: var(--lumina-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-links a:hover {
            color: var(--lumina-purple);
        }

        /* Post Lists */
        .post-list {
            list-style: none;
        }

        .post-item {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .post-item:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.1);
        }

        .post-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .post-title a {
            color: #fff;
            background: none;
            -webkit-text-fill-color: initial;
        }

        .post-title a:hover {
            color: var(--lumina-cyan);
        }

        .post-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
        }

        /* Footer */
        footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Content Markdown Elements */
        main blockquote {
            border-left: 4px solid var(--lumina-purple);
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            font-style: italic;
            background: rgba(138, 43, 226, 0.05);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }

        main code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--lumina-cyan);
        }

        main pre code {
            display: block;
            padding: 1rem;
            overflow-x: auto;
            color: #e2e8f0;
            background: #000;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        main img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 1.5rem;
        }

        main ul, main ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        /* Tag cloud */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            background: rgba(255, 0, 127, 0.1);
            color: var(--lumina-pink);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 0, 127, 0.2);
            transition: all 0.3s;
        }

        .tag:hover {
            background: rgba(255, 0, 127, 0.2);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        @media (max-width: 768px) {
            .glass-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            h1 { font-size: 2rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <header>
            <nav>
                <a href="{{ base_url }}/" class="nav-brand">{{ site.title }}</a>
                <div class="nav-links">
                    <a href="{{ base_url }}/">Home</a>
                    <a href="{{ base_url }}/about/">About</a>
                </div>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {{ site.title }}. Built with <a href="https://github.com/hahwul/hwaro">Hwaro</a>.</p>
        </footer>
    </div>
</body>
</html>
