<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}Crystalline Void Nexus</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}A futuristic crystal forge in the abyss.{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #020108;
            --bg-deep: #050314;

            /* Glowing accents */
            --cyan-glow: #00f0ff;
            --magenta-glow: #ff0055;
            --purple-glow: #8a2be2;

            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);

            --text-main: #f0f0f5;
            --text-muted: #a0a0b5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-void);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--cyan-glow), transparent 70%);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--purple-glow), transparent 70%);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--magenta-glow), transparent 70%);
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation-duration: 25s;
            opacity: 0.2;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Glass Container */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
        }

        /* Inner reflection */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            margin-top: 0;
            background: linear-gradient(to right, #fff, #a0a0b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        a {
            color: var(--cyan-glow);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--cyan-glow);
        }

        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(2, 1, 8, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-text-fill-color: initial;
            background: none;
        }

        .site-title::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--cyan-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        nav a {
            margin-left: 2rem;
            color: var(--text-main);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        main {
            flex-grow: 1;
            width: 100%;
            max-width: 800px;
            margin: 4rem auto;
            padding: 2.5rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            background: rgba(2, 1, 8, 0.5);
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
            margin-top: auto;
        }

        /* Content Styling */
        .content {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .content p {
            margin-bottom: 1.5rem;
        }

        .content ul, .content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content li::marker {
            color: var(--cyan-glow);
        }

        code {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--magenta-glow);
        }

        pre {
            background: rgba(0, 0, 0, 0.5) !important;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
        }

        pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        /* Blockquote */
        blockquote {
            margin: 2rem 0;
            padding: 1rem 1.5rem;
            border-left: 3px solid var(--purple-glow);
            background: linear-gradient(90deg, rgba(138, 43, 226, 0.1), transparent);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header>
        <a href="/" class="site-title">Crystalline Void Nexus</a>
        <nav>
            <a href="/">Home</a>
            <a href="/about/">About</a>
        </nav>
    </header>

    <main class="glass-panel">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ now() | date(format="%Y") }} Crystalline Void Nexus. Built with <a href="https://hwaro.hahwul.com" target="_blank">Hwaro</a>.</p>
    </footer>
</body>
</html>
