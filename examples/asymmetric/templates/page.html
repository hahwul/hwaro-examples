{% include "header.html" %}

<article class="single-page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            Published on {{ page.date | date("%B %d, %Y") }}
        </div>
        {% endif %}
    </header>
    
    <div class="page-content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
