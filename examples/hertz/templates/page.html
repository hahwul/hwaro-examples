{% include "header.html" %}
  <main id="main" class="site-main">
    <article class="doc">
      <header class="doc-head">
        {% if page.date %}<time class="doc-date mono" datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date('%Y.%m.%d') }}</time>{% endif %}
        {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
        {% if page.description %}<p class="doc-desc">{{ page.description | e }}</p>{% endif %}
      </header>
      <div class="prose">{{ content }}</div>
    </article>
  </main>
{% include "footer.html" %}
