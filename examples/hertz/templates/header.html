<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;600&family=Fira+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="topbar">
      <a href="{{ base_url }}/" class="brand" aria-label="Hertz home">
        <svg class="brand-mark" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <rect x="1.5" y="10" width="2.4" height="7" rx="1" fill="currentColor"/>
          <rect x="6" y="6" width="2.4" height="11" rx="1" fill="currentColor"/>
          <rect x="10.5" y="2.5" width="2.4" height="14.5" rx="1" fill="currentColor"/>
          <rect x="15" y="8" width="2.4" height="9" rx="1" fill="currentColor"/>
        </svg>
        <span class="brand-name">Hertz</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/features/">Features</a>
        <a href="{{ base_url }}/pricing/">Pricing</a>
        <a href="{{ base_url }}/changelog/">Changelog</a>
      </nav>
      <button type="button" class="cmdk-trigger" data-search-open aria-label="Open search">
        <span class="cmdk-label">Search</span>
        <kbd class="cmdk-hint"><span aria-hidden="true">⌘</span>K</kbd>
      </button>
    </header>
