<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Desert Palette */
      --sand-light: #FEFAE0;
      --sand-mid: #FAEDCD;
      --dune-shadow: #D4A373;
      --oasis-green: #E9EDC9;
      --terra-cotta: #E07A5F;
      --text-main: #3E3B32;
      --text-muted: #6B6554;
      --bg-gradient: linear-gradient(135deg, #FFFDF7 0%, #FAEDCD 100%);
      --glass-bg: rgba(254, 250, 224, 0.4);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px 0 rgba(212, 163, 115, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Lora', serif;
      line-height: 1.8;
      margin: 0;
      color: var(--text-main);
      background: var(--bg-gradient);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, h4, h5, h6, .site-logo {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      position: sticky;
      top: 1rem;
      z-index: 100;
    }

    .site-logo {
      font-size: 1.5rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .site-logo:hover { color: var(--terra-cotta); }

    .site-header nav {
      display: flex;
      gap: 2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .site-header nav a {
      color: var(--text-main);
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .site-header nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--terra-cotta);
      transition: width 0.3s ease;
    }

    .site-header nav a:hover { color: var(--terra-cotta); }
    .site-header nav a:hover::after { width: 100%; }

    /* Main Content */
    .site-main {
      flex-grow: 1;
      padding: 3rem;
      animation: fadeIn 1s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .site-footer {
      padding: 2rem;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    /* Typography inside main */
    .site-main h1 { font-size: 2.5rem; text-align: center; margin-bottom: 1.5rem; position: relative; padding-bottom: 1rem; }
    .site-main h1::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: var(--dune-shadow);
    }

    .site-main h2 { font-size: 1.8rem; margin-top: 2.5rem; color: var(--dune-shadow); }
    .site-main p { font-size: 1.1rem; margin-bottom: 1.5rem; }

    .site-main a {
      color: var(--terra-cotta);
      text-decoration: none;
      border-bottom: 1px dotted var(--terra-cotta);
      transition: all 0.2s ease;
    }
    .site-main a:hover {
      color: var(--dune-shadow);
      border-bottom-style: solid;
    }

    /* Code Blocks */
    code {
      font-family: 'Montserrat', monospace;
      font-size: 0.85em;
      background: rgba(212, 163, 115, 0.15);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      color: var(--dune-shadow);
    }
    pre {
      background: rgba(62, 59, 50, 0.9);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--text-main);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }
    pre code { background: none; color: var(--sand-light); border: none; padding: 0; }

    /* Syntax Highlighting overrides for dark background */
    .hljs { color: #FEFAE0; }

    /* Lists */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1.5rem;
    }
    ul.section-list li {
      padding: 1.5rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.3);
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(212, 163, 115, 0.15);
      background: rgba(255,255,255,0.5);
    }
    ul.section-list li a {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-main);
      border: none;
    }
    ul.section-list li a:hover { color: var(--terra-cotta); }

    /* Pagination */
    nav.pagination { margin: 3rem 0 1rem; display: flex; justify-content: center; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.5rem;
    }
    nav.pagination a, nav.pagination span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--dune-shadow);
      color: var(--text-main);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    nav.pagination a:hover {
      background: var(--dune-shadow);
      color: white;
    }
    .pagination-current span {
      background: var(--terra-cotta);
      color: white;
      border-color: var(--terra-cotta);
      box-shadow: 0 4px 10px rgba(224, 122, 95, 0.3);
    }
    .pagination-disabled span {
      border-color: var(--glass-border);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-wrapper { padding: 1rem; }
      .site-header { flex-direction: column; gap: 1.5rem; padding: 1.5rem; position: static; }
      .site-main { padding: 2rem 1.5rem; }
      .site-main h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>

    <main class="site-main glass-panel">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer glass-panel">
      &copy; {{ site.title }}. Styled with Glassmorphism & Desert Sands.
    </footer>
  </div>
</body>
</html>
