{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <h1>{{ taxonomy.name | capitalize }}</h1>
</div>

<div class="taxonomy-terms tags">
    {% for term in taxonomy.terms %}
    <a href="{{ term.url }}" class="tag" style="font-size: 1rem; padding: 0.5rem 1rem;">
        {{ term.name }} ({{ term.pages | length }})
    </a>
    {% endfor %}
</div>
{% endblock %}
