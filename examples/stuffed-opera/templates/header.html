<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <!-- Opulent old-world fonts: Cinzel for titles, Playfair & EB Garamond for the program -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@400;500;600;700&family=EB+Garamond:ital,wght@400;500;600;700&amp;display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default('') }}">
  <!-- Theater Curtains (animated open by JS) -->
  <div class="theater-curtain left" aria-hidden="true"></div>
  <div class="theater-curtain right" aria-hidden="true"></div>

  <div class="site-wrapper">
    <header class="site-header">
      <div class="curtain-swag left" aria-hidden="true"></div>
      <div class="curtain-swag right" aria-hidden="true"></div>

      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>

      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ base_url }}/">The House</a>
        <a href="{{ base_url }}/posts/">The Repertoire</a>
        <a href="{{ base_url }}/tags/">Archives</a>
        <a href="{{ base_url }}/about/">The Company</a>
      </nav>
    </header>

    <!-- Spotlight follows the mouse (theatrical unease) -->
    <div id="spotlight" class="spotlight" aria-hidden="true"></div>
