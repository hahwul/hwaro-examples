<blockquote class="preserved-voice">
  <span class="voice-label">PRESERVED VOICE • {{ role | default("UNNAMED PERFORMER") | upper }}</span>
  {{ body | default(content) | safe }}
  {% if year %}<div style="margin-top:1rem; font-size:0.72rem; text-align:right; opacity:0.6;">Recorded {{ year }} • Still singing</div>{% endif %}
</blockquote>
