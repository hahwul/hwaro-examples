<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background velvet circle -->
  <circle cx="32" cy="32" r="30" fill="#3D1A1F"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#8C6F4A" stroke-width="1.5" opacity="0.6"/>

  <!-- Taxidermied Nightingale body (slightly too still) -->
  <ellipse cx="29" cy="34" rx="13" ry="11" fill="#D9BFA8" stroke="#5C2A33" stroke-width="1.2"/>
  <!-- Wing (folded, preserved) -->
  <path d="M22 29 Q15 38 19 46" fill="none" stroke="#C9A88F" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M23 30 Q17 37 20 43" fill="none" stroke="#B89B6E" stroke-width="2"/>

  <!-- Head -->
  <circle cx="38" cy="28" r="7.5" fill="#D9BFA8" stroke="#5C2A33" stroke-width="1"/>

  <!-- Glass eye (uncanny, reflective, dead) -->
  <circle cx="40" cy="27" r="3.2" fill="#EDE3D3"/>
  <circle cx="40.8" cy="26.3" r="1.6" fill="#3D1A1F"/>
  <!-- Tiny highlight that makes it look wet and wrong -->
  <circle cx="39.4" cy="26" r="0.7" fill="#F4EDE1" opacity="0.9"/>

  <!-- Stitched beak (beautiful but clearly sewn shut) -->
  <path d="M43 29.5 L48.5 27.5 L48.5 30.5 Z" fill="#8C6F4A"/>
  <!-- Stitches across the beak -->
  <line x1="44.5" y1="28.3" x2="47" y2="28.1" stroke="#3D1A1F" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="44.7" y1="29.2" x2="47.1" y2="29.4" stroke="#3D1A1F" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Music note emerging from the beak (the voice that cannot stop) -->
  <g fill="#C5A26F">
    <!-- Note head -->
    <ellipse cx="52" cy="23" rx="2.8" ry="2.1" transform="rotate(-18 52 23)"/>
    <!-- Stem -->
    <line x1="54.2" y1="21.6" x2="54.3" y2="13" stroke="#C5A26F" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M54.3 13 Q58 15.5 57.5 19" fill="none" stroke="#C5A26F" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Subtle sawdust texture dots -->
  <circle cx="24" cy="38" r="0.6" fill="#B89B6E" opacity="0.5"/>
  <circle cx="33" cy="42" r="0.5" fill="#C5A26F" opacity="0.4"/>
  <circle cx="27" cy="30" r="0.45" fill="#8C6F4A" opacity="0.35"/>

  <!-- Thin gold frame (glass case reference) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#B89B6E" stroke-width="0.8" opacity="0.35"/>
</svg>