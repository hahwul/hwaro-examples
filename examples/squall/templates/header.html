<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.url == "/" %}{{ site.title | e }} — {{ site.description | e }}{% else %}{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 28 28" aria-hidden="true" focusable="false">
          <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
          <circle cx="14" cy="14" r="7.5" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.55"/>
          <circle cx="14" cy="14" r="3" fill="currentColor"/>
        </svg>
        <span class="brand-word">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
        <a href="{{ base_url }}/passages/"{% if page.section == "passages" %} aria-current="page"{% endif %}>Passages</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a class="site-nav-feed" href="{{ base_url }}/passages/rss.xml">
          <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M2 2a12 12 0 0 1 12 12M2 6.5A7.5 7.5 0 0 1 9.5 14M3.4 11a1.4 1.4 0 1 1 0 2.8 1.4 1.4 0 0 1 0-2.8Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span>RSS</span>
        </a>
      </nav>
    </div>
  </header>
