{% if p.extra.barometer_trend == "rising" %}
<span class="baro baro-rising baro-lg">
  <svg viewBox="0 0 12 16" aria-hidden="true" focusable="false"><path d="M6 14V2M2 6l4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span class="baro-text">{{ p.extra.barometer }} hPa, rising</span>
</span>
{% elif p.extra.barometer_trend == "falling" %}
<span class="baro baro-falling baro-lg">
  <svg viewBox="0 0 12 16" aria-hidden="true" focusable="false"><path d="M6 2v12M2 10l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span class="baro-text">{{ p.extra.barometer }} hPa, falling</span>
</span>
{% endif %}
