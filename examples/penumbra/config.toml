title = "Penumbra"
description = "An after-dark modular synth meetup of patch sessions and ambient sets"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg"]

[highlight]
enabled = true
theme = "vs2015"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = false

[feeds]
enabled = false

[sitemap]
enabled = true

[robots]
enabled = true

[og]
type = "article"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
