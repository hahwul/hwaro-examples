<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="rack">
    <header class="site-header">
      <a href="{{ base_url }}/" class="brand" aria-label="Penumbra — home">
        <span class="brand-jack" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24" focusable="false">
            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3.4" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand-word">Penumbra</span>
        <span class="brand-sub">MODULAR / AFTER DARK</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/performances/">Performances</a>
        <a href="{{ base_url }}/schedule/">Schedule</a>
        <a href="{{ base_url }}/venue/">Venue</a>
        <a href="{{ base_url }}/register/" class="nav-cta">Register</a>
      </nav>
    </header>
