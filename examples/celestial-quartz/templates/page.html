{% extends "base.html" %}

{% block content %}
<article class="glass-panel page-content">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="markdown-body">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
