<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% if page is defined and page.title %}{{ page.title }} | {% endif %}{% if site is defined and site.title %}{{ site.title }}{% else %}Celestial Quartz{% endif %}{% endblock %}</title>

    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif site is defined and site.description %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="ambient-background">
        <div class="orb orb-pink"></div>
        <div class="orb orb-cyan"></div>
        <div class="orb orb-purple"></div>
        <div class="mesh-grid"></div>
    </div>

    <div class="site-wrapper">
        {% include "header.html" %}

        <main class="main-content">
            {% block content %}{% endblock content %}
        </main>

        {% include "footer.html" %}
    </div>
</body>
</html>
