<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #ffcc00;
            --comic: #f0f0f0;
            --shadow: rgba(0,0,0,0.2);
        }
        body {
            background-color: var(--comic);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            -webkit-text-stroke: 1px #000;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .network-panel {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 0 #000;
            margin-bottom: 80px;
            border: 4px solid #000;
            position: relative;
        }
        .network-panel::after {
            content: 'CARTOON_v1.0';
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            color: #ccc;
        }
        h2 { font-family: 'Bangers', cursive; font-size: 3rem; color: var(--text); margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; }
        article { margin-top: 40px; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cartoon.network</div>
            <nav>
                <a href="/">Show</a>
                <a href="/about">Episode</a>
            </nav>
        </div>
    </header>
