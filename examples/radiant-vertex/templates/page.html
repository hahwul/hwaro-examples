{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.date %}
    <span class="card-date" style="margin-top: 1rem;">{{ page.date | date("%Y.%m.%d") }}</span>
    {% endif %}
</header>
<div class="content">
    {{ content | safe }}
</div>
{% endblock %}
