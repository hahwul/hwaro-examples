<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f4f4f4;
            --accent-color: #d83b01;
            --border-color: #333333;
            --sub-text: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        /* Sidebar Sidebar */
        aside {
            border-right: 2px solid var(--border-color);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .site-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            word-wrap: break-word;
        }

        .site-desc {
            font-size: 0.85rem;
            color: var(--sub-text);
            margin-bottom: 3rem;
            font-family: 'Space Mono', monospace;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            margin-bottom: 1rem;
        }

        nav ul li a {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            padding-bottom: 0.2rem;
            border-bottom: 2px solid transparent;
            width: fit-content;
        }

        nav ul li a:hover {
            border-bottom-color: var(--accent-color);
        }

        .footer-info {
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--sub-text);
            font-family: 'Space Mono', monospace;
        }

        /* Main Content */
        main {
            padding: 4rem;
            max-width: 1200px;
        }

        .page-header {
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 4px solid var(--accent-color);
        }

        .page-title {
            font-size: 4rem;
            line-height: 1;
        }

        .content {
            font-size: 1.125rem;
        }

        .content h2 {
            font-size: 2.5rem;
            margin: 3rem 0 1.5rem;
            color: var(--accent-color);
        }

        .content p {
            margin-bottom: 1.5rem;
            max-width: 80ch;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            border: 2px solid var(--border-color);
            padding: 2rem;
            background-color: #151515;
            transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-title a {
            color: var(--text-color);
        }

        .card-title a:hover {
            color: var(--accent-color);
        }

        .card-date {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--sub-text);
            margin-bottom: 1.5rem;
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }

            aside {
                position: relative;
                height: auto;
                border-right: none;
                border-bottom: 2px solid var(--border-color);
                padding: 2rem;
            }

            main {
                padding: 2rem;
            }

            .page-title {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <aside>
        <div>
            <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
            <p class="site-desc">{{ site.description }}</p>
        </div>
        <nav>
            <ul>
                <li><a href="{{ base_url }}/">Home</a></li>
                <li><a href="{{ base_url }}/projects/">Projects</a></li>
                <li><a href="{{ base_url }}/about/">About</a></li>
            </ul>
        </nav>
        <div class="footer-info">
            &copy; {{ current_year }} RADIANT VERTEX.<br>
            BUILT WITH HWARO.
        </div>
    </aside>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
