{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <h1 class="page-title">{{ taxonomy_name | upper }}</h1>
</header>
<div class="content">
    <ul>
        {% for term_name, term_data in taxonomy_terms %}
            <li>
                <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term_name | slugify }}/">{{ term_name }} ({{ term_data.pages | length }})</a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
