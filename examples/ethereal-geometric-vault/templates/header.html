<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} &mdash; {% elif section.title %}{{ section.title }} &mdash; {% endif %}{{ site.title }}</title>
  {% if page.description %}
    <meta name="description" content="{{ page.description }}">
  {% elif site.description %}
    <meta name="description" content="{{ site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1014;
      --surface: #1a1c23;
      --text: #e2e4eb;
      --text-muted: #8b8e99;
      --border: #2a2c36;
      --accent: #ffffff;

      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--border);
      margin: 2vw;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-serif);
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .site-header {
      padding: 3rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--surface);
    }

    .site-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      color: var(--accent);
      border: none;
    }

    .site-title:hover {
      border: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .site-main {
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Geometric Vault Specifics */
    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .vault-card {
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      background-color: var(--surface);
      transition: transform 0.4s ease, border-color 0.4s ease;
    }

    .vault-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
    }

    .vault-card::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      width: 10px;
      height: 10px;
      border-top: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .vault-card::after {
      content: '';
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 10px;
      height: 10px;
      border-bottom: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .vault-card:hover::before,
    .vault-card:hover::after {
      opacity: 1;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: block;
    }

    .geometric-shape {
      width: 100%;
      height: 150px;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .shape-circle {
      width: 80px;
      height: 80px;
      border: 1px solid var(--text-muted);
      border-radius: 50%;
    }

    .shape-square {
      width: 80px;
      height: 80px;
      border: 1px solid var(--text-muted);
      transform: rotate(45deg);
    }

    .shape-line {
      width: 120px;
      height: 1px;
      background-color: var(--text-muted);
    }

    .content-article {
      max-width: 800px;
      margin: 0 auto;
    }

    .content-article h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .article-meta {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    .content-article p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      color: var(--text);
    }

    .content-article ul {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      body {
        margin: 0;
        border: none;
      }
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
    <nav class="nav-links">
      <a href="{{ base_url }}/">Index</a>
      <a href="{{ base_url }}/about/">Manifesto</a>
    </nav>
  </header>
