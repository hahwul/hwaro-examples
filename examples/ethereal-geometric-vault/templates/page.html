{% include "header.html" %}
  <main class="site-main">
    <article class="content-article">
      <h1>{{ page.title }}</h1>
      <div class="article-meta">
        {% if page.date %}
          <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        {% endif %}
      </div>

      {{ content | safe }}

    </article>
  </main>
{% include "footer.html" %}
