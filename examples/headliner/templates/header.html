<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #ffcc00;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 2px solid var(--text);
        }
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .headline-hero {
            padding: 100px 0;
            text-align: center;
            border-bottom: 2px solid var(--text);
        }
        .headline-hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 10vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -5px;
        }
        .sub-headline {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        article { padding: 80px 0; text-align: center; }
        h2 { font-family: 'Unbounded', sans-serif; font-size: 4rem; text-transform: uppercase; margin-bottom: 40px; letter-spacing: -2px; }
        p { font-size: 1.2rem; max-width: 700px; margin-left: auto; margin-right: auto; margin-bottom: 30px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">HEADLINER.</div>
            <nav>
                <a href="/">Front Page</a>
                <a href="/about">Archive</a>
            </nav>
        </div>
    </header>
