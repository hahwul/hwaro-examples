{#- Signature element: tutorial difficulty as a row of tiny robot-arm
    pictograms. Expects `d` (1..3) to be set in the including context. -#}
<span class="difficulty" role="img" aria-label="Difficulty: {{ d }} of 3 robot arms">
  <svg class="picto is-on" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4.5 17.5h9"/><path d="M9 17.5v-5.3"/><path d="M9 12.2l4.3-4.5"/><path d="M13.3 7.7l3.2-1"/><path d="M16.5 6.7l1.8-2.1"/><path d="M16.5 6.7l2.3 1.1"/><circle cx="9" cy="12.2" r="1.15" fill="currentColor" stroke="none"/><circle cx="13.3" cy="7.7" r="1.15" fill="currentColor" stroke="none"/></svg>
  <svg class="picto {% if d >= 2 %}is-on{% else %}is-off{% endif %}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4.5 17.5h9"/><path d="M9 17.5v-5.3"/><path d="M9 12.2l4.3-4.5"/><path d="M13.3 7.7l3.2-1"/><path d="M16.5 6.7l1.8-2.1"/><path d="M16.5 6.7l2.3 1.1"/><circle cx="9" cy="12.2" r="1.15" fill="currentColor" stroke="none"/><circle cx="13.3" cy="7.7" r="1.15" fill="currentColor" stroke="none"/></svg>
  <svg class="picto {% if d >= 3 %}is-on{% else %}is-off{% endif %}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4.5 17.5h9"/><path d="M9 17.5v-5.3"/><path d="M9 12.2l4.3-4.5"/><path d="M13.3 7.7l3.2-1"/><path d="M16.5 6.7l1.8-2.1"/><path d="M16.5 6.7l2.3 1.1"/><circle cx="9" cy="12.2" r="1.15" fill="currentColor" stroke="none"/><circle cx="13.3" cy="7.7" r="1.15" fill="currentColor" stroke="none"/></svg>
</span>
