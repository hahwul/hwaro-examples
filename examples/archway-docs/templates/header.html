<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="docs-header">
    <a href="{{ base_url }}/" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Archway <span>ADR Docs</span>
    </a>

    <div class="header-right">
      <button class="search-trigger" onclick="openSearch()" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
        <kbd>&#8984;K</kbd>
      </button>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search documentation..." autocomplete="off">
        <kbd onclick="closeSearch()" style="cursor: pointer">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div class="docs-container">
    <aside class="docs-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Documentation</div>
        <ul class="sidebar-links">
          <li><a href="{{ base_url }}/" {% if page.path == "/" %}class="active"{% endif %}>Introduction</a></li>
          <li><a href="{{ base_url }}/adr/" {% if page.section == "adr" %}class="active"{% endif %}>Architecture Records</a></li>
        </ul>
      </div>

      {% if section and section.pages %}
      <div class="sidebar-section">
        <div class="sidebar-title">In this section</div>
        <ul class="sidebar-links">
          {% for p in section.pages %}
          <li><a href="{{ p.permalink }}" {% if page.path == p.path %}class="active"{% endif %}>{{ p.title }}</a></li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}
    </aside>
    <main class="docs-main">
