{% extends "base.html" %}

{% block content %}
<div class="content-wrapper">
    <div class="glass-card main-card">
        {{ content | safe }}

        <div class="interactive-element">
            <button class="neon-button">Initialize Sequence</button>
        </div>
    </div>

    <div class="glass-card secondary-card">
        <h3>System Status</h3>
        <ul>
            <li><span class="status-indicator online"></span> Core Systems: Online</li>
            <li><span class="status-indicator online"></span> Aurora Sync: Stable</li>
            <li><span class="status-indicator warning"></span> Nexus Link: Connecting...</li>
        </ul>
    </div>
</div>
{% endblock %}
