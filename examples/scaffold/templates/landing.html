{% include "header.html" %}

<main class="main">
  <div class="container">
    <div class="logo-mark">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="48" rx="4" stroke="#c0c0c0" stroke-width="2" fill="none"/>
        <rect x="16" y="16" width="32" height="32" rx="2" stroke="#808080" stroke-width="1.5" fill="none"/>
        <line x1="24" y1="28" x2="40" y2="28" stroke="#c0c0c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="24" y1="34" x2="36" y2="34" stroke="#808080" stroke-width="2" stroke-linecap="round"/>
        <circle cx="32" cy="48" r="2" fill="#c0c0c0"/>
      </svg>
    </div>

    <p class="overline">Under Construction</p>
    <h1 class="title">Something is being built.</h1>
    <p class="subtitle">We are working on something new. Stay tuned for updates.</p>

    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="countdown-value" id="days">--</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-item">
        <span class="countdown-value" id="hours">--</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-item">
        <span class="countdown-value" id="minutes">--</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-item">
        <span class="countdown-value" id="seconds">--</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <div class="progress-section">
      <div class="milestones">
        <div class="milestone completed">
          <div class="milestone-dot"></div>
          <span class="milestone-text">Concept</span>
        </div>
        <div class="milestone-line completed-line"></div>
        <div class="milestone completed">
          <div class="milestone-dot"></div>
          <span class="milestone-text">Design</span>
        </div>
        <div class="milestone-line active-line"></div>
        <div class="milestone active">
          <div class="milestone-dot"></div>
          <span class="milestone-text">Development</span>
        </div>
        <div class="milestone-line"></div>
        <div class="milestone">
          <div class="milestone-dot"></div>
          <span class="milestone-text">Launch</span>
        </div>
      </div>
    </div>

    <div class="subscribe-section">
      <p class="subscribe-text">Get notified when we launch.</p>
      <form class="subscribe-form" id="subscribe-form">
        <input
          type="email"
          class="subscribe-input"
          placeholder="your@email.com"
          required
          aria-label="Email address"
        />
        <button type="submit" class="subscribe-btn">Notify Me</button>
      </form>
      <p class="subscribe-note" id="form-message"></p>
    </div>
  </div>
</main>

<script>
(function() {
  var launchDate = new Date();
  launchDate.setDate(launchDate.getDate() + 45);
  launchDate.setHours(0, 0, 0, 0);

  function update() {
    var now = new Date().getTime();
    var diff = launchDate.getTime() - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '0';
      document.getElementById('hours').textContent = '0';
      document.getElementById('minutes').textContent = '0';
      document.getElementById('seconds').textContent = '0';
      return;
    }

    var d = Math.floor(diff / (1000 * 60 * 60 * 24));
    var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = d;
    document.getElementById('hours').textContent = h < 10 ? '0' + h : h;
    document.getElementById('minutes').textContent = m < 10 ? '0' + m : m;
    document.getElementById('seconds').textContent = s < 10 ? '0' + s : s;
  }

  update();
  setInterval(update, 1000);

  document.getElementById('subscribe-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var msg = document.getElementById('form-message');
    msg.textContent = 'Thank you. We will let you know when we launch.';
    msg.classList.add('visible');
    this.reset();
  });
})();
</script>
