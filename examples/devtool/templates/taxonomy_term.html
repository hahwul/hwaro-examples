{% include "header.html" %}

<div class="taxonomy-term">
    <header class="page-header">
        <h1>#{{ taxonomy_term }}</h1>
    </header>

    <ul class="post-list">
        {% for post in taxonomy_pages %}
        <li class="post-item">
            <h2 class="post-title"><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h2>
            {% if post.date %}
            <div class="post-meta">
                <time datetime="{{ post.date | date("%Y-%m-%d") }}">{{ post.date | date("%B %d, %Y") }}</time>
            </div>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</div>

{% include "footer.html" %}
