<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="utf-8">
    <title>{% if page.title is present %}{{ page.title }} | {% endif %}{{ site_title }}</title>
    <meta name="description" content="{{ site_description }}">
    <style>
        :root {
            --bg-color: #f7f7f7;
            --text-color: #222222;
            --accent-color: #555555;
            --border-color: #dddddd;
            --font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        header {
            margin-bottom: 4rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.05em;
            margin: 0;
            color: var(--text-color);
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-top: 2rem;
            color: var(--accent-color);
        }
        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
            transition: border-color 0.2s ease;
        }
        a:hover {
            border-color: var(--text-color);
        }
        .nav-links {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }
        .content {
            margin-bottom: 4rem;
            font-size: 1.1rem;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-item {
            margin-bottom: 2rem;
        }
        .post-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        footer {
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            font-size: 0.9rem;
            color: var(--accent-color);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ base_url }}" style="border-bottom: none;">{{ site_title }}</a></h1>
            <div class="nav-links">
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/about/">About</a>
            </div>
        </header>
        <main class="content">
            {% block content %}{% endblock content %}
        </main>
        <footer>
            &copy; 2024 {{ site_title }}. Built with Hwaro.
            {{ highlight_js }}
            {{ auto_includes_js }}
        </footer>
    </div>
</body>
</html>
