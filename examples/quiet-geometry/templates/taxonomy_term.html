{% extends "base.html" %}
{% block content %}
    <h2>Tag: {{ term }}</h2>
    <ul class="post-list">
    {% for post in pages %}
        <li class="post-item">
            <div class="post-title"><a href="{{ post.path }}">{{ post.title }}</a></div>
        </li>
    {% endfor %}
    </ul>
{% endblock content %}
