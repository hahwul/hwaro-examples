{% extends "base.html" %}
{% block content %}
    <div class="section-body">
        {{ content | safe }}
    </div>
    <ul class="post-list">
    {% for post in section.pages %}
        <li class="post-item">
            <div class="post-title"><a href="{{ post.path }}">{{ post.title }}</a></div>
            {% if post.description is present %}
            <div class="post-description">{{ post.description }}</div>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
{% endblock content %}
