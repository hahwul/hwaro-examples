<!DOCTYPE html>
<html lang="{{ page_language | default('en', true) }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ math_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Cairn — home">
        <svg class="mark" width="22" height="26" viewBox="0 0 22 26" aria-hidden="true" focusable="false">
          <rect x="6" y="1" width="10" height="5" rx="2.3" fill="currentColor"/>
          <rect x="1" y="8" width="20" height="6" rx="2.8" fill="currentColor"/>
          <rect x="4" y="16" width="14" height="6" rx="2.8" fill="currentColor"/>
        </svg>
        <span>Cairn</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/releases/">Releases</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
