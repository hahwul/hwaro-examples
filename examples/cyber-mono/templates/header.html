<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% else %}A Cyber Mono page{% endif %}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg: #111111;
    --fg: #eeeeee;
    --accent: #00ff00;
    --border: #333333;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--fg); line-height: 1.5; margin: 0; padding: 0; text-transform: lowercase; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; border-left: 2px solid var(--border); border-right: 2px solid var(--border); min-height: 100vh; display: flex; flex-direction: column; }
  header { border-bottom: 2px solid var(--accent); padding-bottom: 1rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; }
  header h1 { font-size: 2rem; margin: 0; color: var(--accent); letter-spacing: -1px; }
  header nav a { color: var(--fg); text-decoration: none; margin-left: 1rem; font-weight: bold; border: 1px solid var(--border); padding: 0.2rem 0.5rem; transition: all 0.2s; }
  header nav a:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  main { flex-grow: 1; }
  h1, h2, h3 { color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-top: 2rem; }
  code, pre { background: #000; border: 1px solid var(--border); padding: 0.2rem; }
  pre { padding: 1rem; overflow-x: auto; border-left: 4px solid var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">[home]</a>
        <a href="{{ base_url }}/about/">[about]</a>
      </nav>
    </header>
    <main>
