{% include "header.html" %}
  <h2>{{ section.title | e | default(value="section") }}</h2>
  <div class="content">
    {{ content | safe }}
  </div>
  <ul style="list-style-type: square; padding-left: 1.5rem;">
    {% if section.pages is defined %}
      {% for p in section.pages %}
        <li style="margin-bottom: 1rem;">
          <a href="{{ p.url }}" style="font-size: 1.2rem; font-weight: bold;">{{ p.title | e }}</a>
          <br>
          <span style="color: #888; font-size: 0.9rem;">{{ p.date | date(format="%Y-%m-%d") }}</span>
        </li>
      {% endfor %}
    {% endif %}
  </ul>
{% include "footer.html" %}
