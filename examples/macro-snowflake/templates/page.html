{% extends "base.html" %}

{% block content %}
<article class="page-container glass-panel">
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <div class="meta-info">
            <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
        </div>
        {% endif %}
    </header>
    
    <div class="content-body">
        {{ content | safe }}
    </div>
</article>

<style>
    .page-container {
        padding: 4rem;
        margin: 2rem auto;
    }

    .page-header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .meta-info {
        color: var(--accent-blue);
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        letter-spacing: 1px;
    }
    
    @media (max-width: 768px) {
        .page-container {
            padding: 2rem 1rem;
        }
    }
</style>
{% endblock %}
