{% extends "base.html" %}

{% block content %}
<div class="page-container glass-panel">
    <header class="page-header">
        <h1>Taxonomy: {{ taxonomy.name | capitalize }}</h1>
    </header>
    <div class="content-body text-center">
        <ul style="list-style: none; padding: 0;">
            {% for term in terms %}
            <li style="display: inline-block; margin: 0.5rem;">
                <a href="{{ term.permalink }}" style="padding: 0.5rem 1rem; border: 1px solid var(--glass-border); border-radius: 2px; background: rgba(0,240,255,0.05);">
                    {{ term.name }} ({{ term.pages | length }})
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
