{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_name | default("Taxonomy") | title }}</h1>

  <ul class="item-list">
    {% if taxonomy_terms is defined %}
      {% for term in taxonomy_terms %}
        <li class="item-card">
          <h2><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">{{ term.name }}</a></h2>
          <p>{{ term.pages | length }} Items</p>
        </li>
      {% endfor %}
    {% endif %}
  </ul>
{% endblock %}
