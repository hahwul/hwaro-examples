{% extends "base.html" %}

{% block content %}
    <h1>{% if term %}{{ term.name }}{% else %}Term{% endif %}</h1>

    {% if term and term.pages %}
        <div class="content-grid">
            {% for p in term.pages %}
                <article class="card">
                    <h3 class="card-title"><a href="{{ base_url }}{{ p.path }}">{{ p.title }}</a></h3>
                    {% if p.description %}
                        <p class="card-desc">{{ p.description }}</p>
                    {% endif %}
                </article>
            {% endfor %}
        </div>
    {% endif %}
{% endblock %}
