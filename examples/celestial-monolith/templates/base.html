<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
        :root {
            --bg-void: #050505;
            --text-stark: #f8f9fa;
            --accent-monolith: #e9ecef;
            --border-strict: #343a40;
            --grid-line: #212529;
            --font-mono: 'Space Mono', 'IBM Plex Mono', 'Courier New', Courier, monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-stark);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto;
            /* Grid background pattern using pure solid lines, no gradients */
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* Override the gradient background to be pure solid lines by using repeating-linear-gradient with solid stops */
        body {
            background-image: repeating-linear-gradient(var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px),
                              repeating-linear-gradient(90deg, var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px);
        }

        .monolith-container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
            display: grid;
            gap: 2rem;
        }

        header {
            border-bottom: 2px solid var(--text-stark);
            padding-bottom: 2rem;
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            background-color: var(--bg-void);
        }

        .site-title {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            color: var(--text-stark);
            text-decoration: none;
            display: inline-block;
            background-color: var(--text-stark);
            color: var(--bg-void);
            padding: 0.2em 0.4em;
        }

        .site-desc {
            font-family: var(--font-mono);
            font-size: 1rem;
            margin-top: 1rem;
            color: var(--accent-monolith);
            border-left: 4px solid var(--border-strict);
            padding-left: 1rem;
        }

        nav {
            margin-top: 2rem;
            width: 100%;
            display: flex;
            gap: 1.5rem;
            border-top: 1px solid var(--border-strict);
            padding-top: 1rem;
        }

        nav a {
            color: var(--text-stark);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: background-color 0.2s, color 0.2s;
            padding: 0.2rem 0.5rem;
            border: 1px solid transparent;
        }

        nav a:hover {
            background-color: var(--text-stark);
            color: var(--bg-void);
            border-color: var(--text-stark);
        }

        main {
            background-color: var(--bg-void);
            border: 1px solid var(--border-strict);
            padding: 3rem;
            position: relative;
        }

        main::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 20px;
            height: 20px;
            border-top: 2px solid var(--text-stark);
            border-left: 2px solid var(--text-stark);
        }

        main::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            border-bottom: 2px solid var(--text-stark);
            border-right: 2px solid var(--text-stark);
        }

        h1, h2, h3 {
            font-family: var(--font-sans);
            font-weight: 800;
            margin-bottom: 1.5rem;
            margin-top: 2.5rem;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 3rem;
            line-height: 1.1;
            border-bottom: 4px solid var(--border-strict);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }

        h2 {
            font-size: 2rem;
            border-bottom: 1px solid var(--border-strict);
            padding-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--accent-monolith);
        }

        a {
            color: var(--text-stark);
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        a:hover {
            background-color: var(--text-stark);
            color: var(--bg-void);
            text-decoration: none;
        }

        blockquote {
            border-left: 4px solid var(--text-stark);
            margin: 2rem 0;
            padding: 1rem 2rem;
            background-color: rgba(255, 255, 255, 0.03); /* Extremely subtle solid fill */
            font-style: italic;
            font-family: var(--font-mono);
            color: var(--text-stark);
        }

        ul, ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
            color: var(--accent-monolith);
        }

        li {
            margin-bottom: 0.5rem;
        }

        code {
            font-family: var(--font-mono);
            background-color: var(--border-strict);
            padding: 0.2em 0.4em;
            font-size: 0.9em;
            color: var(--text-stark);
        }

        pre {
            background-color: var(--border-strict);
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border: 1px solid var(--grid-line);
        }

        pre code {
            background-color: transparent;
            padding: 0;
            color: var(--text-stark);
        }

        .post-meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--border-strict);
            margin-bottom: 2rem;
            text-transform: uppercase;
            display: flex;
            gap: 1rem;
        }

        .post-meta span {
            color: var(--text-stark);
            background-color: var(--grid-line);
            padding: 0.2rem 0.5rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            border: 1px solid var(--border-strict);
            padding: 1.5rem;
            background-color: var(--bg-void);
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--text-stark);
        }

        .card-title {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            margin-top: 0;
            border-bottom: none;
        }

        .card-title a {
            text-decoration: none;
            color: var(--text-stark);
        }

        .card-title a:hover {
            background-color: transparent;
            color: var(--text-stark);
            text-decoration: underline;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--accent-monolith);
            flex-grow: 1;
        }

        footer {
            border-top: 2px solid var(--text-stark);
            padding-top: 2rem;
            margin-bottom: 4rem;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-monolith);
            background-color: var(--bg-void);
            width: 100%;
        }

        @media (max-width: 768px) {
            .monolith-container {
                padding: 1rem;
            }
            main {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

<div class="monolith-container">
    <header>
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <div class="site-desc">{{ site.description }}</div>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; {{ now() | date(format="%Y") }} {{ site.title }}. ZERO GRADIENTS.
    </footer>
</div>

</body>
</html>
