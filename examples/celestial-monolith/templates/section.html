{% extends "base.html" %}

{% block content %}
    <h1>{{ page.title | default(value="Section") }}</h1>

    <div class="page-content">
        {{ content | safe }}
    </div>

    {% if section.pages %}
        <div class="content-grid">
            {% for p in section.pages %}
                <article class="card">
                    <h3 class="card-title"><a href="{{ base_url }}{{ p.path }}">{{ p.title }}</a></h3>
                    {% if p.description %}
                        <p class="card-desc">{{ p.description }}</p>
                    {% endif %}
                </article>
            {% endfor %}
        </div>
    {% endif %}
{% endblock %}
