{# The signature: a torn deckle-edge line standing in for the mould-made
   edge of hand-laid paper. It marks the seam between the reading column
   and the wide right margin on every spread. One instance per page. #}
<div class="seam" aria-hidden="true">
  <svg class="seam-svg" width="20" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="deckleTear" width="20" height="49" patternUnits="userSpaceOnUse">
        <path d="M9,0 L3,3.5 L14,7 L6,10.5 L17,14 L4,17.5 L12,21 L2,24.5 L15,28 L7,31.5 L18,35 L5,38.5 L11,42 L1,45.5 L9,49" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </pattern>
    </defs>
    <rect width="20" height="100%" fill="url(#deckleTear)"/>
  </svg>
</div>
