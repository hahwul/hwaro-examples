{% include "header.html" %}
  <main class="console">
    <article class="page-article">
      {% if page.title is present %}
        <div class="eyebrow">// {% if page.section is present %}{{ page.section }}{% else %}breakout{% endif %}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description is present %}
          <p style="font-family:'Inter',sans-serif;font-size:1.15rem;color:#c9d1d9;margin-bottom:2rem;line-height:1.7;">{{ page.description }}</p>
        {% endif %}
      {% endif %}
      {{ content }}
    </article>
  </main>
{% include "footer.html" %}
