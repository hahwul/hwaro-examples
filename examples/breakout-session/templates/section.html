{% include "header.html" %}
  <main class="console">
    <div class="eyebrow">// section</div>
    <h1 style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:2.8rem;letter-spacing:-0.03em;line-height:1.1;margin:0.3rem 0 0.5rem;">{{ page.title | e }}</h1>
    {% if page.description is present %}
      <p style="font-family:'Inter',sans-serif;font-size:1.15rem;color:#c9d1d9;margin-bottom:2rem;line-height:1.7;max-width:65ch;">{{ page.description }}</p>
    {% endif %}
    <div class="page-article" style="max-width:960px;margin:0;">{{ content }}</div>
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
