<!DOCTYPE html>
<html lang="{{ site.default_language | default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% elif section is defined and section.title %}{{ section.title }} | {% endif %}{{ site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020108;
            --crystal-cyan: #00f0ff;
            --crystal-magenta: #ff0055;
            --crystal-purple: #8a2be2;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Glowing Gradients */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at 15% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 40%);
            animation: glowPulse 10s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        a {
            color: var(--crystal-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--crystal-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
        }

        /* Glass Panel Utilities */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
        }

        /* Geometric Crystal Edges */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .glass-panel::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .site-title {
            font-size: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            background: linear-gradient(90deg, var(--crystal-cyan), var(--crystal-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        nav a:hover {
            color: var(--crystal-cyan);
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Content Styling */
        .content-area p {
            margin-bottom: 1.5rem;
        }

        .content-area ul, .content-area ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .content-area li {
            margin-bottom: 0.5rem;
        }

        .content-area code {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--crystal-cyan);
        }

        .content-area pre {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .content-area pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .content-area blockquote {
            border-left: 3px solid var(--crystal-magenta);
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="layout">
        <header>
            <a href="{{ site.base_url }}" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="{{ site.base_url }}">Home</a>
                <a href="{{ site.base_url }}about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2025 {{ site.title }}. Forged in the void.</p>
        </footer>
    </div>
</body>
</html>
