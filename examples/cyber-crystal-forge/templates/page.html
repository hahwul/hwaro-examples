{% extends "base.html" %}

{% block content %}
<article class="glass-panel content-area">
    {% if page is defined and page.title %}
        <h1>{{ page.title }}</h1>
    {% endif %}

    {% if page is defined and page.date %}
        <p class="text-muted"><small>{{ page.date }}</small></p>
    {% endif %}

    {{ content | safe }}
</article>
{% endblock %}
