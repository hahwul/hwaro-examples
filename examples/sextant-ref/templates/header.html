<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf7; --text: #4a3a2a; --accent: #8b4513; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 40px; margin-bottom: 80px; }
        .logo { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; color: var(--accent); }
        .sextant-surface { background: #fff; padding: 80px; border: 1px solid #ddd; box-shadow: 10px 10px 30px rgba(0,0,0,0.02); position: relative; }
        .arc { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 200px; height: 100px; border: 1px solid #eee; border-radius: 100px 100px 0 0; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">sextant.ref</div></header>
