{% include "header.html" %}
  <main class="site-main glass-panel">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for p in pages %}
      <li><a href="{{ p.permalink }}">{{ p.title | e }}</a></li>
      {% endfor %}
    </ul>
    {% if pagination is defined and pagination.total_pages is defined and pagination.total_pages > 1 %}
    {{ pagination }}
    {% endif %}
  </main>
{% include "footer.html" %}
