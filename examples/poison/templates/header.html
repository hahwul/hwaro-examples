<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <!-- Mobile toggle -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">&#9776;</button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="avatar">&#9762;</div>
      <h1><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </div>

    <ul class="sidebar-nav">
      <li><a href="{{ base_url }}/">Home</a></li>
      <li class="nav-heading">Content</li>
      <li class="nav-bullet"><a href="{{ base_url }}/posts/">Posts</a></li>
      <li class="nav-bullet"><a href="{{ base_url }}/tags/">Tags</a></li>
      <li class="nav-heading">Info</li>
      <li class="nav-bullet"><a href="{{ base_url }}/about/">About</a></li>
    </ul>

    <div class="sidebar-social">
      <a href="https://github.com" target="_blank" rel="noopener" title="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3M23 19V15a5 5 0 0 0-4-5 5 5 0 0 0-4 0 5 5 0 0 0-4 0 5 5 0 0 0-4 5v4"/><path d="M16 11a4 4 0 1 0-8 0 4 4 0 0 0 8 0z"/></svg>
      </a>
      <a href="{{ base_url }}/rss.xml" target="_blank" title="RSS">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
      </a>
    </div>
  </aside>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="content-main">
