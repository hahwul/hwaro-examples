<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Fraunces:wght@200;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e0e0;
            --text: #333;
            --accent: #555;
            --white: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 10px solid var(--white);
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--white);
            text-transform: lowercase;
            letter-spacing: -1px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .plaster-hero {
            padding: 120px 0;
            background: var(--white);
            box-shadow: 20px 20px 0 var(--accent);
            margin-top: 40px;
            text-align: center;
        }
        .plaster-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 8rem;
            font-weight: 200;
            margin: 0;
            line-height: 1;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Fraunces', serif; font-size: 3rem; border-bottom: 5px solid var(--white); display: inline-block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">plaster.</div>
            <nav>
                <a href="/">Material</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
