# =============================================================================
# Errata Slip -- Correction Insert Publication
# Issue #1531 | Tags: book, light, correction, layered, meta
# =============================================================================

title = "Errata Slip -- A Publication of Corrections"
description = "A meta-publication exploring the errata slip: the printed correction insert that acknowledges and amends errors in published works."
base_url = "http://localhost:3000"

sections = ["chapters"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]

[pagination]
enabled = false

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true
rules = [
  { user_agent = "*", disallow = [] }
]

[llms]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["chapters"]

[markdown]
safe = false
lazy_loading = true
emoji = false
