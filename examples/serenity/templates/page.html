{% include "header.html" %}

<article>
  <header class="post-header">
    {% if page.date %}
      <div class="post-meta">{{ page.date | date("%B %d, %Y") }}</div>
    {% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="content">
    {{ content }}
  </div>
</article>
