{% include "header.html" %}
  <main id="main" class="wrap page">
    <article class="page-body">
      <header class="page-head">
        <h1 class="dual page-dual"><span class="dual-first">{{ page.title | e }}</span></h1>
        {% if page.description %}<p class="page-standfirst">{{ page.description | e }}</p>{% endif %}
      </header>
      <div class="prose">{{ content | safe }}</div>
      <ul class="index-list">
        {% for p in section.pages %}
        <li><a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a></li>
        {% endfor %}
      </ul>
    </article>
  </main>
{% include "footer.html" %}
