<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M25.5 8 C22 4.8 11.5 4.6 8 11 C4.5 17.4 8.4 25.6 15.5 25.9 C21.6 26.2 24.9 21.8 24.9 17.6 L16.4 17.6"/>
        </svg>
        <span class="brand-text">
          <span class="brand-name">Glide</span>
          <span class="brand-echo" lang="fr">le bureau</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/services/">Services</a>
        <a href="{{ base_url }}/languages/">Languages</a>
        <a href="{{ base_url }}/process/">Process</a>
        <a href="{{ base_url }}/rates/">Rates</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
