{% include "header.html" %}
  <main id="main" class="wrap page">
    <article class="page-body">
      <header class="page-head">
        {% if page.extra.kicker %}<p class="kicker">{{ page.extra.kicker | e }}</p>{% endif %}
        <h1 class="dual page-dual">
          <span class="dual-first">{{ page.title | e }}</span>
          {% if page.extra.echo %}<span class="dual-echo" aria-hidden="true"{% if page.extra.echo_lang %} lang="{{ page.extra.echo_lang }}"{% endif %}>{{ page.extra.echo | e }}</span>{% endif %}
        </h1>
        {% if page.description %}<p class="page-standfirst">{{ page.description | e }}</p>{% endif %}
      </header>
      <div class="prose">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
