      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.3), transparent);
      margin-bottom: 2rem;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .footer-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .footer-text span {
      color: var(--neon-purple);

    .sys-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;

      background: rgba(0, 240, 255, 0.05);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      border: 1px solid rgba(0, 240, 255, 0.2);

      100% { opacity: 1; box-shadow: 0 0 8px var(--neon-cyan); }

  </style>
