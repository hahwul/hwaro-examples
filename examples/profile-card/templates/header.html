<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #1e293b; --accent: #6366f1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; width: 350px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); padding: 40px; text-align: center; border: 1px solid #f1f5f9; }
        .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(45deg, #6366f1, #a855f7); margin: 0 auto 20px; }
        h2 { margin: 10px 0; font-size: 1.5rem; font-weight: 700; }
        .bio { color: #64748b; font-size: 0.9rem; line-height: 1.6; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 30px; }
        .stat-val { font-weight: 700; display: block; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>
