{% include "header.html" %}
  <main class="site-wrapper">
    <div class="page-content">
      <div class="section-label">{{ page.section | default("record") | upper }}</div>
      <h1>{{ page.title }}</h1>
      <div class="page-meta">
        {{ page.date | date("%Y-%m-%d") }} // {{ page.date | date("%H:%M") }}
        {% if page.tags %}
        <div class="tag-list">
          {% for tag in page.tags %}
          <a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </div>
      <div class="prose">
        {{ content | safe }}
      </div>
    </div>
  </main>
{% include "footer.html" %}
