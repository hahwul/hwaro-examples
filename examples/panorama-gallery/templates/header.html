<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --panorama: #fdfdfd;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container-fluid {
            max-width: 100%;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .panorama-surface {
            background: #fff;
            padding: 100px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            width: 100%;
            box-sizing: border-box;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        h2 { font-weight: 700; font-size: 3rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; letter-spacing: -1px; }
        article { font-size: 1.2rem; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
    <header>
        <div class="container-fluid">
            <div class="logo">panorama.gallery</div>
            <nav>
                <a href="/">Horizon</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
