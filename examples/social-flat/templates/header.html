<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #3b82f6; --surface: #f9fafb; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px; }
        header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f3f4f6; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        .post { background: var(--surface); padding: 30px; border-radius: 4px; margin-bottom: 20px; }
        .author { font-weight: 700; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">social.flat</div></header>
