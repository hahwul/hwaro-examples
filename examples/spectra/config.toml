title = "Spectra: Full Spectrum Analysis"
description = "A data science visualization site for full spectrum color analysis."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[series]
enabled = true

[related]
enabled = true
limit = 5
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "categories"
paginate_by = 5

[[taxonomies]]
name = "authors"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"

[llms]
enabled = true
filename = "llms.txt"

[feeds]
enabled = true
type = "rss"
limit = 10

[markdown]
safe = false
lazy_loading = false
emoji = false

[extra]
author = "Spectral Lab"
theme_color = "#0a0a0a"
lab_id = "L-380-700"
spectral_range = "380nm - 700nm"
