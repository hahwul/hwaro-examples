<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #c0c0c0;
            --line: #333333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 100;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        nav a:hover { opacity: 1; color: var(--accent); }
        .blade-hero {
            padding: 120px 0;
            position: relative;
        }
        .blade-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
            z-index: -1;
        }
        .blade-hero h1 {
            font-size: 10rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: -5px;
        }
        article { padding: 60px 0; }
        h2 { font-weight: 100; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; border-left: 1px solid var(--accent); padding-left: 30px; }
        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
        .spec-item { border: 1px solid var(--line); padding: 20px; }
        .spec-item span { color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">SWITCHBLADE</div>
            <nav>
                <a href="/">Edge</a>
                <a href="/about">Mechanism</a>
            </nav>
        </div>
    </header>
