{% extends "base.html" %}

{% block content %}
<div class="taxonomy">
    <header class="taxonomy-header">
        <h2>{{ taxonomy_name | capitalize }}</h2>
    </header>

    <div class="term-list">
        {% for term in taxonomy_terms %}
        <a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term }}.html" class="term-link">{{ term }}</a>
        {% endfor %}
    </div>
</div>
{% endblock %}
