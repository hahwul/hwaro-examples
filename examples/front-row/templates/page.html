{% include "header.html" %}
  <main class="stage">
    <article class="page-article">
      {% if page.title is present %}
        <div class="eyebrow">{% if page.section is present %}{{ page.section }}{% else %}Front Row{% endif %}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description is present %}
          <p style="font-family:'Cormorant Infant',serif;font-style:italic;font-size:1.3rem;color:#3b2e2a;margin-bottom:2rem;">{{ page.description }}</p>
        {% endif %}
      {% endif %}
      {{ content }}
    </article>
  </main>
{% include "footer.html" %}
