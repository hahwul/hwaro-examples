title = "Front Row"
description = "A VIP access program for exclusive premium events, members-only previews, and private receptions."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[markdown]
safe = false
