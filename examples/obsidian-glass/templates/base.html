<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root { --bg: #09090b; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --text: #e2e8f0; --accent: #38bdf8; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
    .glass-container { max-width: 800px; margin: 2rem auto; padding: 2rem; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 2rem; }
    a { color: var(--accent); text-decoration: none; transition: text-shadow 0.2s; }
    a:hover { text-shadow: 0 0 8px var(--accent); }
    nav a { margin-left: 1rem; color: var(--text); }
    nav a:hover { color: var(--accent); }
    footer { border-top: 1px solid var(--glass-border); padding-top: 1rem; margin-top: 2rem; text-align: center; font-size: 0.9em; opacity: 0.7; }
    h1, h2, h3 { font-weight: 500; color: #fff; }
    code { background: rgba(255,255,255,0.1); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    pre { background: rgba(0,0,0,0.3) !important; padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); overflow-x: auto; }
    ul { list-style: none; padding: 0; }
    ul li { margin-bottom: 0.5rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; }
  </style>
  {{ highlight_css }}
</head>
<body>
  <div class="glass-container">
    <header>
      <a href="{{ base_url }}" style="font-weight:bold;font-size:1.2rem;color:#fff;">{{ site.title }}</a>
      <nav><a href="{{ base_url }}">Home</a><a href="{{ base_url }}/about/">About</a></nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer>Powered by Hwaro</footer>
  </div>
  {{ highlight_js }}
</body>
</html>
