<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #00ff41;
            --accent: #008f11;
            --shadow: rgba(0,0,0,0.5);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent);
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .terminal-box {
            background: var(--bg);
            padding: 60px;
            border-radius: 8px;
            box-shadow: 10px 10px 30px var(--shadow), -5px -5px 15px var(--highlight);
            margin-top: 40px;
            border: 1px solid #333;
        }
        h2 { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .prompt { color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">neu.terminal</div>
        <nav>
            <a href="/">Execute</a>
            <a href="/about">Status</a>
        </nav>
    </header>
