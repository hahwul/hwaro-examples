<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="color-scheme" content="dark">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="6" fill="#ff006e" opacity="0.9"/>
            <circle cx="14" cy="14" r="10" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.6"/>
            <ellipse cx="14" cy="14" rx="13" ry="5" stroke="#ff006e" stroke-width="0.8" fill="none" opacity="0.4" transform="rotate(30 14 14)"/>
            <ellipse cx="14" cy="14" rx="13" ry="5" stroke="#00b4d8" stroke-width="0.8" fill="none" opacity="0.4" transform="rotate(-30 14 14)"/>
          </svg>
        </span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
