<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ffcc00; --border: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        header { text-align: center; padding: 60px 0; }
        .logo { font-weight: 700; font-size: 2rem; letter-spacing: -1px; }
        .wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 30px; border: 2px solid #000; box-shadow: 8px 8px 0 #000; background: #fff; }
        .reactions { display: flex; gap: 10px; margin-top: 20px; }
        .reaction { background: #f0f0f0; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>
    <header><div class="logo">reaction.wall</div></header>
