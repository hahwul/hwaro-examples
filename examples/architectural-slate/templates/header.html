<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }} - {{ page.title | default(value=site.description) }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #e8e8e8;
      --text-color: #2b2b2b;
      --accent-color: #8c8c8c;
      --border-color: #2b2b2b;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      border-right: 2px solid var(--border-color);
      padding: 40px;
      display: flex;
      flex-direction: column;
    }
    .site-title {
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      color: var(--text-color);
      margin-bottom: 60px;
      display: block;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    nav ul li {
      margin-bottom: 20px;
    }
    nav ul li a {
      text-decoration: none;
      color: var(--text-color);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }
    nav ul li a:hover {
      color: var(--accent-color);
    }
    .main-content {
      flex-grow: 1;
      padding: 60px;
      max-width: 900px;
    }
    h1, h2, h3 {
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0;
    }
    .content-box {
      border: 2px solid var(--border-color);
      padding: 40px;
      background-color: #f5f5f5;
    }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <aside class="sidebar">
    <a href="{{ site.base_url }}/" class="site-title">{{ site.title }}</a>
    <nav>
      <ul>
        <li><a href="{{ site.base_url }}/">Home</a></li>
        <li><a href="{{ site.base_url }}/about/">About</a></li>
      </ul>
    </nav>
  </aside>
  <main class="main-content">
