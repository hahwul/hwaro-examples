{% include "header.html" %}
<article class="content-box">
  <h1>Taxonomy: {{ taxonomy }}</h1>
  <ul style="list-style: none; padding: 0;">
  {% for term, pages in terms %}
    <li style="margin-bottom: 15px;">
      <a href="{{ site.base_url }}/{{ taxonomy }}/{{ term }}/" style="text-decoration: none; color: var(--text-color); font-weight: bold; text-transform: uppercase;">{{ term }} ({{ pages | length }})</a>
    </li>
  {% endfor %}
  </ul>
</article>
{% include "footer.html" %}
