{% include "header.html" %}
<article class="content-box">
  <h1>{{ section.title }}</h1>
  <div class="page-content">
    {{ content | safe }}
  </div>
  <ul style="list-style: none; padding: 0;">
  {% for p in section.pages %}
    <li style="border-bottom: 1px solid var(--border-color); padding: 20px 0;">
      <a href="{{ site.base_url }}{{ p.permalink }}" style="text-decoration: none; color: var(--text-color); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">{{ p.title }}</a>
      <p style="font-size: 14px; color: var(--accent-color); margin-top: 10px;">{{ p.description | default(value="") }}</p>
    </li>
  {% endfor %}
  </ul>
</article>
{% include "footer.html" %}
