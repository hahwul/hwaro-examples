{% include "header.html" %}
<article class="content-box">
  <h1>Term: {{ term }}</h1>
  <ul style="list-style: none; padding: 0;">
  {% for p in pages %}
    <li style="border-bottom: 1px solid var(--border-color); padding: 15px 0;">
      <a href="{{ site.base_url }}{{ p.permalink }}" style="text-decoration: none; color: var(--text-color); font-weight: bold; text-transform: uppercase;">{{ p.title }}</a>
    </li>
  {% endfor %}
  </ul>
</article>
