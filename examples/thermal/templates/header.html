<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="{{ page.description | default(value=site.description) }}">
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

</head>
<body>
