{% extends "base.html" %}

{% block content %}
  <h1>{{ page.title | e }}</h1>
  <p class="taxonomy-desc">Browse all terms in {{ page.title | e }}:</p>
  {{ content | safe }}

  <ul class="taxonomies-list">
    {% for term in terms %}
      <li>
        <a href="{{ base_url }}{{ term.url }}">{{ term.name | e }} ({{ term.pages | length }})</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
