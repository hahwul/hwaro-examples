<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title><meta name="description" content="{{ page.description | default(site.description) }}"><link rel="icon" href="{{ base_url }}/favicon.svg">{{ og_all_tags }}{{ canonical_tag }}<script src="https://cdn.tailwindcss.com"></script><style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&amp;family=Inter:wght@600&amp;display=swap');body{font-family:'Inter',system-ui,sans-serif;background:#111;color:#ddd}.mono{font-family:'IBM Plex Mono',monospace}.glitch{animation:glitch 1.2s steps(1) infinite}.scanline{position:relative}.scanline:after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.35) 50%);background-size:100% 6px;pointer-events:none}@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-2px,0)}}</style></head><body class="bg-[#111] text-[#ddd]">
