<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="frame-container">
        <div class="corner-decoration top-left">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 0 L 120 0 C 80 0 20 20 20 100 L 0 120 Z" fill="var(--color-primary)"/>
                <path d="M 10 10 Q 50 10 50 50 Q 50 90 90 90" stroke="var(--color-secondary)" stroke-width="2" fill="none"/>
                <path d="M 5 5 Q 30 5 30 30 Q 30 55 55 55" stroke="var(--color-accent)" stroke-width="1" fill="none"/>
                <circle cx="20" cy="20" r="4" fill="var(--color-secondary)"/>
            </svg>
        </div>
        <div class="corner-decoration top-right">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 120 0 L 0 0 C 40 0 100 20 100 100 L 120 120 Z" fill="var(--color-primary)"/>
                <path d="M 110 10 Q 70 10 70 50 Q 70 90 30 90" stroke="var(--color-secondary)" stroke-width="2" fill="none"/>
                <path d="M 115 5 Q 90 5 90 30 Q 90 55 65 55" stroke="var(--color-accent)" stroke-width="1" fill="none"/>
                <circle cx="100" cy="20" r="4" fill="var(--color-secondary)"/>
            </svg>
        </div>
        <div class="corner-decoration bottom-left">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 120 L 120 120 C 80 120 20 100 20 20 L 0 0 Z" fill="var(--color-primary)"/>
                <path d="M 10 110 Q 50 110 50 70 Q 50 30 90 30" stroke="var(--color-secondary)" stroke-width="2" fill="none"/>
                <path d="M 5 115 Q 30 115 30 90 Q 30 65 55 65" stroke="var(--color-accent)" stroke-width="1" fill="none"/>
                <circle cx="20" cy="100" r="4" fill="var(--color-secondary)"/>
            </svg>
        </div>
        <div class="corner-decoration bottom-right">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 120 120 L 0 120 C 40 120 100 100 100 20 L 120 0 Z" fill="var(--color-primary)"/>
                <path d="M 110 110 Q 70 110 70 70 Q 70 30 30 30" stroke="var(--color-secondary)" stroke-width="2" fill="none"/>
                <path d="M 115 115 Q 90 115 90 90 Q 90 65 65 65" stroke="var(--color-accent)" stroke-width="1" fill="none"/>
                <circle cx="100" cy="100" r="4" fill="var(--color-secondary)"/>
            </svg>
        </div>

        <header class="site-header">
            <div class="brand">
                <a href="{{ base_url }}/">
                    <span class="site-title">{{ site.title }}</span>
                </a>
            </div>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/posts/">Articles</a>
                <a href="{{ base_url }}/tags/">Tags</a>
            </nav>
            <div class="header-divider">
                <svg viewBox="0 0 400 30" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%" height="30">
                    <path d="M 0 15 Q 100 0, 200 15 T 400 15" stroke="var(--color-primary)" stroke-width="1.5" fill="none"/>
                    <path d="M 0 15 Q 100 30, 200 15 T 400 15" stroke="var(--color-secondary)" stroke-width="1" fill="none" opacity="0.6"/>
                    <circle cx="200" cy="15" r="5" fill="var(--color-accent)"/>
                    <circle cx="100" cy="15" r="2" fill="var(--color-secondary)"/>
                    <circle cx="300" cy="15" r="2" fill="var(--color-secondary)"/>
                </svg>
            </div>
        </header>
        <main class="content">
