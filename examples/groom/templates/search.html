{% include "header.html" %}
<main id="main" class="prose-container">
  <h1>{{ page.title | e }}</h1>
  <form class="search-form" role="search" data-index="{{ base_url }}/search.json" onsubmit="return false;">
    <label for="search-input">Search Journal</label>
    <input id="search-input" type="search" autocomplete="off" autofocus placeholder="Type keywords...">
  </form>
  <p id="search-status" role="status" aria-live="polite"></p>
  <ul id="search-results"></ul>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
