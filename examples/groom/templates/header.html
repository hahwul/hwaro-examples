<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300..900;1,300..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('groom-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="container">
    <section class="masthead">
      <h1><a href="{{ base_url }}/" style="color: inherit; text-decoration: none;">Groom</a></h1>
      <div class="double-basting-line" aria-hidden="true"></div>
      <div class="masthead-meta">
        <span>Issue No. 4 &middot; Autumn 2025</span>
        <span class="masthead-tagline">A quarterly journal of classical barbering, bespoke tailoring, and the grooming arts</span>
        <span>Est. 2025</span>
      </div>
    </section>
  </header>
