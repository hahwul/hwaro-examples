{% include "header.html" %}
<main id="main" class="prose-container">
  <h1>Tags</h1>
  {% set tax = get_taxonomy(kind="tags") %}
  <div class="section-listing">
    {% for term in tax.items | sort_by("name") %}
    <a href="{{ get_taxonomy_url(kind="tags", term=term.name) }}" class="card">
      <h2 class="card-title">{{ term.name }}</h2>
      <p class="card-excerpt">{{ term.pages | length }} {% if term.pages | length == 1 %}essay{% else %}essays{% endif %}</p>
      <span class="card-link" aria-hidden="true">View Tag</span>
    </a>
    {% endfor %}
  </div>
</main>
{% include "footer.html" %}
