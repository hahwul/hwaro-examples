<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:wght@700&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 4px solid var(--text);
            text-align: center;
        }
        .logo {
            font-family: 'Unna', serif;
            font-weight: 700;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .omnibus-hero {
            padding: 100px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .omnibus-hero h1 {
            font-family: 'Unna', serif;
            font-size: 6rem;
            margin: 0;
        }
        article { padding: 80px 0; }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 60px;
        }
        .collection-item {
            border: 1px solid #eee;
            padding: 30px;
            text-align: center;
        }
        .collection-item h3 { font-family: 'Unna', serif; font-size: 1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">OMNIBUS</div>
            <nav>
                <a href="/">Volume</a>
                <a href="/about">Archive</a>
            </nav>
        </div>
    </header>
