<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="masthead">
    <a href="{{ base_url }}/" class="wordmark" aria-label="Lyrid — home">Lyrid<span class="wordmark-star" aria-hidden="true">✦</span></a>
    <nav class="mast-nav" aria-label="Primary">
      <a href="{{ base_url }}/workshops/">Workshops</a>
      <a href="{{ base_url }}/schedule/">Schedule</a>
      <a href="{{ base_url }}/venue/">Venue</a>
      <a href="{{ base_url }}/register/" class="mast-cta">Register</a>
    </nav>
  </header>
