<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/style.css">
</head>
<body>
  <header>
    <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/about/">About</a>
      <a href="{{ base_url }}/posts/">Posts</a>
    </nav>
  </header>
