{% include "header.html" %}
  <main class="site-main">
    <article>
      {{ content | safe }}
    </article>
    <div class="post-list">
      {% for p in section.pages %}
      <div class="post-item">
        <h2><a href="{{ base_url }}{{ p.permalink }}">{{ p.title | e }}</a></h2>
        {% if p.date %}
        <div class="post-meta">{{ p.date }}</div>
        {% endif %}
      </div>
      {% endfor %}
    </div>
    {{ pagination }}
  </main>
{% include "footer.html" %}
