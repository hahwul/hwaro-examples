<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <div class="header-main">
        <a href="{{ base_url }}/" class="site-logo">Labyrinth</a>
        <nav class="main-nav" aria-label="Main navigation">
          <span class="nav-label">Choose your path:</span>
          <a href="{{ base_url }}/rooms/" class="nav-link">
            <span class="nav-direction">North</span>
            <span class="nav-dest">Chambers</span>
          </a>
          <a href="{{ base_url }}/tags/" class="nav-link">
            <span class="nav-direction">East</span>
            <span class="nav-dest">Map</span>
          </a>
          <a href="{{ base_url }}/about/" class="nav-link">
            <span class="nav-direction">West</span>
            <span class="nav-dest">About</span>
          </a>
        </nav>
      </div>
      <div class="minimap" aria-hidden="true">
        <div class="minimap-cell minimap-visited"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-current"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-wall"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-open"></div>
        <div class="minimap-cell minimap-wall"></div>
      </div>
    </header>
