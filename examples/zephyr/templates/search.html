{% include "header.html" %}
  <main id="main" class="site-main">
    <div class="wrap page-head">
      <p class="kicker">The index</p>
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}<p class="lede">{{ page.description }}</p>{% endif %}
    </div>
    <div class="wrap">
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the journal</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="shading, broad nib, blue-black, piston filler…" autocomplete="off" autofocus>
      </form>
      <div class="search-status" id="search-status" role="status" aria-live="polite"></div>
      <ol class="search-results" id="search-results"></ol>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </div>
  </main>
{% include "footer.html" %}
