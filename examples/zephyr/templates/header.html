<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap wrap--wide header-row">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand__nib" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 4.5 22.5 21.5 C19.6 25.4 12.4 25.4 9.5 21.5 Z" fill="currentColor"/>
          <circle cx="16" cy="15.4" r="1.5" fill="var(--bg)"/>
          <path d="M16 15.4 V26" stroke="var(--bg)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Zephyr
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a{% if page.section is present and page.section == "reviews" %} aria-current="page"{% endif %} href="{{ base_url }}/reviews/">Reviews</a>
        <a{% if page.url is present and page.url == "/inks/" %} aria-current="page"{% endif %} href="{{ base_url }}/inks/">Inks</a>
        <a{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %} href="{{ base_url }}/about/">About</a>
        <a class="search-toggle"{% if page.url is present and page.url == "/search/" %} aria-current="page"{% endif %} href="{{ base_url }}/search/">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3.5 3.5"/></svg>
          <span>Search</span>
        </a>
      </nav>
    </div>
  </header>
