<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ base_url }}/favicon.svg">{{ og_all_tags }}{{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Inter',system-ui,sans-serif;background:#1a0500;color:#fecaca}
    .display{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.03em}
    .hell-bg{background:#1a0500;background-image:radial-gradient(#3f1a0a 0,transparent 70%)}
    .hell-panel{background:#2a0a00;border:1px solid #7f1d1d}
    .section-label{font-size:10px;letter-spacing:3px;color:#f87171;font-weight:700}
    .metric{font-size:42px;line-height:.85;font-weight:700;font-family:'Space Grotesk',sans-serif}
    .lava{animation:flow 2s linear infinite;background:linear-gradient(90deg,#ff3d00,#f59e0b,#ff3d00);background-size:200% 100%}
    @keyframes flow{to{background-position:-200% 0}}
  </style>
</head>
<body class="hell-bg">
