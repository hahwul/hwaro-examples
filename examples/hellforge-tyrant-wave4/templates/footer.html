<script>function initHell(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/24);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[HELLFORGE] The fires never sleep. All souls are fuel.','color:#f87171')}addEventListener('load',initHell)</script></body></html>
