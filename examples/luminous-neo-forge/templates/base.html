<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.base_url }}/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-container">
            <a href="{{ site.base_url }}/" class="site-title">{{ site.title }}</a>
            <nav class="site-nav">
                <a href="{{ site.base_url }}/about/" class="nav-link">About</a>
            </nav>
        </div>
    </header>

    <main class="site-main container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer container">
        <div class="footer-inner">
            <p>&copy; {{ site.title }}. Designed for Hwaro.</p>
        </div>
    </footer>
</body>
</html>
