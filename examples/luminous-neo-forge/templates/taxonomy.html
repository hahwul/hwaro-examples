{% extends "base.html" %}

{% block content %}
<section class="taxonomy-list">
    <h1 class="page-title">{{ taxonomy_name }}</h1>
    <ul class="term-list">
        {% if taxonomy_terms is defined %}
        {% for term in taxonomy_terms %}
        <li><a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term.name }}/" class="term-link">{{ term.name }} <span class="term-count">[{{ term.pages | length }}]</span></a></li>
        {% endfor %}
        {% endif %}
    </ul>
</section>
{% endblock %}
