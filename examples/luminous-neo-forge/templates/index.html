{% extends "base.html" %}

{% block content %}
<article class="page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        <p class="page-meta">{{ page.description }}</p>
    </header>

    <div class="page-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
