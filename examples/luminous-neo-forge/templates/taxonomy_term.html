{% extends "base.html" %}

{% block content %}
<section class="taxonomy-term">
    <h1 class="page-title">Term: {{ term.name }}</h1>

    <div class="post-grid">
        {% for page in term.pages %}
        <article class="post-card">
            <h2 class="post-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.date %}
            <div class="post-meta"><time>{{ page.date | date("%Y-%m-%d") }}</time></div>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
