{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.title }}{% endblock title %}

{% block content %}
<article class="single-page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.date %}
        <div class="page-meta">
            <span class="page-date">{{ page.date | date(format="%B %d, %Y") }}</span>
        </div>
        {% endif %}
    </header>
    <div class="page-content">
        {{ content | safe }}
    </div>
    <div class="page-footer">
        <a href="{{ base_url }}" class="back-link">Back to Collection</a>
    </div>
</article>
{% endblock content %}
