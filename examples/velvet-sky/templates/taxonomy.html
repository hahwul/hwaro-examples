{% extends "base.html" %}

{% block content %}
<div class="taxonomy-container">
    <header class="taxonomy-header">
        <h1 class="taxonomy-title">{{ taxonomy_name | title }}</h1>
    </header>

    <div class="taxonomy-list">
        {% if taxonomy_terms %}
            <ul class="term-list">
                {% for term in taxonomy_terms %}
                    <li>
                        <a href="{{ base_url }}{{ taxonomy_name | slugify }}/{{ term | slugify }}/" class="term-link">
                            {{ term }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No terms found.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
