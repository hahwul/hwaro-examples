<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,900;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #800000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        .logo {
            font-family: 'Bodoni Moda', serif;
            font-weight: 900;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 20px;
        }
        nav {
            border-top: 1px solid var(--text);
            border-bottom: 1px solid var(--text);
            padding: 10px 0;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--accent);
        }
        .cut-hero {
            padding: 120px 0;
            text-align: center;
        }
        .cut-hero h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            font-style: italic;
        }
        .cut-sub {
            margin-top: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.5;
        }
        article {
            padding-bottom: 100px;
        }
        h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3rem;
            border-bottom: 1px solid var(--text);
            padding-bottom: 10px;
            margin-top: 60px;
        }
        blockquote {
            font-family: 'Bodoni Moda', serif;
            font-size: 2rem;
            text-align: center;
            border: none;
            margin: 80px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Guillotine</div>
            <nav>
                <a href="/">Edition</a>
                <a href="/about">Archive</a>
            </nav>
        </div>
    </header>
