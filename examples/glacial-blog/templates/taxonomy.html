{% extends "base.html" %}

{% block content %}
<section>
  <header class="mb-16">
    <h1 class="text-4xl font-extrabold tracking-tight text-arctic-900 mb-4 uppercase tracking-widest">
      Exploring {{ taxonomy_name }}
    </h1>
  </header>

  <div class="flex flex-wrap gap-4">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="glass glass-hover px-8 py-4 rounded-2xl text-lg font-bold text-arctic-700 hover:text-arctic-500">
      #{{ term }}
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
