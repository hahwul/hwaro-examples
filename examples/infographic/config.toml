title = "Data Insights"
description = "Infographic Storytelling: The entire site is a single, unfolding data visualization."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = false

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
]

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = true
emoji = false
