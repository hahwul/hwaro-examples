<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stroke-hero {
            padding: 100px 0;
            text-align: center;
        }
        .single-line {
            width: 100%;
            height: 1px;
            background: var(--accent);
            margin: 40px 0;
        }
        .stroke-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
        }
        article { padding: 40px 0; }
        h2 { font-weight: 600; font-size: 2.2rem; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">single.stroke</div>
            <nav>
                <a href="/">Line</a>
                <a href="/about">Purity</a>
            </nav>
        </div>
    </header>
