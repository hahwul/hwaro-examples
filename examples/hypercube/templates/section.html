{% include "header.html" %}
  <main class="site-main section-page">
    <header class="section-header">
      <p class="section-label">// SECTION</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p class="section-description">{{ page.description }}</p>
      {% endif %}
    </header>
    <div class="section-content">
      {{ content | safe }}
    </div>
    <div class="section-list-grid">
      {{ section.list }}
    </div>
    {{ pagination }}
  </main>
{% include "footer.html" %}
