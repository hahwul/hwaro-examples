<div class="alert glass-container" style="padding: 1rem 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid var(--accent-cyan); background: rgba(0, 240, 255, 0.05);">
    {% if type %}
        <strong style="color: var(--accent-cyan); text-transform: uppercase; font-size: 0.85em; letter-spacing: 1px;">{{ type }}</strong><br/>
    {% endif %}
    {{ body | safe }}
</div>
