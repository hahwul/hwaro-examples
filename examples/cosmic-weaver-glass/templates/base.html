<!DOCTYPE html>
<html lang="{{ lang | default(value="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <style>
        :root {
            --bg-dark: #05020a;
            --bg-void: #0b0213;
            --glass-bg: rgba(20, 10, 30, 0.2);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff0055;
            --accent-purple: #8a2be2;
            --font-main: 'Inter', system-ui, sans-serif;
            --font-heading: 'Space Grotesk', system-ui, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Cosmic Void Background */
        .cosmic-void {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, var(--bg-void) 0%, var(--bg-dark) 100%);
        }

        .cosmic-threads {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
            overflow: hidden;
        }

        .thread {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            height: 2px;
            width: 300px;
            border-radius: 50%;
            filter: blur(1px);
            animation: flow 8s infinite linear;
            transform-origin: left;
        }

        .thread:nth-child(2) {
            top: 30%;
            left: -10%;
            background: linear-gradient(90deg, transparent, var(--accent-magenta), transparent);
            animation-duration: 12s;
            transform: rotate(15deg);
        }

        .thread:nth-child(3) {
            top: 70%;
            left: 110%;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            animation-duration: 10s;
            animation-direction: reverse;
            transform: rotate(-20deg);
        }

        .thread:nth-child(4) {
            top: 80%;
            left: -20%;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation-duration: 15s;
            transform: rotate(-5deg);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: pulse 10s infinite alternate;
        }

        .orb-1 {
            top: -10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
        }

        .orb-2 {
            bottom: -20%;
            right: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-magenta) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes flow {
            0% { transform: translateX(0) scaleX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100vw) scaleX(1); opacity: 0; }
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.1) translate(20px, -20px); opacity: 0.6; }
        }

        /* Glassmorphism Container */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(to right, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        h2 { font-size: 2.2rem; color: var(--text-primary); }
        h3 { font-size: 1.5rem; color: var(--text-secondary); }

        p {
            margin-bottom: 1.2rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--accent-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        /* Layout */
        .site-header {
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 2, 10, 0.6);
            backdrop-filter: blur(12px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--text-primary); text-shadow: none; }
        .nav-links a:hover::after { width: 100%; }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .site-footer {
            padding: 2rem 0;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            background: rgba(5, 2, 10, 0.4);
            backdrop-filter: blur(8px);
            margin-top: auto;
        }

        /* Components */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            margin-bottom: 4rem;
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(138, 43, 226, 0.2));
            border-color: rgba(0, 240, 255, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.4), rgba(138, 43, 226, 0.4));
        }

        /* Post Content */
        .content {
            padding: 3rem;
            margin: 0 auto;
            max-width: 800px;
        }

        .content h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .content h2 { font-size: 1.8rem; margin-top: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        .content p { margin-bottom: 1.5rem; }
        .content ul, .content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; color: var(--text-secondary); }
        .content li { margin-bottom: 0.5rem; }

        .content blockquote {
            border-left: 4px solid var(--accent-cyan);
            padding: 1rem 1.5rem;
            background: rgba(0, 240, 255, 0.05);
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .content pre {
            background: rgba(0, 0, 0, 0.4) !important;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
            margin-bottom: 1.5rem;
        }

        .content code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
            color: var(--accent-cyan);
        }

        .content pre code {
            color: inherit;
        }

        .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            h1 { font-size: 2.5rem; }
            .content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="cosmic-void"></div>
    <div class="cosmic-threads">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="thread"></div>
        <div class="thread"></div>
        <div class="thread"></div>
        <div class="thread"></div>
    </div>

    <header class="site-header">
        <div class="nav-container">
            <a href="/" class="site-title">{{ site.title }}</a>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/about/">About</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="nav-container">
            <p>&copy; {{ site.title }}. Built with Hwaro.</p>
        </div>
    </footer>
</body>
</html>
