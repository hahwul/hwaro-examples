<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --text: #333;
            --accent: #555;
            --marble: #ffffff;
            --vein: rgba(0,0,0,0.05);
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #eee;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .marble-slab {
            background: var(--marble);
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 4px;
            position: relative;
            background-image: 
                linear-gradient(45deg, var(--vein) 1px, transparent 1px),
                linear-gradient(-45deg, var(--vein) 1px, transparent 1px);
            background-size: 100px 100px;
        }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2.5rem; color: #444; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">marble.slab</div>
            <nav>
                <a href="/">Vein</a>
                <a href="/about">Surface</a>
            </nav>
        </div>
    </header>
