<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
    
    :root {
      --gold: #c5a26f;
      --crimson: #9c2a2a;
      --void: #0a0a0a;
    }
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .display-serif {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .throne-bg {
      background: #0a0a0a;
      background-image: 
        radial-gradient(circle at 25% 30%, rgba(197, 162, 111, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 75% 70%, rgba(156, 42, 42, 0.05) 0%, transparent 60%);
    }

    .gold-gradient {
      background: linear-gradient(145deg, #f4d9a8, #c5a26f, #8a6f3f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c5a26f;
      font-weight: 600;
    }

    .metric-value {
      font-size: 2.75rem;
      line-height: 1;
      font-weight: 700;
      font-family: 'Playfair Display', Georgia, serif;
    }

    .panel {
      background: #111111;
      border: 1px solid #2a2a2a;
      transition: all 0.2s cubic-bezier(0.23, 1.0, 0.32, 1);
    }

    .panel:hover {
      border-color: #c5a26f;
      box-shadow: 0 0 0 1px rgba(197, 162, 111, 0.2);
      transform: translateY(-1px);
    }

    .regal-button {
      background: linear-gradient(145deg, #c5a26f, #8a6f3f);
      color: #0a0a0a;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.1s ease;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    
    .regal-button:hover {
      background: linear-gradient(145deg, #f4d9a8, #c5a26f);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -10px rgb(197 162 111 / 0.5);
    }

    .regal-button:active {
      transform: scale(0.985);
    }

    .void-button {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #c5a26f;
      transition: all 0.1s ease;
    }

    .void-button:hover {
      background: #222;
      border-color: #c5a26f;
      color: #f4d9a8;
    }

    .throne-table th {
      background: #1a1a1a;
      color: #c5a26f;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.loyal { background: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
    .status-dot.warning { background: #eab308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2); }
    .status-dot.danger { background: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3); }

    .edict-log {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .edict-entry {
      border-left: 2px solid #3a3a3a;
      padding-left: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .edict-entry.gold { border-color: #c5a26f; color: #d4b88a; }
    .edict-entry.crimson { border-color: #9c2a2a; color: #b85a5a; }

    .crown-glow {
      animation: crown-pulse 4s ease-in-out infinite;
    }

    @keyframes crown-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .metric-card {
      background: #111;
      border: 1px solid #222;
    }

    .shimmer {
      position: relative;
      overflow: hidden;
    }
    .shimmer::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 40%;
      height: 200%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(197,162,111,0.15),
        transparent
      );
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(25deg); }
      25% { transform: translateX(300%) rotate(25deg); }
      100% { transform: translateX(300%) rotate(25deg); }
    }

    .admin-grid-bg {
      background-image: 
        linear-gradient(rgba(197,162,111,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(197,162,111,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .dramatic-text {
      text-shadow: 0 2px 30px rgba(0,0,0,0.6);
    }
  </style>
  {{ highlight_css }}
</head>
<body class="bg-[#0a0a0a] text-[#f5f5f5] throne-bg admin-grid-bg">
