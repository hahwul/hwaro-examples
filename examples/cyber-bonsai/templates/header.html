<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #0f0;
      --secondary: #ff00ff;
      --bg: #050505;
      --text: #e0e0e0;
      --border: #0f0;
      --bg-subtle: #111;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Courier New", Courier, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); border-top: 5px solid var(--primary); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px dashed var(--border); margin-bottom: 2rem; }
    .site-logo { font-weight: bold; font-size: 1.5rem; color: var(--primary); text-decoration: none; text-shadow: 0 0 5px var(--primary); }
    .site-logo:hover { color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 3rem; padding: 2rem 0; border-top: 1px dashed var(--border); color: var(--text); font-size: 0.9rem; text-align: center; }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 0.5em; font-weight: normal; color: var(--primary); }
    h1 { font-size: 2rem; margin-top: 0; text-shadow: 0 0 4px var(--primary); }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { text-shadow: 0 0 5px var(--secondary); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.5rem; border-radius: 2px; border: 1px solid #333; color: var(--primary); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 0 10px rgba(0, 255, 0, 0.1); }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.5rem; padding: 0.6rem 0.75rem; background: var(--bg-subtle); border-left: 3px solid var(--primary); }
    ul.section-list li a { font-weight: bold; color: var(--text); }
    ul.section-list li a:hover { color: var(--primary); text-shadow: 0 0 5px var(--primary); }
    .taxonomy-desc { color: var(--secondary); margin-bottom: 1.5rem; }
    nav.pagination { margin: 1.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.25rem 0.55rem; border: 1px solid var(--primary); color: var(--text); text-decoration: none; }
    nav.pagination a:hover { color: var(--bg); background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.25rem 0.55rem; border: 1px solid var(--primary); background: var(--primary); color: var(--bg); box-shadow: 0 0 10px var(--primary); }
    .pagination-disabled span { display: inline-block; padding: 0.25rem 0.55rem; border: 1px solid #333; color: #555; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">>&nbsp;{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
