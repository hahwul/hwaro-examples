<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #0084ff; --accent: #0084ff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 1px solid var(--accent); padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 10px; }
        .blueprint-surface { border: 1px solid var(--accent); padding: 60px; position: relative; }
        .blueprint-surface::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">blueprint.noir</div></header>
