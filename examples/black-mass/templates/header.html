<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --accent: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; padding: 60px 0; }
        .logo { font-family: 'UnifrakturMaguntia', cursive; font-size: 5rem; }
        .mass-surface { background: #0a0a0a; padding: 80px; border: 1px solid #1a1a1a; box-shadow: 0 0 100px rgba(0,0,0,1); text-align: center; }
        h2 { font-family: 'UnifrakturMaguntia', cursive; font-size: 3rem; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">Black Mass</div></header>
