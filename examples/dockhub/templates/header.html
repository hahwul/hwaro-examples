<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dock: { bg: '#0f172a', surface: '#1e293b', border: '#334155', text: '#e2e8f0', muted: '#94a3b8', dim: '#64748b' },
            cyan: { DEFAULT: '#06b6d4', light: '#22d3ee', dark: '#0891b2' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-dock-bg text-dock-text font-sans; }
    .prose { @apply max-w-none text-dock-text; }
    .prose h1 { @apply text-2xl font-bold mb-6 text-white; }
    .prose h2 { @apply text-xl font-bold mt-10 mb-4 text-white border-b border-dock-border pb-2; }
    .prose h3 { @apply text-lg font-semibold mt-8 mb-3 text-dock-text; }
    .prose p { @apply my-3 leading-relaxed text-dock-muted; }
    .prose a { @apply text-cyan hover:text-cyan-light underline underline-offset-4 decoration-cyan/30; }
    .prose strong { @apply font-semibold text-white; }
    .prose code { @apply bg-dock-surface px-1.5 py-0.5 rounded text-sm font-mono text-cyan border border-dock-border; }
    .prose pre { @apply bg-dock-surface text-dock-text p-4 rounded my-4 overflow-x-auto font-mono text-sm border border-dock-border; }
    .prose pre code { @apply bg-transparent p-0 border-0 text-dock-text; }
    .prose blockquote { @apply my-4 py-2 px-4 border-l-4 border-cyan bg-dock-surface text-dock-muted; }
    .prose ul, .prose ol { @apply my-3 ml-6; }
    .prose li { @apply my-1.5 text-dock-muted; }
    .prose ul li { @apply list-disc marker:text-cyan; }
    .prose ol li { @apply list-decimal marker:text-cyan; }
    .prose table { @apply w-full border-collapse my-6 text-sm; }
    .prose thead { @apply bg-dock-surface; }
    .prose th { @apply px-4 py-2 text-left font-semibold text-white border border-dock-border; }
    .prose td { @apply px-4 py-2 border border-dock-border text-dock-muted; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-dock-border bg-dock-surface sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ base_url }}/" class="font-bold text-white hover:text-cyan transition-colors flex items-center gap-2">
        <svg class="w-5 h-5 text-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        {{ site.title }}
      </a>
      <div class="flex items-center gap-5 text-sm">
        <a href="{{ base_url }}/getting-started/" class="text-dock-dim hover:text-dock-text transition-colors">Getting Started</a>
        <a href="{{ base_url }}/reference/" class="text-dock-dim hover:text-dock-text transition-colors">Reference</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-10">
