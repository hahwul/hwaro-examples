{% include "header.html" %}
  <h1 class="text-2xl font-bold text-white mb-6">{{ taxonomy_name | title }}</h1>
  <div class="flex flex-wrap gap-2">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}{{ term.url }}" class="px-3 py-1.5 bg-dock-surface border border-dock-border rounded text-sm text-dock-dim hover:text-cyan hover:border-cyan/30 transition-all">
      {{ term.name }} ({{ term.pages | length }})
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
