<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #111111;
            --accent-color: #8b0000;
            --secondary-text: #555555;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6, .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin-top: 0;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 0;
            text-align: center;
        }

        .brand {
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            margin: 0 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .editorial-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-bottom: 5rem;
        }

        @media (max-width: 768px) {
            .editorial-hero {
                grid-template-columns: 1fr;
            }
        }

        .hero-text h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--secondary-text);
            margin-bottom: 2rem;
        }

        .hero-image {
            background-color: #333;
            height: 600px;
            width: 100%;
            object-fit: cover;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 3rem;
        }

        .post-card {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        .post-card .date {
            font-size: 0.8rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 0.5rem;
        }

        .post-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .post-content {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            margin: 2rem 0;
        }

        footer {
            background-color: var(--text-color);
            color: var(--bg-color);
            text-align: center;
            padding: 4rem 2rem;
            margin-top: 4rem;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand"><a href="{{ site.base_url | default(value="") }}/">Haute Couture</a></div>
        <nav>
            <a href="{{ site.base_url | default(value="") }}/">Home</a>
            <a href="{{ site.base_url | default(value="") }}/posts/">Editorials</a>
            <a href="{{ site.base_url | default(value="") }}/about/">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer>
        <div class="brand" style="font-size: 1.5rem; margin-bottom: 1rem;">Haute Couture</div>
        <p>&copy; {{ now() | date(format="%Y") }} Haute Couture Magazine. All rights reserved.</p>
    </footer>
</body>
</html>
