<!DOCTYPE html>
<html lang="{{ page_language | default(value="en") }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 Not Found - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
            <nav>
                <ul>
                    <li><a href="{{ base_url }}/">Home</a></li>
                    <li><a href="{{ base_url }}/about/">About</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="glass-panel" style="text-align: center;">
                <h1 style="font-size: 5rem; margin-bottom: 0;">404</h1>
                <h2>Page Not Found</h2>
                <div class="content">
                    <p>The page you are looking for does not exist in the neon void.</p>
                    <a href="{{ base_url }}/" class="tag" style="font-size: 1.2rem; margin-top: 1rem;">Return Home</a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.title }}. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
