    <path d="M330,506 C324,506 322,510 323,516 L326,610 C325,618 330,622 336,622 L342,622 C348,622 352,618 351,610 L344,516 C344,510 336,506 330,506 Z"/>
  </g>
  <g stroke="#1e1729" stroke-width="2.25" stroke-linecap="round" opacity="0.85">
