<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p5title p5desc">
  <title id="p5title">Plate V: Ardea Coronata, the Crowned Heron-King</title>
  <desc id="p5desc">A full-bodied heron stands with wings spread wide, wearing a five-pointed crown, over rippled marsh water.</desc>
  <defs>
    <g id="fleuron5">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#1e1729"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron5" x="40" y="40"/>
  <use href="#fleuron5" x="560" y="40"/>
  <use href="#fleuron5" x="40" y="760"/>
  <use href="#fleuron5" x="560" y="760"/>

