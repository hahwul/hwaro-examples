<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p6title p6desc">
  <title id="p6title">Plate VI: Lynx Cinerea, the Ashen Lynx</title>
  <desc id="p6desc">A tufted-eared lynx with a full furred body sits upright among scattered scree, its banded tail curled around its forepaws.</desc>
  <defs>
    <g id="fleuron6">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#191521"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron6" x="40" y="40"/>
  <use href="#fleuron6" x="560" y="40"/>
  <use href="#fleuron6" x="40" y="760"/>
  <use href="#fleuron6" x="560" y="760"/>

  <!-- scree -->
  <g fill="#241f2d" stroke="#a99e86" stroke-width="1.5" opacity="0.5">
    <polygon points="66,700 102,700 84,672"/>
    <polygon points="118,706 158,706 138,668"/>
    <polygon points="438,706 482,706 460,672"/>
    <polygon points="498,700 530,700 514,676"/>
  </g>
  <line x1="24" y1="712" x2="576" y2="712" stroke="#a99e86" stroke-width="1.25" opacity="0.4"/>

  <!-- tail, banded, filled -->
  <path d="M362,596 C420,612 448,570 424,528 C408,498 372,502 366,528 C384,522 402,530 408,548 C414,568 400,584 362,584 Z"
        fill="#2a2434" stroke="#d9a441" stroke-width="3"/>
  <g stroke="#191521" stroke-width="6" opacity="0.9">
    <line x1="404" y1="602" x2="412" y2="584"/>
    <line x1="426" y1="574" x2="434" y2="558"/>
    <line x1="420" y1="540" x2="428" y2="528"/>
  </g>

  <!-- front legs: tapered filled -->
  <g fill="#d9a441">
    <path d="M262,556 C256,556 252,560 253,566 L246,646 C246,654 250,658 256,658 L264,658 C270,658 274,654 273,646 L268,566 C267,560 268,556 262,556 Z"/>
    <path d="M326,556 C320,556 320,560 321,566 L326,646 C325,654 330,658 336,658 L344,658 C350,658 354,654 352,646 L346,566 C345,560 332,556 326,556 Z"/>
  </g>
  <g stroke="#191521" stroke-width="2.25" stroke-linecap="round" opacity="0.85">
    <path d="M259,658 l-13,9 M259,658 l6,12"/>
    <path d="M335,658 l13,9 M335,658 l-6,12"/>
  </g>

  <!-- haunch body: full, filled -->
  <path d="M232,608 C214,520 246,440 300,430 C354,440 386,520 368,608 C336,636 264,636 232,608 Z"
        fill="#2a2434" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M250,564 Q300,584 350,564" stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M244,594 Q300,616 356,594" stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- head -->
  <circle cx="300" cy="392" r="48" fill="#191521" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M300,420 L286,440 M300,420 L314,440" stroke="#d9a441" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="280" cy="384" r="3.6" fill="#e8e2d4"/>
  <circle cx="320" cy="384" r="3.6" fill="#e8e2d4"/>

  <!-- whiskers -->
  <g stroke="#e8e2d4" stroke-width="1.25" opacity="0.55">
    <path d="M266,404 L222,394 M266,414 L220,416"/>
    <path d="M334,404 L378,394 M334,414 L380,416"/>
  </g>

  <!-- tufted ears, filled -->
  <g fill="#191521" stroke="#d9a441" stroke-width="3" stroke-linejoin="round">
    <polygon points="264,354 250,296 292,336"/>
    <polygon points="336,354 350,296 308,336"/>
  </g>
  <g stroke="#d9a441" stroke-width="2" stroke-linecap="round">
    <path d="M250,296 L240,270"/>
    <path d="M350,296 L360,270"/>
  </g>
</svg>
