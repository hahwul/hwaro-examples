<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p2title p2desc">
  <title id="p2title">Plate II: Saxifer Montis, the Cairn-Bearer</title>
  <desc id="p2desc">A squat four-legged mountain creature with a heavy stone-grey hide carries a balanced stack of four stones on its back, standing before jagged twin peaks.</desc>
  <defs>
    <g id="fleuron2">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#1d1a26"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron2" x="40" y="40"/>
  <use href="#fleuron2" x="560" y="40"/>
  <use href="#fleuron2" x="40" y="760"/>
  <use href="#fleuron2" x="560" y="760"/>

  <!-- far peaks -->
  <path d="M40,410 L130,310 L200,392 L280,290 L360,404 L430,322 L520,410 L560,392"
        fill="none" stroke="#a99e86" stroke-width="1.5" opacity="0.32"/>
  <!-- near peaks, filled for depth -->
  <path d="M40,566 L150,432 L230,544 L320,398 L410,544 L490,450 L560,566 L560,600 L40,600 Z"
        fill="#241f30" stroke="#d9a441" stroke-width="1.75" opacity="0.55"/>
  <line x1="40" y1="622" x2="560" y2="622" stroke="#a99e86" stroke-width="1.25" opacity="0.4"/>

  <!-- legs: tapered filled forms -->
  <g fill="#d9a441">
    <path d="M240,594 C234,594 230,598 231,604 L226,648 C226,654 230,658 236,658 L240,658 C246,658 250,654 249,648 L246,604 C246,598 246,594 240,594 Z"/>
    <path d="M276,600 C270,600 266,604 267,610 L266,652 C266,658 270,662 276,662 L280,662 C286,662 290,658 289,652 L284,610 C284,604 282,600 276,600 Z"/>
    <path d="M328,600 C322,600 318,604 319,610 L316,652 C316,658 320,662 326,662 L330,662 C336,662 340,658 339,652 L334,610 C333,604 334,600 328,600 Z"/>
    <path d="M364,594 C358,594 356,598 357,604 L354,648 C354,654 358,658 364,658 L368,658 C374,658 378,654 377,648 L374,604 C374,598 370,594 364,594 Z"/>
  </g>
  <g stroke="#1d1a26" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <path d="M238,658 l-13,9 M238,658 l6,12"/>
    <path d="M278,662 l-12,8 M278,662 l6,11"/>
    <path d="M323,662 l12,8 M323,662 l-6,11"/>
    <path d="M366,658 l13,9 M366,658 l-6,12"/>
  </g>

  <!-- body: heavy filled torso -->
  <path d="M212,566 C204,522 236,486 300,486 C364,486 396,522 388,566 C396,592 380,616 340,624 C312,630 288,630 260,624 C220,616 204,592 212,566 Z"
        fill="#2c2536" stroke="#d9a441" stroke-width="3.5"/>
  <g stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M226,552 Q300,572 374,552"/>
    <path d="M220,574 Q300,598 380,574"/>
    <path d="M232,596 Q300,614 368,596"/>
  </g>

  <!-- tail -->
  <path d="M214,548 C186,534 178,504 190,478 C186,508 200,528 222,538 Z" fill="#2c2536" stroke="#d9a441" stroke-width="2.25"/>

  <!-- neck and head -->
  <path d="M366,528 C388,512 402,488 402,462 L426,462 C426,494 410,522 384,542 Z" fill="#2c2536" stroke="#d9a441" stroke-width="3.5" stroke-linejoin="round"/>
  <circle cx="418" cy="440" r="32" fill="#1d1a26" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M418,438 L458,446 L420,458 Z" fill="#d9a441"/>
  <circle cx="428" cy="430" r="3.6" fill="#e8e2d4"/>
  <g stroke="#d9a441" stroke-width="3" stroke-linecap="round">
    <path d="M406,412 L398,378"/>
    <path d="M424,410 L428,376"/>
  </g>
  <g fill="#d9a441" opacity="0.8">
    <polygon points="398,378 393,364 404,372"/>
    <polygon points="428,376 424,362 434,370"/>
  </g>
  <path d="M396,428 L384,416 L398,410 Z" fill="#d9a441" opacity="0.75"/>

  <!-- cairn stack on the back, tapered stones -->
  <g stroke="#d9a441" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="222,502 358,502 336,466 244,466" fill="#241f30"/>
    <polygon points="244,466 336,466 316,434 264,434" fill="#241f30"/>
    <polygon points="264,434 316,434 300,404 280,404" fill="#241f30"/>
  </g>
  <ellipse cx="290" cy="384" rx="22" ry="15" fill="#241f30" stroke="#d9a441" stroke-width="2.5"/>
  <g stroke="#a99e86" stroke-width="1.25" opacity="0.55">
    <line x1="248" y1="486" x2="332" y2="480"/>
    <line x1="268" y1="452" x2="312" y2="448"/>
  </g>
  <g stroke="#1d1a26" stroke-width="1.5" opacity="0.6">
    <line x1="270" y1="494" x2="278" y2="470"/>
    <line x1="310" y1="490" x2="302" y2="470"/>
  </g>
</svg>
