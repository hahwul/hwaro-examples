<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p1title p1desc">
  <title id="p1title">Plate I: Ignis Paludis, the Marsh Lantern</title>
  <desc id="p1desc">A long-legged marsh bird with a full plumed body stands among reeds and ripples, a burst of radiating light mounted above its head like a lantern.</desc>
  <defs>
    <g id="fleuron1">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#1c1624"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron1" x="40" y="40"/>
  <use href="#fleuron1" x="560" y="40"/>
  <use href="#fleuron1" x="40" y="760"/>
  <use href="#fleuron1" x="560" y="760"/>

  <!-- reeds, behind the creature -->
  <g stroke="#d9a441" stroke-width="2" fill="none" opacity="0.3">
    <path d="M88,700 Q80,560 94,400"/>
    <path d="M140,706 Q132,580 150,430"/>
    <path d="M450,706 Q458,580 440,430"/>
    <path d="M502,700 Q510,560 496,400"/>
  </g>
  <g stroke="#a99e86" stroke-width="1.25" fill="none" opacity="0.4">
    <path d="M94,510 l18,-11"/>
    <path d="M150,480 l18,-10"/>
    <path d="M440,470 l-18,-10"/>
    <path d="M496,440 l-18,-10"/>
  </g>

  <!-- ripples -->
  <g stroke="#a99e86" stroke-width="1.5" fill="none" opacity="0.42">
    <path d="M56,676 Q86,668 116,676 T176,676 T236,676 T296,676 T356,676 T416,676 T476,676 T536,676"/>
    <path d="M56,702 Q86,694 116,702 T176,702 T236,702 T296,702 T356,702 T416,702 T476,702 T536,702"/>
    <path d="M56,728 Q86,720 116,728 T176,728 T236,728 T296,728 T356,728 T416,728 T476,728 T536,728"/>
  </g>

  <!-- tail plumes, filled -->
  <path d="M256,470 C204,452 168,462 140,486 C182,466 214,470 250,494 C206,486 174,504 156,532 C200,510 232,506 262,514 Z"
        fill="#2a2233" stroke="#d9a441" stroke-width="2.25" stroke-linejoin="round" opacity="0.95"/>

  <!-- legs: tapered filled forms with joints -->
  <g fill="#d9a441">
    <path d="M270,486 C266,486 262,490 262,496 L256,584 C256,590 260,594 266,594 L270,594 C276,594 280,590 279,584 L282,496 C282,489 277,486 270,486 Z"/>
    <path d="M330,486 C324,486 319,489 319,496 L322,584 C321,590 325,594 331,594 L335,594 C341,594 345,590 345,584 L339,496 C339,490 335,486 330,486 Z"/>
    <path d="M262,594 L279,594 L272,676 L266,676 Z"/>
    <path d="M321,594 L338,594 L334,676 L328,676 Z"/>
  </g>
  <g stroke="#1c1624" stroke-width="2.25" stroke-linecap="round" opacity="0.9">
    <path d="M269,676 l-16,12 M269,676 l7,16 M269,676 l17,4"/>
    <path d="M331,676 l16,12 M331,676 l-7,16 M331,676 l-17,4"/>
  </g>

  <!-- body: full plumed torso, filled -->
  <path d="M300,398 C356,398 396,428 396,470 C396,514 356,544 300,544 C244,544 204,514 204,470 C204,428 244,398 300,398 Z"
        fill="#2a2233" stroke="#d9a441" stroke-width="3.5"/>
  <g stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M226,448 Q300,470 374,448"/>
    <path d="M220,470 Q300,496 380,470"/>
    <path d="M226,494 Q300,518 374,494"/>
    <path d="M244,516 Q300,534 356,516"/>
  </g>
  <g fill="#e8e2d4" opacity="0.12">
    <ellipse cx="300" cy="465" rx="86" ry="62"/>
  </g>

  <!-- neck: tapered filled form -->
  <path d="M282,408 C270,368 274,318 288,286 L312,286 C318,320 316,368 318,408 C312,414 288,414 282,408 Z"
        fill="#2a2233" stroke="#d9a441" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="300" cy="270" r="30" fill="#1c1624" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M300,268 L344,278 L300,290 Z" fill="#d9a441"/>
  <circle cx="310" cy="260" r="3.6" fill="#e8e2d4"/>
  <path d="M280,286 Q300,300 320,286" stroke="#1c1624" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- lantern crest -->
  <line x1="300" y1="240" x2="300" y2="204" stroke="#d9a441" stroke-width="4"/>
  <g stroke="#d9a441" stroke-width="2.75" stroke-linecap="round">
    <line x1="300" y1="204" x2="266" y2="204"/>
    <line x1="300" y1="204" x2="274" y2="177"/>
    <line x1="300" y1="204" x2="288" y2="158"/>
    <line x1="300" y1="204" x2="300" y2="146"/>
    <line x1="300" y1="204" x2="312" y2="158"/>
    <line x1="300" y1="204" x2="326" y2="177"/>
    <line x1="300" y1="204" x2="334" y2="204"/>
  </g>
  <circle cx="300" cy="204" r="9" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="204" r="15" fill="#1c1624" stroke="#d9a441" stroke-width="3"/>
  <circle cx="300" cy="204" r="6" fill="#e8e2d4"/>
</svg>
