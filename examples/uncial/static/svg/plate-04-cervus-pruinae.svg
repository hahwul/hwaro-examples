<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p4title p4desc">
  <title id="p4title">Plate IV: Cervus Pruinae, the Rime-Hart</title>
  <desc id="p4desc">A tall, full-bodied stag stands on a frosted ridge, its faceted antlers spread like ice, small frost motes scattered around it.</desc>
  <defs>
    <g id="fleuron4">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
    <g id="mote4">
      <path d="M0,-6 L0,6 M-6,0 L6,0 M-4,-4 L4,4 M-4,4 L4,-4" stroke="#a99e86" stroke-width="1.25"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#1c1926"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron4" x="40" y="40"/>
  <use href="#fleuron4" x="560" y="40"/>
  <use href="#fleuron4" x="40" y="760"/>
  <use href="#fleuron4" x="560" y="760"/>

  <path d="M40,594 L130,510 L210,584 L300,486 L390,584 L470,522 L560,594 L560,600 L40,600 Z"
        fill="#241f30" stroke="#a99e86" stroke-width="1.5" opacity="0.42"/>
  <line x1="24" y1="670" x2="576" y2="670" stroke="#a99e86" stroke-width="1.25" opacity="0.4"/>

  <g opacity="0.6">
    <use href="#mote4" x="110" y="180"/>
    <use href="#mote4" x="470" y="220"/>
    <use href="#mote4" x="150" y="330"/>
    <use href="#mote4" x="450" y="380"/>
    <use href="#mote4" x="90" y="450"/>
    <use href="#mote4" x="500" y="470"/>
    <use href="#mote4" x="200" y="130"/>
    <use href="#mote4" x="400" y="150"/>
  </g>

  <!-- legs: tapered filled forms -->
  <g fill="#d9a441">
    <path d="M256,540 C250,540 246,544 247,550 L240,626 C239,634 244,638 250,638 L256,638 C262,638 266,634 265,626 L262,550 C262,544 262,540 256,540 Z"/>
    <path d="M284,542 C278,542 274,546 275,552 L272,628 C271,634 276,640 282,640 L286,640 C292,640 296,634 296,628 L292,552 C291,546 290,542 284,542 Z"/>
    <path d="M316,542 C310,542 308,546 309,552 L312,628 C312,634 316,640 322,640 L326,640 C332,640 336,634 335,628 L332,552 C330,546 322,542 316,542 Z"/>
    <path d="M344,540 C338,540 336,544 337,550 L340,626 C341,634 346,638 352,638 L358,638 C364,638 368,634 366,626 L360,550 C359,544 350,540 344,540 Z"/>
  </g>
  <g stroke="#1c1926" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <path d="M253,638 l-12,9 M253,638 l6,10"/>
    <path d="M284,640 l-11,8 M284,640 l6,10"/>
    <path d="M319,640 l11,8 M319,640 l-6,10"/>
    <path d="M355,638 l12,9 M355,638 l-6,10"/>
  </g>

  <!-- body: full torso -->
  <path d="M240,568 C232,528 260,494 300,494 C340,494 368,528 360,568 C368,590 348,608 312,612 C296,614 284,614 268,612 C232,608 232,590 240,568 Z"
        fill="#2b2634" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M258,556 Q300,576 342,556" stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M252,578 Q300,596 348,578" stroke="#d9a441" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- tail -->
  <path d="M356,536 Q378,522 372,498 C368,516 356,528 344,532 Z" fill="#2b2634" stroke="#d9a441" stroke-width="2.25"/>

  <!-- neck: tapered filled shape -->
  <path d="M284,514 C276,460 280,410 292,368 L314,368 C320,412 322,462 318,516 C310,522 292,522 284,514 Z"
        fill="#2b2634" stroke="#d9a441" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- head -->
  <path d="M304,306 C326,306 340,328 338,352 C336,372 322,388 304,388 C286,388 272,372 270,352 C268,328 282,306 304,306 Z"
        fill="#1c1926" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M300,382 L291,404 M300,382 L309,404" stroke="#d9a441" stroke-width="2.25" stroke-linecap="round"/>
  <circle cx="318" cy="340" r="3.6" fill="#e8e2d4"/>

  <!-- faceted antlers, thick with facet fills, rooted at the crown -->
  <g stroke="#d9a441" stroke-width="3" fill="#2b2634" stroke-linejoin="round">
    <path d="M292,312 L266,240 L284,198 L252,158 L262,196 L280,204 L264,244 L288,312 Z"/>
    <path d="M314,312 L344,240 L326,198 L358,158 L348,196 L330,204 L346,244 L320,312 Z"/>
  </g>
  <g stroke="#a99e86" stroke-width="1.25" opacity="0.5">
    <line x1="270" y1="232" x2="254" y2="226"/>
    <line x1="336" y1="232" x2="352" y2="226"/>
  </g>
</svg>
