<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="p3title p3desc">
  <title id="p3title">Plate III: Anguis Calamorum, the Reed-Wyrm</title>
  <desc id="p3desc">A long, thick-bodied serpent coils upward through a stand of reeds, its scaled hide banded with dark scutes along a single sinuous line.</desc>
  <defs>
    <g id="fleuron3">
      <circle r="10" fill="none" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <path d="M0,-10 L0,-4 M0,10 L0,4 M-10,0 L-4,0 M10,0 L4,0" stroke="#d9a441" stroke-width="1" opacity="0.65"/>
      <circle r="2.6" fill="#d9a441" opacity="0.85"/>
    </g>
  </defs>

  <rect width="600" height="800" fill="#1a1420"/>
  <rect x="24" y="24" width="552" height="752" fill="none" stroke="#d9a441" stroke-width="1.5" opacity="0.55"/>
  <use href="#fleuron3" x="40" y="40"/>
  <use href="#fleuron3" x="560" y="40"/>
  <use href="#fleuron3" x="40" y="760"/>
  <use href="#fleuron3" x="560" y="760"/>

  <!-- reed field, behind -->
  <g stroke="#d9a441" stroke-width="2" fill="none" opacity="0.26">
    <path d="M104,738 Q96,540 112,350"/>
    <path d="M168,742 Q162,560 176,390"/>
    <path d="M436,738 Q444,540 424,350"/>
    <path d="M488,742 Q496,570 476,400"/>
  </g>
  <line x1="24" y1="748" x2="576" y2="748" stroke="#a99e86" stroke-width="1.25" opacity="0.35"/>

  <!-- serpent body: thick tapered coil -->
  <path id="wyrm" d="M118,724 C210,660 88,596 148,512 C208,428 336,462 350,368 C362,284 286,240 258,170 C244,134 260,108 298,90"
        fill="none" stroke="#d9a441" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M118,724 C210,660 88,596 148,512 C208,428 336,462 350,368 C362,284 286,240 258,170 C244,134 260,108 298,90"
        fill="none" stroke="#1a1420" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M118,724 C210,660 88,596 148,512 C208,428 336,462 350,368 C362,284 286,240 258,170 C244,134 260,108 298,90"
        fill="none" stroke="#2c2438" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- scute bands across the coil -->
  <g stroke="#d9a441" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M130,700 l22,-14"/>
    <path d="M158,660 l22,-10"/>
    <path d="M158,610 l-22,-8"/>
    <path d="M150,566 l-22,-4"/>
    <path d="M172,522 l24,-4"/>
    <path d="M228,486 l24,4"/>
    <path d="M288,460 l22,-14"/>
    <path d="M336,420 l22,-16"/>
    <path d="M348,364 l-22,-8"/>
    <path d="M320,300 l-20,-8"/>
    <path d="M282,232 l-20,-6"/>
    <path d="M260,178 l-20,-6"/>
  </g>
  <!-- spine highlight -->
  <path d="M118,724 C210,660 88,596 148,512 C208,428 336,462 350,368 C362,284 286,240 258,170 C244,134 260,108 298,90"
        fill="none" stroke="#e8e2d4" stroke-width="2" opacity="0.22" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="304" cy="76" rx="26" ry="20" fill="#2c2438" stroke="#d9a441" stroke-width="3.5"/>
  <path d="M296,58 L288,42 M296,58 L297,40 M296,58 L306,42" stroke="#d9a441" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <circle cx="314" cy="68" r="3.4" fill="#e8e2d4"/>
  <path d="M292,90 Q286,102 278,108 M292,90 Q290,104 296,112" stroke="#e8e2d4" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- tail taper -->
  <path d="M118,724 L86,754" stroke="#d9a441" stroke-width="10" stroke-linecap="round"/>
</svg>
