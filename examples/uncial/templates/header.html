<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <meta name="color-scheme" content="dark">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to the plates</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}{{ lang_prefix }}/" class="site-mark">
        <span class="site-mark-glyph" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="26" height="26"><path d="M9 7v11a7 7 0 0 0 14 0V7" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/><circle cx="16" cy="26" r="1.6" fill="currentColor"/></svg>
        </span>
        <span class="site-mark-text">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}{{ lang_prefix }}/">Frontispiece</a>
        <a href="{{ base_url }}{{ lang_prefix }}/chapters/">Plates</a>
        <a href="{{ base_url }}{{ lang_prefix }}/colophon/">Colophon</a>
        <button type="button" id="search-open" class="search-trigger" aria-haspopup="dialog" aria-controls="search-dialog">
          <span>Search</span>
          <kbd>&#8984;K</kbd>
        </button>
      </nav>
    </div>
  </header>

  <div id="search-dialog" class="search-dialog" role="dialog" aria-modal="true" aria-label="Search the bestiary" hidden>
    <div class="search-dialog-panel">
      <div class="search-dialog-field">
        <svg aria-hidden="true" viewBox="0 0 20 20" width="18" height="18"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="13.6" y1="13.6" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="Search the bestiary&hellip;" autocomplete="off" aria-label="Search query">
        <kbd>Esc</kbd>
      </div>
      <ul id="search-results" class="search-results" role="listbox" aria-label="Search results"></ul>
      <p id="search-empty" class="search-empty" hidden>No plates or leaves match that search.</p>
    </div>
  </div>

  <main id="main" class="site-main">
