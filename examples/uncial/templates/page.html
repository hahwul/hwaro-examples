{% include "header.html" %}
<article class="leaf">
  {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
  {% if page.date %}<p class="leaf-date">Set down {{ page.date | date("%d %B %Y") }}</p>{% endif %}

  {% if page.toc %}
  <nav class="leaf-toc" aria-label="Contents of this leaf">
    <p class="leaf-toc-label">Contents of this leaf</p>
    {{ toc | safe }}
  </nav>
  {% endif %}

  <div class="prose">
    {{ content | safe }}
  </div>
</article>
{% include "footer.html" %}
