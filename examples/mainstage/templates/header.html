<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #e0e0e0;
            --accent: #d4af37;
            --secondary: #2a2a2a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 1px solid var(--secondary);
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: var(--accent);
        }
        nav {
            margin-top: 20px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--accent);
        }
        .hero {
            padding: 100px 0;
            text-align: center;
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            letter-spacing: -1px;
            color: #fff;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.8;
        }
        .page-article {
            padding: 40px 0;
        }
        blockquote {
            border-left: 3px solid var(--accent);
            margin: 20px 0;
            padding-left: 20px;
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 style="margin:0; font-size: 1.5rem; letter-spacing: 4px;">{{ site.title }}</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>
