<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #334155; --accent: #6366f1; --border: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 700px; margin: 40px auto; }
        header { padding: 20px; background: #fff; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        .activity-item { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        .icon { width: 40px; height: 40px; border-radius: 12px; background: #e0e7ff; display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">activity.hub</div></header>
