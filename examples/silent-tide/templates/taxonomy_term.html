{% include "header.html" %}
<div class="content">
  {% if term %}
    <h1>Pages tagged with "{{ term.name }}"</h1>
    <ul class="post-list">
      {% for page in term.pages %}
        <li><a href="{{ page.url }}">{{ page.title }}</a></li>
      {% endfor %}
    </ul>
  {% endif %}
</div>
{% include "footer.html" %}
