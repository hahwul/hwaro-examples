{% include "header.html" %}

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <div class="post-meta">
      <time datetime="{{ page.date | date(format="%Y-%m-%d") }}">{{ page.date | date(format="%B %d, %Y") }}</time>
    </div>
    {% endif %}
  </header>

  <div class="content">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
