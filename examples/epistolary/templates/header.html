<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f0;
            --text: #3c3c3c;
            --ink: #1a1a1a;
            --paper: #fff;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(#dcdcdc 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 1px solid #dcdcdc;
            text-align: right;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: lowercase;
            font-style: italic;
            color: var(--ink);
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .letter-paper {
            background: var(--paper);
            padding: 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 80vh;
            margin-top: 40px;
            position: relative;
        }
        .postmark {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: rgba(0,0,0,0.2);
            transform: rotate(15deg);
        }
        h1, h2 { font-weight: 400; font-style: italic; color: var(--ink); }
        .date { font-family: 'Inter', sans-serif; font-size: 0.8rem; margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">epistolary.</div>
            <nav>
                <a href="/">Sent</a>
                <a href="/about">Archive</a>
            </nav>
        </div>
    </header>
