{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="page-header">
      <div class="container">
        {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
        {% if page.description %}<p class="page-desc">{{ page.description | e }}</p>{% endif %}
      </div>
    </header>
    <div class="prose-wrap">
      <div class="container prose">
        {{ content | safe }}
      </div>
    </div>
  </main>
{% include "footer.html" %}
