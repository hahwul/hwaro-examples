<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#131015">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Orbit home">
        <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true" focusable="false">
          <circle cx="13" cy="13" r="10.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <ellipse cx="13" cy="13" rx="10.5" ry="4.2" fill="none" stroke="currentColor" stroke-width="1.6" transform="rotate(-28 13 13)"/>
          <circle cx="21.3" cy="8.4" r="2.1" fill="currentColor"/>
        </svg>
        <span>Orbit</span>
      </a>

      <nav class="site-nav" id="primary-nav" aria-label="Primary">
        <a href="{{ base_url }}/how-we-index/"{% if page.url == "/how-we-index/" %} aria-current="page"{% endif %}>How We Index</a>
        <a href="{{ base_url }}/principles/"{% if page.url == "/principles/" %} aria-current="page"{% endif %}>Principles</a>
        <a href="{{ base_url }}/for-site-owners/"{% if page.url == "/for-site-owners/" %} aria-current="page"{% endif %}>For Site Owners</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/donate/"{% if page.url == "/donate/" %} aria-current="page"{% endif %}>Donate</a>
      </nav>

      <div class="header-actions">
        <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-label="Search the index">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
          <span class="search-trigger-label">Search</span>
          <kbd aria-hidden="true">/</kbd>
        </button>
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle menu">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><path d="M2 5h16M2 10h16M2 15h16"/></svg>
        </button>
      </div>
    </div>
  </header>
