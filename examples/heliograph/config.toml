# =============================================================================
# Site Configuration
# =============================================================================

title = "Heliograph Theme"
description = "A bold, elegant theme inspired by sunlight, mirrors, reflections, and harsh shadows."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# Custom Extra Variables
# =============================================================================

[extra]
author = "Hwaro Heliograph"
