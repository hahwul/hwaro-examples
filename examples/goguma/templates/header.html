<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600&family=IBM+Plex+Mono:wght@400;600&family=Vollkorn:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('goguma-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="header-left">
      <div class="brand"><a href="{{ base_url }}/">Dr. Ji-Min Park</a></div>
    </div>
    <div class="header-mid">
      <span class="coordinates">36.3504° N, 127.3845° E</span>
    </div>
    <div class="header-right">
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/publications/">Publications</a>
      </nav>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme" type="button">✦</button>
    </div>
  </header>
