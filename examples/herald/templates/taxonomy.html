{% include "header.html" %}

<div class="taxonomy-container">
    <header class="taxonomy-header">
        <h1>All {{ taxonomy_name | capitalize }}</h1>
    </header>

    <div class="taxonomy-list">
        <ul>
            {% for term in taxonomy_terms %}
            <li>
                <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="term-link">
                    <span class="term-name">{{ term }}</span>
                    <span class="term-count">{{ term.pages | length }} articles</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>

{% include "footer.html" %}
