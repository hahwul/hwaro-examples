<script>function initMech(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/22);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},30)});console.log('%c[MECH ARCHON] The machine god has spoken. All flesh is obsolete.','color:#b45309')}addEventListener('load',initMech)</script></body></html>
