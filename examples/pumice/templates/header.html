<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <header class="topbar" role="banner">
      <div class="topbar-row">
        <a class="brand" href="{{ base_url }}/" aria-label="Pumice home">
          <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
            <rect x="0.7" y="0.7" width="30.6" height="30.6" rx="7.3" fill="none" stroke="currentColor" stroke-opacity="0.4"/>
            <polyline points="5,20 9,17 13,19 17,11 21,15 27,7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="27" cy="7" r="2.1" fill="currentColor"/>
          </svg>
          <span class="brand-name">pumice</span>
          <span class="brand-ver">v0.5</span>
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="{{ base_url }}/guides/"{% if page.section == "guides" %} aria-current="true"{% endif %}>Guides</a>
          <a href="{{ base_url }}/releases/"{% if page.section == "releases" %} aria-current="true"{% endif %}>Releases</a>
          <a href="{{ base_url }}/releases/rss.xml">Feed</a>
        </nav>
        <form class="find" role="search" action="{{ base_url }}/guides/">
          <label class="find-label" for="find-input">Search the docs</label>
          <svg class="find-icon" viewBox="0 0 20 20" width="15" height="15" aria-hidden="true" focusable="false">
            <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="13.5" y1="13.5" x2="17.5" y2="17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input class="find-input" id="find-input" name="q" type="search" placeholder="Search guides &amp; releases" autocomplete="off" spellcheck="false">
        </form>
      </div>
      <div class="strip" aria-label="Sample agent telemetry">
        <span class="strip-live"><span class="live-dot" aria-hidden="true"></span>live</span>
        <div class="strip-rail">
          <article class="metric">
            <div class="metric-head"><span class="metric-name">agent.cpu</span><span class="metric-val">0.6<span class="metric-unit">%</span></span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,20 12,18 22,19 32,16 42,17 52,15 62,16 72,14 82,15 94,13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="13" r="1.9" fill="currentColor"/></svg>
          </article>
          <article class="metric">
            <div class="metric-head"><span class="metric-name">agent.rss</span><span class="metric-val">24<span class="metric-unit">MiB</span></span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,22 14,20 26,17 38,15 50,14 62,12 74,12 86,11 94,11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="11" r="1.9" fill="currentColor"/></svg>
          </article>
          <article class="metric">
            <div class="metric-head"><span class="metric-name">events.dropped</span><span class="metric-val">0<span class="metric-unit">/s</span></span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,23 20,23 40,22 60,23 80,23 94,22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="22" r="1.9" fill="currentColor"/></svg>
          </article>
          <article class="metric">
            <div class="metric-head"><span class="metric-name">sample.rate</span><span class="metric-val">1:64</span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,9 16,9 16,15 34,15 34,11 52,11 52,17 70,17 70,12 88,12 94,12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="12" r="1.9" fill="currentColor"/></svg>
          </article>
          <article class="metric">
            <div class="metric-head"><span class="metric-name">egress</span><span class="metric-val">3.1<span class="metric-unit">KiB/s</span></span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,18 12,10 22,20 32,8 42,17 52,12 62,19 72,9 82,16 94,13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="13" r="1.9" fill="currentColor"/></svg>
          </article>
          <article class="metric">
            <div class="metric-head"><span class="metric-name">syscalls.seen</span><span class="metric-val">18.2<span class="metric-unit">k/s</span></span></div>
            <svg class="spark" viewBox="0 0 96 26" preserveAspectRatio="none" aria-hidden="true" focusable="false"><polyline points="2,16 12,12 22,18 32,13 42,9 52,14 62,11 72,17 82,12 94,15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="94" cy="15" r="1.9" fill="currentColor"/></svg>
          </article>
        </div>
      </div>
    </header>
    <main id="main" class="main">
      {% include "partials/search_panel.html" %}
      <div id="page-content">
