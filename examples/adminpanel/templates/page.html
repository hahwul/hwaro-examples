{% include "header.html" %}

<div class="mb-8 flex justify-between items-center">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 mb-1">{{ page.title }}</h1>
        <p class="text-sm text-gray-500">{{ page.description }}</p>
    </div>
    <div class="space-x-2">
        {% if page.extra.action_primary %}
        <a href="#" class="btn btn-primary">{{ page.extra.action_primary }}</a>
        {% endif %}
        {% if page.extra.action_secondary %}
        <a href="#" class="btn btn-secondary">{{ page.extra.action_secondary }}</a>
        {% endif %}
    </div>
</div>

<div class="card">
    <div class="card-body">
        {{ content | safe }}
    </div>
</div>

{% include "footer.html" %}
