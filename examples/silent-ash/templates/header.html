<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Silent Ash Color Palette - Absolute Monochrome / No Gradients */
            --ash-black: #1a1a1a;
            --ash-dark: #333333;
            --ash-medium: #7f7f7f;
            --ash-light: #e0e0e0;
            --ash-white: #f8f8f8;
            --pure-white: #ffffff;

            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;

            --border-thin: 1px solid var(--ash-light);
            --border-thick: 2px solid var(--ash-dark);

            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
            --spacing-xl: 8rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--pure-white);
            color: var(--ash-black);
            line-height: 1.6;
            font-size: 18px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Layout */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: var(--border-thin);
            border-right: var(--border-thin);
            background-color: var(--ash-white);
        }

        .site-header {
            padding: var(--spacing-lg) 0 var(--spacing-md);
            border-bottom: var(--border-thin);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .site-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .site-title a {
            color: var(--ash-black);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .site-title a:hover {
            color: var(--ash-medium);
        }

        .site-nav {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .site-nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        .site-nav a {
            color: var(--ash-dark);
            text-decoration: none;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .site-nav a:hover {
            color: var(--ash-black);
            border-bottom-color: var(--ash-black);
        }

        .main-content {
            flex-grow: 1;
            padding: var(--spacing-lg) 0;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 400;
            margin-bottom: var(--spacing-sm);
            color: var(--ash-black);
        }

        h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: var(--spacing-md);
            letter-spacing: -0.01em;
        }

        h2 {
            font-size: 2rem;
            margin-top: var(--spacing-md);
            border-bottom: var(--border-thin);
            padding-bottom: var(--spacing-xs);
        }

        p {
            margin-bottom: var(--spacing-md);
            color: var(--ash-dark);
        }

        a {
            color: var(--ash-black);
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        a:hover {
            color: var(--ash-medium);
        }

        /* Components */
        .page-header {
            margin-bottom: var(--spacing-xl);
            text-align: center;
        }

        .page-description {
            font-family: var(--font-sans);
            font-size: 1rem;
            color: var(--ash-medium);
            max-width: 600px;
            margin: 0 auto;
        }

        .content-box {
            background-color: var(--pure-white);
            padding: var(--spacing-lg);
            border: var(--border-thin);
            box-shadow: 4px 4px 0 var(--ash-light); /* Solid shadow, no blur/gradient */
        }

        hr {
            border: none;
            border-top: var(--border-thin);
            margin: var(--spacing-lg) 0;
        }

        blockquote {
            font-style: italic;
            font-size: 1.25rem;
            color: var(--ash-dark);
            padding-left: var(--spacing-md);
            border-left: var(--border-thick);
            margin: var(--spacing-md) 0;
        }

        code {
            font-family: monospace;
            background-color: var(--ash-light);
            padding: 0.2em 0.4em;
            font-size: 0.85em;
        }

        pre {
            background-color: var(--ash-black);
            color: var(--ash-white);
            padding: var(--spacing-md);
            overflow-x: auto;
            margin: var(--spacing-md) 0;
            border: 1px solid var(--ash-dark);
        }

        pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }

        /* Lists */
        ul, ol {
            margin-bottom: var(--spacing-md);
            padding-left: var(--spacing-md);
            color: var(--ash-dark);
        }

        li {
            margin-bottom: var(--spacing-xs);
        }

        /* Footer */
        .site-footer {
            padding: var(--spacing-md) 0;
            border-top: var(--border-thin);
            text-align: center;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--ash-medium);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="site-header">
            <div class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></div>
            <nav class="site-nav">
                <ul>
                    <li><a href="{{ base_url }}/">Home</a></li>
                    <li><a href="{{ base_url }}/about/">About</a></li>
                </ul>
            </nav>
        </header>
        <main class="main-content">
