{% include "header.html" %}

<article class="content-box">
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="page-content">
        {{ content | safe }}
    </div>
</article>
