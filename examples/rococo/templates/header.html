<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {{ og_all_tags }}
    {{ highlight_css }}
    {{ auto_includes_css }}
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="rococo-frame">
        <!-- Shell ornament top -->
        <div class="ornament ornament-top" aria-hidden="true">
            <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 5 C85 5 70 15 65 30 C60 15 45 5 30 8 C40 15 45 28 42 40 C35 30 20 25 10 30 C25 35 35 45 30 55" stroke="var(--gold)" stroke-width="1.2" fill="none" opacity="0.6"/>
                <path d="M100 5 C115 5 130 15 135 30 C140 15 155 5 170 8 C160 15 155 28 158 40 C165 30 180 25 190 30 C175 35 165 45 170 55" stroke="var(--gold)" stroke-width="1.2" fill="none" opacity="0.6"/>
                <path d="M80 50 Q90 35 100 30 Q110 35 120 50" stroke="var(--rose)" stroke-width="1" fill="none" opacity="0.5"/>
                <ellipse cx="100" cy="18" rx="12" ry="8" fill="none" stroke="var(--gold)" stroke-width="0.8" opacity="0.4"/>
                <circle cx="100" cy="18" r="3" fill="var(--gold)" opacity="0.5"/>
            </svg>
        </div>

        <header class="site-header">
            <div class="brand">
                <a href="{{ base_url }}/">
                    <span class="site-title">{{ site.title }}</span>
                </a>
            </div>
            <nav class="site-nav">
                <a href="{{ base_url }}/">Home</a>
                <span class="nav-ornament">❧</span>
                <a href="{{ base_url }}/posts/">Articles</a>
                <span class="nav-ornament">❧</span>
                <a href="{{ base_url }}/tags/">Tags</a>
            </nav>
            <div class="header-flourish" aria-hidden="true">
                <svg viewBox="0 0 400 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%" height="20">
                    <path d="M0 10 Q50 0 100 10 T200 10 T300 10 T400 10" stroke="var(--gold)" stroke-width="0.8" fill="none" opacity="0.5"/>
                    <path d="M0 10 Q50 20 100 10 T200 10 T300 10 T400 10" stroke="var(--rose)" stroke-width="0.6" fill="none" opacity="0.4"/>
                    <circle cx="200" cy="10" r="3" fill="var(--gold)" opacity="0.6"/>
                </svg>
            </div>
        </header>
        <main class="content">
