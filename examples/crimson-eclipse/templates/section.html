{% include "header.html" %}
<div class="section-content">
  {% if page.title is defined and page.title %}
    <h1>{{ page.title | e }}</h1>
  {% endif %}

  {{ content }}

  {% if section is defined and section.pages %}
    <ul class="section-list">
      {% for p in section.pages %}
        <li>
          <a href="{{ p.url }}">
            {{ p.title | e }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}

  {{ pagination }}
</div>
{% include "footer.html" %}
