title = "Vapor Index"
description = "A terminal-modern index of contemporary moving-image works. Filed, dated, and built to be read at the console."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10

[markdown]
safe = false
lazy_loading = true
heading_ids = true
footnotes = true

[doctor]
ignore = []
