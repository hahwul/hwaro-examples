<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --bg: #0a0a0a;
    --text: #e0e0e0;
    --text-muted: #888888;
    --border: #222222;
    --accent: #555555;
    --link: #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); font-weight: 300; }
  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
  .site-header { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
  .site-logo { font-size: 1.2rem; font-weight: 400; color: var(--text); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
  .site-header nav a:hover { color: var(--link); }
  .site-main { min-height: 60vh; }
  h1, h2, h3 { font-weight: 400; color: var(--link); letter-spacing: 0.5px; }
  h1 { font-size: 2rem; margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  a { color: var(--text); text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 4px; transition: text-decoration-color 0.3s, color 0.3s; }
  a:hover { color: var(--link); text-decoration-color: var(--link); }
  ul.section-list { list-style: none; padding: 0; margin: 0; }
  ul.section-list li { padding: 1rem 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; }
  ul.section-list li a { font-size: 1.2rem; text-decoration: none; color: var(--text); }
  ul.section-list li a:hover { color: var(--link); text-decoration: underline; text-decoration-color: var(--accent); }
  .site-footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; text-align: center; letter-spacing: 1px; }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
    <footer class="site-footer">
      <p>Silent Ink &middot; Powered by Hwaro</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
