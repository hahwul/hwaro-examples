<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  {{ og_all_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  {{ highlight_css }}

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brass-gold: #b8860b;
      --gear-gray: #3a3a3a;
      --secret-black: #1a1a1a;
      --decode-green: #00ff41;
      --rotor-bronze: #cd7f32;
      --paper-beige: #f4f1e8;
    }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--secret-black);
      color: var(--paper-beige);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 2;
    }

    header {
      border-bottom: 2px solid var(--brass-gold);
      padding: 2rem 0;
      background: linear-gradient(180deg, rgba(58, 58, 58, 0.8) 0%, rgba(26, 26, 26, 0.9) 100%);
      box-shadow: 0 4px 20px rgba(184, 134, 11, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--brass-gold);
      font-family: 'Special Elite', cursive;
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(184, 134, 11, 0.5);
      transition: all 0.3s ease;
    }

    .logo:hover {
      color: var(--decode-green);
      text-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
    }

    .rotor-icon {
      width: 40px;
      height: 40px;
      border: 3px solid var(--brass-gold);
      border-radius: 50%;
      background: radial-gradient(circle, var(--gear-gray) 0%, var(--secret-black) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: rotate-rotor 20s linear infinite;
    }

    .rotor-icon::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--brass-gold);
      border-radius: 50%;
      position: absolute;
    }

    @keyframes rotate-rotor {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      color: var(--paper-beige);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      font-weight: 500;
      letter-spacing: 1px;
    }

    nav a::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--brass-gold);
      transition: width 0.3s ease;
    }

    nav a:hover::before {
      width: 100%;
    }

    nav a:hover {
      color: var(--brass-gold);
    }

    @keyframes morse-blink {
      0%, 20% { opacity: 1; }
      10% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .loading-morse {
      display: inline-block;
      animation: morse-blink 2s infinite;
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        text-align: center;
      }

      nav {
        flex-direction: column;
        gap: 1rem;
      }

      .logo {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="{{ base_url }}/" class="logo">
          <div class="rotor-icon"></div>
          {{ site.title }}
        </a>
        <nav>
          <a href="{{ base_url }}/">Home</a>
          <a href="{{ base_url }}/puzzles/">Puzzles</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </div>
  </header>
