{% include "header.html" %}

<section class="section-list">
    <header class="post-header">
        <div class="mono">TAXONOMY INDEX</div>
        <h1>{{ taxonomy_name }}</h1>
        <div class="mono">{{ taxonomy_terms | length }} TERMS DEFINED</div>
    </header>

    <div class="posts">
        <div class="post-content">
            <ul style="list-style: none; padding: 0;">
                {% for term in taxonomy_terms %}
                    <li style="margin-bottom: 1rem;">
                        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}" class="mono" style="font-size: 1.2rem;">
                            {{ term }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</section>

{% include "footer.html" %}
