<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eee;
            --text: #333;
            --accent: #d32f2f;
            --metal: #ccc;
            --shadow: rgba(0,0,0,0.2);
            --highlight: rgba(255,255,255,0.6);
        }
        body {
            background-color: #e0e0e0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .gauge-surface {
            background: var(--metal);
            border-radius: 50%;
            width: 400px;
            height: 400px;
            margin: 0 auto 60px;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 30px var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #aaa;
            position: relative;
        }
        .gauge-needle {
            width: 4px;
            height: 180px;
            background: var(--accent);
            transform: rotate(-30deg);
            transform-origin: bottom center;
            position: absolute;
            bottom: 50%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        article {
            background: #fff;
            padding: 60px;
            box-shadow: inset 5px 5px 15px var(--shadow);
            border-radius: 4px;
        }
        h2 { font-weight: 700; font-size: 2rem; color: #444; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .data-point { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">dial.gauge</div>
            <nav>
                <a href="/">Pressure</a>
                <a href="/about">Metrics</a>
            </nav>
        </div>
    </header>
