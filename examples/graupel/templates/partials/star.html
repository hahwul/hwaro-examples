{#- The signature glyph: a star whose point count encodes the night's seeing.
    Set `star_seeing` (1–5, 5 = rock steady) before including; points = seeing + 3.
    Unset or unknown values fall back to the mid-scale six-point star.
    The glyph is decorative — a text label always accompanies it. -#}
<svg class="star-glyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
  {%- if star_seeing == 1 -%}
  <polygon points="12,2 14.4,9.6 22,12 14.4,14.4 12,22 9.6,14.4 2,12 9.6,9.6"/>
  {%- elif star_seeing == 2 -%}
  <polygon points="12,2 14.47,8.6 21.51,8.91 15.99,13.3 17.88,20.09 12,16.2 6.12,20.09 8.01,13.3 2.49,8.91 9.53,8.6"/>
  {%- elif star_seeing == 4 -%}
  <polygon points="12,2 14.34,7.13 19.82,5.77 17.26,10.8 21.75,14.23 16.22,15.37 16.34,21.01 12,17.4 7.66,21.01 7.78,15.37 2.25,14.23 6.74,10.8 4.18,5.77 9.66,7.13"/>
  {%- elif star_seeing == 5 -%}
  <polygon points="12,2 14.18,6.73 19.07,4.93 17.27,9.82 22,12 17.27,14.18 19.07,19.07 14.18,17.27 12,22 9.82,17.27 4.93,19.07 6.73,14.18 2,12 6.73,9.82 4.93,4.93 9.82,6.73"/>
  {%- else -%}
  <polygon points="12,2 14.5,7.67 20.66,7 17,12 20.66,17 14.5,16.33 12,22 9.5,16.33 3.34,17 7,12 3.34,7 9.5,7.67"/>
  {%- endif -%}
</svg>
