{% include "header.html" %}
{% include "nav.html" %}
    <h1>Taxonomy</h1>
    <ul class="section-list">
      {% if taxonomy_terms %}
      {% for term in taxonomy_terms %}
      <li>
        <a href="{{ base_url }}/{{ term.taxonomy | default('tags') }}/{{ term.name }}/">
          {{ term.name }}
        </a>
        <span class="count">({{ term.count }})</span>
      </li>
      {% endfor %}
      {% endif %}
    </ul>
{% include "footer.html" %}
