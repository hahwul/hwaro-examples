<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 0; border-right: 1px solid #eee; min-height: 100vh; }
        header { padding: 60px 40px; border-bottom: 5px solid #000; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; font-family: 'IBM Plex Mono'; }
        .docs-surface { padding: 80px 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">terminus.docs</div></header>
