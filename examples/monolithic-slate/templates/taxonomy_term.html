{% include "header.html" %}
<h1>{{ taxonomy | upper }}: {{ term }}</h1>
<ul class="section-list">
  {% for p in pages %}
  <li>
    <a href="{{ base_url }}{{ p.url }}">{{ p.title }}</a>
    {% if p.description %}
    <p>{{ p.description }}</p>
    {% endif %}
  </li>
  {% endfor %}
</ul>
