<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}

    <style>
    :root {
      --primary: #c9d1d9;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --bg: #0d1117;
      --bg-subtle: #161b22;
      --accent: #58a6ff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 2px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: bold; font-size: 1.5rem; color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-logo:hover { color: var(--text); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .site-header nav a:hover { color: var(--accent); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 2px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; text-transform: uppercase; letter-spacing: 1px;}

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 0.5em; font-weight: normal; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h1 { font-size: 2rem; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: none; }
    h2 { font-size: 1.5rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    a:hover { border-color: var(--accent); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border: 1px solid var(--border); font-size: 0.9em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; color: var(--accent); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border: 1px solid var(--border); overflow-x: auto; }
    pre code { background: none; padding: 0; border: none; color: var(--text); }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; border-top: 1px solid var(--border); }
    ul.section-list li { padding: 1.5rem 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
    ul.section-list li a { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    ul.section-list li p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; padding: 1rem; border: 1px solid var(--border); background: var(--bg-subtle); }

    /* Navigation */
    nav.pagination { margin: 2rem 0; padding-top: 2rem; border-top: 1px solid var(--border); }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    nav.pagination a:hover { color: var(--accent); border-color: var(--accent); }
    .pagination-current span { border-color: var(--accent); color: var(--accent); background: var(--bg-subtle); }
    .pagination-disabled span { opacity: 0.3; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
