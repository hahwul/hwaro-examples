{% include "header.html" %}
<article>
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <p class="taxonomy-desc">{{ page.date | date(format="%Y-%m-%d") }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content | safe }}
  </div>
  {% if page.tags %}
  <div class="taxonomy-desc" style="margin-top: 3rem;">
    <strong>TAGS:</strong>
    {% for tag in page.tags %}
      <a href="{{ base_url }}/tags/{{ tag }}/">#{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}
</article>
{% include "footer.html" %}
