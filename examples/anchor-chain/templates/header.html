<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eee; --text: #333; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 0; border-left: 2px solid #000; border-right: 2px solid #000; min-height: 100vh; background: #fff; }
        header { border-bottom: 10px solid #000; padding: 40px; text-align: center; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; }
        .chain-surface { padding: 80px 40px; position: relative; }
        .link { width: 40px; height: 60px; border: 10px solid #000; border-radius: 20px; margin: 0 auto -20px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">anchor.chain</div></header>
