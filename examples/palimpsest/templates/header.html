<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Eczar:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #efece5;
            --text: #3c3530;
            --ghost: #d6d0c4;
            --accent: #8b5a2b;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Eczar', serif;
            margin: 0;
            line-height: 1.7;
            position: relative;
        }
        .ghost-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            color: var(--ghost);
            opacity: 0.3;
            transform: rotate(-5deg);
            word-wrap: break-word;
            line-height: 0.8;
            letter-spacing: -2px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
            background: rgba(239, 236, 229, 0.8);
            box-shadow: 0 0 40px var(--bg);
            min-height: 100vh;
        }
        header {
            padding: 60px 0;
            border-bottom: 1px solid var(--ghost);
            position: relative;
        }
        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }
        nav a:hover { opacity: 1; color: var(--accent); }
        .pal-hero {
            padding: 100px 0;
            text-align: center;
            border-bottom: 1px dashed var(--ghost);
        }
        .pal-hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            margin: 0;
            color: var(--text);
            position: relative;
        }
        .pal-hero h1::after {
            content: 'OVERWRITTEN';
            position: absolute;
            top: 10px;
            left: 20%;
            font-size: 6rem;
            color: var(--ghost);
            z-index: -1;
            opacity: 0.5;
        }
        article { padding: 60px 0; font-size: 1.15rem; }
        h2 { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--accent); margin-top: 60px; border-bottom: 1px solid var(--ghost); padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="ghost-layer">
        LOREM IPSUM DOLOR SIT AMET CONSECTETUR ADIPISCING ELIT SED DO EIUSMOD TEMPOR INCIDIDUNT UT LABORE ET DOLORE MAGNA ALIQUA
    </div>
    <div class="container">
    <header>
        <div class="logo">PALIMPSEST</div>
        <nav>
            <a href="/">Layer</a>
            <a href="/about">Erase</a>
        </nav>
    </header>
