{% extends "base.html" %}

{% block content %}
<div class="hero gooey-effect">
    <div class="hero-content">
        <h1>Fluid Dynamics</h1>
        <p>A demonstration of sticky, gooey SVG filters and CSS blobs.</p>
    </div>
</div>

<div class="card-grid">
    {% for post in section.pages %}
    <article class="card gooey-effect">
        <a href="{{ base_url }}{{ post.path }}">
            <div class="card-content">
                <h2>{{ post.title }}</h2>
                {% if post.description %}
                <p>{{ post.description }}</p>
                {% endif %}
            </div>
            <div class="card-blob"></div>
        </a>
    </article>
    {% endfor %}
</div>
{% endblock %}
