{% extends "base.html" %}

{% block content %}
<article class="page-content gooey-effect">
    <div class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="description">{{ page.description }}</p>
        {% endif %}
    </div>

    <div class="prose">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
