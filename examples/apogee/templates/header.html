<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true" focusable="false">
          <ellipse cx="14" cy="15" rx="9.5" ry="5.5"/>
          <circle cx="14" cy="15" r="1.1" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="9.5" r="1.6" fill="currentColor" stroke="none"/>
        </svg>
        <span class="brand-name">Apogee</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/work/">Work</a>
        <a href="{{ base_url }}/services/">Services</a>
        <a href="{{ base_url }}/process/">Process</a>
        <a href="{{ base_url }}/studio/">Studio</a>
        <a href="{{ base_url }}/contact/" class="nav-cta">Contact</a>
      </nav>
    </div>
  </header>
