<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="{{ base_url }}/" aria-label="Hoarfrost home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M16 4 L18.3 13 L27 16 L18.3 19 L16 28 L13.7 19 L5 16 L13.7 13 Z"/>
        </svg>
        <span class="brand-word">Hoarfrost</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a{% if page.section is present and page.section == "observations" %} aria-current="page"{% endif %} href="{{ base_url }}/observations/">Observations</a>
        <a{% if page.url is present and page.url == "/tags/" %} aria-current="page"{% endif %} href="{{ base_url }}/tags/">Tags</a>
        <a{% if page.url is present and page.url == "/about/" %} aria-current="page"{% endif %} href="{{ base_url }}/about/">About</a>
        <button class="search-toggle" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Search the log">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3.5 3.5"/></svg>
          <span class="search-toggle-label">Search</span>
          <kbd aria-hidden="true">/</kbd>
        </button>
      </nav>
    </div>
  </header>
