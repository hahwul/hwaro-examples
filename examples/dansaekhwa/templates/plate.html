{# Renders one full-bleed study plate. Expects `pk` (plate kind) in context. #}
{% if pk == "ground" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Bare ivory ground with a single faint vertical seam and paper grain.">
  <defs>
    <linearGradient id="ground-tone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efeae0"/>
      <stop offset="1" stop-color="#e6dfd1"/>
    </linearGradient>
    <filter id="ground-grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.13  0 0 0 0 0.10  0 0 0 0.10 0"/></filter>
  </defs>
  <rect width="1200" height="560" fill="url(#ground-tone)"/>
  <rect x="596" y="40" width="2" height="480" fill="#262219" opacity="0.22"/>
  <rect x="602" y="70" width="1" height="430" fill="#262219" opacity="0.10"/>
  <rect width="1200" height="560" filter="url(#ground-grain)"/>
</svg>
{% elif pk == "ink" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Layered vertical brush strokes building tonal depth in near-black ink.">
  <defs>
    <linearGradient id="ink-wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9e3d8"/>
      <stop offset="1" stop-color="#e0d9ca"/>
    </linearGradient>
    <filter id="ink-grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.13  0 0 0 0 0.10  0 0 0 0.08 0"/></filter>
  </defs>
  <rect width="1200" height="560" fill="url(#ink-wash)"/>
  <g fill="#262219">
    <rect x="70"  y="24" width="96"  height="512" opacity="0.10"/>
    <rect x="150" y="24" width="52"  height="512" opacity="0.18"/>
    <rect x="248" y="24" width="120" height="512" opacity="0.07"/>
    <rect x="300" y="24" width="44"  height="512" opacity="0.20"/>
    <rect x="420" y="24" width="80"  height="512" opacity="0.12"/>
    <rect x="470" y="24" width="30"  height="512" opacity="0.22"/>
    <rect x="560" y="24" width="110" height="512" opacity="0.08"/>
    <rect x="640" y="24" width="56"  height="512" opacity="0.16"/>
    <rect x="740" y="24" width="90"  height="512" opacity="0.11"/>
    <rect x="800" y="24" width="38"  height="512" opacity="0.21"/>
    <rect x="900" y="24" width="124" height="512" opacity="0.07"/>
    <rect x="960" y="24" width="48"  height="512" opacity="0.17"/>
    <rect x="1070" y="24" width="72" height="512" opacity="0.13"/>
  </g>
  <rect width="1200" height="560" filter="url(#ink-grain)"/>
</svg>
{% elif pk == "clay" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Horizontal scraped clay bands with troweled, roughened edges.">
  <defs>
    <linearGradient id="clay-tone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6dfd0"/>
      <stop offset="1" stop-color="#ded6c5"/>
    </linearGradient>
    <filter id="clay-scrape" x="-5%" y="-5%" width="110%" height="110%"><feTurbulence type="fractalNoise" baseFrequency="0.012 0.07" numOctaves="2" result="t"/><feDisplacementMap in="SourceGraphic" in2="t" scale="30" xChannelSelector="R" yChannelSelector="G"/></filter>
    <filter id="clay-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.13  0 0 0 0 0.10  0 0 0 0.09 0"/></filter>
  </defs>
  <rect width="1200" height="560" fill="url(#clay-tone)"/>
  <g filter="url(#clay-scrape)">
    <rect x="-40" y="40"  width="1280" height="70" fill="#262219" opacity="0.16"/>
    <rect x="-40" y="150" width="1280" height="52" fill="#6a6355" opacity="0.28"/>
    <rect x="-40" y="238" width="1280" height="84" fill="#262219" opacity="0.13"/>
    <rect x="-40" y="356" width="1280" height="46" fill="#6a6355" opacity="0.30"/>
    <rect x="-40" y="440" width="1280" height="72" fill="#262219" opacity="0.17"/>
  </g>
  <rect width="1200" height="560" filter="url(#clay-grain)"/>
</svg>
{% elif pk == "hatch" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Dense repeated pencil hatching drawn as fine diagonal lines.">
  <defs>
    <pattern id="hatch-fine" width="9" height="9" patternTransform="rotate(32)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#262219" stroke-width="1.05" stroke-opacity="0.5"/>
    </pattern>
    <linearGradient id="hatch-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ece7dc" stop-opacity="0.66"/>
      <stop offset="0.5" stop-color="#ece7dc" stop-opacity="0"/>
      <stop offset="1" stop-color="#ece7dc" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="#ece7dc"/>
  <rect width="1200" height="560" fill="url(#hatch-fine)"/>
  <rect width="1200" height="560" fill="url(#hatch-fade)"/>
</svg>
{% elif pk == "grid" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A pressed field of short repeated pencil marks arranged in a grid.">
  <defs>
    <pattern id="press-mark" width="27" height="27" patternUnits="userSpaceOnUse">
      <line x1="13.5" y1="6" x2="13.5" y2="21" stroke="#262219" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round"/>
    </pattern>
    <filter id="grid-jitter" x="-3%" y="-3%" width="106%" height="106%"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="t"/><feDisplacementMap in="SourceGraphic" in2="t" scale="4"/></filter>
    <linearGradient id="grid-tone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece7dc"/>
      <stop offset="1" stop-color="#e5ddce"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="url(#grid-tone)"/>
  <rect width="1200" height="560" fill="url(#press-mark)" filter="url(#grid-jitter)"/>
</svg>
{% elif pk == "pool" %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Pooled ink gathering toward a soft dark center with organic edges.">
  <defs>
    <filter id="pool-warp" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="t"/><feDisplacementMap in="SourceGraphic" in2="t" scale="60" xChannelSelector="R" yChannelSelector="G"/></filter>
    <filter id="pool-grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.13  0 0 0 0 0.10  0 0 0 0.08 0"/></filter>
  </defs>
  <rect width="1200" height="560" fill="#ece7dc"/>
  <g filter="url(#pool-warp)" fill="#262219">
    <ellipse cx="600" cy="280" rx="470" ry="230" opacity="0.05"/>
    <ellipse cx="600" cy="280" rx="380" ry="185" opacity="0.06"/>
    <ellipse cx="600" cy="280" rx="300" ry="145" opacity="0.07"/>
    <ellipse cx="600" cy="280" rx="225" ry="108" opacity="0.09"/>
    <ellipse cx="600" cy="280" rx="150" ry="72"  opacity="0.12"/>
    <ellipse cx="600" cy="280" rx="82"  ry="40"  opacity="0.18"/>
  </g>
  <rect width="1200" height="560" filter="url(#pool-grain)"/>
</svg>
{% else %}
<svg class="plate__art" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Unpainted ivory ground.">
  <rect width="1200" height="560" fill="#ece7dc"/>
</svg>
{% endif %}
