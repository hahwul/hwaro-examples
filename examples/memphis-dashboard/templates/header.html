<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Bespoke Memphis Dashboard stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">
        <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="2" y="2" width="13" height="13" fill="#2f4ff0" stroke="#16161a" stroke-width="2"/>
          <circle cx="24" cy="8.5" r="6" fill="#ff5247" stroke="#16161a" stroke-width="2"/>
          <path d="M3 26 L8 21 L13 26 L18 21 L23 26" fill="none" stroke="#1ec8b0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        BLAST<span>.fm</span>
      </a>
      <nav>
        <a href="{{ base_url }}/">Overview</a>
        <a href="{{ base_url }}/posts/">Feed</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
