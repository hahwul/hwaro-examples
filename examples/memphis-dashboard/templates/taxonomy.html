{% include "header.html" %}
  <main class="site-main">
    <div class="panel-left-block" style="margin-bottom: 3rem;">
      <div class="panel-header">
        <h1 class="panel-title">All {{ taxonomy_name | e }}</h1>
        <span class="indicator-badge indicator-red">INDEX</span>
      </div>

      <div class="badge-container" style="gap: 0.8rem; padding-top: 0.5rem;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1rem; padding: 0.45rem 1rem;">
            #{{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
