<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  <style>
    :root {
      --color-bg: #0b0c10;
      --color-fg: #c5c6c7;
      --color-accent: #66fcf1;
      --color-accent-dim: #45a29e;
      --color-surface: #1f2833;
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "IBM Plex Mono", Consolas, Monaco, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-fg);
      font-family: var(--font-body);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--color-accent-dim);
    }

    .site-header {
      padding: 2rem;
      border-bottom: 1px solid var(--color-surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-fg);
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      color: var(--color-fg);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .site-nav a:hover {
      color: var(--color-accent);
    }

    .page-content {
      flex: 1;
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .obelisk-article .title,
    .obelisk-section .title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-accent);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .obelisk-article .meta {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--color-accent-dim);
      display: block;
      margin-bottom: 2rem;
    }

    .content {
      font-size: 1.1rem;
    }

    .content h1, .content h2, .content h3, .content h4, .content h5, .content h6 {
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: var(--color-fg);
      font-weight: 700;
      line-height: 1.3;
    }

    .content p {
      margin-bottom: 1.5rem;
    }

    .content code {
      font-family: var(--font-mono);
      background-color: var(--color-surface);
      padding: 0.2em 0.4em;
      border-radius: 2px;
      font-size: 0.9em;
      color: var(--color-accent);
    }

    .content pre {
      background-color: var(--color-surface);
      padding: 1.5rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--color-accent);
    }

    .content pre code {
      background-color: transparent;
      padding: 0;
      color: var(--color-fg);
    }

    .content ul, .content ol {
      margin-bottom: 1.5rem;
      padding-left: 2rem;
    }

    .content li {
      margin-bottom: 0.5rem;
    }

    .grid-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-top: 3rem;
    }

    @media (min-width: 600px) {
      .grid-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .grid-item {
      background-color: var(--color-surface);
      padding: 2rem;
      border-top: 4px solid var(--color-accent-dim);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .grid-item:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
    }

    .grid-item .item-title {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .grid-item .item-title a {
      color: var(--color-fg);
    }

    .grid-item:hover .item-title a {
      color: var(--color-accent);
    }

    .grid-item .item-desc {
      font-size: 0.9rem;
      color: #999;
    }

    .site-footer {
      padding: 2rem;
      text-align: center;
      border-top: 1px solid var(--color-surface);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--color-accent-dim);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
  </header>
