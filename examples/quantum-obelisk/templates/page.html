{% include "header.html" %}
  <main class="page-content">
    <article class="obelisk-article">
      <header class="article-header">
        <h1 class="title">{{ page.title | e }}</h1>
        {% if page.date %}
        <time class="meta">{{ page.date | date(format="%Y-%m-%d") }}</time>
        {% endif %}
      </header>
      <div class="content">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
