{% include "header.html" %}
    <section class="search-page wrap" aria-labelledby="search-title">
      <p class="kicker">Find an issue</p>
      <h1 id="search-title">Search Postscript</h1>
      <p class="search-intro">Search every issue and page by title or text. Figures, methods, and jargon all included.</p>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false">
        <label class="search-label" for="search-input">Search</label>
        <input class="search-input" type="search" id="search-input" placeholder="buffer, grants, quarterly taxes&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="search-results" id="search-results"></ul>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </section>
{% include "footer.html" %}
