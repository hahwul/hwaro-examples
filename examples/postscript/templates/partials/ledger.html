{# Ledger partial — the signature element.
   Set lg_figure / lg_prefix / lg_suffix / lg_label / lg_size before including.
   lg_size: "lg" (default) or "sm". #}
<div class="ledger{% if lg_size == "sm" %} ledger-sm{% endif %}" role="group" aria-label="Key figure: {% if lg_prefix %}{{ lg_prefix }}{% endif %}{{ lg_figure }}{% if lg_suffix %}{{ lg_suffix }}{% endif %}, {{ lg_label }}">
  <div class="ledger-figure-row">
    <span class="ledger-figure" aria-hidden="true">{% if lg_prefix %}<span class="ledger-affix">{{ lg_prefix }}</span>{% endif %}{{ lg_figure }}{% if lg_suffix %}<span class="ledger-affix">{{ lg_suffix }}</span>{% endif %}</span>
  </div>
  <div class="ledger-label-row">
    <p class="ledger-label">{{ lg_label }}</p>
  </div>
</div>
