<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,600&amp;family=Source+Serif+4:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="wordmark" href="{{ base_url }}/">
        <span class="wordmark-text">Post<span class="wordmark-mark">script</span></span>
        <span class="wordmark-tag">a letter for working artists</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
        <a href="{{ base_url }}/issues/"{% if page.section == "issues" %} aria-current="page"{% endif %}>Issues</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/search/"{% if page.url == "/search/" %} aria-current="page"{% endif %}>Search</a>
        <a class="nav-feed" href="{{ base_url }}/issues/rss.xml">RSS</a>
      </nav>
    </div>
    <div class="rule-duplex" role="presentation"></div>
  </header>
  <main id="main" class="site-main">
