<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar">
    <div class="topbar-inner">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="sidebar" aria-label="Open the docs navigation">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><path d="M3 5.5h14M3 10h14M3 14.5h9"/></svg>
        <span>Docs</span>
      </button>

      <a class="brand" href="{{ base_url }}/" aria-label="Gneiss — home">
        <svg class="brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
          <g stroke="currentColor" stroke-width="1.4" opacity="0.55">
            <path d="M3 12 Q10 9 16 12 T29 11"/>
            <path d="M3 20 Q10 17 16 20 T29 19"/>
          </g>
          <g stroke="currentColor" stroke-width="1.6">
            <path d="M10 24 L16 8"/>
            <path d="M16 8 L23 22"/>
            <path d="M10 24 L23 22"/>
          </g>
          <g fill="currentColor" stroke="none">
            <circle cx="16" cy="8" r="2.3"/>
            <circle cx="10" cy="24" r="2.3"/>
            <circle cx="23" cy="22" r="2.3"/>
          </g>
        </svg>
        <span class="brand-word">Gneiss</span>
        <span class="brand-tag">query language</span>
      </a>

      <nav class="topbar-nav" aria-label="Primary">
        <a href="{{ base_url }}/tutorial/"{% if page.section == "tutorial" %} aria-current="page"{% endif %}>Tutorial</a>
        <a href="{{ base_url }}/reference/"{% if page.section == "reference" %} aria-current="page"{% endif %}>Reference</a>
      </nav>

      <div class="topbar-tools">
        <button class="cmdk" id="search-open" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Open search">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="6.7" cy="6.7" r="4.2"/><path d="M9.9 9.9 14 14"/></svg>
          <span class="cmdk-label">Search clauses</span>
          <span class="cmdk-keys" aria-hidden="true"><kbd>Ctrl</kbd><kbd>K</kbd></span>
        </button>
      </div>
    </div>
  </header>
