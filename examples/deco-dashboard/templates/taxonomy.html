{% include "header.html" %}
  <main class="site-main">
    <div class="deco-panel" style="margin-bottom: 3rem;">
      <div class="panel-header">
        <h1 class="panel-title">Index Of <span>{{ taxonomy_name | e }}</span></h1>
        <span class="indicator-badge">Catalogue</span>
      </div>

      <div class="badge-container" style="gap: 1rem; padding: 0.5rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.78rem; padding: 0.45rem 0.9rem;">
            {{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
