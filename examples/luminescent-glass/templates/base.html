<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(value=site.title) }}</title>
  {% if page.description %}
  <meta name="description" content="{{ page.description }}">
  {% elif site.description %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
  <style>
    :root {
      --bg-color: #05050f;
      --glass-bg: rgba(20, 20, 40, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      --neon-cyan: #00f3ff;
      --neon-magenta: #ff00ff;
      --text-main: #e0e0f0;
      --text-muted: #8888a0;
      --glow-blur: 15px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background glows */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(100px);
      opacity: 0.5;
    }

    body::before {
      top: -100px;
      left: -100px;
      background: var(--neon-cyan);
    }

    body::after {
      bottom: 20%;
      right: -100px;
      background: var(--neon-magenta);
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
    }

    header {
      padding: 1.5rem;
      margin: 2rem auto;
      width: 90%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    nav a {
      color: var(--text-main);
      text-decoration: none;
      margin-left: 2rem;
      font-weight: 500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    nav a:hover {
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    main {
      flex: 1;
      width: 90%;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 3rem;
      position: relative;
      z-index: 5;
    }

    h1, h2, h3 {
      color: #fff;
      margin-bottom: 1.5rem;
      font-weight: 600;
      line-height: 1.2;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
    }

    p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    a {
      color: var(--neon-magenta);
      text-decoration: none;
      position: relative;
    }

    a:hover {
      text-shadow: 0 0 8px var(--neon-magenta);
    }

    code {
      background: rgba(0,0,0,0.5);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 243, 255, 0.2);
    }

    pre code {
      display: block;
      padding: 1.5rem;
      overflow-x: auto;
      background: rgba(10, 10, 20, 0.8);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      color: var(--text-main);
    }

    .hljs {
      background: transparent;
    }

    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      margin-top: 1rem;
      background: transparent;
      color: #fff;
      border: 1px solid var(--neon-cyan);
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
    }

    .btn:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 20px var(--neon-cyan);
    }

    footer {
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--glass-border);
      background: rgba(5, 5, 15, 0.8);
      backdrop-filter: blur(8px);
    }

    /* Content styling specific */
    .content-area img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      margin: 2rem 0;
    }
  </style>
</head>
<body>

  <header class="glass-panel">
    <a href="{{ site.base_url | default(value="/") }}" class="logo">Lumiglass</a>
    <nav>
      <a href="{{ site.base_url | default(value="/") }}">Home</a>
      <a href="{{ site.base_url | default(value="/") }}about/">About</a>
    </nav>
  </header>

  <main class="glass-panel content-area">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ site.title }} - Powered by Hwaro</p>
  </footer>

</body>
</html>
