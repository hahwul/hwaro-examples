# =============================================================================
# Site Configuration
# =============================================================================

title = "Prism Drift"
description = "A bright, frosted-glass blog about design systems, light, and the craft of clear interfaces."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.6

[robots]
enabled = true
filename = "robots.txt"

[feeds]
enabled = true
filename = "rss.xml"
type = "rss"
full_content = true
limit = 10

[markdown]
safe = false
lazy_loading = true
emoji = false
