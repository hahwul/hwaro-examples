{% include "header.html" %}
<div class="chroma-container">
  <header class="chroma-header">
    <nav class="chroma-nav">
      <a href="{{ base_url }}/" class="brand">{{ site.title | e }}</a>
      <div class="nav-links">
        <a href="{{ base_url }}/posts/">Blog</a>
        <a href="{{ base_url }}/about/">About</a>
      </div>
    </nav>
  </header>
  <main class="chroma-main">
    <article class="glass-panel page-content">
      {% if page.title %}
        <h1 class="page-title">{{ page.title | e }}</h1>
      {% endif %}
      {{ content | safe }}
    </article>
{% include "footer.html" %}
