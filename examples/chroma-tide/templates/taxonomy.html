{% include "header.html" %}
<div class="chroma-container">
  <header class="chroma-header">
    <nav class="chroma-nav">
      <a href="{{ base_url }}/" class="brand">{{ site.title | e }}</a>
      <div class="nav-links">
        <a href="{{ base_url }}/posts/">Blog</a>
        <a href="{{ base_url }}/about/">About</a>
      </div>
    </nav>
  </header>
  <main class="chroma-main">
    <div class="glass-panel taxonomy-content">
      <h1 class="section-title">{{ page.title | e }}</h1>
      <ul class="taxonomy-list">
        {% for t in terms %}
          <li><a href="{{ t.url }}">{{ t.name | e }} ({{ t.count }})</a></li>
        {% endfor %}
      </ul>
    </div>
{% include "footer.html" %}
