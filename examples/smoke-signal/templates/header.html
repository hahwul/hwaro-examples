<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f5; --text: #555; --accent: #888; --smoke: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; padding-bottom: 60px; }
        .logo { font-weight: 200; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 15px; opacity: 0.5; }
        .smoke-surface { background: var(--smoke); padding: 80px; border-radius: 100px; box-shadow: 0 20px 60px rgba(0,0,0,0.02); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">smoke.signal</div></header>
