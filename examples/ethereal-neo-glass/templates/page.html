{% extends "base.html" %}

{% block content %}
<article class="glass-panel page-content">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description is present %}
      <p class="page-desc">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="content-body">
    {{ content | safe }}
  </div>
</article>
{% endblock content %}
