{% extends "base.html" %}

{% block content %}
<div class="section-container">
  <header class="glass-panel section-header">
    <h1 class="page-title">{{ page.title | e }}</h1>
    {{ content | safe }}
  </header>

  <ul class="section-list">
    {{ section.list }}
  </ul>

  {% if pagination is defined %}
  <nav class="pagination-wrapper glass-panel">
    {{ pagination }}
  </nav>
  {% endif %}
</div>
{% endblock content %}
