{% extends "base.html" %}

{% block content %}
<div class="glass-panel page-content">
  <h1 class="page-title">{{ page.title | e }}</h1>
  {% if term is defined %}
  <p class="taxonomy-desc">Posts tagged with <strong>{{ term.name }}</strong>:</p>
  {% else %}
  <p class="taxonomy-desc">Posts tagged with this term:</p>
  {% endif %}
  {{ content | safe }}
</div>
{% endblock content %}
