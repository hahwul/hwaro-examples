<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="paper-wrap">
    <!-- PREPRINT watermark -->
    <div class="preprint-watermark" aria-hidden="true">
      <svg viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <text x="300" y="75" text-anchor="middle" font-family="'Inter','Roboto',sans-serif" font-size="80" font-weight="800" fill="#e63946" opacity="0.06" letter-spacing="0.15em">PREPRINT</text>
      </svg>
    </div>
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Preprint home">
        <svg viewBox="0 0 52 40" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Document with clock/rush icon -->
          <rect x="4" y="2" width="28" height="36" rx="2" fill="none" stroke="#1a2332" stroke-width="1.5"/>
          <line x1="10" y1="10" x2="26" y2="10" stroke="#1a2332" stroke-width="0.8" opacity="0.4"/>
          <line x1="10" y1="16" x2="24" y2="16" stroke="#1a2332" stroke-width="0.8" opacity="0.4"/>
          <line x1="10" y1="22" x2="22" y2="22" stroke="#1a2332" stroke-width="0.8" opacity="0.4"/>
          <!-- Clock overlay -->
          <circle cx="38" cy="26" r="12" fill="none" stroke="#e63946" stroke-width="1.5"/>
          <line x1="38" y1="26" x2="38" y2="18" stroke="#e63946" stroke-width="1.5"/>
          <line x1="38" y1="26" x2="44" y2="28" stroke="#e63946" stroke-width="1.2"/>
          <!-- Speed lines -->
          <line x1="26" y1="6" x2="34" y2="6" stroke="#e63946" stroke-width="0.8" opacity="0.5"/>
          <line x1="28" y1="10" x2="36" y2="10" stroke="#e63946" stroke-width="0.6" opacity="0.4"/>
        </svg>
        <span class="logo-text">
          <span class="server-name">medRxiv / Preprint Server</span>
          <span class="preprint-id">doi: 10.1101/2026.04.12.648302</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">ABSTRACT</a>
        <a href="{{ base_url }}/sections/">SECTIONS</a>
        <a href="{{ base_url }}/data/">DATA</a>
        <a href="{{ base_url }}/changelog/">CHANGELOG</a>
      </nav>
    </header>
