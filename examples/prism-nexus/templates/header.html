<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{% if site is defined %}{{ site.title }}{% endif %}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif site is defined and site.description %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}

    <!-- Google Fonts: Space Grotesk and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">

    {% if site is defined and site.highlight is defined and site.highlight.enabled %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/{{ site.highlight.theme }}.min.css">
    {% endif %}
</head>
<body>
    <div class="site-container">
        <header class="site-header">
            <div class="site-title">
                <a href="/">{% if site is defined %}{{ site.title }}{% else %}Prism Nexus{% endif %}</a>
            </div>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/about/">About</a>
            </nav>
        </header>
        <main class="site-main">
