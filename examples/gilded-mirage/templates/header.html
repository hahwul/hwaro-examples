<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --gold: #d4af37;
      --gold-muted: rgba(212, 175, 55, 0.6);
      --bg: #0b0a0a;
      --bg-glass: rgba(15, 14, 14, 0.7);
      --text: #f0e6d2;
      --border: rgba(212, 175, 55, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Georgia", serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
    }
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .site-logo {
      font-size: 1.5rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--gold-muted);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--gold);
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
    }
    .glass-container {
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--gold-muted);
      font-size: 0.9rem;
      text-align: center;
    }
    h1, h2, h3 { color: var(--gold); font-weight: normal; margin-top: 0; }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; text-decoration-color: var(--gold); }
    pre { background: rgba(0,0,0,0.5); padding: 1rem; border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
