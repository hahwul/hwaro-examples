<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {{ site.title | e }}{% else %}{{ site.title | e }} — {{ site.description | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="spread">
    <header class="masthead">
      <a class="wordmark" href="{{ base_url }}/">
        <svg class="wordmark-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M16 6v16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <path d="M16 8l7.5 12.5H16z" fill="currentColor"/>
          <path d="M7 23.5c3 2.6 15 2.6 18 0" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        </svg>
        <span>Gathering</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Half-title</a>
        <a href="{{ base_url }}/chapters/">Passage Log</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </header>
