{% include "header.html" %}
    <main id="main">
      <header class="page-open">
        <p class="chapter-kicker">Find a passage</p>
        <h1 class="page-title">{{ page.title | e }}</h1>
        {% if content %}<div class="prose section-intro">{{ content | safe }}</div>{% endif %}
      </header>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the log</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="a day, a position, a landfall…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="search-results" id="search-results"></ul>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
