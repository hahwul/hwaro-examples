<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(val=site.title) }}</title>
    <meta name="description" content="{{ page.description | default(val=site.description) }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="amber-container">
        <header class="amber-header">
            <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
            <p class="subtitle">{{ site.description }}</p>
            <nav class="amber-nav">
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </header>

        <main class="amber-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="amber-footer">
            <p>&copy; {{ current_year }} {{ site.title }}. Trapped in time.</p>
        </footer>
    </div>
</body>
</html>
