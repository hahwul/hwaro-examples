{% extends "base.html" %}

{% block content %}
<article class="specimen-page">
    <div class="fossil-inner">
        <header>
            <h1>{{ page.title }}</h1>
            {% if page.date %}
            <time datetime="{{ page.date | date(fmt="%Y-%m-%d") }}">{{ page.date | date(fmt="%B %d, %Y") }}</time>
            {% endif %}
        </header>
        <div class="content-body">
            {{ content | safe }}
        </div>
    </div>
</article>
{% endblock %}
