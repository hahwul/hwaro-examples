<header class="blog-header">
  <div class="blog-header-inner">
    <!-- Extreme decadent logo treatment -->
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo" aria-label="Velvet Rot — return to the estate">
      <span class="gold-foil">VELVET ROT</span>
    </a>

    <!-- Masquerade salon navigation -->
    <nav aria-label="Main navigation">
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">The Salon Records</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">The Grand Archive</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">The Curator</a>
    </nav>

    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}

      <!-- Ornate search trigger -->
      <button class="search-trigger" onclick="openSearch()" title="Search the estate's whispers">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Inquire</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
  </div>
</header>
