<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Deep black velvet background -->
  <rect width="32" height="32" rx="5" fill="#0a0806"/>
  <!-- Tarnished gold ornate moth / chandelier hybrid -->
  <g fill="none" stroke="#c5a26f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body -->
    <line x1="16" y1="8" x2="16" y2="24"/>
    <!-- Left wing (tattered elegance) -->
    <path d="M16 11 Q8 9 6 15 Q7 19 12 18"/>
    <path d="M16 15 Q9 14 7 20"/>
    <!-- Right wing -->
    <path d="M16 11 Q24 9 26 15 Q25 19 20 18"/>
    <path d="M16 15 Q23 14 25 20"/>
    <!-- Antennae with drip hints -->
    <path d="M15 8 Q13 5 11 6"/>
    <path d="M17 8 Q19 5 21 6"/>
    <!-- Subtle crystal drips from wings -->
    <line x1="9" y1="17" x2="9" y2="21" stroke="#8b6f3f" stroke-width="1"/>
    <line x1="23" y1="17" x2="23" y2="21" stroke="#8b6f3f" stroke-width="1"/>
  </g>
  <!-- Tiny gold accent dot -->
  <circle cx="16" cy="19" r="1.1" fill="#c5a26f"/>
</svg>