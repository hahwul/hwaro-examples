{% extends "base.html" %}

{% block content %}
<div class="taxonomy-term-content">
    {% if page.title %}
    <h1 class="page-title">{{ page.title | e }}</h1>
    {% endif %}

    <p class="meta taxonomy-desc">Posts tagged with this term:</p>

    <div class="taxonomy-term-list">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
