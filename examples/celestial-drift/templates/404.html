{% extends "base.html" %}

{% block content %}
<div class="not-found" style="text-align: center; padding: 4rem 0;">
    <h1 style="font-size: 4rem; margin-bottom: 1rem; color: var(--accent);">404</h1>
    <h2 style="font-size: 2rem; margin-bottom: 2rem;">Page Not Found</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">The cosmic drift has taken you to an uncharted sector of space.</p>
    <p><a href="{{ base_url }}" class="btn" style="padding: 0.75rem 1.5rem; border: 1px solid var(--accent); border-radius: 25px; color: var(--accent); transition: all 0.3s;">Return to Base</a></p>
</div>
{% endblock %}
