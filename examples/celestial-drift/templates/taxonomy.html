{% extends "base.html" %}

{% block content %}
<div class="taxonomy-content">
    {% if page.title %}
    <h1 class="page-title">{{ page.title | e }}</h1>
    {% endif %}

    <p class="meta taxonomy-desc">Browse all terms in this taxonomy:</p>

    <div class="taxonomy-list">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
