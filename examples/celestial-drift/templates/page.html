{% extends "base.html" %}

{% block content %}
<article class="page-content">
    {% if page.title %}
    <h1 class="page-title">{{ page.title }}</h1>
    {% endif %}

    {% if page.date %}
    <div class="meta">
        <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
    </div>
    {% endif %}

    <div class="content-body">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
