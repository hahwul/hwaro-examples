<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
  :root {
    --primary: #9b51e0;
    --primary-glow: rgba(155, 81, 224, 0.5);
    --secondary: #2d9cdb;
    --text: #e0e0e0;
    --text-muted: #a0a0a0;
    --border: #333;
    --bg: #0a0a14;
    --bg-subtle: #12121e;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    line-height: 1.6; margin: 0; color: var(--text); background: var(--bg);
    background-image: radial-gradient(circle at top right, var(--bg-subtle) 0%, var(--bg) 100%);
  }

  .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2rem 0; margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
  }
  .site-logo {
    font-weight: 700; font-size: 1.5rem; color: var(--text);
    text-decoration: none; text-transform: uppercase;
    text-shadow: 0 0 10px var(--primary-glow);
  }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; transition: color 0.3s; }
  .site-header nav a:hover { color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }
  .site-main { min-height: calc(100vh - 200px); }
  .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); text-align: center; }

  h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #fff; }
  h1 { font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 15px var(--primary-glow); }
  h2 { font-size: 1.8rem; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--secondary); }
  code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; font-family: monospace; color: var(--secondary); }
  pre { background: var(--bg-subtle); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }

  ul.section-list { list-style: none; padding: 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s; }
  ul.section-list li:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }
  ul.section-list li a { font-weight: 600; font-size: 1.2rem; color: #fff; }
  .taxonomy-desc { color: var(--text-muted); font-size: 1.1rem; }

  @media (max-width: 600px) {
    .site-header { flex-direction: column; gap: 1rem; align-items: center; }
  }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css | safe }}
</head>
<body {% if page is defined %}data-section="{{ page.section }}"{% endif %}>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
