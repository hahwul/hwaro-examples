<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('halcyon-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <div class="masthead">
      <p class="masthead-bar">
        <span>Log Vol. VI &middot; Northern Waters Touring Log</span>
        <span class="masthead-bar-right">Established for slow water &amp; long portages</span>
      </p>
      <div class="masthead-main">
        <a class="brand" href="{{ base_url }}/">
          <span class="brand-crest" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="1"/>
              <path d="M13 30c3-6 6-16 15-21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <ellipse cx="30.5" cy="7.5" rx="3.4" ry="5.6" transform="rotate(28 30.5 7.5)" stroke="currentColor" stroke-width="1.6"/>
              <path d="M11 25c4 2.4 8 2.4 12 0s8-2.4 12 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M11 31c4 2.4 8 2.4 12 0s8-2.4 12 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="brand-word">
            <span class="brand-name">Halcyon</span>
            <span class="brand-tag">Canoe Touring Log</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/voyages/">Voyages</a>
          <a href="{{ base_url }}/about/">About</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/search/">Search</a>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2"/>
              <path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M18.8 5.2l-1.7 1.7M6.9 17.1l-1.7 1.7"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20.2 14.1A8.3 8.3 0 0 1 9.9 3.8a8.3 8.3 0 1 0 10.3 10.3Z"/>
            </svg>
          </button>
        </nav>
      </div>
    </div>
