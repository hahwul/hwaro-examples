{% include "header.html" %}
  <main id="main" class="site-main">
    <div class="wrap wrap-narrow">
      <header class="page-head">
        <p class="page-kicker">Find a voyage</p>
        <h1 class="page-title">{{ page.title | e }}</h1>
        <div class="page-intro">{{ content | safe }}</div>
      </header>
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the log</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="river, portage, season, camp…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <div class="v-grid" id="search-results"></div>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </div>
  </main>
{% include "footer.html" %}
