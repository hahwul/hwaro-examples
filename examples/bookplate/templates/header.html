<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f1ea;
            --text: #2c3e50;
            --border: #2c3e50;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Unna', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            border: 2px solid var(--border);
            position: relative;
            background: #fff;
            box-shadow: 0 0 0 10px #fff, 0 0 0 12px var(--border);
        }
        header {
            text-align: center;
            padding-bottom: 40px;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            display: block;
        }
        .ex-libris {
            font-size: 3rem;
            font-style: italic;
            margin: 20px 0;
            line-height: 1;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .bookplate-hero {
            padding: 60px 0;
            text-align: center;
        }
        h1 { font-size: 4rem; margin: 0; font-weight: 400; }
        article { padding: 40px 0; }
        h2 { font-weight: 700; font-size: 2rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; margin-top: 60px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <span class="logo">EX LIBRIS</span>
        <div class="ex-libris">Bibliotheca Hwaro</div>
        <nav>
            <a href="/">Collection</a>
            <a href="/about">Provenance</a>
        </nav>
    </header>
