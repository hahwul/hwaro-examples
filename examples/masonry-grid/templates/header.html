<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --grid: #f0f0f0;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--grid);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .masonry-surface {
            columns: 3;
            column-gap: 20px;
            margin-bottom: 80px;
        }
        .masonry-item {
            background: #fff;
            padding: 40px;
            margin-bottom: 20px;
            break-inside: avoid;
            box-shadow: 10px 10px 30px var(--shadow);
            border: 1px solid #eee;
        }
        h2 { font-weight: 700; font-size: 1.5rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; }
        article { font-size: 0.9rem; }
        @media (max-width: 992px) { .masonry-surface { columns: 2; } }
        @media (max-width: 768px) { .masonry-surface { columns: 1; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">masonry.grid</div>
            <nav>
                <a href="/">Flow</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
