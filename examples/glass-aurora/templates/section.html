{% include "header.html" %}
  <main class="site-main">
    <h1>{{ page.title | e }}</h1>
    {{ content | safe }}
    <ul class="section-list">
      {% for p in pages %}
      <li>
        <a href="{{ base_url }}{{ p.path }}">{{ p.title | e }}</a>
        {% if p.description %}<p>{{ p.description | e }}</p>{% endif %}
      </li>
      {% endfor %}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
