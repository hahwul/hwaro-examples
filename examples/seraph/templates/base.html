<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --text: #2c2c2c;
      --text-muted: #757575;
      --border: #eaeaea;
      --bg: #ffffff;
      --bg-subtle: #fafafa;
      --accent: #111111;
      --link: #000000;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.8;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-size: 18px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4rem 0 2rem 0;
      margin-bottom: 4rem;
    }

    .site-logo {
      font-weight: 400;
      font-size: 2rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }

    .site-header nav a:hover {
      color: var(--accent);
    }

    .site-main {
      flex: 1;
    }

    .site-footer {
      margin-top: 6rem;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Typography */
    h1, h2, h3, h4 {
      line-height: 1.3;
      color: var(--accent);
      font-weight: 400;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }

    h2 {
      font-size: 1.8rem;
      margin-top: 3rem;
      margin-bottom: 1rem;
    }

    h3 {
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 1.5rem 0;
    }

    a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.7;
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      overflow-x: auto;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
    }

    blockquote {
      margin: 2rem 0;
      padding-left: 1.5rem;
      border-left: 1px solid var(--accent);
      font-style: italic;
      color: var(--text-muted);
    }

    /* Components */
    .section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
    }

    .section-list li {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .section-list li:last-child {
      border-bottom: none;
    }

    .section-list h3 {
      margin: 0 0 0.5rem 0;
    }

    .section-list a {
      text-decoration: none;
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-style: italic;
    }

    /* Pagination */
    nav.pagination {
      margin: 3rem 0;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 1rem;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }

    nav.pagination a:hover {
      color: var(--accent);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--accent);
      color: var(--accent);
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      color: var(--border);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        gap: 1rem;
        align-items: center;
        padding-top: 2rem;
      }
      .site-wrapper {
        padding: 0 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page %}{{ page.section }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/portfolio/">Portfolio</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ current_year }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
