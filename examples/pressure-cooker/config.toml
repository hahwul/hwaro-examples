title = "Pressure Cooker"
description = "Hackathon and intensive workshop -- pressure builds to max, then we ship"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "tracks"

[sitemap]
enabled = true
filename = "sitemap.xml"

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] }
]

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["stages"]

[markdown]
safe = false
