<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --primary: #8a2be2;
      --secondary: #ff007f;
      --bg: #0d0d12;
      --bg-panel: rgba(255, 255, 255, 0.05);
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: rgba(255, 255, 255, 0.1);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.6;
      background-image: radial-gradient(circle at top right, rgba(138, 43, 226, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255, 0, 127, 0.15), transparent 40%);
      background-attachment: fixed;
    }
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 3rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .site-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    nav {
      display: flex;
      gap: 1.5rem;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: var(--secondary);
    }
    .site-main {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 2.5rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      min-height: 50vh;
    }
    h1, h2, h3 { color: #fff; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
