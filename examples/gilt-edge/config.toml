# =============================================================================
# Gilt-Edge - A Gold-Edged Publication
# Issue #1554 | Tags: book, dark, luxury, gilded, opulent
# =============================================================================

title = "GILT-EDGE - A Study in Gold-Edged Binding"
description = "A survey of the gilt-edged book - gold leaf applied to page edges, gold tooling upon covers and spines, and the opulent binding traditions of the eighteenth and nineteenth centuries. High-contrast Didone type in gold on deep navy."
base_url = "http://localhost:3000"

sections = ["plates"]

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = false

[pagination]
enabled = false
per_page = 10

[series]
enabled = false

[related]
enabled = true
limit = 4
taxonomies = ["tags"]

[[taxonomies]]
name = "tags"
feed = true
sitemap = false

[[taxonomies]]
name = "binding"
paginate_by = 10

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "monthly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A study of gilt-edged binding traditions. Scholarly use; please cite if used."
full_enabled = false
full_filename = "llms-full.txt"

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = ["plates"]

[markdown]
safe = false
lazy_loading = false
emoji = false
