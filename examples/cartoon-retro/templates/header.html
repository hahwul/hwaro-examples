<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f1e9;
            --text: #333;
            --accent: #555;
            --retro: #fdfaf7;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #f4ece4;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #444;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .retro-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 0 #000;
            margin-bottom: 80px;
            border: 4px solid #000;
            position: relative;
        }
        h2 { font-family: 'Bangers', cursive; font-size: 2.5rem; color: #000; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; }
        article { margin-top: 40px; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cartoon.retro</div>
            <nav>
                <a href="/">Classic</a>
                <a href="/about">Origin</a>
            </nav>
        </div>
    </header>
