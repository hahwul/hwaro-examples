<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <g fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round">
            <path d="M16 4 L27 10.25 L27 22.75 L16 29 L5 22.75 L5 10.25 Z"/>
            <path d="M16 4 L16 16.5 M16 16.5 L27 10.25 M16 16.5 L5 10.25" stroke-opacity="0.5"/>
          </g>
        </svg>
        <span class="brand-name">Galena</span>
        <span class="brand-tag" aria-hidden="true">scheduler</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="{{ base_url }}/handbook/">Handbook</a>
        <a href="{{ base_url }}/quickstart/">Quickstart</a>
      </nav>
      <span class="topbar-status" aria-hidden="true">
        <span class="tick"></span>
        <code>tick 60s</code>
      </span>
    </div>
  </header>
