    <aside class="sidebar" aria-label="Handbook navigation">
      <nav class="sidebar-nav">
        <p class="sidebar-heading"><a href="{{ base_url }}/handbook/">Handbook</a></p>
        <ol class="tree">
          {% for p in get_section(path="handbook").pages | sort_by("weight") %}
          <li>
            <a class="tree-link{% if page.url == p.url %} is-current{% endif %}" href="{{ base_url }}{{ p.url }}"{% if page.url == p.url %} aria-current="page"{% endif %}>
              <span class="tree-num" aria-hidden="true">{% if loop.index < 10 %}0{% endif %}{{ loop.index }}</span>
              <span class="tree-name">{{ p.title }}</span>
            </a>
          </li>
          {% endfor %}
        </ol>
        <p class="sidebar-heading">Getting started</p>
        <ul class="tree tree-plain">
          <li>
            <a class="tree-link{% if page.url == "/quickstart/" %} is-current{% endif %}" href="{{ base_url }}/quickstart/"{% if page.url == "/quickstart/" %} aria-current="page"{% endif %}>
              <span class="tree-name">Quickstart</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>
