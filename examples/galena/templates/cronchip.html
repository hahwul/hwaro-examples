{% set cron_labels = ["minute", "hour", "day of month", "month", "day of week"] %}
<div class="cronchip" role="group" aria-label="Schedule expression: {{ cf | join(" ") }}">
  <span class="cronchip-tag" aria-hidden="true">cron</span>
  <span class="cronchip-expr">
    {% for f in cf %}
    <span class="cron-field" tabindex="0" title="{{ cron_labels[loop.index0] }}">
      <span class="cron-val">{{ f | e }}</span>
      <span class="cron-label" aria-hidden="true">{{ cron_labels[loop.index0] }}</span>
    </span>
    {% endfor %}
  </span>
  {% if cn %}<span class="cronchip-note">{{ cn | e }}</span>{% endif %}
</div>
