<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="band">
      <div class="band-top">
        <a class="brand" href="{{ base_url }}/">
          <svg class="brand-mark" viewBox="0 0 34 30" width="34" height="30" aria-hidden="true" focusable="false">
            <g fill="none" stroke="currentColor" stroke-linecap="round">
              <path d="M4 24 Q14 19 12 8" stroke-width="1.6" opacity="0.45"/>
              <path d="M9 26 Q22 21 18 6" stroke-width="1.6" opacity="0.7"/>
              <path d="M15 27 Q31 22 26 5" stroke-width="1.6"/>
            </g>
            <circle cx="17" cy="16" r="1.5" fill="currentColor"/>
          </svg>
          <span class="brand-word">Nimbus</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/briefings/">Briefings</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
      <p class="tagline">Plain-English weather briefings for private pilots, one METAR at a time.</p>
      <form class="find" role="search" action="{{ base_url }}/">
        <label class="find-label" for="find-brief">Search briefings</label>
        <span class="find-shell">
          <svg class="find-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input class="find-input" id="find-brief" name="q" type="search"
                 placeholder="ceiling, TAF, density altitude…" autocomplete="off" spellcheck="false">
        </span>
      </form>
    </div>
  </header>
