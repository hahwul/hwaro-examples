{% include "header.html" %}
<main id="main">
  <div class="band band--surface">
    <div class="scallop scallop--surface" aria-hidden="true"></div>
    <div class="wrap">
      <article class="page-card">
        <header class="page-card__head">
          {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
          {% if page.description is present %}<p class="page-card__lede">{{ page.description | e }}</p>{% endif %}
          {% if page.date %}<p class="page-card__meta"><time datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date('%B %-d, %Y') }}</time></p>{% endif %}
        </header>
        <div class="prose">
          {{ content | safe }}
        </div>
      </article>
    </div>
  </div>
</main>
{% include "footer.html" %}
