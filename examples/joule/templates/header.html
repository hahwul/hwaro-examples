<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header__inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Joule bakery, home">
        <svg class="wordmark__mark" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="13" fill="var(--accent)"/>
          <path d="M16 5.4c-3.9 3-5.9 6-5.9 9.5 0 3.5 2.6 6.3 5.9 6.3s5.9-2.8 5.9-6.3c0-3.5-2-6.5-5.9-9.5Z" fill="var(--accent-fg)" opacity="0.92"/>
          <path d="M16 9.6v10" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span class="wordmark__text">Joule</span>
      </a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/menu/">Menu</a>
        <a href="{{ base_url }}/subscriptions/">Subscriptions</a>
        <a href="{{ base_url }}/wholesale/">Wholesale</a>
        <a href="{{ base_url }}/our-story/">Our Story</a>
        <a href="{{ base_url }}/visit/" class="site-nav__cta">Visit</a>
      </nav>
    </div>
  </header>
