<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #ddd;
            --accent: #ff4500;
            --panel: #2a2a2a;
            --shadow: rgba(0,0,0,0.5);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .clock-surface {
            background: var(--panel);
            border-radius: 20px;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 80px;
            border: 1px solid #333;
            text-align: center;
        }
        .flip-unit {
            display: inline-block;
            background: #000;
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8rem;
            padding: 20px 40px;
            border-radius: 10px;
            margin: 0 10px 40px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .flip-unit::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left; }
        article { text-align: left; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">flip.clock</div>
            <nav>
                <a href="/">Time</a>
                <a href="/about">State</a>
            </nav>
        </div>
    </header>
