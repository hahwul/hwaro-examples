<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {{ site.title | e }}{% else %}{{ site.title | e }} — a history of letterpress{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Vollkorn:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {% raw %}<script>
    (function () {
      try {
        var t = localStorage.getItem("endleaf-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>{% endraw %}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <svg width="0" height="0" class="sprite" aria-hidden="true" focusable="false" style="position:absolute">
    <symbol id="fleuron" viewBox="0 0 24 26">
      <path d="M12 6.6C10.8 4.1 8.6 2.5 6.2 3 3.2 3.6 2 6.5 3.4 9.2c1.3 2.6 4.6 4.6 8.6 8.9 4-4.3 7.3-6.3 8.6-8.9C22 6.5 20.8 3.6 17.8 3c-2.4-.5-4.6 1.1-5.8 3.6z" fill="currentColor"/>
      <path d="M12 18.1c.5 3 2.5 4.6 5.2 4 1.4-.3 1.8-1.6 1-2.6" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
  </svg>
  <div class="book">
    <div class="spine" aria-hidden="true"></div>
    <header class="running-head">
      <p class="rh-verso"><a class="rh-mast" href="{{ base_url }}/">Endleaf</a><span class="rh-sub">A history of letterpress</span></p>
      <p class="rh-recto"><span class="rh-label">{{ rh_label | default("") }}</span>{% if rh_folio %}<span class="rh-folio">{{ rh_folio }}</span>{% endif %}</p>
    </header>
    <div class="masthead">
      <nav class="book-nav" aria-label="Primary">
        <a href="{{ base_url }}/chapters/">Contents</a>
        <a href="{{ base_url }}/colophon/">Colophon</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
      <button class="theme-toggle" id="theme-button" type="button" aria-pressed="false" aria-label="Switch to pressroom (dark) theme">
        <svg class="icon-day" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="10" cy="10" r="3.6"/><path d="M10 1.6v2.2M10 16.2v2.2M1.6 10h2.2M16.2 10h2.2M4 4l1.6 1.6M14.4 14.4L16 16M16 4l-1.6 1.6M5.6 14.4L4 16"/></svg>
        <svg class="icon-night" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M16.5 12.4A7 7 0 0 1 7.6 3.5a7 7 0 1 0 8.9 8.9Z"/></svg>
      </button>
    </div>
