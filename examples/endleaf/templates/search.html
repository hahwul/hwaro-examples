{% set rh_label = "Search" %}
{% set rh_folio = "ix" %}
{% include "header.html" %}
    <main id="main">
      <header class="section-open">
        <p class="chapter-numeral">The index</p>
        <h1 class="chapter-title">{{ page.title | e }}</h1>
        <div class="section-intro prose">{{ content | safe }}</div>
        <div class="fleuron-rule" aria-hidden="true">
          <svg class="fleuron"><use href="#fleuron"/></svg>
          <svg class="fleuron fleuron--lg"><use href="#fleuron"/></svg>
          <svg class="fleuron"><use href="#fleuron"/></svg>
        </div>
      </header>

      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search the whole history</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="matrix, quoin, photopolymer, kiss impression&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="contents contents--full" id="search-results"></ol>

      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
