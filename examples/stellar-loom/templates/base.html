<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0b0c10;
      --text: #c5c6c7;
      --accent: #66fcf1;
      --accent-dark: #45a29e;
      --border: #1f2833;
    }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
    }
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header a {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
    nav a {
      margin-left: 1rem;
      color: var(--text);
      font-size: 1rem;
      font-weight: normal;
      transition: color 0.3s;
    }
    nav a:hover {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent);
    }
    h1, h2, h3 { color: #ffffff; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--accent-dark); }
    footer {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 3rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--border);
    }
    .section-list { list-style: none; padding: 0; }
    .section-list li { margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    pre { background: #1a1a1d; padding: 1rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    code { background: #1a1a1d; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header>
      <a href="{{ base_url }}/">{{ site.title | e }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer>
      &copy; {{ site.title | e }} | Crafted with Hwaro
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
