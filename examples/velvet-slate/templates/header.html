<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #111216;
      --text: #c8c9ce;
      --heading: #e9ecef;
      --primary: #a8b2c1;
      --border: #2c2e33;
    }
    body {
      font-family: "Georgia", serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.8;
      margin: 0;
    }
    a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    a:hover {
      border-bottom-color: var(--primary);
      color: #fff;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 3rem;
      margin-bottom: 4rem;
      text-align: center;
    }
    .site-title {
      font-size: 2.2rem;
      color: var(--heading);
      margin: 0 0 1.5rem 0;
      font-weight: normal;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .nav {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
    }
    .nav a {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text);
    }
    .nav a:hover {
      color: #fff;
      border-bottom-color: transparent;
    }
    h1, h2, h3 {
      color: var(--heading);
      font-weight: normal;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.4rem; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin-bottom: 1.5rem; }
    .post-list {
      list-style: none;
      padding: 0;
    }
    .post-item {
      margin-bottom: 3rem;
    }
    .post-title {
      font-size: 1.6rem;
      margin: 0 0 0.5rem 0;
    }
    .post-title a {
      color: var(--heading);
      border-bottom: none;
    }
    .post-title a:hover {
      color: var(--primary);
    }
    .footer {
      border-top: 1px solid var(--border);
      padding-top: 3rem;
      margin-top: 5rem;
      text-align: center;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="site-title"><a href="{{ base_url }}/" style="border:none; color:inherit;">{{ site.title }}</a></div>
      <nav class="nav">
        <a href="{{ base_url }}/">Exhibition</a>
        <a href="{{ base_url }}/about/">Concept</a>
      </nav>
    </header>
