{% include "header.html" %}
  <main>
    <div class="content" style="margin-bottom: 4rem; text-align: center; font-style: italic; font-size: 1.2rem; color: #888;">
      {{ content | safe }}
    </div>
    <ul class="post-list">
      {% for post in section.pages %}
      <li class="post-item">
        <h2 class="post-title"><a href="{{ post.path }}">{{ post.title | e }}</a></h2>
      </li>
      {% endfor %}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
