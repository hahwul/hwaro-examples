{% include "header.html" %}

    <main>
      <article>
        <header>
          <h1>{{ page.title }}</h1>
          <div class="post-meta">
            {% if page.date %}
            <span>{{ page.date }}</span>
            {% endif %}
            {% if page.tags %}
            &middot;
            {% for tag in page.tags %}
            <span class="tag"><a href="{{ base_url }}/tags/{{ tag | slugify }}/">{{ tag }}</a></span>
            {% endfor %}
            {% endif %}
          </div>
        </header>

        <div class="content">
          {{ content }}
        </div>
      </article>
    </main>

{% include "footer.html" %}
