{% include "header.html" %}

    <main>
      <h1>{{ page.title }}</h1>

      {{ content }}

      <ul class="post-list">
        {% for item in section.pages %}
        <li>
          <a href="{{ base_url }}{{ item.url }}">{{ item.title }}</a>
          {% if item.date %}
          <span class="post-date">{{ item.date }}</span>
          {% endif %}
        </li>
        {% endfor %}
      </ul>

      {{ pagination }}
    </main>

{% include "footer.html" %}
