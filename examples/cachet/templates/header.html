<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-base-url="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-label="Search this CV" hidden>
    <div class="search-modal-backdrop" data-search-close></div>
    <div class="search-modal-panel">
      <div class="search-modal-field">
        <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true"><circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="13.2" y1="13.2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search engagements, CV&hellip;" autocomplete="off" spellcheck="false" aria-label="Search this CV" aria-controls="search-results" aria-expanded="false" role="combobox" aria-autocomplete="list">
        <kbd class="search-esc">Esc</kbd>
      </div>
      <ul id="search-results" class="search-results" role="listbox"></ul>
      <p class="search-empty" id="search-empty" hidden>No matches.</p>
    </div>
  </div>

  <div class="shell">
    <header class="site-header">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32"><rect x="4" y="17" width="4" height="9" rx="1" fill="var(--accent)"/><rect x="14" y="10" width="4" height="16" rx="1" fill="var(--accent)"/><rect x="24" y="4" width="4" height="22" rx="1" fill="var(--accent)"/></svg>
        </span>
        <span class="brand-name">cachet<span class="brand-dot">.</span></span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/engagements/"{% if page.section == "engagements" %} aria-current="page"{% endif %}>Engagements</a>
        <a href="{{ base_url }}/cv/"{% if page.url == "/cv/" %} aria-current="page"{% endif %}>CV</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
      <button type="button" id="search-trigger" class="search-trigger" aria-haspopup="dialog" aria-controls="search-modal">
        <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="8.5" cy="8.5" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="13.2" y1="13.2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span class="sr-only">Search</span>
        <span class="search-trigger-hint" aria-hidden="true"><kbd>Ctrl</kbd><kbd>K</kbd></span>
      </button>
    </header>
