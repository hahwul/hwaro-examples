<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <meta name="color-scheme" content="light">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="prong-mark" viewBox="0 0 24 24">
        <path d="M2 2 L2 11 M2 2 L11 2" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M2 2 L7.5 7.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="2" cy="2" r="1.8" fill="currentColor"/>
      </symbol>
      <symbol id="gem-mark" viewBox="0 0 16 16">
        <path d="M6 2h4l3 3.5L8 14 2 5.5z" fill="none" stroke="currentColor" stroke-width="1"/>
        <path d="M2 5.5h12M6 2l2 3.5 2-3.5M8 5.5L5 14M8 5.5l3 8.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.8"/>
      </symbol>
    </defs>
  </svg>

  <div class="frame" aria-hidden="true">
    <svg class="frame__corner frame__corner--tl" viewBox="0 0 24 24"><use href="#prong-mark"></use></svg>
    <svg class="frame__corner frame__corner--tr" viewBox="0 0 24 24"><use href="#prong-mark"></use></svg>
    <svg class="frame__corner frame__corner--bl" viewBox="0 0 24 24"><use href="#prong-mark"></use></svg>
    <svg class="frame__corner frame__corner--br" viewBox="0 0 24 24"><use href="#prong-mark"></use></svg>
  </div>

  <div class="shell">
    <header class="site-header">
      <a class="wordmark" href="{{ base_url }}/">{{ site.title | e }}</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/collections/">Collections</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
