<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,500;0,600;0,700;1,500&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Sirocco &mdash; home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 20 32" focusable="false">
            <path class="brand-bean-body" d="M10 1C15 1 18 8 18 16C18 24 15 31 10 31C5 31 2 24 2 16C2 8 5 1 10 1Z"/>
            <path class="brand-bean-crease" d="M10 4C8 10 12 14 10 16C8 18 12 22 10 28"/>
          </svg>
        </span>
        <span class="brand-word">Sirocco</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/roasts/">Roast Log</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
          <kbd>/</kbd>
        </button>
      </nav>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-labelledby="search-heading" hidden>
    <div class="search-panel" role="document">
      <h2 class="search-heading" id="search-heading">Search the roast log</h2>
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search origins, process, tasting notes" autocomplete="off" aria-label="Search Sirocco" aria-describedby="search-hint">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <p class="search-hint" id="search-hint">Arrow keys to move, Enter to open an entry, Esc to close.</p>
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>No batches match that.</p>
    </div>
  </div>
