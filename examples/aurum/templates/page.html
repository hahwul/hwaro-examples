{% include "header.html" %}

<article class="content">
  <header style="margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <div class="post-meta">{{ page.date | date("%B %d, %Y") }}</div>
    {% endif %}
  </header>

  {{ content | safe }}

  {% if page.tags and page.tags | length > 0 %}
    <div style="margin-top: 3rem;">
      <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem; font-family: 'Inter', sans-serif; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">Tagged under</h3>
      <div class="tag-list">
        {% for tag in page.tags %}
          <a href="{{ base_url }}/tags/{{ tag | slugify }}/">{{ tag }}</a>
        {% endfor %}
      </div>
    </div>
  {% endif %}
</article>

{% include "footer.html" %}
