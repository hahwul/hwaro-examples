<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --primary: #D4AF37; /* Gold */
      --primary-hover: #F3E5AB;
      --bg: #121212;
      --bg-subtle: #1e1e1e;
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: #333333;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      color: var(--primary);
      font-weight: 600;
      line-height: 1.3;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    a:hover {
      color: var(--primary-hover);
    }

    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .site-header nav a:hover {
      color: var(--primary);
    }

    .site-main {
      flex: 1;
    }

    /* Content Styling */
    .content p { margin-bottom: 1.5rem; }
    .content img { max-width: 100%; border-radius: 4px; border: 1px solid var(--border); }
    .content code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, monospace;
      color: #F3E5AB;
    }
    .content pre {
      background: var(--bg-subtle);
      padding: 1.2rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      margin: 2rem 0;
    }
    .content pre code { background: none; padding: 0; color: inherit; }
    .content blockquote {
      border-left: 3px solid var(--primary);
      margin: 1.5rem 0;
      padding-left: 1.5rem;
      color: var(--text-muted);
      font-style: italic;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
    }
    .content hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* Lists */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    ul.section-list li {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    ul.section-list li:last-child {
      border-bottom: none;
    }
    ul.section-list li a {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.5rem;
    }
    .post-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Taxonomies */
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }
    .tag-list a {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .tag-list a:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    nav.pagination a { color: var(--text); }
    nav.pagination a:hover { border-color: var(--primary); color: var(--primary); }
    .pagination-current span { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.1); }
    .pagination-disabled span { opacity: 0.5; }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
      .site-wrapper { padding: 0 1.5rem; }
      ul.section-list li a { font-size: 1.3rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Journal</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
