{% include "header.html" %}
<article>
  <section class="panel">
    <span class="panel-rivets" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
    <div class="hero-grid">
      <div>
        <div class="panel-tag">Unit 01 — {{ site.title }}</div>
        <h1>{{ page.title | default(site.title) | e }}</h1>
        <p>{{ page.description | default(site.description) | e }}</p>
      </div>
      <svg class="hero-svg" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="6" y="6" width="308" height="208" fill="none" stroke="#2a2f3a" stroke-width="2"/>
        <rect x="20" y="20" width="280" height="180" fill="#14161b" stroke="#3a4150" stroke-width="1"/>
        <g stroke="#3a4150" stroke-width="1">
          <line x1="20" y1="60" x2="300" y2="60"/>
          <line x1="20" y1="120" x2="300" y2="120"/>
          <line x1="20" y1="160" x2="300" y2="160"/>
        </g>
        <g>
          <rect x="40" y="30" width="50" height="20" fill="#1a1d24" stroke="#ffb020" stroke-width="1.5"/>
          <rect x="100" y="30" width="50" height="20" fill="#1a1d24" stroke="#3a4150" stroke-width="1.5"/>
          <rect x="160" y="30" width="50" height="20" fill="#1a1d24" stroke="#3a4150" stroke-width="1.5"/>
          <rect x="220" y="30" width="50" height="20" fill="#ffb020" stroke="#ffb020" stroke-width="1.5"/>
        </g>
        <g fill="#ffb020">
          <circle cx="50" cy="80" r="3"/>
          <circle cx="50" cy="100" r="3"/>
        </g>
        <g fill="#5d6577">
          <circle cx="80" cy="80" r="3"/>
          <circle cx="80" cy="100" r="3"/>
          <circle cx="110" cy="80" r="3"/>
          <circle cx="110" cy="100" r="3"/>
          <circle cx="140" cy="80" r="3"/>
          <circle cx="140" cy="100" r="3"/>
        </g>
        <g fill="#38d39f">
          <circle cx="170" cy="80" r="3"/>
          <circle cx="170" cy="100" r="3"/>
        </g>
        <g stroke="#ffb020" stroke-width="1.5" fill="none">
          <path d="M 40 140 L 60 140 L 60 150 L 80 150 L 80 140 L 100 140"/>
          <path d="M 100 140 L 120 140 L 130 130 L 140 150 L 150 130 L 160 150 L 170 140 L 200 140"/>
          <path d="M 200 140 L 220 140 L 220 150 L 240 150 L 240 140 L 280 140"/>
        </g>
        <g font-family="JetBrains Mono, monospace" font-size="7" fill="#5d6577">
          <text x="40" y="180">CH-01</text>
          <text x="100" y="180">CH-02</text>
          <text x="160" y="180">CH-03</text>
          <text x="220" y="180">CH-04</text>
        </g>
        <g font-family="JetBrains Mono, monospace" font-size="6" fill="#ffb020">
          <text x="265" y="14">FB-X</text>
        </g>
      </svg>
    </div>
    <div class="meter-row">
      <div class="meter">
        <span class="meter-label">Voltage</span>
        <span class="meter-value">240<span class="unit">V</span></span>
      </div>
      <div class="meter">
        <span class="meter-label">Load</span>
        <span class="meter-value">82<span class="unit">%</span></span>
      </div>
      <div class="meter">
        <span class="meter-label">Channels</span>
        <span class="meter-value">12<span class="unit">/16</span></span>
      </div>
      <div class="meter">
        <span class="meter-label">Status</span>
        <span class="meter-value" style="color: var(--ok)">NOMINAL</span>
      </div>
    </div>
  </section>

  <section style="padding: 0 4px 40px; max-width: 800px;">
    {{ content }}
  </section>
</article>
{% include "footer.html" %}
