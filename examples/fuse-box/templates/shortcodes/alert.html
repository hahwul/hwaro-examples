<div class="alert" style="font-family: 'Space Grotesk', sans-serif; padding: 16px 20px; border: 1px solid var(--line-strong); border-left: 4px solid var(--hi); background: var(--panel-2); color: var(--ink); margin: 20px 0; display: flex; gap: 14px; align-items: flex-start;">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffb020" stroke-width="2" stroke-linecap="square" aria-hidden="true" style="flex-shrink:0; margin-top:2px;">
    <path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>
  </svg>
  <div>
    <strong style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--hi); display: block; margin-bottom: 4px;">{{ type }}</strong>
    <span>{{ body }}</span>
  </div>
</div>
