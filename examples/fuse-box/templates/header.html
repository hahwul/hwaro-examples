<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #fff; --accent: #ffcc00; --box: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 40px; margin-bottom: 60px; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; color: var(--accent); }
        .fuse-surface { background: var(--box); padding: 60px; border: 4px solid #333; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">fuse.box</div></header>
