<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page and page.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
  <style>
    :root {
      --bg: #0c0d10;
      --panel: #14161b;
      --panel-2: #1a1d24;
      --line: #2a2f3a;
      --line-strong: #3a4150;
      --ink: #e8eaed;
      --ink-dim: #8a93a6;
      --ink-mute: #5d6577;
      --hi: #ffb020;
      --hi-deep: #cc7a00;
      --warn: #ff4d3d;
      --ok: #38d39f;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px);
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    a { color: var(--hi); text-decoration: none; }
    a:hover { text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* HEADER */
    .site-header {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(6px);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 14px; letter-spacing: 0.18em;
      color: var(--ink); text-transform: uppercase;
    }
    .brand-mark {
      width: 34px; height: 34px;
      border: 2px solid var(--hi);
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--panel);
    }
    .site-nav { display: flex; gap: 6px; align-items: center; }
    .site-nav a {
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 10px 14px;
      border: 1px solid transparent;
    }
    .site-nav a:hover { color: var(--hi); border-color: var(--line-strong); text-decoration: none; background: var(--panel); }
    .status-led {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--ink-mute); letter-spacing: 0.16em; text-transform: uppercase;
      border: 1px solid var(--line); padding: 8px 12px;
    }
    .led { width: 8px; height: 8px; background: var(--ok); display: inline-block; box-shadow: 0 0 6px var(--ok); }

    /* HERO / PANEL */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      position: relative;
      padding: 56px 56px 64px;
      margin: 48px 0;
    }
    .panel::before, .panel::after {
      content: ""; position: absolute; width: 14px; height: 14px;
      border: 2px solid var(--line-strong); background: var(--bg);
    }
    .panel::before { top: -8px; left: -8px; }
    .panel::after { bottom: -8px; right: -8px; }
    .panel-rivets { position: absolute; inset: 0; pointer-events: none; }
    .panel-rivets span {
      position: absolute; width: 8px; height: 8px; background: var(--line-strong);
      border-radius: 50%;
    }
    .panel-rivets span:nth-child(1) { top: 14px; left: 14px; }
    .panel-rivets span:nth-child(2) { top: 14px; right: 14px; }
    .panel-rivets span:nth-child(3) { bottom: 14px; left: 14px; }
    .panel-rivets span:nth-child(4) { bottom: 14px; right: 14px; }

    .panel-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.24em; color: var(--hi);
      text-transform: uppercase; margin-bottom: 22px;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .panel-tag::before {
      content: ""; width: 24px; height: 2px; background: var(--hi);
    }

    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; }
    h1 { font-size: clamp(2.4rem, 6vw, 4.4rem); margin: 0 0 24px; color: var(--ink); }
    h2 { font-size: 1.8rem; margin: 48px 0 16px; }
    h3 { font-size: 1.3rem; margin: 32px 0 12px; }
    p { color: var(--ink-dim); max-width: 64ch; }
    code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--panel-2); border: 1px solid var(--line);
      padding: 2px 6px; font-size: 0.88em; color: var(--hi);
    }
    pre { background: var(--panel-2); border: 1px solid var(--line); padding: 18px; overflow-x: auto; }
    pre code { background: none; border: none; padding: 0; color: var(--ink); }
    blockquote { border-left: 3px solid var(--hi); padding: 4px 0 4px 18px; margin: 24px 0; color: var(--ink); font-style: italic; }
    hr { border: none; border-top: 1px solid var(--line); margin: 40px 0; }
    ul, ol { color: var(--ink-dim); }
    img { max-width: 100%; border: 1px solid var(--line); }

    table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); }
    th { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }

    /* hero meta strip */
    .meter-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0; border-top: 1px solid var(--line); margin-top: 56px;
    }
    .meter {
      padding: 18px 22px; border-right: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 6px;
    }
    .meter:last-child { border-right: none; }
    .meter-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; color: var(--ink-mute); text-transform: uppercase;
    }
    .meter-value {
      font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px;
      color: var(--ink);
    }
    .meter-value .unit { color: var(--hi); font-weight: 400; font-size: 14px; margin-left: 4px; }

    /* hero svg */
    .hero-grid {
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 56px; align-items: center;
    }
    .hero-svg { width: 100%; height: auto; display: block; }

    .section-list { list-style: none; padding: 0; }
    .section-list li {
      border: 1px solid var(--line); padding: 22px 24px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
    }
    .section-list li:hover { border-color: var(--hi); }
    .section-list a { color: var(--ink); font-weight: 500; font-size: 1.1rem; }
    .section-list a:hover { color: var(--hi); text-decoration: none; }

    .breadcrumb {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--ink-mute); letter-spacing: 0.16em; text-transform: uppercase;
      margin-bottom: 18px;
    }

    @media (max-width: 820px) {
      .panel { padding: 36px 24px 40px; }
      .hero-grid { grid-template-columns: 1fr; gap: 32px; }
      .meter-row { grid-template-columns: repeat(2, 1fr); }
      .meter:nth-child(2) { border-right: none; }
      .site-nav a { padding: 8px 10px; font-size: 11px; }
      .status-led { display: none; }
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="shell header-inner">
    <a class="brand" href="{{ base_url }}/">
      <span class="brand-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffb020" stroke-width="2.5" stroke-linecap="square">
          <path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>
        </svg>
      </span>
      {{ site.title }}
    </a>
    <nav class="site-nav">
      <a href="{{ base_url }}/">Index</a>
      <a href="{{ base_url }}/about/">Spec</a>
      <a href="{{ base_url }}/posts/">Log</a>
    </nav>
    <span class="status-led"><span class="led"></span> Online</span>
  </div>
</header>
<main class="shell">
