{% include "header.html" %}
<article>
  <section class="panel">
    <span class="panel-rivets" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
    <div class="panel-tag">Index — Section</div>
    <h1>{{ page.title | e }}</h1>
    {% if page.description %}<p>{{ page.description | e }}</p>{% endif %}
  </section>

  <section style="margin-bottom: 60px;">
    {{ content }}
    <ul class="section-list">
      {{ section.list }}
    </ul>
    {{ pagination }}
  </section>
</article>
