<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@200&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 600px; padding: 0 40px; }
        header { margin-bottom: 60px; }
        .logo { font-size: 1rem; letter-spacing: 10px; text-transform: uppercase; }
        nav { margin-top: 20px; }
        nav a { color: var(--text); text-decoration: none; margin: 0 15px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.3; }
        .laconic-hero h1 { font-size: 4rem; font-weight: 200; margin: 0; font-style: italic; }
        article { margin-top: 60px; font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <div class="logo">LACONIC</div>
        <nav>
            <a href="/">Short</a>
            <a href="/about">Clear</a>
        </nav>
    </header>
