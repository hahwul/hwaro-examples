<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-url" content="{{ base_url }}">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap');

    :root {
      --bg-gradient-1: #0f0c29;
      --bg-gradient-2: #302b63;
      --bg-gradient-3: #24243e;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      --text-main: #f0f0f5;
      --text-muted: #aeb1cf;
      --accent-1: #00f2fe;
      --accent-2: #4facfe;
      --accent-glow: rgba(0, 242, 254, 0.6);
      --font-body: 'Outfit', -apple-system, sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.7;
      margin: 0;
      color: var(--text-main);
      background: var(--bg-gradient-1);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Quartz Cascade Background Effect */
    .bg-cascade {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 50%, var(--bg-gradient-3) 100%);
      z-index: -2;
    }

    .bg-cascade::before, .bg-cascade::after {
      content: '';
      position: absolute;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite ease-in-out alternate;
    }

    .bg-cascade::before {
      top: -10%; left: -10%;
      background: rgba(79, 172, 254, 0.2);
    }

    .bg-cascade::after {
      bottom: -10%; right: -10%;
      background: rgba(0, 242, 254, 0.15);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 10%) scale(1.1); }
    }

    /* Glass Container Wrapper */
    .glass-container {
      max-width: 800px;
      margin: 2rem auto;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      padding: 2.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle inner highlight */
    .glass-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    /* Layout */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 2.5rem;
    }

    .site-logo {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0,242,254,0.3);
    }

    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: color 0.3s ease;
      position: relative;
    }
    .site-header nav a:hover { color: var(--accent-1); }
    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; width: 0; height: 2px;
      background: var(--accent-1);
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { min-height: calc(100vh - 350px); }

    .site-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--glass-border);
      text-align: center;
    }

    .glass-footer-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: var(--font-heading);
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.8em;
      font-weight: 700;
      color: #fff;
    }
    h1 { font-size: 2.5rem; margin-top: 0; letter-spacing: -1px; }
    h2 { font-size: 1.8rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.3em; }
    h3 { font-size: 1.3rem; color: var(--accent-1); }
    p { margin: 1.2em 0; font-weight: 300; }

    a {
      color: var(--accent-1);
      text-decoration: none;
      border-bottom: 1px dashed rgba(0,242,254,0.4);
      transition: all 0.2s;
    }
    a:hover {
      color: var(--text-main);
      border-bottom-style: solid;
      text-shadow: 0 0 8px var(--accent-glow);
    }

    /* Blocks & Elements */
    .glass-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.2);
    }

    code {
      background: rgba(0,0,0,0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--accent-1);
      border: 1px solid rgba(255,255,255,0.05);
    }

    pre {
      background: rgba(0,0,0,0.4) !important;
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 3rem 0;
    }

    /* Components */
    ul { padding-left: 1.2rem; }
    li { margin-bottom: 0.5rem; }

    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.2rem 1.5rem;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent-1);
      box-shadow: 0 0 15px rgba(0,242,254,0.1);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; border: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .glass-container { margin: 1rem; padding: 1.5rem; border-radius: 16px; }
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-header nav { gap: 1.5rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <div class="bg-cascade"></div>
  <div class="glass-container site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>
