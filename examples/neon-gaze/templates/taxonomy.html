{% include "header.html" %}
  <main class="site-main">
    <h1>{% if page is defined and page.title is defined %}{{ page.title | e }}{% endif %}</h1>
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
    <ul class="section-list">
      {% if terms is defined %}
        {% for term in terms %}
        <li><a href="{{ term.url }}">{{ term.name | e }}</a></li>
        {% endfor %}
      {% endif %}
    </ul>
  </main>
{% include "footer.html" %}
