<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
    <style>
    :root {
      --primary: #ff00ff;
      --secondary: #00ffff;
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: #333333;
      --bg: #0a0a0c;
      --bg-subtle: #141416;
      --glow: 0 0 10px var(--primary), 0 0 20px var(--primary);
      --glow-alt: 0 0 10px var(--secondary), 0 0 20px var(--secondary);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Courier New', Courier, monospace; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; position: relative; }
    .site-header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; text-shadow: var(--glow); transition: all 0.3s ease; }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--secondary); text-decoration: none; font-size: 1rem; text-transform: uppercase; transition: all 0.3s ease; }
    .site-header nav a:hover { color: #fff; text-shadow: var(--glow-alt); }
    .site-main { min-height: calc(100vh - 200px); }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: var(--primary); text-shadow: 0 0 5px rgba(255, 0, 255, 0.5); }
    h1 { font-size: 2rem; margin-top: 0; text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; color: var(--secondary); }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }
    a { color: var(--secondary); text-decoration: none; }
    a:hover { color: var(--primary); text-shadow: var(--glow); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 2px; font-size: 0.9em; border: 1px solid var(--border); color: var(--secondary); }
    pre { background: var(--bg-subtle); padding: 1rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); border-left: 3px solid var(--primary); }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 4px; border: 1px solid var(--border); transition: border-color 0.3s ease; }
    ul.section-list li:hover { border-color: var(--secondary); box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
