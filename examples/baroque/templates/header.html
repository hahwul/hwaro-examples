<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% include "auto_og_tags.html" ignore missing %}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% include "auto_head.html" ignore missing %}
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-ornament top-ornament">
      <svg viewBox="0 0 400 30" xmlns="http://www.w3.org/2000/svg" class="ornament-svg">
        <path d="M0,15 Q50,0 100,15 Q150,30 200,15 Q250,0 300,15 Q350,30 400,15" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="200" cy="15" r="4" fill="currentColor"/>
        <circle cx="100" cy="15" r="2.5" fill="currentColor"/>
        <circle cx="300" cy="15" r="2.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="wrapper">
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <span class="nav-ornament">✦</span>
        <a href="{{ base_url }}/posts/">Archive</a>
        <span class="nav-ornament">✦</span>
        <a href="{{ base_url }}/tags/">Tags</a>
        <span class="nav-ornament">✦</span>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
    <div class="header-ornament bottom-ornament">
      <svg viewBox="0 0 400 30" xmlns="http://www.w3.org/2000/svg" class="ornament-svg">
        <path d="M0,15 Q50,30 100,15 Q150,0 200,15 Q250,30 300,15 Q350,0 400,15" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="200" cy="15" r="4" fill="currentColor"/>
        <circle cx="100" cy="15" r="2.5" fill="currentColor"/>
        <circle cx="300" cy="15" r="2.5" fill="currentColor"/>
      </svg>
    </div>
  </header>
