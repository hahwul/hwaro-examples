<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wheat: { DEFAULT: '#c8a951', light: '#e8d9a0', dark: '#a08530' },
            sky: { DEFAULT: '#6aafe6', light: '#a0d0f0', dark: '#4a8fc6' },
            sage: { DEFAULT: '#87a878', light: '#b0c8a0', dark: '#607850' },
            prairie: { bg: '#faf8f2', card: '#ffffff', muted: '#f0ece0' },
            earth: { DEFAULT: '#5c4a32', light: '#8a7a60', muted: '#a09080' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply bg-prairie-bg text-earth font-sans; }
    .prose { @apply max-w-none text-earth; }
    .prose h1 { @apply text-3xl font-semibold mb-6 text-earth border-b-2 border-wheat pb-4; }
    .prose h2 { @apply text-2xl font-semibold mt-10 mb-4 text-earth; }
    .prose h3 { @apply text-xl font-medium mt-8 mb-3 text-earth; }
    .prose p { @apply my-4 leading-relaxed text-lg text-earth/80; }
    .prose a { @apply text-sky-dark hover:text-sky underline underline-offset-4 decoration-sky/30; }
    .prose strong { @apply font-semibold text-earth; }
    .prose code { @apply bg-prairie-muted px-1.5 py-0.5 rounded text-sm; }
    .prose pre { @apply bg-earth text-prairie-bg p-5 rounded my-6 overflow-x-auto; }
    .prose pre code { @apply bg-transparent p-0; }
    .prose blockquote { @apply my-6 py-3 px-6 border-l-4 border-wheat bg-prairie-muted/50 italic text-earth/70; }
    .prose ul, .prose ol { @apply my-4 ml-6; }
    .prose li { @apply my-2 text-lg; }
    .prose ul li { @apply list-disc marker:text-wheat; }
    .prose ol li { @apply list-decimal marker:text-wheat; }
    .prose img { @apply max-w-full rounded; }
    .prose table { @apply w-full border-collapse my-8; }
    .prose thead { @apply bg-prairie-muted; }
    .prose th { @apply px-4 py-3 text-left text-sm font-semibold text-earth uppercase tracking-wide; }
    .prose td { @apply px-4 py-3 border-b border-prairie-muted; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <nav class="border-b border-wheat/20 bg-prairie-bg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ base_url }}/" class="text-xl font-semibold text-earth hover:text-wheat transition-colors tracking-tight">{{ site.title }}</a>
      <div class="flex items-center gap-6 text-sm font-medium">
        <a href="{{ base_url }}/posts/" class="text-earth/60 hover:text-earth transition-colors">Posts</a>
        <a href="{{ base_url }}/about/" class="text-earth/60 hover:text-earth transition-colors">About</a>
      </div>
    </div>
  </nav>
  <div class="max-w-5xl mx-auto px-6 py-12">
