{% include "header.html" %}
  <h1 class="text-3xl font-semibold text-earth mb-8">{{ taxonomy_term }}</h1>
  <div class="space-y-6">
    {% for post in taxonomy_pages %}
    <a href="{{ base_url }}{{ post.url }}" class="block p-5 bg-prairie-card border border-wheat/10 rounded hover:border-wheat/30 transition-all">
      <h2 class="text-lg font-medium text-earth mb-1">{{ post.title }}</h2>
      <time class="text-sm text-earth/40">{{ post.date }}</time>
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
