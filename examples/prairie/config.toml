base_url = "http://localhost:3000"
title = "Prairie"
description = "A wide-open Midwest life blog with warm, earthy tones and panoramic layouts."

[plugins]
processors = ["markdown"]

[markdown]
safe = false

[highlight]
enabled = true
theme = "github"
use_cdn = true

[search]
type = "fuse_json"
enabled = true

[taxonomies]
tags = true
categories = true
authors = true

[sitemap]
enabled = true

[robots]
enabled = true

[[feeds]]
section = "posts"
type = "rss"
