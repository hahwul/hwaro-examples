{% extends "base.html" %}

{% block content %}
<article class="glass-panel">
  <h1>{{ page.title | e }}</h1>
  {% if page.date %}
    <div class="post-meta">
      <span>{{ page.date | date("%B %d, %Y") }}</span>
      {% if page.reading_time %}
        <span>· {{ page.reading_time }} min read</span>
      {% endif %}
    </div>
  {% endif %}
  <div class="content">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
