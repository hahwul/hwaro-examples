title = "House Lights"
description = "A concert venue illumination site with an SVG lighting rig truss header, PAR can fixture icons, bold display typography for the venue name, and a technical reading face for section details."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
