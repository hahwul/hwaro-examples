<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  
  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Bespoke Riso Studio duotone stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">RISO<span>STUDIO</span><span class="dot" aria-hidden="true"></span></a>
      <nav>
        <a href="{{ base_url }}/">Press</a>
        <a href="{{ base_url }}/posts/">Editions</a>
        <a href="{{ base_url }}/about/">Colophon</a>
      </nav>
    </header>
