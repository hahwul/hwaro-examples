<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{{ page.title | e }} - {{ site.title | e }}</title>
  <style>
    /* Reset and Base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body, h1, h2, h3, p, ul, li {
      margin: 0;
      padding: 0;
    }
    html {
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      background-color: #050505;
      color: #fafafa;
      font-family: "Space Mono", monospace, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    ul {
      list-style: none;
    }

    /* Typography */
    h1, h2, h3 {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: #ffffff;
    }

    /* Layout Components */
    .eclipse-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      border-left: 1px solid #333;
      border-right: 1px solid #333;
    }

    .eclipse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem;
      border-bottom: 2px solid #fafafa;
      background-color: #0f0f0f;
    }

    .eclipse-title {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .eclipse-title a {
      color: #fafafa;
    }

    .eclipse-title a:hover {
      color: #f43f5e;
    }

    .eclipse-nav {
      display: flex;
      gap: 2rem;
    }

    .eclipse-nav a {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: bold;
      border: 1px solid transparent;
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
    }

    .eclipse-nav a:hover {
      border-color: #fafafa;
      color: #050505;
      background-color: #fafafa;
    }

    .eclipse-main {
      flex: 1;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3rem;
    }

    /* Specific elements inside main */
    .content-block {
      background-color: #0f0f0f;
      padding: 3rem;
      border: 1px solid #333;
    }

    .content-block h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
    }

    .content-block p {
      margin-bottom: 1.5rem;
      color: #cccccc;
    }

    .content-block p:last-child {
      margin-bottom: 0;
    }

    .content-block a {
      color: #f43f5e;
      border-bottom: 1px solid #f43f5e;
    }

    /* Eclipse graphic motif */
    .motif-container {
      width: 100%;
      height: 10px;
      background-color: #f43f5e;
      margin-top: 2rem;
    }

  </style>
</head>
<body>
  <div class="eclipse-wrapper">
    <header class="eclipse-header">
      <div class="eclipse-title">
        <a href="{{ base_url }}/">{{ site.title }}</a>
      </div>
      <nav class="eclipse-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
