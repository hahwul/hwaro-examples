<div class="table-scroll" tabindex="0" role="region" aria-label="Contact logbook table">
  <table class="logtable">
    <thead>
      <tr>
        <th scope="col" class="c-idx">#</th>
        <th scope="col" class="c-utc">UTC</th>
        <th scope="col" class="c-freq">MHz</th>
        <th scope="col" class="c-mode">mode</th>
        <th scope="col" class="c-entry">entry</th>
        <th scope="col" class="c-call">call</th>
      </tr>
    </thead>
    <tbody>
      {% for p in rows %}
      <tr class="log-row">
        <td class="c-idx">{{ p.extra.serial | default("&mdash;") }}</td>
        <td class="c-utc"><time datetime="{{ p.date | date('%Y-%m-%d') }}">{{ p.date | date('%Y-%m-%d') }}<span class="utc-t"> {{ p.extra.utc | default('') }}</span></time></td>
        <td class="c-freq">{{ p.extra.freq | default("&mdash;") }}</td>
        <td class="c-mode"><span class="mode-tag">{{ p.extra.mode | default("&mdash;") }}</span></td>
        <td class="c-entry"><a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a></td>
        <td class="c-call">{{ p.extra.call | default("&mdash;") }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
