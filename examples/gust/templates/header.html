<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0c120d">
  <title>{% if page.title is present %}{{ page.title | e }} // {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="crt" aria-hidden="true"></div>

  <div class="term">
    <header class="term-bar">
      <span class="term-dots" aria-hidden="true"><i></i><i></i><i></i></span>
      <a class="term-title" href="{{ base_url }}/">GUST <span class="term-slash">//</span> QRV</a>
      <button type="button" class="kbd-hint" id="search-open" aria-label="Open search palette">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="kbd-label">search</span>
        <kbd>Ctrl</kbd><kbd>K</kbd>
      </button>
    </header>

    <nav class="term-nav" aria-label="Primary">
      <a href="{{ base_url }}/logbook/">logbook</a>
      <a href="{{ base_url }}/tags/">tags</a>
      <a href="{{ base_url }}/about/">about</a>
      <a href="{{ base_url }}/rss.xml">rss</a>
    </nav>
