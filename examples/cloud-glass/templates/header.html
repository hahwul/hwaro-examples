<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #4a5568;
            --accent: #a0aec0;
            --glass: rgba(255, 255, 255, 0.3);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(160, 174, 192, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(160, 174, 192, 0.05) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.8;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 15px;
            color: var(--accent);
            opacity: 0.6;
        }
        nav { margin-top: 30px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.5;
        }
        .cloud-hero {
            padding: 100px 0;
            text-align: center;
        }
        .cloud-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.4;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 80px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.01);
            margin-bottom: 100px;
        }
        h2 { font-weight: 600; font-size: 2rem; color: var(--accent); margin-top: 0; text-transform: uppercase; letter-spacing: 5px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cloud.glass</div>
            <nav>
                <a href="/">Atmosphere</a>
                <a href="/about">Ether</a>
            </nav>
        </div>
    </header>
