<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap');

        :root {
            --bg-color: #0d0d0d;
            --text-color: #e0e0e0;
            --accent-color: #f2f2f2;
            --border-color: #333333;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
        }

        header h1 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
        }

        header h1 a {
            color: inherit;
            text-decoration: none;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            margin-left: 2rem;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        nav a:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        main {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        footer {
            border-top: 2px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #888;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-mono);
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            max-width: 800px;
        }

        a {
            color: var(--accent-color);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        a:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            text-decoration: none;
        }

        /* Brutalist Grid for Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2px;
            background-color: var(--border-color); /* Lines between grid items */
            border: 2px solid var(--border-color);
        }

        .gallery-item {
            background-color: var(--bg-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 250px;
            transition: background-color 0.2s;
        }

        .gallery-item:hover {
            background-color: #1a1a1a;
        }

        .gallery-item h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .gallery-item h2 a {
            text-decoration: none;
        }

        .gallery-item p {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 0;
        }

        .meta {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 2rem;
            text-transform: uppercase;
            display: block;
        }

        /* Content styling */
        .content {
            border-left: 2px solid var(--border-color);
            padding-left: 2rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">{{ site.title }}</a></h1>
        <nav>
            <a href="/about/">About</a>
            <a href="/gallery/">Gallery</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 {{ site.title }}. All rights reserved.</p>
    </footer>

</body>
</html>
