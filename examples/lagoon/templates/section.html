{% include "header.html" %}

<div class="section-page">
  <div class="section-header">
    <h1 class="section-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="section-desc">{{ page.description }}</p>
    {% endif %}
  </div>

  <div class="section-content">
    {{ content | safe }}
  </div>

  <ul class="section-list">
    {{ section.list }}
  </ul>

  {{ pagination }}
</div>

{% include "footer.html" %}
