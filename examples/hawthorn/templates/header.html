<!DOCTYPE html>
<html lang="{{ page_language | default('en', true) }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner wrap">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Hawthorn — home">
        <svg class="mark" width="28" height="28" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M6 15.5C6 10.5 10.5 7 16 7s10 3.5 10 8.5c0 .9-1 1.5-2.2 1.5H8.2C7 17 6 16.4 6 15.5z" fill="currentColor"/>
          <rect x="13.4" y="17" width="5.2" height="9.5" rx="2.2" fill="currentColor"/>
          <circle cx="12.3" cy="12.6" r="1" fill="var(--bg)"/>
          <circle cx="19.4" cy="13.4" r="1" fill="var(--bg)"/>
          <circle cx="16" cy="10.6" r="1" fill="var(--bg)"/>
        </svg>
        <span class="wordmark-text">Hawthorn</span>
      </a>
      <p class="header-kicker">A woodland field guide</p>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/species/">Field Guide</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
