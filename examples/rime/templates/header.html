<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/" aria-label="Rime — home">
      <svg class="brand-mark" viewBox="0 0 28 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M2 22 L11 6 L15.5 13.5 L19 8 L26 22 Z"/>
        <path d="M9.4 8.8 L11 6 L12.6 8.8 L11 10.2 Z" fill="currentColor" stroke="none"/>
      </svg>
      <span class="brand-name">Rime</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ base_url }}/ascents/">Ascents</a>
      <a href="{{ base_url }}/tags/">Tags</a>
      <a href="{{ base_url }}/about/">About</a>
      <button class="search-open" id="search-open" type="button" aria-haspopup="dialog" aria-controls="search-overlay">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3 L17 17"/></svg>
        <span>Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </nav>
  </header>
