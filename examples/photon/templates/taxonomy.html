{% include "header.html" %}
  <main class="site-main">
    <div class="card">
      <h1 class="card-title">{{ page.title | e }}</h1>
      <p class="taxonomy-desc" style="color: var(--text-muted);">Browse all terms in this taxonomy:</p>
      {{ content | safe }}
      <div class="tags">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/" class="tag">{{ term }}</a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
