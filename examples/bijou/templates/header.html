<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #d4af37; /* Gold */
      --text: #f8f8f8;
      --text-muted: #a0a0a0;
      --border: #333333;
      --bg: #0a0a0a; /* Dark background */
      --bg-subtle: #1a1a1a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Playfair Display", Georgia, serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 2rem; color: var(--primary); text-decoration: none; letter-spacing: 2px; text-transform: uppercase; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); border-radius: 4px; padding: 5px 10px; }
    .site-logo:hover { color: #fff; box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); transition: all 0.3s ease; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; color: var(--primary); }
    h1 { font-size: 2.5rem; margin-top: 0; text-align: center; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 300; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
    a:hover { border-color: var(--primary); }
    .jewelry-item { padding: 2rem; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 2rem; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Collections</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
