{% extends "base.html" %}

{% block content %}
  <article class="page-content">
    {% if page.title is defined and page.title %}
      <h1 style="border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 2rem;">{{ page.title | e }}</h1>
    {% endif %}
    {{ content | safe }}
  </article>
{% endblock %}
