<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Porcelain background -->
  <circle cx="16" cy="16" r="14" fill="#f8f4ed" stroke="#d98a8f" stroke-width="1.5"/>
  <!-- Inner porcelain highlight -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#f1e9dc" stroke-width="2.5" opacity="0.6"/>
  <!-- The eye shape (slightly asymmetrical for unease) -->
  <ellipse cx="16" cy="16.5" rx="5.2" ry="6.8" fill="#463a52"/>
  <!-- Pupil, slightly off-center (watching) -->
  <ellipse cx="16.8" cy="16.2" rx="2.1" ry="2.8" fill="#f8f4ed"/>
  <!-- Subtle crack across the eye -->
  <path d="M9 12 Q14 15.5 17 11.5" fill="none" stroke="#d98a8f" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <path d="M18 20.5 Q21.5 18 24 22" fill="none" stroke="#d98a8f" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <!-- Tiny gold-wrong repair fleck -->
  <circle cx="13.5" cy="19" r="0.7" fill="#d4af77" opacity="0.55"/>
  <!-- Outer delicate ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#5c4a6b" stroke-width="0.6" opacity="0.4"/>
</svg>