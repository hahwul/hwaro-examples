{# 
  Shortcode: doll_eye
  Usage example (outside comments): doll_eye(state="watching")
  A single unsettling porcelain eye. state can be "watching" | "closed" | "larger"
  The pupil subtly follows the mouse thanks to porcelain.js
#}
<span class="doll-eye {{ state | default('watching') }}" style="display:inline-block; vertical-align:middle; margin:0 0.2rem; width:26px; height:32px;">
  <span class="pupil" style="width:8px; height:11px; top:48%; left:48%;"></span>
  <span class="lid"></span>
</span>
