{# 
  Shortcode: kintsugi
  Usage example (outside comments): kintsugi(repair="failed")
  "Beautiful" gold repair lines that sometimes look wrong (fleshy red)
  repair="failed" | "gold" | "wrong"
#}
{% if repair == "failed" or repair == "wrong" %}
  <span class="kintsugi failed" title="The glue was not gold">KINTSUGI GONE WRONG</span>
{% else %}
  <span class="kintsugi" title="Faint gold that never should have been">KINTSUGI</span>
{% endif %}
