{# 
  Shortcode: crack
  Usage example (outside comments): crack(width=300)
  A thin, elegant crack line that spreads on hover. 
  Use inside post content for visual breathing room between diary entries.
#}
<div class="shortcode-crack" style="width: {{ width | default(280) }}px; max-width: 92%; margin-left: auto; margin-right: auto; {% if color %}background: linear-gradient(117deg, transparent, {{ color }}, transparent);{% endif %}"></div>
