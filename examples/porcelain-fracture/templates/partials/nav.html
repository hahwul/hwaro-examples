<header class="blog-header">
  <div class="blog-header-inner">
    <!-- The shattered porcelain shelf logo -->
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo-fracture" aria-label="Porcelain Fracture home">
      <span class="porcelain-word">PORCELAIN</span>
      <span class="fracture-word">FRACTURE</span>
    </a>

    <!-- The prescribed delicate navigation -->
    <nav aria-label="Main navigation">
      <a href="{{ base_url }}{{ lang_prefix }}/posts/" class="nav-label">fragments</a>
      <a href="{{ base_url }}{{ lang_prefix }}/" class="nav-label">the cabinet</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/" class="nav-label">her eyes</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/" class="nav-label">the end</a>
    </nav>

    <div class="header-eye" aria-hidden="true">
      <!-- The single staring porcelain eye that watches -->
      <div class="doll-eye" id="headerEye">
        <div class="pupil" id="headerPupil"></div>
        <div class="lid"></div>
      </div>
    </div>

    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}
      <button class="search-trigger" onclick="openSearch()" title="Search the fragments">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="small-caps">Search</span>
      </button>
    </div>
  </div>
</header>
