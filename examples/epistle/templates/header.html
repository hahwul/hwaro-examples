<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site-shell">
    <header class="site-header">
      <a class="site-logo" href="{{ base_url }}/">
        <span class="site-logo-mark" aria-hidden="true">&#10022;</span>
        <span class="site-logo-text">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/issues/">Letters</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button type="button" class="search-trigger" id="search-trigger" aria-haspopup="dialog" aria-controls="search-overlay">
        <svg aria-hidden="true" viewBox="0 0 20 20" width="15" height="15"><path d="M13.2 13.2 17 17M15 8.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Search</span>
        <kbd>/</kbd>
      </button>
    </header>

    <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search Epistle" hidden>
      <div class="search-overlay-backdrop" data-search-close></div>
      <div class="search-overlay-panel">
        <div class="search-overlay-field">
          <svg aria-hidden="true" viewBox="0 0 20 20" width="17" height="17"><path d="M13.2 13.2 17 17M15 8.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="search-input" placeholder="Search the letters&hellip;" autocomplete="off" aria-label="Search the letters">
          <button type="button" class="search-overlay-close" data-search-close>Esc</button>
        </div>
        <ul id="search-results" class="search-results"></ul>
        <p id="search-empty" class="search-empty" hidden>No letters match that search.</p>
      </div>
    </div>
