<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title | e }} | {{ site.title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');
        body { background-color: #050510; color: #d0d0f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(20, 20, 40, 0.8) 0%, #050510 100%); z-index: -1; }
        header { padding: 2rem; border-bottom: 1px solid rgba(100, 150, 255, 0.2); background: rgba(5, 5, 16, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; }
        h1, h2 { color: #88ccff; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        h1 a { color: #88ccff; text-decoration: none; text-shadow: 0 0 10px rgba(136, 204, 255, 0.5); }
        nav a { color: #bb88ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s, text-shadow 0.3s; }
        nav a:hover { color: #ffffff; text-shadow: 0 0 8px rgba(187, 136, 255, 0.8); }
        main { max-width: 800px; margin: 3rem auto; padding: 2rem; background: rgba(20, 20, 35, 0.4); border: 1px solid rgba(100, 150, 255, 0.1); border-radius: 8px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); }
        a { color: #aaffaa; text-decoration: none; }
        a:hover { text-decoration: underline; color: #ffffff; }
        footer { padding: 2rem; border-top: 1px solid rgba(100, 150, 255, 0.2); text-align: center; font-size: 0.9em; color: #666699; margin-top: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ base_url }}">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ base_url }}">Home</a>
            <a href="{{ base_url }}about/">About</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; 2024 {{ site.title }}. All systems nominal.
    </footer>
</body>
</html>
