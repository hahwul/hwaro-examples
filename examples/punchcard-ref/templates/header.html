<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f5; --text: #333; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 60px 40px; background: #fff; border: 1px solid #ddd; box-shadow: 5px 5px 0 rgba(0,0,0,0.05); }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px; text-align: right; }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .punch-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-bottom: 40px; opacity: 0.2; }
        .hole { height: 20px; background: #000; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">punchcard.ref</div></header>
