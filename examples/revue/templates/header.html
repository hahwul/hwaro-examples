<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#171420">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="masthead">
    <div class="masthead-bar wrap">
      <p class="masthead-kicker">Restoration notes &amp; repertory programming</p>
      <nav class="masthead-nav" aria-label="Primary">
        <a href="{{ base_url }}/essays/"{% if page.section == "essays" %} aria-current="page"{% endif %}>Essays</a>
        <a href="{{ base_url }}/categories/">Programme</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <button type="button" class="search-open" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
          <svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3 17 17"/></svg>
          <span>Search</span>
          <kbd aria-hidden="true">/</kbd>
        </button>
      </nav>
    </div>
    <div class="nameplate-block wrap">
      <a class="nameplate" href="{{ base_url }}/" aria-label="Revue — home">
        <span class="nameplate-text">Revue</span>
      </a>
      <p class="nameplate-sub">A cinema periodical for restored classics and the houses that still screen them</p>
    </div>
  </header>
