{% extends "base.html" %}

{% block content %}
<article class="glass-panel content-area">
    <h1>{{ page.title }}</h1>
    <div class="page-meta" style="color: #666; font-size: 0.9rem; margin-bottom: 2rem;">
        {% if page.date %}
            <span>{{ page.date | date(format="%B %d, %Y") }}</span>
        {% endif %}
    </div>

    {{ content | safe }}
</article>
{% endblock %}
