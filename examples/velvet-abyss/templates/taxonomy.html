{% extends "base.html" %}

{% block content %}
<div class="glass-panel content-area">
    <h1>Taxonomies</h1>

    <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem;">
        {% if terms is defined %}
            {% for term in terms %}
                <a href="{{ term.url }}" class="cta-button" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                    {{ term.name }} <span style="opacity: 0.5; margin-left: 0.5rem;">{{ term.pages | length }}</span>
                </a>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
