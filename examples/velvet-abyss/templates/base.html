<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="orb orb-velvet"></div>
    <div class="orb orb-crimson"></div>

    <div class="container">
        <header class="header">
            <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
            <nav class="nav-links">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <p>&copy; {{ now() | date(format="%Y") }} {{ site.title }}. Velvet Abyss Glassmorphism.</p>
        </footer>
    </div>
</body>
</html>
