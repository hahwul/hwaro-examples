{% include "header.html" %}
<div class="notebook-wrapper">
  <header class="notebook-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/journal/">Entries</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <button class="search-btn" onclick="openSearch()" title="Search (Cmd+K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search entries..." autocomplete="off">
        <kbd onclick="closeSearch()">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div class="notebook-body">
    <main class="notebook-main">
      <h1 class="page-title">{{ page.title }}</h1>
      <div class="content-body">
        {{ content | safe }}
      </div>
{% include "footer.html" %}
