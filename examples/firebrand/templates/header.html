<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,900;1,900&family=Work+Sans:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a0a;
            --text: #d4d4d4;
            --accent: #ff4d00;
            --char: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 2px solid var(--char);
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 900;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -1px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .fire-hero {
            padding: 120px 0;
            text-align: center;
        }
        .fire-hero h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(255, 77, 0, 0.4);
        }
        .ember-mark {
            width: 100px;
            height: 2px;
            background: var(--accent);
            margin: 40px auto;
            box-shadow: 0 0 10px var(--accent);
        }
        article { padding: 60px 0; }
        h2 { font-family: 'Crimson Pro', serif; font-size: 3rem; color: #fff; font-style: italic; border-bottom: 1px solid var(--char); padding-bottom: 10px; }
        blockquote {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            font-style: italic;
            text-align: center;
            margin: 80px 0;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">FIREBRAND.</div>
            <nav>
                <a href="/">Kindle</a>
                <a href="/about">Endure</a>
            </nav>
        </div>
    </header>
