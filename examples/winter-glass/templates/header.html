<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;600&family=Playfair+Display:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f9fc;
            --text: #334e68;
            --accent: #9fb3c8;
            --glass: rgba(255, 255, 255, 0.4);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(159, 179, 200, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(159, 179, 200, 0.1) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 30px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .winter-hero {
            padding: 100px 0;
            text-align: center;
        }
        .winter-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            font-style: italic;
            color: var(--text);
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 80px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.02);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 300; font-style: italic; color: var(--text); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">winter.glass</div>
        <nav>
            <a href="/">Frost</a>
            <a href="/about">Thaw</a>
        </nav>
    </header>
