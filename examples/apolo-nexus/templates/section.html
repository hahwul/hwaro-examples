{% include "header.html" %}
<section>
  {% if section is defined and section.title is defined %}<h1>{{ section.title }}</h1>{% endif %}
  <div class="content">
    {{ content | safe }}
  </div>
  <ul>
  {% if section.pages is defined %}
    {% for p in section.pages %}
      <li><a href="{{ p.url }}">{{ p.title }}</a></li>
    {% endfor %}
  {% endif %}
  </ul>
</section>
{% include "footer.html" %}
