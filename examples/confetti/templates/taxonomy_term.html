{% extends "base.html" %}

{% block content %}
<div class="taxonomy-term">
    <h1>{{ taxonomy_name | title }}: {{ taxonomy_term }}</h1>

    <ul class="page-list">
        {% for page in taxonomy_pages %}
        <li>
            <a href="{{ page.url }}">{{ page.title }}</a>
            {% if page.date %}
            <span class="date">{{ page.date | date("%Y-%m-%d") }}</span>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
