{% extends "base.html" %}

{% block content %}
<div class="taxonomy">
    <h1>{{ taxonomy_name | title }}</h1>

    <ul class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <li>
            <a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/">{{ term }}</a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
