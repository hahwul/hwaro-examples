{% extends "base.html" %}

{% block main %}
<div class="glass-panel">
    <h1>{{ taxonomy.name | capitalize }}</h1>

    <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
        {% for term, pages in terms %}
        <a href="{{ taxonomy.name }}/{{ term }}" style="padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.9em;">
            #{{ term }} <span style="color: var(--accent-magenta); font-weight: bold; margin-left: 0.5rem;">{{ pages | length }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
