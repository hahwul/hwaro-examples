<header style="padding: 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; z-index: 10; position: relative;">
    <div class="site-branding" style="display: flex; align-items: center; gap: 1rem;">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-magenta), var(--accent-blue)); box-shadow: 0 0 20px rgba(0, 224, 255, 0.5); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-family: 'Playfair Display', serif;">V</div>
        <a href="/" style="font-size: 1.5rem; font-weight: 800; font-family: 'Playfair Display', serif; color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 2px;">{{ site.title }}</a>
    </div>
    <nav style="background: rgba(255,255,255,0.05); padding: 0.5rem 1.5rem; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);">
        <a href="/" style="margin: 0 1rem; color: var(--text-primary); font-weight: 600; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Home</a>
        <a href="/about/" style="margin: 0 1rem; color: var(--text-primary); font-weight: 600; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">About</a>
    </nav>
</header>
