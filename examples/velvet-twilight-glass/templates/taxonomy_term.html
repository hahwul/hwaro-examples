{% extends "base.html" %}

{% block main %}
<div class="glass-panel">
    <h1>{{ taxonomy.name | capitalize }}: <span style="color: var(--accent-blue);">{{ term.name }}</span></h1>

    <div class="pages-list" style="margin-top: 2rem;">
        {% for p in paginator.pages | default(term.pages) %}
        <article style="padding-bottom: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border);">
            <h2><a href="{{ p.permalink }}">{{ p.title }}</a></h2>
            {% if p.description %}
            <p>{{ p.description }}</p>
            {% endif %}
            <a href="{{ p.permalink }}" style="font-size: 0.9em; font-weight: bold; text-transform: uppercase;">Read More &rarr;</a>
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
