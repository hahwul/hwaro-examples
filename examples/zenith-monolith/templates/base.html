<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% elif section.title %}{{ section.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% elif section.description %}{{ section.description }}{% else %}{{ site.description }}{% endif %}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f1014; /* Deep charcoal */
            --text-color: #f0f0f0; /* Stark white */
            --accent-color: #e04a3f; /* Solid burnt accent */
            --border-color: #333333;
            --muted-color: #888888;
        }

        /* Strict reset and defaults */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            width: 100%;
            max-width: 1400px;
            border-left: 2px solid var(--border-color);
            border-right: 2px solid var(--border-color);
            min-height: 100vh;
        }

        header {
            border-right: 2px solid var(--border-color);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            background-color: var(--bg-color); /* solid color, no gradients */
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .site-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-color);
            text-decoration: none;
            display: inline-block;
            border-bottom: 4px solid var(--accent-color);
            padding-bottom: 0.5rem;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        nav a {
            color: var(--muted-color);
            text-decoration: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        nav a:hover, nav a:focus {
            color: var(--text-color);
            outline: none;
        }

        main {
            padding: 4rem;
            background-color: var(--bg-color);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            margin-top: 2rem;
        }

        h1 {
            font-size: 3rem;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            margin-top: 0;
        }

        h2 {
            font-size: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            max-width: 70ch;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-color);
            transition: color 0.2s, border-color 0.2s;
        }

        a:hover {
            color: var(--text-color);
            border-color: var(--text-color);
        }

        ul, ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        code {
            font-family: 'IBM Plex Mono', monospace;
            background-color: #1a1c23;
            padding: 0.2rem 0.4rem;
            font-size: 0.9em;
            border: 1px solid var(--border-color);
        }

        pre {
            background-color: #1a1c23;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border: none;
        }

        blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            color: var(--muted-color);
            font-style: italic;
        }

        hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 3rem 0;
        }

        /* Post lists */
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            margin-bottom: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            border-bottom: none;
            padding-bottom: 0;
        }

        .post-title a {
            color: var(--text-color);
            text-decoration: none;
            border: none;
        }

        .post-title a:hover {
            color: var(--accent-color);
        }

        .post-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted-color);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .layout-grid {
                grid-template-columns: 1fr;
                border: none;
            }

            header {
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 2px solid var(--border-color);
                padding: 1.5rem;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            nav {
                flex-direction: row;
                gap: 1.5rem;
            }

            main {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="layout-grid">
        <header>
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about/">About</a>
                <a href="{{ base_url }}/projects/">Projects</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
