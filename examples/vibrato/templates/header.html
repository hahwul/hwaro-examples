<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#151009">
  <title>{% if page.title is present %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Vibrato home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="16" cy="16" r="6.5" fill="currentColor"/>
          <circle cx="16" cy="16" r="1.6" fill="var(--bg)"/>
        </svg>
        <span class="wordmark-text">Vibrato</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/episodes/"{% if page.section == "episodes" %} aria-current="page"{% endif %}>Sessions</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-label="Search episode sessions">
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
