<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('starship-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  
  <div class="console-container">
    <header class="diagnostic-bar">
      <div class="vessel-info">
        <span class="label">SYS_REF:</span> <span class="val font-display">STARSHIP CLASS-IV</span>
        <span class="separator">//</span>
        <span class="label">REG:</span> <span class="val font-mono">SSC-2026-A</span>
      </div>
      <div class="telemetry-info">
        <span class="label">COORD:</span> <span class="val font-mono">47.2 / -12.8 / 194.5</span>
      </div>
      <div class="header-actions">
        <nav class="header-nav" aria-label="Console Navigation">
          <a href="{{ base_url }}/" class="nav-item">SYS_HOME</a>
          <a href="{{ base_url }}/telemetry/" class="nav-item">TELEMETRY</a>
          <a href="{{ base_url }}/about/" class="nav-item">ABOUT</a>
          <a href="{{ base_url }}/search/" class="nav-item">SEARCH</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle Console Theme">THEME_ALT</button>
      </div>
    </header>
