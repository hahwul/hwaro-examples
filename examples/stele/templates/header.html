<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --text: #999;
            --accent: #fff;
            --monolith: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        .monolith-wrapper {
            max-width: 500px;
            width: 100%;
            background: var(--monolith);
            padding: 80px 40px;
            min-height: 100vh;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }
        header {
            text-align: center;
            padding-bottom: 60px;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stele-hero {
            padding: 80px 0;
            text-align: center;
        }
        .stele-hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            margin: 0;
            color: var(--accent);
            line-height: 1;
        }
        article { padding: 40px 0; }
        h2 { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 60px; text-align: center; }
    </style>
</head>
<body>
    <div class="monolith-wrapper">
    <header>
        <div class="logo">STELE</div>
        <nav>
            <a href="/">Erect</a>
            <a href="/about">Mark</a>
        </nav>
    </header>
