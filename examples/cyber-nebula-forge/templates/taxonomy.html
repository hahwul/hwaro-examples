{% extends "base.html" %}

{% block title %}Taxonomies | {{ site.title }}{% endblock %}

{% block content %}
<div class="taxonomy-list">
    <h1>Taxonomies</h1>
    <ul>
        {% for taxonomy_name, terms in taxonomies %}
        <li>
            <h2>{{ taxonomy_name | capitalize }}</h2>
            <div class="terms">
                {% for term in terms %}
                <a href="/{{ taxonomy_name }}/{{ term | urlencode }}/" class="tag">{{ term }}</a>
                {% endfor %}
            </div>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
