{% extends "base.html" %}

{% block title %}{{ term }} - {{ taxonomy | capitalize }} | {{ site.title }}{% endblock %}

{% block content %}
<div class="taxonomy-term">
    <header class="section-header">
        <h1>{{ taxonomy | capitalize }}: {{ term }}</h1>
    </header>

    <div class="page-list">
        {% for page in pages %}
        <article class="list-item">
            <h2><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.date %}
            <div class="meta">
                <time datetime="{{ page.date }}">{{ page.date }}</time>
            </div>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
