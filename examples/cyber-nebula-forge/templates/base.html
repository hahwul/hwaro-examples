<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nebula-bg"></div>
    <div class="stars"></div>

    <header class="glass-header">
        <div class="logo">
            <a href="/">{{ site.title }}</a>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/about/">About</a>
        </nav>
    </header>

    <main class="glass-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="glass-footer">
        <p>&copy; 2024 {{ site.title }}. Forged in the Nebula.</p>
    </footer>
</body>
</html>
