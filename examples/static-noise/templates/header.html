<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #888; --accent: #fff; --noise: rgba(255,255,255,0.05); }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { padding: 40px 0; border-bottom: 1px solid #222; text-align: center; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 10px; color: var(--accent); }
        .noise-surface { background: #050505; padding: 60px; border: 1px solid #111; position: relative; overflow: hidden; }
        .noise-surface::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(var(--noise) 1px, transparent 1px); background-size: 4px 4px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">static.noise</div></header>
