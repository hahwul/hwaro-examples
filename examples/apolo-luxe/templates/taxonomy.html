{% include "header.html" %}
<main class="luxe-main">
  {% if page is defined %}
  <h1 class="section-title">{{ page.title | e }}</h1>
  <div class="content-body">
    {{ content | safe }}
  </div>
  {% endif %}
  <ul class="taxonomy-list">
    {% if terms is defined %}
      {% for term in terms %}
      <li>
        <a href="{{ base_url }}/{{ taxonomy }}/{{ term }}" class="term-link">{{ term }}</a>
      </li>
      {% endfor %}
    {% endif %}
  </ul>
</main>
{% include "footer.html" %}
