{% include "header.html" %}
<main class="luxe-main">
  {% if page is defined %}
  <h1 class="section-title">{{ page.title | e }}</h1>
  <div class="content-body">
    {{ content | safe }}
  </div>
  {% endif %}
  <ul class="post-list">
    {% if pages is defined %}
      {% for p in pages %}
      <li class="post-item">
        <time class="post-item-date">{{ p.date }}</time>
        <div class="post-item-content">
          <h2 class="post-item-title"><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        </div>
      </li>
      {% endfor %}
    {% endif %}
  </ul>
</main>
{% include "footer.html" %}
