<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% else %}{{ site.title | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined %}{{ page.section }}{% endif %}">
<header class="luxe-header">
  <div class="luxe-header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Journal</a>
      <a href="{{ base_url }}/archives/">Archive</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
    <div class="header-right">
      {% if site.search is defined and site.search.enabled %}
      <button class="search-trigger" onclick="openSearch()" title="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      {% endif %}
    </div>
  </div>
</header>
<div class="luxe-container">
