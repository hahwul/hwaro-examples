<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --contrast-bg: #000;
            --contrast-text: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .schism-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 60vh;
        }
        .schism-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }
        .side-light { background: var(--bg); color: var(--text); }
        .side-dark { background: var(--contrast-bg); color: var(--contrast-text); }
        .schism-hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
        }
        article { padding: 80px 0; max-width: 800px; margin: 0 auto; }
        h2 { font-family: 'Syne', sans-serif; font-size: 3rem; text-transform: uppercase; }
        .split-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 60px;
        }
        .split-item { border-top: 5px solid var(--text); padding-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">SCHISM//STUDIO</div>
            <nav>
                <a href="/">Left</a>
                <a href="/about">Right</a>
            </nav>
        </div>
    </header>
