{% include "header.html" %}
<div class="taxonomy-content">
  <h1>{{ taxonomy | capitalize }}</h1>
  <ul style="display: flex; gap: 1rem; flex-wrap: wrap; list-style: none; padding: 0;">
    {% for term in terms %}
    <li><a href="{{ term.url }}" style="padding: 0.5rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;">{{ term.name | e }}</a></li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
