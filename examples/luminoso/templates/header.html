<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root { --primary: #e0aa3e; --text: #333333; --text-muted: #777777; --bg: #fdfdfd; --surface: #ffffff; --border: #eeeeee; --shadow: rgba(0,0,0,0.05); }
    * { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 3rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 300; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); text-decoration: none; text-transform: uppercase; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: 60vh; background: var(--surface); padding: 3rem; border-radius: 8px; box-shadow: 0 10px 30px var(--shadow); }
    h1, h2, h3 { font-weight: 400; color: #111; }
    a { color: var(--primary); text-decoration: none; transition: opacity 0.3s ease; }
    a:hover { opacity: 0.8; }
    .site-footer { margin-top: 4rem; padding: 2rem 0; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border); }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
