<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --text: #ffffff;
            --accent: #ff5500;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .over-hero {
            padding: 120px 0;
            text-align: center;
        }
        .over-hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 10vw;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
            font-weight: 700;
            font-style: italic;
            text-shadow: 10px 10px 0 rgba(255, 85, 0, 0.2);
        }
        .over-label {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 5px 20px;
            font-weight: 700;
            margin-top: 40px;
            text-transform: uppercase;
            font-size: 1rem;
        }
        article { padding: 80px 0; max-width: 800px; }
        h2 { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: var(--accent); border-left: 5px solid var(--accent); padding-left: 20px; }
        .spec-list {
            margin-top: 60px;
            border-top: 1px solid var(--muted);
            padding-top: 40px;
        }
        .spec-item { margin-bottom: 20px; }
        .spec-item b { color: var(--accent); text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">OVER//DRIVE</div>
            <nav>
                <a href="/">Boost</a>
                <a href="/about">Thrust</a>
            </nav>
        </div>
    </header>
