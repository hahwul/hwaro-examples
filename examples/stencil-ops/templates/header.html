<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #333; --accent: #000; --stencil: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px dashed #ccc; padding-bottom: 20px; margin-bottom: 60px; text-align: left; }
        .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; background: #000; color: #fff; padding: 5px 15px; display: inline-block; }
        .stencil-surface { padding: 40px; background: var(--stencil); border-radius: 4px; position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">stencil.ops</div></header>
