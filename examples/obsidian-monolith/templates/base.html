<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="utf-8">
    <title>{{ site_title }} - {% if page.title is present %}{{ page.title }}{% else %}{{ site_description }}{% endif %}</title>
    <style>
        body { background-color: #0d0d0d; color: #f0f0f0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header, footer { padding: 2rem; border-bottom: 1px solid #333; }
        footer { border-bottom: none; border-top: 1px solid #333; margin-top: auto; text-align: center; font-size: 0.8rem; color: #777; }
        nav a { color: #f0f0f0; text-decoration: none; margin-right: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        main { padding: 4rem 2rem; flex: 1; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        h1, h2, h3 { font-weight: 300; letter-spacing: 0.02em; }
        a { color: #ccc; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; Obsidian Monolith
        {{ highlight_js }}
        {{ auto_includes_js }}
    </footer>
</body>
</html>
