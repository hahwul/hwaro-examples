{% include "header.html" %}
<div class="index-content">
  {{ content | safe }}
</div>
{% if section.pages is present %}
  <div class="post-list">
  {% for post in section.pages %}
    <div class="card">
      <h2><a href="{{ base_url }}{{ post.path }}">{{ post.title | e }}</a></h2>
      <p class="date">{{ post.date }}</p>
      <p>{{ post.description | e }}</p>
      <a href="{{ base_url }}{{ post.path }}" class="btn">Read More</a>
    </div>
  {% endfor %}
  </div>
{% endif %}
{% include "footer.html" %}
