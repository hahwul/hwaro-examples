{% include "header.html" %}
<article>
  <h1>{{ page.title | e }}</h1>
  {% if page.date is present %}
  <p class="date" style="color: var(--text-muted); margin-bottom: 2rem;">{{ page.date }}</p>
  {% endif %}
  <div class="content">
    {{ content | safe }}
  </div>
</article>
