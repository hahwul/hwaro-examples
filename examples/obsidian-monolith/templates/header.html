<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is present %}{{ page.description | e }}{% else %}{{ site_description | e }}{% endif %}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site_title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #d4af37;
      --text: #e0e0e0;
      --text-muted: #888888;
      --bg: #121212;
      --bg-subtle: #1e1e1e;
      --border: #333333;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); }
    a { color: var(--primary); text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: #fff; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { padding: 4rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; text-align: center; }
    h1, h2, h3 { font-weight: 300; letter-spacing: 2px; }
    .site-title { font-size: 2.5rem; margin: 0; color: #fff; text-transform: uppercase; }
    nav { margin-top: 1rem; }
    nav a { margin: 0 1rem; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; color: var(--text-muted); }
    nav a:hover { color: var(--primary); }
    footer { margin-top: 5rem; padding: 2rem 0; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border); }
    .card { background: var(--bg-subtle); padding: 2rem; border-radius: 4px; margin-bottom: 2rem; border: 1px solid var(--border); }
    .card h2 { margin-top: 0; }
    .btn { display: inline-block; border: 1px solid var(--primary); color: var(--primary); padding: 0.5rem 1.5rem; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin-top: 1rem; }
    .btn:hover { background: var(--primary); color: var(--bg); }
    </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="site-title"><a href="{{ base_url }}/">{{ site_title | e }}</a></h1>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/works/">Works</a>
      </nav>
    </header>
