<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/ashen.css">
</head>
<body>
  <!-- BUNKER FRAME -->
  <div class="bunker-frame">
    <div class="bottom-rivets">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- CRT BEZEL -->
    <div class="crt crt-flicker">
      <!-- Top military command header -->
      <div class="console-header">
        <div class="site-brand">
          <!-- Radiation trefoil -->
          <div class="trefoil" aria-hidden="true">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="32" r="7" fill="#c8a25a"/>
              <path d="M32 14 Q19 10 20 27 Q32 20 32 14" fill="#c8a25a"/>
              <path d="M32 14 Q45 10 44 27 Q32 20 32 14" fill="#c8a25a"/>
              <path d="M32 50 Q19 54 20 37 Q32 44 32 50" fill="#c8a25a"/>
              <path d="M32 50 Q45 54 44 37 Q32 44 32 50" fill="#c8a25a"/>
              <circle cx="32" cy="32" r="3.5" fill="#16120f"/>
            </svg>
          </div>
          <div>
            <div class="brand-text stencil">BUNKER 07</div>
            <div class="brand-sub">ASHEN PROTOCOL • 1986</div>
          </div>
        </div>

        <div class="status-bar">
          <div>
            <span class="label">CLOCK</span><br>
            <span id="bunker-time" class="time">04:26:11</span>
          </div>
          <div class="alarm-hint" title="Press R key">PRESS R FOR RADIATION ALARM</div>
        </div>
      </div>
