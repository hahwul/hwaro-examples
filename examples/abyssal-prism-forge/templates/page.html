{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.title }}{% endblock title %}

{% block content %}
<article class="page-content">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <div class="post-meta">{{ page.date | date(format="%B %d, %Y") }}</div>
    {% endif %}

    {{ content | safe }}
</article>
{% endblock content %}
