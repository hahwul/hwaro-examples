title = "Aurora Nexus"
description = "A sophisticated dark-themed Hwaro example featuring an elegant glassmorphism and aurora gradient aesthetic."
base_url = "https://aurora-nexus.hwaro.example.com"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content", "description"]
filename = "search.json"
exclude = []

[pagination]
enabled = false
per_page = 10

[taxonomies]
name = "tags"
feed = true
sitemap = false

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "A sample site for Hwaro demonstrating the aurora glassmorphism design."

[feeds]
enabled = true
filename = "rss.xml"
type = "rss"
truncate = 0
full_content = true
limit = 10
sections = []

[markdown]
safe = false
lazy_loading = true
emoji = true
