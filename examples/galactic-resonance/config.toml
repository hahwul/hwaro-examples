# Hwaro Configuration File
#
# This file is the main configuration for your Hwaro site.
# For full documentation on all available settings, visit:
# https://hwaro.hahwul.com/start/config/

title = "Galactic Resonance"
base_url = "https://examples.hwaro.hahwul.com/galactic-resonance"
description = "A deep space glassmorphism theme for Hwaro"
author = "Hwaro Theme Explorer"

# Site Language and Default Timezone
language = "en"
timezone = "UTC"

[build]
# Generate an index.json file for search
search_index = true
# Extract inline styles to a separate CSS file
extract_styles = true
# Enable CSS minification
minify_css = true
# Enable JS minification
minify_js = true
# Enable HTML minification
minify_html = true
# Automatically add cache-busting hashes to asset URLs
fingerprint_assets = false
# Pre-compress static assets (gzip/brotli)
compress_assets = false

[feeds]
# Enable RSS feed generation
enabled = true
filename = "rss.xml"
# Number of items to include in feeds
limit = 20
# Optional hub URL for WebSub
hub = ""

[taxonomies]
# Define your taxonomies here.
# Map the taxonomy name (e.g., "tags") to the URL path (e.g., "tag").
tags = "tag"
categories = "category"

[markdown]
# Enable GitHub Flavored Markdown (GFM)
gfm = true
# Automatically generate header anchor links
header_anchors = true
# Enable syntax highlighting in code blocks
highlight = true

[extra]
# Add any custom variables here. They will be available in your templates under `site.extra`.
# Example:
# github_url = "https://github.com/yourusername"
# theme_color = "#ffffff"
theme_color = "#030508"
