<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #333;
            --accent: #d32f2f;
            --report: #fff;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: #f0f2f5;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .report-surface {
            background: #fff;
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
            border-top: 8px solid var(--accent);
        }
        h2 { font-weight: 700; font-size: 2rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        article { font-size: 1rem; }
        .case-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #999; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">medical.report</div>
            <nav>
                <a href="/">Case</a>
                <a href="/about">Analysis</a>
            </nav>
        </div>
    </header>
