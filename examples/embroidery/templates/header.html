<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap');

    :root {
      --primary: #d4af37; /* Gold */
      --text: #f0e6d2; /* Cream */
      --text-muted: #b8b09f;
      --border: rgba(212, 175, 55, 0.5); /* Semi-transparent gold border */
      --bg: #1a0b12; /* Deep warm dark background */
      --bg-subtle: #2d1620; /* Slightly lighter background */
      --glow: rgba(212, 175, 55, 0.4);
      --glow-strong: rgba(212, 175, 55, 0.7);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Lora', Georgia, serif; line-height: 1.8; margin: 0; color: var(--text); background: var(--bg); background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%232d1620' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E"); }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 2rem auto; padding: 2rem; background: var(--bg); border: 2px solid var(--border); box-shadow: 0 0 20px var(--glow), inset 0 0 10px var(--glow); border-radius: 12px; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1.5rem; border-bottom: 2px solid var(--border); margin-bottom: 2.5rem; }
    .site-logo { font-weight: 700; font-size: 1.8rem; color: var(--primary); text-decoration: none; font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 8px var(--glow-strong); }
    .site-logo:hover { color: #f9d863; }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 1rem; font-family: 'Playfair Display', serif; letter-spacing: 1px; transition: color 0.3s, text-shadow 0.3s; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--glow); }
    .site-main { min-height: calc(100vh - 300px); }
    .site-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 2px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; font-style: italic; }

    /* Typography */
    h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--primary); line-height: 1.4; margin-top: 2em; margin-bottom: 0.8em; font-weight: 700; text-shadow: 0 0 5px var(--glow); }
    h1 { font-size: 2.5rem; margin-top: 0; text-align: center; border-bottom: 1px dashed var(--border); padding-bottom: 0.5em; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.4rem; }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px dotted var(--primary); transition: all 0.3s; }
    a:hover { color: #f9d863; text-shadow: 0 0 5px var(--glow); border-bottom-style: solid; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); color: var(--primary); }
    pre { background: var(--bg-subtle); padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    pre code { background: none; padding: 0; border: none; color: var(--text); }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s, box-shadow 0.2s; }
    ul.section-list li:hover { transform: translateY(-2px); box-shadow: 0 6px 12px var(--glow); border-color: var(--primary); }
    ul.section-list li a { font-weight: 600; font-family: 'Playfair Display', serif; font-size: 1.2rem; border: none; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; text-align: center; }
    nav.pagination { margin: 2.5rem 0; text-align: center; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: inline-flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text); text-decoration: none; font-family: 'Playfair Display', serif; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px var(--glow); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(212, 175, 55, 0.2); color: var(--primary); text-shadow: 0 0 5px var(--glow); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px dashed var(--border); color: var(--text-muted); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: center; text-align: center; }
      .site-wrapper { margin: 0; border-radius: 0; border-left: none; border-right: none; padding: 1.5rem 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
