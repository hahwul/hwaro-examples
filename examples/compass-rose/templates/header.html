<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #5a4b41;
            --accent: #8b4513;
            --parchment: #f4ece4;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .compass-surface {
            background: var(--parchment);
            border-radius: 50%;
            width: 400px;
            height: 400px;
            margin: 0 auto 60px;
            box-shadow: 10px 10px 30px var(--shadow), inset 2px 2px 5px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d8c4b4;
            position: relative;
        }
        .compass-needle {
            width: 4px;
            height: 200px;
            background: linear-gradient(to bottom, var(--accent) 50%, #555 50%);
            transform: rotate(45deg);
        }
        article {
            background: #fff;
            padding: 60px;
            box-shadow: 5px 5px 15px var(--shadow);
            border-radius: 4px;
        }
        h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2.2rem; color: var(--accent); font-style: italic; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">compass.rose</div>
            <nav>
                <a href="/">North</a>
                <a href="/about">Path</a>
            </nav>
        </div>
    </header>
