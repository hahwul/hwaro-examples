{% include "header.html" %}
  <main id="main">
    <header class="section-head">
      <div class="wrap">
        <p class="section-kicker">Portfolio <span aria-hidden="true">·</span> {{ section.pages_count }} assignments</p>
        <h1>{{ page.title | e }}</h1>
        {% if content %}<div class="section-lede">{{ content | safe }}</div>{% endif %}
      </div>
    </header>
    <section class="wall wall--section" aria-label="{{ page.title | e }}">
      <div class="wrap wall-inner">
        {% for p in section.pages %}
          {% include "partials/card.html" %}
        {% endfor %}
      </div>
    </section>
  </main>
{% include "footer.html" %}
