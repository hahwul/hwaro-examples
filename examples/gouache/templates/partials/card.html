<article class="card card--{{ p.extra.duo | default("cerulean") }}">
  <a class="card-link" href="{{ base_url }}{{ p.url }}">
    <div class="card-shape" style="clip-path: url(#torn-{{ p.extra.shape | default(1) }});">
      <svg class="card-motif" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><use href="#icon-{{ p.extra.icon | default('jelly') }}"></use></svg>
    </div>
    <div class="card-text">
      {% if p.extra.kicker %}<p class="card-kicker">{{ p.extra.kicker }}</p>{% endif %}
      <h3 class="card-title">{{ p.title | e }}</h3>
      <p class="card-meta">
        {% if p.extra.format %}<span class="card-format">{{ p.extra.format }}</span>{% endif %}
        {% if p.date %}<time datetime="{{ p.date | date('%Y-%m-%d') }}">{{ p.date | date('%b %Y') }}</time>{% endif %}
      </p>
    </div>
  </a>
</article>
