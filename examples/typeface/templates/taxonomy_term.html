{% extends "base.html" %}

{% block content %}
<div class="container" style="padding: 6rem 0;">
    <header style="margin-bottom: 4rem;">
        <span style="font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 0.8rem; color: var(--secondary-text);">{{ taxonomy_name }}</span>
        <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; text-transform: capitalize;">{{ taxonomy_term }}</h1>
    </header>

    <div class="post-list">
        {% for post in taxonomy_pages %}
        <div class="post-item">
            <span class="date">{{ post.date | date("%B %d, %Y") }}</span>
            <a href="{{ post.url }}"><h2>{{ post.title }}</h2></a>
            <p class="summary">{{ post.summary | strip_html | truncate_words(30) }}</p>
            <a href="{{ post.url }}" class="read-more">Read Essay</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock content %}
