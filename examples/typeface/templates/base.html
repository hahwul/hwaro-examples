<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">

    <link rel="stylesheet" href="{{ base_url }}/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    {{ og_all_tags | safe }}
    {{ highlight_css | safe }}
</head>
<body>
    <header class="site-header">
        <div class="container site-nav">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav class="nav-links">
                <a href="{{ base_url }}/posts">Essays</a>
                <a href="{{ base_url }}/about">About</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ current_year }} {{ site.title }}. Refined Typography & Design.</p>
        </div>
    </footer>

    {{ highlight_js | safe }}
</body>
</html>
