{% include "header.html" %}
  <main class="site-main">
    <header class="section-header">
      <h1>{{ page.title | e }}</h1>
    </header>
    <p class="taxonomy-desc">Index // Entities classified under this term:</p>
    {{ content | safe }}
    <ul class="section-list">
      {% for item in pages %}
      <li><a href="{{ item.permalink }}">{{ item.title | e }}</a></li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
