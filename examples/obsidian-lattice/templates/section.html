{% include "header.html" %}
  <main class="site-main">
    <header class="section-header">
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}
      <p class="section-desc">{{ page.description | e }}</p>
      {% endif %}
    </header>
    {{ content | safe }}
    <ul class="section-list">
      {% for item in pages %}
        <li><a href="{{ item.permalink }}">{{ item.title | e }}</a></li>
      {% endfor %}
    </ul>
    {{ pagination }}
  </main>
{% include "footer.html" %}
