<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
  <style>
    /* Inline critical glitch styles */
    .glitch-text { position: relative; display: inline-block; }
    .glitch-text::before, .glitch-text::after {
      content: attr(data-text);
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      mix-blend-mode: screen;
    }
    .glitch-text::before { color: #ff00aa; animation: g1 1.8s infinite linear; left: 1.5px; }
    .glitch-text::after { color: #00f9ff; animation: g2 1.3s infinite linear; left: -1px; }
    @keyframes g1 { 0%,100%{transform:translate(0)} 20%{transform:translate(-0.8px,0.6px)} 40%{transform:translate(0.5px,-0.4px)} }
    @keyframes g2 { 0%,100%{transform:translate(0)} 30%{transform:translate(1px,-0.6px)} 70%{transform:translate(-0.6px,0.9px)} }
  </style>
</head>
<body data-section="{{ page.section }}" data-corruption="0">
  <!-- Pixel sorting bars injected by JS for progressive dread -->
  <div class="pixel-sort-bar"></div>
  <div class="pixel-sort-bar"></div>
  <div class="pixel-sort-bar"></div>
  <div class="pixel-sort-bar"></div>
