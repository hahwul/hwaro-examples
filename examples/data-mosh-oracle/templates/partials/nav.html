<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo glitch-text" data-text="DATA MOSH ORACLE">DATA MOSH ORACLE</a>
    <nav>
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">TRANSMISSIONS</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">ARCHIVES</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">THE ENTITY</a>
    </nav>
    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}
      <button class="search-trigger" onclick="openSearch()" title="Search corrupted buffer">
        <span style="font-family:monospace; font-size:10px;">FIND</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
  </div>
</header>
