<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --mosaic: #f8f8f8;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: var(--mosaic);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-bottom: 80px;
            border: 2px solid #000;
        }
        .mosaic-item {
            background: #fff;
            padding: 40px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .mosaic-item:nth-child(even) { background: #000; color: #fff; }
        h2 { font-weight: 700; font-size: 1.5rem; color: #000; margin-top: 0; text-transform: uppercase; }
        .mosaic-item:nth-child(even) h2 { color: #fff; }
        article { font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">mosaic.wall</div>
            <nav>
                <a href="/">Tiles</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
