{% include "header.html" %}
  <main class="site-main">
    <article class="glass-panel content-panel">
      {% if page.title %}
      <header class="page-header">
        <h1 class="gradient-text">{{ page.title | e }}</h1>
        {% if page.date %}
        <div class="page-meta">
          <time datetime="{{ page.date | date(format="%Y-%m-%d") }}">{{ page.date | date(format="%B %d, %Y") }}</time>
        </div>
        {% endif %}
      </header>
      {% endif %}
      <div class="page-content">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
