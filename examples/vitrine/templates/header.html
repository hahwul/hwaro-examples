<!DOCTYPE html>
<html lang="{{ page_language | default('en', true) }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Vitrine — home">
        <svg class="mark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="4" fill="currentColor"/>
          <circle cx="16" cy="13" r="4.5" fill="var(--bg)"/>
          <rect x="12.5" y="20" width="7" height="7" rx="1.5" fill="var(--bg)"/>
        </svg>
        <span class="wordmark-text">Vitrine</span>
      </a>
      <p class="header-kicker">Meridian Metro Pictogram Retrospective &middot; 1974&ndash;1991</p>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/cases/">The Cases</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
