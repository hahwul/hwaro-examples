{% include "header.html" %}
<h1 class="glow">{{ section.title }}</h1>
<ul class="post-list">
{% for p in section.pages %}
    <li>
        <h2><a href="{{ p.permalink }}">{{ p.title }}</a></h2>
        {% if p.description is defined %}<p>{{ p.description }}</p>{% endif %}
    </li>
{% endfor %}
</ul>
