<article class="post">
    <h1 class="glow">{{ page.title }}</h1>
    <div class="meta">
        {% if page.date is defined %}<time>{{ page.date }}</time>{% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</article>
