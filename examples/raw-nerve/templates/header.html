<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #ff0000; --accent: #000; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; border-left: 2px solid var(--text); }
        header { padding-bottom: 40px; border-bottom: 10px solid var(--text); }
        .logo { font-weight: 800; font-size: 2.5rem; text-transform: uppercase; letter-spacing: -2px; }
        .nerve-surface { padding: 60px 0; position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">raw.nerve</div></header>
