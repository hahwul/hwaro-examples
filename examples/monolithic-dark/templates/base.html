<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <header class="monolith-header">
            <div class="header-inner">
                <a href="{{ base_url }}" class="site-title">{{ site.title }}</a>
                <nav class="main-nav">
                    <!-- Navigation items if any -->
                </nav>
            </div>
        </header>

        <main class="monolith-main">
            {% block content %}{% endblock content %}
        </main>

        <footer class="monolith-footer">
            <div class="footer-inner">
                <p>&copy; {{ site.title }}. Carved in stone.</p>
            </div>
        </footer>
    </div>
</body>
</html>
