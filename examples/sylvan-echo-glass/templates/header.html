<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is defined %}{{ page.description | e }}{% else %}A deep forest glassmorphism experience{% endif %}">
  <title>{% if page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00ff88;
      --primary-dim: rgba(0, 255, 136, 0.2);
      --secondary: #00d2ff;
      --accent: #20b2aa;
      --text: #e0f2f1;
      --text-muted: #80cbc4;
      --bg: #020a06;
      --glass-bg: rgba(6, 20, 11, 0.65);
      --glass-border: rgba(0, 255, 136, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      background-image: radial-gradient(circle at 15% 50%, rgba(0, 255, 136, 0.05), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.05), transparent 25%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(0, 255, 136, 0.15);
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: rgba(0, 210, 255, 0.1);
      bottom: -200px;
      right: -100px;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: rgba(32, 178, 170, 0.12);
      top: 40%;
      left: 60%;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 50px) scale(1.1); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.5px;
      text-shadow: 0 0 10px var(--primary-dim);
    }

    .site-header nav { display: flex; gap: 1.5rem; }

    .site-header nav a {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-dim);
    }

    .site-main { min-height: calc(100vh - 250px); }

    /* Glass Panel Component */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
    }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.2;
      margin-top: 0;
      margin-bottom: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; color: var(--primary); }

    p { margin: 0 0 1.5rem 0; font-size: 1.1rem; }

    a {
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--primary);
      border: 1px solid var(--glass-border);
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      margin-bottom: 1.5rem;
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--text);
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--glass-border);
      margin: 2rem 0;
    }

    /* Lists */
    ul, ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .glass-panel { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {% if highlight_css is defined %}{{ highlight_css }}{% endif %}
  {% if auto_includes_css is defined %}{{ auto_includes_css }}{% endif %}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{% if site.title is defined %}{{ site.title }}{% else %}Sylvan Echo Glass{% endif %}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
