{% include "header.html" %}
  <main class="site-main">
    <div class="hero-section">
      <h1 class="hero-title">Index: <span>{{ taxonomy_name | e }}</span></h1>
      <p class="hero-subtitle">Browse systems catalog filtered by {{ taxonomy_name | e }} index taxonomy.</p>
    </div>

    <div class="post-wrapper" style="border-top: 1px solid rgba(0, 229, 255, 0.2);">
      <div class="badge-container" style="gap: 1.5rem; padding: 1.5rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
            #{{ term.name | lower }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
