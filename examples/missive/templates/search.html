{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="section-head wrap">
      <p class="kicker">Search</p>
      <h1 class="section-title">{{ page.title | e }}</h1>
      {% if content %}<div class="section-intro">{{ content | safe }}</div>{% endif %}
    </header>

    <div class="wrap">
      <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label class="search-label" for="search-input">Search Missive</label>
        <input class="search-input" id="search-input" type="search" name="q" placeholder="Inconel, creep-rupture, batch 079&hellip;" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ul class="result-list" id="search-results"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
