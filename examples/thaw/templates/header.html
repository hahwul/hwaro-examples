<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
          <path d="M16 26c-5-1.5-8-6-7-12 3 .5 5.5 2 7 5 1.5-3 4-4.5 7-5 1 6-2 10.5-7 12z" fill="currentColor"/>
          <path d="M16 26V13" stroke="var(--bg)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Thaw</span>
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ base_url }}/field-notes/">Field Notes</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/" class="nav-search">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3 L17 17"/></svg>
          <span>Search</span>
        </a>
      </nav>
    </div>
  </header>
