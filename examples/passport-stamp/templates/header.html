<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #4a3a2a;
            --accent: #d32f2f;
            --stamp: #e6e9ef;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #f4ece4;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .passport-page {
            background: #fff;
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 4px;
            position: relative;
            background-image: radial-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .stamp {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 150px;
            height: 150px;
            border: 4px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            transform: rotate(15deg);
            opacity: 0.4;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">passport.stamp</div>
            <nav>
                <a href="/">Entry</a>
                <a href="/about">Exit</a>
            </nav>
        </div>
    </header>
