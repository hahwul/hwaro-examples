<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --accent: #ff4d00;
            --muted: #444444;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -1px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .crater-hero {
            padding: 100px 0;
            text-align: center;
            border: 20px solid var(--muted);
            margin-top: 40px;
        }
        .crater-hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 10vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -0.05em;
        }
        .crater-sub {
            font-size: 1.5rem;
            margin-top: 40px;
            opacity: 0.7;
        }
        article {
            padding: 80px 0;
        }
        h2 { font-family: 'Unbounded', sans-serif; font-size: 3rem; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">CRATER.IMPACT</div>
            <nav>
                <a href="/">Point of Origin</a>
                <a href="/about">Shockwave</a>
            </nav>
        </div>
    </header>
