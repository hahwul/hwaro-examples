{% include "header.html" %}
<main class="monolith-main">
  <h1>{{ page.title | e }}</h1>
  {{ content | safe }}

  <ul class="section-list">
    {% for item in section.pages %}
      <li>
        <h2><a href="{{ base_url }}{{ item.permalink }}">{{ item.title | e }}</a></h2>
        <div class="post-meta">
          <time>{{ item.date }}</time>
        </div>
        <p>{{ item.description | e }}</p>
      </li>
    {% endfor %}
  </ul>
  {{ pagination }}
</main>
{% include "footer.html" %}
