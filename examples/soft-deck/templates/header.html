<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --text: #4a5568;
            --accent: #2d3748;
            --shadow: rgba(0,0,0,0.08);
            --highlight: rgba(255,255,255,0.8);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .deck-box {
            background: var(--bg);
            border-radius: 40px;
            padding: 60px;
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--highlight);
            margin-bottom: 80px;
        }
        .deck-hero {
            padding: 40px 0;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }
        .deck-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
        }
        article { font-size: 1.1rem; }
        h2 { font-weight: 600; font-size: 2.2rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">soft.deck</div>
            <nav>
                <a href="/">Interface</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
