{% include "header.html" %}
  <main class="site-main">
    <div class="section-page">
      <span class="elev-tag">ALT / TRACKS</span>
      <h1 class="section-title">{{ page.title | e }}</h1>
      <div class="contour-rule" aria-hidden="true">
        <svg viewBox="0 0 800 10" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,7 Q100,2 200,6 T400,5 T600,7 T800,4" fill="none" stroke="#d6ff4a" stroke-width="1.5"/>
          <path d="M0,4 Q100,0 200,3 T400,2 T600,4 T800,1" fill="none" stroke="#2a3540" stroke-width="1"/>
        </svg>
      </div>
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </main>
{% include "footer.html" %}
