<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120;
            --surface: #1e293b;
            --text: #f8fafc;
            --accent: #22d3ee;
            --border: #334155;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            border-bottom: 2px solid var(--accent);
            padding: 20px 0;
            background: rgba(11, 17, 32, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        nav a:hover {
            opacity: 1;
            color: var(--accent);
        }
        .strike-hero {
            padding: 120px 0 80px;
            border-left: 1px solid var(--border);
            margin-left: 20px;
            padding-left: 40px;
        }
        .strike-hero h1 {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
        .strike-tag {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 10px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        .status-item {
            border: 1px solid var(--border);
            padding: 20px;
            background: var(--surface);
        }
        .status-item span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .status-item div {
            font-size: 1.1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">SUMMIT//STRIKE</div>
                <nav>
                    <a href="/">Terminal</a>
                    <a href="/about">Intelligence</a>
                </nav>
            </div>
        </div>
    </header>
