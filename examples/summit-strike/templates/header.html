<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="ridge-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Summit Strike home">
        <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" class="logo-peak" aria-hidden="true">
          <polyline points="2,36 14,22 22,28 32,10 42,22 52,16 58,24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="miter"/>
          <line x1="2" y1="36" x2="58" y2="36" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          <circle cx="32" cy="10" r="2.5" fill="#d6ff4a"/>
        </svg>
        <span class="logo-text">SUMMIT STRIKE</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">BASE CAMP</a>
        <a href="{{ base_url }}/tracks/">TRACKS</a>
        <a href="{{ base_url }}/route-map/">ROUTE MAP</a>
        <a href="{{ base_url }}/ascent/">ASCENT PLAN</a>
        <a href="{{ base_url }}/register/" class="nav-cta">REGISTER</a>
      </nav>
    </header>
