<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #03120f; /* Deep verdant black */
            --color-text: #f0f5f3; /* Off-white / light green tint */
            --color-accent: #1f4a3e; /* Solid dark green accent */
            --color-highlight: #d1e8df; /* Pale green highlight */
            --color-border: rgba(209, 232, 223, 0.15); /* Faint stark border */

            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;

            --grid-gap: 2rem;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 100vh;
            max-width: var(--container-width);
            margin: 0 auto;
            border-left: 1px solid var(--color-border);
            border-right: 1px solid var(--color-border);
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
        }

        header {
            border-right: 1px solid var(--color-border);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--color-bg);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        @media (max-width: 900px) {
            header {
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                height: auto;
                position: relative;
                padding: 2rem;
            }
        }

        .brand-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--color-highlight);
            text-decoration: none;
            display: block;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .brand-desc {
            font-size: 0.85rem;
            color: var(--color-text);
            opacity: 0.7;
            margin-bottom: 3rem;
            max-width: 200px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.5rem 0;
            border-bottom: 1px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            display: inline-block;
            width: max-content;
        }

        nav a:hover {
            color: var(--color-highlight);
            border-bottom: 1px solid var(--color-highlight);
        }

        .nav-section-title {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            margin-top: 2rem;
        }

        .footer-meta {
            margin-top: auto;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        main {
            padding: 4rem;
            overflow-y: auto;
            height: 100vh;
            background-color: var(--color-bg);
        }

        @media (max-width: 900px) {
            main {
                padding: 2rem;
                height: auto;
                overflow-y: visible;
            }
        }

        /* Content Typography */
        h1, h2, h3, h4 {
            font-family: var(--font-display);
            color: var(--color-highlight);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            font-weight: 600;
        }

        h1 {
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 1rem;
        }

        h2 { font-size: 2.5rem; }
        h3 { font-size: 1.8rem; }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            max-width: 75ch;
            color: rgba(240, 245, 243, 0.85);
        }

        a {
            color: var(--color-highlight);
            text-decoration: none;
            border-bottom: 1px solid var(--color-accent);
            transition: all 0.2s ease;
        }

        a:hover {
            background-color: var(--color-accent);
            color: var(--color-text);
            border-bottom-color: var(--color-highlight);
        }

        ul, ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        blockquote {
            border-left: 4px solid var(--color-accent);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-bottom: 2rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-style: italic;
            color: var(--color-highlight);
        }

        code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            background-color: var(--color-accent);
            padding: 0.2em 0.4em;
            font-size: 0.85em;
            border-radius: 2px;
            color: var(--color-text);
        }

        pre {
            background-color: #010807;
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 2rem;
            border: 1px solid var(--color-border);
        }

        pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.9rem;
            color: var(--color-highlight);
        }

        hr {
            border: 0;
            height: 1px;
            background-color: var(--color-border);
            margin: 3rem 0;
        }

        /* Post lists */
        .post-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-card {
            border: 1px solid var(--color-border);
            padding: 2rem;
            transition: border-color 0.3s;
            background-color: rgba(31, 74, 62, 0.05);
        }

        .post-card:hover {
            border-color: var(--color-highlight);
        }

        .post-card-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            margin-top: 0;
        }

        .post-card-title a {
            border: none;
            color: var(--color-highlight);
        }

        .post-card-title a:hover {
            background: transparent;
        }

        .post-card-date {
            font-size: 0.85rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: block;
        }

        .post-card-summary {
            font-size: 1rem;
            margin-bottom: 0;
            color: rgba(240, 245, 243, 0.7);
        }

        /* Taxonomies */
        .taxonomy-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
            padding: 0;
            margin-top: 1rem;
        }

        .taxonomy-tag {
            background-color: var(--color-accent);
            color: var(--color-text);
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .taxonomy-tag a {
            border: none;
            color: inherit;
        }

        .taxonomy-tag a:hover {
            background: transparent;
            color: var(--color-highlight);
        }

        .meta-header {
            margin-bottom: 3rem;
        }

    </style>
</head>
<body>
    <div class="layout">
        <header>
            <div>
                <a href="{{ base_url }}/" class="brand-title">{{ site.title }}</a>
                <div class="brand-desc">{{ site.description }}</div>

                <nav>
                    <div class="nav-section-title">Directory</div>
                    <a href="{{ base_url }}/">Index</a>
                    <a href="{{ base_url }}/about/">About</a>
                    <a href="{{ base_url }}/posts/">Journal</a>
                </nav>
            </div>
            <div class="footer-meta">
                &copy; {{ current_year | default(2024) }} {{ site.title }}.<br>
                Powered by Hwaro.
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
