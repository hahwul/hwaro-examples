<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #333;
            --accent: #555;
            --hover: #888;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 10px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        nav a:hover { color: var(--hover); }
        .hush-hero {
            padding: 100px 0;
            text-align: center;
        }
        .hush-hero h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            color: var(--accent);
            opacity: 0.5;
        }
        article { padding: 60px 0; }
        h2 { font-weight: 300; font-size: 2rem; color: var(--accent); margin-bottom: 40px; }
        p { transition: color 0.5s; }
        p:hover { color: var(--hover); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">hush.</div>
            <nav>
                <a href="/">Whisper</a>
                <a href="/about">Secret</a>
            </nav>
        </div>
    </header>
