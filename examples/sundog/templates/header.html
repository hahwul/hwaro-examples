<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site">
    <header class="site-header">
      <div class="site-header-row">
        <a class="wordmark" href="{{ base_url }}/">
          <svg class="wordmark-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
            <circle cx="16" cy="16" r="10.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <circle cx="16" cy="16" r="3" fill="currentColor"/>
          </svg>
          <span>Sundog</span>
        </a>
        <nav class="site-nav" aria-label="Site">
          <a href="{{ base_url }}/essays/">Essays</a>
          <a href="{{ base_url }}/about/">About</a>
          <button class="search-open" id="search-open" type="button" aria-haspopup="dialog" aria-controls="search-veil">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.3 13.3L17 17"/></svg>
            <span>Search</span>
            <kbd aria-hidden="true">/</kbd>
          </button>
        </nav>
      </div>
    </header>
