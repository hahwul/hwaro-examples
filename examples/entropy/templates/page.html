{% include "header.html" %}

  <main class="page-main">
    <div class="page-split">
      <div class="page-order-strip"></div>
      <div class="page-content-area">
        <header class="page-header">
          <h1 class="page-title">{{ page.title }}</h1>
          {% if page.date %}
          <span class="page-date">{{ page.date }}</span>
          {% endif %}
          {% if page.description %}
          <p class="page-description">{{ page.description }}</p>
          {% endif %}
          {% if page.tags %}
          <div class="page-tags">
            {% for tag in page.tags %}
            <a href="{{ base_url }}/tags/{{ tag }}/" class="page-tag">{{ tag }}</a>
            {% endfor %}
          </div>
          {% endif %}
        </header>
        <div class="page-body">
          {{ content | safe }}
        </div>
      </div>
      <div class="page-chaos-strip">
        <span class="chaos-accent ca-1"></span>
        <span class="chaos-accent ca-2"></span>
        <span class="chaos-accent ca-3"></span>
      </div>
    </div>
  </main>

{% include "footer.html" %}
