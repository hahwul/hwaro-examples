<li class="entry-row">
  <a class="entry-row__link" href="{{ base_url }}{{ p.url }}">
    <span class="entry-row__title">{{ p.title }}</span>
    {% if p.date %}
    <span class="entry-row__meta">
      {% if p.extra.time %}<span class="time-badge">{{ p.extra.time }}</span><span class="meta-sep" aria-hidden="true">&middot;</span>{% endif %}
      <time datetime="{{ p.date | date("%Y-%m-%d") }}">{{ p.date | date("%b %d, %Y") }}</time>
    </span>
    {% endif %}
  </a>
</li>
