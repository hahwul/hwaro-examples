{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="section-head">
      <p class="section-head__kicker">Find a morning</p>
      <h1 class="section-head__title">{{ page.title | e }}</h1>
      <p class="section-head__intro">{{ content | safe }}</p>
    </header>
    <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="search-form__label" for="search-input">Search every essay</label>
      <input class="search-form__input" id="search-input" type="search" name="q" placeholder="kettle, streetlight, winter&hellip;" autocomplete="off" autofocus>
    </form>
    <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
    <ol class="entry-list entry-list--full" id="search-results"></ol>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js" defer></script>
{% include "footer.html" %}
