<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="site-mark" href="{{ base_url }}/" aria-label="{{ site.title | e }} — home">
        <svg class="mark-grid" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <line x1="6" y1="3" x2="6" y2="29"/>
          <line x1="16" y1="3" x2="16" y2="29"/>
          <line x1="26" y1="3" x2="26" y2="29"/>
          <line x1="3" y1="10" x2="29" y2="10"/>
          <line x1="3" y1="22" x2="29" y2="22"/>
        </svg>
        <span class="site-mark-title">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/foreword/">Foreword</a>
        <a href="{{ base_url }}/chapters/">Chapters</a>
        <a href="{{ base_url }}/search/">Search</a>
      </nav>
    </div>
  </header>
