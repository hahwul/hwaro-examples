{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="section-hero wrap">
      <p class="section-kicker">Find a passage</p>
      <h1 class="section-title">{{ page.title | e }}</h1>
      <div class="section-dek">{{ content | safe }}</div>
    </header>
    <div class="wrap search-wrap">
      <form class="search-form" role="search" onsubmit="return false;">
        <label class="search-label" for="search-input">Search essays</label>
        <input class="search-input" id="search-input" type="search" placeholder="market, ruin, grid, stream…" autocomplete="off" autofocus>
      </form>
      <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
      <ol class="contents-list" id="search-results"></ol>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
