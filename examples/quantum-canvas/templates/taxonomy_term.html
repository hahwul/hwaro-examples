{% extends "base.html" %}
{% block content %}
<article>
    <h1>{{ taxonomy }}: {{ term }}</h1>
    <ul class="post-list">
        {% for p in pages %}
        <li>
            <a href="{{ base_url }}{{ p.path }}" class="post-title">{{ p.title }}</a>
        </li>
        {% endfor %}
    </ul>
</article>
{% endblock %}
