{% extends "base.html" %}

{% block content %}
    <h1>{{ page.title }}</h1>

    {% if page.date %}
        <div class="page-meta">
            <time datetime="{{ page.date | date(format="%Y-%m-%d") }}">
                {{ page.date | date(format="%B %d, %Y") }}
            </time>
        </div>
    {% endif %}

    <div class="page-content">
        {{ content | safe }}
    </div>
{% endblock %}
