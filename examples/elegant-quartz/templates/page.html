{% include "header.html" %}
<main class="container">
  <article class="single-post">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.date %}
      <time class="post-date">{{ page.date }}</time>
      {% endif %}
    </header>
    <div class="post-content">
      {{ content | safe }}
    </div>
  </article>
</main>
{% include "footer.html" %}
