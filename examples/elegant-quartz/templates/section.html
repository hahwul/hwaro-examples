{% include "header.html" %}
<main class="container">
  <div class="section-content">
    {{ content | safe }}
  </div>
  <ul class="post-list">
    {% for page in section.pages %}
    <li class="post-item">
      <h2 class="post-item-title"><a href="{{ base_url }}{{ page.path }}">{{ page.title }}</a></h2>
      {% if page.description %}
      <p class="post-item-desc">{{ page.description }}</p>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</main>
{% include "footer.html" %}
