<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/requiem.css">
  <script src="{{ base_url }}/js/requiem.js" defer></script>
</head>
<body class="requiem-body">
  <header class="requiem-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="requiem-nav">
        <a href="{{ base_url }}/#vigil">The Vigil</a>
        <a href="{{ base_url }}/#fallen">The Fallen</a>
        <a href="{{ base_url }}/#offices">Offices</a>
        <a href="{{ base_url }}/about/">The Watch</a>
      </nav>
    </div>
