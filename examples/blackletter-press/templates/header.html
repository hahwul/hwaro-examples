<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #000; --paper: #f9f7f2; }
        body { background-color: var(--paper); color: var(--text); font-family: 'Playfair Display', serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: center; border-bottom: 1px solid #000; padding-bottom: 40px; margin-bottom: 60px; }
        .logo { font-family: 'UnifrakturMaguntia', cursive; font-size: 4rem; margin-bottom: 10px; }
        h2 { font-family: 'UnifrakturMaguntia', cursive; font-size: 2.5rem; margin-top: 0; }
        article { font-size: 1.2rem; line-height: 1.8; text-align: justify; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">Blackletter Press</div></header>
