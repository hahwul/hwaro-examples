<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="shell site-header__inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Moiré — home">
        <svg class="brand__mark" width="26" height="26" viewBox="0 0 26 26" aria-hidden="true" focusable="false">
          <g stroke="currentColor" stroke-width="1" fill="none">
            <path d="M0 4 H26 M0 9 H26 M0 14 H26 M0 19 H26 M0 24 H26"/>
            <g transform="rotate(20 13 13)">
              <path d="M0 4 H26 M0 9 H26 M0 14 H26 M0 19 H26 M0 24 H26"/>
            </g>
          </g>
        </svg>
        <span class="brand__word">Moir&eacute;</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/patterns/">Patterns</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
