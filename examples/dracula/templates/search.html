{% include "header.html" %}
<main id="main">
  <article class="prose">
    <header class="entry-header">
      <div class="entry-meta">
        <span class="entry-kicker">ARCHIVE</span>
      </div>
      <div class="entry-title-wrap">
        <h1 class="page-title">{{ page.title | e }}</h1>
      </div>
    </header>
    <div class="entry-body">
      <form role="search" class="search-form" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
        <label for="search-input" class="sr-only">Search the archive</label>
        <div class="search-input-wrapper">
          <input id="search-input" type="search" placeholder="Search entries, letters, telegrams..." autocomplete="off" autofocus>
        </div>
      </form>
      <p id="search-status" role="status" aria-live="polite" class="search-status"></p>
      <ul id="search-results" class="search-results"></ul>
    </div>
  </article>
</main>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script src="{{ base_url }}/js/search.js"></script>
{% include "footer.html" %}
