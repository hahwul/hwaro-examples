<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('dracula-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-head">
    <div class="site-head-inner">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-bat" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
          <path d="M16 8c-1.5 2.5-4.5 4-7.5 4-2 0-4-.5-5.5-1.5 1.5 4 4 8.5 8 8.5 2.5 0 4.5-1.5 6-3.5 1.5 2 3.5 3.5 6 3.5 4 0 6.5-4.5 7-7.5-1.5 1-3.5 1.5-5.5 1.5-3 0-6-1.5-7.5-4zM16 8l-1.5 3.5h3L16 8z" fill="currentColor"/>
        </svg>
        <span>{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/chronicle/"{% if page.section == "chronicle" %} aria-current="page"{% endif %}>Chronicle</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
        <a href="{{ base_url }}/search/"{% if page.url == "/search/" %} aria-current="page"{% endif %}>Search</a>
      </nav>
      <div class="header-actions">
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme">
          <svg class="theme-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2">
            <!-- Bat outline / Moon style for gothic theme toggle -->
            <path d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 0-9-9Z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>
