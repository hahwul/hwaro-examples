<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #00e5ff;
      --text: #e0e0e0;
      --text-muted: #8a8f98;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #090a0f;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.05);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 50% 0%, #1a1c29 0%, var(--bg) 100%);
      background-attachment: fixed;
    }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
      margin-bottom: 3rem; background: var(--glass-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 0 0 16px 16px; border: 1px solid var(--glass-border);
      border-top: none; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .site-logo { font-weight: 700; font-size: 1.4rem; color: #fff; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main {
      min-height: calc(100vh - 250px); padding: 2rem;
      background: var(--glass-bg); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); border-radius: 16px;
      border: 1px solid var(--glass-border); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .site-footer { margin-top: 3rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }
    h1, h2, h3 { color: #fff; line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
    h1 { font-size: 2rem; margin-top: 0; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, monospace; color: var(--primary); }
    pre { background: rgba(0,0,0,0.3) !important; padding: 1.2rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--glass-border); }
    pre code { background: none; padding: 0; color: inherit; }
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--glass-border); transition: transform 0.2s, background 0.2s; }
    ul.section-list li:hover { transform: translateY(-2px); background: rgba(0,0,0,0.3); border-color: rgba(0,229,255,0.3); }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; background: rgba(0,0,0,0.2); }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(0,229,255,0.1); color: var(--primary); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; border-radius: 0; padding: 1.5rem; }
      .site-wrapper { padding: 0 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
