{% include "header.html" %}
<main id="main" class="site-main container">
  <article class="prose">
    <h1>{{ page.title | e }}</h1>
    {% if page.date %}<time datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>{% endif %}
    {{ content | safe }}
    {% if page.tags %}
    <ul class="tag-list">
      {% for t in page.tags %}<li><a href="{{ get_taxonomy_url(kind="tags", term=t) }}">{{ t }}</a></li>{% endfor %}
    </ul>
    {% endif %}
  </article>
</main>
{% include "footer.html" %}
