{% include "header.html" %}
<main id="main" class="site-main container">
  <h1>{{ page.title | e }}</h1>
  <form role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;" class="search-form">
    <label for="search-input">Search the void</label>
    <input id="search-input" class="search-input" type="search" autocomplete="off" autofocus placeholder="Type to search issues...">
  </form>
  <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
  <ul id="search-results" class="search-results"></ul>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
