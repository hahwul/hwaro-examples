<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text: #00f2fe; --accent: #4facfe; --glow: rgba(0, 242, 254, 0.2); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: center; padding: 60px 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 2rem; color: #fff; text-shadow: 0 0 20px var(--text); }
        .ink-surface { background: #000; padding: 80px; border: 2px solid var(--text); box-shadow: 0 0 40px var(--glow); position: relative; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">electric.ink</div></header>
