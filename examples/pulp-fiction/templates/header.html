<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="pulp-wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Pulp Fiction home">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" class="logo-mark" aria-hidden="true">
          <!-- Mini pulp magazine icon with star -->
          <rect x="6" y="6" width="48" height="48" fill="#f2c80c" stroke="#111111" stroke-width="2"/>
          <polygon points="30,13 34,25 46,25 36,32 40,44 30,37 20,44 24,32 14,25 26,25" fill="#d92820" stroke="#111111" stroke-width="1.5"/>
          <text x="30" y="55" text-anchor="middle" font-family="Bebas Neue, Impact, sans-serif" font-size="7" fill="#111111" letter-spacing="1">10c</text>
        </svg>
        <span class="logo-text">
          <span class="logo-main">PULP FICTION</span>
          <span class="logo-sub">Ten Cents the Copy</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">COVER</a>
        <a href="{{ base_url }}/stories/">STORIES</a>
        <a href="{{ base_url }}/authors/">WRITERS</a>
        <a href="{{ base_url }}/letters/">LETTERS</a>
      </nav>
    </header>
