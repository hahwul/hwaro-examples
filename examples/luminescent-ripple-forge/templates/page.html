{% extends "base.html" %}

{% block content %}
<article class="glass-panel content-area">
    <header style="margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
        <h1 class="gradient-text">{{ page.title }}</h1>
        {% if page.date and page.date != "" %}
        <p style="font-size: 0.9rem; margin-top: 0.5rem; color: var(--text-secondary);">
            Published on {{ page.date | date("%B %d, %Y") }}
        </p>
        {% endif %}
    </header>

    <div class="markdown-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
