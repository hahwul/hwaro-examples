{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <header style="margin-bottom: 2rem;">
        <h1>Posts tagged <span class="gradient-text">"{{ term.name }}"</span></h1>
    </header>

    <div class="posts-list" style="display: grid; gap: 1.5rem;">
        {% for post in term.pages %}
        <article class="glass-panel" style="padding: 1.5rem; margin-bottom: 0;">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            {% if post.date %}
            <small style="display: block; margin-bottom: 1rem; color: var(--text-secondary);">{{ post.date | date("%B %d, %Y") }}</small>
            {% endif %}
            {% if post.summary %}
            <p>{{ post.summary }}</p>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
