{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <header style="margin-bottom: 2rem;">
        <h1 class="gradient-text">{{ taxonomy.name | capitalize }}</h1>
    </header>

    <div class="taxonomy-terms" style="display: flex; flex-wrap: wrap; gap: 1rem;">
        {% for term in taxonomy.terms %}
        <a href="{{ term.url }}" class="btn" style="text-transform: none;">
            {{ term.name }} ({{ term.pages | length }})
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
