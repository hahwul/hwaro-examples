title = "Luminescent Ripple Forge"
description = "A dark-themed glassmorphism aesthetic with animated glowing ripple gradients."
base_url = "http://localhost:3000"
language_code = "en"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = false

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10

[markdown]
safe = false
lazy_loading = true
