<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#151117">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }} — Game Audio Designer</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-base-url="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="shell">
    <header class="site-header">
      <a class="brand" href="{{ base_url }}/">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M16 3.4l11 5.1v10.3c0 6.6-4.7 11-11 11.2-6.3-.2-11-4.6-11-11.2V8.5l11-5.1z" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <rect x="10.6" y="15.4" width="2.3" height="7.2" rx="1.1" fill="currentColor"/>
          <rect x="14.4" y="10" width="2.3" height="12.6" rx="1.1" fill="currentColor"/>
          <rect x="18.2" y="12.8" width="2.3" height="9.8" rx="1.1" fill="currentColor"/>
        </svg>
        <span class="brand-name">Emblem</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
        <a href="{{ base_url }}/credits/"{% if page.section == "credits" %} aria-current="page"{% endif %}>Credits</a>
        <a href="{{ base_url }}/cv/"{% if page.url == "/cv/" %} aria-current="page"{% endif %}>CV</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
    </header>
