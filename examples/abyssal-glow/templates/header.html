<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #02050D;
      --text-color: #e0e8f5;
      --text-muted: #8a9bb8;

      --accent-teal: #00ffd0;
      --accent-blue: #0088ff;
      --accent-green: #00ff88;

      --glass-bg: rgba(10, 15, 30, 0.4);
      --glass-border: rgba(0, 255, 208, 0.2);

      --font-body: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      color: var(--text-color);
      background-color: var(--bg-color);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Orbs */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--accent-teal), transparent 70%);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent-blue), transparent 70%);
      bottom: -200px; right: -100px;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, var(--accent-green), transparent 70%);
      top: 40%; left: 60%;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, 60px) scale(0.9); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .site-logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-color);
      text-decoration: none;
      text-shadow: 0 0 10px rgba(0, 255, 208, 0.5);
      letter-spacing: -0.5px;
    }
    .site-logo:hover {
      color: var(--accent-teal);
      text-shadow: 0 0 20px rgba(0, 255, 208, 0.8);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-family: var(--font-display);
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .site-header nav a:hover {
      color: var(--accent-teal);
      text-shadow: 0 0 8px rgba(0, 255, 208, 0.6);
    }

    .site-main {
      min-height: calc(100vh - 250px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 3rem;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: var(--font-display);
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 700;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      margin-top: 0;
      background: linear-gradient(90deg, var(--accent-teal), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 255, 208, 0.3);
    }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; font-size: 1.05rem; }

    a {
      color: var(--accent-teal);
      text-decoration: none;
      transition: text-shadow 0.2s ease;
    }
    a:hover {
      text-decoration: none;
      text-shadow: 0 0 8px rgba(0, 255, 208, 0.6);
    }

    code {
      background: rgba(0, 255, 208, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'Fira Code', ui-monospace, monospace;
      color: var(--accent-teal);
      border: 1px solid rgba(0, 255, 208, 0.2);
    }
    pre {
      background: rgba(5, 10, 20, 0.8);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    pre code {
      background: none;
      padding: 0;
      border: none;
      color: #e0e8f5;
    }

    /* Components */
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.5rem; }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(10, 15, 30, 0.5);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 208, 0.15);
      border-color: rgba(0, 255, 208, 0.4);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 8px;
      font-family: var(--font-display);
    }
    nav.pagination a {
      background: rgba(10, 15, 30, 0.5);
      border: 1px solid var(--glass-border);
      color: var(--text-color);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    nav.pagination a:hover {
      color: #02050D;
      background: var(--accent-teal);
      border-color: var(--accent-teal);
      box-shadow: 0 0 15px rgba(0, 255, 208, 0.4);
    }
    .pagination-current span {
      background: rgba(0, 255, 208, 0.2);
      border: 1px solid var(--accent-teal);
      color: var(--accent-teal);
      text-shadow: 0 0 5px rgba(0, 255, 208, 0.5);
    }
    .pagination-disabled span {
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1rem; }
      .site-main { padding: 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
    </header>
