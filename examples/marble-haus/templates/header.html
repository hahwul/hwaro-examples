<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="wrap">
    <header class="site-header">
      <a href="{{ base_url }}/" class="brand">
        <svg width="34" height="34" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="34" height="34" fill="#1c1c1c"/>
          <circle cx="10" cy="10" r="5" fill="#c9a84c"/>
          <rect x="18" y="18" width="12" height="12" fill="#f5f0eb"/>
          <polygon points="18,4 28,4 23,14" fill="#f5f0eb"/>
        </svg>
        Marble Haus
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Index</a>
        <a href="{{ base_url }}/projects/">Projects</a>
        <a href="{{ base_url }}/about/">Studio</a>
        <a href="{{ base_url }}/contact/">Contact</a>
      </nav>
      <div class="studio-mark">
        <div>Design Practice &middot; <strong>Est. 2014</strong></div>
        <div>Seoul &middot; Berlin</div>
      </div>
    </header>
