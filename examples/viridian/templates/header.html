<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400;1,500&amp;family=Barlow+Condensed:wght@500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | e }} — Gardens" href="{{ base_url }}/gardens/rss.xml">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {% raw %}<script>(function(){try{var t=localStorage.getItem("viridian-theme");if(t==="dark"||t==="light"){document.documentElement.setAttribute("data-theme",t);}}catch(e){}})();</script>{% endraw %}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="Viridian, home">
        <svg class="brand-mark" viewBox="0 0 28 28" width="26" height="26" aria-hidden="true" focusable="false">
          <path d="M14 25 C14 17 14 10 14 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 8 C10 8 6.5 5.5 5 2 C10 2 13.4 4.6 14 8 Z" fill="currentColor"/>
          <path d="M14 14 C18 14 21.5 11.5 23 8 C18 8 14.6 10.6 14 14 Z" fill="currentColor"/>
          <path d="M14 20 C10 20 6.5 17.5 5 14 C10 14 13.4 16.6 14 20 Z" fill="currentColor"/>
        </svg>
        <span class="brand-word">Viridian</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/gardens/">Gardens</a>
        <a href="{{ base_url }}/about/">About</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color scheme" title="Toggle color scheme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/><line x1="18.8" y1="5.2" x2="17" y2="7"/><line x1="7" y1="17" x2="5.2" y2="18.8"/></g></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
      </nav>
    </div>
  </header>
