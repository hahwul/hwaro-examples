{% include "header.html" %}
  <main id="main" class="site-main">
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-kicker">Garden design studio</p>
        <h1 class="hero-title">Viridian</h1>
        <div class="hero-lede">{{ content | safe }}</div>
      </div>
      <svg class="hero-divider" viewBox="0 0 1200 44" preserveAspectRatio="none" aria-hidden="true" focusable="false">
        <path d="M0,22 C120,42 260,2 420,20 C580,38 720,4 900,22 C1040,37 1130,10 1200,24 L1200,44 L0,44 Z"></path>
      </svg>
    </section>

    <section class="wall-section" aria-labelledby="wall-heading">
      <div class="wall-head wall-head-compact">
        <h2 id="wall-heading" class="wall-heading wall-heading-sm">Recent plantings</h2>
      </div>
      <div class="wall">
        {% set coll = get_section(path="gardens") %}
        {% for entry in coll.pages %}
          {% include "garden-card.html" %}
        {% endfor %}
      </div>
    </section>
  </main>
{% include "footer.html" %}
