<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ff0050; --border: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .stories-bar { display: flex; gap: 20px; padding: 40px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .story-circle { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); padding: 3px; }
        .story-inner { width: 100%; height: 100%; border-radius: 50%; background: #eee; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header><div class="logo">stories.view</div></header>
    <div class="stories-bar">
        <div class="story-circle"><div class="story-inner"></div></div>
        <div class="story-circle"><div class="story-inner"></div></div>
        <div class="story-circle"><div class="story-inner"></div></div>
        <div class="story-circle"><div class="story-inner"></div></div>
    </div>
