{% include "header.html" %}
  <main id="main" class="site-main">
    <div class="page-hero">
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      {% if section.description is present %}<p class="page-desc">{{ section.description | e }}</p>{% endif %}
    </div>
    <ul class="section-list">
      {% for p in section.pages %}
      <li>
        <a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a>
      </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
