<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #5a4b41;
            --accent: #ffcc00;
            --ticket: #fff9c4;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #f0f0f0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .ticket-box {
            background: var(--ticket);
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border: 1px solid #e0e0e0;
            position: relative;
            border-left: 10px dashed #fff;
        }
        .ticket-hero h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            color: #444;
        }
        article { margin-top: 40px; }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .serial { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #999; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">ticket.stub</div>
            <nav>
                <a href="/">Admit</a>
                <a href="/about">Venue</a>
            </nav>
        </div>
    </header>
