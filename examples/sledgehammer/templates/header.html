<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --text: #ddd;
            --accent: #555;
            --heavy: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Public Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 15px solid var(--heavy);
        }
        .logo {
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #fff;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .sledge-hero {
            padding: 100px 0;
            background: var(--heavy);
            color: #fff;
            text-align: center;
        }
        .sledge-hero h1 {
            font-size: 10rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
        }
        article {
            padding: 80px 0;
        }
        h2 { font-size: 4rem; font-weight: 900; text-transform: uppercase; border-bottom: 10px solid var(--heavy); padding-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">SLEDGEHAMMER</div>
            <nav>
                <a href="/">Impact</a>
                <a href="/about">Force</a>
            </nav>
        </div>
    </header>
