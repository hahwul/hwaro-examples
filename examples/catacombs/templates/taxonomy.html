{% include "header.html" %}

<header style="margin-bottom: 3rem;">
  <h1 style="margin-top: 0;">Markers</h1>
  <p style="color: rgba(232, 220, 200, 0.7); font-size: 1.05rem; margin-top: 0.75rem;">Ancient symbols carved in stone to guide your journey</p>
</header>

{% if taxonomy_terms %}
<div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
  {% for term in taxonomy_terms %}
  <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="tag-pill" style="font-size: 0.9rem; padding: 0.5rem 1rem;">
    {{ term.name }} <span style="opacity: 0.6;">({{ term.pages | length }})</span>
  </a>
  {% endfor %}
</div>
{% else %}
<p style="color: rgba(232, 220, 200, 0.6); text-align: center; padding: 3rem 0;">No markers found...</p>
{% endif %}

{% include "footer.html" %}
