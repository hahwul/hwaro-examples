<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{{ page.title | default(site.title) }} — {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <style>
    /* ------------------------------------------------------------------ */
    /* Base Reset & Root Variables                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --catacomb-black:  #0a0a0a;
      --bone-white:      #e8dcc8;
      --torch-amber:     #ff9933;
      --moss-olive:      #4a5a3a;
      --stone-gray:      #3a3a3a;
      --shadow-depth:    #050505;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--catacomb-black);
      color: var(--bone-white);
      font-family: 'IM Fell English', serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ------------------------------------------------------------------ */
    /* Stone Wall Texture Background                                      */
    /* ------------------------------------------------------------------ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          rgba(58, 58, 58, 0.03) 1px,
          transparent 2px,
          transparent 80px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          rgba(58, 58, 58, 0.03) 1px,
          transparent 2px,
          transparent 60px
        ),
        radial-gradient(
          ellipse at 20% 30%,
          rgba(58, 58, 58, 0.08) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 80% 70%,
          rgba(58, 58, 58, 0.06) 0%,
          transparent 50%
        );
      background-color: var(--catacomb-black);
      pointer-events: none;
      z-index: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Torch Flicker Lighting System                                      */
    /* ------------------------------------------------------------------ */
    .torch-light {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        circle at center,
        rgba(255, 153, 51, 0.25) 0%,
        rgba(255, 153, 51, 0.12) 30%,
        rgba(255, 153, 51, 0.05) 50%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
      animation: torch-flicker 3s ease-in-out infinite;
    }

    .torch-left {
      top: 100px;
      left: -200px;
      animation-delay: 0s;
    }

    .torch-right {
      top: 150px;
      right: -200px;
      animation-delay: 1.5s;
    }

    @keyframes torch-flicker {
      0%, 100% {
        opacity: 0.9;
        transform: scale(1);
      }
      20% {
        opacity: 0.85;
        transform: scale(1.02);
      }
      40% {
        opacity: 1;
        transform: scale(0.98);
      }
      60% {
        opacity: 0.88;
        transform: scale(1.01);
      }
      80% {
        opacity: 0.95;
        transform: scale(0.99);
      }
    }

    /* ------------------------------------------------------------------ */
    /* Torch Flame Particles                                              */
    /* ------------------------------------------------------------------ */
    .flame-container {
      position: fixed;
      pointer-events: none;
      z-index: 2;
    }

    .flame-left {
      top: 120px;
      left: 20px;
    }

    .flame-right {
      top: 170px;
      right: 20px;
    }

    .flame-particle {
      position: absolute;
      width: 4px;
      height: 8px;
      background: linear-gradient(
        to top,
        rgba(255, 153, 51, 0.8),
        rgba(255, 102, 0, 0.6),
        rgba(255, 69, 0, 0)
      );
      border-radius: 50% 50% 0 0;
      animation: flame-rise linear infinite;
    }

    .flame-particle:nth-child(1) { left: 0px;  animation-duration: 1.2s; animation-delay: 0s; }
    .flame-particle:nth-child(2) { left: 5px;  animation-duration: 1.4s; animation-delay: 0.3s; }
    .flame-particle:nth-child(3) { left: -5px; animation-duration: 1.1s; animation-delay: 0.6s; }
    .flame-particle:nth-child(4) { left: 8px;  animation-duration: 1.3s; animation-delay: 0.9s; }
    .flame-particle:nth-child(5) { left: -8px; animation-duration: 1.5s; animation-delay: 0.2s; }

    @keyframes flame-rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-60px) translateX(calc(var(--random-x, 0) * 1px));
        opacity: 0;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Narrow Passage Layout (max-width극소)                              */
    /* ------------------------------------------------------------------ */
    .passage-container {
      position: relative;
      z-index: 10;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ------------------------------------------------------------------ */
    /* Navigation                                                         */
    /* ------------------------------------------------------------------ */
    .site-nav {
      background-color: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid rgba(255, 153, 51, 0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(5, 5, 5, 0.8);
    }

    .nav-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--torch-amber);
      text-decoration: none;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 153, 51, 0.6),
        0 0 20px rgba(255, 153, 51, 0.3);
      transition: text-shadow 0.3s ease;
    }

    .nav-brand:hover {
      text-shadow:
        0 0 15px rgba(255, 153, 51, 0.9),
        0 0 30px rgba(255, 153, 51, 0.5);
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: rgba(232, 220, 200, 0.7);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .nav-link:hover {
      color: var(--torch-amber);
      text-shadow: 0 0 8px rgba(255, 153, 51, 0.4);
    }

    /* ------------------------------------------------------------------ */
    /* Typography & Headings                                              */
    /* ------------------------------------------------------------------ */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Cinzel', serif;
      color: var(--torch-amber);
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      text-shadow: 0 0 10px rgba(255, 153, 51, 0.3);
      letter-spacing: 0.05em;
    }

    h1 { font-size: 2rem; }
    h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid rgba(255, 153, 51, 0.2);
      padding-bottom: 0.5rem;
    }
    h3 { font-size: 1.25rem; }
    h4 { font-size: 1.1rem; }

    p {
      color: rgba(232, 220, 200, 0.9);
      margin-bottom: 1rem;
      line-height: 1.85;
    }

    a {
      color: var(--torch-amber);
      text-decoration: underline;
      text-decoration-color: rgba(255, 153, 51, 0.3);
      transition: text-decoration-color 0.2s ease, text-shadow 0.2s ease;
    }

    a:hover {
      text-decoration-color: rgba(255, 153, 51, 0.7);
      text-shadow: 0 0 6px rgba(255, 153, 51, 0.3);
    }

    /* ------------------------------------------------------------------ */
    /* Lists                                                              */
    /* ------------------------------------------------------------------ */
    ul, ol {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
      color: rgba(232, 220, 200, 0.85);
    }

    li {
      margin-bottom: 0.5rem;
      line-height: 1.75;
    }

    /* ------------------------------------------------------------------ */
    /* Blockquote (Stone Inscription Style)                               */
    /* ------------------------------------------------------------------ */
    blockquote {
      border-left: 3px solid var(--moss-olive);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: rgba(232, 220, 200, 0.7);
      font-style: italic;
      background-color: rgba(74, 90, 58, 0.05);
      padding: 1rem 1.25rem;
      box-shadow: inset 4px 0 12px rgba(74, 90, 58, 0.15);
    }

    /* ------------------------------------------------------------------ */
    /* Code Blocks                                                        */
    /* ------------------------------------------------------------------ */
    code {
      font-family: 'Courier New', monospace;
      background-color: rgba(58, 58, 58, 0.5);
      border: 1px solid rgba(255, 153, 51, 0.15);
      color: var(--bone-white);
      padding: 0.15em 0.4em;
      border-radius: 2px;
      font-size: 0.9em;
    }

    pre {
      background-color: rgba(10, 10, 10, 0.8);
      border: 1px solid rgba(255, 153, 51, 0.15);
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      border-radius: 3px;
      box-shadow:
        inset 0 0 20px rgba(5, 5, 5, 0.5),
        0 0 10px rgba(255, 153, 51, 0.05);
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Horizontal Rule (Stone Crack)                                      */
    /* ------------------------------------------------------------------ */
    hr {
      border: none;
      border-top: 1px solid rgba(58, 58, 58, 0.6);
      margin: 2.5rem 0;
      box-shadow: 0 1px 3px rgba(5, 5, 5, 0.3);
    }

    /* ------------------------------------------------------------------ */
    /* Tag Pills                                                          */
    /* ------------------------------------------------------------------ */
    .tag-pill {
      display: inline-block;
      background-color: rgba(74, 90, 58, 0.2);
      border: 1px solid rgba(74, 90, 58, 0.4);
      color: var(--moss-olive);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 0.25rem 0.75rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      border-radius: 2px;
      text-decoration: none;
      text-transform: lowercase;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .tag-pill:hover {
      background-color: rgba(74, 90, 58, 0.3);
      border-color: rgba(74, 90, 58, 0.7);
    }

    /* ------------------------------------------------------------------ */
    /* Post Cards                                                         */
    /* ------------------------------------------------------------------ */
    .post-card {
      background-color: rgba(58, 58, 58, 0.15);
      border: 1px solid rgba(255, 153, 51, 0.1);
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-radius: 3px;
      box-shadow:
        0 2px 20px rgba(5, 5, 5, 0.5),
        inset 0 0 30px rgba(5, 5, 5, 0.3);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .post-card:hover {
      border-color: rgba(255, 153, 51, 0.25);
      box-shadow:
        0 4px 30px rgba(5, 5, 5, 0.7),
        0 0 20px rgba(255, 153, 51, 0.05),
        inset 0 0 30px rgba(5, 5, 5, 0.3);
    }

    .post-meta {
      font-size: 0.85rem;
      color: rgba(232, 220, 200, 0.5);
      margin-bottom: 0.75rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
    }

    .post-title {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      margin-top: 0;
    }

    .post-title a {
      color: var(--torch-amber);
      text-decoration: none;
    }

    .post-title a:hover {
      text-shadow: 0 0 12px rgba(255, 153, 51, 0.5);
    }

    /* ------------------------------------------------------------------ */
    /* Scrollbar                                                          */
    /* ------------------------------------------------------------------ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background-color: var(--catacomb-black);
    }

    ::-webkit-scrollbar-thumb {
      background-color: rgba(255, 153, 51, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 153, 51, 0.5);
    }

    /* ------------------------------------------------------------------ */
    /* Content Container                                                  */
    /* ------------------------------------------------------------------ */
    .content-wrapper {
      padding: 3rem 0;
      min-height: calc(100vh - 60px);
    }

    /* ------------------------------------------------------------------ */
    /* Reading Time & Word Count                                          */
    /* ------------------------------------------------------------------ */
    .reading-info {
      font-size: 0.8rem;
      color: rgba(232, 220, 200, 0.4);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
    }

    /* ------------------------------------------------------------------ */
    /* Pagination                                                         */
    /* ------------------------------------------------------------------ */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 3rem 0;
    }

    .pagination-link {
      background-color: rgba(58, 58, 58, 0.3);
      border: 1px solid rgba(255, 153, 51, 0.2);
      color: var(--bone-white);
      padding: 0.5rem 1rem;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .pagination-link:hover {
      background-color: rgba(58, 58, 58, 0.5);
      border-color: rgba(255, 153, 51, 0.4);
    }

    .pagination-link.active {
      background-color: rgba(255, 153, 51, 0.2);
      border-color: var(--torch-amber);
      color: var(--torch-amber);
    }
  </style>
</head>
<body>

  <!-- Torch light effects -->
  <div class="torch-light torch-left" aria-hidden="true"></div>
  <div class="torch-light torch-right" aria-hidden="true"></div>

  <!-- Flame particles -->
  <div class="flame-container flame-left" aria-hidden="true">
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
  </div>
  <div class="flame-container flame-right" aria-hidden="true">
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
    <div class="flame-particle"></div>
  </div>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ base_url }}/" class="nav-brand">Catacombs</a>
      <div class="nav-links">
        <a href="{{ base_url }}/posts/" class="nav-link">Chronicles</a>
        <a href="{{ base_url }}/tags/" class="nav-link">Markers</a>
      </div>
    </div>
  </nav>

  <!-- Main content wrapper -->
  <div class="content-wrapper">
    <div class="passage-container">
