{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_name | capitalize }}</h1>

  <ul class="section-list">
    {% for term in taxonomy_terms %}
      <li>
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | urlencode }}/">
          {{ term }}
        </a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
