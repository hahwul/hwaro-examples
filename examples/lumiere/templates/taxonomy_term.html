{% extends "base.html" %}

{% block content %}
  <h1>{{ taxonomy_name | capitalize }}: {{ term }}</h1>

  <ul class="section-list">
    {% for page in taxonomy_pages %}
      <li>
        <a href="{{ base_url }}{{ page.permalink }}">
          {{ page.title | e }}
        </a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
