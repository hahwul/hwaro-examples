<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="{{ site.description }}">
  <title>{{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="mesh-bg" aria-hidden="true"></div>

  <div id="home-spotlight">
    <div id="home-center">
      <h1 id="home-title">{{ site.title }}</h1>
      <div class="mesh-divider"></div>
      <p id="home-subtitle">{{ site.description }}</p>

      <div id="home-posts">
        {% for post in site.pages %}
        {% if post.section == "posts" %}
        <a class="home-post-card" href="{{ base_url }}{{ post.url }}">
          <span class="home-post-date">{{ post.date }}</span>
          <span class="home-post-title">{{ post.title }}</span>
        </a>
        {% endif %}
        {% endfor %}
      </div>

      <nav id="home-nav">
        <a href="{{ base_url }}/posts/">All Posts</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>

    <div id="home-footer">
      <p>&copy; 2026 <a href="{{ base_url }}/">{{ site.title }}</a>
        &#183; <a href="{{ base_url }}/rss.xml" target="_blank" title="RSS">RSS</a>
      </p>
      <p>Powered by <a href="https://github.com/hahwul/hwaro" target="_blank" rel="noopener">Hwaro</a></p>
    </div>
  </div>
</body>
</html>
