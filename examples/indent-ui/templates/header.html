<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #333;
            --accent: #4a5568;
            --shadow: rgba(0,0,0,0.05);
            --highlight: rgba(255,255,255,0.8);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .indent-hero {
            padding: 80px 0;
            background: var(--bg);
            border-radius: 40px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: inset 10px 10px 30px var(--shadow), inset -10px -10px 30px var(--highlight);
        }
        .indent-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
        }
        h2 { font-weight: 600; font-size: 2rem; color: var(--accent); margin-top: 0; }
        .meta-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #adb5bd; border: 1px solid #ddd; padding: 2px 10px; border-radius: 50px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">indent.ui</div>
            <nav>
                <a href="/">Recess</a>
                <a href="/about">Depth</a>
            </nav>
        </div>
    </header>
