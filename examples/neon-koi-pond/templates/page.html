{% include "header.html" %}

<article class="glass-panel">
  <h1>{{ page.title }}</h1>

  {% if page.date %}
  <div class="post-meta">
    <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
    {% if page.taxonomies is defined and page.taxonomies.tags %}
    <span class="tags">
      {% for tag in page.taxonomies.tags %}
      #{{ tag }}
      {% endfor %}
    </span>
    {% endif %}
  </div>
  {% endif %}

  <div class="content">
    {{ content | safe }}
  </div>
</article>

{% include "footer.html" %}
