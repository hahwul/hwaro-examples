<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f8f8;
            --text: #1a1a1a;
            --accent: #555;
            --cube: #fff;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .cube-surface {
            background: var(--cube);
            padding: 100px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 100px;
            border: 1px solid #eee;
            text-align: center;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">white.cube</div>
            <nav>
                <a href="/">Exhibition</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
