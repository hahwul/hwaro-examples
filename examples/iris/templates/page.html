{% include "header.html" %}
  <main id="main" class="site-main">
  {% if page.extra.path %}
    <article class="study-page">
      <header class="study-head">
        <p class="eyebrow">figure study</p>
        <h1 class="study-title">{{ page.title | e | lower }}</h1>
      </header>

      <figure class="stage">
        <div class="frame frame-lg">
          <svg class="line" viewBox="{{ page.extra.viewbox | default('0 0 300 400') }}" role="img"
               aria-label="single-line study: {{ page.title | e | lower }}" preserveAspectRatio="xMidYMid meet">
            <path d="{{ page.extra.path }}" fill="none" stroke="currentColor" stroke-width="1.4"
                  stroke-linecap="round" stroke-linejoin="round" pathLength="100" class="stroke"/>
          </svg>
        </div>
        <figcaption class="plate plate-lg">
          <span class="plate-len"><span class="num">{{ page.extra.length }}</span> units · one continuous path</span>
          <span class="plate-meta">
            {% if page.extra.medium %}{{ page.extra.medium }}{% endif %}
            {% if page.date %} · {{ page.date | date("%B %Y") }}{% endif %}
          </span>
        </figcaption>
      </figure>

      <div class="prose">{{ content }}</div>
    </article>
  {% else %}
    <article class="doc">
      {% if page.title is present %}<h1 class="doc-title">{{ page.title | e | lower }}</h1>{% endif %}
      <div class="prose">{{ content }}</div>
    </article>
  {% endif %}
  </main>
{% include "footer.html" %}
