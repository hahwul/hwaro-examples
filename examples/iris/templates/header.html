<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">skip to content</a>
  <div class="wall">
    <header class="masthead">
      <a href="{{ base_url }}/" class="signature" aria-label="Iris — home">
        <span class="signature-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="20" height="20" focusable="false">
            <path d="M16 6 C10 8 8 14 11 19 C14 24 22 24 24 18 C26 12 20 6 16 8 C13 9 12 14 16 16 C20 18 20 24 16 26"
                  fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="signature-name">iris</span>
      </a>
      <nav class="rail" aria-label="Primary">
        <a href="{{ base_url }}/figures/">figures</a>
        <a href="{{ base_url }}/colophon/">colophon</a>
      </nav>
    </header>
