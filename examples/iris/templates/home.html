{% include "header.html" %}
  <main id="main" class="site-main home">
    <section class="lede">
      <h1 class="lede-title">single-line<br>figure studies</h1>
      <div class="lede-body">{{ content }}</div>
    </section>

    {% set figures = get_section(path="figures/_index.md") %}
    <section class="grid" aria-label="Figure studies">
      {% for p in figures.pages %}
      <article class="study">
        <a class="frame" href="{{ base_url }}{{ p.url }}">
          <svg class="line" viewBox="{{ p.extra.viewbox | default('0 0 300 400') }}" role="img"
               aria-label="single-line study: {{ p.title | e | lower }}" preserveAspectRatio="xMidYMid meet">
            <path d="{{ p.extra.path }}" fill="none" stroke="currentColor" stroke-width="1.4"
                  stroke-linecap="round" stroke-linejoin="round" pathLength="100" class="stroke"/>
          </svg>
        </a>
        <figcaption class="plate">
          <a class="plate-title" href="{{ base_url }}{{ p.url }}">{{ p.title | lower }}</a>
          <span class="plate-len"><span class="num">{{ p.extra.length }}</span> units · one continuous path</span>
        </figcaption>
      </article>
      {% endfor %}
    </section>
  </main>
{% include "footer.html" %}
