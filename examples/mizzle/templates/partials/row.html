<li class="entry-row spread">
  <div class="gutter entry-gutter">
    {% if p.date %}<time class="entry-date" datetime="{{ p.date | date("%Y-%m-%d") }}">{{ p.date | date("%d %b %Y") }}</time>{% endif %}
    {% if p.extra.season %}<span class="entry-season">{{ p.extra.season }}</span>{% endif %}
  </div>
  <div class="bodyside entry-body">
    <a class="entry-link" href="{{ base_url }}{{ p.url }}"><span class="entry-title">{{ p.title }}</span></a>
    {% if p.extra.temae %}<p class="entry-temae"><span class="label">Temae</span> {{ p.extra.temae }}</p>{% endif %}
    {% if p.summary %}<p class="entry-summary">{{ p.summary | strip_html | truncate_words(26) }}</p>{% endif %}
  </div>
</li>
