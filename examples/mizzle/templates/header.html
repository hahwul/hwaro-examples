<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="column">
    <div class="rule" aria-hidden="true"></div>
    <header class="masthead spread">
      <div class="gutter masthead-gutter">
        <span class="brush" lang="ja" title="sei — stillness">静</span>
      </div>
      <div class="bodyside masthead-body">
        <a class="wordmark" href="{{ base_url }}/">Mizzle</a>
        <p class="wordmark-sub">A slow journal of tea ceremony practice &mdash; temae, utensils, and the sweets of each season.</p>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/sessions/">Sessions</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
          <a href="{{ base_url }}/search/">Search</a>
        </nav>
      </div>
    </header>
