{% include "header.html" %}
    <main id="main">
      <header class="page-head spread">
        <div class="gutter"><span class="brush-small" aria-hidden="true">&#10087;</span></div>
        <div class="bodyside">
          <p class="kicker">Find a session</p>
          <h1 class="page-title">{{ page.title | e }}</h1>
          <div class="page-intro prose-note">{{ content | safe }}</div>
        </div>
      </header>
      <div class="search-panel bodycol">
        <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
          <label class="search-label" for="search-input">Search the journal</label>
          <input class="search-input" id="search-input" type="search" name="q" placeholder="fukusa, koicha, the first snow&hellip;" autocomplete="off" autofocus>
        </form>
        <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
        <ol class="results" id="search-results"></ol>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
      <script src="{{ base_url }}/js/search.js"></script>
    </main>
{% include "footer.html" %}
