{% extends "base.html" %}

{% block content %}
  <div class="error-page" style="text-align: center; padding: 4rem 0;">
    <h1 style="font-size: 5rem; margin-bottom: 0; background: linear-gradient(90deg, var(--color-cyan), var(--color-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2>Page Not Found</h2>
    <p>The signal was lost in the void. Let's get you back to safety.</p>
    <a href="{{ base_url }}/" style="display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem; border: 1px solid var(--color-cyan); border-radius: 8px; color: var(--color-cyan); font-weight: 500; transition: all 0.3s ease;">Return Home</a>
  </div>
{% endblock %}
