<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}A dark glassmorphism synth bloom site.{% endif %}">
  <title>{% if page is defined and page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  {{ og_all_tags }}
  {{ hreflang_tags }}

  <style>
    :root {
      --bg-color: #05020a;
      --text-main: #f0f0f5;
      --text-muted: #a0a0b5;
      --glass-bg: rgba(20, 15, 30, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);

      --color-cyan: #00f0ff;
      --color-pink: #ff007f;
      --color-purple: #8a2be2;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background animated blooms */
    .bloom-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bloom {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }

    .bloom-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--color-pink) 0%, transparent 70%);
      animation-delay: 0s;
    }

    .bloom-2 {
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--color-cyan) 0%, transparent 70%);
      animation-delay: -5s;
    }

    .bloom-3 {
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--color-purple) 0%, transparent 70%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(5%, 5%) scale(1.1); }
      100% { transform: translate(-5%, 10%) scale(0.9); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--glass-shadow);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding: 1.5rem 2rem;
    }

    .site-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--color-cyan), var(--color-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .site-nav a:hover {
      color: var(--color-cyan);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }

    .site-main {
      flex: 1;
      margin-bottom: 3rem;
    }

    .site-footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: auto;
    }

    /* Typography within content */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    h1 { font-size: 2.5rem; line-height: 1.2; }
    h2 { font-size: 1.8rem; }

    a {
      color: var(--color-pink);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: var(--color-cyan);
      text-decoration: underline;
    }

    p {
      margin-bottom: 1.5rem;
      font-weight: 300;
    }

    code {
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--color-cyan);
    }

    pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    pre code {
      background: none;
      padding: 0;
      color: var(--text-main);
    }

    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 2rem 0;
    }

    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    blockquote {
      border-left: 4px solid var(--color-purple);
      margin: 0;
      padding: 1rem 1.5rem;
      background: rgba(138, 43, 226, 0.05);
      border-radius: 0 8px 8px 0;
      font-style: italic;
    }

    /* Pages list */
    .page-list {
      list-style: none;
      padding: 0;
    }

    .page-item {
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .page-item:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(0, 240, 255, 0.3);
    }

    .page-item a {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
      color: #fff;
      display: block;
      margin-bottom: 0.5rem;
    }

    .page-item a:hover {
      color: var(--color-cyan);
      text-decoration: none;
    }

    .page-summary {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin: 0;
    }

    @media (max-width: 768px) {
      .site-wrapper { padding: 1rem; }
      .site-header { flex-direction: column; gap: 1rem; padding: 1.5rem; text-align: center; }
      .glass-panel { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="bloom-container">
    <div class="bloom bloom-1"></div>
    <div class="bloom bloom-2"></div>
    <div class="bloom bloom-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main glass-panel">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer glass-panel">
      <p>&copy; {{ site.title }}. Built with <a href="https://hwaro.hahwul.com" target="_blank">Hwaro</a>.</p>
    </footer>
  </div>
</body>
</html>
