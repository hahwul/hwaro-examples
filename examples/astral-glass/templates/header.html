<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap');

    :root {
      --space-bg: #050510;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-highlight: rgba(255, 255, 255, 0.2);
      --accent: #00f0ff;
      --accent-glow: rgba(0, 240, 255, 0.5);
      --text-main: #e0e6ed;
      --text-muted: #8b9bb4;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text-main);
      background-color: var(--space-bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      margin: 2rem 0;
    }

    .site-logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .site-header nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-header nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }

    .site-header nav a:hover {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }

    .site-main {
      min-height: calc(100vh - 250px);
      padding-bottom: 3rem;
    }

    /* Footer */
    .site-footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--glass-border);
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Orbitron', sans-serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.8em;
      color: #fff;
      font-weight: 400;
      letter-spacing: 1px;
    }

    h1 { font-size: 2.2rem; margin-top: 0; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
    h2 { font-size: 1.6rem; color: var(--accent); }
    h3 { font-size: 1.2rem; }
    p { margin: 1em 0; }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: text-shadow 0.2s;
    }

    a:hover {
      text-shadow: 0 0 8px var(--accent-glow);
    }

    code {
      background: rgba(255,255,255,0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: ui-monospace, Consolas, monospace;
      color: #fff;
    }

    pre {
      background: rgba(0,0,0,0.5);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* Content Area */
    .glass-card {
      padding: 2.5rem;
      margin-bottom: 2rem;
    }

    /* Section Lists */
    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
      display: grid;
      gap: 1.5rem;
    }

    ul.section-list li {
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    ul.section-list li:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--glass-highlight);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    ul.section-list li a {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: #fff;
    }

    /* Pagination */
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
      color: var(--text-main);
      text-decoration: none;
      transition: all 0.2s;
    }
    nav.pagination a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,240,255,0.05);
    }
    .pagination-current span {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,240,255,0.1);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .pagination-disabled span {
      opacity: 0.3;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      .glass-card { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <!-- Star overlay effect -->
  <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 160px 120px, #fff, rgba(0,0,0,0));background-repeat:repeat;background-size:200px 200px;opacity:0.3;"></div>

  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
