<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root { --bg: #121212; --text: #e0e0e0; --accent: #a9a9a9; --border: #333333; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 2rem 0; border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: var(--text); letter-spacing: 1px; }
    nav a { color: var(--accent); text-decoration: none; margin-left: 1.5rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; transition: color 0.3s; }
    nav a:hover { color: var(--text); }
    main { padding: 4rem 0; min-height: 60vh; }
    h1, h2, h3 { color: #ffffff; font-weight: 300; margin-bottom: 1rem; }
    a { color: var(--accent); }
    a:hover { color: #ffffff; }
  </style>
  {{ highlight_tags | safe }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
