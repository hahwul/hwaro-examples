{% include "header.html" %}
<h1>{{ page.title | e }}</h1>
<div class="content">
  {{ content | safe }}
</div>
<div class="post-grid">
  {% for p in section.pages %}
  <div class="card">
    <a href="{{ p.url }}">{{ p.title | e }}</a>
    <p>{{ p.description | e }}</p>
  </div>
  {% endfor %}
</div>
{% include "footer.html" %}
