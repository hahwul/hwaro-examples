{% include "header.html" %}
{% include "partials/nav.html" %}
{% include "partials/search.html" %}
<div class="blog-container">
  <main class="blog-main">
    <article class="post binding">
      <header class="post-header">
        <h1>{{ page.title | e }}</h1>
        <div class="post-meta">
          <time datetime="{{ page.date }}">{{ page.date }}</time>
          {% if page.tags %}<span class="stitch">—</span>{% for tag in page.tags %}<a href="{{ base_url }}/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>{% endfor %}{% endif %}
        </div>
      </header>
      <div class="post-content page-surface">
        {{ content | safe }}
        <div class="vein"></div>
      </div>
    </article>
{% include "footer.html" %}
