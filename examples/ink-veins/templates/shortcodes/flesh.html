{# A quote written directly onto living tissue #}
{# Usage example: flesh(quote=...) — see source for correct invocation #}
<blockquote style="font-style:italic; border-color:var(--blood-wet);">
  {{ quote | default(body) | e }}
  <span style="display:block; margin-top:0.6rem; font-size:0.7rem; opacity:0.55; letter-spacing:0.08em;">— written in situ</span>
</blockquote>
