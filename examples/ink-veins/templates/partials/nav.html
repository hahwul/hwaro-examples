<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}{{ lang_prefix }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}{{ lang_prefix }}/posts/">Chapters</a>
      <a href="{{ base_url }}{{ lang_prefix }}/archives/">The Index</a>
      <a href="{{ base_url }}{{ lang_prefix }}/about/">The Author</a>
    </nav>
    <div class="header-right">
      {% if page.translations | length > 0 %}
      <nav class="lang-switcher" aria-label="Language">
        {% for t in page.translations %}
        <a href="{{ t.url }}" hreflang="{{ t.code }}"{% if t.is_current %} aria-current="true"{% endif %}>{{ t.code | upper }}</a>
        {% endfor %}
      </nav>
      {% endif %}
      <button class="search-trigger" onclick="openSearch()" title="Search the manuscript">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
        <kbd>&#8984;K</kbd>
      </button>
    </div>
  </div>
  <div class="ink-vein-accent"></div>
</header>
