{% include "header.html" %}

<div class="endpoint-desc" style="width: 100%; max-width: 1000px; margin: 0 auto;">
  <h1>{{ section.title | default("API Documentation") }}</h1>
  {% if section.description %}
    <p style="font-size: 1.2rem; color: #4b5563;">{{ section.description }}</p>
  {% endif %}

  {{ content | safe }}

  <div style="margin-top: 3rem;">
    <h2>Endpoints</h2>
    <div style="display: grid; gap: 1rem;">
      {% for p in site.pages %}
        <a href="{{ base_url }}{{ p.url }}" style="display: block; padding: 1.5rem; border: 1px solid #e5e7eb; border-radius: 8px; color: inherit; text-decoration: none; transition: box-shadow 0.2s;">
          <h3 style="margin-top: 0; margin-bottom: 0.5rem; color: #111827;">
            {{ p.title }}
          </h3>
          <p style="margin-top: 0.5rem; color: #4b5563;">{{ p.description }}</p>
        </a>
      {% endfor %}
    </div>
  </div>
</div>

{% include "footer.html" %}
