{% include "header.html" %}
  <h1 class="text-2xl font-bold text-forge-text mb-6">{{ taxonomy_name | title }}</h1>
  <div class="flex flex-wrap gap-2">
    {% for term in taxonomy_terms %}
    <a href="{{ base_url }}{{ term.url }}" class="px-3 py-1.5 bg-forge-surface border border-forge-border rounded text-sm text-forge-muted hover:text-forge-orange hover:border-forge-orange/30 transition-all">
      {{ term.name }} ({{ term.pages | length }})
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
