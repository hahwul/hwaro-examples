{% include "header.html" %}
  <h1 class="text-2xl font-bold text-forge-text mb-6">{{ taxonomy_term }}</h1>
  <div class="space-y-3">
    {% for page in taxonomy_pages %}
    <a href="{{ base_url }}{{ page.url }}" class="block p-4 bg-forge-surface border border-forge-border rounded hover:border-forge-orange/30 transition-all">
      <h2 class="font-medium text-forge-text">{{ page.title }}</h2>
      {% if page.description %}<p class="text-sm text-forge-muted mt-1">{{ page.description }}</p>{% endif %}
    </a>
    {% endfor %}
  </div>
{% include "footer.html" %}
