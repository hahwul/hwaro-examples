<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf7; --text: #333; --accent: #ff4500; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; border: 2px solid #000; box-shadow: 10px 10px 0 #000; background: #fff; margin-top: 40px; }
        header { border-bottom: 4px solid #000; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; text-transform: uppercase; color: var(--accent); }
        .status { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--accent); padding: 5px 10px; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">manual.override</div><div class="status">BYPASSED</div></header>
