<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #555; }
        body { background-color: #f8f9fa; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; text-align: center; }
        .logo { font-family: 'IBM Plex Mono'; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 5px; }
        .theodolite-surface { background: #fff; border: 1px solid #ddd; padding: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative; }
        .coordinate { font-family: 'IBM Plex Mono'; font-size: 0.7rem; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">theodolite.ref</div></header>
