<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Terracotta Studio Palette */
      --primary: #c46a4f;      /* Terracotta */
      --primary-hover: #a35640;
      --secondary: #d68c74;    /* Lighter clay */
      --bg: #f9f6f0;           /* Warm off-white */
      --bg-alt: #f0e9e1;       /* Light stone */
      --text: #3d3532;         /* Dark espresso brown */
      --text-muted: #6b605c;
      --border: #e3d8cd;

      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-weight: 300;
      /* Subtle noise texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* Layout */
    .site-wrapper { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      margin-bottom: 2rem;
    }

    .site-logo {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-header nav { display: flex; gap: 2rem; }

    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover { color: var(--primary); }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Typography */
    h1, h2, h3, h4, h5 {
      font-family: var(--font-serif);
      line-height: 1.2;
      margin-top: 2em;
      margin-bottom: 0.5em;
      font-weight: 400;
      color: var(--text);
    }

    h1 { font-size: 3.5rem; margin-top: 1rem; margin-bottom: 1.5rem; }
    h2 { font-size: 2.2rem; }
    h3 { font-size: 1.5rem; }

    p { margin: 1.2em 0; font-size: 1.1rem; }

    a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--primary-hover); }

    /* Hero Section Specifics */
    .hero {
      text-align: center;
      padding: 4rem 0 6rem;
      border-bottom: 1px solid var(--border);
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background-color: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
      border-radius: 2px;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .btn:hover {
      background-color: var(--primary-hover);
      color: #fff;
      transform: translateY(-2px);
    }

    /* Services Grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      margin: 4rem 0;
    }

    .service-card {
      background: var(--bg-alt);
      padding: 2.5rem;
      border-radius: 4px;
      text-align: center;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(196, 106, 79, 0.05);
    }

    .service-card:hover {
      transform: translateY(-5px);
    }

    .service-icon {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
      font-family: var(--font-serif);
      font-style: italic;
    }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: var(--bg-alt);
      border-radius: 4px;
    }
    ul.section-list li a { font-weight: 500; font-family: var(--font-serif); font-size: 1.2rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1rem; }
      h1 { font-size: 2.5rem; }
      .hero { padding: 2rem 0 3rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">Terracotta</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">Studio</a>
        <a href="{{ base_url }}/services/">Services</a>
      </nav>
    </header>
