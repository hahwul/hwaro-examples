<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff0000;
            --grid: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            line-height: 1.6;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
            background: white;
        }
        header {
            padding: 40px 0;
            border-bottom: 2px solid var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .seismo-hero {
            padding: 100px 0;
            text-align: left;
            position: relative;
        }
        .oscillation {
            width: 100%;
            height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="100"><path d="M0 50 L50 50 L60 20 L70 80 L80 50 L150 50 L160 10 L170 90 L180 50 L300 50 L310 30 L320 70 L330 50 L1000 50" fill="none" stroke="red" stroke-width="2"/></svg>');
            background-repeat: repeat-x;
            margin-bottom: 40px;
        }
        .seismo-hero h1 {
            font-size: 5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }
        article { padding: 60px 0; }
        h2 { font-size: 2rem; border-top: 2px solid var(--text); padding-top: 10px; margin-top: 60px; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
        }
        .data-table td, .data-table th {
            border: 1px solid var(--grid);
            padding: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">SEISMO//GRAPH</div>
            <nav>
                <a href="/">Realtime</a>
                <a href="/about">History</a>
            </nav>
        </div>
    </header>
