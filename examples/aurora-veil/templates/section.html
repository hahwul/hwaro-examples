{% include "header.html" %}
  <main class="site-main glass-panel">
    {{ content | safe }}
    <ul class="section-list" style="list-style: none; padding: 0;">
      {% for p in pages %}
        <li style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);">
          <h2 style="margin: 0;"><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
          {% if p.description %}<p style="margin: 0.5rem 0 0; opacity: 0.8;">{{ p.description | e }}</p>{% endif %}
        </li>
      {% endfor %}
    </ul>
  </main>
{% include "footer.html" %}
