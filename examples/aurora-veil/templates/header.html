<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0f111a;
      --text: #e2e8f0;
      --accent: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.6);
      --glass-bg: rgba(25, 28, 41, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 255, 204, 0.15), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 255, 0.15), transparent 40%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); text-decoration: none; transition: text-shadow 0.3s; }
    a:hover { text-shadow: 0 0 8px var(--accent-glow); }
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      box-sizing: border-box;
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-logo {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(45deg, #00ffcc, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(0, 255, 204, 0.4));
    }
    nav { display: flex; gap: 1.5rem; }
    nav a {
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .site-main { flex-grow: 1; }
    .site-footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.8rem;
      opacity: 0.6;
      border-top: 1px solid var(--glass-border);
      margin-top: auto;
    }
    h1, h2, h3 { font-weight: 300; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </header>
