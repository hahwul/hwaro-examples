{% include "header.html" %}
<main class="site-main glass-panel">
  <h1>Pages tagged with "{{ page.title | e }}"</h1>
  <ul class="section-list" style="list-style: none; padding: 0;">
    {% for p in pages %}
      <li style="margin-bottom: 0.5rem;">
        <a href="{{ p.url }}">{{ p.title | e }}</a>
      </li>
    {% endfor %}
  </ul>
</main>
