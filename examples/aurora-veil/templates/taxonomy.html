{% include "header.html" %}
<main class="site-main glass-panel">
  <h1>{{ page.title | e }}</h1>
  <ul class="section-list" style="list-style: none; padding: 0;">
    {% for term in taxonomy_terms %}
      <li style="margin-bottom: 0.5rem;">
        <a href="{{ term.url }}">{{ term.name | e }}</a> ({{ term.pages | length }})
      </li>
    {% endfor %}
  </ul>
</main>
{% include "footer.html" %}
