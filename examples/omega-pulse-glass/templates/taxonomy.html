{% extends "base.html" %}

{% block title %}Taxonomies - {{ site.title }}{% endblock %}

{% block content %}
<main class="site-main">
  <div class="glass-panel">
    <h1>Taxonomies</h1>
    {% if taxonomy is defined %}
      <ul class="section-list">
        {% for name, terms in taxonomy %}
          <li><a href="/{{ name }}/">{{ name | capitalize }} ({{ terms | length }})</a></li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
</main>
{% endblock %}
