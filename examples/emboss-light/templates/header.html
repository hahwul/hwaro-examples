<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f0f0;
            --text: #444;
            --accent: #888;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .emboss-hero {
            padding: 80px 0;
            background: var(--bg);
            border-radius: 40px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
        }
        .emboss-hero h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
        }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: inset 5px 5px 15px var(--shadow), inset -5px -5px 15px var(--highlight);
        }
        h2 { font-weight: 700; font-size: 2rem; color: var(--text); margin-top: 0; }
        .data-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #999; margin-bottom: 20px; display: block; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">emboss.light</div>
            <nav>
                <a href="/">Relief</a>
                <a href="/about">Shadow</a>
            </nav>
        </div>
    </header>
