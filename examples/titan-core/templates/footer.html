<script>function initTitan(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/22);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},30)});console.log('%c[TITAN] The machine god awakens. Bow before the core.','color:#b45309')}addEventListener('load',initTitan)</script></body></html>
