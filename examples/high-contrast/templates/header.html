<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --accent: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; }
        header { text-align: center; padding: 60px 0; border-bottom: 2px solid #fff; }
        .logo { font-weight: 800; font-size: 2rem; text-transform: uppercase; letter-spacing: 10px; }
        .contrast-surface { background: #fff; color: #000; padding: 80px; margin-top: 60px; }
        h2 { font-weight: 800; font-size: 3rem; margin-top: 0; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">high.contrast</div></header>
