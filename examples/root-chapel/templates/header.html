<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  {{ highlight_css }}
  {{ math_tags }}
  {{ mermaid_tags }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default('chapel') }}">
  <!-- The Root Canvas: subtle branching invasion that grows slowly -->
  <canvas id="root-canvas" aria-hidden="true" style="position:fixed;inset:0;z-index:-1;opacity:0.13;pointer-events:none;"></canvas>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">The Nave</a>
        <a href="{{ base_url }}/testimonies/">Sermons</a>
        <a href="{{ base_url }}/tags/">Witnesses</a>
        <a href="{{ base_url }}/about/">The Hollow</a>
      </nav>
    </header>
