{% include "header.html" %}
  <main class="site-main">
    {% if page.title is present %}
      <h1>{{ page.title | e }}</h1>
    {% endif %}

    {# Root system decoration at top of pages #}
    <div class="root-system" aria-hidden="true">
      <span class="branch"></span>
      <span class="branch"></span>
      <span class="branch"></span>
    </div>

    {{ content | safe }}

    {# Quiet closing root at the end of every page #}
    <div class="root-system growing-root" aria-hidden="true" style="margin-top:2.8rem;opacity:0.22;"></div>
  </main>
{% include "footer.html" %}
