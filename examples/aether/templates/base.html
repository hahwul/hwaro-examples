<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #8cb4ff;
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: #2a2a2e;
      --bg: #0a0a0c;
      --bg-subtle: #121214;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .site-logo { font-weight: 600; font-size: 1.25rem; color: var(--text); text-decoration: none; }
    .site-logo:hover { color: var(--primary); text-shadow: 0 0 8px rgba(140, 180, 255, 0.6); }
    .site-header nav { display: flex; gap: 1.25rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
    .site-header nav a:hover { color: var(--primary); text-shadow: 0 0 8px rgba(140, 180, 255, 0.6); }
    .site-main { min-height: calc(100vh - 200px); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; }
    h1, h2, h3 { line-height: 1.3; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-shadow: 0 0 8px rgba(140, 180, 255, 0.6); }
    code { background: var(--bg-subtle); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, monospace; }
    pre { background: var(--bg-subtle); padding: 1rem; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }

    .glowing-card { background: var(--bg-subtle); border: 1px solid var(--border); box-shadow: 0 0 15px rgba(140, 180, 255, 0.1); border-radius: 8px; padding: 1.5rem; transition: box-shadow 0.3s; margin-bottom: 1rem; }
    .glowing-card:hover { box-shadow: 0 0 25px rgba(140, 180, 255, 0.3); }

    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li { margin-bottom: 0.5rem; padding: 0.6rem 0.75rem; background: var(--bg-subtle); border-radius: 6px; border: 1px solid var(--border); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/posts/">Blog</a>
      </nav>
    </header>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <p>Powered by Hwaro | Aether Theme</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
