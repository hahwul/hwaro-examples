{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <svg class="corner" width="160" height="160" viewBox="0 0 160 160" fill="none" aria-hidden="true">
    <g stroke="#1d2535" stroke-width="1" fill="none">
      <rect x="60" y="20" width="40" height="40"/>
      <rect x="105" y="20" width="40" height="40"/>
      <rect x="60" y="65" width="40" height="40"/>
      <rect x="105" y="65" width="40" height="40"/>
    </g>
    <circle cx="120" cy="65" r="5" fill="#9ae5d8"/>
  </svg>
  <div class="eyebrow">Index</div>
  <h1>{{ page.title | e }}</h1>
  <p class="lead">Browse all terms in this taxonomy.</p>
</header>

<div class="content-body">
  {{ content | safe }}
</div>
{% endblock %}
