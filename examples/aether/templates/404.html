{% extends "base.html" %}
{% block content %}
<section style="text-align:center;padding:4rem 0;">
  <svg width="220" height="220" viewBox="0 0 220 220" fill="none" aria-hidden="true" style="margin-bottom:1rem;">
    <g stroke="#1d2535" stroke-width="1" fill="none">
      <circle cx="110" cy="110" r="100"/>
      <circle cx="110" cy="110" r="78"/>
      <circle cx="110" cy="110" r="56"/>
      <circle cx="110" cy="110" r="34"/>
    </g>
    <circle cx="110" cy="110" r="14" fill="#f4c780"/>
    <g stroke="#a3c7ff" stroke-width="1" fill="none">
      <path d="M10,110 Q 110,40 210,110"/>
      <path d="M10,140 Q 110,70 210,140"/>
    </g>
  </svg>
  <div class="eyebrow" style="justify-content:center;">Off the map</div>
  <h1 style="font-family:'Fraunces',serif;font-size:5rem;font-weight:400;font-style:italic;color:var(--sky);margin:0;">404</h1>
  <h2 style="font-size:1.6rem;font-weight:500;margin:0.5rem 0 1rem;">This horizon is empty</h2>
  <p style="color:var(--muted);max-width:480px;margin:0 auto 2rem;">The page you sought has drifted out of view. Return to clearer air.</p>
  <a href="{{ base_url }}/" class="btn btn-solid">Return home</a>
</section>
{% endblock %}
