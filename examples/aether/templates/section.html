{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <svg class="corner" width="160" height="160" viewBox="0 0 160 160" fill="none" aria-hidden="true">
    <g stroke="#1d2535" stroke-width="1" fill="none">
      <path d="M-10,80 Q 40,30 90,80 T 180,80"/>
      <path d="M-10,100 Q 40,50 90,100 T 180,100"/>
      <path d="M-10,120 Q 40,70 90,120 T 180,120"/>
    </g>
    <circle cx="120" cy="40" r="6" fill="#a3c7ff"/>
  </svg>
  <div class="eyebrow">Archive</div>
  <h1>{{ page.title | e }}</h1>
  {% if page.description is defined and page.description %}<p class="lead">{{ page.description | e }}</p>{% endif %}
</header>

{% if content %}<div class="content-body" style="margin-bottom:2.5rem;font-size:1.05rem;">{{ content | safe }}</div>{% endif %}

<ul class="section-list">
  {{ section.list }}
</ul>

{{ pagination }}
{% endblock %}
