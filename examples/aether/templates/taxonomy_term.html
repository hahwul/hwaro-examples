{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <svg class="corner" width="160" height="160" viewBox="0 0 160 160" fill="none" aria-hidden="true">
    <g stroke="#1d2535" stroke-width="1" fill="none">
      <circle cx="120" cy="50" r="55"/>
      <circle cx="120" cy="50" r="35"/>
      <circle cx="120" cy="50" r="15"/>
    </g>
    <circle cx="120" cy="50" r="5" fill="#f4c780"/>
  </svg>
  <div class="eyebrow">Tagged</div>
  <h1>{{ page.title | e }}</h1>
  <p class="lead">Posts tagged with this term.</p>
</header>

<div class="content-body">
  {{ content | safe }}
</div>
{% endblock %}
