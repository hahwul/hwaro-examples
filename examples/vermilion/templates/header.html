<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-base="{{ base_url }}" data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="bar">
      <a class="brand" href="{{ base_url }}/" aria-label="Vermilion — home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <path d="M8 7 L16 23 L24 7" fill="none" stroke="currentColor" stroke-width="4.2" stroke-linecap="square" stroke-linejoin="miter"/>
        </svg>
        <span class="brand-word">Vermilion</span>
      </a>

      <nav class="primary-nav" aria-label="Primary">
        <a href="{{ base_url }}/identities/">Identities</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>

      <div class="bar-tools">
        <button class="tool-btn" id="search-button" type="button" aria-haspopup="dialog" aria-controls="search-overlay" aria-label="Search the case studies (press slash)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="8.6" cy="8.6" r="5.4"/><path d="M12.7 12.7 16.5 16.5"/></svg>
          <span>Search</span>
          <kbd class="tool-kbd" aria-hidden="true">/</kbd>
        </button>
      </div>
    </div>
  </header>
