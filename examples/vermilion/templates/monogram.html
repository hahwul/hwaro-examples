{# Signature element: a client's initial drawn as a huge outlined SVG
   letterform. Expects `glyph` set in the including template's scope.
   Purely decorative — the real label text sits in normal HTML beside it. #}
<svg class="monogram" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true" focusable="false">
  <text x="50" y="58" text-anchor="middle">{{ glyph | default("V") }}</text>
</svg>
