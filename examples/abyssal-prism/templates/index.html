{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <h1>{{ page.title | default(value=site.title) }}</h1>

    {% if page is defined and page.description is defined %}
        <p class="lead" style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2rem;">
            {{ page.description }}
        </p>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
