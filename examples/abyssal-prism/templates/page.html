{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <article>
        <header style="margin-bottom: 2rem;">
            <h1>{{ page.title }}</h1>
            {% if page.date is defined %}
            <div style="color: var(--text-muted); font-size: 0.9rem;">
                {{ page.date | date("%B %d, %Y") }}
            </div>
            {% endif %}
        </header>

        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</div>
{% endblock %}
