<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #00f0ff;
      --secondary: #ff0055;
      --accent: #8a2be2;
      --text: #e0e6ed;
      --text-muted: #8b9bb4;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #050510;
      --bg-glass: rgba(10, 10, 25, 0.6);
      --glow-cyan: 0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3);
      --glow-magenta: 0 0 10px rgba(255, 0, 85, 0.5), 0 0 20px rgba(255, 0, 85, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        margin: 0;
        color: var(--text);
        background-color: var(--bg);
        background-image: radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.15), transparent 25%),
                          radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.15), transparent 25%);
        background-attachment: fixed;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem;
        margin-top: 2rem;
        margin-bottom: 2rem;
        background: var(--bg-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .site-logo {
        font-weight: 700;
        font-size: 1.4rem;
        color: var(--text);
        text-decoration: none;
        letter-spacing: 1px;
        text-shadow: var(--glow-cyan);
    }
    .site-logo:hover { color: var(--primary); }
    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
        color: var(--secondary);
        text-shadow: var(--glow-magenta);
    }
    .site-main {
        min-height: calc(100vh - 250px);
        background: var(--bg-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .site-footer {
        margin-top: 3rem;
        margin-bottom: 2rem;
        padding: 1.5rem;
        background: var(--bg-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text-muted);
        font-size: 0.9rem;
        text-align: center;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Typography */
    h1, h2, h3 {
        line-height: 1.3;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: 700;
        color: #fff;
    }
    h1 { font-size: 2.2rem; margin-top: 0; text-shadow: var(--glow-cyan); }
    h2 { font-size: 1.6rem; color: var(--primary); }
    h3 { font-size: 1.3rem; color: var(--secondary); }
    p { margin: 1.2em 0; }
    a { color: var(--primary); text-decoration: none; transition: color 0.3s; }
    a:hover { color: var(--secondary); text-shadow: var(--glow-magenta); }

    code {
        background: rgba(255, 255, 255, 0.05);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.9em;
        font-family: 'Fira Code', ui-monospace, "SFMono-Regular", Consolas, monospace;
        color: var(--secondary);
        border: 1px solid rgba(255, 0, 85, 0.2);
    }
    pre {
        background: rgba(0, 0, 0, 0.4);
        padding: 1.5rem;
        border-radius: 8px;
        overflow-x: auto;
        border: 1px solid var(--border);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }
    pre code { background: none; padding: 0; border: none; color: inherit; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
        margin-bottom: 0.8rem;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 8px;
        border: 1px solid var(--border);
        transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 240, 255, 0.3);
        box-shadow: 0 5px 15px rgba(0, 240, 255, 0.1);
    }
    ul.section-list li a { font-weight: 600; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.3s ease; background: rgba(255,255,255,0.05); }
    nav.pagination a:hover { color: #fff; border-color: var(--primary); box-shadow: var(--glow-cyan); background: rgba(0, 240, 255, 0.1); }
    .pagination-current span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--primary); background: rgba(0, 240, 255, 0.2); color: #fff; box-shadow: var(--glow-cyan); }
    .pagination-disabled span { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.5; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      .site-wrapper { padding: 0 1rem; }
      .site-main { padding: 1.5rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
