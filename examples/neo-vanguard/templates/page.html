{% include "header.html" %}
  <main class="site-main neo-page">
    <article class="page-content">
      <header class="page-header">
        <h1>{{ page.title | e }}</h1>
        {% if page.description is present %}
          <p class="page-description">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="content-body">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
