{% extends "base.html" %}

{% block content %}
<article class="card">
    <h1 class="card-title">{{ page.title }}</h1>
    {% if page.date %}
    <div class="card-meta">
        {{ page.date | date("%B %d, %Y") }}
    </div>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>

    {% if page.taxonomies and page.taxonomies.tags %}
    <div class="tags">
        {% for tag in page.taxonomies.tags %}
        <a href="{{ base_url }}/tags/{{ tag }}/" class="tag">{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</article>
{% endblock %}
