<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="void-background">
        <div class="starlit-orb orb-1"></div>
        <div class="starlit-orb orb-2"></div>
        <div class="starlit-orb orb-3"></div>
        <div class="starlit-echo echo-1"></div>
        <div class="starlit-echo echo-2"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-content">
            <div class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></div>
            <ul class="nav-links">
                <li><a href="{{ base_url }}/">Home</a></li>
                <li><a href="{{ base_url }}/about/">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="glass-container">
        <article class="content">
            {{ content | safe }}
        </article>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2024 {{ site.title }}. Echoes in the void.</p>
    </footer>
</body>
</html>
