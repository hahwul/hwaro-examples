{% extends "base.html" %}

{% block content %}
<div class="content taxonomy-content">
    <h1>Taxonomies</h1>
    <ul class="taxonomy-list">
        {% for taxonomy in taxonomies %}
        <li><a href="{{ taxonomy.url }}">{{ taxonomy.name }}</a></li>
        {% endfor %}
    </ul>
</div>
<style>
    .taxonomy-list { list-style: none; padding: 0; }
    .taxonomy-list li { margin-bottom: 0.5rem; }
</style>
{% endblock %}
