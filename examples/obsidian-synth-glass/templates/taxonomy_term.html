{% extends "base.html" %}

{% block content %}
<div class="content term-content">
    <h1>{{ term.name }}</h1>

    <div class="page-list">
        {% for page in pages %}
        <article class="list-item">
            <h2><a href="{{ page.url }}">{{ page.title }}</a></h2>
            {% if page.date %}
            <div class="post-meta">
                {{ page.date | date(format="%B %d, %Y") }}
            </div>
            {% endif %}
            {% if page.description %}
            <p>{{ page.description }}</p>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</div>
{% endblock %}
