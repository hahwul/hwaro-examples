<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text: #00ff41; --accent: #008f11; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 40px; border-left: 2px solid var(--text); }
        header { padding-bottom: 20px; border-bottom: 1px solid var(--text); margin-bottom: 40px; }
        .logo { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; }
        .wave-surface { height: 100px; background-image: repeating-linear-gradient(45deg, var(--accent) 0, var(--accent) 1px, transparent 1px, transparent 10px); margin-bottom: 40px; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">oscillator</div></header>
    <div class="wave-surface"></div>
