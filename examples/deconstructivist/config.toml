# =============================================================================
# Deconstructivist - Site Configuration
# Based on deconstructivist architecture; fragmented and chaotic yet balanced.
# =============================================================================

title = "Deconstructivist"
description = "A bold, fragmented, and chaotic yet balanced Hwaro theme inspired by deconstructivist architecture."
base_url = "http://localhost:3000"

[extra]
author = "Jules"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
type = "article"
twitter_card = "summary_large_image"

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = true
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["posts"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true
emoji = false
