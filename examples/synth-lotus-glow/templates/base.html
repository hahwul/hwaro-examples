<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page is defined and page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #05020a;
            --neon-pink: #ff007f;
            --neon-cyan: #00f0ff;
            --deep-purple: #5a00ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-bg: rgba(20, 10, 30, 0.4);
            --glass-border: rgba(255, 0, 127, 0.2);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-void);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
        }

        /* Animated Lotus Glow Background */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, rgba(90, 0, 255, 0.15) 0%, transparent 60%);
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-pink) 0%, transparent 70%);
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--deep-purple) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Layout */
        .site-header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 2, 10, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .site-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            margin-bottom: 0.5rem;
        }

        .nav-links {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        main {
            flex: 1;
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
            width: 100%;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        inset 0 0 20px rgba(255, 0, 127, 0.1);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .site-footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            background: rgba(5, 2, 10, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            margin-top: auto;
        }

        .site-footer p {
            opacity: 0.7;
        }

        /* Typography inside markdown content */
        .content h1, .content h2, .content h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            margin-bottom: 1.5rem;
            margin-top: 2rem;
        }

        .content h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-top: 0;
            background: linear-gradient(135deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content h2 {
            font-size: 2rem;
            color: var(--neon-pink);
        }

        .content p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .content strong {
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .content a {
            color: var(--neon-pink);
            text-decoration: none;
            border-bottom: 1px dashed var(--neon-pink);
            transition: all 0.3s ease;
        }

        .content a:hover {
            color: var(--neon-cyan);
            border-bottom-color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <header class="site-header">
        <div class="site-title">{{ site.title }}</div>
        <nav class="nav-links">
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 {{ site.title }}. Blooming in the digital void.</p>
    </footer>
</body>
</html>
