{% extends "base.html" %}

{% block content %}
<div class="glass-panel content">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="description" style="font-size: 1.2rem; color: var(--neon-cyan); margin-bottom: 2rem;">{{ page.description }}</p>
    {% endif %}

    <div class="markdown-body">
        {{ content | safe }}
    </div>
</div>
{% endblock content %}
