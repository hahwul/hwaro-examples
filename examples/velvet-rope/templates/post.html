{% include "header.html" %}
<main>
  <article>
    <section class="block">
      <div class="block-head">
        <h2>{{ page.title }}</h2>
        {% if page.date %}<div class="block-tag">{{ page.date | date("%B %d, %Y") }}</div>{% endif %}
      </div>
      {% if page.description %}<p style="text-align: center; font-family: 'Cormorant', serif; color: var(--gold-soft); letter-spacing: 0.22em; text-transform: uppercase; font-size: 14px; margin: -36px 0 36px;">{{ page.description }}</p>{% endif %}
      <div class="prose">{{ content | safe }}</div>
    </section>
  </article>
</main>
{% include "footer.html" %}
