<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #ddd;
            --accent: #000080;
            --ink: #000;
            --shadow: rgba(0,0,0,0.8);
            --highlight: rgba(255,255,255,0.05);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .ink-surface {
            background: #111;
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow), inset -5px -5px 15px var(--highlight);
            margin-bottom: 80px;
            border: 2px solid #222;
            border-radius: 4px;
            position: relative;
        }
        .ink-well-unit {
            width: 80px;
            height: 80px;
            background: var(--ink);
            border-radius: 50%;
            margin: 0 auto 40px;
            box-shadow: inset 2px 2px 10px rgba(0,0,128,0.5), 0 0 20px rgba(0,0,128,0.2);
            border: 4px solid #333;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        article { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">ink.well</div>
            <nav>
                <a href="/">Flow</a>
                <a href="/about">Core</a>
            </nav>
        </div>
    </header>
