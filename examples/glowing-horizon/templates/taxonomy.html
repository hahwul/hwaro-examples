{% extends "index.html" %}

{% block title %}{{ taxonomy_name | capitalize }} | {{ site.title }}{% endblock %}

{% block content %}
<article class="glass-panel" style="padding: 2rem;">
    <header class="page-header">
        <h1 class="page-title">{{ taxonomy_name | capitalize }}</h1>
    </header>

    <div class="tags" style="gap: 1rem;">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1rem;">
            {{ term.name }} ({{ term.count }})
        </a>
        {% endfor %}
    </div>
</article>
{% endblock %}
