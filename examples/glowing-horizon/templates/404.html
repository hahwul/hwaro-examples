{% extends "index.html" %}

{% block title %}404 Not Found | {{ site.title }}{% endblock %}

{% block content %}
<section class="hero">
  <svg class="hero-bg" viewBox="0 0 1200 360" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#ff3d8b" stroke-width="1.5" opacity="0.45"/>
    <line x1="0" y1="260" x2="1200" y2="260" stroke="#ff3d8b" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#ff3d8b" stroke-width="0.5" opacity="0.18"/>
  </svg>
  <div class="wrap hero-content" style="text-align: center;">
    <div class="eyebrow" style="color: var(--magenta); justify-content: center;">Signal Lost</div>
    <h1 style="font-size: clamp(4rem, 14vw, 9rem); letter-spacing: -0.05em;">404</h1>
    <p class="lead" style="margin: 0 auto;">The horizon you sought is beyond reach. The route does not exist.</p>
    <div style="margin-top: 28px;">
      <a href="{{ base_url }}/" class="nav-cta" style="display: inline-block;">Return Home</a>
    </div>
  </div>
</section>
{% endblock %}
