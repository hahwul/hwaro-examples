{% extends "index.html" %}

{% block title %}404 Not Found | {{ site.title }}{% endblock %}

{% block content %}
<article class="glass-panel" style="padding: 4rem 2rem; text-align: center;">
    <h1 class="page-title" style="font-size: 4rem; color: var(--glow-secondary);">404</h1>
    <p class="page-description" style="font-size: 1.5rem; margin-bottom: 2rem;">Page Not Found</p>
    <p>The page you are looking for does not exist.</p>
    <div style="margin-top: 2rem;">
        <a href="{{ base_url }}/" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1rem;">Return to Home</a>
    </div>
</article>
{% endblock %}
