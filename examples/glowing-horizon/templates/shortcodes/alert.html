<div class="alert" style="font-family: 'Sora', sans-serif; padding: 16px 18px; border: 1px solid #313850; border-left: 4px solid #28e1ff; background: #11141f; color: #f4f5fa; margin: 20px 0; display: flex; gap: 14px; align-items: flex-start;">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#28e1ff" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="flex-shrink:0; margin-top:2px;">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <div>
    <strong style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #28e1ff; display: block; margin-bottom: 4px;">{{ type }}</strong>
    <span>{{ body }}</span>
  </div>
</div>
