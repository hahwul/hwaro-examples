<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --text: #262626;
            --accent: #0095f6;
            --surface: #fff;
            --border: #dbdbdb;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        header {
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .insta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 20px;
        }
        .insta-item {
            background: #fff;
            border: 1px solid var(--border);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        h2 { font-weight: 600; font-size: 1rem; margin: 0; }
        article { font-size: 0.8rem; color: #8e8e8e; margin-top: 10px; }
        @media (max-width: 768px) { .insta-grid { gap: 3px; } .insta-item { border: none; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">insta.feed</div>
            <nav>
                <a href="/">Posts</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>
