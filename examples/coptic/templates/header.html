<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  {{ highlight_css }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page">
    <header class="masthead">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-hash" aria-hidden="true">#</span> coptic<span class="brand-cursor" aria-hidden="true"></span>
      </a>
      <nav class="masthead-nav" aria-label="Primary">
        <a{% if page.url is present and page.url == "/preface/" %} aria-current="page"{% endif %} href="{{ base_url }}/preface/">preface</a>
        <a{% if page.section is present and page.section == "chapters" %} aria-current="page"{% endif %} href="{{ base_url }}/chapters/">chapters</a>
      </nav>
      <form class="search" role="search" onsubmit="return false">
        <label class="search-label" for="koan-search"><span class="search-caret" aria-hidden="true">/</span></label>
        <input id="koan-search" type="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}"
               autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="grep the koans" aria-label="Search the koans">
      </form>
    </header>
    <section id="koan-results" class="results" role="region" aria-label="Search results" hidden>
      <p class="results-status" id="results-status" role="status" aria-live="polite"></p>
      <ol class="results-list" id="results-list"></ol>
    </section>
