{% include "header.html" %}
  <main class="site-main">
    <article class="post-article">
      <div class="post-flyer">
        <header class="post-header">
          {% if page.extra.slot %}
          <p class="post-slot">{{ page.extra.slot }}</p>
          {% endif %}
          <h1 class="post-title">{{ page.title | e }}</h1>
          {% if page.description %}
          <p class="post-description">{{ page.description | e }}</p>
          {% endif %}
        </header>
        <div class="post-content">
          {{ content }}
        </div>
        <footer class="post-footer">
          <a href="{{ base_url }}/lineup/" class="back-link">&larr; back to the lineup</a>
        </footer>
      </div>
    </article>
  </main>
{% include "footer.html" %}
