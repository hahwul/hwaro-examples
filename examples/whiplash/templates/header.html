<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #e6ff00;
            --muted: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.2;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }
        header {
            padding: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 10px solid var(--accent);
        }
        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-style: italic;
        }
        .whiplash-hero {
            padding: 100px 0;
            transform: skewY(-5deg);
            background: var(--accent);
            color: #000;
            margin: 60px 0;
        }
        .whiplash-hero h1 {
            font-family: 'Anton', sans-serif;
            font-size: 15vw;
            line-height: 0.8;
            margin: 0;
            text-transform: uppercase;
            transform: skewY(5deg);
        }
        article {
            padding: 100px 0;
        }
        h2 {
            font-family: 'Anton', sans-serif;
            font-size: 5rem;
            text-transform: uppercase;
            margin-top: 80px;
            border-left: 20px solid var(--accent);
            padding-left: 30px;
        }
        p { font-size: 1.5rem; font-weight: 400; opacity: 0.8; margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
            <div class="logo">WHIP//LASH</div>
            <nav>
                <a href="/">Velocity</a>
                <a href="/about">Impact</a>
            </nav>
        </div>
    </header>
