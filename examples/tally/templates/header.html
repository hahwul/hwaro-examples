<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Tally home">
        <svg class="wordmark__mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
          <path d="M7 11V8a5 5 0 0 1 10 0v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <rect x="4.5" y="11" width="15" height="10.5" rx="2.4" fill="currentColor"/>
          <circle cx="12" cy="15.6" r="1.4" fill="var(--bg)"/>
        </svg>
        <span class="wordmark__text">Tally</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/releases/">Releases</a>
        <a href="{{ base_url }}/security/">Security</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
        <kbd>/</kbd>
      </button>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-labelledby="search-heading" hidden>
    <div class="search-panel" role="document">
      <h2 class="search-heading" id="search-heading">Search Tally</h2>
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search releases, security notes, docs" autocomplete="off" aria-label="Search Tally" aria-describedby="search-hint">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <p class="search-hint" id="search-hint">Type to filter. Use the arrow keys, then Enter to open a result.</p>
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>No matches yet.</p>
    </div>
  </div>
