<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #3b82f6;
        }
        body {
            background-color: #f0f0f0;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .webtoon-scroll {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        header {
            padding: 20px 40px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .webtoon-panel {
            padding: 100px 60px;
            border-bottom: 2px solid #f0f0f0;
            text-align: center;
        }
        .webtoon-panel h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 6rem;
            margin: 0;
            line-height: 0.9;
        }
        article { padding: 60px; }
        h2 { font-family: 'Bebas Neue', cursive; font-size: 3rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="webtoon-scroll">
    <header>
        <div class="logo">WEBTOON//S</div>
        <nav>
            <a href="/">Episode</a>
            <a href="/about">Series</a>
        </nav>
    </header>
