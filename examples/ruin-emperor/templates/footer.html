<script>function initRuin(){document.querySelectorAll('[data-count]').forEach(e=>{let t=parseFloat(e.dataset.count),c=0,i=setInterval(()=>{c+=Math.ceil(t/24);if(c>=t){e.textContent=t;clearInterval(i)}else e.textContent=c},28)});console.log('%c[RUIN EMPEROR] The old world burned. We built thrones from the ash.','color:#b45309')}addEventListener('load',initRuin)</script></body></html>
