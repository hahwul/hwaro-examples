{% extends "base.html" %}
{% block content %}
  <h1>{% if page is present and page.title %}{{ page.title | e }}{% elif section is present and section.title %}{{ section.title | e }}{% else %}Section{% endif %}</h1>
  {{ content | safe }}
  <ul class="section-list">
    {{ section.list | safe }}
  </ul>
  {{ pagination | safe }}
{% endblock %}
