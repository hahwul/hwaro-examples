{% extends "base.html" %}
{% block content %}
  <h1>{{ taxonomy_name | e }}</h1>
  <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
  <ul>
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></li>
    {% endfor %}
  </ul>
{% endblock %}
