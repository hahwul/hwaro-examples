<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is present %}{{ page.description | e }}{% else %}{{ site_description }}{% endif %}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site_title }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-subtle: #1a1a1a;
      --text: #e0e0e0;
      --text-muted: #888888;
      --primary: #f0f0f0;
      --accent: #ff4500;
      --border: #333333;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-bottom: 2px solid var(--border); margin-bottom: 3rem; }
    .site-logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
    .site-header nav a:hover { color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; }
    h1, h2, h3 { line-height: 1.2; margin-top: 2em; margin-bottom: 1em; font-weight: 700; color: var(--primary); }
    h1 { font-size: 2.5rem; margin-top: 0; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.3rem; }
    p { margin: 1.5em 0; }
    a { color: var(--accent); text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: var(--primary); }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 2px; font-size: 0.9em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    .geometry { width: 50px; height: 50px; border: 2px solid var(--accent); display: inline-block; margin-bottom: 2rem; transform: rotate(45deg); }
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: var(--bg-subtle); border-left: 4px solid var(--accent); }
    ul.section-list li a { font-weight: 600; color: var(--primary); font-size: 1.2rem; display: block; margin-bottom: 0.5rem; }
    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site_title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="geometry"></div>
      <p>&copy; {{ site_title }}</p>
    </footer>
  </div>
  {{ auto_includes_js }}
  {{ highlight_js }}
</body>
</html>
