<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --neon: #39ff14;
      --neon-glow: rgba(57, 255, 20, 0.5);
      --bg: #09090b;
      --text: #e4e4e7;
      --border: #27272a;
    }
    body { font-family: sans-serif; line-height: 1.6; margin: 0; color: var(--text); background: var(--bg); }
    .site-wrapper { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .site-logo { font-weight: 600; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon-glow); }
    .site-header nav { display: flex; gap: 1.25rem; }
    .site-header nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
    .site-header nav a:hover { color: var(--neon); text-shadow: 0 0 8px var(--neon-glow); }
    .site-main { min-height: calc(100vh - 200px); }
    .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .bento-box { background: #18181b; border: 1px solid var(--border); padding: 20px; border-radius: 16px; transition: 0.3s; color: white; }
    .bento-box:hover { box-shadow: 0 0 15px var(--neon-glow); border-color: var(--neon); transform: translateY(-2px); }
    .span-2 { grid-column: span 2; }
    @media (max-width: 600px) { .span-2 { grid-column: span 1; } }

    a { color: var(--neon); }
    .site-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border); color: #a1a1aa; font-size: 0.85rem; text-align: center; }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
