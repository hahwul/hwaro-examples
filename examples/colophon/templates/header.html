<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #555;
            --line: #eee;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 20px;
            margin-bottom: 60px;
        }
        .logo {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .col-hero h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: #000;
        }
        article { font-size: 0.8rem; }
        h2 { font-weight: 600; font-size: 1rem; text-transform: uppercase; margin-top: 40px; border-bottom: 1px solid var(--line); padding-bottom: 5px; color: #000; }
        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            margin-top: 20px;
        }
        .spec-label { font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">COLOPHON//v1.0</div>
        <nav>
            <a href="/">Metadata</a>
            <a href="/about">Source</a>
        </nav>
    </header>
