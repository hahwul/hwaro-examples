<figure class="swatch-pair" aria-label="Before and after: {{ effect | e }}">
  <div class="swatch-plate swatch-before">
    {% if effect == "crop" %}
    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>
      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>
      <circle cx="162" cy="28" r="11" fill="#e8952f"/>
      <path d="M0 92 L30 78 L60 90 L100 72 L140 88 L170 76 L200 90 L200 150 L0 150 Z" fill="#c17048" opacity="0.9"/>

      <rect x="86" y="40" width="56" height="66" rx="2" fill="none" stroke="#fbe8d6" stroke-width="1" stroke-dasharray="3 2"/>
      <circle cx="108" cy="50" r="1.6" fill="#fbe8d6"/>

      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>
      <circle cx="162" cy="28" r="11" fill="#e8952f"/>

      <rect x="8" y="136" width="126" height="6" rx="3" fill="#301608" opacity="0.5"/>
    </svg>
    {% elif effect == "sharpen" %}
    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>
      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>

      <path d="M150 150 L150 124 L172 124 L178 112 L200 112 L200 150 Z" fill="#6b3220" opacity="0.85"/>
      <path d="M100 50 q8 -10 16 0 q8 -10 16 0" stroke="#301608" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    </svg>
    {% elif effect == "palette" %}

      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>

      <path d="M100 50 q8 -10 16 0 q8 -10 16 0" stroke="#301608" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>
      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>
      <circle cx="162" cy="28" r="11" fill="#e8952f"/>
      <path d="M0 92 L30 78 L60 90 L100 72 L140 88 L170 76 L200 90 L200 150 L0 150 Z" fill="#c17048" opacity="0.9"/>
      <path d="M20 150 L20 112 L55 112 L62 96 L98 96 L105 112 L140 112 L140 150 Z" fill="#8f4630"/>

      <path d="M100 50 q8 -10 16 0 q8 -10 16 0" stroke="#301608" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>
    {% elif effect == "rotate" %}
    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>
      <rect width="200" height="150" fill="url(#sky-{{ id }}-b)"/>

        <circle cx="162" cy="28" r="11" fill="#e8952f"/>

        <line x1="-40" y1="118" x2="240" y2="118" stroke="#fbe8d6" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.8"/>
      </g>
      <g transform="translate(100 140)">
        <rect x="-18" y="-5" width="36" height="10" rx="5" fill="none" stroke="#301608" stroke-width="1"/>
        <circle cx="-7" cy="0" r="3" fill="#301608"/>
      </g>
    </svg>
    {% endif %}
    <figcaption><span class="plate-tag">before</span><code>{{ before | e }}</code></figcaption>
  </div>
  <div class="swatch-chain">
    <code class="chain-code">{{ chain | e }}</code>
    <svg class="chain-arrow" viewBox="0 0 40 16" aria-hidden="true" focusable="false"><path d="M2 8h32M26 2l8 6-8 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="swatch-plate swatch-after">
    {% if effect == "crop" %}
    <svg viewBox="86 30 76 84" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-a" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>

    </svg>
    {% elif effect == "format" %}

      <path d="M100 50 q8 -10 16 0 q8 -10 16 0" stroke="#301608" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    </svg>
    {% elif effect == "sharpen" %}
    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs><linearGradient id="sky-{{ id }}-a" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient></defs>

      <rect width="200" height="150" fill="#e8b28a"/>
      <circle cx="162" cy="28" r="11" fill="#e8952f"/>

      <g>
        <rect x="8" y="134" width="9" height="9" fill="#e8b28a" stroke="#fbe8d6" stroke-width="0.6"/>
        <rect x="19" y="134" width="9" height="9" fill="#e8952f"/>

        <rect x="52" y="134" width="9" height="9" fill="#6b3220"/>

    {% elif effect == "grain" %}
    <svg viewBox="0 0 200 150" role="img" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="sky-{{ id }}-a" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe8d6"/><stop offset="1" stop-color="#dd8b5c"/></linearGradient>
        <pattern id="grain-{{ id }}" width="5" height="5" patternUnits="userSpaceOnUse">
