<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <svg class="sprite-defs" aria-hidden="true" focusable="false">
    <symbol id="rebate-strip" viewBox="0 0 320 14">
      <rect x="0" y="0" width="320" height="14" class="rebate-track"></rect>
      <rect x="4" y="4" width="6" height="6"></rect>
      <rect x="24" y="4" width="6" height="6"></rect>
      <rect x="44" y="4" width="6" height="6"></rect>
      <rect x="64" y="4" width="6" height="6"></rect>
      <rect x="84" y="4" width="6" height="6"></rect>
      <rect x="104" y="4" width="6" height="6"></rect>
      <rect x="124" y="4" width="6" height="6"></rect>
      <rect x="144" y="4" width="6" height="6"></rect>
      <rect x="164" y="4" width="6" height="6"></rect>
      <rect x="184" y="4" width="6" height="6"></rect>
      <rect x="204" y="4" width="6" height="6"></rect>
      <rect x="224" y="4" width="6" height="6"></rect>
      <rect x="244" y="4" width="6" height="6"></rect>
      <rect x="264" y="4" width="6" height="6"></rect>
      <rect x="284" y="4" width="6" height="6"></rect>
      <rect x="304" y="4" width="6" height="6"></rect>
    </symbol>
    <symbol id="grease-circle" viewBox="0 0 100 100">
      <path class="grease-pass-1" d="M49 6C67 5 86 19 88 42c1.6 19-9 39-31 43-21 4-42-8-46-29C6 34 20 12 42 7c2.3-.5 4.6-.8 7-1z"></path>
      <path class="grease-pass-2" d="M52 9C70 10 84 26 84 45c0 20-15 37-35 38-19 1-37-13-39-33C8 30 21 12 41 9c3.6-.6 7.3-.7 11 0z"></path>
    </symbol>
    <symbol id="crop-marks" viewBox="0 0 100 100">
      <path d="M6 18V6h12M82 6h12v12M94 82v12H82M18 94H6V82"></path>
    </symbol>
  </svg>

  <div class="site-shell">
    <header class="site-header">
      <a href="{{ base_url }}/" class="brand">
        <span class="brand-mark" aria-hidden="true">◐</span>
        <span class="brand-name">{{ site.title | e }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/sheets/">Sheets</a>
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/search/" class="nav-search">Search</a>
      </nav>
    </header>
