{% include "header.html" %}
  <main id="main" class="site-main page search-page">
    <div class="page-head">
      <p class="grid-eyebrow">Search</p>
      {% if page.title is present %}<h1>{{ page.title | e }}</h1>{% endif %}
      <p class="page-lede">Search by harbour, subject, or film stock. The index covers every sheet and the about page.</p>
    </div>

    <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
      <label class="visually-hidden" for="search-input">Search Sepia</label>
      <input class="search-input" id="search-input" type="search" name="q" placeholder="Kessane Roads, herring, Slackwater 3200&hellip;" autocomplete="off" autofocus>
    </form>
    <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
    <ul class="search-results" id="search-results"></ul>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="{{ base_url }}/js/search.js"></script>
  </main>
{% include "footer.html" %}
