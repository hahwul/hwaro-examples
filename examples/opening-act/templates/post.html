{% include "header.html" %}
<main>
  <article>
    <section class="block">
      <div class="block-head">
        <h2>{{ page.title }}</h2>
        {% if page.date %}<div class="block-tag">{{ page.date | date("%b %d, %Y") }}</div>{% endif %}
      </div>
      {% if page.description %}<p style="font-family: 'Red Hat Mono', monospace; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px; margin: -24px 0 32px;">{{ page.description }}</p>{% endif %}
      <div class="prose">{{ content | safe }}</div>
    </section>
  </article>
</main>
{% include "footer.html" %}
