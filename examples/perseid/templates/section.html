{% include "header.html" %}
{% set sessions = section.pages | sort_by("date") %}
<main id="main" class="site-main">

  <header class="masthead masthead-compact" aria-labelledby="masthead-h">
    <p class="masthead-kicker">✦ The Programme ✦</p>
    <h1 id="masthead-h" class="masthead-title-sm">{{ page.title | e }}</h1>
    {% if page.description %}<p class="masthead-venue">{{ page.description | e }}</p>{% endif %}
    <div class="fine-rule" aria-hidden="true"></div>
  </header>

  {% if content %}<div class="section-intro"><div class="prose">{{ content | safe }}</div></div>{% endif %}

  {% include "_timeline.html" %}

</main>
{% include "footer.html" %}
