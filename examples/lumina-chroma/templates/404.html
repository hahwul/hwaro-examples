{% include "header.html" %}
<header class="blog-header">
  <div class="blog-header-inner">
    <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
    <nav>
      <a href="{{ base_url }}/posts/">Posts</a>
      <a href="{{ base_url }}/archives/">Archives</a>
      <a href="{{ base_url }}/about/">About</a>
    </nav>
    <div class="header-right">
      <button class="search-trigger" onclick="document.getElementById('searchOverlay').style.display='flex'">
        <span>Search</span>
      </button>
    </div>
  </div>
</header>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="search-modal">
    <div class="search-input-wrap">
      <input type="text" id="searchInput" placeholder="Search..." autocomplete="off">
      <kbd style="cursor:pointer;" onclick="document.getElementById('searchOverlay').style.display='none'">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
<div class="blog-container">
  <main class="blog-main">
    <h1>404 Not Found</h1>
    <p>The page you are looking for does not exist.</p>
    <p><a href="{{ base_url }}/">Return to Home</a></p>
{% include "footer.html" %}
