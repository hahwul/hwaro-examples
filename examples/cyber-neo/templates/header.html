<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    {% if highlight_tags is defined %}{{ highlight_tags | safe }}{% endif %}
    {% if auto_includes is defined %}{{ auto_includes | safe }}{% endif %}
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --neon-blue: #66fcf1;
            --neon-blue-dim: #45a29e;
            --glass-bg: rgba(11, 12, 16, 0.7);
            --glass-border: rgba(102, 252, 241, 0.2);
            --font-main: 'Courier New', Courier, monospace;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .logo a {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1.5rem;
        }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
        }
        nav a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }
        nav a::before {
            content: '[';
            opacity: 0;
            transition: opacity 0.3s;
            color: var(--neon-blue-dim);
            margin-right: 5px;
        }
        nav a::after {
            content: ']';
            opacity: 0;
            transition: opacity 0.3s;
            color: var(--neon-blue-dim);
            margin-left: 5px;
        }
        nav a:hover::before, nav a:hover::after {
            opacity: 1;
        }
        main {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        .content-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
            border-color: var(--neon-blue-dim);
        }
        h1, h2, h3 {
            color: var(--neon-blue);
            font-weight: normal;
        }
        h1 {
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }
        a {
            color: var(--neon-blue-dim);
            text-decoration: none;
        }
        a:hover {
            color: var(--neon-blue);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="{{ base_url }}/">{{ site.title }}</a>
        </div>
        <nav>
            <ul>
                <li><a href="{{ base_url }}/">Home</a></li>
                <li><a href="{{ base_url }}/about/">About</a></li>
                <li><a href="{{ base_url }}/posts/">Posts</a></li>
            </ul>
        </nav>
    </header>
    <main>
