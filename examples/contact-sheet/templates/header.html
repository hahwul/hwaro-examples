<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #555;
            --contact: #f8f8f8;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--contact);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 80px;
        }
        .contact-item {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .contact-item::after {
            content: '01';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            color: #ccc;
        }
        h2 { font-weight: 700; font-size: 1rem; color: #000; margin-top: 0; text-transform: uppercase; }
        article { font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">contact.sheet</div>
            <nav>
                <a href="/">Proof</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
