<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#0e1117">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="wordmark" aria-label="Stride home">
        <svg class="wordmark-mark" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="5" fill="currentColor"/>
          <rect x="8" y="9" width="16" height="2.6" fill="var(--bg)"/>
          <rect x="8" y="14.4" width="16" height="2.6" fill="var(--bg)"/>
          <rect x="8" y="19.8" width="10" height="2.6" fill="var(--accent-fg)"/>
        </svg>
        <span>Stride</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/services/"{% if page.url == "/services/" %} aria-current="page"{% endif %}>Services</a>
        <a href="{{ base_url }}/methodology/"{% if page.url == "/methodology/" %} aria-current="page"{% endif %}>Methodology</a>
        <a href="{{ base_url }}/reports/"{% if page.url == "/reports/" %} aria-current="page"{% endif %}>Reports</a>
        <a href="{{ base_url }}/team/"{% if page.url == "/team/" %} aria-current="page"{% endif %}>Team</a>
        <a href="{{ base_url }}/contact/"{% if page.url == "/contact/" %} aria-current="page"{% endif %}>Contact</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-label="Search this site">
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
