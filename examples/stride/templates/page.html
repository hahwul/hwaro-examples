{% include "header.html" %}
  <main id="main" class="site-main">
    <header class="page-head">
      {% if page.extra.chapter %}
      <p class="page-kicker">
        <span class="kicker-num">{{ page.extra.chapter }}</span>
        <span class="kicker-sep" aria-hidden="true">—</span>
        <span class="kicker-label">{{ page.title | upper }}</span>
      </p>
      {% endif %}
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}<p class="page-dek">{{ page.description | e }}</p>{% endif %}
    </header>
    <div class="prose">
      {{ content | safe }}
    </div>
  </main>
{% include "footer.html" %}
