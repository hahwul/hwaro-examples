<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
  :root {
    --primary: #c24cf6;
    --primary-glow: #e886ff;
    --text: #e0e6ed;
    --text-muted: #8c9baf;
    --border: rgba(255, 255, 255, 0.1);
    --bg-base: #050510;
    --bg-glass: rgba(15, 15, 30, 0.6);
  }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.7;
    margin: 0;
    color: var(--text);
    background-color: var(--bg-base);
    background-image:
      radial-gradient(circle at 15% 50%, rgba(90, 40, 160, 0.15), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(40, 90, 180, 0.15), transparent 25%);
    background-attachment: fixed;
  }
  .site-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
  }
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    margin-bottom: 3rem;
    background: var(--bg-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  .site-logo {
    font-weight: 700;
    font-size: 1.25rem;
    color: #fff;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--primary-glow);
  }
  .site-header nav { display: flex; gap: 1.5rem; }
  .site-header nav a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.2s, text-shadow 0.2s;
  }
  .site-header nav a:hover {
    color: #fff;
    text-shadow: 0 0 8px var(--primary-glow);
  }
  .glass-card {
    background: var(--bg-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }
  h1, h2, h3 { color: #fff; line-height: 1.3; margin-top: 0; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-glow); text-shadow: 0 0 8px var(--primary-glow); }
  code { background: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 4px; color: #ffb86c; font-family: monospace; }
  pre { background: rgba(0,0,0,0.5); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
  ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
  ul.section-list li { margin-bottom: 1rem; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s; }
  ul.section-list li:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
  .taxonomy-desc { color: var(--text-muted); }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Nexus</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
