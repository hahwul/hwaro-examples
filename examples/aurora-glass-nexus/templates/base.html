<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default(value=site.description) }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #03010a;
            --aurora-cyan: #00f0ff;
            --aurora-magenta: #ff0055;
            --aurora-purple: #8a2be2;
            --text-primary: #e0e0f0;
            --text-secondary: #a0a0c0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Aurora Background */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: drift 20s infinite alternate ease-in-out;
            pointer-events: none;
        }

        body::before {
            top: -20vh;
            left: -20vw;
            background: radial-gradient(circle, var(--aurora-cyan) 0%, transparent 60%);
        }

        body::after {
            bottom: -20vh;
            right: -20vw;
            background: radial-gradient(circle, var(--aurora-magenta) 0%, transparent 60%);
            animation-delay: -10s;
        }

        .ambient-purple {
            position: fixed;
            top: 40vh;
            left: 30vw;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            background: radial-gradient(circle, var(--aurora-purple) 0%, transparent 50%);
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: drift-slow 25s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 5vh) scale(1.1); }
        }

        @keyframes drift-slow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5vw, -10vh) scale(1.2); }
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-nav {
            background: rgba(3, 1, 10, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        /* Typography & Layout */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: 700;
            margin-top: 0;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a {
            color: var(--aurora-cyan);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--aurora-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--aurora-cyan), var(--aurora-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        nav a {
            font-family: var(--font-display);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        nav a:hover {
            color: var(--aurora-cyan);
        }

        main {
            margin-top: 120px;
            margin-bottom: 60px;
            min-height: 60vh;
        }

        footer {
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: auto;
        }

    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="ambient-purple"></div>

    <div class="glass-nav">
        <div class="container">
            <header>
                <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
                <nav>
                    <ul>
                        <li><a href="{{ base_url }}/">Home</a></li>
                        <li><a href="{{ base_url }}/posts/">Posts</a></li>

                    </ul>
                </nav>
            </header>
        </div>
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ current_year }} {{ site.title }}. Built with Hwaro.</p>
        </div>
    </footer>
</body>
</html>
