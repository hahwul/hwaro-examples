<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030408;
      --text: #e0e6ed;
      --text-muted: #8b9eb0;
      --accent-1: #00f2fe;
      --accent-2: #fe00a1;
      --accent-3: #8a2be2;
      --glass-bg: rgba(15, 20, 35, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --glow: 0 0 20px rgba(0, 242, 254, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Ambient animated background */
    .ambient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.08), transparent 40%),
                  radial-gradient(circle at 85% 30%, rgba(254, 0, 161, 0.08), transparent 40%),
                  radial-gradient(circle at 50% 80%, rgba(138, 43, 226, 0.08), transparent 40%);
      animation: ambientDrift 20s ease-in-out infinite alternate;
    }

    @keyframes ambientDrift {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
      padding: 2rem;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; flex: 1; width: 100%; display: flex; flex-direction: column; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      margin-bottom: 3rem;
      border-radius: 100px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }

    .site-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease;
    }

    .site-logo:hover {
      text-shadow: var(--glow);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--accent-1); text-shadow: 0 0 8px rgba(0,242,254,0.5); }

    .site-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .site-footer {
      margin-top: 4rem;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--glass-border);
      border-radius: 16px 16px 0 0;
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Outfit', sans-serif;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      color: #fff;
    }
    h1 { font-size: 2.5rem; margin-top: 0; letter-spacing: -1px; }
    h2 { font-size: 1.75rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.25rem; color: var(--accent-1); }
    p { margin: 1.2em 0; color: var(--text-muted); }

    a { color: var(--accent-1); text-decoration: none; transition: all 0.3s ease;}
    a:hover { color: var(--accent-2); text-shadow: 0 0 10px rgba(254,0,161,0.5); }

    code {
      background: rgba(255,255,255,0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
      color: var(--accent-1);
      border: 1px solid rgba(255,255,255,0.1);
    }

    pre {
      background: rgba(0,0,0,0.3);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; color: #a0aec0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; display: flex; flex-direction: column; gap: 1rem;}
    ul.section-list li {
      padding: 1.2rem;
      background: var(--glass-bg);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(0,242,254,0.3);
    }
    ul.section-list li a { font-weight: 600; font-family: 'Outfit', sans-serif; font-size: 1.1rem;}

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-style: italic; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
    }
    nav.pagination a:hover { color: var(--accent-1); border-color: var(--accent-1); background: rgba(0,242,254,0.1); }
    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--accent-1);
      background: rgba(0,242,254,0.15);
      color: #fff;
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.2);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; border-radius: 16px; padding: 1.5rem;}
      .site-wrapper { padding: 1rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="ambient-bg"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/tags/">Tags</a>
      </nav>
    </header>
    <main class="site-main">
