<figure class="tape">
  <div class="tape-strip" role="img" aria-label="Query punched on tape: {{ query | e }}">
    <span class="tape-lead" aria-hidden="true"></span>
    <code class="tape-query">{{ query | e }}</code>
    <span class="tape-lead" aria-hidden="true"></span>
  </div>
  {% if label %}<figcaption class="tape-cap"><span class="tape-cap-tick" aria-hidden="true">&#9656;</span> {{ label | e }}</figcaption>{% endif %}
</figure>
