<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Herbarium Dashboard stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="{{ site.title | e }} home">
        <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <path d="M16 30 C16 21 16 13 24 5 C16 7 11 13 11 21 C11 26 13 28 16 30 Z" fill="currentColor"/>
          <path d="M16 30 L16 11" stroke="#2b2620" stroke-width="1.1"/>
          <path d="M16 22 L12 18 M16 19 L12.5 15.5 M16 16 L13.5 13" stroke="#2b2620" stroke-width="0.9"/>
        </svg>
        <span class="wordmark">Hortus Siccus<span>Herbarium Register</span></span>
      </a>
      <nav aria-label="Primary">
        <a href="{{ base_url }}/">Collection</a>
        <a href="{{ base_url }}/posts/">Field Notes</a>
        <a href="{{ base_url }}/about/">Colophon</a>
      </nav>
      <div class="specimen-label" aria-hidden="true">
        <span class="label-head">Specimen Sheet</span>
        <div class="field"><span>FAMILY</span><b>Polypodiaceae</b></div>
        <div class="field"><span>GENUS</span><b>Asplenium</b></div>
        <div class="field"><span>COLLECTED</span><b>1887</b></div>
        <div class="field"><span>LOCALITY</span><b>Vale Station</b></div>
        <div class="field"><span>NO.</span><b>HS&middot;0412</b></div>
      </div>
    </header>
