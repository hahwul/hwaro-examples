{% include "header.html" %}
  <main class="site-main">
    <div class="page-intro">
      <p class="kicker">Index &mdash; {{ taxonomy_name | e }}</p>
      <h1>Catalog of <span style="color: var(--label-red);">{{ taxonomy_name | e }}</span></h1>
      <p>Cross-references gathered across the field notes, sorted by frequency of mention.</p>
    </div>

    <div class="badge-container" style="gap: 0.8rem;">
      {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.78rem; padding: 0.4rem 0.85rem;">
          {{ term.name }} ({{ term.pages | length }})
        </a>
      {% endfor %}
    </div>
  </main>
{% include "footer.html" %}
