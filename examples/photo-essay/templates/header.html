<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --text: #eee;
            --accent: #999;
            --essay: #1a1a1a;
            --shadow: rgba(0,0,0,0.8);
        }
        body {
            background-color: #0c0c0c;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .essay-surface {
            background: var(--essay);
            padding: 80px;
            box-shadow: 20px 20px 60px var(--shadow);
            margin-bottom: 100px;
            border: 1px solid #333;
        }
        h2 { font-family: 'Fraunces', serif; font-size: 2.5rem; color: #fff; margin-top: 0; font-style: italic; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">photo.essay</div>
            <nav>
                <a href="/">Visual</a>
                <a href="/about">Story</a>
            </nav>
        </div>
    </header>
