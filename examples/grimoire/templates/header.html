<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,700;1,700&family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --text: #c0c0c0;
            --accent: #8a2be2;
            --ink: #4b0082;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Unna', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
            border-bottom: 2px solid var(--ink);
        }
        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--accent);
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .grimoire-hero {
            padding: 100px 0;
            text-align: center;
        }
        .grimoire-hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            margin: 0;
            font-style: italic;
        }
        article {
            background: #111;
            padding: 60px;
            border: 1px solid var(--ink);
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.1);
            margin-top: 40px;
        }
        h2 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--accent); border-bottom: 1px solid var(--ink); padding-bottom: 10px; }
        .sigil {
            width: 100px;
            height: 100px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            color: var(--accent);
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">GRIMOIRE.</div>
            <nav>
                <a href="/">Spells</a>
                <a href="/about">Arcane</a>
            </nav>
        </div>
    </header>
