<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff00ff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .detonation-hero {
            padding: 150px 0;
            text-align: center;
            position: relative;
        }
        .detonation-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 15vw;
            margin: 0;
            line-height: 0.7;
            text-transform: uppercase;
            letter-spacing: -5px;
            z-index: 1;
            position: relative;
        }
        .radial-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,0,255,0.2) 0%, transparent 70%);
            z-index: -1;
        }
        article { padding: 80px 0; }
        h2 { font-size: 3rem; text-transform: uppercase; border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 40px; }
        .blast-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        .blast-item { border: 1px solid #333; padding: 30px; text-align: center; }
        .blast-item b { display: block; color: var(--accent); font-size: 1.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">DETONATION</div>
            <nav>
                <a href="/">Release</a>
                <a href="/about">Radius</a>
            </nav>
        </div>
    </header>
