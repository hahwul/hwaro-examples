<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  {% if page is defined and page.title is defined %}
    <title>{{ page.title }} | {{ site.title }}</title>
  {% elif section is defined and section.title is defined %}
    <title>{{ section.title }} | {{ site.title }}</title>
  {% else %}
    <title>{{ site.title }}</title>
  {% endif %}
  <style>
    :root { --bg: #0d0e15; --text: #f0f0f5; --accent: #a78bfa; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-top: 4rem; overflow-x: hidden; }
    body::before { content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 50%, rgba(167, 139, 250, 0.15) 0%, transparent 60%); z-index: -1; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 1rem 2rem; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); box-sizing: border-box; z-index: 100; }
    header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 1.2rem; }
    nav a { margin-left: 1rem; color: var(--text); font-weight: 400; opacity: 0.8; transition: opacity 0.3s; }
    nav a:hover { opacity: 1; color: var(--accent); }
    .card { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; transition: transform 0.3s; }
    .card:hover { transform: translateY(-5px); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <a href="{{ base_url }}/">{{ site.title }}</a>
    <nav><a href="{{ base_url }}/posts/">Posts</a><a href="{{ base_url }}/tags/">Tags</a></nav>
  </header>
  <div class="container">
