{% include "header.html" %}
<main class="card">
  <h1>{{ taxonomy | upper }}</h1>
  <ul>
  {% if taxonomy_terms is defined %}
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}/{{ taxonomy }}/{{ term | slugify }}/">{{ term }}</a></li>
    {% endfor %}
  {% endif %}
  </ul>
</main>
