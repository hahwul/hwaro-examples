<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  {% if page.title is present and page.title != site.title %}
  <title>{{ page.title | e }} — {{ site.title | e }}</title>
  {% else %}
  <title>{{ site.title | e }}</title>
  {% endif %}
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/eclipse.css">
</head>
<body class="eclipse-array">
  <div class="stars-layer"></div>
  <div class="scanline"></div>

  <div class="top-bar">
    <div class="brand">
      <span>ECLIPSE / ARRAY</span>
    </div>
    <div class="status">
      <div class="status-pill">
        <span class="dot"></span>
        <span>ARRAY PHASE LOCKED</span>
      </div>
      <div class="totality-hint" onclick="toggleTotality()" title="Press E for dramatic totality mode">E — TOTALITY</div>
    </div>
  </div>
