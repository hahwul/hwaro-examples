<!DOCTYPE html>
<html lang="{{ page_language | default("en") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --bg: #111111;
      --text: #f5f5f5;
      --text-muted: #a0a0a0;
      --accent: #d4af37; /* subtle gold */
      --border: #333333;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-serif: "Playfair Display", "Georgia", serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: var(--accent);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .site-header {
      padding: 3rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .site-nav {
      display: flex;
      gap: 2rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hero {
      padding: 8rem 0 6rem 0;
      text-align: center;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 3rem;
      padding: 4rem 0;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .project-img {
      width: 100%;
      height: 500px;
      background-color: #222;
      background-size: cover;
      background-position: center;
      transition: transform 0.5s ease;
    }

    .project-card:hover .project-img {
      transform: scale(1.02);
    }

    .project-info h3 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .project-info p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
      .hero-title {
        font-size: 2.5rem;
      }
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">Lumina</a>
      <nav class="site-nav">
        <a href="{{ base_url }}">Portfolio</a>
        <a href="{{ base_url }}">Studio</a>
        <a href="{{ base_url }}">Contact</a>
      </nav>
    </header>
