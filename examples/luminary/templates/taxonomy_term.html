{% extends "base.html" %}

{% block content %}
  <h1>Posts tagged with "{{ term }}"</h1>
  <p class="taxonomy-desc">Showing all posts under this category.</p>
  <ul class="section-list">
    {% for page in taxonomy_pages %}
      <li>
        <a href="{{ base_url }}{{ page.url }}">{{ page.title | e }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
