<!DOCTYPE html>
<html lang="{{ page_language | default(value='en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is present %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
    :root {
      --space-dark: #070914;
      --nebula-purple: #8134af;
      --nebula-pink: #e44288;
      --nebula-blue: #3f51b5;
      --starlight: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-bg: rgba(20, 24, 44, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--space-dark);
      color: var(--starlight);
      margin: 0;
      line-height: 1.7;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(129, 52, 175, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(63, 81, 181, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(228, 66, 136, 0.1) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      color: #fff;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 { font-size: 2.5rem; line-height: 1.2; margin-top: 0; }
    h2 { font-size: 1.75rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }

    a {
      color: var(--nebula-pink);
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
    }

    .site-main a:hover {
      color: #fff;
      text-shadow: 0 0 8px rgba(228, 66, 136, 0.6);
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }

    /* Header */
    .site-header {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .site-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--nebula-purple), var(--nebula-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.05em;
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      color: var(--starlight);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .site-nav a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Glassmorphic Components */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--glass-shadow);
      margin-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Code blocks */
    pre {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
    }

    code {
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.9em;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2em 0.4em;
      border-radius: 4px;
    }

    pre code {
      background: none;
      padding: 0;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 3rem 0 2rem;
      margin-top: auto;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--glass-border);
    }

    /* Lists */
    .section-list {
      list-style: none;
      padding: 0;
    }

    .section-list li {
      margin-bottom: 1rem;
    }

    .section-list a {
      display: block;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 12px;
      color: var(--starlight);
      transition: all 0.3s ease;
    }

    .section-list a:hover {
      border-color: rgba(228, 66, 136, 0.5);
      box-shadow: 0 0 15px rgba(228, 66, 136, 0.2);
      transform: translateY(-2px);
    }

    .date-meta {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* Tags */
    .tag {
      display: inline-block;
      background: rgba(63, 81, 181, 0.2);
      border: 1px solid rgba(63, 81, 181, 0.5);
      color: #a5b4fc;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }

    .tag:hover {
      background: rgba(63, 81, 181, 0.4);
      color: #fff;
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
        <a href="{{ base_url }}tags/">Tags</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.title }}. Weaving through the cosmos.</p>
    </footer>
  </div>
</body>
</html>
