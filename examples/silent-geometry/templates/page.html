{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.title }}{% endblock title %}

{% block content %}
<article>
    <header>
        <h2>{{ page.title }}</h2>
        {% if page.date %}
        <span class="meta">DATE: {{ page.date | date(format="%Y-%m-%d") }}</span>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
