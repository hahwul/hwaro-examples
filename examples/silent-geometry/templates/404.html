{% extends "base.html" %}

{% block title %}404 NOT FOUND | {{ site.title }}{% endblock title %}

{% block content %}
<section style="text-align: center; padding: 4rem 0;">
    <h2 style="font-size: 8rem; border: none; margin-bottom: 0;">404</h2>
    <p style="font-size: 1.5rem; text-transform: uppercase; font-weight: 600;">Page Not Found</p>
    <a href="{{ site.base_url }}/" style="display: inline-block; margin-top: 2rem; padding: 1rem 2rem; border: 2px solid var(--border-color); text-decoration: none; font-weight: 600; text-transform: uppercase;">Return to Origin</a>
</section>
{% endblock content %}
