<!DOCTYPE html>
<html lang="{{ site.language | default(value='en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock title %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #0f0f0f;
            --border-color: #0f0f0f;
            --accent-color: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-color: #f0f0f0;
                --border-color: #f0f0f0;
                --accent-color: #1a1a1a;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header"
                "nav main"
                "footer footer";
        }

        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "header"
                    "nav"
                    "main"
                    "footer";
            }
        }

        header {
            grid-area: header;
            padding: 2rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        header h1 {
            font-weight: 800;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        header h1 a {
            color: var(--text-color);
            text-decoration: none;
        }

        nav {
            grid-area: nav;
            padding: 2rem;
            border-right: 2px solid var(--border-color);
            background-color: var(--accent-color);
        }

        @media (max-width: 768px) {
            nav {
                border-right: none;
                border-bottom: 2px solid var(--border-color);
            }
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 1rem;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            display: block;
            padding: 0.5rem;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        nav a:hover {
            border-color: var(--border-color);
            background-color: var(--bg-color);
        }

        main {
            grid-area: main;
            padding: 3rem;
            max-width: 1200px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        h2 { font-size: 2.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        h3 { font-size: 2rem; }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 300;
            max-width: 80ch;
        }

        a {
            color: var(--text-color);
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            text-decoration: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            border: 2px solid var(--border-color);
            padding: 1.5rem;
            background-color: var(--bg-color);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 4px 4px 0 var(--border-color);
        }

        .card h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
            border: none;
            padding: 0;
        }

        .card a {
            text-decoration: none;
        }

        .card a::after {
            content: " ->";
        }

        .card a:hover {
            background: none;
            color: var(--text-color);
            text-decoration: underline;
        }

        .meta {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        footer {
            grid-area: footer;
            padding: 2rem;
            border-top: 2px solid var(--border-color);
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ site.base_url }}/">{{ site.title }}</a></h1>
        <div>STRUCTURAL_AESTHETICS_V1</div>
    </header>

    <nav>
        <ul>
            <li><a href="{{ site.base_url }}/">Home</a></li>
            <li><a href="{{ site.base_url }}/about/">About</a></li>
            <li><a href="{{ site.base_url }}/archive/">Archive</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer>
        &copy; {{ now() | date(format="%Y") }} {% if site.extra is defined and site.extra.author %}{{ site.extra.author }}{% else %}{{ site.title }}{% endif %}. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
