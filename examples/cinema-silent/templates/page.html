{% include "header.html" %}

<main>
    <div class="intertitle-box">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <h1>{{ page.title }}</h1>
        <div class="post-meta">
            Presented on {{ page.date | date(format="%B %d, %Y") }}
        </div>
        {% if page.summary %}
            <p><em>{{ page.summary | safe }}</em></p>
        {% endif %}
    </div>

    <article>
        {{ content | safe }}
    </article>
</main>

{% include "footer.html" %}
