<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined and page.title is defined %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body class="theme-dark">
  {% include "header.html" %}
  <main class="section-content">
    {% if page is defined and page.title is defined %}
    <h1 class="section-title">{{ page.title }}</h1>
    {% endif %}
    <div class="content">
      {{ content | safe }}
    </div>
    <ul class="post-list">
    {% if section is defined and section.pages is defined %}
    {% for p in section.pages %}
      <li><a class="post-link-title" href="{{ p.url }}">{{ p.title }}</a></li>
    {% endfor %}
    {% endif %}
    </ul>
  </main>
  {% include "footer.html" %}
</body>
</html>
