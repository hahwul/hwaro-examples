<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxonomy | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body class="theme-dark">
  {% include "header.html" %}
  <main class="taxonomy-content">
    <h1 class="page-title">Taxonomy</h1>
    <ul class="taxonomy-list">
      {% if terms is defined %}
      {% for t in terms %}
      <li><a href="{{ base_url }}/tags/{{ t }}/">{{ t }}</a></li>
      {% endfor %}
      {% endif %}
    </ul>
  </main>
  {% include "footer.html" %}
</body>
</html>
