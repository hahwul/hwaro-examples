# Narrator profiles for Uplift. Loaded via load_data(path="data/narrators.toml")
# on the /narrators/ page and the homepage teaser. Every narrator here is also
# the author of the title they read — see data/titles.toml for the catalog.

[[items]]
slug = "odile-ferrand"
name = "Odile Ferrand"
home = "Penlee Point, Cornwall"
credential = "Nineteen years a lighthouse keeper before the last manual station automated"
note = "I know where every one of my own sentences takes a breath, because I wrote them at the same desk where I used to log the weather. Nobody else could read this book at the right speed."
title = "The Long Marsh Road"
title_slug = "long-marsh-road"

[[items]]
name = "Tomas Reyk"
slug = "tomas-reyk"
home = "Hallandale Fen, Sweden"
credential = "Field ornithologist turned novelist, still holds a bird-ringing license"
note = "My editor wanted a professional narrator for the surveyor's monologues. I told her the character counts wingbeats out loud without noticing, and I am the only person alive who does that involuntarily."
title = "Nightjar"
title_slug = "nightjar"

[[items]]
name = "Priya Anand Vance"
slug = "priya-anand-vance"
home = "Leicester, England"
credential = "Radio engineer by trade, essayist by 6 a.m. habit"
note = "Half these essays were dictated into a handheld recorder before they were ever typed. The audiobook is closer to the first draft than the page is."
title = "Static and Salt"
title_slug = "static-and-salt"

[[items]]
name = "Helene Buys"
slug = "helene-buys"
home = "Cape Town, South Africa"
credential = "Marine surveyor, six seasons charting a coastline that keeps redrawing itself"
note = "There are eleven place names in this book I made up, and four I didn't. I'm not telling a studio actor which is which."
title = "The Cartographer's Daughter"
title_slug = "cartographers-daughter"

[[items]]
name = "August Linden"
slug = "august-linden"
home = "Missoula, Montana"
credential = "Poet, formerly a divorce mediator"
note = "Every poem in this book has a place where the line breaks and the sentence doesn't agree with each other. I built that disagreement on purpose. A narrator reading it cold would smooth it out without meaning to."
title = "Six Ways to Leave a Room"
title_slug = "six-ways-to-leave-a-room"

[[items]]
name = "Marcus Odell"
slug = "marcus-odell"
home = "Dayton, Ohio"
credential = "Eleven years in accounts recovery before he quit to write about it"
note = "I've said versions of these sentences on the phone to strangers for a decade. Reading them into a microphone was, honestly, the easy part."
title = "Ledger of Small Debts"
title_slug = "ledger-of-small-debts"

[[items]]
name = "Renata Solis"
slug = "renata-solis"
home = "Providence, Rhode Island"
credential = "Regional theater actor, thirty seasons, four understudy contracts a year"
note = "I know exactly how loud to say a line I never got to say onstage. That volume isn't written anywhere in the script. It's in me."
title = "The Understudy's Almanac"
title_slug = "understudys-almanac"

[[items]]
name = "Colm Vasey"
slug = "colm-vasey"
home = "Kerry, Ireland"
credential = "Sound recordist for wildlife documentary units across four continents"
note = "This book is partly about the difference between silence and the absence of a microphone. I couldn't hand that distinction to somebody who hasn't stood in both."
title = "Field Recordings"
title_slug = "field-recordings"

[[items]]
name = "Nadia Okafor-Lindqvist"
slug = "nadia-okafor-lindqvist"
home = "Malmö, Sweden"
credential = "Freelance copyeditor, mother of three, keeper of a very long list"
note = "The essays are about the invisible work of keeping a household running. Reading them out loud is, in a small way, the first time that work has been paid attention to as work."
title = "The Weight of Ordinary Days"
title_slug = "weight-of-ordinary-days"
