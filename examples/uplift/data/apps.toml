# Platform data for Uplift. Loaded via load_data(path="data/apps.toml") on
# the /apps/ page.

[[items]]
slug = "ios"
name = "iOS & iPadOS"
requirement = "iOS 16 or later"
note = "Full offline library, CarPlay support, and a lock-screen scrubber that shows the same chapter dashes as the catalog cards."

[[items]]
slug = "android"
name = "Android"
requirement = "Android 10 or later"
note = "Chromecast and Android Auto built in. Background download queue keeps Friday's release ready before you wake up, if you let it."

[[items]]
slug = "desktop"
name = "Desktop"
requirement = "macOS 12+ or Windows 11, browser-based"
note = "No install required — sign in at listen.uplift.example and the player keeps pace with whatever chapter you left on mobile."

[[items]]
slug = "car"
name = "Car Integration"
requirement = "CarPlay and Android Auto"
note = "Voice command jumps by chapter, not by minute, so 'skip ahead' lands where the author meant a break to happen."
