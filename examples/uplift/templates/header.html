<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <meta name="theme-color" content="#16100e">
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ base_url }}/" class="brand" aria-label="{{ site.title | e }}, home">
        <span class="brand-word">Uplift</span>
        <span class="brand-dashes" aria-hidden="true"><span></span><span></span><span></span></span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/catalog/">Catalog</a>
        <a href="{{ base_url }}/narrators/">Narrators</a>
        <a href="{{ base_url }}/pricing/">Pricing</a>
        <a href="{{ base_url }}/apps/">Apps</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>

      <div class="header-actions">
        <button type="button" class="search-trigger" id="search-trigger" aria-haspopup="dialog" aria-controls="search-overlay" data-search-url="{{ base_url }}/search.json">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"></circle><line x1="14" y1="14" x2="18.5" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line></svg>
          <span>Search</span>
          <kbd>/</kbd>
        </button>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search Uplift" hidden>
    <div class="search-overlay-panel">
      <div class="search-overlay-head">
        <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"></circle><line x1="14" y1="14" x2="18.5" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line></svg>
        <input type="search" id="search-input" placeholder="Search titles, narrators, pages&hellip;" autocomplete="off" aria-label="Search Uplift">
        <button type="button" class="search-close" id="search-close" aria-label="Close search">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="4" y1="4" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line><line x1="16" y1="4" x2="4" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line></svg>
        </button>
      </div>
      <p class="search-hint" id="search-status" role="status" aria-live="polite">Type to search the catalog and pages. Press Esc to close.</p>
      <ul class="search-results" id="search-results"></ul>
    </div>
  </div>

  <main id="main">
