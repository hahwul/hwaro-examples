{% include "header.html" %}
<article class="prose-page">
  <div class="prose-page-head">
    <h1>{{ section.title | e }}</h1>
    {% if section.description %}<p class="prose-page-lede">{{ section.description | e }}</p>{% endif %}
  </div>
  <div class="prose">
    {{ content | safe }}
    <ul class="section-list">
      {% for p in section.pages %}
      <li><a href="{{ base_url }}{{ p.url }}">{{ p.title | e }}</a></li>
      {% endfor %}
    </ul>
  </div>
</article>
{% include "footer.html" %}
