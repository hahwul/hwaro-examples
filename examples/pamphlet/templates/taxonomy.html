{% include "header.html" %}
  <main class="site-main">
    <h1>{{ taxonomy_name | capitalize }}</h1>
    <p class="taxonomy-desc">Browse all terms in this taxonomy:</p>
    <ul class="taxonomy-list">
      {% for term in terms %}
      <li><a href="{{ base_url }}{{ term.url }}">{{ term.name }}</a></li>
      {% endfor %}
    </ul>
    {{ content | safe }}
  </main>
{% include "footer.html" %}
