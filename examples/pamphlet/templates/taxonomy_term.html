{% include "header.html" %}
  <main class="site-main">
    <h1>{{ taxonomy_term | e }}</h1>
    <p class="taxonomy-desc">Posts tagged with this term:</p>
    <ul class="taxonomy-term-list">
      {% for item in taxonomy_pages %}
      <li><a href="{{ base_url }}{{ item.url }}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
    {{ content | safe }}
  </main>
{% include "footer.html" %}
