<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --text: #4a5568;
            --accent: #2d3748;
            --shadow: rgba(0,0,0,0.1);
            --highlight: rgba(255,255,255,0.7);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background: var(--bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 10px 10px 30px var(--shadow), -10px -10px 30px var(--highlight);
            text-align: center;
        }
        .card span { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #a0aec0; display: block; margin-bottom: 10px; }
        .card b { font-size: 1.5rem; color: var(--accent); }
        article {
            background: var(--bg);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 15px 15px 40px var(--shadow), -15px -15px 40px var(--highlight);
            margin-top: 60px;
            margin-bottom: 100px;
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">neu.dashboard</div>
            <nav>
                <a href="/">Metrics</a>
                <a href="/about">Analysis</a>
            </nav>
        </div>
    </header>
