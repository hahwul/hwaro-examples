# =============================================================================
# Headliner Bold - Top Billing
# Issue #1574 | Tags: event, festival, lineup, headliner, hierarchy
# =============================================================================

title = "Headliner Bold"
description = "A festival line-up poster built on billing hierarchy: SVG bracket shapes frame each tier, inline SVG stars decrease with billing order, and headliner type at 220px scales down to 16px with every tier set at 60 percent of the previous tier font size."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = false

[pagination]
enabled = false

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = false

[markdown]
safe = false
lazy_loading = false
