<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@900&family=Poppins:wght@600&family=Spectral:wght@400&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --gold: #FFD700;
      --black: #1A1A1A;
      --dark-gray: #2A2A2A;
      --white: #FFFFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Spectral', serif;
      line-height: 1.7;
    }

    .confetti-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 400px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .confetti {
      position: absolute;
      background-color: var(--gold);
      width: 10px;
      height: 20px;
      opacity: 0.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 5;
    }

    header {
      padding: 6rem 0;
      text-align: center;
    }

    .gala-title {
      font-family: 'Bodoni Moda', serif;
      font-weight: 900;
      font-size: 140px;
      color: var(--gold);
      margin: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    nav {
      margin-top: 2rem;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.2em;
      margin: 0 1.5rem;
    }

    nav a:hover {
      color: var(--gold);
    }

    main {
      padding: 4rem 0;
    }

    .award-category {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .award-category::after {
      content: "";
      flex: 1;
      height: 2px;
      background-color: var(--gold);
    }

    .winner-name {
      font-family: 'Bodoni Moda', serif;
      font-size: 48px;
      color: var(--gold);
      margin: 0;
    }

    .standing-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 100px;
      margin: 4rem 0;
      justify-content: center;
    }

    .standing-bar {
      width: 20px;
      background-color: var(--dark-gray);
    }

    .standing-bar.active {
      background-color: var(--gold);
    }

    .award-icon-svg {
      width: 120px;
      height: 120px;
      fill: var(--gold);
      margin: 2rem auto;
      display: block;
    }

    footer {
      text-align: center;
      padding: 6rem 0;
      background-color: var(--dark-gray);
      margin-top: 4rem;
    }

    @media (max-width: 768px) {
      .gala-title { font-size: 60px; }
      nav a { margin: 0 0.5rem; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="confetti-container">
    {% for i in range(20) %}
    <div class="confetti" style="left: {{ i * 5 }}%; top: {{ [10, 50, 100, 150, 200] | random }}px; transform: rotate({{ [0, 45, 90, 135] | random }}deg);"></div>
    {% endfor %}
  </div>

  <div class="container">
    <header>
      <h1 class="gala-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">Winners</a>
        <a href="{{ base_url }}/about/">Event Details</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p style="font-family: 'Poppins'; font-size: 12px; letter-spacing: 0.1em; color: var(--gold);">NO EMOJIS // NO GRADIENTS // APPLAUSE WORTHY</p>
    </footer>
  </div>
</body>
</html>
