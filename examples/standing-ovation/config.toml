# Standing Ovation Configuration
title = "Standing Ovation"
description = "Awards ceremony celebrating excellence: A theater awards gala theme with confetti motifs."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[og.auto_image]
enabled = true
background = "#1a1a1a"
text_color = "#FFD700"
accent_color = "#FFD700"
font_size = 48
show_title = true
style = "minimal"
format = "svg"

[markdown]
safe = false
lazy_loading = true
emoji = false
