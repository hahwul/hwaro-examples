<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page_title %}{{ page_title }} — {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default(site_description) }}">
  {{ og_all_tags | safe }}
  {{ canonical_tag | safe }}
  {{ highlight_tags | safe }}
  {{ auto_includes | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ base_url }}/" class="site-brand">
        <span class="brand-mark">DM</span>
        <span class="brand-name">DarkMarket</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/products/">Products</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
