{% include "header.html" %}

<main class="main">
  <section class="taxonomy-listing">
    <div class="container">
      <h1>{{ taxonomy_name | title }}</h1>
      <div class="taxonomy-grid">
        {% for term in taxonomy_terms %}
        <a href="{{ term.url }}" class="taxonomy-card">
          <span class="taxonomy-name">{{ term.name }}</span>
          <span class="taxonomy-count">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
      </div>
    </div>
  </section>
</main>

{% include "footer.html" %}
