title = "PIXEL QUEST"
description = "A retro gaming blog with 8-bit pixel art aesthetics"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"
paginate_by = 5

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
