{% extends "base.html" %}
{% block content %}
<main class="main-content">
  <div class="kinetic-text">
    <h1>{{ taxonomy_name | title }}: {{ term | e }}</h1>
  </div>
  <p class="taxonomy-desc">Pages categorized under <strong>{{ term | e }}</strong></p>
  <ul>
    {% for page in taxonomy_pages %}
      <li><a href="{{ page.permalink }}">{{ page.title | e }}</a></li>
    {% endfor %}
  </ul>
</main>
{% endblock content %}
