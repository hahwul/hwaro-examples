{% extends "base.html" %}
{% block content %}
<main class="main-content">
  <div class="kinetic-text">
    <h1>Taxonomy: {{ taxonomy_name | e }}</h1>
  </div>
  <p class="taxonomy-desc">Explore all terms in this taxonomy.</p>
  <ul>
    {% for term in taxonomy_terms %}
      <li><a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}/">{{ term | e }}</a></li>
    {% endfor %}
  </ul>
</main>
{% endblock content %}
