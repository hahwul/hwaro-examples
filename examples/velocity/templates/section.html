{% extends "base.html" %}
{% block content %}

{% if page.path == "/" %}
<section class="hero-section">
  <div class="hero-content">
    <div class="kinetic-text">
      <h1 class="hero-title">{{ page.title | e }}</h1>
    </div>
    <p class="hero-subtitle">{{ page.description | e }}</p>
    <a href="{{ base_url }}/about/" class="btn">Start Your Engines</a>
  </div>
</section>

<main class="main-content">
  {{ content | safe }}
</main>

{% else %}

<main class="main-content">
  <div class="kinetic-text">
    <h1>{{ page.title | e }}</h1>
  </div>
  {{ content | safe }}
  <ul class="section-list">
    {{ section.list }}
  </ul>
  {{ pagination }}
</main>
{% endif %}

{% endblock content %}
