<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ page.description | default(site.description) }}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: 'rgb(224 64 64)', light: 'rgb(240 96 96)', dark: 'rgb(192 48 48)' },
            surface: { DEFAULT: 'rgb(15 17 23)', card: 'rgb(24 27 36)', elevated: 'rgb(31 35 48)' },
            border: 'rgb(42 46 58)',
            muted: 'rgb(139 144 160)',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body {
      @apply bg-surface text-gray-200 font-sans antialiased;
    }

    .nav-link {
      @apply text-sm text-gray-400 font-medium tracking-wide uppercase transition-colors duration-200;
    }
    .nav-link:hover {
      @apply text-white;
    }

    .section-title {
      @apply text-3xl md:text-4xl font-extrabold text-white tracking-tight mb-2;
    }
    .section-subtitle {
      @apply text-muted text-lg mb-12;
    }

    .card {
      @apply bg-surface-card border border-border rounded-xl p-6 transition-all duration-200;
    }
    .card:hover {
      @apply border-primary/40 bg-surface-elevated;
    }

    .btn-primary {
      @apply inline-flex items-center justify-center px-8 py-3.5 bg-primary text-white font-bold text-sm tracking-wide rounded-lg no-underline transition-all duration-200;
    }
    .btn-primary:hover {
      @apply bg-primary-light;
    }

    .btn-outline {
      @apply inline-flex items-center justify-center px-8 py-3.5 border border-border text-gray-300 font-semibold text-sm tracking-wide rounded-lg no-underline transition-all duration-200;
    }
    .btn-outline:hover {
      @apply border-gray-500 text-white bg-white/5;
    }

    .speaker-card {
      @apply bg-surface-card border border-border rounded-xl overflow-hidden transition-all duration-200;
    }
    .speaker-card:hover {
      @apply border-primary/40 bg-surface-elevated;
    }
    .speaker-avatar {
      @apply w-full aspect-square bg-surface-elevated flex items-center justify-center text-5xl font-black text-primary/30 select-none;
    }

    .schedule-track {
      @apply text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full;
    }
    .track-a { @apply bg-primary/15 text-primary-light; }
    .track-b { @apply bg-sky-500/15 text-sky-400; }
    .track-c { @apply bg-amber-500/15 text-amber-400; }

    .schedule-row {
      @apply flex flex-col md:flex-row gap-4 md:gap-6 py-5 border-b border-border/60;
    }
    .schedule-row:last-child {
      @apply border-b-0;
    }

    .sponsor-logo {
      @apply flex items-center justify-center h-16 px-8 bg-surface-card border border-border rounded-lg text-gray-500 font-bold text-lg tracking-wider uppercase transition-all duration-200;
    }
    .sponsor-logo:hover {
      @apply border-border bg-surface-elevated text-gray-400;
    }

    .archive-card {
      @apply bg-surface-card border border-border rounded-xl p-6 transition-all duration-200;
    }
    .archive-card:hover {
      @apply border-primary/40 bg-surface-elevated;
    }

    .stat-value {
      @apply text-4xl md:text-5xl font-black text-white mb-1;
    }
    .stat-label {
      @apply text-sm text-muted uppercase tracking-wider font-medium;
    }

    .day-tab {
      @apply px-6 py-3 text-sm font-semibold rounded-lg cursor-pointer transition-all duration-200 border border-transparent;
    }
    .day-tab.active {
      @apply bg-primary text-white border-primary;
    }
    .day-tab:not(.active) {
      @apply text-gray-400 border-border hover:text-white hover:border-gray-500;
    }

    .prose h1 { @apply text-3xl font-extrabold text-white tracking-tight mb-6; }
    .prose h2 { @apply text-2xl font-bold text-white tracking-tight mt-10 mb-4; }
    .prose h3 { @apply text-xl font-bold text-white mt-8 mb-3; }
    .prose p { @apply text-gray-300 leading-relaxed mb-4; }
    .prose a { @apply text-primary-light no-underline hover:underline; }
    .prose ul { @apply list-disc pl-6 mb-4 text-gray-300; }
    .prose ol { @apply list-decimal pl-6 mb-4 text-gray-300; }
    .prose li { @apply mb-1; }
    .prose code { @apply font-mono text-sm bg-surface-elevated px-1.5 py-0.5 rounded text-gray-300; }
    .prose pre { @apply bg-surface-card border border-border rounded-lg p-4 overflow-x-auto mb-6; }
    .prose blockquote { @apply border-l-4 border-primary/40 pl-4 italic text-gray-400 my-6; }
    .prose img { @apply rounded-lg max-w-full my-6; }
  </style>
  {% if highlight_css %}<style>{{ highlight_css }}</style>{% endif %}
  {% if auto_include_css %}<style>{{ auto_include_css }}</style>{% endif %}
</head>
<body>

<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-border/50">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="{{ base_url }}/" class="text-white font-extrabold text-lg tracking-tight no-underline">
      SUMMIT <span class="text-primary font-mono text-sm ml-1">'26</span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="{{ base_url }}/#speakers" class="nav-link">Speakers</a>
      <a href="{{ base_url }}/#schedule" class="nav-link">Schedule</a>
      <a href="{{ base_url }}/#sponsors" class="nav-link">Sponsors</a>
      <a href="{{ base_url }}/#archive" class="nav-link">Archive</a>
      <a href="#" class="btn-primary text-xs px-5 py-2">Register Now</a>
    </nav>
  </div>
</header>

<div class="pt-16">
