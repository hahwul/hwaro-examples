<div class="schedule-row">
  <div class="w-full md:w-28 shrink-0">
    <span class="text-white font-mono font-bold text-sm">{{ time }}</span>
  </div>
  <div class="flex-1">
    <div class="flex items-center gap-3 mb-1.5">
      <span class="schedule-track track-{{ track }}">{{ track_name }}</span>
    </div>
    <h4 class="text-white font-semibold text-base mb-1">{{ title }}</h4>
    <p class="text-muted text-sm">{{ speaker }} &mdash; {{ org }}</p>
  </div>
</div>
