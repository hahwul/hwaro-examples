<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,900;1,200&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #141414;
            --text: #d4d4d4;
            --accent: #8b0000;
            --dark-red: #4a0000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            border-bottom: 1px solid var(--dark-red);
            text-align: center;
        }
        .logo {
            font-weight: 900;
            font-size: 3rem;
            color: var(--accent);
            text-transform: lowercase;
            letter-spacing: -2px;
            font-style: italic;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        nav a:hover { opacity: 1; color: var(--accent); }
        .visceral-hero {
            padding: 120px 0;
            text-align: center;
        }
        .visceral-hero h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            color: #fff;
        }
        .visceral-sub {
            font-size: 1.5rem;
            margin-top: 30px;
            font-style: italic;
            opacity: 0.7;
        }
        article {
            padding-bottom: 100px;
        }
        h2 { font-size: 3rem; color: #fff; border-bottom: 2px solid var(--dark-red); padding-bottom: 10px; margin-top: 60px; }
        blockquote {
            font-size: 2.5rem;
            border: none;
            text-align: center;
            margin: 80px 0;
            color: var(--accent);
            font-style: italic;
            font-weight: 200;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">visceral.</div>
            <nav>
                <a href="/">Instinct</a>
                <a href="/about">Origin</a>
            </nav>
        </div>
    </header>
