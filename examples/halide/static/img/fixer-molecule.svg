<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="fx-title">
  <title id="fx-title">Duotone poster diagramming the sodium thiosulfate fixer molecule as connected atoms</title>
  <rect width="900" height="1200" fill="#1c181a"/>
  <rect x="60" y="60" width="780" height="1080" fill="none" stroke="#ece6e6" stroke-width="4" opacity="0.35"/>
  <g stroke="#ece6e6" stroke-width="6" opacity="0.85">
    <line x1="450" y1="470" x2="450" y2="330"/>
    <line x1="450" y1="470" x2="320" y2="560"/>
    <line x1="450" y1="470" x2="580" y2="560"/>
    <line x1="320" y1="560" x2="230" y2="700"/>
    <line x1="580" y1="560" x2="670" y2="700"/>
    <line x1="450" y1="470" x2="450" y2="620"/>
    <line x1="450" y1="620" x2="450" y2="800"/>
  </g>
  <g stroke="#ff4d43" stroke-width="6" opacity="0.85">
    <line x1="450" y1="800" x2="330" y2="900"/>
    <line x1="450" y1="800" x2="570" y2="900"/>
    <line x1="450" y1="800" x2="450" y2="960"/>
  </g>
  <circle cx="450" cy="470" r="52" fill="#121012" stroke="#ff4d43" stroke-width="10"/>
  <circle cx="450" cy="620" r="40" fill="#121012" stroke="#ff4d43" stroke-width="10"/>
  <circle cx="450" cy="330" r="26" fill="#121012" stroke="#ece6e6" stroke-width="8"/>
  <circle cx="320" cy="560" r="26" fill="#121012" stroke="#ece6e6" stroke-width="8"/>
  <circle cx="580" cy="560" r="26" fill="#121012" stroke="#ece6e6" stroke-width="8"/>
  <circle cx="230" cy="700" r="34" fill="#121012" stroke="#ece6e6" stroke-width="8"/>
  <circle cx="670" cy="700" r="34" fill="#121012" stroke="#ece6e6" stroke-width="8"/>
  <circle cx="450" cy="800" r="40" fill="#121012" stroke="#ff4d43" stroke-width="10"/>
  <circle cx="330" cy="900" r="26" fill="#121012" stroke="#ff4d43" stroke-width="8"/>
  <circle cx="570" cy="900" r="26" fill="#121012" stroke="#ff4d43" stroke-width="8"/>
  <circle cx="450" cy="960" r="26" fill="#121012" stroke="#ff4d43" stroke-width="8"/>
</svg>
