{% include "header.html" %}
<main id="main" class="site-main">
  <header class="page-head">
    <p class="page-kicker">Find a folio</p>
    <h1 class="page-title">{{ page.title | e }}</h1>
    <p class="page-intro">Search titles, tags, and body text across every folio in the ledger.</p>
  </header>

  <form class="search-form" role="search" data-index="{{ base_url }}/search.json" data-base="{{ base_url }}" onsubmit="return false;">
    <label class="search-label" for="search-input">Search the ledger</label>
    <input class="search-input" id="search-input" type="search" name="q" placeholder="sync, graph, encryption&hellip;" autocomplete="off" autofocus>
  </form>
  <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
  <ol class="ledger ledger-search" id="search-results"></ol>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="{{ base_url }}/js/search.js"></script>
</main>
{% include "footer.html" %}
