<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,500&family=Inter:wght@400;500;600&family=Fragment+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | e }} — Releases" href="{{ base_url }}/releases/rss.xml">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="site-frame">
    <header class="site-header">
      <div class="site-header-inner">
        <a href="{{ base_url }}/" class="masthead-mark">
          <span class="masthead-glyph" aria-hidden="true">
            <svg viewBox="0 0 32 32" width="26" height="26" focusable="false">
              <path d="M9 25 L16 7 L23 25" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="11.5" y1="18.5" x2="20.5" y2="18.5" stroke="var(--accent)" stroke-width="2.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="masthead-word">{{ site.title | e }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ base_url }}/releases/">Releases</a>
          <a href="{{ base_url }}/tags/">Tags</a>
          <a href="{{ base_url }}/about/">About</a>
          <a href="{{ base_url }}/search/">Search</a>
        </nav>
      </div>
    </header>
