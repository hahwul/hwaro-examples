<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #333;
            --border: #000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 4px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 2rem;
            color: var(--text);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .story-hero {
            padding: 80px 0;
        }
        .story-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .story-panel {
            aspect-ratio: 4 / 3;
            border: 3px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel-num { font-weight: 900; font-size: 1.5rem; }
        .panel-desc { font-family: 'Permanent Marker', cursive; font-size: 0.9rem; }
        article { padding: 80px 0; }
        h2 { font-family: 'Permanent Marker', cursive; font-size: 3rem; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">STORYBOARD</div>
            <nav>
                <a href="/">Draft</a>
                <a href="/about">Final</a>
            </nav>
        </div>
    </header>
