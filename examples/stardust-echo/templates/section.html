{% extends "base.html" %}

{% block content %}
<div class="content-card">
  <h1>{{ page.title }}</h1>
  <div class="content-body">
    {{ content | safe }}
  </div>

  {% if section.pages %}
  <ul class="page-list">
    {% for p in section.pages %}
      <li>
        <a href="{{ base_url }}{{ p.path }}">{{ p.title }}</a>
        {% if p.description %}
          <span>{{ p.description }}</span>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
  {% endif %}
</div>
{% endblock %}
