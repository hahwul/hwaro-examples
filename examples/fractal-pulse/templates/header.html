<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description is defined %}{{ page.description | e }}{% endif %}">
  <title>{% if page is defined and page.title is defined %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <style>
  :root {
    --bg-deep: #050510;
    --accent-1: #00f0ff;
    --accent-2: #ff0055;
    --text-main: #e0eaff;
    --text-muted: #8090b0;
    --border-glow: rgba(0, 240, 255, 0.3);
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-deep);
    color: var(--text-main);
    margin: 0;
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at center, rgba(0,240,255,0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255,0,85,0.05) 0%, transparent 30%);
    z-index: -1;
    animation: pulseBackground 15s infinite alternate ease-in-out;
  }
  @keyframes pulseBackground {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(5deg); }
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 3rem;
  }
  .logo {
    font-size: 1.5rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 2px; color: transparent;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; background-clip: text;
    text-decoration: none;
    text-shadow: 0 0 10px rgba(0,240,255,0.2);
  }
  nav { display: flex; gap: 1.5rem; }
  nav a {
    color: var(--text-main); text-decoration: none; font-size: 0.9rem;
    text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s;
  }
  nav a:hover { color: var(--accent-1); text-shadow: 0 0 8px var(--border-glow); }
  h1, h2, h3 { font-weight: 700; line-height: 1.2; }
  h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; }
  a { color: var(--accent-1); text-decoration: none; }
  a:hover { color: var(--accent-2); }
  main { min-height: 60vh; }
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    backdrop-filter: blur(10px);
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px var(--border-glow);
    border-color: rgba(0, 240, 255, 0.2);
  }
  .post-list { display: grid; gap: 1rem; }
  @media (max-width: 600px) {
    header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    .container { padding: 0 1rem; }
  }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="container">
    <header>
      <a href="{{ base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
