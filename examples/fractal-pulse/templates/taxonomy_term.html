{% include "header.html" %}
<main>
  <h1>Term: {{ term }}</h1>
  <div class="post-list">
    {% if pages is defined %}
      {% for p in pages %}
      <div class="card">
        <h2><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        {% if p.description is defined %}<p style="color: var(--text-muted);">{{ p.description | e }}</p>{% endif %}
      </div>
      {% endfor %}
    {% endif %}
  </div>
</main>
{% include "footer.html" %}
