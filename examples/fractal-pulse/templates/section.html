{% include "header.html" %}
<main>
  <h1>{{ page.title | e }}</h1>
  <div class="content" style="margin-bottom: 2rem;">
    {{ content | safe }}
  </div>
  <div class="post-list">
    {% if section.pages is defined %}
      {% for p in section.pages %}
      <div class="card">
        <h2><a href="{{ p.url }}">{{ p.title | e }}</a></h2>
        {% if p.description is defined %}<p style="color: var(--text-muted);">{{ p.description | e }}</p>{% endif %}
      </div>
      {% endfor %}
    {% endif %}
  </div>
</main>
{% include "footer.html" %}
