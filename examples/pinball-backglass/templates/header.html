<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <header class="site-header">
    <div class="wrapper header-inner">
      <a href="{{ base_url }}/" class="site-brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="pinball">
            <circle cx="20" cy="20" r="18" fill="#e8202a" stroke="#0c0b10" stroke-width="4"/>
            <circle cx="20" cy="20" r="18" fill="none" stroke="#ffffff" stroke-width="1.5"/>
            <circle cx="14" cy="14" r="5" fill="#f5f3ea" stroke="#0c0b10" stroke-width="2"/>
          </svg>
        </span>
        <span class="brand-text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/search/">Search</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
    <div class="header-reel" aria-hidden="true">
      <span class="reel-label">SCORE</span>
      <span class="reel-cells">
        <span class="reel-digit">0</span><span class="reel-digit">0</span><span class="reel-digit">7</span><span class="reel-digit">3</span><span class="reel-digit">2</span><span class="reel-digit">9</span><span class="reel-digit">0</span>
      </span>
      <span class="reel-callout">REPLAY</span>
    </div>
  </header>
