<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="stylesheet" href="{{ base_url }}/css/psalm.css">
</head>
<body>
  <div class="site-wrapper">
    <div class="kiln-header">
      <div>
        <div style="font-size:.65rem;letter-spacing:.3em;opacity:.5">CATHEDRAL OF THE BLAST • CHOIR 09</div>
        <div class="title">PSALM / KILN</div>
      </div>
      <div style="font-size:.75rem;opacity:.5;text-align:right">CURRENT TEMPERATURE<br><span style="color:#ff6b00">1,482°C</span></div>
    </div>

    <section class="hero">
      <h1>THE FURNACE<br>SINGS</h1>
      <div class="hymn">THE STEEL CONFESSES ITS SINS IN FLAME</div>
    </section>

    <div class="pipes">
      <div class="pipe" onclick="singPipe(this)"></div>
      <div class="pipe" onclick="singPipe(this)"></div>
      <div class="pipe" onclick="singPipe(this)"></div>
      <div class="pipe" onclick="singPipe(this)"></div>
      <div class="pipe" onclick="singPipe(this)"></div>
      <div class="pipe" onclick="singPipe(this)"></div>
    </div>

    <section class="psalms">
      <div class="psalm">
        <div class="name">CANTICLE I — IGNITION</div>
        <div class="temp">1,611°C</div>
      </div>
      <div class="psalm">
        <div class="name">CANTICLE II — ASCENT</div>
        <div class="temp">1,309°C</div>
      </div>
      <div class="psalm">
        <div class="name">CANTICLE III — CONFESSION</div>
        <div class="temp">1,784°C</div>
      </div>
      <div class="psalm">
        <div class="name">CANTICLE IV — SILENCE</div>
        <div class="temp">982°C</div>
      </div>
    </section>

    <footer>THE CHOIR NEVER STOPS. ONLY THE FUEL DOES.</footer>
  </div>

  <script>
    function singPipe(p){
      p.classList.add('sing');
      setTimeout(()=> p.classList.remove('sing'), 480);
    }
    document.addEventListener('keydown', e=>{
      if(e.key.toLowerCase()==='s'){
        const pipes = document.querySelectorAll('.pipe');
        pipes.forEach((p,i)=> setTimeout(()=> singPipe(p), i*70));
      }
    });
    console.log('%c[PSALM] Press S for full choir.', 'color:#664020');
  </script>
</body>
</html>
