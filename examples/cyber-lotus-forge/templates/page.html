{% include "header.html" %}

<article class="glass-panel content">
  {% if page.title %}
    <h1>{{ page.title }}</h1>
  {% endif %}

  {% if page.date %}
    <div class="post-meta">
      {{ page.date | date("%B %d, %Y") }}
    </div>
  {% endif %}

  {{ content | safe }}
</article>
