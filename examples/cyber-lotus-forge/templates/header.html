<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(value=site.title) }} | {{ site.title }}</title>
  {% if page.description is defined %}
    <meta name="description" content="{{ page.description }}">
  {% elif site.description is defined %}
    <meta name="description" content="{{ site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #05020a;
      --bg-darker: #020106;
      --neon-pink: #ff007f;
      --neon-cyan: #00f0ff;
      --neon-purple: #8a2be2;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-bg: rgba(20, 10, 30, 0.4);
      --glass-border: rgba(255, 0, 127, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-void);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Cyber Lotus Background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, var(--neon-pink) 0%, transparent 20%),
                  radial-gradient(circle at 80% 20%, var(--neon-cyan) 0%, transparent 20%),
                  radial-gradient(circle at 20% 80%, var(--neon-purple) 0%, transparent 20%);
      background-size: 50% 50%;
      opacity: 0.15;
      animation: rotateBg 40s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: #fff;
    }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--neon-pink);
      text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
    }

    header {
      background: rgba(5, 2, 10, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    nav a:hover {
      color: var(--neon-cyan);
    }

    main {
      flex: 1;
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 2rem;
      width: 100%;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-cyan), transparent);
      opacity: 0.5;
    }

    footer {
      background: var(--bg-darker);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: auto;
    }

    /* Content Styling */
    .content h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content h2 {
      font-size: 2rem;
      margin-top: 2rem;
      color: var(--neon-pink);
    }

    .content p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    .content ul, .content ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    .content li {
      margin-bottom: 0.5rem;
    }

    .post-meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
    }

  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="{{ base_url }}" class="logo">{{ site.title }}</a>
      <nav>
        <ul>
          <li><a href="{{ base_url }}/">Home</a></li>
          <li><a href="{{ base_url }}/about/">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
