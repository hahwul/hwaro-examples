<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default(site.title) }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">

  {{ auto_includes_css }}

  <style>
    /* Light theme with warm off-white/ivory background */
    :root {
      --bg-color: #fdfbf7;
      --text-color: #2c2a26;
      --link-color: #7b2c2c; /* A traditional warm red/brown */
      --link-hover: #521919;
      --border-color: #e2dcd2;
      --meta-color: #757165;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      /* Serif typography throughout */
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 1.125rem;
      line-height: 1.7;
      margin: 0;
      padding: 0;
      /* Wide readable line length */
      max-width: 750px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    a:hover {
      border-bottom-color: var(--link-hover);
      color: var(--link-hover);
    }

    header.site-header {
      padding: 3rem 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 3rem;
      text-align: center;
    }

    .site-title {
      font-size: 2.5rem;
      font-weight: normal;
      letter-spacing: 1px;
      margin: 0 0 0.5rem 0;
      text-transform: uppercase;
    }

    .site-title a {
      color: var(--text-color);
      border: none;
    }

    .site-description {
      color: var(--meta-color);
      font-style: italic;
      margin: 0;
    }

    nav.main-nav {
      margin-top: 1.5rem;
    }

    nav.main-nav a {
      margin: 0 0.75rem;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--meta-color);
    }

    nav.main-nav a:hover {
      color: var(--text-color);
    }

    main {
      min-height: 60vh;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-weight: normal;
      color: var(--text-color);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 2.25rem; }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.5rem; }

    /* Article pages with drop caps */
    .post-content > p:first-of-type::first-letter {
      float: left;
      font-size: 4rem;
      line-height: 1;
      padding-top: 4px;
      padding-right: 8px;
      padding-left: 3px;
      color: var(--text-color);
    }

    /* Pull quotes */
    blockquote {
      margin: 2rem -1.5rem;
      padding: 1.5rem 2rem;
      border-left: 4px solid var(--link-color);
      background-color: rgba(0,0,0,0.02);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--meta-color);
    }

    code {
      font-family: 'Courier New', Courier, monospace;
      background-color: rgba(0,0,0,0.04);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }

    pre {
      background-color: #f0ebe1;
      padding: 1.5rem;
      overflow-x: auto;
      border-radius: 3px;
    }

    pre code {
      background-color: transparent;
      padding: 0;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 2rem auto;
    }

    .post-meta {
      color: var(--meta-color);
      font-size: 0.95rem;
      font-style: italic;
      margin-bottom: 2rem;
    }

    .tags-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .tags-list a {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border-color);
      color: var(--meta-color);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tags-list a:hover {
      border-color: var(--link-color);
      color: var(--link-color);
      text-decoration: none;
    }

    /* Archive organized by year */
    .year-group {
      margin-bottom: 3rem;
    }

    .year-header {
      font-size: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .archive-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .archive-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.5rem 0;
      border-bottom: 1px dashed var(--border-color);
    }

    .archive-item:last-child {
      border-bottom: none;
    }

    .archive-date {
      color: var(--meta-color);
      font-size: 0.9rem;
      white-space: nowrap;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title"><a href="{{ base_url }}/">{{ site.title }}</a></h1>
    <p class="site-description">{{ site.description }}</p>
    <nav class="main-nav">
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/posts/">Archive</a>
      <a href="{{ base_url }}/tags/">Tags</a>
    </nav>
  </header>
  <main>
