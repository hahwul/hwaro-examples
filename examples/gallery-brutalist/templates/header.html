<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eee;
            --text: #000;
            --accent: #555;
            --brutal: #fff;
            --shadow: rgba(0,0,0,1);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.2;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: left;
            border-bottom: 5px solid #000;
        }
        .logo {
            font-weight: 800;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 800;
        }
        .brutal-surface {
            background: var(--brutal);
            padding: 60px;
            box-shadow: 15px 15px 0 var(--shadow);
            margin-bottom: 80px;
            margin-top: 40px;
            border: 5px solid #000;
        }
        h2 { font-weight: 800; font-size: 4rem; color: #000; margin-top: 0; line-height: 0.9; text-transform: uppercase; letter-spacing: -3px; }
        article { font-size: 1.2rem; font-weight: 800; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">gallery.brutal</div>
            <nav>
                <a href="/">Raw</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
