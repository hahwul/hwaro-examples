<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.url != "/" %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,440;0,9..144,560;1,9..144,440;1,9..144,560&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ base_url }}/">
      <svg class="brand-mark" viewBox="0 0 32 22" width="28" height="19" aria-hidden="true" focusable="false">
        <path d="M1 6 C 9 7.4, 12.5 13.2, 16 14 C 19.5 13.2, 23 7.4, 31 6" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M8 17.5 C 12 18.3, 14 19.8, 16 20.2 C 18 19.8, 20 18.3, 24 17.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="brand-word">Hanok</span>
    </a>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ base_url }}/projects/">Projects</a>
      <a href="{{ base_url }}/approach/">Approach</a>
      <a href="{{ base_url }}/materials/">Materials</a>
      <a href="{{ base_url }}/studio/">Studio</a>
      <a class="nav-visit" href="{{ base_url }}/visit/">Visit</a>
    </nav>
  </header>
