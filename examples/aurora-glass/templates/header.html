<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6ee7b7;
      --secondary: #3b82f6;
      --tertiary: #9333ea;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.15);
      --bg-color: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.5);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background-color: var(--bg-color);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Aurora Background */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-color);
    }
    .aurora-blob {
      position: absolute;
      filter: blur(80px);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }
    .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); animation-delay: 0s; }
    .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--tertiary) 0%, transparent 70%); animation-delay: -5s; }
    .blob-3 { top: 30%; left: 40%; width: 40vw; height: 40vw; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%); animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10%, 10%) scale(1.1); }
      100% { transform: translate(-5%, -15%) scale(0.9); }
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .glass-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      margin: 2rem 0;
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    .site-main { flex: 1; }

    .site-footer {
      text-align: center;
      padding: 1.5rem;
      margin-top: auto;
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .site-footer a { color: var(--text-muted); text-decoration: none; }
    .site-footer a:hover { color: #fff; }

    /* Typography inside content */
    .content-area h1, .content-area h2, .content-area h3 {
      color: #fff;
      font-weight: 600;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }
    .content-area h1 { font-size: 2.2rem; margin-top: 0; }
    .content-area h2 { font-size: 1.6rem; }
    .content-area h3 { font-size: 1.25rem; }
    .content-area p { margin: 1em 0; color: var(--text); }
    .content-area a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px dashed var(--primary);
      transition: all 0.3s;
    }
    .content-area a:hover {
      color: var(--secondary);
      border-bottom-color: var(--secondary);
    }

    .content-area code {
      background: rgba(0,0,0,0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .content-area pre {
      background: rgba(0,0,0,0.3);
      padding: 1.25rem;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    .content-area pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 1.5rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.3s, background 0.3s;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
    }
    ul.section-list li a { font-weight: 500; font-size: 1.1rem; border: none; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1.1rem; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      height: 2.5rem;
      padding: 0 0.75rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      transition: all 0.3s;
    }
    nav.pagination a:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }
    .pagination-current span {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      font-weight: 600;
    }
    .pagination-disabled span { opacity: 0.4; }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; padding: 1.5rem; }
      .glass-container { padding: 1.5rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="aurora-bg">
    <div class="aurora-blob blob-1"></div>
    <div class="aurora-blob blob-2"></div>
    <div class="aurora-blob blob-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header glass-container">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
