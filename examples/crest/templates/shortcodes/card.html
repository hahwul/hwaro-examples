<div class="catalog-card">
  <div class="catalog-card-row">
    <span class="catalog-call">{{ call_number }}</span>
    <span class="catalog-drawer">{{ drawer | default("Special Collections — Staff File") }}</span>
  </div>
  <h2 id="{{ heading | slugify }}" class="catalog-heading">{{ heading }}</h2>
  <p class="catalog-subject">{{ subject }}</p>
</div>
