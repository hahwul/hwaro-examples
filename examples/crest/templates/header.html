<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,400&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ auto_includes_css }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="column">
      <a class="brand" href="{{ base_url }}/">
        <svg width="20" height="20" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M8 7h16v9c0 6-8 11-8 11s-8-5-8-11z" fill="var(--accent)"/>
          <line x1="11" y1="14" x2="21" y2="14" stroke="var(--bg)" stroke-width="1.1"/>
          <circle cx="16" cy="20.5" r="1.3" fill="var(--bg)"/>
        </svg>
        <span>Crest<span class="brand-dot">.</span></span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
        <a href="{{ base_url }}/cv/"{% if page.url == "/cv/" %} aria-current="page"{% endif %}>CV</a>
        <a href="{{ base_url }}/publications/"{% if page.section == "publications" %} aria-current="page"{% endif %}>Publications</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
    </div>
  </header>
