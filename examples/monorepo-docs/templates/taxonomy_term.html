{% include "header.html" %}

<article class="prose">
  <h1>Tag: {{ term.name }}</h1>

  <div style="margin-top: 2rem;">
    <ul style="list-style: none;">
      {% for page in term.pages %}
        <li style="margin-bottom: 1rem;">
          <a href="{{ page.permalink }}" style="font-size: 1.25rem; font-weight: 600;">{{ page.title }}</a>
          <p style="margin: 0; font-size: 0.9rem;">{{ page.description | default(value="") }}</p>
        </li>
      {% endfor %}
    </ul>
  </div>
</article>

{% include "footer.html" %}
