{% include "header.html" %}

  <main class="max-w-4xl mx-auto px-6 py-12">
    <header class="text-center mb-12">
      <div class="flex justify-center mb-6">
        <svg width="80" height="40" viewBox="0 0 80 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M 5 40 L 5 18 Q 5 0 40 0 Q 75 0 75 18 L 75 40" stroke="#4b5563" stroke-width="1.5" fill="none"/>
          <polygon points="40,0 35,8 45,8" fill="#d4a017" opacity="0.9"/>
        </svg>
      </div>
      <h1 style="font-family: 'Cinzel', serif; font-size: 2rem; color: #d4a017; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
        The Reliquary
      </h1>
      <p style="font-family: 'IM Fell English', serif; font-style: italic; color: #6b7280;">
        All inscribed seals and markings
      </p>
    </header>

    <!-- Rose window divider -->
    <div class="rose-divider">
      <svg class="rose-window" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="16" cy="16" r="15" stroke="#4b5563" stroke-width="1"/>
        <circle cx="16" cy="16" r="8" stroke="#4b5563" stroke-width="1"/>
        <circle cx="16" cy="16" r="3" fill="#991b1b"/>
        <line x1="16" y1="1" x2="16" y2="8" stroke="#4b5563" stroke-width="1"/>
        <line x1="16" y1="24" x2="16" y2="31" stroke="#4b5563" stroke-width="1"/>
        <line x1="1" y1="16" x2="8" y2="16" stroke="#4b5563" stroke-width="1"/>
        <line x1="24" y1="16" x2="31" y2="16" stroke="#4b5563" stroke-width="1"/>
        <line x1="5.04" y1="5.04" x2="10.69" y2="10.69" stroke="#4b5563" stroke-width="1"/>
        <line x1="21.31" y1="21.31" x2="26.96" y2="26.96" stroke="#4b5563" stroke-width="1"/>
        <line x1="26.96" y1="5.04" x2="21.31" y2="10.69" stroke="#4b5563" stroke-width="1"/>
        <line x1="10.69" y1="21.31" x2="5.04" y2="26.96" stroke="#4b5563" stroke-width="1"/>
        <path d="M 16 1 Q 20 8 16 8 Q 12 8 16 1" fill="#1a1a1a" stroke="#4b5563" stroke-width="0.5"/>
        <path d="M 16 31 Q 20 24 16 24 Q 12 24 16 31" fill="#1a1a1a" stroke="#4b5563" stroke-width="0.5"/>
        <path d="M 1 16 Q 8 12 8 16 Q 8 20 1 16" fill="#1a1a1a" stroke="#4b5563" stroke-width="0.5"/>
        <path d="M 31 16 Q 24 12 24 16 Q 24 20 31 16" fill="#1a1a1a" stroke="#4b5563" stroke-width="0.5"/>
      </svg>
    </div>

    <div class="flex flex-wrap gap-3 mt-8">
      {% for term in taxonomy_terms %}
      <a href="{{ base_url }}/tags/{{ term.name | slugify }}/" class="tag-pill">
        {{ term.name }} <span style="color: #4b5563;">({{ term.pages | length }})</span>
      </a>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
