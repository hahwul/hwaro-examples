{% include "header.html" %}

<article class="manifesto-article main-container">
  <header class="manifesto-header">
    <span class="card-num">CONCEPT / OUTLINE</span>
    <h1 class="manifesto-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="tagline" style="font-family: var(--font-display); font-size: 1.4rem; color: var(--color-text-muted); margin-top: 1rem; line-height: 1.3;">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="manifesto-content">
    {{ content | safe }}
  </div>

  {% if page.tags %}
    <div style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--color-border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--color-text-muted);">
      INDEX MAP // {{ page.tags | join(" // ") }}
    </div>
  {% endif %}
</article>

{% include "footer.html" %}
