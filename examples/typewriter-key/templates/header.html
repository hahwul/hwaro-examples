<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eee;
            --text: #333;
            --accent: #555;
            --key: #fff;
            --shadow: rgba(0,0,0,0.1);
        }
        body {
            background-color: #e0e0e0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .key-hero {
            padding: 100px 0;
            text-align: center;
        }
        .key-unit {
            display: inline-block;
            background: var(--key);
            padding: 40px 60px;
            border-radius: 10px;
            box-shadow: 10px 10px 30px var(--shadow), -5px -5px 15px rgba(255,255,255,0.8);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 60px;
        }
        article {
            background: var(--key);
            padding: 60px;
            border-radius: 4px;
            box-shadow: inset 5px 5px 15px var(--shadow);
        }
        h2 { font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">typewriter.key</div>
            <nav>
                <a href="/">Press</a>
                <a href="/about">Input</a>
            </nav>
        </div>
    </header>
