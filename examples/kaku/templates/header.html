<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present and page.title != site.title %}{{ page.title | e }} &middot; {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
  <script>
    {% raw %}(function () {
      try {
        var t = localStorage.getItem('kaku-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();{% endraw %}
  </script>
</head>
<body data-base="{{ base_url }}">
  <a class="skip-link" href="#main">Skip to content</a>
  
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-group">
        <a class="brand" href="{{ base_url }}/" aria-label="Kaku home">
          <svg class="site-logo" viewBox="0 0 100 100" width="36" height="36" aria-hidden="true">
            <path d="M25,30 C45,28 65,26 75,26 M30,42 C45,40 58,38 70,38 M20,54 C45,51 60,49 80,49 M50,15 C52,40 48,70 45,85 M35,68 C45,66 55,64 65,64 M32,80 C48,78 62,76 72,76 M35,66 L35,82 M65,62 L65,78" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-title">{{ site.title | e }}</span>
        </a>
        
        <form class="search-form" role="search" onsubmit="return false;">
          <label for="find-input" class="sr-only">Search garden</label>
          <div class="search-field">
            <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false">
              <circle cx="7" cy="7" r="4.5"/>
              <path d="M10.5 10.5 L14 14"/>
            </svg>
            <input id="find-input" type="search" placeholder="Search..." autocomplete="off" autocapitalize="off" spellcheck="false" aria-controls="find-results" aria-describedby="find-status">
          </div>
        </form>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/about/">About</a>
        <a href="{{ base_url }}/tools/">Tools</a>
      </nav>
    </div>
  </header>
