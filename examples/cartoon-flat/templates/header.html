<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #333;
            --accent: #555;
            --flat: #f0f4f8;
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--flat);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: lowercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .flat-surface {
            background: #fff;
            padding: 60px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border-radius: 4px;
            border: 2px solid #fff;
            position: relative;
        }
        h2 { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 2.2rem; color: #444; margin-top: 0; border-bottom: 2px solid var(--flat); padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">cartoon.flat</div>
            <nav>
                <a href="/">Simple</a>
                <a href="/about">Process</a>
            </nav>
        </div>
    </header>
