<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eee; --text: #1a1a1a; --accent: #555; --slab: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 40px; }
        header { text-align: left; padding-bottom: 40px; border-bottom: 2px solid #000; margin-bottom: 60px; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 5px; }
        .datum-surface { background: var(--slab); padding: 80px; box-shadow: 20px 20px 0 rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h2 { font-family: 'IBM Plex Mono', monospace; font-size: 2rem; color: #000; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">datum.slab</div></header>
