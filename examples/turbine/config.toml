title = "Turbine"
description = "Clean energy through wind and steam turbine rotation power"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "github"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "article"
twitter_card = "summary_large_image"

[pagination]
enabled = true
per_page = 6

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10
sections = ["energy"]

[markdown]
safe = false
lazy_loading = true
