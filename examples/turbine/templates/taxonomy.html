{% include "header.html" %}

  <main class="taxonomy-page">
    <div class="container">
      <header class="taxonomy-header">
        <h1 class="taxonomy-title">{{ taxonomy_name | capitalize }}</h1>
      </header>

      <div class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.slug }}/" class="taxonomy-term">
          <span class="term-name">{{ term.name }}</span>
          <span class="term-count">{{ term.count }}</span>
        </a>
        {% endfor %}
      </div>
    </div>
  </main>

{% include "footer.html" %}
