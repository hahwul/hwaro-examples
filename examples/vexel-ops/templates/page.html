{% include "header.html" %}
  <main>
    {% if page.title is present %}
    <section class="headline">
      <div class="num">[ Brief{% if page.date %} · {{ page.date | date("%Y.%m.%d") }}{% endif %} ]</div>
      <h1>{{ page.title | e }}</h1>
      {% if page.description %}<p>{{ page.description | e }}</p>{% endif %}
    </section>
    {% endif %}
    <article class="prose">{{ content | safe }}</article>
  </main>
{% include "footer.html" %}
