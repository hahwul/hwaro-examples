<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(value=site.description) | e }}">
  <title>{{ page.title | e }} | {{ site.title | e }}</title>
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
</head>
<body>
  <header class="panopticon-nav">
    <a href="{{ base_url }}/" class="logo">P<span>A</span>NOPTICON</a>
    <nav class="main-nav">
      <a href="{{ base_url }}/posts/">Archive</a>
      <a href="{{ base_url }}/about/">Protocol</a>
      <button class="search-trigger-btn" onclick="openSearch()">Scan</button>
    </nav>
  </header>

  <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Enter query..." autocomplete="off">
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <script src="{{ base_url }}/js/search.js"></script>
