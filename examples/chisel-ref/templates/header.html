<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --accent: #555; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 60px; }
        .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .chisel-surface { padding: 40px; border: 1px solid #eee; position: relative; }
        .chisel-surface::after { content: ''; position: absolute; bottom: 0; left: 0; width: 4px; height: 100%; background: #000; }
    </style>
</head>
<body>
    <div class="container">
    <header><div class="logo">chisel.ref</div></header>
