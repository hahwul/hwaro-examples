<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #00f2fe;
            --accent: #4facfe;
            --neon: rgba(0, 242, 254, 0.2);
            --shadow: rgba(0,0,0,0.8);
        }
        body {
            background-color: #000;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--text);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .neon-box {
            background: #000;
            padding: 80px;
            border-radius: 20px;
            box-shadow: 0 0 40px var(--neon);
            margin-bottom: 80px;
            border: 2px solid var(--text);
            position: relative;
        }
        h2 { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #fff; text-shadow: 0 0 20px var(--text); margin-top: 0; border-bottom: 1px solid var(--text); padding-bottom: 10px; }
        article { margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">neon.sign</div>
        <nav>
            <a href="/">Light</a>
            <a href="/about">Glow</a>
        </nav>
    </header>
