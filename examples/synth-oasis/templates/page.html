{% extends "base.html" %}

{% block content %}
<div class="glass-panel page-panel">
    {% if page is defined and page.title %}
    <h1 class="page-title">{{ page.title | default("Page") }}</h1>
    {% endif %}

    <div class="content-body">
        {% if content is defined %}
        {{ content | safe }}
        {% endif %}
    </div>
</div>
{% endblock %}
