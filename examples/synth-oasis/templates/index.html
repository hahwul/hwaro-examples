{% extends "base.html" %}

{% block content %}
<div class="glass-panel hero-panel">
    {% if page is defined and page.title %}
    <h1 class="neon-text">{{ page.title | default("Synth Oasis") }}</h1>
    {% endif %}

    <div class="content-body">
        {% if content is defined %}
        {{ content | safe }}
        {% endif %}
    </div>
</div>
{% endblock %}
