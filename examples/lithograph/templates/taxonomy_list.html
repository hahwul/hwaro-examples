{% extends "base.html" %}

{% block title %}{{ taxonomy.name | capitalize }} | {{ site.title }}{% endblock %}

{% block content %}
    <h2>{{ taxonomy.name | capitalize }}</h2>

    <ul class="tags">
    {% for term in terms %}
        <li><a href="{{ term.permalink }}">{{ term.name }} ({{ term.pages | length }})</a></li>
    {% endfor %}
    </ul>
{% endblock content %}
