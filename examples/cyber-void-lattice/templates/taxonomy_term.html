{% extends "base.html" %}

{% block content %}
<section class="taxonomy-term-container">
    {% if term %}
    <h1 class="term-title">{{ term.name }}</h1>

    <div class="term-pages">
        {% for page in term.pages %}
        <article class="list-item">
            <h2 class="item-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
        </article>
        {% endfor %}
    </div>
    {% else %}
    <p>Term not found.</p>
    {% endif %}
</section>
{% endblock %}
