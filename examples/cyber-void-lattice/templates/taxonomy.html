{% extends "base.html" %}

{% block content %}
<section class="taxonomy-container">
    {% if taxonomy_name %}
    <h1 class="taxonomy-title">Taxonomy: {{ taxonomy_name }}</h1>
    {% endif %}

    <div class="taxonomy-terms">
        {% if taxonomy_terms %}
            <ul>
            {% for term in taxonomy_terms %}
                <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No terms found.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
