<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-wrapper">
        <header class="site-header">
            <div class="logo">
                <a href="{{ base_url }}/">{{ site.title }}</a>
            </div>
            <nav class="main-nav">
                <a href="{{ base_url }}/about/">About</a>
                <a href="{{ base_url }}/projects/">Projects</a>
            </nav>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>&copy; 2024 {% if site.extra is defined and site.extra.author %}{{ site.extra.author }}{% else %}{{ site.title }}{% endif %}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
