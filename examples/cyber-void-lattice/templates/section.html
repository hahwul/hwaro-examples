{% extends "base.html" %}

{% block content %}
<section class="section-container">
    {% if section.title %}
    <h1 class="section-title">{{ section.title }}</h1>
    {% endif %}

    <div class="section-content">
        {{ content | safe }}
    </div>

    <div class="page-list">
        {% for page in section.pages %}
        <article class="list-item">
            <h2 class="item-title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
            {% if page.date %}
            <div class="item-meta">
                <span class="item-date">{{ page.date | date("%Y-%m-%d") }}</span>
            </div>
            {% endif %}
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
