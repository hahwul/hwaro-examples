<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f7f9;
            --text: #2c3e50;
            --accent: #a3d8f4;
            --glass: rgba(255, 255, 255, 0.4);
            --shadow: rgba(0,0,0,0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 60px 0;
            text-align: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .vial-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 80px;
            box-shadow: 10px 10px 30px var(--shadow);
            margin-bottom: 80px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 40px;
        }
        h2 { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 2.2rem; color: var(--accent); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        article { font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">glass.vial</div>
            <nav>
                <a href="/">Pure</a>
                <a href="/about">Focus</a>
            </nav>
        </div>
    </header>
