title = "Quantum"
description = "Exploring the strange world of quantum mechanics"
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = true
per_page = 5

[[taxonomies]]
name = "tags"

[sitemap]
enabled = true

[feeds]
enabled = true
type = "atom"
limit = 10
sections = ["posts"]

[markdown]
safe = false
