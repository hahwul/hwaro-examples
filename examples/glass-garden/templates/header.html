<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #334155;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.6);
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 2px;
            color: var(--accent);
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }
        .garden-hero {
            padding: 100px 0;
            text-align: center;
        }
        .garden-hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            font-style: italic;
            letter-spacing: -2px;
        }
        article {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
            margin-bottom: 80px;
        }
        h2 { font-family: 'Fraunces', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; margin-top: 0; }
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        .feature-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <div class="logo">glass.garden</div>
        <nav>
            <a href="/">Flora</a>
            <a href="/about">Lenses</a>
        </nav>
    </header>
