<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags | safe }}
  {{ hreflang_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #cba153; /* Silk gold */
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e6e6e6;
      --bg: #faf9f6; /* Off-white/silk color */
      --bg-subtle: #f0ebe1;

      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-weight: 300;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .site-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 2rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .site-logo:hover { color: var(--primary); }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s ease;
    }

    .site-header nav a:hover { color: var(--primary); }

    .site-main {
      flex: 1;
    }

    .site-footer {
      margin-top: 5rem;
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-serif);
      color: var(--text);
      font-weight: 600;
      line-height: 1.2;
    }

    h1 {
      font-size: 3rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    h2 { font-size: 2rem; margin-top: 2.5rem; margin-bottom: 1rem; }
    h3 { font-size: 1.5rem; }

    p { margin: 1.2em 0; }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--text);
    }

    pre {
      background: var(--text);
      color: var(--bg);
      padding: 1.5rem;
      overflow-x: auto;
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    blockquote {
      margin: 2rem 0;
      padding-left: 1.5rem;
      border-left: 2px solid var(--primary);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--text-muted);
    }

    /* Meta Info */
    .post-meta {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .post-meta span {
      display: flex;
      align-items: center;
    }

    .post-tags {
      display: flex;
      gap: 0.5rem;
    }

    .post-tags a {
      border: 1px solid var(--border);
      padding: 0.1rem 0.5rem;
      font-size: 0.75rem;
      border-radius: 20px;
    }

    /* Components */
    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-list li {
      margin-bottom: 3rem;
    }

    .post-list .post-meta {
      margin-bottom: 0.5rem;
    }

    .post-list h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

    .post-list h2 a {
      border-bottom: none;
    }

    .post-list p {
      margin-top: 0.5rem;
      color: var(--text-muted);
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 1.5rem; }

    nav.pagination {
      margin: 4rem 0 0;
      border-top: 1px solid var(--border);
      padding-top: 2rem;
    }

    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
      align-items: center;
    }

    nav.pagination a {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-muted);
      border-bottom: none;
    }

    nav.pagination a:hover { color: var(--primary); }

    .pagination-current span {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--primary);
    }

    .pagination-disabled span {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--border);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: center; text-align: center; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2.25rem; }
    }
  </style>
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}">Home</a>
        <a href="{{ base_url }}about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.title }} &middot; Powered by Hwaro</p>
    </footer>
  </div>
  {{ highlight_js | safe }}
  {{ auto_includes_js | safe }}
</body>
</html>
