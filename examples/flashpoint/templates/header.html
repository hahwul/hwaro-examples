<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ffae00;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: -1px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.5;
        }
        .flash-hero {
            padding: 150px 0;
            text-align: center;
            position: relative;
        }
        .flash-hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 12vw;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -8px;
            position: relative;
            z-index: 1;
        }
        .point-of-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }
        article { padding: 80px 0; }
        h2 { font-family: 'Unbounded', sans-serif; font-size: 3rem; text-transform: uppercase; border-left: 5px solid var(--accent); padding-left: 30px; }
        .critical-box {
            border: 1px solid var(--accent);
            padding: 40px;
            margin-top: 60px;
            background: rgba(255, 174, 0, 0.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div class="logo">FLASH//POINT</div>
            <nav>
                <a href="/">Ignition</a>
                <a href="/about">Momentum</a>
            </nav>
        </div>
    </header>
