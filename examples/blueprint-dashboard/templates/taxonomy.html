{% include "header.html" %}
  <main class="site-main">
    <div class="panel-left-block" style="border-right: none; margin-bottom: 2.5rem;">
      <div class="panel-header">
        <h1 class="panel-title">Drawing Index: <span>{{ taxonomy_name | e }}</span></h1>
        <span class="indicator-badge">INDEX_REGISTER</span>
      </div>

      <div class="badge-container" style="gap: 1rem; padding: 1rem 0;">
        {% for term in taxonomy_terms %}
          <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.9rem; padding: 0.4rem 0.9rem;">
            #{{ term.name | upper }} ({{ term.pages | length }})
          </a>
        {% endfor %}
      </div>
    </div>
  </main>
{% include "footer.html" %}
