<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #000; --accent: #ffcc00; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px; }
        header { text-align: center; padding: 60px 0; background: #000; color: #fff; transform: rotate(-2deg); width: 110%; margin-left: -5%; }
        .logo { font-family: 'Bangers', cursive; font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; }
        .riot-surface { margin-top: 80px; padding: 60px; border: 10px solid #000; position: relative; }
    </style>
</head>
<body>
    <header><div class="logo">riot.act</div></header>
