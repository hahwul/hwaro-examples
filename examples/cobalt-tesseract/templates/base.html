<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;800&display=swap');

        :root {
            --c-void: #000000;
            --c-white: #FFFFFF;
            --c-cobalt: #0047AB;
            --c-cobalt-light: #3366CC;
            --c-border: var(--c-white);

            --f-sans: 'Inter', sans-serif;
            --f-mono: 'IBM Plex Mono', monospace;

            --border-width: 2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--c-void);
            color: var(--c-white);
            font-family: var(--f-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Structure */
        .sidebar {
            background-color: var(--c-cobalt);
            border-right: var(--border-width) solid var(--c-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-brand {
            font-family: var(--f-mono);
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            color: var(--c-white);
            text-decoration: none;
            display: block;
            margin-bottom: 2rem;
        }

        .sidebar-nav {
            list-style: none;
            margin-top: 2rem;
        }

        .sidebar-nav li {
            margin-bottom: 1rem;
        }

        .sidebar-nav a {
            color: var(--c-white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: color 0.2s;
            display: inline-block;
            position: relative;
        }

        .sidebar-nav a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: var(--border-width);
            bottom: -2px;
            left: 0;
            background-color: var(--c-white);
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .sidebar-nav a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Main Content Structure */
        .main-content {
            padding: 4rem;
            max-width: 1000px;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 2rem;
            }
            .sidebar {
                border-right: none;
                border-bottom: var(--border-width) solid var(--c-border);
            }
        }

        /* Typography */
        h1, h2, h3, h4 {
            font-family: var(--f-sans);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: var(--c-white);
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            border-bottom: var(--border-width) solid var(--c-white);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 2rem;
            margin-top: 3rem;
            border-left: calc(var(--border-width) * 2) solid var(--c-cobalt);
            padding-left: 1rem;
        }

        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: #CCCCCC;
        }

        a {
            color: var(--c-cobalt-light);
            text-decoration: none;
            border-bottom: 1px solid var(--c-cobalt-light);
        }

        a:hover {
            color: var(--c-white);
            border-bottom-color: var(--c-white);
        }

        /* Code Blocks */
        pre {
            background-color: #111111;
            border: var(--border-width) solid #333333;
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        code {
            font-family: var(--f-mono);
            font-size: 0.9rem;
            color: #EEEEEE;
        }

        /* Component Showcase */
        .tesseract-box {
            border: var(--border-width) solid var(--c-border);
            padding: 2rem;
            margin: 2rem 0;
            position: relative;
            background-color: var(--c-void);
        }

        .tesseract-box::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .tesseract-box::after {
            content: 'TESSERACT';
            position: absolute;
            top: -0.8rem;
            right: 1rem;
            background-color: var(--c-void);
            padding: 0 0.5rem;
            font-family: var(--f-mono);
            font-size: 0.8rem;
            color: var(--c-cobalt-light);
            font-weight: 600;
        }

        /* Taxonomy Tags */
        .tag-list {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: var(--c-white);
            color: var(--c-void);
            font-family: var(--f-mono);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
        }

        .tag:hover {
            background-color: var(--c-cobalt);
            color: var(--c-white);
        }

        hr {
            border: 0;
            border-top: var(--border-width) dashed #333;
            margin: 3rem 0;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <aside class="sidebar">
            <div>
                <a href="{{ base_url }}/" class="sidebar-brand">{{ site.title }}</a>
                <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); font-family: var(--f-mono);">System Version 1.0</p>
                <ul class="sidebar-nav">
                    <li><a href="{{ base_url }}/posts/">Posts</a></li>
                    <li><a href="{{ base_url }}/tags/">Tags</a></li>
                </ul>
            </div>
            <div style="font-family: var(--f-mono); font-size: 0.8rem; color: rgba(255,255,255,0.5);">
                &copy; {{ site.title }}
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
