<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf9;
            --text: #333333;
            --accent: #111111;
            --line: #e6e0d8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            margin: 0;
            line-height: 1.9;
            font-size: 1.15rem;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 80px 0 40px 0;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        nav { margin-top: 20px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 1; }
        .novella-hero {
            padding: 60px 0;
            text-align: center;
        }
        .novella-hero h1 {
            font-size: 3.5rem;
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: var(--accent);
            line-height: 1.2;
        }
        .hero-divider {
            width: 50px;
            height: 1px;
            background: var(--text);
            margin: 40px auto;
            opacity: 0.3;
        }
        article { padding-bottom: 100px; }
        h2 { font-size: 2rem; font-weight: 400; color: var(--accent); margin-top: 60px; text-align: center; font-style: italic; }
        p { margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">NOVELLA</div>
            <nav>
                <a href="/">Chapter</a>
                <a href="/about">Author</a>
            </nav>
        </div>
    </header>
