<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description is present %}{{ page.description | e }}{% else %}{{ site_description | e }}{% endif %}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site_title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --bg: #ffffff;
      --text: #333333;
      --accent: #4a90e2;
      --border: #eeeeee;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; }
    .site-title a { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: var(--text); letter-spacing: 1px; text-transform: uppercase;}
    nav a { margin-left: 1rem; text-decoration: none; color: var(--text); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.5px;}
    nav a:hover { color: var(--accent); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .glass-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); padding: 2rem; border-radius: 8px; margin-bottom: 2rem; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    h1, h2, h3 { font-weight: 300; }
    footer { margin-top: 4rem; padding: 2rem 0; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid var(--border); }
    .section-list { list-style: none; padding: 0; }
    .section-list li { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .section-list h2 { margin: 0 0 0.5rem 0; font-size: 1.2rem;}
    code { background-color: #f9f9f9; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
    pre { background-color: #f9f9f9; padding: 1rem; border-radius: 4px; overflow-x: auto; }
  </style>
  {{ highlight_tags | safe }}
</head>
<body>
  <div class="container">
    <header>
      <div class="site-title"><a href="{{ base_url }}/">{{ site_title }}</a></div>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer>
      &copy; {{ site_title }}. Powered by Hwaro.
      {{ highlight_js }}
      {{ auto_includes_js }}
    </footer>
  </div>
</body>
</html>
