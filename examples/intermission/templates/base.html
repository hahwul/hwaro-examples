<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --burgundy: #4A0E0E;
      --cream: #F5F5DC;
      --gold: #D4AF37;
      --black: #1A1A1A;
      --white: #FFFFFF;
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--burgundy);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      line-height: 1.6;
      font-variant-numeric: oldstyle-nums;
    }

    .seat-pattern {
      height: 20px;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='20' viewBox='0 0 40 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20 L5 10 L35 10 L40 20' fill='none' stroke='%23D4AF37' stroke-width='1'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      opacity: 0.3;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      border-left: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
      min-height: 100vh;
      background-color: rgba(0,0,0,0.2);
    }

    header {
      padding: 4rem 0;
      text-align: center;
      border-bottom: 2px double var(--gold);
    }

    .site-title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 100px;
      color: var(--gold);
      margin: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    .day-label {
      font-feature-settings: "smcp";
      font-size: 18px;
      letter-spacing: 0.2em;
      color: var(--gold);
      display: block;
      margin-bottom: 1rem;
    }

    nav {
      margin-top: 2rem;
    }

    nav a {
      color: var(--cream);
      text-decoration: none;
      margin: 0 1rem;
      font-feature-settings: "smcp";
      letter-spacing: 0.1em;
    }

    nav a:hover {
      color: var(--gold);
    }

    main {
      padding: 4rem 0;
    }

    .program-listing {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .show-time {
      font-family: 'JetBrains+Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .show-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }

    .intermission-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--gold);
      color: var(--burgundy);
      padding: 0.2rem 0.6rem;
      font-family: 'JetBrains+Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      margin-top: 1rem;
    }

    .hourglass-svg {
      width: 40px;
      height: 40px;
      margin: 2rem auto;
      display: block;
    }

    footer {
      text-align: center;
      padding: 4rem 0;
      border-top: 2px double var(--gold);
      font-feature-settings: "smcp";
      font-size: 14px;
      color: var(--gold);
    }

    @media (max-width: 768px) {
      .site-title { font-size: 50px; }
      .container { border: none; }
    }
  </style>
</head>
<body>
  <div class="seat-pattern"></div>
  <div class="container">
    <header>
      <span class="day-label">Summer Season 2026</span>
      <h1 class="site-title">{{ site.title }}</h1>
      <nav>
        <a href="{{ base_url }}/">The Program</a>
        <a href="{{ base_url }}/about/">The Stage</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>REFRAIN FROM PHOTOGRAPHY // NO EMOJIS // NO GRADIENTS</p>
    </footer>
  </div>
  <div class="seat-pattern"></div>
</body>
</html>
