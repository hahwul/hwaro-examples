{% include "header.html" %}
<div class="section-rule">
  <h3>§ INDEX · {{ taxonomy_name | upper }}</h3>
  <span class="ord">{{ taxonomy_terms | length }} ENTRIES</span>
</div>
<div class="tax-grid">
  {% for term in taxonomy_terms %}
    <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">
      <span>#{{ term.name }}</span>
      <span>{{ term.pages | length }}</span>
    </a>
  {% endfor %}
</div>
{% include "footer.html" %}
