<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #222;
            --accent: #d35400;
        }
        body {
            background-color: #f0f0f0;
            color: var(--text);
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            line-height: 1.5;
        }
        .paperback-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--bg);
            padding: 60px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            min-height: 80vh;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        nav { margin-top: 10px; }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .paper-hero h1 {
            font-size: 3rem;
            margin: 0;
            line-height: 1.1;
        }
        article { margin-top: 40px; }
        h2 { font-size: 1.8rem; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="paperback-container">
    <header>
        <div class="logo">PAPER//BACK</div>
        <nav>
            <a href="/">Read</a>
            <a href="/about">About</a>
        </nav>
    </header>
