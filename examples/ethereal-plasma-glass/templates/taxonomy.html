{% include "header.html" %}
<main class="container">
    <div class="glass-panel">
        <h1>{{ page_title | default(taxonomy_name | capitalize) }}</h1>
        <div class="content">
            {{ content | safe }}
        </div>
        {% if terms is defined %}
        <ul class="taxonomy-list">
            {% for term in terms %}
            <li><a href="{{ term.url }}">{{ term.name }}</a> ({{ term.pages_count }})</li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
</main>
{% include "footer.html" %}
