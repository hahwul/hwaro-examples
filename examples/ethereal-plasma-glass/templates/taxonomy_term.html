{% include "header.html" %}
<main class="container">
    <div class="glass-panel">
        <h1>{{ page_title | default(taxonomy_term.name | capitalize) }}</h1>
        <div class="content">
            {{ content | safe }}
        </div>
        {% if taxonomy_pages %}
        <ul class="taxonomy-list">
            {% for page in taxonomy_pages %}
            <li><a href="{{ page.url }}">{{ page.title }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
</main>
{% include "footer.html" %}
