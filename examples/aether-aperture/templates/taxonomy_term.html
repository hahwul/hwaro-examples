{% extends "base.html" %}

{% block title %}{{ term.name }} | {{ site.title }}{% endblock %}

{% block content %}
<header class="page-header">
  <h1 class="page-title">{{ term.name }}</h1>
</header>

<article class="content-area">
  <ul>
  {% for page in term.pages %}
    <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
  {% endfor %}
  </ul>
</article>
{% endblock %}
