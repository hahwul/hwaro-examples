{% extends "base.html" %}

{% block content %}
<header class="page-header">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.description %}
  <p class="page-description">{{ page.description }}</p>
  {% endif %}
</header>

<article class="content-area">
  {{ content | safe }}
</article>
{% endblock %}
