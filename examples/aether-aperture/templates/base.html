<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #121215;
      --text-primary: #ededef;
      --text-secondary: #a1a1aa;
      --accent: #00ffcc;
      --border: #27272a;

      --font-sans: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 100vh;
      overflow: hidden;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--text-primary);
    }

    .sidebar {
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.05em;
      color: var(--text-primary);
      margin-bottom: 3rem;
      display: block;
      text-transform: uppercase;
    }

    .logo::after {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: var(--accent);
      margin-left: 8px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .nav-links a {
      color: var(--text-secondary);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text-primary);
    }

    .nav-links a::before {
      content: '';
      display: inline-block;
      width: 0;
      height: 1px;
      background-color: var(--accent);
      transition: width 0.3s ease;
      margin-right: 0;
    }

    .nav-links a:hover::before, .nav-links a.active::before {
      width: 20px;
      margin-right: 10px;
    }

    .footer-meta {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .main-content {
      padding: 4rem 6rem;
      overflow-y: auto;
      max-width: 1000px;
    }

    .page-header {
      margin-bottom: 4rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    .page-title {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .page-description {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .content-area {
      font-size: 1.125rem;
      color: var(--text-secondary);
    }

    .content-area h1, .content-area h2, .content-area h3 {
      color: var(--text-primary);
      font-weight: 400;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }

    .content-area h2 {
      font-size: 2rem;
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
    }

    .content-area p {
      margin-bottom: 1.5rem;
    }

    .content-area ul, .content-area ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    .content-area li {
      margin-bottom: 0.5rem;
    }

    .content-area blockquote {
      border-left: 1px solid var(--accent);
      padding-left: 1.5rem;
      margin: 2rem 0;
      color: var(--text-primary);
      font-style: italic;
    }

    .content-area pre {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 1.5rem;
      overflow-x: auto;
      margin-bottom: 2rem;
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    .content-area code {
      font-family: var(--font-mono);
      background-color: var(--bg-secondary);
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--border);
      font-size: 0.9em;
      color: var(--accent);
    }

    .content-area pre code {
      background-color: transparent;
      padding: 0;
      border: none;
      color: inherit;
    }

    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 1.5rem;
        flex-direction: row;
        align-items: center;
      }

      .logo {
        margin-bottom: 0;
      }

      .nav-links {
        flex-direction: row;
      }

      .nav-links a::before {
        display: none;
      }

      .footer-meta {
        display: none;
      }

      .main-content {
        padding: 2rem;
        overflow-y: visible;
      }

      .page-title {
        font-size: 2rem;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div>
      <a href="{{ site.base_url }}/" class="logo">{{ site.title }}</a>
      <nav>
        <ul class="nav-links">
          <li><a href="{{ site.base_url }}/">Home</a></li>
          <li><a href="{{ site.base_url }}/about/">About</a></li>
        </ul>
      </nav>
    </div>
    <div class="footer-meta">
      &copy; {{ current_year }} {{ site.title }}<br>
      Built with Hwaro
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
