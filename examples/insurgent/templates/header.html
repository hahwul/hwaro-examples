<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Bungee+Outline&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #00ff00;
            --muted: #111;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--accent);
        }
        .logo {
            font-family: 'Bungee Outline', cursive;
            font-size: 2.5rem;
            color: var(--accent);
            line-height: 0.8;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .insurgent-hero {
            padding: 100px 0;
            position: relative;
        }
        .insurgent-hero h1 {
            font-size: 12vw;
            font-weight: 700;
            margin: 0;
            line-height: 0.7;
            text-transform: uppercase;
            letter-spacing: -5px;
            transform: rotate(-5deg);
        }
        .subvert-label {
            background: var(--accent);
            color: #000;
            display: inline-block;
            padding: 5px 20px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 40px;
            transform: rotate(2deg);
        }
        article { padding: 80px 0; }
        h2 { font-size: 3rem; text-transform: uppercase; color: var(--accent); transform: skewX(-10deg); border-bottom: 2px solid var(--accent); display: inline-block; }
        .grid-break {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        .grid-node {
            background: var(--muted);
            border: 1px solid #333;
            padding: 20px;
        }
        .grid-node.active { border-color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">INSURGENT</div>
            <nav>
                <a href="/">Subvert</a>
                <a href="/about">Evolve</a>
            </nav>
        </div>
    </header>
