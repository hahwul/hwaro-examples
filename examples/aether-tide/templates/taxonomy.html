{% extends "base.html" %}

{% block content %}
<div class="content-area glass-panel">
    <h1>{{ taxonomy.name | capitalize }}</h1>

    <ul class="post-list">
        {% for term in taxonomy.terms %}
        <li class="post-item">
            <h3><a href="{{ base_url | default(value='') }}{{ term.url }}">{{ term.name }}</a></h3>
            <p>{{ term.pages | length }} page(s)</p>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
