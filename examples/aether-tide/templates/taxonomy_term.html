{% extends "base.html" %}

{% block content %}
<div class="content-area glass-panel">
    <h1>{{ term.name }}</h1>

    {% if pages %}
    <ul class="post-list">
        {% for p in pages %}
        <li class="post-item">
            <h3><a href="{{ base_url | default(value='') }}{{ p.url }}">{{ p.title }}</a></h3>
            {% if p.description %}
            <p>{{ p.description }}</p>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
{% endblock %}
