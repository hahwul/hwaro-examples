{% include "header.html" %}
  <main class="site-main">
    <div class="wave-divider" aria-hidden="true">
      <svg viewBox="0 0 1200 46" preserveAspectRatio="none">
        <rect width="1200" height="46" fill="#f7f7f4"/>
        <path d="M0,23 C75,0 150,46 225,23 C300,0 375,46 450,23 C525,0 600,46 675,23 C750,0 825,46 900,23 C975,0 1050,46 1125,23 C1162,12 1181,12 1200,23 L1200,46 L0,46 Z" fill="#0b0b0b"/>
      </svg>
    </div>

    <div class="section-head">
      <h2>Signal Index: <span>{{ taxonomy_name | e }}</span></h2>
      <span class="tag-strip">Catalog</span>
    </div>

    <div class="badge-container" style="gap: 1rem; padding: 0.5rem 0;">
      {% for term in taxonomy_terms %}
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/" class="badge" style="font-size: 0.95rem; padding: 0.5rem 0.9rem;">
          #{{ term.name | upper }} ({{ term.pages | length }})
        </a>
      {% endfor %}
    </div>
  </main>
{% include "footer.html" %}
