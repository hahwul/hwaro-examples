<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">

  {{ og_all_tags }}
  {{ canonical_tag }}

  <!-- Bespoke Op-Art Dashboard stylesheet -->
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo" aria-label="Optikon home">
        <svg width="40" height="40" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="15" fill="#0b0b0b"/>
          <circle cx="16" cy="16" r="12" fill="#f7f7f4"/>
          <circle cx="16" cy="16" r="9" fill="#0b0b0b"/>
          <circle cx="16" cy="16" r="6" fill="#f7f7f4"/>
          <circle cx="16" cy="16" r="3" fill="#ff3b00"/>
        </svg>
        <span class="wordmark">OPTI<span>KON</span></span>
      </a>
      <nav aria-label="Primary">
        <a href="{{ base_url }}/">Overview</a>
        <a href="{{ base_url }}/posts/">Patterns</a>
        <a href="{{ base_url }}/about/">Colophon</a>
      </nav>
    </header>
