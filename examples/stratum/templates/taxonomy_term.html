{% include "header.html" %}

  <main class="section-main">
    <header class="section-header layer-topsoil">
      <p class="term-taxonomy">{{ page.taxonomy }}</p>
      <h1 class="section-title">{{ page.term }}</h1>
      <div class="layer-boundary boundary-topsoil"></div>
    </header>

    <div class="section-body layer-sandstone">
      <div class="timeline-line"></div>
      <div class="section-entries">
        {% for post in page.pages %}
        <article class="strata-entry">
          <div class="entry-marker">
            <span class="marker-dot"></span>
            <span class="marker-line"></span>
          </div>
          <div class="entry-content">
            <span class="entry-era">{% if post.extra.era %}{{ post.extra.era }}{% endif %}</span>
            <h3 class="entry-title"><a href="{{ base_url }}{{ post.url }}">{{ post.title }}</a></h3>
            <p class="entry-desc">{{ post.description }}</p>
            <a href="{{ base_url }}{{ post.url }}" class="entry-link">Examine this stratum</a>
          </div>
        </article>
        {% endfor %}
      </div>
    </div>
  </main>

{% include "footer.html" %}
