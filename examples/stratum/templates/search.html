{% include "header.html" %}

  <main class="search-main">
    <header class="search-header">
      <h1 class="search-title">{{ page.title }}</h1>
      <p class="search-desc">Sift through the sediment to find what lies beneath.</p>
    </header>
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="Search the geological record..." autofocus>
      <ul id="search-results" class="search-results"></ul>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script>
    (function() {
      var input = document.getElementById('search-input');
      var resultsEl = document.getElementById('search-results');
      var fuse;

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      fetch('{{ base_url }}/search.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3 });
        });

      input.addEventListener('input', function() {
        var query = input.value.trim();
        if (!query || !fuse) { resultsEl.innerHTML = ''; return; }
        var results = fuse.search(query).slice(0, 10);
        if (results.length === 0) {
          resultsEl.innerHTML = '<li class="search-empty">No strata found matching your query.</li>';
          return;
        }
        resultsEl.innerHTML = results.map(function(r) {
          return '<li class="search-item"><a href="' + escapeHtml(r.item.url) + '">' +
            '<span class="search-item-title">' + escapeHtml(r.item.title) + '</span>' +
            '</a></li>';
        }).join('');
      });
    })();
  </script>
