<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description, true) | e }}">
  <meta name="theme-color" content="#15100c">
  <title>{% if page.title is present %}{{ page.title | e }} · {% endif %}{{ site.title | e }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_url }}/favicon.svg">
  {{ og_all_tags }}
  {{ canonical_tag }}
  {{ jsonld }}
  {{ hreflang_tags }}
  {{ pagination_seo_links }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Libre+Franklin:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap site-header-inner">
      <a href="{{ base_url }}/" class="masthead" aria-label="Isobar home">
        <svg class="masthead-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" focusable="false">
          <path d="M10 24h12v-2.2h-1.4l-.7-3.3h1.3v-2h-2.4l-.6-4.3h1.4V9.6h-2.4V8h-1.8v1.6h-2.6V8h-1.8v1.6h-2.4v2.6h1.4l-.6 4.3H8.4v2h1.3l-.7 3.3H7.6V24H10Zm2.4-9.8h5.2l.5 4.3h-6.2z" fill="currentColor"/>
        </svg>
        <span class="masthead-text">
          <span class="masthead-title">{{ site.title | e }}</span>
          <span class="masthead-sub">chess endgame studies</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ base_url }}/studies/"{% if page.section == "studies" %} aria-current="page"{% endif %}>Studies</a>
        <a href="{{ base_url }}/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
      </nav>
      <button type="button" class="search-trigger" id="search-open" aria-haspopup="dialog" aria-controls="search-overlay" aria-label="Search studies">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 17 17"/></svg>
        <span class="search-trigger-label">Search</span>
        <kbd aria-hidden="true">/</kbd>
      </button>
    </div>
  </header>
