<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@900&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #2c3e50;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            line-height: 1.4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        header {
            padding: 40px 0;
            border-bottom: 2px solid var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Crimson Pro', serif;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .abe-hero {
            padding: 100px 0;
            text-align: center;
        }
        .abe-hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 15vw;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
        }
        article { padding: 60px 0; }
        .entry {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 40px;
            margin-bottom: 60px;
            align-items: baseline;
        }
        .letter {
            font-family: 'Crimson Pro', serif;
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
        }
        h2 { font-size: 2.5rem; text-transform: uppercase; margin-top: 0; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; width:100%;">
            <div class="logo">A.B.C.</div>
            <nav>
                <a href="/">Primer</a>
                <a href="/about">Lector</a>
            </nav>
        </div>
    </header>
