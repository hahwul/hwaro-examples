<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <header class="site-header">
    <div class="wrapper">
      <a href="{{ base_url }}/" class="site-brand">
        <span class="brand-gem">◇</span>
        <span class="brand-text">Topaz</span>
      </a>
      <nav class="site-nav hide-mobile">
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/posts/">Posts</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
      <button class="menu-toggle" id="menu-toggle" title="Menu" onclick="document.getElementById('mobile-menu').classList.toggle('open')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="{{ base_url }}/">Home</a>
      <a href="{{ base_url }}/posts/">Posts</a>
      <a href="{{ base_url }}/tags/">Tags</a>
      <a href="{{ base_url }}/about/">About</a>
    </div>
  </header>
