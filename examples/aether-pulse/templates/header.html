<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is defined and page.title %}{{ page.title | e }} - {% endif %}{% if site is defined %}{{ site.title | e }}{% endif %}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page is defined and page.section is defined %}{{ page.section }}{% endif %}">
  <div class="ambient-pulse-container">
    <div class="pulse-orb pulse-orb-1"></div>
    <div class="pulse-orb pulse-orb-2"></div>
    <div class="pulse-orb pulse-orb-3"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-logo">{% if site is defined %}{{ site.title }}{% else %}Aether Pulse{% endif %}</a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/tags/">Tags</a>
      </nav>
    </header>
