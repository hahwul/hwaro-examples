<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eee; --text: #333; --accent: #ffcc00; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; border: 4px solid var(--accent); background: #fff; position: relative; margin-top: 40px; }
        header { border-bottom: 1px solid #000; padding-bottom: 20px; margin-bottom: 40px; text-align: left; }
        .logo { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 5px; }
        .warning { position: absolute; top: 10px; right: 10px; font-family: 'IBM Plex Mono'; font-size: 0.6rem; background: var(--accent); padding: 5px 10px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
    <div class="warning">QUARANTINE_LEVEL_3</div>
    <header><div class="logo">quarantine.docs</div></header>
