# =============================================================================
# Site Configuration
# =============================================================================

title = "Neon Synth Grid"
description = "A cyberpunk neon aesthetic theme"
base_url = "/"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[pagination]
enabled = false
per_page = 10

[[taxonomies]]
name = "tags"
feed = true

[[taxonomies]]
name = "categories"

[markdown]
safe = false
lazy_loading = false
