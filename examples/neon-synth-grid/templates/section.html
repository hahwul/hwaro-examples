{% extends "base.html" %}
{% block content %}
<section>
    <h1>{{ page.title }}</h1>
    <div class="content">
        {{ content | safe }}
    </div>
    <ul class="page-list">
    {% for p in pages %}
        <li><a href="{{ base_url }}{{ p.slug }}/">{{ p.title }}</a></li>
    {% endfor %}
    </ul>
</section>
{% endblock %}
