<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
        :root {
            --bg: #090a0f;
            --grid-color: rgba(255, 0, 255, 0.3);
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image:
                linear-gradient(transparent 95%, var(--grid-color) 95%),
                linear-gradient(90deg, transparent 95%, var(--grid-color) 95%);
            background-size: 40px 40px;
            color: var(--text);
            font-family: monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(9, 10, 15, 0.85);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            margin-top: 2rem;
            flex: 1;
        }
        h1, h2, h3 {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }
        a {
            color: var(--neon-cyan);
            text-decoration: none;
        }
        a:hover {
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .header, .footer {
            text-align: center;
            padding: 1rem;
            border-bottom: 1px solid var(--neon-pink);
        }
        .footer {
            border-bottom: none;
            border-top: 1px solid var(--neon-pink);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ site.title }}</h1>
        <nav>
            <a href="{{ base_url }}">Home</a> | <a href="{{ base_url }}about/">About</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        <p>&copy; 2024 {{ site.title }}</p>
    </div>
</body>
</html>
