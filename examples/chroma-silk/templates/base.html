<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif site.description %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
    <div class="silk-background">
        <div class="silk-gradient silk-1"></div>
        <div class="silk-gradient silk-2"></div>
        <div class="silk-gradient silk-3"></div>
        <div class="silk-gradient silk-4"></div>
        <div class="silk-gradient silk-5"></div>
    </div>
    <div class="noise-overlay"></div>

    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
            <nav class="site-nav">
                <a href="{{ base_url }}/about/">About</a>
                <a href="{{ base_url }}/portfolio/">Portfolio</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; {{ current_year }} {{ site.title }}. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
