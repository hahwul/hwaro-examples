{% extends "base.html" %}

{% block content %}
<div class="glass-panel text-center" style="max-width: 600px; margin: 0 auto;">
    <h1 style="font-size: 4rem; margin-bottom: 1rem; background: linear-gradient(to right, #e2e8f0, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">Page Not Found</h2>
    <p style="margin-bottom: 2rem; color: #cbd5e1;">The silk thread you were following seems to have broken. The page you are looking for does not exist.</p>
    <a href="{{ base_url }}/" class="btn" style="display: inline-block; padding: 0.75rem 1.5rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; text-decoration: none; transition: all 0.3s ease;">Return to Home</a>
</div>
{% endblock %}
