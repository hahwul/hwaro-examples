{% extends "base.html" %}

{% block content %}
<div class="glass-panel text-center" style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: 2.5rem; margin-bottom: 1rem; background: linear-gradient(to right, #e2e8f0, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">{{ page.title | e }}</h1>
    <p class="taxonomy-desc" style="color: #cbd5e1; margin-bottom: 2rem;">Posts tagged with this term</p>

    <div style="text-align: left;">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
