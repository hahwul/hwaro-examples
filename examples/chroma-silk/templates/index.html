{% extends "base.html" %}

{% block content %}
<div class="hero">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
    {% endif %}
    <a href="{{ base_url }}/portfolio/" class="btn">View Portfolio</a>
</div>

{% if content %}
<div class="glass-panel" style="margin-top: 2rem;">
    <div class="content-body">
        {{ content | safe }}
    </div>
</div>
{% endif %}
{% endblock %}
