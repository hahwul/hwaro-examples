{% include "header.html" %}
  <main class="site-main">
    <article>
      <header>
        <h1>{{ page.title | e }}</h1>
        {% if page.date %}
          <div class="post-meta">{{ page.date | date("%B %d, %Y") }}</div>
        {% endif %}
      </header>
      <div class="content">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
