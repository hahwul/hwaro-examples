<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <header class="docs-header">
    <a href="{{ base_url }}/" class="logo">LEDGER<span>FINANCE</span></a>
    <nav>
      <a href="{{ base_url }}/income/">Income</a>
      <a href="{{ base_url }}/expenses/">Expenses</a>
      <a href="{{ base_url }}/reports/">Reports</a>
    </nav>
  </header>

  <div class="docs-container">
    <aside class="docs-sidebar">
      {% for section in site.sections %}
      <div class="sidebar-section">
        <h3 class="sidebar-title">{{ section.title }}</h3>
        <ul class="sidebar-links">
          {% for p in section.pages %}
          <li>
            <a href="{{ base_url }}{{ p.url }}" {% if page.url == p.url %}class="active"{% endif %}>{{ p.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </aside>

    <main class="docs-main">
