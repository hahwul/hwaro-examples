# =============================================================================
# Ledger Site Configuration
# =============================================================================

title = "Financial Ledger"
description = "A formal and elegant financial accounting ledger."
base_url = "http://localhost:3000"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false

