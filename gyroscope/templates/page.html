{% include "header.html" %}

<article class="max-w-4xl mx-auto py-12">
  <header class="mb-12 border-b border-gyro-silver/10 pb-8">
    <h1 class="text-4xl font-bold uppercase tracking-tight">{{ page.title }}</h1>
    {% if page.description %}
      <p class="text-gyro-silver/60 mt-4 text-xl italic">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose prose-invert max-w-none">
    {{ page.content | safe }}
  </div>
</article>
