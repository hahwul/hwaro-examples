<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #e2e8f0;
      --text: #e2e8f0;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --bg: #0f0f11;
      --bg-subtle: #18181b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.7; margin: 0; color: var(--text); background: var(--bg); font-weight: 300; }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 3rem 0; border-bottom: 1px solid var(--border); margin-bottom: 4rem; }
    .site-logo { font-weight: 500; font-size: 1.25rem; color: var(--text); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; }
    .site-logo:hover { opacity: 0.8; }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; text-transform: lowercase; letter-spacing: 0.05em; border-bottom: 1px solid transparent; padding-bottom: 2px; transition: all 0.3s ease; }
    .site-header nav a:hover { color: var(--primary); border-bottom-color: var(--primary); }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer { margin-top: 5rem; padding: 2rem 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; text-align: center; letter-spacing: 0.02em; }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; margin-top: 2em; margin-bottom: 0.75em; font-weight: 400; letter-spacing: -0.02em; }
    h1 { font-size: 2.5rem; margin-top: 0; color: #ffffff; }
    h2 { font-size: 1.75rem; color: #f8fafc; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.5em 0; color: var(--text-muted); font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; border-bottom: 1px solid rgba(226, 232, 240, 0.3); transition: border-color 0.2s ease; }
    a:hover { border-bottom-color: var(--primary); text-decoration: none; }
    code { background: var(--bg-subtle); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; border: 1px solid var(--border); }
    pre { background: var(--bg-subtle); padding: 1.5rem; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; display: grid; gap: 1rem; }
    ul.section-list li { padding: 1.25rem; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border); transition: transform 0.2s ease, border-color 0.2s ease; }
    ul.section-list li:hover { transform: translateY(-2px); border-color: rgba(226, 232, 240, 0.2); }
    ul.section-list li a { font-weight: 400; border-bottom: none; font-size: 1.1rem; }
    ul.section-list li a:hover { color: #ffffff; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; transition: all 0.2s ease; }
    nav.pagination a:hover { color: var(--bg); background-color: var(--primary); border-color: var(--primary); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--primary); background: transparent; color: var(--primary); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); color: var(--border); cursor: not-allowed; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: center; padding: 2rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
            <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
