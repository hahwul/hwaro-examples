{% include "header.html" %}

<main class="container page-content">
  <article>
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.date %}
      <div class="page-meta">
        <time datetime="{{ page.date | date('%Y-%m-%d') }}">{{ page.date | date('%B %d, %Y') }}</time>
      </div>
      {% endif %}
    </header>

    <div class="content">
      {{ content | safe }}
    </div>
  </article>
</main>

{% include "footer.html" %}
