<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
    <style>
    :root {
      --primary: #cba677; /* Elegant gold/bronze */
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: rgba(203, 166, 119, 0.2);
      --bg: #0a0a0c;
      --bg-subtle: rgba(20, 20, 24, 0.8);
      --glow: rgba(203, 166, 119, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        color: var(--text);
        background: var(--bg);
        overflow-x: hidden;
    }

    /* Canvas Background */
    #fireworksCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
        background-color: var(--bg);
    }

    /* Layout */
    .site-wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 1.5rem;
        position: relative;
        z-index: 1;
        background: rgba(10, 10, 12, 0.7);
        backdrop-filter: blur(10px);
        min-height: 100vh;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }
    .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2rem 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 3rem;
    }
    .site-logo {
        font-weight: 300;
        font-size: 1.5rem;
        color: var(--primary);
        text-decoration: none;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 10px var(--glow);
    }
    .site-logo:hover {
        text-shadow: 0 0 20px var(--glow);
    }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.95rem;
        letter-spacing: 1px;
        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .site-header nav a:hover {
        color: var(--primary);
        text-shadow: 0 0 8px var(--glow);
    }
    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
        margin-top: 4rem;
        padding: 2rem 0;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
        letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
        line-height: 1.3;
        margin-top: 2em;
        margin-bottom: 0.8em;
        font-weight: 300;
        color: var(--primary);
        letter-spacing: 1px;
    }
    h1 { font-size: 2.2rem; margin-top: 0; text-shadow: 0 0 15px var(--glow); }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 1.2em 0; font-weight: 300; }
    a {
        color: var(--primary);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.3s ease;
    }
    a:hover {
        border-color: var(--primary);
    }
    code {
        background: var(--bg-subtle);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.85em;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        color: #e0e0e0;
        border: 1px solid var(--border);
    }
    pre {
        background: var(--bg-subtle);
        padding: 1.5rem;
        border-radius: 8px;
        overflow-x: auto;
        border: 1px solid var(--border);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
        margin-bottom: 1rem;
        padding: 1.5rem;
        background: var(--bg-subtle);
        border-radius: 8px;
        border: 1px solid var(--border);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 15px var(--glow);
    }
    ul.section-list li a { font-weight: 400; font-size: 1.2rem; border: none; }
    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-style: italic; }
    nav.pagination { margin: 2.5rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    nav.pagination a { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; transition: all 0.3s ease; }
    nav.pagination a:hover { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .pagination-current span { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--primary); color: var(--bg); background: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .pagination-disabled span { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted); opacity: 0.4; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: center; }
      .site-wrapper { padding: 0 1.5rem; border-left: none; border-right: none; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <canvas id="fireworksCanvas"></canvas>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>
