<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
        :root {
            --color-bg: #fafafa;
            --color-text: #111111;
            --color-muted: #666666;
            --color-border: #e5e5e5;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", "Roboto Mono", "Oxygen Mono", "Ubuntu Monospace", "Source Code Pro", "Fira Mono", "Droid Sans Mono", "Courier New", monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #111111;
                --color-text: #eaeaea;
                --color-muted: #999999;
                --color-border: #333333;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            margin-bottom: 4rem;
        }

        .site-title {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--color-text);
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            color: var(--color-muted);
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--color-text);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 400;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 0;
        }

        h2 {
            font-size: 1.5rem;
        }

        p {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }

        a {
            color: var(--color-text);
            text-decoration: underline;
            text-decoration-color: var(--color-border);
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s ease;
        }

        a:hover {
            text-decoration-color: var(--color-text);
        }

        .post-meta {
            color: var(--color-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--color-border);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-item h2 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }

        .post-item a {
            text-decoration: none;
        }

        .post-item a:hover h2 {
            text-decoration: underline;
            text-decoration-color: var(--color-text);
            text-underline-offset: 4px;
        }

        .post-date {
            display: block;
            color: var(--color-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .post-desc {
            color: var(--color-text);
            margin: 0;
        }

        footer {
            margin-top: 6rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            color: var(--color-muted);
            font-size: 0.85rem;
            text-align: center;
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--color-border);
            margin: 3rem 0;
        }

        code {
            font-family: var(--font-mono);
            background: rgba(150, 150, 150, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.85em;
        }

        pre {
            background: rgba(150, 150, 150, 0.05);
            padding: 1.5rem;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid var(--color-border);
        }

        pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
        }

        blockquote {
            margin: 2rem 0;
            padding-left: 1.5rem;
            border-left: 2px solid var(--color-border);
            color: var(--color-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="site-title">{{ site.title }}</a>
            <nav>
                <a href="/">Home</a>
                <a href="/posts/">Writing</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            &copy; 2025 {{ site.title }}. Minimalist design.
        </footer>
    </div>
</body>
</html>
