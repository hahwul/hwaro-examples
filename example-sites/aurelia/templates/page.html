{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>

    {% if page.date %}
    <div class="post-meta">
        {{ page.date | date(format="%B %d, %Y") }}
    </div>
    {% endif %}

    <div class="content">
        {{ content }}
    </div>
</article>
{% endblock %}
