{% extends "base.html" %}

{% block content %}
  <div class="taxonomy-term-content">
    <h1>{{ taxonomy_name | capitalize }}: {{ term }}</h1>

    {% if taxonomy_pages %}
      <ul class="post-list">
        {% for p in taxonomy_pages %}
          <li class="post-item">
            <h2><a href="{{ site.base_url }}{{ p.path }}">{{ p.title }}</a></h2>
            {% if p.description %}
              <p>{{ p.description }}</p>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
{% endblock %}
