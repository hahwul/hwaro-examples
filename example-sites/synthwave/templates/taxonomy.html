{% extends "base.html" %}

{% block title %}{{ taxonomy_name | capitalize }} - {{ site.title }}{% endblock %}

{% block content %}
<div class="taxonomy">
    <h1>{{ taxonomy_name | capitalize }}</h1>
    <ul class="taxonomy-list">
        {% for term in taxonomy_terms %}
        <li><a href="{{ site.base_url }}/{{ taxonomy_name }}/{{ term }}/">{{ term }}</a></li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
