<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f0f0f0;
            --accent-color: #ff0055;
            --secondary-color: #00e5ff;
            --glow-spread: 15px;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 var(--glow-spread) rgba(255, 0, 85, 0.7);
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
        }

        header h1 a {
            color: var(--text-color);
        }

        header h1 a:hover {
            color: var(--accent-color);
        }

        nav {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav a {
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }

        .card {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
            transform: translateY(-5px);
        }

        .card-title {
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .card-meta {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        .button {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .tag:hover {
            background-color: rgba(0, 229, 255, 0.2);
            border-color: var(--secondary-color);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            color: #666;
            margin-top: 2rem;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        pre {
            background-color: #111;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            background-color: #111;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre code {
            padding: 0;
            background-color: transparent;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ base_url }}/">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ base_url }}/">Home</a>
            <a href="{{ base_url }}/about/">About</a>
            <a href="{{ base_url }}/posts/">Lineup</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ current_year }} {{ site.title }}. Example for Hwaro.</p>
    </footer>
</body>
</html>
