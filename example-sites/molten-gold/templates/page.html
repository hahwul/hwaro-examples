{% extends "base.html" %}

{% block content %}
<article class="page">
  <h1>{{ page.title }}</h1>

  <div class="content">
    {{ content | safe }}
  </div>

  {% if page.taxonomies and page.taxonomies.tags %}
  <div class="tags">
    {% for tag in page.taxonomies.tags %}
      <a href="{{ base_url }}/tags/{{ tag | urlencode }}/">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}
</article>
{% endblock %}
