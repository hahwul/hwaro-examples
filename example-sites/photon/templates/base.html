<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #ffffff;
      --secondary: #8a8a8a;
      --accent: #4fc3f7;
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --border: #222222;
      --glow: rgba(79, 195, 247, 0.2);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--primary);
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px 2px var(--glow), 0 0 20px 2px var(--glow);
      opacity: 0.5;
    }

    .particle-1 { top: 15%; left: 20%; animation: float 10s infinite alternate; }
    .particle-2 { top: 60%; left: 80%; animation: float 15s infinite alternate-reverse; width: 3px; height: 3px; box-shadow: 0 0 15px 3px var(--glow); }
    .particle-3 { top: 80%; left: 10%; animation: float 12s infinite alternate; }
    .particle-4 { top: 30%; left: 70%; animation: float 8s infinite alternate-reverse; }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      100% { transform: translateY(-30px) translateX(20px); opacity: 0.7; }
    }

    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-weight: 300;
      font-size: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .site-logo:hover {
      color: var(--accent);
      text-shadow: 0 0 8px var(--glow);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--secondary);
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }

    .site-main {
      min-height: calc(100vh - 250px);
    }

    .site-footer {
      margin-top: 5rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--secondary);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 {
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 3rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }

    h2 { font-size: 2rem; margin-top: 2.5rem; margin-bottom: 1rem; }
    h3 { font-size: 1.5rem; }

    p { margin: 0.5rem 0 1.5rem 0; color: var(--secondary); font-size: 1.1rem; }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: text-shadow 0.3s ease;
    }

    a:hover {
      text-shadow: 0 0 8px var(--glow);
    }

    code {
      background: var(--bg-surface);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #e0e0e0;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--bg-surface);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    pre code { background: none; padding: 0; border: none; }

    /* Content Area specific */
    .content-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .content-box::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: 12px;
      z-index: -1;
      box-shadow: 0 0 15px 0 var(--glow);
      opacity: 0.3;
      transition: opacity 0.5s ease;
    }

    .content-box:hover::before {
      opacity: 0.6;
    }

    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.5rem;
      background: var(--bg-surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    ul.section-list li:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px var(--glow);
      border-color: rgba(79, 195, 247, 0.3);
    }
    ul.section-list li a { font-size: 1.2rem; color: var(--primary); font-weight: 400; }
    ul.section-list li a:hover { color: var(--accent); text-shadow: none; }

    @media (max-width: 768px) {
      .site-header { flex-direction: column; gap: 1.5rem; }
      h1 { font-size: 2.5rem; }
      .content-box { padding: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="particle-container">
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
  </div>

  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      <div class="content-box">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 {{ site.title }}</p>
    </footer>
  </div>
</body>
</html>
