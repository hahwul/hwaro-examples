{% extends "base.html" %}

{% block content %}
<header>
  <h1>{{ taxonomy_name | default("Tags") | capitalize }}</h1>
</header>

<div class="taxonomy-list">
  <ul>
    {% for term in taxonomy_terms | default([]) %}
      <li>
        <a href="{{ site.base_url | default('/') }}/{{ taxonomy_name }}/{{ term | slugify }}/">{{ term }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
