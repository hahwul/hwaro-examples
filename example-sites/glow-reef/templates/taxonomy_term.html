{% extends "base.html" %}

{% block content %}
<header>
  <h1>{{ taxonomy_name | default("Tag") | capitalize }}: {{ taxonomy_term }}</h1>
</header>

<div class="post-list">
  {% for post in taxonomy_pages | default([]) %}
    <div class="post-card">
      <h2 class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      {% if post.date %}
        <div class="post-meta">{{ post.date | date("%B %d, %Y") }}</div>
      {% endif %}
    </div>
  {% endfor %}
</div>
{% endblock %}
