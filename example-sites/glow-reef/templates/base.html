<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default(site.title) }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default(site.description) }}">
  {% endif %}
  <style>
    /* CSS Variables for Bioluminescent Coral Reef Theme */
    :root {
      --bg-deep: #050510;
      --bg-card: #0b0f19;
      --text-main: #e0e6ed;
      --text-muted: #8a9bb3;
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff0055;
      --border-color: #1a2235;
      --font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }

    /* Container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header & Navigation */
    header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-decoration: none;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--neon-magenta);
      text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
    }

    /* Main Content */
    main {
      min-height: 60vh;
    }

    h1, h2, h3, h4 {
      color: var(--neon-cyan);
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: color 0.3s;
    }

    a:hover {
      color: var(--neon-magenta);
    }

    /* Lists */
    ul, ol {
      padding-left: 1.5rem;
    }

    /* Cards for Section Pages */
    .post-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .post-card:hover {
      transform: translateY(-3px);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .post-title {
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
    }

    .post-title a {
      color: var(--neon-cyan);
    }

    .post-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border-color);
      padding-top: 1.5rem;
      margin-top: 4rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ site.base_url | default('/') }}" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ site.base_url | default('/') }}">Home</a>
        <a href="{{ site.base_url | default('/') }}/posts/">Posts</a>
        <a href="{{ site.base_url | default('/') }}/about/">About</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; {{ current_year | default("2025") }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
