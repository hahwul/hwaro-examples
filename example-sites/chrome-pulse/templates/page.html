{% extends "base.html" %}

{% block content %}
<div class="surface">
  <article class="content-body">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <span class="post-date">{{ page.date | date("%B %d, %Y") }}</span>
    {% endif %}
    {{ content | safe }}
  </article>
</div>
{% endblock %}
