<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner" style="display: flex; justify-content: space-between; align-items: center;">
        <a href="{{ base_url }}/" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
          <ul>
            <li><a href="{{ base_url }}/">Home</a></li>
            <li><a href="{{ base_url }}/about/">About</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>
  <main class="main-content">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ current_year }} {{ site.title }}. Elegant Metallic Design.</p>
    </div>
  </footer>
</body>
</html>
