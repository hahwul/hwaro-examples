{% extends "base.html" %}

{% block content %}
<div class="surface">
  <h1>{{ taxonomy_name | title }}</h1>
  <ul class="post-list">
    {% for term in taxonomy_terms %}
      <li class="post-item">
        <h2 class="post-title"><a href="{{ term.url }}">{{ term.name }}</a></h2>
        <span class="post-date">{{ term.pages | length }} entries</span>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
