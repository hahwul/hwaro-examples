{% extends "base.html" %}

{% block content %}
<article>
    <header>
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <time datetime="{{ page.date | date("%Y-%m-%d") }}">{{ page.date | date("%B %d, %Y") }}</time>
        {% endif %}
    </header>
    <div class="content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
