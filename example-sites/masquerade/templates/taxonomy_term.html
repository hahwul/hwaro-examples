{% extends "base.html" %}

{% block content %}
    <h2>Pages tagged with "{{ taxonomy_name }}"</h2>
    {% if taxonomy_pages %}
        <ul class="taxonomy-pages">
        {% for p in taxonomy_pages %}
            <li><a href="{{ p.permalink }}">{{ p.title }}</a></li>
        {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
