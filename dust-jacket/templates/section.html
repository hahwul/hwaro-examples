{% include "header.html" %}
<article class="content">
  <header class="page-header">
    <div class="eyebrow">Catalogue</div>
    <h1>{% if page is present and page.title %}{{ page.title | e }}{% elif section is present and section.title %}{{ section.title | e }}{% else %}Titles{% endif %}</h1>
  </header>
  {{ content }}
  <ul class="section-list">
    {{ section.list }}
  </ul>
  {{ pagination }}
</article>
{% include "footer.html" %}
