<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} &mdash; {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
</head>
<body>
  <div class="bleed-sheet">
    <svg class="crop-mark tl" viewBox="0 0 32 32" aria-hidden="true"><line x1="0" y1="16" x2="12" y2="16" stroke="#ff4400" stroke-width="1.2"/><line x1="16" y1="0" x2="16" y2="12" stroke="#ff4400" stroke-width="1.2"/></svg>
    <svg class="crop-mark tr" viewBox="0 0 32 32" aria-hidden="true"><line x1="20" y1="16" x2="32" y2="16" stroke="#ff4400" stroke-width="1.2"/><line x1="16" y1="0" x2="16" y2="12" stroke="#ff4400" stroke-width="1.2"/></svg>
    <svg class="crop-mark bl" viewBox="0 0 32 32" aria-hidden="true"><line x1="0" y1="16" x2="12" y2="16" stroke="#ff4400" stroke-width="1.2"/><line x1="16" y1="20" x2="16" y2="32" stroke="#ff4400" stroke-width="1.2"/></svg>
    <svg class="crop-mark br" viewBox="0 0 32 32" aria-hidden="true"><line x1="20" y1="16" x2="32" y2="16" stroke="#ff4400" stroke-width="1.2"/><line x1="16" y1="20" x2="16" y2="32" stroke="#ff4400" stroke-width="1.2"/></svg>
    <svg class="registration-mark left" viewBox="0 0 28 28" aria-hidden="true">
      <circle cx="14" cy="14" r="9" fill="none" stroke="#ff4400" stroke-width="1"/>
      <line x1="0" y1="14" x2="28" y2="14" stroke="#ff4400" stroke-width="0.8"/>
      <line x1="14" y1="0" x2="14" y2="28" stroke="#ff4400" stroke-width="0.8"/>
    </svg>
    <svg class="registration-mark right" viewBox="0 0 28 28" aria-hidden="true">
      <circle cx="14" cy="14" r="9" fill="none" stroke="#ff4400" stroke-width="1"/>
      <line x1="0" y1="14" x2="28" y2="14" stroke="#ff4400" stroke-width="0.8"/>
      <line x1="14" y1="0" x2="14" y2="28" stroke="#ff4400" stroke-width="0.8"/>
    </svg>
    <nav class="bar-nav">
      <a href="{{ base_url }}/" class="brand">{{ site.title | upper }}</a>
      <a href="{{ base_url }}/issues/">Issues</a>
      <a href="{{ base_url }}/about/">Masthead</a>
      <a href="{{ base_url }}/tags/">Index</a>
      <span>ISSUE 07 &middot; VOL. IV</span>
    </nav>
