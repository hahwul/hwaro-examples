{% include "header.html" %}

<article class="glass-panel post-content">
    {% if page.title %}
    <div class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="post-meta">{{ page.description }}</p>
        {% endif %}
    </div>
    {% endif %}

    {{ content | safe }}
</article>
