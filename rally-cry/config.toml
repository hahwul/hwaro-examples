# Rally Cry Configuration
title = "Rally Cry"
description = "Movement Assembly: A grassroots rally theme with bold poster typography."
base_url = "http://localhost:3000"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
theme = "monokai"
use_cdn = true

[og]
default_image = "/images/og-default.png"
type = "website"
twitter_card = "summary_large_image"

[og.auto_image]
enabled = true
background = "#E6E6E6"
text_color = "#000000"
accent_color = "#D20000"
font_size = 48
show_title = true
style = "minimal"
format = "svg"

[markdown]
safe = false
lazy_loading = true
emoji = false
