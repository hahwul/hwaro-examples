{% include "header.html" %}
    <main>
        {{ section.content | safe }}

        <h2>Directory Listing</h2>
        <ul class="post-list">
        {% for post in section.pages %}
            <li>
                <a href="{{ post.permalink }}">{{ post.title }}</a>
                {% if post.date %}
                <span class="post-meta"> - {{ post.date | date(format="%Y-%m-%d") }}</span>
                {% endif %}
            </li>
        {% endfor %}
        </ul>
    </main>
{% include "footer.html" %}
