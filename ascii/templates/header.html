<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <style>
        :root {
            --bg-color: #0d0208;
            --text-color: #00ff41;
            --text-glow: 0 0 5px rgba(0, 255, 65, 0.4);
            --flicker-anim: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, 'Lucida Sans Typewriter', 'Lucida Console', monospace;
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            height: 100%;
            text-shadow: var(--text-glow);
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.06),
                rgba(0, 255, 0, 0.02),
                rgba(0, 0, 255, 0.06)
            );
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: var(--flicker-anim);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        ::selection {
            background: var(--text-color);
            color: var(--bg-color);
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--text-color);
            transition: all 0.2s ease;
        }

        a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--text-color);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 0.5rem;
        }

        h1::before { content: ">>> "; }
        h2::before { content: ">> "; }
        h3::before { content: "> "; }

        pre {
            background: rgba(0, 255, 65, 0.05);
            padding: 1.5rem;
            border: 1px solid var(--text-color);
            overflow-x: auto;
            margin: 2rem 0;
            position: relative;
        }

        pre::before {
            content: "[ DATA START ]";
            display: block;
            font-size: 0.7rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        pre::after {
            content: "[ DATA END ]";
            display: block;
            font-size: 0.7rem;
            margin-top: 1rem;
            opacity: 0.6;
            text-align: right;
        }

        code {
            font-family: inherit;
            background: rgba(0, 255, 65, 0.1);
            padding: 0.2rem 0.4rem;
        }

        pre code {
            padding: 0;
            background: transparent;
        }

        blockquote {
            border-left: 4px solid var(--text-color);
            margin: 2rem 0;
            padding: 0.5rem 0 0.5rem 1.5rem;
            background: rgba(0, 255, 65, 0.02);
        }

        hr {
            border: none;
            border-top: 1px double var(--text-color);
            margin: 3rem 0;
        }

        header {
            margin-bottom: 4rem;
        }

        .ascii-art {
            white-space: pre;
            font-size: clamp(0.5rem, 1.5vw, 0.9rem);
            line-height: 1.1;
            margin-bottom: 2.5rem;
            color: var(--text-color);
            filter: drop-shadow(0 0 2px var(--text-color));
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1.5rem;
            font-weight: bold;
        }

        nav a {
            border-bottom: none;
        }

        nav a::before { content: "[ "; }
        nav a::after { content: " ]"; }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--text-color);
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        .post-meta {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-left: 1rem;
        }

        .post-list {
            list-style-type: none;
            padding: 0;
        }

        .post-list li {
            margin-bottom: 1.2rem;
            display: flex;
            align-items: baseline;
        }

        .post-list li::before {
            content: "$ ";
            margin-right: 0.5rem;
            opacity: 0.8;
        }

        /* Content List Styles */
        .content ul, .content ol {
            list-style-type: none;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
        }

        .content li {
            margin-bottom: 0.5rem;
            position: relative;
        }

        .content ul li::before {
            content: "* ";
            position: absolute;
            left: -1.2rem;
            color: var(--text-color);
        }

        .content ol {
            counter-reset: item;
        }

        .content ol li::before {
            content: counter(item) ". ";
            counter-increment: item;
            position: absolute;
            left: -1.5rem;
            color: var(--text-color);
        }

        main {
            min-height: 60vh;
        }

        @media (max-width: 600px) {
            body { padding: 1rem; font-size: 14px; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="ascii-art">
 █████  ███████  ██████ ██ ██ 
██   ██ ██      ██      ██ ██ 
███████ ███████ ██      ██ ██ 
██   ██      ██ ██      ██ ██ 
██   ██ ███████  ██████ ██ ██ 
            </div>
            <nav>
                <a href="{{ config.base_url }}/">~/home</a>
                <a href="{{ config.base_url }}/about">~/about</a>
            </nav>
            <hr>
        </header>
