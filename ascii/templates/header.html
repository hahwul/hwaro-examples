<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.title }}</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #00ff00;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        ::selection {
            background: var(--text-color);
            color: var(--bg-color);
        }
        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px dotted var(--text-color);
        }
        a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: normal;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        h1::before { content: "# "; }
        h2::before { content: "## "; }
        h3::before { content: "### "; }

        pre {
            background: #111;
            padding: 1rem;
            border: 1px solid var(--text-color);
            overflow-x: auto;
        }
        code {
            font-family: 'Courier New', Courier, monospace;
            background: #111;
            padding: 0.1rem 0.3rem;
        }
        pre code {
            padding: 0;
            background: transparent;
        }
        blockquote {
            border-left: 2px dashed var(--text-color);
            margin: 1rem 0;
            padding-left: 1rem;
            font-style: italic;
        }
        hr {
            border: none;
            border-top: 1px dashed var(--text-color);
            margin: 2rem 0;
        }
        header {
            margin-bottom: 3rem;
        }
        .ascii-art {
            white-space: pre;
            font-size: 0.8rem;
            line-height: 1.2;
            margin-bottom: 2rem;
        }
        nav {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        nav a::before {
            content: "[ ";
        }
        nav a::after {
            content: " ]";
        }
        .post-meta {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }
        .post-list {
            list-style-type: none;
            padding: 0;
        }
        .post-list li {
            margin-bottom: 1rem;
        }
        .post-list li::before {
            content: "> ";
        }
    </style>
</head>
<body>
    <header>
<div class="ascii-art">
   _____  _________________  .___
  /  _  \ \_   ___ \______ \ |   |
 /  /_\  \/    \  \/|    |  \|   |
/    |    \     \___|    `   \   |
\____|__  /\______  /_______  /___|
        \/        \/        \/
</div>
        <nav>
            <a href="{{ config.base_url }}/">Home</a>
            <a href="{{ config.base_url }}/about">About</a>
        </nav>
        <hr>
    </header>
