{% include "header.html" %}
    <main>
        <article>
            <h1>{{ page.title }}</h1>

            {% if page.date %}
            <div class="post-meta">
                Date: {{ page.date | date(format="%Y-%m-%d") }}
            </div>
            {% endif %}

            <div class="content">
                {{ page.content | safe }}
            </div>
        </article>

        <br>
        <a href="{{ config.base_url }}/">&lt;- cd ..</a>
    </main>
{% include "footer.html" %}
