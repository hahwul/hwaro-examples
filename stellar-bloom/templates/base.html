<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <style>
        :root {
            --bg-color: #05010f;
            --text-main: #e2d9f3;
            --text-muted: #a694c9;
            --accent-glow: #bd00ff;
            --accent-secondary: #00f0ff;
            --card-bg: rgba(20, 10, 40, 0.6);
            --border-color: rgba(189, 0, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* Header */
        header {
            padding: 2.5rem 0;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.05em;
        }

        .site-title a {
            color: #fff;
            text-decoration: none;
            background: linear-gradient(90deg, #fff, var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-secondary);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-secondary);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-secondary);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 4rem 0;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            color: #fff;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 3rem;
            margin-top: 0;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a {
            color: var(--accent-secondary);
            text-decoration: none;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent-secondary);
        }

        p {
            margin-bottom: 1.5rem;
        }

        /* Custom Elements */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(189, 0, 255, 0.15);
            border-color: rgba(189, 0, 255, 0.4);
        }

        .glowing-text {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
        }

        /* Code Blocks */
        pre code, .hljs {
            background-color: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
            color: #e2d9f3 !important;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        code {
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            background-color: rgba(189, 0, 255, 0.1);
            color: var(--accent-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        /* Footer */
        footer {
            padding: 3rem 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: auto;
        }

        .footer-glow {
            display: inline-block;
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 class="site-title"><a href="{{ base_url }}">{{ site.title }}</a></h1>
            <nav>
                <a href="{{ base_url }}">Home</a>
                <a href="{{ base_url }}about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-glow"></div>
            <p>&copy; 2024 {{ site.title }}. All rights reserved.</p>
            <p>Powered by <a href="https://github.com/hahwul/hwaro" target="_blank">Hwaro</a></p>
        </div>
    </footer>
</body>
</html>
