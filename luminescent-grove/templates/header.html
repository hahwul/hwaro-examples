<!DOCTYPE html>
<html lang="{% if page_language is defined %}{{ page_language }}{% else %}en{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page is defined and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page is defined and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">

  {% if og_all_tags is defined %}{{ og_all_tags }}{% endif %}
  {% if hreflang_tags is defined %}{{ hreflang_tags }}{% endif %}
  {% if highlight_css is defined %}{{ highlight_css }}{% endif %}
  {% if auto_includes_css is defined %}{{ auto_includes_css }}{% endif %}
</head>
<body data-section="{% if page is defined and page.section %}{{ page.section }}{% endif %}">
  <header>
    <div class="container">
      <a href="/" class="site-title">{{ site.title }}</a>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about/">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
