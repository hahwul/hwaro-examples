{% include "header.html" %}

<article class="glass-panel">
  {% if page is defined and page.title %}
    <h1 class="post-title glow-text">{{ page.title }}</h1>
  {% endif %}

  {% if page is defined and page.date %}
    <time class="post-meta">{{ page.date | date("%B %d, %Y") }}</time>
  {% endif %}

  <div class="content">
    {{ content }}
  </div>
</article>
