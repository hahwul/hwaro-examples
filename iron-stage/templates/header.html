<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) | e }}">
  <title>{% if page.title is present %}{{ page.title | e }} — {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Teko:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="{{ base_url }}/" class="brand">
      <svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Skull + crossed bones -->
        <g stroke="#E7E4DB" stroke-width="2" fill="none" stroke-linecap="round">
          <line x1="4"  y1="8"  x2="40" y2="36"/>
          <line x1="40" y1="8"  x2="4"  y2="36"/>
          <circle cx="4"  cy="8"  r="3" fill="#E7E4DB"/>
          <circle cx="40" cy="8"  r="3" fill="#E7E4DB"/>
          <circle cx="4"  cy="36" r="3" fill="#E7E4DB"/>
          <circle cx="40" cy="36" r="3" fill="#E7E4DB"/>
        </g>
        <ellipse cx="22" cy="22" rx="12" ry="11" fill="#0A0A0A" stroke="#E7E4DB" stroke-width="2"/>
        <circle cx="18" cy="21" r="2.5" fill="#8B2A0E"/>
        <circle cx="26" cy="21" r="2.5" fill="#8B2A0E"/>
        <path d="M17 28 L19 31 L21 28 L23 31 L25 28 L27 31" fill="none" stroke="#E7E4DB" stroke-width="1.5"/>
      </svg>
      <span>Iron Stage</span>
    </a>
    <nav class="topnav">
      <a href="{{ base_url }}/">Front</a>
      <a href="{{ base_url }}/bands/">Bands</a>
      <a href="{{ base_url }}/schedule/">Schedule</a>
      <a href="{{ base_url }}/news/">News</a>
      <a href="{{ base_url }}/tickets/" class="cta">Tickets</a>
    </nav>
  </div>
</header>
