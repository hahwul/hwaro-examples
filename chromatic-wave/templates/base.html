<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    body { background-color: #0a0a0a; color: #f0f0f0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 30px; text-align: center; font-size: 1.1em; letter-spacing: 1px; }
    nav a { color: #f0f0f0; margin: 0 15px; text-decoration: none; opacity: 0.8; transition: opacity 0.3s; }
    nav a:hover { opacity: 1; }

    .glowing-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(100, 200, 255, 0.15), inset 0 0 20px rgba(100, 200, 255, 0.05);
      animation: pulse 4s infinite alternate;
      flex-grow: 1;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 20px rgba(100, 200, 255, 0.1), inset 0 0 15px rgba(100, 200, 255, 0.05); }
      100% { box-shadow: 0 0 40px rgba(200, 100, 255, 0.2), inset 0 0 25px rgba(200, 100, 255, 0.1); }
    }

    h1, h2, h3 { font-weight: 300; letter-spacing: 1px; color: #ffffff; }
    a { color: #88ccff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer { text-align: center; padding: 30px; opacity: 0.5; font-size: 0.9em; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ base_url }}/">Home</a>
    <a href="{{ base_url }}/about/">About</a>
  </nav>
  <div class="glowing-container">
    {% block content %}{% endblock %}
  </div>
  <footer>
    &copy; {{ current_year }} {{ site.title }}. Elegant light.
  </footer>
</body>
</html>
