<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>{% if page_title %}{{ page_title }} - {% endif %}{{ site_title }}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  {% if og_all_tags %}{{ og_all_tags | safe }}{% endif %}
  {% if canonical_tag %}{{ canonical_tag | safe }}{% endif %}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="layout">
  <aside class="sidebar">

      <p>Analytics Platform</p>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Overview</div>
        <a href="{{ base_url }}/" class="nav-link">

          Dashboard
        </a>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>

        <a href="{{ base_url }}/datasets/" class="nav-link">

        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Browse</div>
        <a href="{{ base_url }}/tags/" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Tags
        </a>
      </div>
    </nav>
  </aside>
