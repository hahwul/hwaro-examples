<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <title>{% if page.title == "Home" %}{{ site.title }} - {{ site.description }}{% else %}{{ page.title }} - {{ site.title }}{% endif %}</title>
  {{ og_all_tags | safe }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css | safe }}
  {{ auto_includes_css | safe }}
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a href="{{ base_url }}/" class="site-brand">Dusk</a>
      <nav class="site-nav">
        <a href="{{ base_url }}/posts/">Archive</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>
