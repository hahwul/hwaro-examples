{% include "header.html" %}

  <main class="wrapper">
    <div class="section-header">
      <h1 class="section-title">{{ taxonomy_name | title }}</h1>
    </div>

    <div class="taxonomy-list">
      {% for term in taxonomy_terms %}
      <div class="taxonomy-item">
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term.name | slugify }}/">
          <span>{{ term.name }}</span>
          <span class="taxonomy-count">{{ term.pages | length }}</span>
        </a>
      </div>
      {% endfor %}
    </div>
  </main>

{% include "footer.html" %}
