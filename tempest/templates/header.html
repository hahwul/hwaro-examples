<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <div class="lightning-flash" aria-hidden="true"></div>
  <div class="rain-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <div class="breaking-bar">
      <span class="breaking-label">BREAKING NEWS</span>
      <span class="breaking-text">Live coverage from the storm front</span>
    </div>
    <div class="header-main">
      <div class="container header-inner">
        <a href="{{ base_url }}/" class="site-brand">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ base_url }}/articles/">Headlines</a>
          <a href="{{ base_url }}/tags/">Topics</a>
          <a href="{{ base_url }}/about/">About</a>
        </nav>
      </div>
    </div>
  </header>
