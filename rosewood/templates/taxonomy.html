{% extends "base.html" %}

{% block content %}
<section>
  <h1>{{ taxonomy_name | capitalize }}</h1>

  <div class="taxonomy-list" style="margin-top: 2rem;">
    {% for term in taxonomy_terms %}
      <div style="margin-bottom: 1rem;">
        <a href="{{ base_url }}/{{ taxonomy_name }}/{{ term | slugify }}" style="font-size: 1.5rem; font-family: 'Playfair Display', serif;">{{ term }}</a>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
