{% extends "base.html" %}

{% block content %}
<section>
  <span class="post-meta">Entries tagged with</span>
  <h1>{{ taxonomy_term }}</h1>

  <div class="post-list" style="margin-top: 4rem;">
    {% for p in taxonomy_pages %}
    <div class="post-item">
      <span class="post-meta">{{ p.date }}</span>
      <h2><a href="{{ p.permalink }}">{{ p.title }}</a></h2>
      <p>{{ p.description }}</p>
      <a href="{{ p.permalink }}">Read more &rarr;</a>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
