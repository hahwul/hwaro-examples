{% include "header.html" %}
  <main class="site-main">
    <article class="release-detail">
      <div class="release-detail-header">
        <h1 class="version-number">{{ page.title }}</h1>
        {% if page.date %}
        <time class="release-date" datetime="{{ page.date }}">{{ page.date }}</time>
        {% endif %}
        {% if page.tags %}
        <div class="release-tags">
          {% for tag in page.tags %}
          <span class="badge badge-{{ tag }}">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
      <div class="release-body">
        {{ content | safe }}
      </div>
    </article>
  </main>
{% include "footer.html" %}
