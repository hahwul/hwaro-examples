<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  {{ og_all_tags }}
  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">Tesseract</span>
        <span class="logo-bracket">]</span>
        <span class="logo-dim">4D</span>
      </a>
      <nav class="main-nav">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="{{ base_url }}/" class="nav-link" data-axis="origin">
              <span class="axis-label">O</span>
              <span class="nav-text">Origin</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ base_url }}/posts/" class="nav-link" data-axis="x">
              <span class="axis-label">X</span>
              <span class="nav-text">Dimensions</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ base_url }}/about/" class="nav-link" data-axis="y">
              <span class="axis-label">Y</span>
              <span class="nav-text">About</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ base_url }}/tags/" class="nav-link" data-axis="z">
              <span class="axis-label">Z</span>
              <span class="nav-text">Tags</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="site-main">
