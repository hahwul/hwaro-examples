<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="vertical-ornament ornament-left">
        静寂と墨 - PAGODA - TRANQUILITY
    </div>
    <div class="vertical-ornament ornament-right">
        TRADITIONAL EAST ASIAN THEME
    </div>

    <div class="scroll-container">
        <header>
            <h1>{{ site.title }}</h1>
            <div class="subtitle">{{ site.description }}</div>
            <nav>
                <a href="/">Home</a>
                <a href="/posts/">Posts</a>
                <a href="https://github.com/hahwul/hwaro">Hwaro</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2026 Pagoda. Built with Hwaro.</p>
        </footer>
    </div>
</body>
</html>
