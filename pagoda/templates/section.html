{% include "header.html" %}
<section class="posts-list">
    <h2>{{ page.title }}</h2>
    <ul class="posts-grid">
        {% for doc in section.pages %}
        <li>
            <a href="{{ base_url }}{{ doc.url }}">{{ doc.title }}</a>
            <span class="post-meta">- {{ doc.date }}</span>
        </li>
        {% endfor %}
    </ul>
    {{ pagination }}
</section>
{% include "footer.html" %}
