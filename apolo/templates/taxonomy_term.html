{% extends "base.html" %}

{% block content %}
  <main class="site-main">
    <h1>Term: <span style="color: var(--primary); text-shadow: 0 0 10px var(--glow);">{{ taxonomy_name | e }}</span></h1>
    <p class="taxonomy-desc">Pages tagged with this term:</p>
    <ul class="section-list">
    {% for p in taxonomy_pages %}
      <li><a href="{{ base_url }}{{ p.url }}">{{ p.title | default('Untitled') | e }}</a></li>
    {% endfor %}
    </ul>
  </main>
{% endblock %}
