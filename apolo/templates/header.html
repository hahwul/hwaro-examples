<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #ffffff;
      --text: #e0e0e0;
      --text-muted: #888888;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #050505;
      --bg-subtle: #0f0f0f;
      --glow: rgba(255, 255, 255, 0.05);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      margin-bottom: 4rem;
      border-bottom: 1px solid var(--border);
    }
    .site-logo {
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      color: var(--primary);
      text-decoration: none;
      text-transform: uppercase;
    }
    .site-header nav { display: flex; gap: 2rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--primary); }

    .site-main { min-height: calc(100vh - 250px); }

    .site-footer {
      margin-top: 5rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.2; font-weight: 400; color: var(--primary); }
    h1 { font-size: 2.5rem; margin-top: 0; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
    h2 { font-size: 1.8rem; margin-top: 3rem; margin-bottom: 1rem; }
    h3 { font-size: 1.3rem; margin-top: 2rem; }
    p { margin: 1.2em 0; color: var(--text); }
    a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--text-muted); transition: border-color 0.3s ease, color 0.3s ease; }
    a:hover { color: var(--primary); border-color: var(--primary); }

    /* Elegant Content Blocks */
    .hero { margin-bottom: 4rem; }
    .hero p { font-size: 1.2rem; color: var(--text-muted); font-weight: 300; }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .project-card {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      padding: 2rem;
      border-radius: 4px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px var(--glow);
    }

    .project-card h3 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .project-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 0;
      border: none;
    }

    /* Code and pre elements */
    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: var(--text);
    }
    pre {
      background: var(--bg-subtle);
      padding: 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    pre code { background: none; padding: 0; color: var(--text-muted); border: none; }

    /* Lists and Taxonomies */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      transition: box-shadow 0.3s ease;
    }
    ul.section-list li:hover { box-shadow: 0 5px 15px var(--glow); }
    ul.section-list li a { font-weight: 400; border: none; font-size: 1.1rem; }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-weight: 300; }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1.5rem; align-items: flex-start; padding: 2rem 0; }
      .site-wrapper { padding: 0 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Work</a>
        <a href="{{ base_url }}/about/">Profile</a>
      </nav>
    </header>
