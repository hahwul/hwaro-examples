<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --primary: #f8f9fa;
      --text: #e9ecef;
      --text-muted: #868e96;
      --border: #343a40;
      --bg: #09090b;
      --bg-subtle: #16181d;
      --accent: #d0bfff;
      --glow: rgba(208, 191, 255, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 2rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .site-logo {
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .site-logo:hover {
      color: var(--accent);
      text-shadow: 0 0 12px var(--glow);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .site-header nav a:hover {
      color: var(--primary);
    }

    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      font-weight: 300;
    }

    /* Typography */
    h1, h2, h3, h4 {
      line-height: 1.3;
      margin-top: 2em;
      margin-bottom: 0.75em;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    h1 { font-size: 2.25rem; margin-top: 0; }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }

    p { margin: 1.2em 0; font-weight: 300; }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }
    a:hover {
      border-bottom: 1px solid var(--accent);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #e2e8f0;
      border: 1px solid #2d3748;
    }
    pre {
      background: var(--bg-subtle);
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }
    ul.section-list li:hover {
      border-color: #4a5568;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 10px var(--glow);
      transform: translateY(-2px);
    }
    ul.section-list li a {
      font-weight: 500;
      font-size: 1.1rem;
      border-bottom: none;
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-weight: 300; }

    nav.pagination { margin: 2rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    nav.pagination a {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    nav.pagination a:hover {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--glow);
    }
    .pagination-current span {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--glow);
      color: var(--accent);
    }
    .pagination-disabled span {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; align-items: flex-start; padding: 1.5rem 0; }
      .site-wrapper { padding: 0 1.25rem; }
      h1 { font-size: 1.75rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    {% block content %}
    {% endblock content %}

    <footer class="site-footer">
      <p>Powered by Hwaro</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
