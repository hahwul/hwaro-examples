<!DOCTYPE html>
<html lang="{{ page_language | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default('') | e }}">
  <title>{% if page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #cba6f7;
      --text: #cdd6f4;
      --text-muted: #a6adc8;
      --border: #45475a;
      --bg: #1e1e2e;
      --bg-subtle: #181825;
      --glow: rgba(203, 166, 247, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }

    /* Layout */
    .site-wrapper { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .site-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--glow);
      transition: text-shadow 0.3s ease, color 0.3s ease;
    }
    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary);
    }

    .site-header nav { display: flex; gap: 1.5rem; }
    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      position: relative;
      transition: color 0.3s ease;
    }
    .site-header nav a:hover { color: var(--text); }
    .site-header nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--primary);
      transition: width 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 5px var(--primary);
    }
    .site-header nav a:hover::after { width: 100%; }

    .site-main { min-height: calc(100vh - 250px); }
    .site-footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3 { line-height: 1.3; margin-top: 2em; margin-bottom: 1em; font-weight: 600; color: var(--text); }
    h1 { font-size: 2.2rem; margin-top: 0; letter-spacing: -0.5px; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.25rem; }
    p { margin: 1.2em 0; color: var(--text-muted); font-size: 1.05rem; }
    a { color: var(--primary); text-decoration: none; transition: color 0.3s ease, text-shadow 0.3s ease; }
    a:hover { color: var(--text); text-shadow: 0 0 8px var(--glow); }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      border: 1px solid var(--border);
    }
    pre {
      background: var(--bg-subtle);
      padding: 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    pre code { background: none; padding: 0; border: none; }

    /* Components */
    .card {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 10px rgba(203, 166, 247, 0.1);
      border-color: rgba(203, 166, 247, 0.3);
    }

    ul.section-list { list-style: none; padding: 0; margin: 2rem 0; }
    ul.section-list li { margin-bottom: 1rem; }
    ul.section-list li a {
      display: block;
      padding: 1rem;
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-weight: 500;
      color: var(--text);
      transition: all 0.3s ease;
    }
    ul.section-list li a:hover {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(203, 166, 247, 0.15);
      transform: translateX(5px);
    }

    .taxonomy-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list { list-style: none; padding: 0; margin: 0; display: flex; gap: 0.75rem; justify-content: center; }
    nav.pagination a, .pagination-current span, .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    nav.pagination a { color: var(--text-muted); text-decoration: none; transition: all 0.3s ease; }
    nav.pagination a:hover {
      color: var(--text);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(203, 166, 247, 0.2);
    }
    .pagination-current span {
      border: 1px solid var(--primary);
      background: rgba(203, 166, 247, 0.1);
      color: var(--primary);
      box-shadow: 0 0 10px rgba(203, 166, 247, 0.2);
    }
    .pagination-disabled span { opacity: 0.4; }

    /* Tags/Badges */
    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: rgba(203, 166, 247, 0.1);
      border: 1px solid rgba(203, 166, 247, 0.3);
      color: var(--primary);
      font-size: 0.85rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .tag:hover {
      background: rgba(203, 166, 247, 0.2);
      box-shadow: 0 0 8px rgba(203, 166, 247, 0.3);
      color: var(--text);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 1rem; text-align: center; }
      .site-wrapper { padding: 0 1rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{{ page.section | default('') }}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      <p>Apolo Theme - Powered by Hwaro</p>
    </footer>
  </div>
  {{ highlight_js }}
  {{ auto_includes_js }}
</body>
</html>
