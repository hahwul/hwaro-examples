{% include "header.html" %}
  <main class="site-main">
    <article class="paper-article">
      <header class="paper-section-header">
        {% if page.extra.chapter_number %}
        <p class="paper-section-eyebrow">Chapter {{ page.extra.chapter_number }}</p>
        {% endif %}
        <h1 class="paper-section-title">{{ page.title | e }}</h1>
        {% if page.description %}
        <p class="paper-lede">{{ page.description | e }}</p>
        {% endif %}
      </header>
      <div class="paper-content">
        {{ content }}
      </div>
      <footer class="paper-section-footer">
        <a href="{{ base_url }}/chapters/" class="button-link">&larr; back to table of contents</a>
      </footer>
    </article>
  </main>
{% include "footer.html" %}
