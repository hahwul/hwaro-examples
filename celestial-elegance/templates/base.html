<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page is defined and page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% if site.description %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}
  <link rel="stylesheet" href="{{ base_url }}css/style.css">
  {{ auto_includes }}
  {% if site.highlight is defined and site.highlight.enabled %}
  {{ highlight_css }}
  {% endif %}
</head>
<body>
  <header>
    <a href="{{ base_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <ul>
        <li><a href="{{ base_url }}">Home</a></li>
        <li><a href="{{ base_url }}posts/">Posts</a></li>
        <li><a href="{{ base_url }}about/">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ current_year }} {{ site.title }}. Designed for the cosmos.</p>
  </footer>
</body>
</html>
