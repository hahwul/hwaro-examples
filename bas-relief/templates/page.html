{% include "header.html" %}
    <main class="site-main">
      <article class="page-article">
        {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
        {% if page.date %}
        <time class="page-date" datetime="{{ page.date }}">{{ page.date | date("%B %d, %Y") }}</time>
        {% endif %}
        <div class="page-content">
          {{ content | safe }}
        </div>
      </article>
    </main>
{% include "footer.html" %}
