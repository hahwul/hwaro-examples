{% include "header.html" %}
    <main class="site-main">
      <h1 class="section-heading">{{ taxonomy_term }}</h1>
      <div class="post-list">
        {% for post in taxonomy_pages %}
        <a href="{{ base_url }}{{ post.url }}" class="post-card">
          <span class="post-card-title">{{ post.title }}</span>
          {% if post.date %}
          <time class="post-card-date">{{ post.date | date("%Y.%m.%d") }}</time>
          {% endif %}
        </a>
        {% endfor %}
      </div>
    </main>
{% include "footer.html" %}
