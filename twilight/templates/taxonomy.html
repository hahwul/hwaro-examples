{% include "header.html" %}
<div class="container">
  <h1 class="page-title">Tags</h1>
  <div class="taxonomy-page">
    {% if og_all_tags %}
    <ul class="tag-list" style="margin-top: 1.5rem;">
      {% for tag in og_all_tags %}
      <li><a href="{{ base_url }}/tags/{{ tag.name }}/">{{ tag.name }}</a></li>
      {% endfor %}
    </ul>
    {% endif %}
  </div>
</div>
