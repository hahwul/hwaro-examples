{% include "header.html" %}
<div class="container">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.date %}
  <div class="page-meta">{{ page.date }}</div>
  {% endif %}
  <div class="page-content">
    {{ content | safe }}
  </div>
  {% if page.tags %}
  <ul class="tag-list" style="margin-top: 2rem;">
    {% for tag in page.tags %}
    <li><a href="{{ base_url }}/tags/{{ tag }}/">{{ tag }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
</div>
{% include "footer.html" %}
