{% include "header.html" %}
<div class="container">
  <h1 class="page-title">Tagged: {{ term.name }}</h1>
  <ul class="post-list">
    {% for post in term.pages %}
    <li class="post-item">
      <h2 class="post-item-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <div class="post-item-meta">{{ post.date }}</div>
      {% if post.description %}
      <p class="post-item-description">{{ post.description }}</p>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</div>
{% include "footer.html" %}
