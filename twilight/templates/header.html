<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --purple: #6b5b8a;
      --peach: #d4a07a;
      --deep-blue: #1e2040;
      --text-light: #e0dce6;
      --text-muted: #9a93a8;
      --bg: #1e2040;
      --bg-card: #252748;
    }

    html {
      font-size: 18px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Karla', sans-serif;
      font-weight: 300;
      background-color: var(--bg);
      color: var(--text-light);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--peach);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: #e8b896;
    }

    .site-header {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--purple);
    }

    .site-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      color: var(--peach);
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }

    .site-header h1 a {
      color: inherit;
    }

    .site-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .site-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--purple);
    }

    .site-nav a {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .site-nav a:hover {
      color: var(--peach);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--peach);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .page-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--purple);
    }

    .page-content {
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--text-light);
    }

    .page-content p {
      margin-bottom: 1.6rem;
    }

    .page-content h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--peach);
      margin: 2.5rem 0 1rem;
    }

    .page-content h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--text-light);
      margin: 2rem 0 0.8rem;
    }

    .page-content blockquote {
      border-left: 2px solid var(--peach);
      padding-left: 1.5rem;
      margin: 2rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .page-content img {
      width: 100%;
      height: auto;
      margin: 2rem 0;
      border: 1px solid var(--purple);
    }

    .page-content code {
      font-size: 0.9rem;
      background: var(--bg-card);
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--purple);
    }

    .page-content pre {
      background: var(--bg-card);
      border: 1px solid var(--purple);
      padding: 1.2rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .page-content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .page-content strong {
      font-weight: 500;
      color: var(--text-light);
    }

    .post-list {
      list-style: none;
    }

    .post-item {
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--purple);
    }

    .post-item:first-child {
      padding-top: 0;
    }

    .post-item-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      line-height: 1.25;
      margin-bottom: 0.6rem;
    }

    .post-item-title a {
      color: var(--text-light);
    }

    .post-item-title a:hover {
      color: var(--peach);
    }

    .post-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .post-item-description {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      list-style: none;
      margin-top: 1rem;
    }

    .tag-list li a {
      display: inline-block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border: 1px solid var(--purple);
      padding: 0.3rem 0.8rem;
      transition: all 0.2s ease;
    }

    .tag-list li a:hover {
      color: var(--peach);
      border-color: var(--peach);
    }

    .taxonomy-page h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--peach);
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--purple);
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      margin-top: 2rem;
      border-top: 1px solid var(--purple);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pagination a {
      color: var(--text-muted);
    }

    .pagination a:hover {
      color: var(--peach);
    }

    .error-page {
      text-align: center;
      padding: 6rem 1.5rem;
    }

    .error-page h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 5rem;
      color: var(--purple);
      margin-bottom: 1rem;
    }

    .error-page p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) {
      html {
        font-size: 16px;
      }

      .page-title {
        font-size: 2rem;
      }

      .post-item-title {
        font-size: 1.4rem;
      }

      .site-header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>
  <header class="site-header">
    <h1><a href="{{ base_url }}/">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
  </header>
  <nav class="site-nav">
    <a href="{{ base_url }}/">Home</a>
    <a href="{{ base_url }}/posts/">Essays</a>
    <a href="{{ base_url }}/about/">About</a>
    <a href="{{ base_url }}/tags/">Tags</a>
  </nav>
  <main>
