<style>
/* RetroMac OS 9 Theme CSS */
:root {
    --mac-bg: #5555aa; /* Classic desktop pattern color */
    --mac-window-bg: #eeeeee;
    --mac-window-border: #000000;
    --mac-highlight: #000000;
    --mac-text: #000000;
    --mac-menubar: #ffffff;
    --mac-titlebar-bg: #dddddd;
    --mac-pinstripe: url('data:image/svg+xml;utf8,<svg width="4" height="4" xmlns="http://www.w3.org/2000/svg"><rect width="4" height="4" fill="%23dddddd"/><line x1="0" y1="1" x2="4" y2="1" stroke="%23cccccc" stroke-width="1"/><line x1="0" y1="3" x2="4" y2="3" stroke="%23ffffff" stroke-width="1"/></svg>');
}

body {
    margin: 0;
    padding: 0;
    font-family: "Geneva", "Chicago", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 12px;
    color: var(--mac-text);
    background-color: var(--mac-bg);
    /* Simple desktop pattern */
    background-image: url('data:image/svg+xml;utf8,<svg width="2" height="2" xmlns="http://www.w3.org/2000/svg"><rect width="1" height="1" fill="%235555aa"/><rect x="1" y="1" width="1" height="1" fill="%235555aa"/><rect x="1" y="0" width="1" height="1" fill="%236666bb"/><rect x="0" y="1" width="1" height="1" fill="%236666bb"/></svg>');
    height: 100vh;
    overflow: hidden;
}

.desktop {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
}

/* Menu Bar */
.menu-bar {
    background-color: var(--mac-menubar);
    height: 20px;
    border-bottom: 1px solid var(--mac-window-border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    z-index: 1000;
}

.menu-item {
    padding: 0 10px;
    height: 100%;
    display: flex;
    align-items: center;
    cursor: default;
}

.menu-item:hover, .menu-item.active {
    background-color: var(--mac-highlight);
    color: #ffffff;
}

.apple-logo {
    font-size: 14px;
}

.clock {
    margin-left: auto;
    padding: 0 10px;
}

/* Desktop Icons */
.desktop-icons {
    position: absolute;
    top: 40px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    z-index: 10;
}

.desktop-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ffffff;
    text-shadow: 1px 1px 0 #000;
    width: 64px;
}

.desktop-icon span {
    margin-top: 4px;
    text-align: center;
    background-color: transparent;
    padding: 2px 4px;
}

.desktop-icon:hover span {
    background-color: var(--mac-highlight);
    color: #ffffff;
    text-shadow: none;
}

/* Window Style */
.desktop-content {
    flex: 1;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    z-index: 20;
}

.mac-window {
    background-color: var(--mac-window-bg);
    border: 1px solid var(--mac-window-border);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    margin-bottom: 40px;
}

.window-titlebar {
    height: 22px;
    background-color: var(--mac-titlebar-bg);
    background-image: var(--mac-pinstripe);
    border-bottom: 1px solid var(--mac-window-border);
    display: flex;
    align-items: center;
    padding: 0 5px;
    position: relative;
}

.window-close-btn {
    width: 12px;
    height: 12px;
    background-color: var(--mac-window-bg);
    border: 1px solid var(--mac-window-border);
    margin-right: 10px;
    box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #aaaaaa;
}

.window-title {
    background-color: var(--mac-titlebar-bg);
    padding: 0 10px;
    margin: 0 auto;
    font-weight: bold;
    text-align: center;
    border-left: 1px solid var(--mac-window-border);
    border-right: 1px solid var(--mac-window-border);
}

.window-content {
    padding: 20px;
    background-color: #ffffff;
    border: 1px solid #aaaaaa;
    margin: 2px;
    min-height: 200px;
    overflow-y: auto;
}

/* Content Typography */
h1, h2, h3 {
    font-family: "Chicago", "Helvetica Neue", Helvetica, Arial, sans-serif;
    border-bottom: 1px solid var(--mac-window-border);
    padding-bottom: 5px;
}

a {
    color: #0000ee;
    text-decoration: underline;
}

a:visited {
    color: #551a8b;
}

pre {
    background-color: #eeeeee;
    border: 1px solid #cccccc;
    padding: 10px;
    font-family: monospace;
    overflow-x: auto;
}

code {
    background-color: #eeeeee;
    padding: 2px 4px;
    font-family: monospace;
}

blockquote {
    border-left: 3px solid #000000;
    margin-left: 0;
    padding-left: 10px;
    font-style: italic;
}

/* Buttons */
button, .button {
    background-color: var(--mac-window-bg);
    border: 1px solid var(--mac-window-border);
    padding: 4px 12px;
    font-family: "Geneva", "Chicago", sans-serif;
    font-size: 12px;
    cursor: pointer;
    box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #aaaaaa;
}

button:active, .button:active {
    box-shadow: inset 1px 1px 0 #aaaaaa, inset -1px -1px 0 #ffffff;
    background-color: #dddddd;
}
</style>
