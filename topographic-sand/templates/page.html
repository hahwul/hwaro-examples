{% include "header.html" %}

<main>
    <article>
        <header class="post-header">
            {% if page.title != "Posts" and page.title != "A Zen Garden Experience" and page.title != "About" %}
                <h1>{{ page.title }}</h1>
                {% if page.date %}
                    <div class="post-meta">
                        {{ page.date | date("%B %d, %Y") }}
                    </div>
                {% endif %}
            {% else %}
                <!-- Title hidden for specific pages as it's part of content or section -->
            {% endif %}
        </header>

        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</main>

{% include "footer.html" %}
