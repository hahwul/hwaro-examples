{% extends "base.html" %}
{% block content %}
<h2 class="site-title" style="font-size: 80px; text-align: center; color: var(--primary);">{{ section.title }}</h2>
<div style="display: grid; grid-template-columns: 1fr; gap: 2rem; margin-top: 4rem;">
  {% for page in section.pages %}
  <div class="ticket-stub">
    <h3 style="font-family: 'Lilita One'; font-size: 32px; margin: 0;"><a href="{{ page.permalink }}" style="color: var(--black); text-decoration: none;">{{ page.title }}</a></h3>
    <p>{{ page.description }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
