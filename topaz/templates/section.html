{% include "header.html" %}

  <main class="wrapper page-main">
    <header class="section-header">
      <h1 class="section-title">{{ page.title }}</h1>
    </header>

    {{ content | safe }}

    <ul class="posts-list">
      {% for item in section.pages %}
      <li class="posts-list-item">
        <a href="{{ base_url }}{{ item.url }}">
          <span class="posts-list-date">{{ item.date | date(format="%Y-%m-%d") }}</span>
          <span class="posts-list-title">{{ item.title }}</span>
          {% if item.description %}
          <span class="posts-list-desc">{{ item.description }}</span>
          {% endif %}
        </a>
      </li>
      {% endfor %}
    </ul>

    {{ pagination }}
  </main>

{% include "footer.html" %}
