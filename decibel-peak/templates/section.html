{% extends "base.html" %}
{% block content %}
<h1 class="act-name" style="font-size: 120px; color: var(--red);">{{ section.title }}</h1>
<div style="margin-top: 4rem;">
  {% for page in section.pages %}
  <div class="act-card" style="margin-bottom: 2rem; border: 2px solid var(--white); padding: 2rem;">
    <h2 class="act-name" style="font-size: 48px;"><a href="{{ page.permalink }}" style="color: var(--white); text-decoration: none;">{{ page.title }}</a></h2>
    <p class="tech-specs">{{ page.description }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
