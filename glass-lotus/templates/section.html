{% include "header.html" %}
  <main class="blog-main">
    <h1>{{ page.title | e }}</h1>
    {{ content }}

    <ul class="section-list">
      {% for item in section.pages %}
      <li>
        <a href="{{ item.permalink }}">{{ item.title | e }}</a>
        <div class="post-meta"><time>{{ item.date }}</time></div>
      </li>
      {% endfor %}
    </ul>
    {{ pagination | safe }}
  </main>
{% include "footer.html" %}
