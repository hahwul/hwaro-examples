<!DOCTYPE html>
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page and page.description %}{{ page.description | e }}{% else %}{{ site.description | e }}{% endif %}">
  <title>{% if page and page.title %}{{ page.title | e }} - {% endif %}{{ site.title | e }}</title>
  {{ og_all_tags }}
  {{ hreflang_tags }}
  <style>
    :root {
      --primary: #c29d59;
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #0d0e12;
      --bg-subtle: rgba(255, 255, 255, 0.03);
      --glow: rgba(194, 157, 89, 0.15);
      --glow-strong: rgba(194, 157, 89, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .site-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.5rem 0;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-weight: 300;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .site-logo:hover {
      color: var(--primary);
      text-shadow: 0 0 15px var(--glow-strong);
    }

    .site-header nav {
      display: flex;
      gap: 2rem;
    }

    .site-header nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .site-header nav a:hover {
      color: var(--primary);
      text-shadow: 0 0 8px var(--glow);
    }

    .site-main {
      flex-grow: 1;
    }

    .site-footer {
      margin-top: 5rem;
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Typography */
    h1, h2, h3, h4 {
      line-height: 1.4;
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.3rem; }

    p { margin: 1.2em 0; color: #b0b0b0; }

    a {
      color: var(--primary);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      color: #fff;
      text-shadow: 0 0 10px var(--glow-strong);
    }

    code {
      background: var(--bg-subtle);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      color: #dcdcdc;
      border: 1px solid var(--border);
    }

    pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }

    pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }

    /* Components */
    .card {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .card:hover {
      border-color: rgba(194, 157, 89, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 15px var(--glow);
      transform: translateY(-2px);
    }

    ul.section-list {
      list-style: none;
      padding: 0;
      margin: 2rem 0;
    }

    ul.section-list li {
      margin-bottom: 1rem;
    }

    ul.section-list li a {
      display: block;
      padding: 1.5rem;
      background: var(--bg-subtle);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-weight: 300;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    ul.section-list li a:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(194, 157, 89, 0.3);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 15px var(--glow);
      transform: translateX(5px);
    }

    .taxonomy-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    /* Pagination */
    nav.pagination { margin: 3rem 0; }
    nav.pagination .pagination-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    nav.pagination a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    nav.pagination a:hover {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--glow);
    }

    .pagination-current span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--primary);
      background: rgba(194, 157, 89, 0.1);
      color: var(--primary);
      box-shadow: 0 0 15px var(--glow);
    }

    .pagination-disabled span {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Blocks */
    hr {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
      box-shadow: 0 0 5px rgba(255,255,255,0.05);
    }

    blockquote {
      margin: 2rem 0;
      padding: 1rem 2rem;
      border-left: 3px solid var(--primary);
      background: rgba(194, 157, 89, 0.05);
      color: #ccc;
      font-style: italic;
      border-radius: 0 8px 8px 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        gap: 1.5rem;
      }
      .site-wrapper { padding: 0 1.2rem; }
    }
  </style>
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body data-section="{% if page and page.section %}{{ page.section }}{% endif %}">
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo">{{ site.title }}</a>
      <nav>
        <a href="{{ base_url }}/">Home</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      &copy; {{ current_year }} {{ site.title }}. Designed with elegance.
    </footer>
  </div>
</body>
</html>
