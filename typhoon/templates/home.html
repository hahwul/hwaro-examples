{% include "header.html" %}

<main class="vortex-container">
  {% for i in range(1, 10) %}
    <div class="vortex-band"
      style="width: {{ 200 + i * 150 }}px;
             height: {{ 200 + i * 150 }}px;
             animation-duration: {{ 10 + i * 5 }}s;
             opacity: {{ 0.6 / i }};
             z-index: {{ 1 - i }};">
    </div>
  {% endfor %}

  <div class="eye-content">
    <span class="status-tag">STORM STATUS: EXTREME</span>
    <h1>{{ page.title }}</h1>
    <div class="summary">
      {{ content | safe }}
    </div>
    <a href="{{ base_url }}/reports/" style="display: inline-block; margin-top: 2rem; border: 1px solid var(--rain-cyan); padding: 0.8rem 2.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;">Access Recent Reports</a>
  </div>
</main>

{% include "footer.html" %}
