{% include "header.html" %}

<main class="spiral-grid">
  <div style="grid-column: 1 / -1;">
    <h1 style="font-family: 'Oswald', sans-serif; font-size: 3.5rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 2px solid var(--rain-cyan); display: inline-block; padding-bottom: 0.5rem;">
      {{ section.title }}
    </h1>
    <div style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 4rem;">
      {{ content | safe }}
    </div>
  </div>

  {% for post in section.pages %}
    <article class="report-card" style="--i: {{ loop.index0 }}">
      <span class="date">{{ post.date | date("%Y-%m-%d") }}</span>
      <h2><a href="{{ post.permalink }}">{{ post.title }}</a></h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">
        {{ post.summary | default(value=post.description) | strip_html | truncate_words(20) }}
      </p>
      <a href="{{ post.permalink }}" style="display: block; margin-top: 1.5rem; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--rain-cyan); width: max-content;">READ REPORT</a>
    </article>
  {% endfor %}
</main>

{% include "footer.html" %}
