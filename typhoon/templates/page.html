{% include "header.html" %}

<main class="main-article">
  <div class="meta">
    {{ page.date | date("%Y-%m-%d") }} / Intelligence Report / {{ page.word_count }} words
  </div>
  <h1>{{ page.title }}</h1>
  <div class="content-body">
    {{ content | safe }}
  </div>

  <div style="margin-top: 5rem; border-top: 1px solid var(--cyclone-grey); padding-top: 2rem;">
    <a href="{{ base_url }}/reports/" style="font-size: 0.8rem; text-transform: uppercase; border: 1px solid var(--rain-cyan); padding: 0.5rem 1.5rem; letter-spacing: 1px;">Back to All Reports</a>
  </div>
</main>
