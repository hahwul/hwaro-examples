{% include "header.html" %}

<article class="page-content">
    {% if page.title and not page.extra.hide_title %}
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="lead">{{ page.description }}</p>
        {% endif %}
    </header>
    {% endif %}

    <div class="content">
        {{ content | safe }}
    </div>
</article>

{% include "footer.html" %}
