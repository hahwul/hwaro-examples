<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {{ og_all_tags }}

  <!-- Fonts: Playfair Display + Lora -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- RSS -->
  <link href="{{ base_url }}/atom.xml" type="application/atom+xml" rel="alternate" title="ATOM Feed">

  <link rel="stylesheet" href="{{ base_url }}/css/style.css">
  {{ highlight_css }}
  {{ auto_includes_css }}
</head>
<body>

  <!-- Masthead -->
  <header class="masthead">
    <div class="masthead-rule-top">
      <h1><a href="{{ base_url }}/" class="masthead-title">{{ site.title }}</a></h1>
      <p class="masthead-meta">Vol. 1 · Est. 2026 · {{ site.description }}</p>
      <nav class="gazette-nav">
        <a href="{{ base_url }}/">Front Page</a>
        <a href="{{ base_url }}/posts/">Archives</a>
        <a href="{{ base_url }}/tags/">Topics</a>
        <a href="{{ base_url }}/about/">About</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <div class="container">
    <main>
