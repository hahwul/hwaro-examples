{% include "header.html" %}

  <!-- Page Header -->
  <div class="intro-header intro-header--no-img">
    <div class="container">
      <div class="page-heading">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-subheading">{{ page.description }}</p>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <div class="main-content">
      <article>
        {{ content }}
      </article>
    </div>
  </div>

{% include "footer.html" %}
