{% include "header.html" %}

  <!-- Section Header -->
  <div class="intro-header intro-header--no-img">
    <div class="container">
      <div class="page-heading">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-subheading">{{ page.description }}</p>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- Post List -->
  <div class="container">
    <div class="main-content">
      {{ content }}
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {{ pagination }}
    </div>
  </div>

{% include "footer.html" %}
